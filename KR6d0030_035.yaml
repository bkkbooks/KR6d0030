body:
  text: 鏡水沙門栖復集言後時者經言其身火燃千二百者問何要燒亦住千二百歲耶攝答言表居因經十三住中前十二屬因第十三住屬果菩薩在因表十二住所以千二百歲謨云表於此經修行十法行十十相資成千二百功德故經千二百歲也又答彼佛壽命四萬二千劫菩薩亦等喜見菩薩一心求佛滿萬二千及飲香油又一千二百所以燒身甚深亦復千二百三件共計五萬六千四百也亦何長糅云此是化現之身神通願力滿千二百歲長亦何疑此亦不定後生於淨德王家化生故言此初也者一生處也經言一切眾生至化生者問為是四生中化生為復是俱生種類變化生耶答四生中化生也問既是化生無父母如何經說即為其父答約彼所化生之處立父母名也二云只淨德王早是前生之中喜見菩薩所生父母身受生身立父母也言二得總持者經言得解一切眾生語言陀羅尼者問前定說一切色身三昧此間何故說語言陀羅尼答有人解一切色身三昧是聞經得語言陀羅尼是供養佛得所以不一時說也又云二俱是聞經得此三昧前來已說此更不說互舉一邊言俱舍論第十二卷說數有六十忘失等者或翻譯人或傳寫人脫只有五十二數第五十二數名阿僧祇也小乘從一至十從十至百從百至千十千為萬十萬為億如是數至第十六數名矜羯羅即是經中甄迦羅也第十八名頻婆羅第二十名阿閦婆謨問此方經文二十八品便終何以日月淨明德佛八百千萬億那由他甄迦羅等並是是流通分中讚嘆有多少答亦是根有利鈍稟解廣略不同況報化有異不可詰難言初往者經言即坐七寶之臺者即是王宮中有臺非是化也言後白者經言白佛言世尊世尊猶故者若是高聲嗔心之中言即似恨佛住世不早入滅若是下聲長聲呼之者慈悲歡喜心中說此有二意一則喜與世尊相逢我經生死劫來恐不見世尊不期得遇世尊故言猶故在世二者驚嗟如來大悲能堪忍久住不捨生死眾生言一唱滅者經爾時日月淨明佛告一切眾生喜見菩薩者問眾生喜見菩薩乃是前生之舊名何故隔生猶存昔號答菩薩口中自說是前身化來如來受讚亦知是舊人故告無失又但是釋迦今時遙指往時佛告喜見未必當時言喜見不妨告善男子言二法付者問初文早言付佛法又言付阿耨菩提何別答初佛法通貫三乘後付阿耨菩提唯一乘法故別也已前無付屬法眼處今喜見來法眼有付處也問前經言我滅時到又經言滅盡時至何別答滅住果滅盡息化故別也攝問若據小乘法畢竟入于滅何須付囑若大乘法如來常住不滅有感即應何用付之答有三因一時眾見佛慇懃付其有情重法者欲競宣傳法華二付菩薩令其自行及化他三佛知眾生於此菩薩有緣故付之也付中有二一法二人故金剛經云以根未熟菩薩付根熟菩薩也言三界付者經言寶臺者樓閣也亦名臺又築土向上付觀望處亦名臺也言六入滅者經言於後夜分入於滅者謨云夜分三時初中後分此當後故乎音避嫌疑也問一切諸佛皆夜半子時入滅此佛何故於後分耶答表待喜見菩薩之到來不准擬再逢佛佛留身住時向中間意待菩薩付囑佛法表住待慇懃不及夜半入滅故取夜後分所以喜見亦來更不說法便教安施床座也言一悲戀者經言悲感懊惱者以憂惱相應此是欲界法八地已上菩薩無也據此還是七地已前悲增菩薩也𧂐積音二同言三起塔等者經言火滅已後收取等者攝問金剛之身云何燒破作多分耶答大般若一百二十九及五百三云一切如來應正等覺以大悲心觀有情類應於諸佛設利羅所歸敬供養而得度者以金剛喻三摩地力碎如來金剛身令如芥子令一切眾生得供養問供養佛體有何利益答大般若云於如來滅後有得一粒如芥子量種種供養其福無邊於人天中受諸妙樂乃至最後得盡苦原也簡要云表佛八萬四千功德滿又表八萬四千塵勞息又表佛雖入滅八萬四千教法流行有此表故故起八萬四千塔也經言高三世界有說高至色界名三世界問欲色二界何名三世界答無色界無別處所只於欲色二界中間攝也糅云四天王天三十三天夜摩天名三世界此正義言他受用等者問此界如何安爾許大塔答此是報土中量設共色界齊夜摩天齊皆不妨也經言表剎莊嚴者塔上有須彌座座上有剎住住外四邊有相輪名表剎莊嚴也言燃臂者經言即於八萬四千塔前燃百福莊嚴臂者問為復於八萬四千塔前一一皆現身燒臂為復都於眾多塔前燒一身臂耶答若一一塔前皆現身事須化身也今只於眾多塔前一身臂也問何故前生行願小却燒身今生行願高却燒臂也答有三意一緣受佛付囑不令捨身事須守護二云前捨身身命俱盡今生捨臂意徒留身久住三前生佛在世所以捨身今生佛滅無人教化眾生令持經故空捨臂問何故前生捨身千二百歲燒盡何故今生燒臂七萬二千歲耶答前生捨身神通願力小只延得一千二百歲今生神通願力大故延得七萬二千歲留臂經爾許時益人壽亦過八萬歲時也化度云表居因位其法未圓故言七萬二千歲也言感生瑞應等者由燒臂供養法華經故有瑞應一因由者問此菩薩何故燒却臂思念却平復耶答經言由斯菩薩福德智慧純厚所致由前前世濟一切眾生闕乏即財施此名福德純厚也持法華經及供養經故名智慧純厚也言此初也者挍量勝也經言若復有人以七寶等者七寶滿三千但是財供養受持此經乃為法供養財供養是福若求作作疾不過受持一乘受持一乘道必得若不持經空羨於佛謨云亦如臨川空羨魚不及歸家結網如來果位即是魚網結終得魚持經必作佛百年空羨魚不如暫結網多時供養佛爭似暫持經持經既通十行施他即是行檀以寶布施如來而乃不攝餘行也言一幽廣勝者此法華經所論道理如海之深此經教理行果權實道理具足名廣也言高顯勝者法華經以四法所成如須彌山四寶莊飾山則出過眾山經乃超於三界二種生死也十寶山者謨云引華嚴經有十山王第十地中有四喻喻於十地功德第二名上功德即十寶山為喻經言菩薩十地因佛智故而有差別意言佛智上有不慳義建立為初地行檀又云如因大地有十寶山王謂雪山王香山王陀梨山王神仙山王由乾陀山王馬耳山王尼民陀羅山王斫羯羅山王都計末底山王須彌盧山王後經云此十山王同在大海差別得名菩薩十地亦復如是在一切智海差別得名初二是土後八皆寶從多分說名十寶山言三了達勝者月則眾星之中照明最勝法華經智慧光明最勝言四除惑勝者此法華經斷煩惱破生死暗也言出生勝者此方無西國多計梵天王結生一切問眾生身命自業所招云何梵王能生一切答佛順彼眾生妄計為喻且作是說言八契理勝者或是真理或是道理經中意破二歸一之意疏主兩遍科第一遍科分二初段經云又如一切凡夫中須陀洹道斯陀含道阿那含阿羅漢辟支為第一是契理勝中舉喻此雖說人總是喻法也問一切凡夫初二三果等是人境如何名契理勝耶答取能證人身中真理將此理喻法華經教下所詮理名契理勝故言舉喻也後經言此經亦復如是一切如來所說若菩薩所說至亦為第一三行經文是契理勝中法合三乘人及所說法總名法也即是法法勝也上來初喻後法今兩段不同總名契理勝中法勝喻亦名法也言或名人法勝者疏主第二遍科也經主有能受持是經典者至亦為第一名契理勝中人勝初法後人合名人法勝若無此有能受持已下文但名契理勝中法勝只緣有此人文故疏主改科文故名契理勝言九二利勝者經言一切聲聞辟支佛等者聲聞自利菩薩自利兼利他名二利勝也言十圓德勝者舉佛況經故言圓德也言計此人文等者疏意先合引法合文經言此經亦復如是一切如來所說若菩薩所說若聲聞所說諸經中最為第一然後引喻文云又如一切凡夫人中須陀洹斯陀含阿羅漢辟支佛為第一後引入文有能受持是經典者亦復如是一切眾生中為第一據道理合先引法次引喻喻後引人文故云計此人文應最後說文便故來又解云疏意言契理勝中人文不合安在契理中安此當唱經文最後安也先引如佛為諸法王此經亦復如是諸經中王便合續云有能受持是經典者乃至亦為第一此若最後安之先舉佛勝況持經人勝將人況人恰是穩便也譯家錯向契理中安之見他契理勝中以人為喻便將人文相近安之故言文便也此中但是疏主意說嘆人中先合後喻為例合故云此合文合後說也相國意有人者此取有人經中兩重合今取此人之於最後說不爾重也言預流者預聖人流入聖人流也言一往來者一來天上一往人間得無學果言初句能除惑業者離集諦解經中言宿王華此經能救一切眾生者言次能除苦果者離苦諦解經言此經能令一切眾生離諸苦惱言能滿善願解者經言此經能大饒益一切眾生充滿其願言又發心等者重解上句三句經文也言又總別者初句經總令離惡攝善次句經別離惡後句經別攝善也言一遂願者經云如清涼池能滿一切諸渴乏者言二道成者經言如寒者得火調適義成為表持此經必當成佛言三具慚愧者經言如裸者得衣言得導師者經言商人得主一乘真法諸佛所師言得歸依者經如子得母智慧之子從法化生言越生死者經言如渡得船言七除煩惱者經言如病得醫言八得智慧者經言如暗得燈言九獲聖財者經云如貧得寶言承稟者經言如民得王持經之人依此經如法修行即是承稟也言十一知寶所者經言如賈客得海言十二破癡暗者經言如炬除暗問除煩惱與破癡暗何別答除煩惱是總除煩惱也破癡暗是別破無明問燈炬何別答得智慧名燈破癡暗名炬二義別言隨其所應配前三句者即是將十二句經文配前三句也章敬云第七除煩惱如病得醫第十二破癡暗如炬除暗配前第一句此經能救一切眾生者第六句越王死如渡得船配前第二能令一切眾生離諸苦惱也所餘九句或是第三能大饒益一切眾生充滿其願中收路云得火得衣得醫得燈得寶得海如炬除暗此喻配初句能救眾生除惑業故得母得王配中二句除若惱故第一句如清涼池配第三句充滿願故善事滿故餘得主得船通三句也言此合說也者離諸苦痛眾病苦為初句初句者只是解當處合中經文言離諸苦者解經文一切病痛也言除眾病苦者解合中經云能令眾生離除一切眾苦此上二句離苦諦只是指當處合中經文合入此二句為初句言解生死縛者即經言離一切苦合前法中第二句此經能令眾生離諸苦惱所以疏言謂除惑業為第二句此離集諦言不合前第三句者此經能大饒益一切眾生充滿其願言或除當苦者此唯當處合文不解前法也或除當苦者解經言能令眾生離一切苦當來苦也言現苦者離一切病痛王苦苦諦也言苦因者能解一切生死之縛集諦也言一聞書功德者一聞書功德無邊言二供養無邊者而無有邊佛能知彼無邊功德無有有邊畔功德一一皆無邊畔佛得無邊之邊言此初二也者初標聞勝者經言宿王華若有人等二轉女身者經言若有女人聞是經等問餘品何故不說盡是女人唯此品耶答據實餘品亦有此能此品獨勝緣女人愛着自身者多唯此品說藥王菩薩燒身燃臂不惜命菩薩身上捨何況我等女人之身今聞菩薩捨所愛身遂猒自體離女人身故瑜伽論樂丈夫體猒婦人身深見過患名菩薩性人言一生淨土者經言若有女人聞是經等者問何故說女人答義同前女人當生尚得功德何況丈夫也言四見多佛者經言得是忍已至如來者問得是忍已即是初地但見百佛國土如何見七百萬二千億那由他恒河沙等諸佛耶答此約佛力加持令見也或得忍已後通入八九十地故見多佛言菩薩慧無與等者但是方便接引持經之人令其發心據實未勝菩薩智慧言四隨喜獲福者經言如上所說者指前法師功德品六根功德也言後五百歲等者皆以五百年為一限望佛滅後五个五百年總得名後五百年也此是第一意也二云或除正法五百年像法一千五百年一千五百年外第四五百年初入末法取此以為後五百年也又云若比丘尼行八敬不滅不減正法即取第五五百年為後五百年也言解脫者不是得大乘無上佛果上明正付囑言第六守護者經言若人有病等者現在頭痛額熱得聞此經病即消滅不老不死聞法華經至老方死不老即不死至老方死意無中夭一生合得八十年活五十六十死者名中夭一生合得十歲活六歲七歲死者名中夭事須終壽限也嘉祥云無始時來斷煩惱名為有病得聞此經煩惱滅已名病即消滅不起六十二見名不老不損智慧命故言不死也又云流通法華經修行斷煩惱名病消滅捨無常色獲得常色名不老不死也又由執經故得顏色鮮白等不老增壽故不死也佛意令持此經修行法行究竟作佛何有老死等耶經言取草者吉祥草也經言應以青蓮等者問諸乘之本白色為先何以盛香乃清青色答東方甲乙木青色為先四色蓮華亦先青色顯此經為諸經先故說於青色妙音品言論云教化眾生行等者問何故名妙音菩薩行苦行力耶答菩薩本居淨土今居穢土出生入死名行苦行力也言密在此方者隱身持經隨類身故言教行苦行者教字若作交音呼釋迦佛教妙音行苦行也若作去音呼則是菩薩教化眾生交行苦行持經也言今放光召集者妙音本來早流傳法華經次釋迦放光召教生勝上心也紀國云前藥王品自利苦行此妙音品利他苦行前品是福德苦行此品是智慧苦行前品是財施苦行此品是法施苦行言音謂音聲者音謂八音聲謂五聲即宮商角徵羽聲成於文上下相應謂之音也言今居果位者問妙音既稱菩薩何名果位答因中果非果也如十王果也言業德者因中說樂名業今生說法名德故言業德雙彰也言未有他土者勸他持經菩薩行苦行故須名之勸說稅音言放肉髻之光等者即此肉髻光便是大人相表法華經尊勝故放肉髻光明大人之相問何要放大人相光答表名大菩薩故大人相光明問何故放眉間光耶答表法華經中道放其眉間光表一乘是諸乘之本故放白毫光也欲明法付其人故以光名之章敬云從初至末凡四處放光序塔二品放白毫光神力品中一一毛孔放於無量無數色光今妙品放髻毫二光各有所表矣隨應准說言三能照等者經言釋迦牟尼佛白毫光明遍照其國者謂照妙音身故放肉髻光照所以下經言釋迦牟尼佛光照其身問何故不毫光照佛髻光照菩薩答白毫當其眉間表諸佛同證中道法身理故肉髻在頂上不可見故表菩薩未能究竟證佛法身之理故用髻光也言妙幢相者嘉祥云諸三昧中最尊如世將軍若出必執魔幢表其大相也幢以高出為相得此三昧所在尊高出過眾人所修行業也言法華三昧者依四禪定觀一乘理言淨德者嘉祥云令諸三昧清淨如礬石練金令清淨也言宿王戲者從定起身猶如星宿王者自在也言無緣者謂滅盡定能所二緣皆悉無故故名無緣或根本智證真如時無能取所取相故故名無緣也言智印者依定證真如理真如與智為印智之印根本智也二云後得智印真妄等法智即是印諸法也言解一切眾生等者言音差別與說法故言集一切功德者得此三昧菩薩功德悉皆具足言集福王定者全引唯識第九說一大乘光明定照了大乘法故名光照定二集福王定能招集大乘功德如王無等故三賢守定謂此定能守世間出世賢善法故四健行定謂佛菩薩大健有情之所行故初從果為名二從喻為名三從用為名四從主為名言清淨三昧等者一戒淨二心淨三見淨四度疑淨五道非道智見淨六行智見行字平聲七行斷智見淨八無緣寂靜淨九國土淨前七即七淨華唯說因也後二屬果言九淨即因果合說也言四淨者一所依淨路云課六根為所依淨眼等諸根離染名所依淨也言所緣淨者謂六塵境上不起貪名所緣淨心淨者謂心王也四智淨謂心所也言神通者入是三昧能八相成道言慧炬者如人執炬夜行不墜嶮處言莊嚴者內莊嚴即智慧外莊嚴謂相好也言淨光明者入是三昧能放光明令諸眾生心得清淨言淨藏者定能藏諸功德故言此中者意言不同彼經種種誡也言無垢經香臺等者簡要云據彼經云於是香積如來以眾香鉢盛滿香飯與化菩薩時彼九萬菩薩俱發聲言我欲就娑婆世界供養釋迦牟尼佛并見維摩詰等佛言可往攝汝身香無令彼諸眾生起愛著心又當攝汝本形勿使彼國求菩薩者而自鄙耻也言四承勅等者問何名承勅答菩薩言我向娑婆世界者皆是如來之力遣我去我若自去於彼國生慢心今承佛力不敢於彼國生輕慢故言承勅也言預來華現者預者先也於耆闍崛山只是舊有山處若望當時佛在虗空世界淨土不見有山也去法座不遠化作八萬四千眾寶蓮華預前鋪設來也問佛在塔中是何法座答當時眾會並處空中去法座言攝塔中座若爾去耆闍山下四萬由旬何名不遠答但指舊山顯是靈山會中若現蓮華亦居空上非是著地現故經言甄叔迦寶者唐言赤色寶也西域云印度多有堅叔迦樹其華形赤寶似此華故以為名嘉祥云鸚鵡寶此寶赤色似鸚鵡觜以此為名也言第二文殊所由者恠有此瑞相問因由也言文殊問行者自科神通不如他問神通問三昧又從來不識唯願世尊加被令我得見言釋迦垂答者文殊問釋迦不答推過去多寶問何不釋迦自現令多寶現耶答顯此佛他佛化利一般又賓主之禮理合相讓所以讓與多寶也又有說前來釋迦召次未來中間若更召命即重疊故讓與多寶顯多寶梵音聲相到彼處言此即初二也者是時妙音菩薩承多寶喚然後彼國沒作隊仗發來也言身相等者諸經皆將青蓮華葉況佛眼此菩薩是第十地菩薩近佛故將青蓮華為喻先喻自相後喻面相先舉喻後說面也言八堅固者解經那羅延那羅延者此言人種其神力勇健故以比況安國云翻為力士正云人種也言第四至此者經云多羅樹者一多羅樹是七仞仞別七尺即一樹計四十九尺七樹共計三百四十三尺言初獻者經言到已下七寶至瓔珞者問何處得瓔珞來答一云淨華宿王智寄來作信二云或是菩薩隨身瓔珞將來供養也言後請問有四等者經言淨華宿王佛問訊世尊者一問佛有五句路云第一句問佛少病問身病也第二句問佛少惱問心病也此上二句總也下三句別第三句起居輕利安樂行不合為第三句輕利即安樂無別故合為第三句行字莖此一句二十一問四威儀也起字問行住居字問坐臥輕字問身利問心安字問身樂字問心行字總問身心也第四句四大調和不問身第五句世事可忍否問心已上總別共有五句問佛身也更有章敬云將少病少惱合為一句將起居輕利安樂行否開作兩句也第一句少病少惱第二句起居輕利第三安樂行否第四句四大調和否第五句世事可忍否第二科開合雖不同於中還合五句問何故作此後科答辨云准瑜伽八十八說少病者不為癭疾惱耶少惱者不為外灾橫所侵耶此二句俱問身故所以合為一句也起居輕利一句夜𥧌得安善耶飲食易消化耶雙問身心安樂行否一句施為動作得輕利耶雙問身心也雖有此第二科不及前解言問眾生有七句者第一句問眾生易度否第二句無多貪欲嗔恚愚癡嫉妬慢否第三句無不孝父母第四句不敬沙門第五句耶見此上五句問惡也下二句問善不善心二攝五情否上來初五句問惡後兩句問善計成七句也若據諸抄總作惡問七句總是惡也初一句標即是第一句眾生易度否後六句釋中分二初一句問煩惱即是第二句無多貪欲嗔恚愚癡嫉妬慳慢否後五句問惡業即是第三句無不孝父母第四句不敬沙門第五句耶見第六句不善心第七句不攝五情否此上句總問惡也問豈娑婆眾生唯造惡不造善耶故知初科五句問身惡後二句問善為勝上一無字無由莫也莫不孝父母莫不敬沙門下一不字皆作否音言令其不見者經言我今欲見多寶佛等問二佛同坐一塔何故妙音見釋迦不見多寶佛耶答因果有殊佛神力故不令見也問既前與淨華宿王智佛傳語如何不見耶答傳語法則如此不好不見問多寶召妙音妙音聞聲便來何故不見答梵音聲相不好遠聞不見面故所以請見也妙音既請見多寶經中無見處文只向下多寶讚妙音言汝能為供養釋迦牟尼佛及聽法華經并見文殊等即是相見也何要別文言此初也者華德問因也此妙音菩薩過去種何善根修何功德現在作何事業有爾許大神通言十八類者初六類天身天大將軍者嘉祥云梵輔天梵王之臣毗沙門皆帝釋之臣紀國云天大將軍毗沙門皆帝釋臣次十一類人身者小王謂粟散王等宰官者即今衣冠次八非人然今為一非天攝故然十八類但依身字而數也經言智無所損減者意道菩薩智慧神通雖多智慧神力無損減也如大海水不減也不同小菩薩也緣妙音菩薩有神力能於娑婆世界隱身現十八類身說法華經我緣憂念此娑婆世界眾生恐我滅度後不得聞經緣舍利弗等怕怖此界故召妙音與藥王等相共持經言到已白佛等者既到本國白本師佛我到娑婆世界有大利益不辱世尊靈山會上無量菩薩聞我化行得一切色身三昧亦得陀羅尼又去時隨身小菩薩令得一切色身三昧身形與我無異言時眾得益等者只是聞一品利益問多少人聞一品獲益答四萬二千天子得無生法忍也上他方勸說以流通下救生濟難以對觀音品言來意者者緣前妙音品釋迦如來放光遠召將來交行苦行力流通法華經為除妙音菩薩輕慢心娑婆世界無人解傳持法華經爾許地喚我來交我傳持法華經所以釋迦如來說觀音化現十九類身救眾生苦難令交持經也又此品來意最難一部經中只有此品不說法華經字也緣世尊說經時眾生未發心有苦逼身交念觀音一則免苦二者觀音名字在此法華經中念著觀音便是成得持經之行故以易功助成難業故論云護未發心眾生難意言若能持經者必能離苦良以持經之業難可修習未成之間若不助之功行不成由是加助方法助成難修之業路云未離若言未離持經何益況詳應言當必離也現未離故擬發心今言未者擬即來也未正持故問人未發多諸灾難須念觀音以救之既已發心持經經力既強何須念呪答人名易稱呪句難念淺深次第要假皆持又呪是願詞即先憑人而後自啟願故人呪雙持也言觀者察義者即是菩薩身中大智大悲晝夜六返觀視眾生經言慈眼視眾生福聚海無量是故應頂禮世者世間一切眾生有漏生死虗幻不實故名世間色如聚沫不可撮摩受類浮泡不得久住總同陽焰從渴愛生行類芭蕉中無有實識如幻士顛倒所起可破可壞故名世間音者音聲問此菩薩以三通觀察眾生三業亦合名觀世身菩薩亦合名觀世意菩薩如何直言觀世音答孩子不啼慈母不抱眾生不念菩薩不救孩子啼聲小慈母救來遲孩子啼聲高慈母救來速眾生念聲小菩薩救來遲眾生念聲高菩薩救來速如母乳嬰兒日夜常怜念嬰兒喉若閇慈母欲何為菩薩救眾生專待眾生念眾生不念名菩薩因何救眾生有苦者多稱念名字若禮拜及心中憶念者少經云佛告無盡意菩薩善男子若有無量百千萬億眾生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫又云假使興害意推落大火坑念彼觀音力火坑變成池南閻浮提以音聲為佛事也菩薩者菩下去提薩下去埵上求菩提下度有情故名菩薩也上約義解了言諸三業歸依等者約宿願說亦名觀世音菩薩往昔南閻浮提有王名曰普首有五百王子其第一名曰善光值空王觀音佛遂發十種大願一者願知一切法二者願乘般若舡三者願值智風四者願得善方便五者願度一切人六者願超於苦海七者願得持戒具八者願登菩提山九者願證無為善十者願同法性身又願我未來世中亦名觀世音菩薩眾生有苦三稱我名若不往救者誓願不取上妙色身又願眾生度盡我則成佛偏於此界有緣故名觀世音菩薩也此菩薩凝神淨土而應現娑婆現六道於光中薀洪名於剎土立一佛於頂上現救苦於塵沙能使七難輪消二求願滿高人臨刑而刃斷名僧至死而不傷長舒一唱而風迴少年四投形而火滅舊梵語云阿耶婆樓吉胝輪真諦翻為觀世音菩薩又此十八个菩薩是阿難排比盡是法輪王之將士破生死之魔怨文殊彌勒向序品之中烈位執智釰為先鋒觀音普賢第七卷內安名彎定弓而掩尾法輪王安樂行品之內專知賞罸勸持涌出藥王妙音入陣煞賊奪旗斬將廣使一乘慧訓普被遐齡蓮華一乘法輪常轉言無暇者即八無暇也即是八難也言飛輪者即三輪也菩薩有三輪神通記心教誡也言作不請友者眾生不解請佛說法菩薩與請名作不請友也言應病者眾生有病處便與醫治名應病也言攝利難思者三業攝化眾生名攝等也言菩薩如前者如序品中解也言普等者平等義亦是遍滿義遍能拔苦滿眾生願怨親不二故名普也言神通記等者又有三義名普一運身普謂神通輪摧外道二他心普謂記心輪摧妄念三漏盡普謂教誡輪摧諸不善也神通普故不動而應十方現前他心普故不慮而智照窮法界正教普故無言不然則教彌八極普以周遍為義門以通達為名今此菩薩分形化質遍無根緣有感必從往來無滯故名普也又門者菩薩有大智故不住生死有大悲故不住涅槃只此悲智與一切眾生出苦入樂之處所故名門言此品廣者品者類也便為報今朝一會人聞法須知品名字觀者觀察眾生身普謂聽聲及文句能求菩提度有情菩薩立號皆如此無擁出苦入樂門怨親不二行均普同壽翻傳貝葉時二十八个品名字就中此品不思議聞者觀音速加護品題了言此初也者一問名因也經言爾時無盡意菩薩至名觀世音者世尊欲擬讚嘆觀世音菩薩化行令一切眾生念名免苦所以加被無盡意菩薩交申言請問也問世尊欲擬讚嘆觀音化行何不加被藥王彌勒交問耶答觀音發願云眾生度盡我則成佛眾生界法爾無盡觀音菩薩願心不盡此無盡意菩薩名字觀音願行符同所以加被無盡意菩薩交問也經言爾時者舉時也無盡意者舉人也問何名無盡意答梵云阿差末此土翻為無盡意言十無盡句者金云一切眾生界盡是有情二世界盡是器世界有情是能依世界是所依能依所依對三虗空界即真理四法界是三科法體界者體性義真俗對五涅槃界是果六佛出世者是因菩薩修因成佛方出世故果因對七如來智界是能緣八心所緣界是所緣能緣子緣對九佛智入界是自十世間轉法輪智轉諸法界是他自他對然此十句假說言盡其實並是不盡之行何等為十一所為眾生界盡二世界盡三虗空界盡四法界盡五涅槃界盡六佛出現界盡七如來智界盡八心所緣界盡九佛智入境界盡十世間轉法輪智界盡我願乃盡而眾生界等不可盡我此大願善根無有窮盡也故名無盡意上舉人了經言即從座起者尊人重法也偏袒者表師資之儀示有駈策之相今欲發起上位菩薩化行令有苦者免難持經作吉祥善事所以偏袒右肩也合掌者斂容祇肅也世尊欲說觀音化行無盡意又問表心契佛說故合掌也而作是言以何因緣名觀世音正是問名因也名即名字也言此初即是等者經言佛告無盡意菩薩至即時觀其音聲皆得解脫者稱念觀音已後遂得三塗苦息八難因消水火風以殄除非人逢而退散怨賊不損拘繫解脫良由菩薩大悲稱念皆能免苦是故經言觀其音聲皆得解脫言只如法琳等者問既言稱念觀音誰人親得解脫答疏言只如法等案琳法師別傳說琳法師俗姓陳頴川人也祖因官徒斯氏反移徙也居襄陽後住長安濟法寺大唐貞觀十一年春正月帝欲宣揚李風遵察本糸爰發明詔令道士女冠齊供行道立在僧之前時法師與京邑僧等進表論佛道優劣李氏真偽申以真言時天振威勅法師曰汝所著辨正論信毀交報篇云念觀音者臨刃不傷既有斯靈驗朕今赦師七日之內汝祈念之俟乃臨刑寧無斷否法師既羈縲紲復逼期刑氷炭交懷控告無所至第六夜從倚沉吟步朗月以惝然敞音慨浮生而若寄乃仰天嘆曰昔鄒抅齊獄丹質秦郊尚感夏景零霜烏頭為白豈可獨於琳也偏無徵應者哉詩曰治長倦縲紲韓安嘆死灰始驗山中木方知貴不才草命如懸露輕生類轉蓬恨秋明夜月難更與人同訖言有神人身長丈餘素質衣冠踰垣麗止而謂法師曰既能亡形殉道再紉頹綱冥衛寔繁幸無勞慮語訖而去法師虔恭五體默念三尊遂感思逸凶懷釋然無懼至第七日勅刑部尚書劉德威問法師曰赦斯已滿當屆臨刑令念觀音有何靈應法師曰琳聞觀音靈鑒垂形六道上天下地皆為師範我皇聰明文思光澤海內九夷奉貢八表形清君聖臣賢不為狂濫今陛下普養群品如經即是觀音既靈應相符所以唯念陛下德威錄狀奏聞帝覽大悅因詔法師而問釋道優劣法師爰引古今校量勝負勅覽法師表對遂釋放焉却被群臣不肯緣毀他國家宗廣遂流向山南在路苦腹而死也齊懽憑依脫三刀之害案齊書云元魏天平元年中定洲勇士孫敬德在防秋造觀音像年滿將還在家禮事供養後為賊所引不勝考楚遂妄承罪𠍴明日將刑其夜禮懺流淚忽如夢見一沙門教念救苦觀音經云有諸佛名字念誦千遍得免苦難敬德忽覺如夢所見了了無差遂念一百遍有司執縛向市且行且念直至臨刑念得千遍下刀斫之刀為三段皮肉不傷易刀又斫凡經三換刀折如初監司具陳本末錄狀聞奏丞相高權為表請免死因此廣行於世所謂高王觀世音經敬德還家設齊食迎像乃至頂有三刀之痕今者疏主以事因觀奏得免罪故從人立名也實非權免刀也辨云舉事因馬權免罪在孫敬德也言瑜伽第九說等者問經言受諸苦惱皆由自業所招豈令觀音菩薩便即免耶答業有定不定苦有除不除由是此下廣論諸業言一定異熟等者疏主解業若復聖道及懺悔損伏一切業皆名不定業若古人意有二種一定二不定若不定業懺悔一切不受若是三時定業須受設令懺悔但轉重令輕則得全不受不得如金剛經云以今世人輕賤故是人前世罪業即為消滅上意下消疏定異熟者定謂決定異熟是果也業即故思故心作罪而非設作業即是思總以一个思為體別即有三一能動身思說名身業二能發語思說名語業三審決二思與意業相應說名意業造此業已決定當來受異熟果之因名定異熟業依主釋也攝云案瑜伽論一者順定受業謂故思已若作若增長二順不定業者即疏主案瑜伽不定異熟業者謂故思已作而不增長此亦是故思雖復二業俱是故思增長不增長別上疏主引論標言八十九說等者疏主引論來別解二業言諸作不增長業者業雖造了若逢善友懺悔此業定是不增長業也若故思造不善業名亦作亦增長此業若無追悔悔即懺悔不修對治有漏道斷之與伏皆名對治若無如上事決定受果名增長業言若追悔等等者等字等取對治言如未生怨者證前增長不增長也謨云由此故知定不定業悔即不定不悔即定前瑜伽言定受異熟果者據不悔說相云此中增長有二種義一者體增正作業時熏成種子剎那種子之體陪陪生故名為體增二用增熏得種已剎那剎那而用增勝唯識評云後義為勝若言體增生果無盡言第六十說等者三依人辨果依未解脫建立定業依已解脫建立不定業解脫者即是若世道無漏道若斷若伏皆名解脫乃至得聖聖有學無學即羅漢果也乃至兩字中間攝慚愧懺悔也謨云依未解脫立定業者且據顯相說據定未解脫者亦有不定業言即同異者四會同諸教也解二種業了言對法論第七等者依對法解五種業謂五故思造業言一他所教勅者事五坊官長不自由故煞雖不樂故因他族力之所教勅故起故思引不善業猶如入陣也問他所教勅何名故思答初雖他教後即發起故思思者造作為義心為業約現行說不約種子言他所勸請者親情相識著荼著酒請交煞雖不樂欲因他勸導執為利益發起故思引不善業如受人勸食肉及䓗等問此及前一如何有故思答此二若望加行後起無故思若根本業道成時臨臨下刀事須有故思自心猛也未有下刀斷命是等因心也言無所了知者不識煞生因果罪報但知行煞名無所了知也言根本執著等者言三毒蔽心隨欲所作發起故思引不善業如邊地及小兒子等言顛倒分別者謂計無罪依不平等因見苦為樂愛樂耶法為求當來可愛異熟發起故思引不善業如煞羊祠天而求於福亦如大秦火袂等相云所煞一有情驚怖無念如何能煞而受果耶答如磁石能近䥫等磁石無念而法爾而能吸䥫今者亦爾因彼苦心由如於石取彼苦故言於此五中等者料簡輕重化度云此是此五之中後二即重前三即輕由前三種於三心中皆不猛利加行及根本已不猛利後起心中復起追悔故名輕後二種於三時心總皆猛利加行根本作而猛利後起中心不悔是故名重前三不定業故思即輕後二定業故思即重也四句分別一作不增長業即是前不增長業二者增長而不作如人手雖不煞日夜獲計煞生此名增長三亦作亦增長即是對法後二也四不作不增長非此所攝言謂令習氣等者路云據實現行亦有增長疏依文顯且說習氣習氣者種子也若取種子順體增義也由斯故依現行說業有五不依習氣增長是疏主意也若後二亦通種子由此通取種現名習氣義勝況評習氣之言亦通現行如羅漢不斷習說通二也言瑜伽第九說等者三依瑜伽說十六種業者於中有二一別明諸業二前後相攝亦別明諸者一夢者謂夢中行煞二無知者雖後煞生無故思名無知三無故思者誤煞也四不利不數者利謂猛利數謂頻作今不猛利亦不頻作故言不利不數五狂亂者謂癡狂心亂等六失念者謂無了知七非樂欲者因他教勅勸方為惡業行煞生等八自性無記者謨云三性中無記性也安國無記心煞非是故思辨云自體不增名無記也九悔所損者前心煞生後生追悔念前惡業更不增長名悔所損十對治所損者前是懺悔後是聖道故言瑜伽第九說增等者攝云一者加行由極猛利貪嗔癡纏發起諸業二者串習於長夜中親近修習造不善諸業三者自於語業中妄語為重於身業中煞生為重於意業中邪見為重也四者事故者謂如有一於佛法僧及隨一種尊貴之處為損為益如消佛像以作銅錢毀癈僧坊以求租課云當益國是此之流由是有大癩之苦舉體血流德裕有縈身之退火燒㿍宇五一向受行者一向受行諸不善業乃至盡形無一時善六者所治損害者即所對治諸不善業已今諸善離欲清淨言其十不增長等者相攝也其十種不增不越對治初三種不增謂他所教勅他所勸請無所了知六種增長不越對法後二種增長謂根本執著顛倒分別言離合瑜伽十六即是離對治五種即是合瑜伽十不增長即離對法合為前三段即合也瑜伽六增長即離對法合為後二即合也依位者十不增長中第一夢中位餘無知覺時位或心狂亂位或失念位瑜伽分多對法分少故言對法又說等者第四依對法論三種業一作業定者由宿業力此人過去宿習力故感決定身於此身上事須造惡業如善星比丘是佛之子造罪佛教化他不得神通制不得言二受異熟定者異熟是果果定當受故言受異熟果定即順定受業故言受異熟果定言三分位定者安國等抄云謂加行根本後起名三時業也根本業道如把刀煞生正斷命時是順定業又是故思無有下刀之時是等閑心也從加行後起通定不定若加行時搓繩磨刀念念起煞至下刀時便起生悔心此根本業全不成兼加行亦成不定業二加行心時猛利搓繩磨刀後斷命時復是猛利二俱決定總成定業若加行心中磨刀把繩之時生追悔心或等閑心後下刀煞根本成決定業加行成不定業後起者問後起如何通定不定答根本之中煞命了後起心中生慶快後起之中名定業若後起心中生悔心亦成不定也言又未悔未對治者等取慚愧入聖道也言瑜伽第十說三業等者第五通諸教難也於中有三一明三業二明四業三明五業初三業中化度云今生造業今生受果名順現受今生作業來生受果名順生受今生作業更來生受果名順後受業也問何不說不定業答不定更無別體只於此三時上立也言第六十說四者二四說種業也即四句分別一報定時不定即是疏中言一異熟定二時定報不定即疏中言時分定三時報俱定即疏中二俱定四時報俱不定即是疏言二俱不定唯識論說亦說四者安國云謂現報生報後報不定報是名四種也言顯揚第九說五種者第三依顯揚說五種也即三時定業謂現報生報後報不定報故有支中云四業唯三除順現受也言故念觀音等者疏主結前第一番解意也故念觀音良緣也滋潤緣力也自心悔愧苦惱皆除因力也言亦有說言其不增長等者古師意若三時定業決定須受設使轉者但令轉重令輕而不輕盡若全不受者約本來是不定業說也言金剛般若等者證定業不可轉事須輕受不言全免輕賤之時便是受罪也言又賢愚等者證重受定報而亦不輕雖得羅漢為現業有果被火所燒現身造業現身受果名現業有果也言又說迦毗等者瑠璃王煞釋種造定因釋種被煞受定報果故名定因果言其決定業等者結也古人意云若是三時定業佛尚不排者佛多生造惡等猶受此業成佛了排不得猶受金鏘馬麥難又說佛力不排者有人造惡業佛通神制不得名不排也況受果耶意道業尚自排不得果灼然更排不得言在解脫人名等者古人會教經中說在解脫人名不定者此亦依不定說言此亦不然者下疏主第二牒前破斥也古人云指鬘羅漢現業有果者破云若得羅漢一切不善已盡何業受果耶如抵債人無煩惱可潤生何身受苦又設受苦被煞病餓等是示現言在初二果者問若爾如何聖教說羅漢人受苦答疏言在初二果人等初二果人不離此界身上得羅漢果後當為名以羅漢名說其實未是羅漢也路問初果已斷分別煩惱不善之業無容更起寧說不善障彼果耶答疏言在初二果不善未盡意說在初二果故業尚在不說更起新不善業等言般若經中等者會金剛經汝古師言持金剛經輕受不說滅盡者受持有三品心彼經約中下品心說舉心微者若是上品心至誠懇切不受也言十地論云等者第三遮防外難問十地論說一感報定二作業定如何通答十地論中一約未發不發心二約未入聖說也言法句經言等者一據不逢佛菩薩二不起悔愧心三未入聖道決定受也言然指鬘等者當時猶住凡夫或初二果問何故言羅漢受業耶答現身決定得羅漢從當為名也言又遇良緣等者若無悔愧心又不入聖所以聖教說惡業力強乃至諸佛亦不能轉並約不入聖不發悔愧不善業未盡言迦毗羅城釋種被等者路云此即先在凡時造此煞等業名為總報受惡道身今者得聖其餘殘果名為別報即是等流業也設使被誅亦有何失言設有被煞等者路云設使煞千人非受業果但是化身佛知根熟示現斯化令入聖道此解不順疏解安國云羅漢被煞虵咬狗咬等非是不善定業之果前不善勢分麤重今有此起非不善業現苦故起大論六十說諸阿羅漢所有不善決定受業或於前生作先異生位所作由少輕苦所逼惱便名果報已熟若已輕依果報種子皆永斷故一切不受所以者何由佛世尊依解脫相續建立定受果故此解順疏也言不爾指鬘等者問指鬘煞千人指如何得聖答疏主立道理又無悔愧及伏斷滅等言由此故知初說等者總經也有說同對法瑜伽名初解即前所說由追悔已成不增長業及引六十未解脫者建立定受故解脫者謂世道伏斷乃至得聖成無學等亦同異未入佛法名決定業也對後非聖不受名初也上業了言大小俱能燒等者問經中寧言設字答大火尚自不燒何況小火舉重顯輕也准下頌意火坑變成池設不變為池大火亦不燒故言設也問何故火則全言不燒水則乃言淺處答火則大少皆傷所以念名全免水則淺處不傷但得言處也言黑風必損者有不是黑風有損人時或不損人以不定故不說若起黑風必損於人故偏舉之雲光法師講至假使黑風處志公和尚問風體無形何名黑風答有三一者風起之時前有黑雲黑雲與風和雜名黑風二者風吹海上黑氣相和名黑風也三者風吹海上黑砂和雜故成黑風和尚又問此風為大為小答雲法師言此風極大和尚又問只於海上有餘處亦有答此風平地即無唯海上有又問此風早晚盡答眾生惡業盡此風亦盡又問誰人能盡答觀音菩薩能盡又問風體是有是無答據第一義諦是無若世俗諦是有也言舫音等者經國說書云關已西曰舡關已東曰舟單曰舟雙曰舫切甫忘反又補浪反謗也經言漂墮羅剎鬼國者此由風力令墮鬼國故此是風難非成鬼難也漂者浮也經言其中若有乃至一人一舡有百人二百人於中有一人稱觀世音菩薩名者此人亦是先曾有人教念所以解念所以疏言善人教念也言在手曰杻等者切云梏手械脚紂所作未詳檢嘆嗑卦嗑四事拘束為撿易云木在手足為撿撿即拘禁也撿者杻梏者械也言智度論云等者解經言若有罪若無罪問無罪如何囚繫答此據現世不作名為無罪非前前世不作也經說九橫亦據現在不作言火宅頌等者據今世不作言無若據先世非無也此證無罪被加不說有罪亦有爾世前世皆不作者如法令不行亂政之際故有也故經言設也問有罪之者自今當事何故觀音應聲即救答極他法令世上所輕大悲救心有念皆濟言首楞嚴經佛告等者引首楞嚴三昧經證念名解脫梵云首楞嚴簡要云此云畢竟堅固亦云一切事究竟也言諸佛菩薩等者諸佛菩薩喻彼良醫住首楞嚴如持藥樹稱名如擊鼓罪滅即是拔毒箭時上是經喻如一醍醐愈眾病此是疏主添此喻也問何故風難一人稱名賊難眾商齊念答前以乘船在水一人免難眾亦免所以一人念也後以值賊在陸一人免難眾人不免故須眾人齊念也言結告等者巍巍者高大之貌也問因何觀世音菩薩摩訶薩威神之力巍巍如是答若有百千萬億眾生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫火不能燒水不能漂風不能損刑罰不傷刀尋段段壞夜叉羅剎不敢惱人由是菩薩威神之力巍巍如是言初觀三意者經言若有眾生多於婬欲等者欲者是煩惱之總名是若婬欲即是離貪也越境起貪故言多於婬欲也言且舉三毒者若多婬欲若多嗔恚若多愚癡常念恭敬觀世音菩薩便得離其三毒菩薩發願言多貪眾生不用作不淨觀多嗔眾生不用慈悲觀多癡眾生不用作十二因緣觀但知意業歸依心念菩薩三毒八難悉得消除也問稱念文殊普賢菩薩豈不離貪嗔癡耶何唯念觀音答此菩薩名救苦觀世音菩薩既發救苦前來水難火難風難賊難是苦之苗也此貪嗔癡是苦之根本也斫樹先須去根根斷樹苗自死拔苦事須尋本本無苦難消除所以唯念觀音菩薩除貪嗔癡難也問既念此菩薩一切煩惱皆離何唯三毒答所以疏中且舉等問眾生心念之時實滅得苦不答經言觀世音有如是等大威神力多所饒益等言初觀二身業者經言若有女人設欲求男禮拜供養觀世音菩薩便生福德智慧之男者親情相識借問大好平安一人馬上即經云欲求女便生端正有相之女者親情相識借問大好平安一个百疋羅問何故求男之時言智慧求女便言端正有相之女答兒多福德招錢財令母富兒若足智慧作高官大軄子貴令母貴父母富貴皆因養得福德智慧兒不由端正但由有福德智慧醜亦得不妨事只如五醜圖書是尚書僕射大夫盧思道初生之時緣醜新婦別人家借不阿孩兒來呈阿翁阿翁滿目淚流我盧家門戶衰劣此不是我盧家兒新婦見阿翁惆悵具說心事呈本阿孩兒阿翁亦見便觀喜已後是盧司徒女人事須端正方始臺舉得阿耶孃若醜莫索嫁惜大家女若醜僧却著所以大家喚阿尼師寺作醜女村也女人事須端正經言宿植德本眾人愛敬詩曰東隣美女上瓊臺云云又迴眸一笑百媚生六宮粉黛無顏色一顧傾城千金買笑白侍郎云楊妃天子寵念臺舉父母兄弟親情高官大職遂令天下父母心不重生男重生女又男有百行智慧為先女有四德婦容居上紀國云唐由虗也損由棄也言第三校量持名等者經言無盡意若有人受持六十二億乃至無異等者若有人念觀音菩薩名號功德於百千萬億劫不可窮盡問如何六十二億恒河沙菩薩名字與念觀音菩薩一種耶答觀音久已成佛示現作菩薩所以念觀音菩薩名字與念六十二億恒河沙菩薩名字一種二云觀音菩薩與此娑婆世界眾生有緣慈悲廣大一稱名號速拔苦惱如子落坑慈母跳身入救也念六十二億恒沙菩薩只徒救苦如今既念一个觀音菩薩亦得免苦只念六十二億恒河沙菩薩觀音二人福正等無異也又觀音菩薩飢饉劫中為魚米疫病劫內變身為藥樹王生死河中為船為筏大黑暗中為燈為炬險途路上而作道師上依經校量訖言本論校量六十二等者准本論云校量念六十二億恒河沙佛與念觀音功德無異也言此有二解一云經等者菩薩即合將菩薩比校如何將六十二億恒河沙佛校量菩薩言二云依論亦無爽者失也乖也言觀音久已等者示為菩薩久已成佛將佛比佛何愁不得若爾觀音佛功德多於諸佛功德答據實佛與佛功德一種但是示現接引之語言謂求我六十二等者疏解供養觀音一身與六十二億恒河沙佛多少雖殊約信無二設供養觀音只是生一个信心設供養六十二億恒河沙佛只是一个信心能信之心是一所以功德多少齊等也因心即信心也信心為因心因心既平等所以感果功德一般也言謂如彼觀等者供養一佛與多佛數雖不同身中功德佛佛相似彼佛身中有清淨法界四智心品此佛身中有清淨法界四智心品身中功德既無勝劣供養之時功德無差別也言此二是信力者雙結前二解也初不觀境等者結初解後觀境多小等者結後解言第二畢竟知者此第二解約理性說理上所生不滅故畢竟第二畢竟知者此上一句標言決定知法界故一句釋法界即一真法界也此由觀音等三句明身中所證理平等與供佛無異由能證菩薩供養福德無差別故言法界即法性等者疏釋也觀音一身與多佛人數雖不同身中所證真如理與多佛所證理多少勝劣齊等故供養一佛與多佛福田平等也真如初地即證若圓滿證在十地滿證法身言且將爾許等者問一佛與多佛功德既等心境又齊何故只說六十二億更不說多耶答言且將爾許等言佛等位菩薩等者一稱是等覺位菩薩若將一對多應有勝劣結前等校量言此初也者一問也經言無盡意菩薩至云何者化度云初問云何遊此娑婆世界問身業也云何而為眾生說法問語業也方便之力其事云何問意業也言遊者化利等者疏解又別問何名遊答遊者化利義即神通神通戲故名遊於娑婆世界言眾生為說法者解經言云何而為眾生說法者答為教化故說法為自利故說法為利他故說法言方便之力者解結言方便之力其事云何者通上二種自利利他也神通亦是後得智上方便之力又云方便之力者是智慧向上巧用應物心以濟拔故名方便上問化行了言此初也者如來為答化行也前來遠召妙音令遣持經能於娑婆世界現十八類身恐妙音生輕慢心娑婆世界無人喚我來所以佛為無盡意說觀音化行現十九類身經言天大將軍者嘉祥云梵輔天攝云那羅延之類也力士也紀國云天大將軍及毗沙門皆是帝釋之臣毗沙門者引云多聞常與佛守護道場常聞法故故曰多聞也經言小王即粟王也言行敦者敦厚也齒者身莅者利同宰由治也持同廣雅云宰由制也謂制事去經言婦女身者應以長者家婦女居士家婦女等以經文巧略也言執金剛身者此云有力神常與諸佛護持三寶手執金剛杵故以為名也言觀音異像者意云此是觀音菩薩化身也言一結前勸示者經言以種種形遊諸國土等者即十九類身也言後濟急難等者此唱勸示之中雖無財施法施因說著無畏施便解著三種施也言奉獻有七等者經言爾時無盡意菩薩白佛言至佛塔者經言解頸頸字上句眾寶下句開供養珠等是財施如何名法施答此布施便是行六度行將行供養便是法施也言福田難遇故者問何故菩薩受了却施答疏言福田難等意言今日遇釋迦多寶若不布施更何時途遇此福田福田難遇故言施順道理等者答法施來由也問何故珠是財施而名法施耶答疏言施順道理故問何名順道理答疏言真正行故問何名真正行答疏言求菩提故名為法施此展轉解善諸抄云云不相當也言不受有三者經言時觀世音菩薩不肯受之問何故觀音不受答有三意一少欲故不受二法爾故不受法爾中間事須進退推讓也三轉施恐乖施主心所以不受意道我受得事須轉施施了復恐乖施主本心不如一下不受言愍四眾等者問何故只分作二分施釋迦多寶不分多耶答表生死涅槃二皆平等故奉二尊問無盡意施珠只合愍無盡意受珠何故慜四眾耶答當時四眾見無盡意施珠咸生隨喜之心若觀音不受珠無盡意與四眾心皆不喜故復不成檀度觀音兼愍四眾受珠也為令四眾得大利益二令四眾倣學已後受得物似我轉施所以慜而受之三為拔眾生苦惱故慜而受之言學行者行平音言此初也者一頌問也長行問名因者經言爾時無盡意菩薩即從座起偏袒有肩合掌向佛而作是言世尊觀世音菩薩以何因緣名觀世音今頌中初一頌唯問名因言此初分三等者答中名因化行相和答答中且長行答名因者經言佛告無盡意善男子若有無量百千萬億眾生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫長行答化行者經言佛告無盡意菩薩善男子若有國土眾生應以佛身得度者已下是也今頌云具足妙相尊相三十二相也淨云此具相好有四句一妙而不具謂聲聞緣覺二具而不妙謂菩薩輪王三不具不妙謂一切凡夫四亦具亦妙謂一切諸佛經言汝聽觀音行善應諸方所名行雙存也經言弘誓深如海者發願也經言歷劫不思議長劫行也經言侍多千億佛者遇良緣也我為汝略說聞名及見身等言此十二頌正答名因者路云述長行正答名因中若有持是觀世音菩薩名者設入大火火不能燒等已下七種灾難略不頌前多於婬欲等及校量念名言二頌除山難者經言如日虗空住者如日如其當日也今解曰質在虗空舒光以至地在山如在空墮地如至地日光雖至地光無有損傷從山至地時道理亦通此又云似日在虗空風持無所損念名威德力至地亦無傷但取無傷義不取住空文也經言刀尋段段壞者尋由即言呪屬者言屬於人也呪願名呪呪誓名呪呪事通善事惡事上總有也詛音側據反詛亦即阻阻隔也使人行詛限於言即是相見不語也有作咀嚼也非此中義也言如巧醫師等者問菩薩雖救得一人却損一人何成大悲答疏言醫師等初與藥動其病方疾瘉有一般痛不冷不熱難治事須與藥喫發動極冷極熱方易治也有人將毒藥藥人菩薩救毒藥不發將謂藥無功効展轉更不見毒藥罪過更深新掃哭阿家罪深菩薩方便教著本人有二意一者令行惡者以己妨人自知其苦不樂於人更不造惡業初即有損後究竟有益也二者令傍人見被毒藥自著各自省察己身更不造惡業也見於不賢而內自省非是菩薩無利物用也言一頌除天灾者經言雲雷皷掣電者忽有而却滅名電也言云掣引也者光明引長似掣紅物也言此答化行等者長行經言佛告無盡意菩薩善男子若有國土眾生應以佛身得度已下至是故汝等應當一心供養觀世音菩薩今頌經云眾生被困厄三行述也言此後七頌嘆德勸歸者述長行是觀世音菩薩摩訶薩於怖畏急難之中能施無畏略不述前獻奉施珠等事也言一頌標五觀者經言真觀證真理二清淨觀離煩惱三廣大智慧觀二運雙行四悲觀拔苦五慈觀與樂初三自利後二利他初中復二初二所觀後一能觀初中復二真觀顯真體不變清淨者顯離障所顯又云初二法身第三報身後二化身也下一句常願者勸願常瞻即當願常瞻仰眾生發心也經本作當非也現常發願何在於當也言一頌明大智等者下二頌釋五觀初頌明大智能滅灾難經言無垢兩字釋前真觀離垢染故清淨兩字釋前清淨觀慧日破諸暗一句釋前行標廣大智慧觀能伏灾風火二句向上功能也言一頌明法施等者經云悲體戒雷震釋前標中悲觀經言慈意妙大雲釋慈觀經云澍甘露二句等向功能疏云明法施者解經中甘露法雨疏云能除煩惱解經中滅除煩惱焰疏云大悲制戒如似雷震解經中悲體戒雷震又悲體是內心戒雷震是外作用制即向外為眾生施設戒是法雷震是喻戒能覺察眾生雷震能驚動一切如雷威物故名雷震也非戒律之戒也言慈意是非意也言一頌明財施者經言妙音觀世音者問何故名財施答疏言能除貪苦等但除貧苦即是財施也言因經起等者因經說有菩薩方能念菩薩名也此解最後一句是故須常念引財施中有五音經言妙音能與眾生樂也觀世音能拔苦梵音者深淨也海潮音必定應時無性論云譬如大海水奔潮必應時佛哀愍眾生赴感常無失經言勝彼世間者勝出世間故言第三大段持地讚嘆者經言爾時持地菩薩至不少者問何名持地答菩薩得持地三昧故以為名入此三昧治心如地如地而忍心是地體也言言自在者解經言自在之業普門示現等准攝論華嚴解有十種自在也言二心自在者簡要云定體名心為於定中入出自在故入深智即入定也言三莊嚴自在者即眾寶莊嚴佛剎故疏主依華嚴攝論文大意相似華嚴與攝論有少不同不同處即引同處不引也言四業自在者隨時受報受六道身化有情故示現同彼有父母等言五生自在者於一切剎土化生說法得自在故言六解脫自在者於一切界中能現一切佛故言七願自在者謂隨所願成菩提乃至一切事成名願自在也言十智自在者覺悟修證義也言然與攝論等者疏主料簡十自在也攝云謂六波羅蜜圓滿為因得十自在六度者眾生即是成佛具度也言今此即等者問今此經中言自在之業是何自在答即第八神力自在普示諸門也言第四大段結成者經言皆發無等等者此有二解一云此心是求無上菩提心此心名無等誡發人天發二乘心來等彼無等之心不得名無等等二云如來是無等之人世出世間更無過上故名無等初發心菩薩與佛齊功只此求菩提心等得無等人功德名無等等阿耨菩提故涅槃經云發心畢竟二不別如是二心先心難智度論無等名佛以一切眾生及一切法無與等故意云佛果菩提超過一切故言無等下言等者因菩提心與果相似故名為等即涅般經評云後為善也陀羅尼品言如前已釋者指前觀音品念人救護陀羅尼以法加威觀音救未發心眾生難陀羅尼救已發心者難言念慧為體者此說能持也所持即是法義呪忍今此是呪所持之法也言少略密等一句之中含得無量字名少略也受持人不知諸佛菩薩知名密或是鬼神名字或三寶名字或是深法名字問何不翻就唐言答此秘密故不翻若翻恐人聞著會生輕慢心便無功効也故存梵本不翻也乍聞不會不得義故名無義文字不是實無義即是無漢地之義言問總持有四等者一法二義三辨才無礙解四詞無礙解此是所持四法也若論疏中引者初法義兩个則是陀羅尼所持四法中收後引兩个辨才詞便不是陀羅尼中收便與陀羅尼所持四不同也此有二解一云兩總持中辨才無礙解通法義是陀羅尼中收詞無礙解即法陀羅尼中收也二云疏主筆悞諸抄雖作前解終是錯也言如上說者指上句中所烈四法謂法義等言答上來長行等者長行為所護之法也陀羅尼為能護神呪也問何名長行答攝二解一只指品初半紙已來經在呪之上故言長行始從如是我聞至普賢品末已來對陀羅尼品總屬上長行問偈文何故不說答一部之內雖有頌文頌文述長行長行後有頌文也長行頌文一處著總名長行也長行是所持陀羅尼品是能護持也法即教法義即所詮義也是四總持中一法二義今此陀羅尼即合是第三呪呪為能護法義為所護若論菩薩四加行位中持者不是此間呪彼處呪名句與尋常陀羅尼別瑜伽中文言無得無生忍等者四明能得菩薩忍即無生法忍也遂因菩薩四加行位中持呪功力得入初地獲無生法忍也據此間能護既是陀羅尼所護是法義無生忍疏主意見一部經中前後得無生法忍處盡是持經獲得盡不因念陀羅尼得也所以疏料簡云無得無生法忍所以一者所護持唯法義二能護持即呪也總持四義中既闕無生法忍能所合說只有三法也問如何喚無生法忍作陀羅尼答約能持念慧名陀羅尼所持之法隨能持以立名故言無得無生忍總持也問勸人持經自然免難何故更要念陀羅尼答辨云菩薩善巧方便緣世間人敬信禁呪之法能排凶招吉無所不制末世受持經典心薄怕怖邪魔鬼神傷害者念神呪時兼修經法故將神呪寄在經中欣呪之益者持經之心彌厚也安國問云神呪何不譯梵從唐答呪語含多此方無物以擬之若譯之者攝安不盡二者若譯就唐言多生分別恐敬心不重故存梵語令遣密持也嘉祥疏中一一略翻未可依據也首迦差所使反亶但音冶也音言三結勝者藥王菩薩白佛言世尊我因世尊說持經有爾許利益我今慚愧世尊我見世尊於寶塔品中重娑婆世界眾生我所以請持經我有一道陀羅尼奉上世尊擁護娑婆世界眾生我向六十二億恒河沙佛邊得此陀羅尼今日獻奉世尊世尊讚藥王菩薩言說是陀羅尼於諸眾生多所饒益言第二聖有四初標者爾時勇施菩薩眾中起來我亦為擁護讀誦受持法華經者說一道陀羅尼若有受持經人得此神呪惡魔鬼神不敢侵擾經言羅剎者此云暴惡經云富單那此云熱病鬼亦云不祥鬼經言吉遮者此云起尸鬼經言鳩盤荼此云厭鬼亦曰冬苽鬼經言緻者猪履反柅女九反尼上枳居里反言四結勝者世尊此陀羅尼不是肚撰襟恒河沙等諸佛所說若有侵毀此法師者則為侵毀是諸佛已問何故損人即為損佛答法師是如來使者行如來事毀法師便是損佛也言初標者經言爾時毗沙門者疏翻為多聞問何名多聞答常護佛法故曰多聞經言阿梨離經言那犁與利同拘那履誰前利同言三結勝者毗沙天王言世尊我不唯此陀羅尼擁護兼自身亦護也言第二天王者東方持國主二部鬼神乾闥婆毗舍闍使護佛法也言十神者即十羅剎女有大勢力是天下眾鬼之母恭敬之故說呪護持鬼雖兇惡不違其母母即隨佛歸依佛子亦隨從也言標名者經言藍婆此云能縛二毗藍婆此云離能縛已上八盡是唐言也三曲齒亦云施積華齒亦云施華黑齒亦云施黑多髮亦云被髮無厭足亦名無著持瓔珞亦云持華皐帝亦云何所十奪一切眾生精氣者嘉祥云眾生心頭有七滴甜水以養其命鬼入身去一滴二滴令人頭痛三滴心悶四滴五滴已上即死甜徒兼反言四勸勿惱等者經言若毗陀羅此云青色楗駄此云赤色烏摩勒伽此云食人精氣鬼亦云大煞鬼阿䟦摩羅此云形影鬼亦云無頭鬼注經云轉筋鬼入人身中今手足筯轉口中吐沫也吉遮者熱病鬼或作夜叉形人形也有熱病受為七日或常熱病者此鬼變身作童男童女形或夢中覺時相惱言五更說頌者經言若不順我呪等者什云此樹枝葉墮至地分為七分正法云犯此法師者頭破作七分猶如華梨剖此應有華七葉未開剖時合為一頭既開剖已破為七分故以為喻安國云似蘭香樹故十卷金光明經云猶如蘭香稍或云無萌樹經言亦如壓油者此方壓油無罪西國壓油瞻蔔諸華和而壓之先須淹浸油麻令交虫出和虫壓之意從油多罪亦無量於日夜中煞幾生命生命數多罪同五逆經調達破僧罪者即提婆達多破僧受罪無間一劫也我等不空說陀羅尼制約鬼神亦兼身自擁護令持經法師行住坐臥無令惱亂經言蘇摩那華此華黃白色不作大樹讒高三四尺垂似蓋經言婆師迦華者此云夏生華亦云護生華嚴王品言論云功德勝力等者此顯淨藏淨眼二子持經由經功德力故迴邪見之父王得當成之佛記故名功德勝力章敬云先師意取法為功德勝力為善諸疏抄並取人為功德勝力淨藏淨眼內動威神外現希有變父邪心令生正見名功德勝力也言迴邪見之父王者經言此我二子以作佛事以神通變化轉我邪心令得安住於佛法中得見世尊言得當來等者經言時雲雷音宿王華智佛告四眾言汝等見是妙莊嚴王於我前合掌立否此王於我法中作比丘精懃修習助佛道法當得作佛號娑羅樹王言二者前妙音品明華德等者以此為因因此自得法華三昧今言妙莊嚴王即是前妙音品中華德菩薩此品之中明華德菩薩因中為妙莊嚴王也言本著邪見等者經言母告子言汝父信受外道深著婆羅門法汝等應往白父與共俱去也言今明二子勸說者稅音切云誘言不簡怨親者問今只是親何名怨答父子即是親本來一處修行便入外道去與佛法修行人為怨也言釋名等者在俗為王者解王字貴妙珍綺至瑩體者解莊嚴字宿世因緣等者解本事也一者本即是過去世也華德菩薩身之體用名事本世之事依主釋也二者華德菩薩體用名事只此事即是本名為本事持業也言恐題名等者此品會過去淨藏淨眼即是今日藥王藥上正合為品名何以莊嚴作號答緣已前早說藥王菩薩本事品恐題名濫故今更不說也言此初二也者即一敘時二標佛標佛者經言有佛名雲雷音宿王華智者慈悲覆蔭如雲說法言音如雷王者自在義宿者佛德如星布烈故言宿言三明菩薩父子者經言彼佛法中至淨眼者有解古叟愚而重華聖一王邪號二子正化度云上古有仙四人山中修道每日一人當直往詣諸村落乞食如是三人亦復展轉次第乞食復於一日喫飯既了四人同坐尚議立契我等四人既同修道誓不相捨互相救度若一人墮落餘三人共救若心有退失亦須相化如是立契已經多時中有一人次當乞食行至路左乃是國王出城遊戲隊仗赫赫嬪妃綵女不可知數其人見已心生貪愛遂作念言大丈夫兒常居此雲山久而何益願我捨報後作國王身豈不快哉作是念已投崖而死由造願力生國王家經五百生皆居王位最後一生垂墮三塗三人曰作何方便而得度脫何誰共得他語中有一人曰世間相敬重相取語更不過妻兒我等三人一人為妻二人為子餘二人曰善哉善哉兒是掌中珠婦是軄底鈴十語九今聽由本願力三人命終一人於賢提長者家作女世間端正莫能過者年至十六王納為妃其二人亦於夫人腹中受胎生已年至七歲更相謂曰宜速出化導不應遲脫故於父前廣現神變也言此初分三等者經言是二子有大神力至亦悉達者其餘三人更相謂曰宜速化之不應遲滯經云為欲發起宿世善根饒益我故來生我家也言四德者度六廣如前品解了二方便者經言方便波羅蜜所以疏解云方便善巧有十二種者前六自利名內後六利他名外也言令以小善等者如薄俱羅施一訶梨勒九十一劫天上人間受勝快樂出家八十不患頭痛病也言令以小力攝大等者令有情施少功力發一信心乃至展轉得成佛故此十二種方便方便品廣說了言日星宿者有二行相一猶如於日能破大闇二別別對治眾多煩惱如星一一皆有照燭之用爪側洨反指爪也狐莊交反平音非此中義掐恰音言母令子化父者經言母告子言汝父信受外道等者汝等為父現神變相若見汝神變汝父心必當清淨一則令汝父見佛二兼我亦得隨佛經言或聽我等往至佛所聽字平呼言順言行化者經言於是二子念其父故涌在虗空高七等者現種種神變身上無雲而出水身下無柴而火生或大身滿虗空中或小身如芥子或時在地如入水或時水行履水如地也言鴻鶴者憋音若嗚鶴非也初說孔等證勝白衣後引瞻博伽等證勝外道也借問朝中卿相貴等言第九白親詣佛等者經言一眼之龜者路云寫經人錯正合作𪾼眼之龜目邊作大壹字被寫經人貴却目空作壹字又多時徒省略遂作小一字皆傳寫謬也諸抄引雜阿含經云妙高山下海水中有一眼龜其身極大不能久浮止在海中竟莫能出有一浮木木有一孔於大海中隨波漂轉繞須彌山三年一迊龜遇木孔方得見明得出海水是事難否答其事甚難佛出世希眾生遇佛亦複如是浮木在須彌山南龜向山北出來浮木轉到山西龜轉山東佛出世眾生在三塗中眾生得人身佛已入涅槃去不可得相逢所以經言又如一眼之龜值浮木孔若有三乘佛法總不信即兩眼俱無今唯信小乘不信大乘故如一眼之龜有經文故一字不錯也浮木孔者顯龜所栖止處也言此初二也者道器堪成也妙莊嚴王既被二子現通化了王與夫人羣臣婇女并及二子因緣和合聞法根熟也言此諸人詣佛者王與羣臣作一隊夫人與後宮婇女作一隊二子與四萬三千人門徒弟子作一隊一時共詣佛所到已頭面禮足遶佛三迊却住一面謨云遶三迊者表權說三住立一面者表唯說實或可表父母子三同一乘道學一乘故言此初二也者一佛善說法經言爾時彼佛為王說法等者說法華經既聞法已心大歡喜二王解珠施者經言爾時妙莊嚴王及其夫人等者解頸真珠瓔珞施佛施了變成寶臺臺有一化佛向上坐放大光明此是妙莊嚴王當來成佛之先兆祥瑞也金云王解珠者表當具戒嚴故經言於虗空中化城四柱寶臺者表離四生證四德獲四智也經言臺中有大寶床者表當踞法空座亦成禪定床經言敷百千萬天衣者表當來自蔭蔭他亦具慚愧衣也經言其上有佛結加趺坐表當成菩提坐金剛座經言放大光明者表當具智光破生死暗也言後顯令得見佛等者經言大王當知至菩提心者十信心菩提因也言善戒經及瑜伽等者引教具善知識功能堪為善知識也章敬引論云當知菩薩成就八法能為善友眾相圓滿一者住戒於諸菩薩律儀戒中妙善安住無缺無穿二者多聞聞慧成就三者修證修慧成就四者慈悲怜慜一切五者為他說法無有怯畏六者遇諸惡加謗皆悉能忍七者為他說法不生疲猒八者言詞辨了具此八法名善友想堪與一切眾生為善知識上明善知識身言求施利樂等者明善知識行當須似善知識一求施利樂法施則施名利樂二者於此正知此指前財法布施也正知者不令眾生求人天富貴名正知又能為善知識教化不為名利心財利心名正知三者有力善權降伏眾魔制諸外道能出生死名為有力善權善權巧也四者饒益不捨心無猒倦五大悲無儻未有見富者怜貧者棄上五善知識行當言所作不虗者明善知識心一者所作不虗凡所起心事須真實二者威儀圓滿圓滿者無缺之義三者言行敦肅不起誑妄語也四者無倦無嫉於眾生起教化心不疲倦於眾生有榮盛事不生嫉妬五儉畜隨捨畜謂畜積得物却布施名儉畜隨捨上五名善知識心言諫舉令憶等者又有五種明善知識性也一有過者諫有諸惡者舉名善知識性亦有䟽陳二令憶者妄却法義善知識令交憶不妄也三者教授令進善四者教誡令斷惡五者能為說法令得佛果具上五事名善知識性已上盡是言知識身上事言有病無等者復有四種是能歸依善知識人身上事欲得歸依親近善友事須具此四事也一者於善友所者病無病隨時供侍恒常發起愛敬淨心二者於善友所敬問迎禮修和敬業而為供養三於善友如法衣服飲食病緣醫藥隨時供養四者於善友所深敬承事聽問無動動由退也具此四事堪近善友也言乃至廣說是全梵行者佛果菩提名全此善知識修習佛果菩提行名全梵行也言化令見佛等者解經中善知識者是大因緣令發菩提心是大因緣也言此彰善友二子之因者佛言大王汝見此二子否或眼見或心意觀見此二子過去因行否此二子已曾供養爾許多佛又受持法華經愍念邪見眾生令住正見即是過去為仙人後生邪見家教化邪見父王令入正見也言此初也者初讚五德也經言妙莊嚴王即從虗空中等者言五德者謂頂眼毫齒脣為五也經言紺者說文紺者白染青而傷赤色釋名云紺含也青而含赤色也言紅環絞飾者絞音古巧反亦疏紅緣字切韻絞絡也言珂月者苦何反攝云螺屬出海中潔白如雪也謨云切韻瑪瑙也言頻婆果者經音云引名相思菓其菓赤色似此方秋林檎赤色也言發六願等者經爾時妙莊嚴王讚嘆至之心者妙莊嚴王讚嘆佛了於如來前一心合掌復白佛言世尊未曾有也今日臺中佛是未曾有以宿住通觀見過去曾見仙人修道却退為王而生邪見所以悔過自責發此六願一我從今日亦復自隨心行莖同專諗云不師其心而為心師名不隨心行也二不生邪見三憍四慢五嗔恚六諸惡諸惡之言通攝餘或言若誡等者解經中教誡所行安隱快善兩句經也若教處若誡處是所行處教處亦能安樂眾生離惡攝善若誡處亦能安樂眾生離惡攝善也言勸人歸禮者經言是藥王藥上至禮拜者若識若不識總須禮拜言結成勝益者經言遠塵離垢等者唯此處獲益是小乘果也金云此依見道說諸法忍能遠塵諸法智能離垢法忍品為無間道遍知諦故名遠塵法智品為解脫道已永離故名離垢又瑜伽八十三云一切見道所斷煩惱若種若現塵染義勝名塵塵染行者此最勝故彼品所有無堪任性名為塵麤細難斷故亦名為垢法即是真如理眼即是無漏智智證理故名法眼淨化度引智論云不著外境名為遠塵我見內無名為離垢又云離所緣縛名為遠塵離相應縛名為離垢得無漏智名法眼淨也勸發品言論云護法等者下經云世尊我今以神通力守護是經於如來滅後閻浮提內廣令流布使不斷絕是良證也若准什公所譯此品最居其後若依論科後更有囑累品也言佛自三周等者簡要云三遍摩菩薩頂付囑故言三周付囑或是付囑三周八品功德名三周付囑護法也已上佛自勸發言此品菩薩者屬菩薩勸發眾人之時便是護法也言仁慈慧悟者自利行德利周備名普利他行又云仁慈慧悟曰賢解賢字德利周備曰普解普字根本智上塵沙萬德名仁慈慧悟後得智上起無邊身名德利周備周備正是普義也上依能證智解普賢言此由所證理解普賢據能證智不令名普賢由證普遍賢善法故故能證智亦名普賢取能證智全取他所證理為名名有財也言般若理趣等者依二本聖教依真如立普賢名舉所證取能證也般若理趣至遍自體故標也一切有情身中如來藏性普賢菩薩遍自體故普賢菩薩所依自法身真理即是一切眾生身中如來性一切眾生身身中如來藏性即是菩薩遍證所依自體普賢菩薩身既遍所依自體將知普賢身無處不有也言由證普遍賢善者舉所證取能證也言故華嚴云等者此約根本智內證法身理更無別體也上引文標言或內證此普遍賢理者此舉所也言外彰三業等者取能也由證理故能證之上三業萬行總名普賢無所二字解普也不賢二字解賢前來普賢二字依自利言誘㢡名勸者勸發二字依利他㢡導眾生名勸令一切眾生生信心持經名發也言解妨等者問何不餘菩薩來唯普賢來答此菩薩因法華經得證普賢之理三業成普賢之行亦令一切眾生還因法華經得此普賢果報此品之中欲擬說此利益勸發眾人故唯普賢來非餘來也所以疏言欲明信順道證一乘等故又經此甚深最勝文殊菩薩為先鋒普賢菩薩為掩尾文殊前請普賢後護也問此菩薩為聽經來為護法來若是聽經來說經已了答此菩薩發初聽經來只是經集家排批安在經末問若是聽經來何故烈名中不說准此道理寶威德上王佛國遙聞經了更不合來來意者但是護法來疏論皆說為護也言今云東方來者問華嚴經智論說菩薩身相遍一切處以解普賢之義若爾既遍一切何故言從東方來答疏言今云東方等問何不從餘方來空言從東方來耶答四方之中東方最上表一乘勝餘乘也問菩薩將爾許天龍八部來有何意答緣蒙世尊法師品中與八部授記情願佛滅後護法緣八部四眾不識護法軌儀所以普賢引來與問方法也言寶雲經等者意者前約一方之現身為難今此明菩薩身遍意者菩薩實遍一切而無彼此去來前言從東方來者示相來假指一方處也況座主云意說自受用遍所證故不依一世界等之知即同自受用身還依自土周圓無際等言驗此普賢者將前華嚴智論寶雲三本聖教驗若不是成佛因何有大神通耶言啟白聞經有二等者經言白佛言世尊我於寶威等者問經言我於寶威德上王佛國遙聞何故經云共來聽受以遙聞故答若不至此眾會不知誰能勸發故來問既請云云何能得是法華經迄至經絡何處是世尊說處答即次佛告四法文是也問佛在日法尚難得滅後無主如何得經無佛為主如何得聞如何得思如何得修行也答得聞是聞慧思是思慧修是修慧聞教悟理修習名得經也問菩薩於一切時皆能護法何得偏簡佛滅度後答佛在眾生惑輕業劣易得持經之人所以不問佛在日也問佛滅度後眾生障重如何肯生信如何肯聞如何肯思惟修習等耶言一為諸佛護念等者般若論云諸佛護念謂根熟故根未熟者但聞名未得意以根未熟故但聞經教名未得所證詮及修行也若根熟得教理修習三慧也言植眾德本等者紀國云本者因也德謂三德智斷恩也本即因故謂六度是菩薩善根菩薩久行為三德之本故言植眾德本言三入正定聚等者正定聚是德也淨云聚有三聚一邪定聚二正定聚三不定聚諸抄引瑜伽第一百云邪定聚者謂無間業及斷善根正定聚者謂學無學所有諸法不定聚者謂餘非學非無學法言四發大悲心等者諸抄云救在種性心一者廣大心遍一切眾生二者第一心樂與涅槃常樂我淨故三者常心常作一體一大悲離是非故四者不顛倒心起我等四相謂我人眾生壽者言初是資粮等者依疏配位前來疏文未有分明說此五位今此略敘旦所經位諸教不同依攝論總為四位一勝解行地二見道三修道四究竟道唯識等開初位為二資粮加行本業等經開為六種性十信攝入十住名習種姓也十行名性種姓十迴向名道種姓十地名聖種姓等覺名等覺姓妙覺名妙覺性瑜伽菩薩地立為七地一種性地未入三祇二勝解行地地前四十心三淨勝意樂地初地四行正行地二地至七地五決定地謂八地六決定行地九地七究竟地及佛果又為十三住仁王總為五忍十四開士一伏忍地前二信忍初地三順忍四五六地四無生忍七八九地五寂滅忍十地及果前四分為三品第五唯二品故成十四也業本瓔珞經開四十二賢聖即四十心十地等覺妙覺今依唯識略陳五位具資粮位初明分齊論云從發深固大菩提心乃至未起順決擇識求住唯識真勝義性齊此皆是資粮位攝後辨名辨名又二初約自利名資粮論云為趣無上正等菩提修習種種勝資粮故後約利他名順解脫分論云為有情故勤求解脫由引亦名順解脫分此上意言所修福慧自利利他等是資己身求智之粮食故名資粮涅槃離縛名為解脫勤求於彼此行不違故名為順分者因也解脫因故順體即分解脫之分名為彼分言能聞能思者此約多分未得修慧意實亦少分得故論云此位菩薩依因善友作意資粮四勝力故於唯識義雖深信解而未能了能所取空多住外門修菩薩行此言多分不說物無既言多住明知少分住內也不爾如何十信位中能八相成道等發通教化也言次是加行等者初明分齊論云菩薩先於初無數劫善備福德智慧資粮順解脫分既圓滿已為入見道住唯識性復修加行伏除二取謂煗頂忍世第一法此中意顯十迴向終初劫滿心名加行位然是初劫攝後辨位名論云近見道故立加行名此名簡前資粮也近見道故此四獨名加行也言能修觀者論云依明得定發下品尋思觀無所取初獲慧日前行相故立明得名道火前相復名為煖依明增定明相轉盛故名為增發上品尋思觀無所取立名為頂尋思位極故名為極為增此位重觀名義自性差別等四法依印順定印前所取順後能取名為印順定發下品如實智於無所取決定印持無能取中亦順樂忍然此忍位下品忍名印忍忍所取無中忍名柔順忍無能取上忍名印印無能取隨順彼故立印順名故合三忍印順定依無間定見道相隣故名無間發上品如實智印彼二空立世第一法此等物名能修定觀言次是見道者初明分齊者論云若時菩薩於所緣境無分別智都無所取得不取種種戲論相故爾時乃名實住唯識真勝義性即證真如次釋名者論云加行無間此智生時體會真如名通達位初照理故亦名見道見即是道持業釋體者通也會者達也論云然此見道略有二種一真見道謂所說無分別智實證二空所顯真理實斷二障分別隨眠故名為真二相見道此有三種一三心二十六心三九心一三心相見道謂觀非安立諦有三種心一內遣有情假緣智能除耎品分別隨眠二內遣諸法假緣智能除中品分別隨眠三遍遣有情諸法假緣智能除一切分別隨眠然此三心相見道倣法擬宜旦真見道證二空智之見分此倣見分自證疎緣故不倣也然見分中有無間見分解脫見分各別今者法彼無間道中斷我執之見分立初心法彼無間道中斷法執之見分立第二心顯無間道斷惑別故故別法之解脫道中所有證彼生法二空智之見分今總法之立第三心顯解脫道證理同故二者十六心相見道此有二種一者依觀能所取別立法類十六心此相見道觀安立諦一一諦下有四種心一苦法智忍法真見道無間道見分二苦法智法真解脫道見分三苦類智忍法真無間道自證分四苦類智法真解脫道自證分即是法忍法智斷惑類忍類智證理八觀真如八觀正智觀真如法見分觀正智法自證分也即法忍類忍見分觀真如法智類智觀正智以見分證如故法正智也類智法自證證見分故故云正智也二上下十六者即依上界下界諦別立十六種心觀現前不現前界當界名現前別界名不現前苦等四諦各有二心一現觀忍二現觀智如其所應法真見道無間解脫見分觀諦三者九心相見道亦名布教相見道有九種心此中意說依前四種十六心觀忍智合說即為八心彼相應定總說為一然菩薩等真見道中不作此觀但謂布教說其差別所以須學疏中所言即說一心非說相見道也言後是修道者智分齊論云即十地中無分別智准此從初地出心已去至十地滿心已還並此位攝辨名者論云菩薩從前見道起已謂斷除障證得轉依復數修習無分別智名修習位言能習能證者十地之中道數數脩名為能習證十真如名為能證上略明五位言初是資糧等者配第一句經為諸佛護念言次是加等者配第二句經植眾德本言次是見道等者配第三句經入正定聚言後是修道等者配第四句經發救一切眾生之心言依此四位各等者問豈資粮位只能聞教思義乃至加行位能修定答疏言依四位各增上故言又外遇佛護者據四義總修第一位簡要云資粮聞慧增上依因善友外遇良緣配諸佛護念言內修善本者第二加行位修定增上配經植眾德言決定不謗者第三見道依證理增上配經入正定聚言慈悲廣大者第四修道位修習朗證增上配經四者發救一切眾生之心言並在地前等者且古人意四位並配在地前方能於經理教雙得言然瑜伽正定等者疏主引證自正義正定聚者要入初地言說不爾者破古師將四位總配地前故言此說不爾言初五百年等者解脫即涅槃堅固即真實言一云今當第三者一云取正法一千年滿像法之中兩个五百年取初五百年正法之後初入像法解脫禪定總無正是惡時後五百年計佛滅後一千五百年有持經者菩薩護也言二云今當第五五等者正法像法已過初入末法解脫禪定多聞福德總無正是惡時像法之後名後五百歲又五个五百年中最居其後故言後五百歲有持經者菩薩護之言此前等者疏主恐人疑將謂直護第三五五百年餘者不護所以料簡云此前者第五五百年望前四个名為此前此之一字即目第五五百年前之一字即同向前四个五百年經文雖不說護有持經者菩薩亦護言此後者此之一字目第三五百年後之一字目第四第五五百年直至末法經文雖不說護有持經者菩薩亦護此前此後兩盈中間俱是惡時菩薩總護只緣第三五百年初入像法第五五百年初入末法疏主指兩个五百年也言雖非不護者據實五个五百年總護非是總不護偏舉兩个後五百年人多弊惡信者為難故偏舉之也言三云世尊記別等者五个五百年總名後五百年第一時解脫只至初五百年末便盡第二時禪定只至第二五百年末便盡第三時多聞至第三五百年末便盡乃至第五五百年俱是惡時於此諸時皆護諸者通正法像法末法名諸也言十地論說等者引教證五个五百年皆護問五个五百年皆有教理行果護幾種耶答十地論說有三護法具足正法一千年中三法具足一有教法二行法三證法證即果法也一護教令人書寫受持二護行法於思惟修習有諸障難菩薩皆護也三護證法三佛菩提攝此證法也二云疏錯言三佛菩提應云三乘所證所證之法名證法也今菩薩護者正法之中證法便是護此經中三佛菩提也像法一千年中唯護教行兩法更無證法也末法之中唯有教無行直至當來人壽增至六萬歲時兼教亦無也言禪法秘要非大乘等者案彼經說我涅槃後此不淨觀行閻浮提攝放逸者令觀四諦百年之中得解脫者如我住世無異二百年後三分中一分得解脫三百歲時四分中一分得解脫四百年時六分中一分得解脫五百年時十分中一分得解脫六百年中百分中一分得解脫七百年中千分一分得解脫八百年中萬分一分得解脫九百年中千萬分一分得解脫一千年已來億億千萬眾若一若二得解脫一千五百年後若有四眾等讚歎宣說無常苦空無我觀者多有眾生懷嫉妬心或以刀斫或以瓦礫打拍彼人罵詈癡人世間何處有無常苦空無我耶身肥白淨云何反說身為不淨汝等是惡人宜令駈擯莫得共語等此相現時無有一人修無常觀無上正法滅盡無餘故言禪法等也言五十年者即經云最後未俗餘五十年也亦云人壽滅至五十歲時亦是惡時也又說四百五十五百中間有五十年者名五十年今謂即末法中也言別明十二非人者第二與現在益下品修中有十二非人與持經者為障難也經言韋陀羅者即前毗陀羅也更勘經言伺求與四同闚者胡也即私竊視也伺亦視也言中品受持為護有四一讀誦者經言爾時乘六牙白象者智度論云有比丘讀法華經感一金色人乘白象來住其人前立聽法華經也乘象者嘉祥說一明菩薩羽儀二欲令以威靈摧諸魔毒三欲表三乘聲聞如兔緣覺如馬大士如象問何故普賢及象皆白色耶答此經題目稱蓮華次放白光駕以白牛皆如上說了令普賢能乘之人也白象表所乘之法諸乘大故故以白象總喻一乘普賢觀經云六牙表六度四足表四神足七支柱地表七覺支閻浮提人三障重故以智慧力化乘白象其象六牙七支柱地於七支下生七蓮華象色鮮白頗梨雪山不得為比象身長四百五十由旬高四百由旬於六牙端有六浴池池中生四華華中有一玉女手中化五管篌有五百樂器以為眷屬象鼻有華華中有化佛及化菩薩放金色光照象頂上云云言法音方便等者經言法音方便者法音即說法之音方便者諸法之智依定起此智名加行智定智與說法為方便也言一教其軌者此上品受持為護也經言求索者乞索之義求乞法華經名為求索須法華經人忻法華經人名求索此經及餘大乘向上凡所發願類求總名求索求索經故言普賢觀經等者解經中於三七日中一心精進也觀經說明行法有修行人從三七日乃至三生皆得見菩薩身上解經了言此中古說者此中之言指前所引五般行法古說者即是嘉祥於普賢行法之中分五品與經文少別上品精進者三七日見普賢身第二七日上中品七七日見上下品一生得見中品二生得見下品三生得見乃至第五品三生得見若精進勝者見一三七日見精進下者三生方見極精進者見疾精進劣者見遲言又此不定者疏主義於普賢觀經五位中一七日見者劣身二七日見者次勝身乃至三生見者最勝修行時少見劣修行時長見勝身經言帝阿惰音徒臥反有作郁於六反此字非梵語阿特縛訛云阿惰言第三能行之者經言若有受持至其頭者頭是眾生心頭法華經教名手佛口說名摩戒教被於心名摩頭也言與後時益為三等者十法行中准書寫一行得生忉利天上經文唯說忉利天無等字疏主加等字等取四天王天經文略故不說此同是下品書寫人若是中品書寫生夜摩天經文略故亦無等字疏主加等字等取他化化樂天同是中品書寫人若是上品書寫獨生兜率天也所以疏言生下四天王天也言此中品受持者更加受持讀誦解義修行故成中品勝前位也生夜摩天他化化樂天也言不見佛故等者攝云將不見佛與文略無果相連一處讀誦便言中品之人以不見佛故文略不說生天果也自問云上品生天見彌勒有佛可見其下品修行生忉利天並不見佛即說有生天果也中品之人夜摩天一種不見佛獨無上天果答互影顯下品修生天既說果影取中品修生天亦有果中品生天不見佛影取下品生天亦不見佛不見佛與文略無果各自別讀作兩段解俱是中品三天同不見佛一處向中品收也次下二天亦同是不見佛所以忉利天四天王天向下品收上解不見佛一句疏次下一句疏言文略無果別讀也上品生兜率天說生天果下品性忉利天亦說生天果據實中品受持生夜摩天何故不說生天果答經文略故不說故言文略無果言前來所說三品等者據實十法行皆有三品若不爾者何故中品言受持讀誦解義修行至上品便不說修行故知據一相說也若據一相別相即合中品說有三品修行上品亦合說有三品修行言上十法行者又辨中邊說十法行中一一行皆有三品此第一解言前八是聞等者第二解前八是聞慧為下第九思慧為中第十修慧為上品言於聞慧中等者難易分三品也於聞慧中書寫供養施供為下劣故聽聞披讀諷誦為中受持開演難故為上難易為分三品了言又修一二三行等者依多少分三品言三護持名者經言從久遠來至菩薩名者潞云前來佛說持經不說持普賢名云何今以神通力守護能受持普賢菩薩名者答普賢之名即所證理不離經故意言普賢即法華果也今若作此解但是佛自護法何開菩薩由此但是佛自護彼人法師也普賢即人有持名者即是敬人法師佛言我護敬人法師行者也前言與普賢行合故護持名者即護人也言一為見佛識理等者問何名見佛答識理智化三種身故三種身即法報化三身也受持法華經人即見釋迦三身皆在此經教下也言如親聞法等者經言如從佛口聞但解教意便親聞如從佛邊聽相似也言三為供養佛者持經為供養佛便是法供養也言四為佛讚者為持經故契佛心佛隨喜故得佛讚也言五為佛手摩者佛教被心如手摩頂摩頂者似授記故亦云領受也付也領即授手也相云影像相見也言心田俱勝者能歎者名心所歎者田普皆勝故能記故外道經書向上不好其能習學外道法之人不喜親近也言說過者病者問若實有過說之何咎答若實持經實有其過亦不得說以功補過以勤補拙若說之者妨持經教化身有瑕玼是故身招白癩也言十病如文者一牙病二齒病三疎四缺五醜脣六平鼻七手八脚繚戾九眼目角睞十身臰言繚音力小反繞也言內視者昧者看也古時眎字內眎曰睞也有眤字同提音知音非也言時眾獲益者問經言作禮而去三根四眾八部總起去下囑累品付囑與誰人答此是翻譯家將囑累品安在神力品後故於此品最末結煞一部經文故言作禮而去既非佛言何勞致惑哉上來解七軸經竟疏正宗分畢下明疏流通分言基以等者此是疏主名後人不合言故言其字呼也談者說也遊者化也行也徒者客徒在客居住之舍名曰徒次疏主言我談遊之際居在客也言博陵者郡名即今定州也疏主造疏處言道俗者道是僧也俗乃俗人課者勸進也虗者無也疏主自謙也當時師僧俗人請我無德業人令講也文賦云課虗無以責有和寂寞而求音課虗之言自此而有意言道俗令我課虗也斯由此也修者修環也從也即是不能從諸古義言古義者即是嘉祥紀國等疏義也自纂云由集也言夕制朝談者夜造向日講終即講經終畢即造疏畢也言理褊者衣邊作扁褊窄衣裳褊必污反又編綃也小也意言綃幅狹短名之為編人言家道編短等理即道理詞即言教也言經義深賾者義即所詮義深者幽深所詮理深故路云手取物不取物不及曰探探之不及曰釣釣之不及曰賾言拙成光讚者造疏也兢兢慄慄者盡是側悚之皃言玄宗者深旨也言寧輙等者援者引也據由教也即專輙𢪭引教據也意言所有憑據皆有誠文也言默爾無為者不是真如無為但是不作言聊且用等者狂者進取之義少人進取大課之狂簡過分為事我今述讚此經名申狂簡自謙詞論語云歸歟歸歟吾黨諸小子狂簡斐然成章斐然者進取簡即大道也此書三十五帖年來之間勵微力料紙調儲勸進筆師書寫畢願自他依此功德生生世世值遇太子聖皇在在所所結緣法華經仍法隆寺大經藏安置寺門不出不可被所出他所而已弘長元年辛酉七月二十三日
