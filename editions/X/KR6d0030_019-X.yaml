body:
  text: 鏡水沙門栖復錄言一乘之義等者問何故此間明一乘答前品中未是正說不合說一乘章流通分中不可說一乘以破二會二為用事須是正宗正宗中三用說今此事須法說之中明也從品初來未有一乘字求說不得此唱之中云諸有所作常為一事既當唱有事後唱有一乘字所以此處說一乘章也言經有總宗別宗若總宗有作無作可貫兩間門世俗勝義隨應分二雖知通旨宗義若斯若隨所明一乘為宗也法華經以教理行果為體一乘為宗破二會二為旨開權顯實為用也經云今此經中唯說一乘而昔於菩薩前毀呰聲聞樂小法者然佛實以大乘教化等言總含者總合體名寬體狹一往聞著道總合此名則似寬於中體狹唯無漏不取有漏故名體狹真實體名狹體寬一往聞道真實則似狹於中含得有漏無漏却寬總含體名體皆寬於中攝得一乘大乘佛乘出此三體所以名體皆寬也不是唯攝得無漏名體狹也總含體者一切無漏若是無漏小乘方便亦取若有漏大乘根本亦不取若定姓人身中無漏不在下此攝今唯取不定性人身中所有無漏頓悟菩薩所有無漏地前本有種子登地已去無漏現行及果中現行功德新熏本有有為無為大乘十真如小乘見道修道品類差別所德得無為理言若種等者四智種子十地現行有為道諦無為滅諦若因入佛智及十地現行因也若果開示悟三佛果三身名果十地真如名因中涅槃名大乘小乘教理行果無漏者能成佛德皆是此收問滅理恒寂豈曰能成如空體常可能造作答萬行所依之性故如其舟依水水得運名故說無為能成能作因故名能成又由因中分證無為理故運轉五薀假者身得到佛果故說無為亦是能成也言一乘即大乘者會三名此經名一乘勝鬘云大乘辨中邊云無上乘有何差別答疏言一乘即大乘大乘即佛乘佛乘即無上乘所望有異故立多名一對二乘不定性名一乘二對中小名大乘三對下乘名無上乘四對佛果故名菩薩乘五對因故名佛乘名別體同問疏主解一乘大乘只合引一乘文何故引無上乘文答只緣疏主擬解一乘大乘所以先會無上乘文辨中邊云無上乘即是此經開者無上義辨涅槃二種無上乘也言故勝鬘者問𭓶知一乘與大乘不別耶答疏云勝鬘云等言此本論云開者問爭知辨中邊說無上乘與此經一種耶答疏言此本說云等意言彼既雙開菩提涅槃故知一乘體通理智以證一乘即無上故言辨中邊者證此經根本一乘行也言有三無上者一正行無上二所緣無上三修證無上言正行無上者謂十波羅隨修之時一一波羅蜜皆須具六種正行言六正行者一最勝正行有十二種一廣大最勝終不忻樂一切世間富樂自在志高遠故二時長最勝三無數劫熏習成故三依止最勝普為利樂一切有情為依處故四無盡最勝迴向無上正等菩提無窮盡故五間最勝由得自平等勝解於諸有情發起施等波羅蜜多速圓滿故六無難平等最勝者於他有情所修善法但深隨喜令自施等波羅蜜多速圓滿故七自在最勝由虗空為庫藏等三摩地力令所修施等速圓滿故八攝受最勝無分別智之所攝受能令施等極清淨故九發起最勝在勝解行地最勝上品忍能起見道智故世第一促故非說彼時不行施等十至得最勝在極喜地得無為故即初地行施等十一勝進最勝於八地內所行施等十二究竟最勝即此在十地及佛位菩薩如來由因果滿到於彼岸上正行了第二作意正行者菩薩以三慧心中思惟大乘六度教第三隨法正行正治六弊十種倒故於此六中應遍知故第四遠離二邊正行謂觀無我名離二邊故第五差別正行為十地增修一處故第六無差別正行一一地中等修習故此六度正行於十度隨順差別一一具足上正行了言十二種所緣者一安住諸法施設所緣倒彼岸差別法門教也二法界所緣即真如無為三所立所緣即前第一教也四能立所緣即前第二先由證如後方起說故十二分教皆名緣由真法界為能立五任持所緣聞慧任持教法等故令不忘失六印持所緣思慧印持法境義故此聞思慧俱緣教義且隨勝說七內修持所緣即修慧內身持故緣理名內四諦三性各各別故名別八通達所緣謂初地前見境九增廣所緣謂從二地至七地漸漸勝故十分證所緣謂七地中世出世道品類差別分分證境故十一等運所緣謂八地平等任運十二最勝所緣九地十地及如來地能緣所緣俱最勝故言修證無上者修習證謂證得因修而證故云脩證無上也言種性至十者一種性修證事須有本有無漏種子依此種性遇善知識方能修證二信解修證不謗大乘乃能信解修而有證三發心脩證非下劣乘所損動故四正行修證波羅蜜多得圓滿故五入離生起修證起其聖道故六成熟有情修證善根堅因修習長時故成熟有情七淨土修證由心調柔證於淨土八得不退地受記修證不住著生死涅槃非此二種所退轉故九佛地脩證無二障故十示現菩薩起三種化身利樂有情無止息故言通攝一切者即此正行所緣修證三種修無上證根本一乘體通攝菩薩家所有境行果也又修證中前八通因後二唯果六正行中第十二究竟最勝一分所緣中最勝所緣脩證中後之二種皆是佛果合此因果對緣能心名境也言勝鬘至有恐怖等者證方便行為一乘也意證二乘人向前身中所有無漏功德名一乘也問阿羅漢後有生死永無更何有怖答阿羅漢雖無煩惱生死永盡其如五薀身是有漏業感得也恐身分限盡去死相現前如世人臨老怕死也又羅漢人身上有病緣醫藥而生怖恐也又問何有恐怖答有二一者不愚法信有大乘變易生死對治道未立所以怕怖二者愚法之仁有餘涅槃出觀已後怖法空行不能修證也經云如人執劒欲來害己人屬變易因劒囑於果等人能執釰如因感果臨將欲至名欲來來必切身故名害己言有諦依者既有怖恐前合有歸依佛化度云有大菩薩是可歸依處唯有佛菩薩等言四智不究竟者章敬云一我生已盡苦諦智未究竟二梵行已立道諦智未究竟三所作已辦滅諦智未究竟四不受後有集諦智未究竟言名向涅槃界界者因義也羅漢身中有為果法四智不究竟無為果法涅槃又是無體迴心向大總與大乘三事涅槃為因名向涅槃界二云界者性義種子義今所因義正取此段向涅槃界為證故知通取方便教理等為大乘因也三云羊鹿無體名向涅槃界他城是無也言又云正法等者此小乘三藏也正法住謂經藏能詮於定若能受持聖教久已住故又經藏進善名云正法住正法滅者即是論藏能生於慧慧能滅惡故波羅提木叉者此云別解脫戒毗尼者律藏能詮於戒又云波羅提木叉略戒毗尼也是所學之法言生出家者即沙彌沙彌尼十戒言具足者具二百五十戒五百戒等前四是法後二是能學人說此六法交脩行人依此起行從小入大也二乘人起行依此六法名為為大乘故說言故一切等者一切根本即是頓漸菩薩身中所有無漏功德名一乘方便者二乘人中身所有無漏功德並名一乘言三種意生身皆入初地故有二意一結前來方便行為總含體意取二乘人身中所有無漏功德總是大乘由先受變易成熟身中無漏功德後入初地也二通法根本方便無漏行總為總含一乘體緣三種意生身中有自在菩薩所以疏主引此文來三乘通法也問二乘人先受變易後入初地增菩薩八地方入如何疏主言三種意生身皆入初地答疏主偏約三乘人中俱時得者說實不足上總含了言隨勝等至有六類者初隨果中理勝二隨果中智勝三隨果中理智勝四隨因中唯智五通因果理智勝六唯詮旨勝故言隨勝言攝事皈理者同果中理示佛知見也不是空取理不取事於中攝却事但是偏取理為體於中有事也言涅槃勝鬘等者二中多以法身真理佛性名為一乘也引涅槃經證在纏真如名因中佛性引勝鬘經中說理證果中法身言勝鬘云一乘者即大乘大乘即涅槃界勝鬘唯以真如為一乘問何取故真如答真如是勝有為是攝有為就無為萬法皆以真如為體問何知勝鬘經中有為是答彼經將有為法拔校量無為也言又於云恒河等者緣此經詮無為理勝故無為勝有為涅槃經言一乘者即佛性理佛性也言滅化城者亦是法隨勝體也經云是法住法位等上來三本教唯取理名攝理體同示佛知見也言攬餘皈智者同悟佛知見唯識云如是八識各定雖有二十二法能變所變種現俱生而用巧以智名顯此中據果唯隨果智勝也以無為正智為一乘體不是空取智不取理其實有理也意雖知見知見通於性相只為智以智為體然智不孤起藉理引生但是攝理智也言亦以真者前唯取果中理今取果智故言亦以亦前唯識也言方便知見問疏主方便知見知見通理今何言唯智答即為通故說攬餘如一百四十不共功德皆名智名智理實兼理與下開佛知見何殊答隱顯不同各取一分言若在因位至識劣者謂入初地時平等性智妙觀察智至佛位時成圓鏡智成所作智故取果中四智菩薩根本後得為智相真如為智性相應功德為智伴真俗諦境名智境故不取因中智唯取果中智為一乘體也經云諸佛智慧甚深無量又云如來今欲顯發宣示諸佛智慧諸佛自在神通之力言隱劣從勝者劣即二乘勝即一實又外劣即因理智勝即果中理智也今取果中勝理智同開佛智也言經下自云者證果中智也言是法住法位者證果中理也言分別功德品者證有為乘也言一念生信者一云於壽量生信二云所信壽量中通報身也故前以五度校量此也問能挍量是五波羅蜜所挍量是無上菩提何不同勝鬘經全將六度挍量也答前勝鬘經以無為為一乘偏勝故全將六度挍量有為乘不及無為也此經將福挍量智慧所以五度是福第六波羅蜜是智福不及智所以唯將五度挍量第六智也言理凝者問何故不取因中理答疏云理凝等因中在纏之理理凝本有故不取在凡夫位中理名本有也言照新生者問何故不取因中智答疏云智慧照等因中智智照新生故不取妙平二智名新生問種有新本此從何生答若通因果說唯正義皆從二生今約果圓即四智種皆是本起也劣無漏法皆棄捨故無學已滿更不重故問何故唯取果中理答離纏而號涅槃故取也問何故唯取果中智耶答果圓而稱正覺取故也言四德者即常樂我淨鴻者大也水本曰源即涅槃也三明妙本菩提也果中理乃四德之鴻源果中智作三明之妙本故取也三明一宿住隨念智明緣過去生死二天眼智明緣未來三漏盡智明緣現在也言二運用廣者唯因位中理智為一乘同入佛知見十地中以生法二空智證生法二空理自利名一運運他名二運也問何故不取果中理智答果中理智二利行相微故不取也因中理智行相分明也經云乘此寶乘直至道場是也言勝出分段等者因中變易身及佛功之若因若果隨其所應但出分段死所有理智皆為一乘體五果聖人迴心許受變易智增初地受悲增八地受平等隨應樂入即受變易身之所依顯也言通取因果者問菩薩因位捨分段入變易名勝出分段也佛身亦分段亦變易如何亦是此門收答但緣佛身勝故不從分段身出亦名勝出分段所以疏言通取等意言三乘人變易身所乘無漏理智為一乘也今諦若校果位直是勝出變易今取因中二位所有理智從寬立名名出分段果中不違出分段義言開示至因二者引證也言果二者因果二理智也言如取者相似之義取者有二義一全界煩惱名取二愛增名取今取初義全界煩惱皆能結生名取助業潤生名緣何名為取緣答煩惱望分段生死疎故名緣言有漏業因者即福業非福業不動業說有言表漏俱故立有漏名而生三有即三界苦果即總報識分段身辨云有漏業體以正招感名之為因非親辨體辨體者名言種故言如是無明習者即五住地中第五無明習地即所知障所知障望變易生死疎得故名緣無漏業望變易生死有力故名因無漏有分別業為因方有阿羅漢緣覺自在菩薩三種意生身將前來三有果喻此間三種意生身欲界欲有果最麤況阿羅漢意生身也色界色有果次細況緣覺意生身無色界無色有果身最細況自在菩薩意生身也三乘分段是能喻三乘變易身為三乘勝劣能三取意生身所乘因中理智名因中二言攝大乘者問爭智勝出分段取因中理智答疏云攝大乘等言以詮旨二者問教化引攝眾生以何法為勝答疏云以詮二等不過教理最勝也言教物等者是出詮旨為體之所以也教隨物設教殊勝也物者根也趣者意趣教意趣難知即是前來隨宜所說意趣難解理假智宜理殊勝也理即真如理此理因何知甚深答由佛智證此方名甚深唯根本智親得餘智不得故云理假智也宜者合也親證之狀也言方便品等者證教理二種乘也問方便品初教通三乘權教何故引未證一乘教也答殊勝體中取勝不取劣意取三乘中大乘證此間教一乘不要阿含權教也言無量義經者因前明教理向上引攝殊勝因便說著無量義經教理蓮華第十六名妙法蓮華第十四名一乘疏主恐人疑無量義經真如理及能詮教不是蓮華不是一乘所以引來和會也言若但以等者破紀國淨法師若將真如為其一乘唯得蓮華向上出水之第一義失却開敷之第二義故言二能也言今蓮華既具四義者法上亦有四法四義者契秘賾之微詮教也等言了意言教行並開敷理果俱出水古人若取真如為妙法者但得出水之第一義失却開敷之兩義兩義全失也古言設使唯得出之一義何妨疏主難云今蓮華既具四義唯得出水一个出水義早有過況蓮華上有兩个開敷義全失問既兩个出水義中唯得一个只合言法唯一種何故言二種答雖然古師唯知理上出水義只此理對因名果兼帶得一分果出水古人不知有此義疏主添著也故云何獨法唯二種也言真實體者已前諸門盡唯取無漏今此真實中不簡有漏無漏根本方便教理行果總取名真實也問此與總含隨勝何別答此寬彼狹此通理教及以有漏彼局行果及唯無漏又云望化自業皆名真實此理不然若望自乘何開出一乘體但是望前總含隨勝說義未圓今言真也言根本教者問如何將阿含甚深三乘權教證此間根本教乘耶答簡要云三中大乘教頓悟菩薩所被亦名根本教又三中大乘一分為根本教餘三乘一分權教將向下證方便教也言法華藏者教含理故名藏言攝大乘等者以本阿毗達磨經中有攝大乘品中攝十種殊勝義故名攝大乘品此論外彼攝大乘品名攝大乘論以大乘為品主故攝大乘之論依主釋又云大乘阿毗達磨集論者大乘阿毗達磨此乃根本佛經名字名大乘阿毗達磨經也根本是所集論是末是能集之論就所集以立名名阿毗達磨論此云對法分二智對理二智對境故云大乘阿毗達磨論此證根本教也言方便教者此約小乘所說九部之教是大乘之方便故言方便教也此經九勝鬘六皆是小乘亦與一乘而為其體也言根本理者理中道理真理也六度等是能成之行真如理是所成理問真如無動作如何喚作一乘答如六度行乘此真理乘之性故言道場知已者取道場知底理為一乘也不取方便說自屬教言念觀者依法中言舍利弗過去諸佛以無量無數方便種種譬喻因緣念觀方便說法是法皆為一佛乘故論外念觀者為二乘人觀人無我等大乘人觀真如實際人無我法無我等種種觀今是彼文也非是歎法師功德中念觀也言辨中邊者意說以真如法界為所緣無上無上乘即一乘意取根本理并無性大乘並取理也言皆方便者問三乘聖人同觀四諦何以為方便理答二亦所觀皆名方便故聲聞緣覺並爾故言皆也問理是一何名方便答二乘所觀皆方便理理體元來是一品為被二乘人證着由此理名方便理也言有作者新云安立安此對小乘中名無作若望真理名有作並安立故廢詮談旨方名非安立言有苦有諦等者牟云凡夫有苦無諦無實聲聞人有苦有諦而無有實菩薩具有言苦即三苦五苦八苦等諦者知實若佛說苦諦真實不可令樂實者即是苦下苦如此三即是苦事苦理苦如合是四諦下無為理也問聲聞何名無實答無法空如故故言無實菩薩具有者終無作四諦知苦虗妄無有實體雙證二空真如理名有苦諦有實言由此二理者根本方便二理理體無一由二乘人證得權不得實由此二理皆一乘也言七地者一種姓地十信已前二勝解行地從十信初至世第一末心三淨勝意樂地謂見道四勝解行地第十地也四菩薩行者一波羅蜜行六度等二成就有情行即四攝三菩提分法行三十七菩提四神通行六降伏外道故言觀薀界入者謂五薀十二處十八界依三科作四諦觀猒生老病死等名為猒苦後得果時名為離苦無間道亦猒亦離解脫唯離非猒言由此二行者結前方便根本二行也言相常住常住法住世間相中意言真如與世間情非情為染淨依在染而不染在生滅無離生滅問真如法既遍一切處如何得知答事須依分位顯之真如住在一切法中名法住住在三賢十聖住中名法住唯有如來則知餘人不知於道場所得法即是法身果也言亦壽量品者經自從是來我常在等等報身果也如實知見三界之相等法身果也又善男子諸佛如來法皆如是為度眾生皆實不虗化身果言第七淨土者果中三身所依之淨土外增上果也簡要云即是佛果此能變現自受用土及化他淨土第九佛地者即自受用身及法身故第十示現菩薩者即他受用大小化身也十中前七唯是因行後是三果言方便果者生空無漏有餘涅槃也望三乘中即是果迴心向大來總是因問何知是因答經云汝等所行是菩薩道等云云言得蘇息處者問勝鬘言四智不究後文言得蘇息處又言不究竟耶答據四智不究竟若言究竟者即是佛方便也意言生死煩惱燒通名悶絕擗地持五戒十善得人中果報名冷水灑面得有餘涅槃如蘇息處故方便也故二乘果亦是一乘也言由頓悟者問若望漸悟菩薩曾修方便教教理行果可許將方便教理行果與漸悟菩薩出體也彼頓悟菩薩元來不修方便教理行果如何將方便法與頓悟出體一乘體耶答疏言由頓悟等故漸悟菩薩先修方便後修根本頓悟菩薩先根本後修方便問頓悟菩薩何要事須後脩方便答三意一為伏二乘二為化二乘三為成自功德言伏二乘之人作念我雖不解菩薩中事菩薩亦不解我二亦中事菩薩為除此慢所以伏也二已後擬化三亦事須檀化宗也三為成自種智求遍知道若漸悟菩薩先修方便後修根本也言故知但有者結前三體更重料簡意顯通取多法為體不同古人唯取真如滅諦為一乘之體言理智二因者妙平二智名智因是報身因十地真如身因言無漏現種者種即是本有無漏種子新熏種子現即十地無漏現行初地已去七地已前漏無漏修八地已去純無漏修正為乘體也言純成者問無為之法豈曰能成凝然故答由證會故佛道方成實非因義故無為法為能成因不能招果也言兼取有漏等者資加二位所修有漏菩薩七地已前一分有漏修此等有漏助為一乘體亦是一乘收也唯除却二乘人見道前七方便有漏望大乘以疎遠故不取也若准法華論唯取登地已去無漏現行為體言法華經論至攝盡者具法華論出體唯登地已去無漏為一乘則收地前不著也若取初周開示悟三為果入佛知見為因收他實體不著也若依第二周牛車攝餘諦智收理不著也若第三周攝理諦性出體收智不著也若依法華論唯取教理為蓮華出一乘體闕於行果也及餘教者即是勝鬘涅槃唯取理為一乘收他有為不著也此上諸教隨依於此三種體中若一門出體攝義不盡者總含體唯攝無漏收有漏不盡也隨勝體唯取勝法收劣法不盡也真實體雖通有漏還收總含隨勝體不著也若其取三門出體無義不收盡也所以疏言若依等言意依此總含隨勝實真三門出一乘體即總攝盡也言一詮旨者教中通三乘理中通權實言因果者通行及果果中通三身果也行中通十地若依真實體兼取地前有漏行言福智者有二初一一度皆通福智二前五是福後一智言覺寂者通菩提涅槃言五二利者問大悲菩薩業唯利他何異於佛二乘自利與八地七勸自利何殊答佛與三乘異處不唯自利他故得成異二云菩薩唯他利他利之行劣於佛萬行未圓故八地唯自利自利行勝二乘脩無邊行故亦成異言義可兼有者糅云佛果必從因得果可兼因脩因佛果必成因可兼果名兼有牟云不爾意言若佛果等即局也今言一乘即兼也即兼前五門總是一乘也非因果相望多兼也義無因故言又由等者顯此一乘體通多法不唯真如滅諦下結云二諦為體成亦三體之所以也言修習二智者五地已去一體義分也言觀於二智理者因中妙平二智本智親視後智變影觀也言斷二障者二乘菩薩斷伏不同前後亦別也言息於二死者定性二乘得有餘時息現在苦依入無餘時息此中不論迴心者頓悟一分即是智增智增初地息悲增八地息若變易者有二師說一者無間道息一解脫道言證於二果者二轉依果菩提涅槃即轉謂轉捨轉得依謂所依言圓得二滅者初地已去即分得不名圓得言行於二利者相國云法身通二利自受用身唯自利他化唯利他法身與二利為所依止故亦通二利與自受用身為所依止能依之既唯自利所依之身亦自利與他化身為所依止他化唯利他法身亦利他也言所斷二障者此依大乘無作四諦為論言所修二智者根本後得也言所證菩提者菩提其實是能證對假者五薀人名為所證唯識云由轉煩惱得大涅槃轉所知障證無上覺成立唯識意為有情證得如此二轉依果故知菩薩亦為所證也言所得二滅者無餘無住也言所證涅槃者即三事涅槃通二諦攝也般若道諦收解脫法身滅諦攝言所行二利者問如何二向滅道諦攝答簡要云法身既通二利法身滅諦攝自受用身唯自利道諦攝已二利既向滅道諦攝合此滅道諦攝名一乘也問小亦滅諦此何不取答據實小乘亦證一分生空真如三乘同一真見道故但是後智不能變緣不知是真如但名擇滅無為也又約無二乘涅槃究竟之體也言故此本論者問既有二乘三乘何故總說一乘答疏言故此本等舍利弗十方世界尚無二乘何況有三言無二乘涅槃者糅云無有餘依涅槃非言無無餘依涅槃迴心向大無彼小乘無餘涅槃意言無者無迴心向大當取三事之大槃涅槃此唯大乘有二果所無說彼二乘無實涅槃體非無實息苦涅槃經云眾人入化城故言釋名者法菀云一乘是帶數釋也言無上乘乘即無上持業言菩薩之乘聲聞之乘依主言小乘大乘相形為名通持業依主二也言大乘通佛菩薩也言亦大同依釋言乘是運等者承音呼言廣雅云者乘亦通剩音呼剩者駕周禮乘亦剩音呼章敬云真望載體云聲為正若總喚作承音呼即約車上功能說也若約車體名剩此約功能名乘前約所乘所載名釋後約能乘名乘能載人及總說也言乘此寶乘者唯初地已去無漏因行直至果中薀積菩提涅槃之道場言攝論至大性意證一乘通理智為體問有為有動轉可得名為乘無為無動轉如何得名乘答六度萬行是所乘真如與所乘為性故亦名大乘乘之本故亦名為乘正能運載即是有為有為依他無為亦得名乘如舟依水水得運名故事理俱能運載行者至彼岸故運通此二種也言問因行至乘體者此問不正意言佛身上因中果中皆含二利雙說今唯問自利不問利他故名不正問也言答有五義者初曰答皆隨化不正答五方申自義言一者運載者因中有二運運載得名乘果中雖無自運唯有運他運義同故總名乘也意言但有運載名為乘不以二運唯一運也言二者體能通者意道因有二運自運則自斷煩惱運他則教化眾生果中雖不自運有智體向上運載功能在只此運載斷惑功能在亦得名乘但知功能在即是乘不必事須起作用也言如割者正割總時名為刀閑放著亦名刀非要長時割總名刀閑放義則不名刀但有用便名刀非要廣現割也言三者二乘者二乘唯自運劣故得乘名大乘廣運他勝故亦名乘攝也言四者因中者意言果中不唯無自運設無運他亦名為乘是因中自運之種類故由如習氣亦名煩惱也言五因中二常增進者即自運運他也自運所增進二運不間斷故名常增進也果中自運窮未來自利也令他增進名亦乘攝利他也教化他人成佛故名令他增進即摩訶般若常照法身唯識論云謂此心品離諸分別所緣行相微細難知不忘不愚一切境相性相清淨離諸雜染純淨圓德現種依持能現能生身土智影無間無斷窮未來際如大圓鏡現眾色像言對法云者自利利他所依止故法身通二利自受用身唯自利他化身唯利他言所依止者法與自受用身所依止名自利與他化身為所依止亦利他也言三義者簡即簡權破即破執會其法體是三種差別行相言簡別故名一者一真實之義三乘教下唯大乘教下有真實至極之理二乘教下唯有權理今此簡彼二乘權理不取唯取真實之理名一乘問真實有幾法答都合有三法於中一法為真實何知答十方世界中唯有一个真實者取不真實者不要簡劫如三个珠兩小不圓一个金真大而復圓若大小合說珠有三个總得名珠簡擇取一不取餘二此即法體俱存各不相入意噵二乘教下有彼權理不是總無只緣無究竟極理所以不取此簡別故名一二破別故名一者破彼執心不破法體緣二乘之人名執自乘所脩教理行果為極不肯脩大世尊破執心所以云十方世界中唯有一乘法無二亦無三也說著唯有一乘二乘能執之心便破猶如三个珠兩个是小打破著不用一个大真金珠則留三者會別昔二權同滯一實會彼二乘權教理入實理中來會二乘權行果總名一乘如三个珠總將來鑄作一个著故名會別故名一也言昔日說至三以為極者世尊四十年前有三乘根將教就根論根三教亦三唯對根不對理法華會上大乘根就唯有一大乘根却將教對理論理一故教亦一一乘教下有究竟極理却向教上說實其二乘教下無極故於教上說權今簡二權故留一實昔日說三對權根今日說一對實理問品初阿含甚深即昔三教四十年前三乘教總是權何故今日法華會上一乘教實耶答對望各別四十年前將大乘教名字就小乘中立名形對二乘立大乘名字也只將大乘名字大乘名字曲就小乘中立大乘名字名字便是假今日法華會上理一而為極能詮之教亦是真實也言能詮之教二即者意言二乘所詮道理既是權設能詮彼教教亦是權權宜說何故以無別二種道理以為極也究竟滯於大故故或約二乘真理非極非圓證故言無我等者問二乘教權理既不極如何言三人同坐解脫床十義中法無我解脫等故說一乘豈得言無二乘實理耶答疏云無我等若道法等解脫等則不妨若道極理事須至佛果位中有色如百川水水性元來是一要至大海方名海水論言等且約同斷煩惱障一分證生空理同處說不約不同處說也言非別簡三者三者斥古人破三之義唯無二極立破二義也言故論解遮者問爭知是破二不是破三答疏云故論解等疏主引下五段經文證只有破二文無破三文也言令得入佛慧者能入是行所入是果兼證不簡三第三佛乘言二十年者不說三十年也言付家事因即二即二為能取也家事是所取是一能取有二也若破三即合所取家事亦無也言又以果一等者疏主言我只是破二不破三古人安若欲破三我此間亦有有此道理假縱古人也果一簡別因三者四十年前行有三種法華會上果唯有一也所以將理一簡二種教果一簡三種行四十年前聽三乘之教悟一乘之理教為因理為果也行之行取一乘之果行為因果為果因三果一殊途同歸教三理一百兼一致言理簡教者法華會上理唯有一四十年前教有三乘但以假名名字此約不定迴心故示即解殊途同歸百兼一致若望定性但局自乘教理行果平無三一春蘭秋菊各自芳為然望於大彼乘亦非極故此二簡疏具依不定性解也言汝等所行者問何處是果簡因經文答言汝等所行等引此文意者既言是菩薩道故知無二乘因果也言二乘不知二者此中能報人所法執一者聲聞人執自果為極二緣覺人執自果為極三者漸悟小菩薩大行未成亦執二乘為極此能執人有三人執自果為極三者類人所執果唯二種故經云諸求三乘人問聲聞有定性不定性二中破何人執答二說一云定性不定性總破若是定性聲聞破令不愚法若是不定性人破命迴心也二云唯破不定性人也問何故不破定性答定性之人既不證大何須破之初解勝言今說二涅槃者舉所得法言二涅槃者有餘涅槃二菩提者生空智是佛言才方便施設故名權等言非是二果者二轉依果菩提涅槃也言破彼悟執者破執意也言即經所言諸求等者問此間破執心如何引經文證是破疑文耶答執從有疑處起若不生疑執亦無也故引起疑經文證破執也由先疑前境然後起約根本說也此引上才根經文舉初二攝也言佛為除斷者知有執方便說也言我等不解者處小階而起歎喜今聞而惱盡本既因疑方執故知疑盡即執無也言本論末者歎法師功德分定疑分定記分斷疑分皆說破二而歸一乘不說破三歸一也言或有說意等者天台等說諸古師言執佛化身者此則執大乘故是破三此為破意也言此亦不然者問有部執此何言不然答牟云經說之時未有彼部說經時亦無有執者佛滅度後方有分教分教已後有部宗中執佛化身以為真佛彼宗所執三身執五分法為法身菩提樹下三十四心成等正覺丈六身名執身即當大乘中化身也猿猴鹿馬及龍鬼等雜類之身名化身也古人引來例同法華經中亦有執三乘而歸一乘者已上敘計故言不然破也言但以自修等者意言縱許執身非此宗所破況伏必無故云但等會破彼乘合入於一乘疏主意不妨有此執與此間道理不相當故不許也意云法華經若取一身為宗執佛化身為極者事須破之我此經以一乘為宗何須破之乘是所修要破身是所知何必破也言又無堪彼化身者若求化身事須先行成就報身報身成就了化身自然成就也未有不成就報身成就化身者也有云華嚴師有此執云十信心中能現八相成佛遂執此身名執身也故疏云又無等意言未得報身何有於化而執耶不修十信菩薩然於唯識義而深信解豈有不知而便執耶後方斷障是何言毀言聞昔說者即是嘉祥等破三義四十年前世尊說有三乘二乘修行得二乘果執為究竟佛破之令脩行取佛果性地前菩薩執大乘因行為究竟此是堅執之心此亦須破故乃此地前菩薩起故今說一極故破三執也言此乃地前起等者古師意說地前大乘與地上大乘別故破執地前為極與地上大乘也疏主以地上一乘大乘無異非破故言若破執大極者古人意破地前菩薩執心令起登地已去無漏行名執也古師言地前所修是宅內行今破令修宅外行宅內行是四十年前大乘也宅外行是法華會上一乘也即是長者宅內唱三車中小二子捨却羊鹿取牛車長者捨却宅中牛車取宅外牛車去疏主難若執大乘正是所要不妨脩行若二乘人執二乘為究竟妨脩行大乘行事須破之地前大乘菩薩執為究竟正是所要若言執大乘是病事須破之者則須別與說一本聖教大乘經也若執大乘更增其病何須破之所以疏云若破執大乘等言未有出宅者欲擬申破先且牒定問古師所執牛宅外色相異耶色相同若執相同更無殊異何須破之若執牛色相定異者應合白牛外分出一个黃牛若然者喻上牛色黃白別所喻法上亦合有漏無漏別亦令頓之與漸別若爾宅內行有漏行應是黃牛宅外無漏行應是白牛白牛應合喻漸教黃牛應合喻頓教喻上牛既毛色不同所喻法中即是頓漸有異也古人言設爾何失不違於大小同棄黃牛取白牛言若與白者疏主縱成也言既爾即應者正破也問何名捨頓漸答二乘宅內是二乘行門外捨却二乘脩大乘此是漸頓行也頓悟菩薩地前黃牛是頓悟行也喻上說捨却黃牛取白牛法中論捨却頓悟學漸悟耶若言地前是頓悟登地已上亦頓悟既若捨却地前取地上如何捨却頓悟取又若言地前是頓地上是漸悟既若捨却地前取地上如何捨却頓悟學漸悟耶疏意言審實若捨頓學漸頓教漸教一種是六度萬行有何差別喻上說古師言黃白牛毛異法中論一種是佛行地前地上有何差別言黃白牛等者喻上既分黃白牛相法中因行有何殊法中因行頓漸無喻上何黃白相若道捨却地前上前上地前既總是頓悟菩薩行又總是成佛因法中既無兩般喻上還須是一若捨地前頓悟行取修地上頓悟行次下申正言既還與本牛者申正也唱彼羊鹿無二車無彼二車名破二昔唱牛歟牛車今與車明知不得言破大但言破二也豈有地前菩薩執有漏行為實耶答無執歟何須破也言若執一極者立義符宗失意言有漏無漏別破有漏入無漏未見有執有漏者何須破之也言若隨位等者彼救云雖伏執一即不違於大然彼菩薩有法執心故說十地斷十重障何非破大乘人執也此古師義修行至十信捨十信耶十信至得十迴向不肯進修故須破也言未見趣大者疏主破未見趣大有此多執也言設許亦者便是破云無窮即是三十心何名破三歸一也言又非破四者三乘外為無種性人說人天乘言有四乘者聲聞乘緣覺乘大乘若三乘執上三乘與前破三不別也問何名執人天乘若三乘聖人解人天乘知有漏果無常身決定不執為極問二乘何故而有執答為佛昔說三乘同坐解脫床故執為究竟若人天者明知是劣故不執也執者不解乘以不肯執也執者不解乘以不解乘以不肯執也若人天乘無種人不解乘雖執人天為極非此經所要不破也言若一對四等者未有破一執而歸四一个人身中俱有四乘種性此是不定性人未有捨却四乘外一乘取餘四乘中定性果也未有身中不定性聲聞種性就捨不定種性聲聞乘取定性聲聞果緣覺大亦爾言非破五者若執五中二乘為極不異破二歸一若執大乘者即不異破三之遇若執人天乘亦同前破意也上來料簡定性四乘了下料簡四乘外不定性乘有彼三乘種姓者也又若發聲聞心修聲聞行即是破前聲聞執收若發緣覺心修緣覺行即破緣覺乘中收若發大乘心不違趣大何須破之據實而言但破執二乘破大乘也言此有難言經說別體者意言經中說別體三寶同體三寶如何不破別體入於同體名破三如何不取破三歸一而取破二滯一且別體三寶者三身佛為佛寶三乘教理行果為法三乘聖眾菩薩聲聞為僧寶或大小乘各別大乘三寶三身為佛寶大乘十二分教為法地上地前菩薩為僧寶小乘三寶者菩提樹下成等正覺為佛寶九部教為法寶四果聖人為僧同體三者大涅槃一體上覺了義邊為佛寶軌持義為法和合義為僧寶今此約別體與一體殊何不破別體而歸一體言此亦不然者若執別體三寶為極者亦須破之入於同體況此亦無執三為極亦無求住別體者言廣如經者是無為法雖經教實有破三寶為極處非權實宗言教理行果皆等者前來簡破別通定性不定性今會別中唯會不定性有大乘種性根熟迴心向大者自業中所有教理行果名一乘與根本為因故言見道已前者問大乘教理行果何要會答疏主深意緣前來法華論中取初地證不退無漏行未知見道前所脩因行是一乘為復不是一乘所以此簡見所修因行與彼見道為因故亦一乘也上出會別義不正外言無垢稱等者佛本來一音說法亦不說二乘人天法品是一个大乘教會下有三乘五性根機不同隨彼根器二乘根性稟著便是二乘教未會之時之有三乘會了入大乘來唯有一大乘教故言偏普者生空名偏俱空名普意言教元一味取有偏圓令知教同即名會教行有三理果唯一會未會別也言譬如有人有人者學出要者渴乏在生死中須水論云佛性水也於高原三乘佛正法原如高覆四生羅萬象出過眾道之先難可登陟也以聞思修三慧聞教悟理理猶如穿鑿求之妙慧為先三業為作具簡擇推尋故四十年前穿得到聲聞理如乾全無大乘菩薩之勢名乾施功不已施二利功未常休息轉至濕土逢空教大乘有菩薩之勢名濕遂漸至泥聞此經教其心決定知水必近言勝鬘亦云至為大乘者正會行也言故知行同者頓悟菩薩先修根本後修方便漸悟菩薩先修方便答經云汝等所行云云言四者會果等者會二乘理果為涅槃因也會二乘智果為牛車因商人擬取寶所所半路為止息故說二涅槃為趣寶所故設化城羊車鹿車為求牛車出於火宅勝鬘經云如是六法為大乘故說正會也頓悟菩薩先修根本後修方便漸悟菩薩先脩方便後修根本頓悟菩薩證根本理後證方便理漸悟菩薩先證生空理後證法空理言故知果同等者結也意言三乘究竟同歸一佛果又如四大河同歸一海頓悟菩薩先取佛果漸悟菩薩後取佛果言然法華中顯等者若准經文則教理行果皆分明若准道理則有顯會教理密會行果問法華經顯會教理密會行果勝鬘經密會教理顯會行果二經何別何故不同答且法華經以權實為宗開權顯實正是法華聲聞捨小歸大來皆因開顯實開顯實在教理上不在行果只見說但以假名字引導諸眾生不說假行果引導諸眾生故名顯會教理密會行果此中有二義一者經文分明說名顯會不分明說名密會二者經中說故名顯會經中不說名密會且經中分明說教理者阿含甚深即昔三教中三教中間大乘教下無實理反顯二乘教是權一乘是實交聽三乘之教悟一乘之理名顯會教理就一乘之理就中欲令二乘行因取果即此是行果屬他所詮理收就行因取果經文不說行因取果但說教理教理中攝得果中不攝教理於中行果亦會了所以教理分明說故顯會行果不分明說故密會三周盡是說理且初二甚深是教理大事中未聞令聞無別法體即是歎法希師有所詮理第二說能詮教第三依何等義第四令住二皆所詮理第五依法是教第二周宅中唱三車是名教門外有牛車是理理逾於教外故言門外理第三周化城是理如何言教答牛車名體俱作化城作名不作體便是教也或藥草喻品會教牛車寶所是理故三周俱說教理名顯會也問如何是密會行果處答第一周能詮之教名權方便顯會教也所詮智慧名真實乘顯會理也只向真實乘也中欲令二乘行因取果經中不說行果不說行因取果將此行果對能詮便是教下所詮理收但分明說教理但分明會教理了行果雖不說隨他教亦會了第二周長者宅中唱三車能詮也門外有三車理也車是所詮理此分明說理諸子門出事須行行行行方能出門門外便上牛車長者不勸行因取果但勸出門取車交出門是說教交取車是說理諸子出門是聞教諸子上牛便是分別明會理了明說教理教理會不分明說行果行果屬所詮理亦已暗會了經中分明說教理之時行果早已暗說了但會却教理行果相和亦會了明如何釋名門中四法得名支處解行果是正蓮華何故此門會行果密說耶答四法得名支處言行果是正蓮華也言此以所詮名之等者恐人錯將謂唯取真理也所以此會釋牛車亦是所詮理亦名理真亦名理言欲顯所得等者甚深難解會理有所言說等會教道場至發問會理也我意難可測至能問會理開方便門教也顯真實相理也開敷教秀出況理也依法顯會理了下法華密會行果也言密通會者此經中行果名二會二乘行果同入大乘行果隱却二乘因果名密會行果也言我設是方便密會行也令得入佛慧會果也乘此寶乘會行也上依法華顯會教理密會行果下勝鬘顯會行果密會教理言勝鬘經者等問何故勝鬘經分明說得果答勝鬘經中顯會行果者為化定性菩薩無權可捨故不要說教理真說行果小菩薩執二乘為究竟欲退住二乘去也所以分明會二乘行是令入大乘來向說云二乘行是大乘方便方之因也又二乘理果智果是大乘涅槃之因也任持小菩薩不生退轉正要顯會行果為令頓漸二悟兩類上菩薩修菩薩行所以分明說行言六處為大乘者顯會也密智不究竟苦集滅道四智之上更有一重未修作未究會智果也名向涅槃界會理果也上顯會行果了次密會教行理言密會教理者問何名密說會教理耶答經中不明說者名密也勝鬘云此六處為大乘故說也六處中初四教也後二出家受具足是行也教是行起處亦得名行所以兼教引來總會入一乘行中也此分明會教又會二乘果時理果智果相兼引來總入大乘果中會也分明說果不明說理但顯會於果理隨於果暗已會了將理對能詮教名理將對因名果故密會教理了問夫言會者令彼悟入同歸一乘可名為和會既言二乘不知何為會答先既不知設教之意今者為說故言會也若彼二乘先自知者即不執三別何須會也良為不知故會也言由此一乘據等者問二經既總通四法如何顯密不同答隨增相說也言此經正取等者因果對教便是理法兼法能詮教四法具足也此解即同能詮之教名權方便所詮智慧名真實真實中欲令二乘行因取果辨云准此即通經文也言故不違者意道不違顯會教理密會行果道理也言今此小義者指前簡別破別會別或指總合勝出分段真實三門義也言雖未動智海者即指如來智慧之海故宗輪歎如來德之因圓果滿道證神生動智海八自津演真宗而極物意言一乘之義是佛說望佛果塵沙萬德此一乘小義未動著如來智海智海屬如來或云我所知一乘作此三義解釋比於古人解解即餘故言絕於今古演法師許呼一乘為小義判地獄為大章實乃與蛇畵是龜上安毛今譯作此破錯之甚矣却是蛇畵是也言初二義者第一簡別故名一者權即簡却實則留著一簡不定性是權二簡定性問簡定性作何用答但知理極也則留不極者簡但是權則豈定性人身中理對大乘豈非是權耶第二破別亦通定性不定性也第三會別故名一者後一唯依不依不定性若是定性雖不迴心令知彼乘為極也不執二乘而為極由如沙彌若與大僧為弟子名之為小如迴心非人極沙彌縱不與大僧為弟子望沙彌自體亦是小於大僧如定性人亦非極不定可知言後一多依者此但會不定性定性之人非此所會也言明說意者佛說五乘是真示義有性無性有成佛不成佛今言無二無三有何意況故此門也言得二意樂者攝問云下有同名菩薩是他意樂中分出不言三也如言二乘會名小乘言一為引攝等者引謂誘引攝即攝歸攝大歸乘此中引攝有學無學亦有未曾發於二乘直從小果迴心向大亦有應化聲聞引聲聞令發於大乘般涅槃故問此不定性類事須引攝方始迴心若不引攝化大熟身入無餘否答設爾何失二俱有過一若不逢佛攝引則定入無餘玉石俱熟也若入者何名不定性若不入被自迴心何用說一乘引攝答有二師解西明云此羅漢緣小根熟大乘根性未熟不遇佛引攝則於聲聞乘入無餘涅槃一切法總盡故故種種方也二慈恩云種性所排事須迴來無有於下乘般涅槃者緣帶此種子自性仁賢事須迴心來世尊引攝亦迴心不引攝亦迴心若爾帶種必不向二乘中入涅槃者何要如來引攝答世尊慈悲恐於二乘中狂滯稽留如來引攝意交早迴心向大乘來如鷄破卵寧得失時而不化若無佛化闕緣力故問慈恩云汝古師許八地菩薩於大乘中決定不退否答實許若爾此位菩薩上假如來七勸若不縱大乘行稽遲此聲聞決定不入無餘事須得如來引攝向大即修行速疾也言非諸不定性等者意言退已還發決定是不定種性問何名退已還發答身中有大乘性聲聞二乘性先發大乘心後退入二乘從二乘迴心大乘也問何名唯不定性答身中有大乘種及二乘種性發二乘心修二乘行迴心向大但名不定性不名退以還發也言任持所餘等者金云即漸悟不定種性菩薩也此有四類一聲聞菩薩性二緣覺菩薩性三聲聞緣覺菩薩性四聲聞緣覺性此第四類中不攝也前三位菩薩身中有三乘性二乘行便修大乘行已經十信至第六住前身中帶下劣性種往往聞聞道大乘三大阿僧祗劫往行廣時長故要任持問任持與引攝何別答引攝令入大乘中來任持不令往二乘中去攝論云為欲任持其餘不定種姓菩薩恐於大乘精進而生退壞故於一乘任持令住勿令被菩薩於聲聞乘而般涅槃言攝居退者有云取十信前不定性菩薩今疏中意取第六住已前猶居退位第七住住不退十信第六名信不退十住第七名位不退自後不退入二乘故言恐於大乘精進者是起退心處起境也多事驚怖懈怠為體如鶖子於六十劫大乘行捨眼目等退入二乘故經云非我庸力得物之處不知往至貧里肆力云云世尊告曰十方世界中無二無三等言菩薩聞是法等者問此任持處如何引破疑又答斷疑正是任持文本論言如來為二種人正與解釋即是引攝一類不定種性二乘人變任持所餘多事及悔人二驚怖也此上唯不定性論偈結由不定種性諸佛說一乘也言三法等故者從法等無我解脫等此三皆通不定性也言所趣等者真如無差別一切眾生平等共有若約有為乘有差別故無為乘無差別譬如乳牛有種種色三乘法身本來平等所以為不定性聲聞說法華經問何故論云無二乘涅槃也今言無其差別如何和會答前約彼所證擇滅法無為不忘極今說藏性真如無別故又云四智不究竟等又云但離虗妄等問三乘法身既平等何故二乘教下無極理答三乘法身本來平等共有若約究竟極處唯在大乘教下有也故云二乘教下無極理問法性真如既等何故唯為不定性二乘說經不為凡夫說耶答疏云行雖等凡夫求趣所以不與說法華經也言無我等故者我者即是補特伽羅即我見也言有我妄謂所執也一切眾生身中總無有我先我既等所以佛為二乘說法華經問佛既二乘無我等故即佛與二乘何別答於中實別佛身中有自在我二乘身中有無我二者佛身中有法空二乘生空有此二別也若眾生身中各自有我便有自他差別彼此聲聞菩薩差別不合說一乘言解脫等者故論云謂彼三乘伏斷煩惱障煩惱解脫無異如世尊言解脫無差別三人同坐解脫床斷煩惱證理同故由此意趣故說一乘也言性不同故等者若一切眾生種姓若同如來亦不說一乘只緣三乘眾生種性不同聲聞身中有大乘性緣覺身中有大乘性故說一乘也一切眾生性若同世尊聞經成佛一切眾生總合成佛只緣一切眾生性不同世尊成佛眾生不成佛事須得他自聞經自成佛故說一乘令眾生聞經成佛也問第六性不同與第一引攝何別答有解引攝是二乘聖人性不同據凡夫具二乘性者說也言第七佛於有情者如來道一切眾生身法身性與我身中法身性無兩般平等共有我身有法身性在前斷煩惱證法身理一切眾生身中法性但知在後斷却煩惱何愁不成佛佛言我身與一切眾生身平等無差別故我身即是彼身彼身即是我身故說一乘也二者如來同體大悲悲心平等愛念一切眾生與我無異也三者我緣因中四智菩提種子生報身現行合得成佛今日欲擬交一切眾生聞如法華經生報身現行與我無異也若一性宗盡皆作佛本真同欲名同體若五性宗一全一少分有種性可得成佛約有種者方名同體意說佛言我有四智種得成彼一類亦爾由如長者遙見窮子委知是子子於長者未生父想糅云佛於有情得同體意樂言佛證真如不見生死涅槃及彼此等故疏言我即彼等若爾二乘於佛得同體意樂豈是不見生死涅槃等二乘一向猒生死故但可說言佛以悲心等觀眾生如同於己也故名同體也若爾二乘無此何名同體答即是如來同體境故從佛說之今謂心相體信佛知彼作佛彼亦自知故故名同體意樂言既成佛者即同十方世界諸有情念念已證善逝果等問有礙是色無礙是空有無不同色空念異能同者佛所同者凡凡聖既殊何為同體答割股者子噉肉者親母子雖殊情同一體悲心者佛悲境者眾生心境雖殊觀同一體言第八二乘於得者二乘人於佛身起同體意樂也二者同名菩薩得授記又是一个意樂舍利弗等云三人同坐解脫床如來有法身已斷已證已成佛我身中有法法身當證當成佛此約性解二舍利弗於佛得同體意樂如來得成佛皆因有四智菩提種子也如來與我授記道我身中有四智菩提種子也何方亦成佛耶前思念法身一性宗義言我等與佛平等者舍利弗昔言金色三十二等不同今言我定當作佛故言我與佛平等言與彼名同因得者佛本來與舍利弗授記交作佛會中有小菩薩與舍利弗同名見鷲子得佛授記彼一類菩薩亦於佛身上生授記意樂心亦名得同意樂又諸聲聞有與舍利弗同名見佛與舍利弗授記諸同名者便道佛與我授記於佛身攝得同身體無二意樂故於樂佛授記故佛一言含二種益如起王共便白作謎請王謎謎云頭長一分肩長數寸到臍時早打兩頓白謎誦前者王曰何學朕語白請破朕謎道人白云阿摩謎此言同而意別舍利弗作佛此言雖同其餘言同名未必作佛此即意別但今得同體意樂不倦修行言世尊說至般涅槃者則云此上文正是疏主釋論意非正論文言化故者即為教化聲聞故說一乘故名化也佛告諸比丘我憶往昔無量百千返於聲聞中般涅槃潛形密誘化有諸聲聞大乘根性未熟故先修行趣無學果或於佛像法中修行得阿羅漢果已後事須迴心受變易若不迴心受變易此有分限即須入無餘涅槃世尊於淨土中觀見便化作聲聞於此實聲聞中作上根利智人在前化火焚身入般涅槃纔待實聲聞欲入無餘涅槃便却現身出來告諸人曰汝知不無餘涅槃一切無事令諸聲聞盡作是念往昔耆尊般涅槃者今來再起一性宗指此文是實計一切聲聞入餘却起後成佛五性宗便是化也言即為調伏所化者前標中直言佛化今釋中兼加菩薩也故疏言佛菩薩等言躭三昧酒者問既無身智何言三昧酒答論中既許有清淨真如寂滅安樂由如定故專住所緣酒如三昧酒喻之於定此對異宗設許無餘中有如是事乃要此通若望自宗示入無餘以此通言三昧酒假說之也言如是亦為降彼者即降彼卑慢若佛不入彼之涅槃即是不得入化二乘之法便彼計言如來多分勝於我我少分不如只為不得我之涅槃名為多分勝也言實入無餘涅槃者論云現苦所依任運滅位餘有為法既無所依與彼苦同時頓捨問有漏種子第八親緣識若斷時法何在如人身死屈申威儀隨滅有人寄金金何所在答人死金亦失也更解云影依於人無影亦隨無功功依於識有識斷功功亦滅也論云此位唯有真如離相湛然寂靜安樂既言有等故無身智法也問爾時既無二乘身智誰證無餘涅槃論云爾時雖無二乘身而由彼證可說彼有言十究竟故者究竟故者究竟畢竟義偏舉真如是一切有為中最勝佛意與真如在一切眾生身中最勝故說一乘也此乘外無別勝乘若此乘外更有諸乘此乘亦不名究竟也若將有為對無為三乘無為理總名勝今約總勝道理說唯有一乘真理殊勝餘二乘非究竟也涅槃云若有一法過涅槃者我亦說彼如夢如幻今此一乘亦爾是乘微妙清淨第一於諸世間為無有上言依理究竟者此約果中無為理或可前同有此幻無上或約真理道理皆所證法二皆究竟也潞問第十究竟與前法等何別一種是真如答前約一切眾生真如與佛平等共有此舉眾生身中勝者不舉劣者言此會中者問攝論十義說於一乘何故法華論中義不足以法華會亦說一乘答疏言今此至記別故不足也問若為二種人記十義中何者是二種攝答疏云一不定性等言為不定性者准大論即當退菩提心法華經正為不定性人說於一乘十義中第一引攝一類即悔驚怖為第二任持所餘即多事驚怖言為應化者即第八九等者此論當攝論十中三全一少分三全一分三全者第一第二第九應化少分者第八分也即第八中取聲聞除彼同名菩薩也問第六性不同具三乘種何故此經不被耶答此經所被約授記者說所以不攝第六問若言與受記即攝者第二多事驚怖菩薩此經不說授記何故即破答疏不定性有二一者已行大乘行而欲退去為說法華即多事驚怖也是以經云聲聞若菩薩聞我所說法乃至於一偈皆成佛無疑二者雖有大乘種性未行大行佛未與說即第六人二云若分明與授記即據第一第二人說若奄含總相說與第六人記亦不妨也第七佛於眾生得同體意樂此全不取也第八中唯取二乘於佛得同體意樂故說一乘不名取同名菩薩記歟也授記名第八少分也言及餘少分者除第一二第八二乘於佛得同自體意樂及第九餘之六義約少分義即是身中解脫是一戒法等無我等性不同約此少分義同處總合說一乘也言非全撥無定性等者若論顯了說一乘十方世界有二有三今且對不定性人十方世界中唯有一乘法無二亦無三若兼定性人則項有三乘也此一乘是密意說也言解深密至相生者相即遍計性生即依他起性勝義則圓成實性初相無自性性謂有凡夫強執增益我法自性恐不能斷故佛密意說不簡有性無性總道是無無者無其遍計不無依圓第遍計相分妄情而有故云相無自性性向上性字是無向上性字是無向下性字是有有彼空性二者依他起性生無自性性依他法仗因記緣名生無自性也上性遮無無自然生性下表有有從緣生性三者圓成實性勝義無自性性若執圓有成還同遍計無上性遮無無所執性下性表有有離執之性又云品於此三性立彼三無性若通三種無性便是我法皆已顯示言依諸淨道等者即以能斷二障無漏聖道名淨道言故於其中等者其中即是法華經勝鬘經中說也言立一乘者即是唯有一乘法也言非有情性等者十方世界中定性不定性有無性總合說有故言非無差別所言唯有一乘無二無三者是佛密意若不知佛此密意失壞三性之正道不能往起菩提涅槃言涅槃言者第三十五云善男子於經中告諸比丘一乘一道一行一緣能為眾生作大寂靜言一乘者唯有一乘無二乘一道者唯有一乘所行之道一行者唯有一乘所行之行一緣者唯有一个成佛因緣乃至我諸弟子聞是說不解我意於大乘中唱如是言須陀洹人至阿羅漢皆得成佛即對有性非無性人也言故應但如此者結涅槃經也言今此十義者結攝論中十義也言法華論中無者已下結法華論本論中只有第二第八少分及第九故云無此具足之言言顯等揚者問為復只法華論說一乘為復更有諸論亦說一乘耶答疏云顯揚等章敬云一者即彼諸法無差別相說故二者約無差別行相說故三者眾生無我及法無我平等故四解脫平等故五善能變化住故六行究竟故以六十即當三七四五九十也言莊嚴論八義者彼論解云法無我解脫同故別故得二意樂化究竟說一乘乘引攝諸聲聞攝住諸菩薩於此二不定以性聲聞菩薩名不定諸佛說一乘疏主但依莊嚴論云前之八引義來不引後二義故言八義說於一乘故不過此十故不敘之也言第四差別者此說一乘與勝鬘涅槃經說所一乘差別之相三本經辨差別相將法華總對勝鬘涅槃為論非餘二經一一相對辨也有六重言此通理智者一此經理智為一乘即法華經彼唯佛性為一乘即涅槃經經云一切眾生悉皆有心凡有心者悉皆作佛言此唯攝入者此經與勝鬘辨差別經云我此九部法隨順眾生說入大乘為本即以破二會二會二名攝入有人言此經亦通出生經云於一乘道分別說三即是出生藥草喻品一雨潤三草二木生長不同出生也答此盡是攝入非出生耶於一乘道分出三乘元來對四十年前根也後大乘根熟却會入大更無別體藥草喻品天雨是一會教也三草二木生長不同傍破頓悟菩薩病亦是攝入非出生也彼通出生者勝鬘經既有通字義含兩勢少分攝也入若理定性其實不無今對不定性人言無是攝入為以攝入故有乘同病生也言彼通出生者勝鬘云摩訶衍者出生一切聲聞緣覺世出世間所有善法如阿耨池流出四河又如種子皆因依於地而得生長如是一切聲聞等善法皆依大乘而增長此上名出生問彼說真理何有出生答以流出十二分教故既言通者於中亦令攝入言攝入者謂佛說六處正法住等為大乘是攝入義四智不究竟等也三重言此唯有性者言有性即法華經唯取有性故言唯也彼通無性即勝鬘涅槃經云總得成佛不解我意總不成佛亦不解我意方智有作方解我意勝鬘云譬如大地持四重擔喻有性無性四重言此唯不定等者言不定性即法華言定性即涅槃勝鬘此二經皆通定性五重言此多說教理者即法華經言彼多說行果者即勝鬘經問何故法華對無量義經法華多說行果無量義經多說教理今將法華對勝鬘即云法華教理勝鬘多說行果耶答此法華經若與無量義經相對即法華經多說自利行果名蓮華無量義詮為定性頓悟菩薩說多取教理以解蓮華也今將此勝鬘者緣此法華經彰昔權今實是以多說教理勝鬘不論權實普為定性菩薩多說行果又前法華顯會教理密會行果勝鬘經顯會行果密會教理六重言此說一乘為實等者即法華經也彼說一乘為權等者即勝鬘經四乘外是實一乘是權彼隨意欲方便說故是權也言與無義至如釋名中等者是彼處將法華與無量義蓮華五重問答彼處疏言法華既爾一乘亦然意道今此將法華一乘對無量義一乘問答道理亦爾亦有此五重差別問答理也問意彼將第十六名蓮華與此定後蓮何別答有五解一已出未出二所依能依別三體用四教理行果異五二法四法別問彼說蓮華何開一乘答彼疏云蓮華既爾一乘亦爾故此指也言及第五問答者即指法菀中第五問答門也彼處廣解章敬略引一二者問出體中說二乘法名為方便者人天亦二乘之方便何不說耶答二解一云取二乘無漏法而為方便非定性人天故二云定性人天非小乘方便故不取也不定性人天乘亦得名方便故取義有別不相違故問教經行果但是一乘體為同為異答一雨普潤教同根異三獸渡河理同證異六處大因行同修異三車誘引果同設異或同或異未可准定也經云舍利弗如來但以一佛乘故至若三者勸二乘人向一乘中住交捨二乘權取一乘實悟法身報身性然後勸令來住一乘因果中之也所以詮言若眾生住於二地如來爾時即便為說汝等所作未辦汝所住地至真實滅又言十方佛土中唯有一乘法無二亦無三又道一切諸世尊皆說一乘道今此諸大眾皆應除疑惑諸佛語無異唯一無二乘言從勝至劣者疏主義三乘中從勝至劣數菩薩居第一緣覺居第二聲聞第三經無二者無覺緣乘無三者聲聞乘古人依修習淺深次第從淺至深數聲聞人證理最淺居第一緣覺人證次深居第二菩薩證理最深居第三或聲聞人三生六十劫修行易故居第一緣覺四生百劫修行次難居第二菩薩三大劫修行最難居第三古人意無二者緣覺乘三者兼無大乘也言依法中經言舍利弗十方諸佛法如是者恐聲聞人作念我既有大乘性何故世尊不與直說大乘何故先權後實說耶答我依三世佛法式問何名依法答疏言顯今釋迦等問薩婆多不許十方更有諸佛經擬三乘如何令解答有三因一眾生發心同故量云他方界中是有法定有佛性出宗因云眾生發心同故喻如此界界眾生能發心二云他方世界是有法定應有佛出宗因云許菩薩行滿時故喻如此界三云如薩婆多云知足天上有無量菩薩行已圓滿相續下生次第成佛者不然不應道理故不應理者行因本求成佛行滿即證佛身如撥弩牙本欲發箭弩開箭即須行未有弩牙齊發箭待相續而飛未有道行齊圓菩薩相看取果彼執化身以為報佛故招此難若准大乘有感即赴何當坐待時也成立十方佛了然後即先權後實也此段經文古人科屬前令住結文前經言舍利弗如來但以一佛乘故為眾生說法無有餘乘若二若三便向下結云舍利弗一切十方諸佛法亦如是文勢相承也若屬依法者三世佛式向後始說十方此間總未說如何言法亦如是後唱又云舍利弗現在十方無量言語豈不重耶答疏三解此唱經文合居前唱中論科三世法式中不引此十方故屬前唱二云前言舍利弗如來但以一佛乘故為眾生說法無有餘乘若二若三後唱指唱云舍利弗一切十方諸佛法亦如是三云夫言亦者必亦於前三世法式總未說如何言亦雖有此解且如疏主科入依法中必有別意若如此則一切十方諸佛法亦如是言亦當唱也但屬向後三世佛法式為正況論不引指屬第四論亦不指在第五何乃偏責故無違教問十方之中已攝三世何故離此唱十方外別開三世耶答直言三世攝法不盡十方者則約處橫而論之三世者約時竪上下也為緣三世遍在十方十方亦三十方之中有三世三世中有十方若直言三世不言十方將謂是一方中三世諸佛若直言十方不言三世將謂唯是一世之中十方諸佛今將此十方與三世總說攝法盡矣即是十方中三世三世之中攝十方言雖離等者立理通難也橫為十方竪分三世也簡要云十方名橫以一剎那得並生故三世名竪以剎那不並生故問經言佛身無為不墮諸數如何此處說三世耶答據實佛身非三世攝以眾生心有生滅自見有三世隨彼眾生情見說將能化佛佛就所化說故通三世也言攝大乘等者意破小乘宗有部十方三千世界界唯此界中獨有一佛也有部宗不信有十方佛今引攝大乘證有十方佛及法式皆同也然攝論中唯說練磨不說退屈論第九云一聞無上正等菩提廣大深遠心便退屈引他已證大菩提者練磨自心勇猛不退廣者無邊大者無上深者難測遠者時長偈言十方世界諸有情念念速證善逝果彼既丈夫我亦爾不應自輕生退屈萬行難脩屈偈言汝歷惡道經多劫無利勤苦尚能超小脩勝行得菩提大利不應生退屈轉依難證屈轉地凡夫初發心尚擬趣向菩提果汝已脩習經多劫不應退屈却沉淪也念念脩行成佛亦無量故知有十方佛法式皆同也言初以種種因緣等說者等者等譬喻言詞也言猒苦離苦者小乘人觀蔭界入者依五薀十八界十二處處者入也化度云初加行道唯猒非離無間道亦猒亦離解脫道唯離非猒故小乘人猒苦離苦名方便也言大乘中至自等者大乘依六波羅攝取自身對治法故四攝法攝化身利益眾生對治法故四攝法攝化身利益眾生對治法故名方便言唯有名字章句者意言但以侵名字等以三乘同一真如二乘涅槃無體如是意趣實難知言以彼質義等者二解一者三乘中大乘教下所詮理性離言故不可說也二者二乘教下無彼真實道理名不可說也因緣者道理義三乘權實道理故名因緣二者只乘法便是因緣二者只二乘法便是因緣即入大乘因緣也言譬如依牛者牛膓中含乳性凡夫身中含佛性佛性在凡夫身中被惑障所覆乳在牛膓被血肉和雜二從牛出乳從凡夫中脩行作聲聞佛性在聲聞中猶知向乳位中三從乳變為酪從聲聞練根入緣覺酪勝於乳聲聞劣於緣覺四從酪成生蘇從緣覺迴心成地前菩薩五地前菩薩如生蘇地上菩薩如熟蘇從熟蘇成醍醐醍醐如佛言諸聲聞等者亦同者問牛乳是一未審三乘法身同否答疏云諸聲聞等言一切種即佛正智便唯根本便為後得智經之與疏全是乖張亦違他根本智為牛後得智為車也今解經言種智必兼正智正智必兼種智也互影彰也言饒者利益也安樂者與樂也言拔苦者名饒益與樂故名安樂與智故名饒益與福故名安樂與世間果故名饒益與出果故名安樂與小乘果故名饒益與大乘故名安樂言所為眾生究竟者欲令四生入佛知見道故所為眾生究竟但教化菩薩令得一切種智此上結前十方佛法式問現在中已言十方何故前說十方不許結前令住答今者除十方無有現在故傍十方為所依前離三世又說十方傍正有殊不可為難也言往因發心者問佛本來文交眾生得開示悟入何故四十年交耶聲聞果又何故與他說九部法答先雖是聲聞元來為菩薩先雖說小乘元來為大乘所為中二意一所為人皆得作佛二所為法皆為種智故言經文無開者疏主破古人言依法文中既闕却開四義之中應闕教古人却難疏言依法文門中既闕開四義之中應闕總疏主分疎第三番經文云無開以總義故開者總義也攬別成總開總成別問既開者是總義此間不說開莫於義闕少耶答示悟別顯二果已周更不要總所以此間不說也但舉著示悟雨法一切功德無不攝盡也言示義如前者問何故論主更不解示佛知見答已向前早雨番解了以彼無為理無差別故悟佛知見有為法相差別故事須勸脩故三遍總說經言舍利弗我今亦復至一切種智者嘉祥云若不信釋迦之言則違三世諸佛教罪之大也若信釋迦之言則信三世佛說福之深也經言有種種欲欲者愛樂義欲樂即勝解智力知也解勝於境欲勝解也起勝解解印境決定而生印持名勝解也如來勝解智力知也簡要言勝解屬有情有情於境隨自情欲得決定故佛智知此名勝解智也言遍趣行者簡要言者佛智趣足行一染行行二五趣趣三異見趣四無罪趣行於趣行佛智悉能遍知名遍知趣行智力一一行中復有多種故云遍言種種界智力者隨其本性即如來有種種界智力知其本性界者性義知諸眾生有三乘性五乘性言界欲所修者界即性義牒前隨其本性種種界智力知也言初說三乘為方便等者出先權後實意皆為眾生得一佛乘一切種智言上文皆言者指十方三世佛法式也言故知種智者破真如為一乘種為一乘不唯理故名不破三也經言舍利弗至況有三者古人從劣向勝三乘總破疏主意從勝向劣但破第二第三不破佛乘也言由此經云羊車至火宅者問向下經言若有眾生內有智性從佛世尊聞法信受慇懃精進欲速出三界自求涅槃是名聲聞乘如彼諸子為求羊車出於火宅乃至鹿車皆如此彼處說三乘人各自出宅取自乘果車何故此間羊車鹿車是求牛車因耶答所望不同彼處約三子本心說各自出宅取三乘果車此間談長者意也本來與小子羊車與中子鹿車只從上牛車故與牛為因疏主引羊鹿為因正破古人破三也問前來破二中破二乘有餘涅槃無體此間遮何涅槃此間遮二乘中無三事涅槃唯佛獨圓反顯有理非極言故論云等者無二乘涅槃唯佛如來證大涅槃究竟滿足言一切智慧者即三事涅槃般若是智慧相攝相歸性名智慧法身是智慧性故名智慧解脫是假攝假從實名智慧言一佛乘者即是智開示悟入此間遙指三事涅槃向作上四種知見義解也彼經摩訶般若即開佛知見三事中法身即示佛知見三事有解脫即是悟佛知見此三事是所得果此經入佛知見即是因也言論以與授記中等者緣前來歎法師功德中有五何是徵詞疏主此六段文中唯除依法餘之五段答前五何世間何故除依法答緣釋迦今日也說法先權後實准知過去未來佛法式皆如此所以五何中不問依法也以三世法式更無有涅槃前來五何是徵詞此中五段文是答詞言何等法者謂來聞未曾聞底法今日聞也言云何法者答謂第二說種種因緣譬喻言詞方便說法即先權後實名云何法言何以法者答謂前第三依何等義四十年前說有三乘今日法華會上說有一乘以之法所詮究竟法也言何相法者未審何相實是依何義法否答謂第四令住無二無三唯一乘隨大乘根性熟眾生令修行云何相法言有於佛性者理行二佛性一乘之體兼性相故若唯理性何待言成此言相者理行二性之體相言何體法者未審令住之法以何為體答第六段遮遮無二體唯一乘體即是如來平等法身名何體法也言遮無體者無二乘中法身故言平等法者約迴心後究竟言之二乘侵擇滅六無為中前五名體俱侵故非得平等言三乘因果者問諸佛如來法身三乘平等共有何言三乘體不同答疏言三乘因果菩薩若約無為法即同若約有為乘因果觀行不同遂有差別所言遮無為涅槃不遮有為乘故云非此所遮且因不同聲聞三生為因緣覺四生為因菩薩三大劫為因故因不同者前三有學果後一無學果緣覺頓得菩薩十地有十王果乃至如來菩提果名不同觀行不同四諦緣生菩薩三性無為觀行不同也言遮無二種法身之體者聲聞緣覺法身名二種法身體也若約法身不妨三乘平等也若約真實至極之體二乘則無也言非謂遮無二乘體者即是生空有為功德是二乘體此亦不遮所言遮者二乘中無法身及三事涅槃也言以此義性者即是疏主作此五何問答所以易解故若不作此解論中盡著不配經稍隱難會也問第六遮與令住何別答自有別令住勸教住大乘遮者不交向二乘中住所望各別也攝云問經言無二乘論言遮體之義亦得通於有為何以言中唯依於理答此經上下非本有文然不分明案薩遮尼乾子經第三云佛說三乘者依世俗說說一乘者依第一義諦說唯是一乘更無第二彼經既爾此經亦然言第二段破四種疑者是論家科文也經文無四疑文疑詞在經文外論主徵起著將四段經文答也言一何時出者二初標經言舍利弗諸佛出於五濁惡世所謂劫濁煩惱濁眾生濁見濁命濁二釋所由如是舍利弗劫濁亂時眾生垢重言二云何知者經言舍利弗若我弟子自謂阿羅漢辟支佛者不聞不知諸佛如來但教化菩薩云云言三云何堪說者功迎入林并不才之木云云世尊化得增上慢可成堪說法世尊化他增上慢人不得如何堪說法經答言除我滅度後現在無佛所以者何佛滅度後如是等經受持讀誦者是人難得若遇餘佛於此法中便得決了餘佛者即是彌勒彌勒教化慈心亦名我教化問彌勒教化如何釋迦認化教化徒眾為自家弟子答約平等意趣我與彌勒法性同故身上功德無異說法無異彌勒即我身我身即彌勒言四云何不成妄語者四十年前說三乘說三若得三如來不成妄語說三之時唯得一長者足成虗妄語四十年前有三乘言陳之中說有三意許之中唯與一言陳之心是侵心以不得乘長者不成虗妄語法華會上與一乘意許之心是實心實心許一得其一長者不成虗妄長者宅內許三車出門唯得大牛駕唱三不得三唯約一三子同上大牛車趣却本心非虗妄經言舍利弗出於五濁惡等者問前來三世佛及現在佛盡先權後實說法為復一切時中佛出必須先權後實說還有不說耶答經言舍利弗諸佛出於五濁惡世事須先權實後說也若淨土中出必不如此也言濁者滓穢事者段食以香味觸為三體而不取眼所見色唯非是取銷化香味等資長諸根發識明利餘滓穢者非是食體滓穢等乃是下惡糞穢糅云如食入腹分三者為脂肉中者為涕唾下者為滓穢等言劫增之時三交漸輕者明無五濁無劫濁也言煩惱轉薄者無煩惱濁也言眾生向者無眾生濁也言惡見漸微者無見濁也言命根轉長者無命濁也住劫二十有宗初唯減後唯增中間十八亦增亦減若爾云何得成二十答俱舍云初人福勝減遲劫末人福劣增遲故歒中間得成二十言諸佛出世者顯有五濁化佛出必向減劫言小交漸起者有劫濁問何時起答二十增劫中每劫減至三十飢饉二十疾疫十刀兵起問三界中何界有答唯欲界有六趣中人有非天趣以天趣清也四洲中唯南三洲有北洲無就三中東西二洲有相似濁無上五濁南有正濁就南洲中劫增無唯劫減有從八萬歲但減一年二年是濁收何以如此答緣漸漸向惡故未必有濁從十歲劫增增至一年便是清不名濁以漸漸向好故今言五濁者據極重說也言煩惱轉厚者有煩惱濁也言眾向惡者有眾生濁也言染見漸盛者有見濁也言命根轉短者有命濁上總名了言皆持業者劫即濁煩惱即濁眾生即濁見即濁命即濁五皆持業者劫即是濁劫是體濁是用言以別簡總者劫是別濁謂是劫家之濁劫之依主也或濁之一字是總名也即此濁是劫家之濁以別簡總皆依主也言地持論者即佛滅度後九百年當時人極壽不過百歲言今世者指當初造論時故言今世人也言多皆者極壽百歲故名命濁也言此以本識等者即第八根本識為界趣生體譬如樹根是莖等依本偈亦言依止根本識五識隨緣現或俱或不俱如濤波依水言本字簡前七識識之一字簡心所言名言者二字簡善惡業種種言種者簡現行簡言由業所引等者識種向上有二功能一生現行功能名總二連持色心不斷功能名別今取此業所引之別功能若是持戒業感得識種向上長命功能若是煞生業感得識種向上短命功能命取短功能為命濁體問命之長短必藉現識如何命濁體非業及現行答業是傍招感了更無作用本藉識種生故業及現行不取為濁體若爾許無作用可言不取既言傍招又藉種生應取能生功用答種生現行以即不常種乃任持一期是取為命體若爾果生感了用無業種名為有盡名言現起用無名言應非無盡答名言遇緣即起種子名為無盡業種感了用萎是故名為有盡若爾新業感名言用盡名有盡名有盡定願資舊業種子是無盡答名言再遇緣親辨果體名無盡故業雖熏發疎與力故名有盡准此一期色心種如發心和上能生現行功能如剃頭和上速持功能如依止闍梨皆依種子上次第說文言善業力至所感者人天身事須善業力招感但一剎感了更不管向上相貌好醜壽命短長須是別報業也若是持齋持戒別報善業力強感得識種向上長分限如今善業見被煞生業間雜令善業力弱煞生業強故感得命根向上短分限名命濁問何以能知煞生命短答金光明言不害眾生及施於飲食由斯二種因得壽命長遠此說別報由煞感非言總報也以人中總報招故問若短命濁者地獄命長應非是濁答地獄中雖長一日一夜萬死萬生由斯義故亦得名濁言不識父母等者非眼不識但不知恩德不生敬心即名不識言不識沙門者不知有大利益有戒定慧息惡之義言婆羅門者淨行義及宗長族尊者同姓為宗不姓為族此但約一義增勝處說若約別義說同姓亦得名如世七族九族伯叔之類名尊兄弟之類名長宗者本也尊也唯取同姓春秋云同姓宗盟異姓後族族類也種也本同根攝分流有殊如胡與陳王與郭等春秋云非我族類其心必異言不修義理者義謂義利理謂道理不修人義禮智信名不修義理不怖不畏今世惡業同不怖不畏後世惡業果名有情濁言雖第八識等者論云此識定為界趣生體大論云謂諸賢聖如實了知唯有此法更無餘故問有情即第八識何故取五薀假者為有情濁耶答今說由近惡外緣所造不善業是五薀假者故舉五薀為有情濁若出有情體唯第八識若擬立濁事須五薀身即一薀身即一薀五薀種現別也言增非法者不念起處起貪簡要云二意一云惠他刀劒遣人煞生共他分食二者謂於自身慳惜錢財不施人刀劒器仗亦名非法貪言攝受耶法者耶人教法外道教法故言除見五者若爾前言攝受耶法耶法豈非五見答彼意言因煩惱方能攝受取彼煩惱不取所指之耶見言此非法貪者今詳三乘善法欲有類於貪異此總名非此法貪俗解云富與貴是人之所欲不以其道得之而不處即名非法貪也言性數習者此即起煩惱緣雜習有三一者一切煩惱隨眠未永斷故二順煩惱法現在前故三不正思惟現前起故大論有六一由所依故即種子二所緣故三親近惡友故四耶教五數習六作意即不如理作意也三相攝三中第一攝六中第一第二攝六中第四第三攝六中後一言法壞法沒者問法若壞沒佛寧出世若不壞沒何名為濁而言佛出五濁耶答二解一世間人義禮智亦名正法如此正法不行名法壞法沒問未法壞法沒時早有邪見如何事須待法壞法沒時方立見濁答約增相說亦約極處說據實佛在日諸外道等種種邪見亦合名見濁以佛在日邪見相不增故也今約佛滅後邪見相增處名見濁也法壞法沒其實亦未沒若實壞實沒直至當來人壽六萬歲時也言像法漸者辨云非是正法像之像正是像似法相似義邊名像假託三寶誑戒生靈漸之時當爾之時即名為見濁今詳前佛所有正法並已壞沒像似之法漸漸而起乃至未諸等並是邪見轉盛之時九十六種外道漸漸而多此時如來方出於世如冷荼社是也剃頭披袈裟邪生見故言飢饉劫等者問三災何時起答初從八萬歲減至三十歲遇飢饉劫由生猒心暫時不減又造惡業不息後還劫減至二十歲遇疾病劫減至十歲遇刀兵也問何時止答俱舍云刀疾飢如次七日月互止爾雅言糓不熟曰飢菜不熟曰饉菓不熟曰荒暫曰疾重曰病夫子有疾子路請禱刀兵者刀體則是兵故老君言兵者不祥之器聖人不得日而由之即弓刀戎戟等並名兵也劫濁有三種受用退減一飲食受用退減不識粳粮粟麥唯食稊稗等二衣服受用退減不識綾羅綿綵唯衣毛褐唯有䥫木無金銀等寶三所依受用退謂身形短小極長一尺圍有六寸言此以色薀等者尅體飢饉疫病唯五境中觸處假色為體二眷屬體者謂三災起時第一飢饉劫以觸廣為體第二疫病劫亦以觸廣為體若取非人吐氣兼能吐毒氣有情通五薀第三刀兵體者金云三災俱通色薀然刀兵色香味觸四塵為體餘三災唯解塵收若兼能持刀劒人亦通五薀為體飢病觸塵為體言眷屬通五薀無色四薀色界五薀立問災不通無色劫體寧言四薀答以飢等屬劫故今辨劫不言飢等假如五薀即得通上界也問此三災人死而生何處答起世言飢饉死者多生餓鬼疫病死者多生天上刀兵死者多生地獄言對治者古人解悉者通也壇者施也通以諸法施諸有情此非也言悉壇者宗也瑜伽云梵言應悉壇多也智度論云悉壇略也此間疏文依智論云悉壇悉壇者宗義四種法所宗各別一一能對治五濁也此總攝十二分教經八萬四千法藏言一世界悉者簡要云則是治所猒境言二各各者即是正所治病言三對治者則是能治之道言四第一者即是所證理言劫濁眾生濁者世界者則世間之異名世間有二一器世間二眾生世間若劫濁則是器也世間悉壇治之若眾生濁即是有情世間悉壇治之一个世間悉壇能治二濁令誠知器及眾生猶如於車轅輻輞軸眾緣和合而有故皆是假和合成立令眾生知不於器世及有情世界而生貪著但能識知世間是約則永離二濁劫與眾生二種別故離眾生濁時亦離劫濁也便能進善破惡生於淨土言猒怖等者化度云施食免飢施藥免病起悲免刀隨應治之離三災也言苦為人悉壇者能治命濁攝云所化眾生根性不同別別治之故名若多貪眾生不淨觀治之多嗔眾生慈悲多癡因緣此有三種凡夫有漏善得有漏果得世間長命治世間短命二三乘人修出世間善感得無漏果得出世間長命治世間短命言識知者善業能於人中總報果行不煞等即別報命長意云由為說彼人天乘法方能知識由善業等招故說為彼對除等法言煩惱濁見等者有漏道無漏道為能對治對治煩惱及濁不起正得對治之名問前二悉壇何故不定對治之名答糅云前二但是對治之方便今此是無漏聖道真是對治也言便除生死者此據離分段生死名命濁若變易生死命非濁故言修習隨應者如貪行者作不淨觀治之等又分別者見道智治之俱生者修道無分別智治之言由悉壇破等者謂一切法法性離言不可分別名第一義言癡立者牟尼云減是癡不減名立或可不意業名癡或苦立故名立癡則不用立則存著也言何故唯立五者問意何故不增至六減至四唯立五濁耶言答眾生有二等者一在家俗人根鈍故身中所起煩惱總名煩惱濁二出家外道根利故身中所起煩惱總名見濁約人說也言又諸鈍惑等者如貪等名鈍見等名利大宅中鈍配恠鳥毒虫利配靈神異鬼約法說也言由此二因等者攝云能感之因有二共招果名合也所感果分內外則名離此解因上說離也此是諸抄盡作此解今者離合皆向果上說也離者內果外果名離也合者內果唯一外果亦一名合也次下解離合據因有二內外之果亦合有二由內果合故但立二眾生濁由外果合故但立一劫濁也所以分明言得當果時離合不同故合字不得向因上說也言二內果者令彼二因所感內身之果煩惱及見名二因合二因共感一介內果名眾生濁合二因共感一介外果名劫濁果體是一對二因說名合不同內果各別名離不同牟云煩惱及見但是其或因或造業方能招彼內外二果言劫謂時分者通難難云劫既是時如何取器界以劫濁答疏言劫謂時分等言此惡眾生者結前眾生濁言及與外者結劫濁此上別結也言雖復總陳者即是眾生濁劫濁合結也言未辨者問何名命濁答疏言未辨何者等此三眾生濁劫命濁是果煩惱濁見濁是因因之與果故立五濁更增減也言或內惡果等者此二是惡果向前煩惱濁見濁是惡因由有此惡因果故立眾生濁無增減也言惡因果者第二解也鈍利二惑所感內外二種惡果由誰而有即是眾生也苦諦身中造集諦故言由此五濁據等者問有聖教說十二濁此中何故唯五耶答疏言由此等結前五種不增不減意今生猒故亦即生後問答之由答中二意一義不得立二立亦無失言問何故惑等者意言何故惑業苦三皆是障開或為見濁煩惱濁耶又苦果向上開三濁眾生濁命劫濁俱是苦果向上立也何故業亦是障收不立業濁耶答疏言答障是礙義三種總是障總能障聖道若論濁者滓穢義微故不立濁也微由小也隱也無也唯有障義無滓穢義故不立濁言又劫中等者刀兵互相煞害死入地獄由冥起此惡業亦即業濁問何不立業濁答據實理業是刀兵亦合是業濁三之中唯攝得刀兵餘二不盡今言劫濁三皆攝從寬為名但立劫濁也言亦無爽者意道立亦得也簡要問未知何業生此三中若經中說奪他飲食不矜貧苦生飢饉劫中見病不救生疫病劫中好煞眾生多生刀兵劫中人心最惡草木化成刀劒也言相攝者問薩遮尼乾子經說有十二濁此經說五濁相攝如何答疏言薩遮尼等問何名十二濁答薩遮尼乾子經說他受用淨土有十二種清淨化土形對他受用土無處便立濁也不同他土中此十二種事彼說名清淨即說此化土中中名之為濁言示現者此十二種中皆有示現字有二意一者濁本來有眾生不知佛曉示令知示者曉示現謂顯示現也二者此大小化土望佛所居純淨無漏假現穢相所變同能變若望如來說總是無漏為教化眾生或淨或穢皆是示現有也劫名濁經言諸佛出於五濁惡世又云劫濁亂時眾生垢重淨土中無三灾唯清淨化土中有三灾劫故立濁也如來示現令眾生知名示現劫濁也彼經言彼土眾生畢竟能清淨劫故離諸劫濁言示現時濁者化土中有三灾化佛法不行故失時節故失者拋擲義三壞時不可說法化人故名失時不如報土中無三灾一切時中常行教化名不失時無時濁也問時劫二濁何別答此二雖同然據劫減即名劫濁佛法不行名為時濁也經言彼土眾生畢竟能成最勝妙時諸佛說法不失時故牟云報土既無劫濁一切時中常行教猶如人言不拋於時化土中既有劫濁三寶起已不是如來說法時名失於時猶如人言枉棄時日名為失時言三示現眾生者報土中唯有大乘根氣一生補處菩薩聽受正法無有忘失故不立濁化土中有三乘根眾生差別惡生難化故名眾生濁經言彼土眾生畢竟能成勝妙法器受佛受無眾生濁言四示現煩惱濁者淨土中菩薩煩惱不起不立煩惱濁化土中眾生起煩惱立濁二化佛為愛語羅睺叱呵調達佛菩薩示現有也言五示現命者報土中菩薩命自長遠不可計數化土中非想地極長八萬劫對淨土亦名壽命短促故無命濁也言六示現三業差別濁者淨土眾生能成最勝妙乘能以一乘證於佛果化土中有三乘差別故立濁也言七示現不淨者淨土中無有不淨砂礫等相純淨無漏所感故化土中螺髻梵王見此界如自在天宮舍利弗見如瓦礫不淨相言八示現難者淨土中菩薩如調慧馬觸毛即能隨順故不立濁化土中如提婆達多善星比丘等眾生難化故立濁也經言畢竟能成如來正教無諸一切外道邪法無難化眾生濁言九示現說者淨土中眾生無諂曲離於煩惱無種種煩惱濁化土中煩惱通於不善性有覆性言十示現外者淨土中眾生畢竟能成無垢功德離於外道亂濁他土中此間火秡呼煙反木護名外道若論亂濁則是西國九十六種外道互相非行名外道亂濁也言十一示現魔者淨土中唯有菩薩畢竟能成諸聖人法其中常有勝福田眾無魔濁也化土中第六他化自在天子常造惡業破壞正法名魔濁也言十二示現魔業若直說魔即第十一魔濁若更起作申障礙佛法即是魔業濁彼經言彼國眾生畢竟能成勝妙道場過去諸佛於中成道不同化土中欲成道時菩提樹下有魔業濁也攝云第四煩惱濁第九種種煩惱濁總別已弘第三示現眾生濁第八難化眾生濁望善法器及離惡緣以為差別上引十二濁下可釋前所由之也言皆是出世功德者問只如釋迦佛所居即合是淨土何故住砂礫等穢相耶答此是諸佛方便示現而有問既是方便示現而有何故立濁答望眾生業力所成名濁若約佛名示現亦不相違唯識云無漏識上所變現者同能變識俱善是無漏有漏識上所變現者同能變識皆是有漏此說影像若據本質如來所變盡皆無漏隨彼十地菩薩五八識及七地已前有漏之心菩薩後得有漏心所變之者皆是有漏今約本質故言皆是出世功德等問無漏之識所變土相望三料法為異為同答論云薀等識相不必皆同三法因緣雜引生故此如前等如第八淨識變身土時能變之識識薀所收所變相分即通五薀處界亦爾若有漏變善等識相亦不同也如緣虗空及香味等所變相分雖是無記能變之心通三性故言如是過失者即以濁名名為過失令生猒故得利益名言雖言示現者問如十二濁中第二第六濁三乘濁可言示現除之十種何名示現答疏言雖業等者清淨也准此示現者化現解脫言十二濁唯大乘者簡要云化土身有二一者化淨土二者化穢土淨即勝穢土即劣淨土勝唯大乘有穢土劣故通大小乘有淨土示現立十二濁穢土實報故立五濁也言開合者開立十二濁若合故立五濁言門乃通者意云合依通立彼經唯依大乘也問劫增或輕命不至短皆非是濁云何相攝答增相說劫初等時不名濁也或濁劫名同故故相攝也言其劫及時者相攝將十二濁與五濁相攝問十二濁是淨土中示現五濁是穢中實報也淨土即權穢土即權實既殊如何相攝答若於佛淨土中施設者即示現中收若於穢土中對凡夫設者即實報中攝開合既由佛設相攝故體無差也劫濁約三灾向上立劫濁也時濁者時無別時約法以辨故於劫濁中攝時也言眾生及難化者唯言眾生但是非法器兼言難化眾生更受邪法言煩惱及說種種者前明煩惱名煩惱濁後別舉煩惱名種種煩惱濁命即命濁外道亂即五見中見濁此八即五濁攝言餘之四種者第六三乘差別第七不淨國土第十一魔第十二魔業此四濁非五濁攝也義不相應也言五濁據勝者通妨問五濁與十二濁何別答疏言五濁等三意一據勝二唯實三雜染雜染中煩惱濁道有覆性不善性如命濁唯無記性通三性也言十二濁通能化等者章破云三乘差別不淨國土為能化魔及魔業等能為障問何故不淨國土為能化答維摩經言為欲度斯下劣人故示是眾惡不淨土耳路言或十二濁中第一劫濁第二時濁第四煩惱濁第五命濁第七不淨國土第九種種煩惱并後魔及魔業等並名能障第六三乘差別唯能化也第三眾生及難化眾生第十外道亂三濁名所化五濁唯實不與十二濁相攝五薀不約能障能化故不相攝也言五濁中無見者立業濁也就業中通總報為身等三業乃至飢饉疫病刀兵若別總合為一箇業濁又煩惱利鈍不同總合一箇煩惱濁此二濁是因也言果中分者果中有三濁一正報體命濁二內報體異熟果謂眾生濁三外果體即劫濁是名土濁問何故五濁合因開果耶且合因者因中煩惱有多種又業有多種合名煩惱濁及業濁故名合因也問言果者一个總報果上開為三个濁劫眾生命也答濁是滓穢義故合因開果也言障據類同者通妨問何故三障合果開因耶三障即煩惱業報也且合果者果中唯立一个報障也且開因者因中立煩惱障及業障名開答疏言障據等問何名類同答煩惱與五見或類同同立煩惱障飢饉刀兵身等三業思能造作造作類同總為業障也又眾生及命因果類同立報障或云障中有四何故三障即雖為五濁濁即業煩惱即煩惱餘三即報法障何不立濁中也答疏言障據至或并法等意者三障立濁相顯令猒法障濁義微故故不立濁也言或合或開等者此經開煩惱障為二濁毗尼母經即合彼毗尼母經更開出業濁此經但合煩惱也故或開合等言不欲濁者不樂欲修行善事正是障化精進言威儀者如戒中言疏行調譬威儀不正障他持律微細威儀如袈裟遍副膊仍新方裙著褊衫猶淨單衣之上被著袈裟是威儀濁也三盖蓋者即五蓋一貪欲蓋障出家持戒行二嗔恚盖障行慈悲心三惛沉睡眠蓋障於定故四掉舉惡作蓋障於慧故五疑蓋障於捨亦障戒定慧三學也言曰異想者修習善法無志性故言不足功德者功德實未足於小善向上生滿足心名不足功德濁正向長時修行萬善功德也言六癡濁者謂愚癡故正障於慧言此唯據者意言此唯據眾生惡行以立六濁不同前五濁通依三灾命根及時等諸法向上立便是餘法也又只此六濁正障六度行障果也言離懈怠者對治不欲濁言嚴故者嚴謂嚴肅行住坐臥威儀奇勑嚴肅對治惡威儀濁言淨故者修淨三乘對治五蓋以三學具故故對治五蓋也言堅固者對治異想濁謂妬勝心能破壞蓋法障修習四無量四攝等行若修善時其心堅固即能對治諸異想也言功德具足者對治不足功德濁言智具足者對治愚癡濁簡要云六濁云即六弊言此六所治者一布施離於懈怠治不欲濁二持戒威儀嚴肅持毀禁濁三者忍辱其心淨故能治嗔濁四者精進其心堅固能治懈怠五者禪定功德具足能治散亂不具足功德濁六者智慧具足故能對治愚癡故言不須和會者不須將能治所治和會俱通障度行即得問濁有五種十二種此問何故偏對治六種答此問但依所對治向上立六濁不須將六濁五濁十二濁和會也言法爾者意明佛出世意因前有難言佛於何時先權後實說答舍利弗諸佛出於五濁惡世所以先權後實也此問解彼處經意法爾佛出必五濁時出出者必先權後實說也言問何因彌勒等者此中意者因論中減劫佛興世劫增輪王出生得得向下諸問答也問有兩重問今當第一問言答願力異者如經中說彌勒過去於劫減時逢佛發願願於減時成佛出世釋迦過去至百歲時逢佛發願願同彼時出世故言願力異其實皆由眾生所感根熟即出世也問何故彌勒釋迦劫減時出耶答二佛俱是濁劫世即減劫也言並化三乘者問兩个佛要總向減劫出不向增劫出耶答疏言並他三乘等所以同向減劫出有二意此二佛各隨願力初減後減不同二者所度眾生根熟時節不同減能化之佛初減後減出世不同也問華光如來既說三乘豈出濁世答彼願力說三乘法所例也言諸報佛等者若法身佛及自受用身佛恒居淨土自然法身不可更論出世時節也若他受用佛亦出劫增也及佛者即是大化身佛唯教化四加行位菩薩亦通劫增時出問何以如此答不化二乘初權後實未必濁時佛方出世也若化二乘初權後實事須減劫五濁興時出也言此言濁者問百歲之時可言濁世人壽八萬歲寧言濁世也答疏言此言等意言初人減劫漸向五濁亦名濁也言問若劫減時等者問中乍似迷人問有三意一問法爾佛減劫出行故彌勒與穰佉相見穰佉是輪王事須增劫出彌勒是化佛事須減劫出二問如釋迦不出家當為金輪王輪王如何減劫出現三問如燈明佛法出於濁世即是減劫如何有八王子作輪王亦生減劫也答疏言答穰佉等緣輪王命長古著劫減故逢彌勒如兩个師僧一个白月十五日投等中宿又一个十六日來前來者至十六日不去與後來者相逢也世界增至八萬歲輪王便出壽命八萬歲未終遇著世界劫減至四千歲彌勒下生乃是輪王命長與佛相見言又佛不出家等者答第二問也意明劫減無輪王出故說應作非定作也今明釋迦牟尼佛是剎利種令作輪王又即輪王相好福德出家成道遇著劫減若不出家但是應作非定作也問釋迦佛不出家應為輪王者如何言捨輪王位出家答亦得名捨應作如有一个人得及第了應答作官後不作官出家去雖不道作官亦名捨官言燈明八子者答第三問也前釋迦佛亦是具彼相好福德應合作不作也言彼是報佛等者問若爾應作違他經文經言是八王子威德自在各領四天下又言悉捨王位等道理中間終不離難答彼是報佛身等作第二解前來依他佛解今依報佛解燈明是報佛有子為輪王亦不妨章敬云報土輪王與佛同世亦無有失若燈明是報佛只如登地報佛王百三千大千世界一世界有萬億四洲何以妨子得作輪王各領四天下前解應作後解實作也言此說金輪者約金輪者約金輪者約金輪王義說也言銀銅鐵者除三輪王減劫亦出也問阿那个輪王減劫時出答疏言以無憂王等是減劫時百年鐵輪王出也有解云是鐵輪王之類非正輪王輪王須行十善行惡故雖有此理然違經文如音王經說得佛懸記當為四天下輪不可判言非輪王攝初雖行惡後却行善也經云如是舍利弗至分別說三者如是二字指前五濁也問佛既劫減濁世出何不但與說大乘何要先權後實說耶答經云眾生垢重有六垢故求說不得所以先權後實說也經云劫濁者修前五濁中劫濁言劫濁亂時者即是飢饉疫病刀兵起亂時也言眾生垢重者牒前眾生濁只緣垢重所以立濁也言垢謂六垢等者問何故不取根本煩惱及以大隨及中隨二何故唯取此六種名垢耶答此之六種起必麤猛損自他漏染增強偏六為垢餘或不爾故不立之言樂為損惱者論云云何為害於諸有情心無悲慜損惱為性能障不害逼惱為業則嗔一分為體言由忿等者論云由不為先壞惡不捨結怨為性能障不恨熱惱為性謂結恨者不能含忍恒熱惱故由對現前不饒益境墳發為性故結恨者惡忿等言已追往惡者忿恨為先追觸暴熱恨戾為性能障不恨䖧螫於他言為因買他等者論云謂曲者為網冐他曲順時宜矯設方便為取他意或藏己失不任師友正教誨故名諂昔有長者臣富多財有一諂人往行來諂供給是使無不稱心乃至唾落亦為除去長者歡喜數見優贈此人遂富後有一人性本直化漸富遂學行諂以性純直多不稱心見化前人委曲隨順後見長者誤落火爐傍邊看之亦不復救遇長者唾在地上欲以脚差踏即被前斥諂人得踏却後時長者纔欲顏𡃤即在前立長者唾未到地又被前人空中接却彼人要發後時長者口欲動時忽然舉脚就口上接踏錯踏口膚一時隨脚分裂便被家人大小兒云打我阿耶孫子言打我阿翁外生打我阿舅婦姪兒等眾人共打此人此人便死長者驚懼令以水淋之良久乃活空中有聲誡曰不修真實行而行諂誑心踏他脣口裂只得冷水淋言為獲利譽者論云為獲利譽矯現有德詭詐為性言貪癡二法者諂誑名二曲順時宜求財利等以貪為體不怖當苦以癡為體言於自盛事者論云云何為憍於自盛事深生染著醉傲名憍醉者醉放大開眼不識人醉相似以貪為體言慳貪嫉妬等者問云何名慳答疏言躭著己得等能障不慳鄙畜為業謂慳恡者心多鄙澁畜積財什不能捨故立為慳言於諸未得有及有具者問云何名貪答疏言於諸等未得有者即是當來果三有之身願當來身端正第一有上起貪也言有具於來世莊園田宅舍名有具也即資身之具言慳雖即者慳貪二種為貧窮因嫉妬二種為下賤因言殉自者詞閏反以生送死作殉以身從命作殉巡師宣令作殉今取殉以人送死秦穆公三丈夫而殉葬國人哀之為賤黃鳥之詩如春秋說謂嫉妬者聞見他榮懷憂戚不安隱故言嫉雖即者問嫉妬何別答疏言雖等緣他正法稱疾即是緣他人身中學問道德名嫉緣他人榮樂名利稱妬即乘肥衣輕也忌他外相稱妬見他人身中有書詩道德名嫉見他美色曰妬也言由具二義等者一是一故雜集云貪等六或體是根本能生他故於中分忿等故忿等緣藉方能生故不名根本故忿等二十名隨不能生他故故不名根本若爾慢等應名不善根根本惑故如貪等答二遍六識故故論云藏識全無末那具四意識具有五識唯三然五識若依本位唯俱生貪等三若由意識引生亦通分別言生惡緣者能與一切不善法為根生長惡法也亦名三毒所名三黑闍翳處自法故亦名三株坑根深難破也言亦即煩惱濁者以前解慳貪嫉妬為煩惱濁故言唯說三濁不說見命濁者劫濁增時人命短故便攝一切煩惱故唯牒前三濁也經言諸佛以方便力於一佛乘分別說三又經言小智樂小法不自信作佛又言羊車鹿車為求牛車出於火宅言下釋第二疑者論處問言何知增上慢疑在論文答詞在經中世尊止云舍利弗不須復說若說是事一切世間至增上慢比丘將墜於大坑又云止止不須說我法妙難思諸增上慢者聞必不敬信問世尊總未與他說爭知他生疑不信又云何知他是增上慢人面孔橫樣一種他家自不言是增上慢人答世尊說有二義一自謂得聖果二不聞不知如來化菩薩事於事此二事向上驗取則知相貌亦別且第一義經言舍利弗若我弟子此凡夫弟子復云非弟子即是非聖二乘弟子經是自謂聖弟子也此第一義緣自謂阿羅漢辟支佛將真二聖弟子驗著始知是增上慢第二義謂不聞不知諸佛如來化菩薩事不聞不知者顯如來不為說也只緣他自謂是阿羅漢是辟支佛以不為所以不聞不知也言諸佛如來化菩薩事者即是不聞道二乘不定性迴心當來作佛不知道二乘是權經言此非佛弟子者非聖弟子若總而言之一切眾生皆佛弟子今言非佛弟子非得聖弟子世尊道若是我聖弟子無自謂有得也既有自謂得者經言此非佛弟子非阿羅漢非辟支佛此名非真二聖相反顯是增上慢人上解經下消疏疏中意却背也失說真二聖相為本顯不具此真聖弟子功德即是非二具二聖相先說真聖相反顯非真二聖相猶如欲說小人行當先說君子行當但知無君子行當便是小人也言如來既不為增上慢人至是增上慢者此即論家問意言聲聞辟支佛至多不愚法者疏引經意答前問意問若定性聲聞決定不愚法何故疏中言多不愚法答初逢佛聞法尚自愚法後漸不愚初愚後不愚名多不愚也亦有一類究竟不愚名多也言其不定性等者疏置可言簡已迴心者言不問近遠者辨云近謂遇佛遠謂不遇佛若是不定性遇佛必須迴心無容彼類有趣寂者瑜伽十八說迴向菩提聲聞因緣力故乘無上乘不求下劣而入涅槃者諸佛菩薩無處無容如是放逸棄捨於彼定無是處糅云得二乘果已便迴心名近得果已後更經四十五十年方迴心者名遠或遇今佛名近遇未來彌勒佛名遠經即真言疏兼反顯上來皆解非真二聖相言故名自謂者自謂是真二聖而得遇佛都不聞知化菩薩事此非佛弟子前三果人即是上句經文亦無真二聖下句經文即是阿羅漢非辟支佛顯是後聖上正解非真二聖也經文舍利弗是諸比丘至增上慢人者是諸比丘者指前非真二聖故言是諸也前顯非真二聖相此下一唱顯增上慢者相前唱標文此唱糅云前唱非真二聖中答我弟子自謂是阿羅漢阿羅漢人諸漏已盡將謂是我生已盡集諦智是最後身即是不受後有苦諦智究竟涅槃者所作已辦滅諦智不復志求梵行已立道諦智心中不肯信向大乘是增上慢也言結成二聖相者即定性聲聞緣覺是一聖也不定性聲聞緣覺是一聖也准疏主科文結前二聖文若論經意此問是釋前顯標文中不聞不知諸佛如來化菩薩事也經言所以者何徵詞也世尊爭知他不聞不知化菩薩事是增上慢人相耶爭得知不是定性聲聞愚法者若定性愚法亦不聞不知化菩薩事何以定知化是增上慢人耶世尊答曰若有比丘實得阿羅漢若不信此法無有是處若是聖弟子趣寂者若不信此法無有是處不信二乘權一乘實無有是處若不定性實聲聞弟子如來必為說一乘即是聞知化菩薩事所以知不是聖子決定是增上慢人也上消經意了言但是真聖至不愚法人者問若遇佛是不愚法何故言多答多字簡一分不遇佛愚法者故言多也不定種性理合道理也理合依信修學定性聲聞道理合依信名理信也言其趣寂者證者達也問世尊道若是真聖趣寂無有不信者如何世尊言一切世間諸天及人皆當驚疑反道疑生名損驚怖耶答初聞大乘化菩薩事初聞生疑名反道疑生品此疑心名損也初聞有損後必信之成不愚法也驚怖初文不愚法初後文問何故前言二乘之人執自究竟無入涅槃者若信大乘不執自果故答初未自入證大乘道理所以未生定信名損驚怖反自道疑生今約後時利根之者信有大乘無上成不愚法故言信此法者方成真二聖也攝云問言疑自果名損驚怖不言信大乘今何故言初由未信名損驚怖答疏有兩意為疑自果及不信大乘前後兩處各申一文故言其趣寂等或可前言疑自果不言放大乘生信亦不相違更解即為未解大乘故初於自生疑今聞佛說反照自心故無疑也而綺互說也二疑了
