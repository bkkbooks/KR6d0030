body:
  text: 鏡水沙門栖復集言又此門者三乘因行等問二乘無學果德可然菩薩在因如何言果出因門答有二解一者若望菩薩所行行是因當來佛果方名出因門今約佛果當出名出故言門外二者初地菩薩無漏理智出彼地前一大阿僧祇劫有漏因行故言門外又初地為因二地為果至十地亦爾望因中果說亦名果出因門也問智增菩薩出地前因行初地登牛車出宅言門外悲增菩薩雖出地前因行初地登車未出宅如何言門外但是宅內登車答但說業報宅不說隨願宅即解經中今在門外也言此中定取分別等者簡要云意顯無漏牛車體用性相即名大乘也言分別種智者即是明大乘牛車即是無漏後得分別種智也問何故此經門唯言一車乃說三答門據長者內自思惟就實說一也車約引子虗指依權說三故無違也言問何方便至彰等者方便品權實總說三理實唯一十方世界中有一乘法實也無二亦無三權也權實理智總攝盡也言下二周者內果者開示悟三為果果中理果智果入佛智見為內內中有因理有因智第二周中唯說因智不說因理果智第三周中唯說果理不說果智因理因智故言答乘有權實等者二乘權一乘實一乘法略有二種一因二果因復有二一者理二者智果亦有二一理二者智涅槃菩提二種別故理智可知且因理智者謂從初地所證二空理及能證二空之智是也即是初周入佛智見通於理智二種法也果中二法菩提涅槃即開示悟三也言三種者別故即是權實因果理智名三也問何故初周法說因果理智俱說中下二周隨應偏說耶答由迷有前後悟有淺深迷處再說悟處不論故於三周有說不說第一周中因果理智總說鶖子總悟中根四人果智果理總解唯迷因中智不迷果中智果中理因中理迷羊鹿二車得至道場不知到道場者唯是牛車令知羊鹿是權牛車是實故如來所以第二周牛車譬喻第三周下根之人第一周第二周數聞不迷果中智因中理因中智唯迷果理將謂有餘涅槃便是實所不知別有寶所是涅槃也所以第三周說化城喻品亦為下根五百千二百人唯談果理也上答總標了下別釋不知權實取捨之事不成言不知權實等者若不知二乘是權一乘是實因何知權可捨知實可取言不識果因至不立者因為能取果為所取言不閑理智者智為菩提理為涅槃智斷二德若不圓何成道滿所以初周理智雙說言玄宗者即是理智也言未識取即者初地已去牛車也言故說三車至行者令知羊鹿二車為權牛車是實合識三中牛車是一乘之行此解正二云三車之中令識知羊鹿二車為取牛車之因問何不唯取牛車為一乘因行答一乘因中有權有實有近行有遠行羊鹿二車望佛果菩提為方便行遠因也牛車與佛果為根本行為近因故總說三車令識知也上說因車也言隱果中之覺寂者覺是菩提智寂是涅槃理所以第二周不說因中理唯說因智車即牛車也言秘因位之等者第二周不說因中理也言遣修生者唯說因中智也理漸解也故第二周不說理也智未閑故再說也問何名智漸解耶答中根四人來迴心前先證生空理迴心向大當證法空理故名漸解牛車種智二乘全無未閑也言下根雖再聞等者等第一周第二周兩度聞名再聞再聞權即羊鹿也再聞實即牛車也言及因智者一句屬上再聞權實中收也言果理猶至假真者假是化城真是寶所化城是末故可捨之寶所是本故可取之也辨云說本者即是為說佛本意也本意說寶所令取也辨解亦善言隱果中智品者所以第三周不說報身言藏因位等者則不說第二周中理智也言一乘因果等者總結也第一周總說因果名備第二周第三周名偏說也言果中覺寂等者報身法身示者曉爾圓者第一周總說缺者第二周第三周缺說言大慧法身者初周報身法身總說名具第二周唯說大慧報身第三周唯說法身名闕言地持論中者問法華經說有三車地持論說有四車何故不同答所望各別業論第七三車中與法華三車不同此經三車是羊鹿牛地持論三車是鹿牛外更加象車彼論四中闕羊車也鹿牛馬象如是次喻四涅槃凡夫人唯有自性清淨涅槃喻鹿聲聞人兼得有餘涅槃喻牛獨覺人多兼入無餘涅槃喻馬菩薩能住無住涅槃喻象初後即真如無住涅槃勝故象車為喻也問法華經中三車喻智智有動搖稱運載地持將車喻涅槃有運載不又涅槃是疑然何故亦得是車攝答法華將智就性名車地持論將性就相亦得名車也所以疏言乘於大性名為大乘也乘之大性亦名大乘言涅槃經說有二車等者彼經第二文殊師利廣對准陀辨如來身有為無為義純陀因此語文殊言文殊師利譬如國王調御駕駟欲令驢車而及之者無有是處我與仁者亦復如是欲盡如來微密深奧亦復如是章敬云此是純陀與文殊自商量小聖測度佛身功德猶如驢車比駟馬也言半滿等者喻有四對一真俗二世出世相對三大小乘四因果今依因果相對因位名半果位名滿也純陀文殊並居因位言半何失正是疏意也上會諸教車了下會諸教喻言優婆戒經等者此說兔馬象三將水喻理聲聞根鈍證理淺緣覺智次勝證理次深菩薩根利證二空理最深三獸渡河亦爾金剛經云一切賢聖皆以無為法而有差別言三獸被圍等者智論三十五云說三獸被圍鹿羊犀牛象聲聞之人畏生死苦依五薀四諦觀苦空無常無我唯求自利如圍中鹿既被毒箭中一向求脫更無他念設有多子不能顧戀次緣覺雖猒生死觀諸因緣亦慈念度眾生如犀牛在圍雖被毒箭猶顧其子苦逼故從人頭上踊身而出後菩薩人雖被生死三塗之苦種種逼惱菩薩苦中觀心忍受救諸眾生以得為限眾生若出菩薩方出如在圍中象被毒箭中已出圍外諸子在圍中不免諸苦每見以運身却入圍以救諸苦前喻大悲後喻大智言又說三人等者智論五十一云譬如三人度於惡道一者於衣逃遁而出二以財帛求三者如大猛將將大軍眾摧破賊寇舉軍全循怛蕩而出三乘修行亦爾如聲聞人不能知一切法總相別相不能破魔軍降外道但猒生死直趣涅槃次辟支佛入諸法實稍深於聲聞少有悲心以神通力化諸眾生能破煩惱亦不能破魔軍降伏外道後如菩薩從初支心於一切眾生起大慈悲未得佛於中利益無量眾生破諸煩惱及降外道三人俱免生死就方便道各有異見金云涅槃驢馬二車喻教地持論四車并三獸渡河喻理智三獸被圍及三人得道喻行此經三車在門外喻果第二文了言汝等可速出等者經云汝等於此火宅宜速出來皆當與汝者各與車隨彼長子愛牛車與牛車中子愛鹿車與鹿車少子愛羊車與羊車言今此略作五番等者簡要云一理智不齊難二城車開合難三中途門外難四遊戲安坐難五入城出宅難言問智中有虗實至寶所者問意智中有假真三種並名車何故理上有假真何故假理名城大般涅槃二空理獨名寶所既車名遍在權智實智化城合遍假理真理何故能證智名三車所證理中何故假理名二城真理名寶所言息處具德殊等者化城名息處寶所名具德具塵沙萬德無為功德即是摩訶般若所證之理也車上不簡真假有能運載義總名車也言又已息當求別者化城名已息寶所名當求已息名城常求但名寶所言運載總名至攝者牟云登地已去無漏因行望於佛果名為近車聲聞緣覺未迴心前練根時節三生六十劫四生一百劫迴心向大望於佛果迂會修行名為遠車又解二乘之人三生六十劫得羅漢果四生一百劫得緣覺果運載自身得果劫名近車大乘三無數得佛果名遠車二解後為勝准疏意名取自乘果論近遠也理智不齊難次成車合難言二乘學智果等者意言二乘學智果智果分羊鹿二乘學滅果何故化城二言答息處說二乘者問何因有二城答聲聞生空智緣覺生空智智證有異實有二城問既若實有二乘涅槃經言化作一城何不開為耶答疏言對實說假故合名一也二乘涅槃同是假收對寶所總言有一言涅槃經等者問何處教文說二乘涅槃各別答疏言涅槃經言等言今以所斷等者問既涅槃有二種何故化城言一耶答疏言今以等故化城不開也言若菩提車等者問何故車立種答疏言若菩提車等由此七異故立三車言但說無為等者此意直說無為不對證智故城名一約能證說熟智立二城也言以智顯滅者順文云息處故二為止息故說二二乘證智所詮無為分涅槃二非言涅槃體有二也如十地內所證十如依智說異一遍二最勝三勝流四無攝取五無別六無染淨七法無分別八無增減九智自在十業自在言三問何故等者中途門外難也言息苦名為城等者息得分段身上一半苦更有變易身上一半苦在名半盡所以化城於中路設言無漏離繫等者問羊鹿二車是有漏如何言門外此中帶過悲增菩薩七地已前雖具無漏且未出宅故答且約業報宅說不說隨願宅問二車體是有漏如何言門外離繫縛耶答車雖有漏約彼向上莊嚴具說名無漏只此有漏在無漏人身中起雖是有漏亦得說為無漏離繫縛也或乘繫縛即是門內今既離之故言門外離結縛也言化城初盡者即是分段生死入化城時盡也言理出於教等者即彼虗指假解是教所詮故言理出假解之心無學方起故云果出因也言又二死以對等者一死以對辨車即在門外二死以對辨城即中路設若將城對一死亦得名門外將軍對二無明亦名中路設理實相以也言問何故與車至安坐者經言今此大城可於中止之者即是安坐之義若論經上即無明文言答涅槃可證等者理體一定更無動轉故言安坐也車是菩提智智體修生可言遊戲也城相車相即是尋常所見者也決出宅入城難言問何故化城至為難者亦乃返顯前四答問前四答問出第二文也經云汝等於此火宅宜速出來隨汝所欲皆當與汝言化佛住生死者此中意說生死涅槃相望不同也化佛住生死勸二乘人取有餘涅槃恰似道交眾生存前入滅去我後來言談真佛在果者果中佛招火宅內眾生故言速出來言先住果等者望佛在果中接引眾生故言速出來言覺智等者覺智即是三乘智三車也言如說如來及與等者則云住內望果名為善逝住果望因名為如來如我輩眾生在因望因望一个眾生成佛去彼某甲成佛去也名善逝逝由往也善事往矣此則因中望果名善逝也住果望因名如來乘如實道來成正覺名如來佛住果中望一个眾生從生死中向佛果來彼云果眾生成佛來也此則果望於因名如來也今亦即望理言入望智言出體無別也經言爾時諸子三乘人聞父所說者聽佛教珍玩之物者悟妙理適其願故者各當根心各勇銳者內精修互相推排者運相讚勵競共馳走者俱修因爭出火宅者各解脫經言心各勇銳等者意業精進互相推排者語業精進競共馳走者身業精進此則解也言互相推排等者喻上說似長子推中子中子推小子法中論即是三爾子一一子自三業中遞相勸勵也意業精進勸語業語業精進勸身業先初舉意次發言後施為作用名互相推排也二者除即意業以心各勇銳配意業了具於身語二業中一一業上皆有互相推排義也身業上布施持戒禮佛合掌彈指一一總修故名推排或語業向上讚歎念經持呪此語業向上推排也語業推讓言語安排故云推排也又語業精進身業不精進不名推排事須雙具故推排言無土雷反唯在身業不遍餘二業也意存三業進修唯取推尺隹反言離灾度難等者得出離煩惱之灾度分段之難言四衢道者爾雅云路也四達謂之衢郭云灾道四出也齊魯之國呼四齒把把於地有四道也喻四諦理也二乘無學登地已去菩薩名三乘並觀四諦理故言大般若等者問何經教喚四諦理作四衢答疏言大般若中等經言露地等者紀國云聖地有三一見地二修地三無學地前二地有障故可言有覆第三地永斷三障故言露地問初果之人悟四諦理何不名露地答雖然證四諦理煩惱未盡不名露地坐前三果有學雖坐宅內坐今說宅外免難之人唯取無學也問小聖有學受變易身得理出宅何不名口坐四衢耶答今此不約迴心受變易者說但據未迴心得自果未受變易者說唯取無學未受變易者得無學果已後三十二十年只現在身上為後邊五薀身永更不續一則出宅二得四諦理具足故得坐名初地菩薩亦只取未受變易已前身名路地坐名出宅也若爾初地菩薩尚有餘障應同初果不坐四衢答則云彼能永伏三障現行盡故亦得名露地坐也各有所依等者三乘理也問二乘無學斷三障盡故名果滿之位菩薩在因何名果滿也答初地菩薩雖亦在因證盡當地二空理亦出分段同於二乘故言果滿位也言分段生死當五等者解經無復障礙准此即菩薩分段生死苦惑業皆盡二乘之分段生死當五薀苦惑業皆盡不說現行現行身由是苦所依故言或斷或伏者大乘初地已去若是智增菩薩初地永伏三障即惑業苦也悲增菩薩不伏至八地方永伏報障入變易生初地雖未全伏報障從餘二障以少就多名無復障礙也上言分段死及惑業皆盡者菩薩現苦已盡并惑業名障盡也二乘之人約當苦盡兼說惑業即是三障盡也言伏諸煩惱等者初地菩薩分即斷俱生盡伏然由故意力起而不為過失言伏約修惑說也經言時諸子等各白父言父先至賜與者喻上說長者宅中許與他三子車及至出到門外三子一時索羊鹿牛法中論三乘之中鹿野菀中世尊道我法能離老病死究竟涅槃四十年前唱三車在門外今日三乘之人引出門外各索自乘種智車言隨三乘根等者問二乘中小為復已迴心了索車為復未迴心索車若已迴心只令索牛車何故索羊鹿若未迴心自果已滿更何用索車答疏言隨三乘機等意未迴心向前各索自乘之車言二乘之人者問二乘之人既出宅了無學果滿更索何車答慧解脫羅漢求斷定障入根本定求勝神通義同索車若俱解脫雖得神通更求種智廣分法以彼俱解脫羅漢黑鹽之事疑猶自帶迷但總知四諦不能廣知四諦有無量相亦索車上相因簡要解辨云定是未迴心前隨順如來聽聞法教忻求種智義同索車疏意佛在鹿薗說三乘法令各修行得自乘果名父先許二子得果居教行外名出分段宅門而於諸法猶不能知名不見車故於佛所三慧修習求所未悟名願時賜與意言二乘自心求自羊鹿不知所求但是牛車牛車即是父先許者意說二乘不斷智障智障不斷不知諸法即名無車今求了達諸法故但是索牛車也是此中意問二乘無種智可言索車菩薩既有種智何要索答菩薩種種智及佛位更求果車也初地雖得望後後位索亦無妨上總解下依疏解問為復宅內索宅外索耶答宅外索索內所許者問緣覺人法華會上既無何處索車答有說雖無得果有初發心者非也此是門外索自乘果中功德車諸抄皆迷唯法華會會上索車此說不然索車不必唯在靈山會上俱二乘之人菩提樹下世尊許羊鹿車後四十年前得果忻趣求勝功德總名索車若作此說不然索車不必唯在靈山會上但二乘之人菩提樹下世尊許羊鹿車後四十年前得果忻趣求勝功德總名索車若作此說四十年前便有緣覺得果見世尊來即是索車處也若唯局法華會則云緣覺索車處也若各索自乘不妨通諸經若破二車取牛車即此經也問二乘有學求勝功德何不名索車答有學人行位未到索車處也上解中小二子未迴心前各索自乘車若迴心已去同索牛車也言菩薩之人依此本論等者若准疏主義二乘入城不上車也古人義云二乘入城不上車與疏主義同古師兼許菩薩車亦入城即別也古問云二乘息却分段生死惑苦業三過三百旬入化城也菩薩之人初地門中登車既向分段宅門外即是息却分段生死許菩薩亦入城也答疏言菩薩之人等即法華論令證不退轉地也意言阿羅漢人身證無學果遂得煩惱盡處解脫菩薩在因位煩惱未盡未得解脫未得所知障盡及果中二事涅槃故不名入城不疲倦故不入有餘涅槃不說菩薩入化城故二乘無學果位得障盡解脫證有餘涅槃名入城也菩薩在因位未證解脫於苦不生疲倦不入有餘涅槃不說菩薩入化城准經文亦不說菩薩入化城也言入無住涅槃亦息者古人解也疏主云既不許菩薩入有餘涅槃城古人云我許菩薩入有餘涅槃城古人云我許菩薩入無住涅槃古人意言既二乘有餘涅槃便許二乘入化城何妨菩薩得無住涅槃同是涅槃亦名入城也言若爾亦應等者疏主返質古人也菩薩所證二空理於中一分生空理與二乘同便許菩薩入無住名入城菩薩既證二空智於中一分生空智與二乘同應許菩薩亦上羊鹿車普菩薩得無住即言許入城菩薩得種智應亦上羊鹿又曰菩薩得自無住不得他不得有餘搆入城二乘得自不得他不得種智上羊鹿又問菩薩得車不入城便執菩薩交入城二乘之人城下上車應許二乘亦上羊鹿車耶則云化城誘小根菩薩同言入羊鹿誘小根菩薩亦應登又經云不言長子入城今許令入經文不言二子上車今許登并鹿言故知但等者疏主立理結破古人也意順前別解之中二乘入城不登車菩薩登車不入城也言已伏煩惱出等者菩薩索牛車也問菩薩種智已得之應即登車何要言索答菩薩雖然分得尚未成滿望具足位索之無爽據實十地每比皆有忻求果智義從初出宅以索標名也出分段死亦證四諦即是依三性三無性觀四諦通行法輪名索也言三子並等者何故中小入城長子不入城耶入滅即入城言答無倦等者菩薩無倦不猒苦所以不入城聲聞猒苦故所以言入城言伏惑雖分段等者問菩薩不猒苦故不入城如何言菩薩出宅答疏言伏惑等言若說入城者只緣三子同出宅中小二子入城長子不入城為難古人若許長子入城便無是難也言猒苦等者長子不猒苦亦不求息苦菩薩入城中小求息苦所以言入化城也言息處故說等者意道經文只說息處說二只說二乘入城不說有三者即是經文不說菩薩入城也言門外設於車等者車三城二便是違妨言二車對大者大因即牛車也迴心向大取彼牛車真假相兼說有三車也言權城對實等者二乘之人所得之理是權權實相對權理名化城實理名寶所將此假理對實理只有二乘無三个城也實果即實理也言理應似者此中意二車亦是以權實二城亦是以權實相對故言相似也言所對別等者即是二車是權對實因牛車二城是權對實果寶所對因對果不同名所對別也化城中路設對五百由旬說若唯對惑苦三分段生死設城亦言門外三車對變易亦名中路設也所對別故施設不同即是車對分段言門外也城對變易言半路也車言誘引出宅故言門外城坊中退故半路設二城又車誘引故設三城息苦故說二言有種智彼無者即是二乘之中無種智勸教取羊鹿迴向後是牛車因所以設三車於門外也言入無住不名等者問菩薩入無住何妨入城答無住是實不是假不名入城言問三車俱索等者索車不索城本來索車希望種智圓二滅不希者即不索城也言得果自然等者問既二乘不言索城莫不求於息苦答疏言得果自然等不說希須即是下索城也緣車種智各自從種子生故須索車索已後但修智圓智圓自能證滅滅理向上下要索也又城已得故不索車未得故須索也言種智未得者即是二乘也直隱言無也言若作此解二乘等者意難二乘已入化城可言不索城菩薩既不入城又未到寶所寶所亦須索此未到與未得車無別故二乘未得車故索車亦應菩薩未到寶所寶所亦須索言此義可然者疏主許言可然也何妨得者不索未得者索只緣向前來化城不索故說索寶所言以每專求等者即是索也經云即滅化城語眾人言汝等去來寶所在近向者大城我所化作經文無索為有索義言經文但說文勸者問彼既不索何須勸去答佛為眾生作不請友雖不索而勸去經云我見汝疲極中雖欲退還故以方便力權化作此城汝今勸精進當共至寶所長行云汝等去來等據實若望菩薩亦須求證大般涅槃經中且約迴心之人佛為不請友不言其索也言古相傳云等者古師意城與車總是二乘之人所修然化城是實設實能息苦故不索車是虗指門外無故所以索也言若作此解者正破古人若車與城體各別即索與不索義殊古解既取涅槃為車體車體亦即涅槃索車之時城亦索也古師證云自求涅槃是名聲聞乘如彼諸子為求羊車出於火宅等故知車即是涅槃也索車之時城亦索也言又有解云車發等古師意今設三車謂引宅中諸子在宅未出得所以虗指今發其心因聞有車發心求出故名初機也言此亦不然等者初機索車之時乃是無學已出宅故如何言車發初機言又體既不別等者古人城車俱是涅槃名體不別體既不別虗指與實設何殊若索與不索與不索別虗指實設不同若別不同者體是何德也汝許二體同如何分真假若車城有殊應出城車之體也言又有解云等者化不一途妨古師意城亦合索緣化不一途故不應索索與不索隨時之意名化不一途故此不說問古人云經文有索處否答疏言謂下經言等言此乃索寶所者疏主破也是索寶所非索化城文也言雖引此文者意指古人自引經文無不會也文相隱故雖引此文義終難解言應言下文等者疏主正當古人引文錯也問疏主既許索又復引文即與古人義同不應破他古人也答緣古師義車城俱是涅槃一體之法何故索車不索城耶索車之時城亦索了若准疏意車是有為智經文分明說索寶所化城是無為文雖不明義說有索也非是全不許古人索城也言或解車喻等者有餘無餘妨言若爾菩薩今既等者疏主難破古人也言二乘無餘等者且如二乘人得無學果得有餘時已得無餘涅槃只是顯有前後何須索之也言故但應如前等者簡要云即指前正解中第四問答中得果自然證滅入城不說事須緣車是種智各自從種子生故須索之索得已後但修智慧智慧圓滿自然證滅滅理向上不要索也若疏主義取智為車體羊鹿利鈍殊古師以涅槃為車涅槃無別羊鹿何殊若車與城同是涅槃羊鹿應無利鈍差別行相言佛果牛車以四智等者此疏主通論因果二位車體也且果車者大圓鏡智平等性智妙觀察智三通根本後得成所作智唯後得也三智根本以為牛體四智後得即是車體所以疏言四智種智為性上明果車四智全牛一分借牛引言因車以妙觀等者解因中車也言雖五智慧等者即是性相因伴境五種也言菩提相中者若出一乘體即寬通五智慧故若出牛車即尅性唯取智相唯是種智也言一切智者根本智也大乘具二空智故寬二乘唯生空智故狹又一切智中二乘唯得觀察一智不得餘者故狹也亦名云一識智言其種智等者此中意言二乘種智與佛不同其種智者分別四諦各無量相非二乘所知名不共德大乘之人得得種智能變影像知有作四聖諦無作四聖諦若聲聞人知有作四諦不知無作四聖諦不能觀根授通名不共德即一百四十種功德中一切種妙智也問菩薩亦分得何名不共德答菩薩雙起名共德二乘偏起名不共又菩薩實得名共二乘隱之言無故言不共言無分別智者即根本智義如於牛非正車體言如表無表等者問種智車事須取根本智引者成所作智無根本智將何智引答疏言如表無表等意言借餘三本智引引車事須得牛索後得智事須得根本智引所以疏言如表等如受戒時所持之戒但取未來無表色為戒體其表戒者如口陳詞句乞戒之時語表禮拜等是身表其第三翻羯磨最後一念從僧受戒已從此已後一期已來除命終二形生斷善作法四緣捨已來所持並是無表然此無表小乘解體是細色最初一念大種所造此之大種親能懸造未來一期無表能造大種一念即滅所造無表從第二念疎依身根大種而轉如手擲輪依地而轉若依大乘無表之體即是於思從所防說名為色體即七支思種上立若難陀師唯依新熏思種增長位立謂第三羯磨最後一念於思種上有防發七支之用假立七支至第二念不別起種自類相續起用轉勝而立七支淨月月藏唯舊種增長位立然彼舊種雖無體增而用增故依用而說得未曾有護法菩薩通依新舊增長位立有別解脫無表定道二無表解脫無表即向思種上立亂心無心於隨流淨不淨時無表恒隨轉故二若定道二無表即向思種現行上建在定即有出定即無名隨心轉戒言此車亦爾者正智如表後智如無表無表雖依表已起然從一念向四大生猶如因樹有影影雖從樹起還同四大生意說無表戒事須表戒引生後得智車事須得根本智引起也言前一大事等者問前言一乘雙取理智今者一乘之體何故但取於智不取於理後化城品又直取理而不取智耶答疏言各據一義等意言初周事理總明第二周即說事不說理第三說理不說事名各據等言若同涅槃及勝鬘者涅槃云一乘即佛性勝鬘亦一乘即大乘大乘即涅槃界唯取真如為車體者即有違妨此為不可言各賜別體難如何各賜者若將智為車體智後種坐得成各賜若將真如為車體體無差別寧云各賜智從自種生各別言各賜真理體無差云何言各賜言別德莊嚴難又寧說者若以智為車體即有嚴相若將真如為車體如何說有嚴相虗空煙不不染不說色莊嚴真如眾相無如何嚴法界言如何牛駕者理闕如風難若取有為智智體運動可言其疾如風真理不動搖如何言其疾如風剎那能遍證喻上疾如風真理不動搖如何說言疾言如何可言者帶數非真難有為體各殊可言數無量無為不墮諸數如何言其數無量有為體性別各與名無量無為不墮數一法今疏主且依自宗以此申破若一性所說真理與此懸殊若依彼宗可通此難一且十地真如菩薩各證何妨各賜二色相德空嚴空與色為德如說化城何妨嚴餝三如乘大性與智為依剎那迅疾何妨說疾四七如十如何妨帶數言其無量也如息處故說二豈非理數況理之與智如珠與光體用雖殊不離法性真如有隨緣之用差別說彼不同緣無離性之宗即別遠成一體故知法性法相皆可並行局執一途非為達士者也若依自宗致且但遮他言然小中子者通難且如五果聖人迴心經八六四等方到十信初心更經一大劫方入初地始得上車云何創自迴心便言各賜等一大車耶答疏言然小中等者二義得名各賜一現上教車二當上行車現當不同總名為得也即是地前一大僧祗劫乘一乘教車也初地已去菩薩上智車受變易身所乘無漏智慧總名為車即可上車也此經云聲聞緣覺不退菩薩乘此寶乘直至道場也言所詮智體等者是即初地二空種智也對地前所聞能詮教車故說初地名所詮智體也言如與明珠舉例也彼初迴心既在地前所聞大乘言與珠者亦名與教珠後入初地獲珠體也言勝鬘經等者解不退也亦解當唱經各賜諸子等一大車問先雖是聲聞後非菩薩故法華會上得名教車未審已後何處得車體答疏言勝鬘等等取無上依經言三種意生身即阿羅漢辟支佛已得自在菩薩三種意生身三子也同此經聲聞緣覺不退菩薩乘是寶乘也問論說令證不退轉地取何地不退名登車出宅答初在初地名不退引勝鬘證漸悟意說三乘意生身二乘地前得也大乘菩薩初地得也即是三乘出宅及登車也二乘地前出宅登名教車也大乘地上出宅登行車也此上證不退取初地同法華論證入佛知見言又頓悟等者問若是漸悟智增可言初地若是悲增頓悟如何答疏言又頓悟者等一取地前有漏行名從初發心二有取證發心即初地已去二解皆得言雖亦是車等者初地證發心名初發心初地已去雖有無漏教行以同斷故受變易不決定故故不取言今取八地已去等者第二解也意取漸悟頓悟智增三乘之人齊受變易純無漏行以為因車即在八地言七地已前者此云說悲增菩薩雖證二空猶居分段未受變易故言故今取前解者取初地為不退地若頓悟多是悲增也若漸悟多是智增故取前解初地得上牛車也言楞伽由此等者經云阿羅漢辟支佛大力菩薩三種意生身並入初地故意言三種意生身既從初地即合乘車彼經意云五地已前名三昧樂意生身六七八地為覺法樂自性意生身九十二地得種類俱生無作行意生身言喻佛種智者相云舉果談因亦不然牟云第二周牛車體通因果因即入佛知見果即別悟報身示現與無量智業論意准偈云乘此寶乘直至道場故通因也若准長行嘆車德唯是果車經云其車高廣也云云又云佛地論云無量天龍藥叉人非人等常所翼從故知果車也嘉祥云出二種生死表為高備萬德稱為廣出二死則累無不盡備眾德則德無不圓合中經云我有無量無邊智慧力無所畏等諸佛之法意言後得智為車塵沙萬德為並嚴具即是無量無邊智慧無量為高無邊為廣也言體高三等者諸根相好一一無邊無限善根所引生故自受身自受法樂名高也窮生死際盡未來時故稱廣又他受用身目如四大海水毫相如五須彌山言照化俱能者結也照即變影緣如窮源盡底化即利他接物緣事之智種別能一切法皆後得智二利作用也言眾寶莊嚴者即經云力無所畏禪定解脫等功德法也喻上說長者車上盡是七寶莊校即是金銀瑠璃車渠瑪瑙金剛諸珍法中如來知見廣大深遠無量無礙力無畏又智起之時二十二法同時更有有為無為塵沙萬德之所莊嚴也言欄楯者縱曰欄橫曰楯也言即四總持者今此解即是車上鉤欄喻四總持梵云陀羅尼此云總持總持有二一攝二散攝者持也即此聞持也聞於文義化持不忘所聞之法一切能持體即念慧散者施也有四般一法能詮教法體即聲名句文二義所詮之義真俗諦理三明呪如法華經中六道陀羅尼等四能得菩薩忍即無生法忍三性法上皆有無生之相遍計性相無生依他起性無自然生圓成實性惑苦無生能詮此者名無生法也忍即印證此無生法地前聞未起智印初地能印名菩薩忍此為所得全取能得也紀國云長者車上周迊盡是欄楯也欄持諸子而不出楯防外人而不入如來智上周迊盡是總持持內善而不出防外惡而不入也言珮鐸等者經云四面懸鈴者牛車之上鳥鈴四乘大少皆有大鈴吐吐小鈴滴滴陵陵大鈴持持浪浪銼銼小鈴子吟打打長者之車四面懸鈴而警諸子如來智上法音演而悅眾心鈴聲動而諸子歡法教聞而八部善又聞佛柔耎音深遠甚微妙又云清徹遠聞疏中意心之所向之處名面也慈悲心觀四生名四面也七辨如鈴遍四生名四面懸鈴也辨依聲教演說如鈴過此七十二河沙世界聞靈山會梵音聲相如鈴聲也經文又於其上至蓋者嘉祥云長者幰蓋則高出而下覆如如來四等之心高出二乘下覆六道雖曰覆車實覆車中三乘子也幰音虗偃反經亦以珍奇至飾之者問何故此唱之中幰蓋向上別開雜寶答幰蓋是四無量慈悲喜捨為體於中眾生緣慈法緣無緣慈行相差別故所以別開也喻上說幰善體上有眾寶莊嚴法中論四無量體上有有情緣悲法緣悲等差別行相亦順下合文真珠羅網張設其上所以別開也言各有有情等者觀有情為境見有苦等而拔濟之若是法緣不見有情但觀彼作三科法想而為利益若無緣者既遣二執不見我人及諸法相但觀真如而起慈心等如前別了經云寶繩交絡者嘉祥云幰不絡則飄皷飛揚是以安繩持令不動如來智車亦爾若智無大誓則普攀之義或戲御以四弘則廣運之心常定也言勝決定者由發大願當得佛果名為勝勝於餘果由願力任持不令退失名決定也言又勝鬘等者亦是發願攝受正法善男子堪能荷負四種重任亦同此經寶繩交絡若無願一切眾生總被外道攝錄將也今既有願不被邪見所動也懈怠所轉也經垂諸華纓者紀國云華纓垂下則悅總成眾四攝俯順於物若林喻上說車四面更垂華纓莊嚴法中論四攝法也言布施者一布施攝貧窮以己財物分施眾生二愛語攝嗔恚即是遠離頻蹙含笑先言命進問安隨時慰喻常說悅意利益之語命其歡喜為說勝法令得解脫三利行者前來受記謂說教法今利行起行修行然令眾生獲得現利財位後利出家俱利者生五淨居天後得解脫四同事者同一切眾生所作事業先同後勸修行堅固不生退轉等言華音等者纓以華飾華纓各別二義也若華飾之纓即一義也言綩綖以為等者牟意言經本以絲邊作不知義出處今應草下作莚也言古有解等者嘉祥取禪定為宛莚也禪定柔耎以安身禪定有四故名重敷也言此理不然者疏主破也理違聖記故云不然也言無垢稱云者准無垢經禪定為床床即車板也言淨命等者即八聖道中正命也淨命為茵蓐也路云無貪癡所發意業名淨命無瞋所發身業名正業無貪所發語業名正語也言重敷若爾何名重敷令授無貪癡為能發意業為所發合此二發名重敷也言身語意等者解淨命義也三業即是重敷也或取身語皆隨意業名重敷也言心桓遊解婉莚義言常行淨命等者解重敷也經言安置丹枕者敷延置枕是眠臥之儀入定滅心則蘇息之體狀言古解等者嘉祥云涅槃能息生死名枕言今釋等者疏取滅盡定也未入定時心神勞慮攀慮攀緣外境多是漏心七識不行由此入定止息疲懈增長聖道名丹枕言枕仙丹等者問何名丹枕答古解以神仙藥九轉神丹成於枕內令人增壽無漏定亦爾增聖道故言此理不然者疏意雖借古義未敢定斷西域無故玄應法師以天竺無木枕故唯赤皮疊布為枕貯以兜羅綿及毛髮等作枕枕作赤色故名丹枕而以倚枕也上正解言扶持聖道者一切聖者依信等生信為根本如樹木等依水土生彼為根本土能扶信等五根能扶聖道無漏也亦不取也言白牛體等者車須得牛引後得智事須得根本智引也紀國以本悲為牛力用善根為牛牛自體故嘉祥以大慧為牛言無分別智等者問長者家牛有牽車牛牽磑牛耕地牛未審此牛是何牛答疏言無分別智等是引車牛也問何故長者家置白牛耶答犁牛黃牛黑牛窮況亦置得此牛白唯長者家辨得諸人家無一切牛白色者最上眾色之本也言萬德主者結也如來果中萬德皆因本智有之故說為主此法也如白蓮華喻也此智體無漏名日也言牛王有三德者謂斷智恩斷為所證智為自性恩為業用故盡舉之言降怨者垂胡曳地長角摩天逢怨必鬪鬪必能勝如水牛與大虫鬪等法中論喻佛斷德能降二障魔也言端嚴德等者其牛瑩角驚天似挺龍泉之釰騰身擲地如頎靈嶺之山吼括春雷隱隱振百里之境外氣衝秋霧縵縵掩八表之隅尾若長松而倒懸眼似流星而雙鑒相國云牛有五德一角二峯三蹄四胡五尾有夫牛者欲得四舛一㪷一緩一急一溫口欲得似㪷尾處如似覆𣏐子如受一舛又云四蹄似受一舛腹緩脚急糞乾鼻溫也言眾德莊嚴者謂正智起時二十二个心王所名為眾德並皆善性得功德名也果位中一體用分所有功德並莊嚴智也此況佛智德也言濟度自他者即自利他即利他若欲利他必先自利喻恩德如來智上具此二運故喻於牛此經具有三德故喻大乘不用餘經也言馬如大乘駿者涅槃經云以馬駕車調御駕駟是也言不比驢車者攝問何經教將少乘以比驢車答無畏德女經云聲聞如驢乘即事也言其象等者則云彼善戒經同地持論象車喻無住涅槃牛馬鹿況餘三涅槃牛喻自性具眾德故馬喻有餘伐苦故鹿喻無餘居閑靜故經云膚色充潔者膚充色潔充實也潔淨也言內德圓者二空雙證非如二乘偏證生空理內德不滿也言三色潔者潔淨也惑業苦三障盡也言戒德具者既斷二障無漏道共戒德相應故名共也或云威德非也言方言趙魏等者神智云趙在許汝相魏在垣定等州燕在幽州代即代州此等州出姝麗女女燕趙多佳人也言靜女其姝者毛詩云靜女其姝俟我城隅靜貞靜也女貞靜而有法度乃可說也姝是美色俟待也城偶以言高不可踰踐則前反女德貞靜然可畜美色然後安又能服從待禮而動自防如城故愛也愛而不見搔首踟蹰言志往而行止箋云志往謂踟蹰行止謂愛之而不往見也意云𨜡國之人㓨時若不以道化國君夫人無女德故託喻貞之女有賢有色又能遺我古之彤管之法進退可則以興夫人無德焉言彤徒紅反管赤管也取其以赤心正人也占者后夫人必有女史彤管之法后妃群妾以禮御于君女史書日月當御以銀鐶進之著于右手既御著于右手事無大小記已成法言侏有你侏儒者短人也無莊好等義也紀國云牛則高下應量觀人者謂之姝好也言相好圓等者意顯先由本智證入一切法性已後方獲得如來相好為人天敬愛也言五有大筋力者紀國云牛則大車而現力悲則荷重擔而皇功言一遍馳無者疏解也謂法身廓周法界此皆證時與法身合亦遍周法界如日光與虗空合無不盡也言二涉險者此後得智妙用也言三逢怨等者此是根本智也猶如牛與大虫鬪虫是牛怨世尊無漏智將二障為怨也言六行步平正等者牟云雙證二理為正怨親不二名平也章敬云二理雙證且約正智而論平正即證法也導生後智怨親不二言七其疾如者有二能根本智一剎那遍緣法界理引生後智大悲所擊即能內圓眾德外化眾生無遲滯故名疾如風也意云初地菩薩能動百佛世界證百法明門智力周遍名疾也言性雖捷等者問若言行步平正如何言其疾如風急行無好步何言平正答疏言性雖等如善論義言詞容雅義理雷振風行也問上來顯牛相未審作何毛色答駕以白牛問莫瘦弱否答膚色充潔問疥癆否答形體姝好問莫無氣力似白侍郎牛肥蹄老牛行欲倒否答有大筋力問莫跛脚否答行步平正問莫癡騃錐㓨不動答其疾如風也言此上七德者後得智因根本智有亦得名根本智上用也經言又多至衛之者喻上說白牛四邊多有僕從法中論事上說即八部天龍等法中論即疏言以二智為先也言煩惱利生等者問神通是利生之法任許言僕從煩惱如何亦是利生之法耶答僕從者奴婢也如愛語羅睺怜好怜婢叱呵稠達嗔奴婢等若四十四心成等正覺斷却煩惱六神及煩惱是僕從攝若六度四攝七覺等即非僕從但是隨智而起如世間從車人中亦有奴婢亦有小男女六度萬行如小男女是好人非是煩惱財餘煩惱是是家生奴神通樂事奴身是奴人問依他起行現起之時必從種起果位既無惑種如何能起現行難十地位中有惑種菩薩怨或化眾生果位貪嗔種已無貪等眾生以何化答若據實起可前難今論化現何必種生如化身中所有功德皆是化現尚非實智而況煩惱竝曰萬德化相身中起尚非記彼種能生何況漏種久已無現有何須從種起言前解為正者即前索車出體中已破取涅槃為車體也經言是大長者至諸藏者問長者家中寶物裝束一乘兩乘車即得辦長者諸子更有若十二十或至三十爭辦得三十乘牛車莫寶物裝束不足否答經言是大長者等言有為無為等者有為藏能含有為萬德無為藏即清淨法界能含彼無為萬德有為藏即第八能含藏一切也此解當體能含容多法藏言或二藏三藏者取能詮教名藏聲聞藏菩薩藏名二經律論三名三也若取三乘教法為能藏所詮理為所藏即取所詮理體中牛車以給諸子唯取三中菩薩藏下所含理道理理也理智雖通皆是所詮今唯取智以賜諸子故言今取所者問為取能藏為取所藏以給諸子答疏言今取所等言假想念者而作是念是假想念也如來任運不假起念有無減故言假想也經言不應以下劣小車與諸子等此不應與小若以小乘化乃至於一人我乘則墮慳貪也又貧人食是輪王毒也言說二種智者二乘有漏種智名下劣上解不應與小也言由有種性者皆應與大也或二萬佛時十六王子時我先教發大心也三子總與牛車名等心也言各自修智者意談彼三乘之人迴心已後各各能修大乘因智也言隨根而授者說下根亦與大乘車也非言受於自乘之車也言昏迷未冠稱者冠稱二字皆去聲呼也禮云男子年二十方行冠禮即束髮加冠於首也經言所以者何以我者問長者言我有如是七寶大車其數無量一一諸子各與大車因何得遍耶答經言以我此物等喻上說親與非親舉國之人盡與大車猶尚用寶物不盡何況長者親兒法中論不簡有性無性定性不定性等與大乘種智之車論不簡有性無性定性不定性等與大乘種智之車猶自不竭況三乘諸子耶經言是時諸子各至所望者本來出宅擬取羊鹿車誰知今日得大牛車得未曾得有亦未曾有本來客作只億百錢五十誰知無量珍寶不求自得索水得酒打兔得出語有中當覓鹽并得醬不是我本來承望之事名非本來所望也言即是前卷等者問如何是釋疑耶答此問經意與前卷經中方便品破四疑處意一種昔日說三今說三世尊不成妄語人昔日說三今說一如何不成妄語人答四十年前言陳之中說有三意許之中唯與一言言陳之心是假心假心不得乘如來不成妄語人意許之心是實心實心許與一得其一如來不成妄語人問長者宅內唱三車出門唯得大牛車唱三得三車長者不成妄語人唱三唯得一如何不成妄語人答長者言陳之中唱三車意許之中唯與一言陳之心是假心假心不得三長者不成妄語意許之心是實心實心許與一許一得其一長者不成妄語人亦同初周破四疑處云第一佛於何時出先權後實說經云舍利弗諸佛出於五濁惡世所謂劫濁煩惱眾生見命下第二云何知是增上慢經云舍利弗若我弟子自謂阿羅漢辟支佛者不聞不知諸佛如來第三云何堪說法經云除佛滅度後現前無佛所以者何佛滅度後云云第四云何不成妄語人經云舍利弗汝等當一心信解受持佛語諸佛如來言無虗妄無有餘乘唯一佛乘一三權實是正明故第二周熏為解釋言此即初者此間經問云舍利弗於汝意云何是長者等與諸子珍寶大車寧有虗妄否宅中許與諸子三車門外得三車長者不成妄語宅中唱三車門外得車不與羊鹿賀同上大牛車長者莫成妄語否言下答有二等者答意有兩重兩重中各二先設後正前則未出宅尚非妄語況正出已寧是妄言後設不與小非妄語況正與大涅槃是妄言所猒所忻成其兩意經言舍利弗言不也至虗妄者第一重標也路云既在火宅現為火燒如何復言如於火宅全其軀命等答火有二種一實火二似火人天雖有似火所燒已出三惡道中實火燒故一處配非也各自別配是也伏煩惱故名免火難不墮三塗惡趣生在人天中名全軀命言凡夫離欲等者一則全界煩惱名欲二貪欲名欲伏却欲界九品修惑煩惱因火既無名免火難又世尊交持五戒如冷水洒面名免火難言離三惡趣者若入地獄一日一夜萬死萬生名不全軀命未免人天如於火宅之內生人天二趣名火宅之中得全軀命也言未免人者意言長者但令諸子免難全身縱在火宅之中尚非虗妄何況出宅而更與車未免人天者是法如於火宅全其軀命者是喻法如於喻言如火宅也問何者即是軀命答若入三途破重苦逼善心不續如同失命且在人天善心不絕如在宅中而全身命也經言何以故至拔濟者何以故徵也何以得全軀命非為虗妄便為已得玩好之具答意道向火宅之中得人天身名得全軀命人之所重莫至於身今日得人天中身便已得玩好之具況後方便於彼火宅而拔濟之又交上牛車豈成虗妄耶經言世尊若是長者乃至至不虗妄者標也意道乃至羊車鹿車總不與亦不成虗妄況不與羊車鹿車得牛車豈成虗妄耶問何以宅內許與羊鹿門外不與不成虗妄耶答經言先作是意我本來宅中許與之心若是實心門外不得車可成虗妄咎我宅中先心是假心假心得假車不成虗妄咎本來宅內意中只與牛車不與羊鹿門外不得羊鹿不違先心故非虗妄問何以故先意但許牛車不與羊鹿答我以方便令子得出虗唱誘引名為方便意令出宅以是因緣無虗妄也言印可也者世尊見舍利弗前來問答有方便有道理所以印可善哉善哉者大好之詞也言此文有二者即是當唱中含處所家主也處以者前喻云舍利弗若國邑聚落法中論三千大千是一化佛境此唯說器世間合云如來亦復如是則為一切世間父世間父中兼帶得有情有情亦是世間義所以說有情世間也又有云父之字必對有情世間稱父不可對非情言父所以處所之中兼說有情世間也問如何將有情合前佛處所耶答疏言無垢稱等交眾生持戒布施等名嚴淨佛土又人為本者人為國之本本若窂固則寧也言父者生育者初喻云有火長者之父兩字合也世間父能生養男女佛為出世之父生長善根能斷紹佛出世父經也言第三合資產者前喻中第三老少第四資產今合說之中其文不次第三先合資產後第四方合老少就資產中本喻父先喻財富後喻多田今合中先合多田後合多財前喻云多有田宅此合中唯合多田不合多宅也言斷田者由斷貪嗔癡等煩惱得法身名斷田顯得報身名智田喻上說如世間田地不除荒穢不能生長苗稼何名好田法中論由斷煩惱染法無為斷田之內長得塵沙無為功德故名田也經云於諸等斷田以真如為體能與無為無漏塵沙功德為依名田智田以四智菩提為體能長有為無漏塵沙萬德名田也疏云准理合有三田疏略無恩田牟云經自釋文豈成疏略也問智向上有生長義可名田斷田是無為無生長義何名為田答因斷煩惱顯此無為萬德名田也如苗稼等因地有故言由分別我愛等者即我見我愛及資生愛為體恐我斷絕而起怖畏名不活畏遂於世間家生五行資具付上起愛菩提了知諸法本來是空厭患此身如癰如瘡所以無不活畏言行不饒者行不饒益是因怕惡名是果煞父害母已不饒益行是因恐惡名起名果希望世間錢財利養名希望也菩薩不貪著世間名利供給所須豈復希望他所供養等故無惡名畏即取欲希望為性據實亦以貪為體言由有我見失等者恐我斷滅而起畏也問何名失壞想答不病即憂病病即憂死以病失壞想失壞想為因起得死畏我見為體菩薩人視生死平等也言不遇諸佛等者但知觀因因惡果亦惡也惡業為趣因惡道果為趣體於當來惡道而起怖畏也菩薩人念言我若死已所生必見諸佛菩薩故無惡道畏此以癡為體言見已勝劣等者目見己身證解淺劣於他勝人而起怖畏相國云亦以癡為體菩薩人發心無與等何況有勝無性眾畏牟云此五怖初地即無佛位盡來已久上解於諸怖畏一句經已了言衰惱等者解經衰惱憂患苦言無明暗故者集諦也言惑業者問一切煩惱皆招集諦何偏說無明答疏言惑業本故言此是苦因等者由無明迷過去由暗故迷未來由蔽故迷現在言或迷三寶者由無明故迷佛寶由暗故迷法寶由蔽故迷僧寶言由證理等者無為理體是所斷處名田言無餘者斷惑障盡也言成就知見者合智田也經言力無所畏至蜜者五句經文合前財富無量一句也於中大神力一句或合前財富無量或合前僮僕不定故無垢稱煩惱為僮僕此經中有大神力不合僮僕若依此經神通是智慧向上作用駈䇿隨心約義而論有大神力合僮僕也前喻中財富無量七聖財此加無所畏及智慧力即第六度路云具足之言通此一唱經文向上總有也方便者即第七方便波羅蜜牟云方便之言亦含經中有大神通外化內德二力作用亦是方便故上消經了言內德智等者即根本智慧內體第六度收善巧方便即智慧用後智第十度收到彼岸即智慧性也言故因說之者金云因謂因由因說智慧駈䇿神通故以神通合於僮僕駈䇿義也言第四合其年等者合老少中喻中先喻老少後喻資產今合中先合資產後合老少經言大慈大悲至善事者合前喻中其年衰邁一往看經文解老則含奄然三句經文皆是老意也言愍念等者衰朽之人將死不久預為悲念言所作無者老人多心懃力而作將死之人畏無常至強強為之或藏年等非是筋力而不怖也言凡作皆審者後生所作多不思量不懼得失不慮前後多行非法老人每事多皆恩量言恒求善者老人之相多作善事也法中論化身如來久已成道名衰將般涅槃名邁化多只為所依一切眾生法身如來常與自他二利而為所依未曾蹔捨名常無懈惓報身如來即摩訶般若恒照法身名常求善事也言此中即說等者大慈大悲配恩德常無懈惓配斷德恒求善事配智德言如次配前者可親附恩德可耆敬斷德可稟承知也同與上家主老少并資產中三義何別答前喻尅體故別開今授性不相離故合說言自他雙益者二利也三身中化身利他餘二身自利也表久修因自利也智德滿故利他也經言利益一切至火宅者既言一切便是多義則合喻中多有田宅眾生數多故言多有也朽故火宅者合前其家廣大宅相也遍三界故稱大望一人說名有一大宅也言亦合多宅者即前資產中此之宅相即前其家廣大也言亦有解云等者前科文中不合戶牗今准此道理亦合前喻中唯有一門今此經中利益兩字合戶牗也言一為度眾生至多者本喻云多諸人眾一百至止住其中前喻約五趣種子說五百約此現在苦果身說言二生老至苦惱二句者合前喻堂閣朽故至傾危也言生老病至苦者合四薀中一一薀上有無常及苦死之一字正合無常也憂悲苦惱正合苦字也前喻中堂閣朽故墻壁至傾危配四薀約能依合說今此合中言生老病死約能壞法配也四薀之中一一薀上皆有剎那生住異滅遂令宅宇危朽問何不兼宅識亦說無常唯說四薀耶答宅識是所依四薀是能依但說四薀無常識住四薀之中兼說識薀無常了也今疏第一解生老病死合四薀向上生住異滅生住異滅是細四相生老病死是麤四相今於細四相向上安立生者病死名字著說為令生猒其實只是生住異滅上申正丁破古古人解本喻中堂閣朽故頭老相墻璧隤落者皮相柱根腐敗者骨老相樑棟危者觔老相上疏主破云此則不遍三界失唯在欲界人趣等中上二界及六欲天中無此事故古人云說爾不遍何失答何故能燒之火三界俱喻及說宅壞唯在欲界人趣等中耶六欲天中尚無此事言若次第配等者破轉救也古人云堂閣朽故喻生苦墻壁隤落喻老苦柱根腐敗喻病苦梁棟傾危喻死苦疏主破若次第等若堂閣向上次第唯配生苦色薀向上便闕老病死苦三義墻壁隤落配老苦想薀向上只有老苦病苦生苦死苦便無也柱根腐敗配病苦行薀向上只有病苦餘三生老死便闕梁棟傾危配死苦受薀向上只有死苦餘生老病三苦皆闕疏言若次第等破也疏主今以欲界生老病死名字喻彼三界生住異滅四相遷流舉此重苦相顯令生猒為顯上二界亦有如是苦也言或宅壞等者疏主第二解與初解別初解將生老病死寄向四相向上說今第二解准經生住異滅是宅壞體生老病死是宅壞中過失言宅壞者生依此法先非有滅表此法後是無異表此法非凝然住表此法有蹔有用故名宅壞也依彼細四相向上有麤生老病死至失古人問疏主云我將生老病死次第配四句經文疏主便難云不遍三界失疏主斷四句經文中堂閣朽故配色薀色薀無色界四薀成身無色薀如何將堂朽故為踰耶若有色之處喻色薀無常無色之處將餘句經文喻餘三薀無常亦不妨也言據實宅者結初解也生住異滅細四相遍三界五薀生老病死四相即不遍今將生老病死寄向生住異滅向上說謂令眾生生猒怖故言如前說者即是將四句經文配四薀也言今以欲界等者結前第二解生住異滅是宅壞體經文何故不說生住異滅說生老病死耶答疏言今以欲等意令眾生生猒怖求出火宅也言不爾等者重成前義煩惱能燒之火即通三界其宅宇危朽唯在欲界人趣等中此有三一半欲界交諸鬼神等揚聲大叫等三車色界交惡獸毒虫藏等二半無色界交蜈蚣蚰蜒等言未發心者本喻中言三十子約未發心前有三乘根性合中約發心已後但有身中有一乘種性究竟成佛說也何以經言教化令得何等言悲事中等者而作是念我雖能於此所燒之門安隱得出此明自出也此中不合唯合諸子而諸子於火宅內言後著樂等者而諸子於火宅內樂著嬉戲不覺不知不驚不怖火來逼身苦痛切己心不猒患無求出意言初明欲界等者合苦相也七苦者一生二老三病四老死五求不得苦即經言亦以五欲財故受種種苦至若生天上及人間貧窮困苦此上經文第五求不得苦也經言愛別離苦為第六苦經言怨憎會苦為第七苦言後如是等者經言如是等種種諸苦即是略攝一切五取薀苦為第八苦即行苦也言略攝一切等者前明欲界七苦此文通明上界第八五取薀中八苦皆盡名一切薀論分假五取薀苦名略攝下疏云如是總攝八苦盡矣問三苦相攝如何答疏云生等四苦及怨憎會苦是苦苦所攝求不得愛別離是壞苦所攝如是等種種諸苦等即結七苦苦兼攝第八五盛薀苦即行苦所攝若三界配三苦者欲界具三苦色界具二苦除苦苦無色界唯有行苦若總而言之行苦通三界壞苦通二界除無色苦苦唯欲界有也若論八苦欲界具有謂對上界有一个五盛陰苦故言七苦且如上界生即頓生滅即頓滅故無生苦既無嫉妬亦無怨憎會苦無妻子等境無愛別離既衣食自然亦無求不得苦上界五薀剎那無常無老病死苦今言欲界具八苦者唯顯南洲及東西二洲而論也欲界六天具三苦謂愛別離怨憎會苦及行苦色界三苦相望三禪已下有行苦壞苦若第四禪已上至無色界唯有行苦若依三受立三苦者一依苦受立苦苦依樂受立壞苦依捨受立行苦疏言色無色皆具第八略攝一切五取薀苦相國言變易分段五薀皆是苦名為一切也簡無漏五薀體非是苦名為略也牟云若取變易五薀理怨大寬此文合上見苦非生當見苦時子在分段宅故准經三乘宅體分段宅收也但論分段攝取五薀苦故故名略攝也又欲界七苦通明上界第八苦攝八苦盡皆名略攝一切苦也言前喻中等者喻云長者見大火從四面起即煩惱因也問此言前喻為指悲生為指悲事若指悲生此處不合若指悲事云何疏言見因火已驚心等乃屬悲生答前喻今念並是總指大科不約子科故作是釋今為不爾眾生之言通惑業苦且說惑也故不相違言此合中見苦果至影發等者意言前喻中所悲事不分出苦相及著樂至此合中即分為二前雖不明今合偏顯互影彰也合中言果即生老病死即苦果也前見煩惱火即是苦因後見生老病死是苦果也言生苦等者化度云生有五種一下一種生謂初一七日在胎中生藏之下熟藏之上兩盈中間如處穢坑受雜穢苦二轉易生從二七日至七七日五皰開張迫裂身體受轉易故苦三增長生從八七日至十月滿已來食噉不淨受嚴穢苦母食受寒凍苦母食熱受熱惱苦母若飢時受倒懸苦母若飽食時受壓迮苦受如是種種漸漸增長四出胎生謂一剎那出母時十月滿足正趣產門如兩山間胎衣破裂受迫迮苦五受用初出胎時孩子肉軟猶如新瘡墮在草上或以手捉或以水澆或以刀割齊或衣褁身猶如鋸解苦不可受言癈忘等者若在中有若在母胎皆憶得前生事業由如老時憶得小年時事若出胎已被眾苦逼身忘失前生一切事業言老苦等者少年雙眉若𦘕頰類桃華及至老年雙眉轉入要間桃華移助眼裏亦具五相一念念老謂從生後剎那剎那前即少後念即老二時分老謂六十已上萬事皆息三衰變老從七十已氣力衰微變四諸根老謂八十已上諸根皆老若老相入頭即髮白面皺若老相入眼即兩眼不明若老相入耳即耳不聞音聲若老相入鼻即喘息不通若老相入口即美食無味若老相入齒即牙齒缺落若老相入手兩手戰調若老相入心即忘前失後若老相入頰頰骨垂舒若老相入身身形傴曲若老相入皮即皮膚緩皺若老相入脚即行步不前若老相入四支即萬事皆癈床上坐臥要須人扶出入往來須憑机杖五真實老謂百歲一切諸根都無受用名真實老書云七十已上以衣煖之八十已上以火煖之九十已上以人煖之百年已上種種煖之亦無煖矣言時分變異者論云諸衰變位皆名老死也言諸根熟者熟謂老熟昧謂暗昧言彌篤者彌由甚也篤由厚也老人之相於五塵境上甚加戀著貪利深厚故言彌篤也不能遊履追求人事皆息名老苦也言如人壯美者生相也王妃竊愛者老相也遣信私通者病相也王使捉獲者死相也壯美者是年少端正丈夫竊愛者竊私者竊王妃見此丈夫端正竊生愛念遣信私通使人傳語王使捉獲挑其眼目截其耳鼻刖其手足形容頓改者為人惡賤也牟云王妃喻病緣竊愛況不相捨病與色身終必有之故云不相捨遣信喻四相王即病魔言死苦等者無常經云兩目俱翻上死刀隨菓下言捫者即是摸摸空之義也言涅槃經等者辨云經以十十相明其死苦延法師云死者一報終盡也言於險難者死是害身之所死支起時無通生路也言無有資者無法以自資可以起度也言去處等者生死無窮一死長往言而無伴侶者魂靈獨自無人相從也言晝夜至際者運運趣死名曰無常未測遠近隨業漂流修無際也言深邃黑暗者死是滅相一入死分惛沉難出名深邃也諸根滅六識無用名黑暗也言無有燈明者死已多入三塗大黑暗處名無有燈明也言入無門戶者死入身內不因門戶也言而無所處者不從外來死不離身即身便死名無處所也言雖無痛處者臨欲終時雖有五根無所覺知名無痛也言不可療者必死之病世醫拱手也言往無遮止者向之難裁名往無遮止又復入地獄時無遮止言到不得脫者無法能抑時至必遷名不得脫言無所破壞者此人身死別無福報名無破壞也言見者愁者愁者人皆憂怖也言偃仰等者若活人即竪頭行一切死人皆橫尸在地偃者臥也言哽咽者哽即喉中作聲咽即氣咽也言披髮等者此西國死法皆如此也神智云若此國死法男踴女躃言禽獸等者飛曰禽走曰獸大曰螻小曰蟻言唯餘灰等者若將火焚即成灰若螻蟻食即成糞也上明老病死詮句了言憂悲者舊云憂悲新云愁歎也言五根相對者即根對於境也而得生憂苦故如死別離時生者與將死皆得起故五根對是身以苦對樂意根是心以憂對喜身不悅名苦即此悅名樂心不悅名憂即此悅名喜也上四相交終了經言亦以五欲財利至貧窮困苦者是第五求不得苦收言五家者水火王賊惡子弟也經言又以貪著等者第三慳貪燒逼也言已得之財等貪即貪於已得財物求即求於未得財物二皆有苦已得入己者被五家侵奪故生苦未得入己者求不得故生故生苦或於財上追求受種種辛苦遺教經云知足之人雖臥地上由以為樂不知足人雖處天堂亦不稱意也言金剛般若論等者校量世間錢財能生煩惱設將布施不如持經一四句偈為他人說由有財故生起煩惱即是有漏心中今生布施第二生感得富貴果報食肉煞生造諸惡業第三生中墮大地獄也所以今生布施是第三生怨即日施財所起煩惱如世界之有微塵今因持經減却微塵數之煩惱故施財福少持經福多也言五趣輪迴者經云後受地獄至鬼之苦者或由貪著錢物慳故墮餓鬼趣或由追求錢物抵債不還墮畜生道或由追求財物害他生命墮地獄道言貧窮困等者即瑜伽論第四說諸天無疾病亦無衰老飲食等匱乏之苦故唯人間也求不得苦五趣皆有也涅槃經云求有二一者志求善法二者求離不善法未得故有苦也惡法未離故有苦也對法云求不得因何有苦答所希不果故生苦章敬云准此經論通論諸天求無五衰亦不可得故有求不得苦也對法云愛別離因何有答所愛之物及五薀身破壞離散亦有二種一者人中五薀壞二者天中五薀壞如是人天所愛五薀分別校計有無量種是名愛別離苦問何名愛別離怨憎會苦答所不愛境而共取集多在人天也強力天子入宮名怨憎會諸天捨離即愛別離也問何故偏說人天二趣答人天境界殊妙多有愛別離怨憎會所以偏說上明欲七苦了經言如是等種種諸苦者二解一云如是等種種諸苦者等取上二界苦即行苦也更不別說上二界苦只此如是等種種諸苦便是解上二界苦二云如是等種種諸苦者結前欲界苦也以經文勢似結也雖然結於七苦第八五取薀苦亦在其中其七苦各據行相增處立七苦名其第八苦遍在七苦之中七苦之中但有遷流造作即是第八苦也離七外無別自性即依前七別義以立別義即遷流義及前七攝不盡皆在第八收也言上來欲界具有等者且初三現在苦者即四相交侵五欲乖競三性貪燒逼也後一即後世苦即諸趣輪迴即是七苦也言色界唯有等者問何名壞苦章敬云此中樂受及順樂受法於變壞位能生愛惱故此變壞是壞苦惱也樂受無時變壞名共有樂受故能生壞苦有捨受故名行苦也言入變壞心等者問何名變壞心答憂惱心名變壞心問上二界無憂惱如何名變壞答從無煩惱心名變壞心問凡言變壞者變於樂受而入捨受名為變壞今第三禪唯有樂受四禪唯捨受如何得有壞苦相耶答但言色界而有壞苦非要地地皆悉有之二云三四靜慮樂捨相總遍今言第三有樂第四有捨者據增說言合著樂者本喻中唯有悲等事文今合中開出苦相著樂也經云眾生沒在至不以為患合前本喻而諸子等於火宅內樂著嬉戲等正是著樂行相言不以比智覺者解經中不覺字不以第六識將諸人死比況自身名不覺也言不以現智知者解經不字但沒在苦中受諸苦惱唯恐後人不活名不知也言不驚其果苦諦不怖其因集諦不總猒苦不求滅諦不求解脫不行道諦言由此馳流等者即解經中於此三界火宅東西馳走等東喻善趣西喻惡趣牟云經言眾生沒在其中至不怖六句經文合前喻中而諸子等於火宅內樂著嬉戲不覺不知不驚不怖此中經云亦不生猒不求解脫合前喻中心不猒患無求出意此間經云於此三界火宅至患四句經文本喻中無也唯此合文本喻中無也唯此合文中開出也又此四句經文與無希取大之化喻文同彼處經文科為二初不希信者父雖怜慜善言誘諭而諸子等不肯信受復不驚猒經言不驚不畏了無出心亦復不知何者是大何者是舍云何為失但東西走戲視父而已且此兩文於此間見苦悲生合者由有二意一即是翻譯家錯即合將此經文向無希取大之化喻文合中一處譯出二者所悲事中著樂亦即彼無希取大之化時時節三界之凡事體既同寄於此說也言譬愚頑者疏主斷也此喻三界眾生云云言初合初喻者合果化也前喻云舍利弗是長者作是思惟此合云舍利弗佛見此已便作是念前喻云長者此合言佛前云思惟合云便作是念前喻云我身手有力當以衣裓若以机案從舍出之舍合云與無量無邊佛智慧樂令其遊戲前是喻此法說也合中與無量無邊佛智慧樂正合身有力机案頓拔獨覺中子出苦也合其遊戲者合前手有力衣裓頓拔聲聞少子出眾苦耶言且以佛果智慧等者牟云准喻中初思頓授通慧之體後思二萬妙用頓拔二乘今合後意也言念大乘因化等前喻有三一念初不能依大教行經言復更思惟是舍唯有一門而復狹小二若起誹謗沉縈惡道經云諸子幼稚等三念示眾苦密說大乘經言我當為說怖畏之事等今此合云舍利弗如來復作是念至得度此上文唯合喻中第一段是舍唯有一門而復狹小望佛本意本來擬受與眾生神通智慧體不交眾生行行便擬交成佛去既受與體不得今與說大乘佛果通慧功德令交行因取果即同前若但讚佛是也今捨方便直說一乘法交行因取果去長子能出中少不能即經言眾生不能以是得度此唱亦合第三念示眾苦密說大乘本喻云我當為說怖畏之事此舍已燒宜時至燒害此問令前密說大乘有二功能一能取佛果二能交出苦意從行行牟云此但是念由來密說後十六王子二萬佛時正告故名密說若爾彼時顯說何名為密說答如來雖知彼聞大乘教不肯依行退流生死為今靈山證實之因而強為說彼不知意名之為密言合無希取大之化者本喻云分二初不希信經云父雖怜慜善言誘喻而諸子等於火宅內樂著喜戲不肯信受二不驚猒經云不驚不畏了無出心至視父而已此唯合不希信經文不合不驚猒也言初喻者經言舍利弗如彼長者雖復身手有力乃至各與珍寶大車也如來作念我將神通智慧頓受頓拔既不得我更將神通智慧向上利眾生作用與說三乘法令依教悟理出生死去前來捨却方便此間却著方便方便是通慧向上作用先與說功用陶練後與大牛車言顯佛為緣等者問三乘人各自修因何名與車答疏言顯為緣等佛勸方能修行亦名佛與即同下文而諸小王不順其命也王遣兵眾即佛勸眾生也言攝智及通者即力無所畏而不用之也言知欲如何知者即後如何也既果化不可得知復如何但令各因至果意說世間良醫善能治病但可應病與藥令得服行豈得自以力手割他腹中之病而不與藥如來今者亦復如是但可應三乘諸子為說三乘法豈得以智慧神通頓除眾生身中煩惱之病而不為說三乘法也由此故知頓授机案與獨覺頓授衣裓與聲聞令其二子更不行因直出火宅取佛果不可得也言合正說三乘者本喻有二初知根經云父知諸子先心各有所好種種珍玩奇異等後正告正告有總三總一告令取經言而告之言汝等所可玩好希有等二別示三車如此種種羊車鹿車牛車等三正勸出與經云汝等於此火宅宜速出來今此合即疏言有四是也章敬云合中四段第四讚乘勝德合前總告令取第二勸取三乘合前第二別示三車第三引己為證合前正勸出與第一勸猒三界本喻中無也言三界火宅內體者即解經汝等莫得樂住三界火宅即是勸離內五薀異熟果體也經言世界不窂固等又言三界無安等言故此麤弊者解經言勿貪麤弊至也者五塵外境也章敬云內外二體即是苦諦若貪著生愛等即是集諦有漏因果二諦倫矣言雖有妙果等者則當來成佛之身金剛妙體意通汝貪內苦身何如內金剛身既貪外五塵何如忻淨土之中五境眾相淨土之中只合言五薀若言塵字疏錯也言而未明說者勸猒三界四十年來為聲聞說火宅亦合為化說火宅門外有淨土妙果令忻今唯說猒三界不說忻淨土是未分明說也言引己為證者合前第三正勸出與本喻經云汝等於此火宅宜速出來隨汝所欲皆當與汝合云我今為汝等言我為汝保者我獨與汝作保也言生死聖訶等者解經皆是聖所稱歎也言生死繫等者淨云凡夫為三界惑業所繫初果人為欲界七生惑業所繫二果為二生惑業所繫阿那含人為上二界一生惑業所繫有學之人皆是少免繫未得自在三乘羅漢具免諸繫故名自在也言有漏之法勝者意言人天於有漏中勝也問何不於三塗建立求耶答惡趣境乖故不求也言三乘不然者謂不同凡夫取著而求也言無過失等者問若言三乘非所求者如何得有求三菩提之薩埵故此疏言無過失等意言非謂無真而即不求也顯無彼貪欲等求也若爾如所知障為緣執佛可求眾生可愛即是法貪無明習地等何名無過失答今約所求之法是無至失也由此能求亦名無過故不同彼也言更無增減者三種欲生攝欲求盡名無增減也言現住欲塵等者謂下之四天欲增先有色類已定於此住欲塵境上生貪求故因妙境起今取何貪何貪即塵生謂眾生為在欲塵中之眾生也言現住者簡異上天隨逐緣化起意言此等四大所有外異皆是先有現在之境也問三途之境亦是現住何不建立求名答三塗境乖不立故也言自變者謂第五欲天所有境自變為之於此自變欲塵境上生貪求故名自變也言他變欲塵者謂第六欲天所有欲境皆他變起最是希奇於境上生貪求故名他變他變中亦有自變然以他變希奇以勝故故用標名六十四云欲求有五一攝受求二受用求三喜樂求四解了求五聲名求言離生喜樂者離謂猒離遠離生謂生澁亦如生食欲界煩惱二性間雜為至增故由如於生初禪離此名離生喜樂者為得當地定故以此為依輕安定水滋潤其身名為灌灑輕安相應意識俱受體雖是一適悅身心分喜樂二言二定生者定即當地之定彼喜樂受依定生不同於初從所離說也言三以離喜者謂第二禪離第二定喜得第三定樂離謂猒離由見二禪喜相遇增故故猒離之所得之樂上下地無初離喜故從勝標名意說離喜而有樂以樂灌灑其身理實此樂亦因定生今從所離而標名有求亦五一法爾求如劫末時任運離欲而得生上二忻樂求作意心生上界三愚癡求不了上界是無常故四猒患求猒下故五思擇求思擇力離下染故第三無貪為體第五慧為體所緣別故言邪梵行求者亦有五一唯求求唯起涅槃心不修於梵行唯以求心為求二趣向求趣得涅槃兼修梵行三現得求求現涅槃而修梵行四後得求求後菩提而修行五思擇求求當得法種種思擇而修梵行也言雖有梵行求者問佛令修行何言非求答疏言雖有等意言今求三乘之求是正梵行求非如外道持戒苦行等求四空為涅槃是邪梵行求非正求也言正乘乘已等者謂入見道見道中所有功德名為正乘前加行中所有功德即名乘已若入修道修道中功德名正乘前見道名乘已無學相望亦爾相國云三乘若自得正乘已更修諸法助此乘體正助相對故名正乘潞府非唯局三乘自體仍以五根根等諸功德莊嚴而自娛樂等言初必依佛法者路問亦有有從餘說法發心如逢馬勝等如何疏言初必遇佛答最初發心要必遇佛馬勝等約後時說不爾便違涅槃所說不遇不差不老文也設不逢佛遇教亦得名佛所說故言依因支等者論解資粮云此位菩薩依因善友作意資粮四勝依力於唯識義雖深信解而未能了能所取空多住外門修菩薩行言聞法自行等者解法自行等者解經中自求涅槃義也答難亦得問若言依善友者何故經言求涅槃答疏言聞法行等言瑜伽等者即聲聞地文也言聲之聞者聲即屬佛也聞即屬弟子聲之聞依主也二云聲即屬迦葉等身也聞即屬一切眾生聲之聞故亦依主也言有財者即聲屬如來聞屬所化眾生故也二種之名皆非己體合二為自全取他名有財也經言以佛道聲即佛教令一切聞即是眾生即其證也以此聲聞為財而彰自名全取他名有財也言前通定性等者問前瑜伽解與後解信品二釋何別答前寬後狹大論釋一切聲聞通定性不定性後依自經依聲聞自類唯是不定性也言此求涅槃等者斥古人取涅槃為車體若取涅槃為車體與化城有何差別疏主但求涅槃修行擬者以所學種智為車體言此文略者問疏主取種智經何不說答疏言此文略故經應言自求涅槃及以種智經既無智言故是略也言不求與佛等者約得果時不要逢佛名不求非是部行得果已後一向不逢也言略無因力者問前言四力此何無四答但是文略也此次前言故名精進者能證通也言善寂者即所證理也牟云詳精進連自然慧下讀方見道理但解求慧不解精進也言待緣而證聖果者問其相云何答如經中說過去有王暮春三月將諸婇女後園遊戲見諸樹木華色鮮明王於爾時便生貪著暫於樹下寢息少時婇女宮人見王愛慕遂於樹下次第摘來遍遶於王布之令迊須更王覺乃見其華遍遶其身悉皆萎萃即便生念世間之法衰盛何常向見諸華鮮明若是何期不久萎萃如斯我今此身亦復如是今雖狀美世所無雙不久之間會歸磨滅深生猒患得緣覺果言辟支佛等者路云具三義成辟支佛十地經亦有三義與此經同一彼經言不從他聞自證覺故論云一者自覺不假佛菩薩說唯自覺悟即此經中求自然慧二彼經言不能具足大悲方便故論云二不能說法不起說法不堪說法即此經樂獨善寂三彼經言而能通達深因緣法成辟支佛乘論云三觀少境微細境界故言此有二類等者一者部行此是鈍根但六十劫練根時少得果故二者麟角此是利根即百劫練根方得聖果時節既多故利根也金云麟角利根劫增時出唯在南洲必是定性要唯獨出部行鈍根劫減時出通在四洲眾多共出多是不定性言故華嚴等者問佛將下生移此獨覺向他方佛土者此既不見彼何則容答彼雖佛國已入涅槃亦名佛國故不爾相違也又解隱令不見亦名移也言時猶少故者路云在加行位一生一坐智入見道名為時少不容練根故作部行少乘俱舍說若在凡夫可有迴心向獨覺果或向佛果若是聖人必不迴心若大乘總迴若從聲聞資粮位迴心即作麟角若從加行位迴心即作部行又加行位中燸頂二位許有迴心向大或趣獨覺忍位世第一不許迴心向大何以故由忍不墮惡趣故菩薩由於三惡趣中廣利眾生故說忍位不許迴心向大問何故資粮位迴心成麟角加行位迴心便成部行答獨覺中利根者名為麟角鈍根名為部行二種別也利鈍復有二種一者根性利者名為利根根性鈍者名為鈍根二者長時終者名為利根少時修者名為鈍根今取後類所以資粮位迴心即成麟角以是長時根性利故加行位迴心即成部行以是時少根性鈍故故此二類有別也問頗有獨覺不從聲聞資粮加行從自二位修成果否答亦有婆娑第七云有獨覺種性順解脫分轉起聲聞及佛種性起餘亦爾自果亦然若起佛種性解脫分已則不可轉作聲聞極猛利故問緣覺總有幾心答一百六十心也相復云何謂見道十六心八智八忍即成十六修道有一百四十四心即上二界八地之中各有九品八九七十二品此七十二各有二道謂無間道解脫道二七十四一百四十二二四通而言云成一百四十四并前見道十六心成一百六十問何因見道八忍八智即通三界及至修道唯說上二界不說欲界答欲界現前法忍法智已斷欲漏更不儗宜所以不說上二界染不現在前所以儗宜更須別斷也是故唯說上二界染一百四十四心問部行麟角二類有幾差別答六對一利根鈍對二劫增劫減對三一洲三洲對四獨出眾出對五定性不定性對六迴心不迴心對解曰麟角名利根部行名鈍根利根必劫增時出鈍即劫減時出利根必南洲出鈍根通四洲出利根各獨自出鈍根眾多同出利根者必定性鈍根者多不定性定性者必不迴心不定性者可有迴心迴心如何如經中說鹿母夫人生一肉殫殫開已後生一千男子長大出家成辟支佛後迴心已各得成佛即賢劫中千佛是也言初解大乘者路云准經應言初解大乘經言求一切智至無所畏名菩薩經言慜念安樂至一切名菩薩是名大乘菩薩合結上二義意必然問初求後求何別而分二名答初求屬初發心後求屬發心言觀空智者問三乘同有理智無違言觀空者𮓪聖教且如大般若三百六十五云佛言善現一切智者是共聲聞及緣覺智何以故言一切智者謂五薀十二處十八界二乘亦能了知名一切智准此三科名為一切能了之智名一切智定緣三科名觀空耶答此一切智諸教不同疏舉一邊亦不相違相云即觀三科中無有實我名觀空智今謂般若言三科者解一切名疏言觀空者即觀彼三科中之真理也即同是法住法位也相言無有實我亦好三乘同有不言法空也言由自覺生等者不同外道依他冥性自在等因而生得智亦不同外道無因而自得也意言如鶖子悟佛知見實道悟自智方生名自覺生如言解義言不待他緣者問心法四緣生云何言不待答要自四緣此即生起非四緣外別更待緣也言或智性者體凝本有名曰自然法爾種成名無師智問佛經三大劫修歷事於善友何得言自然師耶答此並約金剛解脫道一剎那正證理時名自然無師以此時菩提尚不可得何況有師學耶言菩薩者三乘等者路云汎釋可然若准結中經文是名大乘菩薩非通三乘下疏言求智者菩慜念者薩又望義各別由此羅漢菩薩三乘通攝求三菩提之薩埵也言各有一種一性者通辨三乘總有七人初有三人各唯一性即三乘人各於自身有自種性故此是定性人各於自身乘證自果故次有三人各具二性一有聲聞獨覺性二有聲聞菩薩性三有獨覺菩薩性後有一人通有三乘種性此後四人皆不定性如迦葉等即不定也今謂三乘通論有三種二性若言三乘各有菩薩義即不成且如菩薩聲聞菩薩獨覺此之二性可攝在菩薩乘中若聲聞獨覺者即無菩薩性空得攝在菩薩乘中若許攝者即應無性得聖果共若不攝者言二乘各有二性此有二意一云應言二種二性方是二者言三無失且如菩薩乘有菩薩聲聞菩薩獨覺是一種二性獨覺中有緣覺菩薩性緣覺聲聞性又成一第三聲聞菩薩性聲聞緣覺性皆取有菩薩性者若爾三種二性有何差別如菩薩聲聞聲聞菩薩緣覺等亦爾有差別答此但作句數分也若不爾者三乘各有一種性即休何用獨分一種三性三種二性也言初後發心等者汎明三性不定或有先發大心爾後得果或有先發聲聞向前證道明知一人通有三性所以然也言說如聲聞菩薩性者即初發聲聞有緣覺菩薩性者亦爾名為不定言如大迦葉者由常頭陀靜處是緣覺行舍利弗准此言初合說實者前喻非本所望已上喻實以下釋疑今此合中第一之樂已上合實已下合疑言初合釋成等者前喻有三一標富有所以者何是大長者財富無量二念均平而作是念今此幼童皆是吾子無偏黨三釋所以所以者何以我此物周給一國由亦不匱何況諸子今此合牛但合初二牟詳前喻中釋成父志中無見子得出見子得出乃是依言免難中經文言今言合者未知何也抄無解今為一解為此釋成中初喻中有安隱得出之言後合亦爾為有等賜大車父隔故見子父入此合中若無賜大車言即判入前也釋家不以文雜故也移此二文即無過也經言如來亦復如是等合子得出也長者門外設三車出門唯得於牛賀如來方便說三乘法究竟唯得一佛乘言以教門等者佛之教門有二一者教門二者行門若以教門即名為出若以行為門亦即名為入出即三界之苦入即涅槃之樂言亦可設言等者意言涅槃即教下所說理因教悟理亦可說言教能入理然此中前解教上有出行上有入此解教上亦有入義不說行也然教行二皆有入出之義望宅名出望果名入也前喻云是大長者財富無量種種諸藏悉皆充溢此合言如來亦至藏本喻云而作是念我財物無極不應以下劣小車與至差別念均平也此合云是諸眾生皆是我子至滅度也言不令等者意言不令菩薩獨得大般涅槃二乘人不得也均合平也經言是諸眾生至之具者喻中有四一乘標與車二嚴餝等嚴餝有十嚴合中有二一車體二車德不合牛相儐從也經言皆是一相至之樂者離雜染相遮不是有漏一種者一無漏種類表是無漏言若因若果者妙平二智名因四智菩提名果又因者初地門中二智後智為車意言諸佛具此功德能與四大聲聞開知見性令當來作佛亦得淨妙第一之樂所以聖之稱歎也望彼諸功德此車為本故言五樂之中者一自性樂二因樂三苦對治樂四受斷樂五無惱害樂無惱害樂有四一出離樂二遠離樂三菩提覺法樂四涅槃寂靜樂四中第三覺法樂第四寂靜樂覺法是菩提寂靜即涅槃問疏主難他古人取涅槃為車體如何此同車能生淨妙第一之樂莫取涅槃否答此說車上功能如來種智車能生鶖子身中有為無為功德佛後得智智為能生鶖子種智及涅槃為所生故歎云能生淨妙第一之樂也言釋疑有二等者前喻釋疑中有三一問舍利弗於汝意云何是長者等與諸子珍寶大車寧有虗妄否二答舍利弗言不也世尊是長者但令諸子得免火難全其軀命至與大車三印佛告舍利弗善哉善哉如汝所言今合中初舉喻經云舍利弗如彼長者初以三車至之咎此上舉喻訖經言如來亦復如是無有虗妄合中標文也亦同前喻次初不與小非虗不達先侵意世尊若是長者乃不與最小一車猶不虗妄後況與其大車而成虗妄所以經言何況長者自知財富無量欲饒益諸子等與大車標也言此釋也者經言何以故如來至能受者問何故如來初說三乘後說大乘名無虗妄耶答如來本意與說大乘法但是眾生不能盡受所以於一乘道分別說三乘舉喻如三歲小兒昔日口小契大餅角不得只分一角之餅為三已後既漸長大即合三角為一四十年前大性未熟即開一乘為二四十年後既根熟即合三為一言結答等者都結一品權實意故名結也答者鶖子四十年前於一乘體上分別說有三因只是教行有三不是分別理果為三也教即有三理唯有一因即有三果唯有一實也三因者汝等所行是菩薩道教有三者為求聲聞說應四諦法等經言尋念過去佛所行方便力我今所得道亦應說三乘也第五疏徹言是第三大段等者疏主意第三段文不述長行也章敬科總述前長行釋疑文兼述初周斷疑分道理雖有違疏也言頌今實等者經言時諸子等各白父言先父所許翫好之具羊車鹿車牛車願時賜與等下偈經云爾時諸子知父安坐皆詣父所而白父言願賜我等三種寶車等言初半偈等者長行喻云舍利弗若國邑聚落有大長者其年衰邁云云長行合云舍利弗如來亦復如是則為一切世間之父於諸怖畏至而生三界朽故火宅偈言譬如長者有一火宅言五趣危亡者長行喻云多諸人眾一百二百乃至五百止住其中堂閣朽故至在此宅中長行合云為度眾生生老病死至令得菩提偈述云其宅久故而復頓弊至毒害火灾眾難非一言第三有十四等者長行喻言長者見是大火從四面起即大驚怖至隨汝所欲皆當與汝長行合云見諸眾生為生老病死之所燒煑至便得無量安隱快樂偈述言是時宅主在門外立聞有人言汝諸子等先因至可以遊戲言第四有六偈半等者長行喻云是時諸子聞父所說珍玩之物適其願故至歡喜踊躍長行合云舍利弗若有眾生內有智性至為求牛車出於火宅偈述云諸子聞說如此之車即時奔競馳走而出至是故諸人我今快樂言此初喻長行有六者一處所二家主三老少四產業五宅相六戶牖今頌唯二譬如長者家主也有一大宅宅相也當唱之中餘六句經文屬五趣危亡喻也長行三界佛有喻有六段文今唯述二疏主唯文勢分別不得所以兩唱意總合為一唱同長行三界佛有喻與五趣危亡各別開頌文何故兩文合為一唱答一疏主意解故三界宅與五薀舍不別故不別開二有一火宅即本識識薀是總餘四薀是別不異故不別開言三釋如前者問何長行乃言多有田宅今此頌中而言有一大宅答三釋如前長行也一云長行授眾生無量故言多有頌文漏指一人故言有一二云長行如一六合而光宅天下故言多有頌文如來等視眾生猶如一子三云長行約眾生各別言多有頌中依佛為主故言有一又何云將眾生就佛即言有一將佛以就眾生故言多有也四判頌文有一大宅述長行其家廣大宅相也何故將長行資產中多有宅對偈中有一大宅而作三釋耶答緣長行宅相中云其家廣大古人便執家宅有異疏主意顯不別所以將頌中一一大宅述其家廣大將多宅解有一大宅又多宅體相同故言不述第四眾子者有無不同言宅宇危者長行先說人眾甚多後說宅宇危朽偈中先說宅宇危朽後說人眾甚多前後不同也言七句明等者前六句為一唱第七句便屬後唱問何故疏主科文七句總屬前唱及至疏解想薀無常乃屬後唱耶答若准義科即合墻壁圮坼想薀無常並屬前唱與三界五薀中一處明了義方周足若准文科即合屬後唱屬後唱之中上句云墻壁圮坼下句泥塗褫落泥塗事須依墻壁有若無上句下即孤起所以將墻壁圮坼泥塗褫落一處說言宅久故等者識薀無常也久年多也故惡也金云第八識無始時來至今有故名久現識頓生頓滅名頓弊潞府云竪而論之識薀之始剎那四相念念生滅名久故橫而論之識薀向上一期四相故成頓弊竪約無始時來生住異滅細四相也橫而論之約當生生老病死一期四相也竪論細四相無始時來生滅無窮時長遠故名久故橫而論之麤四相當生之內生老病死遷轉不停相國云無始時來下界滅上界生上界死下界生竪名久故也此從最初生又最後滅生滅二位頓而無漸而名頓弊一時破敗也意言無始時來顛倒生如彼多年風雨朽名久故一剎那中最後頓捨如森然倒故言頓弊又云一生七十八十名久即頓弊也言堂舍高危等者古人云欲界身如堂若生上二界如舍也疏主義身根大而為堂諸根小而為舍其堂廣大遍於舍其舍小故不遍於堂身根大故遍餘四根四根小故不遍身根四根闕而不妨身根在身根闕而諸根亦無舍事須依於堂餘四根事須依於身根長行言閣堂上重舍以舍替閣故言堂舍高危者喻上說長者家堂舍大高大高易危危必不安是無常相也法中論人身正盛就肥壯有力則是易衰之相時人頓盛就中却不是好天行時氣先到伊門熱病到來增寒壯熱冷病到來面色萎黃亦如木秀於林風必易摧色如聚沫不堅實故又如屋舍置來多時林木悉皆朽故怨畏去倒著種種者人老去助十子柱枝起坐相隨言柱根摧朽者取行薀中命根為柱根也柱根摧朽故梁棟傾斜命根若無受等即謝故大品經云如人命根在即餘得立命根若滅諸根盡壞行薀七十三法為體於中最勝者莫若命根命根有連持色心不斷能連持不斷則由命根長短分限乃由先業欲得命根久長必因基陛窂固欲得色身長命由他業力住持喻上說基陛能持業根法中論柱思能持命言念念遷謝業思等者謂業因若盡命果不長念念遷流無容正受諸根毀敗何可安哉意言柱根與基陛此之二句俱是行薀也因基陛即有柱根因此桂根便有梁棟此身亦然於業思便有命根因此命根便有命之因果皆是行也問五薀之法聚義皆同何因識行二薀各攝兩句經餘三名一耶答識薀為主橫竪有殊故分兩句其行薀者百法之中攝七十三於中唯取命根一種又命根中通於因果業思即是命因命根即是業思由善惡業為因故當來能感善惡之果命有長短故知命果皆由業因因果有殊故分兩句不然故各一句言梁棟傾斜等者梁即橫梁棟即竪栿梁棟若在向上椽廉即存梁棟若傾舍何安立梁即依棟棟即依柱容受依主受主受依命根也由有棟坂向上有梁由有第八識主意領納前境方能依五而發五識領納領納五塵境五塵境皆由於受也此前六識受因於主受方有容受也疏云二解一識體名正受二取相應心所中領納名受第二解為正又第二解中復有二解一取第八識受名正受總報主故第二兼前受攝在一處都合名正受言何可安哉者則云顯五薀諸受皆是無常也又云說失正受即第八識受何可安哉受現在一諦水打著一个浮漚生一个滅一个順境喜受領納順境忽有違情境憂受亦領納前境滅而後境生前領納滅而後領納生生滅念念不定如浮泡也言基陛等者即遍行中思為體大乘諸業皆是思故能持命根故喻基陛也如世間人造舍基若堅實其柱即久長若基陛不實柱即不久摧毀思上業勢分限若盡即喻基陛隤法合亦爾業思之而安命根由因命根方有正受由有受能領納方有法生起也問行薀七十三法中何故偏說業思并命根答業思是因命根是果因果有別說二法問餘法何不說答但舉此二攝餘法釋其中所有法依命根故言墻壁等者外御為墻內捍為壁安國云本質疎緣名墻相分親緣名壁路云藉質變名墻離質變名壁虗而不實念念生滅故言圮坼也
