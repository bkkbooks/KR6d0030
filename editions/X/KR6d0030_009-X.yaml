body:
  text: 鏡水寺沙門栖復集然法華論中十五義解應婆沙六義解應唯識論三義解應言一應受飲等者問阿羅漢是何義答疏言一應受等言堪為福田者疏解也糅云凡夫之具諸煩惱身器不淨如醎鹵田不生苗稼不資長一切功德即是諸煩惱未盡名為舉倩即是不堪為福田見修皆盡故是良田問如說見道及修道出慈心定供養皆獲現世之報何非應供答有學之人修惑尚在猶有妻子非一切時堪受供養故不應也言二應將大眾等者將者將護眾生愛多說法即與多說愛少說者即與少說二將者上聲呼將者㢡義餘義若有煩惱貪嗔名利不堪傾御大眾教化言三應入聚落者問羅漢是何義答云疏言三應入菩提言得真自在者是十六句中第四句言非為欲境者問何要事須證得真自在答疏言非為欲境等凡夫不得真自在得假擇滅煩惱暫伏不起遇緣却起如頭藍子伏彼事惑得非想定後時乘通往來王宮中因嬪妃等青峨皓齒傾城腰無咫尺笑直千金於是失通墮地步行而出欲境牽心故不應入即是欲境不牽堪遊聚落五塵在意莫到城隍言心善解脫者此心若是緣慮心離性障得解脫若是禪定名心離定障得勝定起神通言具智辨者煩惱既斷慧力堅強智辨過人故能降彼即是拙口鈍詞難申立破捷才智才可伏魔怨又亦分得四無礙解名具智辨也言五應以智慧速者有智慧能觀於空有何法與眾相應速者即是慧性捷利也觀察者即是簡擇義觀彼諸法剎那生滅無常無我等盲無慧眼不了苦空有慧之人速能觀察言六應不遲等者牟云說法之議有三一順法體二稱根性三說合時不少說名不遲不多說名不速又眾生根熟不與說名遲若根未熟與說名速二為利者速說為疾鈍者遲說如鷄附卵啐同時也三樂遲說與遲說樂速說與速說名不遲不速也言如法相應者即順法體義只此不遲不速說法善順人心即是所被之人與能被法相應相應者契合之義若解闊堪能說法唯知我意必不稱人春秋云以欲從人即可以人從欲鮮濟此上契根法稱體而說名如法相應名契理也言如調慧馬者不是羅漢調眾生名調慧馬但是羅漢三業隨順如來順眾生故如調慧馬慧馬即善順人心羅漢乃不違佛意善解調心堪能說法也言七應靜坐等者問第一應受飲食第二應將大眾入城此義寧通答彼約利他此約自利名靜坐也言少欲知足者已得之財不積未得之財不聚積而能散聚由礙也上求也知足故不積聚也龍則好靜處羅漢不樂生死言離闠閙者市門也不寂靜義也顯能龍能離此少欲義成言八應一向行等者貪修諸行不著於禪名為一向若人貪著禪味修行則有間斷更不異緣名為一向也四禪根本定十八禪支總名諸禪非同今時禪師少時心安執為勝定遂於文字一向撥無此大羅漢於禪不著道諦雖滿而復進修躭著諸禪不行善行精懃無足常樂進修問既稱無學寧有進修答二乘究竟道欣大菩提故諸佛究竟道樂利樂他故若是不定性聲聞求大菩提慧解脫求四禪八定練根除障亦名進修若定性無學未入無餘已前求勝智慧求勝神通亦有進修也問羅漢亦有無記心何得一向行善行答據於加行心說問如何不著諸禪答已作所依故所作之事作已訖故或約此會皆不定性故即無足精進中不捨善軛也言九應行空聖行者即是依空解脫門觀我我所空所顯空理名已辦所辦滅諦理也我執既無成空聖行也言十應行無相聖行等者即無相解脫門觀滅諦理時當苦不生集因既無苦果當滅生死因果皆已斷故名棄重擔重擔即生死二法押溺有情如扇擔物不出離故即生死未盡有相牽情重擔既無能行無相也言十一應行無願等者即是無願解脫門謨云既得有餘依涅槃之己利云何求生死劣法未得聖智已前出於生死之法有所求今既成無學依此解脫門於有漏法更不願便捨生死得證有餘涅槃名為己利也問此三聖諦行與十無學智行攝云何十智者苦集滅道法忍智類智世俗智他心智盡智無生智相攝者空聖行攝八法智類智四諦智盡智無生智無相聖行攝五法智類智滅智盡智無生智無願聖行攝六法智類智苦集二智盡智無生智問此與三性攝云何論云理實皆通隨應各一空攝遍計無相攝依他無願攝圓成也言十二應降伏世間禪等者問第八不著諸禪與十二不生味著何別答若是第八一向行善貪修諸行不滯著諸禪若是第十二降伏世間禪不緣修諸空行於禪定中不起愛味煩惱名不著兩般差別如二人向講一人不肯受八戒去一人貪聽經不肯受戒那一總不聽經亦不受戒一種不受戒淺深別也言世間禪定者即有漏定也凡夫有學雖修禪定味著隨生今者無學三有愛結既說永亡得淨定時不生味著故說名降定有三種一者愛味定金云謂初得時於根本定起愛染煩惱躭著於定更不起進修名為愛味定二者淨定雖是有漏不味著名為淨定此二雖俱有漏味不味殊故云分為二三者無漏定體是無漏離愛味故即是貪心貪心若在尚染禪支諸結永亡能障愛味也言二有界定者三有之中除欲界取上二界名二有界定及二禪不生味著問禪唯色界何故言二界攝自問自答有三一云疏本脫第字應言第二界是二云文總應云於色界不著於禪於無色不著於定三云無色界亦得名禪禪者此云靜慮亦云功德叢林能生一切諸功德故若不爾者禪波羅蜜應攝定不盡問諸教之中何故禪與定別答色界具支無色不具勝故偏說云何具支耶答俱舍云初靜慮五支尋伺喜樂定二禪具四支內淨喜樂定三禪有五支捨念慧樂定四禪有四支捨念中受定然禪定二名互相通論若不兼定智論云云何定禪謂四禪四無色定定不兼禪云何言此本等至八也言十三應起諸通等者問前來上云起門中將第二句諸漏已盡釋第四句云正智解脫正智是能證智解脫是所證理此間何故喚解脫作神通答此論主意別前來由煩惱覆真如理正智未斷之時一則理未解脫二兼能證智未解脫由智起未斷却理上煩惱理智二種皆得解脫智既解脫便起得神通未斷理上煩惱障他神通起不得煩惱斷盡起得神通故此處喚正智解脫作神通也二者前門約正智證理說解脫此間兼約同時能證智上起得神通神通因智解脫分能起得故喚解脫作神通也上二解正問如何言神通是勝功德答久學一切變現皆由神通故勝功德也言十四應到第一等者無為滅理是第一義功德此第一義是所到心是能到問如何名主心自在證無解耶答前云無學之智名心自在假者身名主由主自在心位獲無解理第一義功德也言波羅蜜多等者論云到彼岸彼岸者即是波羅蜜多聲聞廣度眾生羅漢自成就得十六句功德將此功德願一切眾生令同己利身得此功德釋云廣慧聲聞攝生同體合同己身得功德故名同生眾也顯此是俱解脫羅漢若是慧解脫鈍根羅漢不能廣度眾生也言第八修行不息等者問前第八言不著諸禪第十二言不生味著此二何別答第八修行不息即是一向行善行不著諸禪第十二云不生味著此前進善邊後約破惡道說也牟云如聽人一人受戒了貪聽經無功聽律有一人亦不聽經亦不聽律不聽所望義別又云第八約迴心聲聞不著諸禪常精進故第十二羅漢將自所得定降伏凡夫外道等定心故言恐厭文繁者意道前來配屬經論恐文煩廣但是略陳然於此義中隨釋可知言應說頌曰受生入降已等者結偈備意也受者應受飲食將者將諸大眾教化入者入聚落降者降外道以者以智慧速觀察法等言第一應等經云諸漏已盡言第二應將者經云無復煩惱第十一應行逮得己利言第十二應降者盡諸有結言第十四應到者經云心得自在初阿羅漢是總句故所以不配也言攝取事門者標門名也言以十五句攝取十種功德者此經十六句攝得阿羅漢身上十種功德或二或三句合與說之攝一句功德或一句經攝一句功德也言此中意說十五句者十六句經中說著有為處即是攝得十種功德中不可說果說著無為處即是攝得十種功德中不可說果問法性離言何唯無為是不可說果答若法體一切皆離言若約有為法證得共相證他自相不共相若是無為舉體皆證不著故言可說果不可說果意道向下十種功德不過有為無為也果者即是無學果位功德故名為果也集論云若法生滅住異是有為義有為相違名曰無為然其無為大少乘異且小乘經部宗立三謂虗空擇滅非擇滅若大乘宗中掌珍五薀論立四謂虗空擇滅非擇滅真如若百法唯識立六更加不動想受無為今言無為果是擇滅非擇滅無為果也金云先於見道門中無間道證斷三界四諦下分別煩惱盡解脫道中證無為又三界九地斷俱生惑地地九品惑故九九八十一品通前總證見道無為成八十二品名無為果也其有為功德有二十八謂遍行別境各五善十一不相應中取五法一得二生三住四異五滅并無表色及心王計二十八法中有為法與言說為依名可說果無為不墮世故名不可說果也言下隨應配者謨云第四得真自在第十所作已辦第十二逮得己利第十四正知解脫此等四句唯是無為疏云十功德中第一句第六句唯是無為無相微細難了名不可說果也第三句第四句第五句第九句唯是有為有相麤顯易知名可說果問云何不可說答言詮不及若爾一切有為法體亦是言詮不及豈是無為如呼火時不得體答雖不得體呼時火來呼無為時火不至故成差別也二七八句通攝有為無為果也且第二諸功德中有三句得真自在唯是無為餘二是有為七中有三句逮得己利是無為餘二有為八中正智是有為解脫是無為十中到彼岸者理智二種俱到彼岸故通攝彼有為無為也言纏及隨眠等者疏解也纏是現行即是諸漏已盡隨眠種子即前經中第三句無復煩惱由成得上二句諸漏已盡現行無無復煩惱種子滅故能攝得三德中斷之功德名得功德問俱解脫羅漢望十五句總名為得何唯初二句答先由二或亡成上二句功德是以能得以下諸句功德故偏名得也向上德字是斷德之德向下德字是功德之德牟云第一功德是無為不可說果攝於斷德道理稍親縱為得字此亦無爽離繫果上許有得故然尋論文疏本亦有無得字俱言攝功德隨取皆得也言二攝取諸法功等者功德不一名諸也言此三句中得真等者得真自在一句是無為降伏世聞功德者世間是有漏功德也言世間之心不得等者前上上門中以盡無煩惱釋得真自在一句總別相門中應入聚落此中言永離或嬈故能降世間之心不得自在由被或嬈如頭藍子雖得非擇滅非真自在也言未得離二等者即相應纏二所緣縛九品煩惱之中一品未盡不名離縛九品總盡名離縛也前來上上起門中離定障名心解脫離性障名慧解脫就上上起門中第二解離無明貪愛等體名心慧解脫今此門中降伏世間及出世間學人功德未得心善解脫未離相應縛未得慧善解脫未離所緣縛或心善解脫離自性縛慧善解脫離相應縛名離二縛也言三攝取不違等者由如良馬良馬不違人心善隨人意今此羅漢順如來一乘教行或順佛教依之修行行字通平去問何不順理果答教是因但隨教行即順理果所以互舉一邊一羅漢不違如來教二則不違一切眾生心羅漢如馬亦則眾生如調馬人約不定說言四攝取勝功德者即勝劣義初門云對治煩惱怨歒故是勝上之義勝即功德言亦如大龍者永云龍有威靈調和陰陽興雲起雨離於闠閙今者羅漢神力圓滿種種變現故如於龍有威靈故今此無學得俱解脫三明六通具八解脫四禪八定總得之故勝前五種羅漢故言攝取勝功德前來上上起門中第一釋云如龍威德雖行生死險惡之處如平坦路無所抅礙又第九句重釋云應作者人中大龍已對治降伏煩惱怨歒故此中云亦如大龍有大威德神力圓滿行險阻之處不被抅礙羅漢降伏世間煩惱怨歒不被生死抅礙故名勝功德言五攝取所應作等者永云依教修行是所應作羅漢今已作此所作事故依修行觀行如來令作五停心等諸餘觀門羅漢亦已依教作佛教令斷分別俱生煩惱重障羅漢已斷種現俱盡由已作此所依事故能攝取所應作勝功德也言非財供養等者永云但依教法則是恭敬供養如來同下經云汝等若能如是則為已得報佛之恩其有能護此經法者則為供養我及多寶准此故知依法修行則是供養恭敬於佛身如言立身行道揚名於後代以顯父母孝之終也今阿羅漢已依教法修行供養是所應作則是正行法供養行字通平去呼者正行即是法供養即十法行等法行道諦攝故無學已滿自我道已作供養也言六攝取滿足等者牟云即能滿足學地是無學位有學之人修惑未盡擇滅不異故此據一相說至無學位何不滿也永云滅諦是羅漢所辦之事由證滅諦具足辦所辦滿足學地也問如何攝滿足功德答以羅漢所證有餘涅槃名滿足功德有餘涅槃是所辦法今已辦故名滿足功德即是滅諦滿足也言七攝取過功德者過字唯去音非平聲也言初句過愛者經云棄諸重擔生死因果名重擔本從貪愛所生今棄重擔故名過愛下經云諸苦所因貪欲為本凡夫不能棄生死重擔為有貪愛今阿羅漢無於貪愛所以能棄生死重擔過於愛故言次句過邪命等者經云逮得己利阿羅漢證得有餘依涅槃為己身之利不假世間衣食活命一切凡夫未證涅槃皆是邪命今遠之故名過也言後句過上下界等者經云盡諸有結色界無色界自是定地故合為一名故名上界欲界為下散地別開為下界九結煩惱是上下界因今皆已斷故言過也若依小乘斷五下分結者一欲貪二嗔恚三身見四戒取五疑初果人斷後三結未盡不出欲界那含果人斷五下分結盡但過下結名出欲界五上分結者一色貪二無色貪三掉舉四慢五無明無學人斷此五結盡名過上下結問貪體通三界於結即分三無明通三界何故唯成一答聖生猶有潤開數故分三無明無再發合故唯成一問聖招生業顯縱斯可潤収結中分別亡業無寧有潤答聖有前生業仍招後有愛愛起相續生由斯得有潤問羅漢如何得過功德答以棄諸重擔故羅漢未得棄重擔羅漢不過於貪愛羅漢已捨生死擔所以過於愛故名過功德問如何過於邪命答以逮得己利故羅漢不證於涅槃更求邪業以活命證得涅槃不死法何要耶求財利以資命問如何過上下界答盡諸有結若三界九地有一地愛結在不得名為過功德羅漢三界九結皆已盡名過功德初果三果結未盡二果雖斷欲界六品三果已過欲界結由有上二界結在總不得名過功德也今此無學三界總盡所以得功德過於三界名過功德故三句皆名過功德也言八攝取上上功德等者永云初果勝凡夫無學勝有學無為勝有為故得上上名唯是解脫真無為也前來上上起門中以第三句釋第十四句第十四句是正智解脫正智是有為由正智證解脫解脫謂無為涅槃是也即有為無為別也第二解以第十四句釋第十六句云善得心解脫加心字心即是定中智得神通諸功德顯是俱解脫羅漢第三解總解別相門中云正智解脫空言正智無心字即正智解脫總是神通由被煩惱迷覆真如理理俱不得解脫由慧解起來斷煩惱理智俱得解脫只此解脫之智能起神通故喚正智解脫作神通第四解今攝取事門中言正智心解脫雖然加心字總作無為果解也問何故疏中四說不同答經與論不同般若經云正智解脫天親論云正智心解脫經論各據一義疏主若依經即違論依論即違經故此含兩勢也疏主或則將經解論將論解經二文不同更無別過也問經中何者是上上功德答疏言謂正智心解脫正智是能證智解脫是所證涅槃此經涅槃功德名上上功德問云何智解脫是所證涅槃答疏云解脫者無為果故既解脫是無為果即是有餘涅槃問何知所證解脫涅槃名上上功德答疏言諸德之中最上上故言九攝取應作者前來上上起門中單釋十五句云至過見道修道智故一切惑盡至心自在約智解第二總別相門應到第一義功德謂此至心自在證無為故約理解第三解攝取事門約神通解由起得神通心自在故言攝取利益之行者二解一由起得神通心自在故名利益眾生行二自身離煩惱故堪為福田亦是利益眾生行此兩般行具在身中攝取利益之行不過二種一者自乘行二降伏行今言得神通是證降伏外道行離繫縛故即是自利行中自利波羅蜜今日盡是迴心向大聲聞故依大乘作此解也言十攝取上首等者經云第一究竟言波羅蜜多聲聞論文也言堪為到彼岸者疏主解也一得永為得名究竟理智二種俱名為到名到彼岸問上上上首二法何別答上上唯理上首通理智二種別問疏主前來解疏云今隨所應配處十種功德中二七八十通攝有為無為何故今解第八便言上上唯理答前約出體理智俱通今約釋名有為不得名上上故唯說理牟云上上約果理智皆是上上即是約法也上首即到彼岸聲聞約人也問二乘涅槃是法空可名第一究竟攝二乘涅槃非法空云何得名為第一答將彼二乘對大乘生空涅槃非第一今約自乘極果論是以亦名第一言初二名攝取者即是第一攝取功德中有二句謂諸漏已盡無復煩惱言次三攝取諸德者即是攝取諸功德有三句謂謂得真自在心善解脫慧善解脫言順勝作滿足者順者即第三不違功德謂由如良馬勝者即是第四勝功德亦如大龍作者即是第五攝取所應作勝功德謂已作所作滿足者即是第六攝取滿足功德謂已辦所辦所以疏云如次配四句也言三句名攝過者即是第七過功德即是棄諸重擔逮得己利盡諸有結三句攝也初句過愛次句過邪命後句過上下界言上上利上首等者疏言上上者即是第八攝取上上功德謂正智解脫利者即是第九攝取應作利益眾生功德至心自在上首者即是第十攝取上首功德第一究竟言此經六句攝取者諸漏已盡無復煩惱此二句攝第一功德逮得己利盡諸有結此二句攝第七過功德至心自在即是心得自在攝第九利益眾生功德阿羅漢一句是總此中不取唯取下十五句攝功德也束十五句一處即成阿羅漢一个應義若開便分十五个也言成唯識論中三義解者羅漢與前三門配攝問唯識論中三義此門中相攝盡否答簡要云上上起門攝應永害煩惱賊及不復受分段生總別相門攝應受妙供養問攝取事門三義中攝何義答疏主攝取事門非彼三攝三義皆不攝彼寬此狹言彼三但約決定義者緣彼論中約總相語六種羅漢不論利鈍皆有三義今此攝取事門唯約俱解脫羅漢說故此攝取事門中既言攝勝功德故知是俱解脫人也言又上上起門者疏中將唯識論中三義正配此三門上上起配永害煩惱賊總別相門配堪受妙供養攝取事門配無分段生言宗義配之等者且約麤相而配未是巨細料簡三門大段宗徒義意配之非論本意及道理實如此論與經為宗徒義各別也牟云宗義者既是羅漢後有皆無不論俱之與慧故此非配准法華論道理則如此意取俱者言新翻經云則云陳所闕也大唐所譯經論皆除阿難陀此經無前來三門歎德慶喜為在學地故簡之智論問云何故阿難猶在學地答上歎諸羅漢阿難不在其數何以故以在學地未離欲故問大德阿難博證涅槃已經無量劫常親近佛任持法藏利根智慧何以至今未離欲作有學人耶答本願如是我於多聞眾中最為第一若取漏盡便遠佛不得供給供養所以居于學地此文中略不說也但是唐三藏譯經總名新經也言列名者十六句廣歎功能德既尊崇名應顯著當能增長功德實亦願樂欲聞二十一人標成四唱謨云大眾雖萬二千人唯標二十一人者但是結集家意存省略亦無別義然列名中科文似斷汎論科意總有四種一分別不同科二義類相從科三以文從義科四以義從文科所以科文時或間斷略云二十一人科為九對一初二人捨邪離染對陳如捨苦樂行名捨邪迦葉離染二次三人龍象山水對優樓頻螺從龍為名伽耶象山為名那提從河為名三次二人勝智妙通對舍利弗勝智大通目連妙通四次三人詞高見廣對摩訶迦旃延詞高阿菟樓駄見廣劫賓那能為二事五次二人宿習今成對憍梵波提名宿習離婆多名今成即今生事六次二人餘習惡緣對畢陵迦婆蹉名餘習薄俱羅名惡緣惡緣即後母七次三人返迷割愛對摩訶俱絺羅難陀二人返迷孫陀羅難陀割愛八次二人化有談空對富樓那化有須菩提談空九次二人解深行密對阿難解深羅睺羅行密九對不同今當第一捨邪離染龍象山水合為一唱言此二十一人中等者有二初總敘次第後辨五人初文有三一出家二德三辨異名約依出家前後故先列陳如五人也言如報恩經等者下七類人盡是約出家次第合成一千二百五十人者舉其大數也結名之中只結六類不結初五人故有一千二百五十也比丘都有一萬二千人唯列二十一人者結集之家意存省略更無別義言或有行德大少等者初度五人次度大迦葉次度三迦葉若約出家次第者大迦葉在三迦葉後方出家鶖子在迦旃延後方出家今此兩人既先列著故知不依出家次第列名也但依德大小也言無垢稱經者問為復唯依此經德行次第兼諸經亦爾答疏言無垢稱等以德行辨次第也則云簡餘教也言十二由經等者問前引因果報恩經云佛成道後三七日外趣鹿林初度五人次度那含等何故與十二由經不同答疏云十二由經等窟內室外上座大眾等所誦不同也上來總緣次第也言無量壽經等者次下正辨五人也本際謂四諦理了者解義昔迷今解故以名焉永云苦集為生死本際滅道為出世本際名了本際謂陳如了四諦理故本者真如是法之本解者約有為為名際者約無為為名名了本際也牟云外道亦有本際即論第一破一十三類大外道此中亦說本際論云餘計執有一大梵時方本際自然虗空我等常住實有具諸功能生一切法皆同此破即安荼外道彼計本無日月星辰虗空天地唯有大水時安荼生如鷄子周匝金色時熟破為二段一段為天一段為地中間生一大梵天王為一切眾生祖翁作一切有命物無命物之主是故外道安荼論師說大安荼出生梵天梵天常一名涅槃因如是本際今非此義言梵云阿若多等者顯此尊者身是男子若言憍曇彌彌聲顯是女人西國此男女二音別也阿若是名解義最初悟解故立解名一則是釋迦所度名初二五人之初故言初也路云憍陳那是婆羅門姓准西國法大例以火器為姓云憍陳那此云火器其先祖事火從此為姓准憍陳那一人加阿若多三字也阿若多亦云無智也已悟無我理而生智故故名阿若多阿若多者悟解之義今言阿那若憍陳那即姓名雙舉此乃淨居天子見其初悟故立此名簡餘聖也言因果經者指教廣說也言內外親族者父族三人一阿濕婆二案三摩訶男舅氏二人憍陳那十力迦葉父族名內母親名外同姓者名親異姓者名族此是諸㒒中親族也言五人交諍者父親三人計樂行為道見太子日食麻麥捨之而去舅氏二人計其苦行為道見太子食乳糜捨之而去五人合會同在鹿林共議太子得失之事言太子試驗依諸外道者攝云問六年唯苦行如何言樂耶答於頭藍子所學非想定定心適悅輕安樂也對彼六年苦行名樂行也沼云適身心故名樂牟云定是善性善心所中有輕安樂亦名為樂攝解善言以過彼行者彼外道日食一麻一麥故言過也術者二說一則衛術道路之義二則法術伎術之義也言捨食乳糜尊者因果第五說太子六年修苦行已念言我今不可以羸瘦之身將成正覺遂至尼連河洗浴洗浴已天神案樹下太子攀枝得出河邊有牧牛女名難陀波羅淨居天勸煎乳糜供養女聞甚喜已地中涌出千葉蓮華上有乳糜女見已生奇特心即將奉上太子令食食已呪願然後趣菩提樹路逢吉安長者施草令坐長者是帝釋化作施草坐成正覺成正覺了思察應度唯頭藍子者證非想定堪受妙法空中報言命終已來已經七日如來歎曰斯何不遇又更觀察有阿藍迦藍坐無所有處定可受至理諸天報曰死來五日如來再歎慜其薄祐重更觀察唯此五人然後趣鹿野園度此五人初轉法輪佛問解否五人之中陳如先報言我已解法如是展轉淨居天等亦言已解故以解義標名也言那是男聲等者西方詮法有八轉聲體業具為從屬呼以一切法皆以八轉聲男聲者即雄重聲中詮若輕清呼即女聲中呼亦如此方四聲也言摩訶迦葉波者此翻大龜氏其先祖學道感得靈龜負仙圖而呈瑞從此標名故云龜氏別名畢羅童子以畢羅樹下生故故為名也為五山長老作南閻浮提僧中上座行十二頭陀難行苦行迦葉波為第一大智論云諸天請結集時讚言耆年欲恚慢已除其形譬如紫金柱上下端嚴妙無比眼目清淨如蓮華言此云飲光者飲光便是婆羅門姓也言上古有仙身等者問何因姓飲光答疏云上古有仙等有二因由一者上古有仙身有光明飲蔽日月之光迦葉是彼之種因此姓飲光也二者自身亦有光明能飲蔽日月之光故姓飲光即以姓為名名飲光問因何有身光明答付法傳云過去九十一劫有佛出世號毗婆尸佛入涅槃後四部弟子起七寶塔時彼塔中有佛形像而面無金色有一貧女遊行乞食之次拾得一个金珠欲將此珠以修佛面即往鍛金師所商量金師見已汝能捨珠我能捨藝因共立誓願常為夫妻身金色受勝快樂之身常修梵行從是已來九十一劫身真金色天上人間受勝妙樂最後一生生於第七梵世少淨天中受諸快樂時摩竭陀國有婆羅門號俱律陀其家大富比瓶沙王千倍為勝其家有白氎最下者價直百千兩金有六十篅金粟每一篅有三百三十斛其家雖富而無子息天祠神庿無不啟求多年無徵後於宅傍有一神樹夫妻常往祈禱共言呪祝七日之中若無徵應必當剪伐焚燒樹神愁怖告四天王四天王告帝釋帝釋即詣梵王具陳上事梵王乃見第七少淨天中鍛金之師受天報盡將欲下生乃勸生彼俱律陀家彼既生已十月滿足遂誕神儀端正無雙身如金色金光傍照四十餘里相師占曰此兒宿福必定出家父母聞之皆懷愁惱共相議曰世所躭著唯有美色若為娉妻必應顧戀纔年十五便為論婚迦葉乃白父母言我志樂清淨不願妻室因福說計白父母若為我取得金色女端雅無比者我即取之父母即召婆羅門遍以求覓諸婆羅門等鑄得一金神容貌端正車而遊諸國邑村落高聲唱言若同有女人得見此金神禮拜之者出嫁之時必得好夫女人聞之爭出禮拜乃見一女身如金色顏貌奇特異於常倫此女邑往昔之時施金珠貧女也諸婆羅門等遂共營謀乃娉與俱律陀子為妻婚姻既了夫婦二人各發勝願雖為夫婦無染欲心各據一房同修禪觀梵行相似父母聞已密自念言我恐出家故為婚娶今觀形候俱欲出家遂毀兩房同為一室兼置一床後時又立契要我若眠時汝即行道汝若臥時我即行道後時妻睡著乘著手床前毒虵入室欲螫其手迦葉見已以衣裹手舉著床上妻便覺悟而責之曰共我立誓要不相近今復緣何功舉手迦葉答曰有虵入來恐傷汝手舉之耳於是妻以偈答曰寧使我身盡毒虵慎勿虧誓束相觸虵毒促令一身死染毒淪沒無盡時迦葉答曰利刀入火事雖難對汝修行難於此若能守志無虧犯此實世間希有事父母知其志操不易遂放出家至於佛所為說法證羅漢果諸漏已盡脫三界縛得六神通具八解脫修菩薩行作沙門形居曠野則寂靜安樂神入王城乃觀根授法為佛弟子輔翼化揚臘長年高最居上首時人中呼為迦葉上座如來入般涅槃時迦葉在鷄足山入定如來眼前不見迦葉遂作遺囑三乘教典付與阿難三衣瓶鉢留與迦葉迦葉來時為吾傳語吾待汝不得入涅槃去道吾與汝不見相也努力努力為吾修行結集三藏聖教言說倚臥雙林入涅槃時諸弟子專記如來遺囑之語在後聖母摩耶夫人從天降下至娑羅雙樹間忽見三衣鉼鉢掛在娑羅樹下使從十大弟子乞我兒悉達多生存之日常用此物我乞將天中供養去得否十大弟子咸皆不肯白聖母曰世尊親自付囑大迦葉時迦葉在鷄足山入定之次忽覺界動搖山川變色知是不詳之相尊重如來不運神通步步而行赴俱尸那城見諸惡比丘皆相慶賀時大迦葉轉增悲愛問諸聖弟子曰如來臨入涅槃有何遺屬言語諸聖弟子曰世尊教一切經典付與阿難三衣鉼鉢留與迦葉迦葉聞已舉身自撲悲血流淚遶棺而行又復頭禮如來足又復頭禮如來頂又復頭禮如來背又復如來𮌎唯願世尊大悲慈慜示我身心瞻禮之處爾時世尊於其足邊放大光明遺迦葉禮在後結集三藏聖教訖便却入鷄足山山為三分於中以草鋪地而坐臨入定時發三種願然後入定一願三山覆身如子入母胎而不失壞二若阿闍世王來欲得相見山應再開故以闍王不見我身吐血而死三入定已後更住五十六億七千萬歲彌勒佛將九十六萬弟子來取迦葉身以示眾人悉令學我持戒功德取我身再出於將釋迦佛三衣以奉彌勒佛迦葉將三衣付彌勒佛已於大眾前度人無數後方入滅也言大富長者之子者有四義一大富長者之子即俱律陀長者也二捨大財位若不出家合為輔相名大財位三能為大行十二頭陀四大人所知識故標大名簡餘迦葉言行杜多行者頭陀訛也此云斗擻隱居淨處五塵不染義同斗擻如衣有塵土斗擻合落此義亦爾亦云除棄按十二頭陀經云一阿蘭若二者常乞食三次第乞四一坐食五節量食六中後不飲漿七著弊納衣八持三衣九塚間住十樹下止十一露地坐十二常坐不臥其妻於後亦證阿羅漢言如因果經等者結因由也即上迦葉二姓上捨邪離染門言次三迦葉皆飲光等者是大迦葉之苗裔故名飲光種此三即龍象山水對言梵云鄔盧牝螺者此云木苽問何名木苽答其胷有一癃起形如木苽故為名也又有一林名木苽林迦葉在彼林中學道以依處為名名木苽又傍邊有一龍名木苽龍龍所居池亦名木苽池若約從龍立名約根本說若立林名約枝末說今𮌎前癃起乃從龍得名木苽此二解偏勝也言伽耶山名者從山立名西域記第八卷說度尼禪河至伽耶城城西南五六里至伽耶山此翻為象頭山山東南有窣堵波是迦葉本生之邑也名那提迦葉次從河立名言正法華云上時象江迦葉也優樓頻螺迦葉名上時迦葉伽耶名象迦葉那提名江迦葉問何名上時答攝釋釋西方一年有三際一者熱際時四个月二者雨際次四个月三者寒際時後四个月今此尊者熱際時生故言上時亦云河上流最初得道故言上時也伽耶從象頭山為名名象也那提從河為名改河作江也言因果經者經云爾時世尊初成道後即便思惟我今應度何等眾生而能廣利一切人天唯有優樓頻螺迦葉兄弟三人在摩竭陀國學於佛道國王大臣人民皆悉歸信雖有聰明利智聞法速悟然其我慢難可摧伏我今當往而度脫之思惟是已發波羅奈城往摩竭陀國日將昏暮往優樓頻螺迦葉住處于時迦葉忽見世尊相好莊嚴心大歡喜而作是言年少沙門從何方來佛即答云我從波羅奈國當詣摩竭提國日既將暮欲寄一宿迦葉答寄止宿者甚不相違但諸房舍悉弟子住唯有石室極為寂靜可得相容然有惡龍居其室內恐相害耳佛言容聽主裁雖有惡龍但已見借迦葉又言若能住者當自隨意佛言善哉即於其時而入石室結加趺坐而入三昧爾時惡龍毒心轉盛舉體烟出世尊即入火光三昧龍見是已火衝天焚燒石室迦葉弟子見此火而還向師彼年少沙門今為火龍所害心乃傷即勸弟子以水洗之火不能滅轉更熾盛石室盡爾時世尊身心不動容貌怡然降彼惡龍使無毒害授三歸依置於鉢中至天明已迦葉師徒俱往佛所年少沙門龍火猛烈將為此之所傷耶佛言我內清淨終不為彼外灾所害彼毒龍者今在鉢中即便舉鉢以示迦葉迦葉師徒見沙門處火不燒降惡龍置於鉢中嘆未曾有語諸弟子年少沙門雖復神通然不如我道真正也爾時世尊語迦葉言我今欲停止此處迦葉答言善哉隨喜是時如來於第二夜於此說法時四天王來聽各放光明照逾日月迦葉夜起還見天光在如來側語言年少沙門汝事火龍佛言有四天王夜來聞法是其光耳是時迦葉語諸弟子年少沙門有大神力然故不如我道真正也至第三夜帝釋來下聽法放大光明如初昇日至第四夜大梵天王下來聽法放大光明如日正中迦葉見已心自念言年少沙門雖復神妙然不如我道真正也爾時迦葉五百弟子各事三火於晨朝時各欲燃火火不肯燃遂求如來火即燃之供養畢欲擬滅之火不肯滅迦葉見已心自思惟此亦是沙門所為即與弟子來至佛所具說前事佛言汝促却去火即自滅迦葉心自言念年少沙門雖復神通然不如我道真也爾時迦葉交諸弟子晨朝破薪斧不能舉遂求世尊舉已復不肯下來白世尊世尊言汝促却去當令斧下爾時迦葉而作是言彼年少沙門雖復神妙然不如我道真也爾時迦葉即白佛言年少沙門可止於此住共修梵行房舍衣服我當供給世尊默然許之迦葉曰辨好飲食自行請佛佛言汝且先去我隨後迦葉到已早見世尊在彼問言年少沙門從何道來而先至此佛以鉢中盛閻浮果以示之迦葉我此南行數萬踰繕那彼有一州其上有樹名曰閻浮緣有此樹故言閻浮提我此鉢中是此果也明日不食時事須准此又向東弗波提取菴摩羅菓以示迦葉又至明日至西瞿陀尼洲取訶梨勒又至明日至北單越取自然粳米迦葉言曰年小沙門雖有神力速疾終不如我道真正也乃至廣現神變准本行集數至五百皆言年少沙門雖有如是神力不終如我道真也爾時世尊又從他日心自思惟優樓頻螺迦葉緣根熟正是調伏之時即入尼連河以神通力令水兩開佛所行處步步塵生迦葉遙見佛被水溺即與弟子乘船而來既至所側見佛行處嘆未曾有迦葉問佛年少沙門欲上船否佛言甚善于時世尊即已神力穿船底而入穴穿不漏嘆言甚為希有年少雖有是神力終不如我道真阿羅漢爾時世尊語迦葉言汝非阿羅漢汝今何故起大我慢迦葉聞說心懷慚愧身毛皆竪唯願大佛攝受於我佛言汝與弟子熟共議商迦葉還已集諸弟子而語之曰我今便欲歸年少沙門汝等云何弟子答言尊者既若歸依我等亦隨從歸依迦葉與諸弟子至佛所世尊告曰善來比丘鬚髮自落袈裟著身即成沙門爾時世尊即隨所應廣說四諦于時迦葉及五百弟子遠塵離垢得法眼淨初得初果乃至無學果爾時迦葉及五白弟子以其事火種種之具悉皆捐棄尼連河中師徒相與隨佛而去爾時迦葉二弟一名那提迦葉二名伽耶迦葉各有二百五十弟子在下流修道見兄所事火具悉逐流下心大驚愕而自念言我兄今者有何不意事火之具今隨水流下將非惡人之所害也其時二弟奔競相就而共議曰我兄今者若復不為惡人所害諸物如何從水而下苦哉恠哉我等宜速共至兄所便相共逐流而上至兄住處空寂無人心大悲絕不知其兄及諸弟子居處四向推尋尋見舊人而問之言我仙聖兄及諸弟子不知所在汝見之否舊人答言汝仙聖兄與諸弟子棄事火具皆悉往於瞿曇處出家學道是時二弟聞此語已心大煩惱恠未曾有又自念言云何棄捨大阿羅漢道而復更求化餘結使即便馳往至其兄所到已見兄并及眷屬剃除鬚髮身披袈裟即便跪拜而問兄言兄弟既是大阿羅漢聰明智慧無與等者名聞十方莫不崇仰何故今日自捨此道還從入學此非少事爾時迦葉答其弟曰我見世尊成就大悲有三奇特一者神通變化二者慧心清徹決定成就一切種智三者善知人根隨形攝受以此事故於佛法中出家修道我今雖復國臣人民所見崇敬世論捷矣無能勝者然非永斷生死之法唯有如來所可演說能盡生死既值如是大聖之尊而不自勵師徒高勝即是無心亦為無眼二弟問言若如兄語決定是成一切種智我所得智慧皆是兄力兄今既從出家我等亦願隨順兄學即各語其弟子言我今欲同大兄於佛法中出家修道汝意云何諸弟子即答師言我等所得有智見者皆大師恩大師若欲於佛法中出家者亦願隨從於是那提迦葉伽耶伽葉各與二百五十弟子至於佛所頭面禮足而白佛言世尊唯願哀愍濟度我等爾時世尊即為那提迦葉及諸弟子現大神通又應其心而為說法語言比丘當知世間皆為貪欲嗔恚愚癡猛火之所燒煑汝等往事三火既能絕棄除此外火今三毒火尚在汝等身內宜速滅之時諸比丘亦聞佛此語於諸法中遠塵離苦得法眼淨又為廣說四諦法皆悉得阿羅漢果言第三從何等者淨三藏云度多河菩提寺東有此河從修道處以為名也言梵云舍利弗者此下五人勝智妙通詞高見廣合為一唱且舍利弗怛羅者尊者有二名從父母而立其名從母中有二一者今生二行願舍利弗怛羅翻為鶖子舊云舍利此翻為申子訛略也鶖子從母為名也言舍利云鶖等者西方不妨喚百舌鳥作鶖此間鶖鳥與百舌鳥別此間鶖鳥無能言語者只百舌鳥亦喚作春鸎也言以母才辨等者子字屬尊者鶖字屬母母名鶖也西域記說舍利弗尊者大婆羅門稱其父高才博識深鑒精微凡厥典籍莫不究習其妻感夢具告夫曰吾昨夜感一夢夢一異人身披鎧甲手執金剛杵摧破諸山退立一山之下夫曰夢甚善矣汝當生男達學貫世摧諸論師破其宗致唯不如一人為作弟子忽而有娠母忽聰明高論劇談言無屈滯尊者年始八歲名擅四方其性淳質其心慈悲成就智慧與沒特伽羅少而相友深厭浴塵未有所歸於是與沒特伽羅子於珊闍耶外道所而修習法乃相謂曰斯非究竟之理未能窮盡苦際也願求明道先甞甘露必同其味各領一百門徒舍利子却歸本城時大羅漢馬勝比丘執持應器入城乞食舍利弗見其威儀閑雅即而問曰汝師是誰曰釋種太子厭世出家成等正覺是我師也舍利弗問所說何法可得聞乎曰我初學受教未達深義舍利弗曰願說所聞馬勝乃隨宜為說偈曰諸法因緣生是法緣及盡我師大聖主是義如是說初句苦諦第二句顯集滅此偈雖有三諦正明滅諦問何不說道諦答鶖子利根促說所證必知有能證也時舍利弗聞說是已言下便證初果遂與其門徒往詣佛所世尊遙見指告眾曰我十弟子中智慧第一至已頂禮願從佛法世尊告曰善來比丘聞是語已戒品具足過半夏後聞佛為長爪梵志說法聞餘法而咸悟遂證阿羅漢果言不但今者亦者經云鶖子過去身為瓦師逢值一佛出世亦號釋迦復有弟子亦號舍利弗遂發願云願我當來逢釋迦佛作智慧弟子亦名舍利弗也言復名優婆提等者此翻為論義從父立名父能論義西國解論義者總名優婆提舍即合從父為名以父劣母勝從勝立名也乍讀疏文似鶖子自解論義自得此名准智論說從父為名也言此云大採菽者即是取母姓為名也菽者諸豆之總名上古付仙居山寂處常採菉黃而食因此立名姓尊者之母是彼種族取母姓氏目連鶖子才明見異尊者精鑒超群才智相等少為親友動止必俱結要遊學相與厭俗皆出家也言得大神通者簡餘採菽故得大名也復歸大城舍利弗遇馬勝得初果轉為目連述而悟解遂於舍利弗邊得初果已與其徒眾俱到佛所世尊遙指而告曰彼所來者是我神通弟子世尊曰善來比丘鬚髮自落袈裟著身經七日已得阿羅漢果佛於一時在無熱惱池說法之次八部四眾咸集佛言觀眾中空缺舍利子何故不到故令目連喚正遇舍利子山中補衣之次且須臾待我補衣竟目連曰若不速行兼山移至大會舍利子便與衣帶置地上語目連曰若舉得此帶山亦動得目連盡神力舉不得地為之振遙運神力却迴早見舍利子在會中坐目連仰而嘆曰今日乃知神通不亦智慧勝智妙通了言梵云摩訶迦多者此第四詞高見廣對摩訶迦多衍姓也那是男聲此云剪剃種男是婆羅門姓以剪剃為姓也言諸仙願護者亦有疏本為獲字諸仙呪願云汝成佛道故言諸仙願獲因此立名也言尊者身是男者二解一簡餘卑姓故云大二云佛常讚嘆我弟子中說法人中最為第一以得佛讚嘆故云大也言古為繩扇者西國多熱人家門前置義扇後有無知人旋旋將去遂以繩結之迦旃延母夫亡之後獨養旃延於一時中母子相隨出見人家門前繩扇隨風飄颺不落於地母問子曰扇不落地由何兒曰由繩繫之母曰我不改嫁亦由於汝故號繩扇從喻為名言真諦云思勝者有仙人由具聞思勝於餘人故尊者是彼仙種故名思勝非也言梵云阿泥律陀者是甘露飯王之子淨飯王之姪兒世尊之堂弟阿難之從兄羅云之叔也過去燃燈佛時為一長者子名曰大才施由百斛燃燈供養常得天眼第一喻經云無量劫前阿泥律陀曾作劫賊夜遇風雨遂入一佛堂中止息之次乃見燈欲滅以箭鏃挑燈見佛光明身毛皆竪作是念言他家能施我何盜耶遂捨斯業因續此明善根九十一劫常得天眼善根不滅故名無滅也又過去曾以一食施辟支佛五十劫中天上人間受勝福樂後得無學果常得如意無有貧窮如來說法阿那律多睡處處會中皆如此佛對眾訶叱咄咄何為寤既螺蜯蛤類一隨百千年轉輪無窮已那律聞已羞慚於眾便以竹枝挑眼多日不睡遂便喪明喚耆婆醫耆婆曰多時不睡餓煞眼根醫不得也佛教修天眼諸聖弟子之中天眼第一路符云見大千界事時人號為半頭天眼具有名滿頭失却肉眼空有天眼名半頭如來會引色界淨色名滿頭那律分得名半頭此二解正也言應𮋢字者不知菟字所從也言此房宿者劫賓那能為二事此比丘初出家求見佛故欲向佛所值雨寄宿陶師家以草為座又有一比丘來宿即推草座讓之在地而坐後乃相問欲向何所答欲見佛去後比丘即為說法忽然得道後比丘即佛也言或云房星者四月昏現於辰五月昏見於巳然二十八宿隨上下右旋日月五星左轉然房星月月現此尊者當此星現時生故言房星現時生也言梵云笈昇鉢底者今當第五宿習今成第六餘習惡緣并第七返迷合為一唱言過去因摘一莖禾者尊者昔曾作牛向彼家場上繫夜後有一劫賊場上偷糓來牛便唱之不教取糓賊向前擬取又被牛唱賊知是牛問其所由具說前世事摘禾之事賊乃慙愧而去問既似牛相必隣近畜生身如何得聖答假示相非實爾言牛呞比丘者呞噍也齝者牛吐食也安國云分別功德論說佛恐人謗返招其過佛令向忉利天尸利沙國中脩習禪定言尸利沙即是此間合藏樹佛涅槃後結集法時大迦葉差下座比丘名曰提多令喚今僧中有大法事應可速來憍梵婆提問其來使曰佛涅槃耶答佛入滅又問我和上舍利弗在否答先以入滅婆提聞已悶絕久而嘆曰如來入涅槃大師和上復滅世間空虗不能復下化火焚身即入涅槃先化作四道水流下閻浮提結集處水中說偈曰憍梵婆提頭面禮妙眾第一大德僧聞佛入滅我亦滅如大象去象子隨言此云室星者即北方星也或云彗星即妖星也此星出時生故因以為名也此或云已下一節疏文剩應勘諸本有無不定也言智論二鬼者論說一鬼食之表生必有死一鬼活之表死必有生加於一時離婆多受使遠行獨宿空舍夜中有一鬼擔一死人在空舍中復有一鬼逐後嗔罵前鬼云此死人是我物如何古認前言是我物我自持來後鬼又言實是我物我自將來所以兩鬼各提死人一手相諍前鬼言曰此舍中有人請問即知後鬼便問此死人是將來阿雖其人怕怖作是念言長短須死既是死去不可妄語便依實說咄此死人是他前鬼將來後鬼聞之大怒取此兩手兩脚拔相去離也喫此人一个骽了便去前鬼慙愧其思德取別死人脚手接續令活其人思惟我父母生身被鬼食盡今身盡是他肉我今此身定有耶為無耶若言有盡是他身若言無者今身現在如是思惟身心迷亂討路行人入一寺中見一師僧問曰我身為是有為是無耶諸比丘却問曰汝是何人答曰我亦不知是人非人具說上事諸比丘言此人自知無我易可教化即便語言汝身從本來恒自無我促以四大和合故名假和合當時悟解斷諸煩惱得羅漢果名假和合攝云問死屍無情如何與有情為支分答有二解一云鬼神之力二云實即不然示相可爾為破有情執有實我故顯假和合示相無我故攝自難言前解違唯識道理諸異熟識捨此身已令託餘身無再生義如何斷已却續牟云鬼神之力此亦可通言離託餘身依業力說所言違理者違於業力又云定通之力即不決定上宿習今成耳言餘習尚在者問如何羅漢有餘習歎德中善得心解脫斷習氣故今言餘習一何相返答習有二一煩惱即習因智成故二涅槃之智惑氣分名習如褁香紙羅漢不無此由嗔習也言如罵河神者恒河神女前世曾與畢伽家作婢後生為河神畢陵伽曾於一時中渡恒河河神是女人畢陵伽語言咄婢子勿使水流我欲暫往神女慚耻速往白佛言令懺悔謝過即合掌言婢子莫嗔早知婢子諱婢子不喚婢子作婢子不知婢子諱故喚婢子作婢子我前所有喚婢子之過願汝婢子布施歡喜婢子張眼怒觜大眾一時笑佛言餘習如是非惡心也如聲聞起舞獨覺臨粧舍利弗見乾闥婆奏琴遂起舞獨覺燕支注口墨筆盡眉皆習氣也上餘習了言持一訶梨勒者金光明最勝王經云訶梨勒一種具足有六味能除一切病無忌藥中王譬喻經云耆婆死天下藥草一時啼泣各云唯有耆婆能知我等功能既無耆婆誰能知此我等功能錯用我等或加或減令病不差世人將謂無驗唯有訶梨勒呵呵大笑別在一面自言我能獨治諸病不假和合故不啼笑此羅漢往昔為一醉客於寺門首臥僧見安在寺中夜間僧禮佛有一僧患頭痛布施一顆訶梨勒服已便差從是已來九十一劫天上人間受勝福樂今生婆羅門家言其母等者又有經云毗婆尸佛時身作一奴於僧邊唯受不煞戒餘四戒我為下賤不能受由此因緣經五不死前是無病緣後是不死緣若是二百五十戒八戒一日一夜事須全受全持五戒受持則令受持則通全也其父遠出後母便方煞之經五不死一釜煑不死二𨫼煿不燋三水溺不亡四魚吞不爛五刀割不傷也言目不視女人者俗語云傷弓之涉見曲未曾被虵咬怕見斷索曾被大虫驚見犁則瞻怯此尊者曾被後母苦尅怯見女人也言無憂王者此羅漢在生少欲知足後無憂王唯施一金錢塔涌不受路云同此等羅漢法華會上已歸大乘身受變易今何後有身骸骨之事起塔供養答大論云凡受變易者先須別化起一分段身入般涅槃以示外道諸凡夫等若不爾者彼外道疑云此乃龍鬼非是於人都無屍靈故要現死彼時有塔亦不相違言梵云摩訶俱瑟者安國云疏主隨古且作此解釋梵云摩訶俱瑟耻羅此云大肚持摩訶云大俱瑟耻三字名肚羅云持三藏四圍經書總含在腹記而不忘名持俱絺羅訛也言此舍利弗舅者智論說舍利弗舅氏然妹與兄尋常論義先妹懷子妹不如兄及懷胎後兄多墮負兄作念胎子之能在胎尚自難當生已何由可敵遂捨家務入山廣學經十五年無切剃髮爪髮稍長故名長爪梵志歸還之日頭戴火盆鐵葉褁腹遊行人間漸次而歸慜世間人暗宜以火明照學廣腹狹所以鐵葉褁腹至家問妹汝子在妹報兄言生經八歲讀盡一切經書年十六論義勝一切人今以發心隨佛出家兄便嗔恠我擬自教欲使外生聲名蓋於天下何等沙門敢行誘訓乃往佛所而求捔論我若得勝還我外生我若墮負當相敬事時舍利弗初受戒半月佛邊侍立佛言汝自立義此外道憍立宗言不受一切法為宗意佛若難難皆不受即順我宗如來為欲破此惡見徵曰汝自家受否若受違汝自宗若言不大家眼見耳聞汝立義應非一切法收汝若言不受則無所宗前徵自語相違後徵宗致缺減量云汝見是有法應非不受是因云自他許汝起故同喻云如餘見餘見自他許汝起餘見非不受汝見自他許汝起汝見非不受兩俱不成即知屈負撲下火盆揚却鐵葉請歸佛出家時舍利弗初受戒後半月佛邊側立因聞論義遂證無學果長爪梵志是舍利弗舅氏鶖子是他阿妹兒也言梵云難陀者此下第七割愛第八化有談空第九解深行密六人為一唱也言此翻為喜者歡喜也言根本乃是牧牛者譬喻經云摩伽陀國頻婆娑羅王請佛三月坐夏及五百弟子取新乳蘇酪供養佛及比丘僧勅牧牛人近城住日日供送乳酪三月供養畢王交見佛即作念言佛是一切智人三藏曰圍陀經書六十四種世間伎藝不妨明解要不知我牛牛事若知我即歸依問佛牧牛具幾法牛群不資息佛言有十一種事一者知色由知毛知自他牛表比丘修行須辨耶正內外道經云喻諸比丘知四眾造色二者知相即是肥相瘦相比丘修行須知善惡二相表修福慧經云喻諸比丘應知癡相墨業名癡相白業為黠相三者知刮刷除穢糞土表比丘修行數加懺悔經云喻諸比丘雖起貪嗔能制遠避而數吐惡見即不覆罪四者知瘡瘡上事須著藥去虫𧉴表比丘防護六根門不著諸境五者知放煙意去蚊虫表比丘修行勤斷惡法經云時時施煙喻比丘所學所聞所知以廣說故六者知所往即識道路不損牛也表比丘修行知三乘當行八正道婬坊酒肆諸博戲處不得妄入七者知所至處知牛安不安表比丘離惡支經云知愛牛喻比丘見說法時志心聽法踊躍愛樂八者知度水度水若不到岸恐吹却牛表比丘修行知四諦度一切眾生過生死海至涅槃岸九者知飲餧分限若水草過度即損牛表比丘修行事須少欲經云喻諸比丘四意止四意止者四念處也此牛計心於水草比丘計心於四念處又遺教經云飲食知量十者知留乳搆乳之時事須留乳若不留餓他犢子表比丘足經云知搆殘遺喻比丘施者雖多而自知足不得盡受十一者知牛牛主者即群中特牛能主領諸牛不散失眾善經云分別牛好惡知可養者喻比丘敬其長老路云又十一事一不在高山二不居深淵三草無硬澁四水有三能不冷不熱不醎五住處須平六頭不加刷七向水徐行八一日三飲九一領三歇十出入須明即垂明也十一主常隨持牛後難陀聞已知佛具一切知將謂世尊不知牛之事世尊更好手牛更無過者後隨佛出家具足聲相能作梵也言梵云孫達羅者以瞋反艶美色也言是佛弟子者淨飯王子往昔曾見佛塔建立剎柱及安垂露盤以是因緣今生釋宮身長一丈五尺二寸端正富貴簡要云四月九日生短佛四指容儀挺特與世殊異若入大眾中人未識佛者錯喚作釋迦牟尼佛也言佛到本城二日者佛成道已經十二年却向本城說法兩日後方以說法度云本行經云爾時世尊教化難陀童子廣說出家功德數數為說出家因緣亦復讚嘆出家因緣勸令出家難陀白佛世尊我寧以四事供養如來及比丘僧乃至盡形供養我終不出家爾時世尊於一時中飲食訖已將一侍者詣難陀門正見難陀共孫陀利在高樓上遊遊而坐遙見世尊將至速起下閣頂禮佛足白佛言世尊從何遠至願入我堂昇座而坐世尊入已默然而坐難陀白言願受我飲食供養佛言食訖不須備辦難陀復言今有蜜漿非時飲否佛告難陀我隨汝意於是難陀執持佛鉢盛非時漿奉上世尊於時世尊為未受取持與侍者復不受取佛從座起欲向本處其釋童子亦從重閣持彼蜜漿欲隨佛去時孫陀利見釋難陀持漿從佛梳頭未了便高聲喚言聖子難陀欲何處去耶爾時難陀指彼鉢言欲送如來至彼即還彼言速來莫久住彼若久住彼我少時就寺裏叫喚來莫道不道爾時世尊至伽藍所喚一比丘令搆蜜漿難陀辭佛佛言莫去汝應出家難陀白佛我今不欲出家我寧以四事供養佛及僧佛為說出家功德并毀諸欲過患然其難陀心故不欲出家但敬佛故俛仰白言我當出家爾時世尊言當喚一剃髮人來即喚眾中一剃髮人在難陀前手執剃刀欲為難陀剃鬚髮難陀捉奉向剃師言汝今何力敢剃我頭世尊告言汝比丘入我法中行於梵行盡諸苦故即成出家受具足戒於是難陀可喜端正諸人樂觀有三十二相是足不闕身體金色高下四指不及如來所作袈裟與佛衣服等無有異比丘遙見皆疑是佛欲起迎逆及至知非但還本座世尊知已制等量又彼難陀打衣光澤眼塗媚藥莊嚴其身脚著草履右手執傘左手持鉢佛皆制又當憶孫陀利念其包故不行梵行欲捨戒還本宅以是因緣常取博瓦或取木板𦘕釋女孫陀利形像如是觀看以過時日比丘生嫌比丘白佛佛又制戒不許於女人身取能生欲想又於一時難陀比丘次到當直守護寺舍作如是念佛入聚落之時我於爾時當得還家世尊知已難陀汝若欲行閇諸房門然後還去語已便即往入聚落難陀欲還逐見世尊房門不閇作如是念我閇此門然後還去即閇佛門見舍利弗門目連迦葉等門皆開如是次第閇已復開恐世尊不久來至作是念已從尼俱律陀樹林之內將欲出時世尊天眼見已從城隱沒出現於彼難陀見佛尋即依一尼俱陀樹隱身而坐佛以神通舉彼大樹置於虗空見彼難陀藏身而坐問言難陀欲何處去彼具陳情佛為說法復有長者請佛設食爾時難陀次當守寺還念歸家佛知告言難陀必須知時洒掃寺地所有澡灌悉皆水滿告已赴請難陀先掃地從西掃東風吹從東掃西風吹四向掃旋風吹添瓶瓶旋倒水出咄咄作聲難陀作念我今何用掃地添瓶如來不久還歸我今速至家內世尊天眼觀見難陀已從彼處欲出向家即別化身難陀前於難陀遙見即隱山隈處蹲身而坐佛以神力地平如掌見彼坐時告言難陀汝今在此欲作何事難陀白言我已許孫陀利還家為斯事故多作妄語佛告難陀汝今何須見孫陀利其身如是三十六物臰穢成身何不厭之爾時世尊以此因緣而說偈曰欲離稠林已得離從林脫已還入林汝富伽羅觀此等從縛得脫還復縛爾時世尊教難陁修行清淨梵行滅除一切苦故時難陀雖被教化猶故不樂行於清淨梵行世尊知已作念然此難陀煩惱熾盛豈能少教破彼煩惱我今者須作方便令彼發心喻如世間以火滅火以毒治毒念以執難陀手以神力隱沒其身忽然在香醉山上爾時彼山以風吹雨樹相揩遂即出火亘天煙焰燒燃彼山山多獼猴其數五百被火燒毛皆悉蹲地摩滅其火時有一雌瞎獼猴在其群內辛撲身火佛告難陀汝今見否答言已見汝孫陀利可喜端正與此獼猴何誰為勝難陀向佛頻眉蹙面默然不言世尊執難陀手從香醉山沒至三十三天現於波利質多羅樹下時帝釋入園遊戲五百婇女左右圍遶佛告難陀汝今見否答言已見佛言為當五百婇女端正為孫陀利好難陀白佛言如以瞎獼猴比孫陀利百千萬倍不可及也佛言汝意欲得共此女相娛樂否難陀踊躍歡喜白佛言世尊如我意者實欲得與彼五百婇女共相娛樂佛語難陀汝今不可以凡身共彼娛樂若欲得者汝須以歡喜心於我法中修行梵行我當報汝今者若能隨順此法行清淨行命終必生此處共婇女娛樂世尊復執難陀手從彼天沒還其本處時難陀為求婇女以此因緣盡其身力初夜後夜修梵行等爾時世尊見難陀為諸婇女行於梵行遂執難陀手從尼俱陀林而出沒身入於地獄裏見一銅釜下燃猛火涌沸無人中在受罪難陀問獄主為誰煎此釜獄卒答言佛有姨母所生子佛弟難陀行於梵行為求五百天女受天福盡當生此中受此罪報難陀聞已恐怖毛竪發心悔過修行梵行為求六通八解脫等佛告諸比丘於我聲聞弟子之內調伏諸根難陀比丘最為第一到本城二日後方得與度不是教化經二日據實調伏諸根日數不多也上明返七迷割愛言滿是其名者滿是尊者之名也慈是母性也牟云若作母性其慈姓氏也若言母性其慈心性也此尊者是彼慈女所生之子名滿慈子也言或滿及慈俱者第二解也多時無子從天乞求夢一寶瓶盛滿寶物忽然入腹因此有孕遂生尊者滿得慈母之願名滿慈子本是憍薩羅國聚落之中去迦毗羅城不遠有一婆羅門為淨飯王作國師其家巨富唯有一子名曰富樓那彌多羅尼子與悉達太子同時誕生性猒世間志求解脫如來成道已後求乞出家精進不久得羅漢言此云善現者初生之時家內有善相現故名善現也言舊云須菩提者初生之日家內庫藏一切皆空父母怕問相師相師曰唯善唯吉云善吉善吉之狀也亦曰空生初生之時庫藏悉空表解空第一故曰空生安國真諦三藏般若云須菩提是東方世界青龍陀佛來此影嚮也西域記云如來從天宮還瞻部州日時須菩提𡩷座石室竊自思惟今日如來降下閻浮眾人迎接如我今者何要行耶常聞佛說知說法空知諸法性即以慧眼觀見法身時蓮華色比丘尼欲初見佛化作輪王七寶千子前後導從四丘警衛至世尊所如來告曰汝非初見吾身夫善見者是名初見吾法身也言慶喜者智度論云如來得道夜生如來成道天魔波旬將八千億人惱亂世尊世尊入慈心三昧魔軍退散魔王曰既惱害瞿曇不得便至淨飯王所於虗空中作聲曰悉達太子昨夜已死王聞語已驚落床前如熱沙中魚宛轉于地不能省覺良久之間菩提樹神持曼陀羅華報淨飯王曰悉達太子昨夜明星出時成等正覺王聞語已前云已死今說成道孰是孰非樹神報曰前來者是魔後來者菩提樹神親見世尊成道訖故來相報淨飯王大歡喜踊躍報諸釋種眷屬國內臣民平明大朝之時普稱萬歲歡喜作樂之時斛飯王入來臣昨夜賤妾誕生一子聞說此已陪加歡喜當大王慶喜時生故名慶喜也言執日者此有二解一言執日是阿修羅王以手遮日當日蝕時生故執日二云佛喻於日執者障義羅睺在胎六年障太子不得成道障於佛日故云執日問如何羅睺羅在胎六秊答昔者有王生其二子大者名日王小者名月王父王崩後日王厭位願求出家以國付弟出家修道遂發願言願我此身從今日已後有主之物不與不取後於一時癈忘夜行渴悞飲蓮華池裏水飲已覺悟今日已成賊也詣月王所我得罪願王治之王曰自然之水何罪仙人仙人不肯王遂令出後園月王遂忘經于六日後因大赦天下囚徒釋罪忽憶仙人飢餓起已後倒王自悔責手餧飯佛告諸比丘時仙人者今我身是時月王者羅睺羅是為因仙人受無量苦因其餘業在胎六年問耶輸日懷羅睺羅六年者答又於往昔群牛在野放牧其牛主妻自將一女往牛群擔取乳酪所將二器普皆盈滿其器大者遣女擔負小者母自擎將中路語如曰汝速行此處路險人所怖畏如是再三彼女作念遣我擎取大器復更催促因此嗔怒而白母與我擎取最大器前行其女於後除除緩步令母負重行六俱盧舍佛告諸比丘彼女者耶輸陀羅是也遣母負重受無量苦最後餘業懷胎六年又羅睺昔日塞鼠穴經于六日於是太子欲得出家淨飯大王不放待汝有子紹繼國位放汝出家太子逾城去以手指耶輸腹遂有胎六年滿足始淨飯王曰太子踰城去來六年耶輸不護於我辱我眷屬若是十五箇月即言遺腹即集群臣各進苦法有一大臣奏云當机其髮以杖打之打已即面記復有大臣云當截其耳劓去其耳鼻有云擲置大坑有云鋸解有云節節分為八段世尊知耶輸陀羅母子在死難中左右顧視毗沙門天王知佛意摘貝多葉來世尊作書與父羅睺羅實是我遺孕之子佛歸到本城父王請佛供養次摩訶波提請佛供養次耶輸陀羅奏云請佛及比丘僧供養耶輸陀羅以歡喜團一枝置羅睺羅手中把著交覓汝父獻與時羅睺羅年始六歲巡諸比丘到世尊前頭便立頂禮而說偈言如是如是沙門沙門薩涼薩涼快哉快哉爾時世尊告父王言莫疑耶輸羅睺實是我子食訖散已時羅睺走入佛衣裏隱藏而住時諸比丘欲共遮入佛言從入我衣中羅睺隨佛出宮門外佛授手指及履與令執捉如繩繫馬不相捨離至尼𤘽林世尊問言汝隨我出家已否答云能令舍利弗為和上從此始有沙彌父王在後不見羅睺一家喫飲覓不得聞道世尊將去出家已了王悶絕良久乃蘇到世尊邊種種道理論說爾時如來因此制父母不聽不得出家也上列名訖言贊曰結名高者經云如是眾所者如是者指斥之詞指二十一人故言如是此諸羅漢為凡聖諸眾共所知識皆是大阿羅漢也經云眾所知識者知其有憶識其形容遠處愚者亦不知有德不識形容遠處智者不識形容知其有德近處愚者識其形容不知其有德近處智者兼識形容知其有德經云等者有二意一向內等二向外等就內等中有二意第一列二十一人向下著等字向內只等二十一人第二向內等將阿羅漢等非阿羅漢非阿羅漢即阿難一人經云唯阿難陀獨居學地第二解向外等別二十一人等取萬二千人上消經也言初解貴賤等者問前論中解言佛菩薩勝智者皆識知何故疏解却狹耶貴賤大眾則言知不言識佛菩薩則言識不言知耶答佛菩薩言識之時元來知言知之時元來識二皆通也言無垢稱等者引文雙證也眾聖所識結前知識二即貴賤凡聖之眾含此兩義即知識也前解善也言舉二十一例取等者例取餘人餘人即二千人也言皆名大等者略結大義依德大義解大也言以即羅漢等者解等義問前來別列二十一人阿難已是羅漢之數何故更要等非無學答經中列者約結集時已得羅漢訖疏中言等等取初位未得無學說二不相違也言無名大德眾等者經云復有學無學二千人者有說總此總是無學所學之事已成辦故故名無學非眾所知識離前別列也紀國云此是三果四向有學之人學彼無學未成辦故名學無學無學兩類各別二類之人雖殊無名是一故成一眾也言戒定慧三正為學等者唯取無漏三法為體其戒中通漏無漏唯取無漏小乘定共戒通有漏無漏道共戒唯無漏定共者取四禪八定并滅定分無漏定為體三者唯取見修無學道無漏慧謨云所學唯是無漏有漏之法不可學此戒定慧在見修道為有學體在無學道為無學體上解有學名字言進趣圓滿等者解無學名字問俱解脫者可言圓滿慧解脫人定學未圓練根未滿何言無學答約自位滿足即名無學若不爾迴心向大雖是俱解脫亦未滿也上解僧眾也言尊重諸尼眾等者謨云大勝生主如來之姨養育世尊恩同於母眷屬六千同來法會聽說一乘故與授記名為尊重也言佛母有三等者此為小母佛母有三一大術是生佛者二大勝生主是養佛者三非生非養者經中多不列也問既非養生佛何名為母答父之妻即母也母既有三准知古之天子有一百二十房十五日轉皇后一人獨知一夜三夫人共知一夜二十七世婦共知三夜九人知一夜八十一御妻共知九夜九个人知一夜直至九九八十一人本行集云去迦毗羅城不遠復有一城城中有一長者名曰善學長者有八个女淨飯王兄弟四人各取兩人最大者摩耶夫人最勝者大勝生主餘六女配三王言大術生佛七日等者攝問但有歸禮諸佛並得益壽延年何故親誕神儀翻成短壽答如來設化事不一途舉動施為非無所以攝云佛在知足天將下生時先觀四事第一觀生中國第二觀須是婆羅門剎帝第三觀眾生根熟第四觀所生母七日命終故大方便經云將下時觀摩耶夫人又壽命報盡十月滿足餘有七日以女人德薄垢重不銷菩薩臣子之禮所以命終謨云此解疎也若大術不堪受臣子之禮即七日命終淨飯既是所尊何故多時不死又本行經總有三釋一太子誕生適滿七日夫人不得諸天威力遂便命終以菩薩在胎諸天守護故二云以菩薩幼年出家母見是事其心碎烈即命終三云母見子身洪滿端嚴踊躍遍身不勝其喜即便命終牟云三解恐非當若言不得諸天威力及守胎者未降胎前諸天不護即合早死其次見子出家其心碎烈者諸部皆言二十九出家林中剃髮云何七日便見出家又言歡喜不勝因壽命盡者若爾初生喜心偏重云何七日方乃薨耶此乃經家敘餘既說故非斯解謨云一期報盡命終稍親也又云功德力故合生上界為正義也言大術姉妹等者亦只是親姉妹也本是阿姨又為小母故為姨母非是號為姨母言大勝生主等者本是梵王名名大勝生主此尼從彼乞得就乞為名名為大勝生主亦云計梵王生得四州人名大生計梵王生得諸人名勝生合此二種名大勝生主三云佛是大也生得地前一切凡夫眾生名是大之生名大生若生得三乘聖弟子名勝生佛名大勝生此尼養佛名大勝生本梵王名者梵王是一切眾生之父故名大也其能生之用故名勝也能生復是所生之主名大勝生主此姨母從彼梵天神邊乞得從所乞為名二者佛名大也生得一切凡夫一切凡夫是大之生名大生也又佛亦名為勝也生得三乘聖弟子勝之生名勝生生字目一切眾生三乘聖眾也佛是大是勝名大勝生此尼養佛名大勝生屬佛主字屬姨母若准路府解曰疏中初解佛全名大勝生屬主此尼養佛就所養處為名有財也言雖從彼乞得等者結前二義約所乞立名也亦已義名約義立名也言度此因緣如律等者四分律云爾時世尊在尼俱律國時波闍波提與五百舍夷女俱詣世尊所白言世尊願聽女人於佛法中出家學道佛言且止瞿曇彌莫作是說莫令女人出家學道令我正法減五百年不得久住於後一時佛在祗洹精舍時波闍波提俱共剃髮各披袈裟於祇洹門側立塵土坌身涕淚啼泣各請出家求受具戒爾時阿難聞已具陳上事第一直請請佛與度佛言且止壞我正法猶如長者家男少女多其家必衰譬如良田禾稼亦就而有灾風令其穀復敗亦如好田多種蒺䔧良田必敗佛告阿難佛滅度後請俗人等各將寶器盛美飲食在於路側迎請比丘食由尚請不得又將好衣布在路上令比丘足蹈又舒髮拂比丘足上塵由度女人此事都盡第二阿難舉恩養請白言世尊摩訶波闍波提於世尊有大恩德生經七日聖母命終姨母収養不報乳哺養育之恩佛言吾報恩已訖由因我故聞佛法僧名字我於姨母有大恩德第三阿難舉因齊果故請白言世尊世尊許女人出家得聖果否答言許得又問過去諸佛度父母否答言許度阿難言世尊何故不許女人出家佛言由度女人入我法中減我正法五百年所以不度若能盡形行於八敬亦聽出家具足大戒阿難聞已具陳上事是時摩訶波闍波提等五百舍姨女即於言下便得受戒歡喜踊躍作禮而去後摩訶波闍波提比丘尼不忍見佛入滅先取滅度與五百比丘尼以手摩佛足遶佛三迊稽首而起作十八變放大光明入於涅槃佛告阿難汝取舍利置吾鉢中將來佛以手捧接頂戴以手捧以示眾人斯舍利是吾姨母舍利由養得吾身令一切眾生聞法離苦解脫是時阿難羅睺羅各擬請佛母舍利供養佛止之父母養子愧有所益長育哺我自供養報恩父王身終之日如來親自擔棺姨母今時涅槃不許餘人備供過去未來三世佛母皆先滅度皆自供養欲令一切眾生孝順父母也言四內眷諸尼者謨云耶輸陀羅執日之母有開中饋作配高人如來既以道成彼亦捨家聞法既名內眷亦到靈山故烈經首是佛室家諸尼之眷屬言形容美麗等者有二因緣故有聲譽一形容美麗二生育羅睺言相傳釋云者通妨難也緣諸聖教說耶輸是乾闥婆女必是玉女三節疏文證不是玉女一與佛為妻非玉女此一節疏文也言若稱玉女等者二有子故非玉女玉女無子言又佛出家後者三父母迎歸西國法女事他家三年內無子本家父母不迎今持父母將還故非玉女也言未曾有經等者會諸教諸經說羅睺羅是瞿姨之子約長母說瞿姨却是玉女佛有三夫人以瞿姨是長夫人也言彼經從是等者問若准經羅睺羅即是耶輸所生何故未曾有經乃是瞿姨所生答瞿夷是玉女元不生子就生子中耶輸為長若據年高瞿夷為長據實只是耶輸生子彼經中言瞿夷生者但長母為名也言有經云佛有三子者問涅槃經云善星是菩薩在家之子既爾如何當日太子初擬出家父母王不放待汝有子任去後指耶輸腹方有羅睺不說有善星耶答以彼善星鹿母所生不堪紹國位當日不言有子問涅槃經說善星是長子如何法華經說羅睺為長子答涅槃經鹿生故善星長法華經言長約長夫人所生承嫡紹位言長也問亦有說耶輸是長夫人不說瞿夷如何答一瞿夷死後筞為長夫人二約母因子貴子堪紹位母得長名也言有緣皆至等者結亦與眷屬俱問何不自來答有緣皆至所以眷屬俱來也自下釋玄贊第二卷言聖德難思眾者八萬菩薩第三劫人得陀羅尼證阿惟越權居穢土示跡同聞聖德難思經標一眾亦云神功廣大眾問聲聞眾後更列菩薩眾有何意答二義一者欲證阿難阿難若共少乘聞大乘法聲聞之人德量狹劣未足可信今共大菩薩八萬人以聞大法故經可信二者為顯佛德縱有聲聞不顯佛德尊貴佛為大人以輔翼大故其德乃尊唯有少人圍繞佛者其德即輕故標大人以揚佛德故列菩薩如說王來必兼臣從也問婆娑六義應教化眾眾十五義中應將大眾教化大小二利行相何殊答二乘自利心中行利他行如世求名之人行於布施故菩薩之人利他心中行自利行如教曲人先習其曲利益他故問智度論云菩薩之人在家不越優婆塞優婆夷若出家不越比丘比丘尼但舉四眾即得何要更列菩薩答則不定是菩薩必是四眾是四眾不必是菩薩只如定性聲聞無種姓人不曾發大乘心者是四眾不是菩薩也言菩提薩埵摩訶薩埵者唐言好略略云菩薩摩訶薩下去提薩下去埵故言菩薩亦云有情菩薩之名通三乘有求聲聞菩薩求緣覺菩薩總名菩薩今簡去三乘故加摩訶薩也言菩薩修行略等者別解菩薩二字都有四解第一第三是無性論第二是佛地論最後一解是疏主解也永泰云佛所說法有其四種所謂教理行果三乘立名亦依此四聲聞依教以立名聞佛教聲而得其果緣覺依理以立名觀十二因緣之理菩薩依行以立其稱能修自利利他行如來依果以立其號今顯菩薩依於行立故言菩薩修行略有二種言大智為首者問何此問釋名說修行耶答菩薩名字依二利行立也菩薩所修雖有萬行總而言之無過二種一者自利大智為首首字簡餘自利雖多無量法總是自利今唯取大智向自利之中為首也十地菩薩所修謂得二種菩提涅槃名為大智果雖未圓以法空智漸除法執及斷所知障證法空理故名大智大智之用親冥證理自受法樂故名自利多取根本方為大智後得緣俗自利少故言二利他大悲為先等者先字亦簡餘他法也四攝等行雖是利他救生之要大悲為先有大悲故不住涅槃同於塵類救二生死有大智故不住生死冥合真理常法樂不著真俗不離真俗勤修二利以求菩提問如何智是自利答菩薩根本智唯自利唯證真如故更不外緣諸法無利他義菩薩後得智通自利利他其緣理後得智唯自利緣事後得智中緣自五根五力緣自利六度求菩提心等亦是自利若後得智修四攝法及為他說教化等名為利他若修十度多是自利等小分利他若初地菩薩說百法明門二地千法等教化眾生故名為利他今唯取根本智及後得智自利修行求菩提心名為自利大智為首亦智門也二利他大悲為先者飢饉劫中化為魚米等濟益眾生疾病劫中化身為藥樹救眾生病於險道中能化橋梁等及以說百千法門利益眾生皆名大悲唯取後得智一分利益眾生者名大悲門也言菩提覺等者唐三藏所譯也古譯云菩提名道薩埵是眾生大道心眾生故名菩薩訛而謬也菩提覺義則是佛果菩提不是菩薩身中大智也菩薩假者身中大智為能求此佛果菩提是所求也薩埵者有情義悲所度眾生也菩薩假者身中大悲為能度有情為所度即以所求所度故名菩薩以從所求為名名菩提所度為名名薩埵故將能求能度身就所求所度得名名菩薩故所求所度即是所緣境能求能度即是能緣問覺之與智有何差別答前因後果也意言是前智門之中所求之果非悲門之中所度之眾生又云前前為因智後後為果智地地品品不同故言智所求果也言依弘誓語者攝論文也即依弘誓語立菩薩名即四弘誓中無邊眾生誓願度無上佛果誓願成即簡凡夫及定性聲聞雖緣二境不作佛弘誓不肯發願求菩提度有情不名菩薩今依弘誓者即四弘誓願也眾生無邊誓願度配利他大悲為先餘三願配前自利大智為首又云四弘誓願三願名菩初一願名薩故名菩薩無上佛道誓願成名菩眾生無邊誓願度名薩故言依弘誓語也言以二為境等者佛地論文菩提是菩薩大智家所求境有情是菩薩大悲家所度境今不依能發願唯依所發願今不依能緣悲智唯依所緣二境菩提有情如是二法故名菩薩是有財釋菩提薩埵是菩薩悲智家所度之財物攝所求所度菩提有情就菩薩身立名名菩薩會依他名名有財也言覺是所求等者第二解也與前解同也將薩埵屬能行菩薩行人身上著只喚此作薩埵薩埵有情義言求三菩提者問一切眾生个个總名有情未審此是何有情答求三菩提之有情三菩提者或是聲聞菩提緣覺菩提佛果菩提路云或是三佛菩提唯大乘也即是法報化身菩提或是正覺等覺又正覺菩提若准佛地論求三乘菩提總名菩薩唯不名摩訶薩問法身非智如何言三身三菩提答唯識論云五法攝三身有二師說初二清淨法界大圓鏡智攝自性身經說真如是法身故論云轉去阿賴耶識得自性身大圓鏡智品轉去藏識而證得故中二轉品攝受用身後一品攝變化身二云有義初一攝自性身四智品中真實功德鏡智所起常遍色身此即自受用具攝四智平等智品所現佛身攝他受用成事智品所現隨類種種身相攝變化身今言三身之菩提者依第二師唯取自他受用及變化身不取自性故無斯過第二正說言或菩提是所求等者無性論文問此與前何別答前解約身此解約心勇猛即是心也前是身業此是意業意即是心謂勇猛在意故又前約人後約法人法不同身心有異薩埵通善惡但有情邊皆名薩埵今此所求菩提之薩埵非是行十惡之法薩埵薩埵也是通名菩提是別號今言菩提以別簡總又云菩提是所求精進是能求法言勇猛義等者無性論文改薩埵作勇猛能求之人心中有勇猛勝過之作用名薩埵如世人欲上陣戰心中必須勇猛不怖世間之事有其勇猛方得成辦今菩薩勇猛在身菩薩必得將果中所求菩提望用中能求有情勇猛之心因果合說名為勇猛薩埵西方大家喚薩埵作勇猛義凡一切事得勝便名勇猛戰勝相打勝等總名勇猛問一切事中皆勇猛未審此勇猛是何勇猛答是求菩提之勇猛簡餘無利益之勇猛以別簡通言不憚處時等問如何是勇猛之作用處答疏言不憚時等憚徒但反不辭憚也不忌憚也不憚處者淨穢二土五趣等處不憚時三無數劫寒熱等時憚難也如四類聲聞願他方國土持經此娑婆國中人多弊惡等憚處也三生六十劫等取小乘果是憚時也如菩薩能於三界五趣種種變化現身如地藏菩薩常處地獄救眾生名不憚處經云我觀一切三千大千世界乃至無有如芥子許非是菩薩捨身命處名不憚處凡夫無智常沉生死二乘無悲滯住涅槃言有志有能者無性攝論云於佛果菩提有志於度眾生上有能今解於三無數劫時向上只有志能於十方界淨穢兩土向上亦有志有能志謂決志能謂堪能志決堪能求大菩提又云志者一者數之始十者數之終有始有終故名士士人之心故名為志也言二皆依主者永問此二依主何別答約人約法有別第一依主求三菩提之有情有情是自身身則眾同分中收此約人第二依主薩埵是勇猛之義則是著善十一中精進此約法皆從所求以得名並是依主也言又菩提即般若等者第四疏解菩提唯依因中立唯依能行菩提行人身上立也改菩提作般若改薩埵作方便也只此行菩提行人自身中有後得智名菩提只此菩提亦名般若菩提與般若二俱是自利之智體只此體上有教化眾生三業利他作用名方便只此方便亦名薩埵問如何喚菩薩身中後得智作般若答般若是十波羅蜜中第六般若波羅蜜體即是菩提智也問如何喚後得智上方便作薩埵答方便不是薩埵由能教化薩埵亦得薩埵之名也般若是十波羅蜜中第六般若波羅蜜也薩埵謂方便即是十波羅蜜中第七方便波羅蜜也若約後得智體名菩提便名為菩若約後得智上作用便名為薩故名菩提也如是二法即是菩提薩埵體用合說名為菩提體即名菩用即名薩意言菩之與薩唯是其菩薩身中智智有能利能樂義智即名菩提不約所度有情名薩如是二法能利能樂一切有情故名菩提意言菩薩身中有此體用二法即能利樂一切有情所以凡夫智體皆無二乘之人有體無用菩薩之人具有二利體用能利能樂不同有其五義一未來得益名利現在得益名樂二攝善名利離惡名樂三出苦名利與樂名樂四與出世善名利與世間善名樂五與小乘果名利與大乘名樂言菩提亦薩埵者路云將般若就方便將體就用論菩提亦薩埵若將方便就般若將用就體論薩埵亦菩提此但是兩法相對何成持業此解菩薩身不著相國云菩薩身中具此二法由有般若故亦菩提方便故亦薩埵菩薩五蘊假者身上有二法謂般若方便將般若就菩薩身來名菩提將方便就菩薩身來名薩埵菩薩身是體能持二用名持業猶如一人亦文亦武名二用此說正非是以用從體亦菩提以體從用亦薩埵化度云謂菩提即般若般若即是智體方便即是業用體能持用是持業即此二法不離菩薩自身故是持業也言或及初解者指四解中最初第一解也彼處解約所求所度有以解菩提自名名有財釋安國云今此解持者唯取能求能度菩薩心上有大悲用有大智用有智故能求菩提有大悲故能下度有情一个假者身中持此二用攝就菩薩身來名亦菩提亦薩埵故名持業也若引菩提薩埵義解正相當若引大悲大智與菩提薩埵義疎遠不成持業安國解猶未親的今取依弘誓語得名菩薩也將行菩薩行人發心求菩提之言語就菩薩身來亦菩提將度有情言語就菩薩身來亦薩埵亦菩提亦薩埵故名持業言今此菩薩等者問此菩薩有何功能在於何地對何人說得名為摩訶薩名答疏言今此菩薩等言為簡前小等者唯佛地論此有二義一簡七地已前及地前二簡二乘位下有三過名大一過七地已前七地已前未得名大經云是名小樹亦云地前名小順下文故前解為勝七地即居八地前故二過地前故名大三過二乘故名大皆是八地已上經云若有眾生從佛世尊聞法信受慇懃精進求一切智佛智自然智無師智如來智見力無所畏愍念安樂無量眾生度脫一切是名大乘菩薩求此乘故名摩訶薩此所求果問此等菩薩現居上位何不單名摩訶薩而更言菩薩耶答初言菩薩即七地已前及二乘位後言摩訶薩八地已上所以大小雙標也言無著般若論等者解大字七種大性故名大一法大性二心大性三信解大性四淨心大性五資糧大性六果報大性七時大性如一乘章具引二論一一對列也上標類舉言歎德者佛地論云云何讚說菩薩功德答有二義一為除聲聞懈慢心故所以歎菩薩德聲聞形同諸佛剃髮披袈裟時人道菩薩俗人之形合禮拜聲聞所以歎菩薩德更勝聲聞除此慢心也二者令一切眾生於佛生淨信心故菩薩尚有如是道行功德如此不可思議尚自依佛豈況如來功德言之不及謨云弘道由人昇人在位高聽受表經之可信德高圍繞表佛之可尊論以兩內經標五唱歎德言支者分義等者釋名配論支者分義也支者類也十三句中初一句是上支問餘十二句是下支內問何故初一句是上支答初一句是佛果位中功德五法為體勝上名上也支者分義上分功德也問何故餘十二句名下答在因中故是果之下支者分義下分功德名下支內初一句是上支分亦得名總相門餘十二句下支分亦名別相門問何名總別答上支分佛果功德五法為體更無別法名總餘十二句別有體體性眾多著別之法名別物一句是他十二句相共成就得成就名總餘十二句是能成就故名別也因果位別故分上下言故論云應知等者引證也問疏主何知總相是上支分收別相是下支分攝答故論云等言此總相也者經云皆於阿耨多羅等者皆者盡也此八萬菩薩盡依阿耨多羅三藐三菩提未得法上不退亦不轉總依皆於並通由初於阿耨多羅三藐三菩提不退轉一句便生起得下十二句經文總是不退轉十種不退轉亦是初於一句分出也若於初一句無上菩提向上有退轉餘向下諸句盡不成也此約名只是一个不退轉若約義便有十个不退轉此菩薩皆得陀羅尼論云住聞法不退轉由於所聞之法成就得不退轉所以於阿耨多羅三藐三菩提向上不退轉經云樂說辨才成就得樂說不退轉所以能於阿耨多羅三藐三菩提向上不退亦不退轉乃至第十亦爾也問何故羅漢歎德有上上起門菩薩無耶答二說一羅漢在果功德決定故立上上起門菩薩在因功德不定故不立也二者影略說菩薩有上支下支門影取羅漢有上上起門影取菩薩歎德亦有也言無上正等覺等者論云應知阿耨多羅三藐三菩提不退轉者是總相門餘是別相門今是總相問何名為總相答一切經中說佛果功德無不攝盡德之主故名為總論文既言總相依梵語也疏主便依唐言解總前文既是梵語譯就唐言具足應言無上覺正覺等覺又正覺疏主言無上正覺亦略也翻阿耨多羅三藐三菩提是報身此云正覺等覺正覺體即佛果清淨法界四智心品此於無上菩提體本來菩提只合是智餘心心所相應而起故言四智心品總名菩提問由何而知但有五法答佛地經言爾時世尊告妙生菩薩當知有五種法攝大覺地何等為五法答所謂清淨法界大圓鏡智平等性智妙觀察智成所作智此解經中阿耨菩提也假者證得真理及智名無上正覺也清淨法界涅槃真理四智菩提心品者品是品類初地菩薩轉有漏第六識得無漏第六與妙觀察智相應轉第七有漏得無漏第七與平等性智相應佛果轉眼等五有漏得無漏五識轉第八得無漏第八智起時同時有助伴二十一法同時起并取心王是彼品類名之為品謨問佛果五法為唯無漏亦有漏耶答唯識偈云此即無漏界不思議善常安樂解脫身大牟尼名法問集論云前十五界是有漏如何如來豈無五根五識五外界耶答三解初云如來功德甚深微妙非有非無離諸戲論非界處等法門所攝故與彼說理不相違二法如來五根五境妙定生故法界色攝如來五識界經說佛心恒在定故言說五識性散亂故三云如來功德身上隨應攝在薀處界中彼三皆通有漏無漏集論等說十五界等唯有漏者彼依二乘麤淺境說非說一切問何名無上覺答不由於理名無上覺由智滿故名無上覺且如凡夫耶更不說之二乘偏覺唯是生空菩薩雖二空智能覺亦未滿此能證智若流至佛果位中智為能覺理為所覺以此智圓故覺證於理由智圓故所以約智名無上覺言無著者無著菩薩造論釋金剛經也言阿耨多羅者四个字法身也三藐三菩提者報身也顯示菩提者解上報身也及菩提道者即是四智心品今時經論道者因義古時經論道者即是菩提佛果總名道果也亦云道者所遊履義亦通無礙名之為道真如大道通洞無礙唯四智菩薩之所遊履故名為道然諸聖教即說真如為菩提者約有三義一者菩提之境故二者智能斷惑證真如理故三者真如之理諸法之性具此三義無著依此真理體性稱為菩提故經云我於阿耨多羅三藐三菩提無有少法可得彼論云顯示法身菩薩即是此經中阿耨多羅等義也略解也言阿耨多羅此顯菩提者此是真如無為也言自相解脫者說真如向上義也自相者真如體相也凝然不變即凝然常名自相也解脫相者體離障縛名解脫相言三藐三菩提顯示者解報身也即是有菩提之假者只此假者佛身喚作人一切諸佛皆有此四智菩提名平等相佛佛共有名平等相然平等有四一者壽平等報身盡未來際利樂無有窮盡二者證理平等十方諸佛皆同證二空理故三斷障平等皆同斷二障故四者身平等十方諸佛皆一一身廓周法界無有障礙故經云是法平等無有高下是名阿耨多羅三藐三菩提顯示三世諸佛功德均平名人平等相也以菩提法等者餘定性二乘及無性人身中亦有真如理無三覺菩提不名佛故佛身中有此真如理兼有三覺菩提得知是佛意顯於菩提法得此平等即知是佛故以能證平等之智為菩提法也言大智論等者問有為法可得名智無為法何故亦言智答大智論等說等真如是智之依處智所緣境亦名為智若約真如理不合名等是斷障處顯等亦名菩提言菩薩地說者智名菩提真理名斷因斷障得立以斷名引此二文證理智二皆名菩提義則云智為能觀之智即觀照般若處是所觀之理即實相般若言一無上覺總也者正解義也非束下三立初為總但不別簡故立總名更無上過名無上覺路云對下三覺名總三覺是別也由能證智具所證理得名無上覺若能證智不具三覺所證理亦不名無上覺也由能證智具圓覺所證理名無上覺由能證智具等覺所證理名無上覺由能證智離外道邪覺所證理名無上覺謨云唯是無為未有所簡故言其總下疏結云真理所覺名無上覺下之三覺是有為相形立之方名為別安國云只無上覺設不對下三覺當體亦名總體是無為向下不可分別故名總也言即顯清淨法界者解無上覺義意取菩提性名菩提也言二正覺者邪正之正簡外道邪覺言三等覺者均等之義簡二乘人唯了生空偏覺瓔珞經云金剛三昧名為等覺此中等覺不同於先先約菩薩此據如來諸佛如來共有生法二空種智故俱有四智斷障證真故名等覺偏空之覺不名為等言四又正覺者圓正名正如鏡面正先圓滿故簡因位菩薩離具二覺覺亦不圓不名正覺言此顯菩提道者賀云此四智心品能遊履故名道即能證智也言下一覺字等者唐言四字向下皆安覺言即是無上覺等覺正覺言由具下三一切等者真如理若未被下三覺證著由有所喻未得無上之名由成就得三覺證著真如真如得無上覺名非喻所喻非思議所思議說亦不得喻亦不得路云此無上覺體唯真如理二二乘分同得之未彰殊勝由具下三覺唯佛獨有尚無齊等者何有能過故唯識云超過古臥反尋伺言語道理非諸世間喻所喻故論家只作超過抄中涅槃經二十九作超過喻也彼經云喻有八種彼說如來初以油喻煩惱燈喻眾生一切眾生由煩惱油故不入涅槃若得斷者則入涅槃師子吼菩薩言世尊燈之與油二性各別眾生煩惱則不如是煩惱即是眾生云何如來喻之於燈佛言善男子喻有八種一者順喻次第喻故從小至大從因至果展轉而增法喻皆爾名為順喻即次第故二逆喻逆次第故至極處已却尋所依尋至初首法喻皆爾名為逆喻次第也三現喻以現法比喻故四非喻如四山等喻五先喻六後喻七先後喻八遍喻且初順喻者經云天降大雨溝瀆皆滿溝瀆滿故小坑滿小坑滿故大坑滿大坑滿故小河滿小河滿故大河海大河滿故大海滿如來法雨亦復如是眾生戒故滿不悔心滿不悔心滿故歡喜滿歡喜滿遠離滿滿安隱滿滿三昧滿滿正智滿滿正見滿滿猒離滿滿呵責滿滿乃至解脫滿滿故涅槃滿二逆喻者大海有本所謂大河乃至溝瀆有本所謂大雨法中涅槃有本所謂解脫乃至持戒有本所謂法雨三者現喻者如經云眾生心性猶如猿猴猿猴之性捨一取一眾生心性亦復如是取著色爾無暫時住眾生及猿猴現皆不住將現比現名為現喻四者非喻如佛先言四山從四方來欲害人民四山即是眾生生老病死常來切人云何大王不修於施戒等實非是山而名為山故名非喻五先喻者譬如有人貪著妙華採取之時為水所溺眾生生亦爾貪著色欲為生老病死之所漂溺初喻貪欲能為後患為先喻六後喻者即是先法後喻法句經云莫輕小罪以為無殃如水滴雖微漸盈大器依取後時盈大為喻七先後喻者譬如芭蕉結果則死如騾懷姙命不久全愚人受利亦復如是謂以生死兩時為比名先後喻八者遍喻遍以此法以比彼物名遍喻經云如三十三天波利質多羅樹等其根入地除深五由旬高百由旬枝葉四布五十由旬葉熟則黃諸天見已心生歡喜合云葉色黃者喻我弟子念欲出家其葉落者喻我弟子剃除鬚髮其色衰者喻我弟子白四羯磨受具足戒初胞喻弟子發菩提心𭉨者喻於十住菩薩得見佛性開敷者喻於菩薩得阿耨菩提香者喻於十方無量眾生受持禁戒華者喻於如來名聞無礙周遍十方夏三月喻三三昧三十三天受樂者喻於諸佛在大涅槃常樂我淨是名遍喻一切莫過是一句超遍等喻為一句舉第八遍字等於前七即舉後攝初也今此無上菩提超前八喻不同餘法八喻所及意云有為有相可喻無為無相故不可喻故言無上所以真理名無上覺辨云眾取超遍等喻為正言真理所覺者金云問真理如何名覺答然真理名覺總有三義一真如理是覺之果從因為名名覺二覺之性故名覺三云覺之境故名覺今此約境名覺故智論云說智及智處皆名為般若華嚴云自性清淨心亦名無師智此意顯所覺同合智論華嚴言然諸經論者接大般若三百八十七云此本性空即是諸佛所證無上菩提又二百三十云謂無上正等菩提佛言諸法真如謂無上正等菩提菩提之性亦名菩提言體以根本故者問准大般若及智論唯取真如理名無上菩提何故此經通理智答疏言體以根本故真如即是一切法之根本法實性故言今此雙取等者生起也安國云即無上覺是理下三覺名智故名雙取不同諸教四个覺字總名真如也雙取佛果理智俱名無上菩提者即同下開佛知見雙開菩提涅槃二種無上也問無為對有為勝故稱無上有為劣無為如何亦無上答有為對無為是劣非無上無為有為自類論亦得稱無上言於此二果等者即是菩提涅槃理果智果即二轉依果唯識頌云無得不思議是出世間智捨二麤重故便證得轉依菩薩摩訶薩於二果向上求不退轉問如何菩薩中更解不退答緣疏中有此雙取佛果理智俱名無上菩提所以生起向下解不退轉等義緣疏道於此二果俱不退轉承次便言云何不退轉等所以謨科為生起也上總解也言由具下十因等者問此菩薩有何功德於阿耨多羅三藐三菩提法上不退轉答由具十因方於無上菩提法上不退轉十種不退轉即因中已得不退轉故也於果能不退轉者此望佛果位未得法上不退轉也將因望果成二不退已得未得今意正取未得不退也十因具足方於無上菩提法上方能不退轉十因是別相門下支分阿耨多羅三藐三菩提是總相門上支分下解別相門也言決定當證等者問何名不退答謨云決定當證名不退念念進修名不轉行上不修名退退者失煩惱所動名轉轉者動也相國云上句配不轉下句配不退倒配非也言八地已上等者八地已上菩薩法駛流中任運轉故剎那剎那轉增進故此於未得法上不退也言於大菩提者菩提有五一發心菩提在十信初二伏心在十信等三明心在初地已上四出倒在八地已上五無上菩提在佛位所以以無煩惱故前四菩提展轉皆是有上後之菩提更無有過稱為無上解不退了言亦復不為一切等者解不轉也唯識云八不動地無分別智任運相續相用煩惱不能動故五地已前有相觀多無相觀少第六地中無相觀多有相觀少由此八地已前菩薩被有相所動第七地中純無相脩猶被功用所動長時無相事須加功用行方始能為也由此八地不被有相及無相功用所動名不轉也問何故八地不退轉地答相用煩惱不能動故意不名為動此約遠勢說只如初地已去八地已上菩薩不被煩惱動故簡地前菩薩不被有相動故簡六地已前不被功用動故簡第七地彼之中長時無相作無相觀時一剎那間即空方便智發起有中殊勝行本後同起真俗雙觀雖爾事須加功用行便被功用所動八地已去任運作無相觀第六識純無漏在定門無欲界心言名不退轉者一句合結不退轉也言由此八地名等者別結不轉也言不退有四者問但明不退即得何用引他四種及二種不退耶答緣疏主此問正要引不退聖教之中有說四種處有說二種處疏主都會將來四種之中取行不退二種之中取未得不退言一信不退等者此位菩薩信成就故簡要云自後不退生邪見不造無間業不墮無間獄故經偈云若有成就世間增上品正見雖經歷千生終不墮惡道問何故四大聲聞修行過十信者第六心至第六住前如何言周流諸國五十餘年即是入五道生死入無間獄造無間業答聖教言不入者不入第八無間獄不妨入餘前七地獄又說不造無間業者不造撥無邪見業不妨有煞父害母無間業若爾鶖子修行至第六住前如何言我本著邪見答兩說一云但是鶖子大性遠生近就會遇釋迦佛得授記佛未出中間且在外道法中求覺出離非真邪見若是實者如何佛亦出世遇著馬勝便得初果若實不妨更經三生五生始得聖果二者修行有三品聖教說不退者約上品心也若中下品心不妨退也言二位不退者安國云十住第七心方是不退第六心由居退位所以舍利弗第七住前遂退大心至本凡夫位修行小行今遇釋迦便得初果瓔珞經云諸善男子若一劫二劫乃至十劫修行十信得入十住從初住至第六住中若修正觀現前諸佛菩薩善知識所護故出到第七住常住不退自此住前名為退分如淨目天子法財王子舍利弗等欲入第七住惡因緣故退入凡夫不善法中問此位不退於何位中答自後不退入二乘故未至第七住前修大乘之行緣初修故大性未得堅固怖大行難修數數起二乘心故欲求二乘果故名二乘作意障等還聞佛教說法令入第七住中得位不退自後永不起二乘心永不退入二乘故名不退也言三證不退者初地所證得遍行真如所斷煩惱所獲聖性所悟百法明門不退失名不退菩薩二地已去法仍未得故名為退今取初地章敬引唯識難陀云有義初地以上菩薩已證二空所顯理故已得二種殊勝智故已斷分別二重障故能一行中起諸行故雖為利益起諸煩惱而彼不作煩惱過失故此亦名不退菩薩言所證得法者謨云即是遍行真如根本智證賴耶識性後得智了賴耶識相如是之法一得已後更不退失問不退何法答所證得不退失故謂菩薩在地前時於大菩提數數生退不肯修雖作生法二空觀伏所取能取空數數煩惱起障二空觀不現前故名為退轉今聞佛教化令入見道雙斷二障及證真理所證得無漏智品及所證理永不退失名證不退言四行不退者八地已上方名不退也言無為法皆能者問無為法如何說修答有為修生無為修顯又云有為是本後二智無為是理理者只言證不得言修今總言皆能修者文勢隱便亦可修理前說勝言故不退者非即等者疏主料簡不退與不轉別恐人疑不退即不轉兩義各別也地前菩薩有煩惱故退者失也七地已前菩薩雖無煩惱但名不退未得名不轉猶被相用所動動者轉也即有是不退不妨被轉如今八地已上菩薩一則不轉念念取佛果菩提修行更無間斷名不退於中不被相用煩惱所動故名不轉如人遠行不息名不退中路更不被賊劫狼咬等事名不轉若不轉則望佛果菩提若不轉約外緣說二法各別故名非即不轉上四不退了言又不退有二者是標也言一已得不退者初地即得遍行真如斷異生障名已得法決定不退若八地兼望初地亦名已得若三地已上佛果功德名未得法七地已前菩薩於已得法上不退未得法上有退唯取無上正等菩提是未得法八地已上菩薩能於未得法上不退問若唯取佛果菩提是未得法覺初地已上菩薩於佛果菩提未得法上覺豈退耶答初地已上七前已前菩薩被煩惱動有相功用動於未得法上未立不退之名故不退不轉唯在八地已上被八地已上菩薩第六識一向無漏功用任運進修問入滅定時如何進修答不起滅定而現威儀不妨說法教化十地經云八地精進於第一剎那倍前二大阿僧祇劫所得功德一倍第二剎那更倍於前故名不退也問疏主但說四不退了即得更何要說兩種不退耶答疏主有深意以彼四不退收法不盡疏主所以作後解二不退問前四不退與後二不退何別也答別前四不退與不轉兩義各別不退者非即不轉後二不退不退即是不轉望佛果菩提進修不息名不退不退即不轉轉是不退蒙別名不退與不轉總望佛果說不得望相用煩惱說安國云進修不息名不退更不異緣名不轉止不息時便是不異緣也進修與不異緣是一體如一人尋路行更不落道名不轉也言情祈正覺等者心進解不退不動解不轉言法駃流中等者別簡第七地中功用行也唯識云不動地已上菩薩一切煩惱永不行故法駛流中任運轉故於諸行中起諸行故剎那剎那轉增進故此位方名不退也駛者水疾流貌金光明經云恒河駛流水也言此不退等者放不退即名不轉正不轉時是不退故名異體同也上支了言下支分有十二句等者歎菩薩德都有十三句初一句經佛果功德體故立上支分餘十二句因功德非勝故立下支分佛果功德是他因中十二句功德所成就得對他十二句名總餘十二句能成就對總名別問經中十二句盡無不退轉字諍爭知將十二句經文經成十種不退轉一一皆安不退轉字答論主緣見頭分總句經上有不退轉之言總句既有明知別句亦然也所以一句總上分出十不退轉十不退轉若不成便於無上菩提亦退由此十二句經便是不退轉言以十種示現者以十二句經以十種示現第四第十各攝二句故論科為十疏分四唱且十種不退轉者一聞法不退轉經云皆得陀羅尼二樂說不退轉經樂說辨才三說不退轉轉不退轉法輪四依止善知識不退轉供養無量百千諸佛於諸佛所植眾德本此攝二句經文五斷一切疑不退轉常為諸佛之所稱歎六為何等何等事說法入彼彼法不退轉以慈修身七入一切智如實境界不退轉謂善入佛慧八依我空法空不退轉通達大智九入如實境界不退轉到於彼岸十應作所作住持不退轉此攝二句名稱普聞無量世界能度無數百千眾生言初九自利等者十中分二初九自利後一利他利他謂名稱普聞等言初九又二者初八有為後一無為無為即到於彼岸體實性故言初中又二者初五福慧後三悲智悲智謂以慈修身善入佛慧通達大智三也言初五又二者初三彰內行後二善緣修行謂供養無量百千諸佛於諸佛所植眾德本常為諸佛之所稱歎言初中有三者初一薰修自利經云皆得陀羅尼次一利他謂樂說辨才後一利法經云轉不退轉法輪言善緣中二者初一遇緣修行供養無量百千諸佛於諸佛所植眾德本後一讚美除疑經云常為諸佛之所稱歎無除疑文准義則有也眾疑菩薩住於何位及所得證今聞佛歎故斷眾疑由是科為讚美除疑也言三悲智等者初一慈悲經云以慈修身以慈悲重修身心拔苦與樂故是慈悲後二智慧經云善入佛慧通達大智是智慧也問前來疏科為九自利後一利他如何今者自利之中更分別他答前科自利約法體具德由菩薩具四辨七辨前言初九自利後科利他約位起用說法教化即是利他言一住聞法不退轉等者天親菩薩解經云住聞法不退轉此言倒故應合言聞法住不退轉八地已上菩薩一聞之法記之在心名住不退失故名不退更不被妄念動搖名不轉由成就得因中陀羅尼所以於佛果菩提未得法上不退亦不轉此舉聞慧理實思修二亦在其後舉初攝後也言一攝二散等者攝即後佛聞法攝之在心也散施也施與眾生轉為他說又云攝者約初聽聞證得陀羅尼聞時熏與第八識中名為攝散者約與他說時攝者是因散者是果攝者包合義以含多名攝總持者即是聞慧與念同時聞教所聞教義一一能持不忘故名持能持有二所持有四以小含多名總持今立持名事須於能持法上立也問總含兩義為總持其義照然散者不攝法如何名總持答所持四法就能持立亦名總持四法亦名法陀羅尼義陀羅尼菩薩忍呪等言此即聞持等者化度云聞持者即是聞慧聞於文義者即是思慧任持不忘者即修慧即所聞字之能持即是所聞之法而能持能持即是念慧也路府云應言聞之能持體即念慧理實思修亦能總持文略不說由念明記慧能簡釋故能持法以少攝多以總含別令不忘失陀羅尼三地成就九地相續佛位圓滿言所聞之能持等者依主解發聲能說即唯一人若所聞之人即有多眾若能持所持法即是所持人能持能聞所聞法是所聞聞即耳識持即第六竟念慧等即別境中二數也若無念即忘失若無慧不能簡擇即不正知此隨或二也言聞即總者問若准瑜加論中十法行前八為聞慧第九思慧第十修慧十法行既通三慧何故此聞空說聞持不說思持修持答有四義勝故偏立聞持一緣外境故二緣散位名句文三是三慧之中最初故四攝持勝故簡未成就者聞而不持故偏立聞持思修二慧不立持者有四義一唯緣內故二於義決定三非初慧故四簡別義微故不立也唯此亦非文略義不立也言十地經云八地已上等者永泰云意證八地已上菩薩有於聞慧故有聞持三慧即是聞所成慧思所成慧修所成慧問何名所成慧答因聞教為能成慧得生長為所成因思駈伇為能成中品慧生為所成由定熏修於心為能成上品慧得生鑒照諸法斷染成淨說所成慧聞為能慧為所也言於一修慧分三用等者唯一意識正聞時即名聞慧思惟義理即是思惟定中意俱即是修慧通難亦得問八地已上菩薩常在定中唯有修慧又復不起欲界心故云何得名聞慧答疏言於一修慧等修慧體唯有一於一慧體上一剎那中能取外教而尋於義先文後義名為聞慧能深籌量先理後文名為思慧於此二中能證明了即名修慧聖智迅疾於一念體上義分三故故無別體問聖即可爾凡夫如何答大小二乘不說色界有思體不說無色界中有聞慧體無色界天佛邊聽法等事但依修慧緣教義故又目連向獼猴池邊入定狂象聲亦是修慧法教非聞思故欲界無修慧以是散地故色界無思慧殿心即入定故無色無聞慧以無聲境故意說八地已上菩薩常在定中妙觀察智常遊十方聽聞正法不假更起散五識故故瑜伽云聞謂比量問如修道中有八正道正思惟又八地已去第六意識但是無漏相應之思亦皆無漏何故不許有思慧也答意識相應雖思數然是作發動於心相應之思行薀所攝非是思慧思慧極微言故意彼但發三業非引慧也問三義緣境有何差別答准大乘宗如實義者大論七十七深密經二云三慧皆緣文義初依聽聞以文為先而觀於義名為聞次依思慮以義為先而觀文者名為思次依於修俱於文義證解明了而名為修此在因位八地已上一體用分七地已前各別有體若此至佛位都無未曾得更無聞思唯有修慧言散者施也此有四種者解所持四法也一法陀羅尼二義陀羅尼三能得菩薩忍陀羅尼四呪陀羅尼且法者謂諸菩薩念慧力持由此力持聞未曾聞言未曾溫習未善通利名句文身之所攝錄次第結集無量經典於無量時住持不忘名法陀羅尼二義陀羅尼者謂諸菩薩獲得如是念慧力持即於彼法無量義趣心未溫習未善通利經無量時任持不忘名義陀羅尼三忍陀羅尼者謂諸菩薩成就堅固具足妙慧獨處空閑持此名句便能依此名句入加行中唯自觀察此呪名字自性遂入初地得無漏智名忍其詞曰壹𭾤蜜𭾤吉𭾤毗羼底丁履反鉢陀膩婆訶若誦此法門能得菩薩無生法忍即三無生也菩薩得此忍故以一言中現一切言如是一字呪亦含多法義四呪陀羅尼者謂諸菩薩獲得如是等持自在由自在力加被能除有情灾患諸呪章句令彼章句悉皆神驗無有唐捐如火頭金剛軍吒利等名呪陀羅尼問呪是何義答大師秘密妙法綱紀顯正摧邪除惡慕善靈祇敬奉賢聖遵持威力讚加故名為呪呪詛也問此兩道呪何別答前呪進善後呪破惡菩薩忍是自利呪則救眾生利他也問攝與散何別答一自利謂聞持思持修持二利他積而能散君子之仁惠攝而能散菩薩之弘慈故此總持通於二利言此中二種初是等者問能持有別可言總持所持各一何名總持答且如法中以一言中現一切等如一呪中亦含多義准此亦名總持路府云或說所持顯能持用所持法體亦名總持也言因果別者化度云謂自利聞持為因攝屬己故利他法義等四即自利為因利他為果能持為因所持為果攝為因散為果也言二樂說等者謨云得此辨才樂為眾生說故名不退無斷絕故名不轉以此辨才為因所以於無上菩提不退亦不轉辨才是說法器具由前聞持積集得千教法又具辨才所以樂為眾生說法也辨才是體樂說是用問四無得解與四陀羅尼何別答四陀羅尼中法義二種攝初二無礙解無礙解即初二陀羅尼中攝也後二無礙即初陀羅尼中分出問何名辨才何名無礙解答疏云智慧是一在耳為聽在目為明在口為辨在意名解此解亦非但是古譯經論總名四辨新翻云無礙解法義詞辨此四是境對能解心一一總能解得更無擁滯故名四無礙解亦名四無滯智凡夫不得辨才不樂說法便有退轉菩薩有此辨才樂為眾生說法辨才為因樂說為果問樂說不退轉與後說不退轉何別答樂說約辨才向上功能說不退轉望名句向上說無斷絕辨才則約能緣說礙解約境說問法無礙解與詞無礙解何別答法則約名句文詞唯緣於聲弘長元年辛酉八月上旬天法隆寺石藏院書寫了同年九月二十二日一交了
