body:
  text: 鏡水寺沙門栖復錄言四辨者即四等者一法無礙解法謂教法解者智也於諸教法智能了達無有滯礙名法無礙所言解者後所得智此智緣於名句文法無礙而轉名法二義義謂所詮真俗諦理菩薩於一義中生一切義故說一字時解一切義菩薩說法義理無盡名義無礙解三詞無礙解唯緣於聲緣諸方音聲百舌七鳥聲皆能解得四辨說無礙解即四辨七辨說法也問此四義中誰因誰果答前三因後一果要成前三方能辨說問四辨與無礙何別答於法義等四而解了名無礙解為他宣說法義四名辨境體無別也言七辨者一捷辨須言等者蹇九輦反跛行難也若言語作咋吃居部反語難也吃會意字口邊作乞開口吃問蹇吃何別答蹇即是語三斷六絕吃即重道據字只合下著言有疏本著足者即是蹇跛也即是跛驢喚作蹇衝還是行不正之皃亦是語多厥錯也永云蹇者語澁吃者語重今者菩薩須言即言而無量澁故名捷辨也昔晉朝鄧艾口吃晉帝知之記對故問卿名何對曰艾艾帝曰卿名艾艾當為機艾對曰鳳鳳號號何德之衰也言二迅辨懸河等者二說一云懸河與湕冷一種南地有湕河慮偃反冷者清冷嚧音懸河者即懸注況菩薩辨南地有湕河之水清冷而懸河也二云懸河與湕冷別懸河直是山中萬伊岸裏水一道流下名懸河也湕建音同冷字便合作瓴令邊作瓦此瓦瓶也湕者舉也亦是翻瀉之義即是建瓴水於高屋之上即舍資頭瀉水極迅疾況菩薩辨金云瓴盛水瓴也似甖有耳二解之中後解有典據事因漢高祖在咸陽楚王韓信謀反陳平奏云說高祖偽遊雲夢澤捉取韓信雲夢澤在向東於此澤中設會諸侯韓信出迎因便捉得是日大赦天下田骨奏高祖云陛下收得韓信又理秦中秦國形勢之國既帶山河之險懸隔千里四面是山當中有水通流地勢利便窂固此秦地得二萬人當得諸國百萬人其已下兵於諸侯之國譬如居高屋之上建水也如瓴盛水居高屋之上翻其水水勢甚速也訥者蹇訥也言三應辨等者眾生欲得說與說名應時不欲得說與說名增欲得說時不與說名減二眾生根熟時與說名應持也根熟了與說名增根未熟與說名減三利根者與多說鈍根者與少說名應根若利根者與少說名減鈍根者與多說名增言四無疎謬等者無疎故說法不謬無謬故說法不邪永云今此菩薩所說說心即心言色即色所有演說皆不邪錯而契理故言五無斷盡等者謨云意言終而復始無有斷絕名無斷盡如蟻巡環等言六凡所演說豐義等者豐故多事義之言境即是體事永云本言在義言多義寡猶上樹求魚尅舟求劒今者菩薩凡所演說義味盡豐味豐故多理言七一切世間最上等者智論云五種音聲從佛口出一甚深如雷九地菩薩說法亦如世尊甚深如雷聲問雷聲重濁何言清徹若言清徹即不如雷答今言如雷者取雷聲入地隱軫也之義不取濁義遠聞如普賢言我於寶威德上王佛國等如目連尋如來聲至野馬世界如來聲不二清徹遠聞聞者悅樂三入心敬愛四諦了易解五聽者無猒具此四辨所以菩薩得樂說不退轉即經樂說辨才此五皆是此中第七辨收問捷辨迅辨何別答捷辨對語難迅辨對語易者問迅辨與無斷盡何別答迅如聽不明者無斷盡如聽亦明者兼明文義所說連環言多以後得等者問多以之言必合少分通根本耶答法詞辨才此三唯後得智外緣起故義無礙解義謂義理通道理理後得智緣若義理謂真理即根本智故謂三全一少分皆後得故一少分是正智緣故故言多以及正智為體也言三說不退轉者論云說不退法輪者即是經中轉不退法輪謨云說此法輪勝進無退名不退非為染動名不轉又云法輪是所說今轉不退轉是能說言法輪是所說等者疏主解法輪是所說常說此不退轉法故偏解說字緣與經文不同所以偏解說字也如仕官人說仕官法種田人說種田法初地菩薩說百三摩地門行檀等法八地已去菩薩於無上菩提決定當證更不退轉即以此不退之法及前諸不退法等為人說故言謂轉如前等者問何名不退轉法輪答疏云謂轉如前四等問菩薩轉四種二法輪有何意答四種之中䇿一信不退法輪令一切外道異生捨邪歸正二轉位不退法輪令一切眾生捨小歸大三轉證不退令一切眾生捨凡成聖四轉行不退令一切眾生捨劣取勝也轉二種者一轉已得法輪令一切眾生捨因取果未得法輪令一切修行之人生決定心求成佛果今此疏中八地以上菩薩言轉不退法輪是四種中行法輪二種中未得法輪化度云即如前四種不退中皆有後二不退也且信不退有二者第六住已前名為已得從此已後名為未得於已得者名及不退於未得者名為不轉言又彌勒所問等者問說何法名轉不退法輪答疏言說自分等問何名自分外分答攝云謂諸菩薩等自所得大乘之法名自分談二乘法名為外分又當地已得名為自分上地未得名為外分說此名不轉不退法輪言又說智等者謨云無漏真智證理斷惑決定無退名不退所獲無漏福智不同人天有漏福可福輪故名不轉福中有漏福無漏福謂學百劫佛相好親感佛果菩提此福勝故名不轉也世間有漏福非勝故有盡有能轉故說第六波羅蜜說智名不退說前五波羅蜜說福名不轉言又說般若等者說般若是體名不退以方便是取佛果菩提之用名不轉謨云本智照實相理理智冥合名不退方便後智能趣佛果不為邪魔所動名不轉說此名為轉不退轉也言又說有為事等者八地菩薩身中有為功德示不失故名不退無為功德凝然常故名不轉問不退與不轉何別答望自己得法名不退望未得法名不轉勝劣異故望自體法名不退望勝法名不轉說此名為轉不轉也言此法如輪者是總解三義本章中有四義今此攝領遏義任摧壞義中言一圓滿義等者八正道等等取七覺支十無學智八聖道支且轂輞輻三智圓滿故先以小乘宗以正語正業正命為轂以是戒故小乘宗戒大乘宗見小乘事須戒為先若無戒一切不成正見正思惟正念正精進為輻以是慧故故正定為輞今者大乘正見正思惟為轂是根本故正語正業正命為輻依前有故正念正精進正定為輞攝錄餘故言二不定義等者輪向實中從南州至西州從西州至北州從北州至東州名不定聖道無漏智從見道中煩惱盡捨見道入修道捨修道入無學道名不定義也又從自身至他身他身復為他人展轉說名不定義如輪不定也自三轉者初印相轉此是苦此是集此是滅此是道此在見道第二應修轉此是苦我應知此是集我應斷此是滅我應證此是道我應修第三已作轉此是苦我已知此是集我已斷此是滅我已證此是道我已修即無學道也次為他三轉者一示相轉此是苦汝應知此是集汝應斷此是滅汝應修引是道汝應修第二應修轉此是苦汝應遍知此是集汝應遍斷此是滅汝應遍證此是道汝應遍修第三作證轉未知苦諦汝已遍知未斷集諦汝已遍斷未證滅諦汝已遍證未修道諦汝已遍修化度云若准小乘宗一生中得成見修及無學道今取不此准依大乘三無數劫佛說從見修無學道展轉與他亦復如是如佛轉與舍利弗時於當從見及修成無學道號曰華光轉與堅滿菩薩如是展轉故言不定也又說三道初地入心住心名印相具七覺支名見道二出心已後至十地已來名應修是八聖道支金剛心時無惑之時是十無學道名已作轉此約佛自轉自得已後將為他轉也安國云佛雖許為人說然於三處法轉不轉一高山不轉我慢如山故經云我慢自矜高諂曲心不實至難度二險道不轉愚癡為險道經云入生死險道等三深泥不轉貪愛如泥故經云以貪愛自蔽盲冥無所見至云何而可度離此三過輪乃方行言安置聖道等者即是世尊問阿若憍陳如我已說法比丘解否答云我已解法言他得聖已等者即是陳如成佛轉為他說也言三摧壞義等者俗呼為齧肬虫也韓詩外傳云齊莊公出獵有蟷蜋舉手搏其輪問其御車者此是何虫也御者對曰此蟷蜋虫也此虫知進而不知退不量其力以輕龍歒也又莊子云蟷蜋努臂以當車轍不知勝任也蟷蜋況煩惱車輪喻聖道輪有二能一能摧未伏二能鎮已伏世界之中不賓伏者輪到彼處摧之能降未伏也被降了者後更不敢起逆名能鎮已伏故法輪亦爾謨云真智起時無惑不斷名摧未伏一斷已後更不敢重生名鎮已伏惑無間道降未伏解脫道鎮已伏也小乘不斷惑體但斷惑障大乘伏定障其種由在冥智起時種現皆盡此約伏惑名摧斷惑名鎮也言如王論寶等者金輪千輻以金所成金輪王福德敵四州人福銀輪王七百五十輻以銀所成王三天下銅輪王五百輪以銅所成王二天下鐵輪王二百五十輪王南閻浮提也問何故名法輪答以法所成故名法輪金銀銅鐵輪等轉時事須得他輪王以手摶之方轉法輪亦爾事須得他四辨七辨說方轉唯佛能轉經云一切世間天人沙門等所不能轉故言如王輪寶故喻如轉法輪亦爾非唯伏鎮煩惱現行忽能斷種摧伏所知言法輪有五者標五義解輪也言一輪自性者見修無學真無漏智是輪自性大乘見道之中擇法覺支以是慧故餘六相從來非是正要也言擇法覺支者意顯見道中修七覺支觀言等者意顯修道中修八聖道支觀八中取正見為輪自性以是慧故餘七相從來也更等取無學道中十無學智十中唯取盡無生智為輪自性餘是助伴十智者一世俗二法智三類智四苦智五集智六滅智七道智八他心智九盡智十無生智更有通修判修行相說見道中修七覺支修道八聖道支以修七覺支順彼初地菩薩入見道有順捨受名所以見道修七覺支也緣八聖道中正語正業正命順代菩薩修習位次所以修道中修八聖道也上別修行相次通修行相者若通行相說見道中亦有七覺支八聖道支其修道亦有七覺支八聖道支無學位亦爾若七支八道不通無學者佛位功德應無七覺支八聖道支問既約通行相忽應十無學智亦通見修答二說一者約十無學智一一各別唯無學道有不通見修二云若約路云八聖道支上加二智即所加二智唯在無學道餘八通見修初解為勝也言二法輪因者因有二種一者詮四諦教教雖不能斷惑因聞此教方能斷故故教為輪因二者慧為輪因謂見道前能詮教能生有漏聞慧聞慧引生思慧思慧引生修慧修慧為因引生見道中法輪自性聖道因他聞教生故教與有漏聞思修為輪因也問云慧若斷惑可名為法輪三慧不斷惑如何名法輪答三慧不斷惑不令名法輪為因引聖道得名法輪因若約輪體三慧即非不斷惑故非無漏故今約輪因即通以三慧故方引得見道起故故偈云外惑無熏習非內種應知聞等熏習無果生非道理南云地前散善只有聞思二慧直至八地方有修慧正法輪體也疏言等等取修慧也言三輪眷屬等者問無漏智可名法輪餘法何名法輪答相應眷屬總名法輪也言五蘊諸法者即前七覺支中餘六八聖道中餘七十無學中除盡智無生智外餘是助伴且如見道聖智起時同時作意驚於聖智觸於空境并思為行蘊受為受蘊想為想蘊第六意識為識蘊無漏道共戒遮防戒垢從所防說名為色蘊如是等法助慧斷惑皆有功能名輪因也言四法境輪等聖道斷煩惱處如二乘人法輪境猶如世間作陳處青渠黃境北山見王子陵等是殺賊處名境法輪亦爾是斷煩惱處名境聲聞人法輪皆以四諦理為境緣覺人法輪皆以十二緣生理為境大乘人三轉法輪皆以三性三無性為境也言五法輪果等者因道所證菩提涅槃因即是道道為能證菩提涅槃為所證尋常菩提智為能證涅槃為所證此時因為能證果為所證三乘見道前教聞思為因見道修道輪自性為果或見道修道輪自性為因引生果中菩提涅槃為果此有兩重見道前教聞慧為因唯因非果果中菩提涅槃唯果非因中間二道亦因亦果言法既名輪等者問何不名說法輪名轉耶答言轉者義則親說則疎也前來四辨七辨為能轉法輪體是所轉菩薩說向人令他悟解亦名轉也只好講人解心轉到聽人心頭解心亦生名輪也問何名菩薩轉行法輪答菩薩說教之時教中含理人聞著依教悟理便是轉理諸聽人聞著悟理依理起行行行取果便是轉行法輪言今隨所應等者問法輪通三道法輪體者曰教理行果未審此問輪是何法輪答疏言今隨所應等此菩薩是八地以上菩薩所法輪是行法輪問此不退法輪是四不退中行不退二不退中是未得不退問彼更未得如何名轉答還是說彼未得法向人說名轉決定當證名不退不被功用所動名不轉意言八地已後菩薩能說自他得五法輪證不退位具五輪故信位二不退有輪因故言又此五體等者束五為四也五即五法輪四即教理行果問四法與五輪如何相攝答四中教法攝五中法輪因四中理法攝五中法輪境四中行法攝五中法輪自性及輪眷屬四中果法攝五中果法輪也直以配委曲配四中教法攝五中法輪因兼攝法輪果中一分梵音聲是如來聲界名句文是佛法界屬教也四中理法攝五中法輪境一分三道法輪皆依四諦理上斷煩惱苦集二諦理全攝其滅道二諦理只攝一分餘一分屬果四中行法攝五中見修二道輪自性輪眷屬并法輪因中有漏聞思修三慧四中果攝法輪果中一分緣梵音聲體是教教法中收四諦理中滅道二諦理一分屬果法又法輪果中涅槃是教下所詮理一分屬理法餘一分屬果法又無學位中正見正智為輪自性及無學位中輪眷屬皆是果法收也辨云然前總相配屬乃為善說不爾五輪自性離亂非疏本意言轉者動也等者釋轉義中標也言動宣等者釋也問何名動答言動宣言教問何名為顯答顯揚妙理問何名為運答運聖道於聲前問何名為起答起真智於言後且運聖道於聲前者聽人聖智起於說者之前此相對名前也起真智於言後前後名後也問答約正說法時聖道便起唯陳如一入相對名前可爾餘四人在四善根位夏滿方始得果如何說相對名前由此不成故申第二解云小乘過去名前大乘未來名前如來轉法輪時聽者聞假聲名句文熏得種子落在第八識中夏滿方始得道如來聲是現在聖道在未來方起如俗間喚未來作前程事如今聖道在如來法海聲之未來聲之前故故言運聖道於聲前此五人總收也起真智於言後者若約陳如等五人得無學果則是在後如來說法了聲已落謝過去陳如等五人方得無學故名起真智於言後此二解正也三者唯於八地菩薩身上說由菩薩先自內身成就得聖道總未曾向人說聖道在說法者聲之前名運聖道於聲前聖道在未說者聲之前起真智等者菩薩說法了聽人聖道起名起真智於言後也此解聖道屬菩薩真智屬聽人所以疏云動宣言教教也顯揚妙理理也運聖道於聲前行也起真智於言後果也問教法是有為運動可名轉理法是凝然如何亦名轉答教法是有為有為得名轉理法雖凝然顯故亦名轉又教為能轉理為所轉如車是能轉地為所轉言圓摧障惱等者圓是滿義摧是壞義故名圓摧有云圓摧邪惱非也路府云三義之中以彼法輪摧圓滿懷義勝故偏結之其不定義劣故隱之而不說也運聖道於聲前等即是不定義言下方便品等者指餘文也即方便品法輪章廣說也言第四依止善知識不退轉者經云供養無量百千諸佛於諸佛所植眾德本此上四句論合為二句名依止善知識不退轉次兩句合為斷一切疑不退轉一唱經有六句合成二不退轉於此佛所修行供養即是依已承事無暇名不退不被惡友所動故名不轉問供養爾許多佛佛邊作何事業答於諸佛所殖眾德本殖田種也種諸善根問善本向何處種答供養無量百千諸佛百千諸佛所種也言殖眾德本者二解一者德是果三身之果三身功德名德三身不一名諸三無漏根名本修彼三無漏根得果中眾德因得本名因即是本也二者德者果中功德萬德不一名眾德本者信進念定慧為因當來得彼佛果因能得果因得本名名德本三者因中萬行名之為德萬行不一名之為眾德德即是本故名德本此解德與本俱在因中故謨云眾德通因果通福慧也言以己身心等者論主解也路云解論文云菩薩依自三業供養佛色身依佛色身攝得供功德攝云菩薩自家三業依自色身攝餘意語二業並皆供養佛由身業禮拜口業讚歎意業思敬不如身業恭敬供養執持香花但顯身業攝餘二業所以身色身業供養佛攝得檀波羅蜜功德此解為正問何等說口業空說身心業答舉身心攝口業也供養佛時身心業偏勝由持此業供養佛故意說三業之中身業勝故問何不依法身及自受用報身攝取善根答以此三身非是菩薩受用身法身無形像自受用身非種善根處故上解論文言菩薩修行莫過等者疏主解也意取菩薩依自色身攝取供養佛功德為正八地已去受變易身名為殊勝色身也言菩薩地說等者大論四十四云何菩薩供養如來答當知供養略有十種一現供養者一切現前佛二現前設利羅及制多三現前一切三寶設利羅者此云佛體佛體有四一業報佛體自受用身二全身佛體如多寶佛是三化相佛體本小化身是四碎身佛體即法門寺指節等是也今言舍利但得名骨餘義失也忽訛略也若言舍利有三一赤舍利肉也二黑舍利髮也三白舍利骨也言制多等者此云靈廟無舍利處皆云制多舊云支提皆訛也若有舍利處云窣堵波此云高顯處言塔波鍮婆皆訛也等字等取佛法僧三寶者先於三寶處起六種心一起福田心如世間良田能生稼穡三寶能生眾生善業二起恩德心能拔眾生一切諸苦能與眾生涅槃常樂三起最勝心一切眾生無有能勝於三寶者何以知答一切眾生未免生老病死三寶不然故名最勝四起難值心於百千劫不聞名字況能得見如優曇華極難遇故五起獨現心三千界中但一佛出出既不多故難逢遇六起功德心世出世間所有功德皆依三寶而有如諸卉木巖石泉流皆依大地而得有故故修供養此等一一唯現供養如供養真身就鳳翔法門寺去餘三皆爾言二不現前等者有二一時不現前二處不現前時不現前者二月八日時供養佛牙時時雖未到正月之中便修供養名時不現前二處不現前不能就法門寺去但此間深房淨院裏燒香發願遙供養名處不現前疏言於餘佛制多等等取舍利也言三現前不現等者對一佛制多名現前若兼總作一切佛舍利名不現前如一佛制多等現在前時供養已了便於此舍利向上總作一切佛舍利皆同此有三解一云佛之舍利皆以真如法為體性法性真如既無兩般供養一佛舍利便供養一切佛舍利供養一佛舍利中法性便供養著一切舍利中法性二云佛佛道同釋迦佛以四智八識成身一切佛皆以四智八識成身功德既同供養一佛與一切佛同三云多佛共一世界眾生緣熟多佛共起不化身色相若供養一佛化身色相體性與一切佛身無異也一个佛色相分帶得十方一切佛色相分皆同也上論言故我今者疏主結也言四於如是等者論說若諸菩薩於如來所若制多所設現前不現前供養唯自手作不使用友奴婢親屬等作是名菩薩自手供養言五若起悲等者仕農工商不是惡求得菩薩悲心見貧苦人作念此人今生貧苦良由多生不布施遂與錢物交伊安樂然後還似我對現前佛邊供養言俱供養者自他皆作名俱也尊於己者即觀他卑者教化也言七財敬等者捨財是一應以香華及四事等供養後生殷重心即同犬馬皆能有養不敬何以別乎言八廣大供養等者此有八種一者長時即以前來財敬等事不間斷二多供養不得少三須淨妙物不得捨麤惡物四須淨心三事體廣又為名利心五事須迴向菩薩與七種最勝相應十波羅蜜多要最勝之所攝受得到彼岸一安住前勝謂要安住菩薩種性二依止最勝謂要依止大菩薩心三意樂最勝謂要悲愍一切眾生四事業最勝謂要具一切事業五巧便最勝謂要無相智之所攝受六迴向最勝謂要迴向無上菩提七清淨最勝謂要不為二障所惡菩薩如是布施是名廣大波羅行六如法供養所施物或是自力集得或是從他求得七假想將財物等起彼想心起百千身恭敬禮拜一一身出百千手持香散華一一身出百千聲讚歎佛功德化出百千莊嚴具八隨喜見瞻部洲乃至十方世界人供養傍生隨喜心與供養人功德齊等此之八種是名菩薩廣大供養言九無染供養者金云有三一自性無染離輕慢故二令他無染離放逸故三物體無染非理得財劫奪殺命沽酒初二有情第三物體今不依此故言無染又有六種一不輕心二不放逸三不慢他四不散亂五不矯詐六非不淨物初五約心名無染後一物體無染言十正行供養等者攝云普緣眾生求者發起無倒與樂之心緣有苦者發起離苦之心緣有樂者發起隨喜不生嫉妬心緣諸有情有樂無苦無樂不苦無苦無樂如次發起除貪嗔癡清淨之心名為慈悲喜捨若有須臾修四無量心時中極少不過須臾色中極少不過極微言乃至少時信等者第十中文有五一於諸有情起四無量心二於諸法行修無常苦空無我相三於涅槃起勝利相四於三寶六度而隨修念五於諸法發生智慧信忍離言等於少時間能信真如是離言法性獲福無量今越却中間三義故乃至少時信忍離言問信何法答信真如法忍可真如是離言真如法離言無分別法離言無相法離是總也言起無分別等者相國云此即觀前諸供養事體皆是空三輪清淨方真供養如有偈言一念淨心是菩提勝造恒沙七寶塔寶塔究竟碎微塵一念淨心成正覺攝云情與非情莫不皆以真如為體真性離言本無差別亦無眾相真如既等諸法亦然但由眾生虗妄顛倒於相見相無分別中起分別相若能於此無分別不起分別等相此即名為住無相觀正行供養也言即為守護菩薩等者即是持三聚淨戒此是自利供養修四攝等即是利他若有分別動搖便有是非心起是非心起則愛惡情生愛惡既生貪著前境一切煩惱因此而生云何更能守護菩薩淨戒意言答能住無相心凡所修行四攝事等皆名正行供養意說萬行皆須於無相中而修即是三輪清淨事業最勝也言最上等者第十法供養過前九種最上簡前是下最勝簡前劣最妙簡前麤言過前供養等者問此第十供養何故過前答此供養法身功德最勝故過前也路云此十供養通約一切凡聖而論前九供養住有分別心第十住天分別故說過也若八地已去菩薩修行十供養皆是住無相心不言過也言應念如來等者佛本來令居淨土眾生不令見為眾生入生死名大德無一世界有二日月未有世界有二世尊唯一佛獨出故令供養難遇如曇鉢華如地與草木依止母與孩子依止依止義者即功德法也法身與報身功德為依止報身與化身為依止十二分教義皆依止佛身也言於法僧亦然者問法無別領受之心云何於法而修供養答為緣增長自功德善根所以於法修其供養不要法有領受之心方修供養也言如幽贊者般若心經諸廣說也言植者常職反種植也言五斷一切疑不退等者為字平音訓得訓使被也作也天親論主解云斷一切疑不退轉決定集進修名不退不為疑心所動名不轉斷疑有二一菩薩自斷疑者問疑唯見道斷初地菩薩也斷疑何故八地方始言盡答攝三解一云疑有二種疑唯見道斷二事疑七地已前尚有至八地方無二云疑種現總已斷盡只是習氣初地已去至七地已來尚有故八地方盡三云無始時來疑與有漏心相離一處生起今疑種現習氣總盡但有有漏心時便舉得一分疑相狀起來似實非疑也八地以去無漏觀相續故說無疑也故八地名決定地有三決定一種姓決定二發心決定三不虗行決定前二僧祇由有虗行解菩薩自斷疑了言或由佛歎者斷他疑也一云地前一大阿僧祇劫唯有漏正修無漏傍修修諸行門多諸過失如來毀責時多讚歎時少若不呵責行不進故二云登地已去七地已前無漏正修有漏傍修如來讚歎時多毀責時少三云八地已去純無漏所以佛常歎也第二解地前唯修有漏觀如來常毀責五地以前有相觀多無相觀少如來毀責時多讚歎時少第六一地無相觀多有相觀少第七一地純無相修由有功用如來讚歎時多毀責時少第八一地純無相修佛常讚歎也上來菩薩自斷疑所以得佛讚歎也次第二解菩薩得佛讚歎斷眾生疑也靈山舉會疑此菩薩是何行位菩薩證得何法耶忽然佛歎斷眾生疑也便是七地已前菩薩常見佛毀責今既讚歎明知八地所以斷眾生人疑也言及所得證者即願波羅蜜多常居定位乃至成佛菩薩起智證無增減真如不隨染淨有增減故由前願力任運一心進修歒前二大僧祇劫菩薩所云地一切有情盡行度行皆是菩薩大願力故名願波羅蜜色相加行煩惱不能動擾菩薩心智名不動地言六為何等何等事等者外和常勤內修不壞名不退外化堅固內證定住名不轉此中兩遍重道何等緣有兩箇問詞論主合一處著故云何等何等若開應合云為何等事外為眾生說法為何等事內入證諸法入彼彼法不退轉入者證義證彼現事現事不故名彼彼論主二句經唯一答牒經云為以慈修身也緣慈菩薩有無緣慈緣真如為境所以內入證諸法為修法緣慈眾生緣慈所以外為眾生說法問菩薩何要修無緣慈法緣慈答菩薩為自利故所以修無緣慈為利他故所以修法緣慈眾生緣慈又問菩薩何要自利則修無緣慈法緣慈答謂以慈修身顯菩薩行自利亦是慈悲利他亦是慈悲顯行二利不為餘事皆為將慈悲修身也問修何身答修菩薩當來成佛之三身修無緣慈為法身因修法緣慈及眾生緣慈為報身化身因故論解經句云以慈悲而修身心言顯行二利等者謨云問外化可言慈悲內證何言慈悲即是自利故答一云菩薩利他之時即為自利如坑有木灌水方浮灌水如利他木浮如自利即為利他如嬭母故二利但為慈悲意舉利他兼言二利說法但是利他故故有偈言下士勤方便恒求自身樂中士求滅苦不樂苦依身上士恒勤求自苦他安樂若令他離苦以他為己樂言慈悲有三等者指下偈中八風不動三悲接物處說也言七入一切智如實等者於佛智慧決定當證名不退入佛真智能絕戲論名不轉言此言顛倒等者正當證文也應言入如實境界之一切智者如實境界是法身理菩薩有根本智分證之時名之為入若言入如實境界之智取觀照智與下第九別第九到於彼岸窮真實性唯取真理第七不退舉所取能證智即能觀心第九不退舉能取所取智之性即所觀境是七九差別若依久似舉智取理便第七與第九相似也一切智者即是如來智如實境界者佛所觀境今談菩薩能入佛境故經云善入佛慧慧之性故名慧慧所緣故名慧菩薩趣證名之為入問初地菩薩智證理時名之為入何假八地答初地雖入不名善入八地已上菩薩名為善入第二解如實境界者佛德果中清淨法界四智心品此五法即是佛智慧八地已上菩薩能趣故名為入境界問初地菩薩亦以求趣何唯八地答初地已得法上不退未得法上猶退不名善入第三解只取菩薩根本智便是佛慧如下分別品云一生當得阿耨菩提等既喚初地作菩提便是佛慧又云隨數生成佛初地雖得不名善入八地已去無漏相續名善入佛慧未必皆是佛果正智況文殊大士久已成佛觀音彌勒等示居因未為非佛智也言八依我空法空等者於二空智決定通達名不退二報不動名不轉經云通達大智疏主解之達二無我智生法二理俱證名大智由菩薩起二空根本智斷却我執法執向下顯得圓成實性根本證圓成得智了依他如幻事根本智未斷二執之時向依他法上不了是無妄情執有主宰自在堅執不捨由根本智起來斷却二執證向下無我理後得智中重觀依他法上都無二執行相觀依他如幻事都無有我作此解時還由他根本智先斷二執所以喚後得智作達二無我理智也問論中既言我空法空即合是理云何言智答由智而能通達我空法空故名不退經言通達大智故知非理也言九入如實境界等者一得無失名不退所證安靜名不轉言窮實性者彼岸真如理名彼岸根本智證名到彼岸此約生死為此岸煩惱為本流八地已去菩薩煩惱為中流八地已去菩薩煩惱不行名越中流名到彼岸也此第九舉能到取所到唯真如理也問到彼岸者究竟之位如何八地菩薩名到耶答自地滿足形於前地亦名到也言十應住持等者論主解經也於所化生精進不息名不退不為貪愛等行利他事動名不轉論云住持不退轉者住持佛法問因何菩薩能荷負住持佛法令法不滅答緣菩薩名稱普聞無量世界也言故能住持等者疏主解云故能住持佛法令法不減眾生生聞名望風順化信向修學所以能住佛法也問天親菩薩因何將度眾生為菩薩所應作事答只緣菩薩能度無數百千眾生只緣菩薩有大名稱眾生聞名響慕順化信向修學便能住持佛法所以論主喚菩薩度百千眾生為所應作事言能度無數百千眾生等者問何菩薩取化眾生所作之事不退轉答只緣菩薩能度無數百千眾生故將教化眾生名作所應作所作之事皆已作語故名作所應作問菩薩之行二利皆修何故唯以化眾生為所作答二利之行利他最難故化眾生是所應作非不作餘大品經云大事者為救眾生智論云菩薩得無生忍已更無餘事唯成就眾生淨佛國土也言攝取事門論有二釋者問兩番何別答二解一云初番約菩薩地位階降及方便化生等第二番約上上功德簡異二乘故二云初番明菩薩依何地位以何方便攝何功德第二番明菩薩依於地上攝諸功德形對二乘名諸功德是二差別也言論云攝取事門者攝者包含總納事者功德事攝取諸功德事名攝取事以少略文字含於多功德也所以論云攝取事門者示現諸菩薩住何等清淨地中何等方便何等境界中以此三句為門攝取十三功德即以少含多功德也言示現諸菩薩等者依論略標也便是論主二个問頭都攝十三句經只此問之名句便是能攝第一句問上第一總句意問云靈山會上菩薩既能於阿耨多羅三藐三菩提不退轉未審住何等清淨地中有如是功德答八地九十地菩薩始能於阿耨多羅三藐三菩提問上不退不轉七地已前未能如此八九十地便是清淨地也上問總句因何等方便者第二問問下十二句中初十句問更是八地已上菩薩依何等方便攝取功德方便即是菩薩所行之行也何等境界等者第三問云此菩薩既能有方便於何等境界中應作所作即是依何處境界教化眾生言此為總標者只是指前三箇問意即論中總標文也言論下牒釋十三句中等者疏主依標配句疏主欲擬一一依次第解釋且先將十三句經文配前三箇問詞了然後牒釋此是疏主解也且配句者疏云於無上正等覺一句即是經中總句皆於阿耨多羅三藐三菩提不退轉配第一句住何等清淨地中言次有十句等者次有十二句經中初十句從皆得陀羅尼樂說辨才至到於彼岸配第二句因何等方便最後二句名稱普聞無量世界能度無量百千眾生配第三問詞依何等境界中作所應作上依標配句言故論牒釋中唯解等者依標牒釋即是論家論家牒釋之中唯牒初二句釋文不牒解第三句依等境界也言地清淨等者牒釋也正是論主答前問詞前問云此菩薩住何等清淨地能於無上菩提不退轉答論言地清淨者八地已上三地謂八地九地十地名清淨問何清淨地者謂無相簡有相寂靜簡功用清淨簡煩惱有解八地配前無相行九地配寂靜十地配清淨若唯疏意總相配好也三地之中一一地皆具三種無相寂淨金云無相行者不被七地已前相所動寂靜者任運義不被第九地中功用所動清淨者離染義不被煩惱所動也言此中以無相理等者疏主解論文辨云理體無上又是三覺之實性總名理也下三覺字相從來且就勝唯取無為同向前來一無上覺攝總也言故後三地皆於等者皆於無相行上不被有相動寂靜者任運義不被功用動清淨者無染義不被煩惱動所以於無上菩提向上不退亦不轉言非諸垢染者結之亦云反解也簡煩惱不被煩惱動也言有相等者不被有相動也等字等取功用不被動之所轉故名不退言第二句因何等者准下答第二句問云此菩薩依何等方便答方便有四第一攝取少法方便第二攝取善知識方便第三攝取眾生方便第四攝取智方便言此攝三句等者經云皆得陀羅尼樂說辨才轉不退轉法輪且妙法方便者即是教理行果法義況忍經云皆得陀羅尼陀羅尼念慧為體念慧向上攝持得無量無邊文義自利功德記之在心故名妙法方便言由聞持住持等者正解方便義言為人說者等者路云前樂說約菩薩成就辨才為人說者以法和眾生根是二差別亦云樂說辨才能說所說轉不退轉此二差別也第二樂說辨才第三為人說此二句攝得利他功德言二攝取善知識等者引論文也論主喚佛作善知識也言此攝三句以等者經云供養無量百千諸佛此初二句為方便攝得供養佛檀波羅蜜功德言作所應作等者經云於諸佛所植眾德本此二句為方便攝得種殖善根功德等五根言由此常為諸佛等者此二句攝得諸佛讚歎也准論但攝經兩句疏主意今為供養佛殖眾德故所以為佛稱歎故攝取善知識方便能攝經三句故言由此等言三攝取眾生等者論文也言此攝一句以慈修身者此一句為方便攝利益眾生事菩薩慈悲攝於眾生如母慈心攝於孩子矜貧恤寡人者之善行愍愚化惡菩薩之用心尚不擇於怨親寧有捨於善惡故盡教化不同凡夫惡者捨之所以菩薩常不捨眾生常能救度眾生所以攝得一句也言此攝三句等者菩薩自此三智便是方便也言此自有三智等者問菩薩自有三智何關眾生事答由菩薩自有三智後化眾生亦與眾生三智也自三智即是能攝亦與眾生三智為因也言初智知如實者初根本智自利智善入佛慧次智知事智通達大智利他智也後智是真理到彼岸智舉智取理問真理如何名智答智性故名智也言論中唯解此初標二句等者此料簡第三問者天親菩薩標中問依何等境界作所應作天親菩薩更不解疏主與論主牒將來解依何等境界中作所應作者疏主云只是名稱普聞無量世界論主作所應作所以疏云即是經云能度無數百千眾生初番了言復有攝取事門者包含總攝義所攝即是十三句經文能攝即是論家問詞問此第二番與初番何別答別第一番解明菩薩行德差別依何等方便境界攝取八地已上功德簡異七地已前第二番意明菩薩攝取上地功德簡二乘功德故言自下別釋二句等者示現者顯示也諸地者八地九十地地既不一名諸也言十三句中初四句等者是示現諸地者經云皆於阿耨多羅三藐三菩提不退轉皆得陀羅尼樂說辨才轉不退法輪是諸地中攝初一句皆於阿耨多羅三藐三菩提不退是第八地次二句皆得陀羅尼樂說辨才是第九地次一句轉不退轉法是第十地言後九句是攝等者次有九句是攝取勝功德不同二乘功德經云供養無量百千諸佛於諸佛所至百千眾生依標配白了言故論下釋示現等者標也荷思宗云無相名上有相名下五地已前有相觀多無相觀少少故名下無相行第六地中有相觀多無相觀少少故名中第七地唯無相修故名上無相又五地已前功用行多故名上第六地中有功用少故名中第七地中功用最少名下此上無相行下功用行皆在第七地中意道八地已去菩薩不被第七地中上無相行動不被第七地中下功用行所動故言不同上下也前來依地位上下配非也今依哲及相國解緣與疏及論意同約勝劣解為善哲云下功用行者有功用名下無功用名上前第七地中雖無相由有功用名下此有功用無相行不動他第八地已去無功用無相行上無相行者有相名下無相名上八地菩薩雖作無相觀然無無相當情無相當情亦是相攝云所言下上不約地位分但勝劣以為上下七地已前為被有相無相功用等動箇此八地離斯二種謨云意說無相望有相名上有功用望無功用名下第七地中由被無相有功用所動無相名上有功用名下今第八地已去離斯二過故云不同上下故功用望無相論下上也問有相分別有相可能動無相無相無分別無相何能動答有相有分別是非立動名無相為滯空躭著且名動問七地純無相滯著尚名動八地有無相何故名不動答七地有執著無相亦名動八地著不起無相不能動此位菩薩上無相行下功用行不能動故故云不同上下也問按十地論第八地菩薩躭著三昧酒十方諸佛摩頂七勸善男子汝已經多劫積集諸善根云何不進修無相海中住菩薩聞已即便覺悟趣入上地又唯識云於利他門中不欲行障如何今說不被無相動耶答七勸有障皆約利他利他行未圓滿要勸也自利行中念念進修不被無相動故任運而行不被功用故沼云第七地中由有二動一作功用二躭無相所以菩薩七地滿心躭無相觀不肯進修入於八地十方諸佛摩頂七勸語言善男子汝已修行經於多劫積集善根云何不增集而躭無相觀菩薩聞已從此遂悟起入八地安國云破有說七地不肯進修勸入八地此解全非違他論文故不應依信故攝論云八地中有二境一真境無相無功用一切有相無功用不能動二俗境有相有功用謂現淨土中一切惑不能動故言不同下者等者釋也論云自然而行簡功用也言上者勝行等者疏主解論文也上者勝行指第七地中無相行也下者劣行指第七地中功用也言唯識釋不動云等者引教證成也雖引唯識論證與此法華論渾別唯識云八地菩薩相用煩惱不能動故相是有相用是功用煩惱是煩惱與法華論不同也言此論釋不退等者引法華論云相是無相用是功用此一不同又唯識論約地位上下配法華論約勝劣配上下此二論差別也言任運進修等者結第八地法華論意任運進修簡功用行空有雙證簡無相行不為二動者即是功用無相二種動也根本智正觀空時俗智亦能觀於有也唯識云間即空方便智發起有中殊勝行也言於九地中得等者得勝進陀羅尼具四礙辨自在故勝前進後名勝進此攝兩句經謂皆得陀羅尼攝法無礙義無礙解也樂說辨才此一句攝詞無礙解辨才無礙解也緣第九地菩薩具四無礙辨所以論主配兩句經每句各攝兩辨也言前第三地等者問唯識論云第三發光地成就勝定大法總持能發無邊妙慧光故又說二地斷闇鈍障及圓滿聞持陀羅尼愚如何今言九地方得答曰辨才初地初得三地分得九地相續佛位圓滿問九地如何名滿答此滿有二將滿故名滿因滿故名滿莊嚴滿名滿所以第九地四無礙辨最為殊勝於一剎那頃三千大千世界所有人天異文異義一時發問此地菩薩能以一音普答眾問能斷眾疑由此地名善慧地解九地了言於第十地轉不退等者初受位時於摩尼殿上坐四天王各取本方海水灌王子頂灌頂亦了曙色亦分日未出時從本方有一金輪千輻所成住王子頂將受位時而有四義一灌頂受職十地經云佛子譬如轉輪王長子玉女寶之所生具足王相轉輪聖王令在白象寶閻浮檀金座上取四大海水上張寶縵寶網華幢種種莊嚴手執金瓶香水灌王子頂上即名灌頂剎帝利王數具足十善道故得轉輪聖王二增上無違王云自在義三善能決斷四分明賞罸十地菩薩百劫學佛相好千劫學佛威儀萬劫學化行將成佛時於大寶華王座上放大光明照無量世界照無量一切眾生又頂上放大光明召十方世界佛佛見此光已作是念言某世界有佛某子今欲成佛可往十方諸佛一時到會諸佛一時放光却照此菩薩身勸入金剛喻定斷煩惱捨劣無漏及變易身解脫道亦起諸根相好一一無邊無限善根所引生故由具四義如王太子得法王子名一王子有灌頂受位菩薩有蒙光攝受一切諸佛放大光明令授位故二王子有增上無違菩薩於法自在謂於諸法智自在故三王子能善賞罸菩薩善能說法四王子善能治罸菩薩善解決了王子灌頂子便墮王數決定為王菩薩家光了便墮佛教決定成佛今第十地菩薩轉此法輪決定成佛也言以八九十地同等者總結前來第二復次以云復有攝取事門者示現諸地諸地之中開出八地十地便解義了至此間疏文書去都結云以八九十地同亦現諸地意道八九十地功德同示現諸地中収此結前四句經文經云皆於阿耨多羅三藐三菩提不退轉皆得陀羅尼樂說辨才轉不退轉法輪是言故論自結者結前生後也言下之九句同名攝取功德者若約前四句功德八地九地十地各別得十地菩薩後必滯前必得八地九地功德若八地菩薩便不得九地功德九地菩薩不得他十地菩薩功德此四句功德九十地皆不同得且皆於阿耨多羅三藐三菩提不退轉唯第八地得也皆得陀羅尼樂說辨才唯九地得轉不退轉法輪唯十地得所以言皆不具得之餘更有九句功德八地九地十地菩薩皆同得之此八九十地菩薩一一皆具此九句功德也言上之三地等者即是八九十地菩薩能攝已下九句經文功德故言上之三地皆同得之即是供養無量百千諸佛至度無數眾生問爭知八九十地菩薩不同得初四句功德耶答只說同得九句功德不說初四句亦同得疏主既不說明知不同得也是同得者疏中說及顯不同得者則疏不說也故餘之九句向八九十地中一一皆能攝得一一地中皆具此九句以勝劣不同兩遍結論之大意也言釋第二攝取功德等者天親菩薩問有五个何等將下九句經文答五句者依何處依何心依何智依何等境界行依何等能辨金云論家五个何字徵下九句功德意言凡諸菩薩所得功德凡欲利生先須託處必依善友故須第一依處涅槃云一者親近善友既依善友處當用何心故第二依度眾生為心更以度眾生為心後將何法以度眾生故第三依何智更有能有能度之智未知依何境界中修行諸行故有第四依何等境界行雖依二種境界中行依何方便而化眾生故有第五依何等能辨也言下自別釋者論家自牒解也言依何處攝三句者經云供養無量百千諸佛於諸佛所殖眾德本常為諸佛之所稱嘆只緣供養佛多攝得檀波羅蜜功德只緣親近佛多攝得讚歎功德常為佛之所稱歎常得佛歎也論云依善知識處所故言依何心者攝一句等者依度眾生畢竟利益故言諸菩薩所作等者疏主此菩薩依慈悲心攝眾生如母慈心攝於孩子問經云以慈修身菩薩既自修身何名利益他人答如母自喫餘食之時剩喫湯藥意徒是嬭乍觀似自益於中身心元來為利益他人問何名以慈修身答熾然教化眾生是菩薩慈悲心及至眾生出離生死便資益者菩薩利他行故知慈悲是修菩薩身心也言依何智者攝三句等者只此三智便是所攝論句為能攝也只此見在三智亦方便先由菩薩自身具三智然後與眾生三智也言一授記密智者論主解善入佛智慧記者分別解釋之義即是說法之智也問既是說法之智為名善入答悟解得諸佛智慧道理說向於人名善入也密者此智是為眾生解說深密義智言授記密智即智論中十種密中第五授記密中十密者一身衢師羅長者等二口目連遠尋無際座下如聾三意外現貪瞋等四時五授記六折伏七乘種種八根差別九一信如實所作十得菩薩言二諸通智等者通者神通神通有四他心宿命神境漏盡此由是境菩薩依此為境向上向下能起神通名神通智智能通達真俗諦境名大智言證真如智者意道此智是證真如之智言即到於彼岸者真謂真如是智性故經文雖舉能到意取所到真如而名智此解勝此三處解三智各自別也路府云且下支門中解初智取本後二智名善入佛慧次智唯根本依詮證理名通達大智後智到彼岸之智智云性故唯取真如攝取事門中兩番釋初番善入佛慧緣理後得通達大智緣事後得到於彼岸智亦是真如第二番善入佛慧說法智通達大智神通智到彼岸智即根本智能到名到也所以論主解云依何智者一授記密智二者諸通智三真實智言依何等境界行等者論家更不解第四句疏主向下與論家配經句云名稱普聞無量世界一句也言諸世界有二等者疏主解經中世界世界有二一器二有情緣經中有世界字便通情與非情俱是菩薩教化眾生所行之境界故言依何等能辨等者第五句論主亦不解疏主配經云能度無數百千眾生言隨合別配等者疏主別配經文了便自分疎論文理令別配後之二句經文此上是疏主解也言論乃解云等者下解論家廣略不同者上來論標五个何等之中初三个何等論主一一牒解了至後兩个何等境界行何等能辨論主並不牒解亦不配經文亦不別配三个智疏主與論家牒解并配經文了疏主只與論家配兩个經句唯不與論家別配三个智所以分疎論意云理合別配後之二句論乃解云依何等境界行何等能辨者即三種智所攝應知者此敘論意答前二句問詞故是文略安國云問誰人略答菩提留支翻譯論文時略也論主意由成就得三个智能行能辨利益眾生事也若論家不略一一別配者應云依何等境界行者答云名稱普聞無量世界依何等能辨者答云能度無數百千眾生兼令配三个智云善入佛慧智通達大智智到於彼岸智也此中都有三種略一者後二句不別牒解是一略二不將三个智別配何等境界何能辨是二略三兩个何等兩句問詞答詞一句是三略也疏主出論家合有三智道理云依何等能辨者即三種智應智者文意謂以三智於世界境中能辨眾生事用以三智攝斯二句更不別配故言三種智攝此番意略不能具顯其意必爾言下列名者謨云不退菩薩德尊名高稱之者使三業歸依聞之者令四重消滅增自他之功德作瞻仰之良緣由是標微號於前文播芳名於後嗣言皆以願行為名者問菩薩修因尅果地位功德齊何故立名有斯差別答據實菩薩之行究竟無差但約意樂不同及彼眾生根感有異遂令菩薩願行有殊且如文殊見他無樂願作吉祥觀音見苦纔念即尋聲來救理實通能拔苦與樂言分為七對者金科為四對一已成當成對文殊已成觀音勢至當成二出家在家對彌勒出家䟦陀婆羅在家論釋云䟦陀婆羅等十六賢士能現四眾之形三他方此界對彌勒此方波羅奈國劫波利村婆羅門家子觀世音大勢至即是他方四主客對賢護是主王舍城人寶積毗耶離城人導師是舍衛國人客也今且依疏七對為正問何故八萬大菩薩中最初烈文殊菩薩答河西道朗法師喚此菩薩作遊方菩薩十方佛國有法會處更為開教之主即是過去燈明會下二十億菩薩因妙光法師方開妙法今日釋迦會下因文殊菩薩方得聞經問何因前佛後佛因文殊開法華經非餘菩薩答三說一云文殊體群生之意釋時眾之疑辨昔佛說云於前明今佛敷之於後唯是文殊絕疑謗之萌開信解之漸然後佛從定起方說此故言因文殊說法華經也二云文殊即然燈之師釋迦又是然燈弟子據此文殊成佛在然燈之前況彌勒未通是文殊引道教化海會菩薩其數難量化龍女成佛又是文殊之力自今昔利益弘多三云以過去日月燈明佛有八王子皆師妙光菩薩其第八王子成佛號然燈佛今釋迦又事然燈佛故即是第九佛故知文殊是九个佛之祖師釋迦尚遵文殊為九代祖師阿難豈敢不向初烈經云日月燈明佛八子皆師妙光妙光教化令其堅固阿耨多羅三藐三菩提又阿難排比此十八大菩薩盡是法輪王之將士破生死之魔怨文殊與觀音最初烈位執智釰為先鋒寶積導師末後按名彎定弓而為掩尾一則證阿難說經可信二乃彰如來聖德尊重廣說蓮華寶經法輪常輪此菩薩佛滅度二百年於雪山中現十八變化火焚身入涅槃時人以舍利起塔往往諸天下來供舍利舍利放大光明言拔苦與樂者謨云三界皆苦四生無樂偉哉上人候時而作如昇祿位如覆𣂰鑊殷斯殷斯可以永託也言妙吉祥者真諦云心恒寂靜怨親平等不為損惱名吉祥往昔之時示生天竺為舍衛城中梵德婆羅門之子初生之時感自然蓋行往隨身風雨不霑塵坌不汙光明滿堂白露垂庭池涌七珍神開伏藏鷄生鳳子猪誕龍象馬產騏驎牛生白澤倉盈金粟象具六牙由是十徵父母歡喜故云妙吉祥訛云文殊師利此云妙德涅槃經云了了見佛性猶如妙德等智論云外凡位中修行之人見佛性如盲人摸象二乘人見佛性如孩子觀月四加行位菩薩如幻眼見空華十地位中初地至七地菩薩見佛性如隔羅縠從第十地已去至等覺位未見佛性如去羅縠方名了了雖爾唯見自性不見他性見自身中佛性了了觀他人身中佛性猶自朧若至佛位自身他身悉皆了了生死涅槃二皆平等言是北方常等者央崛摩羅經說文殊現是北方常喜世界歡喜藏摩尼寶積佛聞名能滅四重等罪等字等取五逆四重有二一出家四重謂煞盜婬妄二在家四重一自讚毀他二不施怨親三慳惜財法四無因果問犯四重罪如斷頭人如何開名罪即消滅答小乘不許大乘法勝聞皆罪滅又中下品懺罪或滅不滅上品懺悔無不滅者如闍王犯五無間尚懺得况於餘言又云過去為等者智論及首楞等說過去為龍種上尊王佛又文殊師利嚴淨佛土經說乃往過去遇雲雷音王得授記當來於此世界成佛號為普見如來智論第十二云文殊師利分身變化五道中或作聲聞或作緣覺或作佛身也言華嚴經說在等者與一萬菩薩為聖勝友也金毛師子鎮押毒龍大力神王堅持正法信之者毫光貫日觀化鳥之聯翩奉之者瑞雲滿空覽天華之亂墜曾蒙佛使向婆羅林外救魔眾會讚揚遣毗邪離城問疾或即於海教化龍女速悟於一乘或靈山證經會燈明之八子此菩薩時坐時眾寶國土一時動搖來時去時不來相而來不去相而去化時現時變大地為金山撓長河為蘇酪悲時愍時觀一切冤家猶如赤子具諸三昧猶如大海住菩薩戒如須彌山忍辱之心猶如金剛精進勇猛猶如疾風降諸外道其如師子能淨諸見猶如雨水生長善芽猶如春澤莊嚴菩薩猶如華鬘破煩惱怨猶如霹𮦷顯善惡行猶如明鏡濟諸貧乏猶如寶瓶入暗者日失道者同生天者梯涅槃土橋度生死大船熱惱者蓋一切眾生無上福田三世諸佛第一輔臣問菩薩所化六道皆行何故專居清涼山內答二意一降伏毒龍謂彼山中多有毒龍惱害眾生由是世尊遣來作鎮二者緣此界眾生愛樂大乘於此密化四眾常說大乘實久成佛示為菩薩助緣揚佛法昔日天人師今為法王子二尊不並化故為菩薩身也言觀三業等者觀眾生三業而得自在若眾生以身業禮拜菩薩以眼通觀之若語業讚歎菩薩以天耳通聽之若以心念菩薩意業他心通觀之乘三業而救拔若言觀自在具攝得眾生三業若言觀世音唯得語業失餘二業此菩薩凝神淨土而應跡娑婆現六通於光中非供名於剎土立一佛頂上現救苦於塵沙能使七難輪消二求願滿高勸臨形而刃斷名僧至死而不傷長舒一唱而風迴聞念名投而火滅具諸秘錄可略而言之上約行立名又約願立名者准雄猛慧海經說云何觀音菩薩於此土偏有緣答昔閻浮提有王名曰普首有五百王子其第一者名曰善光值空王觀世音佛發十大願一者願知一切法二願乘般若船三願值智慧風四願得善方便五願度一切人六願越於苦海七願得戒持八願登涅槃山九願證無為十願同法性身也又願願我來世亦名觀世音眾生病苦三稱我名若不往救者誓願不取上妙色身所以偏於此土有緣也言阿彌陀佛滅度者問准經所陳乃是報身何有滅度答是他受用身他受用身應八地已前悲增菩薩可有滅度永同所化受分段身有生滅故故說彌陀父名月上母名殊勝妙顏若對智增八地已上他受用生滅即無言得大勢等者若以行時能令下至金剛輪上至光明王佛剎一時振動有大威勢故名大勢至言有二能者具前文殊與樂亦具觀音拔苦故名二能也言此二自利等者智增悲增自利利他行雖萬門不出二事自強不息稱物平施欽哉聖人常作是意常精自利也若除息惡如救頭燃若求菩提不憚時處不休息是利他也眾生未盡常救苦故此據一邊說也於中不妨通二也菩薩修自利時元來為眾生如人雖勤學以自利收本擬為人說故利他攝菩薩亦爾言濟貧救疾等者此攝三人寶掌藥王勇施也言寶掌濟貧等者所謂吠瑠璃寶頗胝迦寶珊瑚虎珀璧玉珂貝杵藏帝青大青寶問現有貧苦手中出寶為不救之答深密經云是諸眾生自業感耳彼云若諸菩薩具足一切無盡財寶成就大悲何緣世間現有眾生貧苦不得佛答言善男子是諸眾生自業過耳若不爾者菩薩常懷利益之心又常具足無盡財寶如餓鬼見於大海而成猛火非大海過而餓鬼自業之咎故有偈言如母乳皆富貴手中出寶義得成世間現有貧苦人菩薩虗名稱寶掌謨益河水𣵁𣵁東注餓中出寶不虗惡業何能受用問菩薩悲心更普施寶亦令齊霑世間貧富萬殊菩薩怨親不等答終日貧窮軻尚乃貪色逐聲可中齊與富饒豈肯規行矩步若爾眾生自業貧富已定菩薩何能濟惠於彼答曰合得雖同約緣有別如世人食祿各別不合得縱得亦返成瓦礫如一境解成差菩薩觀見眾生有錢物則放逸廣造惡業若被苦逼即能發心所以菩薩知寶無益所以不雨也言大藥樹等者悲華經云藥王菩薩起種種願願於賢劫千佛初成佛時我皆供養佛入涅槃我皆起塔劫盡苦惱眾生我皆救護於刀兵疫病劫中作大醫王菩薩大悲於疫病劫中為藥樹王根莖枝葉食者病差見色聞聲𭊴香甞味覺觸皆得病差也然後作佛即樓至如來是也智論云有一樹王名殃伽陀有一毒蛇趂一蝦蟇蝦蟇奔於藥樹心意安樂毒蛇去樹七步得於藥氣在地宛轉悶絕而死善男子菩薩亦復如是藥樹喻菩薩蝦蟇喻眾生毒蛇喻天魔波旬言勇施等者大士了空畢竟空故捨身命財無怯無弱亦能濟貧後能救疾也言導明破闇等此三人寶月月光滿月問何名寶月答眾生眼白日見物夜後不見物要假月光引導方眼見物菩薩亦爾無漏智如日能除眾生身中癡闇引生身中智慧故名導明菩薩智慧無漏所成自體以寶所成眾生可重故名寶月謨云智體稱明癡心是闇竅有人死門無鬼瞰瞰親也如炬照室如舟解纜引導眾生離於苦擔問何名月光答能鑒真俗照於物根故名月光能破暗也高滿月者功德具足如月圓滿德無不圓照無不普亦能導明亦破癡暗言神通小大等者謨云依慧起通縱彼神力清茲長夜搖颺世界振動夷夏眾生發心濁世高謝言大力等者攝云據理而釋煩惱能使三界紛綸二乘迷倒其力最大菩薩能摧此大惡法故名大力言無量力者有云無相之力不以有量為力名化度云由作神通驚察有緣皆令發意謂動地故令眾生驚覺知諸世界悉皆無常何以故世界廣大而有動搖況我之身常能長久唯疏意約事論土初地動百佛世界名大力二地動千世界三地動百千世界四地動百億五地動千億六地動百千億世界七地動百千億那由他世界八地動百萬億大千微塵數世界九地動十阿僧祇百千佛國土微塵數世界十地菩薩一剎那中能動十不可說百千萬億那由他微塵世界名無量力言此二離染等者此攝二人越三界是離染染即三界輪迴善能離三界䟦陀婆羅是進善言越三界者潞云如有一人與三種人而為親友一迦維越子二大臣之子三王之太子同結契云得味共均有苦代受于時彼人囚彼因禁迦維越子但能餉食供衣亦無方能脫諸杻械大臣之子能囑獄官脫其枷鑽太子有力推倒獄墻令彼罪人公然得出行施持戒修慧亦爾三界牢獄囚禁眾生若行施者於三界中衣服飲食雖無所乏而於眾苦猶未能免持戒之者雖能免於三惡趣報仍於三界不能出離有修慧能斷煩惱而於三界速能出離如彼太子推倒獄墻遣彼禁人自然得出明此菩薩於施戒修而圓滿已出三界清昇彼岸是故得名越三界菩薩也言賢護者隣亞大聖名之為賢德行保全稱之為守言世間出世間等者此有三彌勒寶積導師問何名世間出世間答有漏名世間無漏名出世間如昇高臺如墮幽室度生之本成佛之術十八人中類分第七言彌勒姓慈等者疏本多作姓字姓氏字亦有作性性心性字正梵語應云梅咀利耶此翻為慈古云彌帝或云彌勒皆訛也賢愚經第十云生波羅奈國劫波利村輔相之子初生之時便有三十二相紫磨金色父母乃召相師占之相師曰欲生之時有何先兆父答之言其母本性不調懷子已來性多慈善相師曰此是子之德因為立號號為慈氏此得名有三一者母性慈姓氏也二者母心性慈善此菩薩即取母心便為性也三者依願立名一切智光仙人經云彌勒昔作一切智光仙人值於慈氏佛說慈心三昧經云願於未來得成佛時亦名慈氏廣如一切智光仙人經說有一梵志請佛說慈氏因由佛言過去無量無邊阿僧祗劫時有世界名曰勝華敷佛告彌勒恒以慈心曰無量法教化一切眾生經名慈心三昧大悲海雲聞者必超百億劫罪成佛無疑有大婆羅門名一切智光有六十四能多智博達聞佛說彼經便發信心而發願言願持彼經當來成佛號曰彌勒即捨家入山長行梵行滿八十歲乞食誦經時遭荒歉不得食喫七日空住是時林中有五百白兔有一兔王見仙人無食而作是言仙人為法不食多日正法將滅法海將竭我今為法捨命便告諸兔諸行無常眾生受身未曾為法欲以捨身供養法師令法久住兔王母子遶仙七迊白言大師我今為法供養尊者仙人告言汝是畜生此心難辦兔語子言汝可隨意求覓水草子聞母告即報母言我亦願樂相隨即投入火中母亦隨入當爾之時大地振動諸天散華持用供養肉熟已後諸神白仙人曰今肉已熟可宜食之仙人聞神言悲不能勝而說偈曰寧當燒身破眼耳不忍行煞食眾生說是語已投火併命與兔一時而死佛告梵志兔王者即我身兔子者羅睺羅是誦經仙人者今彌勒是非但從於慈母得名慈氏抑亦當體久修慈心自名慈氏由從因位乃至成佛皆名彌勒有云姓頗羅墮字阿逸多此云無勝也言寶積引菩提等者寶者可重義積者疊重疊義四智菩提體是無漏可尊重故名之為寶謂四智體是有為品類不同而高下名為積也言大導師者以法門引物妙達正邪如海導師善永夷險問莊周云神人無功聖人無名今者法身菩薩不可以像測不可以智知何故乃立名乎答涅槃云如任婆虫實不食油強名食油涅槃亦爾無名相中強立名相說涅槃是所體之法今既無名強為立名也言故此三別者意言寶積引至菩提導師引至涅槃彌勒拔出世聞苦故此三別也經言如是等者此十八菩薩是別名通有十六一名菩薩薩埵二名摩訶薩埵三名成就覺慧四名最勝照明五名最勝真子六名最勝任持七名最勝降伏八名最勝萌第九名勇健十名軌範師十一大商主十二大名稱十三名最勝怜慜十四名大福田十五名富自在十六名大法師言此皆菩薩無生身等者不是不生故名無生無處不生名無生如言般若無知無所不知故名無知菩薩亦爾隨形六道現十八類身十九類身無處不生故名無生此說化身不說實身也言塞三界門者意言無處不生之無生身故名無生相國云感三界業而為因門能生三界名來入宅今此菩薩惑業既盡不生三界名塞三界門問何者是三界門答有二法名三界門一是業二是煩惱為此惑業為因感三界五薀身生死果以有惑業令入三界無礙故名三界門今此菩薩斷却業煩惱等盡更不容三界生死故名塞三界門界門不受菩薩生死故名塞又云菩薩入變易身不受分段生死身名無生也無生故塞三界門不似眾生不出三界塞三界門即是不出三界也言無處不生者無煩惱業處處能起化身教化眾生示現生故故名無處不生也言垂形六道者相云六道四生化令總盡成本願故故十地經云譬阿耨達池流出四河不可窮盡充滿閻浮轉復增長乃至充滿大海如是佛子從菩薩心流出善根大願之水以四攝法充滿眾生不可窮盡轉復增長乃至充滿一切種智一切智故言上明內護等者問何名內護答謨云德隱群倫潛形獨步大磨智力垂蔭藥樹萬法不墜四生是務自力任持名為內護言下明外護等者問何名外護答謨云天險難昇誰言行路地險丘陵因人負固王公捍弊賢哲頒賦願力任持名為外護十眾者一帝釋臨天眾二卷護舒輝眾三小大自在眾四跨握娑婆眾五翳虗含灑眾六清歌雅樂七騰芳列樂八動山涌海九吞龍噉毒十仁王自在言於中人非人為二者韋提希子阿闍世王是人餘是非人也此解非人不同尋常喚夜叉作非人但不是總名非人先列非人後烈人也言非人中天非天者除欲色界天餘名非天但不是天即名非天不必喚修羅作非天言天中欲色等者就天中欲界色界為次也經曰爾時者當爾之時名為爾時問靈山會下凡聖混居色界梵王為世界主何緣外護十眾先烈帝釋若從下向上何不先烈四王答智論云得初果後得第三果大品經云得首楞嚴三昧過賢劫後二十四劫當得作佛號無著世尊故初烈也言釋迦姓也者有云姓字應為心之性今詳下經云出釋氏宮等准此即是姓氏之姓縱有仁慈須以姓標由如慈氏言俱訛倒也者正梵語應云釋迦提婆因達羅七个字略却三个字今但言釋提桓因四个字名訛略也若准梵本先姓後名翻就唐言且令先姓後名應云能天帝也如今梵語不倒自是唐言倒也言天帝釋先名後姓兼釋字亦是梵語正合翻作能若言天帝釋唐梵相兼立名也言此在妙高山頂者問此帝釋何位之主答疏言此在妙等問妙高山頂周圓闊挾多少答二說一云周迊四面共有八萬由旬即四面每面有二萬由旬也二云一面有八萬由旬四面共有三十二萬由旬今且說一面故言妙高八萬也路解同取一面有八萬由旬為正也問依何教據有八萬由旬答俱舍頌云妙高頂八萬三十三天居四角有四峯金剛手所住中宮名善現周萬瑜繕那高一半金城雜飾地柔軟中有殊勝殿周千瑜繕那外四苑莊嚴眾車麤雜喜妙地居四方相去各二十東北圓生樹西南善法堂問三十三天何處住答頌云妙高等長行解云三十三天住迷盧其頂四面各八十千與下四邊其量無別即是高下去地八萬由旬山頂四角各有一峯於中止住銅牙䥫爪御捍外邊守護帝釋諸天其山頂中地柔輭雜寶飾之下足陷膝舉脚還平山頂中有宮名善見面二千五百由旬周萬由繕那金城量高一瑜繕那半其地平坦真金所成但用天繒雜寶嚴飾地觸柔軟如覩羅綿於踐踏時隨足高下是天帝釋所都之城城中有殊勝殿種種妙寶具足莊嚴蔽諸宮殿故名殊勝面各二百五十周千瑜繕那是謂城中諸可愛事總此中邊有三十三天三十三天者依正法念經云一住法堂天二住峯天三住山頂天四善現城天五鉢私地天六住俱吒天七雜殿天八住歡喜園天九光明天十波利枳多樹園天十一住險岸天十二住雜險岸天十三摩尼藏天十四施行地天十五金殿天十六鬘預處天十七住柔耎地天十八雜莊嚴天十九如意地天二十微細行天二十一部音喜樂天二十二威德輪天二十三同行天二十四閻浮婆羅天二十五速行天二十六預照天二十七智慧行天二十八樂分天二十九住輪天三十威德顏天三十一威德焰輪天三十二影照天三十三清淨天是名三十三天也城外四面四菀莊嚴一東面眾車菀金銀輪等在其菀內二南面名麤惡菀與非天戰旗鏘甲騎等三西面歡喜菀諸天先有鬪諍嗔恨入此菀內適悅四北面雜林菀菀木雜色錦綺分明諸天好醜長短相異入此菀內皆相似故此外為飾菀四邊各有四妙地地去菀二十瑜繕那是彼諸天遊戲之處城東北有樹名圓生樹亦名波利質多羅樹也槃根深廣五瑜繕那聳幹上昇枝條傍布高廣量等五瑜繕那挺特開華妙高薰馥順風香熏滿百瑜繕那若逆風時由過五十瑜繕那城外西南角有善法堂諸天時集詳論如法不如法事故俱舍頌云妙高頂八萬三十三天居四角有四峯金剛手所住中宮名善見周萬瑜繕那高一半金城雜飾柔煗中有殊勝殿周千瑜繕那外四菀莊嚴眾車麤雜喜言過去字憍尸等者解國名也是往昔賤時名字也言摩揭陀等者此云無毒害國從人以得名此云無毒害貴時名也過去帝釋於此為王慈德化人不行毒害人有犯法亦不加刑但令出境而轉罸之所以宿因多無毒害故云無毒害紀國解云而三驗不有人犯法不行捶栲一以秤秤法官呪曰若無犯者物重人輕若有犯者物輕人重若由抵沛須以水驗以犯法人與石相違連俱沉河中而呪之曰汝無所犯人浮石沉若有犯者人沉石浮若固不成即燒鐵石令以手觸法官呪曰若無犯者雖觸無損若有犯者觸即自傷如是知已亦不加刑但遣出國任自存活故無毒害准觀此解毒害彌多但宿因慈善化人多無毒害為勝言彼國舊名置甘露等者宗輪云諸天與修羅往昔之時愛著心重為毒所害壽命短促梵王念之以龍為繩以山為鑽鑽於乳海初得毒藥與略細大食次得酒與修羅得半月形與摩𨢸首羅額上得玉女與毗紐天前得牛與梵王騎伯馬與北州輪王得甘露分散與國人服廣除毒害于時眾生福力所置海變成乳復為甘露安置此處服得長壽除諸毒害故以為名此並西方俗典所說亦如此方俗世說天缺西南女媧鍊五色石以補之辨云因敘國名引來非此正要也言帝釋往昔有三十二人等者證修因處也帝釋於劫初之時名為蠒兒為人賤隷後時家主貧遺遂雇蠒兒充典獄人蠒兒仁性多慈每以平直治諸囚者善能誨諭令彼心安諸囚荷其仁慈每一人出獄輙留上服相贈不經時歲財物豐溢家主知其貴其能事遂放從良并賜驢一頭傾者未放已前郎主到歲時節臈即放遊從因茲結會同類朋友三十二人乃相謂曰宿植盜囚令為僕隷豈能有過即改見善即遷從今已去每見險途往來之處即同力修理諸人即從彼言不日之間險路悉平後有天使按行國界見此道路平坦欲敘縣令功勞百姓曰此非縣令所為境內先有三十二人先是賤隷悉崇福事修治險路天使貴其令長虗受天祿具狀奏聞天子嘉其勳功遂勅治化此縣既受軄己榮貴在己憍奢滿懷遂娶一妻名曰善法後歡娛轉盛更娶三妻即歡喜夫人圓生夫人設支夫人又以俸祿贖出三十二人因語之曰我今共汝造善法堂隨吾言否眾人荷其恩德僉曰率從縣長有約若造此堂女人施物必不得受善法聞已私語工人能與我造寶瓶否不順令明府知待慶堂日方報安置後堂已成遂于慶讚問近人曰更少何物直曰諸工已畢唯少寶瓶明府更見時至如何營辦匠曰善法夫人先造得寶瓶安置法堂必應相稱明府曰既爾且安置後當酬價安置寶瓶了夫人曰一堂之媚寶瓶為上今應對眾題號善法堂歡喜夫人既見是已心懷嫉妬遂捨資財捨堂四面買園周遍多種花果以充供養因茲立號號歡喜夫人於曠野路多種果木施眾生食又為蔭覆立號為園生樹第四設支雖見三夫人作如是事於修功德都無樂心唯事莊餝三夫人曰何不修福設支曰汝被夫賤欲求愛重我更得寵何用福乎後明府考滿并曰夫人三十二人所乘驢等相次殞沒其蠒兒命終得生妙高山頂殊勝殿上得為帝釋其三夫人亦得生天第一夫人生善法堂第二夫人生歡喜園第三夫人生福林菀三十三人得生四面居八殿為帝釋臣驢命終已生雪山北香山南為白象身唯食池中藕根帝釋更生彼已唯見三夫人及三十二人等乃以天眼觀設支夫人及所乘驢生於何處見設支夫人死已作水札鳥在象池邊但食青蛙水族等類帝釋見已深生悲念亦化作水札鳥飛至其前方便附近語言你識我否加其威力令知宿命自知過去之時夫婦情重帝釋遂復本形擎此水札鳥臂上安之昇忉利天於勝殿上架上安之三个夫人皆來看之各彈其觜或挹尾拽或頭上磨娑各說偈言第一善法夫人云昔日為娘子燕脂驗注口總緣人我狀如今受此醜第二夫人云語道修功德則道老時修㓨頭毛袋裏眾共且夜遊將阿莾惡觜口嫁與劉虬琱第三歡喜夫人云脚手長了蜃口黑狼蒼將捨莽面乳學我上天堂尾如橛苔菷頭以高良薑水札鳥不伏而亦答言不久受此身被輕難可濟儻得上堂還來奪你聟可中更遇小生來是你三个阿婆總被替水札鳥身心慚愧實不歡樂即語帝釋云放我向本處去帝釋于時與受三歸五戒三歸亦竟次說戒相云汝從今時盡壽不煞生是水札鳥戒能持否乃至五皆如是也更不煞生自死了許食歸到本池見一蝦蟆肚上逐水隨流即前欲食此蝦蟆忽翻身轉水札鳥逐一日不得食喫明日又見一个死魚欲擬食之又却活如是六七日不得食即便餓死雖受五戒由本嫉妬從此死已生毗摩質多羅宮為修羅女修羅生男即醜生女端正美貌殊特帝釋宮雖有青黃赤白四種蘇陀味可食而無修羅宮中女色修羅宮中雖有女色無四種蘇陀味由此互諍色味競起干戈也其設支年可十六七毗摩質多羅修羅即言我欲嫁女當集四州人揀擇女聟遂語女言稱女意者即過去與之平章已畢遂廣召四州君子人未來中間帝釋隱身先向宮中私語許會我化作一醜婆羅門最在前行你若見我即與我華我共汝為夫婦其時設支即解其意簡選之日先見婆羅門便過華與婆羅門于時帝釋便復本形修羅見已即生瞋恨汝先共我為怨我不能嫁女與汝于時帝釋提挈設支便歸忉利天宮因茲帝釋時與修羅或競設支或諍蘇味常恒忿競未之休也言三光乃是四王等者問如何攝三光天子在四王天中何不別開三光天答以欲界天中無三光天遂攝入四天王天也古人云三光天子別有居所處疏主意三光天子在虗空合向空居天収緣實在四天王天天宮舍擔頭行屬地天収無別所處又云惟在空中散居散天此說非也言有經觀音等者辨名也古來皆引未審何經觀音名寶意作日天子即此經中名寶光寶者可重義光者破闇義大勢至名寶吉祥作月天子能除熱惱能作清涼與人為吉祥事也虗空藏菩薩作星天子名普香普土普遍月於萬物萬物名為香香則依質而有離質無香天如質星如香普者不斷義如香不斷故名普香問何不帝釋後先烈四王後烈三光答以彼是天帝釋之前軍又最居下故先烈欲界六天地居有二四天王天忉利天也三光運行不住雖散居空是地居攝四天王故又不過山頂是地居也辨名了言日宮火精作者辨體量也日者實也光明成實能生成就萬物月者闕也闕即是缺有圓有缺故名月也星者精也萬物精氣變作星被天上萬物精氣主持著向下草木始得甘甜若無精氣所持一切無味也星者萬物之香氣香氣即是精氣故喚星作普香准疏引文即依次第如今大例讀底經即不依次第先說名月月天子也次號普香星天子也後名寶光日天子也何故一經一疏次第不同答彼經依形量大少分次第日月星此經者差別不同不依次第月星日疏主排比將此經以順彼故作此配日宮火頗胝所成徑五十一瑜繕那月輪水頗胝所成徑五十瑜繕那皆是一徑量非方圓量星大者十八俱盧舍三十六里中者十俱盧舍小者四俱盧八舊云由旬新云瑜繕那自古聖王一軍行也四十里此是舊傳也印度國俗乃三十里聖教所載乃十六里一瑜繕那為八俱盧舍俱盧舍謂大牛鳴聲所聞極處即二里餘五百弓量言日月星此並空中旋繞四洲四洲者一東勝身州身形勝於南州故言勝身梵云毗提河此云勝身南瞻部州從樹為名此界北須彌山南有樹名瞻部也言閻浮提從金為名樹下有金金中最勝世界從金為名也名閻浮提西瞿耶尼州此云牛貨也二云有一金牛人皆削取金以為貨物北𤘽盧州此云上勝福田勝餘三州名上勝也大小便利之時地裂還合定壽千歲問何故日輪常滿月有虧盈答俱舍云近日自影覆故見月輪缺若去日遠月即圓去日近月即缺從月一日至十四日漸漸相去遠月漸漸圓十五日日月正相背所以全明從十六日至二十九日漸漸近日來故見缺也月在西日在東亦被爍日在西月在東亦被爍著日光盛滿滿月光日若在西月若在東西面日頭爍月光影入東邊去西邊人看不見西邊半月光似月光自蓋覆却西邊半月光故云近日自影覆二者經量部虧盈路別行著盈路月即缺准此前十五日在盈路行後十五日在虧路行大乘瑜伽云明有正側月似一面鏡相似月面上有光背上無光面向人則有光背向人則無光月盡日如鏡仰面向上背向下不見光從月一日漸漸覆來到十五日如鏡面向下端正月光圓也十六日已後漸漸却仰明有偏側見便有缺也外書中說日火精作火則內暗外明月水精作內明外暗向外盡無光何以有虧盈答月事須得日光照著月光方出如人眼雖有光黑地不見物事須燈光引也月光事須得日光引若十五日月近日日照分明則圓十六日已後漸漸去日遠漸漸缺也月一日漸漸近日漸漸圓也上來諸解盡不是本來虧也問曰既是火精作何以夏熱冬寒答起世經云若於夏時日行北路照著七金山遂多熱若至冬時日行南道遂照海水令冷由此不同依此方書史說即五月一陰生即寒十一月一陽生即熱置四時寒熱等位問日月博食是何耶答帝釋之身居其山頂修羅之宅居于海中互爭色味競起干戈多於晦朔也然帝釋前軍日月天子放威光明射修羅眼修羅以手遮日故見有蝕也又外書說日合交而不交故蝕月合會而不會故蝕言交會者同在一道日從東來月從西去若交過不相影蔽故無蝕若陰陽失侯合交不交上下相差互相暎奪便有蝕也問月中兔者因何有耶答未曾有經說波羅痆斯國烈士池西有三獸窣堵波狐猿兔彼是如來修菩薩之處當時為一兔身燒身供養帝釋將骸骨安在月中以示天下人也問如何有樹影答阿含經云日月行莊只此州北岸有大金山名曰瞻部其中有樹極大長四十由旬果如十石兌汁如乳味甘樹既高大月輪照之因斯月輪現生樹影時人號為娑羅樹也月中黑是何相答海中魚鼈影入月中也問一切山河大地影何不入中空魚鼈影入耶答物類相感月是水之精魚是水之中虫故問曰是形質皆有所依三光運行依何而住答經說此乃散天以處空中依風而住起世經云有五種風吹而行一持二住三隨順轉四攝持五將行俱舍云一日一夜遶妙高山一迊劫莊故論云謂諸有情業增上力共引風起故遶妙高山空中旋迊運持日等令不停墜也星有通別如北辰唯此州餘通三州也又如彗星熒惑星所應異故若准三光天子經說三光皆是菩薩化作為利眾生盲暗世界為作燈明飢餓之國作大魚身邪見世界顯立正道為舟為筏為藥為樹但是自業異故故招如是晦暗不同亦表物盛必衰所以盈而後缺故易云日盈則日先月盈則虧天地盈虗與時消息而況人乎所以上諸天唯善業勝故身有光明不要日月問寧知晝夜答華之開合鳥之喧靜以辨晝夜地獄唯惡業唯黑暗人中亦善亦惡有晝有夜也若唯有日無月雖有成就而無清涼萬物乾燋若唯有月無日雖有清涼而無成就故須雙有也言四王等者列名也東方提頭賴吒此云持國居白銀山管乾闥婆毗舍闍等鬼神護東弗婆提不令侵損南方最上第一層毗樓博叉天王此云增長增長善事居瑠璃山領鳩盤荼及薜蔾護南瞻部州不令侵損西方最上層梵云毗留勒叉天王此云醜目目最醜故居黃金山管領一切龍及富單那鬼等護西牛貨州不令侵損北方最上第一層梵云毗沙門天王此云多聞嘉祥云常與佛守護道場以多聞法故故曰多門居水精山領夜叉羅剎等鬼護北俱盧州不令侵損也四天王各居妙高之半腹且如妙高山出水八萬由旬也半腹已下有四層級依小乘妙高層有四相去各十千傍出十六千八四二千量堅手及持鬘恒憍大王眾如次居四級亦住餘七金路云妙高去水八萬由旬有四層級第一層去此一萬由旬傍出十六由旬堅首神居住此神銅牙鐵爪第二層去此二萬由旬傍出八千由旬持鬘神住此神恒持華鬘以莊嚴第三層去此三萬由旬傍出四千由旬恒憍神住此神果報勝餘心生憍故第四層去此四萬由旬傍出二千由旬四大天王住各管諸鬼神得天王名四天王當山半腹也從此以上山身孤峯直上四萬由旬頂上名忉利問四天王是何生攝答是化生攝瑜伽五云一切欲界天無有處母胎藏四天王眾於父母肩上或於懷中如五歲小兒欻然化生三十三天如六歲乃至他化天如十歲等言亦住七金山之頂者一健達羅此云持雙山頂有車轍雙跡名持雙二梵云伊沙陀羅此云持軸山山形似車軸也三者梵云揭地落迦山此云擔林山有林樹堪作擔竿謂劫初時人身極大將此木作擔穿小山石移置閑處故名擔林山四者蘇達梨舍那山此云善現亦云善見此山勝故見者生喜五者頞濕摩羯孥此云馬耳山形似馬耳故六者毗那陀迦此云象鼻上分麤下細如象鼻故七者尼民達羅此云魚觜故是四天王別居之處也言三光四王等者論近遠也問此云三光四王去此地面有多少答三光四王等言壽量形相等者指餘門義也論云欲界六天最下身量一俱盧舍四分之一有半里長九百尺如是後後一一增至第六天身一俱盧舍半即三里也壽量頌云人間五十年下天一晝夜乘斯壽五百上五倍倍增即人間五十年為四天王天晝夜乘此晝夜三十日為一月十二月為年彼壽五百年若第二天即以天間百年忉利天一晝夜倍倍向上准知經云自在天子大自在天子者夜摩兜率是空居天對下忉利及四大王天名自在天子他化化樂樂自他變為樂具勝下二天名大自在也言得異熟果等者問所感內身可名異熟所感外果飲食等何名異熟答金云二說一約業減邊總名異熟二云此二天飲食不依水得但思念即至是從天熟生故言異熟非真異熟言隨意所念等者問六欲天果有何差別答初之二天依樹求得次之二天應念即得此皆先業所感色類以定但要受用即現不用即無最上二天不樂果以生得通或自或他新新變起境非一准名大自在也言下二天依樹等者樹有十種一食樹二飲樹出諸湯藥飲三衣樹者有諸天人要衣隨心即得四乘樹即乘騎也龍畜等是五莊嚴樹天冠耳璫嚴身之具六重香樹天人要香熏衣從樹求得也七大集樹天人集會在此樹下八歡笑樹天人不能歡笑樹上出歌笑之具箜篌等物九資生樹家生五行具度十座樹本來樹上只出九種物有人於第九資生向上分出床坐便成十也故四天王天忉利天要境受用事須樹而求對他上二天思念而至下之二天依樹求得不名自在也言今隨欲得名為等者此解夜摩天覩史多名自在天也即是思念方至雖隨欲得還由先業問為復是本來有了思念方至為復是本來無思念方至答一切是新有問若爾違他瑜伽瑜伽云兜率已下諸天名現住欲塵生今云思念莫乖諸文答攝釋云若約受用資具資具不妨別思念若約所受用宮殿則是舊有多現住欲坐此生此解非也若言宮殿是舊有者直至他化已來宮殿成劫之時成得亦是舊有也此約所受用資具隨欲求得之時永更不滅盡此天身受用名現住欲塵生表與上二天別也上二天新新變起言不樂異熟等者此解他化化樂二天名大自在也問下四天夜摩覩史及最下二天依樹求得皆是前生持戒業感及與化樂天他化自在天皆是前生善業所感總名異熟果如何最上二天言不樂異熟答若言異熟上下天中總有也然最上二天自變他變得者即勝今就勝處厭下二天故言不樂異熟也又他化化樂名自在者轉勝於前故得大自在之名問此上二天變化與下夜摩兜率思念何別答思念約任還變化約加行是二別也問應可下二天勝上二天耶答設使下二天加功用行亦變他底不得故不應為倒問莫便是神通耶答欲界無通果此但是業通以彼通果此是業力亦名生得通也化樂天要境受用新新變起唯自變受用也若他化自在天強力天子使劣天變也若彼此力齊等者更互變也若於思念六欲天總名思念然則最下二天依樹求得最上二天新新變起所以中間二天別別思念也化樂他化二天厭下二天舊境欲得新新變起故所以疏云不樂異熟果不樂受用舊境喚中間二天思念得境名異熟果問設是變起必許遠因欲界之中有何變化答應名異熟業之所化似彼通力所變化起得變化名所變境皆由自心云他變自心受用答如許變化扶塵義為自受用非變根令他受用故許變他變樂具亦同此此約本質相例若約影像一切皆用變之境不違唯識之理言又解他化天主等者敘古解也若依此解欲界四空居天中唯有他化自在一天來餘夜摩覩吏化樂盡不來也言又自在天是帝等者即主兵臣四天門王也大自在天是帝釋之師即摩醯首羅大自在天第四禪梵王也若依此後解四空天全不來問不來何過答若是帝釋之師四神主何不向後唱一處明若是帝釋之臣即合問四天王一處収故故有過也所以疏言若後二解無四空居欲界天也言此云堪忍等者釋世界名也此從主立名悲華經云忍土真諦云忍是梵王由能忍他勝事不生嫉妬故言忍也此梵王為世界主從主為名故云忍土二者從境為名此界之中有地獄餓鬼畜生鑊湯爐炭苦無量無邊一切眾生大苦故故名忍世界三者從行為名袈裟幢世界百劫修行不如阿彌陀佛國一日阿彌陀佛國百劫修行不如娑婆世界一日若行布施諸方淨土之中總行得若行忍事須世界行金須火上試世界是行忍處諸菩薩摩訶薩堪忍大勞苦故故名堪忍若菩薩於此界中為王教化須能忍受故方居此三千世界教化故名堪忍也言娑婆者訛也者舊云娑婆此云雜惡處從所忍事以立名淨土純樂地獄純苦此世界亦樂亦苦有善有惡故名為雜又造雜業故名雜如維摩經云諸菩薩曰未曾有也世尊釋迦牟尼佛隱其無量自在之力乃以貧所樂法度脫眾生斯諸菩薩亦能勞謙以無量大悲生是佛土又如不輕菩薩杖木瓦石而打擲之言初禪大小等者解世界量也且初禪量與欲界中一四洲量相似名等二禪之下須彌日月各有一千一千初禪等二禪故如排一千个錢都以一盤覆之三禪之下須彌日月各百萬一千个二禪等三禪故即是一个一千是單一千十个一千一萬百个一千是十萬千个一千是百萬如將前一千與錢盤布在地上都以一本盤覆之四種之下須彌日月各有萬億一千千个三禪等四禪故即是一个百萬是單百萬十个百萬是千萬百个百萬是萬萬千个百萬是億萬如以前與錢一千个盤與大盤布在地上又以一最大盤覆之如是皆同一成壞俱舍頌云四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍說名一中千此千倍大千皆同一成壞名為大千界問何者是初壞時答頌云壞從獄不生至外器都盡成劫從風起至地獄初生何者成壞之相云何頌云安立器世間風輪最居下且世界壞時略有二種一有情世間二器世間劫欲壞時人中隨一有情自然法爾所得第二靜慮其全有情展轉隨學從此已後生極光淨天二器世壞時復有三種一火灾二水灾三風灾且火灾壞者起世經說風吹海水沫為日天子具足造作一七火宮殿消融世界悉皆壞盡二水灾壞者經說大雲遍覆及至充滿光陰諸天自此已下雨沸灰水消光陰天所有宮殿乃至須彌如水消鹽變壞皆盡三風灾壞者三昧經說從鐵圍山間起大風光吹遍淨天吹諸州須彌山等三千剎土如吹灰土悉皆散盡也此三千大千萬億須彌四大州日月等總屬如來一大化身故如是百億个小化身總在千華葉上一个華中並屬一大化身一大化身所王國云盡屬如來一化受用也據實火灾只到初禪盡水灾二禪盡風灾三禪盡不到第四禪今言頂者頂有二種一向內頂二向外頂如師僧頂名向內頂笠子頂名向外頂也言故娑婆世界主者解主字也二解第一云問何人是娑婆世界主答第四禪主是娑婆世界三千大千世界主也尸棄第四禪光明二禪等取初禪三禪也言梵摩云等者解梵義也梵摩者是具足梵語此云寂靜不造惡業故清淨者離瞋故淨潔者身有光明故問六欲天身亦有光明何不言淨潔答有五衰故若言梵摩唯是梵語也若言寂靜清淨淨潔唯是唐言若言梵潔唐梵雙兼也今唯言梵但是梵語之中略却魔字故云略也言尸棄者火灾頂等者第二解云娑婆世界主梵天王尸棄大梵為一収即取娑婆世界主是初禪梵王也以初禪是火灾頂故云尸棄尸棄者頂髻也故取初禪梵王為娑婆世界主光明是二禪二禪之中皆以光明為名字等字之中等取三禪四禪也此是疏主第二解千門萬戶解義不同也言然大般若五百等會經文也疏主第二解若將尸棄梵王是初禪梵王是小千世界主如何會他般若經文尸棄者頂髻也即持髻梵王是堪忍世界主文勢似取第四禪梵王也答大般若云尸棄是梵語持髻者唐言以彼第四禪螺髻梵王頂持肉髻故云持髻唯第四禪梵王獨有此相即頂髻是第一禪梵王之別名所以作第一解取第四禪梵王為娑婆世界主第二解疏主依法華經言尸棄者梵語翻就唐言亦云頂髻亦云持髻兼初禪梵王是一火灾之塵頂亦有此義亦同長含云尸棄者初禪身也所以疏主作第二解娑婆世界主即初禪梵王名尸棄者頂髻也尸棄乃是第四禪初禪梵王若言梵王通四禪若言尸棄唯目第四禪初禪也言尸棄者梵語此翻持髻即是第四禪梵王別名頂持肉髻螺髻梵王之別名故云持髻若言尸棄者是梵語此翻為頂髻亦是初禪梵王別名火灾之塵頂亦是頂髻也言光明是餘等者即第二禪主經言等者等第三禪依長阿含即舉初二等第三第四故言龍眾也者二是第十翳虗含灑眾龍眾之中金分為四對一能喜能賢對難陀龍王䟦難陀龍王二八龍九頭對沙竭羅和修吉三多千少惱對德叉迦龍王阿那婆達多四依心依色對摩那斯心優鉢羅毛問龍是畜生趣何故於天眾後釋王眾前烈名耶答凡有四義一其力最大故五種不思議力中龍居其一一業力不思議二世間力不思議三龍神力四禪定力五佛力第二助天鬪故正法念經說惡龍助修羅鬪善龍助天鬪今是善龍故助天也三調適陰陽於人有恩故次天烈四護千佛法藏故次先烈也問既龍能調適陰陽何故有天旱答由五義故天旱也一火大增燒雲四散二風大增吹雲四散三修羅収雲歸於大海四雲師雨師多故於放逸五眾生慳貪嫉妬多惡業招故又麟虫之屬龍為其長德配五靈能大能小能幽能明春則昇天冬則入泉變化倐忽不可具言廣雅云有鱗甲者為蛟龍有翼者為鷹龍有角者為虬龍無角者螭龍莊教中有卵胎濕化四生龍也言此二兄弟等者安國云此是王舍城龍近城之處雨澤依時常多豐稔所以佛將弟子多在此城言風不鳴條等者凡所作事善應人心見者皆喜故名為喜言初能令喜等者問初二龍如何名喜後名賢答疏云初能令人喜故名喜言性賢名喜者此龍自性賢善令人喜也言娑伽羅者此龍居在世界外第八醎海即天授品娑竭羅龍宮從所依海以立名起世經說大海底有娑竭羅龍宮縱廣正等八萬由旬伽竭二音相近也糺國云本是國名此國近一仙人仙人呪一國成海此龍居中故以為名言和修吉者即九頭龍也言絞妙高等者此有二意一欲絞山令斷取帝釋而食帝釋集諸天眾於善法堂念般若波羅蜜龍威自息二者此龍為守護諸天受樂此山故以絞之耳兩解盡善以八大龍王多是福德善龍也此龍之類其數非一舉彼流類故云之類此九頭龍是鳥長國龍由釋種初逐化身為象駄釋種出也言多舌者舌有多故名多舌二語多故名多舌言或由嗜語等者語多故名嗜語如人言此人了事七手八脚非實有也言此云無惱者無惱即少惱對舊云阿耨達池皆訛也此龍從所依池以得名其池在靈山北香山南周八百里其龍宮殿在中也言離三熱惱者樓炭及起世經云此池龍無三種熱惱故一無熱沙所爍由龍遊戲時多化作人忽被熱砂礫著便伏本形二無風吹衣露形龍變為人之時變尾不得風吹衣露形若見身形心生熱惱三無妙翅鳥所食阿耨達池經云佛欲往彼池化諸龍去先遣目連驚覺彼類時目連化為妙翅鳥皷翼鳴觜諸龍子等驚怕至甚遂至王所而作是言比無此事今何忽有故說此池龍不被妙翅鳥所食金城云更有三種四所食香飯變成蝦蟇五身有逆鱗沙石入身內六若行染時露現如虵相結言華嚴經云大地等者有疏云八地菩薩亦無煩惱八地既是第三劫故名大地唯識云以十種勝行歷三劫得名各殊初劫但名波羅蜜第二劫名近波羅蜜第三劫名大波羅蜜故名大地也問此等諸龍為後總是菩薩化為後是實耶答通於二種若是實龍多分破戒墮在龍中問何以知之答案海龍王經第三云龍王白佛言我從拘樓秦佛時生於龍中諸龍妻子眷屬皆少今時龍眾何太多耶佛告龍王拘樓秦佛時有九十八億破戒之人生於龍中拘那含牟尼佛時八十億人迦葉佛時六十四億人在家出家破戒生於龍中我法中九百九十億人在家出家違犯禁戒皆生龍中以是之故妻子眷屬不可稱計由此龍中通化實二種若是實報多是破戒言離苦法門等者八地菩薩能化眾生離於苦故能為龍鱗甲之內流出於水濟瞻部眾生離飢渴苦言慈心者亦云依心約眾生有不要雨故先雲七日故號慈心與此相違非慈也如人失火不可先雲也言漚鉢羅者此云依色路云四色華優鉢羅是青蓮華疏主云紅蓮花錯也此亦不然優漚二字因義全別優鉢是青漚鉢是紅非錯如此方有字加不字是無義若加亦字是有義不可以鉢羅是同遂無青紅之別不妨無有義殊此亦以居池得名也言梵云緊那洛者第十一清歌雅樂眾也言歌神者即歌詠盛德之義非以四諦緣起六度便作涼洲水調歌之有類尚書皐繇乃廋貝載歌元首明哉股肱良哉庶事康哉或如云何梵等下云歌唄頌德事諗註經云狩形人面而有一角舊云疑神仙人人見疑是人非人又云馬頭人身能語問何趣所攝答雜心云畜生攝也智論十二云天趣攝以稍劣故如世間僕隸人之所使是人趣収此更為天所使故知是天趣攝在十寶山間也歌神樂神與諸天作樂分番上下也若准正法念經說北州別有一山名如意山所受快樂衣食等天同故亦名無憂山入此山者皆快樂故四个歌神各在一偶而住面貌亦異一偶如黃金色一面如白銀色一面赤色一偶即紫色也言初歌四諦等者問如何初歌四諦配法緊那羅次歌緣生配妙法緊那羅等答名法者唯有名字章句而無實義名法聲聞根劣四諦但為法次歌緣起者勝前四諦得妙法名次歌六度者包含廣大故名大法有三義故名大法一者四諦緣起六度總是所緣境三種境中此最大故故名大法二者包含總攝萬是萬行體是大故名大法三者能感大果故名大法後歌一乘故名持法非空非有可任持故故名持法化度問與一乘何別答六度是三乘中頓教大乘一乘是四十年後漸教大乘會別故各一任持聲聞不退得名持法也又說六度是四十年前三乘中權教大乘今此一乘是四十年後了義大乘或一乘通教等四法六度唯行自成別故言或初三種歌等者初歌聲聞教行名法次歌緣覺教行名妙法次歌六度教行名大法後歌一乘理果名持法者一乘理果非有非空可任持故問何故前三種歌三乘教行後一但歌一乘理果答此順經宗意令聽三乘之教悟一乘之理行三乘之因趣一乘之果故前三歌三乘教行後一歌一乘理果也言或歌一乘教理等者歌一乘教名法歌一乘理名妙法歌一乘理名妙法歌一乘行名大法歌一乘果名持法疏中三解初解任持一乘教理行果四法二唯任持理果三唯任持果皆約所持以立名欲令二乘迴心向大也言隨佛所說一會等者謨云總結所歌之德隨佛一會所說之法皆為逗根是故此神即事歌讚不唯空歌法華經維摩會下歌不二法門涅槃會下歌佛性言如世樂音等者如秦王破陣樂等是經云乾闥婆等者騰芳烈樂眾智論名童籠魔此云樹居在地上十寶山中華嚴中具烈名字也言樂音五孝反等者樂字呼言梵云末奴等者末奴云意是若云可颯縛羅名音若就梵語次第名意可音謂順唐言云可意音可意人心樂欲聞言故樂也言亦名如意音譯經之人意存省略故但言樂也疏主以一句疏解樂字義便盡樂者令人愛樂也此非正譯但是以義安之可意如意皆是樂義樂乾闥婆王與美乾闥婆王兩个王經中無音字即與末奴是若義相應也若言樂音乾闥婆王美音乾闥婆兩个王經中有音字即與梵語之中颯縛羅義相應也言正法華云等云柔耎者緣無音字證此經中樂乾闥婆王言和音者緣有音字證此經中樂音乾闥婆王上來如意音和音可意音盡是令人樂聞解樂字說若帝釋諸天要作樂乃有異相即飛上天與緊那羅分番次上下但頭上有角者名緊那羅無角者名乾闥婆問何趣攝答有云鬼趣攝亦云修羅攝實天趣攝是劣天所收作樂唱歌護諸天故也言梵云健達縛等者西域呼散樂人為健達縛即是唐言尋香行以彼樂神不事生計常作樂說聞道大官除改或人家有喜慶事此便尋香氣西域喚作樂人名尋香聽采而行名尋香行與人作樂或可尋酒食香氣而行名尋香行此樂神却是從彼散樂人為喻得名健達縛即是此方尋香行義也都有三種一者根本乾闥婆食細香如中有身二又與諸天作樂三海上蜃氣此是三種散樂二義問根本故從彼為名然尋香中有少差別根本即食細香如西方散樂尋香作樂即尋局席之香與前名同海上蜃氣樓名乾闥婆者即從人所弄造假城等得名也言一非絲竹如皷等者所作樂不過八音書云八音刻諧謂之樂一金謂鐘鈴之類二石磬架上打有聲三絲箏琴瑟弦索也四竹謂簫笛等五匏即笙也柄似醬杓子口中含著六土塤篪形似黃具樓吹之七謂革有毛曰皮無毛曰革即皷皮也八者木木中有二一機即木桶中安舌而撼之眾樂一時動二者缺即是板上𥁞大虫形剜作大虫形段背上安二十四齒相似曲終把一竹子憂之作聲眾樂一時停止亦名為齟齬也言非絲竹之下者此四乾闥婆王不越彼二類攝盡賀云若據諸樂五音皆備各是一家更無勝劣但由能弄之人勝劣故分上下此解不然疏中更言樂中有二類非是約能弄賀言未當且八音之樂有淫有正如今國家大禮所奏者皆是雅樂時間所有漢震胡部是鄭衛之樂故絲竹及非絲竹以分勝劣故詩序云情發於聲聲成於文謂之音聲有宮商角徵羽成文者即宮商上下相稱名音故有治世之樂其音正和亂世之樂怨以怒其正乖亡國之音哀以怨思其民困論語云惡鄭聲之亂雅樂故知樂有淫正兩別今此言上下者所謂正聲故以正聲配音也即約所奏之樂也若樂乾闥及美乾闥即舉能樂能美人說以為其名不約所奏注經云一無聲之樂如作舞渾脫等下者名樂乾闥婆王上者名美乾闥婆王二者有聲之樂如簫笛等下者名樂音上者名美音言或此同前等者即如緊那羅等曰初作四諦音曲名樂次作緣起音曲名樂音次作六度音曲名美後作一乘音曲名美音或作聲聞教行音曲名樂或作緣覺教行音曲名樂音次作六度教行音曲名美後作一乘理果音曲名美音曾有人箜篌中念得金剛經一卷又如荊珂㓨秦王秦王請聽美人彈琴一曲美人於琴中教王掣羅袖踰屏風等是此類也言經云有四阿修羅王等者此非天眾也亦云第十三動山涌海眾謂阿修羅居大海下欲與帝釋戰從海下發兵吐氣衝海水令其沸騰搖動須彌名動山涌海也言梵阿素洛等者解總名問何名總名答疏言梵云阿素洛此云非天言阿修羅訛也准疏主解素洛天之異名並是天趣攝問此更是天何名非天答是天無天行毀責名非天雖無天行元來是天言以多諂詐等者問何云非素洛云天問天中上至梵世總有諂詐何不名非天答以多諂詐一向行諂簡天中則劣或暫時有不同修羅故說天中名為質直上說來修羅是天攝也言如人不仁亦名者如人不行人行毀責云非人元來是人意言是人身行不仁故云名非天不言非畜生修羅是天攝無天行故故言非天也言瑜伽佛地等者疏主一往引諸教之便有通通趣攝三趣攝不定言有云羅睺阿修羅等者只如犢子鷄胤部如班足王不可還是畜生所攝耶言今依大乘瑜伽等者疏主斷云今依大乘瑜伽為正也言一極弱者在人間等者只今西方見有修羅窟即清辨菩薩住處也西域記云駄那𤌴迦國城南不遠有大山巖有婆毗䟦伽菩薩唐言清辨論師住阿素洛宮待見彌勒菩薩成佛下生之時方出此論師聞摩揭陀國護法菩薩宣揚教法學徒數千有壞談義杖鍚而往至波吒釐城知護法菩薩在菩提樹論師乃命門人曰汝行詣菩提樹護法菩薩所如我詞曰菩薩宣揚遺教導誘迷徒仰德虗心為日已久然以宣願未果不遂禮謁菩提樹者誓不空見見當有證稱天人師護法菩薩謂其使曰人世如幻身命若浮渴曰勒誠未遑談議人信往復言不會見論師更還本土靜而思曰非慈氏成佛誰決我疑於觀自在菩薩像前隨心陀羅尼絕粮飲水時經三年觀自在菩薩乃現妙色身論師曰願留此身待見慈氏觀自在菩薩曰人命危脆世間浮幻宜修勝善願生覩史多天於斯禮覲當達得見論師曰志不可舊心不可二觀自在菩薩曰若然者宜往䭾那羯磔迦國城南山巖執金剛神所志誠誦持執金剛陀羅尼者當遂此願論師於是往而誦焉三年之後神乃謂曰伊何所願在此勤勵論師曰願留此身待見慈氏觀自在菩薩指遣來請悉充我願其神示曰此巖石內有阿素洛宮如法行請石壁號開開即入中可以待見論師曰幽居無覩詎知佛興神曰慈氏出興我當相新論師受命專精誦持復歷三年初無異相呪芥子以擊石巖豁而洞開是時百千萬眾觀覩忘返論師再三召慕人見皆怕唯六人同入入已壁遂合今是此類也餘者居大海之下有云水居有云穴居在須彌山北孔穴中言以下四類十地經說二妙等者如是次第四類皆二萬一千由旬計八萬四千由旬據理透入金輪也言准此已下八萬四千等問須彌之底下據金輪言深於須彌矣即有透金輪之過如何會釋答路府三說一量度大小不同本只是八萬由旬著小尺度量加四千由旬二云業力所致亦後句失如石中鐵中火中有眾生也金輪不可透業力使之然必若透金輪還當由業力三云據實海水亦深八萬四千舉其全數但言八萬俱舍頌云牟尼說法蘊數有八十千據實八十四千也上解業力勝也言與起世經相違等者一山東不同二水下不同彼說須彌東是一句西去一千等是一句道理方顯言是別聚落等者西去山千一千由旬有宮殿者是別聚落不妨散作餘七金山等如今世人居別宅等亦復何失言羅睺此云等者解別名也今疏中依十地經辨次第先列羅睺阿修羅王據道理亦合先列住居最上又是前軍故合先列也譯者差別在後安之法華經先列婆稚阿修羅王最後列羅睺阿修羅王不約大小今疏主不依法華經中次第依十地經中先列羅睺梵云羅睺此云執者障義羅睺阿修羅王與天鬬時日月天子放盛光明射修羅睺眼修羅又是非天前軍又以手遮日令蹔隱沒故云執日如說耶輸之子名曰羅睺為障佛日故言執日此但手遮非手犯日也言婆稚者舊云被縛此古人解也言團圓等圓滿之義身形充實故云圓滿有大勢力戰歒得勝故云最勝戰有勇決故云勇健正法華云最勝義與勇健相似言䟦陀縛義等者婆稚與䟦稚迦此五字廣略不同大段翻為團圓為正若翻為被縛即錯言佉羅騫等者佉騫二字皆去聲呼也駄字平音呼陀音同也言廣肩膊者膊廣厚也言明文其身者即是畫其身也只今荊蠻而有此俗昔者周大王有長子三人長曰大伯次曰仲雍小曰季歷季歷賢又生聖子父王曰大伯欲自居位恐寶位不及文王曰故以天下讓於季歷而自斷髮文身踝形以為飾適於荊蠻言此為最大即身形大也阿含經云世界初成色界光音天子從天下來入海沐浴精流水中變為一卵殻經八千歲開生一女修羅身如須彌山千頭少一後水觸女身由是有孕遂生一男號毗摩質多其身四倍大於母身九頭八脚千手少一後納香山乾闥婆女生設支夫人即帝釋父公也問欲界諸天尚無精穢云何色界天而有精耶俱舍云唯六欲天受妙欲境初二天依地居形變成染與人無別然風氣出熱惱便除非如人間有餘不淨夜摩天眾纔抱成欲覩史天執手樂變化相笑他化天相視云何色天而說精流答沼云此是經部中敘外道義故無有異又修羅宮殿只有八萬由旬今質多身四倍大母母之身量已等須彌如何彼宮而能居得故知是外道義也言梵云揭路荼此云妙翅鳥亦名吞龍啖毒眾也言不唯金故者破古師云金翅鳥翅羽色妙不唯金故言比丘當知若卵生鳥等者按樓炭經第四云須彌山南大海之北有大鐵樹名俱梨睒陝音身莖周迊二百八十里高四千里枝葉分布有二千里樹東面有卵生鳥及卵生龍南面有胎生鳥及胎生龍西面有濕生鳥及濕生龍北面有化生鳥及化生龍也其卵生鳥欲食卵生龍時於是飛向東面枝上下觀海水兩翅扇水令開取卵生龍食之而不能食胎濕化生龍胎鳥欲食卵胎生龍時飛上南枝扇水令開取卵胎龍食之乃至化生鳥食化生龍時上北枝上扇水令開取前四生龍食之此鳥各別有宮殿方圓二十四萬里七重城壁皆是七寶七重欄楯樹木園苑小鳥和鳴之相又譬喻經云摩竭陀國西北有九黑山山外有香醉山香醉山內有末拉末離樹此云鐵叉樹其樹高大堅硬如鐵諸妙翅鳥常在此樹其鳥身大兩翅相去三百三十六萬里者栖此樹上樹不動搖亦無折損又有一鳥形如鴝鵒名曰鳥堅鳥復於此樹上止住若住東枝枝即東側南西等枝亦爾若在中枝乃可安住平正妙翅鳥見已生恚謂樹神曰我身極大栖此樹樹不動搖鳥堅鳥云何令樹搖動樹神答曰汝身大所食至輕賤上食龍龍食於魚所食更賤不能令大樹動搖彼鳥堅鳥唯食金剛金剛堅硬難可摧壞所食更重樹則傾搖比當知喻如十二有支生死苦果如鐵叉樹彼妙翅鳥所食輕物不能令鐵叉樹動搖猶如俗人雖談俗典文字葛洪萬卷諸子五車不能破壞生死大樹鳥堅鳥身形雖小所食貴重能令大樹動搖喻如沙彌雖小受持佛經故能破壞十二有支生死大樹也言是時此鳥以翅等者闢者開義房益反四生妙翅鳥能食四生龍後必帶前如胎生鳥能食胎生龍兼食前卵生龍兼前帶後後必能帶前如化生鳥食化生龍兼食前三生龍也攝問云化生龍頓生頓滅既無身形如何有資益義答有三義一云化生鳥食化生龍如空食空能食所食俱是化生死了無身形說何資益二者化生鳥不唯空食化生龍兼食餘三生只此三生便能資益化生鳥三者不約所食俱說有能食化生龍之作用未必食也第二也言設使龍身而事佛等者緣龍事佛皆變本身為人是妙翅灼然不敢食設使不變為人空作龍身而事佛者是妙翅鳥亦不能食噉如來在日有妙翅鳥食龍龍後向佛說佛變取袈裟一縷繫著身上妙翅鳥不能食噉問何故佛變繫袈裟答佛有二意一佛以慈心不可阻壞二昔曾破戒今為鳥王見沙門形即便敬修惡心便息有一龍得袈裟縷繫身便向水面上來被妙翅趁龍遂化作人走其妙翅鳥亦化為人走趁著龍始擬喫身上忽見袈裟便不敢喫或上鐵叉樹或上或下闢水令開見龍身上袈裟却迴如是七度心中飢熱火從心起火焰上徹天宮帝釋變善龍降雨滅火唯收得心肝猶如人䏶亦如車轂帝釋得為如意珠即如意迦樓羅王輪王得之為寶等言不可阻者損也隔也憂也路府云疏置設聲文稍不便恐疏錯應言若使即極分明牟云然置設言別有深意文言設者即同俗縱然之義意言若事佛者縱言合食亦不能食況餘不應者也故非疏錯言亦云大威德者解別名也諸龍怖故只自卵生龍怖非諸類怖也言大身者兩翅相去三百三十六萬里紀國云大海龍王也今准南洲南東西北四方始有八萬里如何容受牟答約此在醎海中欲食龍時闢水兩向而取海水已深八萬由旬即一百二十八萬餘里不說南洲實安此鳥也言大滿等者膓常滿故言如意者頷下有如意珠只此便是自心火起燒鳥王身輪王收得為珠寶也有說收得心肝恐非也疏主自言領下有珠何故言心肝
