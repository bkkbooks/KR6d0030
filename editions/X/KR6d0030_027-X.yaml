body:
  text: 言識聲聞性等者且生起義解者先發大乘心後發小乘心小乘心隔大乘心已後二乘心生起望凡夫位名遠生六十劫得果成熟瑩云從第六住退望凡夫位名遠生且與二乘得果名近熟也言知有大姓等者知大乘姓未熟先說小乘後說大乘唯佛知餘人不知名隱密經云使者語之我今放汝者喻上論住汝向自家國裏客作賣力莫入他國自國之中著穩便我更不收管法中論許汝不修大今放任向二乘之中修行名隨意所趣前汝所欲皆當與汝不勸大乘即名放也由如不追即名放也不必勅放此時判侍已後却化故經言窮子歡喜者辨云窮子歡喜除意不信從地而起除身不信既無言詞除語不信言適本機者順本心故言初發小心者從來未發二乘心今日始發名得未曾有言從生死地者往二乘中循行來有餘得槃名以求衣食言令修脫分者如前鶖子因施眼故怖行大行今者不須捨頭目等但作觀身不淨等即是小乘資粮位解脫善也即是拘那含佛時也言密遣二人者二乘教也喻上即是長者遣二人引窮子法中論佛大悲心設二乘教即是長者遣二人也澄問云何故前遣威德使者即言傍人急追將還使者疾走執之逾急後遣無威德使乃稱密遣徐語而非急遣者何答藏云大乘之教是佛常用由近佛故名曰傍人佛初成道即說大乘欲令彼等反本修大名追將還大教速被名疾走往捉大化不得權設二乘故言密遣大乘化物取佛速故名為急追小乘之教取既賖故名徐語也稍勝經言形色顦顇等者問長者家中豐衣足食出來家人大小無有少衣乏食者因何有形色憔悴者答一云或是長者東家西家借請將來二云或是自家裝束出著四十年前隨諸一切佛而用方便力方便權教向他十方佛口中借請將來也三云四十年前於一乘道分別說三乘名裝束出也雖示種種道其實為一乘又小智樂少法言方便之教者誘引二乘故名方便如來設教意難知故名為密遣教有二種名為二人也言智慧狹等者九部教唯詮生空此解二乘果上說言或教偏故等者依二乘教理說言或自德闕等者向二乘行上說也即是二乘教理行果具足也喻上說窮子少衣食闕面自黤添名形色憔悴法中論小乘名句文依聲上立聲是色也名形色憔悴言令傳語者如來說小乘教到聲聞耳邊名汝可詣彼言方便漸等者大乘教名疾走二乘教名徐語迂會修行方便誘引也言二乘等者教中詮斷煩惱名此有作處或教被二乘根名作處言無漏之法等者此修脫分在見道前雖未即得無漏是彼之因當必得故故言無漏此行順彼故言順解脫分即名倍與相變名倍言擬問答等者長者恐所使者拙口鈍詞恐問答不得所以教示也窮子若許將來使作若問作何生活便可語之雇汝除糞我等二人亦共汝作又云聞慧名問教能詮理理能成教名答由所詮理顯發能詮之文方能悟其意故名答也問一種大小乘教何故二乘教行獨名除糞器大乘教行獨名寶器答二乘自利教唯名除糞器也大乘教有二名一者能除煩惱之糞亦名除糞器二者盛彼慈悲喜捨利他之法如法器也言不但行等者前來教名法輪因即是借威勢也行斷惑時事須因聞法教悟理方始起行斷惑名借威勢也教名助也如言三界無安等言以教扣等者將二乘教勸令發心名求窮子扣口音言述斷煩惱者教中詮五停心觀別說種種斷煩惱行相名具陳上事言先取價者窮子先把得定錢然後作生活法中亦聞二乘教熏得聞思二慧總未修行名先取價得彼聞思了然後思修諦觀五停心別相念尋除糞言此真勝德者有漏聞思對前人天善根名真勝德雖是有漏能與後位無學果為因資粮位修五停心別相念總相念觀加行位修四諦名漸伏煩惱名尋與除糞經言其父見子等者長者見子慜伊形色憔悴面上無光彩又恠伊到馬坊裏不領取錢物來法中論如來慜念二乘之子見相好切切恠今日到資粮位即令迴心向大為漸悟菩薩恠伊不迴心求大名愍而恠之言慜無相好者喻上長者云自家男女錢財不肯受用汝許多艱辛骨肉情切所以悲傷法中佛傷慜見此眾生等心多拙見無上菩提不求但好二乘涅槃小果故慜見也言恠無求者大乘佛果有塵沙萬德不修何要修小乘劣行也言除糞已是等者定時遠近也意說從前父遙見之已下六段經文總名化以二乘喻中前之四段即疏言除糞已上是於過去無量生中之化故此中名遠世化也第五勸入善根第六便成聖位二段即是次前生及今生所化名近世化若論三生之中第一生修解脫善第二生修四加行位第三生事須却從四善根位方入見道漸成無學相似四善根經兩生相似此初第一生名遠世第二第三生近世緣覺四生亦爾又緣覺一百劫聲聞六十劫資粮修行或經世五十劫名遠世或加行位修行經十劫二十劫名近世也言創教令入四善根等者解他日也二說一初約位解他日資粮位早見他佛名初日後加行位更見化佛名他日前後佛別故名他日二約時解日者資糧位修行三十二十劫名初日後加行位十劫二十劫將遠對近得名他日四善根位異前解脫位與前殊故名為他日疏中意但將兩位相對各別他日義早成況此皆是多劫修行者況解脫位早經多劫方入加行他日義極成言故別說時者定散有殊觀行亦別此位作五根五力四諦觀等解經中他日之言也言知根未熟等者此解經窓牖義章敬云大根熟顯化當門見子如說大乘二空教中而觀種性今既未熟密化為窓牖依如來悲心權巧方便之用施設不失名窓牖二約二乘教名窓牖管窺之見窮子是教中所詮生空理如窓中見子牖者道也教能引智慧名道也此生空理教是如來大悲心所向之處名向也言又不以等者解意同前但是前約不定性名潛施此解不言潛施即對定性人解也言窓牖者有二說一云長者寶帳中有窓窓中向外見子此解非也若是寶帳上窓則是大乘法名正門不合名窓二云只是馬坊中有窓窓者私竊者物不正視也長者偷身向馬坊裏窓中向內見窮子法中論藏却報身現化相身向生空教中見二乘之子也若是兼法空教名正門裏且約生空理偏教如窓牖言將成道時等者今生鹿園中五比丘等見丈六金身得無學果故名近見章敬云此無學近見返成遙見今鹿園既名近見返成四善根位不是今生總名遙見唯今生鹿園中名近見此第一解今生鹿園名近見前在四加行位名遙見也言或由彼去者二解一鹿園中更經一大阿僧祇到初地菩薩生如來家住極喜地此名近見也鹿野苑中亦名遙見二云去聖位遠望佛果菩提說鹿野苑中去佛果菩提遠故名遙見窮子當來成佛時名視見初解遙見對近見後解遙見對視見但將二乘望佛果名遙不以自乘果望因也以前言父遙見子故若約自乘即子見子也經言即脫瓔珞細軟上服等隱却報身上八萬四千相好報身上有八萬四千相一一相復有八萬四千隨形好一一好復有八萬四千光明遍照十方世界又目如四大海水毫相如五須彌山故言即脫瓔珞細軟上服嚴身之具現於他身三十二相故言更著等現於化身三十二相好煩惱不能坌污故言嚴身之具化身相好則外緣之所染污故為垢膩之衣長者大不欲得著破衣入馬坊中為拾男女事不獲已佛身亦爾大不欲得現三十二相為眾生故如維摩經云貧所樂法教化眾生問長者家何處得麤弊垢膩衣答有二解一東家西舍南隣北里貧窮家借來也法中論佛身八萬四千相如來本無三十二相向他轉輪聖王家借來經云若以三十二相見如來者轉輪王應是如來也二云造作破衣裳裝束出猶如唐國山隊裝束出六國王子唐國本來無但是裝束出遣我如來隱却八萬四千相假如窮子亦同輪王有三十二相相同有漏即託陰摩耶等故云裝束出也言示有煩惱惡業等者塵謂塵坌即是惡業土謂糞土即是煩惱紀國云納妃生子示為貪所坌六年苦行示為癡所坌呵罵提婆示為嗔所坌辨曰雖舉煩惱兼有惡業也言先設權教等者如人右手用穩便故一切人皆先用右手後方向大為說大乘教如用右手嘉祥云右手為執作之便真智有陰結之能手執器故除糞智會理故斷惑言除糞器等者喻上說除糞事須得糞筵簞子等器具也簞乾同法中論紀國三慧為除糞之器聞慧為仰器思慧為金器修慧為淨器二乘之教詮於三慧譬之於執故名執持除糞之器三慧之力能斷煩惱譬之於除也又云即四諦下眼智明覺為能斷法也正取無間道智此位但是以有漏智斷伏煩惱如說明得定是彼勢用故言以教詮顯者此約能化解意言示於彼二乘教所詮行斷煩惱也言佛自示同者即三十四心等名斷煩惱化相斷或名示同也言說權教等者即說我依此行斷煩惱勸諸所化合同己故即同事化如長者自手持執除糞之器亦是結前意也經云狀有所畏者裝束作貧人入來意徒窮子不怕一處客作謨云若不作有畏之狀即窮子不信是除糞之人也即是為太子遊出四門見老病死苦不樂名狀有所畏長者假作客作人怕主人嗔名狀有所畏以方便故得近窮子將知百虫七鳥為子屬長者為子故脫珍御服著弊垢衣經云即脫瓔珞細軟上服嚴身之具更著麤弊垢膩之衣塵土坌身右手執持除糞之器狀有所畏語諸作人汝等勤作勿得懈息以方便故得近其子如來亦爾為眾生故藏報身之實德現化相之權形隱妙理之深文揚麤義之疎教不居淨土來此穢方男女樸落糞坑父母跳身入救但願救得男女不怕糞汙衣裳佛心慜眾生還同長者怜子經云以方便者詐作有畏之狀名為方便只以方便所以得近其子言示怖眾苦等者問何名狀有所畏答為悉達太子遊出四門見老病死及沙門相觀父王宮殿如塚墓見諸伎女狀如死屍三稱禍哉夜半逾城六年苦行菩提樹下三十四心成等正覺真是狀有所畏此上行相指佛今身皆謬意所前生身經言世世從佛受化即生生化身化相皆如此經汝常此作勿復餘去等者且向二乘中修觀行名汝常此作勿放逸却入凡夫中去外道中去名為勿復餘去當加汝價者今四善根位與汝修慧勝前解脫分位聞思二慧故名加價也言相謂者即好聲呼也言與汝修慧者問人現在於加行何名為當答此指前科既言勸入善根名當何失若准下文既益汝價即是應當名當如當真當異也即正得名當也言瓫器者即禪定如瓮器也言因定所有者解脫勝處等諸功德法因定所有如米麵等依瓫器有也禪定如瓫也米麵況諸功德也路府云前諸解脫通凡聖得第八滅盡定解脫唯五人得謂三乘無學不退菩薩等利根那含人餘人不得言此位亦學等者問諸經論中具說三明六通具八解脫阿羅漢人方得如何窮子四善根位便得此功德耶答疏言此位亦學等今見道前修有漏觀學作勝處遍處等諸功德三乘中慈悲喜捨名四無量言鹽酢等者攝云此見道前學作生空觀作本後相而是有漏非實二智二智者入聖方得言調和等者一切飲食美味皆用鹽酢於生空功德之中皆因智慧生由智為先觀我為空故方得功德也經言之屬者喻上說椒薑鹽豉阿魏獲油時蘿等法中論即本後二智俱時心心所是欲如蘇油能發眾味觸即似觸即似打麵信觀法不相離勝解似苽於一一定偏消鹽酢多想即如勞籬木枸安立境分齊思如鐺釜造作變生為熟受法如椀疊盛諸餘法言老弊使人者長者言我不辭與汝壯手力恐汝使喚他不得今與汝老弊使人輕省處駈使即得若生活重處不耐辛苦若使市中去須一个心逐後法中論羅漢變柱杖為人事須定心等逐後緣也使向野馬世界使來不得不免交我如來熟彼取去二乘神通見在不越三千過未八萬名老弊使人也五通者六通之中除漏盡通也四神足謂欲勤心觀作用弱故名老弊使人言此說利根超等者相國云小乘唯許超初二果取第三果也大乘不然且小乘者於四加行位伏欲界修惑九品不行後入見道時與分別惑一時斷盡頓取第三果身證那含得四禪根本定八解脫勝處遍處四無量等皆依定起若依大乘唯許超中二果取第四果如有一類利根初果以三界修惑束為九地上上品合之為一乃至下下亦爾如斷一二之時即便通斷三界故斷欲界六品盡不名第二果以兼斷上二界六品家若斷欲界九品盡不名第三以兼上二界九品故便名第四果此即名為超中二也三界修惑如擗竹斷也言次第得果者此中並是四善根中本位功德米麵等者謂四諦五根五力等觀金云小乘忍位修五根世第一位修五力若大乘𤏙頂二位修五根忍世第一位修五力四位通修四諦若大乘四行中作安立非安立諦行相也小乘唯作安立諦亦能觀上下八諦行相等字等取諸功德法也疏言未至者唯初禪未至上定總名近分此初禪創得定未至根本定故名未至也然上界地中皆有未至然不得名未至也簡至初禪故故初定獨名未至也言鹽者謂生空無我四諦十六行相也言老弊使人謂四神足者問與前四善神足何別答前是利根因果俱此是鈍根但得其因不得其果不同前利根人得根本定起得五通此由未得根本定故不能發通雖未得定修欲勤心觀等四而漸進故故不相違也言曾解脫分者前解脫分創修神足今加行決擇分能善修習言所修之法者即解脫位中五停觀位修四正勤及四神足總別二念今加行位中更修也言稱父子者問既是佛口所生即實是父子何名假稱父子答雖是佛口所生且緣捨父逃逝違背教理故假稱父子經言我年老大而汝少壯者舉老少以成父義也經言汝當作時無有欺怠等者舉離過以稱子義也言我道等者此唯解小義不解壯也輭者下也劣也初發小乘小有云兼有大乘性名壯也紀國云我慈訓育汝故如父順我行故如子我能令汝今世得世樂及涅槃樂故曰勿復憂慮言不自輕己者不自輕己身專求出要名無欺身也言心無煩惱等者即是折伏三業惡嗔佛如嗔父謗法怨言也言汝已能為等者四加行位折伏煩惱故三業柔耎示身業精進心無嗔恨口無惡怨之言若有此惡者是外道家客作及初心凡夫之作人外道家作人持鷄狗戒煩惱未伏有惡勿見汝今能伏無惡勿見自今已後如所生子未入聖位但名如子如猶似也經言即時長者更與等者從前已來客作人長者喚王大朱七自今已後是兒喚作士無士法中論名須陀洹謨云若便以彼為兒恐子驚走故與作字名之為兒法中論佛便喚為菩薩恐彼不樂大乘故且喚作須陀洹也轉近故若未入聖且言若如我子今入聖已便與作字名為之兒也言於二十餘等者謂二乘位無漏十法行者書寫供養施他聽聞披讀受持正開演諷誦及思惟修習言皆具無漏等者順無漏故名無漏也十業道者身三口四意三第一解十法行為一十又十業道為二十名二十年言加行者加行伏十惑名一十無間斷十惑名二十年也問此經住修道但六惑何名十惑答此處加行無間二位之中十業道故成二十或十法行二十也言五下分等者聲聞五下五上分結名一十緣覺斷五下五上分結共成二十年也五下分結者一身見二戒取三疑此三證初果時即斷更不復起四欲貪五嗔恚此二證第三不還果時方斷盡也五上分結者一色貪二無色貪三掉舉四慢五無明此之五種名五上分結隨上八地對治道起即斷真證阿羅漢果時方能斷盡也故二乘人斷五上得成二十也問何名五下分五上分答瑜伽十四云有二種下謂見道是修道之下故欲界是上二界之下故上分亦爾五上分結是色無色結是欲界之上名五上分結言二類斷者聲聞緣覺二類別也言或無間解脫者謂無間道斷十惑種名一十解脫道斷十惑麤重名二十也問二乘解脫道不斷種子及習氣疏云依何義配二十年答金云此約能治十善業道或約所治十惑究竟盡處說之依大乘義說言有疾者至有疾者問佛出世間煩惱合減如何出世煩惱增多答佛初成道劫減未遠煩惱尚輕十二年後漸迫減劫煩惱增多故十二年中上說略戒十二年後遂制廣律是知煩惱日日增長愍之故病意在於此此示大不希時是法華經會前為說般若諸大乘彼時聲聞心不希今獲得者即是法華會迴心入大也言涅槃時近者即可五年間即五緣中第一緣也言大乘許多者即如俗中言某是如許某是如許者自許也二乘許少分同大乘也菩薩許小者未圓滿故爾許比彼名少言佛得眾生平等者佛觀眾生情同一體我既成佛汝應成如一乘章說經言而無希取者喻上說管樹上途不耳何況豪富家資財尚不希一喰佛遣須菩提領念般若法門意欲令受羨須菩提聞說般若涕淚悲泣深解義趣不愚於法然無一念發大乘心雖解法空總不在受樂然無一喰之意言悕者切希字香衣反望也上也並無悕字應作希字也言復經少時喻上窮子更經一年半歲聞修歷長者家財長者意途利勤小人長者深謀遠計窮子還起受心嫌前鄙下之情遂起愛錢之意如來多諸方便令聲聞巡歷法空遂嫌住小之心有意希求作佛故言少時也言昔發大心等者潞云若如前釋十六王子時名遠熟近來生澁者何名成熟大志應說昔發大心退故名生隣近釋迦前生名近今般若會後菩提心就望前名遠由此得名成就大志不爾相違也言正與此同者即同下文悔過自責也言法華會等者長者恐他親族等不住付子財寶故集也如是集眾今付尚八千菩薩疑爾時會中新發意菩薩八千人咸作是念等尚不聞諸大菩薩得如是記有何因緣而諸聲聞得如是決又親情有言語長者勤苦積集得錢物時置得產業時兒子不在家及至分割錢物時便出頭來答長者云他是兒子在家時活計早成就也法中論世尊對眾分疎云爾時世尊知諸菩薩心之所念而告之曰諸善男子我與阿難等等字之中攝得四大聲聞也於空王佛所同時發阿耨菩提心阿難常樂多聞我常勤精進是故我以得成阿耨菩提等言命昔退大者今詳退姓側生之子也文殊普賢久遠成佛名親族言喻四眾者國王等配比丘等也言或如自名者意言若以國王配比丘等即是喻也若如自名即在法華會上韋提希子等言此即初也者初牒最初發心喻即自宣言等四句經文牒前譬若有人年既幼稚喻上論之恐彼親族等言長者先不言有子恐是他人詐付財物故自言也法中佛昔不說聲聞中作佛若不自說恐眾不信也問但言此是我子即得何要更言我之所生答簡去乞養兒子也又自宣言者經通五人說唯法華經是教菩薩法諸佛護念尚不令菩薩說故佛自說也最初了言某城者告子處也大乘教為城三根聲聞於十六王子所依大乘教發大乘心名住城中為長者之子後忽退大乘心不肯學名捨吾逃走馳流五趣名伶俜辛苦五十餘年此牒前捨父逃逝久住他國乃至五十歲也言伶音等等樂人之姓非此間義言猶聯翩等者如鳥羽翮未高乍昇乍沈或上或下飛不正貌或生人天如上昇或墮三塗如下沈如鳥聯翩也又聯翩者且如失群孤鴈孤獨之貌古歌云夜聞孤鴈獨聯翩窮子在五道生死之中更無伴侶故言孤獨一解了言切韻若行不正者問如何是窮子行不正貌答喻上說窮子逃走在他國艱辛衣裳不整身之貌行時不滿步坐則下行頭一脚高一脚低言行不正法中論五道生死道路危險生人天二趣如足高處生三途中如是路著沈也言又行不正者解與前同但是顯字別也二字言亦有本依跉俜者此是孤單之狀四了言或躡五趣者此合前來行不正義言亦作跉俜者亦是行不正貌言行不正者即同化城喻品險難惡道曠絕無人五道生死名險難惡道言或孤單辛苦等者合前第一伶俜猶聯翩也孤獨之貌前行經言其本字某等澄云其本字某者即受化之時稱謂也我名某甲者即施化之身影跡謨云喻上論本來名阿九阿七僧奴等長者改之名為兒也法中論若人若五趣不定我名某甲即是名為信解見至須陀洹等言中途既遇我等者牒中還見父懷憂推覔牒不肯修大化以二乘示大不希經言忽於此間者喻上說即長者門側也法中論即法華會上也故下自言今此寶藏自然而至上文言漸漸遊行遇向本國又云傭賃展轉遇到父舍言中間逢佛亦是等者中還見佛還談大乘法隨分修大即是佛子最初發心亦是其子二義相似略不合也言初逢亦子等者子義既同故略不說也言世世從化等者謂中還見佛世世從佛即前最初發心中有故故不別說言此初文也者此合前譬若有人二句經文問前疏解年既幼稚之十六王子時尚密說未廣修行名為幼稚此乃真子今合前又何言似子答疏言初教發心實住等故言似子若爾地前菩薩實住二凡豈名似子答由此但取二乘似於菩提名似子也問前言若言實住二凡位故名似子者何故下之我等昔來真是佛子而但樂小法等彼說昔來正指此段教發心位故答今詳真似各有多種一向不盡真中有三一具性真但有種性即名真子下文我等昔來真是佛子并地前漸悟菩薩二側生真即二乘通定姓不定姓隨其所應望異生位已狹一重真是佛子三正生真登地已去具二空智者似亦有三種一無姓似今此三界皆是我有其中眾生悉是吾子二住凡似雖已發心未起無漏今此疏言實住凡位并攝地前頓悟三定得似似者如也下言如佛子所應得者皆以得之依前真似可為四句一唯似非真即無性二唯真非似即地上菩薩三俱即具性真住凡似四俱非即佛也闡提外道有性無性隨其所應於前句攝言方知真佛子者前云今日乃知真是佛子今方為是真證比來是似也然前科簡真似各三此所引文今日乃知方名真子於前三真皆不相攝具姓是凡夫側生是二乘正生是地上此是何也今加一真云當得真即此如真佛子是言三苦者然此三受苦受樂受捨受八識之中七八唯行苦前五通三苦第六通一切言苦受自相者即苦受自體也三受中一受此出尅體言及順苦受者謂五根五境及此受相應心心所等俱是順此苦受如刀杖觸根時即生苦受問五根五境曰淨無記何名為苦答體是有漏故又漏心受故若爾行性何異答寬狹不同體亦無異即隨順苦受故名苦苦言五薀一分者以彼五薀通於三苦所以不得全取但取一分名為苦苦壞苦行苦各言一分准此應知金云一分者且色攝識薀七八非苦苦攝唯是無記捨受相應行薀有多法善十一不相應等非苦苦攝除此等外餘一分皆苦苦攝又除後二苦相應之薀及無漏五薀故言一分即根境是色相應四薀也言是苦苦性者若約行苦三苦無別問六境體是漏能有苦受故名苦三境亦是苦第八是苦受答緣之深取境極重者云苦樂俱第八任運緣輕微唯捨受此依眷屬體也言此苦即苦者對法云前四當體苦怨憎以來會更苦故名苦苦若爾現會事可爾後生等何名苦苦答性有漏故名苦有生逼故復名為苦苦爾壞苦應同答壞等初苦現壞方生不同此當體苦此苦即持業也言即八苦中等者對法云生老病死怨憎會名苦苦愛別離苦求不得壞苦五盛陰行苦非苦苦也上苦苦了言樂受自相應者此對法又從樂受至變壞位者此上皆是愛心所所緣所緣體壞名之為苦言於變壞位者約境名壞苦此樂等境愛心所緣由樂等境變壞之時能緣愛心而生憂惱苦受相應苦因壞而生故名壞苦牟云由樂受壞彼憂苦因壞而生名壞依主釋或能緣所緣俱壞俱苦彼所觀樂變壞名壞由有流轉故名為苦彼能緣心由前所緣樂境壞故受心變為戚似苦相現生憂惱故名為壞苦問准雜集云於變壞位能生憂苦名為壞苦即由有樂等境壞而生憂苦名壞苦也若爾如不還者已離憂惱樂等壞時既不生憂惱應非壞苦又下三禪樂壞之時亦不生憂亦應非壞苦由此對法且依欲界變初二果說樂壞生憂而名壞苦也言又由愛故等者攝云即被能緣樂愛心體亦名壞苦所以然者由壞於前無愛心已愛心方生故愛名壞即此愛心而是有漏體是苦故愛即是壞不同前解心境別說也今此心體即壞名壞苦問三灾壞時無情器壞如何得有變壞心生答有情在時知器壞名壞心生無失又壞種麤重色界三禪俱有不遮言捨受自相者潞云至麤重所隨連讀可知矣意言重顯前二苦種子名麤重或無堪任性硬澁性故即麤重隨逐捨受令捨受遷謝名為行苦言或於一時者澄云以彼行苦通於三界若是欲界行苦即有苦苦所隨若色界中三禪已下所有行苦即有壞苦所隨問如何名麤重所隨答以苦苦壞苦有種子現有硬澁性無堪任性之所隨逐令捨受亦成麤重言一時者大論云隨在苦苦時如地獄中等或隨在壞苦時如三禪等彼三種子隨逐現行今取能隨逐種子上立此行苦也此據賴耶相應捨受為六識苦樂二受之所映奪所隨逐故名不離前二又六識中相應捨受雖間苦果亦不離前二以苦種子及無堪任性與捨受自相恒相隨故名為不離若二現行受捨受有間斷故與捨受便離不依辨苦言所隨逐者即二苦現行不起之時即此種子說名行苦此依捨受以辨行苦也言不唯捨受者此簡異前二也謂前二受皆唯當受自體五薀一分此通五薀皆行苦故言如唯識第八等者十七門中第十四三苦分別彼云十一少分壞苦所攝老死位中多無樂故十二少分苦所攝一切支中有苦受故十二全分行所攝諸有漏法皆行苦故若依三受立三苦者依捨受立行苦此即校此依實若諸經論隨彼相增所說不定即如唯識等有二說一全體多分攝三苦即有漏法皆名行苦名全餘二不名多分二相顯多分攝三苦即捨受俱支等名行苦行苦名相顯餘二受苦名多分疏中會彼緣起經中但初果時以辨二苦伽十地通因果辨名諸文不同也意說有有漏行苦及捨受行苦二類不同言窮賤心者解經中心大歡喜言著弊欲者問三乘皆有善法欲如何名弊欲答一種起欲何不希望大乘既拙好希望小乘名弊欲言觀根未熟者解經便見縱捨究竟不捨且捨名縱捨即同七縱七擒昔見根未熟且縱令入二乘今既根熟即取佛無不擇捨也言不分明為我等者此約四十年前若更久遠世世已曾從佛受化故言佛無不擇捨等者二乘之人不簡擇捨佛無此事擇而捨之未熟者捨之已根熟者捨之已根熟者受之言以方便力說如來者此約說權方便之時意中擬顯如來智慧而須菩提等實不知也言此說般若等者問何名加持答有二說一如來三業加持須菩提教般若二云如來三業身業令無掉動加持口業四辨七辨等說法有情諸加持意業令不愚法解了大乘也如來智慧加被須菩提謂菩薩說大般若有二意一憶知大乘理甚深不思議二兼資熏自身中菩提心種子令漸成熟如㚷母餘而多分兒喫少分自入自家咽喉也言隨我等輩者亦本言我隨等輩牟云隨我為正言不分明為我者佛隨須菩提等樂聞小乘即正為菩薩說不正分明為說汝有佛分所以不希也經言今我等方知世尊等者即同諸品如來有大慈悲無諸慳恡又云大乘平等法若以小乘化乃至於一人我則墮慳貪等言鄙恡者若惜作𠫤單作今既當句之中已有惜字應從心傍作也鄙恡與惜別也言昔時毀者意從迴向大也言今此本言等者當日造疏時所見經本二本不同最初時一本云說於大乘今此經中二本云於此經中說大乘法於此經中今此經中義勢相似也經言是故我等說本無心有所希求者結首不希今法王大寶自然而至如菩薩所應得者皆已得之決定此結今得言菩薩所得一乘等者令二乘人聞經迴心求大乘如彼菩薩所得無異菩薩昔時初發四弘誓願究竟取無上菩提如二乘人迴向心究竟取無上菩提無異也澄云一品言大意者昔種菩提從生為生現無大解失念貧窮父子情乖肝膽胡越子之失父橫沈分段之中父之失子竪超變易之外是以伶俜五道馳騁四方往返遊行以求衣食或心向理遇到父城解性既微住居門側良由根小情局逆懼王使之威旨達教深未可投之淺器是故如來脫珍御服隱三德之常身著弊垢衣示無生之四智然則小心易足一日之價為多大志難成億劫之因尚少將己所得與佛齊功可謂陪墻之擬須彌牛跡方守溟㴾此乃遠之更遠其之又云不可以智知不可以識識是故誘引小心於鹿菀成大行於靈山委宅而付珍財領權而蒙授記則此品之大意也第六徹疏七云四人同領頌獨標等者問長行品初四人並烈爾時慧命須菩提等今頌中不言四人唯迦葉者何答疏言年最大故問前四人同聲領述皆言我等居僧之首年並朽邁如何此間言迦葉獨自最大耶答亦不妨前四人就五百千二百中最大今言最大者此就四人中唯迦葉最大故不妨也以此義故都有三義第一說偈不妨四人總說今偈中唯舉迦葉者最大故第二四人中餘三人總不說偈唯迦葉說偈者敘眾意故第三解四人不妨同聲說偈空言迦葉者影彰餘人亦說偈故言初一頌半述聞法得記二乘事者長行云我等今於佛前聞授聲聞阿耨菩提記心甚歡喜得未曾有不謂於今忽然得聞希有之法頌云我等今日一行領前火宅喻也佛說聲聞得作佛并領初周千二百羅漢悉亦當作佛并鶖子授記也無上珍寶不求自得述長行深自慶幸獲大善利無量珍寶不求自得四句經路府科言此初也初半偈最初者長行云譬若有人年既幼稚偈云譬如童子幼稚無識喻上說童子幼小故無知識法中論大心初發故幼稚無明所覆故無識言第二退流等者長行云捨父逃逝久住他國或十二十至五十歲偈云捨父逃逝遠到他土周流諸國五十餘年長行言他國頌中云諸國疏解諸國總名他國言長行有三一子長還國年既長大加復窮困下至遇向本國二父先求覓其父先來求子不得中止一城下三子遇到城時貧窮子遊諸聚落經歷國邑遂到其父所止之城言今唯頌父覓子等者餘二文入後偈第四段不肯修大喻中一處明文穩便故問何名穩便答若以文從義科即合屬此唱因父向他國裏築城住覓子其父憂念四方推求方有子長還國子遇到城准義合屬此唱若以義從文科即令屬他後唱文勢相承也因有而年朽邁益憂念子之次子遂到城來便有爾時窮子求索衣食從邑至邑或有所得或無所得已下子長還國子遇到城文勢相接故名穩便也言此中四者就文先推覓中長行有三求子止城其父先來求子不得下二資財甚眾其家大富財寶無量下三客利豐廣出入息利下今偈中有四段加往來者眾經其父憂念其父二字述前文義也憂念者慈悲深故述前子之義言劬勞示相者但六返觀眾生八相成道總名劬勞既疲者二萬佛時將大乘教化三根聲聞不肯修故云既疲也頓止者不是停息義但是止住也却向生死中止住大乘城也言資財甚眾者長行有七八一寶聖財其家大富倉庫有為無為僮僕調伏煩惱臣佐方便善行吏民妙類及力象馬五通牛羊八萬四千行今加輦輿五欲二造立舍宅五欲自娛此二句偈文有長行無有無不同也田業等者即前倉庫疏配智斷人民即臣佐吏民也言造宅者有二說一者空理內證利狹如舍慈心利外化寬如宅智處空理如人在舍智處慈心如在宅也有為有作故說為得經言造立舍宅即起慈悲名造問依何教文耶取無為為舍答准無垢稱經思空勝義舍言或造者起也者疏意舍宅不別宅即是舍謂是慈心有為法也問何故作第二解答顯宅舍不別也言五欲者五種者簡要一因樂與樂為因二自性樂樂受自體故為自性三苦對治樂謂因寒熱飢渴等事暫息或時生起樂俱時之慧四受斷樂謂滅受想定五無惱害樂此有四種一出離樂出家之人二遠離樂生上界者三寂靜樂謂涅槃四意法樂謂菩提言或淨法界者即清淨法界四智心品謂無漏皆樂故言輦者真諦者古時天子所乘五通凡麤重乘也今時天子乘餘人不乘也疏眾意同事將真諦如輦法王所乘也輿同俗諦諸人共乘長行無偈有文也言田業者智斷二德略無恩田也經言出入息利等者出生死名出有利也入者入生死教化眾生名入有利也自利名入利他名出又入覺佛法名入利也外化眾生名出利真俗談教如財佛是王如坐賣買客三乘聖眾如商人於淨土之中去名入利得六波羅蜜教住三界市教化眾生名出利如商人行賣也化得眾生發心如利頭也言通四方之珍異者解行賣坐賣行坐賣皆名客故言通也言行其稅利者如斥人稅取其利入官入私菩薩遍遊三界教化眾生令發勝心得利皈佛也言往來者多者此一段長行無偈中開出此一段文長者大富以千萬億眾圍繞恭敬常為王者為由得也平呼常得天子愛念喻上說有人得天子愛念由此譬法皆共宗重以如是因緣往來者眾法中論化周十方三世諸佛名王者愛念也言豪族等者大菩薩等宗敬於佛也有大力勢者神通也言父恒念者長行分二初捴思念父每念子與子離別五十餘年後別思念別思念中二初念付財自念老朽多有財物後念已示復作是念我若得子委付下此間兩偈但亂述前文更不依次第經言而年朽邁述前念付財中自念老朽也癡子捨我五十餘年言庫藏諸物當如之何述前付財中多有財物金銀珍寶倉庫盈溢有無子息一旦終歿財物散失無所委付言益憂念子夙夜唯念死時將至述前長行但自思惟心懷悔恨言年邁益等者喻上說老人秊老恐財物無人委付多愁易老憶念子心轉深法中論如來成道既久慈悲轉深也言夙夜惟念者章云引爾雅夙者晨也早也晝日名夙即六返觀眾生瑜伽三十八云由是如來晝夜六時晝三時夜三時常以佛眼觀察世間誰人未發心我應令誰未起善根而起善根乃至令誰速應建立阿羅漢言初一頌半遊求者長者正思念之子次遂到來此間偈言爾時窮子求索衣食至國等文勢相承故此間兼述向前子長還國子遇到城文彼中還見佛中文云以求衣食此述云求索衣食前云馳騁四方至遊諸聚落此云從邑至邑等經言從邑至等者從人天至三塗地獄出沒或從人天入二乘往來名從邑至等在人天中持齋持戒一日一夜在二乘中修行少善名有所得退流生死躭荒五欲名無所得言有長行已解者即說法如國神通如邑也言有所得等者雖遊國邑並佛法中有云外道非也更前云入佛法訖此但是佛法中惡人懸羊頭賣狗肉冷茶法元來不止真實善友者朋友長我智慧相引求其勝法也牟云遇大乘名真實二乘名虗假金云有五重一內心起不善無記名無所得善心即有所得二約境緣五塵即無所得緣三寶即有所得三約果說求人天心即無所得以果報究竟不實故求三乘即有所得四約心發三乘心無所得求大乘心名有所得五約教說聽三乘教即有所得聞俗書外道即無所得牟云未聞外道教配無所得非也前來聚落以是三乘內道何況今至父城言困到也者此述長行遇到父門兼述第三段子長還國子遇到城彼處經言時貧窮子遊諸聚落此間述云漸次經歷彼云遂到其父所止之城此偈云遂到父舍前喻到城總望大乘也此中別約中道大乘名舍也前云加復窮困此云飢餓羸瘦也言或起惡見等者紀國云慧身不具起惡見為瘡戒身不具犯小罪癬惡見即不正見也問何名瘡癬答瘡深深徹肉至骨癬即淺不損彼肉皮上有癬也問准前長行說佛法為城今云何得有惡見答此惡見不是撥無之邪見前云歸國說言妄生見解者妄生見解如瘡不專持戒如癬癬即皮肉不損皮上生癬犯威儀不整掉臂跳行如癬也但知正見雖然戒壞却有續時若見壞不可續也更言不專持戒不是總不持但少分持也前來不專行行名門側今此不專持戒戒上有癬也言所見父相者長行有七一見父安坐遙見其父踞師子床寶机承足二貴賤承奉諸婆羅門剎利居士皆恭敬圍繞三嚴餝身體以真珠瓔珞價直千萬莊嚴其身四臣佐供衛吏民僮僕手執白拂侍立左右五莊嚴外物覆以寶帳垂諸華瓔香水灑地至羅烈寶物六出財產即出內取也七結類尊高如是等種種嚴餝等今此二偈半述所見父相也一施大寶帳述前長行第五莊嚴外物中覆以寶帳也不述垂諸華瓔香水灑地散眾名華等也二處師子座一句述前第一見父安座中踞師子床也三眷屬圍繞一句述前第二貴賤承奉四諸人侍衛一句述前第四臣佐供衛也或有計算等長行所無也或不妨計算二字述前羅烈也羅烈金銀寶物述前莊嚴外物中羅烈寶物也出內財等二句述前第六出內取與牟云若依此配不述第三嚴身體真珠瓔珞價直千萬莊嚴其身亦不述第七結類尊高有如是等種種嚴餝威德特尊云云言理居等者問何故前言佛身出門外此間言門內耶答疏言理居等佛身功德是教下所詮理收故言門內也果從因行中得名果在內若佛身出生死生死為因因名為門佛身是果名出門外今佛身既却入生死中教化來即是却入在因門內來故言門內也言昔望生死名在等者教行為入涅槃門從因門入來故言門內如寺前師僧師僧出向外去名出門也向外俗人等寺中來名入門所望不同也通難亦同問何故前品云今在外門此中言門內耶答疏言昔望生死言計算金等者即是天親菩薩諸大羅漢等造論解經分別計度法數有為九十四無為有六名計算也言出內財等者金銀寶物內財產即是所詮二利功德言注記券等者金云以教行為券也如世間人以契券徵取財物唯券而得金今依教得理依行得果故以教行徵彼理果故言券也疏者疎也條道理割折是非也言注者十里反註也與韻同音正是此中義有云之戌反水注也非此中義言見已却走者前長行有三到父門明見父明却走却走中有三一悔來窮子見父有大力勢即懷恐怖悔來至此二起念竊作是念此或是王或是王等三却走作是念已疾走而去今偈中又有兩段述前長行三文初一偈半述前悔來兼述前起念中此或是王或是王等次下有二偈却走經言覆自念言我若久住或見逼迫強駈使作此兼述長行若久住此或見逼迫等文是言此初也者悔來也長行云窮子見父有大力勢即懷恐怖悔來至此經言窮子見父豪貴尊嚴者聞教中說化身淨土功德名見父窮子見父不識緣近來富貴與舊全別法中昔為王子今作佛身故別也長行云有大力勢即化身淨土功德也此偈云豪貴尊嚴是謂國王天子也若是王等天子兄弟即諸王也或是法身或是報身也言却走者長行起念中云竊作是念偈中云覆自念言也長行云若久住此或見逼迫強使我作今偈云強駈使作長行云作是念已偈中云思惟是已長行不如往至貧里肆力有地偈云借問貧里欲往傭作傭作與肆力不別也言父令急捉者長行有三一見喜時富長者於師子座見子便識心大歡喜二念生即作是念我財物庫藏今有所付至由故貪惜三令急捉即遣傍人急追將還爾時使者疾走往捉今偈中唯述兩段文不出二念生文也偈云長者是時在師子座遙見其子在資粮位為凡夫聖位遠故名遙見其子默而識之者知是十六王子時所化眾生即勅使者大乘教名使者捉將來抑授大乘也言子憂惶者長行有三一子驚懼窮子驚愕稱怨大喚我不相犯何為見捉二使逾急使者執之逾急強牽將還三子悶絕于時窮子自念無罪而被囚執此必定死今一偈半總述長行三段又窮子驚喚述前驚愕心口不伏修行大行名驚喚也退大不修頓住生死之地名迷悶躃地是人執我者大教中教我捨頭目髓腦剝皮為紙刺血為墨名必當見煞何用衣食者不用大乘功德何故使我至大乘中修行言不述初二者教發權心彼興小意兩段文也且教發權心者長行云父遙見之而語使言不須此人勿強將來以冷水灑面令得醒悟莫復與語二彼興小意者窮子歡喜得未曾有從地而起往至貧里以求衣食不述此二文唯述令修脫分已下經又言初中後二者令修脫分長行有二初密遣二人後二人依教今唯述初文不頌時二使人即述窮子已上初中有三一密遣二人爾時長者將欲誘引其子而設方便密遣二人形色憔悴無威德者二令傳語汝可詣彼除語窮子此有作處倍與汝直窮子若許將來使作三擬問答若言欲何所作便可語之雇汝除糞我等二人亦共汝作今偈中疏科唯述初遣及第二傳語無第三文也就此傳語中述除諸糞穢兼有擬問答意也經言長者知子愚等者紀國云不識大故愚癡但求小故狹劣不信我言者不信實教不信是父者不信實身即是不信大乘教及所詮理也長行云將欲誘引其子而設方便今偈云即以方便更遣餘人者二乘教是大乘之餘名餘人也長行云形色憔悴無威德者偈云眇目矬陋無威德者言為二乘人說安立諦觀等者疏主章中初世俗諦亦名假名安立後三真亦名有相安立第四勝義勝義亦名廢詮談旨無別相唯非安立自內證故然三乘四諦淺深不同聲聞四諦者第一世間世俗諦所謂安立世間瓶盆車乘我有情等此中唯所執實我不取實法不障彼故第二道理世俗謂所安立三科體事聲聞多作三義觀故三證得世俗謂所安立四聖諦理依此加行修證得故第四勝義世俗為所安立生空真如依生空門證真如故世間勝義者三科等法道理勝義者四聖諦理證得勝義者生空真如勝義勝義者謂安立生空無我廢詮談旨即一真法界獨覺四諦者與聲聞所證所執體雖無異根有上下信有淺深故成差別第一俗者與聲不別第二俗者所謂安立十二有支流轉等法獨覺緣此為境故第三俗者謂所安立十二有支雜染逆順及淨順逆因果等七十七四十四智等故依此加行修行證得故第四俗者謂所安立生空真如第一真者流轉有支第二真者雜染清淨順逆等觀第三真者生空真如第四真者謂非安立生空無我廢詮談旨一真法界上兼下故三科解脫亦有四諦下不兼上流轉還滅七十七四十四等智除大利根非餘聲聞所行境故菩薩二諦者初俗所謂安立瓶盆軍林我有情菩薩通取寶法障自果法第三俗者謂所安立十六善巧菩薩緣此十六善巧為境除法我故辨中邊云謂薀處界緣起處非處為無為瑜伽云六者即十中前六也第三俗者謂所安立三性三無性唯識妙理緣此為境而證得故第四俗者謂所安立二空真如菩薩雙證二空如故前三真即後三俗第四真者即非安立二空無我廢詮談旨一真法界今言為二乘者即所烈二乘八諦是有此差別故置為二乘之言也言無法身功德者唯識云在二乘位但名解脫身在大牟尼名法身故言此傳語者長行云徐語窮子此有作處今偈中上二句傳語云汝可語之云當相雇下二句兼述擬問答中意長行云若言欲何所作便可語之雇汝除糞今偈中云除諸糞穢倍與汝價當得二乘無漏功德勝過人天善根名倍汝價也言子遂依行者長行云爾時窮子先取其價尋與除糞前長行彼與小意中窮子歡喜得未曾有今偈云窮子聞之歡喜隨來為除糞穢淨諸房舍問何名為除答雖自斷惑因彼如來方行二乘行名為除也又房屬長者宅屬如來經言先取其價尋與除糞者先所聞思二慧折伏煩惱之糞此在五體心觀等位言一頌心傷者長行云其父見子愍而恠之偈云長者於牖常見其子念子愚劣樂為鄙事此二句正釋心傷也言此身近者長行分二一見子長行云又以他日於牕牖中遙見其子羸瘦憔悴糞土塵坌汙穢不淨偈云於是長者著弊垢衣執持糞器往到子所二身近長行云即脫瓔珞細軟上服嚴身之具此上偈文不述也唯述更著麤弊垢膩之衣至除糞之器偈云於是長者著弊衣等言總與語等者長行云狀有所畏語諸作人汝等勤作勿得懈息以方便故得近其子今半偈述方便附近語令勤作言後別與語教示者長行有三一不令東西後復告言咄男子汝常此作勿復餘去當加汝價二隨須即與諸有所須三假稱父子我如汝父勿復憂慮所以者何我年老大今偈中唯二偈述前別與語教示三段文中唯述兩段即是隨須即與假稱父子亦兼述不令東西中當加汝價一句餘並不述也一偈半隨須即與後半偈假稱父子且隨須即與者長行云諸有所須盆器米麵鹽酢之屬莫自疑難至安意今偈云既益汝價述前不令東西中當加汝價也問既言述長行長行無足油何故偈文與長行不同答長行有之屬二字含得多義故云足油飲食薦席盡向之屬之中含得也長行空言米麵即以納生此言飲食充足即與熟食也并塗足油者三藏和尚西國風俗不如此間彼國闘則乘象言多譬喻行步塗跣至洗足洗足多故事須塗油也當日法華經向西國說所有之事故言油也言今言足等問何名足油答此有二說一云欲勤心觀名因禪定為果亦此欲勤心觀是足是因因足有四名四神足二云修定之時事須得欲勤心觀此欲勤心觀但解四義未正名足是之因今取四禪根本定正為足也神通為果言油謂八斷等問何名足上油答即八斷行也一則滋潤於禪定二能除定障喻如油三能去風痺八斷行者能除定障得斷行名言即欲等者列名也一欲三乘皆有善法欲修定時事須於先起希欲心二修定之時先須得精進能除懈怠滿善為業三事須得信信以心淨為性若於實德能三不起信因何得定由有信故所以得定也四輕安調暢身心安和適悅正是定相應法五正念明記前境能除妄念也六正知能除愚癡正知是慧簡不正知七思能䇿心思量觀察八捨云何為捨答精進三根令心平等正直無功用住為性對治掉舉靜住為業二行相者金云引雜集論四神足以五門建立一所緣境即定心所緣或小或多種種神變事二神足體謂三摩地三神足助伴謂勤欲心觀四神足修集謂八斷行五神足果果中有三一通達果即真俗二諦二神足果即六通三功德果即四無量然此八德名八斷行也簡要依對法十二總攝八斷以為四例一加行攝三謂欲精進信二攝受攝一謂輕三繼屬攝二謂正念知四對治攝二謂思捨言初三為加行者以欲精進信而為次第若以義正之即令信為欲依欲為精進依初修定時先須有信既信之後發希欲心從此已後策勤精進故此精進正名加行信欲二種是精進依相從而說亦名加行攝受有一謂輕安輕即攝受安即攝心身心適悅故能修定故名攝受言正念正知者即繼屬攝二者正念正知由正念故攝錄身心心所不遊諸境此念有二功能一不忘所緣二安心一境二正知者有放逸生能如實知由念攝錄於心能引於定故名資潤於定此正念名繼屬正知相助亦名繼屬也言不忘所緣安心一境解念上功能有放逸生如實知故解正知上作用也言思捨等者對治攝二謂思捨二法言䇿心持心二種力故者則云䇿心謂思惛沉起來令心丈下事須䇿令不下也持心謂捨掉舉起來令心高舉捨能持心令不高舉也簡要又云或思能䇿心雙離沉掉捨能持心亦離沉掉故名二種力也由前思遠離起沉掉所行以捨寂靜而住也言如去風痺等者疵疪音同脚冷漺病爽音障染者即上所言五種過是也於中沉掉忘念不正知並是隨惑故名染障染如風痺斷如油能除冷風八斷能除染障言或足謂戒者第二解也滋潤名油足是戒也戒為諸行之足故四分律云譬如人毀足不堪有所涉毀戒亦如是婆沙云尸羅名足能資善趣至涅槃故言油謂六支受學等者雜集云云何成尸羅答能受持淨尸羅故初受名受受已防護名持二俱受學處者白四羯磨等名具受也二百五十戒等名學處皆能受學三善能防護別解脫律儀者別防護身語七支防身語惡色不起名防也防護淨戒令無缺犯者名護也解脫是所求果為求解脫別別防護名別解脫律儀四軌則圓滿者三千威儀八萬細行名軌則進正安庠如軌則悉皆圓滿五所行圓滿者遠離五種過諸比丘所不應行一唱令家有人犯法將此罪人巡歷郡邑叫唱令人普知故由習此事佛不交過二婬女家三沽酒家四旃荼羅此云執惡亦名屠者五羯恥羅此典獄獄卒也六見微細罪起大怖畏為於小罪生大怖畏勿輕小罪以為無殃云云具此六種令戒端嚴一切善法因斯增長故此六種與戒為油塗戒足也言滋潤戒者此餘六支得名油義問六支即戒何得名油答賴六具足戒學圓滿故得油言法食既充者即經云飲食充足即長行盆器米麵鹽酢之屬今加足油薦席二也無貪等者三法相重解原義也言無垢稱云等者問依何經教靜慮為床淨命為茵蓐答疏云無垢稱等四靜慮為床因定發起無貪嗔癡如床上展蓆此無貪嗔癡為能發所發三業相重為茵蓐言淨命即是無貪等者潞府此解未詳理合無嗔癡所發身業名正業無嗔癡所發語業名正語無貪嗔所發意名淨命合此三種能發名薦蓆所發淨命名茵蓐也若爾正語業二亦是所發名茵蓐否答經雖不說理取不違言獸所食者莊生云人食蒭秦麋鹿食薦蝍蛆甘帶鵄鵶嗜鼠故知獸所食也玉篇子電反說文獸所食草也古有人神以薦答皇帝曰所食何處對曰食薦草夏居水澤冬處松柏今謂應以薦草為席也前云麋鹿食薦者說文應蟹食也山羊一角古今不直人犬買反有或從蒙今御史所著冠是亦通治蟻反今取於草緣外國進獸來時人不識與種種物草不喫後與薦草方喫獸因草得名名薦獸也言又床薦等者薦藉也子應反坐草曰藉相假藉也言詳石者誤也牟云詳亦反言懎亦反藉也寂同言假稱父子者長行云我如汝父勿復憂慮偈云如是苦言汝當勤作問長行都無苦切之言如何偈云苦言答更增加功價又應所須何不得勤作諸事業再三苦令名曰苦言以子誘之名軟語即是佛愛語羅睺也若如我子此在見道前名如如由似也若入聖已去名真子也言便成聖位者長行有三初入聖即時長者更與作字名之為兒入見道二住修道爾時窮子雖欣此遇由故自謂客作賤人由是之故於二十年中常令除糞三成無學過是已後心相體信出入無難然其所止猶在本處今偈云長者有智漸令入出經二十年執作家事此偈中略無見道不述也唯述無學位經云長者有智漸令入出得二乘果述前長行過是已後心相體信入出無難然其所止猶在本處此五句即無學文下二句偈云經二十年執作家事此談彼無學之人住修道事似果上說因也經字者即是經過經歷已經見道過修道也所以疏意云文中唯有學無學者以疏意言經過之義今即令入出昔曾經二十年等為有功故後乃示其金銀等言無學也以有二十年言故云并修道連下文長讀易見也二十年者聲聞十法行十業道為二十又修道之中加行伏十惑無間道斷十惑為二十又聲聞斷五下分五上分為一十緣覺斷五下分為二十言影彰見道者疏意唯說無學謂有二十年言兼彰於修道今者以後影前故言影顯也若權言之唯言修道文言漸令入出若至無學文何漸令故言過是已後等前云入學佛法出利眾生無怖無染故云入出無難直說無學今云漸令故云修道也證云前長行云即時長者更與作字名之為兒已下是便成聖位此文是即入見道位爾時窮子雖欣此遇於二十年中常令除糞者顯入修道過是已後心相體信即入無學道今此偈中唯後二位為道無學道雖無見道影顯亦有也今既不述文中略故今不述見道也言示大不希者長行有二初示大後不希世尊爾時長者有疾自知將死不久語窮子言我今多有金銀珍寶倉庫盈溢其中多少所應取與汝悉知之我心如是當體此意所以者何今我與汝便為不異宜加用心無令漏失後明不希爾時窮子即受教勅領知眾物金銀珍寶及諸倉庫而無希取一飡之意然其所止由在本處下劣之心亦未能捨今二頌述前長行初一頌述示大不希示大中述標文不述所以者何今我與汝便為不以下釋文初偈示大者經言示其金銀至令知者般若會上初說八部般若有為無為畢竟空等名示其金銀故名示大者後一偈不希者經言猶處門外等者四大聲聞將心由自戀自乘涅槃故云猶處門外止宿草菴言止宿草庵者小草舍有作菴菴䕡草作舍也廣雅云庵舍也小屋之名也言第二段有七偈顯今獲得者長行有二初父付後子獲前文付有二初知時到者經云復經小時父知子心漸已通泰成就大志自鄙先心後集付分二初命集經臨欲終時而命其子并會親族等後正付後正付初牒首後告今且牒首者即自宣言諸君當知此是我子我之所生後告今經忽於此間遇會得之此實我子我實其父今我所有一切財物皆是子有先所出內是子所知今偈中分二初五偈父付後二偈子獲且初父付中分二初一偈半知根集族後三偈半正付家事且知機集族者長行云父知子心漸已通泰成就大志偈中述云父知子心漸已曠大欲與財物三句述路云初三句述前復經少時父知子意漸已通泰成就大志自鄙先心等知根也後三句述前臨欲終時而命其子并會親族等集眾也漸已曠大者漸已根熟欲與財物者與諸大乘集族者長行云即會親族國王大臣至皆悉已集偈中文殊普賢觀音勢至十五類徒眾名即聚親族國王大臣剎利居士也或國王喻梵大臣喻魔剎利喻沙門居士喻婆羅門或如自名國是國王大臣剎利居士皆如自名也言三頌半正付家事者長行正告中分二初牒昔後告今牒昔中有三一牒最初發心喻經即自宣言諸君當知此是我子我之所生二牒退流生死於某城中捨吾逃走跉𨂲辛苦五十餘年三牒餘四喻經言其本字某我名某甲昔在本城懷憂推覔章敬云其本字某我名某甲牒中還見佛喻昔在本城一句牒不肯修大喻懷憂推覔一句牒化以二乘喻示大不希喻也今頌三頌半二頌述前正告中牒昔後一頌正付文初有四一初半偈牒最初發心喻經云於此大眾說是我子此半偈述前長行即自宣言諸君當知此是我子我之所生此四句經文敘最初發心喻二有半偈退流生死喻經云捨我他行經五十歲述前長行於某城中捨吾逃走跉跰辛苦五十餘年四句經文也半偈化以二乘喻經云自見子來已二十年言或在人天彼等者安國云人中天中各修十善業道名二十年言或在者加行伏十惑無間斷十惑名二十年也言或斷等者聲聞斷五上分五下分名一十緣覺斷五下分五上分二十言或說等者路云得有學無學果各修十法行名二十年也上化二乘了言一頌昔退大等者一頌三个喻經言昔於某城而失是子周行求索遂來至此牒中還見佛喻不肯修大喻示大不希喻言一頌正付者經云凡我所有舍宅人民悉已付之恣其所用述前長行告今父長行云忽於此間會遇得之此實我子我實其父今我所有一切財物皆是子有先所出內是子所知言子獲者長行云世尊是時窮子聞父此言即大歡喜得未曾有而作是念我本無心有所希求今此寶藏自然而至今偈云子念昔貧志意下劣領未迴心時也亦同前長者知子愚癡狹劣今於父所大獲珍寶珍寶者大乘功德名珍寶今日靈山會上聞說聲聞作佛名於父所大獲珍寶昔日得二乘果一日功德不名為寶也言有為功德等者問何名珍寶答疏言有為等言無為真如等者何名舍宅答疏言無為真如等意言菩薩慈悲心名舍宅智證真理如人在於舍宅即同經言思空勝義舍智處慈心如人在宅也言識達本識未迴心前不知有第八識今迴心來領知第八識因中為火宅體勸出又領果中轉本識成大圓鏡智勸入或便知一切眾生第八識皆如來宅天子以四海為家佛以眾生為家宅今悉已領得言及獲寶等者解經中一切財物等三句也今日靈山會上聞道聲聞作佛恰似無量珍寶不求自得承前有亦未曾有得亦未曾得名得未曾有也言不合中還見佛等者今頌中唯述示大不希合餘五段不述准前疏意中間逢佛亦是佛子初逢亦子故略不說言前長行中示大不希有三者初知我樂小不正為我說故不希長行經云然世尊先知我等心著弊欲樂於小法便見縱捨不為分別汝等當有如來知見寶藏之分今偈云佛亦如是知我樂小述長行中然世尊先知我等心著弊欲樂於小法偈云未曾說言汝等作佛二句述長行中便見縱捨不為分別汝等當有如來知見寶藏之分次一行述便見縱捨不為分別汝等當有如來知見寶藏之分次一行述長行中樂於小法經云而說我等得諸無漏成就小乘聲聞弟子得生空無漏成阿羅漢故我不希也言下有八頌頌第三等者長行云我等又因如來智慧為諸菩薩開示演說而自於此無有志願所以者何佛知我等心樂小法以方便力隨我等說而我等不知真是佛子經言最上道者最上成即佛道也言佛三業等者佛三業加被須菩提等為菩薩說般若意欲令彼漸悟修行聞法資大乘根不分別說汝有佛分名密勅也世尊四十年前不說二乘於佛菩提有分我早不希更處會中毀責聲聞我所以不希也言諸佛等者問釋迦一佛與菩薩授記何得言諸答釋迦一佛說法與諸佛同故釋迦一身亦得名諸二唯論一眾生共多諸佛有緣多佛共起一个化身亦如丈六釋迦一个化身中多化身佛釋迦一佛亦得名諸三菩薩過去逢佛說法教化亦得名諸也言下第三有十等者長行云世尊以方便力說如來智慧我等從佛得涅槃一日之價以為大得於此大乘無有志求今偈中十行半述且初二偈標自己滿足故不希者四十年前總說解脫我已得訖自謂滿足故不希今日聞道汝所得涅槃是不究竟如彼化城所以知是不實所以知是不實所以迴心忻趣也言內滅等者菩薩兼濟眾生故內外俱滅二乘之人但滅自惑不滅他惑故名內滅也或內證人空之理有餘涅槃名內滅滅理與疏同了此涅槃以為究竟所以聞淨佛國土教化眾生事不希也言初三頌半於佛境等者潞府初二偈於佛境後一偈半於佛智也牟云准般若經對如來說理智俱名佛境智不必境與智別也言初二頌偈等者所以者何一切諸佛皆悉空寂空觀也無生無滅無大無小無漏無為無相觀也如是思惟不生喜樂二句結上二觀空無相也作滿足心故不希也須菩提觀二乘體本來不生體既是無生復何有滅名一切諸法皆悉空寂言二我既無等者我及我所非人法二我也無大無小者謂於真境無大可欣無小可厭也無漏無為者觀真境時心與境冥理與神會不見能證智所證理所以疏言觀諸法空空觀即是體一切諸法皆悉皆寂也言捨離貪著等者一行半述無願經言我等長夜至無復志願一行此無願觀也而自於法謂是究竟二句結於無願觀向上不希也言遂於佛智等者佛本來交二乘觀苦集因果有為向上不貪求二乘之人遂於佛身無漏有為向上亦不願求此錯悟解大乘觀行則不如此前疏言二既無有即是我及我所也問大小乘明空何異答四解一大乘教中明人之與法本性智空空義則廣小乘法中但明人空未顯法空空義則狹二云小乘法中但明三界內空空義則短大乘教中明三界內外一切皆空空義則長三云小乘之人但見於空不見空空義則偏大乘菩薩見一切空及以不空空義則正故涅槃經師子品云初聲聞緣覺見一切空不見不空不行中道故不見佛性智者見空及與不空故名中道名為佛性四云小乘之人滯空則皆於存人有則失於空即是取捨之心斷常二見空義不中古德偈云若有所受法即斷於斷常大乘菩薩不壞假名而說實相即有而常空不動真際建立諸法即空不滯有心既不著有無遠離斷常即是中道正觀空義中謂於真境無大可忻無小可厭觀真境時心與境冥理與神會不見能證智及所證理經言我等長夜修習空至有餘涅槃者意道得有餘涅槃迴心向大名報佛恩也言驗文意者意言得有餘涅槃迴心向大非如古師得無餘涅槃再起迴心無此道理若入無餘何名報佛恩此說不定姓也經言道師者佛也見大根未熟且捨令修二乘也言非曾不勸者十六王子已教大乘心二萬佛時曾受大乘化疏約今生已來未曾觀也非前前世不觀也言下有十偈合今獲得者長行喻文云復經少時父知子意漸已通泰成就大志自鄙先心臨欲終時而命等長行合文有三一知佛不恡大乘故得經云今我等方知世尊於佛智慧無所恡惜此上標經云所以者何我等昔來真是佛子而但樂小法若我等有樂大之心佛則為我說大乘法二知佛唯以大乘化故得今此經中唯說一乘而昔於菩薩前毀呰聲聞樂小法者三結領今得是故我等說本無心有所希求今法王大寶自然而至如佛子所應得者皆已得之言初三頌法喻者今三偈總述初段文此中小意述前而但樂小法已上文此中大意述前長行若我等有樂大之心佛則為我說大乘法今偈中經云如富長者知子志劣以方便力柔伏其心此一偈初小也經云然後乃付一切財物半偈真實也此上一行半喻了也言一頌半法者經言佛亦如是等一行初小也經言調伏其心乃教大智大也言下七偈明今獲得者長行經云今此經中唯說一乘而昔於菩薩前毀呰聲聞樂小法者然佛實以大乘教化是故我等說本無心有所希求今法王大寶至所應得者皆已得之言初一頌半總辨者經云我等今日得未曾有得亦未得有亦未曾此上一偈法也如彼窮子得無量寶半偈喻也言初一偈總辨先得果者經言世尊我今得道至眼者簡要問須菩提仍未入十信初位如何乃言得果體答得大乘教名得果體或據當得名得或得之因故言後二偈今得果是實者初偈說昔時持戒為因今得大乘果報後偈昔時修梵行今得大乘果報若未迴心即不得記言初一頌得真實聲聞等者經言我等今者真是聲聞四十年前不得名真聲聞今日方得名真聲聞以佛道聲聲屬於佛令一切聞聞屬眾生此聲聞二字令取他名名有財釋也言後一頌半得真等者經云我等今者至應受供養者三義之中應受世間供養也經言世尊大恩以希有事等者此一頌半明慈悲恩深難報金云佛有三恩一說五戒十善拔三途苦與人天樂名小恩二說二乘教拔三界苦與涅槃樂名中恩三說一乘拔二乘變易苦與大般涅槃為大恩嘉祥云有十恩一普共結緣恩我本立誓願欲令一切眾如我等無異等也二別共結緣恩我在十六數曾亦為汝說等三隨逐有情恩長者聞已驚入火宅等四隱本垂末恩即脫瓔珞細軟上服等五思惟救濟恩於三七日中思惟如是事等六捨深說淺恩次冷水灑面令得醒悟等七隱一說三恩無二亦無三除佛方便說又於一佛乘分別說三八付財密化恩爾時窮子即受教勅領知眾物而無希取一飡之意等九陶練小心恩佛勅我等說最上道等十委付家業恩今我所有一切財物皆是子有先所出內是子所知復有四恩一授我聖胎恩二長我法身恩三長時不倦恩四莊嚴成佛恩又諸恩不離三業如今者世尊從生及出家身業也得道者意業也轉法輪者語業也又經言以希有事至誰能報者鹿野菀中從外道化入小乘名小恩般若會名中恩今說法華經名大恩言時長處廣等時長者大通佛時直至于今也處廣者二萬佛時遍起身教化名處廣也行滿者二利具足心勤者六返觀眾生苦己利人結也二時長三大劫處廣通遍十方行滿二利圓心勤晝夜六返觀眾生苦己利人八相成道也言昊天之恩者詩云哀哀父母生我劬勞鞠育之恩昊天罔極意云我欲報父母之昊天敬心無已也爾雅云春為蒼天夏為昊天秋為旻天冬為上天者言如陽氣昊大也言初二頌六種內者手足為二如頭頂禮敬為三若以頂戴為四兩肩為五盡心恭敬意業此名六言二頌以四事者一美饍二寶衣三臥具四湯藥也經言無漏等者無漏即四智菩提無為即一真法界言藏報身等者解經中能為下劣實得自受用身也有說他受用非也顯化相即丈六身隱妙理者四十年前不說大乘也揚麤義者即小乘也嘉祥云久證大乘為鈍根故忍而不說如淨名經云釋迦如來隱無量功德以貧所樂法度脫眾生也藥草喻品言今佛還為以喻述成者問此中喻說何處是述成也答初讚印是云佛如長者舉少可以喻大言二者論說對治等者此品不同前來譬喻信解品為二有學凡夫今此大乘頓悟小菩薩聞世尊初周說十方佛土中唯有一乘法無二亦無三又處處會下毀聲聞又聞說中小二子不止羊鹿同上牛車不會如來說教意生得乘同病作是念唯有大乘無別聲聞緣覺也世尊為說雨喻破之天雨是一三草稟潤生長不同甘草得雨唯甜唯知天雨雨甜不知天雨到黃蘗之中即黃蘗得雨光唯知天雨苦不知天雨到蓼子之中辛甘草既甜苦辛辣不同天雨恰似隨他甘草黃蘗等蓼子亦成甜雨苦雨辛雨如來教化無是一般由眾生根性差別不同教法被根遂有三乘五乘差別破乘同病也此論家偏說雨喻喻一味之法對根有三乘五乘差別上敘論意下消論文言七慢中第三等者唯有大乘種性發大乘心名大乘人三乘五乘總信今唯取信大乘不信二乘名一向增上慢二乘功德名增上法向彼增上法上起慢名增上慢二者少得謂多得名增上慢三乘之中修行大乘兼信二乘名得三乘之中唯信大乘不信二乘名少得將謂總解盡一切佛法名多得慢者恃己凌他恃彼所修唯有大乘無二乘說向他人名增上慢也故說雨喻也問破乘同病只合說藥草喻如何說雨喻耶答經家正取所滋三草破病論家偏舉能滋顯所滋也言前譬喻品為等者正明病生處也譬喻品是信解品病生處藥草喻亦破前二品病也前譬喻品為治人天內外果顛倒而求佛言此人天果俱是大宅次信解品治二乘有學執我乘與如來乘等無差別問因何生得此病答初周聞說聲聞得授記又聞世尊說三人同坐解脫床聞第二周說火宅喻中長者牛車三子同上三子若別即合小子登羊中子上鹿大子昇牛今三子既互等上牛車明知不別法中論聲聞緣覺菩薩總得授記明知我乘與如來不別述所修二乘法更不要迴心不修大乘行便擬取佛果菩提涅槃若望如來意言等者即迴心已去究竟成佛即等若不迴心聲聞二乘與大乘元來別也既執未迴心前我乘與如來乘等故說窮子與長者既別二乘與大乘各異故知二乘未迴心前與大乘差別為破初執說窮子喻也信解品病從譬喻生藥草喻病從信解品生現信解品窮子領長者家財便有一類小菩薩執唯有大乘無別二乘也若望同事須迴心已去窮子領長者家財若未領已前實別大乘頓悟小菩薩見窮子迴心已去領長者家財便執未迴心前又同也離大乘外無別二乘故說藥草喻品以破之故此品來所以疏言今此品為對等正是當品來意也言故彼論言第三等者正引論文證疏言故字者由前三品經文唯說一乘生得諸病此品破之故言故也言令知種種異者五乘不同名種種問何誰教知乘異答疏言諸佛如來平等說法此教同也言隨眾生善根等者隨彼眾生五乘本新善根種子而說五乘法也人天乘即五戒八戒等三乘之人三無漏種子善根如來說法是一般三乘人各發自乘心修心修自乘行乃至無種姓人但以人天善根而成就之正解乘異也言意顯一雨等者章敬云一不知同二不知異且不同者一切草木稟潤生長之時不知所依地是一亦不知能滋天雨更無兩般若知異者各各自家開華著葉不知諸草開華著葉與自不同雖一地所生一雨所潤而諸草木各有差別聲聞不知緣覺根性緣覺不知菩薩根性也初解同稟潤各異後解同不自覺知若是瑞草能知地能生長天雨普潤是一此況迦葉此於藥草經云汝等迦葉甚為希有能知如來隨宜說法能信能受知根同異也此是喻意也言意顯一雨雖同解前行平等說法也三草二木生長各異解前行隨眾生善根種子生牙故喻也言佛教雖同前一雨雖同也三乘二聖發修亦別者此間藥草品解三乘與諸處別也菩薩大聲聞緣覺居中人天乘小二聖即二木發修亦別者三乘二聖合前三草二木也言發修亦別者合前生長各異生長各異者松栢千年長蓬蒿即易菩薩三大劫修行二乘三生六十劫四生一百劫名發修亦別也問三乘差別道理可然如何是二木別耶答雖同大乘所修之行淺深麤細別也言有為機器等者問何故方便譬喻信解品皆言唯有一乘無二無三此間藥草品何故言三乘五性各別耶答如來四十年前及前三品中說三乘無異者約三乘法身同故唯有一乘若約有為乘三乘五性各自差別也意言乘有差別不得將無為理說若對無為理教唯有一也有為簡無為機器簡理理不能顯教之差別也將機器對教意菩薩有三乘五乘異故問前之三品言唯一無二豈唯約無為不說有為耶答所以疏言亦有決定二乘者故且不定性人未迴心前教對有為根性尚得成三乘五乘差別況更有定姓二乘根教對二乘根差別義極成也又前三品約迴心已去說教唯有一今藥草喻斷未迴心前乘有差別問爭得知答疏言由機性殊等前來有三重一若對無為說乘無別若對有為說乘有異二對不定姓人說乘無異若對定姓說有異三不定姓中迴心即不異未即有異也言勝鬘云攝受者證五乘差別也攝者包含義受者領納義教理行果義非邪妄名正法善男子堪能荷負四種重擔地能此四種重任況菩薩教化四乘眾生四種者一海二山三草木四眾生攝釋三解一約障有輕重海最重況無種姓眾生煩惱最重諸山次輕喻聲聞惑障故輕故三草木次輕況緣覺根利一坐斷惑故四眾生最輕況菩薩雙斷二障惑最輕故二義海況菩薩理性深廣故山喻獨覺樂處寂靜神通最高故草木喻聲聞春榮秋落更不生況聲聞後有盡故也眾生況闡提但有人天性生得善根力微小故三義海喻無性人生死深遠故山喻聲聞堅執不斷故如山也草木況獨覺神通障輕故眾生況菩薩障輕少故言涅槃亦言等者此證有三乘也聲聞弟子皆言已作佛時諸弟子不解我意總不作佛亦不解我意方知有作不作方解我意也言依人運載至異等者此正是此品意此品意正取教若直顯說教有差別佛說法元來一味便違佛法道理教上亦無差別行相教為能運人為所運教隨所運以運以立名車是一般載炭名炭車載柴名柴車隨所載物以立名教元來是一般載人天名人天乘載聲聞乘名聲聞乘運三乘五性眾生教向上有三乘五乘差別天雨本來是一隨彼所潤草木恰似天雨亦有三般雨般差別相似也言三者方便品初標智等者雙標理智二皆甚深譬喻信解品釋也譬喻品中偏釋彼理甚深三車是理宅中唱三門外等與牛車是理甚深義信解品中四人領解言實一者唯大富長者財寶無量窮子領長者家財二乘迴心作佛言假三者三乘唯有名字章句而無實義此前二品正會理甚深也教門甚深都未悟解此品之中正會四十年前阿含甚深即昔三教對根說故言如說四諦者例成也如說四諦本質是一三乘人緣時行相不同成三乘教法差別也觀智不同也法輪章說言第一為顯種子等者引論文也意顯種子無上不能破病但顯法體尊高即無上義段問菩薩謂有乘同病故說乘差別以破之今更說雨喻明天雨是一莫增菩薩乘同病耶答所望不同說能滋天雨是一與四大聲聞述成說所滋三草各別破頓悟菩薩病也言然於其中等者二十品明十無上於中七品具二殘餘十三品多是文殘藥草喻品種子無上通二殘者且一是文殘本來破乘同病說三草少根少莖少枝小葉中大各三云只此三草文便是破病了向大草之中分出二木諸樹大小隨上中下破病只要大草不要二木文二木文不能破病但顯得地前地上大小差別二木經文與大草文各別二木經文不能破病故名文殘言此是義殘非是文殘者本來明大草文次所以地前地上相形立大少二木名離却大草經文無別二木經文二木經文被大草喻文破病處已用訖今却借彼二木經文顯法體尊高種子無上義此無上以不能破病藥草喻家收不著是喻家殘義文即不殘故是義殘也問七喻之中有雨喻十無上內又更重說雨喻二種何別答十無上內只是重引前七喻之中雨喻兩處雨喻文同理別也十無上中雨喻舉文取理理即二木顯種子無上義即是舉能滋取所滋也七喻之中雨喻舉所滋根性顯能滋教有差別破頓悟菩薩病言又更重說仍等者攝云仍字誤也應為乃牟云仍字亦不妨仍者重也因也七喻之中已有雨喻十無上內又更說重因者所以義正是仍字仍名為殘也文屬雨喻中三草破病文早已用訖教下所詮義種子無上無上義仍名義也言前說雨等者即七喻之中雨喻也言普潤三草者合知天雨亦有差別也所被根性三乘別顯能被教亦有差別也令知乘異者即教也言今說雨喻者已下十無上中雨喻也前七喻中雨喻論家立名舉能滋天雨是一顯所滋三草破乘同病後十無上中雨喻舉能滋天雨取所滋二木顯種子無上名義殘也言三草之中形於等者二草即二乘也菩薩名大草二乘名中人名小草就大草之中自位相形加名二木言所望義別者大草正能破病望乘同病名破也二木但顯法體尊高望無上義名二木望中小名大草大草喻中攝不盡名殘問為是文殘為是義殘答通兩說一云是義殘以彼二木無別經文經文攝屬大草大草經文向下詮著大草能生長義則是大草喻家所收也傍邊有一分自類相形顯法體尊高義大草義中收不著故名義殘也如律師解羯磨律師中收又兼解論義便屬法師便是律師之中一分殘義名殘也言或是文等者大草文屬七喻之中雨喻文二木文屬十無上中種子無上文問大草與二木何別答大草約種子二木約現行也言前後別者依法華論中前文明雨喻後文云諸樹大小隨上中下解無上前後文別故文殘是彼雨喻破病之殘文也言此大種子者問何名無上答疏言此大種等即種姓地也得雨滋潤者地前逢善友聞教也體用弘廣者二解一者此種子體形對二乘自位尊高名體弘廣二者用能生當來自受用身現行廓周法界却向種子向上說用廣大尊也後得果殊者佛果體是無上今種子感無上果種子得無上名非取後時所生後時所生自屬業果菩提無上言論引經言等者我身即佛身佛身即大乘所攝四智菩提無漏種子唯大乘有名不離我身即此種子現行二乘所無得名無上無上尊唯大乘有也言若種若現等者通妨也問大乘之中有教理行果四法今取何法得名無上答疏言若種等若種者地前種姓地并登地已去無漏種子名種也若現者登地已去二空智無漏現行名若現行也若因者地前種子登地已去現行名若因也若果者即生自受用身現行菩提涅槃名若果也如四法雖皆不離大乘總言無上今取大乘無漏種子以為因本問餘九無上亦通教理此何不取答既言種子必有生長義教理不能生長故不取也言去疾者切差呂反屬能去近據反即屬所去言去疾神等者以用故稱藥就體稱草體有生性用有治能有生性故可以喻長大道有治能故可以破少執言一有藥非草者即是鳥蛇金百藥等能治病故名藥無生長故非草法中論教理果三聞即罪滅福生名藥無生長故非草二有草非藥如稊稗等有生長義名草不能治病故非藥三塗業種及諸染心種雖有生長名草不能違害惡故非藥問准新修本草及諸部都有八百五十種於中草藥約有三百般已來餘有五百般是藥不是草即石藥及虫類等也此攝天下草不盡故有非藥之草問四分律云得叉尸羅國有醫姓阿提梨字賓迦羅極善醫方耆婆童子於彼受教經七年師欲驗其醫道與一籠令其採藥於城四門面一由旬有不堪作藥者將來童子數日空籠而歸無有不堪作藥者師驗醫道已成又婆沙說色界中唯以發雲為地故無樹木藥草欲界之中眾生多病故於地多生草木准此二解一切草無有不是藥者如何言是草非藥耶答律中說雖是草皆藥而非一草治一切病冷藥能治熱病望患冷人不是藥熱藥能治冷病望患熱人不是藥望不怡病處但得名草不名為藥故有非藥之草言約多分說一切草皆是藥其中少分亦有是草非藥又毒藥良藥總取又即一切草皆是藥今唯取良藥故有非藥之草也婆沙云但言眾生多病故草生不言一切草皆是藥也牟云一切草皆藥者唯耆婆知餘人不知今取眾人共知故有草非藥也法中既說三塗種子反害眾生可同有毒之草也既非良藥非是此明也三有草亦藥者即人舉甘草等法中論三乘無漏行及人天善種三乘行能斷煩惱故名藥草從種生現從因向果漸次生長故名為草人天善行五戒十善能治煞盜婬妄名藥稟教生長故名為草四非草非藥者如塼石瓦礫等法中取虗空非擇滅無為不是此間所要故不取言所喻亦爾者此一句法合也三草是能喻根性是所喻也亦有舉能喻藥草取所喻根所性也舉所證理顯能證教有差別也言不取餘石藥者簡前句中有藥非草喻上說金石藥等能治病故名藥無生長義故非草也教理果三亦爾教是名句文無生長義非草聞者罪滅能助行斷惑名藥也或依教悟理依理起行也教能與力義邊名助行斷惑也理者真如之理其體一定性離煩惱名斷果者果法果法不增鎮已伏故名斷也此三是藥非草也今取藥稟教修生名草不取餘石藥教理果但名藥不得名草所以簡之不取也不取石藥簡初句有藥非草句兼前第二句有草非藥句但簡却前二句第三句自成也言世出世種等者總標有漏無漏也世即人天出世即二乘無漏種也言今取人天等者重釋也人天善種者福業不動業三乘無漏種子并無漏現行是藥之草簡有草非藥句也違害惡故者此解藥義如前三乘聖種違害煩惱業人天種子違害三惡趣總名為藥不取生死惡道草種者三惡趣種子雖不稟正教生長還能稟惡教生故生長此是毒藥不能治病不名藥也言不稟正法等者問三界五趣皆有種現何故不取三惡趣種答三惡道種不稟正教法雨滋長既不能顯教有差別不能破病故不取也言意辨三乘等者問何以不欲普明諸種答有二說一者五乘種有生長破病則取也三惡趣有生長是草不是藥故不取二本欲明三乘稟教差別破執一之病不徒以普明諸種子也稟正教則取不稟正教者不取也言是藥即草等者簡前顯有藥非草有草非藥二句也言以別簡通者章敬云藥是通名草是別名以草簡藥唯取是草之藥不取是藥非草是通名藥是別名以藥簡草唯取是藥之草不取是草非藥為通別義乃周圓諸抄唯取後之草草義解通別也是藥之草依主疏意偏簡是草非藥者不取言若云此下明者破古也古人藥之與草兩體各別藥喻能滋之雨草喻所滋之根性藥喻教草喻根能所合說名藥草喻疏主破古師藥與草別將教況藥持草皆比根者三塗種亦名草豈一切草皆為喻耶故知不爾問下云為毒所中何妨毒藥答不稟雨只言為毒所中不言藥也問飲他毒藥即名藥何不言藥答今取治病藥為喻也以彼毒藥不正宗雨故然不離難天雨亦滋諸毒藥故今解但取一分治病藥智者不難喻今又解一切藥草皆稟雨生為毒為良但由和用也故皆為喻也如因聞經起謗即資毒藥也言由此故知等者疏主義取藥之草體是一故藥即是草俱就所滋以立名言此以二義為喻者此解喻意破頓悟菩薩乘同病一者稟雨生長各異開華布葉不同顯天雨差別三乘人聞教行取果不同本是一般教所稟各異成三乘五乘差別也少根少莖等二云天雨是一稟雨生長互不相知甘草不知黃草苦黃蘗不知蓼子辛三草二木各不相知也三乘之人稟教修行各不相知上性下性中性也少菩薩自家根性尚自不知況知他眾生有上中下性眾生既不知豈令執乘是一耶經云如彼卉木藂林諸藥草等而不自知上中下性又十地菩薩亦能分知眾生根性此亦不然此說凡夫少菩薩有執不知根性若是大菩薩知眾生根性而亦不執乘同也言三根亦爾者問菩薩云何不知答涅槃云十地菩薩不能明知眾生佛性此為良證也言答論說能滋之法故言雨喻論家偏說能滋影取所滋三草也經說能喻藥草為名影取所喻眾生根性也論家取雨喻能滋天雨是一會教是同與四大聲聞述成經家取所滋根性差別破頓悟菩薩病正是三周本意經家以藥草為因傍破頓悟菩薩執乘同病如來述成是正破病是傍本來三根聲聞執三乘五乘各目別如來與說十方佛土中唯有一乘法聲聞聞此遂便悟解迴心向大佛與說天雨是一述成若與說三草更增其病也又為頓悟菩薩說三草破乘同病若與說教同更增其病何成破病也言經取能喻之體者即三草也以破彼種彼種即頓悟菩薩病執他不執自也言倒者以乘等者倒者顛倒三乘五性實有差別執有一故名為倒言破者以機等者據實如來所說其法一味若不對根說難作差別行相所以如來說根有差別為破根既有別教亦有異也言故假所潤藥等者天雨為能潤藥草為所潤教為能滋根為所滋也言由此不標等者即不同論家名雨喻也亦不雙舉者即不同古師言雨草從約少稟潤生長說名草少也木約成長已後說名木大中少二草但得名草不得名木大草方名為木就大草中木若少未成但得名大草不得名二木至後成長時方名為木亦名大草法中論大小菩薩俱是大草中收只緣自類相形分出二木也有是二木兼名大草有是大草不名二木猶如種姓地菩薩但得名大草未得名大木也顯通三乘三草總取不唯於大此簡不取二木為品題也顯潤生長況種子成就喻現行但說稟雨生長名大草顯差別不說成熟即是不取二木也言有解云藥者此重答前問也初問意云論雨喻經何不同此答云藥者是雨即草喻根將法喻雨二義雙舉即論狹經寬故無有難也二云但答後問前答云三草破病二木不破病故不名藥木品意取藥草草中三種破執一之病也若言二木即不破病也言二既雙彰者答前問雨及藥草為二答彼問即草木為二也言文雖不然者經文不說以雨喻藥以草喻根據其道理亦不妨也准理根同病行教名法藥何失也言又前譬喻等者引例證也前譬喻品亦有所猒火宅所欣三車本論唯約所猒火宅但言火宅喻也今此品亦有能滋之雨所潤之藥草何妨唯取所潤但言藥喻品又彼以欣猒雨雨門譬喻義齊合明譬喻品此藥草破病義齊合為藥草喻品理甚一種也言品末二頌者今為汝等說最實事諸聲聞眾皆非滅度汝等所行是菩薩道漸漸修學悉當成佛言先讚仰者緣前窮子品中四大聲聞將長者喻於如來我等皆似窮子領解如來功德世尊所以向藥草喻品之初讚印也初讚者爾時世尊告摩訶迦葉前品最初告須菩提以能說般若經窮子領財物正是般若會四須菩提所說之事所以告須菩提二者須菩提能作三空觀門所以偏告也今此間獨告迦葉有二意一年最長二者前品偈文是迦葉說偈聲亦絕佛便說此品告也言勢相接故獨告迦葉及諸大弟子者指餘三人更不指多人以餘三人同心合意領窮子喻所以兼指也經言善哉善哉迦葉善說等者善哉善哉迦葉善說如來真實功德讚也經言誠如所言誠由實如所言此一句印也問何故兩遍善哉善哉答嘉祥言兩言善哉述其言巧誠如所言印其事實紀國云初讚領權後讚領實故重善哉問靈山說法佛身盡是化相功德如何言實功德答只是讚歎迦葉領如來權實道理設使是化相依實而說一三權實亦名真實功德又能將長者喻如來二乘比乎窮子大乘功德多故財富無量二乘功德闕少由如貧里四無量心為寶帳長者尊崇二乘涅槃如門外止宿草菴自念貧事七聖財為金銀珍寶五分法身為香水灑地說七覺功德如散如華三乘聖眾處處宣揚如客利豐廣果位功德滿故如倉庫盈溢妙願及力如臣佐吏民八萬四千眾行如牛羊無數心持四攝如執白拂二利功德如出內取與乘生空教顯理不圓如眇目聖智短故稱矬相好闕故如陋言訝言合理故等者即是世尊讚嘆迦葉善哉善哉迦葉善說如來真實功德訝音五亞反嘆也說人身上美事故名訝嘆訝迦葉出言合於權實道理誠如所言者章敬云誠由信也即是忍義若恐二乘人作念我知世尊功德盡恐二乘人生慢心所以第三更嘆如來自身功德所以經言如來復有盡等汝所說者少不說者多故言復有無量無邊功德也言說不能盡者如虗空經偈言十方虗空由可步四大海水由可量一切眾生心可同如來功德說無盡又云假使一千頭一頭千口一口千舌能種種音聲於千劫中讚嘆佛功德所嘆者少如一微塵不嘆者如大地微塵也言顯彼尚等者解第三段經文也佛同長者汝將長者況如來以少況大分相似汝同窮子聖德微亦許同一者二乘人比窮子未必全似少分似故微亦許同二云二乘人聖德微少實同窮子故云微亦許同或言漸亦者約迴心後漸已通泰金銀倉庫漸與長者同二乘功德既迴心已漸漸亦同於如來矣領家事後成佛等好也言法中有四等者疏主法述中科此四段行相極不相當疏主准下喻文合文述著此間經文所以科出將下喻文合文反照此間經意方知分明也言於法自在者經云若有所說即是佛與於世若不出因何有說經言如來是諸法之王王者自在義所說不虗故稱為王若出言虗誑何名自在若不自在不名法王也亦如講人於所解中講無滯方能宣說言二法利群生者經言於一切法以智至而演說之名法利群生經言一切法者真如與一切法為所依名一切法言以大悲智者何名智方便答於無言說法上以名相說故名方便問本來是無名相法強安名相加諸法體何名方便答說法若不稱法體不名方便所說法與所證法同故名方便言能善說之者解經而演說之演者水長流貌從根本智證真如理理上有塵沙萬德從根本智起後得智云自利後得變影緣如塵沙萬德皆而此自利後得智中帶起來如鏡中像利他好得安名字說問莫說證底法不著答其所說法皆悉到於一切智地也離名相法即是經中於一切法也相國云即三性法如來本智證阿賴耶識性即圓成實後得智中了賴耶識相依他以二空為門了遍計性情有理無了此法了皆由本智本智為依方便起後得後得能說十二分教如本後智所證之法等無有異四大河流至天池等言所說之理契等者解經中到於智地也有二解一根本智證得後說說合證故名到智地者唯真如理二云眾生聞如來教觀理起行依行起智證著真如證到佛果地通菩提涅槃名一切智地後解通理智也言教順於理者即說合證故不同外道我以飲甘露成就不死藥即教不順理乘此寶乘直至道場行亦不虗名理順行又佛子行道已來世得作佛若將二乘教望大乘理等皆非順也大乘望亦爾言以此普滋者將到地之法滋潤彼三乘五性也言由識空有之法者解受道有殊經言如來觀知一切諸法至深心所行正是受道有殊若不知根何能受道問如來因何說法到一切智耶答如來觀知一切法之所歸趣一切法者不過空有攝一切法盡知一切妄法無體法歸趣遍計性遍計心所遍計境中間無體相分是遍計性如市裏人終日相不識姓名終日是分緣相分不了相分是無如幻眼見空華空中本無華華相分從心起此上解如來至歸趣問如來早晚觀知答趣成道了知也二知諸法有一有為法歸依他性二無為法歸圓成實性此三性是一切空法有法之所歸也言究竟真性者此三性法究竟歸於真如也言及知眾生心等者眾生心是能趣三乘行是所趣法上解由佛達法識根令彼所化眾生受道者有殊各得生長人上解也言無垢稱云等者有無所趣據此經如來觀知一切諸法之所歸趣意樂所歸者即證此經亦知一切眾生深心所行言即是三性等者意言離三性外更無有法也空即遍計有即依圓言心所趣者潞云心即是行與趣是果故准經約心所行行者即是心所趣處也意取所行也知眾生心勝解智力知也又知眾生心之所行即遍趣行智也言於理者理是性境也智者是眾生心行也望如來智能知達之無礙也言或由佛達等者攝問此與前何別答前解由佛達法識根合所化生而各受道即於所化眾生理智中也此解受道即屬於佛佛自受已然後能令三乘得益令三乘差別也言不能自達者經示諸眾生一切智慧正是不能自達若自達了寧假如來示之智慧又於諸法究盡明了者由佛究盡諸法所以三乘五乘說權說實有差別菩薩種性教取佛果菩提智慧聲聞緣覺人教取自生空智慧所示三乘五乘差別也少菩薩自根性及他人根性盡不知所以執乘無別也言下喻及合者問如何疏主科此經為四唱答疏主言下喻及合等意言下喻中四科與此相稱也下法王出世喻即此第一佛興於世下說教普滋喻即此法利群生下稟潤各異喻即此受道有殊下不自覺知喻即此不能自達只緣法述有四段喻及今皆具四段所以疏主科法述有四段正相當也言又有釋言等者破古紀國科此法述初一唱迦葉當知如來是諸法至不虗此總是明所說不虗不配經文也從於一切法以智方便而演說之下至一切智配開佛知見二如來觀知一切諸法之所歸趣配示佛知見三一切眾生深心所行通達無礙配悟佛知見四又於諸法究盡明了示諸眾生一切智慧配入佛知見言雖作此解順等者至下喻文合述法王出世說教普滋等四段文此解對彼便是別意肯袊所說也又解此釋雖順開示悟入一乘之文不順此文破乘同病故名別意也言又別顯不虗者此是疏主自重解也科即同古師於中義即別也初一唱總明不虗經言如來是諸法之王若有所說皆不虗也總此次下四段別顯一窮法實性經言於一切法以智等二能知空有如來觀知一切等三知眾生心樂亦知一切眾生深心所行等四能示權實又於諸法究盡明了等言法實亡言者以言顯說名智方便所說之法雖非即真萬法名字皆是假有喚火之時不得火燒口雖不是真然所說之法合著所證之法所證之法是無名相法言中說還說著無名相法也然一切法之自性並皆言詮不及假智及詮依共相轉如呼水火等問真如亦爾二法何別答且如詮火煗為自性即成喚雖不燒定煗為相若言真法非淨非染離中離邊如是說時亦不稱體不可說故言然與等者問正智證真如都無一切及至後說萬法歷然云何言無別也答所證者即是三性所說者一即三性更何差別只如五地菩薩了俗證真只無有別何況如來說法之時有不同證也者然疏意者本智證理後智證事名佛智故義說本後約理事殊一一說時如證無別牟解言地者依止者解其所說法皆悉到於一切智地智地者依止義其真如名地唯有根本智到於智地言意言佛者此說說合證故名為地此智證名到言或教能等者此意教等四皆名到地言此能知空有者解經一切諸法之所歸趣如來能知空有諸法歸趣知一切妄法歸趣遍計性又一切法有二有為法歸依他起性二無為法歸圓成實性此三性法是一切空有法所歸趣處言或所歸趣等者即三性法究竟歸趣真如也即是如來於畢竟空中建立一切故一切法歸趣於空者即是真如法實性故如彼色法依空之性方顯空故言謂知心行者解經亦知一切眾生深心所行由有種性相應之心心受樂樂聲聞乘緣覺乘故名深心若心勝於境勝解智力也上解深心下解所行若心是能行行是所行即遍趣行智力知也又知此眾生造地獄業受地獄果六趣皆爾言既達諸法等者解經又於諸法究盡等言也謂眾生等疑如何昔日四十年前說三乘今日說一乘故言如來後智觀四十年眾生有三乘根熟故所以如來為說於三乘今日靈山唯有一乘性熟如來所以為說於一乘故如來善知眾生根性故所以初說三權後說一實如來一一皆知無有錯謬也言此上意言等者四句疏都結前四義也一窮法實性二能知空有三知眾生心樂四能示權實也言由此四義者牟云有二義一佛說不虗故功德不能嘆盡二以有此功德故能說於權實眾生無是功德云何得三乘無差別順前第四不自覺中出前別意之所由也因說不虗重明乘有差別破執乘同也經言迦葉譬如三千大千世界者總也山川谿谷是別也山裏有土地川裏有土地谿裏有土地谷裏乃至土地三千大千世界處心所也此處所中處無諸物唯有山川谿谷此四般上古盡三千大千世界不是山則是川不是川則是谿不是谿則是谷三千世界山川谿谷土地是能生卉木叢林及諸藥草是所生三千大千世界與胎卵濕化為能有三乘種子為所有若約此間名總喻有草即藥有草非藥皆從土地所生法中論約如來大悲說六趣四生盡是如來所教化境也所生二字屬下句經言種類若干者少草種類中草種類大草種類也法中論菩薩種類二乘種類人天種類名種類若干也經言名色各異者甘草黃蘗黃蓍生牛膝名各異也法中論菩薩之中十信十住十行十迴向初地二地云云聲聞初果二果云云緣覺之中麟角部行人天釋梵輪王名各異也經言色異者三草開華著葉青黃赤白顏色各別法中論三乘人神通大少別名色各異也言三千大千等者有解大化身所王境此非也大化身四加行位菩薩見故今言一佛化境只是少化身所王資粮位菩薩見雖只遍四明今約少化身都王一个三千界舉同王境界故言化佛境王三千界也言艮為山者卦名然聖人設卦以觀象象此人紀卦名也乾天坤地巽雪坎水離火艮山風澤山產也產生萬物宣吐也氣者嵐氣嵒之中山嵐散生萬物二川者貫川也字像形字通流水也三谿者爾雅云水注川曰谿四谷古鹿反音餘玉反與欲同言喻大千等者喻上說三千大千世界中有山川谿谷山川谿谷之中有土地山川谿谷土地俱能生卉木藥草俱所生法中論胎卵濕化為能生身中種子為所生今將山川谿谷四種喻胎卵濕化但約數同配四生無別行相也或約具緣多少配者卵生具四緣胎藏卵㲉濕潤乘恩故喻山二胎生具三緣胎藏濕潤故思喻川三濕生具二緣濕潤故思喻谿四化生具一緣思故喻谷也言卉即三草木即二木者有說草有藂木有林疏意草之與木皆有藂林路府問藥草離卉木更無別體經中何故置及言答所喻法中種現不同經置及字故疏判卉木喻現行藥草喻種子或卉木別喻大乘藥草通喻三乘既種現通別有異故置及言也言此雖眾多者簡法也前來總喻總喻六道四生種子總喻也若就此經此經所要即唯世出世善種子總喻於藥草也言相用有殊者相即行地行修行用即斷煩惱名用有殊也上總喻也言化身隱實者解密雲彌布也密即潛也彌即是廣也化身佛王一三千界及隨類化身遍三千界故言密雲彌布此不是卒暴雲是密雲也彌由遍也遍由布也喻上說雲從龍起雨從雲得時人但見雲不見龍法中論化身從自受用身上起時人但見化身不見自受用身雨即從他雲裏來法教還因化身說乍可有雲而無雨不可有雨而無雲乍可有化身而不說法未見有說法而無化身疏言化身隱實實即自受用身名隱實八相漸現解化身八年作嬰兒七年作童子四年學五明十年受欲樂二十九出家三十五成道從生相漸次而現至成道於此身上為劬師羅長者覩三尺身以發心五百婆羅門見灰身而起信王三千界不但身遍聲亦遍也言一化三千等者說教普滋喻也經遍覆三千大千世界聲既遍滿法音相接三轉法輪於大千其輪能寂本性寂希有法智天人證三寶於是現世間雲遍之處雨隨身遍之處法音亦遍言一時等者喻上說上說不雨即已雨即下必一時不前不後故立時也等者平等也乾地向上亦普下雨林木向上亦普下雨三草二木向上亦下雨故云等澍法中論亦爾如來說法未有眾生根熟不說法未有說法根不熟不前不後名一時喻上說雨亦須是三月四月草木發生時草木雨下名一時若十一月雨下非時說法亦須是眾生根熟一時之義有二一正是眾生根熟時二佛以一音演說法眾生一時悟解亦名一時等澍者喻平等說法不簡聲聞緣覺大根少樹平等說法故言等澍也言時雨者即大平等時三十六雨雨不破塊若於季世雨既不時今顯應根同彼時雨也總標了下橫滋也經言小根小莖小枝小葉等者問何名橫滋答經言小根等喻上說三草得雨各著根莖枝葉橫相望名橫滋也三草等顯橫列著等顯開華布葉橫相望名橫滋若堅長唯於一般草上論竪長也法中亦爾三乘五性聞教一一乘中皆能行因取果名橫滋若唯於大乘中說諸樹大小隨上中下名竪長言三乘性異下標根性下釋涅槃等下證也言若遇及以不遇等者世間有一般病人若逢著醫人喫藥當下差若遇醫人飯食將息亦差即大菩薩言若遇不等者即二乘也問聲聞可爾緣覺不遇佛出如何亦得差若約初心修解脫分善時事須遇佛也言此三乘名等者問眾生自有種性如何取教理行果向上說根莖枝葉耶答種性為所依教等四法為能依依此種子向上說有根莖枝葉也為聞佛說教滋著識中種子最初故名根第二如來說果法滋著識中種子名莖依一種子上約開教理行果四法時安立根莖枝葉也言依教證理等者如依根著莖依理起行如依莖著枝依行得果如依枝葉相生次第也問前來唯取行法為藥草不取教理果今何故將教理果配根枝葉耶答前約所滋三草之中行親能得果有生長義破病義故偏取也三無生義不是正能破病故不取也今教理果三相依有俱是能滋之法故總取也問前說教是能滋理行果三是所滋今何故四法俱是能滋耶答前來唯言是能滋者從初為名也事須最初聞教然後悟理行行取果有初一方有後三故偏說教是能滋據實教理行果總是能滋也言又依勝劣者聞果法勝故滋著種性如根聞行法次劣滋著種子如枝聞教法最劣滋著種子如葉等配也言橫名三乘者即大中小草也言竪名四類者喻上根莖枝葉法中皆稟教理行果名竪四位言類依性有者性即種性無有種子然後就上根莖枝葉故有四品類亦依性有何不名橫答二木依彼竪性不依橫性橫竪二性如下自辨言亦有說四者即是地前資加二位勝解行地名樹根見道名莖修道如枝無學道如葉言此義不遍者疏主破古人也雖有根莖枝葉不遍小草中有故不取之二乘見道已前無勝解行地之名目亦人天乘性亦無此四位言竪長者二木之中三品上中下增長差別名竪長牟云三品滋益從下至上故名竪也即經云隨上中下說著上中下方名為竪彼三草處經文不說有上中下疏科為橫也據實草木若論勝劣淺深即無橫竪相也言論說大木等者談經意經云諸樹大小各有所受此種子無上經文不屬破病文也經文自言有上中下故知二木名竪長四智菩提種子不離佛身名不離我身也二乘人中不說故唯大乘有種子無上義也言不退位前等者問何故大小二木有兩師解答緣經文奄含轉不退輪度無量億更不分位次兩皆許轉不退位已去名大木已前名小木只是配不退轉位次不同所以兩師見解差別也上引文標言一云七地已前等此師合大小木一處分成三品准經下偈文一切諸樹上中下等稱其大小即不分大小二木所以總相分三品依三種意生身分也相云初地至五地為下名三摩䟦提樂意生身變易之生隨意而生名意生身何言而成名意成身也六七八地名中得覺法自性意生身者而能觀察有為幻法悉無實體觀察覺了如幻等法悉無所有也名覺法樂然得無相觀即能覺法如幻無體六地非長時七地有加行故經偏據八地理實通前七也言九十二地隨諸眾生所有多種類菩薩皆能現同類身俱時而起雖俱時起而無加行任運而起而不作功用名無作行身義同前由如鏡中能現同時種種影像而無加行此亦如是問何名種類答八地已上一剎那間依變易身上能現百千萬類身十方國土應根化眾生故名種類以現多般身不一名種類也何名俱生答不前後故一剎那同時現百千萬類化身等名俱生問何名無作行答八地已無加行名無作行雖自利門中無作行若教化眾生時緣有細所知障在依利他行藥病門中未能精審由假尋伺思惟觀察眾生根性故自利行中無加行故名無作行也言有義不然者此中第一第二遍科彼初云大小二木我已科了地前菩薩一大劫有漏修習不可向小草中收所以再科有返不然等此師意非唯取登地已上明大小二木若唯取前七地名小木者地前菩薩是何法攝中小草攝中小草攝大草中有二木二木又不攝此地前更何處攝若小木者不攝即三草攝法不盡也准此道理即通取地前菩薩名小木准此分三品者地前為下品七地至初地為中品八地已上上品者攝因為菩薩大草攝二木盡也言若依此義者此依小木為下品以答上問地上為大木以分中上言純有漏修者地前一劫有漏聞熏設聞無漏本質教時影常有漏漏所間雜有漏根發故皆有漏也上明大小二木共分三品以三種意生身勝劣有殊故分三品也言二云初地已前名等者經云自知作佛決定無疑是名小樹此地前菩薩名小木也問八地斷理事疑盡初地斷理疑盡如何地前得無疑答昔不信自身作佛迴心已去信自作佛又頓悟菩薩疑他不疑自聞道聲聞作佛亦是亦無疑也大枝小木各有三品小木三者十住十行十迴向是也言十信即是初等者問何不說四十心答即是等第十即法界無量迴向攝言由此華嚴等者證三十心也問若彼經有三十心者何故復說十信菩薩八相成道答即第一發心住中成八相故即是十信攝入十住故也言但說舍利弗者問爭得知十信攝入十住答疏言但說舍利弗等優婆塞戒經說十信攝入十住若別有少信位者今經一百六十劫何以故以彼一信修經十劫至第六住而便即退入二位但六十劫故知十信不可別開言此但說三十三者地前有三阿僧祇一信行阿僧祇二精進行阿僧祇三趣向行阿僧祇十地之內每地各三謂入心住心出心如次除彼內心障也既言地前為三不說有四故無別位也言對法等者證四善根十迴向收對法等說初劫滿已修四善根雖言滿足足字只指初劫盡時更不別說時不別說劫明知四善根只是法界無量迴同攝上明少木了言相同世間者初二三地相同世間施戒忍世間凡夫亦能作故名相同世間也三地菩薩成就勝定大法總持能發無邊妙慧光故說名順言方同出世者四五六地相同二乘四地菩薩修菩提分法觀五地四諦六地緣起故論云安住最勝菩提分法燒煩惱薪慧焰增故五地真俗兩智行相互違合令相應極難勝故六地緣起智引無分別最勝般若令現前故前五真俗智即觀四諦一染二淨四地之中常觀身受心法為所猒覺道為所欣五地方能冥真俗境然存染淨為所冥境如一鏡雙照水火水火相存至第六地中住緣起觀方無染淨也言中草三者問緣覺之人一坐得果如何分品答亦以未斷正斷也又將緣覺就聲聞說亦有三品也言前是等者橫貫三乘即大中小根莖枝葉竪通即諸樹大小隨上中下各有所受也又通難二木分三品說名為竪長三草分三品應非是橫滋故此通云前是等元久元年八月二日於福光院書寫了是偏為令法久住利益人天而已假名比丘凝圓生年五十八
