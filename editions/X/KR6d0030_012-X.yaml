body:
  text: 鏡水沙門栖復錄言照境也等者所照境也經云照于東方萬八千等者紀國云但照東方者舉始顯終文少略故據實通照十方古師錯引正法華云普照東方萬八千土其光大明照諸國土靡不周遍乃至十方諸佛所說經法普遍聞焉疏主意准此但是所照東方世界之十方不是佛光直照十方也開中云東方為群方之首以表一乘為三乘之始嘉祥云唯照一方不照餘九方者表唯有一乘無餘乘也昔日從一說三表今日收二歸一也言一世界等者解世界世界之中有大小今此言世界是一三千界一一界中皆有欲界色界無色界如是照萬八千个佛之世界問前來世尊相好中有常向不背相由因中不背一切眾生果中各見世尊在其前無有不見世尊面者忽然西邊人坐即合見世尊面西坐即合先彼東向西去既經云唯照東方不可世尊面西放光光到西邊却迴向東照耶答二說一云經既東流通即言爾時世尊放光照于東方若向南方流行即言爾時世尊放光照于南方餘方皆爾第一解十方皆照隨方經文不同二云是佛不共功德如來不思議力眾生皆見世尊面向本方坐放光不妨元來向東照也言唯照東方等者東方是諸方之本表一乘是三乘之源又云諸師依能被唯一疏主顯所被根勝互相影顯義乃周足言西域以東為上者勝上之上表五乘中大乘根性為上顯法華經偏被大乘根前解靈山云其山頂東西長南北狹臨崖西埵有塼精舍高廣其製東開其戶觀此西域風俗以東為上約日出處為上君王亦面東表法華經勝故不照餘三方也此方南面為尊天子面南一切人家宅舍向南開門南方主陽北方主陰陰劣陽勝也又准方志云又此方軒轅所封四王所統雪山已南至于南海名象主地唯暑濕偏宜象住主以象兵而安其國也從雪山之中至于西海名寶王國主也地接西海偏饒珍異而輕禮重貨雪山已北至于北海地寒宜馬封為馬主其俗暴惡煞衣毛是突厥等之國雪山以東至于東海名人主地是支那國古云振旦此間指雒陽以為國之正中軒轅所封也若准此方以東為上東方甲乙木主春春生萬物四時中以東為上南方丙丁火主夏西方庚辛金主秋北方壬癸水主冬中方戊己土土元正形隨四季王也東方況定性大乘菩薩南方況定性聲聞西方況定性緣覺北方況無種性人中方況不定性眾生此不定性人身中有四乘性若發菩提心攝屬東方性定菩薩一處若發聲聞心攝屬南方定性聲聞一處若發緣覺心攝屬西方定性緣覺一處若發人天心攝屬北方定性人天乘一處今此是小乘不定性菩薩若發菩提心攝屬東方定性菩薩放光唯照東方也言譬如等者舉喻言正法華中等者疏主破紀國錯引正法華經照于十方文所以破云正法華中亦照東方殊無照彼餘方之文也言萬等者解萬八千也注云緣極至此只合照萬八千更過去與經無緣也嘉祥云萬表果乘具足八千表因乘有缺此則感應相關眾生之感既不遍諸方佛之應化亦不普也言表此說一乘等者放光則照數足不足法華詮一乘實與權言又萬表涅槃者一萬表涅槃萬德八千表菩提八正言將演此經等者義結之此經將演涅槃菩提此經能至涅槃菩提此經聞者圓成當證涅槃菩提言故唯照爾等者雙結二解由此三義故照一萬八千有所表矣言下照者表有苦而皆拔是照下界分也言上至天者勸有樂而求一乘令悟五欲樂求出世樂照上界也問色天欲天有樂可勸捨第四禪中唯捨受如何言捨樂答一云第四禪中唯無有樂有適悅身心義邊亦似於樂二云有順益捨受亦近於樂言慈悲者解前上下也言普廣者苦樂皆霑名普上下皆照名廣也言地獄眾生雖者通妨也問有緣皆照上界諸天等放光照彼有緣皆來地獄無緣眾生既不至會何要放光照答疏言地獄眾生等言此云無間者解阿鼻地獄也無間有五一受報無間唯順生受造得此業亦死便生更不隔餘生餘趣故名受報無間間者隔也二者壽量無間壽命一中劫無中夭者故名無間三者身形無間入地獄者其身彌滿等故四者受苦無間餘小地獄受熱苦時有涼風間此地獄純是苦更無有間五處所無間處無別處所間隔言八地獄中最下者此據本說大論云此下過三萬二千由旬有等活等活下過四千由旬有餘七地獄皆傍布故問何不言光照上下七地獄但言照下無間地獄答經中偏照阿鼻者顯上七亦照也言受苦不輟者於此五中偏舉受苦一个顯餘四種皆具苦故言苦器者受罪人器具言在於處處者以根本地獄在地下從根本為名餘孤獨地獄地上人間總有故名處處也所言地獄亦非唐梵譯出但是以義安之耳獄字魚欲反皐繇所造也言阿迦抳瑟者抳女几反𢮎動俚反咤吒刃下反言色究竟者解光照彼意也問佛放光如何只至色究竟天答疏言色究竟天有形之頂光可至處也言不照無色等者問無色既許有定果色光何不照答非一切時恒皆有故所以不照又無業果色故雖有定果色非皆總有不可偏照況復無緣如何照得也俱舍云無色無處所由生有四種依同分及命根令心等相續言括於五趣者問萬八千界一一皆照耶答既言盡見明知濟照意言一一界中五趣皆照故云無不周遍也言振動唯在等者釋難意也問何故振動唯在此界答偏警有緣餘界無緣地亦不動問何故放光則照他界答放光遂至一萬八千顯捨權就實故也此間疏似迷人也前來論放光動界處放光照一萬八千動地唯此界此界捨權就實故今此間却將教上捨權就實向上光向上說也前來動地唯在此界論捨權就實約根向上說今此間放光論捨權就實約能被教上說教通權通實緣前來放光照一萬表一乘數盈滿也八千表二乘數不足喻法華經能詮教詮一乘實二乘權盈滿況一乘實不足況二乘權也所以得此道理寄向上說雖總明權實不妨實捨權就實唯在此界言亦如光照者引例成也喻佛放光照東方說捨權就實之法也言緣集聞等者問放光照六趣何言四答放光六趣皆蒙緣集聞經唯在五趣除地獄也若說修羅天攝或鬼畜攝疏言四者亦不相違也言此七分三等者攝釋問二乘人任運見小千界極作意見中千界阿那律見大千界尚自不合見萬八千世界如何凡夫見萬八千界答盡是約如來加被令見問加被交見有何意答交見生死沉淪交令生猒見三寶出現令生忻交見佛入滅通忻通猒令發心故且佛尚入滅況我等豈得堅久令生猒也令生忻光中佛尚自入滅我我等應速向佛邊聞法我本師釋迦莫同光中佛入滅去耶忻聞法心也又舍利弗見光中地前菩薩地上菩薩修菩薩行生忻慕心生見賢思齊心所以佛放光是其本意也言此生死沉淪者經云於此世界等者靈山會上若凡若聖見光中萬八千个世界一一世界下從地獄上至有頂一一世界光明中見地獄眾生被鑊湯爐炭銅狗鐵蛇釰樹刀山炎爐猛焰一日一夜萬死生受無量苦又見餓鬼道中焰鬘炬口其咽如針滴水不通受飢渴苦逢食欲飡變為猛火臨河欲飲化作鎔銅又見畜生道中被毛戴角加諸杖棰口不能言受諸苦惱又見人中生老病死愛別離苦怨憎會苦求不得苦又見苦苦壞苦行苦此上欲界苦又見色界有惡獸毒虫等又見無色界又諸餓鬼頭上火燃等言六者數名者解數字趣者趣字也此六處是有情所歸趣處名所趣此明界趣生體得名問莫天宮是八戒入所歸趣處地獄是人造罪所歸趣處答此解但是趣之器具不是趣體不如取當來六趣受果身也當地獄身是所趣今生造惡業眾生為能趣當來地獄身是今生造惡眾生所趣處當來餓鬼身為所趣慳業為能趣當來餓鬼身是今生造慳業眾生所歸趣處當來披毛戴角畜生身是所趣今生無慚無愧惡業眾生為能趣當來畜生身是今世無慚無愧眾生所歸趣處也當來圓首方足人中身是所趣今生受五戒為能趣當來光潔自在天身為所趣今生受八戒身為能趣言五薀假者起煩惱等者煩惱及業是能趣煩惱及業未起即未知歸趣之處若起煩惱及業即六道之中是有情所歸趣處如無明為先發善行集五果種子繫之一處被貪愛潤轉體成有有當生果故名所歸趣也問何名煩煩及業答煩惱即十二支中無明愛取為煩惱業即行支及有支一分名為業造得六趣五果種子令當來生六道處故所以煩惱及業為能趣六道為所趣處也謨云無明似齋家行支如疏子眾僧如識等五愛取似維那抄名似有支入不食家門似生支飡了如老死支也且十煩惱中分別無明正能發業餘助發俱生中貪正潤餘助潤又分別俱生中嗔唯發不潤俱生中身邊二見唯助潤不發餘煩惱助分別者皆助發俱生者皆助潤由此潤發招當苦趣也煩惱了業有三種一非福業有三品上品招地獄中品招畜生下品招餓鬼此三業是上品無明所發二福業亦三品下品生閻浮提及東西二洲中品生北洲上品生六欲天此三並是中品無明發三不動業有三品下品生下三禪中品生第四禪上品生無色此三業並是下品無明發問潤生差別凡聖云何答大論云一以現纏及隨眠結生相續謂諸異生二唯以隨眠結生相續謂見諦跡若爾如有依未至定伏下九品惑而命終者既是異生如何纏潤下已伏故未得上根本定不起上故未至定中伏煩惱故唯識云身在下地未離下染上地煩惱不現在前要得彼地根本定者彼地煩惱容現在前又云得彼定已復起分別俱生諸惑皆容現前答有二解一云此位之人必無命終者要得根本定或退失定方可命終是故異生纏隨眠潤二云用上地種子潤下種子曾被折伏現無力故雖說異生纏及隨眠潤未必皆爾如說見諦跡唯以種潤不妨初二果人亦通現潤雖有此說前解為勝上說六趣總名了言地持云等者下解六趣別名也問何名為天既生彼已資身之具一切皆備所受用物自然而得非如人間求不得若即是依樹思念續續變起地持論三義解天一所受自然欲界天二光潔自在色界天三神用無色天以無色故不言光潔所言神用似是業力非是神通名神用也言涅槃經云等者問何名人答三義解人梵云末奴此言人一者多思故名人人趣思慮最強地獄苦逼無暇可思畜生但念水草餓鬼飢虗受飢渴故盡不及人也二者攝云以多恩故人中有恩德多此解不正若論恩德畜生養子亦有恩也三者正義云意寂靜故名人問人對天天更寂靜何故說人答人約三惡趣說不望天說也攝云寂靜是涅槃理意證此理名意證此理名意寂靜二云不被極重苦樂所喧三途苦惱意不寂靜諸天一向受樂意不寂靜不及於人也簡非人也不得作仁德字也言雜心云以從等者解餓鬼義常從他求求久不得常受飢虗即九種餓鬼是應撿之言俱舍云以傍等者亦云傍生婆娑云其形傍故行亦似傍故名傍生也辨曰首上足下謂之傍頭前尾後謂之傍也新云傍生攝一切情類以行傍故人行雖傍頭在於上不名傍生傍生寬遍古譯云畜生有四解一畜即時人相名謀者刃六反畜積之義二云畜生許救反三畜生繩繫也四畜生許郁反畜養之義讀疏之時依此音也餘音非問牛驢之類可爾若是大虫狐狼之類誰人畜養答多分說名畜畜養二云只是人不養他無有養不得者如稠禪師養虎本來牛馬亦是野虫伏義乃駈將耕地來便即調順也言增上可猒等者增上可猒及不可樂雜心說也言出體者六趣皆以等者正辨趣體此據勝說其實具以三科為體異熟有三一異時而熟因異果殊名異果熟酬因名熟二變異而熟因有變異名異果方熟故名熟三異類而熟善惡因感無記果因與果異名異果熟酬因名熟問如何唯取第八異熟識為趣生體答由具四義得名趣體一實義簡有部以眾同分命根假法而為趣生體今第八是實故為趣體問第八已具於實義第八異熟名趣體五色根及五識等亦是實五根得名趣生體由此第二具遍義故名趣體簡五色根及五識不遍無色界故五根五識非名趣體唯第八識遍三界故為趣生體問第八以遍於三界第八識名趣體第六意識遍三界第六識名趣體答由此第三具恒義故名趣體第六入滅定等時有間斷不行非趣體問第八以具實遍恒故第八即名為趣體第七識具實遍恒故第七識得名趣體答此第四具無雜義故名趣體第七識有覆性間雜故非趣體唯第八識無覆無記界無雜故具此四義第八識名趣體也問設第八非唯無覆無記名趣體答不然若第八通餘性即還滅因果俱不得成故唯無覆無記得名趣體論云異熟若是善染性者流轉還滅應不得成言故唯識云此等者問有何教典第八識名趣體答疏言故唯識等界者三界趣者五趣生謂四生為體之法事須是實也論第八三云恒謂此識無始時來一類相續常無間斷是界趣生施設本故性堅持種令不失故此解論常轉如瀑流阿陀那識甚深細一切種子如瀑流我於凡愚不開演恐彼分別執為我問此三法寬狹如何答界義㝡寬性義體義通情非情能趣所趣次生義寬雖唯有性通能所趣故義趣最狹唯所趣故言又云此識足為界等者此論第一破小乘執有非色非心實命根論主破云又先已成色不離識應此離識無別命根命根即是三法中壽色即三法中煖普色是三法中壽攝離識色體無命根三法收離色應成假又破云若命根異識實有應如壽等非實命根普壽等異識有壽等非命根命根異識有應當同壽等廣破已前云此識足為界趣生體是遍恒續異熟果故無勞別執有實命根此有三義一遍簡五識五識不遍界地故眼耳身三二界二地鼻舌識兩一界一地二恒續簡第六五位間斷故三異熟果言簡第七識識體非是異熟果及因故非善惡故非因以有惑覆故非果申正義云然依親生此識種子由業所引功能差別住時決定假立命根言又有情流轉等者唯識第三十理證中第三界趣生體證云又契經說有情流轉五趣四生若無此識彼趣生體不應有故謂要實有恒遍無雜彼法可立正實趣生此具四義實有簡不相應假法常續簡第六間斷遍五識及異熟色不遍界地故無雜簡此趣起餘法故如欲界身生得色界定等總名為雜是起餘趣法也諸趣生不爾即有二趣並生之過故論非異熟法趣生雜亂住此起餘趣生法故言即異熟者異類而熟名異熟由前六善惡心心所造業第八無覆無記性受果因通善惡果唯無記因果性異熟名為異熟又異時而熟名為異熟過去作業現在受果因果異時名為異熟體即本識也言開合者緣經有六趣字諸聖教中有說五趣處疏主此間論開合疏主所以廣將諸法次第相對辨明也言六趣總為一等者一切三界有情薀趣之時名生薀若壞滅名死也問何不言死生而言死答生則多死則少生則少生則千類皆生則有多般死唯有一種也生有胎卵濕化不同生多故前烈死是一故後烈也言次開為二謂善者一切人天皆名善趣三塗名惡趣人天二趣從善業之所招感故名善趣三塗惡業之所招感名惡趣體非善惡異熟色心皆無記故唯識云能於此世他世順益故名為善人天樂果雖於此世能為順益非於他世故不名為善於後世中有衰損故非二世益也能於二世違損故名不善五趣苦果雖於此世能為違損非他世故不名為善言分段生死等者唯識云復次生死相續由內因緣不待外緣故唯有識因依有漏無漏之業正感生死故說為因緣謂煩惱所知二障助感生死故說為緣所以云生死有二一分段者釋名者謂諸有漏善不善業由煩惱障緣助勢力所感三界麤異熟果身命短長隨因緣力有定齊限故名分段分謂齊限即是命根段謂差別即五薀性此五薀身有齊限故名分段依士釋又云此分段俱唯命根隨因與緣有定限亦分亦段持業由先業造得一歲百年皆有齊限身形長乃至諸天亦爾名分段言出體者分段生死唯正取第八異熟識及餘異熟識四薀五薀五為體欲色界五薀為體無色界四薀為體問無色界有定果色五薀為體得否答不然分段身但約業果身說非取定果色但四薀為體唯識云三界無記麤異熟果為體問何名異熟答四說一易可見故名二有定限故三易了知故四二乘凡夫共知故名麤異熟五薀為體言辨能感因者分段者名言熏習識等五支種為親因福非福不動三業為能招感緣一切煩惱為發業潤生緣和合而得生故問勝鬘經云如取為緣有漏業因而生三有名為分段不言識等五名言親種一何乖返答彼等經論隱彼親種但舉外緣增上分因及緣故亦無失大論等解云善惡業為正感因煩惱障為緣助感三界異熟愛非愛果即十二支所感者無明正發業俱生愛取為正潤生無始時來流轉不絕又行支為正感因無明愛取三支為緣助識等五支為分段生死種生老死支為分段生死果四約人者問何人受分段生死答一切凡夫具有分段前三果人不迴心者亦唯分段第四果人不入無餘不迴心苦依身在總名分段問阿羅漢捨衣鉢作延壽法令身久住時名何生死答亦名分段生死謂同類聖者皆見故如喫仙丹令身久住總名分段又如地前頓悟菩薩七方便來未入見道二乘迴心者地前總名分段又悲智平等者初二三地亦有分段未入變易者若唯悲增菩薩不怖生死七地已前亦名分段生死無有八地已上受分段身者盡入變易也言變易生死者釋名也變者改義易者轉義改轉舊麤劣生死成此微妙殊勝生死故名變易又改前有情限之身成無限之身唯識論云由悲願力改轉身命無定齊限故名變易生死問既無上定齊限身命長時何名生死答資長名生勢分欲盡名死謂菩薩有宿住通知身欲謝便以定願資身壽多少劫數此名生願滿定身盡處義說名死便入無漏定又資也二出體者問變易生死以何法為體答正取第八異熟識為體兼通餘識異熟五薀為體論抄云謂欲色界細無記異熟問何不四薀為體五薀為體答無色無分段色身段轉故不於無色界入變易故非四薀為體言能感變易因者問變易生死何法為能感因答取識等五支果種子為親因欲界福業并色界不動業除無想及淨居業餘天等不動業為近勝緣依四靜慮緣事無漏後得悲智相應定願為遠勝緣由所知障執佛菩薩有情為為有而起悲願亦為斷此留身久住故所知障能為其緣問勝鬘經云無漏業為因所知障為緣有意生身云何今言以名言種子為因不動等業而為近緣答經隱所資但舉能資近遠二緣故無有過問既有親因及所知障何要復用無漏業為因答若無無漏無緣堪能感變易生死故假此資所以須得無漏業為疎因感變易生也今解云問何法是能因緣答謂無漏後得有分別業為因所緣為緣助能感變易生問如何取所知障為緣無漏業為因感變易生答菩薩不知菩提非可求有情如幻非可度遂執菩提為實可求有情實可度即是法執所知障便起悲願擬上求菩提下度有情其菩薩自身一期分段身欲終恐身斷故又無發業煩煩恐無身求菩提度有情故遂入勝定起無漏有分別業資彼故業令身久住求菩提度有情出定感得微細變易身故知要所知障為緣無漏業因感變易生死故唯識云既未圓證無相大悲不執菩提有情是實有無能發起猛利悲願故假所知障為緣無漏業為因感變易生死四約人者問大小乘中何人得入變易生死答二解一頓悟二漸悟其頓悟有三一智增初地入二唯悲增八地初入若悲智平等者有二若怖煩惱者初地入若不怖煩惱者二三乃入漸悟者五果迴心皆許入初果迴心八萬劫至十信初心八萬劫為初便入變易二三四果亦爾皆許入也問初果迴心便入變易為不爾耶答不定緣初果更有七生分段身人天七返往來若怖煩惱者初迴心便入或迴心已經一二生乃至六生亦得入直至第七生分段身上入亦得無過第七生後入變易者以無第八生分段身故第二果初迴心入變易亦得若迴心已更受一生分段身第二生入變易亦得以第二果有人天一往來生無有迴心已有第三四生入變易者第三果初迴心便入亦得或猒欲界身從欲界身死後受色界身於色界身上入亦得阿羅漢人事須當生身入變易無有阿羅漢捨苦依身已後生入變易者已無再生分故問若許前三果迴心入變易及頓悟七地前菩薩入變易者何故勝鬘等云阿羅漢辟支佛自在菩薩三種意生身不言通餘答彼經據總想據究竟者說亦無有失也上釋名出體能感因約人言或開為四者謂胎卵濕化言生有者從初託母胎已在胎五位至初出母胎皆名生有二本有者有即是本過去業所感之有名為本有從出胎生有後乃至六十七十未命終來皆名本有三死有者正捨命時翻睛沮沫名死有即本有後最後命終一剎那死薀名死有也四中有者即是死有後生有前中間薀起故名為中有也言四種生死等者安國云案無上依經以分段生死向上有四種難變易喻彼亦立四種生死分段四難者一煩惱難無明愛取二業難行支全有支少分三報難即識五果種子并生老死及有支少分四過失難謂生住異滅憂悲苦惱今變易身上如次喻彼分段立四種生死一方便生死者即所知障法執等為方便故二因緣生死者謂無漏有分別業根本智緣名無分別業後得智緣名有分別業名因緣三有有生死者即變易生死五薀身是一重有向上更有生異滅三相又是向下一重有有上重有名為有有四無有生死者更無後果麤相苦果故名無有生死也言或開五者除修羅趣言或開六者取修羅也言雜心非天等者問修羅何趣攝答雜心等言今依大乘經等者問五般聖教依何為正答疏言今依大乘經等言六趣者即向天趣之中別開修羅趣也言行多不實等者問有何所以天趣之中別開修羅答疏言行多不實等若經言五即攝在天趣明知行不似天名非天若言鬼畜非正也問何故諸經論言鬼畜答以能變化故鬼攝上代師子兒生故畜生攝光音天子許天攝天攝為正言如人不仁者仁賢之義慈忍無害恕己及物謂之仁今無其仁德謂非仁也修羅之行非天行故許天攝言不言非鬼等者破異計也若言鬼畜攝何不言非鬼非畜今既言非天故天攝言或開為七有者路云五趣是所趣業及中有是能趣能所合言故但有七問如何業及中有是能趣答業有能生中有能續生五趣是住生前二為能趣五趣是所趣問煩惱然亦為能趣無不因惑而趣果故此何不說答據親因者言隱疎不說問中有為能趣者未審生無色界為有中有答大眾部等計有細色彼定說有大乘及有部生無色界定無中有但以欲色二界及人三洲隨先修得無色界定不離本處一極微地捨報受無色界身也又不捨人身轉為諸類亦無中有大眾部計墮無間者生身陷彼皆無中有如善星比丘墮阿鼻獄被燒煞已不離本處即受彼身有宗及大乘則不如是從生陷入由速疾故說彼為無燒煞墮時定有中有又說往生西方亦無中有問中有極長四十九日然有作無遮大會殊勝福力命終已後合作輪王劫減之時未有生處此復云何答唯正法念經說造逆業者命終已後經半劫始到無間准此停住多時合有中有既言半劫明知大乘不遮多時何論四十九日例彼輪王有於中有經一劫住等後方受生言惑開為九等者於先七識住上更加二種也識住者未住之時欲得住住了又不欲得離此識住之相也七識住者一身異及想異者謂欲界人天歡戚有異身形亦別南三洲身形大小不等名身異也心想不一名想異六欲天身形大小有異名身異也舊生天子五衰相見有憂戚有苦新生天子有樂名想異也第二身異想一謂劫初成初禪梵王獨住十劫念諸梵輔梵眾後有天子生來梵王作念我能生彼後來天子起宿住通知梵王作念亦云我從梵王生彼此想同名想一梵王身勝餘身劣勝劣既殊名身異也第三身一想異謂第二禪身形大小一種名身一初生天子見下火灾怕怖舊生天子知不來故名想異第四身一想一謂第三禪同一樂想名想一身形一種名身一更加空處識處無所有處三天成七識住也問何是識不樂住答三塗之中苦多樂少有損於識識不樂住第四禪中凡夫聖人同生凡夫生到無想天彼天多是外道所居又滅心想聖人生到五淨居天彼天多是定性那含棄背生死求證無餘故不立識住又有說第四禪捨清淨無樂住心不立識住也於前七識住上却帖無想天及上界非想非非想天成九有情居問何故此二天更立居名答無想天心微劣故無樂五孝反離心故故立居名非想非非想天心昧劣故立無樂離亦立居名也故俱舍頌云身異及想異身異同一想翻此身想一并無色下三故識住有七餘非有損壞應知兼有頂及無想有情是九有情居餘非不樂住言或開為二十五等者四域四惡趣梵王六欲天無想與淨居四空及四禪是名二十五有情梵王神主異故初禪之中別說梵王也無想天外道居淨居天賢聖所居所以偏說二十五有義指藥草喻品中廣上弟章文義了言餘門如下等者指餘門義六門解釋六趣義中上已解三門餘門處所壽量因果指在第六疏解故言如下當釋下疏指瑜伽論等言此說萬八千等者正釋經文也意云世尊放光照見東方一萬八千世界中六趣眾生經云於此世界此娑婆世界見東方萬八千世界六趣之眾生也生死沉淪了言一佛者經云又見彼土現在諸佛者若是他受用土瑠璃為地黃金為繩七重行樹七重羅網其中佛又見他受用佛目如四大海水毫相如五須彌山又有八萬四千相好等三地已前佛總見問何以知答寶塔高妙五千由旬故知三地已前也若是三地已上塔量則應無數也又此世界若大化淨土即千丈大化佛又於此世界若是化穢土高下不平土石諸山穢惡充滿即四大洲日月七山八海又佛是小化身三十二相八十種好等上見佛佛寶也言二法者經及聞諸佛所說經法法法寶也為求聲聞者說應四諦法等言此聲聞等者經云并見彼諸比丘比丘尼志修行者五停心觀別想念觀總想念觀等問何故將優婆塞優婆夷向僧中科出耶答疏云僧者和合義一理和二事和在家既許得初二果明知理和亦名僧也又有云以劣從勝在家男女劣出家人勝也言論云修行等者此二解一凡夫名未得聖者名以得果二云凡夫及四向各各資自果名為未得居果位者名得道者也言因目觀等者貞問毫光遠照見佛可然光不照聲如何聞法答見佛即光從此去聞法則聲從彼來所以遙得聞法也言此菩薩也者不見菩薩經云復見諸菩薩摩訶薩者此中若依論家科列七中當第四段見四眾也疏主科三當三寶出現中今當僧眾僧眾中當菩薩也問為何事故行菩薩道答為種種因緣故行菩薩道為求出生死因緣所以菩薩行道為速證佛果因緣所以菩薩行道為度脫眾生因緣所以行菩薩道又由此種種因緣故行菩薩道所以得入地前信解位地上相貌位由前修行所以得後二位也消經了言因緣者所以義者不見謂一个因緣行菩薩道直是謂種種因緣行菩薩道言謂求出生死等者問菩薩有何所以行菩薩道答謂作三妙觀所以行菩薩道何名三妙觀答疏云謂求出生死是厭離有為心持攝律儀戒誓斷一切惡當得法身為此因緣行菩薩道言速證者持攝善法戒誓修一切善是求菩提心當得報身為此因緣行菩薩道言度脫眾生謂持饒益有情戒誓度一切眾生深念眾生心當感化身言為此因緣者此二句結前三種妙觀有此三般因緣菩薩道名種種也言或為嚴淨等者四菩薩行解一謂嚴淨佛土修波羅蜜行此行有六一布施治慳貪二持戒治毀禁三忍辱治嗔恚四精進治懈怠五禪定治散亂六智慧治愚癡為嚴佛土因緣所以行菩薩道言成就眾生者即饒益有情行也言修菩提分者即是菩提分法行唯無神通行也言或為修四攝等者四攝利他也六度自利也為行二利因緣所以行菩薩道也言如是等種種等者此是結前生後意言由前種種因緣為方便所以得入向後信解位相貌位也言信解者問爭知信解是地前位答信解者經中既不言證解但言信解明知地前言信而且解者論云此位菩薩依因善友作意資粮四勝力故於唯識義雖深信解而未能了知能所取空多住外門修菩薩行也言相貌者三業等者在地上修行應言二業以彼意業無形相故謨云若以眼見耳聞意業即非相儀若約見分即名相儀身語二業由意業引行菩薩道相從通取三業相儀立為相貌者亦通尅體論身語二業有相儀也問爭知相貌是地上答疏主以前顯信解既是地前相貌必合是地上也言貌儀者莫交反取此貌為正言㹸皆非者字樣有正有通有謬此貌通此㹸謬為簡通故故言皆非也言住於十地者問此菩薩修行種種相貌者住何位中答疏中言住於地等即是十地菩薩六度次習等已得道果者但得十地因理智非約其佛果言已得道果也言由種種所以等者結第一番也問前來種種因緣行菩薩道種種信解種種相貌行菩薩道得何果報答疏言由種種所由行菩薩道故入二位也即地前地上名二位即是信解相貌也種種者多般義即歷四十心亂修六度名種種也相貌中奉事二十六恒河沙佛及次修六度萬行等名種種也言又因緣等者次下第二番唯解因緣信解相貌不解行菩薩道其因緣信解相貌各別解也因緣者外遇良緣緣即是地前所逢佛也問何故喚佛作良緣答疏引經云善知識者是大因緣故問前解中因緣與此因緣何別答有別前因緣者所以義後因緣者外遇善友也二處有異也言信解相貌等者問何名信解相貌答內修行中意業名信解外身語讚佛名相貌即菩薩三業齊修行也言心觀妙理者第二解心觀妙理名信解通地上地前捨頭目等名相貌在十地位修道也此後二解不分地位但暗通地上地前也若論通相說十地菩薩修行亦信解亦相貌地前菩薩亦信解亦相貌疏據顯處說地前名信解十地名相貌也上來一番將菩薩道三个字與種種因緣一處解也其信解相貌各別第二番唯解因緣信解相貌不解行菩薩道上兩番皆是疏主解也言論依四攝等者三番論家解唯解行菩薩道不解餘句前來兩番解但是總相解行菩薩道未是分明解今一一別解行菩薩道問菩薩依何行門修菩薩行答疏主論云依四攝等菩薩以四攝法為方便攝取眾生言信解相貌等者問菩薩修行不越二利之行未審前信解相貌何種行收行菩薩道是何行攝答疏言信解相貌等疏主體論中意四攝既是菩薩行信解相貌亦是地前地上菩薩行信解相貌是自利行行菩薩道是利他行謂信解相貌廣行六度為上求菩提故地前六度名波羅蜜行初地至七地六度名近波羅蜜行八九十地不唯六度通修十度名大波羅蜜行是如修行專求菩提自利利菩提道修四攝行名利他行以四種法攝取眾生故若貧窮者將布施攝將淨戒攝破戒等菩薩修行不越自利利他所修行門不越四攝六度設修萬行亦四攝六度攝盡言四攝法者初總名攝謂攝受以四種法攝有情或攝謂攝益以布施攝益有情令成就故二別釋名一布施者運心周普名布輟己惠人名施即持業釋也愛語者音聲表彰名語聞者心悅名愛愛是能緣語是所緣是愛之語也利行者利是果名行是因名行利因益受果是利之行依主也同事者同者等義事者業義也謂與有情同其行業事即是同持業也言布施等者第三依論解四攝便為四段准瑜伽論四十三云云一一皆有九門一自性愛語二一切三難行四一切門五善事六一切種七遂求八三世九清淨且布施愛語利行同事一一皆具九門今此疏中引者盡皆脫少第一布施一門此中全無指在向下頌中解六度處解下有三十一行菩薩道初一偈種種因緣十七頌種種相貌十三頌種種信解等愛語唯有五門初四第七門計五也利行門有六初三七八九同事有一謂事言二愛語者一常說悅意者離麤惡語二諦實者離虗誑語三如法者離離間語四引義之語者義謂義利無綺語亦名不離穢語也言遠離頻蹙等者第二一切愛語有三一慰喻語菩薩見人先含笑離頻蹙相尊於己者進而問卑於己者命而安言見有唱盛等者二慶悅語也見者昌盛富貴若是知足者知是富貴不知足者不知是富貴向說令知言而不自知者不知前生布施感得今生富貴向說令交知令修布施名覺善法增又覺者見知義見他人布施持戒就向上生隨喜嘆令歡喜知前人聽有次第就向上勸名善法增言說佛教法等者三勝益語也說佛教法常為勝益眾生前之二種隨世軌則依後勝益語順正法教言於己怨仇等者三難行愛語也於中有三第一於己怨仇仇酬也父母之酬不同天地兄弟之酬不同於日月於彼前人起清淨意不相計念名清淨也言於極癡等者第二意也乍觀疏文似除前人疑惑此却是菩薩自除疑惑若逢著極癡眾生菩薩作念云我教化他為得不得此便是疑惑於菩薩亦是障菩薩不作此想便是斷疑於眾生生決定心發願不生由豫名誓除疑惑言於真福田等者第三意也於真福田供養三寶孝順父母名真福田今於佛不恭敬父母不孝順名諂誑惡行菩薩於此起大悲心為說法要終不於此而生嫌恨起惡麤言一聲罵詈此之三種難行故名難行愛語也言或除障蓋等者第四一切門愛語也障謂二障蓋謂五蓋菩薩欲教眾生除障蓋次以何為先答有二一為說人天樂果交持五戒十善業名為先作論所作也意云既有如是善業得此人身因果照然言如何不除障蓋二者欲除障蓋為說先作五停心觀修行最初名為先作望後三乘聖行名先作言心調善者為說諦法即四諦相應正法言多放逸者三在家多放逸者既到諫誨方便令其出離放逸行不放逸行言有疑惑者四於諸法中多疑惑者談說決擇令離疑惑上第四一切門愛語了次第五善士愛語第六一切種愛語略不引言依四淨語等者第七遂求愛語也四淨語者一不妄語二不麤惡語三不離間語四不綺語也八聖語者見聞覺知不見不聞不覺不知稱實而說名八聖語聖即正義第七遂求愛語了第八二世愛語第九清淨愛語疏略不引也愛語攝了言三者利行等者明自性利行也言由愛語故先示正理者問此中自性利行與前門自性愛語何別答寬狹不同前來愛語泛說教理行果法今此間利行唯三乘令交對根修習所以先以愛語宣示正理令交起行修行三乘之行又云或順求利而以道藝引之前即語誘此即行誘言隨所學等者二令離名利心言勸導調伏者三謂交修三學建立二乘正行言能令獲得等者第三一切行也一能令獲者攝云菩薩以三事一法二業三德授與眾生令現世獲得大財大位一法者法術燒金銀珍寶令得大利二業者仕農功商四人各業隨前人所學處令得大財也三德者德藝授與眾生明經進士令得宰相節度令眾生得大財位也言後利出家者種種勸道令其出家捨棄財位清淨出家受乞食行以自活命由此能令決定獲得復能安樂現法不定言俱利者種種勸導令修離欲得上地定適悅身心名現利復生五淨居天復得解脫名俱利言習近惡友者第三難行利有三一習近惡友知識此一類人亦不謗佛法僧只是習近惡友不肯修善名第一難言著大財位等者二躭著現在大財大位不動善根菩薩於此人上能行利益名第二難行言外道僻執等者謂出家外道彼於自宗愚癡執故外道著我異道邪見行有情執著自見憎背正法是第三難行也言常起八纏等者第四遂求利行有三一常起八纏八纏者一惛沉二睡眠三掉舉四惡作五嫉六慳七無慚八無愧二十纏者更加忿覆成十菩薩見諸有情應處慚為不慚纏方便令離餘七亦爾言十惡業者身三口四意三意為根本菩薩依淨三業於此一切惡人向上皆能勸化令捨十惡業言起大悲心等者第五清淨利行有五一起大悲心者菩薩於諸有情起廣大慈悲意樂現前而行利行言雖受大苦等者第二段也菩薩於諸有情所作義利雖受一切大苦劬勞心無倦深生歡喜而行利行言雖處財位等者第三段也菩薩於財中亦第一位中亦第一為化眾生而能卑屈如奴如僕如旃荼羅此云嚴熾搖鈴持竹以標記故西國下惡人也意道菩薩為教化眾生故能為此下惡事乃至孝等無憍慢我執而行利行也言無染無偽等者第四段也菩薩於諸有情心無愛染無有虗偽真實怜念眾生而行利行也言慈愍之心等者第五段也菩薩於諸有情生起畢竟永無退轉慈悲之心常為救拔也第九利行了言四者同事等者瑜伽論九門中唯有自性一門無後八門也即指前所引之事與一切眾生同作菩薩欲擬教化喫酒人便喫酒欲擬教化喫肉便喫肉人言教化知已等者已字以音同也言令作是念等者彼自解故所以教我作若自不作彼便云彼自不解何能教我等意道汝且於他人邊學為遮此難所以菩薩自行疏結云故須自行也言菩薩利他行雖等者問菩薩行中何故唯明四攝答疏云菩薩利他等言此云圓寂者舊云涅槃新云波利呢縛喃波利是圓義呢縛喃是寂義三義解圓寂一具四德名圓即常樂我淨四德具足名圓寂者滅也滅二障染名寂離喧閙故名寂即二障擾其有情故今離此二障名寂具德稱圓也二具三德故名圓即斷德智德恩德以真如上成就此三德故名圓離二死名寂眾生緣有二死昏亂故不言寂果位離二種生死名寂亦圓亦寂持業也圓者簡迄自相迄自相局故非圓問何名自相答水以濕為自性火以煖為自性煖相不遍濕相之中濕相不遍煖相之內此水火等此自相法局附自體故名偏非圓今真如體通一切法為自性故寂簡彼共相如虗空苦空無常遍一切法中雖圓圓而不寂故言圓寂也言此四之體者問四涅槃以何為體答疏云此四之體等疏主烈四種涅槃了便云此四之體即大涅槃若解總名涅槃者圓寂義若解別名分位四个涅槃總得名寂一自性清淨涅槃而本性寂二有餘依涅槃煩惱永寂三無餘涅槃眾苦永寂四無住處涅槃用而常寂又若約用說即四種涅槃別也若約體說即是一个大涅槃也大般涅槃體即真如也言一總四之體皆一者疏主欲擬向下解大般涅槃去且先說真如意道大般涅槃亦即真如上建立皆一真如真如具三方名大般涅槃即一真如上立摩訶般若解脫法身言能生圓覺者問真如既是一體法如何向上得具三義答疏云一能生圓覺等將能生真如就所生說意言真如體雖是理以有能生圓覺之能亦名圓覺問如何無為理能生有為智耶答此說生不是種子生現行之生但是增上緣中說生也能生有二義一所依義說邊生如地能生一切草木草木自有種子以依地故地得生名二者為境能牽生無漏智亦名能生也心不孤起託境方生智起必依境牽生故以此義故亦名摩訶般若也言體覺性者問真如但能生圓覺智智體不是圓覺智如何名般若答疏言體覺性故意道體不是覺覺之性故亦名摩訶般若一覺性二能生覺故名摩訶般若言在二乘位等者問二乘身中亦有真如亦能生覺何不名摩訶般若答疏言在二乘等二乘位真如雖出煩惱障由被所知障覆故真如生得偏覺不能生圓覺既不生圓覺亦不名覺性既不名覺性亦不名法身所以二乘能生真如不名摩訶般若二乘身中真如是有法應生圓覺性是實宗因云無為同故喻如佛身中圓覺佛身中圓覺是無為是彼無為稱圓覺二乘身中是無為同彼佛身是圓覺二量破云汝許二乘身中真如是有法定不能生圓覺是宗因云有彼障故同喻如凡夫身中真如凡夫身中真如有彼煩惱所知二種障故不能生圓與見二乘身中有彼所知障同彼凡夫無圓覺言大智度等者問般若是智智是有為能證法如何將所證真如亦名般若答疏云大智度等疏主解三事涅槃之次喚真如作摩訶般若恐人疑故引智度論及華嚴經證也論云說智能證智智處真如理理是智所依止處處亦名般若智度論既如何妨此經將理為智華嚴經云自性清淨心亦名無師智心有二說一貞實心二緣慮心此取真如理貞實心也以真如與諸法為性名自性故真如離二障名清淨真如是心之性故名心故真如名自性清淨心也梵云吃栗吒質多此云真實心如世木心最為真實故無為心也即自性清淨心單云質多此云積集積集名心即第八本識有為心也言亦名無師智者以智不從他緣生故名無師智智之性故智名真如非生因生從了因得故名無師智何妨此問智性名摩訶般若也言出所知等者問真如之上有何道理名法身答疏云二出所知障等二義一若有所知障在真如不名法身一未離纏縛二不能與萬德為所依故不名法身今果中真理一出離所知障二與萬德所依故名法身也問如何唯識論斷煩煩障證法身斷所知障得報身今言出所知障名法身者豈不相違答此據一分義說約增勝說若約究竟說事須總離二障也言勝鬘云等問何故事須離二障方名法身耶答疏云勝鬘云等問果中真如出所知障名法身十地菩薩真理還出所知障應名法身答十地菩薩分段所知障及下地俱生所知障真如但分出所知障猶上地微細俱生所知障未斷盡故不名法身果中真如全出所知障纏名法身也言在二乘等者問十地菩薩在因中未得無學未出纏所證真如非法身二乘無學永斷煩惱盡知所證真如亦出纏應名法身答疏云在二乘等意言二乘雖出煩惱障無萬德功德故所證無為不與萬德為所依止故不名法身二乘全未斷所知障不名法身但名解脫身非法身也下經云其實未得一切解脫佛說是人未實滅度斯人未得無上道故但名涅槃而非大般涅槃也言三眾苦都盡等者問如何真如亦名解脫答疏云三眾苦等即是變易分段二種生死名眾苦離二死故名都盡離二障二死名解脫問十地菩薩還雙斷二障等應得此解脫答十地雖證一分真如未離變易生死不名解脫今果位離二死二障故名解脫也言在二乘等說等者問二乘無學人無餘苦依身盡應名此解脫答疏云在二乘說分段等即是相應縛所緣縛盡是煩惱障也相應者心王心所二十二法本非是縛白淨無記法由與煩惱貪嗔癡相應而起煩惱當體即縛是法由與彼心王心所相應令相應心心所法不得解脫名相應相應即縛名相應縛二者所緣縛有二義一相分縛見分所緣縛能緣只為所緣境強縛能緣心不得解脫名所緣縛二者由能緣心與貪嗔煩惱相應緣著色心等境能緣貪心繫縛所緣境不得解脫能緣縛所縛名所緣縛言然二乘等者問聖教說世尊言三人同坐解脫床我與汝等既佛得大解脫涅槃如何二乘不同得大解脫涅槃答疏言然二乘者亦微得此亦有疏言漸得此言三乘同坐解脫之床等者且約煩惱障說得一半解脫非圓解脫真理為依故說為床以智證之故名同坐也言由此二乘亦名者問二乘無學所證真如得名涅槃何不名大般涅槃答疏言由此二乘亦名得涅槃然非大般言義不具足者問何不名大般答疏云義不具故未圓解脫又無萬德所依故名義不具足也言又依涅槃第二卷者法喻雙標問依何教要三事具足名大涅槃答疏云又依涅槃等摩訶般若是二空智法身是真如理由智證理二障盡處於法身理上假立解脫三事具足名大涅槃闕一足不名大般涅槃問解脫為復向智上立為復向理上立答六無為皆依真如上立故於理上立解脫為正言般若能證二空等者問何者是般若之體何者是法身之體何者是解脫之體答疏云般若證至假擇滅體謂此三事能證須是二空之智所證須是二空之真如理解脫須是離二鄣二死解脫方名大般涅槃若唯生空智唯證生空理但離煩惱障一分段死縛之解脫雖是三事不名大般涅槃言解脫即是等者哲云將日光況般若能證智如般若虗空喻法身理中間暗相盡處況解脫由如日光未出時暗相與虗空合日光起來暗相盡處日光與虗空合正是暗相處時便是日光與虗空合時正是日光與虗空合時便是暗相盡正是摩訶般若智起時便是障盡時正是摩訶般若智證法身時便是解脫時故於法身理上假立解脫言假擇滅體者謨云且六無為中前五無為名體俱假真如無為名假體實故說擇滅而為假也擇力所得滅名為擇滅況是依理智上或苦不生假名解脫體無名假擇滅實唯真理能滅之性體不無故故名假擇滅也言如伊字三點等者涅槃經中舉喻如世伊字梵書伊字兩點在上一點在下如世間倒書品字相似問准向下經文自相違如摩醯首羅面上三目三目與伊字皆況三事涅槃兩文不同伊字點在上一點在下三目一目在上兩目在下喻既不定法如何得轉轉者通也答哲云但取三法不縱不橫不異之義何要責其上下數不同諸有智者不應難喻有解云此亦不妨摩醯首羅三目況能證所證也摩訶般若是能證智如向上一目解脫法身是所證理如向下兩目也若是伊字即作能依所依解兩點在上況般若解脫為能依也向下一點況法身一點為所依上解標文言別不成等者別釋也如伊字三點各別不成若將伊字三个點各別零落遠著得成伊否答別不成伊又將三點竪上下似歷水得成伊字否答竪亦不成問若將三點橫布似太歲日行火炭橫著得成伊字否答橫亦不成小乘薩婆多說能證智別所證理別解脫別此則三事條然有其別體不成涅槃言許別時得等者結也如無間斷惑解脫證滅後身智無方顯無餘依名為解脫即名別時也若望生空智證理時或苦不生之解脫亦非前後據實理者三乘無間道斷煩惱盡得無漏智由未證全得解脫後苦依身盡灰身滅智時方離縛盡名為解脫此三事橫前後名別時得不名大涅槃也言三事涅槃不異不一等者有三解般若是有為理是無為有為無為異故名不一智證理時冥合一處名不異二云法身是實解脫是假假實有別名不一攝假從實名不異謨云法相宗云如般若望法身說理智體殊依圓性別是不一智冥於理如日照空不可於中分別殊異是不異又將理智對於解脫彼有體能滅滅性是實有故解脫是假是不一日光與彼空相合時中間無障假名解脫亦不可分別是不異故下結云俱時得故若依法性宗解不一不異別依一真理上建立三德故不一離一無三故不異真如本來無執處即是般若德本來無障即是解脫德無有生滅即法身得德也問二乘人得有餘時已得無餘要身智滅時無餘方顯二乘既俱時得莫是大般涅槃答但得名入涅槃若喚作大涅槃則不是也不異不一又須俱時方為此體也言縱不成等者若總三法俱時三品勝劣而得此亦不成竪上下名縱傍前後名橫各三別體前後證之理亦不成即是橫也如伊字三點竪上下亦不成伊橫布三點亦不成伊三事涅槃俱時不前不後不縱不橫不一不異方成大般涅槃也言若三別體等者若計能證智是有為法身是無為解脫是假便不成三事涅槃言由起大智證等者法喻雙結都結三事涅槃也言非如二乘等者有宗不立真如然計智慧擇滅解脫三事皆別但名入涅槃不名大涅槃也二乘人若望所顯無餘涅槃有智即有先後今望所顯無餘涅槃與其身智為前後也若望二乘自起生空智證生空理煩惱解脫得有餘時亦無前後也言餘別出體釋名等者出四涅槃體也六門分別一出體二釋名三得時四得人五斷障六入意且出體中初引論文後正出體引論文者論云一本來自性清淨涅槃謂一切法相真如理雖有客染而本性淨具無數量微妙功德不生不滅由若虗空一切眾生平等共有尋思路絕名言道斷唯真聖者自內所證二有餘依涅槃謂即真如出煩惱障雖有微苦所依未滅而障永寂故名涅槃三無餘依涅槃者謂即真如出煩惱既盡餘依永滅故名涅槃四無住處涅槃者謂即真如出所知障大悲般若常所輔翼由斯不住生死也上引論文出體者唯識有二師解一師云初後即真如中二擇滅攝自在清淨涅槃無住處涅槃是真如攝問彼師自性清淨涅槃真如可爾無住處涅槃如何亦是真如攝答初師意煩惱障能繫縛眾生不出生死正是縛法所知障不能繫縛眾生障不是縛法若斷縛得者是擇滅斷障得者真如此初師義中四句分別一是涅槃非擇滅自性及無住處二是擇滅非涅槃前三果人所得擇滅三亦涅槃亦擇滅中二有餘無餘二種四俱非者可知此四涅槃以真如及擇滅無為為體也第二師云初自性涅槃即真如無為為體後三涅槃皆是擇滅無為為體問無住涅槃不是斷縛得何言擇滅無為為體答擇謂簡擇滅謂斷染無漏慧名擇斷所知障名滅故斷所知障所顯涅槃亦名擇滅無為擇滅有二義一斷煩惱縛盡證得涅槃名為擇滅無為二滅障證得亦名擇滅即無住涅槃是滅障得故亦名擇滅無為攝故唯識云故四圓寂諸無為中初一即真如後三擇滅攝第二師為正也又自性涅槃在纏真如為體後三涅槃多以出纏真如為體以無住涅槃十地分得未全出纏故以斷分別二證得一分出纏真如為體也上出體也二釋名者摩訶者大般者入義路云大之般依主釋般之涅槃依仕也釋別名者一本來自性清淨涅槃本謂本際來謂舊至眾德常然名為本來自能離染名清淨有餘依涅槃者餘殘身在是苦之所依故云有餘煩惱斷盡證得真如顯其因盡苦依未盡異熟由在名有餘依涅槃無餘依者煩惱斷盡餘依亦無餘依無處證得真如名無餘依涅槃也無住處者住者著處謂所不著生死涅槃二處名無住處涅槃問論云如何善逝有有餘依意云既無苦依身如何有有餘依涅槃又有真常身故如何有無餘依涅槃具此二問意答有二義初約化身化相論云雖無實依而示現有順同二乘有也三十四心成道時有有餘依雙林入滅荼毗時有無餘依此乃示現二約報身上說與二乘別也有漏依盡故佛得無餘涅槃涅槃云捨無常色獲得常色言有餘依者佛有非苦依身在名有餘依以佛世尊具無漏五薀故即與二乘有餘依別也問大乘初地入見道分斷所知障分得無住處涅槃如何前三果有學分斷煩惱障得不有餘依涅槃答小乘有學謂自利雖分斷煩惱障不得有餘依大乘自利利他雙行分斷所知得無住處涅槃也問如何因中真如名自性清淨涅槃不名法身耶答涅槃者寂靜義因中亦得身者依止義不與功德法為依止不名法身也二釋名也第三得時者疏云自性清淨涅槃自有二類一自然得名得二顯證名得雖諸凡聖皆得成就據顯時說唯在聖位聖位分二初果小乘後大乘且小乘初果人斷見道分別煩惱盡時分得自性清淨涅槃後三果人漸次斷修八十一品煩惱盡時得自性清淨涅槃若緣覺人一坐斷見修或時得自性涅槃若有餘無餘涅槃羅漢緣覺盡智時得若大乘人菩薩初地已去分得自性清淨及無住涅槃若至佛位四種皆得圓滿總名得時也第四得人者謨云總有五類人得一切凡夫得初一二乘無學不定性者得初二自性有餘涅槃定性者初三更加無餘涅槃又漸悟菩薩得初二自性有餘并無住也頓悟菩薩得初一自性涅槃并無住佛位四種皆圓論云一切有情皆具初一二乘無學容有前三唯我如來可言具四第五斷障有二種一分別二俱生分別煩惱能障三乘見道所證自性涅槃俱生煩惱能障二乘修道及無學道中三涅槃也亦能通障大乘位中四種涅槃也所知障亦二分別者障極喜地自性并無住涅槃俱生所知障能障大乘修道位中自性無住及無學位中四種涅槃也第六入意者問聲聞等有何意入於涅槃答聲聞自利猒生死故入有餘涅槃緣覺自利樂寂故入有餘依涅槃二乘人俱謂猒自苦依身如捨眾病故入無餘涅槃菩薩為自利利他故入無住涅槃由此三乘人入意各異不同凡夫雖受眾苦不能自利亦不能利他故不求證四妙圓寂大般涅槃經云下士勤方便恒求自身樂中士求滅苦不樂苦依身上士恒勤求自苦他安樂若令他離苦以他為己樂不求證四種涅槃也上義了門解言今明彼佛等者問經云復見諸佛入於涅槃四種涅槃入何涅槃答疏云今明彼佛等向娑羅雙樹間北首而臥以火焚身示現同小乘人入無餘涅槃雖然順同小乘入無餘涅槃小乘人身智都盡佛入涅槃再起身智他方教化問何不入餘三種涅槃答化緣已終入滅時至但示現無餘不要入餘三也故論云涅槃無上由如鎔銅火勢雖滅而同不滅不同小乘由如燈滅也言初得成佛等者問何不入大乘中無餘依答疏云初得成佛等問三身中何身入答但化身入非報身入言所應度者問佛何不且住世教化如何示入涅槃耶答疏云所應度等謂佛本出世但為教化有緣根熟眾生今既有緣根熟者皆已度訖更何要住世住世亦無益所以示入涅槃言其未度等者問東方佛滅後有根未熟者如何答疏言其未度者等故起留塔舍利為得度因緣也言舍利梵云等者骨髮肉總得名體也故經論云舍利骨也只攝得骨餘肉髮攝不盡智論說舍利至法滅時化為如意寶珠處胎經云並在金剛水際准此說既不同皆由化利意別也言卒都波云等者明起塔經云以佛舍利起七寶塔表有舍利可高顯故亦云塔婆訛也或云浮圖皆訛也若無舍利云制多支提即虗庿也塔字書藉無說處唯葛洪字菀云塔佛堂也問幾人合起塔答准長阿含經四人應起塔一佛二辟支佛三聲聞四輪王因緣經云八人合起塔一佛二菩薩三辟支佛四阿羅漢五那含六斯陀含七須陀洹八輪王輪王塔一露盤見之不禮非聖人故初果二露盤二果三露盤三果四露盤四果五露盤緣覺人六露盤菩薩七露盤佛八露盤問有何勝利勸人造塔答有三意一以表聖人二令他生信三為報恩約勝而說令他信作得度因緣問般涅槃佛為報為化答設爾何失二俱有過若化佛如何起塔其量極高豈化土中得安多塔若是報何得有六趣眾生及涅槃事答即於化土中而施報土勝劣既以見亦別故言又論本科照境等者第三敘論重科所見七事之中有七段經文疏主將論家七段科文自作眉目束為三段至此已來論家疏家七段科文解一遍了次下論主又科體其心眼也說因中能照光所照境光中七事三段文中除能照光爾時佛放眉間白毫相光除此有文也從照于東方萬八千世已下科也言又依器世間等者經云照于東方萬八千世界下至阿鼻地獄上至阿迦膩吒天朗者照義上下二界皆照名竪朗言眾生世間等者所見六趣眾生經云於此世界盡見彼土六趣眾生科為眾生世間最後起塔科為量種種中間五段文見佛聞法見四眾見菩薩修行見佛入涅槃科為數種種也言數種種者牒也言示現種觀者解也言即餘五所見等者疏主解也七事之中除却兩頭也此論文倒也應云種種數觀見種種事問論主何故指五般事為種種數也答光中萬八千世界每界之中見佛佛中便有他受用佛與大化小化身中便有降生成道等八相天親菩薩體經意不能具述空言數種種也婆羅門語先所後能故云數種種大乘小乘六度四攝八萬四千法門不一名種種也見四眾亦爾有修行者有得道者菩薩有地上地前一世界既爾何況萬八千世界問何名示現答示現者即示顯也問何名種種觀答即是靈山會上觀見東方事名種種觀官音也即餘五所見一佛二聞法三四眾四見菩薩五見佛入滅又見彼土現在諸佛名見佛及聞諸佛所說經法名聞法三并見彼諸比丘乃至修行得道者名見四眾四復見諸菩薩摩訶薩名見菩薩五復見諸佛般涅槃者名見佛入涅槃論主科五段經文名數種種也論主自解云示現種種觀也故疏主科為數種種為五般觀見此中五種事故言論開為四等者論家又科五段為四段合四眾與菩薩一處總向菩薩修行中攝所以有四路云疏主不合道論開為四應言合為四合五段作四段正是合也言一者食者喚光中佛作食從喻為名世間食喚喫著資長人身根大種發識明利是段食光中佛彼靈山會眾生見時生信資長著信進念定慧五根也若段食喫著則資長眼耳鼻舌身五根也所以天親菩薩云此是食義食有二義一者資長義資長眾生善根段食亦資長身根大種從小向大從劣向勝名食二者住持不壞義此身不壞不散名任持義此約所食故名食也言又云是示現等者問故人爭知有示現依止依食答古人云見對法論中說有四種食一者不淨依止住食謂凡夫有煩惱不曾伏斷所食是不淨二者淨不淨依止住食前三果人及七地已前菩薩未受變易者未斷盡煩惱所食名不淨食已得一分無漏法名淨三者清淨依止住食謂阿羅漢辟支佛煩惱斷盡所食名清淨四者示現依止住食謂八地已上菩薩受變易者并佛菩薩實在十重他受用土中菩薩受變易不喫段食如今起俱生種類身喫段食是示現也佛與菩薩總名示現依止住食古師見此文引來疏主難云若空有佛此食事亦可通示現依止住食既通八地菩薩何故空說佛耶言若爾菩薩八地者疏主反難也意言應入此數種種食中攝也又此食中唯攝佛無菩薩故知不當佛有八相成道何故不空說說喫飯也言又受用義等者疏主自作一解遮防外難若取受用法樂能食故食者即有八地菩薩受用法樂之過何唯見光中受用法樂此能食故名食即八地菩薩亦應攝入食中明此中意言但取資益任持此靈山一會眾生為食義為正也言二聞法者即經云及聞諸佛所說經法言三修行等者謂四眾修行得道此修行中攝法多比丘比丘尼優婆塞優婆夷及菩薩盡向修行中攝言四者樂等者問入滅如何名樂答疏主解論云生滅滅已寂滅為樂靈山一會上見佛入涅槃天親菩薩云佛既入涅槃無來居寂滅安樂也路府難云佛入滅滅無也如何言樂此解不然但是示現無來不滅也言又樂有五等者因有天親論中解樂疏主解云樂有五種一自性樂攝云通有漏無漏有學無學三界所繫所有攝益身心之受名自性樂喜樂捨受而為自性捨中唯忻行捨非滅行捨二因樂者能生樂受與樂為因體非是樂一順生受心心所法二感樂因五戒十善業三順生樂受根塵及觸並名因與樂為因故體通五薀三苦對治樂者設身有苦當念惡趣眾生眾生身上有寒苦將八寒對治眾生身上有熱苦將八熱對治同時慧覺知寒熱暫時苦息滅之處假立樂名實非真樂也問為復取後念苦不生處為苦對治樂為取後念樂生處為苦對治答設爾何失二俱有過若取苦不生處名對治與因樂何別若取後念樂生處為苦對治樂與自性樂何別答但取後念樂生同時之慧以為自體名樂覺是正苦對治樂體也四受斷樂者攝釋云論主然依勝義諸有所受皆悉是苦滅盡定時此勝義苦暫時寂靜故名為樂即滅盡定而為自體勝心方覺為苦名勝義苦從其所猒有漏為苦五無害惱樂者此復有四一出離樂者謂出家人修信戒等為體二遠離樂者遠離欲界生澁煩惱名離生也得初禪靜喜樂名遠離樂離下地染得上地樂三寂靜樂二禪已上無尋無伺名寂靜樂但指二禪已上通三禪四禪名寂靜樂四菩提樂即菩提覺法樂攝釋云為無分別智及後得智而為其體問前出離等三由居有漏云何總名無惱害樂答取前三能順三菩提樂名無惱害故言此入涅槃等者問今此經中入涅槃者受快樂即是後第三寂靜樂即當經云復見諸佛般涅槃者上解數種種了言示現種種觀等者緣寶塔向上有兩般義一寶塔高下橫竪見數則屬量種種若造塔無數恒沙則屬數種種此顯寶塔無數恒沙觀此知故此是重科造塔入數種種故言量種種者准下三量一多少量無數恒沙二高下量五千由旬三寬狹量二千由旬經云復見諸佛般涅槃後以佛舍利起七寶塔寶塔高妙五千由旬縱廣正等二千由旬是也言又重科所見等者論第二遍重科科中不科照境只科所見七事之中六趣眾生中是凡夫煩惱未斷名具足煩惱差別已下六事名具足清淨差別就具足清淨差別中佛法弟子顯三寶異故又就弟子之中重科乘差別菩薩乘聲聞乘有差別故又就前具足清淨差別中有世界有佛見三寶者名為有佛問佛與弟子差別如何定言有佛答依佛有故總名有佛即經云又見彼土現在諸佛乃至行菩薩道是也又有世界無佛經云復見諸佛般涅槃後以佛舍利起七寶塔上來若言數種種將論解經若言量種種却將經解論上來論主㝡初科經為七段七般事疏主第二重科烈七科三後論家又兩重科計三重也言初彌勒示相懷疑等者紀國云何故世尊入定生文殊彌勒等疑答表二執難除一乘難信是故如來深入禪定廣現希奇發彌勒之深疑動文殊之妙答引過去燈明之瑞相證今日釋迦之說經彌勒菩薩一則帶示相不知二則帶眾人實不知帶此兩意以彼彌勒菩薩供養二十六恒河沙佛雨華動地說法華經總曾一一眼見今見雨華放光不合生疑但是示相不知也問彌勒示相不知有何意答顯法執難除大乘難解十地滿心菩薩尚自不知聲聞聞向下所說法不生疑慢十地滿心菩薩尚自不知我等但生信心二者示相不知意從發問警覺羣生彌勒若不疑亦不問既不問亦不答因何有警覺群情耶言彌勒道滿當生等者問彌勒如何示相不知耶答疏言彌勒道滿等即經云閻浮提歲數五十六億七千萬歲爾乃下生於閻浮提即是道滿時也亦是三僧祇劫滿名因成現世也涅槃經云汝阿逸多未來有王名曰穰佉當於是世而得成佛所以法華會上名為道滿當生道者即成佛道也言逢緣不少者值二十六恒河沙佛受持讀誦甚深也言植業良多者問何因植業良多答只緣逢緣不少依自業色身供養佛及聞法依教修行六度萬行皆悉具足所以名植業良多言眾人以根地人下者鈍根羅漢共凡夫外道向佛會下坐鈍根羅漢居欲界散心凡夫外道雖在欲界便引得上界定或初禪等居在定心那个欲界散心羅漢不知凡夫定心中事名地下又羅漢從色界定起不知無色界生心中事名地下又鈍根羅漢不知他利根那含心中事名根下利根那含不知他鈍根羅漢心中事名又下此但望彌勒說根地人下若望如來說兼彌勒亦是下又彌勒因滿歷事叵多放光等緣昔曾見餘眾不爾故名示相言徵祥者兆也今放眉間光是說法華之先兆言觀外相以疑等者外相即是動地雨華放光等問何不觀內相入定答眾生根地人下不知入定之所以是故不疑入定所以不問也言彌勒狹自他之兩意等者申自家示相之疑并騰四眾八部實疑發問文殊解發問先因者因由所以向前雨華動地總名因說經是後果緣解第三段科文了故重指也言此初文也者第一牒瑞徵因也經云爾時彌勒菩薩作是念等者一將求因緣念以何因緣而有此瑞今佛世尊入三昧是不可思議現希有事二將求問答念當以問誰誰能答者三我今當問念復作此念是文殊師利法王之子已曾親近供養過去無量諸佛必應見有希有之相我今當問今者世尊現神變相牒放光以為問也以何因緣而有此瑞亦是問放光照境所見問彌勒實不知如何言示相耶答不知佛實心也若知者約他心說也問若約他獼猴獻蜜尚自得知何唯彌勒又問獼猴點淨却測佛心四眾見光寧云不測答獼猴點淨佛力加持四眾不知由在定亦不定約知他心但是彌勒向二十六恒河沙佛邊見佛雨華經歷事多知而故問故言示相不知也言妙用等者解神字神通轉異解變字外應群物立以瑞名兼取光中七事為瑞即信也今日放光是說法華經之信心也又瑞者祥瑞與說法華經為祥瑞亦是舍利弗成佛之祥瑞瑞者信也成佛之信也言瑞節信等者疏應合言即信也向外節度去將節去亦是信也古人以竹刻之所以合契也昔者天子用以錫人春秋云司馬握節以死此傳寫人錯非是節字即字為正也言符應也者符契契應也今日放光與說法華經為契應符應言此問放光等者此唱之中現神變相以何因而有此瑞唯牒說因放光為問也以彼放光文最在後乘父便故先牒問也言此舉奇詢等者奇者奇特奇異也經云今佛世尊入三昧是不可思現希有事故言舉奇後詢答者經云當以問誰誰能答者詢者問也訪也經云今佛世尊入于三昧是不可思議此牒威儀中入定也正是不可思議經云現希有事一句經文牒威儀中雨華動地名希有事也言或雨華動地等者第二解將此當唱現希有事中雨華動地割入前唱與牒徵因中放一光處收總名現神變相總名而有此瑞也言唯入三昧等者即舉奇詢答中唯牒入定即經云今佛世尊入于三昧是不可思議現希有事此唱總是入定意也言誰能答者問舉奇詢答中何故彌勒唯牒入定問答前來向外凡夫不知所以不疑入定也今此唱之中彌勒述自心中事所以兼入定為問也經云當以問誰誰能答者詢訪答人即是將求問答也上舉奇詢居念也言推功上德等者經云復作此念是文殊師利至希有之相推功上德經云我今當問即是謙己方陳且推功上德者問靈山會上大有菩薩何不問餘人唯問文殊答二意一顯舉會人疑唯文殊能答餘人不能二者久遠已來師資相承為妙光時早曾發問今師資相逢合問文殊也紀國云舉會菩薩雖多緣彌勒是隣近當來佛所以能疑能問文殊是久遠過去佛所以能解能答也言文殊師利道果等者問如何文殊師利得法王子名答疏云文殊師利等且疏外餘三解一云法王是諸佛子即是文殊菩薩能紹法王之位當得作佛名法王之子依主釋若如此何唯文殊菩薩亦有此能二云法王即是文殊菩薩久已成佛號歡喜藏摩尼寶積佛菩薩身又示現為法王即子持業釋問據經文有之字如何作持業釋答三云唯文殊一人獨名法王子何以故答子者紹繼文殊菩薩自身久已成佛曾紹繼諸佛法王之位名子者紹繼義文殊菩薩獨得此名餘菩薩未成佛未曾紹繼故此不說第三為正也下解疏云道果久成等者二解一云三大劫是因第十地是因之末復名因末第二云菩薩在因對果稱末故名因末末小也佛果菩薩名道果紹佛法王之位獨得法王子名者紹佛便是子義此菩薩已久成佛紹繼佛位故故得子名餘菩薩不爾也言文殊師利住第四等者問如何名必應見此希有之相答疏言文殊師利住等即供養佛多个个佛邊聽法聞經皆見雨華動地彌勒菩薩言必應見此希有之相此推功上德也言謙己不知者逢緣不少植業良多示相懷疑稱為謙己化相實知經云我今當問即謙己方陳也上解下依論也言論云問於一人等者問彌勒菩薩何故唯問一人又問何不剩問十人五人百人千人等答疏云論云等意道不假問多人但問一人多人欲聞是故唯問文殊菩薩疑則有千人萬若說解一人便解得多人疑處乃至斷多人疑處亦只得一人能斷所以不問多人唯問文殊一人言心多未了等者謨云此意言未了達之心則多所以多人皆疑解心不必在多所以一人能答多人共解何須更問故解在非多即是不解即種種不同故疑有多解即一切皆同故答唯一言論云示現佛與等者論問云世尊入定了自出來說經何要彌勒問文殊答疏云示現佛與等彌勒問了文殊答言我見燈明佛本光瑞如此以是知今佛欲說法華經欲說大法去欲雨大法雨去果然出定來便說法華經名佛與弟子互相隨順又佛說法若無問答資不順於師若問答了佛不說法師不順於實言證說等者一云文殊菩薩證驗道佛出定來說法去後佛果然說如來說法不虗名不相違二云證者證悟雨華等事文殊一一親證來今日說名證說等法皆不相違言為現大相因等者所說法華經乃名大相也因者現神變放光照境也今現神變與大相為因大相之因依主釋言又大相等者第二解大相者瑞相也正是其因經云今者世尊現神變相即是大相此與說法為因大相為因說法為果所以現瑞相即是大相大相即因持業釋言又因者等者第三解因者是所以義此解意說法為因現相為果問有何所以現大相答為說經故現大相若說諸餘經現小相只緣說法華經所以現大相此則說經與現大相為因由所以因由所以却屬因即此說經與現大相為因由所以因也言何故唯問文殊等者解論家問詢也何故不問觀音世至等唯問文殊耶答疏云有二法推於文殊言一現見諸法者論云現見者有三義一文殊菩薩在靈山會上坐自眼遙看東方世界名現諸法二現見者證現義定心現量證見此法門名現見諸法諸法者即雨華動地放光等事三文殊菩薩此雨華動地放光光一一過去親自作也故言現見現見親見義證者證驗義言二離諸因緣自心等者有三義一離構畫因緣二離比知因緣三離從他傳受因緣自緣自心成就法者亦即是前現見諸法故意顯文殊不從他傳聞也言謂文殊師利離諸等者疏主解也問文殊答中云我於過去曾見此瑞放斯光已即說大法是故當知今佛現光亦復如是舉古顯今即是比度而知又云如我惟忖即是思惟忖度如何得名現見諸法離諸因緣答但是文殊謙遜之言無煩量難所以科云示相籌量答示現也言示現種種瑞等者解前光中七事論主標也言示現彼彼事者論主自解種種瑞相光中七事非一名為彼彼七事中一一事有多種名彼彼也言現沒住滅等者論文也將現字向下轉應言現沒現住現滅也言所見六趣眾生等者現沒即六趣眾生沒謂汩沒也現住所見佛法四眾菩薩諸菩薩現在彼東方世界中住名為現住也現滅現佛入涅槃菩薩起塔故名現滅也言或住即現在等者第二番將現字共住一處解也將滅字共沒字一處解也住即現在滅即沒無見佛入涅槃及為起塔名為滅沒所餘五事皆名現住也言論云故文殊能記等者記者分別解釋之義也言文殊師利所作等者解文殊師利具二成就所以問之二成就者所作成就因成就也言所作者即是前來進財行供養向二十六河沙佛邊行菩薩行是所作事今已成就名所作成就言因成就者謂等者雨華動地是此因文殊菩薩已成就得名因成就也論自解云謂一切智成就緣者此緣字即與向因字不別也緣字即是因也此有二解一者一切智是文殊自身以成就得歡喜藏摩尼寶積佛身中一切智雨華動地放光是說經之緣歡喜藏身佛中一切智能成就得此說法緣故名一切智成就緣者因也即是雨華動地放光二者雨華動地放光是緣也一切智是舍利弗等三根聲聞因世尊說法聞開示悟入當來成就得入一切智此雨華動地放光與聞法華經人身中一切智為緣即是說法緣也名一切智成就即是外德滿故此智之與緣文殊菩薩總已成就得依謂約當來因果解言重復釋言等者依疏解約現在因果解解前因字因者相也現瑞相是因說經是果此因之與果文殊菩薩身中一切智總能成就得所以唯問文殊言文殊外因等者問何故唯問文殊答唯佛能知諸佛事以文殊是過去佛故問也言故今推問者謙己方陳也言眾人實生心等者意靈山會中餘凡聖等根地人下故實不知佛放光等意非是示相故言實生心惑也言以根地人等者問如何四眾不知入定之意經中即不牒為問答疏云以根地人等意道不牒入定眾人不知世尊入定若則疑入何定元來不知所以眾人不疑入定以根地人並居下故問彌勒菩薩知佛入定亦合帶得一分定向上疑為問何不問也答彌勒菩薩以眾生不疑入定且隨多人不疑處亦不疑入定經云今當問誰者彌勒菩薩一則示相有疑二則知有問處也眾人疑則實疑又不知問處此眾人實生心惑也言初雙申兩意者經云爾時彌勒至文殊師利言經云彌勒菩薩欲自決疑自申疑意又觀四眾之心申他人疑意懷自示相心狹他實心從爾時世尊四眾圍遶已後至而問文殊師利言盡是結集家安置千大羅漢當日世尊欲擬說經時更有何事阿難言當日世尊入定結加趺坐便潤文結加趺坐入於無量義處三昧又道當日雨華動地便潤文安置是時天雨曼陀羅華又道當日四眾八部彌勒疑疑作何語便安置而問文殊師利言言字已前盡是結集家安置但是心念未發於言也言此後發問先因等者經云以何因緣而有此瑞者此八句經文正是問詞向下六十二行頌頌此八句經更不向前頌也有抄云直從威儀中述前長行也若不述者頌中何故說六趣眾生四眾八部耶若言從八句經文述八句經中故何不說六趣眾生等明知述前文也答此頌只是頌八句經文八句之中只是結集家略却去緣偈中廣述所以長行略也問偈文述長行長行既無何故偈中獨有耶答六不同中有無不同也廣略不同也此乃是長行與偈不同意也若唯如長行開亦合說雨華動地照境次第牒之今此但是長行略也偈文開也若同諸師述向前經文有二種失一時代不同失彌勒是佛在時菩薩也向前經文是佛滅度後阿難結集時安置豈有佛在時菩薩懷疑發問是佛滅後結集時事耶二云若述向前經文科文不次失疏主既於慈氏雙申兩意中開出長行頌文明知不述向前文也若述向前經文者長行偈文即合於向前威儀中開出上解慈氏雙申意次解發問先因者經云以何因緣而有此瑞此一句總也問何名總答雨華動地放光包含總故云總也言神通相等者下二句別也神通之相者牒威儀雨華動地也放光明等者牒說因中放光照境也言彌勒狹自他等者問牒前因中雨華又牒說因中放光以為問云何所牒威儀中入定也答彌勒狹自他等入定眾人不疑彌勒菩薩亦不牒長行既不牒偈文亦不述言悉見彼佛國等者牒說因中照境所以為問也經云照于東方萬八千土所照境也悉見彼土國界莊嚴所見也若悉見彼佛是他受用身居他受用土即寶地寶樹菩薩為以莊嚴若悉見彼佛小化身居穢土地獄餓鬼畜生以為莊巖經云如淨瑠璃中內現真金像證佛為莊嚴經云世尊在大眾敷演深法義又云為求聲聞者說應四諦法證說法也經云因佛光所照悉見彼大眾證有情莊嚴經云於此世界盡見彼土六趣眾生又云又見諸佛土以眾寶莊嚴證器世間莊嚴也問光中若唯有淨土可言莊嚴既有穢土六趣眾生何名莊嚴答望說所變同能變總為莊嚴也問光中既有八部四眾何故空說佛莊嚴耶答萬八千世界中不過淨穢二土於中佛不過化佛報佛二國之中佛為其主自在獨勝故偏說佛莊嚴也言論總解經意等者依論釋也問何名總解經意耶答二解一云經文意總論主所以總解二云論文意總論主所以總解言示現彼國者論主解經意也萬八千世界也種種差別者即光中七事言示現為四眾等者問何要光中現六趣眾生答為教化四眾事須有六趣眾生既有惡眾生即合有穢言及淨妙國土者說有無煩惱眾生即合有淨土也言為化十地菩薩等者問如何喚十地菩薩作無煩惱人答十地菩薩煩惱所知二障分別者資粮道中漸伏加行道中頓伏初地初心正斷俱生者加行道中漸伏初地已上能頓伏盡然故意力七地已前由起而不為過患八地已上一切不行也言於波國土佛為等者穢土之中化佛為上首四眾八部劣佛為最勝也報土之中報身佛為上首十地菩薩劣也佛為最勝故問既有八部四眾及菩薩何故空說佛為莊嚴不說菩薩四眾八部耶答佛於二土之中為上首也言長牒前文所以所見等者有二意一者緣論文云佛為上首況人不會交長牒取光中所見七事內佛為上首所以佛為莊嚴不說菩薩也二云有說直從威儀成就中長牒也若爾彌勒發問當佛在之時也威儀成就佛滅度安置故知不同今但於長行八句經文之內與下偈文相對但長牒取所見七事之中佛為上首也所以佛為莊嚴也言一為利鈍者為利根說長行為鈍根說偈述利根一覽不假再聞鈍根難堪重宣方悟言二為前後者為前來者說長行後來說偈頌前來聞法不假重說後至未知故須偈說言三為直曲者樂直者與說長行樂文詞綺飾曲說者與說偈文言四為難易者樂難解者與說長行樂易解者與說偈文所說義理難明偈頌成文詞便易解言五為真俗者長行文質直故契真偈頌文飾綺故涉俗長行綴緝契真偈頌文幸意越俗故言六取捨等者長行先舉決定取善偈文後陳及遣捨惡言七為標釋等者長行標舉略述其文偈頌解釋理方開顯也言八為智辨等者長行連綴智無盡偈文重述辨無盡偈文重述辨無盡如似長啟便發智能偈文重敷令生廣辨言九解兩持異者長行解法偈文持法言十為說等者長行樂說法偈文樂修行法言廣略等者長行經云其最後佛未出家時有八王子一名有意乃至植眾德本偈中云佛未出家時所有八王子長行廣偈文略偈文廣者經云又見菩薩種種因緣種種信解種種相貌偈文三十一偈述行菩薩道此長行略偈文廣也言有無者經云入於無量義三昧長行有偈文無經云旃檀香風偈有長行無言離合者長行云及聞諸佛所說經法長行合也偈云演說經典微妙第一偈文離也長行經云是時天雨曼陀羅華等長行離也偈云雨曼陀羅曼殊沙華文合也言前後者長行先雨華動地後放光偈中先述放光後述雨華也言文質者長行經云又見彼土現在諸佛偈云又覩諸佛聖主師子此即長行質而偈中文也言隱顯者如長行云開示悟入隱也偈中云說佛智慧故顯也經云欲重宣此義者重平音重者四義一文重義不重如一瞿聲目於九義俱舍云光獸地方言金剛眼天水於斯九種義智者立瞿聲瞿聲是一顯得九般義義各別故義不重文不異故文重也一个瞿聲將九遍詮義以重用故故名文重二義重文不重如帝釋有一千名名各別故名文不重向下只顯行一千个帝釋義不異故名義重也三文義俱重者如此經偈是也長行已說偈文再述四文義俱不重如此經諷誦偈是也言梵云伽他等者下明九部中云伽陀訛也准疏中意同天竺音梵云伽他者此番作頌公邊頡問何名頌答頌者美也歌也問何名美答偈中文句極美麗故問何名歌答偈歌之故問何要歌美答為讚歎經佛德也詩云頌者美盛德之形容也又能歌君王之德故云歌者美也此上疏主解諷誦義也言訛略云偈等者于闐云偈陀今云偈略也梵音偈翻作句也言此云祗焰者祇焰即是祇夜應頌義重述長行故云應頌也問准下十二分教章中疏主解伽陀正訛不同諷誦義也祇焰祇夜正訛不同應頌義也今此彌勒偈是應頌經如何疏主將諷誦義解此間應偈經耶又如何將諷誦義與應頌一處說耶答疏主意梵云伽陀此翻為頌頌有通名別名若約通名解無問重述不重述是偈皆名頌也故云歌也美也若約別名解祇焰是應頌舊云祇夜也伽他是諷誦若將頌字諷詠如來身上功德則名諷誦若將頌字重述長行便是應頌今正疏主約通名解此偈文故引祇夜來證此處伽他亦通應頌言進詮體義等者問偈事須積集多字始成偈如何百法之中不立偈空立名句文答疏云進詮體義等進者取也將此偈文詮所詮義名進也若不要用閑放著名退也唯識第二云名詮自體句詮差別偈不能詮自性故劣於名也句詮差別也偈不能詮差別之義又劣於句也言退為所依等者聲名句文三法為所依也今此偈體若退為所依不及於聲也然百法中不立偈者以功用劣故還以名句文為體疏言文文即是字若假實合說聲名文屈曲差別建立也言然以聲上等者問此偈頌以何法為體答疏云然以等上大乘出體了言不同小乘等者小乘出體也文即是文字辨云文即通取名句文三法也字中取勝上有功能字不取無功能字及文士者五蘊假者即羅漢身是造論人士者士夫引中但說因士夫有偈未是出偈體依文及士而有於偈偈實有體即聲等言此及室盧迦等者梵云室盧迦此翻處中偈也攝釋云西域釋句其有五義一處中句梵云室盧迦此翻為處中句以三十二字成二者前句或以六字七字所成三者後句九字已上乃至三十六字所成四者短句或以三四五所成五者長句二十七字乃至百字或更多字問今此文殊偈但有四个字為一句計十六字如何疏言是室盧迦偈彼偈八字成句以三十二字成偈答准西域有三十二字今譯就唐言但有十六字如言菩提此翻為覺故無有失何妨梵語八字翻就唐言為四字三十二字翻為十六字故此文殊偈處中偈也又婆沙句有三種一集法滿足句二顯義周圓句三證讚歎句今此偈中隨文皆有也言此初也者經云以偈問曰者略有五問一不知問二愚癡問三試問四輕觸問五利樂有情問今當第五利樂有情問亦是第一示相不知問文殊師利者將欲問事必先呼名也言先偈放光者長行先說雨華後說放光偈中先說放光後說雨華乘文便故問何名文便答有說緣長行中最後說放光後說偈名文便也有云但是彌勒一時間語在前說著光便為次第名為文便也經云文殊師利導師何故眉間白毫大光普照安國大和尚改經應云文殊師利導師何故於大眾中入于三昧若依今時經中本文有四義失一於事有漏失長行先入定後現神變偈文既無譯經人漏却也二者經無次第失長行說因在威儀後烈偈中說因成就在威儀前烈故不次也三者又不相生失入定即次放光後照境即文有相生若不入定因何放光四偈有重言失今言眉間白毫後文有言眉間光言重也已後寫經人若依此寫得福無量章敬云此四解非也以長行云眾人不疑入定彌勒唯自知亦隨眾生心亦不牒入定以為問長行既無入定偈文亦不牒入定以為問偈中亦無入定文言前已說有六不同前後有無何因不許也言威儀中三事者此間三事與長行三事別長行三事一入定二世間三眾生世間名三事此偈中不述入定雨華動地為兩事眾生渴仰為三事言此頌雨華者經云雨曼陀羅華者適意華曼殊沙華者柔軟華問二十八天何天雨華答欲色二天非無非無色天也問無色有定果色何不雨華答光不照故問此華為是業為是定果耶答花欲界天花業果為體色界天花業定通三種色為體無色界天花唯定定果色為體也言自知不問者但是彌勒自知雙申兩意中同於大眾亦隱不問長行尚不重問而況偈中有云唯佛知餘人不知是故不問此說非也言合離不同者長行雨四華偈文唯二離合不同也言華為旃檀者嘉祥云華亂墜表生二乘之智解香風動吹滅二乘之疑惑其華掩惡穢以是因緣故地皆嚴香風滅其嗅以是因緣故地皆淨表一乘解生二乘惑滅內心嚴淨也又此天華向有兩个用一香用二者色用有色用故令世界嚴有香用故令世界淨長行結集略舉華體今引偈中兼舉華用用中有二初半偈華有香用悅可眾心後半偈華有色相地嚴淨有似旃檀香觸鼻悅眾心有華從空下天華觸身悅可眾心天華落地以是因緣故地皆嚴香風掃地以是因緣故地皆淨欲說一乘教先現大神通滿地天華上起旃檀風延法師云加以送旃檀之香氣數里熏人散末利之名華千般覆地雨華更雨華動地復動地問為復是華體向上作旃檀香氣風來吹上香作旃檀香風耶為覆是華但作華香不作旃檀香忽別被旃檀風來吹向上香相和作旃檀香風耶答疏中有二意一云為字通平去二音且平音為由作也華向上本質作旃檀香氣言即似赤白等者問何名香風答疏云即似赤白旃檀香氣可遠聞故香風更遠處聞似彼風吹故喚香作風體不是風二云去音呼此解華但作香不作旃檀香別有外旃檀香風入來吹着華上香喚作旃檀香氣風下經云香風吹萎華更雨新好者言二句動地者長行普佛世界三千界也偈云而此界只指此三千界也言一偈四眾者長行云是諸大眾得未曾有涉云部由類也一聲聞攝律儀眾二菩薩聖德難思眾三天龍八部眷屬莊嚴眾四人王付囑護持眾也言此頌器世間者論家科也論家重科照境已下文云作器世間眾生世間數種種量種種具足煩惱差別具足清淨差別佛法弟子差別示現三寶故復乘差別有世界有佛有世界無佛等意言論家科經言世間疏家科經言照境言即照境也者疏主科也經云眉間光明照于等者初一頌傍照後半頌竪照也諸抄問如何頌中兩處放光答諸抄云偈中放光有此世界光彼界光近光遠光故兩處放光最初一頌眉間白毫大光普照此唯近照此三千世界光也今此唱云眉間光明照于東方萬八千土此遠照他界光問何以知是兩處放光耶答准下文有兩處光也我及眾會見此國界種種殊妙此近光也又云諸佛神力智慧希有放一淨光照無量國此遠光也注經云偈初光頌二乘之根後文放光表六趣之感嘉祥云長行直放一光通照彼此之土彌勒向頌中開之故分二光前光照此土後光照他方此等諸諸解不然頌中只是一處光放光非兩處也此唱但是舉能照光意取所照境不是述長行放光也緣諸解放光或有兩膊上放光兩膝上放光或面門放光今此簡餘類放光問偈中東方萬八千世界或所見境是如來何處放光所照之境答是如來放光眉間光所照之境光言皆如金色等者問如何所照猶如金色答疏言皆如金等有云如須彌山四寶所成眾鳥集之皆同一色今者所照皆如金色表六道雖殊同歸一乘即如朝露照境地色皆紅言光雖白色等者問光白境金有何所表答疏云光雖白等意合見金色世界令眾生發心也言或示現等者經云有見諸佛土以眾寶莊嚴瑠璃頗梨色斯由佛光照外果也言外果之因者內果諸佛身智外果諸佛土相具行一乘種智之因方能招感內外二果言或毫雖白光等者謨云三十二相中有白毫相光從毫相出名白毫相光依主解也放光非白以光金色如日欲出照時天上雲皆作赤色雲既赤色照世界赤赤色此光亦爾元久二年潤七月二十九日於轉經院書寫畢執筆隆國寫本云倭州興福寺苾芻隆覺云云
