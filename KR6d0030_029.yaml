body:
  text: 鏡水寺沙門栖復集言初長行後偈頌文意者經言爾時諸梵天王至深遠音者一心同聲者問五百萬億何得一心同聲答所見同故此亦何爽即以此文便同信解品長行四人同領也經言我等咸歸請者歸命請轉也經言當演深遠音者即甚深如雷請徹遠聞二種音聲已舉此影餘耳言恐繁故例者問此是誰例答謨云有三說一翻譯人例婆羅門語再三反覆秦言好略故例也二云結集時例三佛自說時例非是翻譯也又佛自例則親若結集時例有增減失問十方梵王中何以至南方中例餘六方耶答以東方南方并上方此三方請轉法輪皆總請也唯南方請轉大乘法輪經言唯願天人尊轉無上法輪六方請意同故為一類故向南方例餘六方又三方事意同故所以廣說己以東等三方有不同故東方不說劫多小東南方言一百八十劫南方云一百三十劫故是不同又上方於昔無量劫等今此例下反顯同也故不於餘方例也東方雖無劫數不可便例也又於彼例即便除東南方不可越文而例也言無第四許者前來梵王次第請事未畢是故如來一一言彼佛許之今乃居終請事似畢便以總許而為別許也即言許也言衆梵驚議者於前東方中有念經言諸梵天王各作是念今者宮殿光明昔所未有以何因緣而現此相然說東南方南方及上方皆無此經文也或可餘方歡喜踊躍生希有心即是念亦好也言初頌歎能拔者經言善哉見佛者見是所見所見即大通智勝佛也諸佛之一數也言免音無遠反者章敬云然以義斷勉字為正勉者勗勵課勸也言勸強者力強也意交努力名力強也亦其兩反強也言萌音等者廣雅云冥昧皂衆無知也即是經部群者衆也怋者即無知也士人云喚百性作鞭眠眠者是肉團無眼孔雖然人有七孔不識好惡謂之眠也言涅槃名甘露者涅槃理果名甘露聖道名門二云理名甘露教名為門也言初二頌受苦果者經言十方常暗冥冥莫定反舊不通平聲今亦有也言樂謂人天樂果等者解經失樂及樂想也即三歸五戒今墮三塗不得人天身名失樂及樂想二云樂者所緣境即是人天妙境也樂想者取樂之想即能緣心也言假名樂者能對治苦體是慧故故名假即非實有樂故嘉祥云生死之中無真樂名樂想也言此請轉也者經言擊甘露法鼓者教法如鼓後得智說如似杖擊鼓或真俗諦如鼓將智緣時如以杖打鼓說法如鼓出聲也言此初也者標許可為轉經言爾時大通智勝至法輪者准前却是十六王子在前請梵王在後請有抄說王子請大乘梵王請小乘者未必如此據文勢但是總請不分大小乘也問何故王子先請不為說何故梵王後請遍受十方梵王請便說答緣王子請在前梵王請在後文勢相承梵王請向後也言三轉有二一自二他者一自三轉即是如來菩提下成道時從見道入修道從修道入無學道初轉在見道次轉在修道後轉在無學道初印相轉如實了知是苦聖諦如實了知是集聖諦如實了知是滅聖諦如實了知是道聖諦印四諦相名印相轉二應修轉未知苦諦我應遍知未斷集諦我應遍斷未證滅諦我應遍證未修道諦我應遍修三已作轉一未知苦諦我已遍知二未斷集諦我已遍斷三未證滅諦我已遍證四未修道諦我已遍修言今為他轉者一示相轉謂是苦是苦集是苦滅是苦滅道二勸修轉未知苦諦汝應遍知未斷集諦汝應遍斷未證滅諦汝應遍證未修道諦汝應遍修三作證轉未知苦諦汝已遍知未斷集諦汝已遍斷未證滅諦汝已遍證未修道諦汝已遍修疏家舉一苦諦攝餘三諦經家舉示相一轉攝勸修作證文勢如此故名為他轉大論五十九說由具五種相轉法輪者當知名為善輪法輪一即是得所緣境界二得所得方便三得自所應得四對他相續五今於自證深生信解令他於他所證深生信解今當第四相為他三轉也言此行法輪者問教理行果俱名法輪今此轉者是何法輪答疏言此行法輪也言以移動運等者問何名為轉答疏言以移動運等意言從世尊心入聲聞身從世尊口入聲聞耳運世尊聖道以言說轉向聲聞身中名轉義言是一一轉令聞法等者見道無漏智是一般證四諦理時親見名眼決斷名智照了名明覺察名覺言現其次第者下解十二行相所斷煩惱通三世煩惱盡處得無為理能證之智立四個名一能斷過去煩惱永住不生法中緣四諦理名智二能斷未來煩惱不流入現在證彼理名明三能斷現在煩惱證彼理名覺通緣三世名眼言苦諦之中者偏舉一個苦諦生眼智明覺據實集滅道皆有四行相言如是一轉總別者眼即是總餘智明覺三別也言三轉諦諦等橫別四諦竪通三道一一道中通四諦一一諦中通三道橫而論之每諦下四行相四四成十六一道之中有十六三道成四十八言然數等故者問合有四十八行相何言十二答疏言然數等故若竪而論之上下三道每諦有十二隨望一諦三道說然數等故但名十二行相不言四十八今略舉一苦諦例同餘三諦佛說一諦餘三亦說佛說一道餘道亦然經文影略只於一苦諦向上上下三道都十二行相經文言十二行相約一諦說也言明餘所不能者經言若沙門婆羅門等者問沙門是息惡義如何言不能轉耶答約如今假沙門說未得無漏智故不能轉也言未正證等者不是傍正之正但是圓正也雖證理未圓證故轉不得也問佛如何轉得答佛為一切無間師故具一切智故佛能轉餘不能也言且舉示相者彰所轉法經言謂是苦集等問法輪通三道如何空說示相答疏言且舉示相等言對法等論說者等取瑜伽第六十文四諦大意相似今且依對法等六卷文也言有情世間及器等者且有情簡非情世間出世間上從非想下至捺落迦有漏生死苦果總為苦諦有漏五薀從業煩惱所感業為親感煩惱為疏感有漏當體有生住異滅早是苦向上更有五苦八苦性逼迫總名苦諦八苦依總相說欲界具八苦上界無前七若依差別論有二說一若依八苦立三苦欲界具八苦上二界唯有行苦由愛別離怨憎會求不得生愛惱上二界無也若依三受立三苦色界有壞行二苦無色界唯有行苦三禪已上有樂受有壞苦欲界六欲天有愛別離怨憎會修羅與天戰時怨憎會天男天女愛別離已問有情既爾無情外境如何名苦諦答器世間簡不是有情世間器世間即是山河大地章云若是有情世間業煩惱所生若是器世間業煩惱增起又是第八有漏識緣有漏第八識變親相分故總名苦諦言諸有漏者結也有漏簡無漏法也問無漏有為既有生滅非是苦答無惱害故名為樂也覺法覺故言集有二義者於三性中初解唯取善不善不取無記後通取三性一為因義能感果義邊說為集諦能招感因即是善惡業不簡順生順後總報別報根本隨惑但是感者則取也唯除無記無記不能招彼當來生死苦果故餘皆集諦言對法等者謨言性障煩惱智障煩惱俱生分別迷理迷事根本隨惑惑體不同故名諸也言所起業者總報別報順生順後不定業并身口支煩惱所發者總名集諦言唯識等說等者重成前義十二支總名苦諦有漏皆苦故取薀性故言五亦集諦之業煩惱性故通苦集故故置亦言也路云無明支愛支取支行支全有支小分名五初三支即無明支愛支取支或全界煩惱名取愛憎名取此三煩惱性故後二支即是行支全有支小分名業性故問何名有支一分答謨云有支之中有二種一者識等五支被潤已去轉成有支二者行支被潤已去轉成有支今取第二義中未潤已前行支全被潤已去有支名一分是業性故總名集諦意取業煩惱性也言餘無記法等者謂無記法不能招生滅果故非集諦路云識等五支生支老死支七支全及有支一分唯是無記性故亦是苦果體非集諦也言然唯說等者通妨也問若取業煩惱為集諦者如何集論中偏說愛為集諦又此經中言諸苦所因貪欲為本又言若貪著生愛則為所燒此等誠文如何通會答路言然唯識等為最勝說故潤生位中非愛不受生事須得愛若發業位中無明為上潤生位中貪愛為上以勝故偏說也言為因能得者標也第二義意言無記法亦是集諦唯局內身之中無記簡外也三性之法為因依能得有漏果者總取為集諦能得因即是善不善無記三性之法所得果即有漏果集之因能得果義因能招感義名集諦也言即諸有漏在等者釋也有漏簡無漏在內身中簡外境也言三性諸法能為者路云無記因親生異熟果若是善惡因感熟果故言有異熟也准此識等五支種子是無記法能為苦依身之因也言瑜伽等十二等者問善惡二性為集諦可然如何無記之法亦取答疏言瑜伽等說等無記之法亦是集諦也意證三性之法皆名集諦也十二支中逆觀老死有二種因者一生支與老死支為粗生因愛取有支與老死為細生因問何名粗生細生因答生支與老死支同一世故名粗也愛取有與老死支隔世故名細也二近果顯差生支望老死支為名粗生因也愛取有支望老死支障世去果遠潛隱故名細生因又此粗細應為四對一者粗細相對生支即粗愛取有支細二親疏相對生支即親愛取有支疏三者遠近相對生支即近愛取有支遠四隱顯相對生死支即顯愛取有支隱四對雖別義即無差也從因向果名順從果向因名逆觀者於現在有情身上老死支觀知是苦欲得更觀老死支集觀知生支與老死支為粗生因愛取有支為細生因既知生支及愛取有與老死為集未知生支與愛取有復從何來答觀受為粗生因觸支為細生因問受支觸支復從何來答六處支名色支為粗生因識支為細生因或總觀老死支為果生支為集愛取有為果識等五支為集也言乃至觀前齊等者至識支便休兩因果道理拾是更不觀無明與行也有抄言一一支別觀者非也今准路府引論云識等五支為先集愛取有為後集也識支已前皆具二因若觀行支但有無明支以為粗因闕彼細因義便不足若更觀無明支二因俱闕問若觀行支闕細生因者何不取過去老死而為細因答有二解一云若以過去老死為細生因者無窮之失觀也二路云觀前取支之時全界煩惱名取或愛憎名取也觀全界煩惱之中已有無明支又觀有支之時已攝行支若更觀從前二支即有重緣之過設觀無用所以齊識退還有云只是兩重因果道理足云更不觀也言此等皆名老等者皆字有意恐人疑將謂識等五支唯與生支愛取支為集不與老死支為集故通說此等皆名老死支集言故知依因無記等者問此中意兼取無記法為集諦所須說逆觀次第解答只緣三性之中兼取無記所以所逆觀老死等證也十二支中識等五支生老死皆是無記於中老死支是無記果其餘六支是無記因故知集諦亦兼無記生支與老死支為因也愛為依因抄家分依因二字言不說非支亦為集者簡濫也此簡外器但取內身為集也亦是通妨難也問若言無記等法亦名集諦者外非情等總應名集諦答疏言不說非等路云諸無漏有為及非情物皆名非支不名集諦問唯識等說順受業及唯別報業應名非支是集諦否答亦是集諦能招苦故由此行支狹集諦寬也由此有三對一情與非情對只取有情起或造業有輪轉義名集非情總別不取也如穀麥等雖能為因生身塵以是非情非支所攝不取為集諦二漏無漏相對唯取有漏不取無漏無漏道諦攝非集三有為無為相對唯取有為不取無為也言真如擇滅不動等者六無為中真如擇滅不動想受滅諸無為此四無為是滅諦攝其虗空非擇此二無為非是滅諦攝真如二字即真如無為也擇滅二字即擇滅無為也無漏智斷即煩惱真如向上離煩惱義邊名擇滅無為體是真如二乘人喚離煩惱處真如名擇滅也大乘人得真如無為問何名擇滅無為答無漏智起時斷却煩惱煩惱不生正是擇滅體也只此煩惱不生之處顯得無為名擇滅無為也問真如無為與擇滅無為何別答簡要云真如無為是所依擇滅無為是能依此二俱是無漏善也不動無為者金云第四靜慮由變異受初永不行故立不動無為下三靜慮變異受未來盡故不立無為想處滅無為者想受不行名想受滅無為金云不動想受滅無為加行善得亦滅諦故言諸滅者結諦也斷見道修道煩惱每亦皆有為無為總是此間滅攝總名諸滅無為也言對法論說等者會違文也無著菩薩造問標中唯取無為為滅諦如何對法論說一真如二聖道三煩惱不生總名滅諦答真如若不得詮說當體即是真如也若約詮而論三法總亦滅也第一且真如名滅諦聖道即是生空根本智也煩惱不生即是無漏智起於真如向上斷煩惱煩惱不生之處望一分真如離障義邊亦名滅諦也真如是實擇滅是假唯對法論滅諦有三一者真如是滅諦所滅二者聖道是能證無漏智名能滅二者煩惱不生名滅性即是解脫言此說滅依等者顯三差別亦是疏主引論解論文也問真如離障如何名滅諦答真如與滅為依故名滅問無漏智如何名滅諦答能滅故名滅問煩惱不生何名滅諦答滅性故名滅即解脫也謨云滅依即真如能滅諦聖道滅性即煩惱不生處擇滅無為理也准疏意向下有解處取真如為滅性是也言正智者重釋所以也正智即聖道也所證即真如也有漏法滅即滅性也言假實合是等總結也路云理智名實離縛名假也實合說名滅諦或能滅滅性名假所依真如實合說也言無漏五蘊者無漏也然此道諦行蘊中慧道諦之自體道五蘊以為眷屬無分別智證滅之時有定道二戒即是色蘊同時領納即受蘊取像即想蘊同時二十二法名行蘊八識為識蘊即是無漏五蘊名諦也言對法等者引證也問見道修道無學道此之三道是無漏可許說為道諦資加二道是有漏何名道諦答資加二位有漏聞慧思修慧是道之因亦道諦以彼見道前有損力益能能發茲種子滋無漏種以能滋助無漏亦名道諦言依道自性等者總結也通妨亦得有二說一云見修無學道名自性資加二位是有漏善名眷屬二云後三道中正智一個名自性餘心心所法名眷屬眷屬亦是道諦言由此四諦攝諸法盡者初總論四諦因此一句疏主得向下諸妨難也言由此四諦攝論法盡舉宗也言故涅槃經迦葉者發問也即涅槃經第十三卷說也言申首林者雜心云申忽林經本生亦云尸首林瑜伽云升攝波梵語訛略也此云胡桃林也迦葉菩薩句佛昔於一時在恆河岸尸首林中爾時如來取其樹葉告諸比丘問其多小等言未所說法如林中葉者一一諦下有三法苦事苦理苦如等二乘不知言應有五諦者若攝法不盡應合有五諦若有五諦即有第六蘊十三處十九界等若如此者即是魔說何名佛說上舉宗發問言世尊告言四諦至分別諸苦等者正答所由也若論二乘總相即知若別別行相二乘不知四諦二乘只知分段不知變易只知安立四諦正不知非安立諦只知有作不知無作緣無作與作一處所以二乘不知有無量相隨他二乘不知處言有未說未說者亦不離四諦也據實佛說亦盡非有未說別有五諦言依詮顯實者別簡滅諦問若言說盡何故二乘四諦外別說非安立諦答疏言依詮顯實等詮即安立四諦名詮詮有三義謨云一依教顯理教得名詮二者二空門依空顯理亦名詮也金城云詮即煩惱也由慧揀擇煩惱滅處顯得真如煩惱亦名詮也言對法言者真如是滅性正是滅諦所攝攝云據擇滅無為正滅所顯真如約詮相從亦名滅諦意言滅性既正滅依即兼也問前來喚煩惱不生名滅性也真如名滅依今此間喚滅言作滅性者答只緣滅依滅性皆不離真如也故作是說也言涅槃亦說四諦等者從此出滅諦體也有苦無諦無實者凡夫人也凡夫苦不知是苦妄計為樂佛說苦說實不可令樂名無諦也二乘人有苦有諦而無有實者言有諦者苦理也即苦空無常等十六行相也無實者即苦如真如也簡要云謂二乘解脫道中證諦理時不作真如相解出觀已後以有漏心觀觀前所證既不親得名無有實菩薩具有也集諦三者集事即業煩惱等集理即是集因生緣集如即真如也滅諦三者滅事即有餘依通能滅也滅理即滅淨妙離道諦三者道事即八正道等道理即道如行出道如即真如也路問云二乘無實云何斷惑證理答毀責言無也約不證法空說無其實能證生空真如謨云彼雖證如謂是擇滅如來於彼不建立真如名無真如言廢詮旨者問前行既言依詮顯真如即滅諦攝全此復言廢詮談旨真如非滅諦豈不相違答疏言上依種類總四諦等即是變易分段俱苦諦煩惱所知俱集諦有餘無住俱滅諦生空法空智品俱道諦苦與苦一處集一者與集處無作是有作種類有作即無作種類也有作無作相合說所以依依詮證滅真如亦是滅諦攝此對二乘人說也若分別差別而說能緣之智有上下品所緣境有粗有妙菩薩之人上智也所緣境又是能妙對菩薩故說無作四諦廢詮談旨諦對二乘人不知處名真如非滅諦據道理元來滅諦收所以分別而說故有八諦涅槃經言善男子四聖諦智有二一者下二者上也下者聲聞緣覺上者諸佛菩薩若依法體有粗有妙若唯知分段名粗兼知變易名細唯知生空名粗兼知法空名細二乘所知名下菩薩知名上也言勝鬘依此等者二乘人觀諦猶未了達望後大乘更有一重可作雖知分段未知變易名有作也無作四聖諦者問初地望二地乃至十地下地望上地皆有作如何言無作答只望此一重四諦向後更無第三重亦名無作言如是八聖諦等者辨能知也問無作四諦二乘不知可然有作四諦何故二乘亦不知耶答只於有作諦上不能分別了知約一分知不盡處總言不知勝鬘云如是八聖諦義唯如來事究言分段生死等者陳體性也唯識解云十二支中皆苦諦攝路云無明行愛取全有支一分五支亦是集諦變易生死五薀身上唯行苦分段五薀具三苦也言今依總相等者會本緣文也問當時大通佛所轉法輪為復是有作無作答疏言今依總相等不分有作無作經文但言謂是苦是苦集等亦不言謂是分段身上苦亦不言謂是變易身上苦若聲聞人於分段身上悟四諦若菩薩於變易身上悟四諦名四諦法輪問若爾如何下文十六王子請轉大乘法輪答疏云或依分段等第二解也將下十六王子請大乘處顯此間輪小乘法輪也言釋名者且總名解四字也苦集滅道是別名諦者實義解諦字也言唯聖知實解聖字兼簡凡夫苦不知是苦不得名實唯聖知名四聖諦如苦練樹中鳳栖故亦名鳳栖樹故得其名諦義亦爾由聖所觀得四聖諦名言苦真是苦者意言世尊說苦即是實苦乃至世尊說道即是實道如遺教經言阿㝹樓馱觀察衆心而白佛言世尊月可令熱日可令冷佛說苦諦實苦不可令樂也言更異苦者佛說是苦更無改易名為無異苦言五十五云諦義等者意言如說苦相實是其苦不可令樂苦諦下四行相言中說道苦可理上無苦即相探也說苦之時實是苦也乃至所說滅苦之道實是真道不可令其為非道也上生非想處下至捺落迦苦常相隨名不捨離不捨離者若苦為樂捨離苦相即非實義不離捨離故是實義名諦也言由觀此故者未作觀時執身起四倒由觀此作無常解不起四倒名到清淨究竟也離倒者名清淨圓滿名究竟究竟即是畢竟也即所證理也上解總名了言苦者解別名苦義有二一者逼迫義二者煩惱所生義只此身從前生業煩惱中來故名煩惱所生也逼迫即苦苦及行苦煩惱所生即是緣苦貪愛無時壞苦去故言集者亦有二一者招感義二者能生義此即同前招感異熟無記義為因能得有漏果義此中善惡業望總報名感三性之法望等流果名生所以生善是漏苦故能生善惡乃名為集只如一剎那中為行所集故知能集煩惱乃業皆集義言滅者寂義諦當體也言彼俱寂靜者攝路云證滅理時苦集二諦悉皆滅離名俱寂靜行相如何意說業及煩惱不容現起名集寂靜正在無漏有漏不行名苦寂靜無漏皆樂故此得因位若無學位苦集二法永位不生者俱寂靜也今謂俱二者證證如時一一煩惱與如無始俱者皆名寂靜二者俱時道諦智斷却苦集二諦顯得滅諦上更得寂靜之名名彼俱寂言道者通因等者此有兩解一者通字因字合一處著依此中道諦故通達得三乘聖果名通因也二者能通達了達開通與三諦為因由有道諦故與三為因即是能成知苦斷集證滅三種義利之義下釋妨中言若勤修乃能成辦所說三義也後解善前通與三乘為因名通後解通與三道為因也言此中苦事等者欲擬辨六釋所以先四諦下行相也苦諦三者一苦事有漏五薀三苦八苦名事二向下有苦空無常等道理名苦理三向下有真如名苦如也集諦三義者業煩惱名集事集因生緣名集理向下真如也道諦三者無漏五薀名道事道如行出名道理證彼真如名道如滅諦三義者滅事有二一有餘依二無餘依各通能滅所滅俱名為滅事滅理者滅淨妙離四法是滅如即自體也言苦事名諦等者苦謂苦體即三苦八苦事謂苦用體能持用名持業也言餘二名諦者即苦理苦如二法名諦依主且苦者逼迫義理與事別有為無為別今將無苦之法就苦立名苦之理苦之如依主釋略苦事是劣理如是勝勝法就劣法合是依主釋答緣苦事一法是苦諦名以是諦名故勝也餘法不是諦名故却劣所以理如就苦名依主釋言理如二種等者真如是清淨性苦諦即是逼迫性二性差殊名為不一不異者只是真如苦諦中如即是非異若離苦諦外不可別覓真如如離水而求波又真如是無為苦事是有為二既不同名為不一真如復能與萬法為依混同一體不分別故名不異意言苦果之身名苦事剎那無常等是苦理身中真如苦如即此三法不即離故如何望事名為持業望餘二即名依主故此通云理如二種等意說聖者說苦便有逼迫義是義方名為諦今此理如二種逼迫全無而名苦諦者望彼所顯故說為諦是依主釋不同於事是持業也意云苦理苦如非逼迫性故攝云一一諦中皆有三種皆隨自諦為名也意云苦事諦苦理諦苦如諦也言廢立者廢則不用立則存也問何不增至五減至三答如床四足減至三則小增至五有餘要須具四言九十五云等者冷熱病等即三苦八苦言集如諸等者如冷熱等病因何而起百病從口入因喫何食而得此病此苦諦乃因集諦而生欲斷苦果須斷集因如欲上佛先須去此等言滅諦如病者但滅却苦集二諦即得滅諦故前文云滅盡諸苦名第三諦也言滅諦如病者但滅却苦集二諦即得滅諦故前文云滅盡諸苦名第三諦也言道如者道諦如藥能治前病更不復生前文云為滅諦故修行於道能摧未伏令後不生鎮已伏故治病方亦足生死因果亦足上法說下喻說言諸有病等者先向醫人說病狀說病狀已便問喫何藥差已便問有忌良醫亦依次與說苦集滅道四諦藥方亦爾言諸佛如來拔大等者三毒愛箭能中一切衆生慧命此愛是貪貪是根本煩惱一數能令衆生墮於地獄如箭中身諸苦貪欲為本言又療病者知病苦諦也病因集諦也病除滅諦也除法道諦也問與前解何別答前約法此約人也言趣苦滅諦者是道能知苦斷集趣向滅諦便成三義言釋妨難等者有重問答初一問答差別後一問答次第也言因故說等神智云西方有戒曰大王集百論師談論有如意論師善能摧破得九十九人一人在後與立一義集苦滅道外道外道諸師皆言錯如意論師不錯若約觀行門說先觀苦諦次觀集諦若約招感義論集諦於先苦諦在後也言答由彼苦諦等者四顛倒者即常樂我淨也衆生不了五薀身是無常無樂無我不淨等妄計為常樂我淨故是倒也文作苦空無常無我等除彼四倒先觀苦諦苦諦是四倒所依處故令知苦諦言由彼集諦等說知苦諦是苦兼知集諦不是知苦了然後知集諦正知苦諦時兼知集諦攝云由業煩惱在第八既是苦諦知苦諦時兼知集諦有云此亦不然集諦向上有生住異滅性逼迫義邊屬他苦諦故知苦之時兼知集諦言雖遍知等者問既兼知苦諦何要兼斷集耶答疏言雖遍知苦等煩惱種子中有無明具十一殊勝中第十隨轉勝上至非想下至地獄皆被無明隨逐不唯煩惱兼業種亦爾如世間人知是怨賊若不便煞怨終損人故雖已知苦要須斷集契經言親愛必相離唯業不相捨善惡未來世一切時隨逐問惑業種子即是賴耶惑業現行何非賴耶答現行望種正是其果體後逼迫苦諦所收此依攝相歸性收釋所由攝彼現行以歸種子義說分明何得為難言觸證等者親見義乍觀見義乍觀狀以孤起正是解論文前說知苦斷集證滅修道此間應言如是知苦如是斷集如是證滅也觸證者現見義觸以為現證即是親見簡異疏緣故言觸證也即根本智內證也二云觸者五根取境身根最親親取觸境如今智證於理似彼身根觸彼前境故名觸證也未證諦之時於滅諦向上起懸崖想證得已後生死已斷勿我既於彼滅諦愛樂攝受故言觸證也言若勤修道者問何要修道諦答由成就三義故所以修道即是道諦能知苦斷集證滅三義也言何故四諦如是者問答次第也意言一切諸法先因後果何故此說先果後因答隨宜說教各各不同不可一准言由此故者即指有漏苦果性逼迫故最初說二云依前門中意說苦諦是四顛倒所依處故初說也言如此故等者如此者有二義攝釋云一如者指斥之詞如此集諦業煩惱為因能招感苦果故苦諦後方說集諦二云如者相似義集因向上有漏有漏逼迫義似彼苦諦故言如此也言由此二故等者有生死法名黑品究竟者盡也圓滿也惡業因果名黑品即同涅槃經黑業也言由此故樂為等者指法也樂即是滅諦即是滅諦為樂也說滅諦當體由此滅諦是無漏果所以第三烈也言如此故樂為第四者如此者相似也言樂者此即是覺法樂似彼滅諦向上寂靜樂故言如此故樂為第四即道諦言此二攝白品究竟者究竟者盡也意道攝盡有為無為功德總攝盡由無漏道證無漏真如因果圓滿名為究竟也上法說下瑜明言譬如重病等者重病苦諦病因集諦痛愈滅諦良藥道諦言又如遭苦次第者如世間人曾所遭苦如人入獄苦諦也於苦處先發作意推尋入獄因有何過失次於遭苦因立集諦也次於遭苦解脫者即滅諦求解脫免也後於解脫方便者即道諦也言一幾蘊所攝三諦等者只是五蘊之中攝三諦苦諦集諦道諦也三諦之中不攝五蘊問若爾如何名相攝答如言五行相生木生火火生土土生金金生水水生木豈火却生木等耶但以蘊攝於諦即是相攝以蘊者積聚滅諦無為一法非積聚也蘊中不攝滅諦又無為寂靜此即喧囂行相不相當也且苦以三苦為體若以總而言之有漏五蘊全攝苦諦若差別說苦諦生老病死苦并第八五感陰苦向有漏五蘊中攝受別離求不得此二貪分位怨憎會嗔分位此三俱是何蘊中攝集諦者尅性而論業煩惱名集向行蘊中攝更有解通色行五蘊以業是思若攝用就體即行蘊若體用別論思現行有防發功能能防就所防說通色改色行二蘊中攝若同時眷屬亦通五蘊道諦者無漏五蘊能攝道此通攝眷屬也若尅性取道諦無漏智向行蘊中攝問何故無為向四諦中攝蘊中即不攝答諦者實義是真實故向諦中攝與蘊義不相應故不攝攝俱舍云蘊不攝無為義不相應故言滅諦不爾等者一云苦集二諦息滅之處成就寂靜法時有漏五蘊已名彼俱寂靜二云有漏五蘊性是喧囂由離法證得滅諦名彼俱寂靜三云蘊者須具遷流義滅諦離彼生住異滅名寂靜也言二誰各幾等者意問四諦各有幾合行相答疏言各如次也言謂無常等者路攝云大小乘中皆明此義今依雜集略以顯之且苦諦四行相者一無常相此復有十二種一非有相謂薀處界於一切時我我所性常非有故無彼二常之相故曰無常二滅壞相謂諸行法生已斷暫有還無三變異相謂諸行法由不相似相續轉故四別離相謂於諸行由增上力或他所執或資具等自然失壞或他陵奪為己有故五現前相謂正受無常由因隨逐令受無常正受即受現境時也六法爾相於當來無常由因隨兼定當受故顯無常性決定為當受故即彼彼至今也七剎那相謂諸行剎那後必不住無間必壞即過去也八相續無常相謂無始來諸行生滅諸法不斷復轉相承輪回不絶九病等相謂四大乖違住時勢盡十種種心行轉相謂一切時或起貪心或起嗔心或離貪嗔心癡心等亦爾十一資具興衰相謂諸興盛終歸衰變也十二器界成壞相謂三災變壞也二者苦相有漏五薀皆苦向上乖緣逼迫名之為苦即三苦八苦等也三者空相於蘊處界中我及我所皆空名曰空相又有三種空攝云一自性空謂觀遍計性非有二如性空觀依他起性皆非有故三真性空觀圓成實性即空性故及十八空等四無我者離彼外道橫計薀中有我故無生宰故故名無我也集諦四行相者一因相只於業煩惱能牽引當來識等五支種子當來生起有此功能却於業煩惱集諦向上說因相也此牽引因也二集相業煩惱與當來五趣身為等起因等起者相似義令彼有情向五趣中人趣圓首方足畜趣毛尾相似由業招集有此功能故名集相也三者生相由業煩惱與彼有情當來趣生位中為差別無量種類各各不同人與天不相似就人中形大小黑白不相似故名生相四緣相者由業煩惱為因令彼有情五趣生死相續不斷捨人身得天身前異熟既盡復生餘異熟緣者相緣義相緣不斷故名緣相滅諦四行相者一滅相此不是滅諦體但取滅諦向上功能名滅也由離前集諦下業煩惱向滅諦無為向上說相二靜相滅却苦諦下逼迫喧囂雜苦故向滅諦上說靜相三妙相雙離苦集二諦顯得無為身體名妙相四離相由永出離一得已後永不退還名離相非如外道凡夫伏惑得非擇滅已後却起煩惱不名離相道諦四行相者一道相謂通達故亦是因義由此聖道是諸聖者證真義路是名道相二如相一切煩惱皆不如理由道諦無智斷却不如理煩惱却向上說如相此非真如但是講順名如三行相者對治四倒覺真實義是名是行相四出相者真如是出離法道諦能證此出離真如却向能證道向上說出功能言三何故苦諦等者何故苦諦下要作四行相耶答由凡夫不了五薀身是苦計為常樂我淨起四倒為除彼四倒所以作四行相也言無常除常倒等者問何故一苦能除二倒耶答夫言苦者體必是有漏有漏之法悉皆是苦由知是苦由知是苦之處悉是不淨故一苦行相能除二倒即是樂淨二倒也問何故空無我二行苦除我倒答薀處界中無彼所執常恆之我名為無我即彼薀等無彼外道所計之我名為無我既有無我悉皆是空由斯二對治一我倒也言集諦四觀等者問何故集諦要具四行相耶答疏言集四觀等安國四愛行相如前火宅辨依此四倒生於四四愛受之體正名集諦今作集因生緣四觀除彼四愛除一一愛時皆具集因生緣四行相也不得將四行相別別配四愛由前不了苦諦執苦為常樂我淨所引得四種愛生由執苦諦為常倒故起後有愛愛後有身頭後有長命端正於後有身起愛名後有愛二依樂淨二倒起貪喜俱行愛謨云於他有情及資具等向上實是有漏不淨之法於淨倒而生貪求求得之時同時與喜相應貪喜俱時有故名俱行也言及彼彼喜樂者有云貪喜俱行愛於己得入手財色上起彼彼喜樂愛於未得財色上起境不一故名彼彼也言次依我倒起揭者更不於財色資具上起愛由執身有我唯於我上起愛愛戀有我之身妄計為我而起於愛故名獨愛謨云主宰自在即是獨義從獨起愛名獨愛也即現有愛也言滅為四觀等者即是滅靜妙離但是道諦起未斷却集下四愛四愛滅處顯得無為便是滅諦故謨云隨一愛之處顯得擇滅無為便是滅義靜義妙義離義四行相四行相不得將向四愛滅處別配也言道為四觀者四愛滅諦理即是所證即是道諦四愛滅由能證道也言四誰解脫門等者謨引顯揚第二云若但言空無相無願者即通定散漏無漏及三慧若加三摩地唯定非散唯修非聞思通漏無漏也若加解脫門字唯修非聞思唯定無散唯無漏問諦下十六行相各具幾耶答解脫門有三名誰行有十六種名幾且小乘初空解脫門攝苦諦下二謂空無我次無相解脫門攝滅諦下四行相後無願解脫門攝十行相謂苦諦下二一苦二無常集諦道諦各四都計成十行相問道諦何不願求答道諦既是有為小乘人亦不願求也此依聲聞三種觀說今依大乘對法空解脫門攝二謂苦諦下空無我無願解脫門攝六即苦諦下二一苦二無常與小乘同并集諦下四集因生緣計六無相攝八謂滅道二諦各四皆無相故以彼道諦依滅諦故亦名無相言五入諦現觀等者答唯識第九說現觀有六安國云一思現觀上品忍慧引生燸等四入見道加行道中觀察諸法名現觀二信現觀謂緣三寶出世間淨信助觀令不退轉立現觀名三戒現觀謂定道無漏戒能離破戒垢令觀增明亦名現觀四現觀智諦現觀緣非安立諦真如為境本後二智為體五現觀邊智諦現觀謂智諦現觀後緣安立世間智六究竟謂盡智無生智問此間第五諦現觀與論家六現觀如何相攝答六現觀中初三現觀與此全不相當第六現觀唯是無學亦非此間攝六現觀中第四及第五小分以第四中通真見故第五現觀亦一通修道故言小分二見道中皆有四諦故作是說言六三乘觀諦等者答當日大通佛轉四諦法輪會下有三乘人既總言四諦約本質是四諦相分雖同隨乘各各不同聲聞人聞說已便於五薀向上觀四諦觀有漏五薀向上無常逼迫為苦諦業煩惱為集諦苦集滅處為滅諦能證智為道或觀行薀之中無漏慧為道諦緣覺人聞說向十二處上觀四諦無明支有支一分是集諦識等五支生老支為苦諦苦集滅為滅諦能證智為道諦菩薩聞已於三性向上觀四諦觀遍計性為苦諦依他起性為集諦圓成實性為滅諦能證智為道諦淨分依他有為無漏亦是道諦也言此七四諦為世俗等者三藏正翻云隱顯諦隱謂隱覆顯謂顯現䨱真顯僞故名為隱顯可破壞故名世俗勝義者勝謂殊勝義有二種一境義二或道理名義故名勝義諦舊云第一義諦亦名真諦法菀說世俗勝各有四個名前已解總名訖言別名者一世間世俗亦名有名無實諦二道理世俗亦名隨事差別諦三證得世俗亦名方便安立諦四勝義世俗亦名假名安立諦勝義別名者一世間勝義亦名體用顯現諦二道理勝義亦名因果差別諦三證得勝義亦名依門顯實諦四勝義勝義諦亦名廢詮談旨諦謂一真法界前三安立勝義第四非安立勝義章敬云兩重四諦總合為五位一軍林瓶盆等二薀處界等三苦集等四諦四二空真如五一真法界初一唯俗但有假名故後一唯真離言說故中間三種亦真亦俗真不自真待俗故真俗不唯俗待真故稱俗由斯開合故成八諦也言五十五等者瑜伽文涅槃二字涅槃經也但是涅槃經中及瑜伽五十五云於四諦共五薀十二處十八界對辨四諦對餘三世俗便是勝義也對非安立說此四諦便是世俗今四諦既通世俗通勝義所以疏言實通二種也即四諦亦真亦俗俗中第三真中第二故此通二諦也言八諸諦等者路云真俗二諦各有四種名諸勝鬘經中但一諦仁王瓔珞各說二諦顯揚中邊各說三諦瑜伽唯識並說四諦若正辨相者簡要云今此四諦十六行相於四真諦中第二道理勝義諦收若於四俗諦之中第三證得世俗諦收正明四聖果四諦理也言九苦有幾等者相國云略而言之苦有三苦五苦八苦又苦有三種一者所取苦依遍計性能執之心之所取故二者事相苦謂依他起性三者和合苦苦相合故既圓成實性即是真如與一切有漏苦相和雜故名和合苦諦有三路云習氣集我法二執種子因能緣心是依他起性緣彼我法二執能緣心帶彼執心熏得種子名習氣集二等起集謂業煩惱煩惱起業業起於果平等而起名等起集也三未離繫集即在纏真如滅諦有三種一自性滅所緣染法我法二執本體是無名自性滅二者二取滅能取所取二皆無故三本性滅即真如當體故道諦有三者一遍知道能知遍計所執故二永斷道能斷依他起性故三能證道圓成實性故又四謂加行等或八聖道等言十虗空非等者安國云六種無為真如體實餘五皆假依真如立若攝假從實五皆滅諦然無漏心變相隨於見道諦所攝有漏心變苦集諦收通四諦此之二種通善無記故偏簡之唯善性也言此中有二者准瑜伽論雜染清淨各有順逆即有四種觀門此經中唯有二種即雜染順觀清淨順觀生死不斷名雜染若無明滅故行滅等即此生死斷故云清淨也言此染順也者經言無明緣行行緣識識緣名色等此是雜染順觀雜染逆觀者從果向因觀不順相生次第名逆觀逆觀老死支是苦諦老死從誰有老死緣生支有生支從誰有生支緣有支有有支從誰有有支緣取支有乃至行支從誰有行支從無明支有是名雜染逆觀言清淨順者無明滅則行滅行滅則識滅識滅則名色滅乃至滅則老死憂悲苦惱滅言清淨逆者老死滅故生支滅生支滅故有支滅有支滅故取支滅取支滅故愛支滅愛支滅故受支滅受支滅故乃至行支滅行支滅故無明滅此清淨逆觀也言生死相生等者問何故經文只說染順不說染逆耶答緣染中順觀順彼生死次第也逆觀則不順生死次第經文不分明說所以舉順觀例逆觀也問經文何故只清淨順不說清淨逆耶答彼唱疏言初斷生死故例逆觀也由初修加行之時求斷生死先作此清淨順觀也得無學了出根本觀後方作逆觀方法今取最初求斷生死順彼前位故說例逆也路云亦有無明緣行不說行起無明乃至生緣老死老死不能起生支何名相生答由此應言生死法爾故此亦不然今言相生者但總聚論即過去十支因為能生現在二支為所生於現在二支果上又起十因非要一一支相望方名相生也相生但無明緣行行支為生義亦然名相生如五行相生母生子等言初斷生死等者由初修加行之時求斷生死先作此清淨觀也得無學果畢出正觀後觀緣起生支或順逆今取最初位時求斷生死順後初位故舉順觀例逆觀也言六門分別者論第八以十門解釋一列支名辨總別體二明總別名義得名三次第所由四總別業用五因果差別六更互為緣四句斷簡七能所引生諸論對辨八廢立增減釋諸妨難九定世破耶十諸門分別分別中更有十七門廣解此六門對彼或有或無此引彼文文至下文一一指出言出體者有總有別總出體者即五法中相及分別三性中唯依他起三科中各通一分此疏中唯約別出體也言煩惱障中等者先辨無明種類差別後稱釋疏文今初七問分別二業六辨無明種類七約界且約二障分別者但取煩惱障不取所知障即勝鬘經五住也中但取前四住地不取第五無明住地無明住地者即所知障也不能發業前四住地能發諸業四住地者一見住地即三界分別煩惱第二欲一切住地即欲界俱生煩惱也第三色一切住地色界俱生第四有一切住地無色界俱生然此初四住地能發諸業於中見一切處正發餘三助發如第二門中分別五無明住地不發業者問佛地論說所知無明發業又初地菩薩誤犯三業愚豈非所知無明發答非感總生故不違理又所知望菩薩為染望餘不名染故不取第二俱生分別者俱生為助分別為正若准有宗但緣事發業分別不迷理發業此與大乘相違問何名俱生分別答論云俱生我執無始時來虗妄熏習由內力故恆與身俱不得邪師邪教及邪分別任運而轉名曰俱生二分別由現在外緣力故然後始起又准唯識不同安慧菩薩許猛利龍鬼一分有分別能發總報業如大力鬼指舍利弗頭生身入地獄須達家鸚鵡聞四諦法及十千魚聞寶勝佛名生忉利天如此皆是發總報業又許人中一分愚鈍衆生無分別護法菩薩云分別在人天趣三惡趣無分別如大鬼入地獄鸚鵡生天等等皆是化現若不爾者三途若能造總報業有情無有生人天期護法菩薩為正第三約識辨者第六識相應無明為正助發故第七雖有俱生無明不能發業就第六中亦分別為正俱生為助所以疏言正取分別及兼任運愚廢為體也此下敘四種第四發業者除順現業論云能感後世善惡業者方是此支故除順現業餘順生順後順不定業者是此無明支第五發總別二業者無明發總報及能發總別二報方是此支唯發別報則非此支論云別助當果皆非此支問如何發別報非無明支答別報果有間斷故十因二果不間斷故又總報果唯局當趣別通餘趣受又總報業亦名引業以業力能引得總報第八識支故別報亦名滿業莊嚴具故又唯俱舍論一業能引一生不引多果論云一業引一生多業能圓滿圓滿者別報也若據大乘瑜伽一業能引一生亦許一業能引多生總報果又如經中說謗經一業感多生入地獄及多生畜生等即是一業能引多生業類差別向下說第六辨無明種類者即下疏言通相應不共纏及隨眠四種是也相應者與餘九分別同時起名為相應不共者無明一法起時不與餘九根本同時起名為不共論云相應無智與九同迷不共無明親迷苦理就不共中第七識相應者恆行不共無明無始一類相續名為恆行唯此識有名為不共問第七四根本相應何名不共答一云無明是根本見慢愛三是隨名為不共二云然四皆是根本廢增上故名不共三云唯識有前六所無名為不共若爾前六無明第七無前無明相應名不共答不然如不共佛法唯佛所有餘人無故名為不共問既四法何名不共答亦如佛百四十種不共法皆名不共故第六無明名獨行不共就中有二無明與八大隨相應名是主獨行無明若與小隨相應即名非主被小隨行相映奪故又大隨起時小有無不定小隨起時必有大隨大隨以是遍染心故由此非主無明望小隨即非是主同時大隨亦名是主纏無明者即應不共二類現行無始時來纏縛有情隨眠者無明種子隨逐有情眠伏藏識餘如別敘第七約人約界者問三界有情內外凡等四種無明如何發業答欲界凡夫通四種無明發欲界五趣業及發初禪已來業二禪已上即非欲界無明發三禪已上即上界無明發也又欲界無明發業中所發業通善不善性能發無明皆是不善性論云外法異生不如理作意所四種纏縛異生無明皆不善性又發欲界業中除知足天業若修知足天業無明是有覆性信力伏故又無明發三惡趣業無明與行許同時是不善性若人天善業無明與行前後起以性不同故能發無明即有二謂異熟果愚真實義愚所發行即有三謂福及不動故又凡夫通用四種中現行為正種子為助上明外凡了下元𤏙頂已去第二內法異生中復二一者放逸二者不放者一云四善根位名不放逸住內門故資糧位中名為放逸多住外門故二云䇿勵者不放逸不策勵者名放逸此二類雖不同四種無明中皆除不供無明迷撥諦故由此放逸者相應無明正發種子助發不放逸者種子正發現行助發遠加行中起現行故問所發感何果答所造種子正發現行助發遠加行中起現行故問所發感何果答所造之業感十王傍報果由此地前所修之業與十王果為異熟異熟因與見道智為勝增上緣望佛果為疏增上緣又如初果已上七生一往來等皆是七方便中發得已入聖已去不造新故問此無明支幾法為體答唯無明一法為體不同有部分位緣生兼通餘法故瑜伽唯識說為一事門故若爾何故對法第四說無明與行為因緣無明俱慧種名無明支故答由假說故為行因緣又唯識會云與集論說無明望行有因緣者依無明時業習氣說假說為無明實是行也上總折簡了下消疏言煩惱障中等者簡所知障不取謨云引勝鬘經有五住地煩惱前四煩惱障能發業故不取第五住地廣如前說問何故不取所知障無明耶答無明有二種一能招生死二能障聖道所知障聖道不招分段生死又唯障大乘不障小果今煩惱障通三乘又招生死故取煩惱中無明也問謨云唯識亦言第二地中斷誤犯三業愚是所知障如何言不發業答章敬云佛地論云所知雖能發業不能招感生死若論誤犯三業不妨發得若招感生死即不能也言正取分別業者以正能發業故正取也俱生助發名傍取無明發行者皆是此支體愚癡即無明支異名也分別煩惱藉三緣起今言任運即是俱生問何故知兼取俱生無明為體答章敬云引瑜伽第十云預流果人斷十二有支一分若無明支唯分別則合初果人總斷盡既言斷一分明知兼取俱生無明為體問此中無明支取我法為體否取餘法瑜伽論第十及唯識第八說為一事故不同小乘約分位論得通餘法上標身體言成唯識言此中者即指論中十二支能引所引文也言能發者即是唯取能發間一類不能發業者又云第七識相應無明及所知障無明不能發業言正感者業向上有正感總報業正感總別報業業既如此無明亦爾唯取發總報無明為此支體也若業中唯別報唯順現業不為行支體此中無明亦爾唯發別報及唯發順現無明非此中無明支體言後世者後簡順現業不取也言善惡者章敬云不取無記故三性中唯發善惡者能發無明是此無明支體若無記性者非此支體也言又云正發業等者路云若是俱生助發人天總報之行在修道斷若助發三惡趣報之行在見道斷二助合說故言不定言能發行者無明為能發行支是所發通正發助發俱是此中支體也言通相應不共纏等種現差別也安國云根本煩惱而數有十貪等九煩惱不起即已若起必與此無明相應名相應無明言不共者有二一常行不共與第七識相應無始時來一類相續名常行也不與六識無故共故名不共二獨行不共唯第六識有此復有二一與忿等俱故故名非主獨行以忿行相粗猛互相映奪不得主名二者是主獨行無明與八大隨相應名是主獨行言纏者路云此上諸癡現行名纏纏縛有情漂淪九有名之為纏也言隨眠者是種子能隨逐有情眠伏藏識三界受生不相捨離故名隨眠應作四句分別一唯種非現五果種子及有支種子二唯現非種生老死二支三亦種亦現無明行愛取支是四非種非現即是非支等是問無明發業為通種現耶答種現皆通問寧知通種現答章敬云如十地經一無明有二謂子時果時故通種現也子即種子果即現行問何人種子發何人現行發答安國云我輩凡夫現行正發種子助發內法異生不放逸者種子正發現行助發若放逸者現行亦是正發問現種皆發望所發行為復同時為復異時答發非福行是染行與無明同時能發也若發善行種即同時現行異時發暗明異故許行望無明有無間緣故意言現若同時非無間也故對法云雖起善業被隨眠所逐故亦名愚癡此無明種子與不動福行一一俱行此證同時也又云由彼勢力於三界苦不如實知發福不動行此明前念愚癡所有勢力發於後念福不動行此現異時此二證前種子同時現行異時發也已後具攝自界生他界死自地死自地生也言行支體通等者慈恩云以身語意心心所法為體體通善惡二性簡無記行也身語二業是色雖是無記法能防發思是善惡所發身語亦通善惡也此身語意造業有三一身在欲界造福業非福業具身語意三業若在色界造不動業亦三業為體若無色界造不動業唯意思為體簡要云然業有三種一現報此生造業此生受報二生報第一生造業第二生受報三者後報第一生造業第三生受報此三報中各有二種一者總報二者別報問唯總報行相如何答言總報者如增上慢人由前生造五戒十善業來感今生人中身上第八識異熟果能感之業名總報業也問何名唯別報業答前生造匱法業令他人不聞法今生身上自不聞法名別報業也問何名通感總別報業答假如一個謗經業作野干身名總報業也感得身疥又無一因別報業也言唯感總報業等者前來無明支唯發總報通發別報無明以為行支體能發無明既是支體所發行支亦須取唯感總報行通感總別行是此行支體路云業有三品唯感別報果中品亦唯感總報下品唯感別報也言唯別報業者簡所不取也問何故不取順現業答此間說十二支事須是流轉義不成故不取也又亦簡唯別報業亦別助當果不能感總報果故簡所不取也意言能牽後有者方是此中緣起支義故不能牽後有即不取也問唯別報業非是行支何處攝答有分熏習所攝故由此所發唯別報既非行支能發亦不是無明攝故言故唯識等者即彼之言指無明支為能發能發既得為支所發行支乃言行支言由此一切者由此道理四業中唯除順現及別報業皆非行支亦由此文即證現業不感別報果感當果中別有一業唯感別報即是別助當業亦非行支言亦通現者十地經說謂如無明支有子時果行支亦爾故通種子通現行也言色思為體者簡要云身語二業表與無表俱色為體且身業十種色中以為體語業以聲為體若意業以行薀遍行中思為體身口七支是色色是所發能發是思思是心法不是色法身業之中有動身思語業中有發語思意業中有二思一者審慮思二者決定思前動發以善思為體意業以審決二思為體故唯識云能動身思說名身業能業語思說名語業審決二思意相應故說名意業即能發屬於第六據實行支行支體尅實唯第六相應思以彼第六造總報及別報業前五轉但隨轉心發故上來無明支行支雖通種現唯是當體為支不通餘法也言識支唯取等者言第八者簡前六前六識種雖通一分異熟但是別報異熟不是總報故不取言異熟者簡第七第七是有覆性故簡前六之中善惡性種也識之一字簡心所種之一字簡現行又第八簡七異熟簡善惡及有覆性種出體了言故唯識云等者此文亦是料簡不取第七識種子由此中言即是指識支中識種也問如何名本答第八與前七為本名本識阿賴耶為依故有末轉言因即種子也言唯取行支所等者第八種子甚多未有所屬無力不能自生行支一剎那造得業成熏得種子一念招集第八識種屬當生地計此之識種以為識支體言初結生等者問何以知唯取第八種子耶答疏言初結生等二句疏局取第八識種言初結生者續義此身滅已第八種子復生現行生死不斷皆由識種連續也謂父母和合識至識胎中最初結生瑜伽九十三云於父母胎因識為緣續生果識隨轉不絶任所有羯邏藍等非餘識功能也出取第八所以也言總異熟故者簡前六識中一類無記總報者故言唯在種位等者料簡前來無明支行支皆種子皆種子現行今此識支已下五支唯是種子不通現今此識支唯取識種子不取心所種也問何故識支唯取種子不現行耶答簡要引大論第十云識等五種胎藏苦故明非現行也種子能合現行故名胎藏苦言有處說通前等者會違文即瑜伽第九及九十三故言有處說也此有二妨一通取六識妨二通現行妨且通六識妨者有說通前六識名識支者泛明一切識身為論六識總取故言一切識身者親義即是意識此是泛說依一身上泛明也八識之中取六識為識支體若尅實則不如此但是泛說非究竟也二云有處說前乘說前六識為識支體也若不泛說又不對小乘說准依大乘尅實論則唯第八識也言及當來者次通取種子妨者問十地論說無明支行支有支有子時果時子即種子果即現行乃至受支亦復如是即是中間識等五支種子亦通現行言不通答疏主意言若約五支被行招集之時唯是種子不通現行有處說現行者依當來生起分位說若望我輩凡夫如今造得業成一剎那招集識等五支種子此身未死已未盡是種子身死已後當來受生五支種子當來身上生起現行緣種子在第八識中行相微隱假借當來生起現行行相寄在今身種子向上說通現行二者或是前生識等五支種子今生生現行從他過去種子上來就今生現行向上說識等五支通現行也言乃至受等者章敬云兼論四支唯種子義類同故若言現行道理如前也言名色支體者問何名色答四薀心等名為名即色法名為色問何故喚心心所法作名答謨言梵語南摩此翻為名瑜伽有二解一從論喻為名名字章句詮所詮義能詮名順彼所詮之義喻如心心所法順所緣境名則所詮心法順所緣故喚心法作名二者從因立因名句文能詮為因心法所詮為果由能詮教上名字差別詮著心法心法向上亦有差別道理令心心心法順名句因亦得為名名即四薀也色者色薀言非色者即是心所法心已合說故言名色等言名色等言成唯論除後三因者五支之中最初除第八識種為識支體也後三因有因即種子也三因自為三支即是六處支觸支受支三因也一者色薀中除內五色根種及第六識前念無簡滅意為六處支即是一者除六處支種二者除第八識及前六識相應遍行中無記解觸種子令一處著為觸支體又第八識及前六識相應受為受支也從識支已後六處支觸支受支前中間所有現在異熟及過未世異熟心心所法皆是名色支種攝言餘因皆是名色支體且五支不雜亂出體有二初尅實體以十八法為體唯是實故若兼假法更有十九計三十七法為體兩假意總是不雜亂體也且第一不雜亂體者第八識種已作識支體其次有第七識不是報性緣是有覆性故不取辨云非是業果異熟故不取其次前六識為名中識蘊此有二解一云前五識為名中識薀第六處支中第六意處收只取前六識為名中識薀二云第六識種分為兩段前念過去等無間第六識為六處支中意根現在第六識種及前五識種子為名中識薀此約現在第六識種子是望世不同分兩處望過去說名意處將種子望現在說為名中識薀問十二支總是實應可第六意是假法答若約體假即不得若約義假即不妨種子實有約義分出問前五識何不還分出等無間否答未見說處問名色支中得具幾薀答一者前五識及現在六識為名中識第二受薀名色支中全無以第八總報相應遍行中受六識相應遍行中受相合一處總為受支問何不取第七識相應受為名中受薀耶答識尚不是報性不取為支何況心所豈是報性耶問六處之中闕意根取前念第六為意處五薀之中闕受薀何不取前念過去受為名中受薀耶答心王勝故即分兩處心所劣故則分不得第三相薀全有色第八識相應遍行中想作此間名中想薀也第四行薀者以第八識相應遍行中作意并思及第六識相應欲勝解念等為行薀第五色薀者十一色中五根因向六處支中收五境是外故不取也法處色是假不取又內五塵中聲體虗疏間斷故不取也唯取己香味觸內身四塵為名中色薀已上料簡名色支中唯有識想行色四薀唯況受薀亦有說所餘現在異熟及過未世所有異想行色四薀唯無受薀亦有說異熟心心所法皆是名色種攝意言過未種者即取識中一切已生未生諸異熟意說中名寬攝得諸法也不爾如何名色種子得具五薀即是一名色故謂有有一切種子在中故通五薀也前解勝後名通且初十八法出體者謂眼等六個識并內身四塵計十法及第八識并前六識相應遍行中除解受二種自為支體也餘作意相思三法總取是無記異熟報性故又前六識相應別境中除定慧兩法雖通無記強思慮故不取其欲勝解念三總取其遍行別境各三通成十六法也又不定四中尋伺是假法不取也唯取悔眠一分無記性者計成十八法上尅實出體了二相應出體亦名分位出體兼取假法為法體且二十四不相應中除無想定滅盡定此二唯善性故不取也無想報唯外道有故不取也異生性非報性故不取也名句文三聲上假立所依聲既不取能依法亦不取除此七法餘十七個不相應法并前尋伺二種計十九法為名色支體假實合說計三十七法名不雜亂出名色支體也言餘因即是三十七法名餘因皆是名色種攝也言後之三因者即彼六處支觸支受支三種也言此說五支等者疏解也識支亦不入名色支中名色亦不在觸支中五支各自分白布黑不相雜亂言於一剎那等者若望當來生現行時前後不等若約善惡業招集之時五支種子唯一剎那只此正招感時五支內名色支中不具五薀今總相而說有名色支不說於中法有多小意辨業引之時五支無前後問五趣名言為同為異答三藏云五趣名言不相雜亂乃至三界天等各各不同問此誰熏習答此即名言熏習名言有二一表義名言即能證義音聲差別二顯境名言即能了境心心所法隨二名言所熏成種作為法各別因緣也方謂異熟六根等者即五色根及第六識各異熟在過世說名為意也此約一意二世分別過去名意處現在識薀即取過去意為此六支中意現在意為名中識薀也不可一六識二支用也言異熟觸受等者慈恩云除第七識取第八相應觸受全六識之中為異熟觸若分位言六處位後所有觸數方是此體大論第九說六觸身為此體故受支同此作用分位義皆同故問大論說受為愛緣何故今取種子答然論說受為愛緣者約當來及於現在生老位中現起愛說今此唯種胎藏苦故言除本識種者本識種自作識支及此三種者即是六處支觸支受支各自為支也言餘諸異熟者名色支中只具四薀而無受薀也若約此身滅已當來八識一念結生之時攬父母遺體之時有三薀兼無識薀問何以知耶答只有第八識自為識支體同時羯邏藍色為名中色薀第八識相應遍行中想為想薀作意與思為行薀六識未生故無名中識薀上依疏論五薀闕具言契經又說等者遣妨也問既言名色支只有四薀者何故契經又說名謂非色四薀色謂羯邏藍等故知四薀及羯邏藍色身即具五如何相違耶答疏言依當起時分位等此就來生支向上假說名色交約具五薀也初受生時名為當起也第一金色薀生現行第二念第三已後六處支生更經三念五念已後識薀乃至受想行薀皆起此緣種子在本位之中未起作用不知名字起用之處返照種子上功能故經中說名色支得具五薀闕第八識一念結生之時不具五薀如何言依當時具五薀答若得剎那義外種位向上實不具五薀若依身死後當來生起前後分位論得具五薀問何名前後分位答安國云與識支俱時羯邏藍色名分位已後多念六識漸生名後分位由此前後合說得成五薀言於因中等者問何名雜緣起支答最初八識初位執持未勝六處支初位未堪與識為依為依未勝觸支初位未堪觸對前境觸境未勝受初位領納未勝兩盈中間未有作用已來為名色支體也問但依前後分足成五薀何要依雜緣起支答雖依前後約通五薀若不依雜緣起支說道理不足前後之中闕識薀前後相合說又闕受薀問設使闕何妨答便契經中說名謂非色四薀色謂羯邏等但說名色支中有五薀不說前位闕後位足所以又更解第一念前位之中緣闕識薀所以取第七末那識一剎那中便與第八互為依也此則得成前位之中有識薀也言前位者初念也又末那相應受薀也緣不是報性不合為支但成受薀想為想薀思為行薀故得具名色不爾即有間斷之過也若依雜起支解兼取第七識一剎那中便具五薀若依前義不取第七以不是報性故不取也後解雜體支取亦不妨也言或泛通說等者此第二解不得將現行向種子向上說也直取現行為體若約後解與前解不別也謨路云百法中唯除第八及六無為餘九十三法皆是名色支體此依雜亂出體也言唯識又依等者或名色種總攝五因也言於中隨勝等者已後作用勝別開出四支化度問既名色支中已攝五支種子五支便是何故名色支外別立餘四支耶答四種勝故於名色別立四支以報持勝故別立識支生識勝故別立六處支觸境勝故別立觸支領納勝故別立受支言六處與識等者或名色種總攝五於中隨勝出四支名別六處支名總識支為別就六處中第六意處攝第八識名總於中隨勝出離第八識以為識名之為別故名亦然也言愛支唯是等者貪有三品即中下二品貪名為愛支上品貪即是取支通緣內外二果緣內生愛即是內身異熟果緣外生愛即是外增上果愚內異熟果即內五根外增上果即外五塵即自體愛境界愛當生地受言諸論多取等者約增勝說若欲界衆生多緣外境貪妻子莊園等境界色衆生多緣於定及內身起貪無其妻子田宅等境若欲行時宮殿自隨不緣於外境多緣於定及內身起愛唯識云九種命終心俱生愛俱故問一種是貪何以上品為取中下品為愛耶答由熏習時得中下品種名愛支上品種子便是取支此支唯取愛數一法為體更不通餘法中通攝四愛皆潤生俱愛攝問雖知此愛而能潤生然四種中何者正助答然四種愛皆通見修即修斷正見助言取支等者通見修煩惱皆能結生標自體也言全界煩惱等者引證也結者和合義生者相續義若生欲界全取欲界煩惱名全界身生上二界取上二界煩惱名全界通見及修正潤助故言全界煩惱即潤標中通一切煩惱也言一切煩惱即全界煩惱也言若能取若等者大論八十九云取謂貪取問何名能取答四種貪欲心是能取問何名所取答欲界見取戒禁取我語是所取也即我見也言所取者一欲取謂於欲境貪五塵為性唯在家人起二我語取通出家外道起此我無體橫計執身有我而發於語故言我語取三見取謂於語見愛樂執著為性四戒取執三見所持戒禁為性戒是性戒禁是遮戒執此戒禁能得涅槃於此貪取名戒禁取此四之中初依在家白衣起以貪欲為先而興鬪諍後三見依出家外道起以三見為先而起諍故上解能取所取三所為取者為字平音呼為由作也二者為字去音呼以也助也由前能所二取為因生後全界煩惱能結生故能所二取皆隨順煩惱名為所取也言不取餘法者簡要云起貪之時諸餘煩惱同時起者亦名為取不取違情境不生貪故及無漏法名不取餘法路云不取餘業名不取餘法也言有處唯說者通妨也問前說一切全界煩惱皆名為取支者何故十地經說愛憎名取答疏言唯識會云等其實三界受生總因於愛若無其愛即不受生故因愛方乃有取已有生且據初後分位愛取別實攝多法多法即餘惑也言愛取二支等者問何故發業但立一無明支潤生之惑分愛取二答要數溉灌方生有異且依初後分愛取二業無重發義但立一無明支也俱舍云水能集魚取能集煩惱言俱能潤故者相國云何以得知俱能潤答唯識第八云愛支與取支為因緣非現望現問既通種潤生凡聖位中有何差別答五十九云結生相續有七一纏及隨眠結生相續謂異生二唯以隨眠結生相續謂入諦跡三正念入胎結生相續謂輪王四知入住結生相續獨覺五於一切位不失正念結生相續謂菩薩六業所引發除菩薩七智所引發謂諸菩薩惑業所引名無義利智所引名有義利或七或九然見諦跡唯藉種潤據實初二果兼通現潤當地死當地生即通現行潤下地死上地生即種子潤如不還果欲界死上界生上地種子潤以欲界愛盡故聖人被通現行現行助種子正凡夫現行正種子為助潤問凡夫種現共潤者如有欲界凡夫修得初禪未至定未得根本此位命終者欲界煩惱伏現不起未得根本定未起得上界煩惱此以何潤答二解一云此位必是命終者或進修根本定起上界煩惱兼未至定退失却起欲界煩惱潤生一以凡夫藉伴故二云此位命終即初禪種子潤若爾瑜伽論凡夫通種現如何答從多分說猶如見諦唯藉隨眠初二果人由通現潤初解為勝然初果九品俱生煩惱共潤七生有總有別總者初三品共潤四生中三品共二生下三品共潤一生別者上上品獨潤一生上中品獨潤一生上下品獨潤一生中上品獨潤一生中中中下共潤一生下上品潤半生下下品共潤半生合為七生然潤生有二位一本有末心二中有後心中有後心所起煩惱已屬兼支大乘中有屬生支故十因二果定不同世間何故潤生煩惱要屬當生答第一似當生故二中有已屬生支故也言有支體等者即前行識等六支種子為體有支更無別體被受取水潤前六支未潤已前名行支識等如是差別問早晚生現行盡不知時節被潤已後有彼當生相現異前分位故名為有只有當果但是有無之有非三有之有也唯識云愛取合潤能引業種及所引因轉名為有俱能近有後有果故意者業能為增上緣識等能為親因緣並能有也言有說唯業者謨云經文多故不別出名但言有說也即瑜伽第十文也唯取業種子為有支者望招感異熟果業種勢分強故偏說業也上會異熟果言有說唯五者會生老死支也意言有處說五支種子為有支者以親生生老死支故此有三差別一愛取潤前六支轉成有支行支是疏五果種子是親親疏合名有支若論業種感異熟果即親若望等流果即疏若五果種子感等流果即親望異熟果即却疏言此唯種子能有者種現差別也安國云識等五種轉名為有所生現行即名為生支即有支望生支而為因緣也有支不望老死支以隔生支故言生支體等者謨云准俱舍說中有不是生支攝彼論云死生二有中五五薀名中有未當生處故中有非生老支大乘不然慈恩云始從中有乃至皆生支攝此身死時第八識亦捨中有身五支種子一時生如稱兩頭低昂時等同一剎那此陰滅時正是彼陰生時位此死有已後便受中有身中有身五薀生現行從中有入本有身最初一念是中有生第二念已去即屬本有也始從中有至本有中若得百年活五十已來名未衰變皆屬生支問生有與生支何別答生有唯一剎那生支即寬問若言中有是生支攝者如何言十因二果定不同世如何言中有身與生支同世答彼是趣生方便不是正生支故言生支攝也緣起經云有有五種生一下種生初一生在胎生藏之下熟藏之上二漸增生從二七日至七七日五皰開張三出胎生從八七日至十月滿足已來四漸長生十月滿足正逼趣産門五受用初出胎已孩子肉軟猶如新瘡墮在草上言諸衰位等者問名為老答緣起經云衰變有五一鬢髮衰二身相衰三作業衰四受用衰五命根衰壽量將盡鄰近死故言死者取將死正死乃名為死本有身最後後一剎那為死支此十二支是有體法不取神識滅無已無之法不合為支緣起經說死有六一究竟死二不究竟死三自相死四不自相死五分位差別究竟死六分位差別時非時死今取六種死中第三自相死謂自識捨離身故問生老生死與異滅何別答生異與生老即同死相與滅相便不同死相是緣生有體法滅相無體法也問住相何故不向支中收答有有二一義濫無為故不取二不順流轉法故不取緣起支是流轉又生老病死向五薀上立生住異滅向行薀中收故道理各別言此二支體等者出體也此生支與老死支體皆通五薀也言唯是現行者種現差別也唯是現行簡種子異熟果攝言有處亦說等者會違也即是緣起經說疏取生支及老死支意取五薀現行為體緣起經中何通種子耶答論彼經文云若約分位說識等五支種子與當來生老死支種子與現行隔世實別也今將五支種子被潤已去親生生老死支現行即是論家解經生引同時所以說生老死支得通種子也言能所引生一時等者無明行為能引識等五支為所引愛取有為能生生老死支為所生今取所引五支與所生二支故說生老支通種子言次第宣說等者生老死支又是現行現行必從種生今既先說識等五支後說生老死支故名次第也言義類無別者離却五支無別生老死支離却生老死支無別五支故言無別也且約一般無差別義說生老支亦通種若據差別而說非是二支亦通種子實是現行也言憂悲苦惱等者解非支也問十二支中何立不別老支共死支一處說何也答老雖遍三界而不決定欲界人中有髮白面皺上界之中雖無此相臨老之時皆有衰朽之相色心等法有異於前是老相也遍三界有也於中中支不老即死以不決定故不別立支問病相何不立支答二義皆闕一唯欲界人中有上界無二人中雖有病病不決定於中有不病而死者如薄俱羅比丘多生已來不曾有病一則不遍二不是故不立支問化生之中六根頓有有六處支收無前後位如何有名色支答有二說名色支雖不遍化生遍除胎即濕生亦立支也二雖化生六根頓有第一第二念六處支作用未成就未生觸已來約彼初位名名色支問聖教說不如理作意與無明為因憂悲苦惱與老為果何不別立支答不如理作意但為不斷因憂悲苦惱但為相續果亦是因果故不別立支又憂悲苦惱因老死身有故不別立支問何處是憂悲苦惱依老死起處答疏言憂悲苦惱因老死起非是支攝言意根相對者此即臨終時以自根對餘眷屬妻子兒等生憂苦等言在下二界等者准論三界分別門云雖皆通三界而有分全據實無明支觸支受支愛取有支及死支皆通三界行支意業通三界如語業在有色界名通二界色唯有色界六處中五根處在下二界意根處通三界言釋名者此但釋總名此名緣起亦名緣生五十六云果名緣因名緣起又云無有主宰作者受者無自作用不得自在從因而生託衆緣轉本無而有有已散滅唯法所顯潤所潤隨相續法名為緣生言此有五釋者初四約有漏生死法釋第五釋覺悟為緣宣說名起言一云由煩惱者煩惱繫縛為緣數數生起名起無惑為緣果不能起故名緣起也前異熟既盡是緣也復生餘異熟是起也唯有漏生死十二支法得此名異此依大乘正義言二依託衆等者簡異小乘依託衆緣解字也速體滅已續和合生解起也言故名緣起者結也有為之法依因託緣一一支皆具衆緣而得生起無有不具緣而生者已如無明支便有相應不共纏及隨眠心心所法具四緣生無明既爾乃至老支依託衆緣而得有故故名緣起有時緣闕前念一聚法滅名緣有時緣具後念一聚法續和合生名起有為法若生事須得前念法滅為緣引後念方能生起前滅為緣後生是起有解無明滅為緣行支有故是起此解非正但是總相解十二支一一支中有前剎那滅故為緣後剎那生故為起名緣起言簡太衆部等者等言等取化地部師此一部師計十二有支依於無為即十二支以無為為體十二支雖然生滅斷絶於中因果常定不相雜亂錯失皆由無為有力之所任持無為如鋸皆不斷絶十二支如鋸齒鋸齒斷絶也問大乘亦說無為與一切法為體性何故簡於小乘答大乘萬法以無為為體性但是緣依增上緣也各自別說種子而生大衆部師計無為與十二有支為親依十二有支親依無為也謂簡彼執故云依託衆緣剎那生滅各從種生以無常法為緣不取常法為緣無為但是彼實性故如空為除依也若准宗輪說大衆一說說出世雞胤等四宗並計無種所謂二滅虗空并四無色緣起聖道皆以無為為體言亦簡正量等者安國云四相有二一剎那四相謂心心所法二一期四相此中復二一執內身根一期而住二計外器世間經一劫住中間不滅此小乘中計剎那四相與大乘同此更不簡今此唯簡執有情內根身及器一期四相中間更無念念生滅此說緣生前剎那為緣後剎那名起故得中道言三衆緣過去等者章敬云瑜伽抄說若依分位前十支為緣後二支為起過去一聚法雖然落謝已無名衆緣過去緣有種子在第八識中名而不捨離只此種子為緣依自相續還生現行故名為起言相續者自身義有為之法仗因託緣前念不滅後念不生前一聚心心所法從種而生只此種子為緣依自相續還生現行名起故名緣起引論標了言如說此有如者指斥詞也此有故彼有者顯無作緣生也無明有故行支有行支有故識支有此顯無明支只與行支為緣若望識支無力此破小乘十二有支有實作用作用亦只是無明與行支為緣行支與識支為緣小乘部計此作用是實大乘雖有作用元來是假問聖教說無明與老死支為緣答若約近緣說無明支只與行支為緣若約遠緣於生不障義邊與後十二支為緣言此有故彼有等者是無作緣生義安國云如順世外道所計有情皆由四大父母極微有實作用能生有情名為作用又如數論勝論師計作者我能為生死因有實作用今破於彼故四無作也十二支各別從種生因緣而有無實作用也作用是假故言無作也言此生故彼生者顯無常緣生無明生故方行支生無明若不生行支亦不生能生皆是無常法此破外道常計也言非餘者牒論文釋也非如小乘無為為體非如外道常法能生一切故名非餘路府云非餘二字標唯由下釋上也由者即藉也藉無明行為緣識等果法方有也言此生故彼生者顯無常等者相國云無明為因生得行支為果行支為因生得識支為果乃至餘支皆是能生所生因之與果皆無常法此破外道妄執梵王冥性神我等體是常不從因生而能為因生他果法今破於彼故四無常亦破大衆部義生緣法以無為為體也言非緣有實等者非緣父母極微能生有情非作者我有實作用能生果重簡上順世外道計也言亦非無生法等者彼計常法不後因生故曰無生意言亦非梵王冥性為因能生多所生為小下至一法得名小法無有一法生時者路府云能生為多所生為小下至一法得名小法無有一法生時不從因緣而得成立也言四數數謝滅等者第四義約界隨轉數壞滅名為緣起問此與前二第二何別答前緣過去已滅為緣現在法生是起是緣起義今第四不解緣生義但顯無常法六道四生有情身中剎那念念遷流不住名數壞滅與前第二別也言五於過去世等者世尊自解為緣為衆生說是起謂佛過去修因之時於善友所聞如是說有為之法皆從緣起聞也覺悟便成正覺解緣字言覺緣性已等者等者相似義等起宣說故名等相續起覺緣性已名緣等相續起名起也緣屬覺起屬於說故名緣起安國云所覺名緣說即名起也言展轉者正是緣說即名起也言展轉者正是緣起義言離有情義無自然我者安國云勝論所計有情身外別有神我故作善惡等為受者我但知受果故疏破之無自然我也乃至自所作義是緣義也言於餘相續等者此破外道此人造善他人受福也相續者身義自作名緣自受果名起不可自作名緣他人受果名起自受非天與人乃至無明行行支造業為緣受福非福果名起也問若自作業自受果如何但合男女子孫為亡人造福答有三義一云不得功德但是化相門中佛作此說理實亡者不得福如有經言昔有長者性多慳貪死墮餓鬼道其妻為作福事訖轉緣餘人樂之時亡夫說偈我昔集珍財若正若不正他今受快樂我獨受貧苦鬼言不得明獨不霑若他人造善自身得獨應可世間無獄三塗以彼十方法界內菩薩修行普為諸衆生勤求於大法又念念之中發立願願一切衆生離苦解脫既如此何以衆生受苦問既爾應可菩薩誑衆生答菩薩事須發願雖救不得將此願心成佛去也二云七分別得一而不全收問既七分得一亦是他人造業此人受偏也答七分得一之時事須亡人自發希功德心既有此心還是自作自得假他人與造為緣也言各十一釋等對法論緣起名各十一釋且對法十一者謂無作義二有因義三離有情義四依他義五無作用義六無常義七有剎那義八因果相續不斷義九因果相似攝受義十因果差別義十一因果決定義是名緣起言對法又云無作緣生故者此破小乘十二支有言作用大乘十二支是假無明支只與行支為緣者對餘支無力也言無常緣生者無明支只生行支若望餘支便不能生故言無力也言勢用緣生故者第三別故重解也疏主引對法論中三個來前二無作緣生無常緣生與瑜伽同故更不解也解第三勢用緣生者簡外道執一因能生多果問何名勢用緣生答無明發行只與行支為緣無明力勢只到支更過與識支為緣便無勢力乃至有支無力乃至有支力勢只與生死為緣不望老死為緣也顯無常法力用如此十二支互相增起也安國云案提婆論中敘此諸計言國陀論師說如是作那邏延天䐡中生大蓮大蓮華中生梵天祖翁彼梵天能造作一切有命無命物也從梵王口中生婆羅門兩臂中生剎帝利兩髀中生毗舍從兩腳生首陀大地是修福德戒場於戒場供養梵天得生彼處名為涅槃體復是常或說時方本際自然等此即一因能生多果今破於彼顯無明等但望於行能勢用生起之義不能普生餘一切支展轉相望亦爾問何故瑜伽云無明支乃至能與老死為緣答緣有二種一親近緣二疏遠緣若約親近為緣即鄰次而有若據疏遠為緣即無明亦與老死為緣瑜伽論中遠近俱說今對法唯近非遠亦不相違言雖復諸法者問前來言無作無常莫總不作耶答疏言雖復諸法等非同外道一因能生一切顯十二支一一皆具衆緣力得生起力勢各差別名勢用緣生也應為四句分別近遠一有無明為緣非是行識等是二行非無明為緣無漏識等是餘支准此皆具四句上總名了次明辨別名者慈恩云無明一法無六釋體是一法無可簡別行當體彰名造作義也亦功能受稱了別名識觸領納名受體染名愛退欲名取有果名有薀起名生名色者相違釋名之與色體相違故云名相違六處支者生長色心之處名處義有六故帶數釋也老是變異義死是滅無義所表各別亦相違釋也言緣相者即十二支為緣行相也言無明有二等者正明無明行相問名緣相意因何無明支後有行支行支後有識支乃至生支後有老死支何放最初說無明支耶答言無明有二一真實義者即四聖諦理於彼起愚癡名真實義愚真義者即是一苦二無常三空四無我愚也真實義名真實之愚依主釋三界有漏皆苦無明皆樂今向二界及欲界人天果上不了是苦無常無我許為常樂及計為涅槃求遂造福業不動業求生彼身亦此身苦集諦收既求彼身便迷著四諦下苦空無常無我真實道理故名真實義愚言二異熟果愚者地獄餓鬼畜生身正名異熟果不信彼果從煞生偷盜中來故名異熟果愚也安國問何故無明迷人天果報名真實愚無明迷三途果名異熟愚耶答當造人天因求人天果時不知此果是苦妄計為樂迷著苦諦下苦空無常道理名迷真實義愚若不信煞生偷盜是異熟果家之因不知異熟果從煞生得但名異熟果愚不名真實義愚又約增勝說彼人造煞生業時亦時緣不信有地獄果所以造煞生業迷異熟果相增迷真實義劣若持戒時信有人天果求義增所以迷人天果名真義愚也迷三惡趣果名異熟果愚也言唯是上品者有云真實義愚緣人天身起即中下品無明也謨云唯上品者迷過失重故若說隨增義說真實義愚異熟果愚起處各別若通論之總得名異熟果愚言皆緣內身等者結簡外增上果也言行有二種等者一善行謂不煞等十善行二者不善行謂煞盜等十不善行言或分為三者一不動業二解一云緣是動地造得業名不動業不動家之業名不動業二云所造之業不同欲界業有可移轉此業不可改轉名不動業不動中業持業此解為正二者福業所造之業自體及果有可愛樂名福業據實三界善業總合為福業且約欲界天及人中受欲樂勝故偏名福業三非福業所造之業自體及果不可愛樂名非福業言此為有分熏習者熏解釋行支也即是能招三界業種有分熏習有二一者善業種即是能招可愛果二者諸不善業種即是能招非愛果也有謂三有之果分者因義熏習者種子之名故云有分熏習也言識等五種等者問何名名言答名言有二一者表義名言表者表了即能詮教相名句文名表也義者道理即是所詮義理也第六識聞教之時解得能詮教下道理解心生時熏得種子種子從名言熏得名表義名言二者顯境名言即能了境心心所法隨二名言所熏成種有為法各別因緣上二名言第一了二我執熏習謂妄執我我所種因執我故於相分中亦熏有漏五薀種子亦即名言熏習由熏我執種故令自他差別故故別立之三有分熏習前說了問此三熏習為同為別答其義不定後二熏習是名言有是名言或非後二即語無記而非執者及無漏種非後二故若將我執對有支可為句一有我執非有支謂有覆無記執非有支者即末那俱者二有有支非我執謂善惡心不起執者三有俱句謂不善執俱者四俱非謂無覆無記性種及無漏種即三習氣中有支習氣也有支有分名異體同皆是業之異名也言此五無記等者此第八識中識等五支熏在識中甚多自性無記不生能起由業力招感然後方能隨業生起言由上品者問發福不動以簡擇力而起何故乃言以無明為緣答大論十云由不了知世俗苦故起非福業由不了達勝義苦故起福不動行三途之苦易可知名為世俗苦人天之業難可知故名勝義苦壞苦名世俗苦行苦名勝義苦言隨發業已等者隨業善惡何界何地所計此五支種子攝屬於行行支所引屬當來生處只此種即是當來生老死支種也言種位定無等者此五支種子行支招引時一時招感更無前後受取水潤前潤前前六支轉成有支問既無前後何故前經云無明緣行行緣識識緣名色等答約當來生起時分位說有前後差別雖實同時而依主伴總別勝劣因果識支為主餘支為伴名色為總餘三是別六處是勝餘二是劣觸為因受為果也言故唯識云謂等者謂迷內異熟果愚即證無明支也發心能招後有諸業即證有行支為緣引發親生當來生老死位五果種證有識等五支種子此中言勝者藉待之義待之義必須假藉此愚引也言復依迷外者即是莊園田宅家生五行等言緣境界受等者能緣受領納境界境界受證有受支也言發起貪愛者證有受支言緣愛復生欲界等四者證有取支言愛取合潤者此愛取二支合潤前能業種及所引識等五支種子轉名有支此證有支言自從中有等者有支從此生現行遂有生支起言衰變命等者即老死支也因老死支便有憂悲苦惱種種隨生此上唯識文言此說由迷內等者疏主解緣相也言自後五支等者意言被潤業種但有招感之功能也言瑜伽三釋等者化度云一約具十二緣立十二支前之六支約內身緣立後之六支約外境界緣立二云由三有情建立十二支一約世間有情建立前之六支二約樂著境界有情建立後之六支三約樂出世有情總立十二支三云由無明故愚於世間所應作事方起諸行起諸行故令心顛倒心顛倒故生化死相續相續故諸根圓滿諸根圓滿故受用境界受用境界故耽著希求耽著希求故煩惱滋長煩惱滋長故後有諸業滋長業滋長故五趣果生生已變壞老死生起故十三支如是次第此之三釋皆約當生果位說因次第以識等五因前熏習時無是次第故說當生緣起經云一時而有次第宣說也言依世者依世即依身也皆約身生死為世也言成唯識云十因等者從無明支果現在十支因未來二支果此云因果定不同世且過去十支因者前世之中無明發行或善或惡招集識等五支臨終又起愛取水潤近有當果轉名有支此是過去十支因今生此身生老死支即是其果又於此身上還以無明發行行支招集識等五支屬當生地繫臨終時起愛取水潤轉成有支此即現在十支因也身死之後當來受生老死二支果即是現在十支因未來二支果此大乘義一種因果不同小乘兩重因果牽教引薩婆多三世立兩重因果過去二支因謂無明行現在五支果謂識等五支現在三支因謂愛取有未來兩支果謂生老死廣如俱舍也簡要問云小乘何要說三世兩重因果答曰謂有外道撥無過未唯說現在法自然生也愚前際故說諸法常無後際說故諸法斷今佛法中為破於彼故說緣起過去無明行為因破常見未來老死為果破斷見現在五果三因破自然生也故大乘唯識破云如是十二支一重因果輪轉及離斷常若施設兩重實為無用也言因彼常言果破斷問大乘過去十支因現在二支果現在十支因未來二支果豈不是兩重耶答雖似兩重元來不離一重言要生後報等者意言現報非支不成輪轉義不順輪轉次第也今身造業今身便受更不隔生名順現今造業鄰次第二生受名順生今生造業更第三生受名順後業也言因中前七與愛支定同世者只如無明發行造得業成一剎那招集識等五支種子并前二支名因中前七也臨欲終時方起愛取水潤轉成有支此能潤所潤俱是當生決定同世此約生報說也言後報便異者如頭藍子坐得非想地定不動業種七支具足得入定時於彼林中為諸鳥喧雜遂發嗔毒之心起我作飛狸夜叉之身食彼飛禽走獸當發願時飛狸之中七支種皆成熟緣定業力強以先向無色界中受生經八萬劫劫滿臨終方起愛取水潤八萬劫前飛狸之中七支種子天中報盡方受飛狸之身此則第一生造飛狸業第二生受天報第三生受飛狸果此七支是一生愛取有為一生老死支果是一生此依後報三生緣起若順生業十支同一生老死支一生兩生緣起若順後業三生緣起就三生之中即是別身造業別身潤生別身受果也故七因三支及二支定不同世名後報便異也謨云亦通三世過去七支因勢相似故同世現在三支因未來二支果也言諸緣生攝等者會一切教中互說不同故言諸緣生也疏引四本論文攝論辨中邊瑜伽俱舍四本便為四段也言分別自性者分別有多種一授記解釋名分別二心法緣慮名分別三驅分名分別今是第三義非前二也攝云分別者驅分差別之義三性種子生三現行各各自類不相雜亂却向種子向上說生現行功能名為分別此有二解第一分別是因自性是果分別是種自性現行問何以善惡無記種子名生現行不相雜亂答由種子向上各有驅分別現行果法自性各異此則分別名緣自性名起即是種子名緣現行名起二云自性者因義即是種子也分別者驅分別義即是現行果法也問何故生果各各不同答種子自性因異生果各有驅分色種子自性生色現行名分別心種子生心現行名分別此則種子名自性現行名分別也第一解分別是種子為因自性是現行名果第二解自性是種子為因分別是現行為果也初解分別為緣自是起後解自性為緣分別是起此後解稱寬通二熏習種現上釋分別自性一句論文言謂依阿賴等者本識是彼諸法依處舉所依識意顯能依種子不取識也言諸法起者舉所生果也故云分別自性緣起也言二分別愛等者亦是種子謨云此解唯是善惡業善惡業雖為緣感愛非愛果為起簡無記法對前分別自性即狹前解三性種子各生現行此第二唯有分熏習善惡業種感善惡起異熟果也天人樂果名可愛三途苦果名不可愛今解所分別是善惡二趣果能分別便是善惡趣業種名有分熏習也種子名分別現行即是愛非愛果言今此正說等者料簡前來二解亦云取捨也問何以不取前解取後解耶答以後解緣起正起善惡業善惡業種望十二支是正明也言義亦攝前者却取前解之中三性種子生自性現行前念種子生後念現行以攝寬寬故總取故言義亦攝前業所招感者即是十二支中正明也於中不是業招感者簡之不取故言不正明之意言今此識支攝前緣起一分故云攝前也言復說三種者此十二支據實通理更加得受用緣生名三種標也言辨中邊等者別烈也問何名受用緣生答疏言辨中邊等論云受用緣生者一則名緣識此釋受用緣生義由有第八第七為緣方有前六識生與餘轉識為生起緣故名緣識第二名受者受用五塵境故即內六處發六識緣前六境時同受能領納前境故名受者問同時諸心所何故不說空說受一個法耶答受能納前境勝故偏說第二解喚六識作受識不是受與受為主識緣境時心所中受領納前境義強今隨主勝向識上說識上說受功能喚識作受也問何故喚識作受答緣衆引論文第二名受者者是主義心所劣故不得主名故喚六識心王作受也言此中能受用者金云初句明能生即是第一句論文一則名緣識後三三句是所生就三句中約明轉識即是論文第二名受者後二句明心所即是論文此中能受用并分別推心所也謨云此中二字雙指前緣識及受者二句也能受用三個字即是心所中受也第四句分別推心所者分別兩字是想薀也推之一字是行薀思與作意能造作䇿舉有此功能故推也心所二字者即是行薀中餘法也此心心所皆受用所緣境故言受用緣生者結也此結受用緣生也言亦此義者有說今明緣生十二支中說六轉識及諸心心所義相當故到故名亦此義攝也不是此間正要故云非正辨之言瑜伽復說四種等者彼論說有四緣生謂能引所引能生所生等是言集論說亦等者只緣業種子在識中與識種子處為識支今者識亦是能引者意取識中業種業種是能引也識種定是所引也以業種子在識中喚業種作識支種者亦緣業種與識支和雜一處如二束蘆更互相依業種是能引識支種是所引借喚業種作識支種故云識亦是能引也言異熟識種等者問集論既借喚業種作識支種者識實種何法所收答疏言異熟等識種却向名色支攝此約雜體支攝雜體說自有第七識為名中識薀言經說識支等者會緣起經業種識種雙說問緣起經上卷云識通能引所引此云何通答彼經云業種識種俱是識支故通能引所引也問種名為識支何不異熟識種同集論向名色中攝與業種共識種一處收耶答護法會經意云識是名識依非名色攝故藏識是根本與名色而為所依名色是末此約不雜亂出體問全五種名所引者何故緣起經上卷說一分名色六處觸受亦名所生答依現行故作是種子即是所生問何故彼經亦說受支一分是能生支答現行受有二一內異熟受彼經說為所生支攝二境界受能生愛等彼經說為能生支攝望義各別亦不相違也言俱舍論第九等者會俱舍小乘義也光法師云剎那為同一剎那連續者謂相次連接分者前後十二支分位也遠者謂前後隔時相續言云何剎那者一剎那中具支二支故名剎那緣生約法出體有同時義非約世論言云何剎那者疏主問也答疏言謂一剎那之中起貪心行煞便具十二支也簡要云若嗔心行煞一剎那之中不具十二支以嗔心行煞定無貪心貪心既便闕受支支便闕也且貪心行煞具十二支者夫貪心行煞先與無明相應即是貪相應之無明也正下力煞生時貪心相應思是行支同時第六識能了前境即是貪相應識支識俱三薀總攝名色小乘不信有七八識便以第六識支前五識為名中識薀既取現在第六識為識支復無七八二識便無六處支中意根只有內五根為六處支問既闕第六意處何成六處答以小從多亦成六處支也以此間一剎那中取法不合取前念第六為六處支中根也言識俱三薀者諸抄皆云五薀中除受薀自立支故三薀即是想薀一全色行二薀各小分十一種色中除五根色自向六處支中收法處色不取也唯取色香味觸內身四塵為識俱色薀識相應遍行中除觸受二自立為支餘作意思及別境中欲勝解念及餘心所等為識俱行薀也此上三薀即是想薀全色行二薀小分共成三薀總名名色支也言住名色根說等者名色是總五根是別以別住總故言住名色根其五根說為六處支六處對餘根境識三和合有故故名觸支領納意等觸名受言貪即是等者煞生本心也言與此相應等者與貪相應無慙無愧惛沉掉舉等名取支也言所起身語等者與貪同時剎那所起身語二業名有支言如是諸法等者如是諸法正起時名生異相名熟衰變名老滅相名滅壞時名死此約剎那四相而論也相國問生相與老死時分既異云何剎那具十二支答攝釋二解一云此依四相作用究竟名一剎那故十二支而有具義二云四相體合合說生相不約作用但體現前說有生支生支體得與老死用同相現在法上上小乘義又眼見色時耳便不起何剎那中識支與名色支二得並耶大乘八識煩惱齊起言復有說者剎那者即生住異滅也言今者大乘者破小乘也意破一剎那時不具十二支問何不具答小乘識不俱起有第六時無前五如何剎那識支與名中識薀同時也
