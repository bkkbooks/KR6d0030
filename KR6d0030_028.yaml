body:
  text: 言稟潤各異者經云一雲所雨稱其種性等者一雲者佛身也佛身為能雨雨為所雨教法也稱其種性所滋長也而得生長者最初聞教發心熏得菩提心種子名生也多時修行名長也華果敷實者敷字配上華實字配上果華敷喻聞教也華敷見喻修行衆行華開見必能結蓮教若開敷必能行行涅槃言以教對理等者因解此經文說三乘五乘差別便論乘藏有異問教既是一般如何喚作乘藏兩差別耶答疏云以教對理等教即一雨理即真如理也言或以教等後等者以教對回心已後成就之根只有一大乘根名為一雨亦名一音言所說理法唯一相故者結前以教對理而忘其機名一雨言退性究竟並作佛故者結前以教對後不定性成就之根名為一雨亦名一音也言以教對根忘其理法者名三乘此上通結定不定性聲聞緣覺也言或教對初根未熟位者不定性根未回心前名初根而有所運名為三乘亦名三車言隨彼根宜初傍等者結也問何名初傍誘引法答四十年前說小乘名初引法亦名傍引法靈山會上說一乘正直捨方便亦名正引法亦名後引法牟云若對定性根說三乘法總名正引法若對不定根說二乘法名傍引法說一乘名正引法上明乘差別門下明藏差別也言若以教含行名為三藏者即是三學戒定慧也以教詮戒行名律藏以教詮定行名經藏以教詮慧行名論藏言若以教含理等者以教含生空理對聲聞機名聲聞藏以教含二空理對辨根者名菩薩藏問何不說獨覺藏答有二說一獨覺之中以教少故以少從多聲聞中攝或從聲起聞獨覺亦得名聲聞問既總名聲聞何不先說獨覺獨覺最利故答以狹從寬故攝入聲聞也獨覺人少聲聞人多以狹從寬又獨覺利根聲聞鈍根若唯說利根攝鈍不著若說鈍根兼利亦說問草既有三小草人天何不名藏答小草之教無理可含不與藏名言阿闍世王者證有三藏也言今以教對理等者問阿闍世經既有三藏何故此經言一雨答今此經以教對理及後根定一名為一雲一雨也言現有所對之機者道理名理或生空理有淺有深對此明二乘異言教對機理者教對三根聲聞等之道理名聲藏等言將顯理之教等者結前教得乘名所由也上來辨藏差別了言三乘種性等者解經雖一地所生同一真如地增上得中說生如草木各有自種子事須得土地地中方生葉莖名增上得也言依一佛教者解經一雨所潤名依一佛教也問前來說山川溪谷土地為能生草木為所生此間何故唯說真如名地答前言山川溪谷雖別無不離土地法中胎卵濕化四生差別無不離真如地彼處性相雙說此間唯說舉性地所以疏言依一真理稟一味教衆生自家盡得生長不同伏答不知草之有毒甘草不知黃蘗之不甜聲聞不知緣覺姓有勝劣緣覺不知菩薩性有勝劣言此解似疏等者牟意云將不自知及不知他解此名有差別云不自覺知即似道理有疏緣喻中說不解覺知義然尋下合文云衆生住於種種之地唯有如來如實見之明了無礙等文彼合此不知方知此解不錯也然取合中結文不如取標文其有衆生聞如來法若持讀誦如說修行所得功德不自覺知等問且如四果聖人中十地菩薩皆知自果云何此言不自覺知答除佛知已還餘聖不能知自知他委細皆盡故有頌云如一孔身而有多種色此何業所感離佛無能知言下第三合述亦四者初法述有四一佛興於世經言迦葉當知如來是諸法之王若有所說皆不虗妄也二法利群生經言於一切法以智方便而演說之三受道有殊經言如來觀知一切諸法等四不能自達經言又於諸法究盡明了示諸衆生一切智慧喻亦有四一法王出世喻經云密雲彌布一句二說教普滋喻經言遍覆三千大千世界三稟潤各異喻經云一時等澍其澤普洽卉木藂林四不自覺知喻經云雖一地所生一雨所潤而諸草木各有差別第三合文亦四今經出世者初法述一佛興於世經云如來是諸法之王若有所說等次本喻云密雲彌布一句今述迦葉當知如來亦復如是出現於世此上三句法也下一句喻如大雲起言第二合說教等者前來法述中法利群生經云於一切法以智方便而演說之次喻述中遍覆三千大千世界今合以大音聲普遍世界天人阿修羅如彼大雲遍覆三千大千國土言不但等者體經音聲上遍義難作行相事須依身說聲也不但身遍聲亦遍故即百億釋迦同時出名身亦遍雲既喻佛出世遍覆故是同時言第三合稟潤各異者法述中云受道有殊經云如來觀知一切諸法之所歸趣喻云一時等澍其澤普洽今合之於大衆中而唱是言至世尊言一唱德號者問何故世尊自誇德號唱身中功德耶答若佛獨有餘佛無即名自誇佛佛道同功德平等共有故不是誇也言此中四種等者未度者令度苦諦未解者令解集諦未安者令安得道諦未涅槃者乃至證滅諦故云如次也言已見名今現去皆今故者料簡三明也即解經中今世後世如實知之今世即現在也後世即未來也問何故空言現在未來不說過去耶答過去事已見了現在名今今現見也所以空言今世後世後即是未來也只將過去境向今世中收現在共過去境皆是已見又過去境與現在事相近所以今世之中攝得過去現在所以經文唯說今世後世不別說過去也言一切等者一切知根本智一切見後得智言或初是者即根本後得二智名一切知一切見者五眼能見一切也佛具五眼菩薩有四無佛眼二乘有慧眼無法眼無種智故言知開說者一句標也言知諸境等者釋也真俗諦境開諸行者是善行惡行說諸果者轉八識成四智束四智成三身或三乘果五乘果又當經配知諸境十二品一乘境開諸行雨品為一乘行說諸果五品為一乘果亦如唯識三十頌二十五頌境四頌行一頌果言又知邪正等者知邪定聚開正定聚說不定聚大論云知邪定聚謂闡提也開正定聚者小乘初果已去大乘初地已去證理除惑得決定故說不定聚者在地前十住第六正心住已前名不定聚第七不退住已後為正定聚也知三根者上根中根下根開三科者五薀十二處十八界說三世者過去未來現在三寶者佛法僧開三毒貪嗔癡說三德斷智恩三界欲色無色開三漏者欲漏有漏無明漏又識生死即知也言又悟知諸道者不過十業道能略開者十業道中說一二三業道也能廣說者十業道總說也言道有一種者謂一乘道道有二者善趣惡趣為二或世間出世間為二道有三謂三乘道或三惡道道有四謂加行勝進無間解脫道有五謂資糧加行見道修道無學道道有六謂五道中并修羅道有七謂七識住有八謂八聖道道有九謂九無間九解脫道有十謂十業道疏意從一至十增數而配故舉初二及十略去中間言如理知也經言汝等天人等者此召集也我有一乘微妙好法汝等天人八部總須聽來言他聞普至者亦聞世尊喚一時總到來經言爾時無數千萬等也言為利說二草者則云大草中草為二也中草聲聞獨覺言為鈍根說小草者無種姓人天乘如來觀知根性受道說當根法各稱本情所以歡喜言生聞有二果等者聽經已後得二種益一現在得好果報經言是諸衆生聞是法已現世安隱又死了生善處經云後生善處以道受樂經云轉身得帝釋坐處若梵王坐處轉輪聖王所坐之處名以道受樂不同外道行邪惡因受樂非理受樂也上世間果二得出世間果二乘人離煩惱障惑苦業三漸得入道并離所知障故漸得入道此第一解不定性人根未熟先得人天有漏果後得無漏果言如法以理等者問如何名如法何名非法答牟云如行三歸五戒為因及十善八戒為因得人天等果名如法順理若言行無因自然梵天帝等受人天樂即名不以道得也即同富與貴是人之所欲貧與賤是人之所惡不以其道德不處也問如何不以道而得樂耶答如猒下欣上等問彼地欣猒何名不以道答如人馳驅得事縱多因力後不離橫佛法修行用力雖少得果長時乃至展轉性成因此出世也如行殺生禱祀祈福名非法縱暫得安後必重受也言或無種性等者第二解無種性人得初人天果名現世安穩也有種性人得後出世果也言又菩薩道有二等者第三解俱是大乘性菩薩得言一增道者相云增勝殊上之義即自人天果道者因也施戒生故名增上生道也此在地前有漏聞熏也言二決定者十地無漏見道修道出有漏故名勝智起必能斷煩惱名決定也初增上生道名得前果後決定勝道是得後果也言任力者任福力取人天果任智力取三乘果也言此合前法稟潤各異者喻云一時等澍其澤普洽卉木藂林及諸藥草小根小莖等今合云如彼大雲雨於一切至生長言不自覺知者法述經云又於諸法究盡明了示諸衆生一切智慧次喻云雖一地所生一雨所潤而諸草木各有差別今合文中廣也言一相者無異相解一字無相相解相字也問何名無異相答有為之法皆彼生住異滅四相所遷故名異也生表此法本非有滅表此法後是無異表此法非凝然住表此法暫有用又本無今有本有今無十方諸佛同證此法離十種相名無異相也無相相者此解相字上相字遮無向下相字表有有無相之相也言無量義經等者不生不滅解無字也無彼無此解前相字也一相無相解上一字也言一味者一無漏味等者簡彼無漏有為不名勝滋益今取無為真理是勝滋益味也問何者名味答真如與彼無漏智為所緣能牽生無漏智說名為味味者資益義無漏名勝也上解味言無體者解上一字也故名一味上依無量義經也言謂解說惑業者問何名解脫相答二乘之人證生空理斷煩惱障名解脫相也菩薩之人初地已去證法空理斷所知障此離苦集二諦解脫也問何名離相答離惑業相離所知障各別之相故名離相不同無漏有為起盡故起者生也盡者滅也簡要問解脫相與離相俱是無為二種何別答煩惱斷盡處顯得名解脫相所知障無處顯得理名離相二種別也言寂滅體相者問何名滅相答疏言寂滅等即是真如經言生滅滅已寂滅之相也言所說法體等者解經中說究竟至於一切種智即是果中菩提涅槃智性相也言又佛所說理者重解一相一味道理也言衆生聞之亦等者正解不自覺知義經云其有衆生聞如來法若持讀誦如說修行所得功德不自覺知根莖枝葉生長不同成三草名不自知也言此初也者初明總知也問衆生根性所得功德自家尚自不知豈況知他人身中功德事何故執唯有一無二無三耶又聞衆生既不知如來知否答釋前之經言唯有如來知此衆生種相體性言有為類別者解上種相也言理本者解上體性也又心行作用為種相者即見分也心法體性即自證分或種相是相分體性是見分也有云准經衆生體性種相二俱不知若配二分即自證分緣見分如所更事皆能憶知是種相云何言衆生不知應非所知境此約自不難若望他人灼然不知若許云何慈恩百法決云一切皆所知所識所通達皆世俗境故是所知皆分別識所了別故是所識皆勝義智所通達故云通達答義門談彼法體即是所知由無始來二執俱顛倒分別故不能知自他種相即同唯識自應知倒智也然疏前體亦非無理衆生身中所有三乘智因四智本種及清淨法界涅槃佛盡知也故非無理但前解約衆生通無為法後解通攝唯有為也言此明別知者疏意有四一三慧所緣者問何以如來能知衆生不知答唯有如來知此衆生種相體性起三慧所緣境經云念何事聞慧思何事思慧修何事修慧三慧所緣疏主以九門分別出體釋名所緣廢立諸智相攝諸行相攝陀羅尼對明地證不同諸門分別不可廣解義門今應略釋釋名者三是數名慧是簡義帶數釋也慧列不同有其三種一聞慧聞謂能聽即是耳識能聞於聲成是生長圓滿之義慧能簡擇以聞為因因聞所成之慧依士釋法菀依主也思謂思惟觀察由思尋慮勝慧方生因相應思所成之慧牟云鄰近釋修者證義明證境故體即定數因定相應所成之慧亦鄰近釋若直言聞慧等即濫持業無鄰近等若言所成便無是過所緣者小乘俱舍二十二婆沙師說聞所成慧唯緣名句文境未能捨文而觀於義思所成慧緣名義境有時由文引義有時由義引文未全捨文而觀於義故修所成慧緣義境已能捨文唯觀義故婆沙學喻云譬如有人浮深駃水曾未學者不捨所依曾學未成或捨或執曾善學者不待所依自力浮度當知三慧如次亦爾若依大乘深密第二瑜伽七十七等彼說三慧皆緣名義初依聽聞以文為先而觀於義者名為聞慧次依思慮以義為先而聞文者名為思慧次依於修雙觀文義證解明了名為修慧此在七地已前通凡位說若八地已上一體義分一修慧上立三慧用七地已前各別有體在佛位中無未曾得都無聞思唯有修慧然諸聖教隨彼所宜相增別說緣名義異理實如是三慧行相者云何念云何思云何修相國引中邊說一者聞所成慧唯大乘由聞文義憶持不忘名聞慧行相二者思所成慧於彼文義而生智解名思慧行相三者修所成慧於定觀察名義而能修行成就事業名修慧行相又十地論云如渴思冷水如飢思美食如病思良藥如衆蜂依蜜我等亦如是如渴思冷水如渴人逢水且飲不能簡擇水之好惡如慧緣教不能簡擇善惡也三者如飢思美食思慧如喫飲食在口中覺醎淡有資益思慧於彼文義而能觀察深取所緣三如病思良藥修慧如人有病服藥即差服藥如斷惑惑盡如病差四衆蜂者依彼三慧修行聖人如衆蜂得涅槃果如蜜也三慧體者經云以何法念以何法思以何法修相國此三自性即是別境中慧通現及種思即遍行中思修慧必於定也於中聞慧唯取意識相應思惟所引伴類亦通五識相應第七識內緣第八不緣教故第八果位方有慧俱果位無聞慧故思慧唯意識俱慧五識俱慧行相淺故非第七者在無漏位行相深故佛無思慧非第八故修慧體通八識俱有三界分別者欲界無修慧以是散地故色界無思𣫍心入定故無色無聞慧以無聲教故言四以何行得何果等者解經以何法得何法以何教行名以何法何理果名得何法得因得果二差別也初聲聞人依四諦教觀生空理修七方便行得聲聞果十二因緣三性教等問何以將聞慧解經中念答唯疏主章中引大論十三云云何所成地謂若略說於五明處中名句文身無量差別覺慧為先聽聞領受讀誦憶念故此經中言念何事等也言但說藥草者問佛四生九類總知何以知三慧答此但說藥之草者即知故不說三惡趣衆生也雖是草不名藥既非是藥亦無三慧但得知人天五乘之體相是藥草故不說知餘非藥之草惡趣種等故此不說也非實不知也言地謂種子等者疏云有三般一種子與現行為地二心行相見分與熏習為地三自證分與見分為地故名種種諸地此間地取有為種子名地不同前佛教名一雨一真法界名一地於彼一地其中有四生三乘佛悉知之衆生不知何言唯一無二也言或是心行者五乘衆生種類中八識之中等餘心所體性自性自證分也種相見分也言舉第四喻等者初法說經云又於諸法究盡明了後喻合前經云雖一地所生一雨所潤而諸草木各有差別今當唱合經云如彼卉木等言此初也者初明佛知深為生淺說經云如來知是一相等者一相無異相故不被四相所遷也一味者一無漏味之法也所謂解脫相者聲聞人煩惱障盡處顯得生空理名解脫相菩薩人證法空理所知障盡處得理名解脫相離相者聲聞人煩惱障盡處得理名離相菩薩人所知障處得理名離相滅相者涅槃寂滅名為滅相生滅之滅為滅相乃至究竟涅槃常寂滅相言終歸於空者由佛識達真空之性體即真如非空不空即是圓成實性能證智即是一切種智菩提涅槃擬將此為衆生說頓說不得不免將護衆生不即為說一切種智所以於一佛乘分別說三乘若不將護衆生即合初說大乘後說小乘言為生淺說等者路意云說三乘差別為因今聲聞等回心取大契理斷障得智故便成種智也言二障雙等者謂正體後得是能斷煩惱所知是所斷即所斷二障既已雙盡能斷二智亦復雙圓今顯所斷顯能斷也經云汝等迦葉甚為等者問何故世尊勸他迦葉生信耶答諸佛世尊隨宜說法難解難知故勸生信也言頌前第者前法述有四佛興於世長行云迦葉當知如來是諸法之王若有所說皆不虗也二法利群生經云於一切法以智方便而演說之三受道有殊經云如來觀知一切諸法之所歸趣亦知一切衆生深心所行四不能自達經云又於諸法究盡明了示諸衆生一切智慧以頌前後略不頌中間兩段也今一頌述佛興於世也經言破有法王者說法身也出現世間者報身隨衆生欲種種說法化身也言能破一有等者欲界色界無色界定散不同福業不動業業雖不同同是業感業同故故名業有業即是有故一有故也不同無因自然等言或二有等者前世業名本有也有是苦果身生有後死有前名本有有云中有者死有後生有前名中有問何不取生有死有耶答以彼二有唯一剎那故不言也言或破三有者即是三界苦果身名有也言前時有者相國等諸抄取本有名前時有當來生老死支由今身造得名前時有只今此身亦由前生本有身上造得據能起業生死次第本有為依方能造業本有為最初故名前時有生有雖初時少不取路府取中有即違大論文取本有為正也言或破七有者五趣外更加業有中有業能親感中有趣生勝故偏說章敬云或五趣是所趣業有中有為能趣能所合說故成七有煩惱疏遠故不取立之言或破九有者謂即九地也言九有情居者大小乘同俱舍論偈依七識住添成九有情居頌曰身異及想異身異同一想翻此身想一并無色下三故識住有七餘非有損壞應知兼有頂及無想有情是九有情居餘非不樂住辨曰一身異及想異者欲界人中六欲天有尊卑上下大小不同身異於中有苦樂想不苦不樂想名想異是第一識住二身異同一想者初禪梵王為主梵輔為次梵衆為卑故有種種身異也想一者梵王計云或能生諸梵諸梵計云我從梵王生想一是第二識住三身一想異者言身一者二禪地中無尊卑上下身形無別名身一言想異者有喜捨想也以二禪愛動踴欣猒不同故名想異是第三識住四身一想一者身一者第三禪中無尊卑上下故名身一想一者同一樂想名想一是第四識住空識已上無身形唯有一想謂空處唯有一空想識處唯有一識想也無所有處唯有一無所有處想兼下三無色成七識住對治計識為我故勸住七識處也取無想天及非想處彼能壞識也又非三惡趣衆生識不樂住故不立識住也若九有情居者七識住中更加無想天及非想處為九言或破二十五有等者四洲四惡趣成八四趣即三塗修羅也梵王成九六欲天帖成十五無想十六五淨居成十七四空處及四禪帖八成二十五有也問何故初禪別立梵王答臣主異故於梵輔梵衆之內別立梵王問第四禪中何故別立無想五淨居答無想天唯外道居五淨居唯聖人居故別立也已前泛明一切破有次下當經中破有正是此經中破執乘無別體也言初句法等者此四句經文總三身三德不得別配三德三身但於化身上配即得初句法身者破生死有顯法身故次句報身者生長為出現有為稱世間此有二解一云由自受用身出三界生死故名報身三界生死即世間二云約他受用身利衆生故現於世間名報身二說俱得下二句隨衆生欲等配大小化身言此明如來說者長行云如來觀知一切諸法之所歸趣偈云如來尊重等述也言斯要者法華經也四十年來不說名久默也不務速說四十年前不說也切云作默靜也亦口邊作也言專好緘默者不同凡夫多脣饒舌也言此重述者長行云亦知一切衆生深心所行通達無礙此偈有智若聞等述也四十年前恐有智若聞則能信解無智疑惑則為永失根未熟故強為說誹謗不信千劫萬劫墮在三途名為永失也言此頌第四不能等者長行云又於諸法究盡明了示諸衆生一切智慧今頌述云是故迦葉等是故迦葉隨力為說者約束之詞前云在所遊方勿妄宣傳先權後實說名隨力為說以種種緣令得正見也若執乘無別名不正見初方便後真實名種種緣由佛知衆生根隨根說法隨力說言文因前起者因前無智疑惑文起所以言是故言初三頌合述初二喻者合字應作蓄音呼也言猶如大雲等者長行本喻中初法王出世喻蜜雲彌布一句二說教普滋喻遍覆三千大千世界今頌述云迦葉當知等三句述初法王出世喻也遍覆一切一句述長行說教普滋喻長行經云遍覆三千大千世界言雲有七德者解經慧雲含潤等七德也疏主添三加成十德一慧雲雲有二種一乾雲二含雲雲法中論天魔波旬變身作佛不解說法如乾雲無雨也佛身如雲說法含潤雲也喻上說因龍起雨水因龍從諸處江河中得水來及成雨法中論自受用身如龍化身所說法還從自受用身上起來先布雲了待衆生作務了然後下雨佛身亦爾言應器熟等者成佛了三七日思惟含法不說即是含雨未施之狀言電光晃曜等者問此間歎雲德何故說電光雷聲答依雲有故總名雲德言為作導明者電切云陰陽激曜也夜後月黑人行電光能引導明也如來於智身中而現身光導引明故喻佛智光導衆生生死黑暗目因之見種種色言驚覺群生者迅雷風烈君子必反蟄蟲聞雷啓戶凡是含識遇佛修行蟲開戶則生長方成人修行而解脫必得也疏外解也如來說法音聲根門方所雷聲喻佛美妙音甚深如雲言魔恐怖者佛出世間化他眷屬盡故恐怖也航者胡郎反船也取䨱陰義也言日光掩者前來慧日大聖尊喻佛此間將日況煩惱也如來出世掩蔽煩惱之日光令衆生心地上得清涼故言六地上清涼者則云引攝大乘云有餘涅槃名清無餘涅槃名涼問下云乾地喻無性人既爾豈無性人亦得涅槃答地義雖同俱在生死有性無性乾濕不同故說涅槃有得不得也意言雖同真性如地皆同乾濕二殊有性無性不可乾不名地也今取濕地何所相違言七靉靆垂布等者喻上說雲色靉靆䨱地而來名垂布承攬者手攬得之不盈手放之不離掌可以身承可以手攬章驚承者如道諦可修攬者如滅諦可證若望實可承可攬即不得法身上不可身得不可心得智證法身理無有少法可得故有似得之狀如來慈悲起化身䨱陰衆生衆生者著之如似求得之狀其實欲得作佛事須三大劫修行也靉靆有三義一昧暗義二雲興盛貌三雲䨱日義薈者於會反亦烏對反王宮現八相成道靉靆雲也言非正得者意云非如身手執取故言非正得故下云以智證故以上言當得作佛作佛即是得於菩薩故此通也言一次前文等者喻上說雲則起於世間喻佛慈悲雲霧蔭一切二雲則龍能現起化身還從報身所起三雨能滋潤萌牙喻如來說法利益一切故言此即初也者一偈雨功能也長行述云如來觀知一切諸法云云次喻言一時等澍其澤普洽今頌述其雨普等四方俱下喻上說雨遍四方總下率土充洽法中論法界內四生總是如來所化雨即有草木處即下更無兩般言涅槃經等者經云如來說法平等而說不觀衆生根性無有菩薩多說聲聞少說梁武帝交雲法師祈雨講經至其雨普等便是言不觀種性字合是姓氏之姓非種性字也不簡種姓貴賤皆說也流澍無量率土充洽皆雨功能也問佛如何遍卵濕生法答人中有胎卵濕化也言此明所滋長體者長行喻云小根小莖小枝小葉至諸樹大小隨上中下橫滋竪長體也今二頌半述初一偈總喻三草二木所以疏科作總也次下一偈半別滋種性此二偈半經文中藥草品配聲聞緣覺菩薩大草也小草無種性人配乾地普洽但言乾地不言草也由此百穀苗稼甘蒲桃緣經文不等小草疏又只言喻中大二草所以諸抄分配不同言百穀者續也種子生長漸漸多一顆去三年成一百石名續也章敬云出說文傳種不絶義也楊泉者人姓名也造物理論百穀名物理者道理也言三穀各二十等者一黍稷二粳糯三𦬔豆各二十計成六十四蔬五果子事須取果子共四十成百穀也言詩曰播厥百穀者證前百穀也詩即毛詩厥由其也播由種也布也言周易云等者麗者附著之義各得所著之宜言百穀甘等者有云一將百穀配大乘菩薩所知博達廣多故況穀多也二甘獨立況緣覺三蒲桃依架況聲聞依佛而住二云百穀配聲聞聲聞種性多故百穀也二甘最少況緣覺世間中有緣覺性人最少也三者蒲桃況菩薩大乘引蔓傍滋蔭四生故前解違疏後順疏文疏文云中大二草先說中後說大明知百穀不配大乘也此上三般況中草大草中草攝二乘言張騫西域等者出博物志也言蒲桃有白黑黃者合言白黃黑八地已上名白七地已前名黃地前名黑出廣雅文言無種性人得生人天如乾地普洽一種稟雨草木不生名乾地天雨雖普其如枯木乾地縱得霑草灑木不生法中論無種性人雖稟正教不生無漏智牙喻如乾地也問前來小草況人天亦是是藥草有生長義此間何故不說小草答前來約出世種一處說故收小草今此唯約出世種說也其小草配乾地也不能生出世種子也言此依別義等者簡要云前後將小草皆喻人天今此將乾地乃喻人天之類故名別義以配於喻有云唯約有種性不取無種性故名別義有性之類因此雨故而能滋茂無漏慧牙無性不然所以除也言苗稼者喻聲聞因果別也苗即況因稼即況果也言又在野者第二解也但總喻聲聞不分因果此中含定性聲聞此中解有種性與諸抄別但有三乘聖性總名有種性也言初二頌稟潤等者此三行頌都述向前長行一雨所滋稟潤各異并橫滋竪長也且初二頌稟潤生長者經言其雲所出等四句經文總解草與木橫滋竪長各異次經云一切諸樹等四句經文至生長者所以牒解云上中下等三品不同唯在竪長木上長行兩師釋不同第一師八地已上名大木初地至七地名小木合分三品五地已前名下六七八地名中九十二地為上第二師地前為小木初地已上名大木大木少木各分三品且小木三品者十住十行十回向為三大木三品者初二三地相同世間四五六地相同二乘七八九十地超過世間二乘道故言稱其大少等者大小二木曲有三品故根莖枝葉義言曲者如言曲分為三大小木早是一重更名有三故名為曲有本云並亦通無失也言如前者如前長行中解教理行果配根莖枝葉也言此等各有等者解稟潤體澤也經言根莖枝葉華果光色三草根莖枝葉向上皆有華果經言一雨所及皆得鮮澤者光色鮮澤通草木上有也問此等之言目於何法答目彼根莖枝葉若爾根莖等上一一法上云何得具華之與果答前長行中以教理行果配根莖枝葉今言各有者意云此教等上教行是華理果為果故言各有以前配根莖中第一解配教等四第二解依勝劣以果行理教如次配故今言各者即此二解中各也今謂上言草木藂林即攝三草此三草各有華果華即教行果即理果非是將華等曆根莖枝葉上一一有之牟解言第四不自覺知等者長行法述云又於諸法究盡明了示諸衆生一切智慧長行喻述云雖一地所生一雨所潤而諸草木各有差別今一偈述如其體性等者所潤是一教也而各滋茂根也如何喚能潤之教作所潤耶答所望不同若約能滋說教為能滋根為所滋若約衆生根為能稟受教為所稟受教却名所潤也只如待說何因若將因對說因為能取果所取若將因望自身說因却是所也言三乘衆生等者解而滋茂不自覺知也言智有異故名出差別之所以也言第三段有三十六頌半等者唯合長行中前三喻不合第四不自覺知喻也言初二頌頌初二合者述長行法王出世喻說教普滋喻長行喻云密雲彌布遍覆三千大千世界長行合云迦葉當知如來亦復如是出現於世如大雲起合法王出世喻也以大音聲普遍世界合說教普滋喻今偈云佛亦如是出現於世此兩句法也譬如大雲此一句喻也此上三句述法王出世合也普覆一切已上五句經說教普滋合也言第二段三十四行頌半述稟潤等者長行喻文有二初一雨所滋一時等澍其澤普洽卉木藂林及諸藥草已上標從小根小莖下橫滋竪長後稟潤各異一雲所雨稱其種性下是長行合又有二初法後喻法中有四段文初自標召集於大衆中而唱是言我是如來應供下名自標唱從汝等天人阿修羅下召他集第二段他聞普至爾時無數千萬億衆生來至佛所下第三段佛應導利如來于時觀是衆生下第四段生聞獲益是諸衆生聞是法已現世安穩下今頌中唯述長行喻中三段文不述第二他聞普至也言初三頌半標者長行有三初唱德號於大衆中而唱是言我如來云云次唱利用未度者令度未解者令解後唱知見今世後世如實知之下今三行半頌唯述德號利用不述唱三明知見今且一頌半標德號經言大聖世尊至之尊目標德號次二頌唱利用經云出于世間至涅槃樂言佛應導利有五者初二頌佛說勝法長行云如來于時觀是衆生諸根利鈍精進懈怠至快得善利今頌中有九行偈今當第一段二頌佛說勝法經云我為世尊無能及至涅槃言正法味等者中方土其味甘故故言味甘法中損害名苦利益名甘如言甘雨今謂露者即甘美之霧也言為大乘因者經言以一妙音演暢斯義即小乘也常為大乘等者即小乘與大乘為因也言平等說法者二頌半平等說法經言我觀一切普皆平等疏解云物我亡故經云無有彼此愛憎之心疏解云愛憎斷故無有自證無上道大乘平等法與他人說小乘也言亦無限礙者若說法不平等便有限礙也言即前亦云若人信等者即方便品顯勝德也意言信佛者初發心歸佛者後修行如來不為欺凌輕賤而不授大純化以小亦不誑逗初許與大後不與之所以者何以佛亦貪惜大乘誑而不與亦無嫉妬畏彼證大而欺罔之以無貪嫉等故內離諸惡故同彼也言專為利益者經云常演說法一頌半言利樂時故者意言利樂之時不可說臥也如佛一時患背痛敕阿難為比丘說七覺支至精進覺支佛便起坐故不臥說法也經言去即入涅槃也來即入生死來坐即四十年來說大乘立即待機熟也言但觀善根等者路問既有邪見毀戒如何得有善根而為說法此亦不然如舍利弗云我本著邪見等何妨有善根成熟時即為說法也言生聞獲益等者長行合中云是諸衆生聞是法已現世安穩後生善處以道受樂言初一頌總標者經云一切衆生一頌等是此述前長行既聞法已離諸障礙於諸法中任力所能此頌云隨力所受住於諸地前云既聞法已此頌云聞我法者言住於諸地者路云十地不同總有五種謂三乘共行十地聲聞十地緣覺十地菩薩十地如來十地今是三乘共行十地地生長聖智名地又聖人階級住處名地又能為依止生長之義名地也言謂三乘十地等者乾慧地未有定水沃潤名乾以能觀察名慧牟云在資糧位唯聞慧故二種性地習成轉勝種性益增名種性地在加行位此位尊高如大貴族名種姓地也三第八地者阿羅漢果阿羅漢向乃至初果向從勝向劣初果向為第八地也亦有云八人地文雖不同義無別也四具見地初果無漏智名見問何名具見答具足成就十六念心名具見地此在預流果第五薄地欲界修惑九品已斷六品有餘三品煩惱輕薄故名薄地此在一來果第六離欲地修惑九品斷盡已超欲界名離欲地在不還果第七已辦地聲聞果滿所作究竟第八獨覺地不待於師自觀緣起而能悟道第九菩薩地始從歡喜終盡等覺第十如來地一切種智十力四無畏衆德畢備名如來地言既下別說等者問三乘各有十地何故此間說三乘共行十地耶答既同下別說三草故於初偈總說三乘教擬解別先須說總故總中說三乘共行十地也言或凡夫地者解經住於諸地也此中含得有種性凡夫及無種性凡夫緣此一行經文總說三草種性後唱別說之中只說中草得聖已去不說著見道已前有學凡夫所以疏中含得有種性凡夫二乘有學地通凡有學聖有學地即阿羅漢也前言凡夫地據生人天之凡夫不言三塗也經言聞我法者等不爾三惡縱不聞法自得住故人天藉聞法也作第二解也言或此所說等者即是小乘人天無種性二乘性聲聞緣覺大乘性即菩薩各各種性望自修行總名地也上一行總標了下別顯言一頌小草等者經言或處人天轉輪等四頌等者是言無種性人等者問豈無種性人不作三塗身耶答此說人天身少草稟雨生長者說三塗身是草非藥雖有生長不稟正教雨故不說問豈一切釋梵之王皆是無種性耶答於中亦有有種性人作釋梵輪王者今說無種性人極頭是釋梵輪王果約極處說問爭知無種性人不定作人天身耶答經自云或處或字者不定義言善戒經等者問何知無種性人極頭得人天果受人天樂名小草耶答疏言善戒經等言或七方便等者疏主此中說小草有兩意初取人天無種性人為小草次第二解取小草七方便人亦名小草此是何意小乘七方便人有大乘種性何故共無種性人一處收耶答緣經文唯說無學不說聖有學及七方便人經云聲聞緣覺是中藥草准道理商量聖有學向中草中收也經雖不說道理可通也經文云知無漏法有學分知也無學全知也其七方便人有種性者凡異聖故不合向中草中收所以經言或處人至是小藥草七方便人天身故向少草中收故前標云凡夫之人至是小草七方便人既是人天身故向小草中收故前標云凡夫之中含得有種性者亦名小草若不爾者便無所屬疏主且據未得聖位一邊而說寄在小草中收未是盡理言即勝鬘所荷至涅槃三種病人皆證無種性人名小草也非證前七方便也又亦無聖教判人天為小草兩解並是疏主自義理出多途亦何爽理言此明二木等者長行喻云諸樹大小隨上中下各有所受長行合云如彼卉木藂林諸藥草等而不自知上中下性今頌中三頌頌初一頌半經文小木經云又諸佛子專心佛道至是名小樹後一頌半經文大木經云安住神通至名為大樹言地前為小木等者問若准第二師義地前名小木如何名決定無疑未入見道未斷疑故答約伏不起名無疑不是斷也漸悟菩薩聞道聲聞作佛疑心便息二乘疑自不疑他頓悟菩薩疑他不疑自即是菩薩聞是法疑網皆已除伏疑決定知作佛故言證不退者即通取十地非八地也故言非行不退意者不必八地也言義准二乘等者因證中草有兩重初論聖有學後論凡有學且聖有學即是初二三果將十地菩薩義准十地菩薩是有學尚得向大草中收初二三果是有學何妨亦向中草收言三種意生等者問若據道理論初二三果合向中草中收何故勝鬘楞伽經但說阿羅漢辟支佛意生身不說前三果也答三意生等答意彼勝鬘楞伽經言無學回心受變易據決定者說緣無學回心已後留身久住不得事須受變易變易則決定有學回心已後或遲或速一生或二生受變易不決定彼經所以不說又此法華經中無學勝有學劣此經舉勝為中草劣者不說故此不論也上解聖有學名中草言未入聖位者會凡有學即七方便人及無種性可名小草然後將地前菩薩例成七方便人却向中草攝此義為正唯此七方便義若不是中草收地前菩薩應不名大草地前菩薩未入聖位是大草收准此七方便人未入聖位何妨中草攝言故前解為善者指長行中草三品見道已前下聖有學名中無學名上言或七地前等者第二解二木也却是長行第一師義也言此言不退等者緣此處經文安住神通轉不退輪兩師所以配位不定今此第一師取八地已前行不退簡餘不退也言一切菩薩名為等者總陳大草也問何故取菩薩為大草不取二乘答以此驗知依智度論云譬如雷震小鳥等意言小鳥驚如二乘聞說大乘三大劫長時修行故驚怖也孔舞蹈如菩薩聞說大乘法三劫長修不生驚怖下云聞諸法空心大歡喜正同於此也言因釋二木等者標也因釋二木分位因便會釋諸經論中說得菩薩種不一准此餘文與前義並不相當因釋二木不退分位諸師各各取義不定諸經論中取義不定疏主總引菩薩不定證此中解不退亦不定此上標也言大般若等者引證中五教不同大般若明五菩提前四菩提當此大小二木一發心菩提初發心位十信已前發心求趣二伏心菩提資糧加行二位三明心菩提初地至六地四出到菩提七八九十地出過有相凡夫二乘到向佛果故五無上菩提即佛果位言金剛般若者是此二木所證理果無相菩提智證理時雖得菩提無相離十種相名實無少法得菩提也言復有教言等者佛頂經言初發心時便成正覺當此大小二木言引經下言者證此大小二木或證大木言亦有說言等者五依瑜伽論解分二初標亦有說言下是二出彼文瑜伽說劫有二種者依日月歲數正與法華論同言故依者曾釋不會大般若五種菩提唯會餘四教文依此義者依此超少劫不超大劫義言若據無為等者會金剛般若無相菩提無有少法得菩提言初地菩提發心者會伽耶山頂經章敬云彼經前解後解分成兩義初據證發心得明心菩提此經同後解種性發心菩提與此經別也且證發心者伽耶山頂經淨光天子問有幾發心答言有四一證發心謂初地二行發心謂六地三不退發心八九地四一生補處發心謂第十地言初地菩提發心便證約無漏智生現行證理名發心即是初發心性心也言與此經同者會法華經同此經一生八生得初地菩薩名證發心將佛頂經中證發心同此經證發心也言或此經中等者與佛頂經後義不同言其初發心等者會佛頂中後義即是種性發心也問既是種性發心何名菩提因故亦名菩提也言三大劫等者會瑜伽論三大劫也言若更異思者端坐成佛更不肯修行名異思也言法喻合說稟潤者合字蓋音呼言如海一滴等者已說者少如海一渧未說如大海水已說者如甲上土未說者如大地土如手葉等經言諸佛之法一頌者若依初科路云總頌三乘無失即無種性人得人天身名得果滿足有種性人各得自乘果名得果滿足第二遍科即是別頌小草無種性人得人天果名得果滿足經云令諸世間普得具足唯人天果也言因人天生等者意道二乘果事須依他人天身上求得離人天身無別中草果牟云即須前解七方便人名小草也故知三草並有性也經言智慧堅固等在地前即同論說從發深固大菩提心乃至未起順決擇分等故知小木不違地前經言潤於人華等者三乘之人未入聖前皆是人天身無別三乘人也人天身是因三乘是果華者因義故名人華也言此第二段頌前結等者長行有二初明佛知深為生淺說經言如來知是一相一味所謂解脫相等後讚印迦葉能解深義經言汝等迦葉甚為希有能知如來隨宜說法能信能受言我同諸佛等者汝等既能生信故名希有授記品言鶖子上根等者鶖子聞法說法領法述第四段中與授記中根四人聞喻說喻領喻述今為授記故此品來問鶖子上根聞佛法說法領法述佛還以法授記中根四人聞佛喻說喻領喻述而不喻授記耶答章敬云十二分教授記之中定無譬喻譬喻之中定無授記故授記中不說喻授記也牟云又令生決定心中事要分明不可於中一一舉喻若論法說喻說不同不合等與佛記亦為悟解是一所以總與授記又為令生解故以喻詞授記易明故不以喻也言三種無煩惱人等論文顛倒初言無煩惱人有三種染慢牟云此即所知障中染慢也一信種種乘異執聲聞等乘與如來異二信生死涅槃異人三信彼此身異執釋迦與分身佛異為對治此三種染說三平等然佛於多寶品中說多寶如來久已滅度還復現身以濟衆生顯生死涅槃是一即下經言爾時佛前有七寶塔高五百由旬從地涌出住在空中下疏主解涌出表佛已出生死也住空表處世以濟衆生生死涅槃二無異故二破執自身他身異故說身平等者寶塔品中論自據言略者多寶如來身一體示現攝收一切佛法身故下疏釋言何故唯一多寶為論非多佛耶答即是一身攝一切身平等故三信種種乘異所以疏言初說乘平等故與授記者執聲聞乘與如來乘有異故與授記故顯乘平等言上來佛說等者起執處所也指藥草喻中破頓悟菩薩病也傍邊有聲聞無學執乘定異也由四十年前執乘有別故說一乘無二無三初周云十方世界唯有一乘法第二周三子同上牛車窮子領長者家財便有一類頓悟菩薩乘同病生故說藥草喻品以破之頓悟菩薩定知乘有差別便有無學見前品說乘體有異故有異病生執種種乘異故此品與授記以破之言顯乘平等者潞府問既授記了莫乘同病却生否答無學之人已知乘有權實乘同病法爾不起又云正為四大聲聞授記傍破靈山會一類見道前聲聞凡夫執乘定異者故說授記品言一體性是有者簡遍計性無體法不可說今取有體法即依地圓成性也言二勝有當果者簡無記性者不可說今取善因感善果惡因感惡果可記也言三勝人等者勝人謂佛菩薩勝理者謂深密之義大因者即六度萬行大果者即無上菩提記成佛之事也言如十四不可記者問何名十四不可記答大般若經有十四不可記事一世間為常耶二為無常耶三亦常亦無常耶四非常非無常耶第二重四句一世間有邊耶二無邊耶三亦有邊亦無邊四非有邊非無邊第三重四句一如來滅後是有耶二云無耶三亦有耶亦無耶四非有耶非無耶第十三句命與身一為一問第十四命與身異一句通前十四句有外道等於此十四事中有所問論佛皆不記者答也問何故不記答彼外道等意問於我假言世間及與命等故言理事本無者理無者道理也事無者體事道理體事都無也言華嚴等者此間無明有因無因是無記佛不為答也牟云合言無體無體不可記故云無記言有一比丘等者即是問有因無因義也言無明自起等者疏主釋比丘問顯前有始無始義意言不從他起即是無始義言更從他起等者意言無明由我而作我是本故名為有始即是有因意問無明支乃至向後諸支有因無因佛種種呵乃至不須問箭之所以問佛何故不答只可不答答亦無益問十二因緣是有體法佛何故不記答若是佛所說十二因緣是有體可記彼比丘本在外道之中計十二因緣是神我造作神我舉體是無唯遍計性非緣生法故不可記佛種種呵責非緣生體無也言勝有當果者善不善法能招當果可記其無記性不招當果故不記也言勝人等者如記彌勒當成佛事等如記須達當得生天等如除官宰相節度御史大夫京河尹等除即人知如可記若一薄一尉誰人得知不可記言非前二全者非二全即是有體者可記勝有當果可記此上二記皆不取也言後一少分者第三之中有勝人勝理大因大果此經中授記唯取大因大果不取勝人勝理故名除後少分攝云今經授記望三記中前之二種全不相攝攝第三中大因大果之一分也簡餘勝人勝理也問記成佛事亦是有體有勝當果何非前二答前二濫餘故此不攝攝問云當成於佛豈非殊勝有果體非何故不攝前之二種又成佛既是勝理復何不攝第三全分答意云前二及後少分並不望佛故故不相攝望義各別不可便齊即所問之法有體義者名有體義雖望有體望因能有當來勝果名勝有當果此非望因說彼弟子名勝人深密義名勝理並非望佛故此不攝又此授記差別總標差別也言或說一種等者論開合或總合為一乃至開為二三四五六也或記一種謂十二分教中記別經也記別有三相一記弟子謝往死生二解二深密義三及授記當果即第三大因大果簡餘弟子生死及深密義三記故言一種也言或說二種等者問佛語不虗出言成誠豈有輕重而記成佛有近有遠將非如來成於虗妄耶答法藉當根藥須投病為人輕賤心不專精成佛實遲故與遲記若言難得企慕必深精進修行成佛故速故便為記應根與記故不虗也言猒惡生等者據實登地已上更無遲病也言又有二種者汝當作佛名總有名號等各別即如此經中如來自記五種中通行記名總餘四為別也即同若有聞法者無一不成佛名總也言一自知他不知者路云如來有時為一人授記不對衆唯自知他不知自知名自利也他不知者名不為利他二他知自不知即是身不在會令迦葉傳記等是也傳記名他知也身不在會者名自不知也即以身不在會得授記者亦名他利也三白他俱知即舍利四大聲聞也自他俱知亦名自他俱利如見鶖子授記餘人作念大智舍利弗等即是雙利也言又有四種等者牟云指鶖子得記處彼以六門分別授記第四授記差別初引首楞嚴經佛告堅意菩薩授記凡有四種一有未發心而與授記二有適發心而與授記三有密授記四得無生法忍現在前而與授記言並如前等者或說五種即是此經六種中除菩薩授記佛自記有五種也或說六種彼引瑜伽四十六說略由六相蒙諸如來與記何等為六一安住種姓未發心位二已發心三現在前位四不現在前位五有定時限六無為定時限是名六種若唯五種指佛自記復六種者加常不輕記也故言並也言授者承右反付也言與驗者其因即因記記識當果即果記也經言爾時世尊說是偈已等者此結集家雖指前品偈今謂偏取末後兩偈以疏主前來科為授記之漸也問授記鶖子但告一人授迦葉等記何故通大衆耶答上根唯一人故但告鶖子中根數多故通告大衆又欲開鶖子化物之路表鶖子在前成佛化人利他所以別告欲廣發時衆述佛之心故通告大衆問長行言大衆偈中言告諸比丘者何答當品之中長行傍正兼說故告大衆偈中唯四約正為故告諸比丘也聲聞皆比丘相故言外遇良緣者當得奉覲三百萬億諸佛世尊內修妙行者恭敬尊重讚嘆言然觀上下授記之人者疏有三重初泛敘四句通一切聲聞次正屬四人後釋餘二妨且泛敘四句者一在小無勝劣在小同是下根在大即有之前後分之在前成佛勝在後成佛劣也前後成佛轉次授記如下經言其五百比丘次第當作佛同號曰普明轉次而授記我滅度之後某甲當作佛其所化世間亦如我今日即有勝劣言同時成佛等者第二句在大無勝劣如經言是二千聲聞今於我前住悉皆與授記未來當成佛所供養諸佛如上說塵數護持其法藏後當成正覺各於十方國悉同一名號俱時坐道場以證無上慧皆名為寶相國土及弟子正法與像法悉等無有異咸以諸神通度十方衆生名聞普周遍漸入於涅槃在小有勝劣者如學與無學也在大無勝劣同時成佛是也言三小劣而大勝者阿難是有學名小劣在前成佛名大勝言小勝而大劣者羅睺羅身是無學名小勝也在阿難後成佛却與阿難為長子在大劣也此中四句更加兩句義方周足一小勝大亦勝如鶖子小乘中上根名小勝也最先成佛大亦勝又小劣大亦劣兩類尼衆小亦劣是下根故最後成佛大亦劣言今此四人等者問如何四人不約根性利鈍耶答疏言此四人不依根性辨位次者則全供養佛多少齊等則應一時成佛既供養佛多少不等成佛前後亦別不約根性也又在小同是中根同無學故無勝劣也在大則有勝有劣未成佛前有供養佛多者反顯長時成佛在後名劣未成佛前有供佛少者反顯時節不多成佛在前故勝供養佛既已不同明知成佛亦有後故在小無勝劣在大有勝劣也言涅槃經說等者問涅槃經說四依菩薩始絡供養二十六河沙佛始得成佛今依供佛何太少耶答意樂不同長時修行者且說一地一位供佛多少樂時長修行者即說二十六河沙供養佛也退心之人非樂廣行如人曾聽後不樂聽等云云問今法華經說四大聲聞回心劫數遲速多少不定何故涅槃經聲聞回心八六四二萬等劫定耶答彼涅槃經約根性勝劣齊等者說之不妨極精進者不滿二萬劫至十信位不妨根鈍懈怠修行過二萬者劫數不定者此經不約根性齊等者利鈍勝劣相和論故劫數供養佛多少亦不定也言今以根行利鈍等者四句即是前來在小無勝劣在大即有之是也言此記自體等者問何名光明答因自覩豪光名光內發智慧名明故號光明二者聽法義為因當成佛果感身瑩金色光是果故名光明三者況久修因一無量生前曾施金珠二常感身光明此二事俱在因中從因為名故名光明瑩鳴定反言此有三等者一國名者章敬云照物施行日光以光為故名光德二劫名者以大乘之化莊嚴萬品故劫名大莊嚴言准前鶖子知因者意道同鶖子授記中說修因所感土相也彼處有十一一說因也言皆護佛法等者攝云淨土之中理無應事示現故有如節度有土番軍以為侍從豈彼更有異心淨土現魔以為眷屬故護佛又如賊順還得賊名魔若歸心亦得魔稱言果記中有四長行有七不頌前國名及劫名及無魔事也言既怯者怯威嚴貌問習種俱盡影鴿無怖一何聖者猶懼威嚴答如來大悲誠不威物聲聞小智妄起懼心今舉妄情故言悚栗經云大雄猛世尊等者欲得如來授記先讚嘆世尊也而賜佛音聲者即是聞前千二百羅漢悉亦當作佛經云若知我深心等者請也心中未蒙佛別說國土名號未敢准擬若對衆蒙佛與記別烈名如以甘露灑除熱得清凉也注經云甘露有不死之功授記獲無生之果也經云如從飢國來者嘉祥云少無大食為飢背少向大為來牟云從二乘回心向大即是從來也經言忽遇大王膳者得總記也未敢即便食者即未得別記也若復得王教等者若得別記領解方決膳由食也唯佛與佛能知一乘正法之味名大王膳食者資長義名食也經言我等亦如是二行半等者雖聞佛音聲總記也心尚懷憂懼等者未敢准擬若蒙別記爾乃快安樂也言解法體相空者須菩提緣解空第一名即名字相即體知萬法唯有假名無實體相故名名相此解在名遣相也言或名與相二義等者此解名與相二義皆遣也章敬云一者名假名句文三依聲呼召無實所詮二者受假受如浮泡和合而有無實主宰三者法假薀等諸法之體虗幻故從緣生起無實自性名即是彼三假中名收相即攝彼受法二假由悟三假故言名相或名即能詮相即所詮由能解了名之與相二皆是無故言名相又證云依三性以釋三假一名假者即遍計性有名無體名名假二受假即依他起性依他領受皆是有為體無常故名受假三法假者即圓成實性雖此體是真如建立諸法名為法假以須菩提悟此三性而得果菩提故名名相名攝一初一相攝二後二經劫有寶者須菩提解空理空理為寶可保重故故名有寶國名寶生者空理為依能牽生正智塵沙萬德故名寶生經云劫內有賢聖大士故曰有寶國內有聖賢出故曰寶生言地高曰丘者本清性高也言大塜者築出也經言其土人民等者由內證理外感珍臺將智證理如坐珍臺言內由達等者今謂樓臺居止亦表住空意彰化主解空第一經言其佛常處虗空者由因中解空故果中常處虗空中住也牟云今謂爭上說人民在樓臺所以住空說法聽者須下坐也經言當無數等者問長行云於當來世奉覲三百萬億等此間偈中寧無數答長行但約自國業力說偈中兼說他國運通供養言此土相者長行有五一土平二地三樹四無惡五華淨頌中言嚴淨第一嚴淨字遍述前寶華覆地已上文即是述其土平正頗梨為地寶樹莊嚴無諸丘坑沙礫荊𮑾便利之穢也淨字述前周遍清淨一句經文亦是開合不同也衆生見者四句經文頌中有長行無也言初一頌佛化等者佛化即前住空聽衆即前利益也此頌文述前長行果記九段文中不述劫名國名居處居處即是其土人民皆處寶臺等是也言摋摩等者金煞音非也牟云桑割反蔭音呼也言曾掃僧地者一掃僧地為因常感世世身有金色二者今生目覩豪光三者耳聞法智光有此三種因故號閻浮那提金光言樞要度鉢戍多等者章敬云將舉婆剌拏王疏言鉢戍多以一事中有二王故其實度者非鉢戍多正是婆剌拏王用證迦旃延掃地之事娑剌拏王者此云流轉王先云沙羅那訛也流轉王即是眉稀羅國王容貌端正自謂無雙求覔勝形欲自方比顯己殊貌時有人言王舍城內有大迦旃延形容甚好世中無雙王遣迎之旃近至王出宮迎王不及彼時人皆觀迦旃延無看王者王問所以有何宿因迦旃延答王曰我昔出家作老比丘常掃僧伽藍地王於一日作一乞人入寺求食我掃地竟令王除糞除糞既訖方與王食以此業因生人天中得端正果報王聞此已尋請出家為旃延弟子後旃延入阿盤地國中山中修行別處坐禪阿盤地王名鉢戍多將諸宮人入山遊戲宮人見王形貌端正圍繞看之鉢戍多王見娑剌拏王疑有欲心問娑剌拏曰汝是羅漢耶王答言非問汝離欲否又答言非鉢戍多嗔曰若爾汝何故入我婇女之中遂捶撻之悶絶而死至夜方醒至迦旃延所旃延見之心生悲慜其諸同學方為療治娑剌王語旃延曰我從師乞暫皈本國集軍破彼阿盤地國鉢戍多王事竟當還從師修道迦旃延且停一宿旃延安置別處令眠欲令感夢夢見舉軍征阿盤地國自軍破敗身被他擒繫縛手足嚴鼓欲煞王於夢中恐怖叫喚失聲云我今既敗願師濟拔作歸依處迦旃延以神力手指出火喚之令寤語云汝若征彼必當破敗如夢所見王言願師為我除其生毒意旃延為說一切諸法譬如國土假名無實離屋宇舍宅無別國土乃至廣說種種因緣至一極微亦非實事無彼無此無怨無親王聞此已得預流果後漸獲得阿羅漢果言瞻部那提等者章敬引注經云閻浮下那提河際此河出令萬國所重以上寶而吐奇光猶佛居至理而舍極智之光故借義以立名也此金從河提樹以得名舊云閻浮檀金餘如疏言迦旃延端正見者等者問前迦葉授記金繩界道見者歡喜豈緣端正耶答但說端正招此歡喜不言歡喜皆因端正一由旃延端正見者歡喜二者由掃地為因感外土相見者亦歡喜也言初一頌土相者經云其最後身三句經似述果記自體然舉成佛時國土嚴淨故是土相也言後一頌福田者長行所無也為字平音詞得也經言斷一切有者有即生死聲聞已斷盡也言初時記者八千諸佛在時四事供養言此滅後等者滅後起八千塔一一塔高千由旬七寶合成通二音呼言此自體等者具足梵語合云多阿摩羅跋陀羅旃檀香如來也多是性義阿摩羅者無垢義聲勢同故合却阿字但言多也跋陀羅賢義略却陀羅兩字但言跋字也全梵語七字略三字留四個字多摩羅跋唐言性無垢賢旃檀香者是唐言也經言劫名喜滿者簡要云見此佛土歡喜充足故名喜滿也言國名意樂者國土嚴麗令人愛樂也經言捨是身已者問既無學後有已無若捨此身更以何身而得成佛答牟云依變易見諸佛而修供養也若爾變易依分段身云何捨分段身而受變易答此據此捨化身非父母所生之身也如諸弟子見佛化火焚身皆是此類經依此說言捨是身已也言今言剎者是梵語訛而且略正云剎多羅云應法師解云差多羅此譯云土田今此疏中意剎者塔名也彼西國塔竿頭安舍利美同土田故亦名剎也言有所表故者表有佛剎也言剎者應剎字初一反化城喻品言一者上中等者問上根聞法其義可成中根聞喻何名聞法答初周聞法者是法中之法中根聞喻喻亦是法故十二分教中有譬喻經也言下根之徒等者法說喻說既不悟也言故陳過去等者直頭為說報言我曾過去與汝聲聞已結大乘之緣此是真實亦今小果又是化城言陳往因者問陳往因是何意答疏言令其證實也言述今果者問述今果有何意答疏言令其捨權向者大城我所化作知不實也言遣生覺解者覺解兩字配前大乘小乘覺則覺知身中有大乘曾修大乘解則解現在二果非實也第二論家以七喻為來意中分為八段第一總標論意設化城之所由二者論解下第二牒解前文陳慢執之行相有定人者彼已得定下第三假真對辨彰妄見之述求此中意說下第四起執非真乃後心之假解至於無學解脫至種種之想第五舉例四倒及執城之亦然如二乘人所起四倒等第六因辨二師論法執之寬狹非無漏心及世間定下第七迷情與慢非無學之所求所證擇滅名為化城下第八別約凡夫簡有學之欣趣又有釋言此是世間凡夫下此文之中前七段為第一解第八段為第二解緣前論文第四有定人實無而有增上慢有定人中有多種故作第二解也言二者論解等者論家標以有世間三昧者論家釋又云第四人者方便等者論家第二標文言涅槃城者諸禪等者論主釋論文雖四段不同總是論文論家自有標釋文亦屬標也標中有二意第一段文是所治病第二節文是能治法又云第四人下言七種具足等者依疏解第一人者以世間善根三昧功德方便令戲後令入大涅槃第二人者以三為一令入大乘故第三人者令知種種乘異諸佛如來平等說法隨衆生善根種子生樂故第四人者方便令入涅槃者諸禪三昧過彼城已令入涅槃城故第五人者過去善根令憶念交入三昧故第六人者說大乘法以此法門聞十地行滿諸佛如來密與授記故第七人者根未熟令熟故示現涅槃言七種增上慢等者今當第四有定人也言實無而有等者說化城喻盡是得定問得定人有幾答有四人阿羅漢後得智定心前三果有學見道前七方便凡夫及寡聞比丘今此多取七方便有學凡夫及增上慢凡夫名有定人言實無而有者涅槃須是無為真如理也阿羅漢後得智所變假相分實非真理不是涅槃計為涅槃名實無將謂是涅槃計為涅槃求而名有增上慢也恃己執小凌大不修於增上法上起慢名增上慢也或得四禪定名少得不是四沙門果計為四沙門果名為多得是增上慢也言以有世間等三句者解前有定人言實無涅槃等二句者解前行標實無而有增上以有世間者前來數處解世間今取有漏名世間下云此定有漏名為世間三摩跋提亦云鉢底唯定非散通有心無心此唯取有心定言涅槃想者阿羅漢生空觀後涅槃菩提假解心所緣相分實不是涅槃計為涅槃想求名涅槃想言對治此故等者對治有二一為下根五百千二百人等說彼四十年所設涅槃是化令捨權取實二為對治見道前有學凡夫也若破病事須說真化也言又云第四人等者二句標也方便之言含得真城假城本來為設化城是佛方便方便之中有二師解一云設根本觀中真化城名方便二云取後得智中所變假城名方便真城假城雖不同總是入大乘涅槃城之方便也路云唯設鹿野菀中真化城不設後得智中者非也言涅槃城等者論家自略釋也涅槃城者牒上文也初二三四禪禪不一故名諸禪三昧城也一者羅漢根本智相應定心是智之安處名三昧城此城無漏二者羅漢後得有二種一無漏後得隱之言無二有漏後得即有漏定心是修慧也從彼根本觀後返觀根本觀中正智證真如行相以是有漏定心粗故緣不著設是無漏後得亦緣不得況是有漏定心耶乃透遇緣著見道前加行智中或苦不生相分也當時作我生已盡梵行已立等行相求因聞世尊鹿野菀中說託此名教以為本質變起相分當情著求從資糧位直至世第一末皆作此相羅漢後得能緣心託此相分以為本質當情又變起一重或苦不生相分所變離能變無攝相皈見將所就能總名三昧城既言諸禪三昧望佛意總名方便總名入城望諸抄及疏主意取根本智中真城名入三昧城若望論主解涅槃城者兼取後得假解心也三昧即城三者前三果人及凡夫有學同此求之四者寡聞比丘增上慢人執三昧名城問設城有何意答疏言過彼等佛意為令過彼城已入涅槃城涅槃城即三事寶所也問前來不許寶所名城何故此間言城耶答息苦名城即非寶所御寇安神寶所亦名城也言有定人者彼等者牒解前文陳慢執之行相以下盡是疏主釋前論家第四有定人也釋中有三一釋有定人二釋增上慢三解三昧城路問云何要事須取有定人豈不得定人無所執耶答論據已修習得定之人過去多生已來求此假解心若求趣涅槃事須是得定之人聞如來說決定求趣若未得定人雖聞佛說亦不欣求今此即是聖有學及凡夫有學皆已得定諸抄唯取七方便有學凡夫有學二字簡不學之凡夫凡夫二字簡聖有學言今說往事等者牟云若准向下會弟子事云我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經彼處疏中四解初二解於自身生滅度想後二解望佛身生滅度想於第二解中或是凡夫見道前資加二位或是有學初二三果有學之言通凡聖有也彼既兩類各別何故此唯取有學凡夫不取聖人耶問意今謂五百千二百無學人說喻何故說凡夫有學耶答疏言今說往事等緣彼下根今皆是無學所陳昔日為有學凡夫時於十六王子時熏得菩提心種欲擬退去導師多諸方便化作一城令其止息今說昔時誘進之事化城非實即是說彼往事令其憶念此後解談昔況今也言此所起慢等者此疏主解前論文實無而有增上慢也金云此凡夫之人既得定心是事觀唯伏迷事不伏迷理唯伏俱生不伏分別故取欲界分別及上界惑而為慢相攝云疏有二意一此得定人要伏欲界俱生煩惱不伏分別故容得起意說身在下欲界有時分別得起二云此所起慢分別煩惱而是上界者已得上定故起上惑欲界分別雖未伏斷以無流輩故不得起流輩即俱生也二解初解為勝亦影輩也五十八云若諸異生離欲界貪等諸惑不起現行皆說為斷非如見道所斷薩迦耶等由彼諸惑住此身中從定起已有時現行明知起者為勝意說亦起欲界分別也問若爾何性答唯識云若欲界繫分別起者唯不善性言三三昧城者等者疏釋論中三昧城也此是無學與有學凡夫說所求三昧城也言在無學者羅漢所執三昧城也言盡智等者正是根本觀中無學人證理也問何名盡無生智答煩惱永盡之處得此智名盡智決定知煩惱永不生處得此智名無生智二云集論煩惱因盡處得智名盡智苦諦後有苦果不生處得智名無生智三云煩惱因盡處得理名盡理智證盡理名盡智苦果不生處得理名無生理智證無生理名無生智此唯無漏不通有漏唯無學不通有學唯根本不通後得此位之中所證生空理真化城也言後世間禪定者事須發得盡智無生智後方起得假化城也如來言陳之中設彼後得智中假化城意許之中與真化城緣真化城實能息苦故羅漢雖得得了忘却後執與耽玩事須假化城真化城向上無執無言說也言世間禪定者即能緣見分也言所變解脫者是見分家所變當情假相分也正是羅漢所執之城阿羅漢後得解心因他見道前加行智相分方起凡夫加行心相分還依阿羅漢後得解心上起更互為因若攝相歸見所變離能變無攝歸能緣定心故名三昧也問何名總答總取能變解心所變相分攝屬一處都名三昧故是總也疏主恐人將謂根本觀定心亦名世間簡此定有漏名世間也非是真假二城合說名總也言此中意說佛說等者第三假真對辨彰妄見之迷求也疏主恐人錯認三事涅槃亦名化城故簡也佛擬化城意望佛本意本來與二乘人設化城今至寶所也夫真涅槃須三事具足方得名究竟涅槃三乘同得者不是三事涅槃但得煩惱盡處解脫理方便且名涅槃實亦非真如三事大涅槃也言由此後時等者佛為二乘人設真化城由此盡無生智證理後時煩惱苦果永不生故名為解脫言生空智證者問何名入城答疏言生空智等問二乘所得生空何名化城答對寶所不究竟亦名化城也問如何言三昧城復入涅槃城答若約欣趣心說名涅槃若約望假解心說攝相歸見名三昧城言故言方便入涅槃等者問論釋城即諸禪三昧疏解三昧城即是無學假所變今此又言以正智所證涅槃城一何乖反答論說涅槃城通二種正智證者御煩惱寇安正智神煩惱到此已無正智之後方起有漏所變之城假似於真有御安義如疏所緣緣皆是城攝方便之言文通二處彼真化城對不定性是佛方便令入真城後至寶所況變城而是實耶如來依此方便說之為入涅槃問宅中虗指即是二乘住凡時如來說為羊鹿車當爾之時二乘未成無學未有假解如來以何為所指而說彼為車城耶答以昔日前二乘無學之人皆作此執故虗指也言後引至寶所者此是佛說化城意本設化城令趣寶所也言至無學解脫道等者第四起執非真乃後心之假解也望根本觀中正證生空理時都無分別種種之想亦不作我生已盡梵行已立等想亦不作已度想安隱想此是如來意許之中說也問前來三昧取根本智相應定心名三昧城此中何故取無為理為真化城耶答論家意舉同時根本得相應定心總名三昧城望如來意中設根本智中生空無為理為真化城兼設後得智中假化城相分佛取所證真理也論取相應定心也假城名體俱滅真城滅名不滅體問爭知如來設真化城兼指後得智中假城耶答能變心是假羊鹿所變相分是假城不可車則虗指城不虗指耶所以鹿野菀中我法能離生老病死言陳之中指我假城意許之中與真城與真城實能息苦故問如何喚生空作城答能牽生正智安神御寇名城也問真城實能息苦可名城假城是假設如何亦名城答假似於真亦得名城後得智所變惑苦不生相分與彼根本觀中煩惱不生義勢相似也問世尊何不唯設真城何要設假城耶答與設真城總忘却認不得世尊知他根性意樂所以真似總設若望耽玩遊戲蓋是入假城羅漢因聞世尊言教為質變起相分求言出解脫道後等者指後得智位以心粗故根本觀是無漏後得但是有漏漏與無漏粗細不同重緣不著豈非彼解是世間定也言故言以世間者引論證也言凡夫有學等者明前三果七方便人求趣行相也謂是真實滅度起堅執心作意欣趣此是凡夫之人起執若是羅漢後得智雖是假但是錯學不是執心也此假解為城并後四倒皆是錯非是執也我生已盡等四行相名作意欣求言故今破之說彼所證等者說化滅化也說彼根本觀中所證生空理猶自不實猶如化城此對寶所名不實望佛本意滅化只滅根本觀中生空涅槃其後得智中求者及凡夫求者不滅自破言如二乘人所起等者第五舉倒變執城之亦然此文意證前似所變城是正觀後也非是解脫道中作此解也如二乘人所起四倒四倒有兩重一如來常向二乘人說我生已盡等四句二乘人四智未究竟執為究竟對三事涅槃名之為倒問如何作究竟行相答疏云我生已盡苦諦智究竟變易分段俱苦諦更有變易生死未盡究竟梵行已立道諦智究竟生空智法智俱道諦更有法空理未辦未究竟不受後有集諦智所知障因未斷變易生未盡未究竟此上四倒與假城行相正相似也二者又有一重四倒如來常為二乘說有漏皆苦生死之法悉皆無常一切法中都無有我世六總為不淨二乘之人每日加功用行作此觀行後入解脫道中正證苦無常理時不見如是相出觀已後及緣前理心粗不見加行位中無常等想遂於如來五薀身上亦作如是苦等解心然彼如來身上有常樂我淨故說為倒如是倒心亦是正觀後變緣於前行相不親得故既同引之為倒意云四倒與二乘人假城行相相似故結言此亦如是言非無漏等者第六因辨二師論法執之寬狹即護法安慧二師也且護法者疏言非無漏心等者是護法云八識中唯六七二識有二執唯有覆不善心有執若安慧八識皆有執五八唯法執第七唯我執第六通二執二乘三性心皆有執又因位無漏後得智亦有執唯佛無執所以護法因位無漏心及有漏定皆無執也所以疏言非無漏心及世間定心皆是法執言出彼心後方起等者護法意云二乘有漏後得智定心中亦無執出有漏定心時於散心中執前加行心惑苦不生相分為涅槃故即是散心起執非定心中起加行心相分為涅槃也言若安慧等者相國云此師所計執障體同而名有異唯自證分依他有見相二分遍計體無約識而論五八唯法執第七唯我執第六通二執除佛已還二乘因位無漏善心皆有法執不同護法善心無執此師依三種教一種為證第一楞伽經云八識皆以虗妄分別為自性故難若安慧有漏心不名執者應同無漏非妄分別若許不執名妄分別應無漏心亦名虗妄分別故知有漏皆是執心此據遮他為論若護法云若安慧宗因中無漏亦許有執若言有漏即有執者若作此解反難言汝既有執名為虗妄無漏非虗妄應非執心耶知遮他如何云因無漏亦有執二攝論又云二取名執則見分為能取相分為所取非有取心不名為取故皆名執也三大論五十一云阿賴耶識以遍計所執自性妄執種為所緣緣故所緣即所執自性家之妄執種也即能執心種子也若有漏心不有執者應有漏種第八不緣若護法解非一切有執唯六七心品執我法者方是遍計不有論十種證破五八識及善心等有執一引攝論第四唯說意識能遍計故安慧難云若以不說五八識五八無執心亦應不說於第七第七亦無執也第二云意及意識名意識故安慧難云若爾第七名意識總合名意識亦應第七名意餘名識八皆名意識故第三計度分別能遍計故此亦攝論文文中說五八既無計度分別明知意識五八不收安慧云計度分別行相粗者五八即無自性任運有相分別此等細者五八說有亦何爽理攝論約粗不言五八況世親攝論唯言由此品類能遍計度不簡何者寧棄五八而無執心也第四執我法者必是慧故非五八識常與慧俱寧容有執安慧云粗慧雖無細者亦有若爾慧數寧非遍行意云有漏心皆有執者即五八識常應有慧也即分染慧也第五二執必與無明俱故設計有慧論與癡俱云何善心而得有執彼與無癡性相違故安慧云我如小乘尋伺俱起此亦不然尋伺粗細殊相順可俱起無癡既相返豈可得同生第六不說無明有善性故瑜伽論等皆不說有云何善心內而得有無明安慧云一切有漏皆是不善說為善者行相相輕故瑜伽等約此而論擬實有也第七癡無癡等不相應故無慚與於慚與許得俱起癡與無癡不可俱起但以一切有漏皆是不善但是癡相輕微故名為善故得與癡俱起也第八不見執導空智故若無漏心必二空觀隨一相應若有漏心必有執者如何能引空智現前非猶於水能引於火生故安慧云若言有執不引無執者云何有漏能引無漏答雖是有漏隨順聖教作我空觀與彼無漏行相無乖故可引起執與不執行相不隨寧可引起如二俗人一則敬三寶可引得僧到家一則不敬三寶不能引僧到家今此亦爾第九執有達無不俱起故是故不同漏引無漏第十曾無有執非能熏故若言八識皆有執心何故能熏不通第八安慧云若言有執皆能熏者無漏執無應不能熏約果中無漏難答此亦不然且說有執以是能熏不必能熏皆許有執由前十證執障不同淨云由前虗妄者但以不如無漏之智證實智故名為虗妄不以虗妄便名有執又復不以似二取故即名有執而無漏心亦有執故若許無漏漏心亦有執者佛亦應有執二相故若言佛果無相分者便違佛地論等說現身土等種種影像言所證擇滅名為等者第七迷情與慢非無學之所求此是羅漢根本觀中證者名化城二乘有學及七方便凡夫名餘人言論說具足等者問爭知不是無學有學凡夫也答疏言論說等證也此前七段疏文解他論家第一段標文也言又有釋言等者第八別約凡夫簡有學之欣趣即是解論家第二標中意也緣論家言有定人有多種前來七方便凡夫前義已解訖此第二義中都有四類亦盡是凡夫得定者初有兩類一者凡夫造不動業來生上界得上界定二者身在欲界坐得上界地定但是得定凡夫不是外道此間盡不破第二更有兩類一者是外道六行伏惑得上地定計一一定以為涅槃此自是耶見中收此亦不破也二者增上慢人六行伏惑得四禪定計為四沙門果少得謂多得名增上慢也此唯破增上慢人疏言文有釋言已下疏意與嘉祥同所以引來彼師云論文既言增上慢人即是凡夫執四禪定者潞問云五千增上慢人前方便品中已起去今何故更有答慢有二類一者五千之輩犯戒增上慢在會即無前品起去二者具戒名增上慢在會即有也所以疏云又有釋等破增上慢人許四禪三昧為化城言佛說二乘無學等者說化滅化故佛說經亦破之此是根本智證生空理也方便令入由如化城對三事涅槃名不實也況汝所得四禪三昧執為實滅耶此正破增上慢人所執四禪三昧執為實滅也言有學之人等者重破有學人不起此執四禪定為四沙門果此唯增上慢人有此執故有學之中已得前三果七方便人皆不起執也言下言導師等者疏主結自宗義緣敘古義隔斷故重結也此所引文是滅化城文古師云化城是導師神力設滅還是神力滅却此間疏主說化滅化鹿菀中設城言中施設言中不道是化但勸交入法華會上但說城是化破了言破執二乘者此說化也言為滅凡夫者此名滅化此中真化城滅名不滅體假化城名體俱滅化者但設有餘涅槃是假使名滅化城也餘無學人後得智中反者及前三果人所求者不說自滅也及增上慢所求假城盡滅也言亦應如護法者此正當古人義若取增上慢人執四禪定為化城還如護法定中無執也護法宗意不問有學及以凡夫皆於散心起分別執以定是善無容彼起不善執故也路意言三者十無上者以論總故疏作三重解也言故說大通智勝者一大通三無數劫修行臨欲成佛佛法不現前更經十劫空坐道場意顯大乘菩提難得行亦難修非如二乘三生六十劫修行得果不名無上也言此為文殘等者從初入品真主化城喻已前盡說大通佛古今久近化城喻文別不能破病但顯法體尊高故是文殘也言或說大通佛事者二約十六王子說汝行力無上者十六王子當初聞經修行畢經多劫今日向菩提樹下方言成佛修行得名無上也言又諸聲聞等者三約三根聲聞說鶖子等當日教化早至第六住前豈有經爾許時修行尚自向聲聞地中坐今大乘方根熟故知修行無上也言不說大通等者疏主恐人迷將謂後兩節疏文一明十六王子修行二明聲聞修行緣總說大通佛修行恐人分別不得故一句疏簡云不說大通佛之行也言即將說今要等者通難也問此品之中說修行力無上亦說化城喻何故不以修行為品名言化城品耶答疏言即將說今等古即大通佛佛修行事意道擬說化城事須說著大通古事緣化城向三百由旬外設說著三百由旬事須說著古事鉤帶起來說今意令回向取實所說古今悟解取實雖以今果為品號名化城喻品說著化城過三百由旬外設便說設化城因由過去久遠修行事名因由即是大乘因亦在其中因果不相離亦在品中說其名也言增長力無上者滅去化城引至大乘說二涅槃是假擇滅說彼為化引至大乘即欲增長彼二乘之修行之力彼法大行名為疲極今却增修智力名增長也言前說化城等者此指下經下經先說化城後說增長力無上故言前說故下經言作是念已以方便力於險道中過三百由旬化作一城向後方言爾時導師知此人衆既得止息無復疲倦即滅化城語衆人言汝等去來寶處在近向者大城我所化作為止息耳此增長力無上也言未說商主等者解經增長力無上經文此無上無別經文只取滅化城文便是增長力也言此乃義殘者佛設化城本從息商人疲懈設之與滅俱是喻文喻文屬他化城喻破病文法中論說二乘涅槃是權增長得大乘心喻說滅化城文屬他破病已用訖於中一分增長商人心形對二乘得名無上喻家收不齊是義殘也言禦寇等者寇者難也生死之寇難得有餘涅槃生死苦息名禦寇也生死之疲者六道煎煮名疲恬寂滅之樂即涅槃也言今是喻法等者喻說法說一處名喻法也或喻即是法十二分教中有譬喻經喻亦得名法此言喻法者顯不是法說也言本無而有增上等者無處強執為有不是涅槃名為本無將謂是真滅名有增上慢即少得謂多得言執非擇滅等羅漢後得智位及二乘凡夫所求假相分執為真擇滅疏主指言非是擇滅是不根本智中所證真擇滅此名非擇滅也言今說擇滅為化者擇滅即解脫解脫即涅槃名異體同意道說彼真化城無體除之假化城自滅也交捨真化趣於寶所言不以佛事為之者即修行力無上大通往事名佛事也言今此經不以等者遠故不取今取顯果為品名即是化城也言不以隱因者即過去曾發大乘心也言滿慈領悟者經云而作是言世尊甚奇特所為希有隨順世間若干種性以方便知見至深心本願言佛重述成者經言爾時佛告諸比丘汝等見是富樓那彌多羅尼子否我常稱其於說法人中最為第一言為之授記者經言諸比丘富樓那亦於七佛說法人中而得第一今於我所說法人中亦為第一至號曰法明經言無量等者無量者過算分無邊者過時分不可思議者過情計分阿僧祇者此云無數數此阿僧祇至無量無量阿僧祇數此阿僧祇至無邊無邊阿僧祇數此阿僧祇至不可思議名不可思議阿僧祇劫言告後三者金云通謂通達二空道理也能達之智是無漏故名智勝國名好成圓滿義諸佛大法悉皆圓滿故名好成言大相者劫中有大佛事相現相現既大名大相言初校量者問世尊前言無邊不可思議阿僧祇是多耶答經言諸比丘至地種墨所有地種牟地種者即四大種四大種中不取水火風三唯取地種地種之中有假有實眼所見者為假身根取者為實地以堅硬為性水以濕為自性此之真地種身根所取觸塵所收眼不可見此中取眼所見者可研可摩假地種也二者地即所依地種即種類山川雞谷草木合名地種取前義為正假使有人都將三千大千世界作一個墨挺磨作墨法法將來向東方過數滿一千個國土乃下一點又過千國土下一點點盡墨法名盡地種墨種墨有二說一云磨作水過千國土乃下一點二云磨作磨取微塵為點也言都無磨字作摩音者章敬云謂磨字唯有去聲也言此問及答者問云經云於汝等意云何若算師目又若弟子目多人也意顯一人知不盡多人知亦不盡章敬云意明弟子同算放審及顯稟承學算之道大城不爾何須舉師及弟子耶知其數否已上問詞也不也世尊一句答詞也經云若點等者第一千不點餘九百九十九個國土數與塵等尚不可知況過是數也言宿命智知者疏意本後智名知佛五眼名見又宿命智名知慧眼名見路云疏釋經從勝而說理實佛眼亦見言問釋迦修行不越等者牟云彼時早稱王子分明也疏言猶者尚也問意云設使大通佛世初始發心至於今時已過三僧祇劫百千萬倍況復大通前劫早已發心至大通佛時方為王子王子行位非是初發心云何許時始得成佛應言彼早為王子也意道當時十六王子早修行至初地以上自復塵劫方初成佛何大遲生彼時早為王子當日為凡夫亦合成佛已久況早稱王子也言答意趣有四等者攝大乘論說意趣有四意釋四祕密一切大乘方廣教中不越此四祕密如來將四意趣解釋也一立意也趣是佛能緣心後得智為體祕密是教聲名句文色行薀為體也二出體此中有四簡要云一字平等過去及我同名佛故二語平等過去諸佛及今釋迦皆有六十四種美妙音聲語言說法同也三身平等我及諸佛法身色身好莊嚴無異故四法平等我及諸佛得菩提分等諸功德故也四祕密言教也教化衆生事為近方便也四意趣為遠方便也和合此意名祕密次下將四意趣解四祕密雖千佛萬佛各別法身理同彼佛即我身此是佛意趣也言平等意趣至等故者過去久遠勝觀佛即是我身據實勝觀佛釋迦佛實別且約平等意趣說認他勝觀佛是我身者約法身同故過去十六王子不妨此是佛意趣也過去十六王子不妨是諸餘佛修因時事成佛來已久認他道是我身此名祕密將何法解釋答將平等意趣和合會也言二別時意趣等者言雖在即意在別時如說願得往生極樂世界便得往生者為當來往生遠因若生事須更修善念佛始得今說發願得往是別時意趣言與意別時故名別時意趣如說念阿𭊦藍唅缺如轉藏經遍暫聞無垢月光佛名得成佛者是祕密人難會事須將別時意趣解釋法解今疏中引者正當攝大乘論文唯發願便得往生極樂世界此意長養先時善根如世間說但由一錢而得千錢別時意趣欲得生淨土事須行因如何空發願也問念彌陀名得生淨土經文具說不在狐疑如何此中祕密得成答持名發願皆是其因臨欲壽終定生淨土淨土是果發願是因依於今因說於當果令衆生積行功成影說因果故成祕密意總意別也言三別義意等者三性向上總說是空此名祕密事須別義解釋即是說遍計性是空依圓不空名別義雖談此義意在他義言說與彼意義不同故名別義攝論云若以奉事爾所殑伽河沙諸佛於大乘法方能解無性釋言謂證相大乘法義與教相大乘法義皆有差別意言解義有二一證理之時方名解義即證相大乘在初地已上菩薩二聞思之時亦名解義即教相大乘在十信前凡夫所聞聖凡階位而有不同故言差別意言據教相大乘非難解言逢多佛方能悟解故成祕密如來說彼證解之義言中似說悟解之義故此差別也言四衆生意樂等者問何名祕密答佛說法讚即合長讚毀則合長毀今於一行或讚或毀名為祕密將衆生意樂意趣釋為衆生慳者讚布施及交布施便生喜足不求餘行佛便毀呰檀那欲令具修勝品善故然於一施而復毀自語相違皆似有乖角故成祕密觀根受道法合爾故故名意趣也治貪故讚布施親近恆樂見宗敬好名聞復作後時因是名施善利若不求法者為說若河沙世界珍寶滿其中以施諸如來不如一法施若毀戒者云明人能護戒能得三種樂名譽及利養死得生天上若樂持戒不樂法云若有戒足雖羸劣而能辨說利多人如我大師應供養若樂多聞不修禪定譬如貧窮人衣衣數他寶自無半錢分若修定不樂多聞云多聞增智慧多聞能引樂多聞捨無義多聞得涅槃華嚴經問明品云佛知衆生心性分別不同隨其所應度如是而說法吝者讚布施毀禁讚持戒多嗔讚忍辱懈怠讚精進亂意讚禪定愚癡讚智慧也言今依於平等者釋迦先已成佛若別名勝觀問若別名勝觀者為即彼佛為不爾耶答疏言今此依於平等意趣說實非彼佛相國解衆生意樂宜聞說餘佛事餘佛事即十六王子不妨是餘佛修因之時今依平等意趣說餘佛事即是我身得平等意趣故言又善心相續至王子者謂三性中無不善無記心唯有善心念念相續積數而成三大阿僧祇劫今復佛果時節少即若論三性相續間起所有時節總合而言故經爾許劫亦不相違也又云報身久已成佛為衆生故示現不同大通邊爾為王子如文殊等問准壽量品明成佛時已在十六王子前以五百千萬億那由他阿僧祇三千大千世界微塵數我成佛已來復過於此百千萬億阿僧祇劫何故相違答彼據實成此王子依示相說大通佛時化為菩薩如文殊等非實菩薩也言又依晝夜等者若晝夜月時年為劫不妨塵劫若論大劫而論只是釋迦三大劫內也言已下諸長行者從此已前長行頌文述記品末經云大通智勝佛十劫坐道場頌文從此唱佛告諸比丘大通智勝佛已下彼方述此也於中十方梵王每方有說偈讚嘆但是諷詠不是應頌中間頌文諸梵王文並非頌此長行也意道中間諸長行應頌中有文述也名方偈有文也言初會自身事者是第二正明彼事乍觀疏科將為正明彼事中初會自身事不是此也會弟子事前已科出但依路解是也經言其佛本坐等者解脫道未起名法不現前也言報身成道等者若是自受用身成道理實難信金云三大阿僧祗劫滿百劫學相好千劫學威儀萬劫學化行因行不滿不合成佛若言成佛更何須十劫空坐道場若以年為劫更經十年若以日為劫更經十日亦何遲晚答疏言報身成等通會言化身成道者此化身不是大小化身但是他受用報身上化現而有名化也言今他報者簡自受用身報簡化身問爭知是報不是化耶答據佛壽五百四十萬億那由他歲故是報身也所以疏言今他報身示相起問若是報身寧有祖老答應七地已前悲增菩薩現有眷屬以彼悲增由居分段故疏言他報身不如言他報也與上文化身成道等文勢相順故言顯菩提難得者經言垂得菩提而諸佛法不現在前等五法不一名諸佛法或可三世佛共所有法名諸佛法也亦即所得菩提所證涅槃是諸佛之法菩薩於自現身示現未圓明故名不現前也言依華嚴經等者證坐道場十事故坐道場何者十事一者所謂種種震動一切佛剎故二者照一切諸世界故三除滅一切諸惡道故四變一切剎為金剛故五觀一切佛師子吼故六離一切虗妄心淨如虗空故七示現順淨身威儀故八隨順金剛圓滿三昧故九受一切佛清淨坐處故十因善根力悉能受與一切衆生故故坐道場也言破諸魔軍等者彼經言何等為十一者所謂五濁世衆生樂相征伐欲顯菩薩功德力故二悉滅天人諸疑惑故三為欲化度魔眷屬故四諸天世人樂征伐者令伏化故五集天人已顯現菩薩功德之力不可破壞調伏衆生故六發起一切衆生力故七哀愍未來一切衆生故八乃至道場現有魔事悉能超出衆魔境故九顯煩惱力勢羸劣大悲善根勢強盛故十順濁世諸衆生故由具十義示現降魔又大車云即法華又涅槃云釋迦如來菩提樹下未成至覺魔來惱亂恐出三界菩薩入慈心定起雷吼三昧即破天魔也言不爾魔等者路云十地菩薩化作魔王形對滿心尚不能競力何況於佛故名不爾也言又釋迦佛破等者即大般若八相成道之後方破天魔今此經但有大通佛破魔了道成經文具此二說也言此事不定者若先成道後破魔魔與佛競力若先破魔後成道魔與菩薩競力也隨根應情各有異故不須和會言又彌勒等者通難也下生經云時穰佉王共諸大臣持妙寶臺奉上彌勒彌勒受已施諸婆羅門婆羅門受已即便毀壞各共分之彌勒是此妙臺須臾無常知一切法皆亦磨滅修無常相出家學道坐於龍華菩提樹下樹莖葉高五十里即以出家日得阿耨菩提問何故彌勒出家之日成道釋迦苦行六年大通十劫空坐道場遲速如何不等答大通待生根熟十劫方證菩提釋迦彌勒不爾三佛各隨宜令衆生於佛生希有心易入法故亦有此事且彌勒佛時時俗多以利智相凌是以彌勒生婆羅門家於利根中最勝上故若大通事事貴剎利種時人多以勇猛相凌故佛於剎利家生勇猛中最上故釋迦為降外道示諸苦行六年之中日食麻麥勤苦過彼故佛成道各各不同也言敷座等者牟云有云此文似倒合言在十劫坐道場前答經文既有先字即不倒也乍觀似諸天共敷一坐非此義但是諸天各自敷坐各見世尊受自家坐不見受坐佛心平等總受也問何故成佛事須得金剛座答除金剛座餘物升世尊不得也今諸天獻座者是金剛座上重小坐也言三散華者經言適者由才也面百由旬者二說一個華方圓一面百由旬二者華至小雨華之時繞佛菩提樹一面百由旬也言伎音者手邊作支為正技藝也女樂作妓言經文承便等者但是文勢相承言滅後作樂稍不隱便也一云但是作樂至滅度限齊至滅度時正滅度不作樂如言終身相事若終了如何相事也二云如釋迦入滅聲聞悲啼菩薩歡喜知佛無來不滅作樂不妨也言初明十六王子者問何故先烈十六王子後烈其祖轉輪聖王答正欲與十六王子結緣故先烈王子也言親族等者問何故十六王子最先請轉法輪答疏言親族現前故非等糅云十六王子請轉大乘法輪十方梵王請轉小乘法輪烈梵王請時王子亦在會及至轉小乘法輪了後經多時十六王子方請轉大乘法輪請已過二萬劫方說是經是故梵王不得同聞大乘法輪名不現前也此解非理也但是王子是兒名親族梵王不是親名非親族王子在前到來請轉法輪名現前梵王在後到來請轉法輪名不現前現前即在前經云智積者嘉祥云平等大智已積聚故名智積也言鼓音王等者問何聖教中說他受用身有父母耶答疏言鼓音等問如何報佛有父母妻子耶答形對七地已前悲增菩薩受分段身者能化之主有父母妻子若形對八地已上受變易者能化之主無父母妻子言此佛祖轉輪者糅云其他受用佛既通劫增出故佛父是金輪王若望大通佛名父若望十六王子名祖也言二詣佛者經言珍異者將妙珍寶往供養佛也言三母送等者經言諸母涕泣者生母養母名諸愛戀情深涕泣順彼情欲故送之也准禮古者天子有三公九卿二十七丈夫八十一元士皇后三夫人九嬪二十七世婦八十一御妻亦總名諸母目出淚曰涕出左傳無聲出淚曰泣出說文言五詣意者經言咸親近等者咸者皆也供養身業恭敬意業讚嘆語業也經言大威德世尊等者於億無量劫者不離三祇也正明修因也諸願已具足者即四弘願中利他願未具足餘三已具足故總言具足吉者吉祥即成佛也總而言之不越二願一自利願二利他願自願即滿利他未具足經言世尊甚希有二頌等者身體及手足寂然安不動身定也其心常憺怕未曾有散亂心定也究竟永寂滅涅槃也安住無漏法菩提也言讚修因勝等者路云雖明佛坐道場未成佛故名讚因德也牟云即讚未來佛事也言華嚴經說等者潞云所明十坐行住亦得從勝為坐前五個坐皆佛菩薩等心所遊履心住其中義說彼坐之名非輪王等坐即是彼身其正法等五以義為名心住為坐不同前五從人立名有云威儀一定但所為事有十故分十坐也應撿彼疏也言憺怕者寂靜義亦相似也言切韻無味作淡者若經本作此淡字非此中義乃是淡泊也言恬靜作恬者經言恬怕亦是寂靜義從心作舌與恬美之恬同音此恬字不通憺音也言玉篇等者徒敢反徒濫反淺深別是安靜義也言有作惔者惔怕徒甘反憂義非寂義言字書者說此惔字亦通憺音徒濫反言怕音等者匹白反怕音亦是靜義言說文無為也者不是真如喚作無為但是為由作也無准也萬事不為亦是寂靜義故憺怕二字相合共成安靜之義應作憺怕字為正也言常苦苦等者經言衆生苦惱等者苦諦常居五薀之身常居四塵苦器之處也盲冥無導師者集諦也無明發行從癡入冥造集惡業也不識苦盡道者道諦也無始來不能起無漏智名不識苦盡道也不知求解脫者滅諦也解脫滅理了不可證名不知求解脫牟云衆生常苦惱無因力盲冥無導師無善友力不識苦盡道無資糧力不知求解脫無作意力初句無因力若無種性人無本有因若有種性人無熏長因故長夜增惡趣者前來依四諦種惡因今受果從冥入冥即三塗人天名明處言冥者切莫經反暗也夜也從日邊作去音切合眼瞑瞑亦通平也言遇益故者經言為得最大利者為音榮危反定也得也當也五乘之人各得究竟利益名最大言請轉法輪初長行者經言憐愍饒益諸天人民何不言三途衆生答轉法輪音望增益彼無容暇故略不言非佛世尊不饒益彼如天人師也經言百福自莊嚴者外德也無上智慧者內德也問百福莊嚴是內德何名外耶答百福是因相好是果將因就果說名外也百福方便品說了今略言言百福者佛有三十二相每修一相皆以百福為因夫論百福依十善業道說每修一業皆具十思計成百福且如修第一不殺業道時一將心離殺二起勸導思三起讚美思四起順隨喜思五起回心思初起離殺業道有五思餘九業道皆具五思即成五十思每修一相時先起五十思淨其身器次起一思牽引後起五十思令其圓滿如似種菜先治睦壠次下種子復以糞水而溉灌之以此百福共成一相名百福莊嚴相如是展轉成三十二相名清淨身言佛識達故請等者一依經配五力一云世尊知衆生深心之所念念力二云亦知所行道力三又知智慧力智慧力也除却欲樂及修福一句經文最後配也四宿命所行業一句經文分為兩段宿命者宿住智力此是第四句也五所行業者自業智力也最後欲樂及修福者欲樂即重配前深所念念力也修福兩字重配下所行業自智力也下依疏言一所念者問何名所念即欲樂勝解也衆生所樂所念為所知境如來勝解智力為能知也言二所行者所行道為所知境如來遍趣行智力知也言三智慧力者衆生智慧力為所知境如來根勝劣智力知也言四宿命者衆生宿命為佛所知境如來有宿住智力知也言五業等者衆生自業為如來所知境如來有自業智力能知也言其欲樂等者結也欲樂二字結勝解智力所念兩字結念力修智即業結前自業智力言略舉此等者問佛有十力何言五力答疏言略舉等處非處靜慮種種界生死智力漏盡等五力也言光照幽冥者經其國中間等者此間旋繞四洲小鐵圍山也日月不妨照著也相國云取大千界外鐵圍山至極高廣日月照不著也此界他界兩鐵山間有衆生尋常黑暗不相見忽覩佛光相見驚怪互相發言此云何忽生衆生攝云此是何界所攝設爾何失若三界不攝亦違聖教聖教說離三界外無別施化處即有攝衆生不盡妨答如物處中雖非三界然是三界中物衆生亦爾雖非三界何妨亦是三界中收以受業是三界繫亦即是三界中欲界攝由鐵圍山在欲界故也問何業生彼答有經言用佛燈油生鐵圍山間也言動照梵宮者是佛意也問成道了即得何要震動放光答恐衆生不知佛出世意交令知供養請轉法輪問放光即知何要動界答衆生有二一者有目二者無目無目之者不見放光明故須動界言例六方者經言西南方乃至下方亦復如是言除後二方者後二方文段皆不足第四例餘方中四段全無第五上方之中唯有三段文無第四默然許之問何以無第四段答末後梵王請便口許故無第四默然也言此皆通四禪者准下既言我等所從來五百萬億國捨深禪定樂為供養佛既言捨樂寧通四禪答彼是定中輕安樂也言或唯初禪等者菩薩藏經譬如水灾下至金輪上窮梵世滿中皆水遍三界假使有人以一牛毛竪分三分取一分點水中拭乾又點水中水盡梵福終不盡路云請轉法輪所感即初禪福若爾二禪已上何非梵福答阿含經中但以欲界人天之福挍量初禪一梵福故二禪已上不可比故所以不說問即各相詣者為復是五百萬億國土梵王相詣共議為是當三千界中梵王相詣共議時彼衆中亦爾為是五百萬億國衆中為復是當三千界梵王衆中答只是當三千界梵王及梵衆相詣也經言為佛世出間者及為大德榮危反是也言尋光詣佛者經言五百萬億者攝問三乘運通尚自不越三千凡夫梵王何能遠至答二解一則多是菩薩梵王許受十王果故故能遠至牟云此解大狹豈唯是菩薩而作梵王無凡夫作耶二云佛加持而至於此故唯識云若定通等力則不決定如十住斷結經法界品云吾曾遊野馬世界去此七十二億恆河沙數佛剎我弟子目連神通第一至彼世界放大音聲遍三千界演說妙法此乃如來加之令往若不爾者二乘神通因何至彼問梵王何不定身來將宮殿俱來耶答三說一凡夫梵王生以得通變起定果宮殿與身俱來為欲界地粗不能勝他梵王細色故又佛加故俱來何失二為布施故將來也三云菩薩梵王變為宮殿俱來無過問八地已去菩薩既受變易云何梵衆得見梵王答言梵衆所見即化身故經云衣裓者衣箱也言見佛衆以欣者經文無欣然文但是疏主義科出也言初歸禮散華者經言即時諸梵王等者攝問云十方梵王悉皆散華一一華積並若須彌此界云何容受多須彌華答此中化土及他受用境合而說之大即報境小即化土章敬云報佛寬廣容亦不妨縱閻浮地狹神力包含亦復何失問經言其菩提樹高十由旬華積如須彌如何相攝答一云須彌山以四寶所成花色亦作四寶故如須彌山二云亦是假設所散華多設使塠著共須彌山相似非實有也三者華塠實如須彌山如七月十五日簡架高亦不妨紀國云華散佛身顯人尊華散佛樹顯處勝問以將華供養菩提樹答顯發崇仰之意也牟云叩伯聽訟之所思其人愛其樹勿剪伐於甘棠如來成道之場敬其佛而亦供其畢撥言二頌讚五德者一體妙難逢德世尊甚希有難可得值遇二福慧圓明德具無量功德三拔濟無邊德能救護一切四軌範天人德天人之大師哀慜於世間五懷生久遠德十方諸衆生普皆蒙饒益然救護一切通五趣天人據勝言也言初頌來由等者經言我等所從來二頌者四禪根本定名深禪定也樂者即輕安樂也問何以不是樂受之樂答以樂受不遍四禪故章敬云所謂捨深禪定之至樂明供之極欣也經言我等先世福者問梵王捨宮殿捨何宮殿為復變起捨為捨業果宮殿若變起捨云何得言我等先世福宮殿甚嚴飾若捨業果宮殿又將何捨細色身答應言變起以奉世尊經言先世福者由先世福得業果通所變宮殿甚嚴飾故非業果宮殿業果宮殿與身俱生云何捨施而不可捨也從本處來便別變宮殿持身以表殷勤便將布施問梵王所獻宮殿佛定受否答二說一佛不受若受即合呪願佛既默然故不受二云受已却施與梵王也納而安處納處也然前所解不受為正以文不說佛亦不居故不同寺家受了擬收課利也言此請轉法輪者經言爾時諸梵王等者攝云大集經言如來唯有大慈悲愍念衆生如一子我今勸請法應爾願轉無上正法輪如來初生發誓言我當救彼苦衆生衆生渴仰甘露味願大施主施法雨言何故涅槃時者意言佛入涅槃諸天獻供佛若不受則默不語今者不語何名受耶答疏言古解等初三解是嘉祥引注經中解第四解疏主自安置也言佛顏有等者涅槃時雖然不語顏色𣫍然不怡悅所以請者方知不許大通佛時請轉時雖然不語顏色怡悅請者覺許言又云以佛等者佛雖不語光若上照則知許說法若涅槃會光尚下照又復不語便知不許也言又云佛初成者凡常時默然是受請涅槃時默然是不受請也言又受食者涅槃時受食事須出言呪願即不受請也紀國云供養是己利所以默然表不受說法是利他所以默然即表受也言東南方等者長行經言五百萬億國偈中云過千萬億土只是五百萬億數內也雖有過字不必是五百萬億數外也言加陵頻伽者陵云好頻伽者聲也此云好聲鳥亦云妙音亦云迦蘭陀鳥也言初一頌歎為眼目者經言為衆生作眼者問不何言作耳鼻等耶答度生死河捨黑暗業眼為前導耳鼻非初故不言作耳等為字去音訓作與也言後一頌歎為父者經言為衆生之父者榮危反平音為由作也問戒經言一切男子是我父等今何相違答彼佛自言此梵王說也若爾皆是吾子等如何答若約智門敬法身故故言一切男子是我父等若約悲門憐愍一切衆生如一子故故稱其父也言歎佛生等者經言得道若生天者得道二字配忍善者增益若生天三字配諸惡道減少忍即證忍信忍也見道無漏智名忍入聖者多名忍善者增益也者即假者所謂得忍之有情以經文言衆生聞此法即凡聖通證得道生天分為兩類生天故惡道減少得道故忍善者多言初二頌半歎佛者經言世尊甚難見等者問經言過百三十劫何故三方梵王見佛有異東方一百八十劫南方百三十劫上方於昔無量劫等何也答金城取嘉祥解諸佛出世感在衆生衆生三品不同所以見有異上中下根如次見彼二十中多劫問此言一百三十何故上云過於百千劫答百千劫約少劫時分多故並是百三十劫時分故初一頌歎斷德煩惱斷處得真理故後一頌半歎恩及智德無量智慧今日乃值遇是恩德也此約三德不離一身讚也如是三德值遇皆希故是歎也元久二年八月三日於野福光院書了為興隆佛法利樂有情矣凝圓之
