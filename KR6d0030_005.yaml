body:
  text: 鏡水寺沙門栖復撰次下四種種性兩般聖教初般若後勝鬘且般若者言依有非無等者廢立也依有種性名依有不依無種姓名非無一人身中具有三乘種姓名通性此四種姓中三乘定姓一個通性是不定性故名通也別者三乘人各自別有種姓名別別有三通性有一名四種種性也定性不定性各自差別名類異也言又大般若等者引教也大般若經中有一菩薩名善勇猛白佛言世尊願為我等為具宣説如來境智問何名境智答智即如來後得智根本智也境即是真俗二諦根本智緣真諦境後得智緣俗諦境境智即是智境也又有解衆生三乘根性名境佛後得名智何故名境智又云三乘所起本後二智對如來後得智名境境即是智也此般若經中觀照實相二種般若即是法華經中知見性相菩提涅槃如為知見性智為知見相總名知見也都有四類人三乘定性及不定性得聞如來境智言若有情類等者地有二義一生空理所依名地二生長功德名地聲聞人初二三果第四果證擇滅理總名地也不局在初果名地也言於獨覺乘等者緣覺之人一異證悟但言出離出離即是得果也何以聲聞言自無漏地緣覺云出離答翻譯家避重言失也言於無上乘性決定等者此前所引三乘定性人也言若有情等者第四段一類不定性人也問爭知是不定性人答聞大乘法回趣無上乘故知是不定性也此是見道前七方便人曾發二心曾修二行聞大般若經回心向大名漸悟此間疏快感法師義所以疏言雖未證已入性利生意顯是見道前凡夫若是決定性聲聞聞法已後便入見道取自乘初果得法眼也緣是不定性人無容暇取小乘初果便行菩薩行所以疏言而於三乘性不定者聞此法已發無上心此具性發心名漸悟言諸論雖説等者通妨問前來堪法師義不許前三果人受變易回向大名漸悟今準佛地論顯揚論則許前三果人受變易回心修行方名漸悟今此疏中引經唯説凡夫莫違地佛地論答回心之中有兩類人一聖二凡聖人回心具二義一者聖回心二者受變易二者凡夫回心凡夫之人只具一義唯有回心闕於入聖受變易義佛地論中説回心約受變易者説今此疏中云説回心約不受變易者各據一義亦不相違所以疏言諸論雖説聖亦回心此二句通論佛地論今疏中説不受變易已下分疏此道理也疏中凡夫回心有二類一者悲增二者智增事須回心了入見道取却初果等然後受變易回心修菩薩行以怖長時無窮生死二者悲增見道前回心了修菩薩行更經二大阿僧祇劫至第八地方受變易問其受變易為一度受為多回受答非一回受謂聖者回心已去命擬長時修道願我所有無漏定願資本親生之業令得十劫二十劫等隨長短分限時節既漏更當如是發願資乃至成佛言此經被彼等者即是回心凡夫言大乘定性者即是三乘定性中大乘也聲聞定性即妙莊嚴品中者及不定性即是下八品正宗中不定性聲聞也言如已引等者即指前文中三種種性兩般聖教中文也即妙莊嚴品問疏主言如前已引莫是取破疑執中義兼為三中指者是定性有學初果之人問何以知不指義兼為三中無學答顯般若經是第二時空教尚上自定性聲聞得自乘果何妨妙法蓮華經更妙勝又是第三時教何妨定性聲聞得法眼淨是小乘初果也若聞般若經相例總是得果益則取妙莊嚴品為勝也若取義兼為三中定性無學聞法華經但是不愚法益豈有聞法華經空不愚法休去耶故知疏主但指得果益也言然無被獨覺者問一教之內若無被獨覺者如何經言諸求三乘人如何言發聲聞辟支佛心又言求聲聞者求辟支佛者求佛道者答經文有者則約緣覺凡夫説既言發聲聞辟支佛心又言求三乘人勢盡是凡夫也疏言不被則約定性緣覺得果者説並不見有似他定性聲聞遠塵離垢得法眼淨者得果益則無也若爾何成破二若不被緣覺何名破二乘執人答破二約凡夫説若簡所不被約得果者經會則無也言有無雙彰等者廢立也但説四乘定性不説不定性名以通從別以由廢也廢却通不説名以通從別唯説四乘定性名從別也言又勝鬘等者引文也言大地者譬如大地持四重簷逆罪對四疑及正見對戒見對者若唯於戒壞見不壞現身續若見壞戒不壞容後身續其戒見俱壞現當不續見戒俱不壞非此中收次意樂加行對者加行壞意樂不壞容現身續有二俱壞現當不續有俱不壞非此所收三謗法逆罪對者有逆罪非謗容現身續如闍王等有謗非逆容後身續如富闌那等有謗逆俱有如善皇等現當不續有謗逆俱無如舍利弗等非此所收疑及正見對者疑者疑世間出世間因果於此推度心不決定遂生猶預生決定時便續善根先續生得善後續加行正見續者於九品善有説漸續頓續者相云云何若逢善友能巧為説法令彼生解必是頓續初世分別了後約緣分別者如仙舉國王知五百婆羅門信惡友緣而生邪見遂即煞之便入地獄憶三種事一知從人中來二知由惡友教三知由斷善遂生悔心悔心即出不受生甘露國此即名為緣力斷善根地獄生時續若入地獄經本有具受苦已後方續此即名為因力斷善根地獄死時續問邪見斷善但是一法如何續善前後有異答緣力斷時發心不猛故於前時地獄生時續因力斷善業即堅窂故於後時地獄死時續四何時續了言二者憐慜一切衆生等者問如初地菩薩已去不造新業此菩薩設令身中無數恆沙故業由不更造新業故業合應有盡若盡如何不入涅槃處在生死答分段惑業盡還受變易身由此不入涅槃若爾受變易與佛化生何別答佛身微妙衆生不見別起一化身令衆生見由此與佛異若言在前七地中受分段身者即有如前故業應盡之妨若就八地受變易解者即與佛無殊之妨進退思擇多是地前菩薩造生業無盡期故問何名大悲得聖菩薩乃至八地名大悲故地前又成過去既云無始前七地中用無始業資感生死足得無窮非如二乘猒生死苦之不受此解善問何故喚大悲菩薩作斷善根闡提之人答以彼無種姓故究竟無成佛不入菩提涅槃發願導衆生界盡我即涅槃衆生界法爾無盡所以菩薩常不入涅槃與彼無種性人道理相似所以喚大悲菩薩作斷善根人也言以知諸法等者問如何菩薩不入涅槃答疏云言以知諸法等諸抄云菩薩不入涅槃而有二意一知生死涅槃本來平等菩薩言一切衆生身與涅槃別菩薩不妨捨生死入涅槃菩薩見生死本來平等二見自身及衆生元來在涅槃中二者菩薩向衆生起同體大悲觀一切衆生即是我身名同體所以不捨也又問菩薩何事畢竟不成佛耶答菩薩大悲化盡衆生界我即入涅槃衆生法爾無盡故菩薩永不成佛問如觀音授記經云補阿彌陀佛地藏菩薩十輪經當來成佛乃至文殊亦有授記如何説畢竟不成佛又問菩薩數數造善不成佛若凡夫數數造惡應不入地獄據此而言亦得成佛賀云不成佛約悲門説言成佛者約智門説是故成與不成亦無乖返安國云據菩薩悲心如此非是不成佛也菩薩發願不成佛猶如剔火杖火杖本來剔撥柴薪盡誰知柴薪未盡火杖先無也故金剛般若經云我皆令入無餘涅槃非皆入盡言此經被聲聞及如等者賀云此法華經被定性聲聞不定性聲聞及如來乘性菩薩一闡提中大悲菩薩也非被獨覺及斷善者然定性聲聞聞於一乘不愚法故不定性三乘回心向大故如來乘種性求佛智故大悲闡提化衆生故獨覺之人不聞教故斷善之人有邪見故佛不為説楞伽五性了言有無並説等初廢立也有性無性總説名有無並説不定性與定性總説名通別類異現斷是有種性畢無是無種性現斷則現在雖斷當來却續畢無者畢竟永無現斷則是以時邊即是現有當非有當有現非有盡是有種性人若是現當非有及畢竟是無種性人言莊嚴論云有五種等者引教文也初四同楞伽者即是三乘定性及不定性此四乘中除獨覺不被也餘三皆被第五無性人中唯取時邊時邊中唯取大悲菩薩餘現當非有及畢竟者悉皆不被也言第五有二種等者故大莊嚴論本頌云一向行惡行是現在斷善根者謂屠兒魁膾煞生無惡不造者亦設齋等第二普斷諸白法被惡知識相勸歸依外道斷善名普斷諸白法白法者即是善法此兩句是有種性人斷善者第五三無有解脫分者謂不求三乘出離第四真是無種性人也少善亦無因唯有人天善根名少善不樂廣修故不與三乘果為因亦無三乘聖種為因故名亦無因前三句即時邊後一句即畢竟由此約因約果更作四句分別一因成果不成謂大悲菩薩二果成因不成謂有種性斷善根人三因果俱不成謂無種性人及二乘定性四因果俱成謂大智菩薩并不斷善根成佛者也言此經被前四等者及第五性者即無種性人又時邊中除大悲菩薩餘現無當有及畢竟者悉皆不被前四之言指楞伽經也言依有及無等者廢立也亦立名也攝釋三説一者不成是無種性人於佛果菩提永更不成故言不成向上當成兩字是本字屬對助向下不成之語二者當成是有種性人雖現未成當可成故名為當成不成者即是無種性人三者當成不成總屬無種姓人佛果菩提是當成之法斷却善當來之法不成故合名當成不成又云依有及無當成不成者當成兩字成上依有不成兩字成上依無議曰前三説既非聖言隨意總得然就理長如來第二解初及第三恐非疏意相國云當成謂有性現雖未成當可成故不成謂無性及二乘定性者一性字不許有二乘定性及無性對彼申宗量云二乘之果是有法實有定性故宗因云乘所被故猶如大乘大乘所被大乘是實有定性二乘所被同彼大乘是實有量云所説無性是有法決定是有故是宗因云聖所説故猶如有性有性聖所説有性是實有無性聖所説同彼有性是實有言瑜伽有説等者引教也同前者同前莊嚴論被三乘定性及定性此四乘中唯除獨覺不被故云前四同前也第五唯一者謂無種性之中唯被時邊中大悲菩薩故言唯一餘現無當有及畢竟無性此經不被也言此經被彼與前莊嚴同者被根也即是三乘定性此四乘中除獨覺不被餘皆被第五無性人中唯取時邊時邊中唯取大悲菩薩且楞伽第五是有性現當非有是莊嚴論第五時邊是有性畢竟即是無性瑜伽第五唯是無性莊嚴論中時邊雖是有性教亦不被彼現斷善根故言若以一乘為宗等者初結正為人也化度問既以一乘為宗即合唯被菩薩何故流通分兼被聲聞答正宗分中唯説一乘即被菩薩雖正宗中即為聲聞回心向大得記即名菩薩故三周正説正是一乘流通已下非正説一乘之處緣妙莊嚴品中傍利益聲聞是流通故亦即正宗對不定性故言一乘流通分對定性故此中如一乘章中真實體四十年前所有小乘教理行果至法華會上並以回心歸大回心以五門分別一出體二釋名三回心人四回心處五回心緣體者問八識之中是何識回為是集起賴耶為是緣慮答且如前之五識但能任運緣其前境無計度分別第七末那一向內緣賴耶見分為我我所若是集起者集諸種子起現行故並不能入觀出觀等非此等心今者回心即是第六意識緣慮名心謂昔妄執小乘計劣為勝妄執不捨即是第六能為今日既遇大乘知昔非是究竟悟今是其真實便回小果歸向大乘故知見道第六意識緣慮心一云回第六生空智二云回第六識及同時心心所二十一法兼取五識相應心心所等二釋名者回改回易拔昔日第六意識證生空智今日改作法空智名之為回三回心人者且如初果人欲界人天各有七生合此二小生合為一大生名為七生第四回心處初果人生上即六欲天下來生三洲北俱盧是難處故且如向南洲死生四天王天乃至如是次第死生他化自在天等並許回心東西二洲準此應知十五心向時既速疾故不得回心若世俗向亦許回心上流般那含生於上界分為兩類樂慧之者生五淨居樂定之者生無色界不是回心處中般之人謂居中有便般涅槃亦無回義以次生梵王天及無想天亦不得回心五回心緣者身上具三乘種性欲回心向大事須遇緣得二乘果若數數遇二乘即不得心若遇菩薩大乘緣即許回心也大乘人天乘教是緣也言一雨所潤等者標傍被人即定性聲聞得初果也言瑜伽等云等者證傍被人也等者等取大莊嚴論論云即是見諦預流果等等取超得果者若次第得果者第十六道類智得初果若先曾伏却欲界六品俱生惑至第十六道類智時便取第二果乃至第三以不定故言等言故知非説一乘之處者指傍被人也正宗名正説一乘流通分名非説非説一乘乘即是妙莊嚴品也言為被機宜者説是經即妙莊嚴也言第二明經宗旨者標也既知前來敘經起之意明能説經人意未明所説法是何宗體所以有第二明經宗宜未問涅槃經以佛性為宗維摩經以不二法門為宗華嚴經以法界為宗觀經以十六觀門為宗未審此經以何為宗體答此經以教理行果為體體者性也開權顯實為用用者業也用此經以一乘為宗宗者尊也問一部經內何法最尊答此經以一乘為尊所以言宗者尊也宗者主也以一乘為宗主者本也以一乘為本宗者崇也宗崇一乘上得別宗解若總宗宗者衆也此經以一乘究竟為宗破二會二為宗旨旨者意也即是意旨意況意趣令二乘人破二會二歸於一乘是此經之意也又宗有二一者總宗二者別宗若總宗義解有作無作可貫兩門世俗勝義隨應分二雖知通旨宗義若斯若隨別所明一乘正為宗也言此方先德總判等者初敘古判教不同也先德即周時遠法師諫周武帝滅佛法事身長九尺著十三幅裙判如來一代時教有四宗也言雜心等者尊者達摩多羅此云法救造此論有十一卷問何名雜心答雜明理事故名雜是五百卷娑婆論之心髓故名雜心未造此論已前尊者妙音等五百羅漢於迦濕彌羅國造婆娑論五百卷後有法勝羅漢造三卷法勝阿毗曇後法救尊者以婆娑大廣毗曇大略故造雜心離彼廣略故有頌言極廣令智屈極略解不生是故處中説莊嚴妙義故等者等取發智六足俱舍也言立五聚法等者聚者積聚積集多法為名問無為法佛如何為名聚答若約法體衆多義無為不合名積聚若約名數論無為積聚或從多分為名亦名積聚今依小乘立五聚法若約大乘以識為先萬法唯識唯識之外更無別法小乘心不孤起託境方生離識之外條然別有體實有自性不立假法有法有故必不滅無法無故必不生龜毛兔角必不生也無法本無更何立假耶立一切法皆有自性也立五聚法有體性即是色心等五位法也且第一色法有十一種謂五根五境及無表色二者心法有一謂六識心王三心所有法有六位四十六且第一大地法有十謂受想思觸欲慧念與作意勝解三摩地遍於一切心二大善地法有十謂信及不放逸輕安捨慚愧二根及不害勤唯遍善心三大不善法有二謂無慚無愧唯遍不善心四大煩惱地有六癡放逸懈怠不信惛沉掉舉五小煩惱有十忿覆惱嫉惱害恨諂誑憍六不定有八謂貪嗔慢疑惡作睡眠尋伺四不相應有十四謂得非得衆同分無想定無想報滅盡定命根四相名句文五無為有三虗空擇滅非擇滅此論意云有法有故必不滅無法無故必不生三世不無五聚體有有為法墮三世總是有無為法不墮三世亦是有問聚義既是薀前四可立名薀不攝無為如何名五聚答前四是有為體義皆名聚後一雖無為名數亦是聚也言二破性宗等者化度云但於事總相名有推求於體必不可得唯有總相破性從相此成實論師本是數論弟子後於經部宗中出家造成實論破法有體唯有相故唯有總相相狀猶如芭蕉中無有實推求於體必不可得如聚沫等唯存相故此師計四塵為能造地水等為所造以一切法皆是於假言破相宗者非唯體性不可得如其總相相狀亦不可得故名破相宗皆悉空故言四顯實宗者化度云依他圓成有故言有遍計所執無故言無有無俱明故名顯實言涅槃華嚴等者緣此經等顯於中道真實義故沼云謂學徒雖順慈氏解深密不達般若中百論等依真俗諦及一切法空有不有世俗諦理遍計所執情有理無有為之法理有情無依似起性非有似有勝義諦法猶言不及非有非空寄言詮故亦有亦空慈氏偈云虗妄分別有於此二都無此中唯有空於彼亦有此故説一切法非空非不空言此經即是者問未審此經四宗之中復是何宗收答此經即是第四宗也上敘古説也言且古經論宗等者斥古非疏主破周朝遠法師設教不同將如來一代時教判四宗亦大相似然攝教不盡疏主意道當時遠法師判教時經論未足至唐三藏時方得足如今且就遠法師當時所有經論之中判教不盡若烈四宗攝不盡立性宗唯攝得二十部中有部破性宗唯攝得經部師宗餘十八部復是何宗並攝不著疏主意言古人立四宗攝不周非是全非也故言宗置極多也言舊四阿含等者阿含者舊梵語也新云笈摩此云淨教亦云傳教從真淨法界中流出故言淨教上古諸佛展轉傳來故言傳教大論八十五云契經者謂四阿笈摩有四一雜阿笈摩謂佛世尊觀待所化宣説如來及弟子所説相應薀處界相應緣起惑四念住四正斷四神足五根五力七覺支八聖道支入息出息等後結集者謂令聖教人住隨其所應次第安布當知如是一切相應略有三想一是能説即是如來及諸弟子二是所説即薀處等所了知法三是所為説諸比丘及天魔等衆如是一切粗略標舉簡廁句集名雜阿含二中阿笈摩者即前相應教法後以餘相應處中而説是名中阿笈摩三長阿笈摩者即彼相應教法更以餘相廣長而説故名長阿含四者增一者即彼相應教更以一二三等漸增分數道理而説故名增一阿笈摩如是四種師弟展轉傳來于今由此道理是故説名四阿笈摩僧祇者衆義摩訶者大也此中明義與大衆部以為宗計此師計無色界有細業界色及五根色以彼經説見佛母入涅槃無色界天傷感心淚下如春細雨又説如來雙林滅時彼天淚下如員盛雨此是定果變起五根依處扶塵無實根用彼大衆部依如上義遂計無色界有細業果色前立四宗不説無色有眼等故不攝此義言三彌帝者是上座部義疏云三云正彌帝云慈是正慈論賀云三者是正彌帝云量是二十部中正量部義謨云此解恐非疏意若是正量部義即是正量部收何故疏云判為上座部故知疏主解為正問若依疏解何名正量答但是上座部中取此義以為定量準繩故名為量也何以知是上座部義答彼論説無中有身上座部取為據論頌云再生汝今過感位欲往前路無資糧求住中間無所止此師意言既言中間無有所止明無中有也言舍利弗阿毗曇等者舍利弗阿毗曇簡法勝阿毗曇阿毗曇者此云無比此論準論慧學為勝戒定二學不可比方故云無比論也言梵網六十二見者將六十二見簡大乘梵網經此二經論説眼識緣色境時不帶相分影像如日舒光親能照境如鉗物鉗物不離鉗是正量部所計之義謨云因此略敘相見二分有無且護法菩薩宗心心所法四分合成具所能緣無無窮過非即非離唯識理成而正量部竟不立相清辨菩薩立相不立見安慧菩薩三分俱無唯立自證分唯識第二明四分中初難陀師量破此等初破正量所緣是無後破清辨能緣非有合此雙破安慧俱遣破彼論云若心心所無所緣相應不能緣自所緣境許無所緣境故量云眼識是法不能緣色故宗因云無所緣故同喻如耳等耳等無色相耳識不觀色眼識無色相同彼不緣色若許眼識無色相眼識能緣色眼識無聲相亦應能緣聲耳識無色相應亦能緣色次破見分無量云眼識是有法不能緣色故宗因云無能緣故同喻云如虗空虗空無能緣虗空不觀色眼識無能緣同彼不觀色若許無能緣眼識能緣色虗空無緣虗空能觀色合此二量破安慧三分俱無也言四分律是法藏等者此部中説佛是僧寶中攝是法藏本計化度云四分律等已上並八宗中法無去來宗準舊四宗皆所不攝所以疏云此等經論復是何宗言然文殊問經等者中今義也賀云一真諦所譯部執論中總有十八部於上座部本末合説有十一部於大衆部本末合説唯有七部此説謬也但由真諦相傳皆説有十八部若言二十恐有他非遂略根本大衆部也於中復減西山住部非但違斯舊部執亦違文殊問經經云十八及本二皆從大乘出第二若依舍利弗問經從上座部中出十三部從大乘部流出八部即二十一亦違經論譯家謬加也第三文殊問經二十部者正説也彼經下卷云摩訶僧祇部分別説有七體毗履十一是謂二十部十八并本二皆從大乘出無是亦無非我説未來起釋曰摩訶者大也僧祇者衆也即大衆部焉分別説有七者明大衆部中分出七部并本有八部體毗履者此云上座部十一者此從上座部中出也并本十二部是謂二十部皆從大乘出者無別小部法從大乘分出破無是者所立之義非皆是各各執為究竟之法故言無是亦無非此者所立之義非皆非也所執皆是真佛語故亦無非也我説未來起者如來雖則當根而説聞者不同故部執競興如來滅後百年之內雖見不同而法勢強故部執未分百年已後法力劣故諸部芬絃故名未來起又人壽二萬歲時有吉栗吃王是迦葉佛父急夢見一張白疊二十人爭各將一分至曉將為不詳問諸臣無能答者有一智臣而白王曰迦葉如來具一切種智王之所夢必應能解王遂向佛説其所由佛言非關王今日之事此乃人壽百歲時有佛出世名釋迦牟尼其佛滅度後諸弟子等分其教法成二十部王之所夢事表於斯謨云今譯此未來起者恐乖經意頌既言未來起即但以釋迦滅後一百年外名曰未來事甚符順何須遠引迦葉佛時雖事體即同而釋文不善不爾何置我説言豈我牟尼却曰説偈也上明分部了第二分部緣由者有總有別總即大天五事別者疏中所烈然內教大小乘合二十二宗且小乘教依文殊問經及宗輪論者此二皆敘分部所由其中巨細非無少異雖標二教烈即宗輪今且依宗輪論説云如是傳聞佛薄伽梵般涅槃後百有餘年去世時淹如日久沒摩竭陀國俱蘇摩城王號無優統攝瞻部盛百蓋化洽人民是時佛法初破謂因四衆共議大天五事遂有乖諍大天者昔末土羅國有一商主少聘妻室生一男子顏容端正字曰大天未久之間商主遠適他國展轉貿易經久不還其子長大染穢於母後聞父還心既怖懼與母設計遂煞其父彼既造無間業已事漸彰露便謂其母展轉逃隱至波吒釐城後遇本國所供養無學苾芻復恐事彰遂設計煞彼羅漢後復見母與餘人交通復煞其母雖造三逆由不斷善根深生憂悔何緣當滅傳聞沙門有滅罪法遂往雞園迦藍所於其門外有一比丘徐步經行誦伽陀曰若人作重罪修善已滅除能照世間苦如月出雲翳往詣苾芻所殷勤固請求度出家還字大天未久便能念持三藏言詞請功善能化導波吒釐城無不歸仰時無憂王聞已召請數入內宮恭敬供養而請説法出在伽藍不正思惟夢失不淨然彼稱羅漢而令弟子洗所漏衣弟子自言羅漢者諸漏已盡師今何容猶有斯漏大天告曰天魔所嬈汝不應怪漏失有弟子歡喜矯設方便次第記別四沙門果弟子白言阿羅漢應有證智如何我等都無自知大天告言無知有二一染汙無學已無二不染汙羅漢猶有此汝輩不能自知時諸弟子復白師言曾聞聖者已度疑惑如何我等於諦實中猶有疑惑彼復告言諸阿羅漢亦有疑惑疑惑有二一隨眠性疑無學已斷二處非處疑無學未斷猶有後弟子披讀諸經説阿羅漢有聖慧眼於自解脫能自證知因白師言我等若是阿羅漢者應自知如何但由師之令入都無現智能自知之彼即答言有阿羅漢但由他入不能自知如舍利弗智慧第一佛若未記彼不自知況由他人而能自了故汝於此不應而窮詰大天彼於中夜自思惟罪重當於何處受諸劇苦憂皇所逼數唱苦哉弟子聞之驚怖晨朝參問起居安樂否大天答言吾甚安樂弟子尋白師言昨夜何唱苦哉大天答言我呼聖道汝不應怪於後集先所説五惡見事而作頌言餘所誘無知猶預他令入道因聲故起是名真佛教然於後時雞園寺中十五日夜次當大天升座説戒彼便自誦所造伽他爾時衆中學無學多聞持誦修靜慮者聞彼所説無不驚可咄哉愚人寧作是説此經於三藏曾所未聞咸即對之翻彼頌曰餘所誘無知猶預他令入道因聲故起汝言非佛教於是竟夜鬪諍芬絃無憂王聞已自出詣伽藍尋白大天就非就是大天白王戒經中説若滅諍法依多人語王遂令僧兩朋別住賢聖朋內耆年則多而僧數少大天朋內耆年雖少而衆數多王遂從依大天衆訶伏餘衆事畢還宮後隨異見遂分二部一上座部二大衆部佛初入滅七葉嚴中二部結集界內即有迦葉波此云飲光時為上座界外亦有萬數無學無別標首但總言大衆皆由未生怨王為大檀越主種種供養界內人多難為和合所以兩處弘宣時雖兩處結集人無異諍法無異説及至大天衆乖諍昔時界外少年之僧共為一朋名大衆部取昔為名往者界內耆舊之僧共為一徒名上座部結集時迦葉是也此二乃是根本諍起之先首言五事者一餘所誘二無知三猶預四令他入五道因聲起問此五事皆空亦有實否答準真諦疏有虗有實如魔王天女能以不淨染羅漢羅漢之人不斷習氣無一切智即為無明所覆蔽須陀洹人於三解脫雖無起疑於餘事中猶有疑惑若鈍根初果亦有疑惑不知得不得問善知識事相若善友為設方知得不得若三寶四諦得不壞信者此人雖得須陀洹果更自觀方知定得聖道亦有因言顯者如舍利弗等口誦偈時即得聖道若不爾者名為虗也既有實分成兩部大衆部二上座部言謂大衆部者説五薀涅槃皆假名非真實有上座部説五薀及涅槃皆是實有故分為二然大衆部凡多聖少所以二百年中猶有乖諍於此時內立義不同又分三部言一一説部者世出世法皆無實體但有假名意謂諸法唯一假名無體可得既乖本旨可以別分名一説部即持業釋如呼火時不燒口等言二説出世部者此部意明世間之法從顛倒生但有假名都無實體出世之法非顛倒起道及道果皆是實有既乖本宗所以別分出世部言三胤部者上古有仙貪欲所逼遂於染雞後所生強因名雞胤部此部唯弘對法不弘經律經律世尊方便言教出家講經必起憍慢憍慢起故不得解脫唯有對法是甚正理即第一時大衆部中分出三部也言多聞部者第五多聞部此部師多聞精進速得出要廣學三藏深悟佛旨從德彰名名多聞部言説假部者當第六部意言世出世法皆有假實薀實處假亦從所立為名此部意云現法之中道有假處言假者如眼根處七極微成又如一微上有無常等四義故名為假五薀體非聚故名為實也言制多山部者梵云制多此云雲廣安置聖靈之廟處也山有制多山得此名人依山住者制多山之北故從處為第四分也第二百年滿時有出家外道捨本之邪教歸如來之正法亦名大天前第一百年時有大天比丘為乖諍之旨今此同前之名故稱為大天亦從大衆部中出家形入僧流受持具戒廣學精進今此大天與彼大衆部僧重詳所我大天五事有可不可因茲乖諦分為三部一制多山部即大天所居山二西山住部三北山住部此二部與大天不知因茲便居山西山從處立名如是本末共分九部其上座部二百年一味和合此部根本迦葉住持復有漏慈度喜助揚其化相繼不斷由是二百年前殊無乖諍至三百年初因迦葉多衍尼子於上座部出家先弘對法後經律既乖本旨遂有諍興上座本弘經教此先弘論故是相違也言説一切有部者一切有二所謂有為及無為也有為墮世無為離世其體皆有名一切有言雪轉部者六轉名部上座弟子本弘經教因説一切有部起多弘對法既闕義理能伏上座上座既弱移入雪山約處為名名雪山部攝云上座部漸次而行如雪因風飄流摩措從喻為名名雪轉部言犢子部者律主之姓上古有仙居山靜雪欲染母牛因而有子自後仙種皆犢子姓部從遠裔故以為名言法上部者律主之首有法可上或有出衆人上並名法上部從人立稱言賢胄部者賢者部主之名胄者苗裔之義是羅漢之苗故從襲為名言正量部者權衡刊定名之為量量無邪謬目之為正此部所立甚深法義刊定無邪自稱正量從所立法以為部名也言密林部者林木蓊繁密從居處為號或有釋言此等四部釋舍利弗阿毗曇義有少者以義足之後名造論取經義添既乖本旨趣遂即部分言化地部者部主之身本是國王王所統攝國界地化地上人故云化地捨國出家弘宣佛法從本為號號化地部言法藏部者亦名法密密是藏義含受正法如藏之密從德立名此部師立五法藏經律論呪五菩薩本事既乖化地遂分宗言飲光部者梵云迦葉波此云飲光婆羅門姓上古有仙身光映蔽日月故云飲光部是彼之胤故言飲光言經量部者此師唯依經為正量不依律論即經部依彼所立而為部名分別部了明分部時者潞云初大衆部四破本五破即於二百年初大衆部中分出三部一説部二説出世部三雞胤部次於大衆部二百年中又出一部名多聞部三於第二百年中大衆部中出一部名説假部四於二百年末有出家外道捨邪歸正亦名大天居在制多山後與天衆重議首時五事因茲乖諍分出三部一制多山部二西山住部三北山住部上座部經爾許時一味和合至三百年初有少乖諍流出一部名一切有部二次有部中出一部名犢子三於犢子部中出四部一法上部二賢胄部三正量部四密林部四又於三百年中有部中出一部名化地部五於第三百年從化地部中出一部名法藏部自稱龍衆我大採菽氏為師六三百年末有部中出一部名飲光部七四百年初於有部中出一部名經量部自稱慶喜為師從三百年初至四百年初分二十部訖頌曰佛滅百年餘二部本初破年經侵四百分部二十終於中初大衆四破從成八初從後各三宗三二皆唯一兼本成九部從初三百年上座時分七從三四部分從單各立宗法上賢胄正量飲光密林經量法藏亦名單立本未成十一初分已後破各檀一方行細分部所由廣如諸章杪説言二十二宗者清辨菩薩護法菩薩二宗各別則云一勝義皆空二應理圓實二宗也依教分部出了言今依文判教等者依文已判諸教云但有三準義分類分宗宗乃有八宗輪論明十一類故或可但是以類言之大乘二宗彼類故亦未必依一十一類説也言一雖多説有者潞云多分依彼依他圓成説諸法有不言遍計亦是有法者依圓空者遍計其中有大衆部經量部以同大乘故著多言言不盡空者若望生空即不違若望法空正相違也言二多説空宗等者潞云唯依遍計性説諸法空不説依圓亦是空法所以疏言雖多説空亦不違有也言三非空非有等者有為無為名為有即是非空説我及我所名為空即是非有又云前之二時總談空有而不定言今第三時顯説空有而定言之非有不同初總説有非空不同第二時總説空非有但是遍計非空依圓不無由是第三名為中道言此等三教如前引文者問凡所立宗次憑教理判三時教何處有文答疏云此等是即深密經是也化度問云此之三教無非佛言捨有觀空何所利益若唯住有以非空滯生死而無所證若唯住空而非有滯涅槃而無所利謂成無住空有雙觀不同凡夫唯住有故常憎生死不同二乘常住空故不行利樂常住涅槃又云若唯明有行以非空妄想以之而更長但習空行而非有真心無因而不生故滅妄想於空門起真心出有府雙觀空有方成中道古詩云入定觀空有出定空有吟還將出入意返觀空有心廢有還歸縛行空復被侵只教一念裏回跨兩邊心章敬云深密經文意者令諸有情知一切法如是如是空故非有如是如是有故非空了達諸法非空非有遠離疑惑顛倒僻執隨其種性起處中行漸次修滿隨其所應永滅諸障得三菩提證寂滅等佛涅槃後魔事紛起部執競興多著有見龍猛菩薩證極喜地採集大乘無相空教造中論等論究暢真要除彼有見聖提婆等諸大論師造百論等弘闡大義由是衆生後著空見無著菩薩位至初地證法光定得大神通事大慈尊請説此論理不無窮事無不盡文無不釋義無不詮疑無不遣執無不破行無不修果無不證正為菩薩令於諸乘境行果等皆得善巧勤修大行證大菩提廣為有情常無倒説兼為餘乘令衣自法修自乘行得自乘果證得如是略説此論所因辨曰現在未來三世皆有三時物性宜然教起定爾也上教判了言我法俱有者問二十部師皆是羅漢如何計我為其宗答攝云二解一云是佛在時涅槃會下犢子外道苗裔從古而言名為有我自破云餘之四宗有我如何二云習氣我故言何失問諸部皆然何獨於此答此文之五部昔執我增今雖得果習氣強盛約斯辨計故不相違章敬云此宗立有補特伽羅非即離薀謂即薀是我佛説無我但遮外道即離薀我非預我宗乃至成佛此我方盡又執法有同薩婆多是故稱為我法俱有宗等者此前六宗疏云等者不知等語凡攝幾部諸師所説非疏本心今依先師百法記及宗輪論此中等言凡攝四部謂法上賢胄正量密林兼本為五準唯識中犢子計有五法藏謂三世無為不可説藏彼執非即離薀我攝在第五不可説藏如大乘中出真如理立常樂我淨亦名不可説三世為三無為為四別説不可藏為第五此不可説即是所計非即離我然能計心即是法執若爾現有我見云何得無學果答依觀即薀離薀之我為空得彼無學不是更計當有此我得為此宗若爾餘部皆有法我何唯犢子部為正此計也答法執同餘宗即無如是所計五薀藏也不可相例此言等者等餘五部法上賢胄正量密林山經量以經量部有勝義我犢子有我非即離薀有我義齊故合立一宗於中非一一皆得齊也諸宗皆爾言二有法無我宗等者等餘四部為謂一切有部多聞雪山飲光章敬云此計法有而我言無此薩婆多計一切法皆是有宗計現同故言等也言法無去來等者等取餘六部雞胤制多山西山住化地法藏部并本部成七計一切法現在即有過未即無不同有宗三世皆有也此現在剎那法有作用故名有過去法已滅未來法未生所以名法無去來也言四現通假實者此等等經量并本等二也此師計現在一念法上通假通實薀界門中實處界門中假粗色是假細色是實若大乘宗即粗色是實細色假文微子微等此師有宗弟子師資相承合為第二宗收以現兼假實故第四宗攝不同第二三世皆實也言五俗妄等者問此後兩部更不攝餘部如何言等答攝云等等當部之中本末差別故言等也此部計俗即是妄名世間也真即是實名出世間也言六諸法假名等者世間出世間一切諸法皆無實體但有假名也且六宗連帶意者如同五漸略一我法但有宗第二宗師云前宗大寬我宗向上一切法上都無有我唯有法也第三宗前師雖計有法無我然法中通三世猶自太寬我宗過未無體只有現在法第四師云汝前師現在法上皆實有亦太寬我宗現在一念法上通假通實第五師云前師總通假實亦太寬我宗中俗則妄真即實第六師云前師俗妄真實亦太寬我宗諸法但有假名都無體也問前未周朝遠法師所不攝者有四種部類我今此六宗之中何宗所取答舊四阿含及僧祇律即是第二宗收彼有大衆部義三彌帝論第二宗收彼有雪轉部即上座部義梵網經六十二見經第一宗收彼有正量部義四分律是第三宗攝彼有法藏部義也言七勝義皆空宗等者謂一切法依世俗諦有為無為可説是有勝義門中有為無為皆悉是空也此即南宗勝義空也謂如來在世於第二時説般若等明諸法皆空佛滅度後四百年前小乘宗盛四百年後大士興世名曰龍猛廣立大乘勝義空宗破於小乘有執偏病往於龍宮誦出大乘後依般若成立空義雖一切法皆不可言由性空無故不可説為有為無若約勝義體雖是空世俗可有後有清辨菩薩祖述文殊龍猛尊聖説一切法世俗故有勝義皆空彼引大般若設有一法過涅槃者我亦説為如幻如化又云理云若法有體自合能生生現藉緣明非是有佛滅四百年已來提婆師龍樹龍樹師清辨清辨師文殊依般若經造智論及掌珍論説俗諦門中心境俱有勝義門中心境俱空菩提涅槃體亦非有即以無所得遺其依圓故掌珍論云真性有為空如幻緣生故無為無有實不起似空華上二句顯有為空下二句顯無為空此一頌立二比量前二句破有為後二句破無為初量云真性有為是有法定是空故為宗因云以從緣生故同喻云猶如幻事幻事從緣生幻事體是空真性有為從緣生聞彼幻事體是空又清辨後無為量云真性無為是有法定是空故為宗因云以不起故同喻云猶如空華空華本不起空華本是空真性無為亦不起同彼空華本是空問清辨菩薩云真性為是有法此有為是何宗中有為若真性有為屬清辨宗總是空也若真性有為屬天親菩薩宗即非有非空夫論立義事須兩宗共許清辨菩薩言空天親言非空非有有法不極成過如説聲是法問此聲是何宗中聲若屬外道聲是常若屬佛法弟子宗聲是無常又因上從緣生緣生法是有不空又同喻上云猶如幻事大家眼見耳聞是有不是空又現於法上云空及至法因與喻並無空義問清辨何要將真性兩字向有為法上安著答清辨云我簡世間相違過大家知俗諦門中有為是有也又清辨云亦許俗諦門中有為是有也所以安真性之言簡不是世間俗諦有為也又云定是空表真諦門中有為也問清辨比量若成應可天親中道理破答清辨比量是似比量非是破真比量也元來天親中道義極成次護法菩薩比量破云真諦有為是有法定不空故為宗因云以從緣生故同喻云猶如俗諦中有為俗諦有為從緣生俗諦有為體不空真諦有為從緣生同彼俗諦有為不空量云真諦有為是有法定是有故為宗因云以二諦之中隨一攝故同喻云猶如俗諦中有為俗諦有為向二諦之中隨一攝俗諦有為體不空真諦有為向二諦之中隨一攝同彼俗諦有為體不空也言應理圓實等者按世親傳云佛涅槃後三百年中有羅漢名迦旃延子先於薩婆多部中出家後往罽賓國與五百羅漢共撰婆娑論祕不流行於多時五天不覩後東天竺國有婆須跋陀聰明大智往彼習學記得流行衆生聞者執著於有大乘空義多皆隱沒三百年外有南天竺國龍猛菩薩提婆菩薩造大智論釋大品經造無畏論十萬頌提婆造百論等為破小乘外道執我法故説之為空時人聞之多皆著空後九百年北天竺富樓沙國有國師大婆羅門姓憍尸迦有其三子皆名伐蘇畔度此云世親雖同一名號即各別第三世親於薩婆多部出家得無學果其第一者有菩薩性有部亦中出家後得離欲思惟空義不能得入欲自煞身有賓頭盧阿羅在東毗提呵洲觀見此事從彼方來為説小乘空觀意猶未安謂理不應心因即乘通往兜率天咨問彌勒彌勒為説大乘空觀還下思惟即便得悟因名阿僧佉此名無著爾後數往兜率陀天咨問彌勒菩薩大乘經義為餘人説聞多不信即自發願請彌勒下説大乘義令衆生見皆同信受即如其願於夜分時放大光明集有緣衆於阿瑜闍國説瑜伽論一百卷其中廣明五分一十七地義初五十卷明本地分次三十卷明攝決擇分次有兩卷明攝擇分次兩卷攝異門分後十六卷攝事分攝事分中義類不同為一十七地五識相應意有尋有伺三三摩地俱非有心無心等聞思修所立是具三乘法有餘及無餘是名十七地亦申十支一略陳名數支百法論二粗釋體義支五蘊論是天親造三總包衆義支顯揚論無著造四廣包大義支攝大乘論無著本世親無性釋五廣陳體義支亦名分別名數支雜集論無著本覺師子安慧二人釋六離僻彰中支辨中邊論彌勒本天親釋七摧破邪山支二十唯識論之八高建法幢支二十唯識論天親本護法菩薩等釋九莊嚴體義支莊嚴論彌勒本天親釋十攝散歸見支分別瑜伽論護彌勒造始終一部盡因相應籠綰十支皆稱五分一十七地菩薩壃四十二賢離離別位所以五天菩薩學之者地雄八國高僧傳之者人秀隨所記出隨解其義經四月夜十七地論方終雖同一會唯有無著得近彌勒菩薩餘人但得遙聞或有見異時無著菩薩依深密瑜伽等説一切法有空不空申中道宗破彼空執世俗諦中遍計所執情有理無依他圓成情無理有勝義諦中一切法體心言路絶非有非空非由體有名不可説又立理云法若無體豈因緣生現説從緣生明須是有故彼所造唯識論云我法非有空識非無離有離無故契中道慈氏頌曰虗妄分別有於此二都無此中唯有空於彼亦有此故説一切法非空非不空有無及有故是則契中道此中初二句顯依他上無能取所取次句顯依他中有圓成實真空妙理次句顯彼真理上有此依他非一非異故後句易知此是中邊頌虗妄分別有者謂有所取能取分別也於此二都無者謂即於此虗妄分別永無所取能取二性也此中唯有空者謂虗妄分別中但有離所取及能取空性也於彼亦有此者謂即於彼二空性中亦但有此虗妄分別也一切法者謂諸有為法及無為法虗妄分別名有為二取空性名無為依前理故説此一切法非空非不空由有空性虗妄分別故説非空由無所取能取性故説非不空也有故者謂有空性虗妄分別故無故者謂無所取能取二性及有故者謂虗妄分別中有空性故及空性中有虗妄分別故是則契中道者謂一切法非一向空亦非一向不空如是理趣妙契中道亦善符般若等經説一切法非空非有此是世親菩薩釋量云勝義諦中有為無為是有法決定是有故宗因云許真俗二諦中隨一攝故同喻云猶如俗諦中有為無為及量亦爾言成實論義等者正古説也問亦説八宗了疏主忽然此間明論未足古師造章疏皆依成實論緣此論是羅什譯明種子義分通大乘古時大乘師造章疏皆依成實論小乘師亦依成實論大乘師認成實論是大乘論小乘師認成實論是小乘論古人定不得疏主聊簡云成實論義是經部師宗現是經部師宗即小乘論也問前來四宗中人判成實論是立相宗一切法都無體性唯有相狀如何疏主此間判為現通假實宗現在法上計有一分實義莫違著四宗中破性立相宗耶答疏主兼望料簡道古人錯判他成實論向破性立相宗中收化度云自古諸德莫分大小言大乘即不同攝大乘等若言小乘復破雜心論於此二宗回互不定今時類例故此即第四宗即是小乘經部師義也與大乘果也言雖差別等者正結意也若據少分差別不同則含有二十二宗若據全分差別則合有八宗化度云此略攝廣也謂以八宗攝二十二宗也言然華嚴云者理教一味頓漸隨根謨云別論頓漸此引五本經一論出頓漸文亦云會前教意問如來教法現言一味更無兩般如何説有二十二宗八宗差別恐人疑實有爾許多差別所以會前二十二宗八宗差別云如來教法若不對根説只是一般教若將教對根將根顯教則有八宗二十二宗便是漸教頓教但由衆生悟解不同得諸果異今此間會前差別意也引華嚴經論證如來法無礙解於一字一句法上演説無量無邊教法菩薩摩訶薩聞一宗法解一切法此證教同如來説無是一般更無五乘但由衆生悟解不同聲聞了悟一半菩薩雙悟也言無垢稱經言等者前華嚴經中證法無礙解此無垢稱證聲即詞無礙解解諸方言音如來亦無千般萬般音聲説法只一般言音四生九類聞者皆悟解各見世尊與他作本國言音説法此上二經證教同衆生悟解有二也言無量經言我等者常説諸法不生不滅者離四相故不去不來者離三世故無彼無此者離自他故無得無失者離增減故一相無者真如向上無差別相故名一相無者六塵男女大小等十種相故名無相即無相狀相非無體相此約理同得果異故言但由衆生等者出頓漸所以也問前來顯時中早説頓漸此間又説莫不重耶答此間説頓漸而顯時中別顯時中時教上有頓漸會所被根此間將根上有頓漸會能被教教上元來是一般亦不説頓漸也但由衆生悟解證果不同遂於教上乃有頓漸也言法華亦言一雨等者一雨證教同草木生長次根異即是教同根異也言優婆塞等者即象馬兔三獸足有長短力用別故得水淺深不同此説理同證異問如何説教之次此間忽説理耶答將理同返證能詮教同理上本無淺深自是智證有淺深如來教是一般自是衆生悟解差別言攝論亦言等者末尼即珍也能雨種種寶物應衆生願亦名如意珠隨意所須皆須天鼓即帝釋幢上之鼓不鼓自然而有音聲帝釋與修羅戰時鼓中出聲怨未言來怨去不受樂交受樂受樂多即交生厭如是珠鼓是無情實無有思能成自事珠況佛身珠體現是非情元無分別任運能隨求者之心法合佛身已無加行尋伺隨一切衆生求者之心現種種身將天鼓況如來説法天鼓能隨衆生四般所作事業如來已無加行尋伺任運能滿衆生隨意樂欲説三乘教約教而論教本無差別由此即證教同根異也言故知諸教等者總結頓漸也故知諸教本無差別結頓也由機不同等者結漸教也大即菩薩小即二乘頓即直發大心漸即得勝捨劣也言此經且當大漸等者屬當頓漸屬當通別宗且者是意不盡之語流通分中通頓故言且路府云現有大漸亦合有小漸大頓小頓從聲聞果取緣覺果名小漸有聲聞性緣覺性不發聲聞心直取緣覺果名小頓此非疏意疏意云大小乘中此經當大乘頓漸教中此經當漸教故言大漸之教言此依他等問此經流通分中亦通頓教何故空言通漸教答疏言此依他誘等且依八品正宗化回心聲聞者説言妙莊嚴王等者問疏主引妙莊嚴王品中定性聲聞為證頓教為證漸教答有云疏主共頓教經文一處引未證頓教若爾為是小乘頓教為是大乘頓教若是小乘頓教與半教何別若是大乘頓教則前説無文答但是顯聞法華經得果差別亦不妨也不定性聲聞回心向大取佛果定性聲聞取小乘初果又云疏主欲擬引向下流通分中經文云緣彼流通分中妙莊嚴王品云得法眼淨通大乘小乘恐人疑此一節經文是大乘法眼淨疏主所以先聊簡也所以疏言即初果等即知是小乘也此解為正也若證頓教漸教上下無文也言壽品中等者次下引壽品普門品兩品經文證頓教也言可成頓教者此一句疏結前兩品頓教經文故言可成頓教也言故知頓漸漸等者結前來通頓漸經文也問既無別教文何處得有爾許多差別教典耶答隨根已分故此通也疏主意我此間不同古人問教上説頓説漸頓即定頓漸定漸今此間一切隨根以分也謨云法華經通頓通漸傍被正被也故言故知等三半滿二教滿宗者通別兩宗引文判定謨言屬當經宗賀云有五重別一約自利名半他名滿二約理解一唯證生空理名半兼證法空名滿三約智解唯得生空智名半兼得法空名滿四約障解唯斷煩惱障名半兼斷所知名滿五約二死解唯出分段生死名半兼出變易生死名滿問何故有作無作二類取半滿二教之中唯取滿不取半耶既化回心聲聞何以不取半教答今言不取者唯説小乘是半教即不取也今言取者大小乘雙該即取也故經通半滿教故涅槃云為聲聞説半字為菩薩説滿字大可兼小大強小劣也言生法二空通等者安樂行品云又復不行上中下法有為實不實法法空也亦不分別是男是女生空教也初周云唯此一事實即法空餘二即非真生空也第二周云牛車是法空羊鹿是生空第三周中化城是生空寶所是法空故言通二教攝也言有作無作等者新云安立作謂修作更有可修作名有作言無作者更無可作名無作且有作四諦者分段生死為空諦有漏業煩惱為集諦有餘無餘涅槃為滅諦生空智為道諦無作四諦者變易生死為苦諦所知障為集諦無住涅槃為滅諦法空智品為道諦初一重四諦名為作離此一重四諦外更有一重四諦可作名有作問若約不定性聲聞説回心已後更有可作若約定性聲聞説只此四諦上得名無作答只是定性聲聞自不作豈得道更無可作耶此經既一會二歸一故通兩門問初地菩薩雖斷二障證二空理猶自更有餘九地障未斷理未證應可初地菩薩不名無作答若初地望十地更有可作不合名無作今説第二重四諦外更無可作名無作言世俗勝義等者初釋總名者世者可壞破義俗謂顯現隨世流布義亦名隱顯諦亦名勝義諦亦名第一義諦亦名真諦問何名諦答諦者實義有如實有無如實無有無不虗故名為諦俗即諦持業釋二者勝義諦無分別智是出世間故此最勝故名為勝此智所緣境義名之為勝義勝義之諦依主釋安國云勝人知故名為勝義亦名真諦二釋別名者一世間世俗亦名無實諦謂軍林瓶瓫等經云如轉輪王起種種兵而往討罰二道理世俗亦云隨事差別諦即薀處界等經云五衆之生滅等三證得世俗亦云方便安立諦謂證四諦理等經云謂是苦是苦集是苦滅等四勝義世俗亦云假名非安立諦依空顯實是經云我等內滅自謂為足等是勝義四者一世間勝義亦名體用顯現諦三科法門是經云堂舍高危等喻五薀也二者道理勝義亦名因果差別諦諦謂苦集二諦世間因果滅道二諦出世因果經云諸苦所因貪欲為本等是三證得勝義亦名依門顯實諦謂二空門所顯真理經云不如三界見於三界等是四勝義勝義諦亦名廢詮談旨諦即是真法界離戲論故經云諸法寂滅相不可以言宣等是此第四亦名第一義諦出體者即五法立八諦一瓶盆二三科法三四諦行相四二空門五一真法界初一諦唯俗非真假名無實體最後一諦唯真非俗謂廢詮談旨諦中間三法亦真亦俗初三真是後三俗亦是所望勝劣別體無來是一若將此中間三句若對第一俗非真即屬四俗諦收若對第四真非故即屬四勝義諦收第一真與第二俗同是三科法為體第二俗約體第一真取三科法上用不取體經通真俗故言隨應分二言雖知通旨等者若約通宗説此經通生空法空有作無作世俗勝義無有不是一乘若論別義隨別所明正將一乘為宗也問一乘以何為體答攝云一乘為宗取根本方便之教理行果為體古有四解一云萬善之因是此經宗此經宗歸一乘一乘既以運載為義萬善之因能運行者至於佛果故果位修滿故非運也乘義不通故取萬善之因為宗大品云是乘提三界中出至薩婆若海中住既云中住明非進義問此初明因後門辨果云何偏以因果為宗答後彰極果為成前因以行一乘之因得壽量故舉果成因為宗二云唯取果乘為宗夫欲識經宗直親經題云妙法者謂如來靈智體陶冶塵澤衆垢斯盡立以妙名湛為物軌所以稱法因中不得塵澤未盡不得妙名故以果位為經宗所以釋也迦玄旨始唱難智慧甚深多寶讚揚稱大慧平等三云具以一乘因果為宗故以蓮華不有則已有則果實俱含此經不説則休説則因果雙有故以因果為宗四云此經以無著為宗經云衆生處處著引之令得出攝云四解總擬一云唯取萬善為因乘不取果乘此解不然諸佛究竟道樂利樂他故即是運載得名乘何故言果中無運載又方便品中論説因果相開示悟三為果入佛知見為因即是因果雙説何故空取因耶然大品經云薩婆若海中住者約自行滿一相而説二云唯取果為體此亦不然因中無漏願行何故不取豈是塵澤不與妙名經云乘此寶乘直至道場正是經宗也三云其理少通然不取方便之因義乃不足經云汝等所行是菩薩道道者因義方便若非是大乘因云何得言是道菩薩漸得成佛四云若無著為宗者何指此經餘經聖教豈交人執著也言故下文言等者證一乘為宗初如佛不慳大乘故得經云今我等方知世尊於佛智慧無所吝惜所以者何我等昔來真是佛子而但樂小法若我等有樂大之心佛則為我説大乘法次知佛唯以大乘化故得經云今此經中唯説一乘而昔等疏引此文後法領今得經云是故説本無心有所希求今此寶藏自然而至如佛子所應得者皆以得之言故此定以等者準上所引經文故知此經定以一乘而為宗也言一乘之義者略指也下有一乘章廣分別也言第三解經品得名者既知經之宗旨便明經品得名來由緣何得名妙法蓮華經序亦第一故此第三解經品得名言且經題目等者謨作此科判有何所以答且經題目一法二喻法謂妙法華謂蓮華法華既是唐言根本從他梵語所以第一名唐梵得名支第二行果得名支者即當隨勝中第五勝出分段體中通取因果理智以為一乘開示悟三是果入佛知見為因因即是行故名行果得名支第三教理得名支者即是第六引攝殊勝體以詮旨亦名為一乘教隨物設趣妙難知理假智冥體深頗測名教理得名支第四四流得名支即真實體中根本教理行果等然名依體立舉體成名出體既各不同名於是有異所以辨三種得名行果教理四法然前二説非全無據取義未同末後古人錯解經文喻寬法狹所以第五於得名中有會有破故有會破得名支得名既定故將六離合釋次第解釋故有第六離合得名支故此六支不同先輩也且者此門雙明且解經題未説品題故言且也言薩者正妙之義者問何以知薩是正妙之義答疏言故法護等薩之一字含得此方兩個若正妙之義故二三藏隨本翻譯答取一義立名也晉朝竺法護取正簡邪名正法華經後秦羅什取妙簡麁名妙法華亦攝釋敘天台解更有真法好法真即對偽好即對惡議曰真法好法既非佛言不可人情而加也問若薩之一字含正妙之義如薩婆多薩迦耶見復是何義收耶答薩婆多者即是有義薩迦耶見者即身義問一種同薩何故不含正妙之義答薩字雖同義即全別然西方立字有其二種一者字界二者字緣緣由也界者體也且如薩字含正妙二義助者如言婆多助薩便成有義迦耶助薩便成身義金云所以竺法護言正為對內外兩耶一者九十六種外道所説名邪如來説者名正二者所執五乘有異名之為邪所以者何答十方世界尚無二乘何況有三今執五乘乖一乘道理故稱為邪今對五耶説一為正正直捨方便也今羅什云妙為對內外二粗一者外道所説無義之語名為粗如來所説稱之為妙二者二乘教法是方便説理非究竟名為粗故攝論云二乘是粗淺道對此粗法故説一乘為妙攝云兩個三藏相形立名亦無偏取正亦無偏取妙也且五乘對外道不可空名正不名妙五乘對一乘不可唯是粗不是邪故知外道對五乘亦得名粗亦得名邪五乘對外道亦得名正亦得名妙五乘對一乘亦得名粗亦得名邪一乘對五乘亦得正亦得名妙五乘中空教大乘對中道一乘亦名粗亦名邪攝云兩個三藏道理恰齊不可強定勝劣然賢法師見攝云五乘對外道亦名妙問五乘中人天乘既是粗法如何説妙又破云攝釋既自許二乘方便行為一乘因是菩薩道何得名耶答謨云人天乘妙三乘為邪共不妨言人天乘妙者對外道説亦名妙二乘名邪者若約邪見名邪二乘則無若謬解名邪何妨亦有故唯識云今造此論為於二空有迷謬者生正解故迷謂凡夫外道謬則二乘既有謬解何妨有邪又四十年前道會修行亦名邪今日正直捨方便名正故知兩義燈齊行盡無勝劣問二個三藏取妙正二皆有理何故羅什偏取妙義答妙字有三義勝故一者經有妙言文無正等稱如云我法妙難思又云是乘微妙清淨第一又云能生淨妙第一之樂又云聞佛柔耎音深遠甚微妙又云此經甚深微妙諸經中寶二者妙是讚嘆之詞勝於正字經云如是妙法諸佛如來時乃説之又云容顏甚奇妙三者就義正摧以正形邪受稱妙以待粗為名正則簡邪妙即簡粗九十六種外道是邪不是正佛法五乘是正不是邪五乘雖是正猶粗一乘獨稱妙問當日佛説者為復是正法華為復是妙法華答如來説者是妙法華經云説大乘經名妙法蓮華昔時求者亦名妙法蓮華正狹妙寬正不如於妙妙謂殊妙勝妙善妙巧妙深妙要妙經云佛坐道場所得妙法又云智慧甚深微妙故如妙字道理長也言達磨法也者梵云達磨此云法也謂教理行果唯識論云法謂軌持軌謂軌範可生物解持謂任持任持自體今此法者約體而云即真如為法經云示佛知見故出現於世涅槃經云諸佛所師謂法也妙之法故名為妙據用言之智為法經云悟佛知見故出現於世法即妙故名妙法先真如法有體無為後智法者有體有為理之與智並在果位此取於果方名法也因位理智亦名為法經云入佛知見故出現於世此取因行名法也言荼利迦等者四色之中當第四也睿法師序云一崛摩羅華未開底華二迦摩羅華已開華三奔荼利迦亦云芬陀利華正開底華化度云蓮華三內分別一約法聊簡問如智度於陸生華中須曼那華為第一水生華青蓮華為最上今者何故取白華以喻法耶答若喻如來之眼即青蓮華為最上若喻一乘法即取白蓮華為上故維摩經云目淨修廣如青蓮問設喻一乘妙法何用白蓮華耶答白是衆色之本一乘是諸乘之源經中有七白一白蓮華二放白毫光三駕以白牛四覆以白疊五手執白拂六妙音白銀為葉七普賢乘六牙白象有多白言故舉白華為喻也二約人聊簡者問自餘諸華亦有白者亦能生果何不取為喻乃取蓮華為喻答四解一者一華一果二華果相資三華果同時四果居華內且一華一果者餘華但著一果此法不爾雜修一乘之因感有多果感十王果乃至菩提涅槃果二華果相資者餘華或有住華而而果或雖有果而非成就餘法亦爾或雖修行而無所證之果謂外道等持雞狗戒或雖所證之果而無究竟成就如趣寂聲聞等身灰智滅同太虗空此經不爾若有華定有果定成就故經云佛告藥王如來滅後及現在世四衆八部聞法華經一偈一句乃至一念隨喜者我皆與授記當得阿耨菩提三華果同時者餘華與果必不同時此經不爾教理行果俱有同時之義四果居華內者蓮華之實藏在蓮華之中一乘理果藏教行之內故取蓮華為喻三約喻料簡者問取蓮華為喻於其妙法何理相當答有十義如釋疏題目處説也言西域呼白等者問何因知奔荼利迦是白蓮華答疏言西域呼等問為復是翻奔荼利迦喚作白蓮伏不是答西域人風俗喚白蓮華作奔荼利迦亦不是翻奔荼字作白荼字作蓮迦字作華也但是風俗大家喚也言故新經説等者四色之中次第配亦當第四白色也言蓮者芙蕖秀實者問何名蓮答蓮是華之果秀者出水義實者結實義蓮華白月滿足向水中結實故言秀實也芙蕖二字是華體況因也秀實二字是蓮體況果也喻上況芙蕖華上結實法中論一乘因上感果也秀實俱是果也芙蕖俱是因也問秀實者合是結實何以喚作出水義答雖然秀實是結實義不可向水底結實事須水上結實正是蓮華結實時便是蓮華秀實時出水方能結實結實之事須出水正説蓮華結實了兼説蓮華出水了但説蓮華結實便帶得出水義秀者出水義實者結果義上解蓮字言華美也華美白華者疏中有四個華字最向上字最向下字正合作華字中間兩個字合作華字又華有三名一名華二名芙蓉三名芙蕖也亦名荷華亦名萡𦸁也有人呼萡𦸁作華開敷總非也攝釋云萡𦸁者荷華名問何名草下作化名花也答草喻聲聞行花喻菩薩行草化曰華將草就化名之曰花法中論聲聞未回心時所修之行不名菩薩行回心了聲聞行總化作菩薩行草上花開花上結蓮子菩薩上招佛果故草化曰花問何故草下作幸作華音呼耶答草喻聲聞行華喻菩薩行華者華美美好之行喻上説草頭與向下幸字各別著不成華字也法中論聲聞四十年前所修之行不成菩薩華美之行喻上説將草就幸故成華字回心了曾聲聞行入菩薩行總成一乘美好之行故草下作幸名華也問何不草下作化作花音呼又何草不下作幸作華音呼何故將華字作花音呼耶答翻譯之主深意也字若作草下化作花音呼此花者因義但能結果更無餘能雖是結果之義失却華向上美好之能若爾字作草下幸作華音呼得否答唯得華上美好之德失却華上結果之能所以作華字作花音呼也華字則收於美好花音則攝於結果花音況萬行萬行能感果華字表一乘萬德一乘萬德一皆微妙也爾雅云其根藕況一切衆生身中本有無漏種子也其本密即是藕向上白拗也況新發意菩薩心種即是地前有漏修行也本即是密俱目白拗在泥中也其莖加況出泥水來到清水中況十地無漏現行其葉葭云況菩薩四無量心其華萡𦸁況二利行也其實蓮即是蓮華結果也蓮況四智菩提蓮中菂喻他受用身菂中意云喻自受用身又云菂況自受用身意況他受用身亦有説華況教華中臺況理華若不開敷無由得見臺教若不踰揚無由悟道理也化度問云蓮華喻此經由此名為蓮華經桃華杏華亦是華應名桃華杏華經答桃華杏華雖是華由著水故不喻經蓮華之者名為華不著水故堪況經問蓮華之華不著水不著水故將喻經蓮葉亦同不著水應合亦名蓮葉經答蓮葉雖然不著水不能生果不喻經蓮華體性不著水由能生果故況經問蓮華之體以生果以生果故不著水蓮葉不能生其果應當蓮葉却著水答不著之義是寬通蓮華葉俱不著生果之義是局狹何妨華生葉不生問蓮華之用能生果由能生果得況經桃杏二華能結果何得不將來喻經答生果是寬通蓮華杏華並生果不著之義是局狹何妨杏著蓮不著問若以不著名為經蓮葉之性亦不著若以生果名為經桃杏華亦生果答蓮華不著具二義故得喻斯經蓮葉桃華闕一邊以不具故非經攝也敘六問不敘六問言素怛攬者亦云修多羅亦言修妬路皆訛也此是經義應言契經今略云契一則契理二則契根舊梵語云修多羅此翻為線故攝論云貫穿縫綴以為其性貫穿所説義可稱為線攝持所化衆生目之為經若線貫華如經持緯故又雜心五義一曰涌泉義味無盡故二稱繩墨指定邪政故三出生出生法義故四顯示顯示諸道理及善惡故五結鬘貫穿諸法故如線貫華遇狂風而不散教貫根理逢邪見之不移又如來説為經弟子奉行為緯家語云君王守正為經臣佐奉行為緯國語云經之以天緯之八地天六氣為經地五行為緯又經者徑也三乘人成佛徑路俗書解云經者常也百王不易千帝同模名常昔有人進益國利人䇿天子扡得者是一卷尚書此是三皇五帝答國利人䇿名帝也孔安國尚書序云伏義神農黃帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常妙道也若將契字一處解則有二義一者契理二者契根應為四句分別一契根不契理如勝論數論外道五頂子説六句義雖契根而不契理二契理不契根如鶖子為二弟子説浣衣數息觀等三根理俱契即佛為弟子説法四根理俱不契即外道將神我向佛弟子邊説根亦不契理亦不契言妙法白蓮華等者問智度論云地生華中須鬘那華為勝水中生者青蓮華為上何故唯取白華答所用不同青蓮華喻如來眼白蓮衆色中為勝故喻此經欲顯此經文義甚深明白故言所以下云等者有三義故取白蓮一云如來説經題云妙法奔荼利迦經佛既親説不取餘色華二緣經上下意合取白華疏中引三般白白華白毫白牛金又引四度以白疊手執白拂妙音白銀為葉普賢菩薩乘白象三云白者衆色之根本如白綾絹等言梵本無別白字者問既是白華為喻經題何不安白字答疏言梵本無等意言更不假安白字但道著奔荼利迦便是白蓮華世間人言王色相似雪如也鶴色相似練如也便知是白不要言白字也上解唐梵得名了言然此經中等者指教標宗也前解盡解色塵向上蓮華未解法上蓮華然此得已下解法向上蓮華教為華理為蓮行為華果為蓮欲擬將色塵蓮法華向配先須定得法上宗旨所以三師定蓮華宗旨取義不同此第一師唯取行果為蓮華此師諍却方便品初教理文道未是正説但如來後得智中安立名字章句名權方便拂彼二乘未是正説若是正説已説經了何要鶖子更請又論云自此已下所説因果相因即入佛知見果即開示悟三若以説教理名經何言自此已下明知論主簡前教理也言多依因果等者多依者對前教理此中三周唯説行果對前少教理故名多依三周之中初周前三為果入佛知見為因初周因果雙説第二周説因不説果第三周説果不説因故名因故名因果理智也初周理智雙説第二周説智不説理第三周説理不説智又因果理智者因中十地證真如因中理二空理智名因中智果中理即法身智即報身果中開佛知見雙説理智示悟別顯故言多依上標行果言開佛知見者釋行果此一句標也問開者是何義答開者無上義此悟亦是總約所開説所開即無上所開之中只有法身報身二種悉皆無上若正明開義者出生顯證義出生菩提顯證涅槃也言雙歎理智法報等者釋雙嘆理智法字解上理字報字解上智字也言二種無上嘆勝等者出雙嘆意也有人問云開者為是佛自開知見為是開衆生身中知見若自開者佛開已文若開他者云何經云佛之知見答三解一云經文分明開佛知見又有便得清淨之言明知開佛知見二者開鶖子身中知見鶖子身中既有佛性何妨名佛知見又言清淨者約究竟説三者但是總相雙開嘆勝令鶖子欣也一切衆生身中有理行二性無始時來煩惱障覆如來為彼開演宣示令鶖子欣故所以嘆勝令欣也所以經云諸佛世尊唯以一大事因緣故出於世言示佛知見者示者同義示謂指示緣鶖子不知自身中有法身故世尊指示説向道一切衆生同有此性故名同義經云譬如乳牛有種種色搆之一處白色無異言悟佛知見等者悟者不知義一性看悟者正是知義何名不知答昔日不知今日悟昔時不知之事名位者不知義經云譬如有人至親友家等言入佛知見等者有三解二因也一與菩提涅槃為因名二因二者法身因報身因根本智與法身為因後得智與報身為因三理智二因者因中理智即是其因名理智二因也言行一乘因等者釋上理智二因也言等賜牛車等者引教證也諸子頓漸二悟菩薩言日夜劫數等者更經二大阿僧祇劫常得遊戲觀空觀有與諸菩薩及聲聞衆乘此寶乘直至道場言滅去化城等者引入佛知見所招感果也兼證理果為第三周滅去化城至寶所故故三周皆説因果賀云二乘之人回心向大滅於所得有餘化城至於寶所所指寶所是一乘果言與辨中邊論三種等者會他教意問第一師唯取行果為蓮華者辨中邊論三種無上亦是一乘莫此行果兩法攝法不盡耶又如何此説二種無上彼説三無上耶答疏云辨中邊論等云三無上者一正行無上謂六度回向菩提名正行無上超過二乘名無上即入佛知見因乘是也二所緣無上者因果理智對能緣心總名所緣即開示悟入三修證無上亦通因果修因理智證果理智化度問此中唯説行果二種將二攝三何寬何狹答相似此經説果果即開示悟菩提涅槃即是彼論中修證無上此經説入佛知見即彼論中正行無上合此因果對鶖子能緣心便是所緣無上也言能詮之教等者簡去能詮也問既佛從定起説教理二種何故初師不取教理耶答初師云能詮之教既是權方便所以不取三乘中二乘教不實故名㩲於三乘中大乘教教對理名㩲但是教名㩲皆不取緣未是正説問所詮理取否答若喚作教理則不取改却名字喚作真實乘取也問取作何用答欲令二乘行因取果事須依真實乘也言本論解方便等者引論成也此是行果師引論證成也自此已下明所説因果相結論文因即入佛知見果即開示悟三因即華果即蓮第二因唯明因華第三因明果華因即七地四菩薩行果即佛位菩提涅槃也言由此正取一乘等者意言無量義為菩薩説已行因故故但説教理蓮華此經與聲聞説令行因趣果故以行果為蓮華也行果了言若依論解無量義等者初引無量義經蓮華是教理會同此經蓮華亦取教理後釋此經同方便品初蓮華是教理會同無量義經蓮華亦教理此第二師云天親菩薩造法華論解西方無量義經彼國經有十七個名中第十六名妙法蓮華又第十四亦名一乘彼經是蓮華蓮華取教理此經是蓮華何故不取於教理彼經是一乘一乘是教理何故此經是一乘不取教理耶又此經唱諸佛智慧理甚深其智慧門教甚深正是教理何故取不取言十七名者論云此大乘修多羅有十七名顯示甚深功德應知一名無量義經二名最勝經典三名大乘方廣四名教菩薩法五佛所護念六諸佛密藏七諸佛德藏八諸佛密處九能生諸佛十諸佛道場十一諸佛所轉法輪十二諸佛堅固舍利十三諸佛善巧方便十四宣説一乘十五第一義諦十六名妙法蓮華十七名最上法門且第十六名妙法蓮華有二義解其蓮華蓮華有二義一出水義所詮之理出離二乘濁泥水故此無量義經能詮教唯大乘所詮理唯一真法界無量義經教下真如理亦名蓮華在凡夫身中我執所覆猶如蓮華在泥中二乘斷我執猶有法執所覆真如猶如蓮華在泥水中糅釋云羅漢身中法執由如泥水有漏功德猶如濁水無漏功德猶如清水化度云出水有二義一頓悟菩薩身中法空真如理設有法執迷覆著彼自是大乘法執不是二乘法執濁水既頓悟菩薩身中真如不曾被二乘法執染著性不與二乘法執相應名出二乘濁水如本不入水亦名出水二者漸悟菩薩雖有二乘法執相應法執染不著亦名出水如荷葉在水濕不著也言二開敷義等者由所詮理勝故能詮教上而立勝名也開者説也彼説真理名開真理也出水是理妙開敷是教妙華若不開敷無由見蓮臺是華中結子處也教若不諭揚無由得悟理雙結前二為理妙後為教妙也言又彼諸名第十四等者行果師暗難教理師云此經名蓮華亦名一乘彼經無量義唯名妙法蓮華不名一乘所以法華經蓮華與無量經蓮華不同答由此教理師大忽引文證云又彼諸名等汝行果師莫錯我無量義經解蓮華處有十七名十七名中第十四亦名一乘也言欲令菩薩觀機等者行果師却難教理師云既説無量義經教理名蓮華亦名一乘若爾蓮華一乘既是教理何不但喚作蓮華經何故要名無量義經答疏云欲令菩薩等問何不與菩薩説行果耶答菩薩自能行一乘因取一乘果更不要説行果此菩薩於自利行中剎那剎那轉增進故緣此辨於利他門中觀根受道藥病未能精審以彼利他門中以教藥為先與彼菩薩説道衆生性欲無量故如來説法法亦無量菩薩聞已於一乘教觀一乘理所以教理對菩薩正名無量義本來佛意只為説教理名無量義更不為餘人當時緣覺聲聞在無量義會下坐耳裏聞著無量義者從一法生鶖子等作念云無量義既是一法生莫十方世界中二乘從一乘中分出耶亦生此心教理對聲聞名蓮華問何故名傍答教理體不傍以不正為故名傍因聞獲益故名傍也所以教理對菩薩正名無量義對聲聞傍名妙法蓮華問無量義經對菩薩正名無量義對聲聞傍名蓮華法華會上法華經對聲聞正名法華對菩薩應傍名無量義經否答無量義不同法華會彼無量義會下有兩類人菩薩聲聞若法華會上正宗為聲聞説不為八萬大菩薩不傍名無量義也行果師又難教理師云何故將無量義經傍教理例同此經答教理體不傍自是聲聞無量義會下根未熟故未為正説所以説傍也行果師又難云無量義為菩薩説教理何不對菩薩名蓮華但名無量義答望佛本意將教理遣菩薩為衆生説但名無量義不名法華此談佛意疏中説頓悟菩薩蓮華處但是因解聲聞蓮華説有頓悟菩薩依教觀理亦有蓮華之義望佛本意不為菩薩説蓮華也量云無量義經是有法定説教理故宗因出水開敷故同喻猶如法華法華説教理出水開敷故名蓮華無量義經説教理同彼亦名法華攝量云妙法蓮華是有法説教理故宗因云出水開敷故同喻猶如無量義無量義經經説教理出水開敷故名無量義法華今既説理同彼亦名無量義上解無量經蓮華是教理會同此經了言方便品云諸佛等者將此經方便品初蓮華是教理會同無量義蓮華亦是教理章敬云前顯彼經正被菩薩而取教理今取顯此經初警聲聞而舉教理諸佛智慧理也其智慧門教也意顯此為定後法華前無量義為定前法華問若無量義經是教理此經蓮華亦教理二經何別答有三義別一出生攝入別無量義經教理從清淨法界中流出來故名出生法華經名攝入會彼二乘同歸一道故言攝入二者寬狹不同法華經能詮教通三乘所詮智慧通五種無量義經能詮教唯大乘所詮理唯一真法界五種智慧中唯攝得智性也三者無量義經隨衆生欲説觀根受道説也此法華經阿含甚深即昔三教四十年前根三教亦三法華會上根一教亦一二經相似取第二解為正也所説諸佛智慧為果能詮教為門如門為入室之所由教為顯理之處所蓮華但説二義因果故即智詮也言論自釋言等者初標論文其證甚深即五智慧性相伴境因即所證智有所證悟而得此智名所證智是所詮家之能詮智為證甚深若對所緣應名能詮智三周説皆是説方便品初智慧也言欲拂二乘令生等者論解此經者即以教理名為法華佛從定起歎於教理二種甚深欲拂二乘令生驚問初歎教理名為法華故言初也問方便品初説二種甚深教理時偏告鶖子不告菩薩有何意答疏言欲拂二乘令生驚問問拂有何意答令交生疑向他道二乘不知便是拂也經云假使滿世間等意徒交請也若不因佛説二甚深如何聲聞驚問若不驚問因何佛説開示悟入故知因説二甚深教理方始驚問即此教理名為法華也説教理時聲聞心雖未回且令聲聞心動聲聞亦心動便説此經引教回心趣大與授記也言從無量義處等者謨云意顯此經為定後法華也言總攬諸文等者標宗也四法總取離之不足合則時中總取四法名總攬初師偏取行果攬他教理不著後師偏取教理總攬他行果不著教理行果盡取故名攬總由此二義解總攬一攬他前師文義故二總攬一部上下諸文教者其智慧門難解難入理者諸佛智甚深無量行者得如是乘令諸子等日夜劫等果者諸法寂滅相説佛智慧故總攬此文為法華也此第三師取前兩師義總將來商量名褒貶問四法既總取為蓮華何更不引教理空引行果耶答有二義故不引教理也第一緣此經多取行果教理不是正取故不引也第二義教理師引文盡周足所以更不引也言教理妙法等者疏主指次第二教理師引文即證甚深為理妙法阿含甚深為教法只緣行果師引文不盡只取三請已後經文不取方便品頭經文問能詮之教任許不能取所詮理中五種智慧何得不引來又從爾時世尊從三昧安詳至三請已來爾許經文何得不引應非是經耶言行妙法者總標行體即初地已去無滿因行名行妙法言論釋入佛知見等者引論證也不退轉地者或是初地證不退或是八地行不退此定是無漏行也無量知業者即是佛果位中一切種智能知種別一切法故名無量智無量之智從境立名故言無量也業者即是能感因即十地無漏行正是佛果之因業也無漏行望佛果為正因即入佛知見故言正是也亦問汝等所行是菩薩道云何通答彼是經意此釋論文論亦不退彼經中作如是説也今且依論初地已去無漏行名行妙法行有二般一宅內行即地前宅外即是地上此約智增菩薩説二云宅內行即七地已前宅外行是八地已去此約悲增菩薩説今取初解地前地上以分內外以聲聞回心多是智增故取初解為正宅內即分段宅外即變易變易即無漏分段即有漏若地前一大劫只得言有漏資無漏不得名為入佛知見雖聞法華但得名為教妙法中收只得言教車不得上行車也經云乘此寶乘直至道場即初地已上得登牛車名寶乘也地前未得名寶乘不得登牛車故故知無漏因行名為一乘也上標無漏行了言譬喻品云等者標有漏行也下疏主科為如來果化問何名果答佛果經故教所詮故名為果化衣裓機案喻如來神通智慧功德望佛本意擬將果通慧頓受過與二乘衆生不交行行便遣成佛去長者思念長子解好惡即夫著門出去中小二子癡騃所以三七日思惟我將智慧之用機案頓受與中子成圓覺出三界耶以神通之用衣裓頓受教下品衆生苦抑通從三界而救度之耶交出三界生向淨土去耶我緣中小二子不肯著門出來夫中子升機案踰墻出去少子不解踰墻向我衣裓裏褁出去耶答思而不沒若欲得出事須著門過無有喻墻底道理若欲得出二種生死宅事須得一乘教行也言復云唯有一門等者問大乘寬廣何言狹小答如大海雖寬不宿死尸亦名為少今者大乘雖寬不容聲聞名之為狹不容緣覺名之為少二種生死唯有一種大乘教行而可出雖故言唯有一門下疏云喻及合文合有五門一唯有一門二所燒之門三狹少門四今在門外五以佛教門一唯中大正門唯大乘之教行二邊少迮門唯二乘之行初三即中大正門後二通二言又云我雖於此等者謨云一乘教行為外道謗毀名為所燒即此教行能出二死名之為門如來依此教行門中而出二死故名安隱得出問何名安隱得出答菩薩既被種種打罵菩薩一念悔恨之心不生苦惱即名安穩而出問何名所燒門答地前一大劫總名所燒門一者自燒菩薩修行次第忽然自退菩提之心名為自燒二他燒修行次第被他毀呰便即退心名為他燒不然即貪名利三毒在心亦名為燒此段疏文意取地前一大劫有漏修亦得名入大乘不得名入佛知見若不取地前者一大劫修應成虗設既云一稱南無佛皆以成佛道故知有漏亦取修行欲求出離還只從此所燒門出不可怕燒而不出也佛昔地前為常不輕菩薩時行菩薩行禮拜四衆等被增上慢比丘以杖木瓦石而打擲之當時更種種罵詈菩薩菩薩皆能忍受故知地前菩薩被人誹謗即是所燒也言大乘因行等者章敬云釋大行也雖下疏説教行為門今之所要正唯取行也賀云修行大乘四攝六度等行而得出離故大乘因行名之為門問云何是一乘行門答大乘因行等即是地前修之行名之以正是菩薩行處若不擬成佛即不要此行門中為門過若擬成佛事須著此行門過諸處無過處此一乘行正是菩薩所修之行故言正所行處故言二乘之因悲智等者章敬明云釋少行也此疏主本文之中解作如來果記此間解經品得名中疏主云何科云一乘之因悲智所誘衣裓機案隨宜出處兩文相違諸抄云云多解溜洲云此不是疏主解敘古人義攝釋亦云若是解即合前後相承今既前後相違故知不是也又溜洲親承疏主之後相傳不謬府云衣裓機案佛果功德體即悲智悲智即是能誘二乘之因是所誘能誘即是果化所誘即是二乘之因二乘之因是悲智家所誘謨云衣裓機案是如來通慧如來本意擬將衣裓機案頓拔中少二子思而不設既若不設共本來不得一種二乘之人回心向大二乘所修因行屬大乘行二乘之人宅內隱因宅外隱果二乘因總是無體無體之因似衣裓機案思而不設故喚二乘因行作衣裓機案也又有解衣裓機案是佛果功德佛本來擬將衣裓機案接引二乘人出三界入到淨土耶望如來説名果化也問何以喚作二乘因行答為二乘設故名二乘因行又有解云長者見是大火從四面起即大驚怖長者思念我交長子者著門出者中小二子行不得中子交升機案踰墻出去我將小子向衣裓裏將出去問機案為復是長者將來為復是宅中本來有也答衣裓是長者衣襟離却長者無別衣裓機案但是宅中家具也法中論世尊交中子還觀十二緣生四十四智七十七智出宅今此是隨宜出家故三乘之人所出分段宅則一般長子得車中小二子不得車中小二子宅內衣裓機案是無體思而不設門外羊鹿車是無只有名字但以假名字若欲得擬取初地門中車事須却著他正門裏出去不是正出處故名隨宜也上來三四解盡有理更有諸抄解極多不能保壽況座主諍諸抄更作一解準此抄意即二乘之因不名衣裓機案今將二乘之因同彼大乘衣裓機案是無即以衣裓機案無例二乘因行無也衣裓機案謂是神通智慧用故是此中意況問若一往疏文奄含似有此理若準疏文二乘之因名衣裓機案即是直因二乘之因何須言如彼不設而相例耶又復大乘通慧之用有何行相不配衣裓機案又前對不定性人畢竟須歸大乘隱彼之行言無如彼衣裓機案雖思不設者若爾對彼定性而不穩之即應定性二乘之行得名衣裓機案若許者還是衣裓機案名二乘之行與下果化還是相違如何通會答今正解者直取二乘因行名為衣裓機案準下衣裓機案有體用體即神通智慧用即衣裓機案果即約體用者即名二乘因前即云智慧之用衣裓機案問何故下言果化答所與是佛果故故云果此有三重第一佛思二乘不能頓修大行而取果我與設二乘行令行取大果不相應故而不設即名頓授大果頓拔彼苦第二思大乘因化門狹小故又不設之第三故説三乘而漸化故衣裓機案雖是二乘因行即此因行是佛神通智慧之用所設故説通慧名二乘因也亦同於一佛乘分別説三也意説就根名衣裓機案就體名果化也下云果化直取通慧體也又此慧用若就大乘因行良名為門也故疏言此云因下云果下云果者一則談體二則初思所與所與即體也言上來三乘猶居分段等者簡有漏非是疏主斷身手有力等三段經文若約行妙法有漏無漏總準經中道理如此若準論意就勝而説出宅登車無漏行即勝去佛果近故若有漏行去佛果遠故即劣所以此間聊簡也所以謨云譬喻品已下經文作簡所不取非理也即是地前頓漸二悟菩薩二乘有學未受變易者由居分段不與車名疏牒果化已下三段經文第三一節經文是二乘因行復兩節是頓漸二悟菩薩故言三乘也今者地前頓悟菩薩及五果回心未受變易者謂居分段故不與車此聊簡中雖總名行妙法於中地前菩薩不得車論主不取但約二乘回心了受變易者説得車不車也不説回心了未受變易者且將居分段為因成不得車宗比量地前菩薩是有法以不得車故為宗因云居分段故同喻如五果聖人居分段五果聖人居分段故不得車地前菩薩居分段同彼五果聖人不得車若然者便有不定過為如前菩薩居分段居分段故不得車證後七地已前悲增菩薩居分段居分段故得車此是隨願宅第二比量取受變易為因成得車宗量云初地已去菩薩是有法定得車故為宗因云變易故同喻云猶如八地已去菩薩八地已去菩薩受變易受變易故得車初地已去智增菩薩受變易同彼八地已去菩薩亦得車此亦不定為如初地已去智增菩薩受變易故得車證八地已去菩薩受變易故得車為如證五果聖人回心受變易故不得車答二乘之得教車哲法師云車有二種一者種智車車體也二者名教車車名種智之教亦名得車若泛論出宅得車不得車應作兩重料簡也第一出宅不得車五果聖人回心受變易者二不出宅得車七地已前悲增菩薩三亦出宅亦得車登地已去智增菩薩及悲智平等者四不出宅不得車不定性聲聞回心了未受變易者升地前頓悟菩薩是更有四句一出火出宅不得車無學回心受變易者煩惱斷盡故出火受變易故出宅不得智車故名不得車二出火不宅得車舍利弗無學回心煩惱盡故名出火居分段故不出宅得授記故得名教車三不出火出宅不得車二乘有學回心未斷盡俱生煩惱故不出火受變易故出宅不得法空無漏智故不得車四不出火不出宅得車二乘有學回心俱生煩惱在故不出火未受變易故不出宅聞經得記得名教車問論其實理二乘無學各據自果亦有其車何故今時而言不得答由彼後得不能親緣自解脫道相故言無車意令不定性回心歸大故而不説其實亦有對定性人亦作此説問二乘之人不肯修大可許於彼得智不與車名菩薩修大趣於菩提何故同言不得車答雖得因車未得果車故言不得意令速證無上果故若望名教車四人皆得若望智車皆不得言又云得如是乘等者此是經文證前論家行妙法即是論釋入智見令證不退轉地論解入佛知見唯取登地已去無漏行也若通論一乘體即因之與果有漏無漏皆是行妙法云諸子者即頓漸二悟菩薩俱證初地已上乘此一乘種智經兩阿僧祇方至佛位若二乘者乘無漏教及有漏乘經一大阿僧祇劫方入初地如是總名日夜劫數常得遊戲行二利行與諸菩薩及聲聞三種意生身乘此寶乘直至道場佛果位也菩提涅槃薀生道處名為道場言自在無繫者不生不滅不為煩惱及所知障之所繫縛名自在無繫也有漏果依善惡業之所求無漏不爾故云無依求也言方便品云等者證前有漏行也疏主意解入佛知見同論家意取無漏行若解妙法準經中道理兼取有漏行既言盡行諸佛無量道法有漏無漏總取故言盡行也言論云修行甚深者此論文證前有漏行也言故知佛果等者總結有漏無漏行能成之行亦名法也意取能成之行證行妙法也行妙法也言果妙法等者謨云初正取開示悟三後引理智無上別證於開名果妙法問何名開答開者出生顯證義出生菩提顯證涅槃若言開者是無上義所開即無上只有菩提涅槃除此二種更無餘事故名無上若更有法與此二種法相似即菩提涅槃不名無上如一國無二王方名為尊貴名開佛知見言同義者解示佛知見三乘法身本來平等衆生不知不肯修證此佛知見之性三乘同有平等無別令其修證故言同義言不知義者二乘不知究竟唯一佛乘體體即菩提故説一乘令修生長故名不知解悟佛知見也此三皆約所開示所悟之法名為無上言即是佛果涅槃菩提者證開佛知見也言下云諸法寂滅相等者證示佛知見名一乘言又云説佛智慧故等者證悟佛知見亦名一乘能連即智名之為悟也言故知佛果正智等者結佛果正智總名一乘也上來四法得名中約名申正理説言由此總言大乘等者標妙法具蓮華之德又解云此四句亦是四法得名支即割斷具取四法為蓮華道理言俱有出二乘等者路云俱有出二乘濁水便道四法向上總有出水義又見道蓮華之德四法向上總有開敷義此解非也謨云意對前二偏教理及以行果為出水開敷義故是故言俱有即教行並開敷理果俱出水不言四法俱有出水開敷未詳所以不得疏意也言教有能敷等者教為能敷理為所敷法有華上開敷之義蓮華有開敷之德由華開而見臺因教敷而顯理若無能詮教能敷唱其所詮理無由得顯若不尋於筌蹄無由獲於魚菟若不因教無由悟於理故疏云尋教詮究玄理等言理有所敷等者法有華上出水之力華臺有出離濁水之能顯理有出二乘之力此所詮理對前能詮教故所以理名所敷故言出水出水者真如妙理性離障垢故名出水言行有因敷等者法有華上結果之能因華方有蓮因行方得果故行如華能趣於果以行因敷當得佛果佛果所敷故故行能引果名因敷十地萬行齊修名因敷如華敷即有結實之功因敷即有感果之用言果有結實等者顯果能酬因如蓮結實有華本希結實結實則酬於華行因本欲果成果滿即酬於行果若不結實果即不酬因果既有結實所以果得名酬因即果中感得菩提涅槃三身塵沙功德具足故名結實酬因之能也化度云亦有疏本云為因之能而酬字二義皆得若言酬者前因故言為者非但只酬前因亦能更生後果故言然則法藉等者問教理行果得名妙法何要更將蓮華為喻答疏言然則等永云是顯蓮華喻妙法之意然則法有四能必假以喻顯然四法實是妙法要假法藉喻明微由著顯意明法喻相當喻上既含四法四法中寧不兼四皆為成立四法得名然者然前教有能敷等義則者則此法喻解得名之文章敬云微謂微隱著即彰著塵著將顯微隱微妙之妙法必由彰著粗著之蓮華故言微由著顯永云四法道理實是幽微要假世間蓮華粗著之法為喻顯得妙法甚深之理分明著由明也言故假奔荼等者假者藉也華以喻因是開敷義即教行也實以喻果是出水義即理果也又云因即入佛知見萬行果即開示悟三菩提涅槃也言法既囊括等者囊者袋也苞含之義有底曰囊無底曰囊即能成衆物法之一字含四個義教理行果俱名法法含衆義囊能感物故稱囊攝括字德宗名同至尊之稱不可指斥法上四義如囊攝物不乖本義言華亦包羅者所謂萡𦸁披敷以見蓮云云言法四義等者契者當也祕者幽隱之義賾者深也何以得知乎取不及名探探之不及名釣釣之不及名賾謂此言乎教契幽賾深妙之理故言微詮教也謨云契者約也此亦符會契合之義祕者切云神密也幽邃之義易云探賾索隱釣深致遠所詮理深故曰祕賾能詮教詮得深理故曰契祕賾唯妙法蓮華經教能詮此理故教名微詮也言叶幽機等者叶者合也幽謂幽微根謂根宜即是大乘利根衆生教下所詮之理能契合上根衆生之性玄旨者所詮理也此理與彼大乘性叶和合名叶幽根旨玄者深妙旨者趣也言尅上乘之奧等者永云尅者得也能也上乘者所謂佛果奧者深也葉者因義欲趣上乘佛果以何行為深業而能取得分道行亦不得人天二乘行亦不得唯有一乘行即能取得故言尅上乘之奧業也言圓覺等者圓謂圓滿至極之覺名為至覺十地已還皆未圓滿唯至佛佛果位至覺方圓圓滿佛果真宗名果妙也下疏云理凝本有出纏而號法身智照雜新生果圓而稱正覺果妙法也言美無不殫等者合解都歎四法也殫者盡也都官反意言四法各有斯能美事無不攝盡故名殫故稱為妙言華四義等者永云是華名因言蓮者果也因中十地萬行齊修如菡英披敷披敷者華開貌華若不開敷無由見臺蘂蘂只是華中臺蘂教若不諭揚無由得悟理諭揚説也況教既諭揚時方悟於玄理言芙蕖秀出等者況理也芙華花者蓮華名秀者出也靈沼者小池水名曰沼喻二乘生空理對法空理名沼二乘之人斷煩惱障得名靈沼大乘法空理名芙蕖秀者出也大乘初地法空理超過生空理如芙蕖秀出於靈沼也大乘理深廣無涯如大海也問既將池沼喻彼小乘之理云何名靈答小乘望大乘雖非究竟證理斷惑離生死苦證其聖果故名為靈沼言喻理頴超等者此是獨起也華秀出而離泥水況大乘法空理獨超於少乘理也又云華體本來離水況法空理本出濁水法執之外此一乘理逈超二乘羊鹿之少運言舉花開而得實等者花者白華之總名亦是蓮華之別名白華若開即得見於蓮實因行若滿佛果任運圓成言譬因嚴而果等者因謂萬行果謂佛果德此華不開則已開即必結蓮臺因中萬行不莊嚴佛果無由得圓滿因中萬行既莊嚴佛果衆相悉圓滿言標實結為華本者永云蓮華結實與華為本有二一華與果為本二者果與因為本此蓮子是其華本池中若有蓮子池上蓮華方得開池中本無蓮子憑何池上蓮華得開故知結實蓮子為華本也法中説衆生若有菩提種當來決定得成佛識中本無菩提種憑何當來得成佛實結者即是今果一個蓮子落池內池上一朵蓮華開一朵蓮子又結實蓮子却落於池中三春暖氣眴著時看即蓮華滿池發一個衆生若成佛展轉又説法華經如是相生無盡時何異蓮華滿池發蓮子喻菩提種蓮臺況佛果言顯佛智為乘原者佛智者即佛後得智也後得智能説三乘五乘教法名乘原原者本也因也莫猒池中蓮子多了了總是蓮華本衆生莫猒佛住世佛智能與佛為因衆生愛果不行因當來佛果何處得世人愛華猒蓮子明年華從何處來又蓮華有四一泥底蓮華喻凡夫真理在生死泥中故二濁水蓮華喻二乘真理在法執中故三出水蓮華喻頓悟菩薩性出二乘濁水故第四結果出水蓮華喻佛果菩提涅槃也言故假喻蓮華等者假者有解取真假名假不取喻依但取喻體名假也二者假者假藉也妙法甚深事須假蓮華為喻故言假喻也斯由此也此有來由也言準此理應法四等者有二義一云法既囊攝四義華亦包羅四德法向上四義似彼蓮華向上四義故名法四如華法上有契祕賾之微筌教也叶幽根之玄旨理也尅上乘之奧業行也圓至覺之真宗果也華上有萡𦸁披敷以見蓮類教踰揚以悟旨芙蕖秀出於靈沼喻理類超於少運舉花開而得實譬因嚴而果滿標實結為華本顯佛智為乘原法向上四義故名法四如華亦應為勝二者準此亦應法四如華者對前二師立名準者準此間道理也蓮華向上既有四義何故初師唯取行果何故第二師唯取教理若爾應合名為法二如華此乃喻寬法狹理必不然準此間道理教理行果四法總取方與他蓮華向上四義法喻相稱便為勝也下方便品疏云令識昔者教行方便説三今談乘體理果唯一聽三乘之教解一乘之理行三乘之因趣一乘之果故此教理行果總取為其法華為勝也天台大師解蓮華有七類第一有華無果即是狂華不結子唐占春光三二月日風來吹落沒人者外道之從亦復如是隨邪造惡編椽臥棘五熱炙身虗設功勞無利勤苦如狗逐塊塊打轉多隨邪造惡如開華墮地獄三塗如無子果第二多華一果如五停心觀別相念觀總相念觀三果四向總名有學多法具足名為多華同時得羅漢果名為一果第三一華一果如緣覺人從緣起覺故名緣覺觀四時雕變知色身無常了八節榮枯悟世間非久遂求出離一坐斷煩惱名一華證辟支迦名曰一果第四先華後果即是桃華杏華之屬即是今時持五戒來世得人身今生持八戒來世感天身故名先華後果也第五先果後華即是葫蘆華世間有一類人愛果不修因懊惱無財物羡他富貴人現世布施現世擬覔富貴是故名先果後華也第六一華多果即是蓮華一顆蓮子落池中傍風鼓擊日月照臨子吐芽芽上著室室上著葉葉上開華華中結果果中一朵蓮子十顆二十顆今年二朵蓮子落池內來年滿池盡是蓮華發借問滿池蓮華何處來因他一顆蓮子得一個衆生若成佛教化得無量衆生成佛身第七因果同時則況因臺則況果教為因理為果華若不開敷無由見蓮臺教若不諭揚無由得悟理欲得悟於理勤讀法華經欲得見蓮臺華開必得見故言同時也上曰法得各支説言然觀經意雖具等者是疏主語商量前來諸師義訖道理長者短者長者則留短者則去是此問中意簡要云重褒貶褒貶前三師義此解是親意言褒前行果師破方便品初教理為權方便第二貶前教理師將無量義經傍蓮華為此經正蓮華第三褒前第三師取四法為蓮華謨抄云會破得名支却疏遠也然觀者觀上下經意故名然觀經意雖具教理行果名有四法方便品初意彰昔日教權説云今此會中理實唯一理實唯一證四十年前説三也意彰昔權今實所以初談教理然未是正説法華教權説三即是其智慧門理實唯一即是諸佛智慧也言佛所得法等者證智慧理也言有所言説等者證智慧門教也言故以佛智對等者問唱二種甚深是何意耶答疏言故以佛等相對名對誘者誘引根法相當對二乘前唱智慧及門又道二乘不知今二乘人生疑請説故名對誘二乘根是所誘佛意對不定性人畢竟今歸於大乘如來智慧及故門是能誘二乘根性是所對如來智慧及大乘教法是能對故名對誘問唱二甚深教理本意何耶答意有三種一令二乘生疑二令鶖子請三令惡人退席令真聖者同取一乘令假聖者避席而退由此三意故以教理二種取譬言蓮華言拂彼二乘令等者問為鶖子説權教説三是何意答欲佛二乘言陳之中説三意許之中理實唯一令鶖子等生疑故名拂拂彼四十年前心也意唱教理名蓮華者意令拂彼二乘不是正説也令真聖者同取一乘即是請也及至鶖子三請之後方許為説一大事因緣故知但以因果為法華正體不取教理為法華也上中教理為非名蓮華也言三請已後許其正説等者指行果為自意言此經以行果為蓮華若取教理與無量義經何不別問不別何過答若同是教理何要分兩時説諸現相等應成虗設三請已後許其正説始名蓮華亦是褒前行果師若取方便品初蓮華蓮華已説更何要請
