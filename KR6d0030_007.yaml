body:
  text: 鏡水寺沙門栖復録言說說序品有七者標總名也言成就者釋總名問成就者何義答有二義一具足義二圓滿義具足者七義不少名具足七義之中一一皆名圓滿義問具足與圓滿何別答具足者是表詮唯表此經具足七義圓滿者遮詮餘經中不具七義不得圓滿所以疏云餘經無故問餘經亦有放光雨華動地等事何故局此經答餘經不妨亦有若同此經七義圓滿即無此上總標了言始述通由者釋初別名問何名序答疏云始述通由此解序始由初也最初通敘與七成就為由亦與一切經通由若言山城成就於中攝佛時不著若言佛成就於中攝山城不著總言序分成就故名通由問七個成就對正宗皆是序何故序成就獨得名序答有二義一將他總稱即目別名如言十一色眼所見者獨名眼色如言惡病一切病總名實七皆序序分成就獨名序又如無名指餘指皆有名此指無名字即取無名便為名也餘六成就名字亦別義理亦別也此序分成就含法般姟多立名不定更無別名可立即以序分便是名字言具圓滿故等具山城圓滿獨得序名論之表勝餘故即是勝餘經也二意名勝一對後六個成就名表勝餘二對餘經名表勝餘也具此義獨得序名實七皆序問王舍城耆闍山諸經皆有何故此經獨得圓滿答有二義一不遮他諸經有山城者只遮一類經不向王城鷲山說者遮無不遮有二者諸經有山城無所表此經將城況教將山況理所以疏云或教妙如城含妙理故或理高如山出二乘故所以經處王城居鷲嶺有所表矣故說序分成就獨有此功能也故從如是至山中皆是序分成就也言二衆成就與大等者論科有二門一數謂大衆無數故總談無數經云萬二千人等是二行論云聲聞修小乘行菩薩修大乘行問經中不說行如何論家言行答有二解一論說經不說互相影略也二只經中名字便是行聲聞菩薩以行為名言比丘者此云乞士乞食便是行也菩薩名字即求菩提度有情便是行也三攝功德論云皆是大阿羅漢十六句示現聲聞功德成就故皆於阿耨菩提不退轉十三句示現菩提功德成就故四威儀如法住經云爾時世尊四衆至讚嘆有解威儀屬聽衆如法住屬佛佛如法住此威儀中名威儀如法住言圓滿勝餘經故者此一句唯解衆成就中四義也數圓滿行圓滿功德圓滿圓滿通上三處轉也問衆成就餘皆有何故還說勝餘經答餘經四義不具足不名圓滿也言三如來欲說法時至成就等者經云為諸菩薩說大乘經名無量義具十七名勝餘故若不說無量義經說法華經時未至但說無量義經了即是說法華經時至也言四所依說法等者此威儀是隨順如來說法威儀也如來若擬說法天不雨華地不動不名隨順也如來欲擬說法天雨四華地振六種名隨順如來說法也威儀為能隨順說法為所隨如來說法為能住威儀為所住應言說法所依隨順威儀住成就若據論文即倒也攝問此間威儀與衆成就中威儀何別答說聽別故此唯望佛彼據聽衆二皆別也言五依止說等者以衆生渴仰心與說為因如來說法為能依止衆生渴仰心為所依止此渴仰心與說法為因何用放光答欲得如來說法事須彼衆生渴仰心欲得衆生之渴仰心無過放光照境放光照境能生衆生之渴仰心若通而論之則放光與衆生渴仰心總名說因若尅體而論正取渴仰心也餘經無者無此放光光中七事衆生渴仰心若論論一一具備餘經則無言六大衆等者爾時彌勒菩薩示不知道當以問誰誰能答者衆生懷疑當以問誰欲示相懷疑爾時彌勒菩薩作是念今者世尊現神變相以何因緣而有此瑞二衆人實心惑經云爾時比丘比丘尼至今當問誰三慈氏雙申兩意發問先因爾時彌勒菩薩欲自決疑至以何因緣而有此瑞雖問一人多人欲聞生希有心問底人有二一有能問二所問所聞即是文殊菩薩即第七成就今取能問人即是彌勒第六成就會中衆人有疑同心合意欲得彌勒一人與多人發問問文殊菩薩名雖問一人會下聽處即是多人多人同心合意欲得文殊菩薩答意徒知說法因由決心中疑網故名多人欲聞生希有心問何不問十人五人唯問一人答疑則千人萬人疑若說解一個人便解却多人疑處一人既能解多人疑處乃至斷多人疑亦只是一人能斷所以不問多人也餘經無故者若論彌勒問文殊答餘經所無也言七文殊等者文殊以宿命智知能過去身為妙光法師見彌勒為求名菩薩現見過去果因相成就十種事如現在前是故答言如現在前表是親見非是比度攝獲能知論云因相者文殊自見己身於彼彼佛土修行諸行為今時之因疏云菩薩因行故即是與歡喜藏摩尼寶積佛為因也言果相者即是過去所依自體即是妙光身望前前世五戒十善因感得妙光身便是果相妙光升坐說法華經為二十億菩薩即是因相與光文殊菩薩當來成佛為因名因相言十種事者一現見大義因八大義是二現見世間章甚深意因乃至十現見自身所經事因經云妙光法師者今即我身是至欲說法華經現見十種事因果相諸經無也上論科了言七中分二初等者疏主科簡七成就為二一通序二別序法華論開為七諸經合為二此之二序分成五對一證信發起對證信序通一切經發起序唯當經發起正宗故二經後經前對如是我聞四個字說經已後臨入涅槃安置名經後序一時已下說無量義經靈山雨華種地放光照境召集四衆名經前序三阿難如來對如是我聞是阿難序一時已下如來序四未來現在對如是我聞是未來一時已下是現在五通別對如是我聞已下至衆成就是通序說無量義經已下是別序今此疏有科判即通別二序也通即諸經別即此教言通序有五者解通序也然科通序諸教不同一真諦三藏般若記開為七一如是者標所聞法二我者能聞人三聞者親承音旨四一時者顯所聞法善合根宜五佛者明說法主六住處顯有處所七與大比丘顯非獨聞佛地論科為五一總顯已聞總指一部妙法故言總顯以親聞故故言已聞問何言一時答說者聽者共相會遇時分無別故經立一時問經通五人說佛菩薩神仙變化人弟子等未審此經是誰說答表法尊主勝不是餘人故是佛說經言佛字問外道教法從天降下或言朱鳥銜來都無來處未審此經說有處所否答經言住王舍城耆闍崛山中說處也問阿難言如是我聞未審當曇山獨自聞為復更有人同聞答與者兼并共及之義與大比丘衆萬二千人俱有同聞衆也所以通序之中有此五段一總顯等疏主科經中通序即攝此五疏科論中序分成就攝四第五段所被機入衆成就中序成俱四段今此先解序分成就此中四段每段據實各列為一唱疏主恐經文碎所以四段合為一唱唱中疏云如是我聞即為初也此處喪經也言為論本但說序分等者商量論家科序分成就意也疏主科序分成就有四論主科序分成就中唯嘆山城不說餘三也問若爾論家序分成就收法不盡答論主據勝處嘆山城餘三雖不嘆亦是序分收也山城有所表故與餘經別所以偏說也餘三不異餘經故論不說也問金光明經有王舍城鷲山如何言別答餘經雖有不表經故論云序分成就者此法門中示現二種義成就故一者示現一切諸法門家勝故二者示現自在功德成就故如王舍城勝一切城故耆闍崛山勝餘山故顯此法門最勝故如經言佛住王舍城耆闍崛山故言一說之所由等者問說之所由立之所以有何差意言經首置如是我聞有何來由由謂因由答如來入涅槃遺阿難安置此是說之事由二立之所以佛交阿難立著有何所以以由用也用作何物答為令生信生信義不同有其十釋又云所由即從聲所以即為聲故有差別也言說之所由者如大術等者即摩訶摩耶經摩訶云大摩耶云術即摩耶夫人是佛聖母名曰大術升天三月安居為九十日說經名大術經問謹案彼經佛初成道為報母恩說出此經如是我聞佛臨涅槃時安置時既懸隔如何得名大術經答始終為論從初成道直至金棺再啓為母說法總名大術經也等者等取闍維經律藏傳付法藏傳智度論說其本緣謂如世尊於俱尸那城力士生地跋提河側北首而臥將入涅槃阿難是黨弟見於如來圓寂相現心沒憂海莫能自勝然佛成道未久天魔波旬第一遍請佛入般涅槃佛言且去吾本出家只欲度生吾緣成道已來總未利益待吾度得智慧弟子了方般涅槃不逾多時有舍利弗為諸梵志師馬勝比丘入城乞食鶖子逢見威儀間雅容貌可觀遂問師學誰耶馬勝說三諦法以答鶖子言下得證初果後歸投佛佛言善來等得無學果十大弟子中智慧第一才度得智慧弟子了第二遍天魔又來請佛入般涅槃世尊言且去我雖度得智慧弟子未有神通弟子後乃目連見鶖子鶖子為說馬勝三諦法言下得初果後投佛出家世尊喚言善來等言下得初果神通第一天魔見已第三遍復請涅槃世尊答言且待我雖有智慧神通弟子未有多聞總持弟子後有阿難年滿二十年世尊世尊為阿難說其二十年前所說經法略示方隅總以偈如下經云世尊甚希有令我念過去無量諸佛法如今日所聞我今無復疑安住於佛道方便為侍者護持諸佛法阿難言下並皆悟解第三遍天魔復言既度得多聞弟子何不入滅盡耶其時阿難在佛邊立世尊顧問阿難言天魔請我入滅夫善修四神足者能住一劫或減一劫我已善修四神足法汝意欲留為以入滅世尊三問已阿難被魔燕耳總不聞佛聲阿難默然不答波旬言佛自弟子尚自不願何況我等於時世尊告波旬言吾受汝請待我有緣衆生未度者度訖涅槃經教未聞者令聞四部衆集親加付囑三乘教法傳益未來破暗除疑事周究竟却後三月與汝涅槃若不過三月化緣不盡若過三月化緣即畢波旬聞此語已歡喜還宮世尊恐阿難憂悔遂語阿難汝且於後園樹下靜坐修其觀行思滅苦本觀汝之身從何所來阿難依教既至樹下欲入於定觀未成之次心中昏睡忽作一夢見一大樹出衆叢林上至有頂之天傍羅三有之地樹上有華有果一切衆生採華食果依樹而住皆言我賴此樹身令得存求久之間忽被毗嵐猛風卒起吹此樹倒力士生地娑羅林間碎為微塵阿難驚覺心甚惶怖知夢不祥心懷憂惱遂往白佛請說所由佛告阿難大樹者即是我身有華有果即是三乘教法狂風到來吹倒大樹即是波旬來請受請入般涅槃於叢林間滅沒於地即是娑羅林間力士生地入般涅槃阿難聞說悲啼號泣世尊語阿難言我先三遍問汝汝都不言悲號何益喪車後底擔藥袋無益賊去後張弓爾時阿難悲哀憂愁痛苦心狂荒亂如重醉人都無覺知不見四衆不知如來已入涅槃為未涅槃阿難悲泣不能自勝佛告阿難設有一人四事供養供養滿三千界如稻麻竹葦皆是羅漢不如一人持香華供養佛汝以二十五年親事於我功德無量而得初果何須憂泣每於靜夜良辰教阿難二十年已前未聞之法言我初於鹿苑而度五人次度耶闍五十人次度優樓頻蠡迦葉五百人伽耶迦葉二百人阿難既聞已倍增悲歎我為侍者故留結縛不證極果夫為侍者不取凡夫恐有疏失不取極果同佛無學此但居初果佛言譬如大海之中無量魚等欲至岸者要吞鈎餌方得出岸汝已吞鈎當趣生死如證應果更聞此語悲泣悶絶于地阿泥樓豆以冷水灑阿難面普以善言慰喻阿難如來欲入涅槃一切人天無能留者阿泥樓豆謂阿難曰一切有為無常散壞復作是言世間空虗無上法王將欲衰殄甚深大河欲渴大法燈明欲滅不久法山欲頽法船欲沈法橋欲壞善友欲去火怖將至法幢欲倒法樹欲折佛日欲沒汝莫愁惱如凡夫人又佛大師三僧祇劫難行苦行所集法寶親自付汝汝若愁悶忘失如來真甘露味有情漂溺生死瀑流於苦海中馮何解脫汝可咨問大牟尼尊未來世事徒悲何益一旦遠離無上世尊設有疑惑當復問誰阿難曰我懷憂惱知何啓問尊者無滅告阿難言汝何不問四事之法又請如來住世莫般涅槃問涅槃經阿泥樓馱交阿難問大智度論憂波離交阿難問兩文何故不同答兩人在會同時交問互舉一邊亦無有失問波離樓豆何不自問答以阿難是結集之主所以交問阿難受教以偈請佛如來若入滅衆聖不莊嚴由如夜暗中有星而無月如來若在世衆聖即莊嚴如月有星辰四面常圍繞世尊謂阿難曰有會必有離有生還有滅已受波旬請決定入涅槃汝有疑速問言佛教之云我滅度等者答第一問也波羅提木叉是梵語此之別解脫戒解脫是涅槃果別別防非得此涅槃果名別解脫也問戒是福門如何得此涅槃解脫答正因則不得依其順緣能生定慧故得解脫故有偈云尸羅不清淨三昧不現前三昧不現前聖道不能起糯云身行不煞不盜不墮三塗便是解脫何必事須取涅槃解脫也言為汝大師等者佛在之日以佛為師人法師佛入滅後以戒為師依法法師故遺教經云波羅提木叉者當知此則是汝大師言依四念處等者答第二問諸比丘等依何處住住有二義一身住二心住僧伽藍是身住處四念處觀是心住處四念處觀者身受心法是所住四境也念與慧俱鄰近為名疏空言念也念慧兩法為能住住心於此四處之中名四念處住一觀身不淨除淨倒令知苦諦二觀受苦除樂倒令斷集諦三觀心無常除常倒令證滅四觀法無我除我倒令修道諦又觀身不淨者無始時來一切衆生於自身向上起貪愛世間朱脣皓齒欲擬除斷初修之人事須觀自身不淨唯禪法祕要經先從腳指頭觀觀小許破處因此有血便成瘡泡膿血流出漸至一腳乃至遍身皆是不淨自身既爾即至他身向上不起貪心即於一切物上皆作是觀貪愛自息第一觀身不淨有五一種子不淨如牡丹華從牡丹生還香伊蘭從伊蘭子生還嗅三乘聖果從戒忍等生還淨凡夫從無明貪愛煩惱種招感故名種子不淨有說今此小乘觀行不淨種子但觀父母遺體以為不淨故龍樹偈云是身種不淨非餘妙寶物不從白淨生但從穢道出二住處不淨者於母胎中生藏之下熟藏之上臰穢之處於此安住母食熱物如鑊湯地獄母食冷物如塞氷地獄母若飢時如倒懸地獄母若飽時如狹石地獄故名住處不淨故論偈云是身為臰穢不從華開生亦不從薝蔔亦不從寶山三自體不淨者地水火風假合連持皮肉筋骨三十六物以成其身名自體不淨故論偈云地水火風質能變成不淨傾海洗此身不能令香潔四外相不淨者亦云自相九竅常流垢污臰穢瘡痍膿血肢淚涕唾亦相不淨故論偈云種種不淨物充滿於身中常流出不止如漏囊盛物五究竟不淨者為生者病死氣絶已後膖脹爛壞變成灰土皆成不淨反招後身沈淪六趣不能出離故有頌云審諦觀此身終歸於死處難御無反覆背恩如小兒上觀身了二觀受是苦受謂苦樂捨即三受為三苦一期住令領納名受八苦相煎名受是苦苦者逼迫義凡夫不覺是苦妄計為樂今既觀之樂無是苦一觀苦受為苦苦若空言苦受是向上苦字更向苦上加生死病死怨憎會苦此五苦隨逐苦上重苦名為苦苦二者觀樂受為壞苦樂受當體是有漏法早是苦向上更加愛別離求不得苦之所隨逐名為壞苦世間錢財名利親情眷屬合會暫時似樂樂變壞時能生憂惱名為壞苦三觀捨受為行苦捨受向上被生住異滅四相遷流遷流不安名行苦凡夫不覺是苦菩薩大怖菩薩觀非想地薀如無間地獄故有頌云如以一睫毛置掌中不覺若置眼睛上為苦極不安凡夫如手掌不覺行苦睫智者如眼睛緣極生猒怖三觀心無常心心所法剎那無常前滅後生猶如猿猴曾不暫住有非常有不變無為無非常無不如菟角無彼有無二常之相合名無常故經頌云色如聚沫不可撮摩受類浮泡不得久住想同陽𦦨從渴愛生行類芭蕉中無有實識如幻事顛倒所起第四觀法無我者三科五薀法觀此法中都無有我若執有我則為非也若執有主宰自在則名人我若執有勝性則名法我如來交觀一切法中都無有我凡夫妄執無我之處強執有我於繩之上實無蛇故即薀計我離薀計我三科法但有從緣生都無有我也又修此四觀除六般尋發九種修六尋者欲恚害眷屬國土不死九修者對法云一欲修除不作意二勤修除懈怠三舉修除沈昏四勵修除自輕蔑五猛修除乏衣食求出家故六不退修漸勝進故七正念修除失念故八智修除不應行處慎不行故離惡軌範及邪念等故九不捨善軛修縱得果已常不放逸故涅槃經三十五說四種念住為自境故五種妙欲為他境界如羅婆鳥住自境界不被他投即懺愧也羅婆鳥者阿濫塠是土境間住是自境界若住虗空即他境也偈云飛鳥從空來羅婆住自界雖申勇猛力致勿被其身四念體者觀身不淨取十一色法為體觀受是苦即憂苦喜樂捨五受為體觀心無常小乘六識為體大乘八識為體觀法無我者除前十一色及受八識心王等所餘諸法並得為觀法無我體觀身不淨色薀觀受是苦受薀觀心無常識薀觀法無我行薀四念了言惡性比丘等者答第三問惡性比丘如何治罰也安國云梵謂寂靜淨潔壇是悉壇法也將此梵德寂靜默之法對治惡性比丘辨之不共語也今云梵即梵王壇是宗法舍言也將二禪已上無言地法惡性比丘名梵壇治之不共語也問何以梵是無語言答梵默然故所以疏言不應打罵打罵是不靜法治也但默擯故默擯是靜法治也賢愚經中有被擯比丘衆人不共語有一個鬼為食人故護世擯之此被擯鬼見比丘苦問不止我謂被擯鬼言我亦被擯共你作一討挍共覓飲食喫人不見鬼但於見汝汝可在我肩上戴汝而行人謂汝得聖空中坐立比丘即上鬼肩上遊行人間大得利養天王見已我久擯汝何故猶誑人間貪奪財物鬼被呵叱即折置地遂即致死因此人說為衆不詳也言一切經首當置如是等者此答第四問一切經首置如是我聞等言故有頌言優婆離請問經首置何言佛教如是著萬代古今傳言立之所以等者問一切經最初首安如是我聞有何所以答劫初之時本無文字後梵王出八十字流行於世後諸衆生生猒離想梵王知已遂總收字皆已吞之口兩角頭各留一字即是阿憂兩字諸外道曰此二字者諸字中王故不被吞咽自後諸外道有教皆置阿憂二字今簡異外道故置如是我聞智論等中說外道經初先標阿憂二字阿之言無憂之言吉無所不吉故言無不吉又解云阿言無憂言有一切諸法不過有無今顯異彼外道故安如是我聞又外道教無說時及以方所或說空中拾得或言赤鳥銜來等今簡彼著如是問佛經是佛說為簡外道置如是等言戒律亦是佛說如何不安如是等言答戒被內衆所以不安也經通俗人為令生信所以安如是我聞理實合有略故無也准諸廣律亦有也言智論云如是等者問何不向序分正宗中智要假經末信受奉行生智也答據實三分總能生智翻譯之家舉後取前且言經末其實總有也問何故在前生信在後生智答智因信生所以最初說信欲取無上菩提去事須先生信汝舍利弗尚於此經以信得入故初說信言信為能入等者問何故不空佛信或空說智何要雙說答信為能入等欲入三乘教理事須得信欲度三界生死事須得智度自度他皆由智故言信為入法之等者依初後次第解也智為得果之玄術玄術者法也玄者玄遠幽玄之法術也牟云此兩句釋上二句如其次第也又古人云智屬於佛能說教故信屬於資能聽法故今此不然信智俱是資瞿波論云佛有信智二種境故世尊相好丈六金容覩者信伏稱為信境依四辨七辨令物生智名四智境由此故知若信若智皆屬於資利鈍而分也言信則所言等者約修行次第解也有履之人有信故所出言語道理皆從順名所言之理順若是無信之人所出言語人不信受道理亦不相順有信之人所言順道理若順便有能說之人能為師所聽為資資順於師師順於資既若相順則師資道成也言由信故所說等者重釋上標中信順二字也詞無豐約非信不傳是故經初建言如是問如何不信師資不成答如因明說相違決定因雖有三相由不生敵者信智名三相俱闕故彼因體所立者言生敵者智了故此之信則所言之理順非智無以順其言非言無已生其智故須相順師資乃成也言趣極果等者問何名極果答即是佛位三身菩提涅槃二轉依果今顯趣向極果初因不過於信信為能趣極果為所趣如人欲行千里一步為初今欲趣佛果三大劫中將信為初信如一寸之針能引百丈之線縫綴衣服由針而入得佛果菩提信為最初故名初因信心與佛果為因也言依仁王等經者引仁王經證信與四十心為因四十心後與初地為因言等者等華嚴與仁王同仁王經中不立四十心只三十心十信攝入十住即是伏忍聖胎三十人十住十行十堅心十信只向第一發心住攝今言四十心却是論家立也前四十心為初因初因之中最初是信也且四十心者第一十信一信二精進三念四定五思六不退此十信第六心名信不退不退生邪見家約上品發心說若中下品發心亦退七回向八護法心九戒心十願心二十住者一發心住始從凡夫便發求無上菩提之心二持地住三修行住四生貴住種姓清淨故四生貴住五方便具足住六正心住七不退住八童真住長生真解得佛法分故曰童真九法王子住十灌頂住三十行者修行六度轉勝於前故名為行一歡喜行二饒益行自利轉深利他彌廣故名饒益三無瞋恨行四無盡行度人不倦利益增進無有休息故四無盡五離癡亂行六善現行七無著行八善法行九導重行十真實行四十回向者一救護一切衆生離衆生相回向二不懷回向三等一切佛回向若行有為無為平等圓通則與三世諸佛同行菩提故曰等一切佛回向四至一切處回向五無盡功德藏回向六隨順本等善根回向七隨順等觀一切衆生回向著生死彌廣故能平等津通法界衆生故名等觀一切衆生回向八如相回向一切衆皆如也一切法亦如也此如道相融故如相也九無縛無著解脫回向十法界無量回向四加行攝在此第十位中也故地前四十心為初因就初因中最初以信為首也上解四十心與初地為因也言最初發起大菩提等者解大菩提心與佛果為因最初起大菩提心同前趣極果之初因菩提者三身菩提法報化三佛菩提最初起一念求三種菩提能求之心名菩提心也菩提心以信進念定慧為體此五之中最初是信所以引菩提心來只要最初信心餘四相從來也言須具十德等者此二句十德三妙觀乃資助菩提心非是正要文便引來十德者發菩提心經云一親近善友近佛菩薩能長慧命能生道牙二供養諸佛良福田故三修集善根行萬行故四志求勝法樂大乘故五心常柔和無瞋恚故六遭苦能忍忍寒熱故七慈悲淳厚與樂拔苦故八深心平等觀一切衆生如一子故九愛樂大乘起淨心故十志求佛智欣菩提故三妙觀者一猒離有為心誓斷一切惡持攝律儀戒能招法身斷德果也二求菩提心誓修一切善根攝善法戒能招報身智德果也三深念衆生持饒益有情戒能招化身恩德果也此上大菩提心十德三妙觀總標也言大菩提心以等者別釋也此因力也即信等五根是也以善友為者緣力也事須得善友知識觀發也以不退屈等者精進力也善根即信進念定慧為體上釋大菩提心言攝大乘之等者引論證仁王經中種力無性攝論第七之清淨者即善根力即前善根為自體因力也增上力者即前善友為勝緣堅固心勝進者即前不退屈而為策發雖逢惡友方便破懷終不棄捨大菩提心所修善法念念增進不生喜足即勝進力也言名菩薩初修等者釋前二力三大劫初修最初是信也言二入諦理之等者入者證悟也諦者四諦諦由實也理者真理也老經云合抱之樹生於毫末九層之臺起於壘今欲入四諦理者最初須依於信又涓涓之流歸大海一毫之善直至菩提也言諸論皆說將入等者信根者即信進念定慧五根也信力者即信等五力也言有信根等者出根力功能也根力二觀根在燸頂位力在忍世第一二位之中安國曰資糧名根加行名力資糧位中二粗現行雖有伏者而於細者及二隨眠止觀力微未能伏滅故不名力也然此四加行位漸近道火名為𤏙如居山頂進退兩間名之為頂決定印持名之為忍世間最勝名世第一𤏙頂二位起得信根忍世第一起得五力問根力義別何得名同答信心初起名之為根後成就名之為力名數數雖同義意全別又出生義邊名之為根難屈伏邊名之為力有人解入諦理等唯約小乘說者不然大乘見位亦能斷於四諦下煩惱而證諦理若不爾者相見道十六心後得智中應非真見故知信等能作大乘入諦理之基漸所以疏云有信根故萬善因此而生有信力故四魔不能屈伏明知約大乘而言諦理二乘之人即無萬善亦不能伏變易中魔言四魔不能等者於加行位頓伏分別漸伏俱生是除煩惱魔三惡苦果黃門等身忍位裁而不受是降薀魔分段死中少得自在是降死魔降天魔者唯大羅漢身證那含及登地已去方能伏也此解狹且地前菩薩亦降天魔華嚴之十住菩薩八相成道故知地前亦降天魔也言三通妙真等者問何名妙真之證淨答二解一約能證解二約所證解且初之妙以離粗得名真者離妄為稱證淨者即四證淨佛法僧戒此四法是所緣境能緣無漏智證達此理名之為證無漏智與信心相應同緣四法名之為淨只此四般境離粗離妄即是妙真即是證淨故名通妙真之證淨准此即是能通達彼妙真及四證淨者是信之力能也如人媒二約所證解見道門中四諦理名為妙真離妄垢染故稱淨今明修行之人證獲得故名為證淨金問云無分別智證之時有戒可然如何有佛僧以理上無假者身故答若約別體即不許同體何妨由此潞府智上說同體三寶金約理上說同體也且潞云無分別智及俱時心所總名為覺覺察分別故名佛寶不捨自體名法寶假者名僧寶定道二名戒也金云理是覺性名佛當體名法無乖諍名僧問何名四不懷信答四是境只此佛法僧戒不可破懷能緣之心信此不懷不懷之家信依主釋二云四是境信是能緣心能緣信心堅固名不可壞此是境家之不懷信依主釋或不壞即信持業釋但與無分別智相應信心證三寶境出觀已後逢三寶信心不退名四不壞也問何唯立四不壞信更不增減耶答證於聖果要因四大證之譬如有人入於大海採寶之時便具四事一者事須得導師二須糧食三須得伴侶四須得乘馭佛為導師法為糧食僧為同侶戒為乘馭問何故先歸依佛次歸依法後歸依僧答佛是能說法人故初歸依法是所說次歸依僧是所度根故後歸依也問唯真見道亦通餘耶答九十八之預流果中唯得名淨相餘果位名圓滿淨於最極果說為第一圓滿淨上一句標言能越惡道者信佛故離地獄道信法故能越餓鬼道信僧故離畜生道又云或一一皆通離三惡道言離貧賤因者由信攝律儀戒攝善法戒因生勝處正離賤因由信饒益有情戒施他豐財正離貧因言故論亦說信等者引教例成也見道真智正名現觀顯察四諦理故信能助此現觀增明亦名現觀唯識九云此二見道與六現觀相攝云何五十五云現觀者決定義明了義於諸諦中決定妙慧而為體故明了現前而觀境故唯識云一思現觀謂最上品喜受相應思所成慧最上品者勝故喜相應者明利故由此思所成慧能觀諸法苦空等引生𤏙等思引修故從因為名名思現觀第二信現觀同時信心有力助觀增明謂緣於三寶世出世間決定淨信令不退轉鄰近為名名現觀信非是慧忍可慧故牟云此上二通漏無漏第三戒觀謂無漏戒除破戒垢令觀增明解云無漏定共道共無表色相助斷惑故亦能助觀憎明故四現觀智諦現觀此唯無漏緣非安立諦為境以慧為性通根本後得智智者割斷義諦者境智能現見諦境從境立名名現觀第五現觀邊智諦現觀通世間出世智慧為自性邊者是智諦現觀之後邊相形為名名邊智諦現觀解之唯所後得了悟俗邊故第六究竟現觀所作已辦名為究竟現觀見諸諦名為現觀謂盡智等十智然智無漏言四荷至等者荷者負也至德者佛果菩提名為至德令心有二功能一能荷負至德二亦能與至德為嘉依嘉由善也即是善依也二云所三乘無學果總名至德論信之一法與三乘無學果為善依也三云因中萬善是衆德亦名至德信為至德之嘉依也依者依憑依託一切善法依信而生信為善依也言信者食法味等者問信有何功德答疏云信者食法味等善手也三乘聖衆法名學佛法者一乘教法猶如法食信心一個是食法味之嘉手學佛法者以信為手智度論云入三昧海以信為本亦有疏云飲法味亦云知應從多本然食為正也言以信為手等者法合也三乘聖人名學佛法者三乘教理由如法食信心一個是食法味之嘉手以信為手言以信為牙者無手不能取食無牙不能斷草象以其牙損噬諸總捨喻於牙能棄惡法此捨不是捨施之捨是捨受之捨但是善十一中行捨名捨論云云何名行捨精進三根令心平等正直無功用住為性對治掉舉靜住為業意道由不放逸先除雜染捨復令心寂靜而住即能損惡如牙噬物而能斷草也沼云象有六牙伏諸猛獸修行之人有行捨能對治六障修行六度以布施攝貧窮以持戒攝毀禁以忍辱攝嗔恚以精進攝懈怠以禪定攝禮意以智慧攝愚癡也言以念為頸等者論云云何名念於曾習境令心明記不忘為性定依為業謂憶持曾所受境令不忘一切能引於定如頸連持於身不數猶於念令前不忘又云頸連身首而令不斷念能持善心不絶凡象頸者此而無回曲有專直之用念修善法有不散之功故學佛法者須得其念念有二種一者正念即明記憶持諸法二者邪念即入邪見稠林下云復有諸鬼其咽如針即邪念也言以慧為頭者雖有頸無頭不能見物事須得頭頭能引導見善見惡雖有念無慧不能簡擇事須得慧以慧為頭頭上有眼見物引身不墮坑塹也言於其兩肩等者自利行為一肩利他為一肩一切善法皆依自利利他行向上安立名擔集善法也或戒定為兩肩發生智慧或以慚愧二法為兩肩也言象所飲噉等者永云象飲噉必假鼻已取物學佛法者事須最初生信信能取法喻之於手捨能防惡況之以牙念能持慧比之於頸慧能前道譬之頸也言五七聖等者沼云在佛果位名為聖財若在因位名法財元由初也天地之初胎者始也出生之初故胎者人倫之始爾匹云初裁首基肇祖元胎俶落權輿始也胎者胎藏十月滿足遂成人道皆從胎藏而與意言學者如世懷胎必誕其子法中論兆前一劫修習無量善根熏發種子如懷胎者入見道時斷二障顯二空理智生如來家住極喜地證真平等如誕生也故言元胎胎由始也問七聖財中何法最為元始答最初信也財者聖法財是法財之初也言學者大商等者三乘人修行取佛果菩提名大商求二乘果名小商果位菩提涅槃名寶所此是足珍寶處此菩薩如經記佛如財主菩薩向佛邊聽法便是學者補貨物元規者元由初也規由求也初規求法寶獲聖財處事須最初生信也簡異世間故名聖財若准瑜伽論故世間出世間財凡則有四種一適意財謂珍寶金銀等令心悅樂二憎長財謂按摩等長養四大故三吉祥財如俗端午續壽命衣物等四住持財如宅舍家主飲食等任持身命問凡聖二財勝劣云何答世財四種設暫得而還無法寶七財一獲得而長有故大論第五挍量勝劣有五重一行世間之財長不善行出世財長行二樂世間財暫時安樂出世財長時究竟安樂三遍世財不遍益出世財遍益一切四時世間財有無不恆出世財長時常有五地世財唯欲界五趣出世財遍九地六引世財引生死出世財能至菩提七盡世間財寶暫有還無出世之財無竭盡八奪世財為他所奪出世之財化終不奪九往世間之財不往後出世之財隨往後世十足世財無厭足出世之財果滿知足十一恐怖世間財寶畜即心驚出世之財恆然安樂十二怨世間財寶共畜諍競生即招怨家出世之財自他無諍和合如乳十三灾害世財有灾害出世之財畢竟無礙十四嬈惱世間之財生老病死燒之憂出世之財無老病死清虗常樂十五斷除世間之財資長憂惱須斷出世之財終不遺棄言七聖財等者安云一信除疑正見財二戒即七衆戒防非離惡財三聞聞是聞所成慧除疑博達財四捨除貪離染財捨謂行捨無貪等三根為性或捨謂捨施亦以無貪為性後解為勝五慧簡擇勝劣財即思修二慧六慚崇賢進善財七愧輕拒暴惡財此七之中信為首也問爭知七聖財信為首耶答疏主引顯揚論排批以信最為初首也言善本因等者昌六反信之一法與九善為根本故言俶落者爾匹云肇祖元胎俶落與始也俶為春之初萬物之初生也落為秋之初萬物之始雕也故舉春秋之時攝冬夏之兩節也詩云令終有俶訪豫落正皆始也天四時亦有信春以風為信夏以暑為信秋以凉為信冬以寒為信春無風等天之失信也標了言欲為本者起希等論云何為欲答於所樂境起希望為性勤依為業牟云此中意說將入彼大乘善法時由前信信知自身有菩提涅槃之性次即於此二無上法起希望心而欲求之故名欲為根本言作意所生者第六意識起希望時必由作意警覺方生論第三云何作意作意謂能警心為性於所緣境引心為業謂此警覺應起心種引生趣境即是引第六意識於菩提涅槃之境故名作意所生數警覺故言觸所集起者雖然作意警心了心心所法已生現行若不得觸則心心所法離散事須得觸和合一聚心心所緣所前境是觸功能論云云何為觸觸謂三和分別變異令心心所觸境為性受想思等所依為業也言受所引等者雖有和合根境功能當時領納前境違順之相還須是受論云云何名受答受謂領納順違俱非境相為性起愛為業言定為增上等者問如何言定為增上答若論令心心所深取所緣專注一境是他定功能散心緣境如風中燈無光也所以一切時中定心緣境最勝故名增上論云云何為定答於所觀境令心專注一境不散為性智依為業遺教言制之一處無事不辨言慧為最勝等者由定令心專注不散依斯便有決擇智生論云云何名慧於所觀境簡擇為性斷疑為業謂觀得失俱非境中由慧推求得決定故言解脫為堅固等者有二解一者涅槃真理稱為解脫非被所壞得堅固名一證得已纏縛永息二者或即勝解因中印境名勝解果中離縛名解脫纏謂八纏十纏俱舍云纏八無慚愧嫉慳并悔眠掉舉與昏沈或十加忿覆縛者俱舍云縛三由三受解云樂受悅諸根順故生貪欲憂苦是逼迫違故即生嗔捨受是中容遍故愚癡起又云縛有三相應縛者本來心王心所是無記法不是染由與煩惱貪嗔癡等同生同滅縛彼心王所成雜染性不善性故名相應縛相應即縛二者所緣縛所緣本來不是縛由被能縛彼所緣本來所緣境是無記法體非是縛由心王心所由與貪嗔相應緣被所緣境於彼境上起貪縛彼所緣名所緣縛三自性縛根隨煩惱自性是縛法名自性縛後有煩惱所知分別俱生種子如是皆纏縛所收也言出離為後等問何名出離為後邊答潞云覺道菩提為離出以證得得故故言圓滿望出生死盡處此最居後故名後邊二者果望於因因之後故故名後邊此二解總望三乘果說問若爾何故後二亦向九善因收也答或此亦通諸聖弟子分證理時聖位對凡夫亦名後邊兩解總得潞約三乘人出分段生死說疏主約大乘說問即初地聖位對地前凡夫亦名後邊初地菩薩名覺道滿答雖不名滿約當地說亦名滿二者約多分說亦名覺道滿也言信既為欲依等者安信之所由也緣小乘善有九因大乘善只有八因疏主依瑜伽論烈八善因論中只所欲為最初事須先起欲然後生諸善法疏主依論解了末後反望向前八因據道理事須先依信生故最後兩句安信之語故言既為等兼信成九因言七啓機門等者啓著開也根者衆生根性只此根便是其門根即是門故名根門問何名為手答信是手衆生信心若發根門即開信心不發根門即閉衆生發信心便是開根門衆生不發信心根門即閉也故衆生根門開之與閉皆由信心故喚衆生信心作開根門之勝手也二云機即物根門即教門三乘五乘教法與衆生根性為出離之門今欲開彼教門以何為手答衆生一念信心是開教門之勝手無手不可開門衆生若無信心教門因何肯說此解衆生信心為手如來教為門也言接教手等者衆生信心如手教亦為手信手教手兩手相接置出世故言俱舍論等者疏主依何處聖教說如來教為手答疏言俱舍等長行解之一切衆生於生死沈淪無救世尊哀愍隨授所應正法教手拔濟令出生死生死泥者十二有支中五果種子如土是異熟性故愛取如水數溉灌故無明行類和泥人能造作故生老死支如泥有漏性故拔衆生出生死泥即分段身也彼說有三義名泥一沈處喻深堅通三界二溺處喻粘被妻子所粘故三難出喻廣傍說六道難可出故言後陳正宗為等者如來擬說正宗正宗之中乘教手教衆生句序分之中發信心舉信手兩手相接出淤泥故結歸當經也言智度論等此論唯證信心為手也言八湛等者賀云信如水清珠餘心所等喻同濁水珠投濁水濁水湛清餘所皆同心聚皆清言成唯識等者問何聖教喚信作珠答疏云成唯等安云此寶珠置在日月下能出水火投濁水中水則證淨名水清珠類同於信大隨不信自相渾濁復能渾濁餘心心所極穢物自穢穢他此信澄清能淨心等如水清珠能清濁水此珠有三種一陽燧珠將映日而得火由有信故將對智而能生無漏道火二者月愛珠將對月而出水由此信故能令衆主得月性水也三水清珠能清濁水故將此信心投不信心中能清不信性水渾濁故故唯識六云云何為信於圓德能深忍樂欲心淨為性是信自體能治不信是信之業用若不信起來自性渾濁自體是不淨法亦能令心心所法成其不淨問此信以何為性答心淨為性問為復心即是淨為心俱時淨為復心之淨故第一若言心即是淨者自是心王淨何關心所信是心所故此約持業難也若心俱時淨者與慚等又何別一是心所與心王相應何不言慚等淨第二若言心之淨故者自是心所淨何言心淨為性若離心有淨此可心所收若淨即心信應非心所行若令心淨慚等何別依主難慚等令心淨不許是信收信既令心淨云何異慚等鄰近難也慚等心俱起故彼非是信信與心俱起云何異慚等答慚等雖總有此功能於中各自別有行相信之一法唯能淨心以心勝故立淨名自體是淨亦能淨一聚心王心所亦成淨也如水清珠能清濁水慚崇重賢善為性愧自用輕拒暴惡為性雖善非淨為性今我信者即用心淨為性無濫彼失何得為難言九建名道等者建立也疏云建立名聞道德之善蓋不過於信牟云名聞利養宛是僧談事涉儒書應言名教五常之教道謂大道良由善也資由助也問欲擬建立五常名教之大道以何為善助答無過於信信能與彼五常名教道德為良資也簡要敘古說良由惡也資由須也欲擬建立名道要須信也上標也言宣尼云等者宣尼者孔夫子死後王莾諡號為文宣王也善問周達曰宣又云能宣道德曰宣尼是字也夫子姓孔名丘字仲尼論語第六顏淵云夫子至衛子貢問政夫子為衛君無信欲去食存信故有此言子貢問夫子曰為政者何夫子曰足食足兵存信即是為政之法子貢曰若事不得已而去之三者何先夫子曰去兵兵者不祥之器君子不得止而用之二者必不得已而去於此二者何先曰去食存信子貢曰人以食為命無食即死子曰自古皆有死民無信不立死者古今之常道人皆有之治不可失信若無信縱有食乃不終天年而死大國無信小國不歸小國無信大國伐君無信臣死凡夫信至伐為政章云子曰人而無死不知其可也乍可抱信而死不可無信而生言如大車等者論語云人無信不立如大車無輗小車無軛其何以行之哉云大車即牛車也輗者即車上轅端頭橫木以縛軛小車者駟馬車軛者轅端上曲鈎衡即橫曲木也言不知其可者夫人若無信則無用處非名人也言十欵衷誠等者欵由言也衷者忠直誠由實也問夫子欲擬釰欵曲展忠誠以何法為善何法為藉待答無過於信信能與欵曲忠誠為善助為藉待信能助忠誠故云欵衷誠等上標了言左傳言等者釋也牟云左休明為魯史記中仲尼所修之經而作傳廣解故言左傳也苟此訓且言㵎溪沼沚等者爾匹云水注川曰溪溪亦㵎也又解云峽水謂云㵎小池曰沼小沼曰渚小渚曰沚毛者草也是土之毛猶如人身上毛髮古詩云有一由舍公秉金賣毛髮蘋者大萍也即萍草也蘩者即皤蒿即白蓬蒿也薀者積義聚義藻者水草有文曰藻豸由上也進也若有信將㵎邊溪邊沼沚之上草將來作菜可豸於鬼神可羞王公言而況君子等者引事成也此事因周平王都洛陽謂周道陵夷天子微劣也鄭武公鄭伯公亦是周平王卿士平王父子東國之政傳云王二於號號即西號公亦事於平王意中欲得分一半國計事與西號公亦作念之次鄭伯公早知傳云鄭伯怨王王遂諱之無此事鄭伯心中不信遂周鄭交質周主子子孤為質於鄭公鄭公子忽為質於周注云王子孤即平王之子也後平王崩國人取王在日意欲分一半與西號公雖二子更質鄭國仍不賓伏謀動干戈夏四月取溫州之麥秋又取成州之禾周時十一月為正昔時四月即今二月麥苗正長次言取者意交踐踏秋取成州禾者昔時秋即是舍時五月六月禾苗長成交踐踏也溫州者今河內溫縣成州即洛陽縣也傳云周鄭交惡兩相嫉也曰人若無信交質何益若人有信不質亦得子曰信不由中質無益也明恕而行惡之以禮雖無質誰能間之苟有明信㵎溪沼沚之毛蘋蘩薀藻之菜筐筥𨪆釜之器潢汙行潦之水可豸於鬼神可羞於王公況君子結二國信行之以禮正與用質也圓曰筥方曰筐有足曰錡無足曰釜停水曰潢汙流水曰行潦言此十義中等者結信義也初八義依內典後二義依俗書則云真宗明信即能信之心俗典言信乃所信之事義雖稍別信且名同離增減者增即加增佛語滅乃減乃減削佛語也言正釋其等者又云說之所由立之所以然則已知何名如是我聞之義故此正釋其文也言佛地論等者都有一十五釋此標四解約四般義解於如是名依彼轉轉者解說也言如有說言等者但由富貴名徹遠則聞喻意舍衛國中有須達長者最富如毗沙門天王故言如是如是者比況之詞天王宮中寶物與長者家中寶物多少好惡恰相似長者家中寶物與天王寶物亦相似今日將阿難如須達毗沙門如世尊意言阿難法財亦如世尊無異如毗沙門也言如是者法合也問長者家中寶物多少於天王宮中寶物答疏言如是若多若少貴賤若不相似不得名如是者相似也法合中有四不異一所說不異如是亦亦能詮教也如是亦所傳今日傳也所聞是昔日聞問長者家中寶物與天王宮中寶物多少一種未審所傳所聞之法莫加減否疏言如佛所說也言定無有異者問莫名句文改易不同否疏言定無有異故言如是問阿難昔日聞底法與昔日佛說法得同否答依能詮教昔聞與昔說定無有異何名所說不異如言十方佛土中唯有一乘法等阿難亦爾上能詮教同言為利樂者不唯能詮教名句文同兼所詮理亦同如來說持經得六千功德阿難今日說經利益與昔日恰同故言如是言方便之因者因即佛果菩提因汝等所行是菩提道若有聞法者無一不成佛世尊說法定為利樂方便之因阿難所說之法亦能利樂方便之因一種利樂名依譬喻轉也言或當所說如是等者佛地論二說一昔聞同昔說即阿難望佛為相似二今聞同昔聞即今昔相似問阿難今日擬說底法與昔聞同否答曰一切皆同也故名如是言二依教誨等者一則如來昔教誨二則阿難今日教誨也言此中如是等者又云此中意者佛當教誨言汝等如是讀誦經論此是佛教誨阿難若欲得分明合言汝當如我如是而說言近則傳法等者有二一則阿難教誨千羅漢二則教誨時衆還言汝等當如是讀誦經論教誨千大羅漢也言或告時衆等者阿難教誨衆汝當如是依教修行我昔曾聞來不錯也問阿難教誨中前後兩解何別答前言教誨勸千大羅漢修行後言教誨勸教勤聽也言三依問答等者時會問阿難云汝當所說昔定聞耶答言如是我聞言四依許可等者二解一是阿難自許可所說之法二是佛許可阿難說前解為勝言我當為汝等者思惟道理如是而作者威儀法用如是而說者文字句義又云如是而思意業如是而作身業如是而說語業言謂結集時等者此五句疏文是千大羅漢請阿難說問結集盡是聲聞如何喚作菩薩答二解一菩薩之名通三乘有若喚作摩訶薩即不得若求菩提度有情通二乘有也二者聲聞回心已去名漸悟菩提言傳法菩薩等者阿難許說也問既千大羅漢請阿難說阿難受請否答疏云傳法菩薩等此答中二意亦許所說法如是當說許可法也所說法皆曾聞來二許可人如我所聞與昔日聞時不異言或信可言等者即可也一此是阿難自許可心中擬說底法為如是法我昔所聞所聞之法齊此當說更無加減也二由無量聽者能生深信信印可阿難是事如是此即聽者許可阿難初解勝化度云或信可者定令衆生於所傳教而生起信及印可故名為如是信可者是事如是不信可者云是事不如是言真諦三藏等者律儀有三一二百五十戒二雜誦律三比丘尼律今言微細律即雜誦律也雜明微細事等亦云小罪也名微細也有梵本未譯言明阿難升座等者釋云阿難升座大聖潛加遂開滿月之容獨薀世雄之相如妙高之踞宏海逈拔衆山似白鶴之處雞群孤標素色言非佛更起等者非字貫此三句如者相似義是者無非義我說如十方佛故言如我說無非故言是為除衆三疑故故經初言如是言結集之緣等者疏主法苑第二有諸藏章彼以十門分別第一即是結集緣起廣引集藏及付法藏傳真諦異執疏及智度論西域記等合集而說佛於俱尸那城入涅槃時大地六種震動爾時諸天禮迦葉足而說偈言耆年欲恚慢以除其形譬如紫金柱上下端嚴妙無比眼目清淨如蓮華說此偈已白迦葉言仁者知否法船破法城崩法幢倒行道人少惡人熾盛當以大慈建立法幢迦葉奇布時大迦葉謂其徒曰慧日沈照世界暗暝善友返奇衆生顛墜懈怠比丘聞此語已皆大歡喜更相賀曰佛般涅槃我曹安樂也若有所犯誰呵制我迦葉聞已心更悲傷慧集法藏即命徒曰往俱尸那城路逢一梵志手執於蓮華者從俱尸那城來云世尊入滅於是迦葉即往生怨王處令造八個槽王依教敕便造八個大槽又索醫人王亦從命迦葉問醫何藥治風等後從王索王皆隨與磨以為榍煎已為膏內八槽中然後執王手告云佛般涅槃已經七日王聞此語悶絶而死迦葉將王安藥槽中遍至第八槽裏王乃還活以藥資王還得平復如是三告王亦三死亦如前置藥槽中依舊還活迦葉為說一切有為皆歸磨滅悉皆無常如來亦同王莫憂惱宜弘大法以報佛恩應與眷屬從俱尸那城王之眷屬并大迦葉屈申臂頃至拘尸那城王既見佛入滅又還悶絶迦葉復以置藥槽中次第至八王便得活佛於衣外出其雙足受迦葉禮一切大衆亦皆隨禮准此即是第二七日安荼毗分云佛般涅槃初一七日造棺及槨第二七日佛在棺中俱尸那城入出四門周遊往還一切大衆隨後往來第三七日棺在香臺人執火棺不能令燃過三七日迦葉乃至重開棺槨更洗佛足復以新疊千重纏裹入棺之後火從內發一日之中焚之都盡至荼毗了四衆弟子見佛涅槃迦葉來至皆欲涅槃迦葉即上須彌打銅犍槌而說偈言諸佛弟子各念於佛當報佛恩莫入涅槃是銅犍槌聲及迦葉語遍三千界皆悉聞知未生怨王為大檀越云諸大弟子得神通者皆悉來集得九百九十九人除阿難陀從夏安居初十五日集阿闍世王為大檀越迦葉入定觀見阿難由在學地從禪定起牽出阿難汝結未盡不應住此汝有五過一請彥女人二踊佛衣三索水不與四將馬音藏示女人五不請佛住世阿難言不識是非信上座語願求懺悔悔訖遣出門外迦葉然後入來即自閉門大衆議曰誰結毗尼阿那律曰舍利弗有弟子憍梵波提結毗尼尼藏得使信往忉利天中喚喚不來憍梵波提說偈言憍梵波提頭面禮衆妙第一大德僧如來入滅我亦滅如大象去象子隨是時阿難希求漏盡殷勤疲極欲臥就床廓然大悟如日破暗三明六通具八解脫數億天人圍繞阿難夜到僧堂繞門而喚迦葉令於戶鑰孔中入來入大衆已師子無畏迦葉徑見八萬餘人衆叉手立迎迦葉集云善來阿難便就高座條流衆僧迦葉高聲大令衆云欲度苦者皆來至此如佛所說種種諸法除衆生苦阿難說當知天龍鬼神四部弟子四果聖人諸軍衆聞皆令至大衆次第坐十二由旬阿難居中如月圓滿帝釋在右梵王在左侍奉阿難如佛在時時天帝釋說偈讚歎一切天子皆大欣悅如見世尊阿難無畏容儀巍巍如日光明既得漏盡項背圓明照於大衆衆起咸嘆天魔聞之欲將妻子并兵衆滅此殘法四輩弟子爾時阿難以智慧力迦葉已精進力申手執魔而以三尸繫其頸上第一人尸二狗尸三蛇尸膖脹難近魔便請言迦葉見放羅漢不應見困於人我前極擾世尊未曾如是見困阿難迦葉遂誓彼言若亂衆尸還挂頸波旬遂起迦葉敕衆皆當靜聽諸王普起叉手侍立阿難長歎師子振缺四顧告言如是我聞等衆聞說如是我聞一時等言一億天女得法眼淨結為四藏結集諸經以為一藏律為一藏論為一藏録諸異法合集諸經以為一藏千大阿羅漢聞如是言已上升虗空高七多羅樹云無常力大我近始眼見耳聞佛自說法今日乃言如是我聞苦哉苦哉集法已竟其年十二月未生怨王崩大迦葉入雞頭山大衆皆散言注法華等者注此經人甚多有京兆韋詮晉劉虬僧睿法師等人所引即劉虬注言感應之端者衆生大乘根性熟感佛降生衆生為能感端者首也佛是一切衆生歸投處是衆生端首左傳云所論唯信信者言之端也善之主也如縣令拜大大減於當時並是感應之事如君王有德即有芝草生慶雲現鳳凰來翔麒麟至等言如以順機等者賀云佛順於機授法名如衆生無非稱之為是機既無非感於如來如來順機以出世故名為應言衆生以無非等者如下鶖子三請說經是無非如來問云佛告舍利弗如是妙法諸佛如來時乃說之即是如來為應如五千退席此是有非不名無非也言名教者潞云名者即一部之都名教者即一部之教言注無量等者即慧表法師注也言至人者即至極之人名為至人四果及十地菩薩但名聖人唯我世尊名至人也六無為中無量義是第六真如無為也言顯如等者問言顯如理在不疑諸小乘經論唯說無為何言顯如答今順本經言顯如也縱說小乘從無住本立一切法有為無為之法皆依真如今言顯如何失維摩云一切法亦如也言公等者即梁朝志公和尚公是五等諸侯之上首國尊敬道德比之上公此中多約性以辨言第一句如是等者相云我法體無今執為有增益法體故得謗名如實不教人言他教人即是謗也此亦如是且第一句有者約遍計性為言遍計性體空言其有者即增益謗也言第二句等者牟云有為無為名為有牛車寶所體是非無即是依圓是有令撥為無即損減也言第三句等者如清辨宗計牛車寶所俗諦門中境智俱有真諦門中境智俱無不同中道宗解於真諦亦有亦無亦有即依圓亦無即遍計空即彼計俗諦亦有真諦亦無有無相違相違即謗也言第四句等者此小乘執牛車非有羊鹿非無不了權實名愚癡謗小乘若言涅槃是有者涅槃應同老死相若言涅槃是無者涅槃同斷滅法真如妙有不得言有亦不得言無也言第五句等者展轉執法有無是戲論故說法者有須言有無即言無何故乃言非非有還是有非非無即還是無言是成戲論也五句皆言如是此經者問如是此經離增益謗耶答疏言如是此經離執有增益謗問如是此經離損減謗耶答疏言如是此經離執無損減餘准知此寶公解如是之義未必偏屬法華但損法也言光宅等者光宅是寺名在潤州江寧縣梁武帝後捨宅為寺雲法師俗姓周與莊嚴旻開善藏俱擅聲價時人謂之𣂰足僧昔有一女人每常發願願生得一兒講法華經即稱心矣後夢一僧云與汝作兒夢畢三兩日間遂覺懷孕後誕生一子滿宅有紫雲色三日光照其宅後為子設滿月齊具述上事從僧乞字僧與作字名為紫雲七歲出家至十三講法華經從茲不絶講一百餘遍感得龍天來聽其時值天旱武帝請講斯經祈雨法師遂偏講藥草喻品經至四方俱下其雨並足具如高僧傳說言如是將傳等者即一部之經意言結集之時將傳所聞昔時佛教如是之言是故經前題舉一部也言即為我聞作等者攝云若不先損所聞之經即言我聞者我聞於何意欲彰其自聞所以先標如是呼謂呼召轍謂軌轍既言如是須辨我聞說此如是二字能呼彼我聞而與彼為軌轍也耳字助句有車轍方得能行由有法故我方得聞故呼如是與我聞為軌轍言梁武等者如即損法是為定詞名為如是此解即顯阿難自明是佛所說非己說故言長耳等者梵云那連提黎耶舍隨言尊北印度烏長國人也形貌環奇頂如肉髻耳長而聳目正處中有異常倫特為殊相北齊時遊化至齊未久遇周武帝滅法避難潛遊大隨御宇重興三寶降詔書請來弘譯年一百歲住大興善寺也言就佛等者問同說共說二有何別答言說與法體同名之為共如言十方佛土中唯有一乘法法體實爾更不說言有三說同於法稱法而談名不異言由此同說等者路云三十初後可名同說中間就法同說隱如如而說說令證故名同說又解由此同說令前佛寶稱理無謬令前法寶所傳不異令前僧寶故經可信總結三文此解緣言已上合有一十五等攝云佛地為四三疑為七經法華八注無量義九五謗為十光宅為十一武帝為十二長耳為十五攝難云佛地一人何故開之寶公長耳何故合之由此總開合有二十一釋言傳法菩薩者問阿難是小乘人何言菩薩答阿難應化聲聞實是菩薩又云授記已後總成漸悟菩薩亦何相違如迦葉畢鉢羅窟結集阿難在中即是聲聞文殊在鐵圍山間結集大乘三藏阿難在中即是菩薩言非謂我者但是傳法菩薩自損己身即言我聞非謂定屬阿難如文殊菩薩將大衆於鐵圍山間結集大乘即是文殊自指己身言我聞故言非定屬一人又解亦通諸國聞經此阿羅漢等故知非屬一人言我謂諸薀等者則云佛地論意顯總於色等諸薀隨世俗立假者名故唯識云世間聖教說有我法但由假立非實有性然假有二一無體隨情假即諸世間我中隨妄情假說有我二有體施設假即諸聖教有法體上強為施設假說有我前解亦名無依於有其後義亦名依於體迷情了知前說別故今此我言但當後義故唯識論引契經云為對遣愚夫所執實我法故於識所變假說我法名言妄所執等者論云諸所執我略有三種一者執我體常周遍量同虗空隨所造業受苦樂故此勝數我意言此我有二義一者常初後故二者遍遍五趣故隨處造業等解彼常遍二義所由此中又別若數論我是實非言造作故若勝論我實句義攝體能作非受合名造作業受苦樂故二者執我其體雖常而量不定隨身大小有卷舒故此離計我隨身大小顯不定因身大我即大如油滴水水大小故如我依身身大小故我亦大小三者執我體常至細由如極微潛轉身中作事業故此獸主外道遍出之我此二外道同作此計潛轉身中顯我小因巡歷諸根而有作用有似佛法第六意識今此總敘三計五師餘九十五種不異此三故破初計先破數論受者我量云汝所執我是有法應不隨身能受苦樂故宗因云一許常故二許遍故同喻如虗空次破勝論師作者我量云汝所執我是有法應不隨身能造諸業故宗因云無動轉故同喻如虗空第二計中初常住破卷舒後以卷舒破常住初量云汝所執我是有法非常住故宗因云許卷舒故同喻如槖籥風槖是鞴袋籥者留運吹也第三計中初破本計後破轉救初破量云汝所執我是有法於一剎那應不能令大身遍動故宗因云以由極小由故如極微彼救云非一剎那即能遍動次第而轉以迅疾故如旋火輪破彼量云汝所執我是有法應非常一故宗因云有往來故同喻如旋火輪外道問曰世人著我不著無我明知有我如虗空無人不計人故有人無人執有人執薀有我明知薀有我答曰於無我中橫計為我如翳眼見有空華華體豈為有並曰翳目見有華華體非實有妄心執有我我體本來無見華之時體無執我之時我非有外人問若無我十二因緣誰人云如是次第生起如人量物一二隨生如世人能量所量由人一二生緣起若無我誰人云次第起答曰無明及愛生死不絶何要我耶世間種植枝葉次第豈皆有我如世芽莖等次第不由我緣起雖無我何妨次第生授上所破故知是妄言二假施設等者糅云謂樂淨常我唯依涅槃以解斯者今言法身之上離逼迫故名之為樂無鄣垢染稱之為淨離四相故名為常無為自在故名為我言除二乘倒者謂如來密意說一切法皆悉無常苦空無我二乘聞已不了所執一切法者皆是苦空非唯世間乃至涅槃亦是苦空世尊見此二乘執己故為說言大般涅槃有常樂我淨非苦空等潞云佛令修無常等觀時非但於自身作無常等解亦於如來觀為無常等解彼計如來十五界並是有漏故佛為除此顛倒解心於離言涅槃法上假施設為常樂我淨如廣百論偈云諸佛或說常或時說無我諸法實相中無我非無我初句除二乘倒次句除凡夫倒後二句顯實義又說四念住除凡夫顛倒二乘修此以道果正證理時而無一物後時出觀却觀觀中而無所有遂見於前方便道中空無常等即執此為究竟果如來與我同坐解脫床執佛亦有無常等義為除此倒法身之上假施設有常樂等義據彼四不可得故名假施設言三世流布等者流者轉義布者遍義世間共傳計也謂如天授佛奴等今此我者亦爾今順世間故亦稱我論云我種種相者謂有情命者預流一來等問世流布我於二執中是何執攝答法執攝不障道故以賢聖名字皆世流布故以名呼召有所表彰有主宰故故呼名時義同於我即所知障攝言共傳天授等者提婆此云天授達多此云詞授從天神乞彼授與之因已立名問世流布我既稱天授如何阿難順世間但言我答有二種一者總二者別總即稱我別則稱名阿難但順世間之總稱故言我聞言不同前二等者攝云非外道故不同於初妄所執我非極果故不同第二假施設我由無我執有自在德名為無我之大我即指阿難如世間說言不自伐功其功更大由悟無我自在逾增故名大我言諸佛法等者則云此問有二意一問何不稱無我二問何不稱名字言一言說等者賀云假者之上若說我聞即令人易解二易簡別故言無我皆通薀等諸法知自於誰今言我者唯約五薀假者言我即易若言無我即通三科自他難辨亦呼召言知此說誰等問無我通薀等若言無我聞即言知說誰我五薀等今此說我聞應知說誰答無我之義遍於薀等薀等通於自他之身故言我聞然此我義遍在諸薀自他之身然稱我時即有簡別今云相傳自稱我故如世女人言此誰物答是人便便知是彼女人之物並曰人人皆是人但言是人是此人物物皆有我知說我聞是此我言二順世間者賀云一順世間法謂二乘作生空觀便怖我斷故為說薀處界等法我令二乘歡喜二頂有情世間凡夫歡喜故我即知光無執故不同塵世間人無論大小皆能稱我西方臣向君亦稱我言三際無我怖等者沼云一令發心二令修學若不說我為誰修學即聖教說寧執有見如須彌不執空見如芥子由執有我順得無我如有初果人入觀斷分別粗我餘俱生微細我在觀中不見其分別粗我不得便言今者我我何存在耶言有自他染等者稱我名自呼彼名他我一切凡夫五趣衆生總名染我二乘菩薩有染有淨如來唯淨我染者由世間我淨者由聖教我能作善業受人天樂果名善因果我作惡我受三塗苦果名染因果我僧尼之我以出家學道為事業在俗之中我以士農工商為事業於此等中若稱無我即無差別是故稱我言一示不乖俗等者賀云此真不乖俗以解我聞正宗之中雖顯於真序分之中示不乖俗故言我聞言理雖顯妙等者所詮理雖說無我之法能詮之教且說我聞言欲顯真諦等者問說無我之言既不乖俗及以粗者欲顯於何答疏言欲顯等正宗之中說無我顯真諦序分之中而說我者不乖俗諦所詮理中無我理為妙法能詮教中言我者不乖粗淺事無我之中強指我者欲顯真諦不離俗故問何為不乖俗答二說一宗真而序俗二理妙而言粗由印度風俗莫問尊卑皆得稱我故今真假俗顯二者亦是相形待法將俗顯真將真顯俗若無俗諦何處立真若無真諦何處立俗唯識頌云故此與依他非異非不異即真俗不相離義愚人見生死涅槃即條然有別如水與波智者了之體是其一若水與氷其體亦一夏月氷消為水若冬凝結即水成氷真俗亦爾亦是有我便是無我亦是無我便是有我若言有我者遍計即無若言無我者依圓即有即是真俗不相離義如繩中麻木中火水中溫色中空等言二我者則云第二義中但是一人隨德名別古說實有三人今對古人故標此語淨名經云舍利弗問天女曰汝於三乘為何志求天女曰若以四諦法化衆生我為聲聞若以十二因緣法化衆生我為緣覺若以大乘法化我為菩薩今以聲聞最劣直云慶喜獨覺次勝名喜賢菩薩最勝復名喜海隨其德化以立三名言一云慶喜者名標起願之初生乎得道之夜面如滿月目類青蓮能令見者悅神亦使大王歡喜故名慶喜名標起願之初即是昔為瓦師二云世尊初成道天魔報淨飯王大王悉達太子一切義成昨夜夜半已死淨飯王忽聞愁憂不樂舉宮慟哭續又報云大王悉達太子一切義成昨夜明星出時已成正覺王問云初報死是誰又報云成道是何人空中報曰大王初報死者是天魔後報成道者我即是摩耶夫人或說是菩提樹神天明諸公侯及諸王賀大王喜斛飯王又奏云臣妾昨夜誕生一子王作名字慶喜言賢者集藏說各有三藏緣獨覺無別部分攝入聲聞藏中下為求聲聞等言喜海者問何名喜海答聲聞如小水緣覺如中河菩薩如大海故名海也言隨德名別等者如世間一個人對父稱子對外生攝舅對姪名叔等只是一人聖所傳三乘法各以得其名非體別也言阿難由此多等者多聞聞慧聞持思慧其聞積集修慧佛地論云無量經典初中後停能聽能受故名多聞隨所聞義皆能憶持令不忘失故名聞持數集文義令其堅住是故說名其聞積集若小乘有聞慧時無思修有思慧無聞修慧三慧不齊起大乘瑜伽三慧俱緣教理與小乘別言若稱名字等者雖順他無我理亦順世間五常道理無於諸法得自在義三藏教法名諸法若空言如是阿難聞將謂空解聲聞藏不解餘二藏空向聲聞得自在餘二藏不得自在若言我聞三藏之中總得自在若三名總稱即文繁不便由此但言我聞即無前過我之一字通貫三名稱於總我無義不包若言別名失餘二義故不稱名言三我者親義者世間言我見聞即是親義若言阿難聞則疏若會下識阿難者知高座上是真阿難若爾識者將謂阿難不在會中若言阿難聞會下便有同名阿難時人曰為是毗耶離阿難為是王舍城阿難或云阿難聞衆疑云或非親聞或從他傳受問疏云非親聞與從他傳受何別答非親聞疑不是佛邊聞來從他傳受則疑向他人邊聞來言令顯親聞等者決中問如來成道二十年後阿難方始出家為侍者二十年前不聞之法如何經首皆稱我聞答阿難出家已後佛重為說為說由前所說經典亦得稱我聞今詳阿難因得授記便能憶念過去所持諸佛法藏況二十年所有經教而不能持今言親聞所說乃是四十年後說法華授學品經文阿難面於佛前自聞授記及國土莊嚴所願具足乃至即時憶念過去無量千萬億諸佛法藏通達無礙則云我聞者聞真實之妙唱得究竟之玄說了達千萬億佛法藏豈況二十年前者戴故總攝我聞固無違理總攬諸文可為七釋一本願力故二展轉聞故三加持力故四佛略說故五三助力故六聞汝力故七授記力故言聞謂耳根等者攝別就總解也且疏外解大小乘三師解釋不同第一聲天論師根聞識不聞識能了別不能聞聞聲須是耳根也二妙音立識聞根不聞以根是色故不能取境根如卷畫皮三世友師立根識俱聞問此第三師與大乘何別答由柴正不同大乘根境識三和合方聞小乘識外別有境境與識別大乘不然境不離心從心所變事須根識聲三法具備此門中從聞謂耳根至對境和合方名為聞是疏主第一解聞聞唯取耳根發耳識取聲聲境唯是實徑聽聲問何故唯取耳根發耳識名聞耶答約根本說約初時說以彼耳根與意識為明了依若塞却耳便不聞意識聞教事須得耳根與門約根本說言耳聞又聲是耳根家所取境聲又與名句文為取依名句文與意識為所緣聲又與意識家所緣名句取所依故但說耳聞不說意聞也此疏主第一解中意也問何名為聞答疏云聞謂耳根等即是依耳根發耳識聽聲境也言今廢耳別等者問緣境之時既耳根發耳識聽聲境何不言耳聞言我聞耶答疏云今廢耳別等耳是六根中一別嘆耳之時攝六根不得言我我則是五薀總號故廢耳別就我向上說耳言雖依大乘根等者問唯大乘義根境識三和合名聞何故空約耳向上說聞不說識及境耶答疏云雖依大乘然根五義勝於識等五義者一所依勝識依於根根不依識乍可有根之處不妨無識未有有識之處無根根能與心王心所為親所依境雖能牽生於心非親所依故二能生勝識生之時藉緣多則劣根生之時藉緣少則勝由色種子生色現行已由有根故始有能依識識必依根生根不依識生三相續勝五根是第八識相分有第八識則有五根第八識常相續五根亦相續從生至死相續不竭眼等諸分間斷三性易奪此五根一類無記故名相續四自在勝能為主故根與識與境二種為主對能起心心所得自在名五莊嚴令身端正嚴好心心所等既無相狀無勝先由清淨色根為所依然故有扶塵耳根為莊嚴令身端正嚴好心心所等既無相狀無端嚴故此五義對法論也問何不隨於境立名答唯識論云隨根立名具五義故謂依於根二之所發三屬於根故四助於根五復如於五根第一依於眼根識得有不由於有色而識之定生如根壞人雖對色境而識不起第二根能發識若根變異識必變異如迦末羅疾損眼故所見青等皆已為黃非壞色時而識名壞第三屬屬眼之識由識種子隨逐於根而得生故故名攝屬第四助助眼之分由根合識有所領受令根損益如觀日月第五如根根之識根識根識二法俱有情數故名為如其唯識論但約根立名不約勝義故經不取之且依對法論文約勝而說牟問等五根以何為體答相國云說根義殊有十一宗大衆部立五色根即內團為體二薩婆多離心之外仍有實體三成實論師子曹云由色香味觸四塵由所造勝四大是無常法此中四大總得成根體四經部五根雖皆是假然是實極微成五說假部根通假實五薀門中實處界門假六順世外道即以四大為眼等根體七一說部唯有根名都無根體八勝數論師計眼根即塵耳根即空鼻根即地舌根即水身根即風九難陀師見分種子名眼等五根十安慧菩薩以遍計所起相分為五根體以能取所取虗妄起故十一護法菩薩根識各別從種於中有二一云唯現二通種現故言然根五義等上攝別總了言若但聞聲等者親疏相比也問耳根但聞於聲不聞名句文教體事須是聲名句文四法具足何故唯說耳根不說第六意識耶疏答言若但等若但緣實聲唯是耳根耳根不緣名句文若假實合說事須兼第六識方名為聞也名為名句文也義是所詮理問第六意識緣名句文兼緣聲何故亦言緣名義不言緣聲答聲通耳識及第六識緣意顯緣境之時第六識偏勝向第六識上簡却一分耳根緣底聲空言緣名義不言緣聲也言故瑜伽等者引論證成問何聖教等說名句文是假法如何喚作文耶答疏云瑜伽等以彼名句文是假第六識緣之時名比量又問第六識緣境之時既通三量何故瑜伽只言比量答論文之中偏緣假說不約緣實也偏約緣名句文不約緣聲偏約散不約定定心聞是現量攝量有四種一現量二比三非四聖教量如眼見青黃等色即是現量二如眼見遠煙必有火是比量三空華龜毛兔角等即非量若與前五同取五塵境即現量此即散位而言若定心中第六唯現量言耳名聞等者問既瑜伽論第六意識名聞者何故不言意聞還言耳聞答疏言耳名聞者親聞等有二義一則緣耳根親聞於聲聲與名句文為所依二則與意為門耳根與意識為明了門有此勝用故偏說於耳也今者言意雖能分別由耳與意為門意識方能分別意方聞故若唯耳聞不能分別由意能分別法義故言復與耳為門然意與五識同起者即與之為問若獨頭因起者即不與之為問若約親緣於聲是第八識何故不能取第八識名聞答以第八識不能熏種所已簡之也言以二為門等者耳身為一門意識為二門耳識意識與熏習為門熏得種子落在第八識中名熏習在總總有二義一者第八識名總二者五薀身亦名總言因聞所成等者立聞熏義也名言種子因聞所成總名聞也前來聞為比量證第六識名聞耳名聞者證耳識名聞以二為門熏習在總證第八識能持種復是所熏言廢別耳意等者問阿難何故不道耳聞答疏云廢別耳等耳是色薀中別識是心法識薀中別空言色識但得二種失餘三薀故廢別取總故我聞言見覺等者問慶喜當時見佛說聞佛說覺佛說如何四般唯言我聞得在經首餘見文見知三義何不標歟但小乘云眼見耳聞意知鼻舌身三名之為文見若大乘即鼻舌身三名知意識名文見問第六識取境何識取境名見聞等答眼識取境名見耳名聞鼻舌身三名知以合中知故意識名文見問阿難當因何不言見等答有三義三義者言一欲證深理者緣聲下有名句文三證得其義即名詮自性句詮差別文即是字為二所依為文下有名名下有義即有修斷二問欣猒二義要須先聞如來聲教佛為衆生說法聲上有其名等能詮義理聽者悟此漸證深理故此經首量言我聞若言見色等等取香味觸三未悟於法色等之上無名證詮義故故初不言我見聞等言二此界以音等者問如何此界不說見色𭊴香空說聞文見耶答但依此土以其音聲而為佛事能詮名等以聲為依此界不以色香味觸而為佛事名等不依色等有故言聲為所等者即名句文三依聲而立為聲所依名等為能依問何緣不許名等依色故答此界以音聲為佛事問如人招手等前人解意豈非依色有名句文耶答據多分說故論云然依音聲分位差別而假建立名句文耳言三希證菩提等者賀云若以欣求證菩提者要多聞熏習以為因故方至出世大乘云多聞熏習出世心之種子不由見熏方成出世又云外無熏習非內種應知聞等熏習無果生非道理故不言我見也言由斯經首等者永云由斯三義故說我聞不言見等言據實于時者問維摩居士杜口毗耶文殊覩斯以悟不二寧非色等能詮理耶答初談淺理後至幽微言議斷而心路亡故以無言而顯真理約本而言亦由聞斊復見非色已悟不二言首諸餘佛土等者光明即色等耶香味觸故上生經說彌勒入楞嚴三昧放大光明光明之中現數般等文字此則見色而悟道如昔有同學二人州臺去去時辭和尚和尚皎幽脫膊努奉頭弟子唱諾便發在路小第問師足向來和尚努奉頭何緣唱諾足曰汝不知意見我二人來和尚交汝努力又如香積世界一切菩薩坐香樹下聞斯妙香即獲一切德藏三昧此即因香而悟道又云時諸大衆食此飯者此即嘗味而悟道又華嚴經說善財童子尋善知識至長者女邊求法女言仁者與我執手當令汝得未曾有法童子不背毀我梵行女言大士行菩薩行不借身命況於手而不肯耶童子即便執手亦執手已即見鏡中過去無量百千諸佛菩薩難行苦行又見簾內無量百千微妙佛土又見壁中無量諸佛各說不思議法此即因觸而悟道問諸大菩薩具足總持何故阿難獨持法藏答涅槃經第四十說雖有無量無邊菩薩具大慈悲各各忩調伏眷屬莊嚴自身以是因緣我涅槃後不能宣說十二部經或能宣說人不信受佛告文殊師利阿難比丘是吾之弟終始事我來二十餘年所可聞法具足受持喻如寫之一瓶具八種不思議一者事我已來未曾受別請食二者事我來未曾受我故衣服三者自事我來至於我所終不非時食四者自事我已來具足煩惱隨我入出諸王剎利豪貴大姓見諸女人及天龍女不生欲心五者自事我來持我所說十二部經一經於耳不曾再問唯除一問謂空三昧六者自事我來雖未獲得他心智常知如來入出諸定七者自事我來未得願智皆能了知如是衆生別如來所現在皆得四沙門果有得人身天身八者自事我來如來所有祕密言教悉能了知由此偏傳法藏言於此義中生等者即以問詞而為分別若言不說法升攝波經云我所說法如手中葉未所說法如林中葉若言說法言我聞如何楞伽經中說我從光曜終至涅槃於其中間不說一字何言說耶言答有二解者牟云凡有四宗計教法不同於此質影應為四句分別一唯立質無影大衆部等二唯影無質龍軍等三質影俱有親光等四影質俱無清辨等勝義諦中心境皆空言一者龍軍等者今此菩薩降伏異宗猶如龍王能破諸敵有大威猛故曰龍軍也此師佛滅度後七百年外南天竺國有論師名龍猛造智論釋大般若言等者弟子提婆造百論等廣明空教破彼執心佛所說法即是本質衆生聞者即是影教今此二解兩宗龍軍親光等是此初師計如來果位無前十五界五根五識五境前十五界既無便無聲界聲界既闕即無名句文故佛不說法問何故無前十五界答如來身土功德甚深微妙非有非無離諸分別絶諸戲論非界處等法問所攝前十五界唯有情不通果中一者佛果位中無有漏根二者佛心常在定論說五識性散亂故但有意界法界意識界言佛唯有三等者三法中初二自利第三利他大定即佛自利德大智即根本智大定即二智所依第四禪中第九品定大悲是佛利他德即後得智化一切故且大定有二種一極微細定如來能得微細之定十地雖能得定然不入微細定也二遍盡定如來遍十地能書入諸定由未廣大唯如來廣大得大智有三種一性相圓明智性即真如相即俗諦如來於彼真俗兩心普能證入圓融朗徹故名相性圓明智也二妙用垂邊智如來此智能作大事極廣大故無有邊量作用無方為妙用三善達根宜智如來此智能知三界衆生三乘根機熟與不熟等大悲為三種一遍拔諸苦悲如來此悲能拔三界三苦八苦等二平等解脫悲即此經云等賜牛車愛無偏儻也三遍書諸苦悲即今三乘亦除諸執染等上釋宗言久離戲論曾不等者亦理也夫論說法皆是戲論既無戲論因何說法戲論有三一有漏名戲論無漏名不戲論二分別名戲論不分別名不戲論三說法名戲論不說法名不戲論如來身土功德甚深微妙非有非無離諸分別施諸戲論非界處等法門所攝故不說法也言由佛慈悲等者釋難也問若離戲論不法說者尊者阿難何以言如是我聞答疏云由佛慈悲等由佛因中無量劫來常發願願我成佛一切衆生見我身者發菩提心聞我名者斷惡修善故今成道衆生見佛自心生解謂佛說法又自家發願只如我等衆生無量生來發願願我常得見佛聞法一者衆生自家願力二者又善根熟故又詑如來本願以為緣力衆生自家識上文義相生小乘人四諦十二因緣文義相生大乘衆生六波羅蜜文義相生由空谷傳聲虗堂習聽如今日世尊無不說法由衆識上自有經教文義相現自是衆生有緣感得心上有經教等義相生理實如來曾不說法言此文義相等問自是衆生自善根力識上文義相生者何故言佛說某經等答疏云此文義相等意云雖衆生自有善根力起惡假於佛而為強緣名為佛說猶如先考亡後男女夢中見其父母誨示宛照心上見者自是愛心變為影像若論先考元本不來今日世尊說法復如是緣世尊因中說言願我成佛之後衆生見我者識心之上文義相生煩惱消滅乃至念名皆得悟道等若言依自善根力者非論說法名影身亦名影且如地前地上乃至十地所見身量不同故知唯影若論真身唯證乃至如何凡夫等得見也言無性云等者引證衆生識上文義相生無性即無性攝論簡天親攝論八時者唐三藏所翻頞瑟吒此云八時即是聽者所經時節一云八轉聲時體業等因解為正二云華嚴會八時亦有說云為方四時每時之中有晝四夜四名八時一說義淨三藏云一瑟吒此云樂欲時就八時之中即據聽者樂欲聞法之時安國問此二三藏並詣祇薗親臨聖疏緣何一義翻釋不同答隨梵本頞之與一而便譯之無過失唐三藏約聽者所經時故言八時淨三藏約聽者聞法時雖總是攝論取義前後不同也牟云取樂欲時為勝於八時聞者識上以彼樂欲屬聞者故若依八時即八轉聲時為勝也言直非等者攝三解一長行名直頌文名非直二約十二分教中別相契經一部名直說餘十一部名非直說三者名詮自性名直說句詮差別名非直說如言大即是自性名直若道草糠大是差別名非直如五薀中色薀是自性是直常無常等是非直言聚集顯現等者小乘問曰我宗三世是有相續不斷可成教體汝大乘宗中現在一念法暫時有用流入過去大乘過未無體如何得成教體答安國云出體有二一者七心出體連帶解生二者十二心出體新新而起凡是教體皆是卒爾尋求決定染淨等流成五心也具七心者如說諸字時有卒爾尋求二心也聞行字時但有決定一心聞無字時有尋求一心聞常字時有決定染淨等流三心是名七心也十二心者聞諸字有卒爾尋求二心聞行字有卒爾尋決三心聞無字有卒尋二心聞常字五心並現名十二心也法菀云由憶前字展轉熏習連後字生於最後時始能解義雖無邊未而教體亦成章云聚集現意明前念已滅之聲熏第八識成種子性後念意識任現在時聲本質聲雖云已滅由種子力影像顯現乃至多念聚集而生共作能詮名為聚集顯現言彼自難云等者問答也此論中引文倒也正合先云彼論初言伽梵前已能善入大乘菩薩為顯大乘體大用大故說攝大乘品次引論意攝大乘論是西方菩薩造簡要云解他西方阿毗達麼經此經有七百卷此方不來唯有一品名攝大乘品此品偏共衆生有緣菩薩所已造攝乘論偏解一品問為復如來實說阿毗達摩經菩薩造論解證如來說法復為是菩薩自家識上攝大乘文義相生證如來不說耶若佛法菩薩必說若佛不說菩薩不說答一云菩薩能說法也前來立理中佛久離戲論佛不說法菩薩在因之有戲論何妨說法佛在果中無戲論不說法也若爾即將菩薩造論及說法返證如來不說法也二者兼經為所解菩薩造論為能解兼所解之經佛亦不說菩薩見有經亦是自家識上大乘阿毗達磨文義相生也故疏言論復自答彼增上等意說佛不說法菩薩自家識上大乘阿毗達磨文義相生此文義相亦是託佛利他願力為增上緣菩薩自家識上有文義相現約就強緣故稱佛說言譬如天等者如人從天乞聽明求論呪等夜夢見天神授與論呪夢中又耳識不行不合開聲天又不言但是天神為增上緣自家識心上有論呪等相現故知此人夢心意不能分別本質論呪緣無耳識為問引故然所見論呪自心顯見也此亦如是問既是睡眠六識不行如何得有卒爾耳識同時意識如何得聞而復記得答睡眠有二一者有心二者無心此是有心即有夢無心極重者即無夢今第六識自起獨影境二二實亦無天等將論呪與之但由彼天增上力故令意識上論呪顯見故引為喻證唯自識問佛無戲論可絶名言菩薩未亡豈同無說答無性菩薩不說說如夢中得論呪故親證性善入大乘戲論亦亡言故經亦言始等者只此十六字亦是佛為增上緣衆生自家識上有此十六字相見大般若云佛告善現我曾於此不說一字汝亦不聞當何所解何以故甚深般若言說皆遠離故言如母齒等者汝南先賢傳云周暢者安城人也慈孝母身有疾子在野母要見子嚙指便至母亦不喚子亦不聞其子於母而生喚解也賀問若實不說如何經言我所說法如手中葉等答為增上緣令他得益如手中葉等名為說也無性論主意佛說法今疏中偏談不說者疏主意既言不說法佛教以何為體答衆生識上文義相生為體因此即引無性為證無性意者以衆生識上文義相為體一唯識義故二因緣故如說諸行字聲過去無字在未來十二心前十一心落謝過去其像相皆識心見連帶解生相分見分同種生故是親因緣及取能說者識上文義展轉傳來為教體不取能聞能說聲名句為體問云何無性本論云已能善入菩薩為顯大乘體大故說此即文句為體答彼本論為增上緣故作此說也如天等力聞者不以耳聞天不以句說而令心中論呪等現意天鬼為增上緣取能求者息心所變論呪等法而為其體即不取天等論呪為體也言二者親光者言等者等取護法菩薩佛身具有薀處界等又唯識九云如來功德身土如應攝在薀處界中又處處說於無常色獲得等化度云五薀中聲是色薀十一種色中收名句文是行薀攝十二處中聲是聲處名句文是法界十八界中聲是聲界名句文是法界既有十八界有聲名句文何言不說法明知佛說法相國量云如來五根定不無故以是六根中隨一攝故如意根二云如來五境界定不無故六界中隨一攝故如法界三云如來五識乃至如意識反量所知既成十八界已故知說法言由離分別等者前龍軍等師云久離戲論曾不說法者由離分別名無戲論曾不說法者豈不說法名無戲論耶佛果位中任運而說說法與分別不同也分別加行心佛位之中無加行佛果位中又尋伺不說法宗只將為分別說法名戲論使道佛位中不說法不知佛位有無戲論說法只是離相而說不住三輪但是佛不起分別心說問如何無別心說法答佛說由如一雨天雨是一草木根性不同稟潤各異非雨有兩般三般佛說法時但說一味法隨衆生根有三種便見有三乘五乘佛無分別作三乘五乘解此是耳耳根性我與汝說四諦十二緣等故知佛無不分別故經云如來於一語言中等又經云佛以一音演說等只是佛無分別心說名無戲論非不說法名無戲論言謂直聞者等申義也直聞者即自三乘五性衆生也善根本願者有二一即是衆生無始時來曾發願願我見佛聞法逢善知識以此善根感如來識上文義相生二者此佛識上文義相是如來利他善根所起故稱佛說此即直說法人也前來不說法宗由佛因中發願為緣感得衆生識上文義相生也今此說法宗中由衆生發願為緣感如來識上文義相生歒體相翻此問疏文有二意一從直聞者善根本願緣力此上屬衆生下言如來識上文義相生等屬如來也第二科云謂直等者善根屬衆生也從本願緣力至佛說者屬如來佛因言此文義相是佛利他者中發利他願願成佛了起三業教化衆生酬本願緣力即佛識上文義相生為求聲聞者應四諦法四諦法文義相現是佛利他善根所起此是木質教名為佛說言聞者識上等影像教佛託衆生善根衆生託佛三無數劫利他願為善根故有質影差別也問如來教聲乃是無漏衆生心識即是有漏耳識不能親取本質無漏之教如何今者言我聞耶答疏言聞者識上等如鏡照本質似彼名能照變影緣無漏似彼名我聞相云佛所說法無漏為本質聽者心變有漏而緣影質既殊名不親得八地已上無漏後得智所變文義相隨於見亦是無漏教實質無漏七地已前通漏無漏地前小聖一向有漏二乘雖有一分無漏後智不能緣事但能緣如故今者阿難隨應可解言世親說言等者引二十唯識證也世親言謂餘相續識上別故此上佛身也謂餘者如來是能說法人衆生是能聽法是能聽之餘故名謂餘相續者耳義即是佛五薀假者身義差別者即是佛識上無漏本質之教若文若義種種不同名識差別也以此為緣令餘相續差別識生令餘者即目衆生也佛為能說衆生為能聽能聽能說之餘故名令餘也相續者身義言差別者即自衆生識上影教種種不同名差別識生也言彼此互為等者佛利他善根為增上緣衆生得聞衆生善根為增上緣感佛為說名此互為也佛雖成道若無衆生欲為誰說故知衆生亦與佛為增上緣故天上月如佛本智緣力水中月即衆生識上文義相生問佛實說衆生實聞識心云何得成不離識義答賀云展轉增上力二識成決定利他之力不離佛識心衆生善根不離衆生識名不離義也言由此經說我所說等者引經如來說法瑜伽六十四升攝波經作如是說梵云升攝波唐云胡桃林離心云申怒林亦云申云林言如末尼等者證如來無分別說法末尼是珠無有分別能滿衆生所願天鼓即帝釋宮中鼓無人扣擊能隨天所願出四般聲怨來怨去受樂生厭等可知牟云將殊況佛身將鼓況說法且珠體無思雨衆寶衆生實得受用佛無思而說阿難實得聽聞天鼓無思出聲帝釋實能悟解珠鼓不過二意一化身益如如意珠二說法益如天鼓也言此中二解隨彼等者說不說法宗名二龍軍引經證不說法親光引經證說名兩文也緣綺互者龍軍即道佛不說衆生識上自有文義相生有處言說法者彼增上生故作是說親光則言佛實說法龍軍引經文來證不說法了破親光引來便是說法親光引文證說法破龍軍解成不說法故名隨彼兩文等親光會龍軍所引經文佛不說法一字汝亦不聞者有十義一者依法自性身故言不說金剛經云如來無所說二者初自受用身故言不說唯佛與佛乃能知之三者約他化身故言不說論云應化非真佛亦非說法者四者約諸佛所說不果不果故名不說下云一切諸世尊皆說一乘道述而不作五不說墮文字法淨名云文字性離無有文字六佛無有不證知故故不說佛於理事皆親證故七約圓滿實性無言說故言不說八約依他起性緣生之法虗幻非實九約遍計所執自性妄情計度情有理無故名不說十約佛所說法非聞者親所緣故故云不說聞者事須變影故結偈言三身無異墮文字不證三性疏所緣聖教以此理為依是故龍軍不說法問見佛宣說諸法云何言不說一字答據根本無分別智證會法都無言說故言不說一字也於此略辨教體十門一攝相歸性門維摩云一切法皆如也梁攝論云從最勝清淨海流出正智正智流出後得後得智流出十二分教攝末歸本文非一故二廢境談識門華嚴云佛子三界虗妄唯識所起一切從心轉若人如是解是名真佛子三攝假歸實門一切諸法以聲為體名句等假故離聲之外無別名等對法云成所引聲為諸教故此名等是假且約此方說諸餘佛土中亦以光明等四廢實談假門即以聲上屈曲為體唯識云此三離聲雖無別體而假實殊亦即聲也五假實合說門即四法為體無垢稱經云或有佛土以音聲語言文字而作佛事十地論云說者聽者俱以二事方得究竟一者善聲二者善字六有漏無漏門以能說人聞無漏教思准可知七能詮所詮門即以文義二法而為體八十云為契經體略有二種一文二義文是能詮義即所詮八五法并明門有二心等五法名等五法有差別故初中心所攝假從實聲為體色攝境從心心為體識廢實從假不相應行為體攝相歸性無為為體第二攝境從心以無分別正智為體第三並約有體歸性歸相隨應九質影兩相門四分別一唯質無影正量部又薩婆多亦此所攝彼計佛前十五界是有漏故有此呵天授無比女人生貪有直以佛有漏聲為教體二唯影無性論計佛現身說法然不取佛質教恐心外取法若龍軍即不現身亦不說法俱不取質同入此句三俱有護法親光佛地論云由聞者善根增上力引聞者識上有漏無漏二善種子文義相又二十唯識云展轉增上力二識成決定即衆生慧心決定佛悲心決定故云二義成決定護法云能說者識上所現文義相雖聖能聽人識心是心外法若望自亦不違唯識義十五心集現門有宗難云我說三世是有可得相續成大乘過未無如何成教體為展轉連帶聽者識上聚集解生故無性云貫穿綴縫故得名經也言意避增減等者阿難加佛語名增減佛語名減如來說三周阿難說二名減如來說遍計所是無阿難說有名增佛語故名增減回換語以先為緣以後為先色心不同理事相返總名異分也異者殊義分者分別如來說空阿難改作有此名改佛言名異分符問反分者因義過失因言謂如是法我等者為令生信信阿難語非他人說非展轉傳聞他字與展轉別讀顯示聞者有所堪能堪能之言離增減異分過失名堪此一句上信阿難身諸有所聞者信阿難所說法也言非如愚夫等牟云夫大天五事餘所誘無知等云云此解不必是大天只是凡夫也非如愚夫聞法之時皆不能離如是過失名無所堪能諸有所聞或不能離增減異分結集法時傳佛教者依如來教初說此言如是法我親從佛聞文義決定離異分無有損減也言是故聞等者三句疏文配聞思修三慧也承泰云佛本教置如是我聞者意顯所傳離於減異分之失令諸衆生生信順故是故衆生聞此法已當勤修學也
