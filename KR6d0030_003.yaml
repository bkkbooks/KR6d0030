body:
  text: 鏡水沙門栖復集言後破執者初以義門分別後疏釋破其迷執略以六門分別一釋名二出體三約識有無四執障寬狹五三乘伏斷六得果有殊且釋名者賀云堅執計著名之為執聲聞之人計著為究竟如來為除此迷情執故説此經又云操持守攝名執執謂封著執謂情不捨劣見但與心心所相應起者總名為執執者計小果而生執者決定義聲聞四十年前證得小果謂與佛等如人行至寶山把著瓦石謂是真金堅執不捨執若門不開不肯進修大行但得小果謂是真極於戒緩者不名為緩於乘緩者方名為緩也二出體者二執皆以染慧為體成唯識論云我法二執以慧為體謂即惡慧非善慧此慧起時無明俱故若餘心所相應起者總名為執五見中薩迦耶見為體此是假法假法如無非因緣故以我法二執俱依一慧以慧為體勝也由有無明故無我之處妄執為我無法之處妄執為法此通外凡有也若二乘羊鹿化城本無妄執為有此心是法執也三約識者安慧云前五第八唯有法執而無我執末那唯我執謂執賴耶為我第六意識具有二執雖具二執有間斷故謂此意識五位無心所依之識既不有能依之我亦有間斷也護法云此理不然意言執者執著分別方名為執前五任運緣境賴耶亦任運緣三種境只有任運分別隨念分別云何言有執也護法正義云一我執八識有無二法執八識有無且我執有二一者俱生二者分別俱生我執無始時來虗妄熏習由內緣力常與身俱不待邪教及邪分別任運而轉故名俱生此復有二一者常相續在第七識二者間斷在第六識此二我執細故難斷後修道中數數修習勝生空觀乃至金剛心方能除滅分別我執者亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯有第六意識中有有二一緣邪教所説蘊相二緣邪教所説我相二法執者略有二種一者俱生二者分別名義與我執同也此法執細故難斷後修道中數數修習勝法空觀即能斷滅護法云六七二識具有二執若常相續在第七若間斷時在第六識五八識中二執俱無謂是自淨無記若第八識含諸種子即得若令起現行而有執者無有是處也若安慧師八識總有執五八唯有法執執第七唯我執第六通二執也四執障寬狹者執即狹障即寬謂執唯在六七識有唯除第八執障俱無護法云六七二識有執有障五識有障無執且如前五識有貪嗔癡三而無其執若是不正義即言執寬障狹緣執通三性障唯不善性故狹正義即約八識論寬狹不正義即約三性以論寬狹也五三乘伏斷者七方便伏我執初果斷若大乘資加二位伏初地斷又分別我執見道斷俱生我執地地皆除謂十煩惱中六通俱生十分別起初地斷分別兼斷一分俱生乃至佛果斷最後一分身見是執第四地斷若障直至十地滿足金剛心斷六得果有殊者賀云聲聞斷煩惱障唯得涅槃菩薩雙斷而得二果菩提涅槃此中執者此法執及所知障也上中二根及諸羅漢我執煩惱先已亡故謂除法執及所知障説此經也上來六一釋名二出體三約識有無四執障寬狹五三乘伏斷六得果有殊言聲聞有二者標能執人能執人中有聲聞有菩薩兩類人中皆有能執人所執法且聲聞有二初疏主泛明兩種聲聞後依瑜伽法華論列四種聲聞今且泛明二種者問疏主何故不同他論家敘四種空説兩種耶答此間疏主約實種性此兩種緣增上慢人是暫有應化又是不實故此間唯論二種聲聞也從他聞聲而得解脫謂於所聞教法聲發心修行得小果如是種類故名聲聞也言一決定種性者瑜伽云有五種決定一種性決定二發心決定有聲聞種性決定發聲聞心三得果決定四入無餘決定五不成佛決定今此疏中具三決定之義一種性決定疏言決定種性二得果決定疏言得聲聞果三入無餘決定疏言定入無餘定入無餘之言遮一性師入涅槃了再起身修行成佛故言定入無餘餘是阿羅漢五薀身是惑業之餘無彼身故故名無餘餘有三義一障餘阿羅漢惑業斷盡有餘習氣在名障餘又有所知障在名障餘二者道餘謂戒定慧有餘可修未滿故三者果餘餘者此阿羅漢身是惑業之餘名為果餘章敬云引佛性論云二乘有三種一煩惱餘無明住地二業餘謂有漏業三果餘謂意生身此不定性人説無餘涅槃者謂即真如出生死苦煩惱既盡餘依亦滅而障永寂故名涅槃此約小聖以解有餘若佛有餘雖無實依而現似有亦名有餘有漏所依略有八種一施設依謂五取薀謂由此故施設假者建立有情命者等故言説句六趣行等皆依取薀而建立也二攝受依即七攝受事父母妻子奴婢僮僕朋友眷屬等故三住持依依四食身方住故四流轉依依四食住及十二有支有情流轉故五煩惱依所謂集諦與苦果為依六後邊依謂阿羅漢最後薀七相續依四相遷故八根本依謂第八識今依第六後邊依名有餘無學位中具於四淨謂當苦不生淨煩惱不生淨不造雜業淨捨寂靜淨謂六根門喜不喜安不安樂不樂安住上捨雖有寂靜有少餘依名有餘依言無餘依者離過得名離先三餘障餘道餘果餘及後諸餘名無餘涅槃即此無學深生樂寂身如薪智如火依無漏定起智慧火燒滅自身其身既盡智亦隨滅由如燈焰一滅已後不住方所不入過去不居現在入滅亦爾問既無身智證對誰説無餘答得此無餘與有餘同時即是由前有身智時得故要身智滅位方顯無餘故唯識云爾時雖無二乘身智而由彼證可説彼有問此無餘位更何所有答唯識論云此位唯有清淨真如離相湛然寂滅安樂依斯説彼與佛無差唯無菩提利樂他業故復説彼與佛有異也滅却色薀名灰身滅却四薀名智滅也言故諸經云等者言經即是莊嚴論有文論解於經從經引來所以言經也餘人善根者小乘是大乘之餘喚小乘定性人作餘人善根即是餘有為法無漏生空智品八解脫根力諸功德法也言涅槃時盡者即是身智俱滅同大虗空天親立三緣起煩惱業異熟果事俱舍問云寧知要由煩惱能生業耶答如龍鎮池水常流不竭煩惱鎮業生續無窮以此故知二乘無學煩惱既盡發業無由惑業既無不招後有現在異熟更不感生故任先因隨業長短般𬽐無餘更不受生名為時盡亦名趣寂也言菩薩不爾者身智不無起身教化衆生故言不爾菩薩示現順同二乘入無餘涅槃身智不滅故云不爾不同二乘身智俱滅也問佛菩薩示入無餘有何意答示現入者引實聲聞令不愚法故問此不定性類同彼定性聲聞入無餘身智盡否答此不同彼留身智故成唯識云又彼入無餘者依不定性二乘而説彼才證有餘涅槃決定回心求無上覺由定願力留身久住非如一類入無餘依涅槃問如何此法華會諸聲聞輩得授記已方便更入無餘依涅槃只如雙賢法將以前往群聖蒙子而後隨迦葉入雞足而不歸阿難蹈恆水而長逝如斯等類如何會通答瑜伽論云方便示現於無餘依般涅槃界而般涅槃實身不滅化作比丘於不定性聲聞前頭倍加精進修行在前於諸人前示入涅槃計料同類聲聞欲入涅槃却出來向伊道汝知否無餘涅槃之中都來無事不如修行大行令同類不定性無學咸作是念往昔耆尊某年日月入無餘者今却再來我等何要更入無餘耶此依五性宗解問示入無餘是何意若引一類有大乘種姓人身中有小性先發小心得無學果恐入無餘玉石俱焚故引也若依一性宗只滅前六識七八二識在將用持種後從彼起回心向大若爾與無色界人入滅盡定何別無色界人已無色身又入滅定滅前六識身灰智滅入無餘依依義何在身智都盡名無餘既七八識在何名無餘一性云但入無餘皆能再起修行成佛凡有心者悉皆當成阿耨菩提五性宗説定性聲聞不許成佛若不定性聲聞不求趣入無餘涅槃只向有餘回心向大利樂有情盡未來際上定性言二退已還發等者聲聞初發大乘心後退入二乘今又回心向大名退已還發大菩提心聲聞問疏主但言不定性則得何故言退已還發答退已還發約名則寬約義則狹是故偏引來退已還發具二義一名退已還發二名不定性若不定性唯具一義是不定性不必退已還發是退已發必具不定性所以不定性名狹退已還發名寬若約義而論不定性義寬退已還發義狹言不定性攝得退已還發義言退已還發攝他不定性義不盡義即狹也只是攝得退已還發之不定性若是不定性不曾退已還發即攝不得也問疏主何不退已還發與不定性兩類雙引來耶答疏主體上下經意三周之中授記盡是退菩提心所以偏引問法華會上世尊説經既不彼一類唯不定性者豈靈山會無此一類是不定性不是退已還發之人答有一類衆生身中有三乘性大乘性未熟不發大乘心直修小乘行過去逢俱那含牟尼佛修解脫分善迦葉佛邊修加行善今逢釋迦得有學無學果問何處經文是耶答經文分明道我見佛子等志求佛道者無量百千萬咸以恭敬心皆來至佛所曾從諸佛聞方便所説法此文是也問此類早晚回心答此一類雖在法華會中只緣大乘根未熟未回心至佛滅後方熟問此一類大乘根熟時如來已入滅彌勒未下生誰人教化答世尊道除佛滅度後現前無佛則教化不得現前有佛必教化得也我於餘國作佛更有異名是人雖生滅度之想方便教化令發大乘心言初是定性等者都結二類人亦名料簡然定性不定性無有七類定性有三不定性有四且定性三者一定性聲聞二定性緣覺三定性菩薩次不定性四者一聲聞緣覺性二聲聞菩薩性三緣覺菩薩性四聲聞緣覺菩薩性賀云初定性即指第一決定種姓後不定性即指退已還發一切聲聞不過此二種故言泛明也言然瑜伽及等者依論敘四種聲聞然者前二種生起四種之道理故名為然然則疏主烈二種聲聞且瑜伽法華論有四種如何故言然也言一決定種姓者法華論也亦名趣寂者瑜伽論也亦字亦疏中道理也疏主向前早説定性聲聞了此間引瑜伽論文又更言趣寂故言亦也問何名趣寂答瑜伽云一向趣寂謂從本來是極微劣慈悲種性故一向棄背衆生事故於生死苦極怖畏故唯起安住涅槃意樂畢竟不能趣大菩提疏主參彼二論成其一名所以言決定種性亦名趣寂問決定種性與趣寂何別答決定種性通因通果趣寂唯果非因言二增上慢等者指名也此是凡夫約位也問何名增上慢人答四沙門果是增上法增上法上起慢故名增上慢今言得第四禪定名阿羅漢約勝處説其實得初禪定計為初果乃至第四禪計為阿羅漢果準此寡聞比丘皆是此類不學三藏聖教唯樂坐定名為寡聞聞道佛教有四沙門果便厭下欣上六行伏惑得第四禪定計為阿羅漢果此是心實境虗也欲界業盡不動業成欲界命終之後即受上界中有於彼中有身上起謗便作念言我聞羅漢我生已盡梵行已立所作已辦不受後有何故更有中有之身便起欲界邪見無明等諸煩惱一時起謗將知釋種無真解脫由謗解脫生地獄故問中本二身何身之上起謗答小乘有二説一婆娑云本有身上起謗大乘不許若本有身上起謗有三種相違一緣色界中有色細唯同類相見異類不見非下界眼見上地中有二者命終心皆散心故不合見三者若欲界本有未滅更有色界中有身迎來有二趣并生之過二者小乘經部師中有身上起謗與大乘同問小得謂多得為增上慢今此四沙門果全不得如何得名增上慢答若不兼四禪定亦不得名少得今既得四禪定即是少得謂多得又阿羅漢得真擇滅此得一分非擇滅理亦名少得三阿羅漢是斷惑得此是伏惑得亦名少得問此與邪慢何別答增上慢少得謂多得邪慢全不得言得若增上慢心實境虗心中實將謂四禪定是阿羅漢果增上則不是羅漢此望他心中是錯過失淺也若邪慢心境皆虗心中知不是計作是知不得計為得此則過深也問疏言此是凡夫如何名聲聞答從聲起聞故號聲聞欲擬修四禪定還因世尊向他説道有阿羅漢果我生已盡等言因彼聲教修四禪定名聲聞潞云此是外道若爾外道教中無此沙門比丘名目故非外道也準對法論亦言比丘或初修依佛後起邪見故約初心名為聲聞也言三退已還發等者標也言退已還發大菩提心即法華論文亦名不定種性即瑜伽文章云法華論中初烈但名退菩提心結中方言退已還發瑜伽論名為回向菩提此論依昔時曾學初説退心彼論約後必法起趣求遂言回向言回向者謂本來是極微劣慈悲種性由親近如來住故於廣大佛法中起大功德想熏修相續離倒究竟住無偏界而蒙諸佛覺悟引入加行開導由此因故便能發趣廣大菩提雖能發趣由示寂故於此加行極成遲鈍不如初始發心有佛種性者今法華會皆是此類也準此結文今昔雙辨望昔云退已望今言還發亦名不定種性非二論別名理亦無失言且法華會等者指人也問既言昔退菩提心今法華會阿誰是答疏言且法華等等者等取中下曾發大菩提心後時却退故言此類也言故經自云等者引證也證中有四段文初及後二皆此經中證不定性也第一段經文唯證上根鷲子昔時行大乘行不説劫數不説行位賀云佛昔空王佛時以無上道教化鷲子鷲子已發大乘心今日悉忘昔時大行才證小滅已為究竟非但忘於昔願亦乃謬於今大此證退已還發義也言優婆塞等者引第二文證劫數行位時節也優婆塞戒經者新云優波索迦此云近事男戒即五戒也經談彼往事故受此名然今如來於十六王子二萬佛時教化舍利弗令發大心學修大行經六十劫福智二嚴儀容可嬉面貌端正正彼修檀波羅蜜次有婆羅門來問鷲子曰人者修菩薩行鷲子云是我要之眼精鷲子施與婆羅門得已棄地踐踏詈罵而去云云鷲子心生悔恨施他何益故知菩薩行甚難可修不如自調早出生死思惟是已十住第六心前遂便生退向若不悔難行得過今既退屈悔修此行名退菩提心也言鷲子亦言等者第三引兩段文方便品化城喻品通證三根聲聞盡是證退菩提心也賀云昔於大通佛時為十六王子數已教化早結大乘之緣中間遇於惡緣退敗大心名退心也言由是故者由是前段經文證舍利弗等名退菩提心也言非不定性皆等者問為是定性退已還發為是不定性退已還發答疏言非不定性皆是等於此不定性中四句分別一是退菩提心非不定性頓悟菩薩修至六住未至第七住退名退菩提心又有修至七地亦是退菩提心非不定性如七地菩薩還於行上有退初地已前證上有退問如何菩薩得有退耶答非是退證二乘凡夫名之為退只是不證進得向上地名之為退二是不定性非退菩提心即疏中言亦有昔日未求於大等文是三亦是退心亦不定性即舍利弗是四非退菩提心非不定性即頓悟菩薩修至八地得四不退如順水行船法駛流中任運轉故章敬云非不定等者明法華論所立退名未能遍攝諸不定性且依此會言退無失若約瑜伽論回向菩薩退心定當回向故能遍攝諸不定性簡要云有是不定性而非是退直從小果回向歸大曾未發於大乘之心有是退類皆是不定性即鷲子等昔修大行退求小果也言四應化者標化名應化非真釋化名瑜伽亦名為變化理亦無殊也言攝大乘説等者指教也謂欲化度諸有情故或諸菩薩或諸如來化作聲聞也經云知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺言富樓那等者舉類也言等等取阿難也問爭知富樓那是化答經云內祕菩薩行外現是聲聞折云有二種化一顯化若根熟者人數廣多事須振威神八相成道二潛形密誘化為一人兩人根熟者如佛與比丘同房宿問佛菩薩化作聲聞有何意答有二意一為伏定性聲聞慢心言諸佛菩薩不得我之涅槃二為化不定性聲聞身中有彼大乘種性恐入無餘涅槃也故攝論云如世尊言汝等苾芻我憶往昔無量百返依聲聞乘而入涅槃謂調伏彼聲聞種性遂化作其身同彼種類現般涅槃經百千劫耽寂滅酒後身從彼起現授佛記令諸不定性聲聞皆作是心往昔耆尊入涅槃者今皆復起現受佛記況於我等不希作佛而入涅槃問此不定性人根熟了自回心來今既未熟何須引攝答根熟是因力引攝是外緣力因緣和合方能回心趣於大乘問唯釋迦獨此教化他方諸佛還如此否答遍尋經論乃知諸佛十方世界恆化有情一切諸佛亦同釋迦宜見少者即現一身宜見多者即現多身觀察根熟無不應者故名應化問見同類身有何文證答如觀音菩薩應以聲聞身得度者即現聲聞身而為説等言法華論等者會本論文漢云且五性宗無性定性決定不得成佛本論既言決定性及增上慢二種聲聞根未熟故如來不與授記準此即是決定種性根有熟時後當得記違他一分定性不成佛宗故此會也牟云今詳疏主意用五性宗以解此經諸論違文尚須和會況於本論耶法華論云此中唯為二等者正引論文也問退心何故與記答退心為根熟故與記問應化何故與記應化者為化故記此上二根類與記所由言其趣寂等者出後二類不得記所由問何以後二類不與授記答論云其趣寂者及增上慢一根未熟故二不分明記國土名號名佛不記問佛不與記莫有諸人與記答疏言菩薩與記即常不輕菩薩奄含與記也問佛緣根未熟故不與記常不輕菩薩與記豈即根熟莫是菩薩慈悲多於佛耶答佛則擇根而捨之根熟者則與記根不熟者佛不與記菩薩不擇捨此緣是初修小菩薩簡擇不得不識根器奄含總與授記經云汝等所行是菩薩道當得作佛一引論了言雖復總等者潛通外難此是奄含受記文問菩薩奄含受記有何意答菩薩有二一者初修小菩薩二者久修大菩薩即是勝鬘荷負四種重任也小菩薩即常不輕奄含與記論云與記令發心故問增上慢人有菩提心可發許言發心趣寂之人無心可發何言發心答發心有二一增上人發趣向菩提心二者趣寂之人發信向心信向趣向二種別故論文略故同言發心問何要交趣寂人發信向心耶答菩薩悲心如此問趣寂之人若發信向心如何經言菩提之心答兩類之人心緣菩提名菩提心也通難了言退菩提心正當等者此是出所被根與授記來由言為説一乘者意解此疑執人中有人有法也言其增上慢等者準此既是異生簡不是應化根現未熟又簡不是退菩提心聲聞故法華會中佛不與記常不輕菩薩昔日與記為具因記也不同佛授記記國土名號成佛等事言異生等者瑜伽論云三界所斷種子未永害位名異生性婆娑論云能令有情起異類見起異類煩惱造異類業受異類生此增上慢人未獲三乘聖法異聖之生異於聖生故名異生也若依大乘解菩薩入見道已去同證聖理面貌相似故名同生問疏主但説增上慢即得何故加異生之言答疏主詳經意如此緣佛不與增上慢人授記説經只緣是異生凡夫身中貪嗔癡慢只起邪見造業謗佛不與説經記意在於此所以加言凡夫又緣根現未熟具此二因故佛不記也言菩薩與記者問佛不與記緣根未熟菩薩如何與記答疏言菩薩與者即常不輕菩薩與具因記具因記者若準瑜伽論解具因者具生了二因名為具因具者具足賀云即具有本無漏種子行佛性也疏中既言後漸發心修行大行故知具因者具行性因也若依一性宗説具因者一切衆生具有此性名為具因具者總義普義若依五性宗解常不輕菩薩為兩種人若增上慢人是有種性人者具生了二因名為具因若定性無性唯具理性名為具因若準法華論意常不輕菩薩與四衆授記約理性多也若依五性解事須約有行性不遍理性即遍所以經言凡有四衆悉禮拜言當作佛言復漸發心等者常不輕菩薩交有種性者發趣向菩提心修行大行若無種性者發信向菩提心令不愚法是論主之本意也問不輕菩薩行位既小如何能記於人答菩薩有二一者初修二者久修久修識達根性隨性與記如勝鬘經堪能荷負四種重任求菩提者與菩薩乘求餘乘者授與餘乘若初修菩薩未議根器但總發願令盡作佛非如彼言總成佛道三通論四種了言應言趣寂等者正會所違亦云正當論文也牟問前來疏主言不可論其熟與不熟何故今言根不熟故答此言由無大性根不熟故即是無可熟義若不言由無大性而但言熟與不熟即當前難章云今正意者但未熟言未字稍濫可當熟者方言未故趣寂不然豈合言未改言不熟即無濫也由不如道無根可熟更分明佛不與記菩薩與記具理性因故知菩薩具因記多取理性也攝問云理智雙具方名具因今但有理何名具因耶答此經論云示現衆生皆有佛性若非理者云何言皆有疏主依此約理名具具者總也總有名具總言漸令信大者而有二意定性聲聞發大菩提心不定性聲聞有種性者發趣大菩提心論但總言理兼信趣寂者而言信之定性無性欲令信知大乘教而生信意不愚法若廣慧聲聞生無色界信有第八識知不斷滅能入滅定名不愚法也若愚法者恐彼斷滅不生於彼唯執小乘不信大乘有第八識即名愚法也只令不迷知有大乘不言成佛如阿羅漢知有三塗不願入定性雖亦信有大乘而不求量云趣寂聲聞是有法定成佛故宗因云根未熟故同喻如增上慢人反量不書答量云趣寂之人是有法定不成佛故宗因云根不熟故如無種性人無種性人根不熟無種性人不成佛趣寂之人根不熟同彼無種性人不成佛言非根未熟者賀云此定性人既非大性有何未熟後可當熟於無言未本無種性人矣何得論熟也四正當論文了言言當作佛菩薩等者重引論文也則云此遣妨也問不輕菩薩記言汝當作佛明知趣寂亦可得成佛答疏言菩薩願心等有二意一是菩薩願心二方便善巧佛心弘廣方便權宜未必無性定性總得成佛但是方便化之令發信意問菩薩與趣寂人授記如何言作佛答此不約有種性人後時根熟言作佛但是菩薩願心如此言如般若經等者引證也如金剛般若經説胎卵濕化一切衆生我皆令入無餘涅槃此是大乘無餘涅槃有種性者入無種性者不入言皆令入者佛慈悲心也非皆總入此是菩薩方便化之令發信有大乘意菩薩記於趣寂亦爾也五重引論了言若許趣寂同增上慢等者遮違理發也若許趣寂同增上慢根未熟故佛不與記後時根熟應總成佛若總成佛不得名為趣寂趣者趣向涅槃寂者寂諸生死故名趣寂若交趣寂從無餘再起者一則身智不滅二則與增上慢一處成佛若爾趣寂便是增上慢非但不得名為趣寂亦違名言甚違諸教等者違教違理教者華嚴世界品云菩薩於兜率天將下生時有十果現第三相於右掌中放大光明名淨境界悉能嚴淨大乘世界若此世界有無量辟支佛獨覺見光者捨壽命入於涅槃若不學者光明力故從他方世界又深密經第二云善男子一向趣寂聲聞種性補特伽羅雖蒙諸佛施設種種勇猛加行方便化導終不能令坐道場證菩提尊事何以故由彼本來唯有下劣種性故慈悲薄弱故畏衆苦故問回向菩提聲聞為住無餘界中能發趣菩提為住有餘依涅槃界中耶答唯住有餘依涅槃界中可有此事所以者何以無餘依涅槃界中遠離一切發趣事業一切功用悉皆心息又涅槃經三十五云我於經中説一乘一道一行一緣能為衆生作大寂靜永斷一切結縛乃至我諸弟子聞已不解我意意道有得不得方契佛心莊嚴論云餘人善根涅槃時盡菩薩善根不爾攝論云十義説於一乘引攝不定性不言引定性者故大論及法華論説四種聲聞不為趣寂授記若定性人同增上慢言根未熟後可熟者違諸教失所言違理者立量云二乘之果是有法應有定性除不定性大乘故宗因云三乘之中隨一攝故猶如定性大乘定性大乘隨一攝定性大乘得成佛二乘定性三乘隨一攝故同彼定性大乘得成佛又問彼曰在於滅定許有七八否更問無餘依涅槃許有七八否若不許者量云汝滅定是有法應名無餘涅槃故宗因云同無餘無七八故如彼無餘涅槃無餘涅槃七八無無餘涅槃不再起滅定七八無同彼無餘無再起反量云無餘涅槃是有法應名滅定故宗因云許有七八故同喻如滅定滅定七八在滅定許再起無餘涅槃七八在應同滅定得再起又量云寂寂聲聞是有法定不成佛故宗因云以無大乘因故猶如虗空虗空無有因虗空不成佛趣寂無大因同彼虗空不成佛言由趣寂等者附論立理也牟云論之梵本趣寂增上慢各別擇論之家體於經意故合論文以經言汝等所行是菩薩道當得作佛經文奄含章敬云此論意梵言增約語一義多即通不熟及與未熟譯主取趣寂增上同言未熟且得一邊次下疏為正之具如前説言正義應言等者重解論文也南云趣寂決定不熟佛不為授記若後有熟時可言未熟決定不熟何得言未熟故此正也增上慢人可言未熟後有熟時也言趣寂者後亦等者涅槃經第三十五云須陀洹乃至阿羅漢辟支佛總作佛不解我意總不作佛亦不解我意方知有作不作方解我意又如三種病人如迦末羅疾良醫拱手決定不差又恆河七人一人常沒故知不定性作佛定性人不作佛勝鬘云為離善知識無聞非法器但以人天善根而成熟之所以違涅槃等處處教文也能執人聲聞了次菩薩言菩薩亦二者標烈也一頓二漸標烈種類也亦者亦前兩類聲聞聲聞既泛明二種定性不定性二菩薩亦有二種故言亦二牟云此疏兩種聲聞定不定性此但亦前數言亦者相似之義如張人起王人亦起即以起相似前二聲聞望經正宗決定不被不定即彼頓悟不彼漸悟即彼以前相為相似此即亦前義故問下疏言義兼為三及斷煩惱小菩薩疑答此即正説一乘授三根記處為正宗體頓悟不正為説故不蒙記所望義別不可為難言漸悟有二義者疏主當日製疏在定州後講在幽州即今范陽善覺寺講會之次令學士明湛法師三義令學士德感法師徵也時人傳云湛心感貌湛法師足文詞感法師端正湛法師立此頓漸義疏主見兩師徵難總有道理所以書在疏中今此先是湛法師五果回心名漸悟兩師共許所諍者即是見道前資加二位凡夫湛法師取曾發二心曾修二行回心向大是頓悟攝感法師取曾發二心曾修二行回心是漸悟攝此是兩師所諍初湛法師取得果已去初二三四果及緣覺五果回心向大方名漸悟問何名漸何名悟答證理名悟初果聖人乃至辟支迦證理名之為悟問何名為漸答湛云有二義一者智漸先得生空智回心向大初地門中得妙平二智此則先得生空後得法空從小向大名為漸也二者理漸先證生空理回心向大初地門中證法空理先證生空後法空從淺至深名為漸也問回心已去從十信至初地一大阿僧祇劫未至初地如何名為悟答當必證故亦名悟也言一者若從得二乘果等者且二乘果者初果已去都有八類人回心向大是此間漸悟中收第一預流果預者入義入聖之流故名預流斷分別煩惱南三州及六欲天是得果處總有九人發心向大名為漸悟北州無容入聖故不説悟也二者極七返有分別煩惱斷盡得初果已有餘欲界九品俱生俱生煩惱共潤七生身南三州六欲天是得果處都有五百四個本有身容得發心歸大也第三家家得初果已從家至家得盡苦際都有二百一十六個本有身容得發心回心向大名為漸悟第四一來斷欲界修惑至第六品解脫道而得此果餘三品惑在故於人天一往一來即於此義生六欲天名往生南三州名來都有三十六個本有之身容得發心回心向大名為漸悟第五一間得第二果已進斷修道第七第八品惑唯有第九品惑在於天上唯受一生身或於人中唯受一生身得盡苦際只九人回心向大得名漸悟第六不還果有二一身在下界不生上界三州六欲天共有九類各斷欲界第九品惑計有九人容得回心二者得不還果生上八地於色界十一天各各斷見自九品惑有九十九人利鈍別開計一百九十八人得不還果總有五類一者中槃在上界中有之位而證無學其間時促無發大心二者生般此不是生有之生向本有身上立生般名以生有一剎那時促不容回心三者無行般行少加行證果入滅故名無行般四者有行般由多加行證果入滅五者上流般流是轉義於上二界流轉生故此有二類一樂慧上流唯生色界十六天除大梵王天無想天也二者樂定上流生色界中十一天及生無色界不生五淨居大梵天及無想天此二上流生雖少異論其發心唯十一天第七羅漢有六人一退法二思法三護法四住法五堪達六不動此六類中前五鈍根第六利根就前五中前四性鈍不堪練根第五雖鈍堪能練根也欲界九處色界十一天皆有無學退等六種總有一百二十八發心歸大者漸悟第八獨覺有二一部行麟喻此二名居人中三州許有六人回心向大名漸悟菩薩有義麟喻無回心文唯取部行為正也出漸悟人言由生數少等者出漸悟義未入聖位生數無窮入聖位已去初二三果生數少羅漢辟支生數全無回心向大皆名漸悟初果人有二一鈍根極七生身名生數少羅漢獨覺名惑全無又初果利根超得果者只於初果身上便得羅漢即此初果亦名全無以彼全無兩字通二處有故置或字生少與全無皆名漸悟問初師何不直將證理淺深解漸悟義何要更論生數多少耶答攝云二解一云湛法師取生數少者不是解漸悟義意道回心之中有兩類人一有學二無學兩類皆許回心緣疏中云若從二凡得二乘果有彼果字湛法師恐人疑將謂疏主空取無學果人是能回心者名漸悟菩薩將謂不取有學之人所以將生數少證有學生數全無證無學皆能回心名漸悟二云生數多少或有全無者攝云緣湛法師云不許前三人果受變易回心向大即許亦回向心了緣怕怖生死事須趣求自乘無學果了方始受變易湛法師憂心恐人疑前三果人雖然回心向大未得無學中間設使回心未受變易不名漸悟菩薩所以將生數小證有學或全無證無學總名為漸悟菩薩攝自云前解為勝何以如此答少有回心了取無學方受變易也若依後解違佛地論文論云或於學位即能棄捨求聲聞願或無學位方能棄捨求聲聞願三潞府云湛法師取生數多少正是解漸悟義何故言不解且生數多少顯證理用證生空理是體生數少是用凡夫總未證理生數無窮聖人由證理故生數少初果聖人證最淺有七生身在二三果人證理次深生數次多阿羅漢果人證理最深生數全無所以證理淺深正解漸悟義生數多少由證理淺深出漸悟義畢言若從二凡等者指頓悟也亦云釋妨難二空齊名為頓悟頓悟都有十九人第一聲聞之人資糧加行各有未定生已定生即此生計有六人六人之中隨信行則鈍根隨法行即利根利鈍成一十二人緣覺之人亦有二位各有未定生已定生即此生計有六人緣覺唯利根不開鈍根所以只有六人六人帖十二成十八又有一人直往者唯有大乘性直發大心修行大行至初地門中證二空理帖成十九人總名頓悟二凡者聲聞資糧加行名一凡緣覺資糧加行兩位名二凡又據聲聞緣覺各有二凡且聲聞資糧位名一凡加行位名二凡緣覺亦爾又有內凡外凡名二凡資糧名外加行位名內定散別故若大乘二解攝云一者十信已前十善名外凡十信已去名內凡二者十住已前名外凡十住已去名內凡故言若從二凡而歸於大即頓悟攝夫論漸悟者事須五果聖人回心曾證生空理名悟回心向大初地門中證法空理名漸若二凡回心向大名為頓悟問何以名為頓悟答以彼初地門中頓證二空理名顯頓也此七方便人有三過不名漸悟一者未曾證悟二乘果故二者生數由多三者經中不説具此過不名漸悟量云若從二凡而歸於大即頓悟攝是有法未曾證悟二乘果故宗因云生數由多故不名漸悟故同喻如地前直往菩薩地前之生數多修行至果名頓悟二凡之人生數多同彼地前頓悟攝言故涅槃等者問二凡回心名頓悟有何文證答疏言故涅槃等者牟云意言經説聖人回心劫數故知得果回心為勝問何以如此答緣涅槃經但説聖人回心不説異生異生既無回心劫數之文明非漸悟一文足以雙證言聖人回心劫數初果回心了更經八萬劫至大乘十信初心二果六萬劫三果四萬劫阿羅漢二萬劫辟支佛十千劫至十信初心八萬劫者即八萬火災劫也問湛法師引涅槃經來證為後證漸悟為後偏證頓悟答潞云唯證漸悟也所以潞府三義解漸證理生數少故漸經中説故名漸若據牟言科作引經雙證即是經中説聖人回心證漸悟經中不説二凡回心劫數證即是證頓悟二凡發心歸大頓悟也此乃成前漸悟證後頓悟準知雙證為善問湛法師義云初證小乘生空理後證大乘法空名漸悟者且如初果回心八萬劫到十信初心更經一大阿僧祇劫方入大乘見道證大乘理中間爾許時未證悟法空理應不名漸悟人答但曾證小乘生空理亦回心了決定當證大乘法空理即名漸也若小乘見道前雖然回心無有證自乘理者一緣未證理二緣生數多三緣經中不説故名頓悟攝也問未審直往凡夫回心經多少時到十信位答古解云中品下品發心鈍根精進者同緣覺十千劫上品精進者更不經劫數到十信路問云何故凡夫回心劫少聖人歸大而時長答凡夫生死無窮怕怖心強所以修行只十千劫聖人不怕怖生死回心向大修行所以遲問有學有生死尚自修行遲無學總無生死修行更無合遲於有學何故經劫劫少答凡夫總未曾證理修行疾初果之人初果初證理寶玩稽留所以劫遲問初果聖人證理劣於阿羅漢果羅漢證理最勝寶玩稽留劫合更多修行劫合更遲何故經劫少答初果初證生空理玩著心強所以遲第二果人并前兩度證理玩著心輕所以修行向大次疾第三果第四果人重重證理玩著心漸漸輕經時修行最輕世間五塵境初得時愛著心強後漸漸教輕也賀云前三果人宿住智劣於生死苦見不分明怖心稍微故經劫多無學宿住智強怖心稍強所以經劫少問凡夫總無宿住智怖苦不深修行經劫合更多於初果何故修行經劫却疾答光法師涅槃疏云意樂別故賀云二解經劫有殊一云前三果人回心雖受變易結未盡故又鈍根故有所物礙所以遲無學不然故經劫少二者直往凡夫凡夫大性催故悲心猛故雖有煩惱不彼物礙經劫小速到十信前三果人結漸微細障礙漸輕劫數亦漸漸向少問回心即是初信大乘心何故八萬方到答雖初發心信未堅固於小涅槃時時欣樂由斯緣發大心不與十信之名問初果回心何不取無學經二萬劫而經八萬劫耶答創發大心厭惡小果故不取彼今以喻顯如五人夜行失路各墮一坑然此五坑去有人處遠近不等初坑去人處有八里乃至第五坑路有一里彼初坑中人既悟出已投趣人處可依八里路歸不可却入第五之坑徒歸路近意初果回心八萬劫到即同五坑喻等問何不説向等發心趣大答果是極處向乃欣求經處據極説也問所受劫數受何生死答受變易收勝鬘説八地方受悲增者説楞伽説初地受智增者説理實若聲聞回心已或經少生多生劫數等故皆容得受得無漏故佛地説故言二者但從曾發二心等者標宗也此明感法師義也資加二位凡夫修行故名但從牟云但者對前得果故言但也意云不唯得果回心名漸悟但從曾發二心曾發二心等皆名漸悟故皆者總也總名漸悟也曾發二心者一毫之善回向二乘果名為曾發二心曾修二行者即戒定慧修名行二乘行也資加二位是二乘行行處也未發二乘心已前有一類人身中有三乘種性不發二乘心並發大乘心此是頓悟此間不攝若緇州解是漸悟設未發二乘心亦是漸悟以彼不能一向趣大故若此中疏感法師所論是頓悟攝以此間修漸悟不唯空取種性事須兼行行方成漸悟言具彼性故等者出所以也問但取具性即得何要行行答事須具種性行行二因並具也隨闕一因即便帶過若空具性便有具性凡夫為妨也一量云七方便人是有法定能回心故是自宗因云具彼性故同喻云猶如五果聖人五果聖人具彼性回心向大攝漸悟七方便人具彼性同彼五果聖人名漸悟問如何將五果聖人回心具彼性具彼性故是漸悟證彼七方便人具彼性具彼性故回心是漸悟為如對法論中證彼直發大心凡夫具彼性具彼性故是漸悟證彼七方便人具彼性是頓悟以彼一類凡夫具二乘性不曾發二乘心便直發大乘心修菩薩行以不曾發二乘心故是頓悟收答修彼行故方名漸悟問空取行行不取具性得否答便有四五六地菩薩不具二乘性伏化二乘行二乘行是頓悟收二量云七方便是有法以能回心故是宗因云行彼行故同喻如五果聖人行彼行五果聖人行彼行故是漸悟七方便人行彼行同彼五果聖人是漸悟問為如五果聖人行彼行行彼行故是漸悟證汝七方便人行彼行是漸悟為如四五六地菩薩行彼行是頓悟證彼七方便人亦頓悟答空行行亦不得事須兼具彼性行行兩法為因也問具性行行兩法若總具足得否答亦不得便有定性聲聞妨也定性聲聞具性行行不是漸悟以無回趣義故更取第三因來歸大者方名漸悟定性聲聞無歸來大義三量云七方便人是有法得名漸悟故宗因云具彼性修彼行來歸大故同喻猶如得果回心具彼性修彼行來歸大故同喻猶如得果回心具彼性修彼行來歸大得果回心名漸悟七方便人具彼性修彼行來歸大同彼得果回心名漸悟實品有三一定性聲聞闕宗中向大二四五六地菩薩闕因具性三二種二性一種三性便發大心闕修彼行也出所已了言聞亦悟解等者通妨也湛法師難云我宗中取得聖果已證理名悟回心向大先證生空後證法空名為漸汝感法師取見道前凡夫名漸悟設能回心縱成漸義何得名悟答疏言聞思等悟有二義一者證悟二者悟解名悟今取悟解名悟也我取見道前七方便人先將聞思二慧聞生空教悟生空教下道理後時將聞思二慧聞法空教悟法空教下道理此解悟義也問如何名漸答我將聞思二慧先聞生空教次聞法空教先悟生空理次聞法空理從淺至深從小向大即名漸悟問何不兼取修慧答寬狹不同聞思二慧寬修慧狹取寬不取狹或影略説説聞思影取修慧也通妨了言況復亦有生數少等者例成也感云我本來只將聞思悟解解漸悟義其義極成汝湛法師無端地將生數多少解漸悟義我宗之中灼然不安若湛法師必若安生數多少我宗中況復亦有生數少者等疏答也二云汝湛法師取生數多少是證理之用解漸悟義云前三果人證理淺生數少阿羅漢人證理深生數全無者感法師答云我見通前資糧位五停心觀聞教悟理淺生數無窮名未定生別想念觀聞教次深生數少名已定生總想念觀聞教最深名即此生更不經生便入加行暖位之中聞教淺名未定生頂位中聞教次深名已定生上忍乃至世第一位名即此生更不經生便入見道五停心觀生數多回心向大尚得名漸悟別想念生數少或全無回心向大灼然是漸悟況復亦有生數少者三云前師語後師云汝後師義猶未圓我宗中有學回心了事須取無學果了方受變易恐人疑道前三果人回心了未受變易不名漸悟所以著生數多少顯前三果人總名漸悟汝義之中有此義否後師答云我宗中亦有我今取頂位及中下品忍位生數少同前三果人望阿羅漢人亦生數少上忍起位及世第一位更不經生便入見道取初果趣中二果取阿羅漢阿羅漢果身上受變易兩義恰齊況復亦有生數少者上來三義解第二師義中兼説生數多少之意若準攝釋意感法師此間論生數者意顯七方便人回心之中有初修久修兩類人別初修久修皆能回心也湛法師生數多小望無學説感法師生數多少望見道説問感法師許已定位即此生位便回心向大修菩薩行且如忍位之中已裁生死只此有七生身如何經劫長時答一云準沼法師意事須已定生位回心了入見道取却初果然受變易修菩薩行若不入見道如何起得長時之身二云已定生位雖裁生死只有七生由悲願力故資助已裁業種令生數無窮總得問疏主此間雙盡兩師義何師義長答若準淄州取前師義長證理名漸悟勝也疏主符後師義沼法師問疏主云只如地前直發大心凡夫身中有大乘性有二乘性不曾發二乘心直發大乘心修菩薩行到地前一大阿僧祇劫事須廣聞廣思若逢著二乘教若簡劫不名廣聞廣思聞教之時事須兼聞二乘教亦悟解二乘教下道理尚自得名頓悟何妨七方便人具二乘性聞思悟解二乘道理亦名頓悟一種具二乘性聞思悟解又總同合得名頓悟此是沼法師隨大家通途義設難若沼法師自家義則此一類是漸悟疏主却難沼法師云如地前多事驚怖不定性菩薩此菩薩地前一大阿僧祇劫廣聞廣思法空教悟解教下道理至初地門中雙證二空理此菩薩身中具有二乘性尚自名漸悟何妨七方便人具有二乘性回心了聞思悟解法空道理初地門中頓證二空理何妨亦名漸悟有福先律師問疏主今以生數解漸悟義為復敘他義為述自宗若陳他義為取不取答敘他非疏主意非疏主意者設是凡夫具二乘性或行彼行及聖回心皆名漸悟亦不限以生數等故下引善勇般若云未入正性離生者雖亦回心據不受變易者説故不同初師唯約聖論不同後師更約生數故知差別也言謂已定生等者化度云謂資糧加行二位之中各有三品一下品即未定生二中品即已定生未定生三上品謂已定生依雜集論辨四種順解脫分善六種順決擇分善將此四種六種配前已定生等三及未具資糧等三諸德敘釋非不周備然於初學恐難領悟今略述之且三種資糧者一未具資糧補特伽羅逢遇於佛聞四諦教法此四諦教是增上法緣此增上為境故論云緣諦增上法為境也初聞於教未能深觀於理未損生死由自望加行生數無窮名未定生此位之中修順解脫分善感無漏果若持五八戒名福分善品招得人天身非勝故二者已具未具資糧補特伽羅此在中品順解脫分善望前下品名為已具望後上品名未具成就中品順解脫分善起勝解心印持四諦增上教法勢力增感損本識中招生業用益彼淨識功能望於加行有齊限故名已定生三者已具資糧補特伽羅緣增上法為境發起上品順解脫分善此既在上品資糧位滿名已具資糧善根最勝於此生身得至決擇分名即此生名已具資糧也次依集論有四種順解脫分解脫謂涅槃分者因義五停心觀等順涅槃因名順彼分善緣解脫境作意相續煩惱漸伏解脫漸顯也四種者一依憑順解脫分善初逢諸佛聞五停心觀教法未能觀理以教法為境而生一念信心以此信心與向後所修善法而為依憑未作五停心觀已來皆是此位二者勝解順解脫分善以別境中勝解印持五停心觀教法為境此位之中修五停心觀此上二位名未具資糧亦名未定生三受樂順解脫分善觀解脫境即所詮理也與清淨喜受相應所修善根名受樂順解脫分善至此位中名未具已具資糧至此位中修別想念觀若不退更經二生三生得入加行位名已定生時四趣證順解脫分善所修善根名為趣證能修總想念觀即此名為已具資糧三種觀門已成辦故於此位中更不經生即入加行名即此生時也上四解脫了後六種順決擇分善者決簡疑品擇簡見品彼不擇故疑則擇而不決見則決而不擇故無漏慧而名決擇所順即決擇能順即分持業擇若所順即決擇決擇之分依主也一者隨順順決擇分善聲聞之人作四諦觀緣覺之人作緣起觀順彼見道立隨順名即此觀行是無漏智火之前相名暖從喻為名也修下品順決擇分善名未具資糧此望見道生數由多名未定生時第二勝進順決擇分善此在頂位轉前下品至此位中成中品順決擇分善勝前進後立勝進名若準雜集此位作五根觀也至總觀察故名為頂此位起下品忍諦行緣起明了現前此亦名已具未具及已定生此位行人若無退緣經一二生即入見道名已定生第三通達順決擇分善即此善根轉成上品順決擇分善決定湛能通達諦理立通達名雜集云至此位中作五力觀聲聞緣覺至此位中作四諦緣生觀名已具實更不經生即入見道名即此生時第四移轉順擇善轉起餘乘故名移轉至此位中聲聞性人直入見道更不經生也若不定性人大乘根熟回心向大修菩薩行若緣覺性人至此位中便入見道取緣覺果時作部行不作麟角麟角事須向前一百劫練根第五一生若於此生定能通達更不經生名曰一生此據定性終一期出必入自乘見道若約不定性雖此位不必盡皆能入見道第六一坐聲聞緣覺皆有一坐盡於一坐即入見道作是念言我於此坐不得見道形枯命謝終不破膝念已結跏趺坐極遲七日即入見道臨入見道一剎那心名世第一況復亦有生數少者或全無回心向大亦得名漸悟前來皆約小乘聖等説之非大乘位有此義問與移轉何別答多於彼轉趣餘乘此據少分也問三位通達何別答前二位約當通達此一坐等約現通達問兩位即此生時為同為異答前解脫言即此生者即一期身論加行中此生者約剎那生説言經據劫定但説等者問若許七方便人回心向大得名漸悟涅槃經何不説但説聖人八萬劫等如何前湛法師取經中説故便證漸悟此理不然答疏言經據劫定等涅槃經中據根性利鈍一類相似經據劫定者説初果乃至第四果八六四二萬劫此位偏約一類根性利鈍齊等者説只如初果之中極精進者亦有三萬劫二萬劫得到十信位者於中懈怠者直滿八萬劫極遲不過八萬此一類減八萬劫者汝前師許是漸悟菩薩否前師答云灼然是漸悟收感法師云若爾經中不説一類是漸悟經中亦不遮此一類不是漸悟經中不説不遮尚得名漸悟何妨七方便人涅槃經中不説亦不遮何妨亦是漸悟所以經據劫定但説聖人不説異生見道前回心劫數經雖不説亦是漸悟也言此經所説等者牟云此正明破執申先釋意亦名辨執寬狹也準本論意為二聲聞為一菩薩疏主意者準諸論文及下流通經文傍被定性聲聞并頓悟菩薩亦未爽理是此意也一乘理者理行果三總是一乘理若空取真如理即太局若唯取道理又不普二皆總取問大親造論解一乘經未審為幾種答疏言論雖言等問雖者義含得失疏主何意安雖字耶答意顯説經被根之中而有兼正正為退菩提心聲聞名得兼為應化名失所以二種聲聞之上安雖字也兼者不是正傍名兼兼者相兼之名今此退菩提心聲聞是實應化是假假實兩種總是為正故名兼也問説法華經豈只為退菩提心及應化有一類不定性聲聞不是退菩提心聲聞何故不為説法華答世尊在世不妨有今法華會上是退菩提心聲聞也言此法華一會等者問爭知無答疏言法華一會等疏主體經意意言無所已疏云法華一會唯為退菩提心且説一會之中唯為退性又緣滿慈子等亦在會故此兩類人法華會上分明説問滿慈既是應化無執可破如何説破答引實聲聞示相破也上敘論本意也言若準攝論合等者引論準成也疏意依法華會敘二種聲聞更詳他攝論文者彼論之中合以十義解於一乘為三種聲聞法華論為二種聲聞攝論十義之中唯除引攝一類任持所餘餘八義想是一分通定性聲聞所以為三也問法華論解一乘攝論亦解一乘一種是解一乘經何故攝論為三法華論唯二答以彼攝論例法華論為文雖不説道理亦有也問既為定性聲聞説經如何是理亦無失答疏言決定種性等決定種性不愚法故即是無失信有七八二識信道聲聞作佛問定性聲聞必竟不成佛遮莫愚法答佛慈悲心猶如天雨枯木乾地之上亦皆沾灑也決定種性不愚法故一無失不定種性逈求大故二無失也其應化者為化者記故三無失也問何名化記答化現與化人記故故名化記滿慈早是化人又化現與彼化人記故故名化記第二解正佛菩薩化作聲聞引實聲聞為教化實聲聞故所以化作聲聞今與彼教化授記故名化記也上辨聲聞寬狹言雖亦為二菩薩等者雖亦可為二菩薩説名菩薩寬也正宗唯為漸悟者説名菩薩狹又正宗唯為漸悟者説名得義通頓悟名失有人向正宗之中不見漸悟菩薩不得便道只聲聞是漸悟菩薩先雖是聲聞後作菩薩故回心向大便是漸悟菩薩答此解非前來早破聲聞執不可此間又更重破執兩處破執決定無此理也一者自有一類漸悟菩薩多劫行菩薩行性行時長擬退入二乘也此中言唯者唯漸悟對頓悟唯名也此菩提身中有三乘種性往往欲退入二乘為彼菩薩説十方佛土中唯有一乘法無二亦無三十方世界中有二有三乘菩薩即退十方世界既無二無三乘更退何處知由是菩薩聞是法疑網皆已除也二者自有一類不定性聲聞過去俱那含牟尼佛迦葉佛邊聞法華經破執回心了今生到法華會上成漸悟菩薩聞法華經名正宗唯為漸悟者説問彼菩薩早曾過去佛邊破執更何要破答雖然無執可破令心堅罕所以重破也三者唯沼法師解從初凡夫身中具三乘種姓不發二乘心直修大乘行以帶彼二乘種性到頭事須却退鶖子第一利根到第六住前由退豈況餘人此是漸悟菩薩也問既言正宗唯為漸悟説經文在何處答有二解一云經無明文準理則有但説著二乘是權菩薩執便破二者經亦有文菩薩聞是法疑網皆已除又云爾時會中進發意菩薩八千人咸作是念亦有喚作漸悟菩薩問何處是兼為頓悟菩薩説經破執處答正宗實破漸悟不為頓悟緣漸悟菩薩常於佛果執於己無分往往擬退入二乘所以正宗唯破漸悟菩薩執破執説經經説著二乘作佛道理中間兼破著頓悟菩薩執也十方世界中有二有三乘我是菩薩獨自成佛聲聞不作十方世界既無二乘三乘聲聞緣覺總得作佛經云菩薩聞是法疑網皆已除此第一解唯有大乘性此定性頓悟者二者更有一類離頓悟即有三乘性始從凡夫直發大乘心修大乘心行名頓悟由帶二乘種性修行挍遲佛為説法破執令修行速此二類頓悟也若正宗之中唯為漸悟者説揀却頓悟即將菩薩聞是法疑網皆已除結若唯理兼為頓悟即依通分中十一位得證一位發心為證即取義兼頓悟於理未爽結也言攝論十義等者引攝退菩提心聲聞任持漸悟菩薩問攝論云任持總不交退得否答事須退也以彼鶖子當二萬佛時種種教化不退不得此間明執行相中論文稍狹與向前別此間唯引正者也不取兼為者此聲聞中取退心不取應化也菩薩唯取漸悟不取頓悟前來列能執人中不方兼正頓悟漸悟總取言由不定種性者雙結兩人一引攝退菩提心聲聞二任持漸悟菩薩引論雙標了言引攝一類者攝論云了知不定種姓趣彼解脫方便引攝令依大乘而般涅槃佛説一乘也言任持所餘者為欲任持其餘不定種性菩薩於大乘精進退壞佛説一乘任持令住此於攝論十義此是前二餘八義未要是已不引來問此中退性與漸悟何別答自有退性義或是漸悟如鶖子等自有漸悟未必是退引不定性聲聞未發大心不名退菩提心亦須引攝地前不定性雖非漸悟亦可任持問漸悟菩薩授記後為退不退若退者何故論云為令聲聞生決定心故不退者何故解攝論任持所餘是漸悟菩薩欲生退敗還住二乘耶答此約退菩提心不定性説彼約唯證聲聞回心者説也上引執人言退菩提心聲聞等者起執意也賀云退大就小執為究竟故破此執説斯妙法也此標聲聞不實漸悟漸悟之人是菩薩故言故舍利弗等者此中引經唯引退菩提心文不引應化文唯引上中二根文不引下根起執文舉勝攝劣也初文是鶖子領解中偈文彼二十三頌釋文初二頌半處小階而起歎五頌半告大法已興嗟十四頌喜今聞而惱盡後一頌佛子而道成此所引文即是述喜今聞而惱盡中初一頌敘昔捨邪以歸正經云我本著邪見為諸梵志師世尊知我心拔邪説涅槃我悉除邪見於空法得證後二頌述今識小以歸大經云爾時心自謂得至於滅度而今乃自覺非是實滅度鷲子常行至十住第六欲入不退住中因施眼故方退入二乘中又十信第六心若退尚不生於邪見之家況至十住第六心却入梵志之道舍利弗實不是邪見之人示現生邪見之家邪見有二種一撥無因果二見理不正今實邪者是見理不正即鶖子是也言迦葉亦言等者即信解品中領述文也初談往事經言世尊往昔説法既久我時在座身體疲懈但念空無相無作等後釋所由即疏所引文是言此皆昔時者都結聲聞執也辨聲聞執行相言即攝論云三種練磨等者辨菩薩執行相也即攝論云三種練磨心斷除四處障等正是菩薩執行相也無性攝云菩薩摩訶薩將欲趣求所知相皆以四重徵釋也所知相者即是三性境亦是法華經中知見一云何應見此總問也二誰能悟入問入人意道阿難能悟入答善修福智資糧位菩薩即是地前六度亂修者善修福智菩薩三何處能入問入位意道依何行位能入答依勝解行位及見修無學位入四問由何能入問因由答由善根力所任持故雖有善根力而心或退屈故説三種練磨心等由斷八種染故有八句差別言八種染者三種練磨為一斷四處障為四帖前成五也緣法義為一帖前成六也正觀常恆為一帖前成七殷重加行無放逸成八疏中所明即前三種中三練磨心緣法義為境文便引來只要處障中二乘作意并所聞思法也諸疑離疑又屬前文也骨鎖分別此全不要也料簡訖次下依疏解有説四處障唯是菩薩執不是聲聞執設二乘作意但菩薩作二乘之意也疏云將三種練磨為能斷四處障為所斷相連續也此解全非練磨自有所除之障以三退屈為所治也今解初句即三練磨三練磨以五門分別一釋名二出體三辨行相四配位五問答一釋名者則云練謂訓練亦曰鎔鍊磨謂磨礪亦曰磨瑩謂訓師旅而成功鎔黃金以從革碎龍泉以剸犀瑩鸞鏡以照膽由斯諸義並曰練磨金若練則轉妙鏡磨即瑩淨分明如衆生身中佛性性本清淨為煩惱塵之所染汙將此三練磨而濤練之即得明淨問練磨者何義答策舉其心令其猛利對治退屈是練磨義亦如練金復似磨鏡令其純淨立練磨名二出體者問能練磨以何為體若則云練磨即以聞思二慧及以精進而為自體由聞於他發心修行引他例已䇿發自心比量知故是聞思二慧也尅體後解為勝既三引他方例於己明知比量非是現量若兼修慧即現量不可定中比量知他故況詳由彼定心伏外障染何妨練磨而通修慧若據眷屬非唯修慧及精進同時五薀諸心心所而為其體如聽法生聞思惟生思如法修行坐禪等生修以理而推莫過精進三慧三精進如何能尅此論好問所練磨以何為體答謂菩提心二利行也論中自説練磨其心故所練磨是菩提心也問何名所退屈答退謂退還屈謂屈伏若小鳥望高風而退性將對穹廬而屈膝由斯義故故得退名無性釋云練磨心者謂䇿舉其心令其猛利對治退屈無其怯弱名不退屈問所練磨三退屈以何為體答則云退屈以法執染慧及懈怠而為自體唯識疏云並以我法為體地前頓悟二障二執地前漸悟一障一執由橫思量謂果難得故是法執尅性懈怠而為體性三練磨是能治三退屈是所治所治者一是放逸二是懈怠三是無明初一菩提後一轉依果上生退中一因上退即萬行難修也三辨行相者則云總釋引論云無量諸世界無量諸有情剎剎那那證等覺無上正等菩提是為第一練磨其心由此意樂能行施等波羅蜜多我以獲得如是意樂我由此故少用功力修習施等波羅蜜多當得圓滿是名第二練磨其心若有成就諸有障善於命終時即便可愛一切自體圓滿而生我有妙善無障礙善云何爾時不當獲得一切圓滿是名第三練磨其心以諸菩薩聞於無上正等菩提最勝甚深廣大難可證得心便退屈對治此故修第一練磨其心又諸菩薩聞所修行波羅蜜多最勝甚深廣大難可證得心便退屈對治此故修第二練磨其心又諸菩薩於甚深廣大之教思議決擇善增轉時如是思量無上正等菩提難可證得心便退屈對治此故修第三練磨其心且第一菩提廣大屈引他況己練唯識第九云一聞無上正等菩提廣大深遠心便退屈此即悟佛知見之上而退屈廣者無邊十方故大者無上超三界故深者難測等覺菩薩不能測知遠者時長三無數劫時長遠故意言無量世界諸有情於念念頃皆能發心證菩提果我與彼同何不發心趣求引他況己證大菩提練磨自心勇猛不退無性偈云十方世界諸有情念念速證善逝果彼既丈夫我亦爾不應自輕而退屈退謂退轉屈謂低屈菩提涅槃寶山高而且大大而復峻二乘凡夫聞此不敢造修心便退屈且趣二乘三生六十四生一百劫求二乘果二萬行難修屈省己增修練唯識云二聞施等波羅蜜多甚難可修心便退屈省己意樂能修施等練磨自心勇猛不退作是念言我於無量劫虗墮地獄且如大悲菩薩救苦無休唯聞其聲我今所修皆得佛果何不修也汝須省責己身自從無量劫受諸苦惱正法念經云地獄之中煎煮衆生臰氣衝人即皆僻地汝於多劫長時受此種種諸苦復有何利益將此行行比彼受苦百千萬億分不及其一如何少行得佛果正生退屈耶故彼偈云汝已惡道經多劫無利勤苦上能趣少修妙行得菩提大利不應生退屈三轉依難證屈引粗況練唯識云謂聞諸佛圓滿轉依極難可證心便退屈引他粗善況己妙因練磨自心勇猛不退且如欲得人天之身尚須修持五八等戒豈有無上菩提妙果不修而得者乎頌云薄地凡夫初發心尚擬趣向菩提果汝已修習經多劫不應退屈却沉淪此即開佛知見上而生退屈四配位者問此三練磨在何位答疏主意此三通在資糧內三位之中問如何得知在資糧位答唯識云在資糧位即四十心未入加行正應修此故論云此位二障雖未伏除修勝行時有三退屈而能三事練磨其心於此證修勇猛不退準此即在資糧位中問若資糧位修練磨者如何前説我有一切十種地中妙善積集福智資糧等答據初為論修之不退必當得故義無違也五問答三練磨與四處障如何相攝答此三練磨自將對治三退屈鄣不對治四處障也問三退屈與四障皆是其障如何三練磨不斷四處鄣但對治三退屈耶答練磨自有所治三退故或由三退屈起初二障故練磨心即斷二障言斷四障文勢故來言斷除四處障者問何名四處答菩薩觀行有四名四處處謂處所斷四鄣所由二乘化意等四個染法是障障他菩薩四種觀行是四處之障依主釋二云準論文無障字只言四處若無障字即二乘作意等即是四處四處即障持業也伏故名斷也牟云問誰為能斷答由於四觀即無相及三種智為能斷問何名障答初二障障彼厭小欣大之行後二障障彼捨與證真之行故得障名言緣法義為境者即能詮教義者是所詮義緣是一切衆生及菩薩能緣之心緣如來後得成所作智本質教中義緣既不著即反起影像緣之只得言似法似義非真實故名緣法義為境似文似義者釋云似外相轉實唯在內以有似無以內似外如牛角似菟角如牛毛似龜毛此護法義若安慧即以無似有以外似內如戲人似實人攝論解云此位菩薩觀其法者唯是意言遺其所取見分意言亦無自性遺其能取故言緣法義為境由先多聞熏習力故從此後時如理作意心中影像似於本質法義等相從權而生名之為似此顯意識之上變起法義名似法似義即以內似外也實非在外唯內識故此能緣心即以尋伺觀尋伺名尋伺義自性差別假有實無名義相異故別尋求二相二相同故合思察前二謂名義後二謂自性差別即顯名義二法之上有自性差別由此論中初標法義後遂開四種或開或合於理無違問修此觀時為在何位答唯識論云在加行位四善根時能修此觀𤏙頂二位作四尋伺忍世第一為四如實智觀故論云𤏙等四法依四尋伺四如實智初後位立依明得定發下品尋伺觀無所取立名𤏙位依明增定發上品尋伺觀無所取立頂位名此位重觀所取名等皆自心變依印順定發下品如實智於所取無決定印持無能取中亦順樂忍既無實境離能取識言有實識離所取境所取能取相待立故印順忍總得名為忍印前順後立印順名忍境識空總名為忍依無間定發上如實智印二取定空名世第一謂前上忍印能取今此雙印從此無間必入見道實生法中此最第一故名世第一也𤏙頂二位依能取觀所取無下忍起時印所取空中忍起位能觀取識如境是空以樂忍可上忍起位印能取空世第一法雙印二空未能證實故説菩薩諸上位由於現前安立少物偈云現前立少物謂是唯識性以有所得故非實住唯識故言緣法義為境也言二乘作意者一初心菩薩厭生死苦欣涅槃樂障他菩薩修二利行菩薩之人不住生死不住涅槃既見有生死涅槃差別此是二乘家作意名二乘作意障障大菩提故二者阿羅漢果人執自果為極不肯回心向大名二乘作意三者前前三果人不肯回心修大乘行欣趣自乘無學果亦名二乘作意四者七方便人不肯回心向大欣趣自乘無學果名二乘作意五多事驚怖性行廣時長欲退入二乘名二乘作意此五之中若論的當多事驚怖并小菩薩厭生死欣涅槃者此兩類正要正是二乘作意中收也餘三種作此所要若準攝釋有五解分二一者二乘作意欣慕二者二乘作意淩忽初修菩薩并有無學七方便人四類人名欣慕欣慕二乘故第五解便是頓悟菩薩住二乘者不得作佛名淩忽也言二諸疑等者第一疑既不一名為諸疑能斷此疑名為離疑二者聲聞名諸疑頓悟菩薩離疑合言之三者第六住前不定性菩薩疑佛果菩提為得不得名諸疑縱退入二乘心生決定名離疑四於三乘隱密言教生疑復執一是便撥餘非名離疑此四解中正取於三乘法上生疑執一為是便撥餘非今取諸疑是障離疑不是障為正言三於所聞思法中等者於聞思所聞之教於思慧所聞之義於所聞思法中不了文字假有實無執法有性正障初地門中法空智觀欲入所相事須先斷言四於骨鎖乃至等者此觀有二一者小乘之中制伏貪欲作白骨觀二者四五六地菩薩伏化二乘作此觀行令此地前菩薩學作此觀也此是分別障有總有別總即於一切分別之法別則唯是此忍一位能觀之智名為分別即此分別之鄣入初地時息滅名斷問何須斷此忍位分別觀智答由此加行雖離能所執分別自有微細分別鄣彼初地無分別智故須斷也論云現前安立如是境界然有二一者染境染境有二一者山河大地等業所引境二者定境即骨鎖等觀定所引境也三者淨境淨境有二一者淨法假境即是諸佛五蘊假者身二淨法實境即菩提涅槃波羅蜜法也於此境上能執分別悉能永離此明離淨境分明據實骨鎖向上亦執著分別於菩提向上品亦執著分別所以言乃至意通兩處也問四處各障何法答二乘作意諸疑離疑正障修大乘行於所聞思法中言我能然正障大乘法空觀四於骨鎖分別正障大乘無分別智問何位斷四處障等答二乘作意十信位斷由離小乘心故二者諸疑離疑在十行位斷由於大乘而行正行離惑三於所聞思法中言我能然在十回向乃至忍位斷也四骨鎖乃至分別在世第一斷也問何故三練磨即開為三四處障即合為一答三練磨對治三退屈以能治行實故所以別開為三斷四處障所退雖四能斷不殊故合為一問斷四處得何擇滅答雖斷四處未得擇滅但伏不起名之為斷問具幾義得入見道答具八義方入見道三練磨為三四處為一五緣法義為境六止觀長時七殷重加行八無放逸故疏引初五也言二乘作意等者破聲聞執二乘之人觀生死涅槃有所欣厭一向捨生死欣涅槃由此作意障大乘二利作意即障也言漸悟菩薩執佛等者漸悟菩薩執也言又復頓悟諸小菩薩執等者明頓悟執也言今破此執者破頓悟小菩薩執也言顯二乘非極者破漸悟小菩薩執也言住二乘者亦得作佛者破頓悟菩薩執彼二乘不得作佛故言故説是經者故為頓漸悟二菩薩破執説經也言由此攝論等者重配論文由此者由有頓漸兩類人有執所以菩薩造論破執安慧由此之言也言四處言者諸抄解云云且金云第一段疏云二乘作意者執二果為極第二段漸悟菩薩執佛菩薩於己無分第三段又復頓悟諸小菩薩等先從前牒此三假文訖後將攝論三段文次第結疏中三段文也即是二乘作意二諸疑離疑三言我能然餘不能爾第四骨鎖非此所要也二攝釋科云取第一段疏中二乘人并第二段漸悟菩薩此二類人同二乘作意中結也論云二乘作意一句論文結前兩段疏文次合便到第二句諸疑離疑今且不引直取第三段言我能然餘不能爾者結前頓悟也言即此二種者二乘人并漸悟菩薩為一種頓悟菩薩為二種也言諸疑離疑等者問何故不配第二句諸疑離疑耶答諸疑離疑自是破疑執門中事非此所要指在前破疑門中破菩薩之疑處也問何故前列即説四般今結文唯説二種答骨鎖之文不須屬當文便故來諸疑離疑即向破疑執門攝也故結云即是前也破疑執畢言彰記行有二者問起者興起意意者意況意旨未審佛説經更有何意答説經之意而有五般今當第三彰記行如來説法華經彰者明顯之義記謂記別分別解釋之義四十年雖説餘經未彰聲聞授記今與聲聞明顯授記故實彰記問如來與聲聞授記有何意答聲聞四十年前疑自身不得菩提見佛在大衆名聞滿十方廣饒益有情自惟失此利我常於日夜每思惟是事欲以問世尊為失為不失又云我常見世尊稱讚諸菩薩以是於日夜籌量如此事中根四人臨欲授記尚自云如從飢國來忽遇大王膳心猶懷疑懼未敢即便食也世尊所以説當來佛果菩提指示與內德成滿外立莊嚴説法同今劫名異即又云彼即是汝身宜應自欣慶既知己身作佛事須行行若疑自身不得成佛即行行不決定今與授記令決定行一乘行是故如來彰記行也問世尊欲得與聲聞授記但與聲聞授記即得何要與經説耶答一切菩薩阿耨菩提法皆從此經出佛果菩提三身功德菩薩萬行具在此經欲擬授記事須説經説經之時便是説因説果即是初周開示悟三為果入佛知見為因第二周中牛車是因第三周中寶所是果又安樂行品并涌出明一乘行壽量品明一乘果欲擬彰記行所以説經也問此能彰所彰何別答能彰是教所彰是行故別也言佛自成道等者標彰記意意中分二一四十年前未授記意二法華會與授記意合名彰記意向下引經文處亦雙證也佛自成道來為聲聞授記未記意今為授記授記意也問佛成道七日即為提謂等五百價人授記授記於五百人中豈無一人是聲聞種性者若有一人有聲聞種性者即是與聲聞授記如何言無答彼言總意別也言中總道五百人記意中唯為提謂授記言當作佛也所以經言未曾説汝等當得成佛道問為約有種性者與授記為約無種者與授記若約無種性者與授記言通成佛世尊成虗妄若約有種性衆生與授記是他決定成佛何要與授記答一為彼不定性修行大行有進退為令生決定心故與記二者與聲聞記者令時會餘人起欣慕佛果菩提心也故經云大智舍利弗今得受尊記我等亦如是必當得作佛又本論云佛從定起獨告鶖子不告菩薩者為令餘人善思念故上標記意言故下經云我設等者此引方便品七偈半偈令住中分四一頌標二頌釋四頌半會一頌勸住此即初標釋文我設是方便令得入佛慧至成佛道標也今正是其時等釋也我設是方便令得入佛慧證今為授記靈山會上根法相符正直捨方便但説無上道未曾説汝等當得成佛道所以未曾説説時未至故説未為授記意言四十年前汝根未熟權設方便令求小果也今正是其時決定説大乘證今為授記是故説是經問經言未曾説者且如過去十六王子説法華經聞一頌明皆得成佛何言未為授記答自退入聲聞已來未為授記先所為説亦已忘失故經云我昔教汝志願佛道汝今悉忘而便自謂已得滅度我今還欲令汝憶念本願所行道故為諸聲聞説是大乘經等問昔日有何所吝不為聲聞説何以今日即為説記耶答佛不説者由有多失如經言鈍根樂小法貪著於生死於諸無量佛不行深妙道衆苦所惱亂為是説涅槃今所以説者由五德故下經云有佛子心淨柔軟亦利根無量諸佛所而行深妙道為此諸佛子説是大乘經為此因緣比者不説今日方説也上引上根文言又迦葉言等者問何故不引下根經文答下根文配向中上根收舉勝攝劣也此所引文是信解品領述文彼處科四人領述法喻合等初彰昔不悕後顯今獲得顯今獲得昔不希中初略後廣廣中初談往事後釋所由中有二意一我道已滿苦滅心安經言世尊令我等出於三界得涅槃證二年已朽邁齒過屈於其大乘生絶分心如得小王之位以為自足更不希轉輪王位經言於阿耨菩提不生一念好樂之心證未為授記文上引未記文也言又云或説修多羅等者此證未記文此論彰記亦各合説授記三根聲聞經兼有自説方廣文便故來若是彰行但説其行後即兼論五種般若並是疏文意方便品中六偈偈説初四頌半述所以者何下釋文此文分一頌無數方便二頌種種因緣譬喻亦言詞頌云衆生心所念種種所行道一頌半演説諸法頌云或説修多羅伽陀及本事等疏引此文也修多羅者小乘契經也一則契理二則契根總名契經伽陀者諷誦以妙言詞讚美詠德本事者宣説聖弟子等前際事名本事本生者宣説世尊過去事名本生未曾有者宣説聖弟子等八部所有奇特驚異之事名未曾有因緣者有三一因請而説二因犯制戒三因事説法譬喻經者謂經律中所説令本義分明故説喻也祇夜者此云應頌有二一為益後來二顯前未了義優婆提舍此云論義修環研竅諸法性相唯為聲聞説於九部不説授記若約記別深密之義亦説也不説方廣理正曰方包弘曰廣非無正法廣陳之方廣也無問自説者謂於請中不顯請者為令當來正法久住不請而説問第二第三皆論授記事法華會上方記聲聞何者是未記文耶答未曾説汝等當得成佛道即是未與授記不假有授記字上來三段總是未記文言故此已前等者即指法華會前結前未記言今為授記者即指法華會上緣昔來未記今為授記結前授記故説是經正是經也上彰記了言後彰行者彰由明也行者即是七地四菩薩行也前門彰記即是説果既識果已要知因行故有彰行也言説菩薩一乘之行者今説菩薩一乘之行依人顯行一乘正是菩薩行故依行顯人也問何故安須説一乘之行答一乘正是菩薩行故菩薩行不過七地四菩薩行總束一處著不越一乘行一乘行既在此經為彰菩薩行故故説是經問何不説餘經彰菩薩行答若説諸經説他菩薩行不盡問為復菩薩總未行一乘行安世尊説經彰為復已修行行更要世尊説經彰行耶若約未修要彰行者頓悟菩薩已修一乘之行何要世尊彰行答雖已行一乘之行若不彰行菩薩修行不得廣大欲令菩薩修行廣行也為聲聞彰行有二意一緣四十年前所修二乘行不知是一乘行所以悔修今日彰行意遣令知二者問聲聞前説菩薩修行廣大行欲令二乘之人見賢思齊又過去雖已修當時不分明與他解説今時分明向説令知故彰行也問降伏行中菩提分法行與此門中彰二乘行何別答未説經前二乘行只是阿羅漢因只招得阿羅漢果亦説著法華經彰著二乘行便與佛果菩提為因能招佛果便是環丹一粒點鐵成金總是菩薩行也緣二乘之人昔日不知今日交知所以彰行也經云汝等所行是菩薩道言故下經云有佛子者衆中彰行經文都有三段第一段是方便品偈文七頌半述長行令住分四一標二釋三會四勸住今疏中引者是第三會分三一頌顯示法非真説為大本我此九部法隨順衆生説等二一頌半顯大法勝妙為勝人説有佛子心淨等二頌結成勝妙我記如是人來世成佛道以深心念佛修持淨戒故第二段又云聲聞若菩薩等此是頌令住中第四段勸住經文第三段又云舍利弗諸佛如來但教化菩薩等是依何等義中有標有釋今是釋文金且第二一頌半顯大法勝妙為勝人説問此間何要引五德佛子來證彰行耶答緣而行深妙道一句經正與此間同故引來言佛子者頓漸二悟菩薩五德者一心淨專求大乘佛之智慧非樂下劣除二障故二柔軟以定攝心離散心故故若柔耎能利於物堪耐勞倦能作大業精勤不息故三亦利根者利根聰睿性多拔苦能與他樂一切均平聞法速入四無量諸佛所久遇良緣恆自磨瑩五而行深妙道齊修福慧規真若有佛子具此五德可為説大乘令其發趣問聲聞具彼五德否答具五德一斷煩惱名心淨二見天雨四華故柔耎三聞法速入故利根鶖子一聞便解也四無量諸佛所即千百萬億世世已曾從佛受化五而行深妙道者直至第六住前名行深妙道攝問若無先未行今説令行方名彰行有佛子心淨等即是先已行如何如今言説經彰行答須舉大行先行令後小者亦慕高蹤舉勝引劣欲令二乘見賢思齊疏引但説經彰行文不論令行未行前科言顯大法勝妙為勝人説攝難非疏意應作四句分別一有善而不耎如高心律師二有耎而不善即一切事官人等三亦耎亦善即此有佛子心淨等是如言良馬匹之君子上善若水逐器方圓四不善不耎即一闡提是言為此諸佛子等者結上五德由此五德正是彰行也言又云聲聞若菩薩等者第二段經也問聞經一偈是教如何作此間彰行答今説雖聞一偈即是教能聞一偈之心即是行也便是十法行一行也又云取一偈教下所論行前解為勝言又云舍利弗諸佛如來等者等第三經文也問此經教化聲聞如何但言教化菩薩答先雖聲聞後作菩薩故回心向大總是菩薩顯行二乘行總是一乘行也問疏中偏引此三段文不增不減是何意答第一段引五德佛子而行深妙道正是菩薩聲聞所修一乘之行也第二段勸彼頓漸二類人住於大乘大乘正是菩薩行也第三段經文但教化菩薩彰頓漸菩薩行也諸有所作即二乘行也常為一事即佛果菩提名一事也即前二段是因第三段果也從因至果義將周是也明行也言要由修福慧等者問未知何行行而成佛答疏言要由修等牟云據理廣陳也章云此六句疏文結前三段文既安故字即知文從前起也若不爾者此六句疏文有似孤起故作此科為善也初二句安由修福慧照有空結前有佛子心淨至而行深妙道五德佛子修行不過福慧空有也二尋教詮究玄理結前聲聞若菩薩等三真解起悟一乘結前諸佛如來但教化菩薩至一事真解起入道結前但教化菩薩諸有所作常為一事也故知此解與疏相當若料為據理廣陳疏文疏斷諸意與牟同攝四解一云要由修福慧眷屬般若照有空境界般若尋教詮文字般若究玄理實相般若真解起觀照般若前五為因第六悟一乘果也二云要由修福慧資糧位亂修六度多依外門修菩薩行故唯識九云菩薩為此資糧位中二粗現行雖有伏者而於細者及二隨眠止觀力微未能伏滅既言於止明亦得定照有空尋教詮究玄理在加行位依內門修菩薩行故此位之中欲擬照有空事須尋教詮觀似文似義名尋教詮即依此教觀自性等假有實無名究玄理得入見道達二空理生起妙平二智名真解起證遍行真如名悟一乘三云能觀所觀解要由等前五度是福第六是慧修慧之時事須觀空有為境空有攝一切盡故云照有空既知有空未知修行如何次第所以事須尋教詮也既尋教已依教必能悟理所以究玄理依理必能起行所以真解起依行必能尅果所以悟一乘四云要由修福慧初修之人未能忘相且修福慧也多時修習方能觀空達有欲知空有甚深道理事須尋教方能決擇三藏妙旨名究玄理由前四事正智得生名真解起由前五種方悟所詮理名悟一乘賀問本彰於行何故説彼理果耶答雖言於行要由教理等若不由詮行從何起不知理果而何所欣故説無失若配五位雖攝久習初修不該如三根等悟解一乘授當佛記然未至十信初心於何位攝並皆不依今別解者安由修福慧者為修六度前五名福第六名慧雖行施等須知三事體空菩薩執有情可度菩提可求故照有空雖照空有若不依教恐無所憑故尋教詮終有所歸故究玄理理非獨照必假智鑒故真解起若如斯名悟一乘化度云要由修福慧智慧伴照空有智慧境尋教詮智慧因究玄理智慧性真解起智慧智慧相由此五種方悟一乘賀破金云若配五慧即闕福行牟云亦非闕福何以且六度二皆通福慧二種論云六種波羅蜜多通相皆二又言配五位不攝初修者配位之家所望各別良以疏主先標因行之乘即經言乘此寶乘直至道場乃至初地之牛車入佛知見故以五位配福慧等悟一乘者證悟為言三根之人悟一乘者悟解之悟非此所攝各是一解何必非何也言又且一乘有因有果者是總標兼果以明顯行非虗必尅其果故彰行故兼果以明斯則疏主深意若行此行必獲斯果故舉其果顯行非虗夫欲尅果必須行因因若不修果從何起經云乃至童子戲聚沙為佛塔皆已成佛道又云若有聞法者無一不成佛因故亦名為一乘言因即七地四菩薩者正明其因七地五門分別一列名二出體三配位四辨相五屬經一列名者瑜伽五十九云一種性地二勝解行地三淨勝意樂地四行正行地五決定地六決定行地七到究竟地二出體者唯識云如是總攝有為功德以為自性此心品是有為智無為是理七地者因中有漏無漏慧種現為體種性住唯以有漏無漏種子為體勝解行住通有漏三慧現行及本有無漏種子為體及別境中勝解為體從淨勝意樂地行正行地以有漏無漏智種現為體後三地以無漏智種現為體尅實唯以慧為體若相應即二十二心心所法為體眷屬五薀為體三配地位者一者一種性地者亦名種性住未發心住即是本性住種性未入僧祇有此種性此是凡夫所以名種性地上性體也下姓類也即無漏類也種子即無漏種子無始時來依附本識未曾熏習令其增長本體來住此菩提種子姓類差別不由今有也二勝解行地即第三勝解行住發信心已去至世第一末論云此位未證唯識真如依勝解力修諸勝解應知亦是證行地攝謂發勝解決擇分善名勝解地從十信乃至加行此即別境中勝解數發殊勝行解決定印持名勝解行三淨勝意樂地亦名歡喜住在初地四行正行地亦名增上戒住從初地出心已去至七地滿心五決定地亦名無加行無功用住第八地六決定行地亦名無礙解住在第九地七到究竟地亦名最上成滿菩薩住及如來住在第十地及佛地第十地因究竟佛地果究竟三身具足四智圓明四辨行相者一種性地即本性住種性未入僧祇劫即十信已前凡夫位中無漏種子無始時來依附本識法爾而有不由熏生處種性位名種性地由有此種性性自仁賢性自成熟菩薩功德不起上上煩惱纏造無間業不斷善根等二勝解行地者在地前位謂發解脫決擇分善名勝解行地即別境中勝解數即是印持義有三勝解菩提涅槃所是有因果皆印持故二或於甚深妙理所有境界決定印持三於聖法有聞思修決定印持總名勝解行地疏主唯識記云謂諸菩薩從初發心乃至初地論云此位未證唯識真如依勝解力修諸勝解名勝解行地三淨勝意樂地者亦名極喜住在於初地見道謂此見道證百法明門斷分別二障證二空理生大喜故喜有三一日喻照明喜斷分別煩惱證二空如如日光明破世間暗證百法明門獲十種平等得生佛家故大喜二捨難證易喜謂見道前所修勝解法是為難行證見易法三頓證明門喜謂入見道百法明門二空妙理皆是頓證由此三喜名極喜住又解斷分別煩惱名淨超過地前名勝隨願自在證百法明門名意樂四行正行地者路云從初地住心已去至第七地末心名行正行地此攝六住增上戒住第二離垢地增上心住第三發光地覺分相應增上慧住第四焰慧地諸諦相應增上慧住第五難勝地緣起流轉止息相應增上慧住第六現前地無相有功用住第七遠行地總此六地名行正行地謂第二地修持淨無誤犯三業得增上名此有三種一意業微細戒菩薩不起犯戒之相凡所舉心動作總皆勝戒故菩薩在此能離微細戒垢二住色支戒此地菩薩防非止惡得無表戒故三住軌則此地菩薩修持時不犯軌則若破軌則則是犯戒由此三義名增上戒增上心住第三地能住定故此有三義一住八相故二能離退定三能發三慧謂得勝定能發慧光慧光能破暗故第四地中能作菩提分法觀第五地菩薩能作真俗二諦四諦觀第六地菩薩能作十二緣生觀故第七地菩薩能作破相空觀仍有加行第五決定地亦名無加行無功用住此在第八地有三決定一種性決定二發心決定三不虗行決定謂第八地菩薩功用創絶住無相理所有萬行任運增進剎那剎那無有空過名不虗行也第六決定行地亦名無礙解位第九地謂此地菩薩證得總持無礙辨才訓釋法義利他之行能遍十方此地菩薩無量世界有情各以異文異義問難菩薩菩薩説一字之法能斷衆疑第八地只得名決定地不得名決定行地第七到究竟地即是最上滿菩薩住及如來住於第十地及於佛地第十地因究竟佛果位中果究竟今此説菩薩行只取因究竟不取果究竟第十地行滿開敷盛果到於佛地窮真實性達法界源惑業皆亡證無邊果論云諸根相好一一無邊無限善根所引生故四菩薩行者一波羅蜜行即六度是二成就有情行即四攝四無量是三菩提分法行即三十七菩提分法行是四神通行即六神通是此中初二是菩薩自乘之行後二是降伏行自乘行有二一為成自利行修六度等二為成利他行修四攝法是也降伏行亦二一菩提分法行是降伏二乘行聲聞之人修念處正勤神足根力覺分等法以為自行菩薩既為五趣之師作三界主無一法而不知故降伏二乘修菩提分法行若不修彼行者聲聞之人即言我菩提分法行菩薩不知唯六度四攝等是菩薩行我亦不知彼彼此互闕行應齊等由此義故故修彼行降伏二乘非菩薩所行之行也二神通行降伏外道行諸外道等多以神通為德在世化物世間愚夫多歸此疏依彼菩薩具彼此行化諸衆生回邪入正故亦是十八反中制他神通攝也言下隨所應等者問但明七地四菩薩行即得何要配下經文耶答為彰行故説法華經法華經是一乘一乘通因通果若不配下經文疏主恐人疑云既説七地四菩薩是一乘因法華經中為有為無所以今配下經文顯此經因亦攝盡果亦攝盡亦不定配地位但義相應即便配屬一種性地者雨喻經云諸樹大小隨上中下各有所受名種子無上又法師品中八部授記如是等類咸於佛前聞妙法華經一句一偈發阿耨菩提名種姓地二勝解行地者資糧加行經云復有八世界微塵數衆生發阿耨菩提心即資糧位經云復有四四天下微塵數菩薩摩訶薩四生當得等即加行位不輕品云乃至見四衆亦復故往禮拜而作是言我不敢輕於汝等論主配在資糧位臨命終時具聞威音王佛前所説法華經二十千萬億偈悉能受持即得如上六根清淨更增壽命二百萬億那由他歲加行位合前二重總是勝解行地也三淨勝意樂地者經云説是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍即是初地證四不壞信是名極喜地生如來家住極喜地當此之時名真佛子若是地前三賢位伏忍聖胎三十人如在胎中未生也四行正行地者從初地住心出心至七地滿心已來經云復有千倍菩薩摩訶薩得聞持陀羅尼門此初得在三地相續在九地圓滿在佛地雖初三地同世間正行經文唯有三地之下經云種種相貌相貌既遍十地故得通四五六地也經云復有一世界微塵數菩薩摩訶薩得百千萬億旋陀羅尼門即第七地正觀有時微得觀空正觀空時微得觀有回旋空有名旋陀羅尼五決定地者經云復有三千大千世界微塵數菩薩摩訶薩能轉不退法輪疏云具四不退即當第八地前言得無生法忍五地已前有相觀多無相觀少六地無相觀少七地純無相觀雖是無相有功用動至第八地無相無功用位名不虗行法駛流中任運轉故得色自在即俱生無作行意生身隨類現身等六決定行地者即第九地名大法師經云復有一世界微塵數菩薩摩訶薩得樂説無礙辨才四辨七辨説法等此菩薩得心自在説法無礙七到究竟地者一因究竟經云復有二千中國土微塵數菩薩摩訶薩能轉清淨法輪疏主解無染離障為清淨體即當第十地二果究竟如壽量品三身經文是果究竟配四菩薩行者一波羅蜜行者經云或有行施金銀珊瑚等二成就有情行者經云此法華經南閻浮提病之良藥三菩提分法行經云右手執持除糞之器菩提是果分是因義四神通行天雨四華動地放光出水等則云此應配行而局配地地為所依行為所習舉地顯行彰行義成也因畢言果即佛位菩提涅槃者問本彰於行何須説果答雖言於行若不明果何所欣趣故次辨果令有所歸菩提有四即所轉得中所生得唯識論云一大圓鏡智相應心品謂此心品離諸分別所緣行相微細難知不忘不愚一切相體性復淨離諸障染純淨圓德現種依持能現能生身土智影無間無斷窮未來際如大圓鏡現衆色像從喻立名也二平等性智相應心品謂此心品觀一切法自他有情悉皆平等大慈悲等恆共相應隨諸有情所樂示現受用身土影像差別妙觀察智不共所依無住涅槃之所建立一味相續窮未來際三妙觀察智相應心品謂此心品善觀諸法自相共相無礙而轉攝觀無量總持定門及所發生功德珍寶於大衆會現無邊作用差別皆得自在雨大法雨斷一切疑令諸有情皆獲利樂從因立名四成所作智相應心品謂此心品為欲利樂諸有情故普於十方示現種種變化三業成本願力所應作事配因立名問此四智何位初起答妙平二智初地初起餘二智品果位方生問本新何種起答妙平二智第一剎那唯本有生第二剎那本新合起餘二智亦爾涅槃亦四者即所轉得中所顯得也一本來自性清淨涅槃謂一切法相應真如理雖有容染而本性清淨具無數量微妙功德無生無滅湛若虗空一切有情平等共有與一切法不一不異離一切相一切分別尋伺路絶名言道斷唯真聖者自內所證其性本寂故名涅槃二有餘依涅槃謂即真如出煩惱障雖有微苦所依未滅而影永寂故名涅槃此約二乘説或如來佛身所有色心功德無漏之依是有漏之餘雖無實依而現似有故三無餘依涅槃謂即真如出生死苦煩惱既盡餘依亦滅衆苦永寂故名涅槃亦約二乘論佛解脫道起時一切有為有漏善無記性及劣無漏皆永棄捨名無餘依由此二種圓寂義別故涅槃云捨無常色即是無餘由此不同二乘所得有餘無餘依也四無住處涅槃謂即真如出所知障大悲般若常所輔翼由斯不住生死涅槃利益有情窮未來際用而常寂故名涅槃由大悲故不住涅槃由大智故不住生死名無住處涅槃一切有情皆有初一二乘無學容有前三唯我如來可言具四或涅槃者三事大般等所成也在三身者一自性身謂清淨法界二受用身有二一自受用身謂諸如來三無數劫所修福慧感得無邊真常功德心同法界量等虗空色像周圓亦無限極盡未來際常受法樂二他受用身謂諸如來隨十地菩薩所宜現十重他受用身轉正法輪令他人受用大乘法樂名他受用合此自他名受用身三變化身謂諸如來隨地前類二乘凡夫異生現通説法名變化身也問何名在三身中等答前言涅槃即自性身前言菩提即自受用身餘之二身但自受用身所現非實也若論三事涅槃法身一種即自性身摩訶般若是自受用身解脫通在三身言此皆攝盡者便有諸抄同唯識五法攝三身門便説大圓鏡智與清淨法界攝法身平等性智攝報身成所作智攝大小化身此解不正正義云清淨法界攝法身大圓鏡智攝自受用報身平等性智攝他受用身成所作智攝大小化身妙觀察智淨穢兩土説法正此義云經之中菩提涅槃三身也經云一切菩薩阿耨菩提皆屬此經即是此經方便品開示悟三壽量品三佛菩提攝盡一切經教所説菩提涅槃三身也故言此皆攝盡也言又三周等者周者周圓具足之義如世尊法説鶖子領解如來述成授記所應作事方得周圓也初十二品明一乘境方便品至持品次二品明一乘行安樂一品所行行涌出一品能行行人能行所行皆一乘行壽量等五品明一乘果壽量品極淨圓明果至不輕品引已曾證果言明境等者問何要説境行果三耶答疏言明境令發聲聞心等言因此方期者期者期會因修菩薩行方期會得佛果功德也言為彰菩薩者總結也
