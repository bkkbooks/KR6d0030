body:
  text: 鏡水寺沙門栖復集言第一敘經起之意等者牒前也夫立教之心各有所存老聃涉流沙而演道德孔氏獲麒麟以述春秋孫子臏足而兵法聿興屈原放逐而離騷遂作此固寰中之説未為方外之談若乃本師利見大悲為先將以拯火宅之焚憩畏途之險馳牛車於八正示寶所於二空乃是其言猶時而立也然教之興意總別有殊先德所陳唯顯別意今論總意略啓二門一之以出生死煩籠二之以達菩提彼岸且初意者按三啓經云佛告諸苾芻有三種法於諸世間是不可愛是不光澤是不可念是不稱意何等為三謂老病死若此三法世間無者如來應正等覺不出於世為諸衆生説所證法及調伏事是故當知由有三法如來出世説所證法及調伏事第二意者下經云諸佛世尊唯以一大事因緣故出現於世廣説開示悟入菩提涅槃此通諸教亦總此經故名總意上總言下別意疏中字不定也一有作序經起意無之字有本言起之意經即是起恰似經在前意却在後三經之起意之字在起字上向此則如來為能起經為所起也賀抄兩義解起三義解意且初起者通能所第一佛五薀假者身中後智為能起此則能起故名起二者智之所説教法名起此則所起故名起上二義解起次三義解意第一八識四智總名為意能説故名意此依等無間以解意八識總名意第二約所説一部法華是佛意況意趣故名意第三約梵王鶖子渴仰心為意賀自評云初後恐非也第二為正即取所説一部法華為正牟云三解總非且初解太寬失論云成所作智現身妙觀察智説法唯是一識一智今若八識總取為意太寬第二解違文失若所説一部妙法蓮華經趣況名起此解經即是意意即是起此解違疏文疏經之起意意與經別也第三渴仰心為意者此則唯攝得酬請之中一分失却酬因中之六義謨敘正義云意有二般一總二別總意者降生成道為説經之總意如法師升座是説法意佛出世意在説法下經云破有法王至種種説法又云説佛智慧故諸佛出於世二者別意別意中分二一遠意十六王子二萬億佛特與今日説經為遠意二者近意法華會上授記説經名近意近意中又二一顯二密法華會上顯説一乘名顯意四十年前諸有所作常為一事又云汝等所行是菩薩道密説一乘名為密意言略由五義者問世尊何故四十年後向王城鷲山説法華經有何意況而興起此經答疏云略由五義此略舉也此略字束略名略開則一門束為五義言一為酬因請等者總列五義也酬因即酬自酬請即酬他佛因中三大劫勤苦修行今得成佛為酬因中之行故説此經名為酬自酬他者佛成道後梵王鶖子等請説法酬他者名為酬請二為破疑執者破疑即令生信聲聞四十年前疑自身不得作佛今日説法華經言彼作佛故破彼疑令其生信也破執令生解聲聞昔日執小果以為究竟言三人同坐解脫床等堅執有餘涅槃以為真實今説此經道羊鹿非真化城不實除彼執小之心令解牛車一實名破執令其生解也三為彰記行者彰記受果二乘既除執小之心世尊各各與授菩提佛記故名受果彰行授因靈山雖與授記皆説當來之言各各令修一乘之因此即名為彰行四為利今後者利今約見即是靈山現坐一十五類衆聞此經皆蒙利蓋名為約現利後約當即是佛涅槃後受持此經皆獲福利名為約當也五顯時機者顯時約法即是十二年前大根未熟且説有教十二年後多説空宗未説此經四十年後大根方熟方説此經昔日不説説時未至因靈山會上説法華經今正是其時故名顯時約法也顯根約人者佛欲説此經先看根性若聲聞根熟為説四諦法門緣覺之人為説十二緣生等法今既知大乘根熟與説此經故名顯根約人也故疏主説此五門名敘經起之意也言酬因請中有二者牒前重分也問酬者何義答酬者報也酢也今酬有三義一者酬報因中由聞法華經得成佛成佛了報賞上來法華經口中宣説讚歎故名酬報經云故為大國王勤求獲此法遂致得成佛今故為汝説二酬對義經云爾時世尊告舍利弗汝已殷勤三請吾今豈得不説汝今諦聽善思念之吾當為汝分別解説鶖子等聲聞請境文殊請行彌勒請果五品明一乘果三酬獻義勸行此經廣令發願云經云以大音聲普告四衆誰能於此娑婆國土廣説法華經如來不久當入涅槃佛欲以此妙法華經付屬有在經云今於佛前自説誓言遂得二萬菩薩請此方持四類聲聞請他方持八十萬億那由他菩薩彼此俱持周旋往返十方國土能令衆生書寫受持此經我不愛身命但惜無上道諸大菩薩皆於此經獻忠赤之心故名獻也上來酬報報其往恩酬對對其現衆酬獻勸令修行三義之中酬報義偏勝如來因中三大劫修行因法華經得成佛成佛了却説法華經名酬報也問因中修一乘因今得成佛了説經如何名酬因答一乘因行具在此經但知説經便是酬因二梵王鶖子請為因佛為説為果即是酬因也問既總是酬因何要更説酬答對佛自身酬因分明也若對他人酬請義不分明也所以酬因之中分出酬請也其實兩義不別也言佛果不可虗成等者此酬行因也亦是論因次第亦是建立因亦云略明增減也問何不增至七八減至四五何不將願因居初行因為第二將行為第一耶答疏云佛果不可虗等疏主一遮外道自然義二亦破一性宗即心是佛義佛果不可虗成也必由業行方得説因也即是佛法因緣義破外道自然三有一性宗禪師云即心是佛但知悟了更不要修行佛道非遙回心即是佛在心裏何假外求不如禮自家心裏佛頭不屈不如念自家心裏佛聲不出禪師多作此悟四亦破世間又愛果不愛因見佛有三十二相八十種好即欲得見道修行便不肯見宰相即愛令讀書便不肯未有不讀書得宰相未有不修行得佛果總不行行得佛果名為虗成且佛因中若不布施如何指虗空為庫藏變大地為金銀因中若不持戒豈感得十地菩薩而為眷屬若不忍辱如何得三十二相一一相中有衆多媚好因中若不修第六度如何得具一切智凡修一善皆須回向無上菩提經云我見釋迦如來於無量劫難行苦行積功纍德求菩薩道至然後乃成得菩提道得成佛了穿針之善尚自不遺豈況在因而不行行未有不栽桃李而得其蔭涼由如穀麥不可自出必由耕墾而生三祇劫歷位修行不可發心便成正覺言行不孤起等者問空行行自然得果何須發願居其第二答疏言行不孤起等結前行因必假願者生後願因也孤獨也資助也行事須得願助令生也行願兩法如車二輪如鳥二翼闕一不可也車無二輪即不能致遠鳥無二翼則不能沖天行願相扶亦復如是有行無願行必孤有願無行願必虗若行有於願行不孤若願有行於願即不虗行如珍寶車願如御車者寶車若無人控馭必有傾覆若有行無願不免沉淪如人但修諸行不發四弘誓願得人天果了福盡還落三塗以無願故經云寶繩交絡即是願也言行願雖復等者解求因也問行願既備其因已成此則足得菩提更何須求因答疏言行願雖復自興者結前二因無緣不能獨會生後求因雖有願行若不逢緣從誰修學經云吾於過去無量劫中求法華經無有懈倦等即是求因時有仙人來白王言即是緣意道雖有行願為因若無外緣則不可遇佛果菩提經云善知識者是大因緣所謂化導令得見佛謨云無善友緣不能獨會遇於佛者故知有為之法不假因而不生不約緣而不立所以心法四緣生色法二緣起豈有取佛果菩提而不由緣會者矣言雖逢緣以求重等者解持因也問既有行願求三種足得佛果何用持因答疏言雖逢等一句結前求因非率爾而果成等者生後持因若佛果菩提率爾而得不要持學經典只緣佛果菩提事須三大阿僧祇劫修行供養二十六恆河沙佛個個佛邊事修學經典勤苦纍劫具修諸度然可得成故非率爾率爾者表因修暫爾豈得持有二義一受持名持十法行中一行二任持名持十法行皆攝經云盡行諸佛無量道法又云若我於宿世不受持讀誦此經不能疾得阿耨菩提由受持故所以疾得阿耨菩提問持經實得菩提否答疏言要由持學等言得果既圓等者相因也問何要酬相因答疏言得果既圓等結前持因也將陳應物生後相因問早因持經得果又重言得果有何意也答果有因中果果中果因中果者有阿羅漢果菩薩十地果地地名果也雖言是果且不圓疏言得果既圓簡前因中果也如來因持經得果故獨名得果既圓典終滿位吹貝知時典終喻成佛吹貝況説法成佛既了只令度衆生所以言將陳應物將由當也則是如來得成佛已當為衆生欲説法要也言表經宗等者問既擬應物便令説經何要現相答疏言表經宗等若説諸餘經現小相亦得今緣此經深妙所以先現大相問此經宗旨有何深妙欲説之時事須現相表之答佛自成道唯為菩薩授記只是毀責二乘永非法器燋穀敗種等唯毀責不曾記別故鶖子深自感傷失於如來無量知見忽於靈山會上言二乘作佛令窮子領知家事受用珍財恐不生信故現大相表之若説不死之樹生華不枯之楊生葉則人人皆信若言枯樹生華枯楊生葉則人皆不信昔説二乘為實今日却道是權昔説不得菩提今日却言成佛如是昔權今實昔實今權理趣幽深下經云深固幽遠無人能到故將演説先現大相以表之所以先説無量義經已便入三昧天華四雨地振六動毫相照輝衆起疑彌勒發問文殊為答先現如是大相方乃演説此經故現大相表之問若雨華動地是大相與説法華經為因大相既是因如何言之因若大相即因持業釋若大相之因似依主釋答雖著之字亦是持業釋之言助句也六因中相因唯是持業不通依主此解為正也言大相既彰等者此兩句疏諸科不定行賀諸德等此二句疏屬下説因相牟等此二句是相因意云疏主向下明相因中言相既非常故須説此與此處言大相既彰等亦相似屬相因勝又準下説因疏文言三世佛成道究竟必説一乘即此言故標佛本出世為一大事故也便合是説也準行賀等科此二句即是説因意言大相既彰理須敷唱敷唱何法敷唱一大事大事因緣是説法華經所以疏言故標佛本出世為一大事因緣故也疏中二個故字向上故字是所以義向下故字是結詞由斯大相等結前理須敷唱生後説因佛本現大相只為敷大事因緣故即是明説因也言酬行因者牒前行因也問何名酬行因答酬謂酬昔報往之異名因謂因由所以之別義昔行與今説為因今説乃酬於昔行昔行即為所酬能所合説名酬行因因中所行二利行此行為因如來説經為酬因行而説是經如來因中行行今得成佛欲擬報他昔日之行無過説經以彼七地四菩薩行在此經中具也但説此經便是讚歎所行行便是酬行也言方便品中準論釋等者西國梵本經天親菩薩造法華論先牒梵本經後方造論解釋疏主和尚總引來此間秦本經唯有六句此法華甚深是方便品初唱二甚深處生起來如來從定起來忽然唱道諸佛智慧甚深無量理甚深也其智慧門難解難入教甚深也所以者何是經家自徵詞也徵云佛説解脫所證理深我已得竟能詮教深我又得聞更有何法言我不知耶故言所以者何徵也向下八種甚深盡是答詞教文甚深不答理甚深也所以者何下八甚深文屬能詮教也問此間説行何用引教證耶答八甚深中盡行諸佛等修行甚深正明萬行與此中行因同唯此甚深是正引餘者相從而來也言佛曾親近等者即是世尊經三大劫供養二十六恆河沙佛個個佛邊事須持經聞法令其相續不曾暫廢天親菩薩體此經意論中解名受持讀誦甚深問明受持讀誦甚深何以論親近諸佛多少答互舉一邊也經約所逢佛多少論約所受持經多此顯如來親近佛多反顯聞法亦廣聞法亦廣反顯受持讀念甚深不同二乘唯供養三個四個化佛三生六十四生一百劫便得此則親近諸佛不多親近諸佛不多反顯聞法不廣聞法不廣反顯受持不深也問天親菩薩爭知逢佛是受持讀念甚深答菩薩體下經意常不輕菩薩四位值佛無有空過者皆是受持法華經也於威音王佛涅槃之後行不輕行經云不專讀念經典但行禮拜臨命終時具聞威音王佛先所説法華經二十千萬億偈悉能受持又命終之後值二千億佛皆號日月燈明常持此經以是因緣又值二千億佛同號雲自在燈王亦於諸佛法中受持此經此意亦是驚動二乘令知不實我曾三大劫修學方得菩提汝等二乘只經三生四生豈得大果滿足故不名甚深也言盡行諸佛等者論名修行甚深也簡要云諸佛是果道法是因中萬行因中萬行雖殊修行總盡名無量道法如來三大劫修自利利他之行福之與智兩門一一修行總皆圓滿所以得名甚深不同二乘三生六十四生百劫便得果滿唯行自利行唯證生空唯斷一障修行時少大行未圓所以不名甚深如來時多行廣得名甚深是知櫻之長也乃急急於仙桃松之長也乃遲遲於凡木故知大乘修行時廣名為甚深二乘修學時既不多乃不名深也準諸經論修行有五一發心修涅槃經云發心畢竟二無別如是二心初心難自未得度先度他是故頂禮初發心二心者即最初發菩提心及金剛心後解脫道中名後心即是等覺心滅妙覺心才生名為後心最初發心與佛齊等故言初心難如言發無等等阿耨菩提心也二長時修經三大劫名為長時故老經云大方無隅大器晚成大音希聲大象無形問凡夫之心性多狹劣若聞修行經爾許時豈不辛苦而生退屈答故攝論云愚夫修少時怠心疑已久聖修無量劫勤苦謂須臾三無間修心心相續無間斷故如失驪龍珠潑盡大海水四殷重修志誠勇猛三業䇿勵等故五無餘修如言盡行諸佛無量道法等言勇猛等者萬行若與精進相應無事不成也或一句投火半偈捨身六年苦行七日翹足問成佛是他萬行何故宣説精進答修行萬行時事須得精進阿難常樂多聞我常勤精進是故我已得成佛精進能攝御萬行偏勝故偏舉之論主名果行甚深果行有二解一云果是佛果精進是行行此精進行時而得佛果果家之行名為果行即是感果也二者果者果決行是因行此行望佛果菩提果決而取名果行甚深也不同二乘唯取小果復時節不多所以不名甚深也言名稱普聞者論解名增長功德心甚深也此有二解一者自菩薩知名聞遠振心生歡喜轉加精進增長自功德心二者諸餘衆生見此菩薩名稱普聞各自發心修行名增長他人功德心也若在因中即二利雙運若在果中唯增長他人功德牟云增長功德雖通自他今但取於他不取於自以果中不熏種也言成就甚深等者未曾有法即涅槃也問涅槃本來而有何故言成就也答雖本來有此人未曾證得今日得故名成就也論解名快妙事心甚深此有二解一云真如理是性事體事故名事也涅槃理從來未證得今日忽證得名快妙事只此快樂事便是心也真實之心故名快妙事心此唯是所證理也二者真如理是性事體是涅槃理名快妙此事與快俱是所證如來五薀假者能證之心因快妙事成就得名為快妙事心此則舉所證取能證也却是能成之心名快妙心也問何者是名教上甚深處耶答教從彼快妙心説故教名快妙事心甚深對彼二乘立甚深也言難解法者如來能知者此秦經無也問何名難解法答涅槃是難解法聲聞菩薩雖少分知此法不名難解餘人不知唯如來根本智知盡此難解法故論名無上甚深也有二義一者涅槃當體便名無上當體便是甚深合而言之故名無上甚深二者涅槃體是無上二乘雖證不名甚深唯佛根本智證悟此法得名無上甚深前快妙事舉所取能今此無上甚深舉能取所舉能證佛身取所證理名無上甚深也二乘不能證得法身唯證生空之理不名甚深也言隨宜所説等者權實道理一三不定二乘不知唯佛能知名意趣難解論解名為入甚深緣諸子未能出宅隨根唱有三車商人擬却退還密設化城令住見諸子出宅已後曉説羊鹿是無知商人生已度之心便道化城不實言真言化説有説無隨宜所談意趣難解二乘不能如此故非甚深唯有如來入解斯法名入甚深也言一切聲聞等者此秦本無也論解名不共聲聞辟支佛所作住持甚深不共聲聞辟支佛外利所作亦不同也內利住持亦不同也言內外即自利利他也自受用身自受法樂名內他化等身名外二乘內利唯證生空緣覺化人不過頂忍佛可度衆生動喻河沙故名甚深不與二乘共也此八甚深中初四甚深在因中也後四甚深在果中也今取四個因中行就因中盡行諸佛無量道法正相當也言經唯有六者唐梵對明也正法華及論即八句足沼云長行雖無頌中即有頌云如是大果報種種性相義至乃能知是事既言我及十方佛能知即表二乘不測唯佛能知即是無上甚深也言諸佛道法等者明所起行也結前第二甚深也盡行諸佛無量道法正取第二甚深餘者相從引來諸佛道法者道是因義也法者十二部經六波羅蜜菩薩因行依此法故故名道法萬行雖殊不過二利一自利大智為首上求菩提二利他大悲為先恆度四生化他成佛既盡行者四種修中是無餘修也言具行等者問既若萬行總修得何果答疏言具行一乘等問何不言根本智之因唯言種智之因耶答此經化二乘人二乘之人愛種智自乘之中又無種智如來虗指羊鹿車後教捨羊鹿取牛車正是種智也意令聲聞回心向大行一乘行求於種智緣彼聲聞闕彼種智故所以化城入之以息苦羊鹿有名而不登為令回心求種智故故説法華也言故今酬因等者緣具行一乘種智之因方得佛果既得果已乃酬於因所以于今説斯妙法也言勸修因行者世尊空説經由酬恐行不足更勸衆生行一乘行與世尊相共酬因也故言勸修因行也言酬願因者酬對報往之異名昔願與今説為因今説乃酬於昔願昔願是所酬今説乃為能酬能所合説名酬願因何名願願是祈求之義問前來行業清淨足得菩提何須行因復更有願因答願能引行有所趣向行若無願無所成辦由如世間車馬能運重致遠被駕了若無人控馭即墜塹坑今所行行亦爾雖復修諸善行若不廣發大願只受人天有漏果報不能永超三界成就佛身故行行之後要須發願所以前言行不孤起必假願已資生故酬行因後有酬願因也夫願雖多不過二種一自利二利他因中具二利果中唯利他大論云願有二種一求菩提願二利樂他願天授品云發願求於無上菩提求菩提願藥草云未度者令度未解者令解等又令離苦得涅槃果等即是利他願也阿彌陀四十八大願藥師十二大願瑜伽四願不越二願自利利他也問釋迦如來發願與諸佛同否答一切佛皆同經云諸佛本誓願我所行佛道普欲令衆生亦同得此道問求菩提願利樂他願二願中説經酬於何願答唯酬利樂他願以彼求菩提願成自受用身早酬唯度衆生願未酬未了問説法華經與酬願如何相當答因中發願願一切衆生總得成佛欲得衆生成佛無過聞法華經聞法華經決定成佛經云若有聞法者無一不成佛所以今者為衆生説經便是酬願也言舍利弗當知等者我本者果望拘因名為本也問早晚是立誓願時又復交衆生一一總似如來三十二相八十種好名無異名願滿足為復教衆生似佛因地發心修行名無異名滿足答四解一云佛因地曾為瓦師值一個佛亦名釋迦牟尼當時發願願我成佛一如今佛昔願今滿名願滿足二云大通佛十六王子時各升法座一一教化無量兢伽沙等衆生當時發願願會下衆生還似我身因聞法華經還行因取果當來成佛今時會下衆生從我聞法華經還行因取果當來成佛與我無異也三云我與阿難空王佛所同時發心阿難常樂多聞我常勤精進是故我已得成阿耨多羅四云舍利弗當知我本立誓願願一切衆生與我無異我當日於大通佛所聞經有種性人遇緣根熟發心當得菩提當時與會下衆生發願願有性有緣根熟發心當來成佛與我無異問當日發願願滿足否答當日發願直至今生般若會前生猶未滿足到法華會上方願滿足問當時王子會下有無量殑伽沙衆生今日靈山會上聞此經受記都無一萬人何太生答二解一者靈山會上聞經授記者與王子會下人多少不同且據少分言一切也二者若取大通佛王子會下是立誓願時大極懸遠以彼王子時發願所度衆生有向諸佛邊發心得度亦有當來遇彌勒得度者望釋迦不名願滿不如取今生成佛已後三七日思惟便是立誓願時四十年前願未滿足直至法華會上以有二乘人決定回心修入佛知見因取開示悟三果故名願滿足無異也攝問現覩四生沉淪九有願滿無異豈不爽歟答四解一攝自答云一約有種性衆生言佛願滿足不取無性者問豈大地沉淪受苦衆生總是無種性若有一個衆生是有種性者入地獄佛願未滿足答空有種性亦不得更須共佛有緣有種性有緣方願滿足若無性無緣願不滿足問豈一切受苦者總是無性無緣答兼須根熟者佛願滿足問豈一切大地受苦衆生總是無性無緣根不熟者答兼有種性有緣根熟發心修行入佛知見當來取佛果菩提佛願方滿足此解善牟云此兩行經文分為二段即無妨難第一段云舍利弗當知等一行者此一頌是大事文中依何等義文文中長行偈説此頌長行悟佛知見令一切衆生悟身中菩提種性名令悟也十六王子時發願云一切衆生與我無異不是三十二相名無異意道我昔為凡夫時悟得身中報佛種性發心修行當來成佛遂令衆生悟身中種性回心向大修一乘行與我無異果然有舍利弗等三根聲聞悟身中知見與我無異上解悟了言如我昔所願等者解入佛知見也我緣身中悟得報佛種性所以修入佛知見當時發願願一切衆生還悟身中報佛種性修入佛知見與我無異也果然有舍利弗等回心向大修入佛知見世尊所已言欲令一切衆如我等無異至已滿足問如何是願滿足處答化一切衆生皆令入佛道此兩頌若約本處經文第一行悟佛知見頌文屬果第二行入佛知見頌文屬因疏主引來向酬願因中安著兩行頌總屬因中願也言壽量品等者解果願也賀云雖在果位發願度衆生亦令衆生發此願問如來行圓果滿衆望皆息於一切法任運思擇如何果位更起作意答但似作意非實作意也每者數也即是晝夜六反觀諸衆生常作是意以何方法令諸衆生得入無上道言若昔者結因中願若今果位者結果中願也言每皆發願等者因中發願亦願度衆生由若我身得入佛道果中發願亦願衆生由如我身得入佛道世尊自得入佛道後所以因中果中當願衆生還如我身得入佛道言故酬本願而説等者世尊因聞此經得入佛道因聞此經得成正覺因中果位皆有願衆生如我之心若欲入道事須要因此經所以酬願説於此經如人把白絹爭得似他以為紅色但知將絹入紅汁盆中絹便紅色欲入佛道得成正覺皆因此經所以今時説斯妙法華經云若有聞法者無一不成佛言亦令衆生等者即是令諸衆生得入佛道一則酬昔時之願二乃令衆生見賢思齊勸衆生發利他願與世尊相共酬也言行願相符等者出願功能也大論七十八云由此願故煩惱微薄能修精進是故我説願波羅蜜智度論問云菩薩修行自然得果何要發願然後得果答作福無願無所標立譬如牛有挽車之力要須御者福慧如牛願如御者善惡業報亦復如是若有行兼願少因感大果若有行無願多因感少果也化度問行行發願無非盡心何故世出世果差別不得平等答阿闍世王經云往昔過去無量大劫有佛出世號一切度與弟子在路而往時有三少兒見佛及侍者光明嚴肅互相謂曰可共供養三少兒曰既無香華以何物供養其一小兒即脫頂上白珠以著手中便謂二小兒曰可以供養二小兒效之亦以頂上白珠供養三小兒共議曰今既供養欲何所求三中一個不敢發願如佛願如左邊侍者一個願如右邊侍者一個願得如佛在中而行時三小兒發此願已即以白珠同散佛上二小兒發聲聞心珠在佛邊兩邊一發願如佛者珠在佛頂變成寶蓋蓋中有佛佛告舍利弗願左邊者汝身是也願右邊者目連是也願中央者即我身是也是知獻珠之日彼此齊同得果之時高低不等皆由發願問行願若雙修有何利益答衆生行行若無願與行相符則如鳥一翼不可飛如車一輪不可轉若舟無楫不越渡衆生行行得願相符則如鳥有二翼而仲天不難車有二輪則千里可往如舟得楫則蓬萊可登故行行時須得願相符符者即是節信契合之義以竹為行願而相符合致出世故致者至也言酬求因者牒因也昔日求為所酬今日説為能酬能所合説名酬求因酬者報義對義求者規也求有二種一則求人二則求法王聞仙言歡喜踴躍即隨仙人即求人也普為諸衆生勤求於大法即求法也問前來有其行願自然足得菩提何假更須求因答雖即行願二種為內因力若欲成佛事須假外緣也世無有不親近善知識得成佛者過去釋迦修行行日在資糧位遇一個世無佛法時人不識佛法生在難中釋迦當日作念虗受一生人身都無利益所以白日向夜高聲唱叫狂走時四天門王空中報曰去此不遠有一仙人有勝妙法汝當求之菩薩依言到彼求法仙人曰汝若求我法我乞汝一願與我三年不睡能否菩薩答曰能所以端坐若睡以針針身後經三年以千針針身仙人曰汝真是精進之人所以為説諸惡莫作諸善奉行也又阿難一時於靜處思惟善知識者是半因緣菩薩自家行行發願更得善知識勸勵讚嘆教一半功夫名半因緣如來知之以種種呵責善知識者是大因緣所謂化道令得見佛經云其善知識能作佛事示教利喜令入阿耨菩提等天授品云由提婆達多善知識故令我具足六波羅蜜等問當時求經曰有人有法未審説經酬於何者答今日説經唯酬於法不酬於人也告諸四衆提婆達多却後過無量劫當得成佛號曰天王如來就地獄中與授記酬人了問今日説經何故唯酬於法答經云普為諸衆生勤求於大法亦不為己身及以五欲樂至今故為汝説當時求法為他一切衆生求今日却為衆生説便是酬法二者我因他法華經遂得成佛今日説經便是酬也勝因也言吾於過去等者引經文也疏主引經闕具不定擊鼓宣令已前略却十五句經文即是爾時佛告諸菩薩及天人四衆至為於大法故又時有仙人已前略却四句經即是誰能為我説大乘者吾當終身供給走使又從乃至以身等已前略却兩句經文即是經云採果汲水等都略却十九句經也論闕具了清疏言於多劫中等者相國問菩薩修行現身多類何故定説為王答王者自在化他大故偏説國王舉勝身隱劣身舉難攝易勸勵餘人亦是鼓擊二乘也且言為王非是不作餘類問既亦作餘身如何經言於多劫中常作國王答若不作國王則已但作國王處便為無上菩提捨却國位也問為復現為國王捶鐘擊鼓四方求法為捨位了四方求法答通二解一委政太子為庶人求又言誰能為我不言朕也二云身現為國王求法經云來白王言又云王聞仙言問如來為法三劫常求何不舉作餘身時求法唯言作王答意表令生敬重緣王位自在世無所過尚重此經求之無倦豈況餘類而不敬重此經問何要事須作王時求法答意欲化國人悉皆出離所以常作國王身初作國王遣國人盡行十善後時捨位求法遣國人皆敬重大乘國王尚捨位求經況我等不生殷重故言常作十地經云初地菩薩願為閻浮王為主為首引餘勝類行菩薩行所以常作國王問淨名云夫求法者不著佛求不著衆求今言求法此難寧通答求法有二一有相求二無相求今約利生門中而説且須言於善友所專事求之問何不先言無相求答不可求學有相便言無相言即隨仙人等者為法供承人由法以成德法藉人以弘宣善知識者是大因緣所謂化導令得見佛此經不聞則已聞者定證菩提所以敬法重人供承無倦採果汲水拾薪設食嗔責打罵悉皆受之捨輪王身以為床座如是奉事勤苦經于千歲為重大乘曾無一念退轉也言爾時王等者結會古今將今會古天授是往日仙人將古會今王者則我身是言以佛過去等者雖然行行發願事須得善友為緣故於善友求重大乘因緣會合方得菩提若闕一邊不成正覺當初求法不為己身普為法界衆生所以行此苦行既因求法得證菩提酬昔求心説此妙法經云普為諸衆生至今故為汝説言必由緣會等者成立求因道理也緣有二種一人緣二法緣欲得自身成佛事須假彼外緣求人求法會者會遇要假又法二緣方會遇得佛果菩提故名緣會也恆重者亦有二義一重人二重法四方求法重法也身為床座奉事仙人重人也言故今宣説者問既求得法未審酬否答疏言故今宣説即是酬也今日却為衆生説便是酬也言令生求重等者我因求法所以得證佛身今日説之還令汝等求重一則酬昔求法之心二則令他修學求法與世尊相共酬昔日所求經也求因了言酬持因者酬謂對能酬所酬等如前問既行行發願求重此經則因緣具足自得菩提今何須要其持因答雖然因緣具足必須長時受持若也初有後無終不能尅果由是如來因中經三無數劫於二十六恆河沙佛所長時受持剝皮刺血書寫大乘如斯受持方能尅果雖逢緣已求重非率爾而果成要由持學始能得果經云若我於宿世不受持讀誦此經不能疾得阿耨菩提既因持經得成佛了今時起説昔日所持之經故名酬持因言前八甚深中等者初引受持文問何故有此三段科文如是次第耶答緣第一段云佛曾親近等天親云受持讀念甚深也問經云百千萬億無數無數之言是多少耶答不過涅槃經中二十六恆沙也乍觀文意引甚深文次便説供佛文似孤起此上兩段文通一切佛皆同問未審何處是佛持經處答下疏言又釋迦過去曾為常不輕至彼方是自持經文略明科意也下解疏佛曾親近等者四親近行中之一行也一親近善友二聽聞正法三繫念思惟四如説修行新經云第三如理作意第四法隨法行問如何經言親近諸佛論言受持讀誦甚深答經約所事則言親近諸佛論約所修行名受持讀念甚深也言初依菩薩等者依謂依託依馮救濟之義即所依義如世父母為子所依四依菩薩能救濟衆生與彼衆生為依託故名為依也問一依即得何要説四答勝劣不同故分四也次配位者攝相安國傳有二解一光法師云見道已前初劫為第一依少伏煩惱故初二三地為第二依相同世間故四五六地為第三依相同二乘故七八九十地為第四依純無相修唯菩薩行故第二真諦三藏配地前初劫為初依初地至七地為第二依八九十地為第三依相好劫為第四依又第三解依涅槃經澤州疏主解一切地前菩薩為初依具煩惱故同小乘七方便人二初地至七地為第二依同小乘初二果人初地菩薩斷分別惑同初果二地至七地更經一兩生得入八地受變易身同小乘二果一來天上一往人間故得聖果八九二地為第三依永捨分段身更不起欲界心同小乘第三果人更不還來欲界受生第十地菩薩為第四依同小乘阿羅漢果十地菩薩因究竟阿羅漢小乘之中果究竟順疏意三解中真諦為正問何故將小乘四果同配四依菩薩答約小分義相似彼疏家作科配若據涅槃經文亦無此勢也若不約小分同者初果之人極七返受生菩薩受生不定第二果人一往來菩薩化利人天往來不定第三果人斷下修惑菩薩留惑潤生第四果聖人更不受後有菩薩化身無盡故皆不同問登地入聖斷惑障可是衆生所歸依處地前惑在又是凡何以配在初依攝答登地斷惑證真理地上菩薩得為依地前少分伏煩惱亦得與彼衆生依如華嚴經十信菩薩能八相成道化利衆生為益既深為依無失問言四依菩薩供養二十六河沙未審每依具幾答疏言初依供五恆等依真諦配也問準下經云阿難是諸人等當供養五十世界微塵數諸佛如來至末後同時於十方國各得成佛皆同一號名曰寶相準此與二十六河沙多少何故不同答攝三解一云供養自國佛二十六恆兼供養他國五十世界二云業力供養二十六恆若神通力供養則五十世界三云四依中皆有入住出心若約一心論二十六恆若約三心論五十世界攝自評曰前二解善若約後解三心通論計七十八恆對五十世界亦少也又糅云若捨身四事供養二十六恆若一華一果則五十世界今準經文尊重讚歎護持法藏乃是終身路云雖説四依菩薩供養二十六恆不言只供養爾許便得成佛不妨更亦供養言值多等者釋難亦云出以問此間説持因但引持經文即得何要論供佛多少答疏言值多等即是供佛既多受持亦廣又云值多善友結供佛長時受持結前受持言又釋迦如來等者問既言親近供養二十六恆佛受持此經方得成佛亦大甚深未審世尊曾為四依菩薩受持此經否又今所説經酬昔持因自家因中持經文在何處答疏言又釋迦如來等經云爾時佛告得大勢菩薩乃往古昔過無量無邊不可思議阿僧祇劫有佛出世號威音王如來等其威音王佛滅度之後正法滅已於像法中增上慢比丘有大勢力爾時有一比丘名常不輕得大勢以何因緣名常不輕是比丘凡有所見若比丘等皆悉禮拜云云此是釋迦因地於二十六恆沙佛邊持經處也疏中不引前來被打罵經文來空引臨終受持億偈經文由前來向威音王像法之中曾持經為因所以臨終得威音王佛加被空聲教示二十千萬億偈悉能受持若也總不曾持滅度後佛又不曾見因何令聞又復二十千萬億偈如何記得耶問法華只七卷今説二十千萬億偈何以太多答少化土經少只七卷大化土多不妨二十千萬億偈如下殑伽沙頌六百萬億姟不妨多也本來持經在資糧位末臨命終時空聲教示為聞二十千萬億偈即得如上六根清淨從是即得如上六根清淨便入加行位如上之言指法師功德問爭知是加行位答經文分明云雖未得菩薩無漏法生鼻準此不是初地又言父母所生清淨肉眼肉眼之言表知不是天眼也肉眼有如是勝用資糧位中必無如此功能若是諸根互用事須初地地前無故是加行也言即得如上六根等者問菩薩因何增壽耶答法威德力增壽也問偈中言神通力故增益壽命不説法威德力答增壽有二一法威德力二神通力長行與偈互舉一邊理實雙説為勝問如何神通能增長壽答夫四神足者住世一劫即是增壽處也問本來此菩薩是何行位人設使增壽太長生如世間人持念加被只十年五年即得絶多亦不然況菩薩增二百萬億那由他歲耶答安國云此菩薩加行位中命自長故況聞法力問如何加行位中有四衆答安國云此菩薩是資糧位末所以有四衆欲入加行位兩盈中間有四衆也問長命即指加行位及説四衆便云資糧位末心此解不當路云威音王佛是他受用佛所居報土菩薩處中命長也言有四衆即是化土一處見異也此亦不然一處見異約佛説菩薩無此功能也今有解云受持千萬億偈增壽盡是加行位問如何有四衆答是加行位菩薩不妨四衆得見只如西國天親無著是加行位已去及初地聖人何妨四衆得見也言常獲如上等者便入初地也問爭知是初地答以有常字故證常理故常得淨六根前未證理時故無常字問如何是四位值佛答第一威音王佛像法之中行不輕行直至臨命終時具聞威音王佛先所説法華經二十千萬億偈悉能受持即得如上眼根清淨耳鼻舌身意清淨得是六根清淨已更增壽命二百萬億那由他歲廣為人説是法華經乃至是菩薩復化千萬億衆令住阿耨菩提等是第一位從命終之後得值二千億佛皆號日月燈明於其法中説是法華經是第二位以是因緣復值二千億佛皆號雲自在燈王乃至於四衆中説是法華心無所畏是第三位從於此後復值千萬億佛亦於諸佛法中説是經典功德成就當得作佛是第四位言其常不輕等結會古今也經云若我於宿世不受持讀誦法華經為他人説者不能疾得阿耨菩提等得大勢彼時四衆比丘比丘尼以瞋恚意輕賤我故二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱畢是罪已復遇常不輕菩薩教化阿耨菩提等問菩薩何不將獲衆生禮拜他教嗔罵千劫入於地獄答衆生根性宜如此當時四衆打菩薩嗔從心起熏見分種所造業是地獄業菩薩當時從後與伊授記成佛兼以説法音聲入伊耳中熏相分種在第八識中經千劫在地獄種子方熟從地獄出經云畢是罪已復遇常不輕菩薩教化阿耨菩提等經證了言故為往時等者由昔持經今得成佛故今宣説酬昔持經也言勸常受持者今得成佛由昔持經汝愛菩薩須學我行昔不持妙法不能疾得菩提今獲相好周圓皆由持經之力汝既欣求佛果事須受持此經若無間斷之心果滿共吾無別一則酬昔持經二則勸他受學由斯二意故説此經也言酬相因者現相與説經為因説經乃酬於現相能所易知問佛本出世只為利生便合説經何須現相答一乘深妙意旨極難破二乘權令歸一實指昔無而言今有談前果為後因恐有疑生便興異見故現嘉瑞拂彼疑情故須現相相者相狀相之一字自古多解一安國十解一外讚真乘相説無量義經是二內審當根相入無量義處三昧是三天人散華相天雨四華等是四地動降魔相六振動是五凡聖同歡相四衆瞻仰等是六毫光遠照相放毫光下是七顯示他方相於此世界盡見彼土下是八此界莊嚴相佛放一光下是九彌勒懷疑相爾時彌勒菩薩作是念下是十文殊為答相文殊告言下是於中第七第八相疏無明文只於衆見此已疑生中有此意也見彼土之相狀見此界之莊嚴故疑生也路有五一外相二內相三天相四地相五光明相放眉間下是同安國前五也金城有六解前四同路第五第六別也第五他相放光明照于東方八千世界六自相見此國界種種殊妙諸抄解釋甚多糅抄十二相安國十相太寬疏中則有無者金路或五或六解則太狹章敬六解為善一演導教物相已四十年後名將説此經耶答一則通二身亦得二者取化身亦甚有理以現相是化身故言先為菩薩等者演教道物相也本來此經合向報土中説將向靈山穢土中説來緣根鈍之徒法深難解聞恐生謗遂初説有教令證小果次談空教陶練小心今者父知子意漸已通泰成就大志自鄙先心遂於靈山會上廣召有緣欲將家財付與窮子説其行果攝入功能乃先為菩薩談體出生説無量義經令知藥病性無量故法亦無量法無量故義亦無量義無量者從一法生其一法者所謂無相無相不相名為實相意令鼓擊聲聞回心意捨權取實亦如菩薩當坐蓮華故無量義經與法華經為時至成就也言次入無量義等者問何要入定答若不入定爭知鷲子是上根與法説四人中性與喻説五百千二百下根與宿世因緣説若不入定無由審根後方演説為法深妙所以如斯亦為後人作其軌範由斯意故入無量義處三昧也言天雨四華等者二儀呈瑞相也且以帝王布慈以訓世則感赤烏翔而老人星現仁德育物醴泉涌而嘉禾生是知盛德內充禎祥外發布慈雲於法界息火宅之炎極朗慧日於大虗破無明於巨暗今説無量義經已竟便入等持此事難思乃感天動地天雨四華則表度四生而證四涅槃除硬強執小之心行大因而尅獲大果地振六動則表驚動諸魔破六賊煩惱令諸大衆不起散心觀我如來説法之處也問何不雨果子雨於華答若不行因而得果即應雨果不雨華今既要行因後方得果故唯雨華也言四衆瞻仰等者群情咸渴仰相問既雨華動地有何利益耶答疏言四衆等亦是凡聖同嘉相得聞無量義經又見佛入寂定天華亂墜地動傾搖所以四衆八部悉皆歡喜瞻仰言放毫光等者他方遠示相世尊將燃智炬光耀身光所以舒玉彩於眉間現希奇於城外令四衆倍生渴仰如來因此説經大法師問曰既言光照東方萬八千世界此方史籍何不載之答琳云道合則千里懸應世乖則肝膽楚越殷周之人非釋教所宜彥曰有緣千里通無緣隔壁聾君子千里同風小人隔陌異俗情若相得則胡越為兄弟若不相得則肝膽為仇讎佛本放光召有緣之衆此土無緣何妨當時不見問何故降生入滅則令此土知之答降生入滅令此土知者遣知有佛出有佛入滅放光本召有緣所以則不令知見者且靈山會上舒舌經五十小劫教中只説如來八十欠一入般涅槃又欲反淨方移諸天人置於他土此則於當會中尚自有合見者不見之者何妨此土而不見眉間光明其猶日月麗天非盲者之所覩八音六律豈聾者之所聽聞由是此方書史不説也言衆見此已等者是大衆懷疑相見佛説無量義畢不下於座便入于定天雨華地振動毫光東照萬八千異相西呈皎然七事靈山衆會不惻大聖之徵各自心中有懷疑惑也言彌勒發問等者是賓主懸知相也彌勒位登補處知佛欲説此經為慜一切衆生乃示相起於疑惑挾自他之兩意發問文殊一人導師何故今朝現此多般瑞相文殊菩薩是九代佛之祖師見慈氏挾自他以陳問欲知現相之瑞以宿命智現見過去因果相成就十種事如現在前答彌勒言如我惟意云且待我思量忖看度佛今欲説大法去欲擬雨大法雨去乃至欲演大法義去簡要云彌勒覩今相以為問文殊舉古事而為答既知釋迦非化符會燈明將説法華驗之在即經云我見燈明佛本光瑞至法華經言欲説大法等者論云有疑者當斷疑故今佛欲説舍利弗等先住外凡位曾受我化於大乘法種解脫分善鶖子等不知有此解脫善根未生信解常起疑網今欲説此經往昔之事斷其疑網故言欲説大法言雨大法雨等者論云已斷疑者增長純熟彼智牙故今佛欲説成道已後法華已前四十年中所轉法輪發生善牙之事故時雨若降無不霑洽並皆如願法雨若降未發大心即便發心善牙增長也言吹大法蠡者論云建立名字章句義故今佛欲説舍利弗當來成佛號曰華光如來説三乘法猶如俗間曲終之時欲吹螺貝等今佛亦爾記鶖子成佛之事名為曲終更為他説名吹法螺經云華光如來亦以三乘等言擊大法鼓等者論云聲聞權密境界世尊密言三人同坐解脫之床名之為密今佛欲説法警動二乘令捨小執名擊大法鼓經云餘二則非真開往聲聞乘為權密境界令捨顯今説菩薩乘為實境界令取也言演大法義等者即是鶖子作佛又為堅滿菩薩受記作佛名演大法義言我於過去者問文殊爭知答疏言我於過去等舉古也言乃至廣説今日如來等者證今也賓主懸知相也言三世諸佛等者辨有無也問欲説此經現斯瑞相唯釋迦如此為當諸佛亦然答疏言三世諸佛等將由當也三世如來當説此經事須先現種種大相過去燈明現在釋迦未來華光皆先現相後説經相既不一名種種言不同餘經等者問經教皆是佛説何以此經不同餘經答此説曾所未聞若不廣現禎祥何以曉其執滯欲説此經故現大相謨云此經開方便門示真實相創説二乘作佛恐彼不信故現大相表經微妙所説不虗問何名初大相答無量義是此經初大相問説遺教經前説涅槃經涅槃與遺教為初相即此遺教亦有初大相何獨此經答二解一則約決定義説法華經前必説無量義無量義畢必説法華遺教與涅槃則不決定只如日月燈明佛日月淨明德佛説法華經畢便是唱滅更不説涅槃經經云諸法實相義已為汝等説我今於中夜當入於涅槃又日月淨明德佛云汝可安施床座我於今夜當般涅槃亦付屬法華經了便即入滅二云約體用解無量義經是體法華經是用無量義經為菩薩談體出生法華經為聲聞談功能攝入涅槃遺教體用別也二者不取無量義經唯取入定放光是初大相問説上生經舉身而縱金色説般若經住對面念説涅槃經從其面門放種種色光餘經亦放光入定何言無答三者入定雨華動地總名初大相此經具足有六餘或一或二皆不具足問無量義經諸相之中最初首説何故不取作初大相耶答攝云無量義經正為菩薩説傍為聲聞不可將菩薩所聞之經與聲聞擬聞之經為初大相耶説無量義經時衆會不疑所以攝釋不取也若無妨難七成就中除初二成就是阿難安置非是初相餘五成就總是為初相也謨云總取為善問放光入定諸相之中居後何名初相答對正宗前總名初相問何故現此初大相然後説經答此經不同餘經世尊四十年前毀責聲聞讚嘆菩薩大般若經云佛告憍尸迦若入聲聞獨覺正性離生者當知此人不能復發阿耨菩提心何以故彼於生死作限隔故又淨名云聲聞之人猶如敗種設使溉灌不生芽莖猶如高原不生蓮華大樹緊那羅經云聲聞之人燒敗於種於大乘中永非法器唯菩薩人不作是念言我與如來一乘一種而有進修名為淤泥可生蓮華二乘之人即作是言我與如來同坐一解脫床既有此執名為高原唯此經中説聲聞作佛其事難信恐生疑怪所以先現大相靈山一集初則會二歸一回小道而入大乘次則三變土田八方嚴淨引穢心而觀淨國大乘已入無復小乘淨國已觀何有穢剎始集分身佛普在淨土之中而説常身之義餘經無此初大相也誠證非一也上來且烈序分諸相説正宗分正為酬之問向下流通分放光動地等亦是相應説經酬之答下文諸佛而重放白毫召妙音而兼舒肉髻殷勤而示摩衆頂顯誠諦而舌至初禪毛孔光明謦咳彈指重令地振皆由囑纍之深再現華飛亦明功德之大其餘天鼓鳴而天衣降寶蓋覆而寶瓔珞垂衆相實多蓋難以盡皆欲流通至教貽厥後昆非是正宗不説酬彼也路問云論中第五依止説因與六因中相因俱是放光二義何別答論中説因通衆生渴仰心六因中相因唯取佛事不取資事言相既非常者問世尊莫空現相不説法耶答疏言相既非常等灼然説法也説聲聞作佛極難欲説之時故現非常之瑞本現非常之相為説非常之經非常之相既彰須説非常之法也言即將説此等者問世尊酬相説經莫説諸餘經答疏言即將説此經等顯相所為也見相依於此經也説經依相也言酬説因者牒因也問何名為酬説因答昔説與今説為因今説乃酬於昔説昔説則為所酬今説為能酬能所合説名酬説因此説因中甚難得意自古諸師計有二十餘解的當者少説著行行發願求持被前四因收説著雨華動地放光又被第五相因收今此説因事須有因方説與説為因名為説因有取我此九部法入大乘為本與説為因也則能酬所酬因之與果悉皆是也又云説法華經為因衆生聞音得果即此經便是説説即是因也所以甚難得意第一攝釋敘五解初三解是古師義後二自解且前三解者一云四十年前九部法為因説法華是酬經云我此九部法入大乘為本即九部法是説説即是因持業或通依主説字屬法華經因字屬九部法説家之因依主二云取依止説因成就中衆生渴仰心為説因三云取所説法華經即是因衆生聞著得種智為果故所説法華經正是説因也攝敘古三解却破也攝自申兩解一云成佛出世為説因與沼同所以疏言故三世佛成道究竟必説一乘二云取因中發願願成佛畢説法華經只此願説經心是説因所以疏云皆是因中方便求趣又云故赴宿因説斯妙法第二金城三解一云衆生渴仰心為説因二云內證深密三云外現神通金云此第三解為正也更有路府賀法師謨抄牟等極繁不可具敘也今取攝釋敘古師解中我此九部至為本又取沼法師成佛出世為説因問若成佛出世何唯此經一切經皆如此答雖説諸經不是佛本出世本出世意只為説法華經更不為餘事説佛智慧故諸佛出於世又云唯以一大事因緣故出現於世如人家有一兒愛宰相便讀書應舉及第後中間尚書侍郎雖得元來不稱他心直待後時得宰相畢方始稱得本心此中亦爾問若本來意為説法華經何不出世便説答所以未曾説説時未至故根生説不得所以別説方便於三七日中思惟如是事我所得智慧總擬分付與衆生入不得又更思惟試與説大乘華嚴經菩薩悟解聲聞人如聾如醉入不得不免先説權教酬他成佛出世意亦不著四十年後説法華經亦説便酬著成佛出世意也故三世佛説大乘了不説小乘入涅槃者則有三佛五佛若説小乘了不説大乘入涅槃者則無也佛若不為説法華經出世來何故日月淨明德佛及日月燈明佛亦説法華經已便入涅槃表出世事了更無事也言下云諸佛如來等者大事即是開示悟入菩提涅槃也抄家取成佛出世為説因者問何者是能酬所酬又何者是果答今此疏中引文云下云唯以一大事因緣故出現於世者此是酬説因中引能酬文來成佛出世為所酬法華為能酬也所酬是因能酬是果諸佛如來唯為説一大事因緣故出現於世説一大事因緣者即是説法華經故云能酬也問前五因別總所酬文來為説因也説法華經為果何故酬説因中偏引能説法華經文來答制作之家事不一途亦不妨也既爾即取説法華經開示悟入一大事因緣為能酬成佛出世為所酬也不違沼法師義也問若取諸佛世尊唯以一大事因緣故出現於世至此已來為能酬成佛出世為所酬問疏引下一節經文云乃至廣説無聲聞弟子等文應成無用甚不相當也答灼然要當夫成佛出世本為説法華經説菩提涅槃大事因緣不為説聲聞小事也所以此一節經文分疏出世不説小乘也佛意本來降下閻浮意為説法華經大事因緣不為説聲聞小事也所以成佛出世為説因即是所酬下云諸佛如來唯以一大事因緣故出現於世為顯直至最後但教化菩薩無聲聞弟子長行欲徹已來總是酬説因之中能酬文問經言無聲聞弟子現今教化三根是何人答雖教化三根聲聞先雖是聲聞後作菩薩故四十年前作聲聞回心向大來作菩薩究竟得種智故上來雖有多解一取九部法經文相當二取成佛出世為正也一則順所引經文二則順下結文章敬云則同長者本意總與牛車緣中小不肯出來所以權唱羊鹿導師本意令到寶所中途為商人不肯前行乃權設化城令住唱羊鹿為牛車之漸設化城是往寶所之基故知昔説小乘九部是入大乘之因今日説於此經乃酬彼往時所説此解順經宗昔權今實也荷恩云從方便品嘆二甚深至正説大事已前皆名説因於中除三請文三請文屬他酬請收也今取三止文決定心因授記取授記至願樂欲聞已來為酬説因亦有取第二止後文不取初止以佛本來決定説法華經心從第二止後科出論云佛心已有決定所為之人由此便有後止及説也言故趣等者通結六因也問必若許是結六因文疏主何得更言上來義類經文甚多至指述則是結六因文如何言皆是因中方便求趣結前四因修學雖滿等結相説二因故趣宿因等通結六因故知安國恐非為正由斯則如牟所解是結説因文也問説因是果中説何言皆是因中方便求趣由此結説因文中有指他指自疏言故三世諸佛等是指他疏言修學雖滿等是指自疏言故赴宿因等通結自他也問前標中既無三世佛字何故結文中便有三世佛字答以前疏文有乃至廣説之字文執寬含容得所以結也問安國意何要向他説因中結六因也答六因望説總得名因總合喚作説因然於中隨勝別立六因名字行行勝故立行因發願勝故立願因求法勝故立求因受持勝故立持因等云云問六因總與説法華經為因未審為復是因由因為復因果因答有三釋一云六因皆是因由因也二云六因皆是因果之因問相説二因果中之事如何判為因果之因答昔見他佛現相後方説經今時傲斆他佛現相説經昔與今為因故相説亦是因果之因三平遙云前四因因果之因成佛因故後二因因由之因説法因故説三解中取初解為正六因皆因由所以因也六因既是經起意中收是説經之意況意趣正是因由之因也問後二因可然前之四因攝萬行萬行感果如何是因由之因答前四因既是萬行萬行有二義一者望自受身是因果之因二者望説法華經因由之因也因中萬行望受用身是因果之因但成自受用身了便是酬因了成佛了不可間坐事須説經説經因他成佛成佛因他萬行萬行望佛果是因果之因萬行與説法華經為因由之因相説二因因由義極成所以六因因由義勝也上來正明六因次下諸門分別者一釋名二出體三辨相四因果五正助且釋名者初總名者一者六因為所酬説經為能酬所酬即因持業因體即酬故也若能酬為果所酬為因所酬是能酬果家之因依主因是所行之行感當果為名酬乃果起名酬對往因而立號酬家之因依主總名了別名者酬之行因酬之願因乃至酬之説因依主行即是因願即是因求持相等此五等皆持業此因體上持二業用因果因由二皆持業其説因者若九部法為説因説即是因若準路言權説與實説為因昔説與今説為因説即是因有云所説法華名因衆生聞已得果名酬荷恩云取方便品初三止文為説因正説大事名酬説即是因持業金云內證深密沼云成佛出世説法之因第二出體者行因尅性業思為體即遍行中善思思即行故能防者是善思所防即三業此三業中思是能起身語二業為所起如無表不是色就所防故得色名又思以造作為業心為性小乘身業以五根為體語業以聲為體意業以思為體大乘三業俱用思為體不同小乘願因者以別境中欲勝解及善十一中信為體欲者希須為義欲得修善發勝解心世人雖亦有故是三塗本今此欲得作佛決定印持起殊勝而趣向之以此為體也求因者亦以欲勝解及信為體經云爾時佛告諸菩薩及天人四衆至六波羅蜜持因者若受持名持以別境中念慧為體念能明記慧能簡擇若任持名持通三慧及念為體也相因者只是業果色為體有抄説雨華動地放光以法處中定果色為體此説不爾動地雨華只是業果色不是定果色也以佛當時只動業果地未必先變定果色了然後振動必無此理故不取也此為正定以別境中定為體若準涉云雨華是忉利天人擲園中華向下散還是天中業果為體若取無量義經為相因并彌勒問文殊答以聲名句文為體説因者若九部法為因以聲名句文為體若沼法師成佛出世為説因即無漏化五薀為體三辨行相者行有二一自利二利他即安樂行品中四行前二自利後二利他願因有二一因中願我本立誓願二果中願每自作是念求因有二一求人王聞仙言至即隨仙人二求法擊鼓宣令四方求法又有二種一自求身為床座經於千歲等二他求令他人求如龍女求法華經於剎那頃發菩提心至不退轉又如淨藏二子回邪見之父王等持因有二一總持即四依菩薩向二十六恆河沙佛邊持經二別持即常不輕菩薩又有二一近持即常不輕菩薩臨終時得聞二十千萬億偈悉能受持二遠持更增壽命二百萬億那由他歲此約命短長論遠近也相因者有二一今相彌勒問二昔相文殊答述古也又有二一古相我見燈明佛二今相以是知今佛欲説法華經今相如本瑞説因有二一權説即鹿野苑二實説即靈山會四辨位者前四在因後二在果五正助者説因為正餘五為助五因望説總得名因故為助也上來正解次義門業門料簡了言上來義類等者結略止繁也義類即是行因義類願因義類乃至説因義類據論每品經文甚多恐猒繁廣更不能具引故略指述路六因各具四行行因四者一道法具修行經云佛曾覩近等二成種智行經云如來知見廣大深遠等三常修佛果行經云吾從成佛已來等四勸物同修行經云舍利弗當知諸佛語至要當説真實等願因四者一立誓邀期願經云我本立誓願等二修因滿足願如我昔所願至入佛道三度生無盡願盡教以佛道四普得佛身願普欲令衆生亦同得此道求因四者一歷劫長時求吾於過去無量劫中求法華經等二棄捨國位求為於法故捐捨國位三身為床座求乃至以身而為床坐四令他重法求普為諸衆生勤求於大法等持因四者一創聞增壽持臨命終時於虗空中具聞威音王佛先至更增壽命二百萬億那由他歲二重宣寶偈持命終之後值二千億佛至於此諸佛法中受持讀誦為諸四衆説此經典三乃至成佛持得大勢是常不輕菩薩摩訶薩供養如是若干諸佛供養恭敬尊重讚嘆乃至當得作佛四勸滅後者持經是故行者於佛滅後聞如是經勿生疑惑應當一心廣説此經世世值佛疾成佛道相因四者一凝身不動相説此經已結加趺坐身心不動二天華落瑞相是時天雨曼陀羅華等三地動傾搖相普佛世界六種震動四照境希有相爾時佛放眉間至起七寶塔説因四者一讚今隨古説作是思惟時十方等二接下方便説思惟是事已等三回心向大説我設是方便令得入佛慧四舉古捨擁説十方佛土中等言後酬請者標也請中有二一總請梵王等二別請化佛等亦得名為天請聖請別請中有二初化佛請説權鶖子等請説實今言酬唯酬請實如來鹿野苑中轉四諦法輪酬梵王請訖化佛梵王鶖子等皆為所酬今佛説者則為能酬能所合説名為酬請問如來大悲何須待請方説答鴻鍾雖響必待扣而方鳴大聖雖慈必待請而方説若不請而便説企意難生必致慢法之𠍴請而不陳如來有吝法之咎故須待請後方説之請即如杵酬即如鍾杵亦擊而鍾必鳴衆既請而佛即説也標了言如經中説等者初敘降生成道為所請境若據文勢即是酬請便合疏云是時三千大千世界主標中既言酬請何故釋中都不論著請意便説降生成道此乃疏文剩長也牟云降生成道為所請境後明能請人若依此科疏文不剩若擬請佛説法未審所請之佛為是報佛為是化佛何處現生何處成道所以賀云若不説降生成道便引請文即義無來處也如經中説者即是本行經大集經因果等經智論四分律等處處皆説準釋迦譜中説有一菩薩名為善慧修行行滿住知足天衆曰善慧將欲下降先現五衰諸天請曰菩薩且住莫現無常答曰有生必有滅有會必有離我今降閻浮轉正法輪度諸衆生便為諸天説百八法門然後觀於十事方始下降同時有九億人同時下生先問諸天當現何相諸天報曰象形為最又本行經等説釋迦菩薩正念思惟從兜率天託陰摩耶夫人右脅而住是時夫人夢見六牙白象其頭朱色七支案地乘空而下入其右脅至明清旦白其王曰大王當知我於昨夜作如是夢請占相師可以占之時相師報曰大王善聽我見神仙天經所載夫人靈夢必生聖子以偈答曰若女人夢見日天入右脅彼女所生子必作轉輪王若女人夢見月天入右脅此女所生子諸王中最勝若女人夢見白象入右脅彼女所生子三界無極尊能利諸衆生怨親悉平等度脫千萬衆出深煩惱海故知夫人所懷必生聖子王聞歡喜踊躍不勝也本行集云聖母摩耶懷孕將滿垂欲生時其父善覺長者遣使詣迦毗羅城淨飯王所請夫人歸春初二月八日約今即二月八日當初周以十一月為正即四月八日向彼嵐毗尼園安庠徐步四遠觀看然其彼林別有一樹名波羅叉上下正等枝葉垂布翠紫相翬如孔項夫人到彼其枝自低舉其右手攀彼樹枝太子從母右脅而誕九龍降水沐浴太子於十方面各行七步一手指天一手指地天上天下唯我獨尊受苦衆生因茲解脫言行七步者即於生處各行七步大集經云我不行七步而言行者示現行也涅槃經云東行七步者西國以東方為上四季之中東方主春春為上首表佛世尊與衆生而作導首南方行者南方主夏夏能成長萬物草木榮盛之時表佛與一切衆生而作福田生長功德西方行者西方主秋萬物長足結實更不滋長表佛成道已去不受後有是最後身北方行者北方主冬萬物雕落更不生長表佛我生已盡四維行者表成佛已能破四魔上方行者表成佛已不為塵垢不淨之物所染行猶如虗空下方行者表佛示現法雨滅地獄火問下方行者莫入地獄去耶答從上下來也問何故只行七步答度世經云表如來有七聖財章敬云具七菩提分法故問何名七菩提分答四神足正斷正勤五根五力七覺支八聖道支束則成七開成三十七菩提分也有高僧對武帝曰佛行七步者表超六道所以行七步也言放大光明等者光能隱蔽世間日月星辰所有光明表成佛已無有一人如法論義勝如來者亦表破癡暗故遍照十方者表慈悲普䨱言四𮨇觀等者表成佛已具四無所畏度四生故言作師子吼者是無畏義自在義表佛出世世界之中而得自在決定説故言説偈言等者我生等苦諦盡是最等集諦盡我已等滅諦盡當復等道諦滿復由重也受生無量故云復也問今此説偈復是何身答是最末後身瑜伽云末後身有二一實二化實者第十地菩薩將成報身於色究竟天大自在宮中者是若化即從知足天中下生成佛者是今疏所論即化相最後身復有三種一者一生所繫身住知天是二最末後身王宮生者是三坐道樹身即菩提樹下身是上生攝一生所繫下生攝後二身今此説偈即第二最末後身若成佛時三身皆盡次依實報説三身一者一生所繫身初地菩薩或七地末心只此末心菩薩三界分段身盡只有此一生身便受變易名一生所繫身二者末後身八九十地菩薩變易身只將此身直至成佛名最末後身三者往自在天宮大寶蓮華王座上者名坐道場身瑜伽論説菩薩受生不過五種一除災生化身為魚米等濟飢饉衆生等二隨類生現同類身彼所行惡而自不行彼所行善事而自行之三大勢生壽量形色種性富貴最為殊勝能斷衆生我慢等過為除憍慢衆生種性色力一切過人四增上生受十王果報自在化導名為增上生五最勝生論云云何菩薩受最勝生謂此菩薩於此生中菩提資糧已極圓滿或生婆羅門大國師家或生剎利家大國王家既能現等覺菩薩廣作佛事今言我生即第五最勝生也胎分者賀云胎生分位今始方盡準抄解據實胎生分位受變易時久已盡矣今言胎分盡者約化相説問衆生界未盡如何佛化身説胎分盡答生既無窮化亦無盡今言盡者約一期化相眼所見者胎生身上成佛出世據此一生之中胎生已亡故名盡或約此界衆生化緣盡故名胎分盡問此界緣盡不來者違他菩薩處胎經云從此滅度十方面各三十二該諸佛國土而復成佛教化衆生又違他壽量品云其父聞子悉已得差尋便來歸咸使見之答故知却來也緣亦未盡也問何名胎分盡耶答分者因也約今生一期化相身上説不同凡夫造業招於後報化相門中分者因義因盡名盡又分者分位胎中五位實報門中盡來已久化相門中亦已盡也問何故言我已得解脫初生之時未得解脫何言已得答欲得大乘從成所作智起化身應感而現不同小乘計為實報身即化相之身初生便得解脫也問四生總離何獨言胎生答濕化似淨故不舉之在胎穢惡深可厭患故偏舉之問四生之中化生最勝何不受化生而受胎生答化身受胎有五種意一謂引諸釋種入正法故二者令所化生不起怯劣心故若受化生彼便作念此是天等為天説法不被我也為引接此類故受胎生三者謂令餘人於佛正法生渴仰殷重心便作是念菩薩捨尊位修行今得成佛轉正法輪我等何為於所説之法不生殷重四者謂降伏一類憍慢恃賴族姓不肯修行之人是故菩薩捨轉輪王位出家修道也五者為留遺形舍利與後代衆生長福一興供養千返生天又更有説恐當外道所記所以不受化生外道讖云過百劫後有大幻人出世所以不受化生也言作是誓等者即前四句偈也誓即願詞也發願度衆生菩薩亦説偈了便更不語更亦不行便同世間孩子不別問何故初行又語後即不行復不語答初生若不行若不語便與世間孩子不別已後出家成道説法人不信受言與我等何異欲得異於世人所以現行及語也若便連頭語及行恐世人將謂是精魅幻惑所以却現孩子相不行不語也言身漸長大者即是八歲作嬰兒七年作童子四年學五明十年受欲樂菩薩少即有出家之意父王恐其學道常以伎樂悅之至年二十九嚴駕遊觀出四門時年二十九真諦解為正也準本起經太子瑞應經年七歲學書算至十歲與調達捔之至年十四父王遣遊觀四門或有十九出家多解不同總是身漸長大也言遊出四門者問既嚴駕而行如何輒有老病死人來答四人皆是淨居天中化瓶天子化作問何故遊四門更無增減耶答東門見老人東方主春春生萬物表世間萬物生皆有老所以見老人南門見病南主夏夏主萬物榮盛以表有盛必有衰所以見病西方主秋秋主凋落草木枯敗以表有衰必有死故見死人北方主殺以表沙門能斷煩惱故見沙門問四相之中何唯現此三相不現生相答欲生厭故故現三相無常經云若老病死世間無者如來不出世也此老病死共嫌故若現生相恐更生欣故不現也五分律説菩薩年至十四嚴駕遊觀出城東門逢見老人身分沉重諸根熟昧皮膚緩皺行步傴曲寢食不安起坐呻吟喘息氣逆所為縵緩為人所輕世情彌篤世事皆息名為老相問馭者曰此是何人答曰老人吾免之否答曰不免回駕還宮不樂王恐出家復增欲樂又於一時復敕馭者嚴駕城南門見一病人百節酸疼四支苦楚能壞一切安穩樂事如電損苗頓傷興盛吾免之否答未免又遊西門逢見死人舉尸在野家室男女哀號隨後問馭者曰此是何人答曰死人問何名為死答風刀解支節無處不苦痛張口太息手足紛亂翻睛咀沫捫摸虗空汗液交流便洟墮落神遊氣絶餘無所知棄之曠野離親戚故謂之死問曰吾免之否答富貴雖殊死路不免菩薩自念未離老病死法更增愁憂即回車還宮太子回駕出城北門逢見一人剃除鬚髮被帶法服執持瓶鉢視地而行問曰此是何人答曰沙門也披雲宴坐等云云太子聞已三稱善哉下車恭敬殷勤致問歡喜踊躍回駕還宮言既問識已等者欲絶愛羅也每見一相輒問馭車人太子遂知不免斯苦前三是厭後一是欣也問佛未出世未有沙門如何説有沙門答一云一切佛神力所化二云法爾出世淨居天子化作沙門相三云外道亦有剃頭似沙門亦喚作沙門也問佛化天化即不妨如何馭車者識知是沙門答曰夫為馭者事須博尋外教書史書史之中説有也只如周書異記中説過千年外有佛法到來事也若據章敬抄兼馭者亦是化瓶天子化來能對答也此解為正依本行集故作此説餘解無據皆不取也言求無上果者遠希大覺也言中夜等者變易分段皆名夜在彼中間人名中夜五分律云菩薩為諸伎女作樂之次菩薩暫得睡眠伎女輩亦皆睡眠菩薩即覺觀諸伎女更相扶枕或露形體狀如木人鼻涕目淚口中流涎琴瑟箏笛縱橫在地又見宮殿猶如丘墓菩薩見之三稱禍哉禍哉遠視父王所住宮住宮變狀亦復如是復稱禍哉深可厭患所以父王設樂本欲令欣事與願違翻成厭境言即命車匿等者遁迹逾城也章云闡鐸迦五分律云闡陀此云給侍令被揵陟即駿馬也又智論云令被白馬即朱綜白馬也闡陀白言夜非行時不應被馬不審何故夜敕馬太子曰有大怨來汝不知也老病死怨怨之大者莫過於此汝速被馬勿得稽留即被得馬牽至中庭白言馬已來此菩薩便到馬所將欲跨之馬大悲鳴天神恐有留難即散馬聲令人不聞有一天神空中叉手報曰太子時已至矣太子曰左右侍人防護如何得出諸天威力令諸伎人睡如死尸都不知覺諸天捧馬足夜半出城表出生死長夜所以半夜出簡要云父王為防護太子恐暗開門出去所以門上懸鈴聞四十里太子夜半開門出無人覺前解踰城墻出此後解從門出前解為正恐罪門司故踰墻有理也諸天捧足東北上十四由旬至跋伽婆仙人所住林中也諸天即淨居天子也智度論僧祇律皆言十二由旬此譯家訛謬不可和合也由旬者一由旬為十六里十四由旬都計二百二十四里若大乘依西域記數量之稱即踰繕那舊云由旬亦云踰闍那踰闍那由旬並訛也新云踰繕那自古聖王名一軍行舊相傳云四十里矣印度國俗乃四十里矣聖教所載唯十六里跋伽婆者梵語此云賢首仙人此仙人是賢人之首故名賢首此仙人住此胡桃林林從人得名名賢首林仙人久滅其林尚存或林名賢首林仙從林得名賢首仙人林言以刀剃髮等者有云淨居等諸天自持刀來與太子剃髮西域記説太子向闡鐸迦邊取刀自斷其髻天帝釋接上天宮中供養然後淨居等諸天化作剃髻人手持利刀徐步而至太子見已語曰為我剃髻否幸為我淨之化人受命即為淨髮也示現不貪一切愛故剃髻貿鹿衣者智論云太子持妙寶服貿鹿布僧伽梨衣西域記云淨居天子化作獦人服皮衣持弓箭太子曰欲相貿易願見允從獦師曰善太子解衣持與獦人獦人得以却伏天身凌空而去自誓三昧經佛念出家淨居天子持色界天繒自然袈裟而至普曜經云兜率天子號離垢光即取天依袈裟僧伽梨化作沙門形供養菩薩瓔珞經云福善天子持八萬四千金縷袈裟以上菩薩瑞應經云乃脫寶裘與獵師貿鹿皮衣疏依此經也言遣車匿歸等者使安親也有云太子夜半通城至此既允宿心乃形言曰是我出煩籠之日去羇鎖之時最後釋迦之處在後父母憶念計寢食不安眷屬憂愁莫知為計令他如此豈曰大悲車匿汝須却來歸報父王等令知平善車匿悲哀不肯歸宮欲得相隨還國白馬跪膝流淚太子慰喻方可肯還菩薩是時解天冠中末尼珠命車匿曰汝持此寶珠還白父王今茲遠遁苟復違離散斷無常絶諸有漏假使恩愛久共處時至命盡會別離見此無常須臾間是故出家求解脫言於凞連等者摧邪六載也遣使還已即捨此林詣阿藍所學無所有處定往頭藍子處學有頂定平遙云雖言六師是阿藍伽藍二人非六師外道也太子捨仙人所住林復至二外道所學無所有處定到彼問云汝行何行業外道答曰我坐得無所有處定即是涅槃太子問曰既是涅槃為是有心為是無心若言有心即有緣慮有緣慮故有愛恚生愛恚生故即生死相續輪回不絶如何得言涅槃若言無心便同木石即是非情何名涅槃外道默然無對菩薩捨之而去外道白太子汝成道之時願相度脫此外道名阿羅姓加藍也次至頭藍子所此外道坐得非想定徵難同前此外道亦白太子願相度脫六師者一滿迦葉迦葉是姓滿是名即斷見外道也二末薩羯離瞿舍離子上四字名下三字母號是彼女之子即常見外道也三想吠多子上一字名下二字母號即苦行外道也四無勝髮褐無勝是名垂髮披褐即自然外道也五犎府容反迦衍那初二字姓本事大自在天六離繫子亦名苦行外道也是彼所生名子露形而行佛法毀之名無慚外道文中雖言六年苦行兼有樂行夫求道者離苦樂二邊簡凡夫離樂簡外道離苦行處中行不同外道日食麻麥自餓投巖入泉赴火編臥棘五熱炙身此之徒黨皆非正術遂捨而去言勤苦過彼者自餓外道日食一粒油麻或豆或粳米等菩薩七日食一粒如是經六年名過彼也言厭其非等者涅槃經云菩薩為顯中道之行行正行故降彼苦行外道已即於凞連河沐浴緣身羸瘦上岸不得淨居天子按樹枝低令菩薩攀上食乳糜者馬鳴經云有牧牛長者二女名難陀波羅住彼山林側淨居天子報曰菩薩在林中汝應供養女聞歡喜到彼林中獻奉香乳糜又普曜經瑞應經云有長者女發願生男當祭山神遂搆千頭牛乳飲五百頭如是展轉取最後一頭牛乳煮糜一云九斛一云三斛六升佛欲成道夜地六振動時牧牛女謂是樹神所為遂煮乳粥將祭山神山神曰我不勝此供養昨夜子時有悉達太子於菩提樹下成等正覺但是彼徵祥非我為也汝可將供養之當煮之時從釜中上騰一十六反却入釜中表其涅槃十六德也當受乳糜時侍衛五人二人捨去乃至敗道虧志等又大莊嚴經云菩薩欲受乳糜時四天王獻七寶鉢菩薩不受最後獻石鉢所以受之如是次第安置以右手按之合成一鉢四楞分明菩薩以受乳糜食已氣力充滿言受吉祥草等者太子當欲往齊正覺山成等正覺路逢長者負草而行菩薩問曰汝有名字何答曰我名吉祥太子念言逢吉祥者必表我成大菩提吉祥事故菩薩又問汝施與我一束草得否答願將此草遂施與菩薩是故草依人立名名吉祥草也經云示現摧憍慢相所以坐草也一束既受草已登齊正覺山思惟果證其山振動山神白言此非菩薩成道之處若此成道我之眷屬皆悉不安此地不合勝致菩薩之身問歲星在所其國有福如來居處人何不安答鳳凰干飛王者之嘉瑞然其栖息唯在梧桐如來出世大福群生成道之時宜居金剛寶座此座威德尊重非餘所安欲成佛者去此不遠有過去諸佛及賢劫千佛皆於此處成道名金剛座菩薩蒙示尋山而下見一石窟菩薩欲就成道有二盲龍又言菩薩欲成道者就金剛座若向此處者必當摧壞我之窟宅菩薩告曰汝今盲冥何得識知爭見我身言得成佛答曰人壽八萬歲時我為一小師説罪為福受此盲身後至六萬歲時拘留孫佛出世從此而過我眼得開遂至金剛座所聽佛説法彼佛滅已我眼還盲乃至四萬歲拘那含牟尼佛二萬歲時迦葉佛具陳上事如是三度佛過眼開今見菩薩來又得眼開故知是大菩薩必當成佛釋迦菩薩留一身影於石窟中而去于今尚存三藏親見言詣菩提樹者即畢鉢羅樹也向樹下證菩提故名菩提樹佛在世時高百餘尺屢經斫伐猶高四五丈本行經云其菩提樹身形黃白枝葉青翠周匝圓滿猶如車輪上下長遠高餘尺直至于今佛樹猶在涅槃之日葉即雕落經于再宿還復如故每至此涅槃日諸國君王異方諸俗數千萬人不召而集香水香乳以用洗之廣奏音樂盛烈香華燈炬繫日競修供養後有外道國王心生不信斫伐其樹并根掘至水際不留根蹤也出後有國王信佛法者而嘆之曰佛日已隱佛樹摧滅生靈何覩舉身投地悲感動地以數千牛搆乳而溉經宿即生高一丈也全取菩提已為樹名有財釋也為於此樹下成大菩提名菩提樹也言坐金剛座者在菩提樹下居其正中與世界同成周百餘步南北長東西狹下據金輪上窮地際與金輪相連猶如狼牙撮骨所成西域記云佛滅度後諸國君王傳聞佛説法金剛寶座遂以鐵作兩軀觀自在菩薩像南北標界東面而坐彼諸耆舊相傳云此菩薩像沙土埋沒此菩薩身形盡時佛法當滅唐三藏至彼見南隅者沒過至𦚾臆矣然此金剛座以三門分別一釋名二出體三問答且釋名者此座從金輪之上涌出故依此座向上入金剛喻定名金剛座若無佛成道即與地平若佛欲就坐即自涌出起也二者出體小乘有宗云三千大千世界中唯此界此州有餘界餘州無一切菩薩將登正覺皆坐此座大乘不然總有二解一則約總佛四威儀中皆有此座二約別此界此洲有金剛座他界亦爾此依大小乘辨通局三問答者問金剛座形狀如何答小乘有二説一云如世穀塠上尖下濶若爾如何容受得八熱地獄耶答第二解云上濶下尖不妨容受地獄等牟云如世間重床子應合方停設使下濶衆生業力與地獄不相障礙賀云若依大乘此座唯識所變亦是佛神力福智所感四智所變是性境收能變之智是現量攝若爾何要此座而成佛耶答菩薩為具微細二障堅執難斷要須此座起金剛喻定方能斷盡餘地不勝也不同小乘斷煩惱障隨處證果菩薩將吉祥草鋪在座上根向內苗向外鋪已右繞菩提樹金剛座三匝已了結加趺座如蛇纏身卓然不動口三唱言我證甘露又言一切諸漏若不斷盡一切心若不解脫我終不起此座經云示現摧憍慢相故所以座草也言以智慧力者菩薩發願已後坐金剛座作是念言有魔波旬好為損壞若不降却豈成大覺遂放神光照彼天宮天宮振動魔王波旬愁怖不樂先以三女幻惑菩薩威神變形改容扶羸䇿杖執手相携跛行而退是時魔王誘亂不遂心懷嫉妬召集魔軍衆往菩提樹所菩薩報曰汝曾設一無遮會今得如是大威權我曾無量億阿僧祇劫為法曾修種種施魔王曰汝無量劫修行誰人證知菩薩以手指地地神出來我能為證魔王即以種種幻惑妖異神變擾動菩薩菩薩即入慈心三昧是時三千大千世界六種振動作大音聲猶如雷吼波旬眷屬一時退散凡厥器仗變為蓮華牟破魔了料簡差別魔有四八并十種四魔者煩惱薀死天魔也八魔者即分段變易各有四十魔者欲憂愁飢渴愛睡眠怖畏疑毒及名利自高輕慢彼汝等軍如是一切無能破我智禪定力摧瓶破投水破魔中有二一實報破二化相破實報破有八化相破有四且實報破者初則分段四魔後變易四魔今説分段四魔者華嚴云十信菩薩八相成道能破天魔第四生貴住中即伏分別諸煩惱魔資糧道漸加行道頓伏初地初心正斷分別體盡其俱生者加行道漸伏初地已上能頓伏盡然故意力七地已前猶起而不為失八地已上一切不行種子金剛心斷其薀死二魔者若依唯識初地已上受變易生即便伏薀死二魔若至八地受變易生即七地滿心方捨薀死二魔其悲智平等者二三四地皆受變易次變易四者煩惱魔謂所知障俱生分別二類別故且分別所知障資糧位中漸伏加行位中能頓伏盡初地永斷次俱生所知障障十地其六七二識中俱生所知障十地之中地地斷金剛無間道一時斷盡此是變易煩惱魔其變易薀死二魔唯識有二師義一云金剛道起降薀死二魔二云解脫道起方降薀死二魔問變易天魔如何答凡作魔王者多是不思議解脫菩薩譬如香象與香象捔力非驢所堪菩薩既示相為魔亦示相破次下示相降魔者今此菩提樹下説破魔者化相破也金剛座上三十四心成等正覺破煩惱魔留第五分壽與未來弟子破薀魔也薀魔樂住生死今捨第五分壽名破薀魔受魔王請却後三月入涅槃表於死得自在破死魔也然降天魔有二説不定一涅槃經説菩提樹下未成佛時魔王惱亂菩薩菩薩入慈心定起雷吼三昧即破天魔又大般若説得菩提已然後破魔法苑云隨根不同未可和會也所以分段品魔障於三乘變易品魔障於菩薩初障解脫涅槃後障菩提妙智又煩惱魔障有餘薀魔除無餘死魔障生壽也十魔者欲等者欲魔謂五塵境體是所造能生貪欲從果為名正是欲境之貪也憂愁魔者即是憂苦二受也飢渴魔者即是二觸所生之二欲也愛者貪愛也睡眠者即是不定四中數也怖畏者即五怖畏疑者即猶豫毒者謂三毒名者謂聲名利者謂資産自高輕慢彼者即是慢也今言以智慧刀者即非神通伏之二釋皆得應攝受者而攝受應折伏者而折伏上道樹降魔了證大菩提等者悉達太子降魔既畢當此土周昭王即位二十四年甲寅之歲四月八日夜明星出時三十四心成等正覺四月八日是佛生日亦是成道日亦有傳記中説二月八日是佛生日亦是成道日問何故亦説不定答佛決定是四月八日生當初周家以十一月為正月即今二月八日也作四月八日今時二月八日當往時四月八日是成道日亦生日今特取四月八日浴佛者太過失約彼周為論天魔波旬既惱佛不得夜後於淨飯王宮殿前空聲報曰大王太子昨夜已死王聞已驚惶悶絶撲落金床如熱沙中魚婉轉于地良久乃蘇而説言阿姨陀言虗瑞應亦無驗得利之真者一切無所獲是時菩提樹神心大歡喜天曼陀羅華至父王所而説偈言汝子已成道魔衆皆已散光明如日出普照於十方又空中報曰悉達太子昨夜明星出時成等正覺王聞語已前言死者是誰今言成道是誰菩提樹神答言大王前死者是天魔後成道者今是菩提樹神我親見太子成道故來相報王聞心大歡喜平旦大都之日百官慶荷咸稱萬歲正歡喜作樂之次斛飯王入來奏云臣當房昨夜賤妾誕生一男即是阿難當父王喜慶時生故云慶喜上來八年作嬰兒七年為童子四年學五明十年受欲樂二十九出家三十五成道成道已後四十五年住世説法言是時三千大千等者初請意也牟科云初明梵王化佛請説權二明鶖子等請説實有説科疏意不盡若科梵王請權梵王不唯請權經云恭敬合掌禮請我轉法輪但言轉法輪不定權實所以如來酬他梵王請於三七日中思惟如是事等説權説實意亦不定故知總相請也既爾應須初請意有三義初梵王總請權實二化佛下別請説權三今既合宜等下鶖子別請説實等取文殊彌勒且三千大千世界主者是第四禪梵王俱舍頌云四大州日月等又一四州量等於初禪一千初禪量等二禪二禪下名小千界一千二禪量等三禪三禪下為中千界一千三禪量等四禪四禪下為大千界也主即是尸棄大梵光明大梵等即是三千大千之主也言及餘天等者即是餘梵王諸天帝釋下經云爾時諸梵王及諸天帝釋至轉法輪梵王作念天佛出世必合説法此佛成道何故三七日空座我須請説不解請權實但知總相請也下世尊酬即趣波羅奈轉四諦法輪即酬梵王一分請中權意也靈山會上説法華經亦遠酬著梵王請中一分實也如來思惟時亦有此意思惟云梵王請我轉法輪今緣根生且説權教至後根熟即説實法今既梵王根熟豈不為説大乘上敘梵王總請了言化佛讚等者申化佛別請説權意也初見梵王等請便擬宣説一乘思惟根性未堪為説恐生誹謗本來出世只為説法利生今若讚一佛乘聞説必生誹謗若也暫生誹謗令他永劫沉淪我寧不説大乘却擬入於圓寂下云我即自思惟至疾入於涅槃又更思量過去諸佛軌則利生方便如何乃先説三乘後談一實古佛既爾我今亦爾作此思惟愜諸佛意十方諸佛皆現梵意慰喻我善哉至分別説三乘此是化佛請説權也衆生根性未熟且談小乘三世諸佛法式皆爾言今既合宜等者三類不同總是別請説實問三類人中能請只是一人如何言等答發言啓請唯是一人若同心合意三根聲聞八萬菩薩故言等也只如鶖子請中云我等千二百又文殊請云是諸菩薩摩訶薩於後惡世云何能説是經意為持品中二萬菩薩四類聲聞請也又彌勒四請皆有我等之言言等何失問鶖子請境世尊説處何故説行果答只此行果對能緣心説總名境也問何故鶖子唯請境不請行果何故文殊唯請行不請境果何故彌勒唯請果不請行境耶答鶖子四十年前執所得之果與如來一種所修之法與大乘不別不識權實所以偏請世尊説權實境文殊菩薩正是行一乘安樂行之人所以請世尊説行彌勒道滿當生欲聞當來佛果三身所以請果第二重答意唯向鶖子身上説也以鶖子不知權可捨不知實可取所以請世尊説權實也雖知取捨未識所行之行如何得離毀傷所以文殊菩薩與聲聞請行既知一乘行是可修二乘行是權一乘是實未識當來所取之果前來聲聞授記果是化身果未識當來報身果所以欲令二乘生欣趣所以彌勒請果也此説勝也今既合宜者如來正意欲説法華經鶖子便請故曰合宜合者契合宜者根宜根宜成就方堪為説名為合宜賀云此顯四十年後靈山會下請説實之意也今一乘正合時宜也言鶖子等請等者小乘教理行果名權境大乘教理行果名實境對鶖子能緣心總説為境也即十二品為一乘境也上八品正明一乘境法師品下四品勸募持行即是兼一乘境也又昔密説三乘稱權今日顯説一乘稱實也言文殊等請等者賀云文殊請説四安樂行此即是一乘果之因故名安樂之行也言彌勒等請者彌勒請説三身真應之果自受用身名真他報化身名應或法身理是所證自受用身是能證此二總名真他化身名應也言故下經云等者正引經證也言安樂行品中等者文殊發請世尊廣説四安樂行一正身行等由行此行當獲安樂經云世尊菩薩摩訶薩於後惡世云何能説是經佛告文殊師利若菩薩摩訶薩於後惡世欲説是法華經當安住四法即雨品為一乘行也言壽量品中等者彌勒請果經云爾時彌勒菩薩摩訶薩知八千恆河沙諸菩薩等心之所念并欲自決所疑合掌向佛以偈問曰無量千萬億大衆諸菩薩昔所未曾見願兩足尊説世尊告曰此菩薩是我教化乃至壽量品中三告四請世尊方説五品為一乘果也所以疏言三遍勸信方説自身真應等言故為酬請等者問既有請未審世尊酬否答疏言故為等緣聲聞之人多皆慢法若不待請企意難生是故如來欲擬説經事須待請為酬此請故説斯經言破疑執等者問有何意興起此經答如來説經必先有起意起者興起意謂意呪意旨興起意旨而有五般今當第二破疑執緣三根聲聞四十年前有疑有執疑則猶豫兩端執則堅著不捨疑則不信執則不解辨囿云疑即猶豫迷上乘而故起執乃封著著小果而遂生除疑決定信生遣執分明解起諸聲聞等者昔日解三而不信一執二乘為究竟不肯回心定不定性二小菩薩信一而不解三執聲聞而不作佛有欲退求小果由是聲聞菩薩皆有疑執今日説經破疑則交生信信自身作佛令交取實破執令生解解二乘為權令交捨權也今當破疑初懸談後解疏諸抄或七門八門十門廣略不同今依謨敘七門一釋名者疑如岐路不肯進修或疑者惑上乘而起又疑是不定義後聞佛説法華乃言為是究竟法為是所行道乃至如今不知是義所趣等疑者不定猶如門扉二出體有三一定體二約障三種類且定體者唯識六云云何為疑於諸諦理猶豫為性能障不疑善品為業謂猶豫者善不生故迷四諦理以有疑故迷善惡業招愛非愛果於苦集而無知斷迷藏識中智種識性為有為無不能決定起智證理由是於滅道中而無修理此約迷理出體也是不善性迷事者於一一法上不能了達皆是迷相大論五十八云疑依五事生一謂疑他世疑過去世有佛法僧三寶否疑未來世亦爾二疑作用疑父母胞胎之作用疑化生有情之作用疑中有身傳識之作用人死了為無為有中有身為無三疑因者不知善因感善果惡因感惡果疑布施是富貴因慳貪是貧窮因四異熟果疑異熟果沙門果等五疑諦實苦集滅道佛法僧是有是無耶此通理事也若依法華會上破疑者破事疑不破理疑也理疑自向初地門中入見道破也然唯識論有二師義初師云有義此疑以慧為體論云疑謂分別異覺為體覺慧即異決斷覺説名為疑護法正義云有義此疑別有自體以猶豫為性此疑只是與慧相應令慧不決前安慧師取異慧為體者由同時疑令慧不決説為異覺非即是慧毗助末底執慧為疑毗助若南智應為識意言毗助末底以釋於疑欲令慧體便成疑者亦可毗助若南以釋於識豈便將智為識體耶今既不許將智為識如何以慧便為疑也意道末底是慧兩家共許毗助之兩家共許是疑義汝即以執慧為體若南是智亦兩家共許猶毗助之即共許為識汝即不許識用智為體即許識別有自體如何毗助末底名為疑即用慧為體故知疑別有自體問前毗助末底名疑何故毗助筏蹉又名疑答由是梵語不同毗是種種義又如六根本煩惱中五見世俗有彼自釋云即是慧分故餘五實有自體彼言疑別有性故故知疑非即慧若疑即慧者應同五見説世俗有此疑若望真如即是假法若望世俗即是實有還將疑為性量云汝疑是有法非即慧宗因云六煩惱中不説世俗有故喻如貪等貪等非世俗有貪等有自體疑不説世俗有同彼貪等有自體也二約障者一煩惱障中疑唯分別障唯見道所斷二所知障中隨無明住地疑異熟生攝如阿羅漢疑黑鹽之類菩薩之人七地已前有者是異熟生疑此在觀行之中不明了心假喚作疑心此疑從異熟生名異熟生疑此七地已前菩薩有故欲界心有異熟生疑心八地已去菩薩二空觀相續一切無也此七地已前菩薩其實無疑疑唯見道斷訖但是七地已前有者是有漏心無始時來與疑同起和雜一處疑雖斷有有漏心時便帶得一分疑相狀起來喚此有漏心作疑簡要云今此二乘無學有者更無別體異熟生攝體訖三誰有疑者亦名種類也三乘皆有疑也上根鶖子中根四人下根五百千二百緣覺凡夫聲聞凡夫經云及發聲聞辟支佛心者第六住前頓漸二悟小菩薩八地已上菩薩示現有疑亦示相破也并二乘聖有學等皆是有疑人也且聲聞人上根鶖子有新舊二疑中下二根有新而無舊問上根鶖子何獨有舊疑答以利根故如世間人是智慧前思慮先見未萌之事鶖子四十年前往往疑自身三人同座解脫床何故世尊金色三十二我即一相也無我到頭莫無佛分經云我常於日夜每思惟是事欲以問世尊為失為不失又云我常獨處山林樹下若坐若行每作是念又云我常見世尊稱讚諸菩薩此是鶖子舊疑也鶖子新疑者今聞世尊嘆二甚深言一切聲聞辟支佛所不能知所以生疑論家有定疑分又云我今自於智疑惑不能了為是究竟法為是所行道又云今聞佛所説心中大驚疑此上根新疑也次中下二根根鈍故無舊疑唯有新疑且中根四人新疑者鶖子請中云而今於世尊前聞所未聞皆墮疑惑又自領解云四十年前於佛教化菩薩阿耨菩提法不生一念好樂之心又云而無希取一餐之意又云作是念已疾走而去準此文證中根人唯有新疑也下根聲聞新疑者下根自云我等常作是念自謂已得滅度今乃知之如無智者又偈中云我等無智故不覺亦不知得少涅槃分自足不求餘準此等文下根新疑也緣覺之人舊疑準理則有準文則無也且準理者鶖子根利而有舊疑緣覺更利根於鶖子何妨亦有舊疑也準文者據經文則無緣覺舊疑處又説文殊菩薩言諸求三乘人三乘人攝得緣覺亦是舊疑也緣覺新疑者經云其求緣覺者比丘比丘尼相視懷猶豫即新疑也以彼法華會上無聖緣覺是凡夫也菩薩疑者資糧位中頓漸二悟兩類小菩薩準疏中意唯有舊疑準抄家意兼有新疑且菩薩舊疑者四十年前頓悟小菩薩言我自得菩提聲聞無分論唯我能然餘不能爾漸悟小菩薩身中具彼二乘種性於佛果菩提作懸崖想不唯疑彼聲聞不得成佛我自到頭得成佛否自他俱疑也却擬回取二乘即是攝論云諸疑離疑菩薩舊疑也菩薩新疑者路云求佛諸菩薩大數有八萬又諸萬億國至欲聞具足道此是菩薩新疑也問此八萬菩薩理事二疑俱盡如何法華會上而有新疑耶答示相有疑非是實有也問菩薩示現有疑意為何事答為引實小菩薩有疑交破也準此道理實有小菩薩到法華會上起新疑也所以章敬云取授學無學人記品中新發意菩薩八千人咸作是念我等尚不聞諸大菩薩得如是記有何因緣而諸聲聞得如是決即是異生小菩薩新疑也又嘉祥云此兩類小菩薩具有新舊二疑昔稟三乘之教疑其道理有三擬趣入於二乘名舊疑也今聞説一一與前乖既無前説三今不合説一疑其道理不定故名新疑也若依此解菩薩具有新舊二疑也三疑起因者初總明後別明且總明者心不孤起託境方生疑是心法必仗於境然後方起疑起之時而有總因亦有別因也總因者即是三乘之人皆不見世尊與聲聞人授記所以三乘之人疑因此生聲聞人因不得記故生疑也菩薩之人因得記故疑生也或疑他不疑自唯我能然餘不能爾或自他俱疑不定性小菩薩不唯聲聞不得成佛我自身得成佛否由是三乘俱有疑網也二別因者亦有是別起因也鶖子等舊疑因思起新疑因聞起且舊疑因思起中有三疑佛化偏我等同入法性云何如來以小乘法而見濟度二者疑菩提無分金色三十二十力諸解脫乃至為失為不失上是舊疑也新疑者新疑因聞起即法華會上唱二甚教理甚教理是三根聲聞起新疑處初聞佛所説心中大驚疑上舊疑因思起新疑因聞起若通論新舊二疑俱因聞起新疑即因聞二種甚深言道聲聞不知舊疑則因世尊獨與菩薩記言當作佛不説聲聞作佛又金城等諸抄云所疑有四一疑化主非直將非魔作佛惱亂我心耶二疑所證理佛所得法甚深難解又佛説一解脫義我等亦得此法到於涅槃三疑能詮教而今從佛聞所未聞皆墮疑惑又其智慧門難解難入四疑智未圓我今自於智疑惑不能了皆是此中疑起因所攝四何時起者金等諸抄晝夜等是起疑時經云我常於日夜每思惟等問一切時中皆有晝夜何唯疑起時是晝夜問又佛未出時有晝夜彼時應有舊疑起授記已後有晝夜彼時新疑應却生故知不可問經文中晝夜文甚分明何不取答縱使文中有晝夜之言空説上根不包餘類也謨云取涅槃四十年前起舊疑時法華會上起新疑時為正也五何處起者有云山林樹下是疑起處經云我常獨處山林樹下等賀云有三妨一者往日居山谷是起舊疑處若爾今日居山谷何不説起新疑處二者若要居山谷是記疑處若出山來疑即合斷何要説經斷疑三者身若能斷即説山谷是起疑處疑發於心何故説身住處問經文如此如何答設經文如此亦是説鶖子一人未盡理也有解云大乘教理行果小乘教理行果是起疑處也六句數者一昔時於大生疑我常於日夜每思惟是事至為失為不失即是好滿不共德具相降魔德二者昔時於小生疑即是若坐若經行常思惟是事嗚呼深自責即是處小階而起嘆也三今時於大生疑佛説一解脫義我等亦得此法到於涅槃而今不知是義所趣又云佛所得法甚深難解有所言説意趣難知於此大乘教理兩法向上生疑四今時於小乘生疑我今自於智疑惑不能了至所行道於小生疑又有四句一疑自不疑他聲聞人疑自身永無佛分二疑他不疑自即定姓小菩薩三自他俱疑不定性小菩薩數起異乘心四自他俱不疑聲聞授記已後少分無疑也第七正明斷疑分位者分二初諸識有無二正破分位且識有無者唯識云藏識全無末那具四意識有十五識唯三意云此疑既是煩惱與何識相應疑唯在意異熟生心從異熟起名異熟生異熟不同有其三種一異類而熟此第八識是無記昔日所造善惡之業招得五趣等果餘識所招非此第八與此異熟故名異因是善惡果是無記名為異類二變異而熟賴耶種子未起現行且同賴耶是其無記凝然不變起現行時若心生愛愛極即取由愛水潤轉體成有有也即生名為變異三者異時而熟者前念剎那落謝後念起未時既前後不同名為異時此疑即從第八識生名異熟生類末那具四我癡我愛我見我慢此第七識有執無疑前五唯三即貪嗔癡且如眼見色時違情境即嗔順情境即貪中容即癡乃至身識皆準此故知疑準在第六識中雖言藏識全無就現行説若論種子不得言無此疑即是後四障中諸疑離疑障也下疏云諸疑離疑即是前二也二正破分位者問今言破疑破何疑答新舊皆破也理事之中唯破事疑不破理疑地前菩薩雖有初地門中破也問何要破答為令二乘衆生生信心故所以世尊出定已後告四衆云於佛所説法當生大信力世尊法久後要當説真實問因何破得答説經能破也文殊菩薩答云諸求三乘人至令盡無有餘又云一切諸世尊皆説一乘道今此諸大衆皆應除疑惑又云聲聞若菩薩至皆成佛無疑問論云説即有驚不説即無驚有因聞經方生疑者如何名説經破疑答初聞二深咸皆有疑後三周正説聞者除疑亦名説經破疑也謨云簡要等云鶖子聞方便品了疑除佛言汝等既已知諸佛世之師隨宜方便事無復諸疑惑又云我聞是法音得所未曾有心懷大歡喜疑網皆已除初周上根未得記除疑也中根下根得記了方除疑授記品云心猶懷疑懼未敢即便食若復得王教然後乃噉食此未得記尚自懷疑得記了方能斷疑此中根人疑斷處也次下根人亦得記了疑除五百弟子授記品云自謂已得滅度至我今乃知實是菩薩此是下根人疑遣也次下小菩薩兩類之人舊疑者四十年前見世尊不與聲聞授記所以生疑今日見世尊與聲聞授記便是小菩薩斷舊疑處若菩薩新疑見世尊與阿難授記處生也經云我等尚不聞諸大菩薩得如是記以何因緣而諸聲聞得如是決世尊與他解釋我與阿難於空王佛所發菩提心已下斷新疑也然疑不同有四對謂種子現行對煩惱所知理事種子習氣且種子疑要三乘見道方斷現行地前聞教即除二煩惱所知煩惱障疑通障三乘所知唯障大乘漸頓二悟若是小乘回心只斷所知煩惱自乘中已斷三理事者迷四諦理三性三無性見道斷事疑修道中斷羅漢疑黑鹽等是事疑也四種子習氣者種子即見道斷習氣即無學位中方斷在見道中雖即種子除習氣上在所以無學道方除種子如蒜醬習氣如氣蒜上來解義門訖一釋名二出體三誰有疑四何時起五何處起六句數分別七正明斷疑分位言佛自成道等者正是疑起因由也亦名標所起境心不孤起託境方生佛自成道四十年前處處會中讚嘆菩薩并與菩薩授記毀責聲聞復不與授記因此三乘人皆有疑網也上辨成佛下半行疏解疑起因也言聲聞等者標起疑人等者等取三乘人亦云等取緣覺四衆等今疏烈上根不烈中下根舉勝攝劣也言故舍利弗甚自等者此舊疑文也無量知見者即塵沙萬德菩提涅槃名無量知見若得授記即不失此知見緣不得記將謂失此知見所以感傷今聞得作故疑即除世尊我常獨處山林樹下若坐若行每作是念我等同入法性云何如來以小乘法而見濟度是我等咎非世尊也至終日竟夜每自尅責此上舊疑也言而今從佛聞所未聞等者新疑文也言諸小菩薩者頓悟小菩薩也即是論云言我能然餘不能爾問何不言大菩薩答示相有疑亦示相破非此所要故不言也言或不定性諸小等者即漸悟菩薩疑佛菩提為得不得即是攝論云諸疑離疑也或有疑者不疑者疏置或言也言由是三乘等者結也由者由不授記聲聞是以三乘人皆有疑網也由是有疑所以説經破疑也言由此經文等者問説經破得疑不答疏云由此經文等此一段文方便品文中唯説菩薩聲聞不説緣覺也言聞我所説法等者聞佛説十方佛土中唯有一乘由是昔今二疑並盡所以然者十方世界若有二乘可捨於一而就於二既無別二乘故求作佛言又云諸求三乘等者疏主恐人疑道説經不被緣覺所以引第二段經文證有緣覺經文雖不分明説名字以有三乘之言攝得緣覺也又疏主向下體經意緣緣覺授記處無所以此間但奄含説了更不分明列也問何故説經破疑則被緣覺及至授記則不為緣覺耶答緣覺之人一座證果法華會上又無此緣覺無學之人縱有者盡是見道已前凡夫亦聞經了便斷疑斷疑了便回心修行大行所以不要授記聲聞之人四果證聖每果之中耽玩無為理不肯回心事須得世尊與授記方肯回心也所以聲聞得授記緣覺不要授記也問疏主何要引序品中一段文來證説經破疑耶序品中如來由未説經答文殊菩薩見雨華動地等事告彌勒云據此瑞相如來必合欲説法斷三乘衆生疑也經文雖在序品中元來指方便品中斷疑事也所以序品品末疏云兩道牙生令進修故正指方便品也言又云菩薩聞等者方便品經文證也疏引斷疑文唯引初周理實下之二周亦合具引第二周云而今從佛聞所未聞皆墮至令離疑悔三周云爾時會中新發意菩薩八千人皆作是念至得如是決等言此中破疑亦兼等者問如來説經為破疑疏中即立破疑門不唯破疑兼破悔何故不立破悔門破悔疏中不立門應破疑門亦不立答疏云此中破疑等緣前標門但言破疑執此欲辨悔故言亦兼也言悔昔修小等者問悔何事答疏言悔昔修小不得作佛出悔所以也昔見菩薩得記聲聞不蒙便自尅責我何修小不行大因不如菩薩蒙記菩提今蒙授記當得菩提悔昔所修惡先所作枉費其功修小乘行取小乘果何不樂大乘行大行令我經爾許時不得記別不樂知金銀珍寶止宿草菴常乃愛其除糞不取牛車愛乎羊鹿不往寶所方便入化城故知昔日所作大枉其功經云不解方便隨宜所説初聞佛法遇便信受思惟取證嗚呼深自責云何而自欺等故言悔昔等言今聞得作等者問既有此悔如何破之答疏言今聞得作等將謂昔日所行其功枉費既是大因何所悔也若不因除糞如何後得家財不入化城如何今往寶所三百由旬已過但行二百即到寶方不為取羊鹿如何得上牛車欲求菩提萬行皆作況小乘法而不修行頓悟則先大而後小後四五六地還相同二乘修小乘法漸悟則先小而後大更不學小乘法是知昔日修行亦不枉也經云我此九部法隨順衆生説又云汝等所行是菩薩道漸漸修學悉當成佛問疑生分別入見即除悔多憂俱離欲便捨今既是無學何有悔焉答此雖言悔但是惡作惡先所作非是悔也問既是惡作何言破悔答從果為名故言悔也理實非悔是惡作故此悔有二一則悔不修大二則悔昔修小今但破悔昔修小不破悔不修大悔不修大正合所應故不破言疑通三乘悔唯等者問説經破疑即立破疑門説經兼破悔何不立破悔門答疑通三乘等意言寬者則立狹者則不立問何名寬狹答賀云三義一三乘論寬狹二三根論寬狹三三性論寬狹且三乘寬狹者聲聞之人昔修小行時有二悔一則悔修小乘行二悔不早修大乘行故言悔唯小有也大乘即無悔不可悔勝而修劣未見有菩薩悔不早修小乘者若爾文殊偈言諸求三乘人若有疑悔者如何菩薩有悔答彼處云有悔者言總意別悔實不通大乘將悔名字寄向有疑之處相合説言總意別也言中説有意中不通也攝云文約義繁合而為言乍似難會意亦前不別二云大乘不定性菩薩於佛果菩提起懸崖想退求小位豈不是悔答此揣量修行大行不及故取異乘不名為悔亦無破悔大文攝云信解品云悔來至此即是有悔疏主何言無悔答疏主不障他諸經中菩薩有悔今言菩薩無悔且約法華會無也信解品談往事也亦有云信解品云菩薩有約身即是菩薩若約身中種姓論即是二乘人由帶彼二乘種姓所以起悔悔屬小乘性縱起悔心是小乘人非大菩薩也賀云小菩薩悔修大行擬退去約暫時退入二乘不久却歸修行大行此約暫時有悔疏言無悔約長時無也今詳諸釋皆歸有理然疏意悔準小有為正也問何須破悔答聲聞人有二種一悔修小乘行因此停住妨行大乘行所以破也將謂四十年前所修小乘不是大乘因枉用功夫所以世尊向説汝等所行是菩薩道所以除悔也二者悔不早修大乘行此間不破彼亦與無上菩提為增上緣也菩薩人無此悔故故言悔唯小有未見菩薩住大乘中悔修大乘者未見有文不可捨勝而取劣耶問何處破答隨説三周之處疑斷之時悔亦隨遣三根寬狹者鶖子上根有新舊二悔中下二根有新而無舊且鶖子舊悔者經云我從昔來終日竟夜每自尅責又云我常獨處山林樹下若坐若行每作是念等此是鶖子舊悔也鶖子新悔經無明文唯法華論中解方便品一切世間諸天及人皆當驚疑處經文彼論家作五種驚怖解五中悔驚怖正是此間鶖子新悔謂大德舍利弗等起如是悔心言我不應證如是小乘之法此是正義又唱二甚深亦是鶖子新悔起處也問上根可爾中下根具新舊二悔否答攝二解一云亦真有新舊悔序品末諸求三乘人若有疑悔者又譬喻品願為四衆説其因緣令離疑悔又授記品中每惟小乘過不知當云何得佛無上慧又五百品云悔過自責準此三根聲聞俱有悔就中中根四人通新舊二悔也下根唯有新悔也問中下許無舊疑如何中根説有舊悔答第二解云中下二根唯有新悔而無舊悔也然彼窮子及彼下根領解皆陳自足更不求餘寧豈昔時悔修小乘行故中下二根無舊悔為正也上三根寬狹三三性寬狹者疑唯不善及有覆無記性也悔不早修大乘行通善性悔不作惡事是不善性如急行失威儀等後追悔即威儀無記如宣律師從東京入正都不乘安乘逢雨急行後却追悔故知悔通三性疏且依三乘三根辨寬狹不依三性若依三性疑狹悔寬以疑寬別立破悔狹故悔門故言以寬攝狹等問三乘有疑何別答菩薩起通理事聲聞起者唯事言至後卷中者後第二卷經文若論疏早是第五卷也疑悔之差別煩惱障疑法執類疑有煩惱伴悔惡作名悔如是差別皆如下釋也
