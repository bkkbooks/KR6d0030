body:
  text: 鏡水寺沙門栖復集栖復自大和末罷律講後屢涉京師輒廁經論末行多戴星霜不憚寒暑然精神曚昧巡歷數度先輩法席隨記得少善言集成一家之説冀其易見云爾今此妙法蓮華經本末前後一十六譯若真偽相兼一十七譯若約全部而論總有六譯六譯之內傳於漢國三本流行正法妙法添品法華今此講者是後秦弘始七年鳩摩羅什三藏譯出妙法蓮華經七卷或八卷六萬九千七百五十四言也然造疏前後十九餘家盛傳於世者即天台紀國嘉祥慈恩也天台疏名文句紀國名讚述嘉祥疏名義記慈恩疏名玄贊今之講者即慈恩疏也西國有千部論師造論解法華經即天親菩薩唐國有百本疏主造疏解法華經即慈恩和尚古來諸德科判此經絶多今且道安和尚科一切經為三分暗合西天佛地論親光菩薩科一切經三分將釋此經大分三段初一品序分序者始也由也即三根聲聞大乘之性已熟世尊集十五類徒先談無量義經蓮華體性後入定雨華動地放光照境彌勒發問文殊為答等皆是欲説正宗之漸由名序分第二從方便品至授學無學記品為第二正宗分即是佛出定三請已後如來法説喻説宿世因緣説於一乘令聲聞捨小歸大授菩提記化彼二乘出濁水故正為二乘傍為菩薩名正宗分第三從法師品至普賢勸發品一十九品是第三段名流通即是顯於此經書寫供養施他聽聞乃至思惟修習十種法行若人若法所得功德流通此經正為菩薩傍為聲聞是為第三流通分境行果三科今且依初八品為正宗分所釋之經既分三段能解之疏分三亦然初從蓋聞至覺權真已下疏之序分將釋此經略以六門料簡下第二正宗分某談遊之際徒次傳陵已下疏主流通分之段不同初序中有二初解疏題目後釋本文且解題目言題目者即是經題目者即是疏目故言題目然今疏本多云妙法蓮華經玄贊卷第一妙法蓮華即是本名玄贊即是疏語既有本名今當略釋言妙法蓮華經者上之四字即是別名唯此經故經之一字即是通名不異諸經故初中分二初妙法二字是法蓮華二字是喻妙法如蓮華蓮華是能喻妙法是所喻故先解妙法後解蓮華先總解妙法二別解妙法先總解妙法者何義答即是甚深難解微妙希有無上殊勝故言妙法妙法者是一切有情心心中有佛性佛性即名為妙法本在有情妄想心猶如何等如木中有火性地中有水性壁中有金性鏡中有明性即驗有情心心中有佛性見即雖然不可見佛性元居各自心人人身中有佛性佛性即妙法妙法有二一理妙法二行妙法理妙法所謂真如行妙法即是菩提菩提者是圓滿報身言理妙者即清淨法身即此法身是此經題妙法體究竟窮其妙法處各自心中法報身既説有情各各心中一一心中有妙法未審遣修何觀行即得心中妙法生有人若要礦中金鍊礦之時金自現有人若要木中火鑽火之時火自生有人若要鏡中明磨鏡之時明自出有人若要地中水穿地之時水自來應是有心有識人人人若要心中佛聞思惟修慧斷煩惱障盡心中佛自生聞教思惟修學人貪心嗔心癡心薄一二三僧祗劫滿法報化佛果周圓欲得成佛但修心修淨則心生佛善惡由心心是主修心決定得菩提佛遣修心敢不修實有心中妙法否妙法在心元不見何以修心妙法生佛道佛性實居各自心見則元來不可見只為甚深難解了分明舉喻況蓮華蓮華性在蓮子中開破子時華不見不以開時華不見謂言蓮子裏沒蓮華有人於彼有情心心中覓或佛時不曾見不以覓時不見佛謂言佛性不居心一一衆生五薀身便共蓮華池不別各各心中有煩惱即同池內有淤泥佛性只居煩惱中便似泥中有蓮子蓮子因緣未和合長時且在淤泥中若到因緣會遇時蓮子裏蓮華自生長我等心中有佛性要須必假耳聞經句聞經句是因緣滋潤心中佛種漸漸心中能悟解只向心中佛自生故將妙法喻蓮華所即蓮華如妙法妙法即一乘一乘即寶所寶所即妙法妙法即名佛性故云妙法二云妙法兩字屬佛身俱合理智通因通果因理果理皆殊勝因智果智悉幽玄因果理性名法身因果智相稱報佛究竟窮其妙法體是各身中法報身故名妙法妙法難解難明蓮華則易知識不識心中理及智相似池中蓮與華蓮者況果表三身之果圓華即喻因彰萬善之因滿蓮華淤泥不染妙法煩惱不不侵蓮華既生淤泥妙法亦混於煩惱煩惱之中有佛性淤泥池內有蓮華蓮華緣會自開敷妙法因圓必成佛欲使人人識佛性故將妙法況蓮華也三云經亦得名中三師解初唯取行果名蓮華行為華果為蓮第二師唯取教理名蓮華教為華理為蓮第三師教理行果總名蓮華也教理行俱是華也理果俱是蓮也教行並開敷理果俱出水也經云諸佛智慧甚深無量理出水也入佛知見經云盡行諸佛無量道法論令證不退轉地并第二周牛車此乘此寶乘直至道場行開敷也開示悟三并第三周寶所即果出水也教有能敷妙理之功德理有所敷出水之力行有因敷趣果之用果有結實酬因之能故也上總明妙法次別明妙法先解妙法後解法且妙者初依疏主十玄門中五義解妙後依北京瓚法師十義解妙一根本妙二枝末妙三攝末歸本妙四絶待妙五無粗妙一根本妙者謂華嚴會中明一乘因果究竟法身彼云欲令衆生生歡喜故説王宮生欲令衆生生戀慕故示雙林滅也上名粗又經云如來實不出世亦不涅槃何以故法身常住同法界故亦同此經云是法住法位世間相常住義又經云如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗等名根本妙二枝末妙於一佛乘分別説三三中之二目之為粗佛乘為勝故稱枝末妙三攝末歸本妙此經所詮一乘究竟圓滿故稱為妙四絶待妙上之三義皆以對粗稱妙未辨不對於粗自體之妙今約妙體本自離言強歎為妙何所有文答涅槃云不因少涅槃名大涅槃又智論云十八空為相待空獨空獨空非相待空既有待不待空妙寧無待不待妙羅什弟子慧觀著法華經序云稱之為妙而體絶精粗寄華宣教而道玄象表下云是法不可示言詞相寂滅什歎云善男子若非深入經藏不能作如是説無待名絶五無粗妙即淨土法門故香積佛品云我土無有聲聞辟支佛名是即無粗也唯有清淨大菩薩衆即是妙智論云七寶世界純諸菩薩亦同於此上根本枝末攝末歸本絶待無粗五妙了也次依瓚法師十義妙一對揚妙二補翼三説處四長時五法多六名定七中道八威力九利益十挍量一對揚妙者餘經化衆生唯現在一佛身説此經通十方三世佛共説三世者多寶世尊是過去佛經言爾時寶塔中出大音聲歎言善哉善哉等釋迦如來是現在佛八萬菩薩未來又文殊即過去佛慈尊即未來佛本師即現在佛又現在中通十方故經云爾時一一方四百萬億那由他國土諸佛如來遍滿其中是時諸佛各在寶樹下師子座皆遣者問訊釋迦牟尼佛各賫寶華滿掬而告之言善男子汝往詣耆闍崛山釋迦牟尼佛所如我詞曰少病少惱氣力安樂及菩薩聲聞衆悉安穩否以此寶華散佛供養而作是言彼某甲佛與欲開此寶塔諸佛遣使亦復如是即是十方三世諸佛共化一會衆生不同餘經唯一佛化故言對揚妙二輔翼妙者前後二十一衆初十五衆一釋種清高衆者經云與大比丘衆萬二千人俱等二已圓未滿衆者經云復有學無學二千人三承恩入道衆經云摩訶波闍比丘尼四曩結深恩衆經云羅睺羅母耶輸陀羅比丘尼五聖難思衆經云菩薩摩訶薩八萬人皆於阿耨多羅三藐三菩提等六帝釋臨天衆經云爾時釋提桓因與其眷屬二萬天子俱七屬護舒暉衆經云復有名月天子普香天子寶光天子四大天王與其眷屬萬天子俱八小大自在衆經云自在天子大自在天子與其眷屬三萬天子俱九跨柅娑婆衆經云娑婆世界主梵天王尸棄大梵等與其眷屬萬二千天子俱十翳虗令灑衆經云有八龍王難陀龍王跋難陀龍王等十一清歌雅樂衆經云有四緊那羅王法緊那羅王妙法緊那羅王等十二勝芳烈樂衆經有四乾闥婆王樂乾闥婆王樂音乾闥婆王等十三動山涌海衆經云有四阿修羅王婆稚阿修羅王佉羅騫馱阿修羅王等十四吞龍啖毒衆經云有四迦樓羅王大威德迦樓羅王大身迦樓羅王等十五仁王自在衆經云韋提希子阿闍世王上十五衆後六衆者一寶塔陵空衆經云爾時佛前有七寶塔高五百縱廣正等二百五十由旬從地涌出住在空中等二質影殊形衆十方分身諸佛集在八方三變土田八方嚴淨等三涌海承蓮衆經云爾時文殊師利坐千葉蓮華大如車輪俱來菩薩亦坐寶蓮華四裂地星形衆是諸菩薩聞釋迦牟尼佛所説音聲從下發來一一菩薩皆是大衆唱導之首各將六萬恆河沙眷屬等五鸞歌逈發衆經云于時妙音菩薩於彼國沒與八萬四千菩薩俱共發來所經諸國六種震動皆悉雨於七寶蓮華等六御象遐方衆經云爾時普賢菩薩以自在神通力威德名聞與大菩薩無量無邊不可稱數從東方來所經諸國普皆震動等是諸衆等莫不雲奔鷲嶺霧擁靈山同嗟昔處二權共喜今聞一實雖鹿園趍道之衆雙樹聞經之徒方此來能過也故云輔翼妙三説處妙且諸經説處各各不同或在虗空如勝鬘佛於空中現仰惟佛世尊普為衆生現或唯在地或居穢土或處淨方來若此經三處皆説初居穢土以陳説欲令捨權而厭俗次居淨方以宣唱欲使欣樂於寶方後處空中畢竟歸於真性是故稱説處妙四長時妙且説諸經時節各各不同只如過去燈明佛滿六十小劫為人演説經云日月燈明佛因妙光菩薩説大乘經名妙法蓮華等又妙光法師八十小劫為人演説大通智勝如來八千劫未曾休廢經云佛説是經於八千劫十六王子八萬四千劫為四部衆廣演此經我今釋迦文佛序正之中不言時節涌出品內菩薩讚歎滿五十小劫及説三身壽量時節極長是故名時長妙五法多妙且華嚴十萬頌大梵本三萬偈今所傳本才七十千頌未若此經如威音如來説二十千萬億偈大通如來説法時節既遠久亦應長日月淨明德如來所説法華經六百八十千萬億那由他等偈以此菩薩具數多意欲顯其義廣故云法多妙六名定妙且諸經名非一定如涅槃經俱留孫佛六萬歲出名曰法鏡經拘那含牟尼佛四萬歲出名甘露鼓經迦葉佛二萬歲出名分別空經釋迦牟尼佛百歲時出名涅槃經名皆不定此經不爾燈明佛大通智勝佛威音王佛日月淨明德佛皆同名妙法蓮華經云名定妙七中道妙如下云十方世界中唯有一乘法無二亦無三無二者無第二獨覺乘無三者無第三聲聞乘計二乘為究竟即是遍計所收即是空也唯有一乘法者即是一乘理智二事依圓有也不有者即空識義即二乘無不空者即有義即一乘有不空不有遠離二邊故云中道妙八威力妙者如龍宮海會等龍女道成由經勝力智積問文殊師利言仁往龍宮所化衆生其數幾何文殊師利言其數無量云云又言我於海中唯常宣説妙法華經等又不輕品云具聞威音王佛先所説法華經二十千萬億等九利益妙者如利今後中説十校量妙者如藥本事品十二喻挍量勝經云藥王譬如一切川流江河諸水之中海為第一等如清涼地等故挍量妙也上別解妙一對揚二輔翼三説處四時長五多法六名定七中道八威力九利益十挍量上解妙十五義畢次解法者可執義可持義夫言法者必具斯義且如世出世法悉備持軌之義水有濕性火有暖性是其持義人聞水火作濕暖解即軌義又如因明論中佛弟子對聲論師言聲是有法是持義親證皆許佛弟子以無常故為宗作無常解是軌義外道以常為宗即作常解是軌義佛弟子聲是有法定無常故宗因之所作性故同喻如瓶盆異喻如虗空即同品有異品非有又所為喻作取無常遠作之性外道量云聲是有法定常故宗因云所量性故同喻如虗空異喻瓶盆亦同品有異品非有廣如因明論説然此法者貫一切有為無為若色若心有漏無漏等法今此言法者唯取一乘相應教理行果四種名之為法言教法者即能詮之文總攝三乘之教教有根本方便方便教者經云我此九部法隨順衆生説入大乘為本以故説是經勝鬘經云正法住正法滅波羅提木叉等根本教者經云其智慧門難解難入是也理法者即二乘所證生空理菩薩所證二空理皆是所攝經云是法住法位世間相常住於道場知已導師方便説勝鬘經云聲聞知有作四聖諦佛知無作四聖諦法華論云念觀者聲聞人觀人無我等行法者即六度四攝七地四菩薩行皆是行也經云乘此寶車直至道場又勝鬘經云正法住正法滅波羅提木叉毗尼受具足戒此六處為大乘故説教是行所依此處故法華論聲聞人觀陰界入厭苦離苦得解脫故果法者即法報二身方便品中前三知見及牛車寶所壽量品中皆明三佛出現於世又云是法住法位果法也及彼二乘自昔所證亦此所攝故勝鬘云四智不究竟名向涅槃界由上所引教理行果根本方便能成佛德皆號一乘咸有運載之功能故也此之四法皆具軌持總名為法一乘相應故名為妙此四法體上有此一乘相應之妙用法體能持此妙用故言妙法持業釋問妙法是教經亦是教何名持業答經即所説之經是體妙法即是聲名句文名詮自性句詮差別文即是字為二所依是經上之業用故名持業問妙法是理何名為教答將理就教俱得名教能詮所詮總得名理能詮所詮總得名教理為言生因也上解法解妙後解法初總解妙法後別解妙法解妙法二字畢次解蓮華者問有何意趣將蓮華況法華耶答佛遣修心敢不修實有心中佛性否佛性在心元不見何以修心佛性生佛性實居自心見即元來不可見只謂甚深難解了世尊舉喻況蓮華蓮華性在蓮子中開破子時華不見謂言蓮子沒蓮華有人於彼有情心心中不見佛不曾見不以不見時不見佛謂言佛性不居心一一有情五薀身便與蓮華池不別各各身中有煩惱即同池內有淤泥佛性只居煩惱中便似泥中有蓮華子華子因緣和合長時且在淤泥中若到因緣會遇時蓮子裏蓮華自生長衆生心中有佛性要須必假耳聞經耳聞經句是因緣滋潤心中佛種性漸漸心開能悟解只向心中佛自生故將妙法喻蓮華亦即蓮如妙法妙法本來是佛性只在衆生妄念心三世諸佛説經時一一諸佛皆同説欲使人解佛性故將妙法喻蓮華問何名蓮華蓮華是何義答言蓮華者即是有名相法為衆生故以名相説欲令衆生因此名相悟無名相是設意也故大品經云一切衆生皆是名相中行今欲止其名相故借名相悟無名相通而言之妙法與蓮華皆是其名經云説大乘經名妙法蓮華別而言云妙法是無名之名蓮華是無相而相以此經題法喻雙舉妙法是法蓮華是喻故名雙舉故名妙法蓮華也又由十義將喻蓮華一者此華從種生喻此一乘必有其種經云諸佛兩足尊知法常無性佛種從緣起是故説一乘二者此華從微至著喻於佛乘漸漸增長經云漸漸積功德具足大悲心皆已成佛道三者此華增長滿具出濁水故喻功德無不圓果無不盡出離生死諸濁泥水經云如來已離三界火宅四者此華雖出泥水而不捨離泥水喻如佛雖出四流之外而不捨三界之中經云時宅主在門外立聞有人言汝諸子等先因遊戲來入此宅稚小無知歡娛樂著長者聞已驚入火宅方宜救濟五者此華微妙鮮潔第一如佛乘五乘之中最為第一經云是乘微妙清淨第一六者此華為凡聖之所稱歎佛乘亦爾為世間出世間凡聖稱歎愛樂等經云佛所悅可一切衆生所應稱讚七者此華臺蘂具足喻於佛乘萬德圓備經云無量億千諸力解脫禪定智慧及佛餘法八者此華諸佛菩薩而坐其上大乘亦爾為諸佛菩薩而住其中經云佛自住大乘如其所得法定慧力莊嚴以此度衆生九者此華開合有時喻此一乘之法隱顯有時經云所以未曾説説時未至故今正是其時決定説大乘十者此華劫初成時大梵天王而坐其上為一切衆生之父經云譬如大梵王一切衆生之父此經亦復如是一切賢聖學無學及發菩提心者之父又普賢觀經云方等經是諸佛眼諸佛因是得具五眼及方等生是大法印印涅槃海所以方等經生三種身三種身者由方等經故故悟實相斷諸煩惱煩惱斷故即法身顯法身顯故有報身報身有故乃有化身有三身故説十二部經説十二部經故有法寶有三寶故有世間出世間三善三善者人天并出世故知法華經是世間出世間之本也故喻蓮華也爾雅云芙蕖又云芙蓉通名蓮華今佛取為喻者依本論師解蓮華有二義一出水義出離小乘濁泥水故二華開義以勝教言開真理故前為教妙後為理妙論中但解無量義經第十六名蓮華故唯指教理二種準下疏解云蓮華二義雖解無量義經果秀因敷未乖通理即教行二種並有開敷理果之中並能出水即同此體通四法也不同無量義經然亦不乖蓮華二義此中意言緣彼蓮華有其二義一者蓮是臺此即是果也二者華即是外華葉此即是因今言蓮華之時雙説因果二義此中教為能詮是因為所顯是果所以易云筌者在魚言者在意即知華不開而臺不現教不言而理不顯因華開而見臺教諭揚而悟旨故下疏云如門為入室之所由教為顯理之處所書云誰人入門不由戶也由此即因為華理蓮果故論云以勝教言開真理故經云諸佛智慧甚深無量其智慧門難解難入此即教理蓮華也二者行為華而果為蓮蓮非一葉而能得佛果非一行而獨成因衆華葉而共長養一箇蓮臺因萬行圓而同成佛果由此即以開示悟入為果入佛知見為因總合二義教行二種並名華皆有開敷義理果二種皆名蓮皆有出水義況詳四法並皆超過二乘並名出水今者唯言理果出水者良為理果之上不具開敷所以偏言出水教行獨有開敷之義所以偏言開敷若教行無出水者豈教行不超出二乘故知且約一義而配故下疏云法既囊括四義華亦苞羅四德法四義者契祕賾之微詮教也叶幽根之玄旨理也尅上乘之奧業行也圓至覺之真宗果也美無不殫故稱為妙華四義者萏菡披敷以見蓮類教論揚以悟旨芙蕖秀出於靈沼喻理頻超於小運舉花開而得實譬因嚴而果滿標白華為色本顯佛智為乘源舉喻蓮華斯有由矣問但名妙法即得何要將喻蓮華共立題目答下疏云然法藉喻明微由著顯假奔茶利之華實況薩達摩之果因法既囊括四義華亦苞羅四德問若以蓮華有因果二義故取為喻者餘一切華皆應得喻妙法何以有華有果故答曰諸華雖具因果義乃不定且如桃杏華開滿樹結果能有幾多何以蓮華個個盡能結果法中論有因有果者且如定姓二乘行因取果如有果結若不定姓二乘捨小歸大皆為一乘汝等所行是菩薩道即無二乘之果便是有華而無果又解有漏善而無果者如善星比丘佛𫺗富羅輪王業謝惡果者闍王造逆懺悔業止皆是有因而無果今此一乘六度萬行定當成佛恰似蓮華個個結實故取為喻又陸地諸華雖具因果即無出水之功水中有草雖出水即闕他開敷之義陸地有華雖開敷即闕他出水之義今此一乘一則出水出離少乘濁泥水故二則華開開真理故轉化生故故疏云華兼秀發總衆美而彰蓮體業俱陳法喻雙舉由斯道理故取蓮華為喻斯有由矣況云華葉則同菩薩道蓮子還如諸佛身要假衆多華葉然後長養一個蓮臺要須萬行齊修然後方成佛果一個蓮子落池內一朵蓮華水上開展轉相生無盡時看即蓮華滿池發一個衆生若成佛為衆又説法華經此相生無盡斯何異蓮華滿池發章僧録云蓮華萏菡若開敷香氣氳氳薰遠近佛既轉凡成聖了威德光明遍十方若將手觸一蓮華香惹遍身生喜悅一念善心親近佛罪障消除福德生一切諸華悉是華將比蓮華不香潔菩薩二乘雖是聖望我如來聖未圓淤泥池內長蓮華長得蓮華香郁馥煩惱之中出佛性出得佛身身最尊既知蓮子裏有蓮華便了心中有佛性欲使人人生悟解保知佛性在心中聞思修慧善修行戒定慧學勤觀察佛意慈悲立此喻指示一切修行人各各認得自心中一一心中皆有佛性誘進衆生同出離故將妙法喻蓮華水深華亦出水淺華亦出二障雖淺深真如總皆出也又有四種蓮華一者泥裏蓮華喻凡夫身中妙法蓮子泥中雖未出必定生長白蓮華衆生未解修行且在凡夫流轉今日聞經修學還如泥裏蓮華煩惱如彼淤泥妙法還同蓮子凡夫聞經心不退一朵蓮華泥裏生二者濁水蓮華喻二乘身中妙法蓮華出其泥裏生在濁水之中聲聞我執雖除法執尚由未斷法執猶同濁水我執恰以清泥出却清泥在濁水看看即是見蓮華三者清水蓮華喻菩薩身中妙法蓮華出其泥裏生在濁水之中復出濁水之中生彼清水之內清水蓮華勝彼前來兩種況菩薩證理次深至於凡夫及小聖我法二執雙除斷清泥濁水不霑華出水在清水中看即開敷水面上菩薩修行不斷絶何愁不證大菩提四者出水蓮華喻佛身中妙法蓮華開敷水面上本從蓮子長生芽諸佛證大菩提還是凡夫修得初法後喻解妙法蓮華了言經者下疏云為常為法是攝是貫等雜心論五義結鬘繩墨出生顯示涌泉又云經者徑也如人遠涉向他事須知其有徑路不知徑路徒費勤勞虗過時光終無到日修行之人亦復如是欲得求釋梵修行十善以化人若欲得不失人身持五戒而方得若欲得願生兜率須藉八戒以莊嚴若欲早見彌陀佛十念事須成熟若欲得小乘羅漢須依四諦以身安欲得緣覺辟支假藉緣生而進道欲得此身當作佛要依妙法苦修行若也捨離此因緣永失菩提佛徑路故將徑字已解經故云經者徑也聞經必得菩提果未有聞經不得果未有得果不因經則知經是果家因因經必得菩提果既也因經皆得果人生須學法華經解經了玄贊者問何名玄贊答二義一者所詮真如妙理名玄七卷妙法蓮華經十卷疏文名贊是玄之贊依主釋玄者杳冥深遠之義經云是法華經藏深固幽遠無人能倒又云諸法寂滅相不可以言宣即同法華經教下所詮真如妙法理唯根本智證餘智變影皆不親得故名為玄此解唯局真如理不通教行也問何名贊答贊者佐助義如一縣之中佐官名玄府助佐長官理化一縣之事名曰贊真如理既是離言絶相法名玄欲擬將此教化衆生去事須假別法佐助衆生始會是故如來後得智中於無名相法上安名相説説出七卷妙法華經佐助根本智中無言説法經云更以異方便助顯第一義異方便者即法華經也如來説經時詮真如理一遍疏主又更造疏就上解釋令義分明衆生易解也此解真如理名玄七卷經文十卷文名贊也第二義妙法蓮華經教理行果四法名玄此解兼通道理理也十卷疏文名贊玄者玄妙教理行果四法總得名玄也三周權實道理早甚分明疏主又更造疏解釋令人易解只此十卷疏文便名為贊此解玄者妙法之異名贊者佐助之別稱經是玄疏是贊是玄之贊依主釋此後義偏勝問何以後義偏勝耶答若取真如理名玄者豈教理行果不名玄耶問何以故將至玄字屬經教理行果耶答今總合諸文玄有二義一玄者懸也即是遠義經云懸遠值遇難二者黑義即北方之行名為玄虎論語云羔裘玄冠是依初義復有二義一者近遠名遠意説此經所詮即是佛慧佛慧有五種一智慧性即是法身二智慧相即是報身三智慧境即真俗道理四智慧伴塵沙萬德五智慧因所謂教行也此經具説性相法報二身要三大劫長時不息方乃證圓故説佛果名之為遠猶如唐三藏和尚天竺往來經十七年即為所至遠也故經時多豈同二乘三生即證由此玄者即是妙法故言玄也此約證甚深説法華論有五甚深一義甚深差別義二體甚深自體性故三內證甚深正智證如故四依止甚深法界法性諸佛本故五無上甚深體最勝故名五甚深甚深即妙法妙即是玄下經云説佛智慧故諸佛出於世又云五百由旬方至寶所故云玄者遠也此遠名玄二者深遠名遠即同咫千里八寸謂之咫此中意説十方世界中唯有一乘法雖昔説三乘既無三乘體由如長者言有三車羊鹿但有假名實無二車之體二乘但有名字究竟唯有一乘法二乘法無二乘不測設教之意遂乃執乘有三即此不測故名為玄贊經云我説是方便令得入佛慧又言但以假名字引導於衆生雖説種種道其實為一乘我此九部法隨順衆生説入大乘為本以故説是經即謂二乘不知故所以教門名甚深即論解五難云其智慧門難見難覺難知難解難入真彼五難二乘不知故一由所證義深故其門難見二由智體深故其門難見難覺三由智內證深故其門難知四由智依止深故其門難解五由智無上深故其門難入疏主依此故言玄此依四阿含甚深解初近遠名遠初義訖二者黑義復有二義一者二乘不測知名之為黑故論云二者難了一切聲聞辟支佛所不能知不測言黑者如道德經云恍兮忽其中有物杳兮冥其中有精彼説道體難知今借彼文以顯此義即是二乘不測教理二種甚深下經云假使滿世間皆如舍利弗盡思共度量不能測佛智會前二深悉皆不測故言玄也即同歎法師妙中三番五段證理不圓功德不滿説即不深也即是第二了義一切聲聞辟支佛所不能知唯佛知故由此名玄二者疏主自謙故智論云凡夫觀佛性由如生盲人二乘觀佛性如嬰兒見月地前菩薩如病眼人初地至七地如電光入觀即見出觀即無八九如隔羅縠中見月十地菩薩唯自見性不見他佛性即是黑暗義疏主意云遠觀佛慧冥若夜遊故云玄今此所解遠義黑義古有釋名未廣行相今將二甚深義解道理應通也故名玄也贊者佐助義縣蒸名贊所以一縣之中縣令名明府諸蒸曹名贊府謂以一縣之事繁多故乃疏簡別為曹目功曹倉曹等然此諸曹不離縣令所管道理亦同經如長官總攝衆義疏如贊府各別科條即如科為三分三周之類一乘四諦等章皆是助義又如贊府等皆須博達之事諳古達今將古治人之法臨時隨制而用以俾縣令今者疏主具依衆教先自三周以釋經文用俾佛意故疏下云兢兢依於聖教栗栗採於玄宗由恐旨謬言疏寧輒枉為援據諸廳雖各主領所化不離縣中但是佐助分治今乃舉一縣字總皆攝盡十卷疏文雖廣義理不離經中但是助顯分別故言贊所以疏云妙法蓮華經玄贊卷者開合卷舒名之云卷第者次也一者極也首也疏有十卷今居其首故言第一言并序者作序者庠序也謨云餘邊作又名敘此敘字有二義一者頭序二者次敘且頭敘義者義同絲邊作者亦是頭緒之緒如城外人家㨸絲璽哀得絲頭名緒一卷疏文如璽頭一紙疏序如絲頭欲擬撜絲去先須得絲頭欲擬造十卷疏文解經去先須得疏序二者次序之序欲行千里最初一步欲次敘欲擬造疏先最初一紙已下疏敘為次敘也二義之中次序為勝然與疏中敘字不同序者庠序也禮記云國學也國子監讀書處名國學也乃至城邑村店學館總名庠序也今依爾匹中解與疏最相當爾雅云序者入門東西墻也即屏墻也即是初始義問何以東西墻是初始義答此國面南為上衙門宅門皆面南入衙門得見東西墻便是見大官君子之初始入宅門得見板障屏墻亦是家宅好惡之初十卷疏文頭頭見此序便是見經義廣大疏義深遠初始上來頭敘次敘庠敘三義中次序庠序為勝二義中庠序為正也言大慈恩寺沙門基撰者寺勝人尊立制述之別號也大慈恩寺者報慈母之恩故名慈恩寺大者即十大寺之數也左街有五寺安國荷恩薦福慈恩興善右街有五寺莊嚴改為聖壽永泰西明改為福壽興福改為奉恩化度貞觀二十三年六月二十二日高宗皇帝在春宮日警大孝之廣軫聖善之懷為母文德皇后奄棄萬國酬昊天罔極之恩遣左庶子宣令有司出京城內擇一故廢伽藍事須顯要勝地挾帶流泉遂出宮城南進昌里古云里不云坊面曲江池有一尼寺淨覺伽藍久而隳壞回造僧居號大慈恩寺重樓幅殿夕惹雲疊閣層堂朝凝彩霧于時皇儲親降慈恩京城之內度僧千人諸寺請舉三百僧住坊院資什並令官給故名慈恩也問大慈恩得名如此寺者何義答寺是此方名字梵云毗訶羅唐云遊行處即衆遊行處意徒省略此方以寺名替之釋名云寺名嗣也謂法官相續承嗣而住即是舊官人下去新官人上來也謨云此國有九寺九卿即光祿酒肉司農碾磨莊宅衛尉卿凶儀大常禮樂宗正宗子大府斗稱大漢車乘鴻臚賓客大理寺因提今言寺即鴻臚管也本因摩騰竺法蘭初到漢國同外藩客到鴻臚寺安置師僧不令與未戒人同住漢明帝所重從漢鴻臚寺別造房僧居分出白馬興聖二寺天下寺舍寺之一字從此興矣言沙門者所説沙門性之名婆羅門亦名為梵輪真梵所轉故沙門此云息惡諸無漏道是沙門性懷此道者名曰沙門言基撰者基字是疏主名當時唐初未諱今時國諱字也唐三藏弟子多於大乘下著單名大乘基法師大乘光法師等亦有云慧基亦云窺基三名之中基與窺基最親唐三藏臨巳謝寺表中有窺基名字又於奏請御製經序表中云大唐龍朔三年於玉華宮譯經六百餘卷至十一月二十三日令弟子窺基奉表聞奏疏主名窺基字弘道相洲人也姓尉遲氏貞觀二十年抽簪入道配住安定坊弘福寺即今修德坊與福寺今改為崇先寺奉別敕擇聰睿五人住大慈恩寺親侍奉三藏法師習學梵語一聞正説一無遺者內外經典目所覽而心傳耳暫聞而口諷實謂聖哲間出人寶挺生一代莫豪千齡俊彥從思於文場之內遊心於翰苑之中橫筆陳而詞落褰風鑒偽邪而心瑩秋月一乘奧義親稟前英百本深文仰遵慈氏所修玄贊理無不窮妙絶古今未曾有也年逾二十五應詔譯經兼講經論三十餘年并撰法菀大乘唯識法華等疏一百餘本盛行於世以永淳二年乙酉十一月十三日終於大慈恩寺翻經堂側少房春秋五十有一其年十二月四日葬于樊川北埠唐三藏和尚塋所計從遷化至今乾符四年一百九十八年西國有千部論師即天親菩薩東土有百本疏主即慈恩和上今此十卷疏文即百本中一本也言蓋聞者疏主自述謙字也古來解釋恭聞蓋聞詳夫竊以奧推等書是發語之端問若總是發語之端何故偏乍蓋聞答疏主將蓋聞來此安置即不是發語之論端自有別意何意也答謨云疏主自述謙意賀云設疑詞問謙意與設疑詞何別若乍觀名目各別若約道理一種只設疑詞便是謙意知而故疑即是謙也三蓋者略也設疑詞者不定之義疏主意云此經道理或權或實不退菩薩猶迷凡者何能得解今則造疏釋經不敢的言中理所以言蓋聞既於義不定如何製疏以示後人答然則以凡測聖天地實以不同今將性相道理參詳上下經文比校未必全為不當未必的定如斯以斯不定所以稱疑置此蓋言設疑意論云疑者猶預為性問寧知疏主不敢定言答如下將火宅頌文先科半頌喻貪經云鵄梟雕鷲等一頌喻嗔經云蚖蝮蛇蝎等一頌喻癡經云屎尿臰處等一頌喻疑經云狐狼野干等一頌半喻慢經云由是群狗等經文無合等奈寧知作是解答下疏中云順古且爾理未必然義符順故未必不爾意言宅既喻其本識諸蘊即是墻壁屋宅之徒五百人是五趣名言三十子三乘種姓既説有其蟲鬼惡法即合喻十煩惱行相相當故故云義符順故若言定了者經無明合不同涅槃經或即不爾以此不定故是設疑詞問何以知蓋字是設疑詞答論語云子曰吾未見好德如好色者有人求學事業心得似求財色心否答若道總無於中懸頭刺股鑿壁偷光求學事業心與求財色心一種若一向道有只是耳裏聞説眼且不見所以夫子云蓋有之矣吾未之見也蓋者説疑詞亦是謙退語又孝經云仲尼述五孝天子行孝諸侯行孝卿大夫士之孝也皆言蓋天子之孝也及至庶人行孝便言此是庶人之孝也夫子曰我不曾經過天子行孝夫子官至司冠更不作大官未曾經過諸侯之中行孝不敢定斷故云蓋也及至庶人云此是庶人之孝也夫子曰我庶人中事一一親曾經過所以不言蓋也問夫子制禮作樂豈不知天子諸侯行孝耶答夫子實知假疑也只此設疑便是謙退之語此蓋字若向夫子身上説即疑是假設又知而故問便是謙詞通此二説者將蓋字向疏主身上説亦通二意若疏主是菩薩化身疑是假設復得名謙若疏主實是凡夫疑是實説蓋之一字唯通設疑不得名謙疏主既是凡夫聖智懸隔未曾親證不敢定斷故置蓋言謨云亦顯教法東流轉喪真本自如來説如手中葉結集三藏莫失曾文菩薩造論解不同翻譯之家傳不盡經至於制疏淡薄轉多自述謙敬故言蓋也如來在日傳與阿難阿難傳與千大羅漢羅漢書在貝葉三藏將來此間翻譯如多人手中掬水相傳漸漸遺失去聖遙遠造疏解釋不測佛意不敢定準所以設疑故言蓋也三蓋者略也如大般若經六百卷多説性當此經開佛知見真諦三藏傳云龍樹於海中見華嚴大不思議解脫經三本上本十三千大千世界微塵數偈一四天下微塵數品中本四十九萬偈一千二百品此上二本並在龍宮以須彌山聚為筆四大海水為墨書海雲比丘所念一品修多羅上不能盡下本大唐顯慶二年三藏實叉難陀譯然多説相即此經牛車悟佛知見今此一乘雙説性相故論解方便品云自下顯一乘因果疏解云體相相狀有差別故由此諸經即是廣陳此經即名略本故言蓋也然有此解蓋字乃屬於經又非發語之始故不依但取初二解一設疑詞二謙恭之意也言聞者玉篇云知聲也切韻云聞者耳知也耳空為門方聞聲境故今耳字安在門中耳根聞聲事須藉空緣塞却耳根便不聞聲空處著耳方得聞聲門者即是空處若四面打墻不開門來去擁塞處一面開門是空處空處著耳方得名聞耳識向耳根門中取聲故聞字門裏作耳六書中會意字也論中云眼識九緣生耳識唯從八等問何不言蓋見覺知空聞耶答但是疏主謙詞且以聞思推度道理如此言聞未是聖人親證故不言見覺知也疏主自述謙意訖科云通敘者謂通三身教通餘教故言通敘言此宗者唯屬此宗也永泰科云通列至教者至覺權真二句歎三身通一切經有名通至也次言靈樞二句等名通教也振融山等別主教也法華經是化身佛對二乘凡夫靈山説法故名別主教也且依謨科云言菩提現身者初總歎實身能現權身上句總歎實身下句能現權身問何名菩提現身答菩提者即自受用身四智菩提也有能現他受用身大小化身功德能名菩提現身也言智辨應物者次二句疏總歎實智能現權智上句總歎實智也下句能現權智也此自受用身向上有四辨七辨利生功能名智辨應物言成上身智者後二句疏總説權實身智即為能説法人上句總説權實身下句總説權實智也合此二句即是能説法人也振融山而秀大千成上第一句第二句佛身也騰委海而津八萬成上第三第四句佛智也問菩提現身者未審三身中現何種身答二解一約性解二約相解一性師云真實至極之體即法身二者真實至極之用即報身體用不相離一身即三身故涅槃經云吾今此身即是常身法身也一性解云佛果位中無有有為法不可三大劫修行求有為佛果身解脫道已去自受用身四智菩提總是無為法問若爾聖教中如何説自受用身是有為法答一性宗會云且約第十七地已去菩薩所見之身説是有為也若有菩薩成佛去同時類菩薩相送至大寶華王座上入金剛無間道時身猶有限量入解脫道已去此佛身形無有限量便是無為諸來菩薩只見無間道身不見解脫道身只緣見無間道身是有為將謂入解脫道已去身亦是有為也所以五性宗師向聖教中説自受用身亦是有為法此一性宗師會教也計彼金剛無間道已前身是有為解脫道已去盡是無為第二約相宗解菩提現身者若法皈分別不相雜亂清淨法界為法身即是無為也四智菩提為報身及大小化身即是有為也謨有二解一者言菩提現身通現法身報身化身三佛菩提之身也二者若據靈山會上正為三根聲聞説法華唯丈六化身名菩提現身也破謨義云初則太寬失法身無形無相自受用身體是菩提今言菩提現身者即合取菩提家所現之身不合取他受用大小化身菩提為能現佛身為所現名菩提現身也後解太狹小今言通序諸經亦有是他受用身説者今若唯取丈六小化身為菩提現身者乃成別序不名通序也今依大乘正直道理自作二解一者約增勝義解菩提現身問何名增勝答四智中三個智現身增勝説法義暗妙觀察智説法增勝現身義暗所以大圓鏡智菩提現自受用身平等性智菩提現十重他受用身成所作智菩提現大小化身妙觀察智菩提淨穢兩土説法此智唯説法不現身也二者約平等道理菩提現身四個智皆能現身皆能説法名菩提現身也大圓鏡智菩提能現身説法平等性智菩提能現身説法成所作智菩提能現身説法妙觀察智亦爾若四個智通現三身不得又若唯説法不能現身若唯現身不能説法者只如成所作智既是現身之智如何論説起三業化作四記等此智既爾餘智亦然又佛果位中功德無自在義無上覺者神力難思無形質法能現質影又唯識論中有二解一者大圓鏡智能現法身平等性智能現報身成所作智現大小身妙觀察智淨穢兩土説法二者清淨法界現法身大圓鏡智現自受用身平等性智現十重他受用身成所作智現大小化身妙觀察智淨穢兩土説法後解是正義也今疏中意菩提是自受用身四智菩提家所現身即他受用大小化身正是菩薩現身道理方是也上問答菩提現身了下略説三身好然後消疏也顯揚論歸敬頌云善逝善説妙三身無畏無流證教法上乘真實牟尼子我今志誠先讚禮若論諸佛之身本無有二衆生所宜聞見乃至三種一法身即離垢之真理二報身即會真之實智三化身即應物之權質故佛地論云自性法身受用變化差別轉身分三三身之義準論中十三門分別一釋名二出體三三常三德四説法不説法五二利分別六凡聖見殊七功德各異八依止差別九身土同異十建立因由十一五法相攝十二辨相多少十三問答分別此中不可廣説略解二門釋名出體且釋名分二初解通名通名者三是數義身者唯識云體依聚義總説名身二解別名分三一清淨法身毗盧遮那佛釋曰斷煩惱障名清斷所知障名淨二云斷二障種名清除二障習名淨三云伏障現行名清斷障種習名淨最勝王經云譬如真金鎔銷冶練既銷打已無復塵垢謂顯金性本清淨故金體清淨非謂無金如是法身與煩惱苦集除已無復餘習謂顯佛性本清淨故非謂無體譬如煙雲塵霧之所障蔽若障屏已是空界非謂無空如是法身一切衆苦悉皆盡故説為清淨非謂無體法者軌持義身者體義依止義無為理體闕積集義毗盧遮那者此云遍一切處寂問異生二乘諸菩薩所有真理名法身否答未有依止義不名法身故成唯識云自性身者謂諸如來真淨法界受用變化平等所依離相寂然絶諸戲論具無邊際真常功德是一切法平等實性即此自性亦名法身大功德法所依止故大功德法者即是四智菩提也故唯識云故此四智品總攝佛他一切有為功德皆盡也又勝鬘云在纏名如來藏出纏名大法身釋曰如來藏有二一空如來藏煩惱有漏虗妄不實名空能覆真如名如來藏慈恩云亦名能覆藏藏如土覆物名藏二云不空如來藏真如無漏體非虗妄名不空彼煩惱所覆名如來藏慈恩云亦名能顯得藏如金鋌等問真如佛性是所顯得如何却名能顯得藏答謂真如佛性是本能流出大定智悲等如金鋌能出叉鐺釧等若準楞伽經亦有兩種如來藏一空二不空有漏第八識性虗妄故名空能含四智本有無漏種故名如來藏慈恩云名能含藏藏如庫藏等四智種子體是無漏非虗妄法名不空能含當來四智現行名如來藏慈恩云能生得藏如穀麥等二者圓滿報身盧舍那者釋曰圓謂周圓滿者遍也舍那者此云光明光明遍照有二一內二外內遍照者目自受用身以無漏本智照自內身中惑障暗也外遍照者目他受用身説十波羅蜜法化十地菩薩所化衆起智斷惑故報謂報報者酬義萬行所感果報之身酬往因行故名為報身具三義可知此有二種一自受用身論云謂諸如來三無數劫修習無量福慧資糧所起無邊真實功德及極圓淨常遍色身相續湛然盡未來際恆自受用廣大法樂名自受用二他受用身謂諸如來由平等智示現微妙淨功德身居純淨土為住十地諸菩薩衆現大神通轉正法輪決衆疑網令彼受用大乘法樂合此二種名受用身問十地菩薩出過見道已無疑網如何論云決衆疑網答慈恩二解一云若約理疑入見道即除今據事疑不妨許有二云是法執異熟生心於境不決似疑故與疑名説後解善三千百億化身釋迦牟尼佛釋曰千百億是數也釋迦牟尼者此云能寂能寂有二一能自寂即菩提樹下三十四心斷滅煩惱種習百論頌云頂禮佛足哀世尊於無量劫荷衆苦煩惱已盡習亦除梵釋龍神感恭敬二能寂他即是令所化二乘菩薩衆斷滅煩惱也亦云釋迦牟尼是姓此云能牟尼是名此稱為仁能仁之號因此得也成唯識云三變化身謂諸如來由成事智變現無量隨類化身居淨穢土為未登地諸菩薩衆二乘異生稱彼機宜現通説法令各獲得諸利樂事釋曰變化者轉換舊質名變無而忽有稱化故言化身問他化二身俱從化五蘊如何報化名別答他受用居純淨土為登地聖衆現示相説法故得報名化身亦居穢土為化中小二乘凡夫異生等衆示有妻子貪嗔癡等或金鏘馬麥背痛等等現種種苦相故名化又他受用身色相細妙故得報名化身粗著故稱為化後結歸六釋慈恩云三身皆唯持業法即是身等薦福云兼通依主釋法是真理理體為主與恆沙功德為依止身用屬客此是法家之身名同體依主也又云法身持業者法是真理身者依止義攝依止用歸真理體名法身者法即是身持業釋也如言水即波此亦未了如何攝所歸依止用應云法身兩字俱通體用法即是身身即是法方為盡理如言思量即意意即思量等報身者若約自受用説自報即身持業若約他受用論他受用之身依主也二出三身體者一自性法身者於百法中取真如無為為體問何不取前五無為為體答前五無為是假非真實法身體既是真如無為俱取果中無垢真如不取因位有垢真如問因中真如既有垢應不清淨答成唯識云雖有容染而性本淨如玉處泥蓮華在水問真如本性非平等有垢無垢分兩般真如既是平等法如何因果分兩答若約真如離詮論平等實性元無二將就詮約位説因果門中分兩般故唯識云真如是迷悟依在因是迷依不為法身體在果是悟依堪為法身體也二者自受用身以實無漏五薀為體是大圓鏡智一分後得智所現相分故成唯識云大圓鏡智相應心品離諸分別所緣行相微細難知不忘不愚一切境相性相清淨離諸雜染純淨圓德現種依持能現能生身土智影無間無斷窮未來際如大圓鏡現衆色雜釋曰離諸分別者佛地論説離我所執一切所取能取分別所緣行相微細難知者境及行相二俱頗難測不妄者恆現前義由此如來不成忘失法不愚者不迷暗義由此如來名一切智及一切種智性相清淨離諸雜染者有漏永亡故純淨圓德者純者無雜簡因無漏淨者離過簡一切有漏功德圓者滿義簡二乘無學功德現種依持者現行功德之依種子持功德種故能現能生身土智影者若自色心等望第八識別有種生名能生若他身諸趣等無別種子但於識上現影名能現問此鏡智王所二十二法為共變一自受用身各別變耶答心王變此身是實心所變是似若言心所同心王變身是實者即犯衆生界增過若令不變即闕緣同義反例因果有漏本識王所變身心王相分是實五所相分是假實假令雜共成一身三他受用身者以化五薀為體是平等性智後得智相分此相與見同種而生此五薀相分色薀是化有似色之用餘薀是心有似緣慮之用此佛為居無漏淨土所化唯是登地聖衆無天龍八部等他心所中但有遍行別境善十一心所無根隨不定四心所也四者變化身亦以化五薀為體是成所作智相分佛地論云以化五薀為體者即以所化衆生為本質如鏡外樹能化佛身如鏡中樹影影似於質名之為似此五薀中色薀是化有似色之用餘薀是心有似緣慮之用下消疏文言至覺權真者三解一云至覺者三身之總名號不配法身唯取自他二報并大小化身總名至覺不取法身者以無色相故譬如虗空煙雲不染亦如白玉濕而不緇問自他化三身如何總名至覺答梵云佛陀此云覺者由此三身總名至覺問何名權答權者大小化身具相好隨類化身不具相好總名為權也真者自受用他受用身總得名真問自受用身實無漏五薀為體可得名真他受用身功德非實如何亦得名真答對彼化身亦名真也二云至覺同前自他化三身之總號總名至覺也問何名權答他受用大小化身名權也問何名真答法身自受用身名真也法身離妄名真自受用身真實名真三云至覺者報身權者化身真者法身謨云二説一至覺者唯自非他唯自受用身真實故名至覺簡他受用身功德非實向權字中收故云唯自非他二者兼他受用身亦向至覺中收問他受用身何名至覺答以能教化上位大菩薩故能化之主就所化論亦名至覺也權字亦有二説一者他受用身大小化身總名權問他受用身何以名權答是彼平等性智之上權巧智用亦名權也二者唯大小化身名權簡他受用身非是權攝也真之一字唯配法身也將至覺等配三身下消疏文也至者極也窮也邊也覺即佛也權宜也真實也簡要云至極至極即覺至極之覺持業依主二釋問何以通此二釋答前來賀解至覺二字通法身報身所以作此二釋也問至有能至所至何者是能至何者是所至答四智菩提報身為能至法身真理為所至覺有能覺所覺何者是能何者是所答四智菩提是能法身真理為所由此果中本智證盡真理名為至覺問報身是四智可許為至覺法身是真如云何言至覺答報身是覺相覺相名至覺法身是覺性亦得名至覺問報身是於智可許名至覺化身是於悲云何言至覺答報身是覺體覺體名至覺化身是覺用何妨名至覺南問云菩薩二乘及與外道等皆有覺義應名至覺答外道邪覺二乘偏覺菩薩分覺所以菩薩等不得名至覺唯有如來因圓果滿得名至覺至覺有二一至極之覺二至到之覺名為至覺此即生死為此岸煩惱為中流乘六度船至菩提涅槃彼岸如睡夢覺等名至覺問如何外道名邪覺等答外道不契正理名邪覺凡夫不覺察煩惱名不自覺二乘見理不正名偏覺理智二利各得一邊名之為偏故經云眇目矬陋無威德者菩薩名分覺故唯識云稽首唯識性滿分清淨者菩薩雖斷二障證二空理覺未滿故但名分覺所以如來即名滿淨菩薩名分淨故云滿分清淨也上解至覺了言權真者謨云變化名權自受用身後智上有隨生性欲權巧智用名權他受用身大小化身本來無權宜施設名權後義勝真者離妄名真即法身也若真實名真即兼自受用報身今取真實義為勝攝法寬故問此至覺權真如何配屬三佛菩提答至覺二字總目三身權真二字別配三身問報化是有為可得名至覺法身是無為理如何名至覺答法身覺之性故得名至覺智度論云菩提菩提斷皆名為菩提又云説智及智處皆為般若所以法身亦名至覺問報身體是實可得名至覺化身是化相如何名至覺答報身是覺體故得名至覺化身是覺用何妨名至覺故涅槃經云吾今此身即是常身法身所以化身亦名至覺問報身能證理斷惑名至覺化身不證理不斷煩惱如何名至覺答依彼報身方起化身報身是本化身是末攝末歸本化身亦名至覺是三身總目至覺下解權真別配三身問權真二字如何別配三身答化身名權法報二身名真故權真二字別配三身問如何權之一字配於化身答權者權宜隨根化物從後得智現起化身是化五薀故名權也問法報二身如何名真答真者實義法身是真如實理故名為真自報身從無漏四智菩提種子生是實五薀亦名真故法報二身總名真也問他受用身為屬於權為屬於真答是權所攝問如何是權答以他受用身是化五薀為應十地菩薩故名權也若尅體就此疏説權權宜權巧即他報化身應有情根而現身故如應初地菩薩根宜乃現身坐百葉蓮華為二地菩薩坐千葉蓮華説法等為應地前資加二位二乘凡夫所現大小化身如斯所現為應有情故名權也又云至覺二字唯配自受用身親證理權之一字配他化身應物權現故真之一字唯配法身不生滅故問疏主欲解經何要先嘆佛身答欲識所説之法必有能説人必有能説人不過於佛故先嘆也問佛有三身法身最勝之法報身化是劣何不先嘆法豈有在最勝後歎法身耶答三説一云經以意趣求隨文逐便何先何後不可一一難之二云法身與報身為平等所依也能依化身在上故先説所依法身在下故後説三謨云疏主造疏釋經體下經文之意所以先言至覺今此經中化回心聲聞令捨羊鹿上大牛車所以出宅已後先言諸佛智慧甚深無量求於種智疏主得此意故所以言至覺能化聲聞回心向大是化身之功能故能權以此之二種必依法身故最後言真之一字三解之中應存後解菩提了言乘物機而等者明現身也問有何所以而説現身答疏言乘物等乘由駕也憑也今取憑義憑託五乘根性衆生而現於迹二云乘者乘御他化佛為能乘五乘根性衆生為所乘經云餘國有衆生恭敬信樂者我復於彼中為説無上法後勝物者品物人物一從喻為名如世間非情物乃至一物皆具能造四大所造四塵色香味觸除聲也具此八法然後得成故言物也有情言物亦復如是五薀十二處十八界合成故言物也二對乘稱物如來身中有常樂我淨自在真我衆生身中元來沒我不合言我故但稱物根者本來作機字玄宗皇帝名諱改為根機者機巧機要今取機要之義有情身中有此機要經云如來于時觀是衆生諸根利鈍是也機者亦是從喻為名如世之機以足蹴踏文顯即開以擲之左右織絡然後成匹法中論者二深先唱如以足踐踏殷勤三請文顯即開即是騰疑致惑請供佛修因請聞法歡喜請如來為説開示悟入以言教拔左右織絡然後當來成佛曰華光即是匹三十二相八十種好即是綾錦華窠也改為根也亦是從喻為名也根上千華萬葉顏色各各不同良由向下根根大樹即大根小樹即小一切衆生三乘五性各自修行得果大小差別良由種性大小各別也而者助句誕者切韻育也大也即大人降迹亦為生也大人生也尚書四云帝乃誕敷文德言降誕即天子生日也今取大義迹者蹤迹如承雲中行有迹也人所可見見覩謂之迹即他受用釋小化身故名為迹此説自受用身誕他受用大少化身迹此正是此中疏意也又云三身皆乘物根三身皆能誕迹第一法身是佛身乘自受用身三個根本智并相應心品各有二十二法為物根法身依此物根之上現一味清淨相名為誕迹唯果位出纏真如能現此相第二自受用身乘三無數劫度衆生悲願為物根誕自受用迹衆生度盡我即成佛衆生界法爾無盡自受用身窮生死際盡未來時建立佛事故壽量品云我本行菩薩道時所成壽命今猶未盡復倍上數願既不盡佛身終不盡名乘物根而誕迹又云自受用身佛佛相見語言談説亦名乘物根而誕迹也第三他受用身乘十地菩薩物根誕十重他受用身迹也大小化身乘四加行位菩薩二乘凡夫物根而誕大小化身迹也上説三身總乘物根總能誕迹也問他化身等為度衆生可説誕迹之義只如法身體是真如在因不減至果不增無去無來馮何誕迹答若望法身不可言迹以智證圓方為法身故説迹也問自受用身體遍法界自受用法樂佛佛皆齊不外化衆生馮何物根而誕迹答他報身及化悉皆有用有用之處體必在中化報身誕迹之時則是自受用身誕迹又他化身皆是相分無實緣慮用明知説法皆是自受用之身故涅槃云吾今此身即是常身法身約此而論自受用身有誕迹也又準壽量品中解三身壽量云法身壽量住法性報身壽量隨願緣他化身壽量應囑根據此則自受用身馮三大劫中悲願之力為誕於迹由因中發願無邊衆生誓願度由此願力得成佛身衆生度既未盡明知佛身元來常住則是馮因中悲願之力故説自受用身而誕於迹問即悲願之力如何言乘物根緣答對根性方現他報大小化亦得名乘物根只他報大小化身現身之時則是自受用身誕迹問與前解在用中用現體現何殊答前解則定約體用不言乘悲願力此解則兼言乘悲願之力故勝前解由因中悲願之力方現於身所以衆生善根若感如來則現善根若無佛則入滅如月處空有水影現隨水大小月影圓缺不同隨根勝劣佛身有差別所以下疏云澄空壁彩洞晈無涯任水旋光暉華有極水清而月影便現水濁乃月影便沉全破器現不同暗明猶未有別所以經云菩薩清涼月遊於畢竟空衆生心水淨菩提影現中據此有感則應感盡則無經云如薪盡火滅衆生善根如薪如來應之如火善根感盡有類薪無佛入涅槃還同火滅故知三身皆乘物根誕迹此解勝若約正説法華經二乘凡夫物根誕丈六化身迹也即是真佛之身衆生不見見現令見權於真身之上現大小化身之迹蹤故名乘物機而誕迹也言靈樞擅妙等者問既會證真理復乃馮物現身為當説法為當不説法答疏云靈樞擅妙等況能説法辨也靈者即是神也周易云妙萬物而為言陰陽不測謂之神妙萬物而為言名神妙者勝妙過上之義名妙萬物喻佛四辨七辨利他門中首出萬德萬德利他更不過四辨七辨陰陽不測謂之神況佛説法凡夫二乘菩薩不測知也即是其智慧門難解難入一切聲聞辟支佛所不能知新發意菩薩不知不退菩薩不知喻佛四辨七辨故名靈也樞者樞要開要門下軸也俗書偷人舌作樞也樞機一發榮辱之本不可不慎樞者門樞機謂弩牙有杪喻佛舌根非也今疏中意喻佛四辨七辨為正也有二義一開閇之主二明暗之主十二部經五乘教法如門扉四辨七辨是樞也上至城門下至獨扉門子開閇之時事須得樞華嚴法華是大門扉二乘教法小扉大乘法小乘法説與不説皆由四辨七辨四十年前於一乘道分別説三乘即是開門也法華會上破却二乘即是閇門四十年前久默斯要不務速説即是閇門法華會上今是其時決定説大乘即是開門門戶開之與閇皆由其樞法教説與不説皆由四辨二云門者明暗之主門若開著則明閇著則暗明之與暗皆由樞也法中喻如來説法喻明不説法入涅槃喻暗説與不説皆由如來四辨七辨問若如此説但喚作樞即得何更安靈字耶答十地菩薩二乘之人辨才不得名靈二乘小分得菩薩之人初地分得九地任運佛位圓滿因位菩薩是有漏辨才依聲不得名靈如來聲是無漏能依辨才亦名靈也菩薩雖説以彼舌根是本識相分所變所變同能皆是有漏不名靈樞菩薩若與聲聞人説只四諦與緣覺人説只十二因緣如來則不如是本為聲聞説四諦法三乘各各稟解不同經云為求聲聞者説應四諦法等又云於一語言中演説無邊契經海等是故如來辨才稱為靈樞擅有二義一專義二獨義獨義為勝唯佛一人獨得此辨名擅也妙者巧妙勝妙簡粗得名一簡外道説法不得妙二簡二乘説法亦不得妙唯有如來獨名擅妙經云佛以一音演説法等如來説法無非時失無非器失無非處失若合見靈山而得道者即現靈山等故云靈樞擅妙也言應群品以揚筌者問既有靈樞擅妙因何説法答疏言應群品等應字通平去二音若樂法之心如來説則去聲呼經云為求聲聞者説應四諦法等若無請與説如來知衆生令聞此法佛觀衆生根機器堪説何法乃先為説則平聲應音於興反當也經云應以聲聞身得度者即現聲聞身而為説法又云父知諸子先心各有所好種種珍玩奇異之物情必樂著而告之言汝等所可玩好希有難得汝若不取後必憂悔父知諸子志意下劣自知豪貴為子所難今此取去音也言群品者對上物根故云群品三乘五性衆生十地菩薩是也群者衆義品者品類品類衆多故言群品揚者宣揚揚者説也筌者教法則是如來應諸根性宣揚教法也疏中都有三詮字第一筌字竹下作全喚如來教法作筌者從喻為名此是取魚之器江東多有截流而施一面有孔織竹為戶猶如叉手魚入則順魚出則違莊周云筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄蹄者尋腳迹也則知言所以表象得象者忘言今有二義一者將教喻筌將理喻魚即因筌而得魚因教而悟理二者教喻於筌衆生喻魚無量義經云張大教網至生死河漉人天魚置涅槃岸欲得魚兔無過結網織筌欲得度衆生無過説於教法二者金邊作全稱權衡也權是稱鎚衡是稱幹銓是稱上星故言筌者稱量審定義四分為一兩十六兩為一斤知輕知重皆由稱權衡改為銓也亦與銓曹字同也兵部史部東銓西銓此銓揀此銓揀擇身言書判堪與何官故名銓也如來教法銓量所銓道理如稱權衡故名銓也誠將能銓教為稱稱量所詮道理著輕重恰亭又將五戒十善教法為稱坐人天果向稱頭著稱看恰停試將三聚淨戒法為稱權衡稱量佛果菩提看輕重恰停又教能楷定正邪詮顯善惡義亦同詮曾之詮也三者銓言邊作全名為銓切云平也如來説法稱物而談即是平義表法中道一則一等言二乘是權乃至謗法入惡道等決定果報故詮平也此是教法為詮此解為勝也教法當體名詮也言振融山等者振者動也舉今此動義為正即動轉移動名振也自受用身體周沙界無有分限向無限身上起有分限身説法教化衆生可見底丈六化身乃是自受用身上移轉動轉來故名為振振者動也融者明也即是明山明山即是金山問何處經教喚佛身作金山答經下文云又見諸如來自然成佛道身色如金山端嚴甚微妙如淨琉璃中內現真金山既爾經教有文故言融山問緣自受用身從體起用攝用就體體用不相離為復只喚自受用身作融山秀出大千為復自受用身從體起用所起大小化身只此大小化身便是振融山而秀大千耶答若一性而論吾今此身即是常法身一身即三身三身即一身若法歸分別不相雜亂靈山所見唯丈六化身若準又準器教菩薩而即報身感者根器不同應現故通報化若依此文振融山而秀大千通報通化若疏主深意住標化處説化身佛即唯取化身為勝也秀者出也生也起化身出於三千界名秀出大千即是成所作智擊大圓鏡智起化身出大千界名振融山問既是小化身只合出一四洲如何出大千耶答二説一約身解云出大千界佛是大化身四加行位菩薩所見丈六釋迦是凡夫二乘所見只此丈六釋迦是大化身上現起來攝用就體舉勝身攝劣身言出大千二云約界解小化身只王一四洲只合言出四洲以彼四洲是大千界中所管不離大千界舉其總數言出大千如言長安城中住不是總占得長安城所住宅子屬長安城管舉其總數又云若從凡夫化入聲聞即合是小化不合言出大千今既聲聞回心向大則合是大化身緣令聲聞所欣所以疏言出大千故經云如大雲起遍覆三千大千世界大雲則是佛身所以言出大千也問若言大化身是聲聞所欣之境者如何窮子遙見其父疾走而去故知大化不是聲聞所欣答當初見走由來化以二乘今既得聲聞果却化令回心向大何妨言大化身是聲聞所欣之前後兩存妙矣言騰委海而津等者騰涌騰瀉之義騰瀉正謨云委源所成之海委是能成海是所成納委細之流積小水以成其大百川奔注故得成海喻佛智海萬德所歸果位智強總名智海此委之海依主釋禮記篇中意委即是海持業也三王之祭川也或源或海也皆先河而後海君子務其本也問何名為源答泉所流處水本曰源河名委泉所流聚之處曰委三王欲擬祭海事須先祭於河欲擬祭河事須先祭於源也問何以如此答源是河之本河是海之因黃河出於昆崙山江出堀山淮出於王屋山初之處名為水本水本曰源是故積衆流而成委衆流是能成委是所成委即是海故名委海持業也兩釋中持業為正委者委輸輸者輸納百川輸納之處名曰委法中論之自受用身根本智含薀萬德萬德委積之處名為委海最初為凡夫時發得菩提心如河出自昆崘後供養却二十六殑伽沙佛或以身為床座或一句投火半偈捨身六年苦行七日翹足或剝皮為紙刾血為墨折骨為筆書寫大乘乃至舉一手或復小低頭穿針之善尚自不遺總喻積集衆流而成委海來三大阿僧祇劫所修福智二種深廣如海欲擬將此智海功德教化衆生所以從無相法界海中騰至根本智從根本智騰至後得智從從後得智騰至他受用身從他受用身騰至大化身從大化身騰至小化身從小化身騰至二乘凡夫耳中直從無相海中騰瀉水將來灌注令枯稿衆生皆令離苦得安隱樂故言騰委海而者助句也津八萬者津潤八萬四千病行衆生如來後得智中海內演出十二分教利益五乘衆生名津八萬病行也問何不言八萬四千答舉其全數如言詩三百篇俱舍云數有八十千之類也上解津者潤也又津者際也度也如論語中微子云長沮桀溺𫀽而耕注二人隱士也夫子至齊齊人歸女樂季桓子受之三日不朝孔子行次逢楚狂接輿歌而過鳳兮鳳兮何德之衰孔子欲與云言趍而避之不得與之言後逢長沮使子路問津注津濟水之處故渡也長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘歟曰是也曰知津矣馬曰言數周流自知津矣問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒歟對曰然滔滔者天下皆是也而誰以易之孔曰滔滔者周流之貌當今天下治亂同空捨此適被曰誰己易之且而與其徒避人之士豈若避世之士哉出有避人之法有避世之法長沮桀溺謂孔子為士從避人之法也所以言津者隆也八萬即是八萬四千法門緣衆生有八萬四千病行所以如來説此際渡也八萬四千病行者一百二十八煩惱十煩惱六通俱生十分別起取邪師邪教引起十煩惱互相引起即成一百過去未來現在成三百過去漸長成一千未來成一千現在不長但一百三世合説成二千一百對五停心觀各二千一百即成一萬五百已起一萬五百未起一萬五百成二萬一千對多貪嗔多癡等分四種人説即成八萬四千煩惱門今如將八萬四千法門對治八萬四千塵勞煩惱故言而津八萬也言靉慈雲而廣庇等者辨此宗也亦名別序三身七辨通貫諸經五喻四法局此經內問平等無上何故不欲答平等無上依理教行果向上功能分出離却四法無平等無上但歎四法即攝得平等無上故不別歎問經有七喻何故唯歎五喻不欲窮子繫珠答二説一云窮子但是四大聲聞領解火宅喻詞更無別義故不歎窮子其繫珠喻但是五百弟子領解化城喻詞屬化城喻故不別歎繫珠也以不是佛説故問若不是佛説應非是經答雖然不是佛説佛所印可總名為經如赦書敕所印可總名敕語問如何世尊於藥草品初歎言善哉善哉迦葉善説如來真實功德誠如所言佛既印述即同佛言如何疏主而不歎窮子也答二云五喻是佛自説故主歎之餘二喻雖佛印述但是聲聞親談故疏主不歎但嘆五喻也問此窮子喻有佛印可故名為經繫珠喻無佛印可應非是經答佛印有二一則言印名印二默印名印如下大通佛默然許之故名印也問七喻之中依經文火宅居首次窮子藥草何故疏主先説藥草耶答四解一云藥草喻中説其五性破乘同之病疏主謂順五性所以先説藥草顯三乘五性差別二云先説藥草者疏主有深意前來雖明菩提現身智辨利物未委現身之相如何説法復被何根性所以疏主先藥草藥草喻中説佛身現猶如於雲雲則遍於長空佛則遍於三千世界雲起為下於雨佛出則説法利生雨則本來是一草木稟潤不同教法元本無差五乘性殊解亦有異意明菩提現身之後便通論如來一世時中現身説法利生之相狀所以先歎藥章三云疏主此處懸歎五喻何必例便依經次第餘四但歎即得何必例使一云依次歎四云疏主將藥草向牛車喻向前安置著順如來説權實次第如來初成道後唯説華嚴經菩薩悟解聲聞凡夫如聾如醉如來若強將大乘為他説即破法不信故所以於粗野菀中權説於一乘道分別三乘便轉四諦法輪菩薩悟實理智聲聞人悟權理權智不知是權執為究竟所以如來靈山會上説法華經破權説實各賜諸子等一大車不説羊鹿即是執所以藥草喻亦是如來鹿野菀中設權牛車化城是四十年後法華會上破權順彼如來設權破權次第所以先藥草喻品順先設權也問疏主作此安置應可疏主巧於如來如來當日何故不説藥草後説諸喻耶答如來説經其意又別且藥草喻品中解來意處疏主會前方便品初阿含甚深阿含甚深即昔三乘教法法華經不越教理行果理名證甚深即是法華經權實道理也牛車是行寶所是果若行若果皆是所證理收即是會理也藥草喻品即會教也三乘權教唯藥草喻會教故居先説也是佛意也問準天親菩薩造論釋經方便品下有二十七品經文明其三法所謂七喻三平等十無上此三是法華經大綱疏主如何空歎喻文不歎三平等十無上答三説一云喻文居初所以先歎二種在喻後所以不言二云經品題中有喻名者如藥草化城等所以先歎平等無上不為品題所以不歎三云平等無上之名是論家安立喻文是經中自有疏主若解造論文即須三法總歎今既造疏解經所以先歎經文自有者不歎論家安立之者故不歎也言靉慈雲而廣等者本喻有四段文今歎中唯歎前三段經也靉慈雲而廣庇歎法王出世喻驟法雨以遐清歎説教普滋喻滋兩木之分華潤三草之殊茂兩句疏嘆稟潤各異喻也下喻有總有別初總喻經云迦葉譬如三千大千世界山川溪谷土地所生卉木藂林及諸藥草不歎總喻也唯歎別喻別喻有四第一法王出世喻經云密雲彌布即同此中靉慈雲而廣庇第二説教普滋喻經云遍覆三千大千世界即同此中驟法雨以遐清第三稟潤各異喻有二初一雨所滋二稟潤各異此中唯嘆一雨所滋一雨所滋中初則橫滋二乃竪長且一橫滋者經云小根小莖小枝小葉中根中莖中枝中葉大根大莖大枝葉即同此中潤三草之殊茂二竪長者經云諸樹大小隨上中下各有所受即同此中滋兩木之分華闕第四不自覺知喻且一雨所滋中本處經文先歎橫滋後嘆竪長此先嘆竪長後歎橫滋滋兩木之分華是竪長潤三草之殊茂是橫滋橫滋通三乘五乘竪長唯大木小木也問經文既有四段此中何唯歎前三無第四不自覺知耶答二解一云造文云人要廣要略也要著即依文不要著亦無過失二云長行法述喻述無不自覺知經文經文幽隱也問不自覺知既法述喻述無文疏主依何道理開出答疏主本處分疏云此解似疏尋合當悉緣向下合文云如彼卉木藂林諸藥草等而不自知上中下性以此一段經文分明疏主返照向前法述喻述合有此意此是疏主以義開出也靉慈雲而廣庇者此明能説人於代反雲者玉篇云山川之氣也龍吟即雲起靉靆謂翳薈也雲興盛貌喻佛身也如經云靉靆垂布如可承攬喻佛初作嬰童子如雲未盛三十四心成等正覺如雲興也二靉者如含雨未絶之狀如慈心龍欲下雨時先雲七日待諸衆生作諸事業終畢方降甘露即同如來下降閻浮八年作嬰孩七年作童子四年學五明十年受五欲樂二十九出家六年行苦行三十五成道成道後樹下思惟三七日不説法待衆生根熟方可説法所以靉者含雨未絶之狀也又有一般雲雨總未下早收雲了如多寶佛亦成道了不説法却入涅槃問何喚佛身作雲答從龍起雲化身必從自受用身起自受用如龍龍則必能吐雲有雲必降甘雨有自受用身必起他化他化必説妙法故喚佛身作雲也經言譬如大雲普覆一切又唯識云大法智雲含衆德水問既喚佛身作雲何故言慧雲答佛團智慧成佛身故故喚佛作智慧雲問既喚智慧作雲何故此間不言智慧而慈雲答如先有龍然後吐雲由先有慈心於先然後起智慧慈心為能起智慧為所起能所合説故言慈雲慈意妙大雲澍甘露法雨不同外道是無雨之雲雖説法化衆生乃是無利勤苦終不解脫所説之法不能潤菩提之芽故外道與無雨之雲不別廣者寬廣無邊之義庇者庇蔭覆蔭之義經云密雲彌布遍覆三千世界又云我今盧舍那方坐蓮華臺周匝千華上復現千釋迦一華百億國一國一釋迦各坐菩提樹一時成佛道意言密雲滿空行行皆能陰覆萬億佛身佛身皆慈悲利物也故云廣庇也能説人了言驟法雨以遐等者問雲既廣庇未委雲中下雨不下雨答疏言驟法雨以遐清驟者速疾之義如經云四方俱下一時等澍也問小乘羅漢尚説法不遲不速説況佛三十二相中有遲不速説法之相又經云久默斯要不務速説如何疏中言驟法雨答不是忩忩説名驟應根説法不失於時赴救旋還義同相驟如雞孚卵呼啄同時正是衆生根熟時便是如來説法時所以四十年前不説緣説時未至故今正是其時所以靈山會上説法華經時既不失便是驟也法者五乘教法名雨雨者是喻合説故名法雨問何以喚化教法名法雨答能生長萬物雨若下時萬草種子芽生吐葉開華如來亦説法時一切衆生菩提芽長故喚佛教法作雨雨有三個功能一者雨有清淨功能經云具足清白又經云佛音甚希有能除衆生惱洗除衆生身中煩惱塵垢是清淨義也二者雨有清涼功能經云佛教如甘露除熱得清涼又云日光掩蔽地上清涼三者雨有生長功能經云一切諸樹上中下等稱其大小各得生長又云一切衆生聞我法者隨力所受住於諸地由具三義故佛教法如雨也遐者遠也四方俱下流注無量率土充洽是遐義遠義此亦有三義一云約器解雲既遍滿三千大千世界雨從雲得所以名遐清二云約所被根佛以一音演説法衆生隨類各得解以一味雨潤於人華各得成實故名遐清三云約世論如來在日説法滅後向二千年直至于今衆生聞者罪滅福生又經云從久遠劫來讚示涅槃法生死苦永盡從久遠劫來是遐義也讚示涅槃法雨也生死苦永盡清也故遐清也上歎説教普滋喻了言兩木之等者歎稟潤各異喻也問法雨既驟今被何根性答疏主滋兩木之分華等滋者潤益之義然疏中意兩木配滋三草配潤經云一切諸樹上中下等稱其大小各得生長又云放無數光度諸衆生是名大樹而得增長即是滋長也唯目兩木向上也經云百苗稼甘庶蒲桃雨之所潤潤即唯目三草也又經云如其體相性分大小所潤是一而各滋茂此滋與茂便一處説兩木者大木小木況大小菩薩華者美謂之華華好菩薩所修一乘之行獨勝故名之曰華大木小木大小菩薩各自差別故名華華字若作花音呼即花者因義因能得果喚菩薩萬行作花地上地前漏與無漏各自差別總能感果故名分花也潤三草之殊茂者對上分華故言殊茂小草中草大草故名三草三草況五乘衆生經云小根小莖小枝小葉中根中莖中枝中葉大根大莖大枝大葉殊者異也榮茂三草開華布葉各各不同法中論三乘五性衆生得道尅果各異故名殊茂經云一雨所潤稱其大小各得生長根莖枝葉華果光色一雨所及皆得鮮澤上説分華唯大小菩薩殊茂通貫五乘也言然以幼商倦於等者歎化城喻然以者謨云雖明蓋聞之種類不辨然以之所由意道解蓋聞處詳夫竊以元來不是蓋聞義諸抄總引將來也此間解然以兩字要解之處諸抄盡無解處今此都有三解第一是發語之由問既然是發之由即合向五喻頭安之何故置在中心故此不當第二云文家屬對對下由是上安然以若爾然以兩字與是文勢懸遠義亦不相當第三云通難詞亦是答難詞然則前喻文以者即陳後所以因説著藥草喻品生得衆人疑心藥草喻品是難詞然以兩字是答詞藥草品經文則屬法華經正宗藥草喻義則不屬法華經正宗以法華權實為宗藥草喻破乘同病不説權實法華經破二歸一藥草喻説三乘五性如來本意緣小菩薩乍聞著十方佛土中唯有一乘法無二亦三便執唯有一乘無別二乘此名乘同病如來破之説藥草喻品説二乘五性衆生各自差別問前陳藥草所滋藥草況根性有三説能滋之雨以喻教唯有一故經云一雨所潤而諸草木各有差別一雨者即昔三十年前所説三乘之教經云雖説種種道其實為一乘既今一雨即昔三乘何故四十年前不會於教言是一雨答疏言然以等意言然今一雨即昔三乘四十年前不言一雨者有所以有何所以緣幼商倦於綿險等恰似幻商懼於路遠初不言此路而往寶方且説若入城即便快得安樂汝等勿怖莫怖莫得退還良為二乘倦修大行如來昔不言唯有一乘且説有三乘解脫不同未為會言唯一若衆生但聞一佛乘者則不欲見佛不欲聞法今時根熟為説一乘所以竟照進於等意説二乘之人不能直發大心故説有三乘解脫等二問云前藥草喻品説三草以喻五性不同何故今此會中言唯有一乘無餘乘也答疏云然以昔言三乘今言一乘者良有所以緣幼商倦於綿險始修等順彼且言有三乘今時大性以熟故言唯一初得將能滋後約所滋故成二解此中二意初初難不依不定性三云問下言十方世界中唯有一乘法又云究竟令得一切種智以彼不定性人無處令入二乘滅度下經云我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經既也究竟唯有一乘法何故四十年前不作是説今修行大行令他鶖子日夜鳴呼今日乃言唯一乘法耶答疏言然以以鈍根樂小法貪著於生死於諸無量佛不行深妙道衆苦所惱亂為是説涅槃似幼商倦於路遠且説入於化城今時説一乘者有佛子心淨柔軟亦利根方竟照進於㹛駕等四云問準勝鬘經説四乘是實一乘是權今此經中二乘是權一乘是實説此兩本經教實有三乘五乘衆生既若實有三乘五乘則合法華經羊鹿實登化城實入如何更説先權後實耶量云二乘是有法定實有故宗因云三乘中隨一攝故如大乘如大乘三乘隨一攝大乘是實有二乘三乘隨一攝同彼大乘是實有量云大乘是有法定實是權不實有故宗因云三乘之中隨一攝故如二二乘三乘隨一攝二乘是不實大乘三乘同一攝同彼二乘是不實此違理二者違教若不許二乘是實者即違勝鬘經四乘定實違彼經文如何通會答疏云然以幼商等據其道理然則如此然則然前難家之詞也以則生下答家之所以也然則依定性人以則約不定性也然依定性人説實有三乘五乘也以依此經中為不定性人事須先説權後説實也先説權者鹿野苑中順化小乘根性先熟所以始修誘於化城轉四諦法輪後説實者則是法華會上順他大乘根性後熟所以竟昭進於㹛駕交上牛車然自目於難詞以字出答家之所以兩字合説故然以又然以者世尊一代時教三乘九部法總是一乘故四十年前所説但名阿含般若不名法華法華會上説經但名法華不名阿含般若耶答若據其道理然則如此以緣四十年前大乘根性不熟於一乘道分別説三乘説熟與説法華經但名法華不名阿含般若即是竟照音於㹛駕也意言勝鬘經所對四乘定性法華經所為者是不定性人後必作佛故言二乘權非是此經拔無定性故不相違故此經一乘是密意説一乘權實道理亦同勝鬘四乘外權一乘者即指此經且對不定性唯言一乘不説有餘乘是隨根權時説故言權非體無名權今言實者説不定性後必作佛故言實今言然以幼商倦於綿險始修誘於化城即説二乘權大乘根熟即一乘實便即晉於㹛駕也二經亦不相違解然以了言幼商倦於綿等者化城喻也有四初將離險喻中途方退喻為設化城喻衆倦皆息喻此疏中唯歎前三喻無第四衆倦皆息喻且初將離險有四欲過惡道將往寶方商主諳途方行引導經云譬如五百由旬險難惡道曠絶無人怖畏之處若有多衆欲過此道至珍寶處譬如險惡道逈絶多毒獸又復無水草人所怖畏處即同疏中幼商倦於綿險又經云導師多諸方便而作是念此等可愍云何捨大珍寶而欲退還作是念已以方便力於險道中過三百由旬化作一城即同此間始修誘於化城上引經配疏下解經文也譬如五百由旬者變易分段生死惑業苦三名為五百由旬生死苦逼名為險難惡道生死之中本無聖智名曠絶無人若有多衆者二萬佛時聞法華經衆生也欲過此道至珍寶處者佛果位中大般涅槃大功德法而為依止名珍寶處白道師言前路猶遠大乘行修行取果難況前路由遠不能復進不肯修行今欲退還即却退大乘至第六住前遇乞眼緣退却大乘導師多諸方便者導師者佛也多諸方便者身語意方便也見他不肯修行無計可為不免別呈方便而於中道向三百旬外二百由旬裏兩楹中間名為中道即是為止息故化作一城是即為設化城喻也上略解經文下消疏幼商者謨云小乘之人名為幼商二乘種性對大乘名幼幼者小也又行賣曰商坐賣曰賈商人於諸處補貨向鄽市中賣求宜利三乘聖衆於佛邊聞法於人天身上規求二乘法寶修行不住義同行賣名曰商得羅漢果名利顯聲聞教化唯行自利不能利他劣於菩薩名幼商也若唯喻中意幼商却是大乘人經云獎導衆人欲過此道至珍寶處珍寶處正是大乘佛果菩提涅槃此未起倦心已前是大乘人心談他本心欲擬過五百由旬取寶去法中論本擬取佛果菩提無心取有餘涅槃誰知中路怯行廣時長所以退也談彼本心是大乘也退名幼也退去已後方入二乘問若是大乘人何名幼商答大乘心初發未廣修行名幼也規求大乘法寶名商也倦者疲也倦用也綿者遠也長也五百由旬前路長遠也險者危險險阻惡也則是商人見於路遠又復險阻不能前進故擬退還也譬如險道逈絶多毒獸又復無水草是險義始者初也問化城對前發大乘心名後如何言初始答化城對向後發大乘心亦名始也以彼化城對他法華會上大乘心化城便是初誘也又依不定性人事須初説小乘後説大乘故化城亦名初也又鹿野苑對法華會亦名始修誘也修者爾雅云從也順從之義順從他小性設化城名修也誘者導也引也既見阻於路遠恐却退還所以且初順根誘引為設化城令其心息也意言則是如來恐聲聞退入生死且初順根宜權設有餘涅槃令息分段生死之苦也又論語云夫子修修然此修學是次第義也夫子依次敘教人禮樂名修修也俗書作次敘義解先説權後説實亦是次敘言稚子玩於羬軒者歎火宅皆是破權顯實破羊鹿權智歸牛車實智破化城權理歸寶所實理既一種是破權顯實如何疏主先歎化城後歎火宅耶答緣二乘執所得有餘涅槃為極先説化城破彼執極之心以二乘人不執生空智為究竟所以不先歎火宅喻故先歎化城也問如二乘之我生已盡梵行已立等即是執生空智為實如何不先歎火宅答緣化城實能息苦故即先歎以羊鹿無體又不能實息苦所以後歎火宅喻也稚子玩於羬軒者羊車也竟照晉於㹛駕者牛車也稚子者謨云大乘人大心未久名為稚也又云稚者即是小乘人對大乘名稚也問何名為子答言教所重故名為子也玩習也玩好也著也經云父知諸子先心各有所好種種珍玩奇異之物情必樂著遂於宅內權説有於二車順於子心故是玩好如來知二乘人大性未就故且順根為説二乘令取小果法既契根故名玩著羬者五咸反爾雅云羊高六尺曰羬切韻山羊曰羬説文云字從鹿邊作咸也又云羬者羊之總名雖有多解疏主取山羊為喻緣諸羊多居間處唯山羊居山樂靜似聲聞故取為喻也又山羊少分似鹿似鹿喻緣覺樂靜喻聲聞是疏主深意字書云從鹿邊作咸況緣覺羊邊作咸為勝也軒者車上作舍似軒廊樣故四羬軒羬軒即羊車也言竟照等者竟謂究竟昭者明也四十年前不究竟密説不分明説名暗晉晉者進也今日靈山會上分明説法華令進取一乘故名照晉也經云今為汝等説最實事者又云是時諸子各乘大車得未曾有非本所望意云稚子雖復玩於羊鹿究竟門中昭進於㹛駕故説一乘無餘二乘也長者初順子心權與羬軒之玩弄若論長者之本意究竟令進趣牛車如來初順二乘根宜密意且説化城羊鹿若論究竟昭進即令取寶所牛車初順根宜説化城羊鹿是佛密意故疏無昭進之言今回心向大知化城不實悟羊鹿非真遣上牛車令往寶所是究竟顯了之説故疏有昭晉之言謨云若論密誘明進三周皆有四十年前為説小乘九部之法乃是權説為入大乘之資糧名為密誘今時靈山會上為説法華是真實言即名明進經云我此九部法隨順衆生説入大乘為本以故説是經即密誘十方佛土中唯有一乘法即名明進第二周中長者知三子性各各所受不同故於宅內總唱三車名為密誘及至門外則言羊鹿無體唯令上於牛車即名明進經云父知諸子先心各有所好至如此種種羊車鹿車今在門外即密誘也爾時長者各賜諸子等一大車即明晉也第三周中導師知商人倦於路遠中路權設化城即是密誘商人息定乃滅却化城令往寶所即名明進經云我見汝疲極中路欲退還故以方便力權化作此城即密誘汝今勤精進共至寶所此昭晉也緣疏中㹛宗極多諸解今再論㹛也山海經云東海有流波山山中有獸名㹛大如牛蒼色獨足唯有一角其聲如雷黃帝伐尤得㹛以筋作絃發矢五百里以皮作鼓擊出聲聞五百里以威天下出入水中皆有風雨也山海經云岻山多㹛只有一足肉重千斤日行千里能興雲致雨疏主應見此文將替牛也意言一足者將喻一乘肉重千斤者喻一乘中塵沙萬德即經云肥胝多力也此牛力大能運載置遠喻此一乘能令衆生從生死岸至涅槃岸能興雲致雨者況慈雲注其法雨也日行千里者況本後二智一剎那間遍緣法界了達有情心行有多功能故取此也若不爾者牛之別名其類甚多何偏取㹛以替牛也賀云此解有二妨一者牛之與車無別妨二者與疏相違妨且牛車無別妨者經中既言其車高廣衆寶莊挍斯謂一乘也駕以白牛行步平正其疾如風者斯即大乘也今將牛足以喻一乘故知牛之與車無別二者與疏相違妨者經説牛車疏主以喻於法空根本後得二智今以牛一足便喻一乘豈不與疏相違也自申解云疏言㹛者但是都釋白牛不取一者矣對於羬標於㹛也文章相對詞云美斯釋牛車有殊不違疏也言由是摧十軍等者此是解珠喻也問疏主忽然言由是二字有何所以答此生起之詞此亦不然喻以説三何要生起又云對前然以故言由是此解不然若言囑對者以隔數句囑對之義亦不成謨云由前捨權就實故所以如來解珠授藥由者因是以由前聲聞捨權就實是以如來解珠授藥聲聞昔執化城為實羊鹿是真未捨小心而歸於大如來則不解珠授藥今既捨化城而歸寶所棄羊鹿而上牛車由除昔日執小之心歸趣一乘以為究竟是以輪王解珠醫師授藥又準經意前五喻即向正宗中説正破執小之心後二喻向流通分明乃表聲聞捨權就實是故如來説法華經分付若不爾何不於正宗分中明此二喻既此兩喻向流通分別明乃知由是聲聞捨權就實之後是以世尊解珠授藥疏主得此經意故安由是也言摧十軍之聖后者摧者壞義十軍者有云十煩惱為十魔非也今依雜寶藏經解十魔為正欲為初軍憂愁為第二飢渴為第三睡眠為第四愛為第五怖畏為第六疑為第七毒為第八憂為第九名利為第十即合飢渴今即開飢渴為正欲通三性九名利十慢憂愁通二性頌曰欲憂愁飢渴愛睡眠怖畏疑毒及名利自高輕慢彼汝等軍如是一切無能破我智箭定刀摧壞瓶枚水如下説后者君也佛是聖君故名聖后爾雅云皇王后譬君也此間皇后之后所以天子亦為皇復稱為王亦號為后三般皆是天子異名故如來為聖后也因中自破十魔了今此是破十魔底聖后也此中只要取聖后而解珠不要摧十軍只要醫王不要八諦因便引來言解髻上等者解者説也如來四辨七辨説法華經名解髻者頭髻明珠是輪王保愛之物藏在頭髻之中法華經教在如來大圓鏡智同時無垢識中所以如明珠於髻上明珠於髻上輪王長自守護不妄與人法華經教在如來心中如來長自守護不妄宣説經云此法華經是諸佛祕要之藏不可分布妄授與人諸佛世尊之所守護輪王見於兵衆昔日功勳狹小則賜與餘物今見功勳大乃賜明珠如見聲聞未回心時乃説餘經今見回心向大當必能破變易四魔故為説法華經也若得輪王之珠威德與輪王不異若聞妙法蓮華當必能得菩提經云若有聞法者無一不成佛又云若有聞是法皆已成佛道問妙法是如來所説本質教是無漏如何將世間明珠以喻妙法答明珠是世間有漏之法不合況本質無漏妙法珠上有於三義所以將喻斯經一者光明義表於此經能破癡暗經云亦復如是能破一切不善之暗二者圓滿義表此經能詮之教詮理周圓故問妙法華經能詮所詮圓滿即將明珠為喻餘大乘經能詮所詮亦圓滿故何不將明珠為喻答餘大乘經無二乘回心亦無授記之事義理未圓故不以明珠為喻也三者可重義明珠在於輪王頂上表此法華經諸佛寶重經云此經為尊衆經中上我常守護不妄開示今正是時為汝等説又云已説今説當説而於其中此法華經最為難信難解緣明珠具其三義故喻此經也珠喻了言建八諦之醫王等者建者立也起也施設也法本無言如來於後得智中以方便建立經云諸法寂滅相不可以言宣以方便力故為五比丘説是名轉法輪八諦者有作四聖諦無作四聖諦名八也二乘人修有作四聖諦斷煩惱障菩薩人修無作四聖諦斷所知障也二乘之人唯斷煩惱障未斷所知障望後更有一重可修可作名有作也問若不定性人斷所知障之望可名有作定性聲聞緣覺無斷所知障之望何名有作答自是定性聲聞無心回向修行無作不得豈得道無無作四聖諦耶如一個僧只聽百法便休去豈得法華經唯識亦無耶此依三乘立八諦也亦有依五性立八諦者瓶盆車乘唯俗非真第八一真法界唯真非俗中間六個亦真亦俗兩解總得就中依三乘解八為善也醫王者醫中自在故號醫王空識病不識藥亦不名醫王空識藥不識病亦不名醫王聲聞説法雖解説法不識根如識藥不識病人亦有識根不解説法如識病不識藥人善窮四病之源沙間八術之要故名醫王如來説法觀根受道故如醫王也經云譬如良醫智慧聰遠明練方藥等又云依諸經方求好藥草言授掌中之妙藥者有説掌中是男女人喚男女作掌中珠意道醫王授與狂子藥交喫名授掌中之妙藥也此解不然掌中對髻上文家屬對六是向手掌之中著藥與兒喫也即經言與子令服也妙藥者諸家抄記盡喚法華經作妙藥若將向下疏照此間即合是小乘法為妙藥也本文之中三生四生排到妙藥是二乘教即是經云色香美味皆悉具足㨶篩和合與子令服此二乘教也若不如此者由是兩字應成無用疏主制作多取向後却結前義如前來成上身智也此間由是之字生前起後也前來幼商倦於綿險始修誘於化城下隔句重成云建八諦之醫王授掌中之妙藥前云稚子玩於羬軒竟昭晉於㹛駕下重成云摧十軍之聖后解髻上之明珠也所以掌中藥成前來化城喻將髻上明珠成前牛車喻也謨云明珠與藥俱是法華則重言也今取藥是小乘珠是大乘珠與藥重成前化城升牛車㹛駕也若不爾者由是之言應成無用上五喻了下四明法言藻㧡衆等者歎教也藻者切云文彩也水草有文曰藻詩云魚在藻王在鎬藻況文章況此經文詞句美麗也論語云山節藻稅亦此義也有云且如人天交接兩得相見僧大課睿公云文香風吹萎華更雨新好者詞揚笑詩人之筆笈多之踐迹竺護之推輪無以加也掞者書炎反如剔火令更盛之貌意言文章炳煥如火熾光焰上照亦如夜設庭燎文選蜀都賦云王褒暐曄而秀發揚鳩含章而挺生幽思絢道德樆藻掞天此法華經能詮詞句對於諸文字華麗名藻衆詮者即是多也筌者能詮也即是四十年前所説餘經也表者上也出過之義意道法華經文藻能出衆經之上名表也經云藥王今告汝我所説諸經而於此經中法華衆第一又此深妙典能光掞衆經故言藻掞衆詮之表也問如何能光掞衆經答佛自成道來處處毀責聲聞此則化利門中道理未是了義今者説彼聲聞當得作佛此於化利門中義理圓是則是餘經不了義教總為不了義所以道此法華經能光掞餘衆經問法華經教對外道小乘等教可言衆筌之表居對四十年前所説大乘何得亦名衆筌之表答南曰雖四十年前所説大乘但為諸菩薩不為聲聞説授説方廣自説不説聲聞當得作佛但得名大法輪今日説此法華經名為無上最大法輪今既言最大信和能越四十年諸餘空教大乘經之佛昔於波羅奈初四諦法輪今乃復轉無上最大法輪故云藻掞衆筌之表也教了言邃百宗等者歎理也邃深也遠即甚深之義軼者出義逸音過義也書云車相過也果個反兩乘車並頭行一乘牛牡忽然向前去名軼軼者出過義果波反又云況如衆車彼權忽有一轍車改而出越於諸車名為軼也百宗者二説一云百家諸子書名曰百宗二云九十六種外道佛法四宗破相立性立相四宗也共成百宗後義勝此經所詮道理深邃出居百宗道理之外出居九十六種外道教法佛法四宗之外名邃軼百宗之外經云此法華經藏深固幽遠無人能到理過一切名邃軼理了言籠七地而孤等者歎行也籠者籠羅七地者一種性地十信已前在凡夫位總得言種性地二勝解行地在資糧加行二位以勝解力而修行故能印能解此位菩薩多住外門修菩薩行少分還住定門唯識論云乃至未起識求住唯識性於二取隨眠猶未能伏滅此四十心位也暖位明得定觀所取空頂位明增定重觀所取空也忍位印順定觀能所取空世第一無間定一剎那中入真見道論云現前立少物謂是唯識性以有所得故非實住唯識三淨勝意樂地即初地也經云得無生法忍初得在初地四行正行地從二地至七地皆此攝初二三地相同世間正行四五六地同出世間正行從初至四地已來修菩提分法觀五地作四諦觀六地作緣生觀七地作六度三性三無性觀相同菩薩出世間故問何名正行答簡異外道名為正行五決定地即第八地有三決定此即是第三不虗行決定也六決定行地即第九地具四無礙解七到究竟地即第十地滿足及佛地究竟有二種等覺位因究竟妙覺位果究竟今歎行但取因究竟不取果究竟也又七地是所依菩薩是能依今只取能依行不取所依地也若言七地即寬通攝得地前名之為籠若言十地即狹攝地前不得故言七地也孤榮者孤者獨義榮者榮茂茂盛也一切菩薩所行之行不離此七地七地之中所有菩薩行此經籠羅總盡此經一乘行有二功能一能籠羅七地菩薩行二孤榮小乘九分教故名籠七地而孤榮九分問此歎行何故説説九分教答此取九部教下所起行不取教也此一乘行向三乘九分教下所起行中獨自榮茂故言孤榮也問四五六地菩提分法觀相同二乘只此菩薩行便是九分所起行如何言孤榮九分答若約所似人説即是相同二乘行若望所取佛果論所修修行之行即是菩薩行問如何孤榮大乘行答治云大乘行有二一者共行大乘二者特達大乘共行大乘行者即四十年前説三乘之行雖三乘人共行是未了義不名特達行但名共行如宅內唱有三車一種也今車四十年後靈山會上説法華經聲聞回心授記即是了義大乘對四十年前大乘之行名為特達行也即是出門已後唯見牛車一種此行殊勝故云孤榮也九分者即是小乘九部教即經云或説修多羅伽陀及本事本生未曾有亦説於因緣譬喻并祇夜優提舍經也治云或是大乘九分如涅槃經説護大乘者受持九部但於大乘十二分除論義以大乘菩薩人不假問答故除論義二菩薩無犯不假因犯制戒故除因緣三菩薩既是上根不假説喻故除譬喻謂疏中歎教理行果越於衆筌乃至千古兼越大乘小乘何故唯説孤榮小乘九分違此疏文今依涅槃經取大乘九部為正若説小乘九部者非也上行了言冠五乘而獨等者歎果也冠在首謂之貫首者頭也一身之最上莫過頭首冠在頭首之上也高上之義曰冠古説反二十曰冠歲今取去音冠者蓋也上也此經最勝能蓋於五乘故言冠也五乘者定性人天乘定性聲聞乘定性緣覺乘定性菩薩乘五不定性乘妙法蓮華經出過五乘之上故言貫五乘蓋覆却五乘如向五乘頭土著蓋故言冠五乘也問若法華經離五乘外有可言冠五乘法華經是五乘內不定乘收除却不定乘只合言冠四乘如何言冠五乘耶答二解一云法華經四十年前空教大乘中道大乘出於破相大乘名冠五乘二云此經一乘出餘四乘所得之果又因一乘之中果乘出於因乘故言冠五乘問若如此説餘大乘經皆爾何獨此經答但表此經出於五乘不遮餘經也若似此經指昔無為今有談前果為後因明捨權熟實與聲聞授記如此勝事餘經即無一則是中道大乘冠彼故相大乘二則嘆果乘冠彼因乘三則與聲聞授記明權實之事有斯多勝獨言冠也頴者出也禾末謂之頴一段禾於中一穗獨出出於衆禾之上名頴尚書云嘉禾異壠同頴頴者出義也千古者對上百宗而言千古意表此經出於五乘獨逈千古即自受用身壽命塵劫不盡且説分限故言千古即是法華經出於五乘蓋覆五乘而獨頴出千古歎果也上別歎四法了言大矣哉者標總歎四法也大矣哉者是極歎美之詞也如多寶讚言善哉善哉釋迦牟尼佛快説是法華經是極歎詞也疏主以經宗玄遠論旨幽通蓄吐鳳之詞𫾻燭龍之智融性相於一實束波瀾於九流五喻舉而諸子知歸四法標而百家悅服願搜微於盡美指包博於經篇故言大矣哉大矣哉問何故別歎了更總歎耶答緣前歎歎不盡如言藻掞衆詮之表唯歎著教其理行果三嘆不著如言邃軼百宗之外唯歎著理其行果二歎不著行果亦然所以此總歎也如愛一今君子人端正美貌讚歎云大端正大好人可於總歎了君言大好耳朵大好鼻孔大好眼從旦至暮言語雖多歎終不盡也今此疏主意徒嘆四法總盡都言大矣哉三個字歎一部經教理行果總了上標之了下釋言揚一實而等者問大矣哉則可知矣未委大矣哉義乃如何答疏言揚一實等揚者宣揚揚者説也一實即一乘經云唯此一事實餘二即非真又經云諸佛世尊唯以一大事因緣故一大事者所謂開示悟入菩提涅槃雖理智有殊皆是一實也包者含也總者總攝也一乘寬廣理無不包事無不攝亦説實亦説似門何物答大似虗空相似也虗空則參羅萬像山嶽草木無不含容也一實者若事若理若權若實無不包盡所以似太虗空也言振兩權等者振者舉也前振融山振者動也作移動義解今此振者作舉義解兩權者即二乘教也謨云揚一實則上包總大虗談實無不盡振兩權則下維羅萬像説權無不周然則萬像不遍太虗表二乘之狹劣太虗含容萬像表一乘之究竟也此經之中舉兩權權行衆多似虗空之中維羅萬像非虗空不能含容於萬象萬象依虗空若不是虗空含容他萬象不盡萬象不合依餘法只是依託於虗空虗空似一實也非一實不能含於兩權餘經説兩權説他權行不盡此經之中説兩權似虗空中萬象非萬象不能依託於虗空非兩權不依託於一實一實之中含兩權似虗空之中含萬象也有疏遺遺者落也即是下義也意道此經上包一乘萬行如虗空相似下羅二乘之行二乘之行如似萬象故名遺也有作維者維持也即網上綱繩亦名大也此經之中揚一實萬行皆成此經之中舉兩權一切權行無不攝盡問似何物答似舉綱提網萬目開張舉裘提領衆毛皆整故作維也羅謂該羅也萬象者小乘五薀三科有為無為若色若心名萬象大乘萬象即六度萬行三性三無性等名萬象也言豈可以溟輸等者破古人見下經文以山海為況便將山海以況此經教理問古人是誰答即紀國淨法師淨法師疏云因以深同溟渤高類須彌照灼奪朗月之華破暗齊白日之力以況此經也故疏破云豈可以溟輸等豈可兩便是責古人也溟者北溟南海名也輸網之處也深旨者理也古人見藥王品中説衆山之中須彌山為第一又如一切川流江河諸水之中海為第一此是分喻也古人不知是少分喻只將山便喻此經教將海便況此理將喻全喻得了也疏主道溟海雖深八萬由旬之數尚可知之此經二空之理不可測量豈法華經教只如海耶須彌雖高八萬四寶所成亦有量數測知此經一乘之教甚深不可將妙高為喻減多經德所以責之豈可以等古人不了下文取其分喻乃將山海全況此經教理故疏破云豈可以豈可以者不可也峻躅者迹也即是法華經教迹也言首稱妙法等者標也首者頭是初始義卷之初頭言藻宏綱等者問妙法蓮華經者何義答疏言藻宏綱等謨云藻者文藻藻飾也宏者大也綱者網上大繩極唱者即極説也最初名極亦是初首也妙法蓮華經五個字是一部之首唱也法中論何名橫綱何名極唱答二説一謨云法華經中七喻三平等十無上是一部中宏綱妙法華經五個題目能與宏綱為文詞藻飾亦能與宏綱為極唱首唱欲擬説經去事須先向頭先向頭安妙法蓮華經五字故名首唱首唱即初説也二云妙法蓮華經即是宏綱即是藻飾即是首唱七卷妙法蓮華經是綱也網舉其綱萬目開張提綱即目正舉領即毛斊網上衆目雖多舉大綱而皆見經文義類雖廣觀品題即知是妙故言藻宏綱之極唱也言旌一部之都名者問何要經首安題目耶答題目能與一部經為旌表故言旌也如見樹居白鷺表水非無旌者由如旌旗官健千人萬人一處爭簡得但看旌旗便知是神策威遠軍驍騎龍武將旗立以為標作三軍之標表故旌者訓為表也此經七卷文句雖多見題云妙法蓮華經即知一部經文總皆是妙法蓮華經便知不是維摩經不是楞伽經涅槃經各自差別不相雜亂故喚題目為旌表也問題目與經本文其義何別答題目是一部之都名一部經文是別也教理行果總是法華散在一部之中今此題目既言妙法與一部經中妙法為都名也所以言旌一部之都名也言序品第一者牒也序品兩字是能詮也一品之內經文是所詮也能詮詮所詮言鏡義類者序品者是何義答疏言鏡義類等如鏡照物鏡則能照物像鏡中分明顯現教能詮能詮詮所詮理所詮理向教下分別顯現故教喻如鏡也問何故喚一品經文作所詮耶答自下解品經得名中能詮却是所詮今此間經是能詮一部經文是所詮對經題目立所詮也鏡者鑒也明鏡挂臺妍自現序品兩字如鏡也義類者即序品之中七種成就七種成就所詮義類序成就與衆成就與説法時至成就別七般所詮義類各自差別雖然各自別被頭上安此兩個序品二字照著一品經中七般義類總屬於序由他頭上安兩個字為鏡故見面之好醜犯鏡照則便知義類七種雖多見品則知一品皆是其序也問何名鴻標答毛詩云鴻者大也大者曰鴻小者曰鴈故喚鴻字作大也能與七般義類為標題舉著序品兩字七成就義類總名故名鴻標也言顯異詮之別目者七種成就皆有能詮所詮問何名異詮何名別目答文字章句名為能詮也由所詮道理別故向能詮教上有七般文義差別故名異詮向異詮上安題目名異詮之別目別目者序品也七種成就題名言各異名曰異詮今安序品兩字向頭上著更與異詮為差別名目遂令七種成就總名序品此序品兩字與七般成就為鏡亦為大標亦為差別目也上總解經題了言法含持軌等者解法字持謂任持不捨自體軌謂軌則令物生解故名法含持軌問教理行果四法何名為妙答綰群祥故稱妙綰者攝義也祥者善也綰攝衆善故稱妙也問何處是綰攝衆義答教有能敷妙理之功理有所敷出水之力等又契祕賾之微詮教也叶幽根之玄旨理也尅上乘之奧業行也圓至覺之真宗果也美無不殫故稱為妙也問此經有四法此經得名妙餘經有四法何故不得名妙答餘經有四法四法不綰於群祥此經有四法綰群祥故稱妙上別明妙法言華兼秀發等別解蓮華也問何名秀發答謨云秀者出水義發者開敷義若爾一切陸地華皆能結果皆能開敷應名蓮否答陸地者但得名華不得名蓮華以不具衆美也餘華雖秀發無衆美故非蓮也是法皆含軌持失群祥故非妙此蓮華向上有二義一者結實義二者開敷義所以言兼也又具衆美獨名蓮華若依謨前來解秀與發俱在華上者衆美不別言勢便重也此華具有開敷義結實義能含衆美號蓮華妙法勝諸法蓮華勝諸華將來況妙法法喻等無差得桃李與杏華千樹萬樹不為誇一朵蓮華供養佛福由無量勝諸華大集經云慈悲為莖智慧為葉三昧為鬚解脫為敷菩薩蜂王採其甘露故我頂禮妙法蓮華問何處是蓮華具衆美處答菡萏披敷以見蓮類教諭揚以悟旨芙蕖秀出於靈沼喻理類超於小蓮舉花開而得實譬因嚴而果滿標實結為華本顯佛智為乘源舉喻蓮華斯有由矣此四句名衆美是蓮華向上德也陸地華無此德也言體業俱陳等者合解妙法蓮華也體業俱陳標也法喻雙舉釋也半滿已下二句結也一云法是體妙是用二云無量義經出生是體法華經功能攝入是用也三云教理是體行果是用四云一乘是體破二會二是用五云妙法是體蓮華是用諸抄偏取法是體妙是用但向法上解體業不向喻上解體業若爾爭得名體業俱陳今取妙法是體蓮華是用為勝也空言妙法是體更著蓮華是用名體業俱陳空名妙法是法法更著蓮華是喻名法喻雙舉今言妙法是體即教理行果也蓮華是用不取眼所見色塵蓮華準下釋名門中妙法如蓮亦持業釋今此不欲別解蓮華蓮華是色法妙法是心法色法不成持業今取妙法教理行果體上有開敷出水功能只此功能便是蓮義攝此功能就彼法體名體業俱陳也此解一則與下句疏文相承法喻雙舉二則與下釋名門中相承也言半滿之途等者二句疏結前妙法蓮華四字疏本有作途路字有作徒輩之徒亦準涅槃經云為聲聞人説半字教聲聞人依半偈教修行名半徒菩薩依滿字教修行名滿徒曉者日欲出曉世界明朗萬物皆都名曉若天未曉物皆不見法華會前聲聞人未曉所修二乘法是半教自身半徒悟今日所聞是滿教依大乘修行自身是滿徒法華會上是曉處也若作途者途徹軌徹道理對下取捨之路者即知羊鹿可捨牛車可取化城可捨寶所可取取一乘寶所捨二乘化城取一牛車捨二羊鹿著者明也對上曉也言經者等者妙法蓮華則可知矣未委經者何義答疏言經者等標也言常則道等者問何者是常義法義攝義貫義答疏言常則道軌百王等釋也百王不可改易名常常即經也經與百王為遊履之處名道亦與百王為無為治化之處垂衣南面故名為道經與百王為軌徹軌則故名軌一能與百王為大道二能與百王為軌徹帝代相承不可改易名常也常則是經問何名為法答疏言法乃德摸千葉此經法與百王為德能名曰之德此經法與百王為摸軌故名德摸千葉一世一代為一葉千代之王不可改易上二依俗言攝即集斯者問何名攝答攝即集斯妙理契理也問何名貫答貫又御彼庸生契根教能攝理名之曰集貫者貫穿不散御者控御制御也西方持華供佛遇風吹散皆以線貫令不散失衆生不造惡業皆由經教貫穿華若得線遇任風而不移衆生聞經逢邪見而不動故云貫又御彼庸生庸者次下義庸愚庸下庸鎖謂之常人愚短也本性與佛無差不能學出離修行只擬輪回惡道世尊恐其墮落故將經制御不令造惡輪回如銜制馬也夫子曰動行不知所務正立不知所定日選於物不知所貴從物而流不知所歸若此可謂庸流人也言庶令畢等者問佛將經教貫穿攝持衆生意在於何答疏言庶令等歎經功德庶者幸也普也盡也具此三義畢者畢竟也如來説法意即是務令畢離苦津苦津即二障生死也生死為此岸已起煩惱是未起煩惱為中流大般涅槃為彼岸六度為舟越於此岸至彼岸名畢離苦津也津際也言覺岸者菩提涅槃也言序者由也者問則何者是由也始也之義答疏言陳教起等釋也方便品説法一乘名教起此品放光雨華等為教起之因由也問何名始答始者初始方便品説法名法興此序品放光雨華動地與法興作漸次也言品者類也者標也問何名品答疏言區玄旨而異類區分也玄者深也旨者意也理也區分所詮理作二十八段故名異類問何名別也答疏言派幽詮而彚別能詮教也派者水分流貌普拜反亦作怕音亦如一河水分成數流一乘法問分成二十八品為派也幽詮者即是法華經教意言品能區分幽旨道理成其異類之義七卷義理雖多被品區分乃成二十八類言彚別者位音類也周易云拔茅連茹以其彚征茅是茅草此草千修萬修皆同一根生把著一條連根不斷此經所詮理是一能詮教乃有二十八品不同雖二十八品不同品品皆是同詮一乘之理故言彚別若論一味之法不合有品類多般恐衆生難解遂分品類令其易解也名為彚別言經有二十八品類條貫者都結一部經題目品題目也言如是我聞者奉天云緣第六門有解釋經本文故前舉也更解前雖歎序等今總聊簡一部經文欲釋大意故先舉四個字也言初釋經文者標也略以六門聊簡是舉也亦有疏本作將字將由欲也當也欲解擬解釋其未解之前略以六門科簡略有二義一少略名略玄談之中不能廣説廣説不盡且略以六門聊簡二略者束略總略故名略一部妙法蓮華經三周大意總作此六門説盡故名略然天此經體含理智彰權表實則大事之因緣會偏入圓則玄經之旨趣行斯羊鹿終滯化城指彼牛車直歸寶所智生無漏之眼方轉法輪識辨不測之先詢文殊師利多寶德圓曩劫尚為法來慈氏位在一生由迷佛事不可六門究盡疏首故置略以之言標舉訖言敘經起之意等者正列六門也六門分為五對一能説所説對敘經起之意一門為能説餘五門為所説二能詮所詮對明經宗旨為所詮解經品得名為能詮明經宗旨是理所詮經品得名是教是能詮三本末對經得名是佛説是本品得名是阿難結集安置是末又佛説是本弟子説是末四單重對即是經品廢立也經廢立藥草品加日光喻普門偈頌也此是經廢立名單也問何名重答單説經廢立更明品廢立重也即是天授品有無屬纍品前後是也五次第釋文對次第者即是彰品品次第釋文者釋經文本末問何只説六門解釋答則云將陳至教必有所從雖聖人無心而為物應現故先之以起意言教之既立固有所明亦大言無黨而對根遂顯故次之宗旨實相雖著假名尚存則冥性無而隨冥雖設故次之以得名然後論其廢立則有無斯備矣論次第則前後斯成矣離有無而即有無非前後而仍前後玄關既闕至教方陳故次釋經文本居後而説也路云夫三藏教法各有趣求何者論以性相求故今疏主依斯上義科判經文先敘經意雖知意趣若不開宗所修之行而無所歸故次第二明經宗旨雖間宗旨已明所歸若不了知品號經題表彰何義故有第三經品得名雖明品題不開廢立闕具由迷故有第四經品廢立雖彰廢立品次須分故有第五品之次第既知次第須識本文故有第六釋經文本由此疏主立以六門解釋此經也總別了唐乾符六年冬溫州開元寺講慈恩比丘弘舉傳寫供養此書從巨唐來在智證大師經藏深祕不出只聞其名今興福寺釋真喜仲算與彼門徒智興闍梨有刎頸交相囑借請始以書寫後賢鑒于時天祿元年歲次庚午也弘長元年辛酉七月二十三日法隆寺僧聖讚全本寫留之施入于專寺大經藏以無類本恐失墜更書寫之訖法隆學問寺正應
