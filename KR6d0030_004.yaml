body:
  text: 鏡水沙門栖復集言利今後者約現當名利今後所取靈山會上世尊說經之時一會眾生聞經得益若因若果皆是利今從散廗已後如來在三十五年及滅度直至當來人壽六萬歲時中間所有聞經得益總是利後如來見現在眾生有大利見未來眾生有聞經得無量益是故如來為利後說是法華經沼云亦合有利昔為常不輕往為四眾受記即是利昔雖知如此非由法華利也言法華一會等者正辨時節也法華一會者此一句解今字宜聞法華而得益故者二句解利字又云法華一會者得益處所有凡聖者得利人即所利之根宜聞法華而得益故者正明得益亦是能利之法世尊見有如此益所以說經也言此有二類等者即指前聞經獲益者法華一會聞經獲益有此二類也言果記利等者果中功德果即是佛果記即分別解釋是果之記依主釋或記即利持業釋也現證利者因中功德現在證即證悟現在之證依主或現證即利二釋皆得即是因中功德也問此門之中說果記利與前彰記何別答攝云前總談授記後門別說利益故分二門也又解前門約法此門約人故成差別問聞經得果記了更經三大劫始得佛果如何不名利後益答既從現在得所以亦是利今收也然利今中文有二意得果中功德名果記得因中功德名現證利也言即為三機等者問何處是得果中功德利益處答云疏言即為三機等即三周便是得益處也世尊三周說一乘會二破二者會教理行果且會教者我此九部法隨順眾生說入大乘為本即會教也汝所得非滅謂佛一切智即會理也汝等所行是菩薩道即會行也會彼二乘所修之行是大乘因名二也羊鹿車即會果也破二者破彼所執二乘為極而無實性令歸於大名為破二三周皆破周云十方佛土中唯有一乘法無二亦無三除佛方便說第二周云更無餘乘除諸如來方便說第三周云息處故說二又云世間無有二乘而得滅度會即會法體不破法體但破彼執心言方便品下等者初周分齊周者周足具足之義正說領解述成授記四段文聲聞成佛事辦名周也此門之中不唯授記兼亦分別深密之義且初周論科為四初二深先唱警密郡座之心有二初長行分二初嘆所說法妙後嘆如來身能說法師勝妙有二初標勝妙分二初顯自在從定而起後告鶖子正陳所說經云爾時世尊從三昧安祥而起至所不能知次釋斯勝妙經云所以者何佛曾親近百千萬億等八甚深文上所證所說法妙後歎如來能證能說法師勝妙經云舍利弗吾從成佛已來種種因緣等第二四眾驚疑發揚鶖子之請經云爾時大眾中有諸聲聞漏盡阿羅漢至無上兩足尊向下勝經不盡如本第三周開斯實相初長行有二初明二記後五濁下正破四疑初二記者初取授記許可攝受經云汝已慇懃三請豈得不說下二與授記正為解釋有六一未聞令聞歎法希有經云如是妙法諸佛如來時乃說之二者說諸佛隨宜說法意趣難解三者依何等義初標者經云諸佛世尊唯以一大事因緣故下後釋者經云舍利弗云何名諸佛世尊唯以一大事因緣故下第四令住者勸來令住一乘之中經云舍利弗如來但以一佛乘故為眾生說法無有餘乘若二若三第五依法者經云舍利弗一切十方諸佛法亦如是下第六遮者遮破二執遮遣二真經云舍利弗十方世界中尚無二乘何況有上六段明二記了後五濁下正破四疑第一疑云佛於何時出諸佛出於五濁惡世下第二云何知增上慢若我弟子自謂阿羅漢辟支佛等下第三云何堪說初標答中初標云除佛滅度後現在無佛下釋云所以者何佛滅度後如是等經受持下第四云何不成妄語人經云汝等當一心信解受持佛語下上來六段總當開斯實相了從此第四勸發喜心經云汝等既已知諸佛世之師下第二鶖子領解爾時舍利弗踊躍下第三佛重述成爾時佛告舍利弗吾今於天人沙門下第四為之據舍利弗汝於未來世過無量下直至爾時四部眾向下總是第一周也言譬喻品云如來亦復如是等者初正說喻若國邑聚落下二示大不希三思方拔濟四正說三乘不引經可知之言信解品中等者有三初敘四人之喜敬爾時慧命須菩提下次中四人之領述向下可知言為大迦葉授記者爾時世尊說是偈已告諸大眾唱如是言我此弟子摩訶迦葉於未來世當得奉覲三百萬億諸佛世尊乃至得成為佛告曰光明如來等須菩提號曰名相迦旃延當得作佛號閻浮提金光如來大目乾連當得成佛號多摩羅旃檀香如來中根記了言第三周化城喻品等者分四初正以喻化中分二初說宿因令念退大以就小後顯今果令其捨權以取實初中分二初陳過去結緣會佛自身事後陳過去結緣會弟子事初文分二初一長行一頌說大通智勝佛去今久近後告諸比丘下正明彼事分四初佛壽成道二轉正法輪三子繼傳燈四會成今佛四段不同正明彼事中初明大通佛去今久近後正明彼事總是初說宿因令念退大以就小後顯今果令知捨權以取實化成喻事法說喻說合說總是以喻正化了次五百弟子授記品中分三領解述成授記領解有四初領說法二領授記三領宿世因緣四領神通次述成問眾見否歎其今德歎其往德言便授五百弟子等者富樓那過無量阿僧祇劫當得成佛號曰法明次陳如等千二百阿羅漢名曰普明次學無學人記品云阿難號山海慧自在通王羅睺羅號蹈七寶華如來二千人同名寶相言即是利今者結也意道上來三周所陳分齊正是為聲聞也言雖知六處示現等者六記辨攝也世尊三周說一乘皆為與聲聞授記天親菩薩亦道上根中根各自別與記下根五百千二百同一處與記並不立授記名目今却是疏主安置此六記名字雖之一字義含得失文書帶著雖字便含兩勢標文之中標六記名得利今中唯取五記不取餘一記名失二云雖然總有六記於中有因聞經得記有不因聞經得記者三云雖知總有六記於中有是利今者有不是利今者即具因記也次下兩義解然據文勢相承二標了便合道然前五記緣貪烈六記隔文斷也只此然字亦是承前雖字向上起來安置此然字便是不定義便文含兩勢也第一雖知授記總有六段然前五記是果記第六是具因記因中記也第二解雖記有六段然前五記是現在第六具因是過去往日之事也通難亦得問明利今中說果記利唯法華論中有六種授記幾个是此果記利段答疏言雖知等不定義含取捨得失示現者曉示顯現之義意通法華論中雖即言六處示現授記然前五記是此果記利收第六具因此之不攝取前五記捨第六記故置雖言亦云初五記佛記名得第六菩薩記名異或初三及第五由聞經得記名得第四與六非由聞經得記名異上答標文亦言六記辨攝言一者別記者標也舍利弗等出得記人眾所知識等者出得別記義也上中二性國王王子大臣人民梵王等皆識知故有識形而不知有德有知有德而不識形也有識其形亦知其德所以疏言眾所知識二義解別記一者眾所知識故與別記二者名號不同故與別記如鶖子號曰華光迦葉名曰光明須菩提號曰名相迦旃延名閻浮提金光大目連號多摩䟦栴檀香以此名別故故與別記一名別周別根別三義別也言二者同記者標也富樓那等者出同記人此有二解一云五百即與千二百人別二云五百即是千二百人中攝為正問爭得知答經文如此其五百阿羅漢次第與授阿耨菩提記餘諸聲聞眾即攝七百人同一名者出同記義也有解云周同根同名同高名之輩一異二同滿慈號法明名一異憍陳如與五百千二百即同號普明名二同非高名之輩一同二異二千人同名寶相名一同阿難號山海慧羅云號蹈七寶華名二異問若依此義同記有一別何不別中收後記有一同何不同中攝同記有一別富樓那名法名與五百千二百人名別何不同別記中攝答法普雖殊明名同故亦名同記若爾鶖子得記號華光大迦葉號光明雖殊光字同故應名同記答夫論同記事須周同品同根同名同鶖子與四人周根名三義別故但名別記問後記有一同何不同中攝二千人同名寶相何不向同記中收答彼非眾所知識又就下根中後時與記但名後記不名同記問阿難羅睺羅亦是眾所知識何故與後記答阿難為是有學所以向後記中攝不向同記中收問羅睺羅亦是無學何故亦向後記中收耶答據實富樓那阿難羅睺羅總合向別記中收以總是化聲聞為引下根實聲聞故所以不向同記後記中攝也若不爾者富樓那佛自讚云如來無能盡其言論之辨行位計是九地菩薩阿難又與世尊於空王佛所同時發阿耨菩提心等又羅睺羅是佛之子三於未來諸佛而作長子故知是化也五百千二百人易教化只著富樓那一人二千人難教化所以阿難羅睺羅二人相共教化也問五百千二百可得名同滿慈一人豈成同記答滿慈應化非是正猶論主雖標意取所引五百千二百正所逗者名五同記非取滿慈若論滿慈應樂別記此乃論主之懸鑒也諸妙不達遂輙通云法普雖異明名是同故名同記問善現名為名相學無學二千人名為寶相相名既同應成同記答經品不同根性亦異不可為難也言三者後記者標也學無學等者出後記人非眾所知識等者釋後記義問有何所以得名後記答疏言非眾所知等一非眾所知識二共同一號三後時與記由斯三義故名後記問阿難長為侍者羅睺佛之愛子名階十聖響振五天忍言斯人非眾所知識亦日月之照雷霆之聲而於瞽聾不能視聽也答舉多攝小後記何違根性與品而並同故安後記中收論文非憑次第但義同者即一處收不遮後文亦在前攝二云四無怨記者准論解經如來於提婆達多邊無怨惡故經云告諸四眾提婆達多却後過無量劫當得成佛號曰天王如來良云仙人說順緣善友天授害佛違緣善友雖是違順然皆善友是無怨問此無怨為目所記為目能記人答論文據佛示現如來無怨惡故目能記人全云示現天授於佛無怨惡心欲發明如來功德非是惡人故與授記并前良解皆樂於所記人攝論云提婆達多皆是大力菩薩不退轉位菩薩問天授五百生中常與菩薩作大怨云何復言大力菩薩答天授非菩薩怨何以故若是佛怨者菩薩修善天授常作諸惡云何世世得與菩薩常得相值以是義故天授非菩薩怨如二人行一人向東一人向西步步相遠而常相違背云何得相值耶若天授實為怨者佛有種種過一者非一切智人摧山壓佛而不覺知故二無神力持杵害佛不能禁制三者佛有愚癡過見怨害來而不迴避四不擁護眾生過天授造五逆罪而無救度五佛非金剛身轉輪聖王以少福故而無怨害何況如來為石所傷血流出故當知非金剛身六餘業未盡過被他人所打皆是業招故知如來餘業未盡但是示現造業墮大地獄顯知業報不可壞故又為墮地獄眾生歸依如來請救護故又為當來世眾生入佛法遭傷毀者令作是念如來之身尚自被毀害況我等凡夫提婆達多是大賓伽羅菩薩為遮眾生造逆罪故墮於地獄譬如香象捔力非驢所堪若不是化因何入地獄世尊交阿難借問受苦可忍否答言我受第三禪樂但以善巧方便調伏眾生現作二逆墮於無間獄上言為怨或為非怨故知皆屬所記人經言作魔王者多是住不可思議解脫菩薩以方便力而往試之令其堅固問二論如何會釋答金云餘五記並目所記人何乃相違但天授望佛無怨即如來無怨二論各據一邊問天授害佛佛即與記善皇亦爾何不與記答天授曾為師範因明彼事故與授記善皇非是釋迦師今此會中不與記也言五通行記者標記名即云行菩薩通得作佛名通行記言顯示女人在家等者明記人也此經文在法師品初也言修菩薩行皆證佛果者出得記因由故與比丘尼及天女記結通行記今明得記人者問何故名通行小乘許女人得聖果蓮華色尼等是大乘不許女人入見道何況成佛答未聞法華即如此若聞此經已後龍女尚得成佛豈況餘人今此間不簡四眾八部通於此經修行取果世尊所以與四眾八部比丘比丘尼及天女記問何者是天女一部經上下盡無天女受記處文答有說與耶輸陀羅記耶輸是天女此解非也況耶輸不是天女設是天女早烈尼眾了如何更言天女故知不是也又解天是天人天人來聽必有女人相隨故名天女但有天處便有女人相隨又解天是女天天人是四眾亦之中優婆夷人天二趣之中舉初攝後名為天女此解勝也即云謂人及女自前授記皆未通行五趣唯人類二根局男身今即兼天及以通女顯通行記說天女言論文巧約言天及女可無或矣上來多解取法師品中舉八部四眾一切聞經皆與授記此文寬故得有天女記也言此上五記者結也總名利今也言六因記者標具因也問此問利今何要引具因記來此是過去世事非今時益答此間利今中因說別記同記後記盡是有大乘性者便說菩薩受記不唯取有性人於中兼有無性者意顯菩薩授記與如來別故引具因記也具者有也因者種子義意言身中具有菩提種子名具因記二就生了二因菩提種子是生因涅槃佛性是了因具此二義名具因記化度二說一云一切眾生佛性之因悉皆具足名為具因二具屬眾生因屬菩薩因位談彼眾生本識之中具有佛性名為具因相違釋經云禮拜讚嘆言我不敢經於汝等汝等皆當作佛示現眾生皆有佛性故引具因記言常不輕菩薩者指能記人也言禮拜讚嘆等者出具因義也言示現眾生等者問但見四眾禮拜讚嘆皆言作佛有何意答疏言示現眾生等者曉示現者顯現義意欲顯現曉示一切眾生皆有佛性故禮拜讚嘆言當作佛言此之一種菩薩等者意道此記是菩薩記不是如來記說往時益非談會上結具因記也言初三等者料簡六記也初三者即是別記同記後記及第五即是通行記此上四類並在靈山聞此法德益言餘之二種等者即第四無怨記是利今段不由聞經而得益當說經時天授在地獄不在會一若據不是利今收唯第六具因記也問天授不在會如何名利今答得記在會亦名利今也言然前五記等者謨云若以聞經得記但取初三及第五若以利今為論前五記皆是此攝此會得記者名利今故或此通會論中標文論中雖言六處示現授記然前五記並名利今即是此果記利也問具因記亦是會上所說何不得名利今答雖然亦是會上所陳非如來記往時事故所以不向利今中收今非往故言然諸聲聞授記等者問聲聞之人永盡後有如何能證無上菩提答依變易身非業果身亦不相違問如何要指變易義門答謂有人言聲聞之身而有限齊得記之後經三大劫方得菩提如何有限之身而能長時也所以要指變易義門意道聲聞雖有齊限得記之後受變易經於三大劫得證菩提故唯識論云如有論說聲聞無學永盡後有云何能證無上菩提依變易身證無上果非業果身故不違理此解授記已後論云生死有二一分段生死二變易生死變易生死總有三名一名變易身二名意成身三名變化身然變易生死無別業招只是分段身上前生故業五戒業有此業在第八識上連持功能亦在故業若盡連持功能亦滅所以事滿須得故業身在本來故業所感身分麤今定願力資助有勝功能長時與果不絕也此變易生死事須得無漏有分別業為因無漏簡有漏分別簡無分別所知障為緣所知障於一切法上不能了達是所知障今取執菩提可求有情可度者資昔所修人是數數定願資助改去先惡轉生後妙漸細漸微乃至證得無上菩提若不執菩提可求有情可度無由發起猛利悲願名變易生言相狀者即是隨欲界人天及色界類分段之身受此變易身光潔自在名變易相狀體者即第八異熟識為變易生死體論云此識足為界趣生體此變易只三界內身亦名變異熟故業阿賴耶為體義者即以無漏有分別業為因所知障為緣易麤令細易短令長至佛果位解脫道中方捨之此是變易義問二乘迴心何界之後引生漏答唯識有二義初師云一切二乘有學無學欲界發心定欲界後引生無漏以願力留身唯欲界故上界無此迴心聖者亦無下界發心死後方生上界留身故欲界後引生無漏二師云色界亦有聲聞發心向大乘者許佛亦往菩薩亦往化彼人故亦有二乘聖者色界有漏第八識後無漏現前由有聲聞於彼發心留身者故唯除初二果及獨覺者於彼發心上界無故然彼無色界必無迴心向大乘者唯五種居全無發心者經不說彼發大心故二經許發心信向心不發趣向心五淨居唯定性人故問鶖子是無學迴心即受變易云何弟子憍梵波提言我和尚舍利弗滅度我亦隨滅即知證無學果未受變易應受後有之身答示現滅度非也問如羅漢迴心向大受變易云何女身得證初地答無漏定願資助舊因時轉女成男得入初地問聖人迴心即受變易為未即受答意樂各別若於分段有深厭者迴心即受若非深猒或留分段盡閻浮壽乃至多時方便受變易也言現證利者等者現謂現前證謂證獲利謂利益當在會中聞法華經現得益故名現證利復有多種者復由熏也前果記利中有多利益今此現證利中亦有多種利益故言多種也即下二十五類而得益者是多種也言如提婆達多等者引文於中總引八品經文顯二十五類得益八品經文便為八段初引天授品也言雖龍宮涌出等者簡非益也當在會中聞於法華現得益故名現證利雖龍宮涌出無量菩薩亦得道成然皆是文殊下方教化亦得證利不由靈山聞法得益故天授品中但說四種有現證利不言涌出無量菩薩及龍女亦是現證利收故言略而不說經云其數無量不可稱計非口所宣非心所測且待須臾自當有證所言未竟無數菩薩坐寶蓮華從海涌出詣靈鷲山住在空中此諸菩薩皆是文殊師利之所化道具菩薩行皆共論說六波羅蜜本聲聞人在虗空中說聲聞行今皆修行大乘空義等并龍女道成並非靈山益非利今也此間現證利更狹於果記利果記利尚自許當來始得果此中現證利如來亦說法未散廗中間聞法所得利益是此門收也散廗已後利益也問聖教說不許畜生身入聖道如何此兩類人得如許大益答實即不許化則不妨化有二意一引實龍令發信心二引靈山實聲聞迴心本是聲聞人在虗空中說聲聞行此是龍眾化作聲聞引實聲聞也此智積對論引來本是文殊菩薩與說法華經教化得益雖因聞經得益不是利今也問世尊靈山說經破迴心聲聞疑執與授記說經令生決定心彼海會來者還是迴心聲聞世尊何故不與授記若與授記經無明文若不與授記即是不引攝不任持此應起疑執心却退入聲聞也答有三義一此菩薩到靈山來見世尊破三根聲聞疑云十方佛土中唯有一乘法此一類菩薩自不起疑心更不要與授記二者是化非實意徒證靈山實聲聞迴心決定既是化非實不要授記三者文殊菩薩引來意證經力廣大經力速疾本來不及授記問序品之初以別文殊菩薩在座今何言從海而出答聖人感應神變難思隨所化生現跡無方來無所從去無所至不可以相求不可以事取故華嚴經云十方各有一大菩薩與各十佛世界微塵數菩薩眷屬俱所謂文殊菩薩賢首菩薩等此即菩薩身充遍法界利益群生豈定龍宮而已哉二云序品彌勒問了即入龍宮化諸眾生至天授品時從海涌出二說任取簡非了言唯有龍女等者科眾為六段此文獲益彼此合四位益若准文勢奄含進退不定除却彌勒佛下生來即定得餘人定不得疏主尚自不敢定斷從唯有龍女成道至悉遙敬禮已下分四位益疏言無量眾生聞法悟解下退轉第一位益無量眾生得受道記第二位益無垢世界六返下第三位益三千眾生發菩提心下第四位益從無垢世界六返等向後兩位益決定是此方利今中收前前兩位是此方或彼方益即不定經云無量眾生聞法解悟得不退轉無量眾生得受道記此兩類有人疑云為復是無垢世界無量眾生聞法解悟得不退轉無量眾生得受道記為復是娑婆世界無量眾生聞法解悟得不退轉無量眾生得授道記若定道是此方益疏主向下疏解本文處科為無垢世界益若定道是彼方益疏主此間又科向利今中收答第一遍若從唯有龍女成道演說法時娑婆世界若承娑婆世界字向上連顯讀直至無量眾生聞法解悟得不退轉無量眾生得記授道已來兩位益文勢便似屬娑婆世界益第二遍還從唯有龍女道成演說法時乃至悉遙敬禮住向下兩位益別讀至無垢世界六返振動文勢便似屬無垢界益攝云經含兩勢疏主所以進退科之此間屬利今中收本文中屬無垢世界益賀法師云前兩位益定屬無垢世界益何以答緣向後兩位有娑婆世界字簡故知後兩位定屬此方也前兩位無娑婆世界字簡故知定屬無垢世界益也問賀云何不從唯有龍女道成已下牒疏至悉遙敬禮亦有娑婆世界字甚分明賀答云悉遙敬禮已前雖有娑婆世界字及天龍八部人與非人等乃是最後兩位中三千人數後兩位各有三千人與前文中娑婆世界天龍八部人與非人不別也此文雖有娑婆眾生並屬後兩位益中收有二解一云據實前兩位人身在無垢世界龍女會下向龍女邊聞法亦不向靈山聞經若論益攝屬靈山會益何以知答因有靈山會說法華經方有龍女成佛說法得益推功歸本乃是靈山會益也後二位身在靈山會釋迦牟尼佛會下坐遙見無垢世界六返振動娑婆世界三千眾生住不退地又三千眾生發菩提心得龍女佛與授記所以四位益疏主總向利今中收也問爭知疏主總一向科作利今答只此疏云合四位益有四位之言又向下結文合二十五位益總名利今也又標多種之中簡非只簡龍宮涌出龍女道成不簡着龍女說法時聽眾獲益故作四句分別一是聞經而得益身不在會不是利今收即海會菩薩二不因聞經而得益身會是利今收即後二位三因聞經而得益身亦在會是利今收即三根聲聞身在彼界聞經而得益身不在會是利今收前二位是第二意據經文勢云娑婆世界菩薩皆遙見彼龍女佛初二位身在娑婆世界遙見龍女成佛道又遙聞說法歡喜禮拜得益後二位遙見無垢世界六返振動得龍女佛與授記據四位人身總在此方問四位既疏主總屬此方利今收何故當中心書無垢世界又說娑婆世界答若總著娑婆世界字又解四位人因他無垢世界發心答總書無垢世界著又恐人疑將謂四位人身總在無垢世界所以二世界雙簡也問四若總屬此方利今有何差別答前二位見龍女成道說法會下聞經歡喜便得龍女佛與授記後兩位見無垢世界振動而得授記攝問云四位中第二及第四位授記此佛彼佛文亦不定兩位處得記何別答前二位得授道記者因義因記也後二位發菩提心十信初心亦是因記第二解云初二位得授道記也後二位發心而得授記既言授記即是果記也問既是果記何不向果記利中收耶何故在現證利中收攝答以龍女授記不是釋迦佛身上事故不向果記利中收有解緣不分明說國土名號不得入果記利也若爾通行記亦是不分明說國土名號如何得入果記利故知但不是釋迦佛與記故不入果記利收即得也問後二位人如何遙聞他無垢世界授記聲聞若經合兩方益言聞法悟解者無垢眾會聞法不疑此界聞經即乖正理靈山一十五眾等那能緣彼界聲境答表不思議也若許見彼成佛說法聞亦何疑量云無垢世界中說法是有法此方時會耳應緣自境故宗因云離中知故同喻云猶如此方眼識此方眼識離中知此方眼識能緣彼此方耳識離中知同彼眼識能緣彼法云及聞諸佛所說經法云見佛光從此去聞法聲彼來即是龍女成佛梵音聲相清徹遠聞令此方聞如目連於野與世界聞靈山說法華經聲與會下等無有異也亦同如普賢菩薩於寶威德上王佛國遙聞此娑婆世界說法華經問五識所緣必託第八此方眼耳緣彼色聲未審為緣自第八所變為緣他第八所變若緣他所變唯識不成若緣自識彼非此界似同隔界此界如何緣得答然緣於自自八所變有三說唯識論二云離異熟變為此相有義如契經說一切有情業增上力共所起故二云是現居當生者彼異熟識變為此界三云由是設生他方自地彼識亦得變為此土唯此護法正義他方自地彼此互變此界眾生望彼亦是自地故得與彼五識而為本質若爾如上界天眼見下三灾身在上界以上天眼見下地色等豈第八亦許緣下地色耶不許第八隔界變故若不變彼如何五識定有本質答五識必有疎所緣緣約自地及相近者說若異地相離遠者未必皆此疏主解第八所緣中說問眾生元來未登地何名悟解答法信而解亦名悟解聞思悟解亦名悟解言得不退轉者四不退中信不退也言住不退地者證及行不退也言三千眾生發菩提心者配勝解位中言合四位者此彼方總收也言分別功德品等者恒沙菩薩從地涌出彌勒等疑願佛為說佛言此等菩薩皆是我化眾見涌出謂此化而非父小子老疑非釋迦所遂說三身壽量用釋前疑明佛得道久成所化固疑非少佛德深妙聞信者多利益既弘功德彌眾遂有十一位得證一位發心合十二位現證獲益由斯疏主於現證利收前來疏主解云依論法力有五此中有三一證十一位是二信八世界微塵數眾生發阿耨菩提心等三供養天雨華等且十一位中初六依位五依生證得言佛說是如來等者砂細如麵方四十里名一恒沙問多少恒沙答那由他恒沙那由他是梵語此名姟也問有多少那由他答總有六百八十萬億个那由他恒河沙言無生忍者初得在初地相續在八地圓滿在佛地無生法即是真如也無生法是境菩薩入初地時根本智印證無生理後得智印證無生教心之與境並無生也一切諸法本來寂靜生已不住住既不可得故生亦不可得故名無生也無生有三一本體無生亦名相無生情有理無即遍計也二自然無生假有實無即依他也三惑苦無生實有假無即圓成也本體無生本無今有自然無生依他起性即本無今有惑苦無生即本有今有本體無生如迷繩謂蛇迷杭謂鬼虗空華第二月龜毛菟角等闇中假繩謂是於蛇即無中說有明曉若至即有者便無妄情執了妄即無總是心上見分起獨影境謂有蛇等眾生五薀之上妄執有我亦復如是自然無生者即本無今有也如繩本來是麻後方作繩假凡是色法具二緣生因緣增上緣如因麻是緣假人功為繩即增上緣即麻是親緣人功等即疎緣榖麥等種子是因緣水土為增上緣只如此身將賴耶識中名言種為因緣父母和合及業為增上緣方有此五薀前心法等即四緣生豈同外道計自然義眼識種子為因緣根能發識為增上緣前念滅後念生名等無間緣前境是所緣緣惑苦無生者如麻本有今有不同於繩除其惑苦即真如理性自然顯現真如之理本來清淨本無惑苦今既了之何有苦生名曰無生只得言顯不得言生忍者忍苦是知印可之心菩薩在地前昔聞未能智證一大劫滿忽然住極喜地生如來家比束只聞今得證理印可在心名之為忍忍即印義印之忍依主也化度問分別品中十一位得益各依何位答初之六位名增道位謂彼菩薩聖道故次之五位各損生位損謂損減諸惡生謂生諸善根後之一位名發心位由最初皆發勝心言千億菩薩等者有二說一云取前六百八十萬億那由他殑伽沙眾生為如從一倍二從二倍四從四倍八如是乃至千倍二云從一至二從二倍四如是千遍倍聞持者開即能持隨陀羅尼以念慧為體菩薩得此念慧所聞之法持之不忘名曰聞持凡夫聞了施忘聞不能持菩薩得此陀羅尼即總持也一攝二散有法義呪忍初得在三地相續在九地圓滿在佛地謨云此等證得人數非一化佛土不可容受論報土中取耳雖是靈山見有異故千倍者比前恒沙千倍也離欲嫉他名利二障得聞持陀羅尼門也言復一世界等者即一三千世界碎作塵也辨才者五地初得菩薩入此地中解五明論此地菩薩說法須說即說無蹇吃故在心論名四無礙解在口即言無礙辨才此在九地相續十地佛位圓滿也言一世界微塵等論云無量者數也問幾个無量答萬億个無量問幾个萬億答百千个萬億無量旋陀羅尼者旋者境也於空有境上及有情心行旋環觀察能了能知剎那迅速名曰旋問有多少空有境答百千萬億無量个空有境菩薩起一个智一剎那間便能緣得爾許个空有境五地已前觀空之時未能達有達有之時未能觀空至此地中即空之智便能達有一剎那之間觀空時便能達有達有之時便能觀空即空方便智菩薩起有中殊勝行於此空有境上速疾觀察立以旋名五地已去真俗相違於相違境能令觀察猶如老鵄轉迴空中意欲搏物菩薩在法性空中只觀眾生根性若熟即便度之如將一鏡雙照水火水火之性性甚相違於相違境俱時能照此亦如是不滯空有名之為旋觀空之時即證真理觀有之時即達俗差別觀空即本智觀有即後智若據成滿在十地也言三千大千等者此在八地具四不退八地無相無功用此即法駛流中任運轉故名不退法輪也言二千國土等者此在第十地清淨法輪者法輪本來清淨為眾生有漏心所變同能變識即是有漏無漏心變同能變識即是無漏如地前是有漏七地有漏無漏二雜修故八地已上純無漏故上六依位證得言小千國土等者此下五位依生證得此是地前加行位若未聞如來壽量品時去見道未知生數多小亦聞如來壽量品了損彼識中染種勢力所以分段生死身有限也所以一生乃至八生得入見道得彼初地菩薩問當來三生四生方得果如何名現證利收答果雖後得現座得益亦名現證利問後五位既言阿耨菩提何非果記答但得初地菩提因中之果非佛果也問寧知不是佛果菩提答此在地前望於初地分段生死論生數多小若以初地佛果菩提縱是悲增生數若何定是智增生數即無於此二人云何更論一生二生耶問云經云隨數生成佛若入初地豈名成佛耶答佛者覺義也初地菩薩亦名覺也問准此八生等皆得行位已定生菩薩任運自得菩提何待聞經答由聞經故成已定生非先已定故言四四天下者即十六閻浮微塵數菩薩經於四生得入初地此約菩薩修習近遠由是生數多小不同五種菩提是明心菩提上依生證得了言復有八世界等者此是凡夫發菩提心者十信得也在種性地第二段了言如說藥王品等者陀羅尼即念慧菩薩有此念慧能解一切眾生語言即詞無礙辨也凡夫只解一般言音被土番迴鶻罵早不會菩薩四生九類言音總解也第三段了言說妙音品八萬等者即是種類俱生無作解意生身三昧是定能起一切色身能起就所起立名名一切色身三昧也即十八類身也言四萬二千天子得無生法忍者云三種無生一本姓無生我法二執無了遍計性相無自性二自然無生了依他法上無自然生性三惑苦無生了圓成實性上無惑苦性忍即是智證印無生理也言華德菩薩得法華等者三昧是定法華是一乘理從第四禪定起根本智證一乘理名法華三昧此更有一位益疏家不引遺却去經云說是妙音菩薩品時與妙音菩薩俱來者八萬四千人得現一切色身三昧是也十地論在第八地說第五決定地第四段了言說觀音品八萬等者此是發四弘誓願心求菩提心此心名無等將世間發人天心及二乘心來試等此菩提心得否答世間及二乘心等彼無等心不得故名等等也此多在十信初心二云如來是無等之人世出世間更無過上故名無等初發心菩薩與佛齊功眾生亦發求菩提心與彼如來齊等眾生菩提心等得無等故名無等等眾生菩提等得無等人身中功德故名無等等即是發心畢竟二不別如是二心初心難也第五段了言陀羅尼品等者無生法忍前已說也第六段了言說妙莊嚴等者安國云大乘二說一無間道斷煩惱種現名是遠塵解脫道斷習氣名離垢又惑種易斷如塵習氣難斷喻垢第二無間道斷現行名遠塵解脫道斷惑種名離垢法眼者法即是真如理名法也眼即是無漏智證理故名淨也即是眼智明覺也下疏云得初果故非大乘見道第八段了言說普賢勸發品等者普賢者普遍也賢者賢善即是普遍賢善之理故名普賢今行普賢因行名普賢道能證智名普賢道也言前五記者即果記利也六記之中除具因記餘五記記當成佛也言此二十五類等者現證利收現證因位也天授品四位分別品十二位藥王品一類妙音品三類觀音品一類陀羅尼品一類妙莊嚴王品一類普賢品二類此二十五位現證利收言並是利今者結也言利後者標也散席已後者解後字因法華經者解利字所獲功德皆是利後合解利後也言隨喜功德品等者三品經文今當第一品經云爾時佛告彌勒菩薩摩訶薩阿逸多如來滅後若比丘比丘尼優婆塞優婆夷及餘智者若長幼聞是經隨喜已從法會出至於餘處若在僧坊若空閑地若城邑巷陌聚落田里如其所聞為父母宗親善友知識隨力演說是諸人等聞已隨喜復行轉教餘人聞已亦隨喜轉教如是展轉至第五十阿逸多其第五十人功德我今說之汝當善聽若四百萬億阿僧祇世界六趣四生乃至一一眾生與滿閻浮金銀等又勝令得阿羅漢果所得功德不如第五十人聞經一偈隨喜功德問何故多劫行檀不如傳聞小法答施者福行離貪賤因法是慧聞即滅塵勞之衛故隨喜少法而勝施多財又令得阿羅漢果此約定性初不能廣說法化眾生後令入無餘涅槃設令不定性無學迂會修行經八萬劫等不如聞經速得佛果疏云隨喜一念尚得菩提所化眾生倍於上數今得羅漢不能成佛廣化眾生故福為劣經云若人為是經故往詣僧坊若坐若立須臾聽受緣是功德轉身所生得好上妙象馬車乘七寶輦轝及乘天宮此法華經是運載之經故隨喜者得如是果報又分座令聽此經是諸經中王故坐令聽當得帝釋梵王自在尊高果報已上分坐果下勸聽果經云若復有人語餘人言有經名法華可共往聽即受其教乃至須臾間聞是人功德轉身得與陀羅尼菩薩共生一處三地菩薩也終不瘖瘂乃至當來見佛聞法信受教誨問此為復是能勸聽人功德為復是所受勸聽人功德答若喚作所受勸聽人功德即錯也若是親聽之人功德算不可得今所說功德是能勸之人勸得一人親聽大乘能勸聽之人得與陀羅尼菩薩共生一處言法師功德品等者疏主云於此經中修行十法行者一書寫二供養三施他四聽聞五披讀六受持七開演八諷詠九思惟十修習六根一一根中有十法相資轉成百行百行各四自作交他讚勵慶慰合成四百各有三品修修成千二百三根勝故具千二百三根劣故而無上品眼身鼻只有如說修行時為欲供養此經故書寫為欲供養故施他為欲供養故聽聞乃至修習皆爾一个為顯餘九成助也十十為頭皆九助也故成於百也言乃至普賢品等者文分六一普賢來軌二啟白聞經三佛告四法四普賢勸發五釋迦讚勸六時眾獲益就第五讚勸中初讚美普賢次讚美持經者違順之相讚持經者中有四一順佛行二離眾惡三當得出世四定厭生死定厭生死中一不貪資什經云不復貪著衣服臥具飲食二得現果報經云亦於現世得其福報言以是遺教等者上二句證利今其未度者二句證利後亦云前二句結利今後二句結利後言顯機等者顯時約法顯根約人賀云如來設教本為根緣根有三種之差別聖起三時之初即鹿野轉四諦法輪發起二乘說為有教次即說於般若發趣大乘說為空教後深密會中為諸發趣一切乘者說非空非有三性之教理無不盡義無不該疏主顯三時教經有明文會十八人立一時至五時並無所據言諸佛設教等者總標頓漸問疏主何以亦入此門便先論頓漸答本立顯時只是時教所以疏主先論頓漸佛佛出世皆說法化生所說之法雖則無邊略而言之乃有二種一則是頓二則是漸此二種教義貫眾詮故云諸佛等所被之根有頓有漸能被之教亦然今為顯時顯根故說是經准疏云教無定判故下疏言故知頓漸無別教文隨根以分故此通也不向教上定道頓教定道是漸一食之中根若有頓有漸教隨根有頓有漸也金二意一依顯示教二依隱密教若依顯示教有頓有漸二隱密教無頓無漸就顯示教中漸有二種一從小至大漸如此經窮子喻從小乘至大乘佛果二從大至小漸如華嚴經譬如日出先照山王次照小山及高顯處然後普照世界大地善逝亦爾清淨慧光先照菩薩功德大山王次照緣覺次照聲聞然後普照一切眾生若依此義一切聖教皆名為漸牟云前標顯示有頓有漸今言一切聖教皆是漸何者即是顯示中頓頓義若無漸依何立答疏主有意一切約根若大根不從小入教但是頓若大根從小入大教即通漸天雨本來是一對甘草苦所以甜苦不同也如百法記法菀等破但以教望所被根證悟有殊遂分二種非謂前後以名頓漸二時總標頓漸言頓即等者疏主意此法華經通頓通漸頓即者此頓字即能被教也被彼大根即是所被根也頓從凡夫等者解頓義也言如勝鬘等者問何處經中說能被之教被頓悟根答疏言如勝鬘經所說一乘第一遍言一乘者是四乘中定性大乘證上頓教也第二遍言一乘文便引來此間不要也只取第一遍言一乘者本經文言大乘疏主引來改作一乘也是定姓大乘也言定姓者是決定義不可改轉義此是純一正直大乘也問何名四乘定性答且如定性聲聞乘唯有聲聞種姓定性緣覺乘唯有緣覺種姓大乘菩薩唯有菩薩種姓定性人天乘唯有人天乘姓經云無種姓人無種性故至而成就之今此間取四乘中定性大乘菩薩直發大心修行取佛果菩提名為頓悟根能被之教名頓教第二遍言一乘是權此一乘是四乘外一乘無定所對根故是權也權者不定義緣一个人身中具有三乘種性此一人身中亦有聲聞種姓亦有緣覺種姓亦有菩薩種性若喚他作聲聞已後身中緣覺種性熟捨却聲聞入緣覺若喚他作緣覺已後身中大乘根性熟捨却緣覺作菩薩最後作菩薩修一乘行此一乘是不定性一乘緣覺作二乘行後修一乘行形對他四乘定性故四乘外一乘是權也無定所對根是不定義有可改轉義彼經中立五乘性四乘是定性一乘是不定性問勝鬘經無明文是四乘外一乘是權經文不說如何得知答經文則無道理則有也彼經云攝受正法善男子堪能荷負四種重任若有眾生求大乘者為說大乘求聲聞者為說聲聞乘求緣覺者為說緣覺乘求人天乘者為說人天乘此上四乘定性經文也最後經云若如來隨彼意欲而方便說只有此隨彼意欲之言隨彼不定性人意欲所以四乘外立一乘是權也被他四乘定性各自有所對根此不定乘無正所對根形對四乘定性所以是權也若不爾者隨彼意欲之言有何所表所以疏引經云如勝鬘經所說一乘一乘是權四乘實故也且第一遍云如勝鬘經所說一乘此是四个定性乘中大乘證上頓教也第二遍云一乘是權四乘外一乘此間不要文便引來下云四乘實故此有兩說一一四乘總取證上頓教緣四乘總是定性總有頓義決定義不可改轉義問定姓大乘菩薩及定姓二乘人各從凡夫身上直至發自乘心取自乘果可成頓義第四乘無聞非法器眾生元來是凡夫頓從凡夫擬取何果更無果可取若頓從凡夫還取凡夫何名勝進此是一不成二不成者況疏云頓從凡夫以求佛果今者無種姓凡夫既證頓教不成并二乘定性直發二乘心取二乘果證亦不成第二義唯取四乘定姓中定性大乘證上頓教頓從凡夫直發大心以求佛果餘三乘定性并向上一乘是權盡是文便引來非是正要也解頓了言漸即被彼等者此人身中有三乘種姓聞二乘教發二乘心修二乘行證得小果後聞大乘迴心向大從淺至深名之為漸為根未熟於一乘道隨宜說三解漸義言如此經中所說等者兩遍道一乘皆取三乘中一乘證漸教下云十方佛土中乃至何況有三息處故說二唯有一非餘問法華經中說權實與勝鬘經何別答勝鬘說一乘顯了約出生法華經中說一乘隱密說約攝入也勝鬘經實有定性不定性五乘說實顯了說也問如何說名出生答經文云如阿耨達池流出四河互不相障也喻權乘都分出乘也第二法華經約攝入說對不定姓人攝却二乘且道唯有一乘今據迴心故密意說也又勝鬘經定性不定性雙說則四乘實一乘權法華唯被不定性則唯有一乘無別二乘言一乘是實二乘是權者是密意說也問四乘外與四乘中一乘何別答四乘內一乘有所對根定是實也修大乘故四乘外一乘對他四乘定性人說所以是權也為一人具四乘性故何以答向他定性人邊則合說實有三乘五性若向四乘定性人前顯說道唯有一乘無別二乘此字却是權也若將四乘外一乘對不定性人前顯說無二乘唯有一乘一乘唯是實也又權有二種一若對他四乘定性人前顯說二乘是權此名權體不權也若對不定性人前顯說二乘是權此名體俱權也問法華勝鬘處會何先何後答法華經在前說勝鬘後說所以說四乘外一乘遙指法華會中權乘也言此經多被等者且八品正宗對三根聲聞即多是漸教言多者少分通頓下經十一位得證一位發心皆是其頓也此經正宗即攝入流通分即出生彼經云正波羅提木叉毗尼出家受具足為大乘故說即攝入摩訶衍者流出四乘即是出生也言古有釋言等者化度云自西方三藏及此方先德立教不同有多判釋若據真理體未必即然今且略敘魏之時菩提留支三藏一代時教跡不同唯立一時教如維摩經說佛以一音演說法眾生隨類各得解如此經說一相一味眾生聞我法者隨力所受華嚴經言如來以一語言中演說無邊契經海若約得佛語隨陀羅尼一言音中含多言音即許一言異類各解二宋朝北京曇無懺三藏云如來之教有其二種一半教即小乘法謂人空理智二滿教即大乘法謂二空理智三梁朝真諦立三時教一轉法輪即四諦法輪從初成道七年已還即說阿含等二照法輪七年已後三十八年已來說般若是三持法輪三十八年後涅槃已來說解深密等是四隨朝笈多三藏立四時教一四諦之教即小乘經二無相大乘即般若經三法相大乘楞伽經等是四觀行大乘即華嚴經明四十二賢聖位五唐朝波頗三藏立五時教一四諦教二無相大乘三觀行大乘四安樂大乘即涅槃經說常樂我淨等是五守護大乘即大集經佛遣諸神守護國土等是六天台智者大師立四時教一三藏教即小乘三藏等是二別教大乘即空有三通教大乘如此經昔日為三乘說不論大小即如此經取二萬佛所我昔教汝及遣傍人等并十六子等是四圓教即此經今時所說如經正直捨方便但說無上道言古有釋等者即是晉朝劉虬字遺民捨官隱居武都山將如來一代時教總判為五時言提謂等者路相傳說䓗嶺東高昌國人云䓗嶺東碎葉國人穿竭陀國過南海採寶有一商主號提波利即疏中提謂也與五百價人南海採寶却還路遊摩竭陀國過去上茅宮城六十里近伽耶城忽然雲霧黃塵四起與天連雷雨卒起時提謂等不知何事有此不祥時有二人善卜乃知是樹神所遂將蜜而住求祭其樹神知來即化作一人路逢長者因即問曰今者何往長者答曰我等遇難卜是樹神方欲奠祭其一人言我是樹神長者問言何故作此不祥樹答言此非我作汝等須祭奠現有迦毗羅國淨飯王太子捨國出家行苦行六年日食麻麥今在我菩提樹下成等正覺號曰佛向所變現是佛所為非我所作也樹神告曰佛於此成道汝須供養長者尋聲來而至佛所禮拜讚嘆曰容顏甚奇特猶若鑄金山未審誰家子種族是何人未知何所證因何此處居不食米幾日不知何所須世尊報曰我是轉輪聖王帝族中子猒俗如涕唾出家證菩提我是法輪王三界中第一成道來七日無人施我食爾時提謂等即奉蜜供養世尊世尊受之即與授記汝於來世當得作佛號曰齊成爾時長者因即請佛歸國供養佛受請但剪爪剃髮令將歸供養提謂等因請供養之儀佛為疊三衣大小次第重疊計衣有三重又覆鉢盂在堅上又鍚杖在鉢盂上令似浮圖形因此有塔也提謂長者既受教已即便懺悔請佛受三歸五戒提謂經一卷者是真兩卷者是偽彼經云佛告提謂現在有佛未來有法僧當歸佛法僧寶歸者依憑救濟之義能歸依即清淨三業信慚愧為體所歸是佛法僧寶境魔外道一切鬼神非可歸依設歸依者增長邪見能令眾生輪迴惡趣恒受苦惱不如歸依佛僧寶偈云諸有歸依佛終不墮惡道捨此人中形受天清淨身俱舍云歸依成佛僧無學二種法及涅槃寂滅是說具三歸眾生苦所歸多歸依諸仙國菀及藂林孤樹制多等此歸依勝此歸依非真不由此歸依而解脫生死諸歸依於佛及歸依法僧於四聖諦中應以慧觀察觀察知苦集能永超眾苦修八聖道支趣安隱涅槃此歸依最尊此歸依最勝必由此歸依而解脫生死出曜經云若有眾生成正覺若有供養經劫數微飲食床臥具等塗香雜香及名華若有一人叉十指專心自歸依一如來自口發言南無佛是功德為最上問歸依佛法僧有何功德答如善生優婆塞經說若人能受三皈依者當知是人所得果報不可窮盡善男子如伽陵伽國有七寶藏號賓伽羅其國人民大小男女於七日七月七年常以車乘象馬駝驢擔負猶故不盡若有信心歸依三寶是人所得果報勝出彼藏所有珍寶又挍量功德經說假使四天下滿中盡是初果二三四果至辟支佛若有人將衣服飲食香華幡葢等物盡形供養不如有人受三歸五戒所得功德百分千分百千萬億分不及其一又歸依佛法僧不墮地獄餓鬼畜生問何不與提謂受餘戒先受五戒耶答一者易持二者難犯問何不制綺語等三唯制妄語答佛為俗人說此五戒俗中富者畜妻子女人之心數起嗔垢若制兩舌即家事不成故不制也又俗人居家資生活業恐事不辦惡須嗔呵又不制綺語者安慰在下等前四是性第五是遮戒即是不飲酒五戒難犯易持不同八戒八戒事須全持五戒持一二三總得十善者一不煞不盜不婬身三也語有四不妄言綺語惡口兩舌意三者不貪不嗔不邪見是名十善也五戒不制自妻自夫女人不制自夫丈夫不制自妻五戒制邪婬八戒制染欲緣是一日一夜隨佛出家自妻自夫皆制也言世間因果等者有漏名世間世間因世間果五戒是南三洲因十善是北洲六欲天因若聞思二慧修十善感北洲六欲天果若修慧修十善感上二界果言第二時有行之教等者如來未出世時凡夫外道執五薀為我有主宰自在如來出世便說無我一切法中皆無有我唯有三科法教觀薀處界作無我行相聲聞之人遂悟我空我空即生空便與破我了遂起法執執三科法兼如來身上亦執為有即是鹿薗轉四諦法輪本質四諦三乘人同行有行之教聲聞之人於五薀上觀四諦緣覺人於十二因緣上觀四諦菩薩人於三性三無性上觀四諦本質四諦是一三乘人觀諦行行取果不同聲聞人觀三科是有緣覺人觀十二因緣是有菩薩人依三性觀有問菩薩若第二時中執有應不斷法執耶答菩薩執有與二乘別二乘執有實有菩薩執有似有之有二乘執有識外有聲聞執有心亦有境亦有菩薩執有依識而有離識之外無也問佛第一時說有第二時說空何故劉虬第二時說有答若佛說三乘對破即將空破有劉虬但是依教文判亦不解於中意有二義一攝釋云總對三乘而說於有三乘之人聞四諦教時自各悟解修行觀行差別故名三乘同行有行之教二有云不必別有三乘之人只不定性人一个身中具有三乘性悟解有教之時亦得名為三乘同行有行之教不必別有三乘之人攝破云此後解違般若經云初轉法輪三乘得益各各不同如何言非別有三乘之人行行耶又約佛說同故名同也本質四諦是同故問解深密經唯為發趣求聲聞乘者以四諦相轉正法輪唯說聲聞不說三乘答深密經約正為說唯約本質說般若經約兼正說故不相違也言說彼三乘同行等者攝云對彼三乘總相說空三根悟異聲聞作我空行相菩薩雙作二空有說第三時中二乘之人聞般若經亦作空觀若不作法空第三時立第二時無增無進義定性聲聞作生空不定性聲聞證悟法空如須菩提悟解般若若依此解不當一則雜亂他種性道理二者若聲聞人還作法空觀行則與菩薩不別也設許須菩提悟解法空但是佛加被不說修行又云但念空無相無作於菩薩法不生一念好樂之心故知二乘人第三時中亦作生空觀也若爾勝劣何別答二乘人第二時中依三科法上作我空觀行第三時依無我上作我空觀漸勝也故知第一時中破我說有第二時中破有說空也第三時不空不有道理不相雜亂問劉虬所判阿含為有教般若為空教何所相違答覺愛但責依時分判教有乖不言彼經非空有教言第四時等者賀云四十年中說法華經雖明一乘猶未分明演說涅槃常住實相尚說無常等以為真實即是此經與三根聲聞授記壽量分齊即是無常言以前未明一乘者指未說法華經無量義經已前也若說法華無量義名正說分明說言由未分明者如下說開示悟入菩提涅槃壽量品中說三佛菩提等又云十方佛土中等云何言未分明又日月燈明佛說此經了於其中夜當入涅槃信知此經即是涅槃何得言未分明說性也言第五時等者依涅槃經說常住佛果吾今此身即是常身法身諸佛所師所謂法也又若說佛身是無常者是人舌根何不墮落又言捨無常色獲得常色等言雙林有四雙故名雙林東西南北各二若娑羅林是梵語此言堅固林在佛頭邊足邊也言乍觀可爾等者疏主順菩提留支破處故言乍觀可爾論一往乍觀居十二往判教大相似第一時世間因果第二時作三乘同行有行之教亦大相似此乍觀可爾縱也言理即不然者奪也若子細推尋即不然二云乍觀可爾許菩提留支破劉虬立五時教理即不然兼破菩提留支自立二時教依楞伽經立頓漸教依涅槃經立半滿教若依經實有頓漸半滿若依文定判理即不然居士所判引佛成道後三七日內唯說世間因果教如何三七日內盡是受記成佛事得無學果十地得益等故言理即不然言提謂經說等者破第一時也懺悔者唐梵雙說梵云懺摩此云悔過明記前非曰懺除生猒患曰悔緣佛為提謂等欲受五戒先令懺悔彼身中惡業等罪言五逆者且三乘通逆一者煞父二者煞母三者煞阿羅漢四者破和合僧五者出佛身血並是大乘一逆大乘五逆者一破塔壞寺梵燒經像等如下疏自說十惡者煞盜婬欲妄語綺語惡口兩舌貪嗔邪見是言謗法等罪者攝問佛適成道法輪未轉如何有謗法之𠍴耶答罪通三世不妨過去曾謗佛示令懺悔懺悔有四一伏現行在地前伏貪嗔等不善三業不令起現行二斷種子聖道起時斷彼種盡現行不生三損因今因懺悔本識中惡業種子勢力劣弱不能感果四損果今因懺悔損彼後果永更不生入初地時二盡皆伏得於初禪未至根本名伏現也言四大本淨者大論四義解大一所依大一切所造色皆依此故四大為能造四塵為所造今能造四大與一切所造色為所依名所依大二體大地水火風名體大也三形相大眼所見者四作用大地能生長萬物火灾壞至初禪水壞二禪風壞三禪能至三禪名作用大也言本淨者攝云悟四大本唯真如理離彼妄執故名本淨又傳三解一四大本是白淨無記法令能緣心與貪等煩惱相應緣四大今彼四大成所緣轉不能清淨今斷却能緣貪心相應煩惱所緣四大向上離轉名四大本淨二由造得地獄業所感四大五薀六塵之果名為不淨由懺悔已惡業自消不受彼果名本淨三云四大本即是因淨本因即是惑業二種惑業為四大本由懺悔已惑業自淨不招惡果名本淨攝釋引覺愛難五時教引提謂經云四大本無乃至六塵本無不言本淨據也攝意唯取真如理為正悟法空理四大本淨悟生空理五我本淨也即此中四種淨初三明法空第四明生空也既說二空即本淨即入初地證遍行真如也言五薀本淨者未懺悔時執五薀為我懺悔已後知薀中無我及我所皆是空故言五陰本淨言六塵本淨者六塵是所緣境也能緣心是本未懺悔時於六塵境上心緣執著不了是空令彼六塵成所緣縛懺悔已後能緣心上離著故名六塵本淨言吾我本淨者准對法論五種一身具我事身謂五根具五塵此執色薀為我二受用我事此執受薀為我三言說我事此執總薀四造作一切法非法我事此執行薀五彼所依止我自體事此執識薀此五我見為諸惑本既懺悔已我見不起故言五我本淨若作吾我終乖經本故不錄也言時提謂等者此下七類益中第三小乘益餘並是大乘益不起法忍者即無生法忍也舊經云不起新經云無生忍也仁王經說五忍法門一伏忍伏者折伏煩惱名伏忍地前三十心不取十信十信是忍方便未是正伏忍約於三賢分三品故在於地前能伏印故二信忍初二三地得四不壞信相同世間故起信行施以修戒也修施戒等由信起故此亦分三品三順二乘故在四五六地相同二乘出世間修菩提分法觀等亦分三品四無生忍在七八九地三無生忍皆相續故長時任運觀無相理故五寂滅忍由證寂滅理得寂滅名三品修下品忍在十地中品忍在等覺上品在妙覺位名三品也問提謂所得是何位不起忍答不起有三一證不起即初地二相續不起即在八地三圓滿不起即佛位也今提謂初得無生故在初地也無生忍有三種一本性無生二自然無生三惑苦無生是境遍計性上相無性為境依他起上無自然生性為境圓成性上無惑苦為境法者有二義一證無生之教名法二者即真如理名法忍者智也一有漏無漏地前加行位智忍通印無生教法及境名無生法忍也若無漏智忍即通本後二智唯印無生理名無生法忍無生法之忍也言三百賈人等者問准佛地經言順忍唯第六地中何故仁王柔順忍通四五地答攝云仁王近遠總論佛地經唯約近說問何故仁王佛地柔字有無不定答闕具不同更無別義言柔順者調柔我見若若在剛強心起不得調柔我見永亡故名柔順此有四順一真俗相順根本智證真不違後得智達俗後智緣俗不違根本智證真名真俗相順二世出世相順菩薩加行作世善觀不違無漏出世善觀也作世善順出世故三者有無相順菩薩觀有不違於無若觀於無不違於有四者大小相順菩薩觀於大乘諦理不違於小正觀於大時亦觀於小又觀小時不違於大正觀小時亦觀於大故名順忍也言二百賈人等者須陀洹者此云預流預者入也既入小乘見道預聖之流唯此一位是小乘益也言四天等者亦即四五六地謂此三地調柔其心順二乘故名為柔順問何故四五六地菩薩行二乘行答相同二乘修二乘行俯順二乘名為柔順也言三百龍王等者有二釋一菩薩示現作龍王故得信忍在初二三地亦通地前位故龍王聞法深生敬信三寶四諦決定不疑也二若實者畜生趣中身得入聖便違一切經教華嚴經云阿耨達池大地菩薩為此地龍王出水濟瞻部洲人也言自餘天等者即十信已前發大乘心尚未入十信位也言十億天人等者十善有三一人天十善二二乘十善三菩薩十善為簡前二故言菩薩十善也就十信位中有上中下中下品十善作粟散王上品十善作鐵輪王餘十住十行十迴向如是次配銅銀金等也牟云十善該通世間出世間三乘聖眾若論十善本即一般據求趣心三種差別也言提謂長者滅等者三界苦即是後有分段之身分別業惑已亡永不招生名為惑苦受變易時滅分段苦受變易身智增菩薩初地滅分段苦悲增菩薩八地悲智平等者七地已前隨自意樂不起法忍初得在初地長時在七地相續在八地圓滿在佛地今疏中意依初得及相續說言或第八地者化度問何由提謂或云初地或云第八地耶答經中既言滅三界苦即是出分段死入變易生經中緣無悲智二言故置或也若是智增初地悲增八地故言或也牟云前已明得不起法忍此何再言答前兼諸人此中獨舉本所為故成差別也言又普曜經等者於十方界各各在一國一時成佛號曰齊成非是同處齊成覺道號曰齊成若依四分律以蜜上佛號曰蜜成問將蜜供佛即名蜜成將供於佛何不名佛故知不可章敬云齊成但是佛號未必俱時成佛如四分律號曰蜜成問前文云三百價人得柔順忍二百人得須陀洹果據文意即合三百人得成佛二百不得何故總言一時成佛答二百人若是定性者即合但與三百人記今二百人皆是不定性人故言五百盡得成佛言云何但言等者菩提留支難云居士所引第一時三七日內唯說人天教不是出世善根故者上來所引文盡是出世善根經文不定是人天教也故知居士年代判教大錯言但為此日等者劉虬反問云既三七日內說有出世善根益者何故不名轉法輪答疏言但為此日等法輪有二一者通行法輪二者別行法輪若約通行法輪鹿野菀中三七日外方轉也若別行法輪也問鹿園已前說十地經及提謂經等如何不名轉於法輪答凡所說法皆是法輪當知此時不必作四諦等方入見道但為此日未分明說此是苦此是集等示相勸修等三周十二行相故不名法輪問何以知三七日內不轉通行法輪答緣三七日未分明說三乘人同觀四諦所以未明轉法輪破第一時了言次第二時十二等者此牒前劉虬第二時十二年中如來唯說有教今欲破之故先牒來也居士所引三七日外十二年中唯說有教不說空教者何故成道後五年說大般若正是空教言八菩薩者一䟦陀和菩薩二羅隣竭菩薩三摩訶須薩和菩薩四喬曰兜菩薩五那羅達菩薩六須彌應教深菩薩七日坻達菩薩八和須調菩薩言般舟三昧等者長房錄云此經兩卷正明眾生五薀本空又有解云般者般運舟者舟船般運眾生同生西方名般舟此解非也此經三卷翻於晉代武帝大始年中長安青龍寺竺法護譯唐言行定也無始頑心至今未曉故䇿使經行攝緣靜亂塵識不起萬境自亡諸佛前立還息自心故彼經云此經名十方現在佛前立定經欲學行定無問溫涼隨力修習一日一月乃至盡形文舉三月不簡春冬今人所行多依夏月問以何得知彼經說空答彼經中云有八菩薩各與二萬八千人俱爾時䟦陀和菩薩問世尊言菩薩當作何等三昧得智慧如大海如須彌山佛云有一行法菩薩常當修習受持守護諸功德中最為第一此法行者名現在諸佛悉在前三昧能安天下具足佛種乃至故知一切法空無所有得亦不喜失亦不壞憂一切諸法無我我所學是行者佛之子孫故知說五薀空如何第二時唯說有教言又第九年說鴦等者此云指鬘輔相之子力歒千人斬千人手而取一指以為鬘飾彼經中亦說空故言又第十年等者勝義空也言又提謂普曜等賀云如上諸教皆說大乘若因若果菩提涅槃性相空理如何第二時唯言三乘有行之教言一生補處等者補者替也問兜率天中一生補處菩薩多少答有教說有五百菩薩正量部說在彼天中傳化作佛皆是一生補處問彌勒菩薩可言補處如何餘者稱補處耶答智論第七云除彌勒菩薩外餘菩薩眾雖非此方補處於十方補替佛處故多補處於理何妨問釋迦唯是小化身收但今三乘異生地前漸漸勝進云何能令初地等聖漸至補處答同處見異亦通他受用縱有登地菩薩於理何妨若唯小乘意雖有多菩薩但是相承次第成佛非是十方一時出不爾違小乘宗計言一生者天上一生人間一生合此二生名為一大生也言云何乃言等者云何居士判十二年中唯說有教耶菩提留支難劉虬居士依年判教故知不是也覺愛難了言是知一雨等者劉虬反問云既依年限判又不許又說人天教時妨出世又說有之時不妨說空說中道等未審三藏自家如何立教疏答云是知一雨普潤等此是三藏自立一時教也菩提留支意約說本來無三乘五乘唯是一般教佛以一音演說法眾生隨類各得解又如末尼珠珠無分別隨所求者雨於七寶如天皷無垢私成自事留支立理約此教文也天雨是一更無兩般由草木各自稟潤差別如來說法教無大乘小乘人天乘唯是一般也但是眾生三乘五乘根性不同稟解如來教各自得果令教有其差別也此上菩提留支皆於如來教上說也若約疏主義則不如此將教對眾生根論根三教亦三根一教亦一也疏主正義也敘古義了言今依古義等者疏三斷也即菩提留支義名古義也且上破二時即劉虬五時中二時也自餘三時並如古破餘三時在菩提留支別傳也此中只敘二時不敘餘二時也言事雖可爾等者疏主縱也許菩提留支破劉虬五時教名可爾理即不然名奪也不許留支立一時教也二云事雖可爾許留支破五時教理即不然兼破留支不許立一時教也言恐厭文繁等者依楞伽經立頓漸教依涅槃立半滿教若依二經不妨實有頓漸半滿教若依文定判理即不然問既理不然疏主何不破留支一時二時答疏主恐厭文繁且略應止破古了言依今新經等者即勝鬘經中四乘中一乘證頓教也唐三藏所譯名新經也言頓教大乘等者若依大乘根不從小入教被唯一即留支立一時教可然若下小有從小說向大根能被之教名漸教則菩提留支義闕一邊也疏主說頓說漸皆依根也不同留支唯向如來本質教上說一時教又不同劉虬依年月判也但說有處為第一時說空處為第二時空有雙說為第三時也上依根立頓漸了也言漸次大教等者此是述漸即有三時自淺至深故名為漸也言解深密經中等者深密第二卷說世尊先為涅德本菩薩說三性義次為彼勝義生菩薩說三無性義總而言之者總為諸有情迷於三性執為實有由是世尊依於三性說三無性破彼迷情無令執有若執三性為實有者皆是遍計所執性為破於此說三無性其三無性約三性立今且略辨三種性也經云諸法性略有三種一者遍計性三者依他起性三者圓成實且初性者遍謂周遍計謂計度周遍計度故立遍計名破顯此初性本無自體用由能遍計虗妄心故遂有種種所執相現若束一處著遍計性我法二執假有實無若散居三性向上妄情執有相分是無猶如空華空中本無華妄情見有華又如繩中麻麻體不無向上作蛇解妄情執有依他法體不無向上執我法即無也一者能遍計護法云六七二識執我執法者是能遍計若安慧宗八識識心皆能遍計也二所遍計者攝大乘云是依他法與遍計等為所緣緣故圓成實性真非妄執所緣境故依展轉說亦所遍計也次依他起性者依謂依因他即他緣起謂生起由顯此相無自功能但依他緣而得起故攝大乘云從自熏習種子所生依託他緣而得起故後圓成實性者圓即圓滿成即成就實即真實故唯識論云二空所顯圓滿成就諸法實性名圓成實性次為勝義生菩薩說三無性者若言三性總是有遍計性情上說有依他圓成理上說有若言三性總是無遍計性理上說無依他圓成性對情說無今依第三時皆約理說然由有情迷於三性執為實有世尊所以於三性說三無性不令有執也自古已來兩宗說三無性一者一性宗依真如向上說三無性二者五性宗依三性向上說三無性第一且依真如者一遍計性相無自性性問何名遍計性答能緣心故所緣境所緣境為所慮所託兩顯是依他性兩楹中間妄情執有之相分如空華空中本無華妄情見有華今此說我法二執相分舉體是無如菟角如繩中麻麻體不無向上作蛇解妄情執有也依他法體不無向上執我法元來無我我所所以道遍計性相無自性性也性是體義意道遍計性體性是無所以喚作遍計相無自性只緣以彼遍計性相無自性為門向上達得真空之性是向下第二性字未達遍計是無之時由自迷覆真空之性由達彼遍計我法二執相狀舉體是無向遍計性無處向下悟得真空之性是第二性字所以言相無自性性向上性字指遍計是無無向下性字指真如是有也次依他起性生無自性性依他起性心法四緣生四緣若闕依他起性即不生意道依他法上無自然生性唯有從緣生性今依他起性向上無自然生性為門向下顯得真如理為第二性字無自然生處顯得真如理故云生無自性性三圓成實性勝義無自性性若執圓成有還遍計無若向真如向上執有是增益謗執無是損減謗亦意亦無相違執有之性無處顯離凝然之性故言勝義無自性性次依五性宗三性向上說三無性一者遍計性相無自性性上性遮無下性表有言遍計性相無自性性生無自性性勝義無自性性相無自性性性者體是無也重言性字者有彼空性空性不無也依地起性生無自性性向上性字遮無無自然生性向下重言性字者表有有從緣生性三圓成實性勝義無自性性向上性字遮無無所執之性字表有離執之性論云如有愚夫於彼增益妄執我法實有自性為除此執第一時中世尊說法且教破我存其法體所以說三性是有此是隱密說所言有者但有依他圓成不說有遍計第二時中破法執故三性向上若有若無皆說為空也所言空者但空遍計不空依圓為有法執恐不能斷所以一向說空因此便眾生一向執空世尊道乍可執有如須彌不可執空如芥子雖除有病空執仍存所以第三時中說非空非有亦空亦有中道也顯了說三性非空非有者非空則非第二時空非有者則非第一時有亦空空遍計亦有有依圓言於三性說三無性等者遍計性遍後二性故言皆是皆是遍計所執性以論頌云即依此三性立彼三無性故佛密意說一切法無性由此故知說三無性但空遍計非遣餘故言皆是遍計所執也又通說三性三皆是有亦皆是無遍計情有依圓理有故三皆有三皆是無遍計理無依圓情無故皆是無若據顯相說遍計是無依圓是有皆依理說不據情論雖空後二但無情故雖在第一但有情故皆非所取空有理成言毗濕縛藥等者梵語此云足功能藥形如馬耳亦以乾薑此喻意於諸丸藥散之中若置此藥居中一切諸藥悉有功能四十年前空教有教如諸餘一切藥第三時教如毗濕縛藥第一時有教第二時空教眾生聞著雖亦能斷惡修善由自成不了義安第三時不空不有教總成了義被第三時顯有教說說道有為名為有令第一時有教成了達義有被第三時總顯了空教說云我及我所說為空令第二時空教亦成了義空未說第三時教元來初二時奄含空有也故言遍安諸教喻言雜彩𦘕地者能顯正理喻雜彩喻空有𦘕地喻第三時教如𦘕地與雜彩為所依𦘕地能遍於雜彩不能遍𦘕地𦘕地一則能與雜彩為依二則能影發於雜彩令眾色分暉第三時教一則能與前第一時第二時空有教為所依二則兼能會前二時奄含空有悉成了義且如欲𦘕皆須白色粉壁方向上𦘕諸像等今第三時教如粉壁空有如諸像南解言熟蘇等者令發勝味喻相國云眾味雖善點熟蘇而轉住空有二途猶第三時圓宗而顯理如涅槃經人天乘如乳第一時教如酪第二時空教如蘇法華經如熟蘇涅槃經如醍醐今取熟蘇為喻能調和諸味故空有教如諸飯食熟蘇調和雜味第三時教能和會空有也言虗空者不障修行喻一切色像皆於中造若有障礙無所造作也今第三時教猶若虗空前之二時如有障礙說有之時即礙空說空之時即礙有今第三時空有雙說猶若虗空化度云虗空者遍一切處皆同一味不障一切所作事業世尊依此所說三性之法皆無自性皆同一味不相障礙令彼法空所有道理分明顯現此中意言道理既如虗空不障礙彼一切二乘及諸菩薩所修事業上說四般喻者皆約總別總則三性別即諸教謂三時教初密說有教但有依圓不說遍計亦言是有即四阿含等經是次密說空教但空遍計不言依圓亦是空也即諸部般若經是後顯說非空非有教者非有即遍計所執非空即依他圓成即法華等經是言世尊讚嘆等者則云述成也經云爾時世尊嘆勝義生菩薩曰善哉善男子汝今乃能善解如來所說甚深密義復於此義善作譬喻所謂世間毗濕縛藥雜彩𦘕地熟蘇虗空勝義生如是如是更無有異如是如是汝應受持言勝義生等明說處也此是國城名河神也此城近河因以為名又云婆羅是初小義痆斯是住義義無相當故不翻之有說名縛象國此國多有野象欲取之時誘令入狹將繩縛取調之名縛象國言仙人墮處等者婆娑云昔有王將諸彩女在園遊觀有五百仙人乘空而度見王采女聞歌管聲忽起染心便失神通如折翼鳥不能冲天因立名焉真諦記云第一時於波羅奈鹿園仙人集處此處有三德故三種人恒集一者林枝葉茂盛遮其風雨華芬𧄦落地莊嚴地二水水具其五德輕冷柔香美三德地一切鳥獸皆來集聚飲食無畏又此地有大寶藏廣四十里深四十里又云一生補處菩薩將欲下生有天子閻浮告辟支佛言仁者應捨此土十二年後當有菩薩降神入胎爾時五百辟支佛聞天子語已從座而起踊在虗空高七多羅樹化火焚身入般涅槃唯有舍利從空而下名仙人墮處言施鹿林等者昔有國王名梵摩達多以林施與群鹿名施鹿林如法輪章說
