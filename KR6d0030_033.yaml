body:
  text: 鏡水沙門栖復集言但遍三界等者問於何處作此觀行答但遍三界五趣四生皆作是觀行境也上句經了言從二障倒者則解經從顛生故說智雖不發業與煩惱為依亦名從二障倒生言或四七倒者且四倒者凡夫之人妄執為常樂我淨無常之處計常無樂處計為樂無我之處計為我不淨之處計為淨故名四倒也七倒者一想倒於常樂我淨向上妄想分別名為想倒二見倒者於妄想所分別忍可樂欲建立執著故名見倒三心倒者於前執著決定境上起貪等煩惱名心倒并常樂我淨成七倒也問想倒與常樂我淨四倒何別答於境中起此妄想分別心名想倒即於妄想所分別中忍可樂欲建立執著是名想倒此染慧為體也於所執著貪等煩惱名為心倒心倒通諸惑及心王就煩惱中復有三倒一者倒根本所謂無明二者倒自性謂薩迦耶等三者倒等流謂邪見及邊執見一分恚慢及癡是名心倒言或心亂倒者謂有漏法迷於內心令心惑亂顛倒而生名心亂倒也問此與前心倒何別答此與前心倒是不善有覆此說心亂體通三性通有漏無漏故說為有非真實有深生猒捨也言仁王經言等者因此經中說顛倒疏主廣引妄幻法成證起者不實義也幻者如手巾為兔譬如等者虗空本無華患眼見有華如影實皆無者影者不實義因緣故誑有者虗誑而有故言誑有也言攝論亦云等者此經中但以因緣有從顛倒生故亂想及亂體者相者相分也則五塵境攝釋云相者因也能生識故也亂體者能緣心體是妄倒之體名為亂體言應許為色識者第二句結前亂相同色不是識識不是色如何言色識答色從識變能牽生於識不離識故名為色識言及與非色識者第三句結前亂體即是能緣心也言若無餘亦無者第四句雙結二句若無二字結所變亂相無也餘亦無者結前能緣心亂體亦無也要有其因果方有故但逢著俗境應作是觀言或此釋伏難等者難意者若此真空性離言者何須經說作真空觀耶境既無何須觀也若言真空不空者如何復言言語道斷也言由待從彼顛倒等者疏答也待者則對待妄法妄法妄有且說為空只此空體亦非是有空亦空故言中論頌等者若有所不空者此是有法應當有所空者能對治空法也所空不可得者所對治有法此言有法妄說為有舉體無本來是空只此所空法法不可得故言所空不可得何況得於空所對治法舉體是無何況能對治灼然是空豈更是有耶意言第一句言若有所不空者則因真如第二句言應當有所空者此真空體在第三句所空不可得者牒前第二句所空真相既不可第四句何況得於空何有能得之所心能皆遣意證真體亦空便同無為無有實不起似空華此上百論宗言又有解云等者依中道宗待妄等言真理名空空之性故因空所顯故言待妄真體非空若言空論何法若無所論凡聖何別何要修行故不可言真理亦空故言非空定空故從詮說言待因緣者因緣則詮也但除其病故即遣妄而不除法則存真也即淨分依他及圓成而不除也言贊曰下頌二處者長行初說空有觀名行處後明十惡緣外人境法境是親近處今此頌文雙述長行行處近處兩文故名下頌二處言初十三頌半頌外人境等者則是行處近處言有法者則是長行行處中有觀經言住忍辱地柔和善順等是其行處中兼說空觀此十三行頌中述長行有觀故名有法有法即有觀又述長行初觀中人境行處中有觀近中人境今此雙述故言有法二處也言次二頌半頌初內有空二法行處者有云疏中剩此有字只合言空法行處但是疏主總相引空有科文名曰因據實道理實剩有字也緣此二頌半只頌長行行處中空觀也其有觀遍在前十三行半中述也言長行中初說行處者經言若菩薩摩訶薩住忍辱地柔和等言初離外妄有者十種惡緣也即是經言不親近國王王子等言後觀外真空者經言復次菩薩摩訶薩觀一切法空如實相不顛倒等云云今頌先說近處後論行處言今頌初離外妄親近處者經言常離國王及國王子等云云言次方明內行處者經言又復不行上中下法等云云言後頌外真法等者頌云一切諸法空無所有常住等長行與頌顛倒不同也言乍觀文勢等者重商量十三行半頌文中述長行有觀也其空觀文或述不述却不定也問既若重商量不定疏主何故早已科出言有法二處答疏主前據十三半最後結文云是則名為行處近處以此二處能安樂說觀此經文有行處近處字二事雙結所以於十三行半中間科兩偈述長行行處之中有觀此是疏主准結文科了次下疏主再讀行處之中有觀偈文細尋看總不述有觀經文文意不相似正與長行不離文同究竟述長行不離文也疏主准經文既不相當然後別作道理科合述長行中有觀也由持經菩薩最初出行處中修有觀成就得住忍辱地柔和善順等方能出持經菩薩始能無所畏心不懷希望而為說法據此道理實述有觀又亦與長行有觀中心亦不驚一句文勢相似言故文雖雙舉等者只緣結文所以雙舉行處近處也言實唯近處者商量此兩行頌述長行不離文唯述近中不離處文兼不述長行行處文言不頌散亂者則年少子也言一頌半頌離四緣者長行云一損害緣不親近國王王子大臣官長四惡見緣不親近外道梵志尼乾子等及造世俗文筆讚詠外書及路伽耶陀逆路伽耶陀者二壞亂緣亦不親近諸有凶戲相扠相撲等三惡業緣又不親近旃陀羅及畜猪羊雞狗等今頌云常離國王等三句經述損害緣凶險戲者一句經述壞亂緣及旃陀羅一句述惡業緣外道梵志一句述惡見緣言後三頌離一緣者長行經言又不親近求聲聞比丘比丘尼優婆塞優婆夷亦不問訊若於房中若經行處若在講堂中不共住止今頌述云亦不親近增上慢人為一段從貪著小乘至羅漢為一段言三藏即小乘三藏三藏之文通大小乘有禪師不解便言不得親近三藏學人吞舟之魚蕩而失水則為螻蟻所食如是聖教不逢正外便被愚人枉傳經言破戒此丘名字羅漢此文顛倒令道名字羅漢是破戒比丘心裏元來知不是羅漢詐稱羅漢如大天等便是犯大妄語戒比丘不同增上慢人得四禪定計為四沙門果此但是錯罪過極也此是凡夫比丘也經言及比丘尼至五欲為一段好戲笑而著五欲為緣也經言求現滅度至親近為一段求現滅度則發二乘心也在家優婆姨中兼有在家優婆塞此偈之中具四衆也言前開後合者則是前長行廣說名開偈文略說名合仍不依次第也言不離也者此一唱經文正是前來商量或述有觀或不有觀個此間本文述長行不離也長行經言如是人等或時來者則為說法無所希望今頌云若是人等以好心來等言一頌長染非器二緣者長行經云又文殊師利菩薩摩訶薩不應於女人身取能生欲想相而為說法亦不樂見若入他家不與小女處女寡女等共語非器緣長行經云亦復不近五種不男之人以為親厚今頌云寡女處女等一行是言二頌重頌等者前唱已述後唱又明故言重頌也魁膾者魁首𮨇也斫人中主首也膾者割也今取能割者名膾不取所割也言行賣者解衒賣也自媒豸稱揚身取錢也禮云男女非有行媒則不相知問即與他行嫁何名自媒答自分為媒也言重頌壞亂長染者凶險相撲種種嬉戲二句述壞亂下二句諸淫女等盡勿親近述長染也言一頌頌非軌者長行經言若為女人說法不露齒笑不現臆乃至為法猶不親厚況復餘事今偈云莫獨屏處等一行是言屏音必郢反障蔽也言一頌譏訶緣者長行經言不獨入他家若有因緣須獨入時但一心念佛今頌云入里乞食等一行是里者古時名里今時名坊也文章亦作里用也二十五家相續居住可古得一里也名里也言乞食法有十三者緣經中有乞食言疏主引文廣說乞食功能也一者住正戒不得破戒二住正威儀者不得掉臂誹行入白衣家三正命者四住正見亦簡邪見五依法者不得捨富從貧乞六依時者不過中乞七依處者不得淫女屠兒家等八依次不得越餘家九離貪不得已少求多已粗求細等十離取著者不得此是彼非十一離瞋惱不於彼此而生瞋十二離粗礦者不為財色高聲罵詈十三離憍慢者從他乞食心須謙下不得倨傲輕他自高受者施者各成者問施者可成六度受者如何亦成答受施之人隨順六度亦得名成也簡要引集論云能行施者捨當來匱乏貪苦名捨受施之人捨見在匱乏貪苦亦得名捨也言如食矌野等者報恩經中說過去劫爾時有國號波羅奈有佛出世號毗婆尸佛像法中有王號羅闍王王有三子皆作邊國小王其王大臣名曰羅睺心懷惡逆斷大王命次向邊國已煞二子其第三子有守宮神而告之言羅睺大臣謀逆奪國已煞父王及二兄了不久將至何不避命去耶王聞思念欲投鄰國然路有二一七日一十四日到王則入宮命夫人及太子須闍提則出心意迷亂誤入十四日道糧食已盡擬煞妻以活其子子諫曰何處有子噉於母肉可乞一願願言割子肉三斤以䬸父母從願得達前所爾時王者今我父輸頭檀王是母者今摩耶太子者今我身是今引來意者非貪其味但活其命沙門受食但為修道支身不為貪味言又無垢稱等者迦葉住平等法應次乞食為不食故應行乞食為壞和合相故應取摶食言無所畏等者指中間兩行經述有觀名行處離惡緣名親近處此一行雙結文也言初頌法空等者此下二頌半述長行行處中空觀長行經言又復於法無所行而觀諸法實相空觀也今頌中初一頌法空後一頌半生空行者執著義又復不執著上品法中下法有為無為法前疏言此頌有空法行處准路府實剩有字但是總相引科文也不唯說空處如何有有字前說二處者則指十三頌半名前說前說二處則行處近處即有觀也指前初科兩行作有觀已向前科至有觀了所以此間但述空觀更不頌住忍辱等有觀也言五頌半頌外真法者則述行處親近處中外真法境問人真法總名外二種何別答人境對十種外緣名外法境心外名也言初一頌半十八句中生法二空者簡要問云十八句中不說生空唯有法空文如何今言生空前答長行云觀一切法空一切法空中文寬通生空法空也又觀空既離二執合有人法二空所以疏科初一頌半述十八句中生法空也經言一切諸法空無所有二句標空法也經言無有常住已下顯空差別也經言一切諸法一句則三性法也下之三句約三無性以辨於空且空無所有遍計性也無有常住離執無為法也亦無起滅離執有為法也名清辨宗此三法真諦門中皆說空故金云頗有一法非有為耶答依三性中說故可有也且遍計性我法非是有為亦非無為故善戒經言有為無為名為有我及我所說為空二依他性三乘無漏亦是俱無故集論三云無取無薀非業煩惱所為不應言有為以方便力隨得現前則得現前欲不現則不現前如入滅定不應言無為無為常住彼不亦故三依圓成攝論九云法身無三為相故由業煩惱非所為故自在示現有為相故言次二頌如山心定者謨云有言初一頌經文唯舉所離之事但能離彼顛倒分別正見決定義同於山言亂頌餘句者文勢雜科不得故言亂述也經言觀一切法今頌經言皆無所有一句述長行如虗空無所有性經言無有堅固述長行實無所有經言常住一相則述長行如實相經言不生不出述長行非有為以顯真中不生不出經言不動不退述長行依常住以顯真中不動不退今此兩頌亂述十八句也餘殘句總是前三行半述言結也者此正身引文長行總有四處結標中言能為衆生演說是經是名菩薩行處是名菩薩初親近處是名第二親近處今頌中經言文殊師利是名等四處結然為總結也言此則初四者經言若口宣說等者一者不樂說人過二不樂說法過三者亦不輕慢法師十種法師也四者不說他人好惡長短問若毀他人及自讚則不得自毀及讚他人何妨答佛言亦不得故說他人好時形著惡人只如二人一處坐一人長七尺一人五尺對矬人前頭讚嘆長人真成罵他人自毀之時傍邊有人行相同者將為著臺罵他問不樂說人不說他人何別答不樂說人則是說經時讀經時不說人過也若不說他人好惡則是一切時中不說也言此離三過者經言於聲聞等者一者不稱名說聲聞人過惡二者亦不稱名讚嘆其美攝云般若五百八十八云諸菩薩若起心毀讚二乘應名毀犯菩薩淨戒所以者何若讚彼地便於彼地心生愛著不能趣求一切智智若毀彼地便於彼地心生輕慢則障所求一切智智是故菩薩於二乘地不應嘆毀此亦應爾言非但獨離等者問口業中過他無量何故只說離七惡答疏言非但等其實無量言二各以大乘者疏主體此經意制作之時多以大乘別外小乘也問根性若一唯答大乘根性既異如何唯答大乘耶答且順經宗作如是說約正語行故不言小若說小乘及成傍引言著新淨衣者以水洗浣令淨即得不必要染言正法華者爭得如是新淨不是新染答疏言正法華等言第四問答所論者經言若有難問至佛道者漸漸增益者則漸為說三賢十聖等法三性法故乃至四智三身尊言後一頌半第六示其所說者長行經言若口宣說若讀經時不樂說人及經典過亦不輕慢諸餘法師不說他人好惡長短等今頌云除懶墮等是言懶墮是放逸等者問懶墮與懈怠何別答王所別經言除懶墮意即心王也及懈怠想即心所也問放逸與懈怠何別答放逸故馳依六境懈怠所行不增長是二別也言後一頌半第八教安心想者佛交說法法師安心想說法之時受四事供養而於其中無所希望不貪名聞利養是名大利供養名安心想也所以經言但一心念說法因緣因緣者道理也言智度論云等者疏主廣引向下說法不求財利益文也言有頌言至不雨者第一解多聞辨慧如布雲美說法音如雷聲而於利益有希望譬如有雷而無雨無潤言博學多聞至不雨者雖有博學智慧譬如布雲也無巧便不解說法有雲雲中無雷又無雨三言不廣學問至小雲無雷雨者不廣學問如小雲無雷又不能說法如無雷不行妙行如不雨也四言多聞廣知至洪雨者多聞廣智美語言如布雲巧說諸法轉人心如有雲行法心正無所畏如大雲雷澍洪雨言法之大將等者菩薩多聞持學即是大將持法鏡言亦如蜂王集等者蜂王集衆華而成蜜法將集法以顯佛身也言得入旃檀林等者貪利心說法如入旃林取葉無貪利心說法如得旃檀木貴物貪利心說法如入寶山取水精賤物無貪利心求法說法如到寶山獲大寶珠貴珍異物也言意離諸惡自利行者此意乘行字去音言初行有三者即是初意業中一嫉妬等三也故言初行有三也言第二行不相非等者即是此一唱中語業也經云亦勿輕罵學佛道者求其長短此三句經文疏主科作語業故疏指經文云不相非即是不許互非斥也此但是疏主取意指經文文其陰密也問何故於意行中明語行耶答將語業顯意業也語業皆由意識發故前語行中又復不生怨嫌之心意成語今此意行中以語成意也言後二離惡一不惱他者經言無得惱之至懈怠者科為不惱他若語他人言汝等去道甚遠終不能得一切種智若向他人作如此說名惱他人佛教持經之人不作是語不得戲論經法及相諍言一無惱亂者由前受持讀誦經時無懷嫉妬諂誑之心亦勿輕罵學佛道者求其長短今於安樂果中得無能惱亂言二得善友者由前化比丘比丘尼等亦不戲論法諍競佛法不相是非今安樂果中得好同學言三得衆聽者由前三想故今安樂果中亦得大衆而來聽受言四轉入法者由前為一切衆生平等說法以順法故不多不少今安樂果中得所聽之人轉入法聽已能持持已能誦誦已能說說已能書言初離七惡者一嫉二恚三慢四諂五誑六邪僞心此六是所離惡法也七質直行是能離心也言頌離三過者一輕懱二戲論三疑悔𮆘者無也見人共相似也言於生修四行者一柔和二忍辱三慈悲四不生懈怠心也言初教慈悲者經言於在家人中生大慈者此是大乘種性衆主不怕怖生死不惡起悲與他拔苦但生慈心與佛果樂經言於非菩薩者即是闡提衆生及聲聞人雖有大乘種性未發心前名為非菩薩怖生死且起悲心與拔苦故言行法緣慈等者行平音觀衆生當情作五薀十二處十八界法想與說法華令得樂名法緣慈也言於非菩薩謂等者章敬云此是有種性者非無種性一闡提及定性聲聞也但是暫時斷善根及聲聞未發大心名非菩薩於闡提人見重煩惱拔三塗苦於二乘人拔生死苦經言若人遭苦猒老病死為說涅槃言其實慈等者問菩薩修行理合平等何故唯於菩薩人中行慈悲菩薩人中行悲答疏言其實等疏意且據增勝據實慈悲二行雙運也言華嚴經等者緣經文有大悲字故引華嚴經有十種大悲也一觀無所者觀一切衆生無所皈依者無父母莊園宅舍故救二隨逐耶道者念衆生逢惡友教隨逐耶道三貧無善根者無信進念定慧根也言行不善法者起十惡業故煞盜淫等言欲縛者欲界煩惱未伏未斷名欲縛言生死海者二種生死也言久遠長病者生死之病也言無欲善法者無樂欲三乘善法也言此初也者初念惛迷經言應作是念如是之人等者如是之人者即是在家出家及非菩薩也問何名大失答下出所以如來方便隨宜說隨宜說則是法華經如是之人不聞既不聞亦不知既不知亦不覺既不覺又不問設聞與說又不信既不信亦不外紀國云不聞者失聞慧不知者失思慧不覺者失修慧又不問者由失聞慧不信者由失思慧不外者由失修慧又不問者由無聞慧不信者由無思慧不外者由無修慧經言大失者路府云准經失字屬上則過失名失路外屬下即失却名失然下云不聞不知即失却名失疏外便重也抄云失屬下是總標不聞不知等別外於先此亦無爽何勞非疏若爾何故下頌經言斯等不聞不知等准此即是失字屬上過失義也答彼頌文中能失之法在上故失字屬上則是過失也今此長行所失屬下疏依所失外也言此念化導者經言其人雖不問不信不解是經者交持經行安樂行人念云我今劣為是凡夫教化他不得待我得阿耨菩提時彼人墮在何地我能化得也言後彼住於九地等者或九地欲界五趣危亡地并上八地或七地有說是七地四菩薩行之七地或七識住地或是凡夫地或聖人地或隨何方域地四洲也言初總標無失者外經無有過失過失即是離華怖也言此釋所由者經言所以者何釋前唱意有何來由聞者歡喜答經言此經是一切等言佛護者義深故佛護佛護故衆生有得得者得失之得得勝果也言初標勝妙者經言文殊師利是法華經於無量至讀誦者有人問杜順和尚云人間日日聞法華經何以言不可得聞答只是長安城中聞者多餘邊國四洲之中不聞經處大多況處六趣相比對耶言初喻法合昔授者法喻相合說也合字入聲言強力者無漏破有漏勝出生死故言強力也言如瑜伽說等者一金輪王登位四州諸國望風順化二銀輪王遣使方降三銅輪王烈陳振威便伏四鐵輪王自戰必勝法身喻金輪王望風順化者根本智向法身邊朝參相似自受用身如銀輪王遣使方降問如何是遣使方降答以他受用身為使如傳語人名遣使方降問他受用身自為輪王何得更為使者答第二云以法教為使者他受用身喻銅輪王王化不要征戰但自身到使降他受用身以神通教化菩薩菩薩自力斷惑不假佛力如銅輪王不用功也自然皈伏化身喻鐵輪王自身入陳用力方勝化身化二乘凡夫三十四心斷惑如王自用力戰也言諸等者惑斷惑伏皆名降伏也言衆魔拒逆喻者經言而諸小王不順其命者路云此據鐵輪王未起兵時為論而諸小王拒逆王化言三種魔類者簡要云分段變易故有三類且分段三者分段身上有漏五薀名薀魔分段身上將死正死已死名死魔煩惱名煩惱魔也言變易三魔者變易上五薀名薀魔變易上生死名死魔所知障名煩惱魔據實分段變易各三魔計六魔并分段變易之中各有天魔通上成八魔今總言煩惱魔薀魔死魔故名品類有二今疏中煩惱所知合言煩惱魔也變易分段有漏五薀合名薀魔二死合名死魔故名品類有三笄示現天魔等分段身分段身上破天魔不說示現多是實有也得阿羅漢降煩惱當來後有不續降薀死二魔他化自在天子二乘無學加功用行少分降得若長時究竟未能降得故不說降天魔也其變易身上天魔示現說有也破亦得設破示相破也言聖者伏除喻者輪王作念曰此是飛蛾投火蟷蜋拒轍經言時轉輪王等者此中疏意戰唯取凡夫有學及聖有學初二三果也不說無學之人功成名遂已罷罷戰唯待賞賜所以起兵討罰則二乘有學乃至受賞多魔早已除了得入無餘時更無無漏道別斷別證要身智滅時無餘位顯其實先得二者羅漢後邊五薀身上後有不續只於現苦依身亦名除也言非伏天魔者問如優波麴多繫三尸於魔頸則是能伏如何不說天魔耶答今約任運言不能伏非約加行也又疏主准下合經文合言與五薀魔煩惱魔死魔共戰等不說天魔故言不伏其實亦伏簡要云分段天魔要得神通方能除得又變易天魔示現而有故此不說若除三魔一切皆伏也言及所知障品等者牟云於此敘破魔章即同法菀七門分別一別名者一分段品魔二變易品魔分別魔既障二乘此品之中說破經言而諸魔王不肯順伏等也所知障魔既障菩薩亦是此中破也又或說三魔即指下合文與五薀魔煩惱死共戰或說四魔如瑜伽佛地一煩惱二薀三死四天魔或說八魔分段變易各有四故或涅槃經亦說八魔四魔上更加四例也或說十魔如雜藏中說頌曰欲憂愁飢渴愛睡眠怖畏疑毒及名利自高輕慢彼汝等軍如是一切無能破我智箭定力摧坯瓶投水二釋名者梵語具云魔羅障礙破壞善法故言魔羅此略云魔又云波卑夜此云惡者若別名天魔波旬波旬訛也若言魔破旬兩名雙舉也問何名兩名答惡魔即是魔羅云破壞也波旬即是波卑夜此云惡者故言兩名雙舉也言煩惱魔者煩者擾也惱者亂也有情常處生死薀魔者積聚名薀也死魔者將盡正盡已盡名死魔天魔者神用光潔名天也言十魔者可欣名欲心戚名憂愁悕求飲食名飢渴耽欲名愛令心昧略名睡眠有恐名怖畏猶預兩端名疑損惱身心名毒悕譽貪財名名利自舉凌他名高慢三出體者一依於有作安立四諦二乘異生淺境事立分段魔二於無作非安立四諦大乘異生微細境事立變易魔初通三乘後唯菩薩隨應能障三乘善事故名為魔言三魔體者牟云此偏約煩惱障中三魔而說准下合文唯是二乘先所破故一切見修煩惱障品名煩惱魔由惑所感五薀生住諸佛法名為薀魔依此五薀無常死沒將死正死死已滅相名為死魔欲界他化自在天子名天魔八魔體者根本煩惱及隨煩惱若現若種名煩惱魔即此所招有漏五薀名薀魔即此五薀報盡將死正死死已滅相名死魔第六他化自在天子并眷屬名分段身上天魔次變易四魔所知障種現習氣名變易煩惱魔變易生死五薀果名薀魔念念微細墮滅名死魔天魔者十地菩薩示現所為天魔無垢稱云作魔王者多是住不思議解脫菩薩鼓音王經云阿彌陀佛父名月上母名殊勝妙顏魔名無勝唯有龍象與龍象捔力非驢所堪故十地菩薩將成佛時豈有無魔敢為拒歒必所緣能生貪欲故說為欲魔憂愁即憂受飢渴即獨受諸貪愛五塵之貪睡眠即不定一也怖畏有五不活畏由分別我資生愛起二惡名畏行不饒益有怖望起三死畏由有我見失壞相起四惡趣畏不遇諸佛惡業所起五怯衆畏見己證劣他所起五種怖畏皆以癡為體疑魔以疑為體即嗔之毒毒害謂名聲舉利謂資産自高輕慢體即慢四廢立者二魔者所障有二一涅槃二菩提依障初品立分段魔依障後品立變易魔三魔者唯說慧聲聞畢竟斷故說三魔門彼天魔入阿難耳不聞佛入涅槃塢婆毱多坐定被魔致華於頸上後起神通方能制伏非畢竟降故略而不說立四魔者問何故不說業為魔收答生死根本由惑勝故薀總業別果勝因劣不立業問生老病三事何不立魔唯立死魔耶答生等三種劣於死故故不立之十魔者各隨增勝而立所以偏言如法宛中魔明也五辨所障者二魔中分段魔障三乘變易魔障菩薩三魔中煩惱魔障有餘依涅槃薀魔障無餘依涅槃死魔障生壽四魔中前三如前說天魔障一切善法及障出欲界三界故八魔者初四同前後四生例障常等四德十魔者別障定慧二門也六真能破者分段四魔華嚴經說十住菩薩初發心住中便能八相成道已伏分段天魔已得神通彼不能障第四生貴住中伏煩惱障中分別諸煩惱魔資糧道中漸伏加行道中頓盡初地心正斷分別體盡其俱生者加行道中漸伏初地已上能頓伏盡然故意力七地猶起而不為失八地已上一切不行種金剛斷也薀魔者若依天親法華論說初地已上受變易生即伏薀死二魔其死魔若依唯識至八地方受變易七地滿心方捨薀死二魔也其變易猶在名未離其分別所知第四生貴住中離不共無明件類資糧位中伏加行位中能頓伏盡初地永斷其俱生所知障在六識之中者十地分分斷八地已去一切不行第七識中者十地之中地地斷乃至金剛心時永斷也其變易蘊死二魔唯識二說一云金剛道起皆已捨故與二障種俱時捨故正義不然解脫道起方棄捨故其變易天魔者阿彌陀佛既有魔名無勝已上諸位准有何失要大菩薩能為魔事障大位故示相有之亦示相破也七示相破者釋迦化相降魔金剛心起降煩惱魔捨第五分壽降薀魔薀魔樂俱生死受魔王請留位三個月為顯於死得自在降死魔也然破天魔有二文不同若准涅槃經菩提樹下未成佛菩薩入慈心定起雷乳三昧破天魔同於法華經大通智勝佛破魔軍已乘得阿耨菩提大般若說八相成道得菩提已然後破天魔隨機不同不須和合會也然今所要聖者伏除即是二乘破三軍也若准小乘真能破時與此不同彼許四諦菩薩修惑五門合斷則是見道已前伏俱生煩惱彼言伏惑則同大乘斷若大乘伏者但今現不起者即斷彼種即見道已前伏俱生煩惱魔後入修道方斷薀死入無餘時斷天加行方降也言順契佛心者即同火宅長者見子得出火宅其心泰然歡喜踊躍等言賞賜有三等者經言隨功賞賜等者如七方便隨彼見道已前折伏煩惱隨功賞之𤏙等善根必涅槃頂終不斷善若望有學所伏斷之功賜與初果等羅漢結盡而羊鹿車及化城等言初喻無為功德者經言隨功賞賜或與田宅聚落城邑合中則言賜涅涅城故彼第三言次喻內有為等者經言或與衣服嚴身之具同二言後喻差別果德等者經言或種種珍寶金銀至人民上標下釋同第一言或斷德至為宅者解第一惑字問何故將無為功德名田答田者生長功德處能牽生有為空智故名田與有為功德為依止名宅前三果人九九八十一六無為名聚落聚落散居諸處也所得涅槃御生死寇安正智神故涅槃名城也言慚愧忍辱等解有為行德經言或與衣服嚴身之具足則慚愧為衣服五分法身及六境住反嚴具恆者常義六境對凡夫六賊六塵即六無義也對聖人名六境凡夫緣時緣著違境則生嗔嗔故生憂惱緣著順境故則生喜樂緣著中容境生愛愛故則生癡聖人緣時唯依捨受正念平等而住恆常觀察名恆住羅漢以此為向外嚴身功德不同大乘起得光明相好也言禪定解脫等者喻差別果德解經中或與種種珍寶至人民者即有為功德種種差別也禪謂四禪定謂四無色定解脫謂八解脫二乘六通為象馬車乘也言生空智為奴者一云二乘為郎主生空智為奴二云根本智郎主後得智為奴取初解今此心法四緣生藉託衆緣驅逐方生驅策現前者生現也言八勝處為婢者凡夫之人境勝於心心隨境流起被婢使聖人心勝於境境逐於心則主使婢心調伏於境或多或少或青或黃心勝於境名勝伏所境色皆是智之用故如婢言十遍處等者遍一切處如百姓人民於一國佛法利用寬廣周遍大千名遍處處遍滿故也言未賜大乘喻者經言唯髻中明珠不以與之者四十年前未說法華經也則是久默斯要不務速說四十年前若說譬如以最示於愚人愚人及笑經徵言所以者何何不與耶答明珠若諸人頂上想有主解與之不怪獨王頂上有此一珠若以與之王諸眷屬必大驚怪四十年前若說法華與授記菩薩怪也雖分段生死愚名小功勞未破變易生死不名大功也言心首所持者此取念慧二法為能持舉俱時心五故言心首也言此合法王施化者前喻言文殊師利譬如強力轉輪聖王欲以威勢降伏諸國今合經云文殊師利如來亦復如是至三界者十地之中分得分得法國土成佛之時成自性身自性身居法性土名得法國土也言王於三界者舉大小化身所依止處名王於三界中間略却他受用自受用二土喻上既取鐵輪王合中亦唯化質所依土也不離法性土故言此合衆魔拒逆者前喻言而諸小王不順其命合今經云而諸魔王不肯順伏言合聖者伏除者前喻經云時轉輪王起種種兵而往討罰今合經云如來賢聖一句前時轉輪王經言諸將與之共戰一句合前起種種兵而往討罰言此合隨功受道者初合歡喜前喻言王見兵衆戰有功者則大歡喜今合經云其有功者心亦歡喜後合賞賜者前本喻經言隨功賞賜或與田宅聚落城邑或與衣服嚴身之具或與種種珍寶金銀琉璃車渠馬瑙珊瑚虎珀象馬車乘奴婢人民今此中顛倒不依次第經言賜以禪定解脫二句經合前第三或與種種珍寶金銀琉璃車渠馬瑙珊瑚虎珀六句經文中略而不合前象馬車乘一句也經言無漏根力諸法之財二句合前喻中第二或與衣服嚴身之具二句經文言又復賜與涅槃之城言得滅度引導其心令皆歡喜合前中第一或與田宅聚落城邑二句經文也所以疏言准前喻配義可知也此合未賜此經者喻經言唯髻中明珠不以與之所以者何獨王頂上有此一珠若以與之王諸眷屬必大驚怪今合言而不為說是法華經前是喻文今合中唯法也上合昔權言施實教有二者初說明珠屬解珠喻治第六集功德人後明珠屬說無上言初喻者經言文殊師利如轉輪王見諸兵衆有大功者心甚歡喜至與之者正對治也言諸兵衆等者化度科四一大乘兵衆謂十地諸菩薩不一諸之一字得多義也安國云疏主通妨有人問二乘之人回心當必能破變易四魔尚自聞法華得珠菩薩已破變易四魔何故不與說經珠答菩薩既分破變易四魔名功勳大為說無量義經名解珠也此名大乘兵衆也二云二乘兵衆者路府問云准經有大功勳兼通二乘無學據論主意乃是有學凡夫何故相違答無學之人從他有學斷染成聖故成無學據斯論判亦不違經牟引緇州云說七喻皆有二意一則說昔二則況今言全破分破者未成無學分破分段三魔成無學了全破也二乘有學總許回心授變易名有大功勳也問菩薩已破變易四魔有大功勞可賜明珠二乘未破變易四魔如何與珠答當能破回心了決定當破變易四魔亦與法華經名教珠先雖是聲聞後作菩薩故令生決定心先與說法華經名教珠後方破變易四魔也言如世軍將等引例㢡動不不唯佛法如此如世間軍將若是小小征戰先施功了然後受其賞賜若是志意驍猛擬立大功者先賜官祿後方征戰言此猶未入十地者約位明體也二乘等言得珠者是名教珠十地已去正破變易四魔方得珠體也上明喻了言此明已破分段等者化度云約人破魔也言非是一切等者問定性聲聞亦破分段四魔於中定性不愚法者聞法華經何不說與珠答疏言非是一切但等此意道不定性人得無學果已當發大心破變易四魔名大功勳也趣寂聲聞設破分段四魔永無回心之義不名有大功勳亦不與珠退心有學亦與之故有學回心當破變易亦與之珠也已上通有學無學總名大功勳言或復者前通有學此唯無學退心者說退心之言簡定性無學言四魔有二者辨種類中總標也言今隨要者分段三魔者逐難略辨法菀云煩惱所知若種若現并隨所應習氣等法名煩惱魔分段變易二種五薀名為薀魔分段將死正死死已滅相名為死魔變易身上有漏五薀微細隨滅名死魔言降位降時者則是降餘三魔位次也降時不同者或成佛了殊天魔或降魔了成道如理趣疏者牟云此是疏主於般若經中有理趣分疏文也言今依大集經等者四五重料簡也知五薀身真是苦故不起貪愛等能破薀魔斷集諦煩惱破煩惱魔證滅諦理成解脫身得二涅槃故壞死魔修道諦智起神通能伏第四天魔言復次觀有漏者第二重也既知有漏是苦深生猒不樂義故破薀魔觀諸行無常故不起煩惱伏煩惱魔觀諸法無我破死魔以死魔於得自在故今作無我故對治死魔觀涅槃寂靜證理破天魔言復次觀空等者第三重也觀諸法空故破薀魔觀諸法無相故破煩惱魔觀有為法既不願求故破死魔若復回心作佛即破天魔也言復次觀身受等者第四重也觀身不淨破薀魔知身不淨不樂住故觀受是苦破煩惱魔觀心無常念念生滅破死魔一向樂死故觀法無我壞天魔謂證無我理無漏智生故伏天魔言智度論云等者第五重料簡也上明喜言此明與之者正明與珠也經言此法華經能令衆生至而今說之者則同正宗所以未曾說說時未至故今正是其時決定說大乘言多饒怨謗者則同前來經言如來現在猶多怨疾況滅度後未秀於林風必摧之祐法師云道大信難聲高和蜜須彌峻而嵐風起寶藏積而怨賊生也此經出衆經之上是成佛因故多諸怨嫉此正明法說與珠也言初所詮理等者此唱合所詮理名珠後唱合能詮發為珠此兩唱教理便是解珠喻家合文文云屬喻故不文殘義則殘也亦是第二遍說明珠也輪王若有兩個珠兩處別說則是殘輪王珠體既一一個分兩處用也若准經文是前喻家合文文即不殘也若准理說珠無價喻所說經即是說無上義殘也說無上中有理有教此唱理也言最先者牟云教理二種餘經不及故名最先最先者則無上義問前唱一種是理何以得知後唱是教答經自云祕密之藏藏即是教也又云而敷演之言合初十四頌半等者初四頌頌安樂行後十頌嘆經勝德兩段合一處述名合也言初者牟云對後第二段通名安樂果後得言初也則對後結答文也言初一頌總標者即是初四頌頌安樂行中分二初一頌總標即經言常行忍辱至讚經是言此三別頌者別述安樂行也長行經言又文殊師利菩薩摩訶薩於後末世法欲滅時有受持法華經者於在家出家人中生大慈心於非菩薩人中生大悲心今三頌中初一頌一句述前長行中慈悲言一頌三句頌起思念者長行經言應作是念如是之人則為大失如來方便隨宜說法不聞不知不覺不問不信不解其人雖不問不信不解是經我得阿耨菩提時隨在何地以神通力引之令得住是法中今頌云斯等不聞一行三句是言一王者即法王施化喻經云譬如強力轉輪之王二句是也言二功者則經云兵戰有功一句是言三賜者則是賞賜諸物一句是餘經云象馬車乘二頌頌前長行經言王見兵衆戰有功者則大歡喜隨功賞賜或與田宅聚落城邑或與衣服嚴身之具或與種種珍寶金銀琉璃車渠瑪瑙珊瑚虎珀象馬車乘奴婢人民隨功授道喻也略不述前衆魔拒逆喻聖者伏除未賜此經等三喻也一頌喻實者長行經言唯髻中明珠不以與之所以者何獨王頂上有此一珠若以與之王諸眷屬必大驚怪今頌云如有勇健一行是言此初也等者三頌半頌合昔權長行合文唯有五今頌略而述之衆魔拒逆聖者伏除等唯合法王施化隨功功受道喻且法王施化者長行經言文殊師利如來亦復如是以禪定智慧力得法國土王於三界今頌云如來亦爾一行半是言一頌功者長行云其有功者心亦歡喜於四衆中為說諸經令其心悅今頌云見一切人一行是言一頌賜者長行經言賜以禪定解脫無漏根力諸法之財又復賜與涅槃之城言得滅度引導其心令皆歡喜今頌云為是衆生一行是言說此諸經者法華會前名諸經也言此合今實有二者初今實初喻長行經云文殊師利如轉輪王見諸兵衆有大功者心甚歡喜以此難信之珠久在髻中不妄與人而今與之後合合中初合歡喜如來亦復如是於三界中為大法王以法教他一切衆生見賢聖軍與五薀魔煩惱魔死魔共戰等後合與第一者長行言此法華經能令衆生至一切智一切世間多怨難信先所未說而今說之今頌中初一頌半述合今實經云既知衆生得其力已一行半是後一行半合與珠經云此經為尊衆經中上一頌半是上來有四一正身行二正語行三意離諸惡自利行四心修諸善利他四行不同各有長行頌說總當第二段顯答上來有三初標答經云佛告文殊師利若菩薩摩訶薩於後末世欲說是經當安住四法二顯答經言一者安住菩薩行處及親近處能為衆生演說是經三結答經言我滅度後求佛道者一行半是三段不同總是初告所同因安樂四行也言第二段明通安樂者因便總告果安樂之相也牟云對前四行之別果立名此與四安樂行中果別故言總也初正身行中四頌半述安樂果經言若有比丘於我滅度入是行處及親近處說斯經時無有怯弱等正語行中五頌安樂果經云我滅度後若有比丘能演說斯妙法華經心無嫉恚諸惱障礙亦無憂愁及罵詈者意離諸惡自利行中安樂果經言文殊師利是菩薩摩訶薩於後末世法欲滅時有成就是第三安樂行者說是法時無能惱亂得好同學共讀誦是經心修善利他行中安樂果長行云文殊師利是菩薩摩訶薩於如來滅度後有成就此第四法者說是經時無有過失等然下疏文中不述此果也言一頌半自體無六惡者一讀是經者常無憂惱二又無病痛三顏色鮮白四不生貧窮五不卑賤六不醜陋言一頌衆生等者經言衆生樂見等言一頌外三惡者一刀杖不加二毒不能害三若人惡詈口則同塞問何故不輕菩薩持經招乎杖木瓦石便被欺俵此說持經力刀杖不加耶答彼約菩薩調伏衆生此約經力加被經言口閇塞者不是持經感他人如此亦但是調伏衆生令發心如下咒咀諸毒樂所欲害身者念彼觀音力還著於本人言一頌無畏者經言遊行等是簡要云疏言明安樂果者通述四安樂之果不是偏述第四段文也言初一頌半見佛等者攝問云外境本無夢因何起答智度論云夢有五因一熱多夢見火黃亦總二冷夢見水白初三風氣多夢見身飛見黑多四歟思念故故則夢見五天神與夢欲令知未來事故又陰盛夢水陽盛夢火陰陽俱盛夢相等今此佛菩薩及經力加被令夢即第五段類相似亦不相違也自下釋涌出言前之一品等者則安樂行品下之六品者即是從此涌出至不輕品言壽量及分別等者壽量品因釋前疑分別品名展轉生起由前文殊菩薩諸佛經軌儀故安樂行品所行也涌出品是能行安樂行久離傷毀之人人衆既多行位又廣彌勒言我此衆中乃不識一人釋迦言是我弟子常所教化遂有彌勒發問與舉會生疑則白佛世尊如來為太子時出於釋宮去伽耶城不遠坐於道場得阿耨菩提從是已來始過四十年世尊云何少時大作佛事以佛勢力以佛功德教化如是無量大菩薩衆當成阿耨菩提世尊此大衆假使有人於千萬億劫數不能盡不得其邊斯等久遠已來於無量無邊諸佛所植衆德本成就菩薩道常修梵行世尊此之事世所難信譬如有人色美髮黑年二十五指百歲人言是我子其百歲人亦指年少言是我父生育我等是事難信由答此疑故說壽量品經言然善男子我實成佛已來無量無邊百千萬億那由他劫法身自性凝然自受用身諸佛所師所謂法也以法常故諸佛亦常化身衆生界盡化身乃盡又云諸善男子於是中間我說然燈佛等又復言其入於涅槃如是皆以方便分別故名周釋前疑也法身住法性報身隨願緣化身應群根由聞如來壽量品一十一位得證一位發心稱量功德多少故名分別功德展轉生起也言助正依安樂行者法師功德品正依安樂行隨喜品助依安樂行言三者論云等者示現教化衆生無上教化則無上約如來能化故說無上言釋名者晉本云菩薩從地涌出品也言解妨等者不同諸品有兩般三般事為品名則有多妨今唯以一般涌出事為品名也此唯問不傍來妨問多寶住在他來時從此方地中涌出之菩薩既是此方住何不傍而來答涌出菩薩不離此界修行超出生死顯化功廣大故說從地涌出不言傍來疏答意宜難菩薩如多寶佛雖居東土從地涌出今者何妨居於下方而現則言傍至言此初也者他土請持也經言爾時他方國土諸來至說之者攝釋問此等菩薩從何處而至經文上下無說處故答三解一是塔品命持持品應命以大音聲告四衆故諸菩薩應命而至應菩薩墮墮而來勸持品中來由未盡至涌出品中來數方足故有八恆河菩薩也二云是無量義經會中菩薩眷屬問若是無量義經會下菩薩序品之首何不烈之答經家舉勝但說八萬眷屬劣故經首不烈都有八恆河沙數故於此品而請持經三云或是妙音普賢文殊海會等所從之衆攝自斷取塔品命持持品應為正也言初止等者經言爾時佛告諸菩薩至說此經者問如來平等教化如何止他方不受持經耶答如來畢竟不妨他持經暫時止者擬向下說三身壽量功德所以止也若也不止他方下方無由涌出若不涌出彌勒不疑彌勒不疑故壽量不說不說故便無分別功德品也有大利益也所以者徵也經言我娑婆世界等言且說極多者能化所化皆有六萬故言極多實非唯說六萬於中五萬四萬三萬二萬大多言顯佛化切等者問遮果他方持經止有何所以答顯佛化功且言不許假令他護亦有何𠎝有二意顯佛化功一顯佛功德故有壽量品二顯佛化功故有涌出品有斯二意所以止也言升空者有言下華讚禮者謬也言相好及住處者經言是菩薩至住者先盡在此娑婆世界之下牟云則是已簡餘方處訖何以經言此界耶答虗空亦有屬此界者他界者但言此界則表不是他界虗空也言一來由等者經言是諸菩薩聞釋迦佛止他方菩薩舉此方菩薩之音聲也菩薩聞說我娑婆世界自有六萬恆河沙菩薩摩訶薩此音聲從下發來言烈數有八輩者一恆河沙都有六萬恆河沙和上來一一菩薩皆是大衆唱導之首各將六萬恆河沙眷屬則此六萬恆河沙弟子問各將六萬恆河沙弟子來底和尚有多少答還有六萬恆河沙問於中弟子還有不滿六萬恆河沙人否答有況將五萬四萬三萬二萬一萬恆河沙眷屬者言二分恆河沙者經言況復乃至一恆沙者牟云此分中有二意若據人王數一恆河沙屬前一輩收若據為頭指半恆河沙等已下屬第二輩收也經言半恆河沙四分之一乃至千萬億那由他分之一者此上皆是所將來底弟子能將和尚亦有一恆河沙半恆河沙四分之一乃至千萬億那由他分之一也又解云乃至單己皆及問意取和尚數也言三那由他者經言況復千萬億那由他眷屬況復億萬眷屬言四方者經言況復千萬百萬乃至一萬言五千者經言況復一千言六百者經言一百言七十者經言乃至十一經言況復將五四三二一弟子者釋云五四三二一總屬單己牟云此亦不然收十數為頭已下餘數皆十中攝同前分恆河沙為一頭却將一恆河沙四分中攝言八單者經言況復單己更第二解云八個況復字為八收此解善也經言如是等者第三結之問前來八類各有其數如何經言不知數耶答且說和尚數有八類似知多少若兼弟子算即不知也言第二升空讚禮者亦言下華讚禮理合承華而來也又准同海會菩薩下華禮佛經言各詣虗空七寶妙塔當曰寶塔與四天王宮齊名詣空至塔也經言向二世尊頭面禮足者一則禮足二禮四拜數足名通此二說經言及諸寶樹下師子座上佛亦皆作禮者問八方各四百萬億那由他國土盡是佛如何禮得遍耶答有二一則鄰次近處禮遠處不禮二則望座從頭至未普禮經言繞三匝者問為復繞多寶佛三匝為復繞分身三匝答一則都繞多寶塔及分身佛三匝若爾即應經劫方遍二云繞多寶塔三匝分身佛取近處隨多少禮亦不妨言一讚長時等者經言是諸菩薩至半日者經言以諸菩薩種種讚法者問此是佛讚法如何言菩薩讚法答佛是所讚菩薩能讚隨讚人名菩薩讚法即容顏甚奇妙等言本論說此經等者解經中如是時間經五十小劫是時釋迦牟尼佛默然而坐及諸四衆亦皆默然五十小劫受讚也大論說此經以晝夜月時年五種劫也或五十晝五十夜五十時五十年名晝夜合數二十五晝夜晝或二十五夜亦二十五日成五十小劫化度云取二十五日為五十小劫為正也上解受讚二之言讚德逾等者菩薩讚佛實經五十小劫問何故經爾許時答讚德愈深時長可悉可悉者周悉義佛德廣大五十小劫讚嘆方周悉也言受讚神力亦等者五十小劫坐爾許時坐受讚嘆亦是佛神力也問佛坐五十小劫何名神力答經言及諸四衆亦皆默然五十小劫四衆亦皆默五十小劫四衆五十小劫坐實假佛神力也能讚受讚時等名受讚神力亦等讚時言神力變其本心等者時即實經五十小劫佛神力劫變時會人能緣五十小劫相分夫作半日解名變其本心也問若如此但得名變心變何名延促光景答牟云經文只有促光景疏文兼迦延字能讚人雖五十小劫促彼五十之延切今時會人謂如半日即是於彼延光景作促光景也言衆生受法等者第三解也時亦不促人心亦不移衆生愛法之極不倦時長不覺五十小劫佛神力加被謂如半日也言法食資持等者問爭得不契食過得五十小劫答法食資持故不假喫飯也問經五十小劫莫不折壽耶答佛神力制御故經多劫年命不虧虧減也寒不折壽出寒來還依舊年歲此法力住時也維摩經言我有衆生樂久住等言衆人共見者經言爾時四衆亦以佛神力故至虗空有說菩薩唯在此界下方虗空中住身形短小復重纍而住及至出來事須身形長大具諸相好威儀齊整單行依次第所以兼遍滿無量百千萬億國土空也凡夫四衆只見近不見遠假佛神力普得見也又如軍在營占地少默閲出則多亦如鳥集一樹即少飛翔即遍滿虗空言行高等者行高解上行勝廣解無邊行離惡解淨行進善解安立行又解一行高四安樂行行高故名上行勝寬廣故名無邊行離十種惡緣及衆惡故名淨行能進善故名安立行問何不立八人十只舉四人答此是行前四安樂行故言四人也一名上行正身行三菩提之中身行最勝上故二正語行語菩提談說百千教法義理無邊三業之中口業利益最大故名無邊行三意離諸惡故名淨行四心修諸善利他功德日日增長名安立行菩薩之行無量無邊舉四行攝餘衆行菩薩衆有塵沙舉此四人攝餘人也經言是四菩薩於大衆中最為上首者問前言一一菩薩皆是大衆唱導之首今言四個菩薩為首何乃相違答前言上首者六萬河沙菩薩一一菩薩對自六萬河沙弟子為上首此四菩薩對六萬河沙和尚之中為上首也言三直省者經言在大衆前各共合掌者牟云者同也同者相似義即各各相似合掌也經言少病少惱智度論云隨世俗法有二種問訊一問心名少惱二問身名少病此乃問者之禮佛實無病也經言安樂行不者平呼莖同即四威儀中第一行也住坐臥不問或可舉初攝後三也若去呼者即是因義故非果中法也言玉篇等者即參問之詞許者參問之言言執問通者即將書狀問也即傳語問也今菩薩問即是言語問也言世尊慰答有二初標者經言爾時世尊於菩薩大衆中而作是言如是如是印可也汝等問我少病少惱我實無病惱諸衆生等實易教化三根聲聞實易化度實無疲勞問火宅頌言此諸子等生育甚難今云何言易度答彼約諸子昔日在宅今約除故外諸餘菩薩下言除先修習學小乘者下徵云經言所以者何者遇此惡時惡衆生爭得易化不生疲勞言三迂會亦從者經言除先修習學小乘者至佛慧者此不定性聲聞也言初雖不從後亦從者四十年前毀責聞名不從也後亦從者約法華會上亦從四十年前不從除修習學小乘者即是約雖不從也如是之人我今亦令得聞是經入出慧名後亦從也言初二讚菩薩等者頓悟漸悟小菩薩後一說聲聞即是迂會聲聞亦是聞經成漸悟牟云如次頌頓漸二菩薩也言或初二說迂會者即舍利弗等百千萬億世世已曾從佛受化退已還發大乘心成漸悟菩薩也言後一說趣寂者問既是趣寂如何言入佛慧答但是信解入非是證解入也由聞法華經不愚法故信有大乘也路府云經中除字錯應作餘字也小乘是大乘之餘牟云疏既重科經含兩勢不可定非也若依初科此是迂會漸悟者可是餘字聲聞是菩薩之餘也若後科屬彼趣寂即是除字定性人無復可回心不名先修習即是所除趣寂聲聞也言第七四人隨喜等者四人見世尊了又說偈讚云世尊諸衆生等易可化度頓漸菩薩云能問諸佛甚深智慧抄云合道能聞佛與下句聞已信行相承行字平呼即是初周聞因果智第二云問字反正以下句有聞字意道三根聲聞請說法華即是聞智慧上根請法說中根請喻說下根請宿世因緣名能問問菩薩不見三根聲聞請爭知便說偈讚答一則聖心玄鑒二則准理為聲聞說法必須持請也我等隨喜一句屬能讚能菩薩此上是菩薩讚佛言此初也者一心念也經言爾時彌勒菩薩及八千恆河沙至如來者路云千字剩只今言八恆河沙即是品初八恆河沙菩薩他方請持者或有云是文殊海會來者非口所宣或云分身侍者若不爾者烈名中無又不見來處准此道理八千恆河沙亦不妨初說經菩薩少復漸漸來數有八千恆河沙亦有何失如下分別品中皆說小千大千等世界微塵豈將烈名中難耶言此初也者一頌總申凝也經言時彌勒菩薩至兩足尊說者菩薩欲決自所疑問彌勒如何有疑答餘人實疑彌勒示相也此彌勒利益廣大但有說經衆人疑處即出來問答了即去如序品中疑亦是示相也言此初有三等者初二句來由次五句讚德後一句來處也言叵思議者叵不了義也言堅固者信心不懷義經言為從者為字平訓言也言來數有三等者長行有八頌中亦爾初總次七頌別後一頌結且別中有八者一初三頌一句明河沙分二初二頌明六萬恆河沙後一頌一句明五萬恆河沙且初六萬恆河沙弟子六六三十六三十六萬河沙弟子兼帖本師六萬師徒共計四十二萬恆河沙人也次下五萬恆河沙菩薩一一復將五萬恆河沙弟子經言將五萬恆沙其數過於是者如是將五萬恆沙弟子來底和尚倍前六萬河沙之師即有十二萬河沙之師每五萬河沙弟子計有六十萬河沙弟子師徒相計七十二河沙菩薩所以經言將五萬河沙其數過於是經言四萬及三萬二萬至一萬一千一百等此上全河沙也二分河沙者經言乃至一河沙半及三四分億萬分之一此上三句是分恆河沙也三那由他者經言千萬那由他萬億諸弟子乃至於半億其數復過上牟云乃至於半億疑此一句剩長行所無故長行云億萬眷屬頌中云萬億諸弟子此上一頌那由他也四萬者經言百萬至一萬五千者經言一千六百者經言及一百七十者經言五十與一十乃至三二一八單者經言單己無眷屬等言一頌結者長行經言如是等比無量無邊算數譬喻不能知今頌言如是諸大衆等一行是言此化行等者誰為其說法教化而成就從誰初發心稱揚何佛法三性法六度法前受持行誰經華嚴涅槃維摩法華修習何佛道毗婆尸俱那含言此不識者示相不識也問變土延賓山河總盡何得見從地出來答從琉璃地中出來也言第三段申衆等者從誰初發心名本因緣身皆金色三十二相名末因緣也言第四傍答者經言爾時諸佛各告侍者至因是得聞者諸善男子汝莫不解作容勞煩主人容聽主裁但知用耳汝不聞釋迦侍者彌勒菩薩早已問了見欲擬答去細意聽取我設與汝說事不隱便緣在容次言阿氏者上生疏說慈氏本性頗羅墮字阿氏多此言無能勝也言此長行等者有說此一唱經文若作非疏主顯揚何以辨其深旨為欲顯下如來壽量故於此處略示三身彼品廣明此中懸指大聖調伏潛相發明言令心勇鋭等者解經中發堅固意俱是令心勇猛之義即是被精進鎧問如來夫彌勒起精進心發堅固意有何所以答只緣彌勒請說涌出菩薩來由兼擬說三身壽量功德以義深遠恐乍聞出先以語誡言此說四力等者一者慧力如來今欲顯發諸佛智慧即慧力即壽量品如來祕密法報二身智性智相總名智慧也二神通力者諸佛自在神通之力即化身也此上二力即是三身也三奮迅力者諸佛師子奮迅之力師子者無畏義奮迅者頓義師子若頓巽毛表決定所作如來起奮迅之力向下必說三身壽量也四威猛力者諸佛威猛大勢之力威猛摧破義擬摧破彌勒菩薩疑心故現威猛大勢之力上依經解下依疏說言或由智等者疏主將奮迅兩字配初收智慧力法報二身智性智相也言由神通等者疏主將威猛二字配第二神通化身也四力之中前二力是作用恐人只識智慧神通二力不識後二奮迅威猛二力所以將奮迅力配智慧力法身報身向上作用也所以將威猛力配在神通力化身向上作用也言或智慧者同前法報二身智性相第二解言下三佛化身等者神通力奮迅力威猛力總配化身上三輪也自在之力配神通摧伏外道名輪師子奮迅之力決定所作名記心輪摧破疑網名輪也威猛大勢配教誡輪摧衆生惡故名輪也相云自在力身業師子奮迅之力意業威猛之力語業言初二頌勸勿生疑者長行經言汝等當共一心被精進鎧至大勢之力今頌云常精進一心二偈等言後二頌顯佛實語等者章敬云四頌分二初二頌述前被精進鎧發堅固意堅固意者即信力故後二頌述前四力中初頌述智慧力後頌述餘三經言住於忍善中者即忍善法勝解為性此即信因言初告我化者佛告彌勒如是從地涌出者總是我化如何不識是我弟子問世尊向何處何時化得答我只向此娑婆世界教化得問莫是世尊過去久遠已來化得答只是我今生成道已後化得此是生疑處也經言我於是娑婆世界等者此答前五問中誰為其說法教化而成就與從誰初發心然此中經文甚密佛言陳雖為說化身意許乃是報身所化彌勒依言陳約化身為疑難疏主於此不分別辨釋者意生後字慧解也言二解經等者經言於諸經典等者此答受持行誰經問疏科此品為能行安樂行持法華經之人又釋迦言我自有爾許多菩薩持法華經今此正答中何故言於諸經典耶答諸經者不是華嚴涅槃等經亦只是法華經教理行果總得名諸經典四法不一故名諸也下頌云常勤求智慧即開示悟智性智相也說種種妙法者即教理行果也然此言諸即是一乘教理行果並是教下所詮道理也言此有四一樂靜等者經言阿逸多等不樂在衆者此答稱揚何佛法問既不樂在衆如何多有所說答不樂多處轉則免人迷應言不樂在人衆不樂多有所以向下方靜處住也經言亦不依止人天而住者問分段變易皆是依人天住如何言不依止人天而住答約所依土是如來無漏所變有妙淨土出過三界名不依止也經言常樂深智者根本智證如故深後得智達言後一頌精進者經言如是諸子等學習我道法者此答前修習何佛道憒古內反心亂也交也憒字繢音同乎內反言初一頌半住處深智者經言說種種妙法者此答前稱揚何佛法也即一乘教理行果名種種妙法言結成我化等者世尊言陳之中說現在伽耶城意許之中說無量劫前伽耶城處所彌勒只知言陳不知意許將謂世尊說現在伽耶城有抄說伽耶城雖經劫壞名字常存與恆河一種此亦不然但是說伽耶城處為正往昔未必有設說有未必名伽耶如言常在靈鷲山非淨土中有靈山故但是淨土向其靈山處所以說在靈山也言結勸生信者既言久遠非即此生故勸生信也言伽耶是佛生處等者路云舍婆提城是大都城此伽耶城是小都城總屬此迦維羅衛國准疏摩羯陀國亦中天竺與此憍薩羅別准西域記劫比羅伐窣堵國即舊名迦維羅衛國此中但有菩薩降神母胎處不言有伽耶城及論都城大小然於摩竭陀國戒賢論師伽藍西南行四五里渡尼連河至伽耶其險固少居人唯婆羅門千餘家矣本仙人祖胤也城西南行五六里至伽耶山溪谷杳冥峯巖危險印度國俗稱曰靈山山東南是伽耶那提二迦葉昔事火處從此東度大河至鉢羅及菩提山此云前正覺山山面南十四五里有畢鉢羅樹昔佛在世高數百尺屢經剪伐由高四五丈佛坐此下成等正覺因號妙菩提樹准此與疏不同未詳所以言俱在中天竺者問何不遠答菩提樹去伽耶城西南二十餘里俱中天竺故知不遠順經文此解正經言於釋氏宮者指佛生處也言於此義中略有等者且第一諸經不正義言十九出家三十成道又智度論佛臨涅槃告須跋陀羅言我年十九出家成道五十歲共計六十九此解佛不滿八十便入涅槃章敬云智度論文隨小乘不正說也言本起因果經等者疏主和會智度論等文智論文錯遺却十一年只說出家已前年歲及成道已後年歲計六十九也遺却出家已後成道已前五年修樂行六年苦行計十一年帖六十九年成八十佛實年八十矣言此有解云等者正是疏主和會中初標也言智度論用者釋也用十九出家義并五年事仙人行樂行六年行苦行義計成三十成道今言成道已來始過四十餘年即才年七十矣即法華會後更經十年至涅槃會也取成道年兼帖成道後四十年共有四十一年故言四十餘年上依智論了言二者亦有諸部等者申正義也言佛欲出家等者六年成道羅睺始生却算出家帖二十九故知成道三十五年也名言十九出家更帖六年即二十五成道便違聖說言不說十一年者名十一年在胎可說帖十九為三十成道今既不爾故十九非也言六年之內等者彼部問云若言二十九出家六年行苦行即菩薩於何時中修樂行更添樂行即非是三十五也答疏言六年之內等言菩提留支等者引何經請撿也言金光明等者經言妙幢疑云釋迦如來壽命短促唯八十年言第二舉喻等者經言譬如有人色美髮黑等者問但言是子即得何要子却胎是父耶答若直二十五人指百歲人言是我子大易事須得百歲人却招承言實我父此事方難有人者況佛也色美者佛具相好莊嚴也髮黑者不老義言設年八十等者如今法華會上實年七十五無老相設到八十涅槃會上亦無老相言好巡者常少義舊處者不老義也言年二十五者表佛超出生死示居二十五有之上也言菩薩七德甚大者問前彌勒言不識一人寧知具於七德答前約示相此約實知道滿當生知亦何或彌勒比彼根地人上故言信隨宜說者經有三節疏亦有三然經第二佛所出言未曾虗妄是疏第三第四不謬却將三為二也言四無謬者攝云佛不妄說四事名四無謬一如來不妄說佛菩提二不妄說小乘三不妄說大乘法四不妄說過去未來現在授記也所以經言如來是真語者實語者如語者不異語者言此初有三者長行云舉事難中有二初舉成道處所年歲後正申難申難中初申三事後結難信三事者一時少事大經言世尊云何於此少時大作佛事二時促衆多世尊此大菩薩衆假使有人於千萬億劫數不能盡不得其邊三時短德勝斯等久遠已來於無量無邊諸佛所植諸善根成就菩薩道常修梵行今此頌中初頌頌前成道處所長行經言即白佛言世尊如來為太子時出於釋宮去伽耶城不遠坐於道場得成阿耨菩提從是已來始過四十餘年今頌云佛昔從釋種一頌述也言三頌菩薩德等者述前三事中時促衆多經云世尊此大菩薩衆假使有人於千萬億劫數不能盡不得其邊今頌云此諸佛子等三頌也經言不染世間法等者世間法如水菩薩如蓮華蓮華水不露菩薩世間染不得或云如蓮根在泥中芬芳水上發菩薩本居下方界涌出似華開此解非也但取無染義也言此頌喻者長行經言譬如有人色美髮黑年二十五指百歲人言是我子其百歲人亦指年少言是我父生育我等是事難信今頌云譬如少壯人二頌等是言此與長行互相等者長行經文唯說父色美髮黑影取子亦髮白面皺偈中唯言子髮白面皺影取父亦色美髮黑疏解常少不老義言巡舊者解髮黑也言久修者解髮白也言猶缺者解面皺也言三頌讚菩薩有十德者一志固無怯弱二無量劫行道三巧於難問答四其心無所畏五忍辱六心決定七端正有威德八十方佛所讚九善能分別說十常好在禪定與前七德有無不同也言初半頌自無疑者長行經言我等雖復信佛隨宜所說佛所出言未曾虗妄佛所知者皆悉通達今頌云我等從佛聞於此事無疑言次半頌他有惑者長行經言唯然世尊願為解說除我等疑及未來世諸善男子聞此事已亦不生疑今頌云願佛為未來演說令開解言次一頌疑者失者長行經云然諸新發意菩薩於佛滅後若聞是語或不信受而起破法罪業因緣今頌言若有於此經一頌是自下釋如來壽量品言一者七品等者初之一品所行行即安樂行品餘之六品明能學行人中分二初涌出品菩薩生疑此壽量品因釋前疑分別功德品展轉生起今是因釋前疑故有壽量品來也言化佛近成等者前疑佛成道近化衆多者約化身說若約法身理本無起滅報身久證何妨化衆多耶為破菩薩疑心說三身久遠故有壽量品來言二者十九品為正宗等者十二品明一乘境兩品明一乘行此下五品明一乘果果中分二初二品明已滿果後三品明未滿果得果功德名已滿果得因中功德名未滿果此壽量品正明已滿果分別功德二品因聞已滿之功德果報十一位得證一位發心已滿之家果亦向已滿中收言三者論說等者初標文也言於第一乘等者論六釋也於第一者乘即是大乘妙法蓮華經也集者修也不修善根而不取第一便是成於此人起顛倒增上慢之所以諸抄皆說今昔二時皆不集故不修大乘名不集功德此等衆生一即身中本來有四智菩提心種二乃過去十六王子時聞法華經重得大乘菩提心種自後直至今生已前前世中更不曾修行大乘名不集功德此等衆生過去世中見佛出世間則起慢心見佛入滅則生戀慕佛若在世雖然逢佛不肯修行經云時諸子等於火宅內樂著嬉戲不覺不知不驚不畏亦不生猒於此三界火宅但東西走戲視父而已二者約今生法華會上未回向心前大乘根未熟故於第一乘而回心為對治此說醫師喻然後唱滅問今此七喻正明聲聞三根汝等所行是菩薩道豈得言今者昔二時悉皆不集答論約未會行前作如是說七喻乃回心已去經依後說論約先論故也言論又云等者根未熟者即大乘根未熟也為令熟故者而說小乘也向下和藥與服盡是小乘與說小乘退性之人事須先而說小乘故交入大乘令熟大乘根故示現涅槃量望佛身亦無入滅既有唱滅說有年限名涅槃量言現在未集等者三疏主解也現在未發大乘心名未集善根亦名根未熟經云諸子飲毒或失本心或不失者言令集諸善根者與說二乘法交希取第一乘第一乘即大乘妙法蓮華經也經言是好良藥今留在此汝可取服勿憂不差等言示現佛入涅槃者經云遣使還告汝父已死等言分限名量者法報二身亦無限量今約一期化相身上立分限故言令集善根等經云乃知此藥色香味美即取服之病盡除愈言四者論云八等者第四以十無上為來意八者即是十無上中第八無上也菩提無上即三佛菩提法報化此三皆無上也問報化有其智二種名菩提法身唯現體非智不是於菩提答說智及智處俱名為般若菩提菩提斷皆名為菩提菩提之斷皆名菩提也言三身在此者疏主釋非論文也言此為文殘者三佛菩提在品初醫師喻在品最後菩提無上是醫師喻家殘經云文各別故故七喻之中唯說後文醫師不說初文三佛菩提故名文殘言五者第九示現等者此品兩遍說醫師初說者是七喻中為破病故說醫師後說者十無上中第九涅槃無上說醫師者顯涅槃無上現有滅而不滅不同二乘一滅永滅故名無上言此乃七喻義殘者是他醫師喻家殘義經文屬他醫師喻但說涅槃對治根未熟者令其成熟便是醫師喻家事了於中向下顯得一分無上義不同二乘一滅永滅故言無上是義殘也言釋名者祥云此品文約義豐意深智遠名能解其義趣生無盡之慧長無邊之福亦滅無量重罪昔有數人其乘船遭風餘伴悉皆溺死唯有一人憑總獨齊夜夢云汝得脫者昔曾聽法華經壽量品故也分別品云說此壽量品時十二種利益八種瑞相餘經明得道未有如斯之感講者留意尋其旨歸也晉本言如來現壽品言三種佛身教體等凡夫以第八識功能及菩提種為體佛以第八識及大圓鏡智種子為體也法身無齊限報身有始無終為齊限化身有始有終為齊限也言任法性等者問報化可爾法身如何說壽量答法身壽量任法性即無所從來亦無不去故名如來言隨願緣者化盡衆生界衆生界不盡願力無萎歇故壽量不盡經云我本行菩薩道時所成壽命今猶未盡復倍上數化身壽應群根有衆生處則有化身也言受自體者三身各受自體結也言因三身之壽等者因前菩薩生疑疑佛成道日進化得爾許多菩薩為答彼疑說三身壽量報身壽量劫數無窮法身亦爾因聞說我說然燈佛等又復言其入於涅槃或說己身或說他身有來有去皆為衆生後方說醫師喻故今取初為品名不取後也言又難等者俱是取疏主科以八品為正宗對十九品名初故言依初科為難也若取後科此品猶在正宗則無妨難也意言此品說七喻何不同正宗中取答疏云先陳壽量對後醫師喻此入品先說故言先陳先陳有二意一者先陳說菩提無上二陳根本未熟說醫師喻即雙將二文難何非正宗應於壽量下加一及字好意說醫師喻除七慢中第七不集功德人何非正宗二者此喻正破病何不正宗收也言答當機應時等者即指三根聲聞也一乘正逗彼故故說八品為正宗此品示滅後化此指涅槃會上有一類人聞說涅槃心遂惺悟等望今法華會名為後也又根未熟所現名根熟後授化者正說法華故正宗收滅後根熟者非正宗說為流通攝也問解珠既是會中之事何非正宗答不然不以但破病故即為正宗若言破病即下正說醫師之時亦有破病也但以所況之事說於涅槃在此會後故非正宗正說一乘并為授記三根方為正宗也八品已下二文既闕故不為難也言不爾中等者既以說一乘菩薩授記為宗記故引此文成立八品為正宗不可為難也言此初也者釋迦三敕經言汝等當信解如來誠諦等者誠由真也諦由實也三告者表向下擬說三身功德故三告也言三身妙體等者問何不四告事須三告耶答疏言三身妙等窮者至極也事將周足故三告也言上智者即彌勒也言下愚者即二乘凡夫也言恐彼等者疏主三告意有三第一恐乍聞心疑口謗菩薩心疑口謗下愚凡夫因法而有毀偈故第一告也第二恐聞已設使不疑即心有散亂不能專注所以第二告也第三設心專注恐根鈍者領解不得所以第三告也言玄宗者理也言此彌勒四請等者緣前來佛三告不可還以三請以表殷重故加至四四表三身中各有四德即常樂我淨問經中不言四請何故疏科四請答經文略故如是三白已三請也復言唯願說即是第四請也又言知諸菩薩三請不止即是四請也又言而告之言汝等諦聽如來祕密等亦得成四告疏中不說也言正告初長行分二等者疏家文略只合道長行有二初長行後頌說疏家不能一一具引故言初長行從流通分經文已後盡是此勢也言三請者從初也者前唱之中有三請意說了後唱之中有三請字指初唱已解故云從初也言祕密者唯佛自知餘人不知故言祕密若准下疏解佛所藏護各祕即自性身唯是摩訶般若內所證故名所藏護也言神通等者此處解與前前後別此約現化身便是神通也言佛所藏護者義深等者解深密義云之言境即自報身佛佛自相見他受用身九地不見十地等是密難解之義以不見故故言難解也言又對法等說者簡要云意說於大乘方廣教中所有佛之祕密皆依對治也四種祕密而得決了無不解也言一令入祕等者如來未出世時外道勸一切衆生計執有我佛出世了為破我故說三科法是有人問何不總破却答若也總破恐生怖畏故不總斷問說有何名密答有者有依圓不有遍計今總言有即是密也為聲聞說也薀等餘四薀也即是為八聲聞說第一時有教也然此法體但有從緣所生之法非有似有似有若言實有此理不然今總想言有故成祕密之法非有似有故非有自然有似有從緣之有若准疏意非一切遍計所執法是有而有但是引彼一類之人令悟無我而入聖教破外道執有實我也言二相祕密等者第二時說空破法體性相者性也三性法上皆有所執之相據實依圓是有遍計是無今者一向說無性無生無滅義不了故故名祕密言三對除祕密等者言且除者意言若輕佛法等障最上乘故說大乘除彼八障障不唯八故言且也言一除輕佛者謂有人見佛六年苦行便證菩提成道日近生輕慢心為對治此人便說無量百千劫前毗婆尸佛即我身也問一切衆生各自修行作佛是總是一今佛耶答其實各別此約平等意趣說一切佛法身同故又云此有二說一真如法身同二五法法身同故此意本約法身無別言我即是彼意取之中似取我即是彼違破慢仰攝他身故成祕密也言除輕法者謂衆生轉讀釋典粗淺義便輕賤我總解了佛法不難為除此故於大乘中與說於無量恆河沙佛所修大乘行方能信解也問何名祕密答有二種一者信解凡夫之人總解大乘義二者證解初地菩薩方能證解以供養恆河佛故今將此證解向信解向上說故名祕密也言三除懈怠等者云攝論云謂有有情雖已發心謂行難修心生懈怠謂對治此於大乘中說願生極樂世界及稱無垢月光佛名決定當得菩提今約稱名發願是當得因其實修方得意實未得言中似得懈怠之人遂能慕道故名祕密別時意趣也言四除少善等者論云謂有衆生修行少修學得少法便生滿足心為治此故於一善根或毀或讚或讚多聞多聞能得樂多聞得涅槃多聞無義有時毀多聞譬如貧窮人日夜數他寶自無半錢分乃至諸行皆爾意令衆生不執一法法據實善根不可毀今綺互毀讚故是祕密也即意樂趣也言五除貪行等者論云為有衆生貪此穢土五塵境界不肯修行為說淨土之中七寶莊嚴破此人間欲塵障故於大乘說諸佛國土極樂而令趣求問此之對治何名祕密答彼論無解意者理實淨土修諸善業與無貪俱方可得故今稱讚佛土令彼貪故言祕密也言六除慢行等者彼云謂有衆生恃己高貴見佛居穢土身為太子納妻生子成佛已後身長丈六身命短促便於此佛身而起於起慢便與說佛眼如四大海水毫相繞如五須彌山問此何名密答本約衆生宜見淨穢短長不同今假此諸佛增勝之事破彼慢心故名祕密言七除惡作等者謂有有情輕佛法僧悔修善事猒惡所作一生布施臨老悔便為說佛法不思議毀罵尚自生天況殷重恭敬汝見常不輕菩薩四衆以杖木瓦石打常不輕菩薩後遇常不輕教化得菩提生天是前前世持八戒言毀謗得生天者將往昔八戒因向今日毀謗惡因上說故名密也意言說有有情於佛法有行不饒益者由境力勝著之時而生善趣今約不饒益為因故是祕密也言八除不定性障者據實定有五乘各自有別今言唯一無二故是祕密又復聲聞中有作佛者有不作者為令不入無餘涅槃故總言作佛此是祕密也攝問云前之四障即四意趣與此何別答二說一云意趣約能說之人意趣不周祕密約所說之事難解二云謂能化者遠方便中先須觀他一心化根宜宜以佛法而攝受故名意趣後親對根善巧方便說法曲情名為祕密議曰廣略不同實亦無別然一八障中第一第二合解與莊嚴不同者恐是後人寫疏錯也意言合解雖即不同頭數八義即上八段不周之對治祕密了言轉變祕密等者攝問何名轉變復稱祕密答文與義異名為轉變義旨難解名為祕密言雖在即意為別時言中雖說東意中元來在西也偈云覺不堅名堅者覺謂覺察能緣心也境有兩種一定境二散境定境中有堅不堅散境之中有堅不堅問何名定中堅不堅答第一定心適悅柔和名不堅堅者堅固柔和之法何名堅耶二者能依此定起堅固慧堅固慧專注一境名之為堅能知此不堅之法即名堅也故言覺不堅名堅堅者堅固也第二散境緣境猛利令心剛強名為堅也不中守一境馳流散非真實故名為不堅問何名祕密耶答若望大家世人所知共傳者是散之中堅不堅法定心上堅法大家不知有唯善解法者方知有故今日將大家所知散心之上堅不堅法名字詮彼定心上堅不堅法世間人聞說將謂如來說散心散心之上堅法如來本意說定心中堅不堅故名密也言善住於顛倒等者執有此為常樂我淨名為顛倒善能於此顛倒之中了知無彼常樂我淨名為善住意令修行者觀心覺察此四住中名善住於顛倒准此聖教說交令遠離觀察名為善住文與義異名轉變意旨難會故名祕密言極煩惱所惱者菩薩摩訶薩與精進相應三大劫捨頭目髓腦難辛苦名極煩惱也所惱者煩謂辛苦疲倦也惱由亂也故言煩惱所惱也又悲增菩薩留惑助受生隨形六道亦名極煩惱也言得最上菩提者由前三句為因得最上乘為果故言如是等者金云殺害於父母王及二多聞誅國及隨行是行說清淨解云貪愛為母業為父識為王惑見二取名多聞六根名國六境名隨行言此中祕密等者屬當經也即是疏引第三對治祕密中第一輕佛第五貪行第六慢行等障所以說他佛身以為身體也言如下經言等者引證也言顯報化等者意說限身壽命常住化身現有起滅起滅之中明涅槃無上今此涅槃無上便是顯得報化二身差別之相也言示現三佛菩提等者一應化菩提即是他受用佛也經言一切世間天人阿修羅皆謂今釋迦牟尼佛出釋氏宮去伽耶城不遠坐於道場等言二者報佛菩提等者經言然善男子我實成佛已來無量無邊百千萬億那由他阿僧祇三千大千世界假使有人抹為微塵等言得常涅槃者意取得常涅槃之能證智即是報身智不爾與下法佛菩提無別也言三者法佛者論云常恆清淨也言此依初菩提無上等者此即生下三身之義欲辨其三身故此生也意言此依初無上中說有三身也言或總名一佛寶者章敬云覺性覺相覺用三種同覺滿三身合名佛寶也言或分別者牟云別字彼列反言一生身二法身等者法身實報皆名法身法身與無為萬德為依止名法身又報身與有為萬德為依止名法身法身以無為法為體性報身以有為法為體性總名法身他受用及化身俱名生身隨衆生所宜數現生故他受用應十地菩薩現生化身應二乘凡夫現生言又般若論等者一真佛法身自受用身名真佛二非真佛他受用及化身名非真佛初是法身自受用也後二身即他受用化身也言即此所說者即法華經三佛也言或說四種等者大慧菩薩百八問中有此四問云何為化佛云何為報佛云何如如佛云何智慧佛初一是化佛即他化佛中二是功德佛得福也智慧佛得慧也福慧俱是自受用身也後一是法身佛總中二為報者不定功德智慧皆有真實影像互配他自身也言金光明等者一化非應佛為現龍鬼等身不作佛形像名隨類化身佛不名應身佛也有人問云既不作佛身何名化佛答今約能化說所化亦名化佛二應佛非化佛者緣此四句中不攝著他受用身有抄喚此第二句作他受用身即違疏意配此是前大化身應四加行位菩薩所見名應身何以名非化以彼從定所起故若是受胎生現趣身屬五趣攝即名化佛也三亦應亦化者即八相成道丈六之身名應佛屬胎生身現人同類故名化也四非應非化者法身自受用也言一無著佛者謂丈六化身離現欲染故名無著言二願佛者由因中發願度衆生盡盡我則入涅槃願自出生死願度衆生出死故今酬彼願名誓願佛言三業報者業是因報是果故名業報佛言信成就者而無漏為因信為偏勝同萬行總修方得成佛何唯說信答無漏法中信為最勝故偏說也因中行二利得果酬因名異熟言四持佛者即縷素像等舍利住持言五涅槃佛者彼名變化佛即雙林入滅也言六法界佛者即真如法身也言七心佛者第八識無漏之心異世間故能起功德故言心佛也言八三昧佛者大定之力能成就無量功德故問七八何別答前約正行後約助行言九性佛者即法身善決定故諸抄云是見道前本性種性便喚作自受用身佛從本性種三劫修此說非問此第九與第六何別答第六法身與一切萬法為體性此第九與三身為依正體性故別也言十如意佛者即他受用身隨十地菩薩意樂現身有異名隨意樂佛也言前五世俗佛等者且約粗相配若子細論之一二四五化身六九法身三七八自受用身第十地受用身故言隨其所應三身所攝也言勘無垢等者即是見阿閦佛品也言楞伽經言大慧等者明三身說法異也因前來辨身差別文便故便論三身說法也且法身說者楞伽經言大慧一法佛說法離攀緣皆約本智證如說故問法身如來無說法相如何言說法答令生解名說法牟云法身真理同時能證大圓鏡智根本智是主相應二十二法是眷屬心王心所六十六法並名聽人法身令彼一聚之法生一味清淨平等之解為說法也言離攀緣等者離諸妄想名離攀緣無分別故離能觀所觀不帶名言故離所作量量即相也言報佛身等者說一切法自相共相火以暖為自相水以濕為自相自相簡他相二者共相即是疏中同相即是生住異滅苦空無常無我名共相一切有為法中皆有生住異滅故化度攝云苦與一切有漏法為共相有漏皆苦故無常與一切有為為共相一切有為皆無常故空無我普與一切法為共相一切法中皆空無我故言因自心現等者因自心現現行也熏習相故種子即此現行與種子為因生起一切自相共相自心變現熏成種子名習氣因也言亦說譬如等者依草木瓦石作種種約化起一切衆生若干形色種種妄想以況衆生依緣起法起種種妄想彼諸幻識喻依他愚執人執喻遍計亦無真實如彼約幻師所起妄想亦無真實也有云即付真如凝然一體名自相遍諸有為共相此說圓成實性因自心理等說依他性譬如幻等說遍計性言報佛說法者攝云報佛即他受用報佛非自受自受不說法故言大慧化佛者化身佛說六度三科法也言般若云應化者會應化不說法顯是非真說法人不是總不說也言別義如等者如佛地論唯識法菀章七分別惑十二門分別廣說言法報二身者路云他報對化名真也言明三乘所不知真身者即是正答前疑若論正答只是自受用身也法身不是正要只緣得報身時因證法身法身報身能證所不相捨離所以向下正說報身因便密說法身也言此初也者三乘所不知中初標成道久也經言然善男子我實成佛至他劫者若准化身即化不得我有實報身何妨化得爾許多菩薩若更約法身修顯本無無生滅化爾許何失這此中雖標等者此一唱是標文後唱已下便是釋文意道後唱釋文之中說報根身處亦密說法身成前唱標中說報身處亦說法身將釋文例前標文意相承也言初舉喻者經言譬如五百千萬至知其數否者意言假使有人將已上世界總末為塵過於東方五百千萬億那由他阿僧祇唯取最後世界下一塵攝向不著塵世界下前微塵數盡將所著塵塵世界及不著者盡末為塵佛問言此微塵知其數否言由證此故者法身也成道實久者報身也由先證法身成得報身便能應總權現所以說報身處兼說法身也言此彌勒等答有三等者經言彌勒菩薩等俱白佛言至無邊者以無漏智者後得智也經云於是事中亦所不達者於如來所證法上實智不盡也言初標告者經言爾時佛告至汝等者今當分明宣語汝等不是密意說也言後釋劫多者經言是諸世界若著微塵及不著者盡抹為塵一塵一劫者紀國云什公經本無一塵一劫語宗也有僧感夢今置之明過去時長將塵以數劫問何故釋迦發心既落大通之後云何成道乃超大通之前答論其因報之體一得永定故說自受用身成道不妨遠於大通以破他疑他化從緣緣則有無不定宜唱新成引物故說發心成道在大通佛後約他受用身說不妨在大通佛後言恆所住處也者問既報身成道實久爾許時向何處居住答經言自從是來我常在娑婆等言自受用身等者唯佛則知餘人不知也言仍隨少情者問今者欲令衆生見法身報身體如何得見答疏言仍隨少情以釋自體等菩薩二乘凡夫名小情隨彼小乘舉化身用顯法身報身體有用之處則有體有體之處則有用也舉用顯之也言云別所在等者說有國土住處名所在也言亦如虗空廣遍等者意言無礙之處顯得虗空據實虗空有礙處亦通將離障處顯得虗空影取不離障虗空亦有虗室喻如起用之處顯法報二身影取不起用處亦有法報二身也如經言在此娑婆等穢土起化身用亦等餘處等淨土之中起他受用身用也言又說導利十地等者解經中說言亦於餘處百千等淨土中起用也牟云舉他所知即指彌勒等十地菩薩所知且說他受用身成道久遠顯自受用身住處也又云疏主第二解將前塵劫為第九第十地他受用佛壽量且隨菩薩所知說前塵數若論實報兼不可說前解為正言他衆有疑云等者問云世尊既言常在此娑婆世界中間毗婆尸佛俱那含俱留孫等名字各別此是誰耶答疏言今標釋云等只緣然燈佛等即我身改名據名字雖別其體無二所以經云諸善男子於是中間我說至分別也言由諸衆生等者別釋難中初明所由所也問既然燈佛等即是我身何不前佛後佛總名釋迦答衆生宜見不同現種種身種種名字等為觀根性利鈍所以現種種身也言此顯差別等者經言隨其所應至心者年紀大小者牟云十二年為一記言此為成道者解經隨所應度等并現涅槃者解經亦復現言當入涅槃說近說遠或大或小或入涅槃不同皆是方便也言只如澄空等者澄空即虗空也壁彩嘆月也洞者通徹也皎者皎潔也無涯者無邊際也任水旋光者水中月光也凡珍寶有光者名旋光暉華有極有極對前無涯也暉華月光彩也若望月光無涯隨水大小所以暉華有極也澄空況法身壁彩喻自受用身經云菩薩清涼月遊於畢竟空衆生心水淨菩薩影現中似扶此說任水旋光暉華有極旋光與暉華喻他化身水清況衆生根熟發心水濁喻根生不信水清月現佛出世水濁月沈佛入涅槃也言全破器現不同等者菩薩利根如全器二乘凡夫根鈍如破器全器中見因圓如利根見佛大身破器中見月缺如鈍根見小化菩薩利根見報身分明二乘凡夫鈍根見佛身暗也疏中初二句明法身報身次二句他化身後四句衆生根也言此文二釋等者化現之中有二一者不廢廢者妨廢也釋迦成道實久化現新成前來塵劫不妨是釋迦成道實久於中數現八相成道佛為物新成新成化身為衆生也二者四意趣中何妨平等意趣法身平等故利指他佛久遠成道者認為我身一約真如法力同二約五法法身同故四祕密中對法祕密除輕佛障疑六年苦行非一切智人與說報身成道塵劫又除輕法障者見說粗文淺義與說無法可說是名說法若慢佛丈六身王宮生功德少與說阿彌陀佛目如四大海水毫相如五須彌山爾許大身量即是我身也或有增勝說報身報土亦增亦勝也言不爾燃燈佛前誰等者意道燃燈不是釋迦釋迦不是燃燈所以燃燈與釋迦授記自他差別也今經中言如是皆以方便分別燃燈佛釋迦佛總是一佛者約法身理同平等意趣一切佛總是釋迦何故燃燈佛前更與釋迦授記甚是相違若依平等意趣言之則無妨難言此亦化現等却取初解云此亦化現何所相違兼燃燈佛及所授記菩薩總是化現何所相違也言此結釋也等者總結菩提無上也結前也報化身起滅之所以也言密說法身等者若論正要破菩薩疑只合自受用身不要法身緣自受用身事須因法身成所以說報身處因便說法身法身所以者名密說有報身處即有法身不相捨離由證此故說法身也成道實久自受用報身也應物權現他化身也言據實真理本無等若望自受用身證理時真理向上實無現身等事何故言成或說己身或說他身等耶答據實無也如來所演經典皆為度脫衆生所以說有己身他身也言說己身等者金光明經說我昔曾為薩埵王子捨身飼虎也言說他身等者報恩經說彌勒為一切智光仙人乃往過去無量無邊阿僧祇劫時有世界名勝華敷佛號彌勒恆以慈心四無量法教化一切也說慈心三昧經聞者成佛時有大婆羅門名一切智光有六十四能聞佛說法即生誰難不能退伏便發信心誓持此經必得成佛號曰彌勒捨家入山八千歲乞食誦經時遇荒年乞食不得經七日無食林間有白兔其數五百一兔母子見仙人無食而作是言法山將崩法海將竭我今捨身投火以死其食用濟仙命肉既熟已有山神等而白仙言兔王母子為供養故自投於火其肉已熟宜可取食仙人聞已悲不能對久而說曰寧當燃身破眼目不忍行煞食衆生如佛所說食肉者此人行慈不滿足於世世不起煞想恆不食肉乃至成佛先制煞戒語說投火與兔俱亡由是菩薩乃至成佛猶名彌勒即慈氏也不但從母名慈實亦自能慈也言阿彌陀等者無量諸佛出世最後名世自在王佛時有國王聞佛說法心懷悅豫棄國出家行沙門道號曰法藏比丘高才勇哲與世超異詣於世自在王佛所說偈請佛願佛為我廣宣經教我當修行速成正覺既聞法已廣發大願佛告阿難法藏比丘今已成佛現在西方去此十萬億佛剎其佛世界名曰極樂成佛已來經今十劫言由證法身等者故知真理本無此力釋前密說法身問何名密說答真理本無言說由將智證著便能應物現權種種事以用顯體也言此有五句者此處索文經言如實知見四箇字通下五句轉也言初句依妄處等者經云所以者何如來如實知見三界之相者如由似也三界相者相即體相相由性也真如與三界為體相衆生虗妄必見三界生死如來悟心如實知見三界真如之性衆生迷聖人悟聖人悟凡夫迷處二乘不如實知見三界之相一向是染見涅槃一向淨如來實知見衆生界不離真如真如不離衆生界生死涅槃本來平等相國解言如來藏相之性者路云即實相之相性也言世間相常住者簡要云世間即有情世間相謂體相真如也常住即如來藏性也言第二句依常淨等者經云無有生死若退若出者化度云由常故離前際所以無有生由性故離後際所以無有死由清淨故所以無有退由不變故離三際所以無有出言常恆清淨不變故如次配生死退出也言或即生滅者經言生死即生滅也路云此據常法無一期生滅亦無剎那生滅也言第三句依不即等者經云亦無在世及滅度者亦無在世間也及滅度者涅槃也世間不即便是涅槃涅槃元來不離世間故云不即不離也若涅槃即是世間滅時涅槃是非常也若涅槃離世間世間法中無涅槃涅槃應不遍迷時不染悟時是增但為迷悟依也言第四句依離四相等者經云非實非虗非如非異者有為生滅法上有實有虗有如有異真如離此小乘故世間法上生相有者大乘過未是假現在一念生相對彼過未名實真如法長有不是一念有名非實也滅相者落謝過去無體名虗真如常有故名非虗住相者住表此法暫有有用為之法現在一念法上暫有作用名住住相為如如者守自體名如色以質礙心以緣慮名各守自體真如離此名非如也非異者相亦即粗四相中老相也法身離此故云非異也言第五句依佛內證等者經云不如三界見於三界等者相云如似義不似三界衆生見於三界也上言三界是能見下言三界是所見如者依義也意說三界之妄想不能證見三界之體性即是不依三界之妄想見彼三界之體性意言凡夫見妄想如來見真性非是離却三界而觀真諦器及有情二種三界皆此所攝言如來明見無有錯謬者根本智內證名明見也論解此唯屬第五句經文云如斯之事如來明見無有錯謬文勢似結疏主恐人錯所以此間依論聊簡也言應物現權所由等者經言以諸衆生有種種性至廢者性者界也衆生根性不同名種種界界者體性也種種欲者勝解也種種行謂衆生心行也種種憶想分別者簡要云想分別謂遍趣行等即由憶想於六趣中隨造何趣行業名為趣行也言由此等故佛等者由前衆生有爾許多病行差別所以佛種種教化所作佛事無廢種種說示說謂說法示謂教示釋未曾暫廢也言前說報身實成道久等者謂衆生利鈍不同起他化身顯自報身體性此唱說法身實無現身之相由隨衆生性欲起後身故說身不同說身不同顯法身向上用也言第三結成前說者雙結法報二身常住起滅也言法說二身者即法身報身也言後喻說二身等者路云尋下喻文佛說化身寧喻二身答良以下喻中第三觀根道隱喻云或淨土穢土行化淨土之中通報化故今為法說中既有二身喻說之中雖唯說化及彼報身常住也言此即初也者初明報身隨衆生願及本願力皆無盡故經言諸善男子我本行菩薩道等者意言菩薩往昔所成就壽命今猶未盡衆生界未盡故佛壽不盡此舉因行因既廣大感果亦長遠如下頌言壽命無數劫久修業所得言復倍上數者倍上塵數也言衆生界無盡等者問衆生成佛數有何窮以前例後何得不盡答衆生界中本有之數未必一一皆得佛身一分衆生無種性故又復衆生法爾無數若不爾者從無始來作佛令盡寧有今日言然今報身等者問報身既常住不滅如何說入涅槃答疏言然今非實等意言為化衆生示現有也言初明本性惡者釋也問何要事須現入涅槃所以者何徵也答若佛久住於世衆生之本性惡更生惡求住不得故入涅槃也言此初本惡有六等者一薀德若佛久住於世薄德之人不能感得勝人勝法也不遭佛故不感勝人不聞法故不感勝法二不種善根者見佛聞法是善根因今不應佛住世及不聞法是多生已來不種善根言六入於憶想者五見如網也言更生惡有五等者五中初三種一憍姿二猒三怠由初三種為因生得向後第四不能生難遭之想第五不能生恭敬之心言假使烏角鵄等者角鵄白日不見物被烏取兒喫烏夜得不見物被角梟偷兒喫所以相境也辨云本經中六箇喻今疏中引第一第二第四餘三不引也言對前三喻一一應說此後一頌等者即是如來視一切猶羅睺羅緣此一頌是法說對前三喻每喻向後便合引頌言然則入涅槃等者二乘決定不得且於二乘分得之處如來示現入無餘涅槃二乘入無餘身智永無佛入無餘身智常在教化不息形對二乘不同故名無上正是涅槃無上也有取此三事涅槃為此間涅槃無上者非也三事元來自是無上也言身智既不永等者即小乘入無餘身智永無非無上若爾小乘入無餘身智永無非無上小乘入有餘身智在故應無上答大乘入有餘身智不無是無上小乘入有餘苦依在故非無上大乘有餘三事具足故功德是無上也言只如二乘者此下四生三生配前十二喻者約根有利鈍故生有不定由此無明利鈍三生練根得入見道者名鈍以時少故慧未明利故二若經四生練根得聖果者名利以多時修慧漸勝故所以疏言生少得為鈍生得多者為利下亦不依此義以解經文二勤惰相對即以生數少疾得果者為利生數多遲得果者為鈍以疾得者精進是利根人遲得果者懈怠是鈍根人所以疏言今說後對即是依此後解以釋經文也言練根者即前五羅漢退法思法護法住法堪達更修四禪八定練成不動故如俱舍言此初二喻者正配生數數諸抄多解相國且四生者約所逢四箇化佛以辨四生第一最初發心逢俱那含牟尼佛為第一生也第二生逢迦葉佛為第二生第三生逢釋迦牟尼佛為第三生也第四當來見彌勒佛為第四生此段配四生如此若准疏中配喻文處第一生逢佛第二生不逢佛遺教滅後修行第三生第四生皆逢佛也言初二喻者一善達宜喻譬如良醫智慧聰達明練方藥善治衆病二慈矜起化喻其人多諸子息若十二十乃至百數簡要云准經第一第二喻即是二乘見迦葉佛仁教發心而未得果諸子與良醫相見言第三第四者第三觀根道隱喻經云以有事緣遠至餘國第四逢緣或起喻經云諸子於後飲他毒藥藥發悶亂宛轉于地此第三喻今是第二生勤修根熟為利懶墮未熟為鈍既言良醫遠至國諸子飲毒即喻衆生不修行具足凡夫一類四箇發心修行一發心了却退此第二生遇佛入滅遺法之中也問既言生逢四箇佛為四此第二生不逢佛如何言生耶答若泛指則四箇佛四生若依經文配處即四箇佛不足此第二生逢佛也問爭知不逢佛答經云以有事緣遠至餘國第二解云只第二生經文中含得一箇化佛作第二生所逢佛也以有事緣遠至餘國此經文通兩處用一配在第二生佛化緣畢以有事緣向他國或云第二遍向第二生用以有事緣文中含得一箇化佛善根熟已發心遇佛見在世時名為見佛善根未熟者遇佛入滅名不見佛經云遠至餘國是也非全不見佛隱却在世行化時不說偏舉滅後之事故云有事緣遠至餘國根熟發心者佛在世時以有事緣與度若未熟者不遇佛以有事緣他方去也若子細尋求只以有緣之中有佛也若如此解四化生便足又前來譬如良醫喻多諸子息若十二十根未熟者一時見佛及至到第二生隱却根熟發心修行者經文不說唯退服毒藥者問爭知隱耶却前答准後第三生逢釋迦佛諸子飲毒或失本心不失者毒藥一時總服於中服毒深者失本心服毒淺者不失本心第三生既有兩類人准知第二生隱也有遇佛不遇佛者此解甚美諸抄解盡說第二生不見佛也言第五濟生成道喻經是時其父還來皈家第六見佛成咸折喻經諸子飲毒或失本心或不失者遙見其父甚大歡喜拜跪問訊善安隱歸我等愚癡誤服毒藥願見救療更賜壽命第七應根說法喻經父見子等苦惱如是依諸經方求好藥草色香美味悉皆具足搗篩和合與子令服第八根熟道成喻經其諸子中不失心者見此良藥色香俱好即便服之病盡除愈第九未熟猒法喻經餘失心者見其父來雖亦歡喜問訊求索治病然與其藥而不肯服簡要云此上五箇喻並見釋迦佛即鶖子等根熟見佛得無學果佛與授記正是病盡除愈此是前第二生勤修行人也若根未熟懶墮者雖見釋迦佛猶住有學凡夫四善根位向前懶墮人所以釋迦唱滅皆為此也言第十令吝示滅喻經父作是念此子可愍為毒所中心皆顛倒雖見我喜求索救療如是好藥而不肯服我今當設方便令服此藥第十一戀佛受法喻經是時諸子聞父背喪心大憂惱而作是念若父在者慈愍我等能見救護今者捨我遠喪他國自惟孤露無復恃怙第十二得望見佛喻經其父聞子悉已得差尋便來歸咸使見之前第三生中四加行位人至四生見彌勒佛亦得無學回心向大此四生配是疏主依經中本文意也若三生配但是疏主科出畢竟不取此第四生中最寬前來第三生見釋迦佛舍利弗等得無學果也又回心受變易當亦得見彌勒更有第一生發心者第三生見釋迦由住凡夫所以釋迦八相中現第八相以此一類跋提河邊唱滅衆生戀慕種出世善根漸漸修行得至初果二果三果受變易已見彌勒佛有得無學果受變易見彌勒亦有得初果天上人間七反受生方見彌勒所以疏言並令得見因諸抄云當來彌勒佛時去今釋迦五十六億七千萬歲云何爾許時但言一生答約從第三生已後至逢彌勒總為一生不障有多父母生也問疏何不但禮釋迦滅後發心之人得見彌勒即得何要說他釋迦佛在日回心受變易者答若不說爭解四生義又經文自說既言咸使見之初修久修總見故名咸使見之言彌勒即者通妨問既是他彌勒佛化如何言是我化說醫師喻答疏言彌勒即我等言或總說三生者第二解也諸抄一百劫六十劫盡不說且說三生四生言三生等者簡要云一遇三箇化佛名三生問據五濁經賢劫之中入第九住劫已四佛出人壽六萬歲時迦路迦忖陀佛即俱留孫佛也四萬歲時迦路迦牟尼佛二萬歲時迦葉波佛百歲時釋迦牟尼佛出世相去極遠父母生數無窮如何只說三生也答但約三度見佛名三生不說父母生也二者約父母生第一生中逢迦葉命終之後此界人壽短促若生諸天諸方世界命長之處受一生得却來見釋迦佛即成三生三者此界逢迦葉佛最初發心次生餘界受生逢他方佛後還來此界逢釋迦佛即三世三生也或總配三生初四喻配第一生善達根宜喻二慈矜起化喻此二喻配遇迦葉佛三觀根道隱喻遇佛入涅槃四逢緣惑起喻既不遇佛却起煩惱經諸子於後飲他毒藥言初現涅槃者疏云初現兩字初二喻二喻也涅槃之言牒第三喻也彼不見佛牒第四喻次五喻是第二生五濟生成道六見佛咸欣七應根說法八根熟道成九未熟不證此是第二生見釋迦中現涅槃也金云中現字與佛字相連讀故立釋迦佛中現涅槃也若中現字與佛字別讀即五喻之第二生起涅槃處宜至向下令怖示滅喻即是中現涅槃也故此句疏中現涅槃暗指向後第十喻也其根熟勤者住有學位斷煩惱名病盡除喻其根未熟墮者猶凡位而猶未證後三喻是第三生第十令怖示滅喻十一戀佛受法喻第十二得望見佛喻根熟勤者並得無學未熟墮者亦得有學所以疏言此二乘後俱見釋迦又諸抄云疏主解三生義不盡疏中覓三生不得第一見他佛第二生第三生俱見釋迦若約能化佛身說無三箇化佛若依所化衆生說又無二生行相如何說有三生答經云其父聞子悉已得差尋便來歸咸使見之便第三生見佛即是釋迦入涅槃去彌勒下生來便第三生見佛也問疏云三生中後二生俱見釋迦若見彌勒違他疏意也答法性真如同故約平等意趣說彌勒即我力也第二義亦通釋迦牟尼佛却教化來此中有二一者密化示現同類身化作聲聞引令回心向大二者釋迦佛從此方入滅生餘土中去其後遺法弟子初二三果望有學無學修行捨分段受變易向淨土中釋迦佛捨穢土中教化來亦得名為其父聞子悉已得差尋便來歸咸便見之即是三生義足第一生逢迦葉佛第二生逢釋迦佛第三生又逢釋迦佛第三依諸抄解第一生逢迦葉佛第二生已後於跋提河邊唱滅却後三月入涅槃第八相為第三生此一類衆生來總未發心今見釋迦入滅發心故是第三也第一生虗過第二見釋迦前七相不發心第三見釋迦佛入涅槃所以疏主配後二生俱見釋迦也成道是言以此等類者疏云遠結三生皆現涅槃也言良醫等者紀國云醫者意也善解四病之原妙通八術之要下針定差投藥必愈故曰良醫阿含經說良醫具四德一識病體喻知苦諦二識病因喻集諦三識病滅已等喻知滅諦四識病滅已更生喻知道諦問何名病更生答煩惱病有漏道伏遇緣還起如病滅已更生若無漏道已不生也又云外道治病還發為下醫二乘治病或發為中醫如來治病畢竟不發為上醫醫者說文治病士也醫性多嗜酒故字從酉燉煌實録云張存字德正善醫嘗自稱醫字賢者顯尊者腹我行東西悉酒肉多活人命必受天祿言智慧者意無不次為智言聰達者聽無不了為聰思無不通為達也言明練等者紀國云方喻二乘教教名方也藥喻於理所詮理名藥審教知理故云明練方藥隨授必了名善治衆病也經云其人多諸子息若十二十等紀國云受化為子傳化為息也今且說有種性子不說種子也言十二十者聲聞十法行名十緣覺十法行名二十簡要云聲聞十法行名若十回心向大修菩薩十法行名二十緣覺亦爾問何故多說菩薩十法行耶答正宗經為漸悟不正為頓悟菩薩以菩薩性二乘中不決定有故不分明說亦有說乃至中攝問三乘人各修自乘十法行十十相資合有三百如何只說百數答據實合言三百以數聲等但言百數也第二解乃至百數一句唯屬大乘十法行十十相資故言百數問二乘百行何故不說答二乘百行不感佛果百福病莊嚴唯說大乘不取二乘也言為不定者二乘即正菩薩即兼故衆子遊居云長者諸子若十二十或至三十在此宅中此云乃至兼正說故云不定也此上二喻令第一生言三觀根道隱者智慧隱沒名道隱也言他方機者他方衆生根熟感如來教化名事緣也言或往淨土者前以自他相對名餘此以淨穢相望名餘也若本來居穢入淨名餘國彼此異故若本來居淨土從淨入穢亦名餘國淨穢異故問何名餘國答示居生死向淨穢土中往來名為餘國言無佛已後者其人近出未久之間於後宅舍忽然火起稟外道邪師相教損衆生善根名飲他毒藥起惑造業名藥發也無明惛醉迷暗身心不識善名問亂不生死名宛轉于地宛轉者不行義在死中不修行也此一唱經意如來滅後衆生誰人救護有飲毒藥者有不飲者經文隱却不飲者唯說飲者法中論一種見佛一滅修善於中有退者有不退者或總服毒藥服淺者不失本心服深者失却本心後宮言或失本心或不失者唯知此唱有二類人經云是時其父還來歸家亦同譬喻品長者聞已驚入火宅言昔日所化者前解約報身居淨土亦現居彼生死之家化有淨土不名歸家向衆生生死中來生是化佛家故云歸家言或昔化者此約如來化身本所化境生死是化佛本住之處如今却來名歸家如再任綱維生死合是化身住境名家所以疏云本住名家也經云諸子飲毒至皆大歡喜者章敬云地位遠而稱遙根性會而名見也又疏云未以現量證佛理名見但以知故此解不然佛稱遙見應佛有比量也既無比知應名遙見則解正失心與不失皆歡喜問訊其不失者兼行拜跪也歡喜意業問訊語業拜跪身業問佛以知失心之人不拜跪耶答經文云失心之人不說拜跪又雖聞教歡喜交行行不肯故知失心人不肯拜跪言善安穩歸者安穩謂涅槃體即勝義善從涅槃而來故曰善安穩歸也言失淨起染者淨即白淨無記異熟生心無記是本故不失即守本無記白淨之心或本淨心者說彼初喻初喻教發心名本淨心也言依三世佛等者佛教法名經方也言求理者石藥等是藥不是草也今取是藥之草石藥況理是藥煩惱遣由證理病差由眼藥也言行草者今取是藥之草喻行稟教修生如草之長也言戒定等者色喻別解脫戒身口七支戒是實所引色香喻於定即五分法身中之為香故慧能調和諸功德故所以配美絡者前以真理名藥意言正證理之時乃知此藥色香美也又理是故三學實性如藥香味又此之三法依冥理方有猶如是味依藥而有言或息惡者也能息惡除惡色生善色故香能務善順益於人故比香也美味能利生利樂衆生是諸佛如來所愛味言智慧簡等者即三乘五性四諦因緣三性度各有自乘之簡擇慧分折故名擇言播揚者篩了以除粗取細也經言汝等莫貪者粗弊色香聲味觸等名播粗妙乃至諦無漏有為無為上界如次名粗細也言今所三等者金云三學三行各自隨順或玄隨並得今謂念定如臼慧等如杵勤如人勝解如羅欲如密調和故信如酒言勸之服行者與子令服一句經也言福及慧者福即戒也前雖以定配香今以慧配香五分法身中有慧香也言得兩釋者即是經其諸子中不失心者良藥即是釋迦說二乘教也經文略故唯有色香而無美味即俱中攝也此一唱相云若依四生中配不失心者第三生見釋迦成無學名病除愈若依三生中配第二生中見釋迦住有學漸斷煩惱名病盡除愈有學之人初二三果隨得一果但望一分煩惱盡處說也名為除愈也所以疏言得道兩釋如前已解經言餘失心者其父來至而謂不肯服者法中論衆生見佛出世懈怠起煩惱者亦皆歡喜恭敬亦聞二乘教及至交化悟理依理起行即不肯故不說拜跪又不肯修名不肯服藥經所以者何至而謂不美者無漏教法而修行猒捨名為不美問若以毒氣深入於美謂非美亦應毒氣深入於父為非父答良藥多苦口或深謂非美父子天性也相見故眼明雖深知是父妙行難可行怖心謂是苦見佛種性排或深識佛即以良為美非以甘甜為美言未熟厭法者前云未熟不證今云厭法文別意同言初少求法者如人若教聽教則能若教悟理起行即不肯又世人少行檀施即能即不能持戒等力未堪故後三月當涅槃佛告波旬待我有緣衆生未度者度訖又云有會必離有生皆有死已受波旬請決定入涅槃大地及日月時至皆歸盡又云一切江河會有枯竭一切藂林會皆雕折一切恩愛會有離別有愛則生愛盡滅言教留遺法爾時世尊在娑羅林間北首而臥臨入涅槃告諸比丘我在世以佛為師我入涅槃婆羅提木叉者是汝大師依戒而住又以僧伽利衣現𮌎臆相告阿難言臨河羡魚不如歸家結網汝若愛我金剛不壞之身勤修苦行何愁不得三乘聖教唱與阿難戒律文章鍚杖鉢盂付與迦葉努力為吾修行遺身舍利散在人間勤須禮拜經言死時已至者涅槃會五年也言道成既久者問如來八十種好中有常少不老今云何言衰老答疏言道成等言入滅時近者即却後三月也言遣言教使者跋提河邊唱滅說遺教經即言教使或涅槃經後兩卷是紀國取分布碎身舍利為使嘉祥取泥土等佛像為使等紀國云子見神杜知文經法中見佛遺身舍利信言入滅經云是時諸子聞父背等者即涅槃會中衆生哀戀也言孤子何賚者居列者單也賚似也賜也意言惟賜救念也如來若在世衆聖即莊嚴如月與星辰四面涉圍象王既去從誰求法寶也經言常懷悲感等者即資糧位修觀行等名悲感能引加行故云心遂也言悲感依教者此見釋迦入滅從資糧位中依教起行也心遂醒悟依教起行至見道前四加行位作五根五力四諦觀觀上下八忍八智伏煩惱名醒此未真醒悟也或入聖依無諍智斷煩惱名除愈醒悟也經言其父聞子悉已得至咸使見之者若四生中配第四生得見彌勒若三生配第三得見彌勒此一類釋迦在日懶墮不肯修行見佛滅後修行得有學受變易當來得見彌勒并釋迦在日成無學受變易者亦見彌勒所以經云咸使見之問何名尋便來歸答此兩類人釋迦滅後彌勒未下生中間得乎果受變易遇彌勒佛下生名尋便來歸也第二解或為父修者從地前入初地見報佛名來歸第三解或二乘人回心向大受變易地前修行四加行位見大化身亦得名為尋便來歸咸使見之言此喻問答等者問實不死言死者豈不是虗妄耶答意徒服藥約利益大故名不虗也金云上來七喻皆明權實火宅喻智權實窮子喻人權實藥草喻教權實化城喻理權實繫珠喻解權實明珠喻說權實醫王喻身權實於中說通教理行果藥草教化城理火宅窮子繫珠三是行醫王是果言初二頌報等者問報身常住說法可爾化身何言常答化身應羣根故名常也言一偈無緣不見者衆生顛倒自不令得見若佛久住於世令衆生見佛便起憍恣而懷厭怠不能生等五種過生所以神通力蔽之令顛倒衆生雖近而不見言恐見生過者金云此明報佛二乘地前自然不見何得更言恐見生過答若望本位即不合之若望神力加之何得見如因見東方等今謂不爾者恐窮子驚走也即同窮子驚愕稱冤大叫也名生過也經言廣供養舍利者有問此既報身寧有舍利耶答此七地已前悲增菩薩所見報化有父母何妨滅後有舍利故如光所見塔高五千由旬豈非報佛舍利塔耶言半頌現身者時我及衆僧俱出靈鷲山是化土見隨小情指別所在言說身在此者以用顯體報身常在靈山化身現有入滅報之與化皆不離本處攝化身用歸報身體言一偈半化入涅槃等者此身化身二皆是化身處所亦別問既是報體即合常在淨土如何說出於靈山穢土耶答疏云於靈山處現或現有靈山者上句顯報土無但有處所即是於彼處所現也下句顯土中有化靈山也於彼有山處現更解上句如前報土中無山但有處所也下句顯化土有靈山意言化身出現於有山處也即是化受用及二佛雙說也此中疏主但說報身者以化用及化顯彼自受用身遣彌勒菩薩疑也疏主順經但言報佛字也言結報身等者問既言身常在靈山不滅何故衆生有不見耶答一偈半明身結見與不見所由初一偈不見佛所由後半偈見佛所由言見淨土等者見即上位不見即下位也言初頌住處者經云神通力如是於阿僧祇劫常在靈鷲山者化身住處也及餘諸住處者自受用報身住處通而言之即淨土穢土此方自東自西自南自北配不定故云及餘住處也言次眷屬者上兩句化身住處經云衆生見劫盡大火所燒時下兩句他受用身住處經云我此土安穩天人常充滿菩薩即是天人也言此中有三者二偈報淨土相園林諸堂閣後一偈化土相憂怖諸苦惱如是悉充滿淨土離之言有事功德者事謂事法即有為功德即指園林堂閣等功德者即總持為園菀等言論云等者法華論也言報身佛如來至第一義諦者路云攝相歸性以真如為體名第一義諦攝此解不正只如穢故還不以真如為體耶今取可破壞義名世間不可破壞名第一義諦相國云二種一當體名勝義即真如是二約人名勝義即勝故知非唯真如言此四頌合者經我亦為世父等一頌總合前文意次一頌經以常見我故而生憍恣心等合前為治狂子故實在而言滅後二頌合喻中方便兩字也若不作此配疏何名為合也
