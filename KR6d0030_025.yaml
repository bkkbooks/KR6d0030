body:
  text: 鏡水寺沙門抄言隨應有等者色無色薀下二界具有意言地法有處則喻無處不喻也言由此三義等者因此三義顯得空性即是苦空無常無我不淨也言奪衣作褫者古云奪衣謂擺也即斗藪也今從奪易云鍚之以盤帶終朝三褫之鍚由賜也盤帶即腰帶也一日之內三遍被脫紫袍金帶三遍却論得如此之衣服論得亦不貴也褫即剝色義也言今應作陀者同説文也據功作陊也徒活反與奪強取也言木理者文理順也言覆苫等者彼生年少時皮膚光彩生名覆苫年老已後皮一片片落以麥趃相似名亂墜言白蓋等者與合同音胡臘反郭注白茅草也即是編函白茅以覆屋為之苫廬禮云𮄊苫枕孝之所居草屋言桷端木者桷者椽之異名爾雅謂欀也注言屋椽今言桷端木即今連簷合為連棉正言今謂梠者是㸑之所栖宿寄住處曰梠與旅同法中骨節如椽脈如梠若其老去𭨫即無力骨節差脫也言瑜伽第十九等者問有何聖教説五薀為舍宅耶答疏言瑜伽等文在第十九為正十七非也引意者緣上三句別配色身無常恐義無由故引此教證也埿塗等三句經彼既以心城喻身今此以身比宅是以引之下結故以肉為埿塗也言引經頌言者即解脫經也言墉者墻也餘鍾反表也筋肉血塗餝骨城向上將筋肉血塗飾如州府城墻上著石灰埿餝也言城謂八識者相云城是所依禦攝之義內庶物外御胸攝內不出御外不入攝內貪等四法令其不出御外信解等善令其不入故喻城也第八識喻子城內能執持五防令不壞故若前七識喻外羅城能著險道善防於身令第八識不斷絶故云骨充磚石喻上説纍磚石作城即喻人身中骨也言繩絍者切汝鴆反由城有繩絍即連持於城若筋即連持於身也言形骸等者攬衆多法也骸是色身之總名墉者是城之異稱若準涅槃經等多取身為城今取八識城也心王為城此四種法是心王家所持之法言三寶往化者佛往化名佛寶僧往化名僧寶口中説法名法寶也言二種心城者第八識為內子城前七識為外羅城故言二種心城心即是城入者解義無始時來上不能解了二種心城體性顛倒虗妄而何能求取佛法修唯識果而為己有此解順前城謂八識然不順下解四法文攝云三解第一在家起貪嗔名一出家起慢覆名二此二種體非心城住心城故亦名心城二云一善説法二毗奈耶名二種心城也與心為城故名心城三云善説法毗奈耶名二種與此二種相應之心心即是城故名心城攝云第三解最親即是心與境為城也若準諸中意耶能説法人心心是能緣二境心緣二境心為境與心為城名二種心城也能聽之人出家在家於此二種心城生解名入心城問善説法同於何義答善説法是經阿毗達摩是論毗奈耶是律若爾合言三種心城何但二耶答初二合之故言二也攝彼論藏入善説法經藏中故唯二也對彼出家在家二類別故經論二學勸誨俗人律藏為出家者修多對法通在家出家人修故唯合二不開為三也言況能取等者意言彼在家出家二種心城尚不能入解了觀察況能趣向以為己有佛説善法上不能攝為己有豈能自起説法之心由如有美食尚不能喫肯更能為人辦之者哉大論十九説善説法謂諸沙門惡説法即諸外道也言樓櫓者即是却敵上可有之物名樓櫓能防護彼城喻人手足能防護身言目為竅孔者口豫反切云穿也向外看也言頭為殿者頭最尊故猶如城內殿堂其心王即在殿堂中住也諸經尚自以骨為城何妨法華骨為椽梠言周障屈等者此喻無我意説若宅中有我即有有自在隨意可作而無障隔屈曲所作不得自在多有障隔屈曲明知無我也言三十六物者頌云外相三四醜身器二六成中含十二穢九竅惡霑形三四者髮毛爪齒脂淚涕唾垢汗便利二六者皮膚血肉筋脈骨髓肪膏腦膜上曰肪下曰膏十二穢者脾腎心肺肝膽腹胃赤白淡陰生熟二藏也言此三義者一無常二無我三不淨故成空言有二十九頌者長行喻有三句經文長行合云愚癡暗蔽三毒之火二句經也偈述二十九頌廣略不同也言結上難等者經云其宅如是可怖畏毒害火災衆難非一此都結二十九頌也言長行災起準火等者問長行火起燒宅偈中更加蟲鬼意在於何答被言長行等言如言三毒等者謂貪嗔癡亦云三株杌亦名三燒燃亦云三不善根追求諸染境名愛焚燒善根名火傷害善身名蛇纏遠福林名蔓心恆求境名濁障出生死名網汗諸功德名毒潤生無盡名水漂沒有情名河竪通三界名縱橫攝四生名廣利害善身名針連持生死名縷言後一頌半通結此二者即是五鈍使五利使為二也經云夜叉餓鬼諸惡鳥獸飢急四向窺窗牖等言半偈結之者經云其舍恐怖變狀如是此結前六偈也言此中配屬無等者經教中無説處行相相應即義相配八鳥喻貪十蟲配嗔行相相應也順古且然者順古人章被且默論本不釋者法華論盡不解未必則是義符順故者必總不豈疏主意中總有識薀配宅餘四薀是堂舍也生老病死作四面五道種子況五百人三乘無漏種子喻三十子自餘煩惱更無分配處只合是蟲鬼也言貪愛有四等者一現有愛簡要云謂愛現在五薀之身種種裝餝配更藏閇好處徒人見二後有愛者希後世還得此身堂堂六尺語聲似鍾或天身光潔自在於後身後身起愛三貪喜俱行愛謂於現在得五塵境貪著保玩起貪起喜故名俱行四彼彼喜樂愛者謂於未得五塵境心生貪著得已更貪未得則不一故名彼彼四中初二緣身起後二緣境起言皆據別行等者若論貪物物皆有今依別行相且配四種愛以現可見故問何名現可見答疏路云指八鳥身上貪之行相不然但是四愛向上現有已得未得境即是現可見境言鷲梟等者疏中配與經文不次也四愛中分上下品上品四愛愛即貪上品四愛配四大鳥下品四愛配四小鳥也且上品四愛者一鷲説文云鷲鳥黑色多子師曠云南方有鳥名曰鷲黃頭赤咽五色皆備西域多此鳥蒼自赤唯貪死人常在山間藏隱護身採取養活自身如現有愛愛自體故二梟夜後作聲現怪知後不祥準擬人拋物與喫如後有愛愛後苦果即是不祥名後愛三鵄於現得物上起愛撮得老最貪愛喜歡樹上作聲如貪喜俱行愛於現前已得物上生貪貪已生喜四雕於未得蟲兔向上起愛為力大故性多傷煞於物物上起愛擬煞名彼彼貪得一物轉轉望多如彼彼喜樂愛於未得可愛物上起希望故上解順疏違經次第依經次第配四愛者一鵄但資當日之身更不望後如現有愛愛自身故二梟白日不出思於夜求食如後有愛愛彼有身及未得物三雕有力故隨現所有物得已不捨即能食啖生貪生喜如貪喜俱行已得物不捨故四鷲知人死長思未來人死食之如彼彼喜樂愛愛未得之物物既不一名為彼彼喜樂愛也言烏鵲等者配下品四愛一烏於現身上起愛盜他男女餧自家身若向他人家拾得食喫易驚難打才擬打他早起也如現有愛愛護現身如現有愛故二鵲鵲多諂詐向人家許作喜聲準擬人家向後拋物與喫名後有愛三鳩鳩性多耎無硬強拾得一顆穀麥嘆舍資作聲喜歡只於已得物物起貪愛名貪喜俱行愛四鴒鴒性多淫淫心不足故於未得物上起愛起愛不一名彼彼喜樂愛乎問貪分其上下兩品可然八鳥何因亦分上下答前之四鳥梟能食母現怪義強餘三力用人故故分上品此八鳥但約力用大小分上下品不約性利鈍分也言或鈍等者第二依經配也性鈍貪者喻老鵄性鈍也毛多小肉不能捉兔檎獐但向糞塠頭拾死老最小兒手裏脫羊腹阿師不食處趁衆生食飢來向街中覓物飽則向空裏敖朔如世間擎簷客負人又如挑撥查名性鈍貪二現怪貪者喻梟梟夜後作聲人謂不祥即喻所由等愛夜後向人家門前説道理現怪覔錢用亦如師婆説他家內有鬼怪而求錢物三大力貪者喻雕雕有大力能擒獐抱鹿煞其狐兔等如鄭注云徒千貫萬貫亦如作官人粗枷大棒打人取錢四動身貪者喻鷲鷲取欲求食先須空中回翔盤轉三五匝運動其身夜後山中藏白日向王城中覓食喫諸鳥悉無乃敢求食商人經紀亦薄張俗講法師外處覔講等五非法貪者烏烏求食時多非法求取他兒以引己命如縣官等粗枷大棒打人及盜劫取錢六發語貪者鵲先發聲意徒人家新婦女郎呪𮨇鵲女好霄好息拋物與喫如亦世間人行諂人求名利亦客遊措大事當言語大奇灼然安隱好在又如下噬牙郎等用巧言令色覔錢物用七卑下貪者喻鳩鳩求食不能取大假物但拾遺落穀米隨得三顆五顆映舍資作聲故故喚阿姑如世間出坑除糞漢等事雖下劣亦復生貪八多淫貪者如鴿鴿性多淫如崇仁平康風聲女兒亦如人家不肖子弟放一捉二鈎三攬四柢手不却不簡好惡也言依遺教者問引遺教經中黑短蛇為復證上黑蛇為證黑短蛇答下文解遺教經中黑短蛇兩解不定所以此開兩勢雙證也言漢書玄蛇者此上玄應法師意取黑蚖不取蚖字所以廣引漢書解蚖並不是毒蛇二人解漢書韋照解玄者黑色也蚖者蚚蝎也崔豹解玄者蛇醫也有説蚖被人傷此蛇吐水點著即差故號蛇醫大者長三尺其色玄紺玄者黑色紺者即亦黑色善魅人者能作變現或亂於人如野狐等魅人也就豹解中有六一解蛇醫大者長三尺等二列四名蠑蚖下三結玉篇云蛇醫下四解別名在舍為守害下五玄應法師重成前義準此遺教下六疏云解疏言今解蚖有二下言準此遺教經等玄應法師解義出取蚖字所以此師意韋照豹等解黑蚖既能醫蚖又言魅又言魅人不言傷煞不是毒蟲漢書黑蚖不是毒蟲遺教經中應取毒蟲為喻應合是黑蚖錯為蛇字言今解蚖有二等者疏主解中甚有深意意緣兩個黑蚖第一者無毒而有多名第二者有毒唯名為異蛇更無別號疏主此間簡取有毒者餘一個無毒者不取今取與不取總名黑蚖至引文之時不可兩個黑蚖總引所以不取者舉別名以簡之即是蜥蜴第一漢書中黑蚖無毒也次言黑短蛇正當取者自有毒蛇名為黑蚖非是韋照等所解之類也準疏主意黑短蛇即與遺教經同也玄應法師見漢書中蚖無毒遂作蚖字解與疏主意別疏意但名黑蚖非蚖音言故遺教經等者疏主結自義黑短蛇是毒蛇故不應錯彼經云煩惱毒蛇睡在汝心譬如黑蚖在汝室睡當以持戒之鈎早屏除之睡蛇既出乃可安眠言但名黑蚖等此唯獨名愚袁反此是水蟲等者只是黃蛇箭檊蛇凡常之蛇等問於解蛇之中此蛇與前黑蛇與後蝮蛇何別答蚖蛇即是黑禿尾蛇蝮即報怨凡蛇即餘一切蛇言三蝮等者切芳福反蝮𧈤也言爾雅等者博者闊也廣也首者頭也擘者如人擘指廣雅云擘謂分手也言有針者毒刺也言綾綬者牟云今綬帶其文交洛五色之通號也言有𩮻者良涉反毛也螫手直斷手者切云蟲行毒也此蛇咬著人手須臾間毒入心即死若被咬已便斫却手即得活腳亦然也言四蜴者時人呼闥剌如母指大蛇毒在頭蝎毒在尾也言蜈蚣者蝍蛆者蜈蚣之異名比蟲若喫蛇直人腹喫却心肝或食腦髓蝍蛆子余反爾雅云蝍蛆似蝗蟲大腹長角食蛇腦髓也言六蜒蚰者問蜈蚣蜒蚰何別答青身黃足者即蚰蜒緣身赤足者即蜈蚣赤足堪作藥黃者不堪也言七守宮者黃帝將遣守宮如疏問此黑蚖既是通名何故不説今取蠑蚖為通名答所望別故蠑蚖是三中之通名黑蚖是四中之通名亦不相違言百足者時人見他足多呼為百足亦是言實有百個足言九鼬者鼦雕音鼪性音鼦石音即立鼠也田中有孔見人奄手書云石鼠有識人之無識名死也相鼠有禮人而無禮言蒿者縣名在建平郡也言郭璞等者郭璞注山海經故引也言應作貍者意言無大傍作者言春秋等者春秋記魯國事每至郊天之時準禮皆先養飼牛羊等名牲特祭天時取以繒綵飼以粳糧等若少有損傷即便不堪用然祭天之中其角大如繭粟相似已上不堪則取其正懶名曰郊牛也鼪鼠好食其角言至盡不知者如蜂食青蟲也言嗔之別相等者解嗔取十一之所以也如食有八以配四貪有上下品也言己身有觸惱己身便即生嗔或可自知不是便即生嗔二所愛者謂妻子等有説要欺陵罵辱便即生嗔或可嗔比所愛有情三非愛者先與此人有於嫌恨聞説其好便即生嗔四過去者謂與人有大怨酬彼已已沒聞其好惡便生嗔或是父母過已後聞人説惡便即生嗔未來現在準比言七不可意者所愛五欲是可意者即生喜不可意即生嗔或即緣非情起如呵風罵雨等八嫉妬者害賢曰疾害色曰妬於賢於色曰嗔九宿習者謂於多生結怨不捨今相遇雖不憶識見即生嗔言十他見者他人見解其實理長己身見解道理全無見不如他即生嗔也如爭義唱賤等言隨惱等者問何名諸惡蟲輩交橫等答疏言隨煩惱等謂忿恨惱嫉害五也言猛利者如斫營突圍等蚖性不嗔則已若嗔藥王木而不可救如難犯人犯方嗔起節度使三軍皆煞言被惱者蛇性自住行人若觸惱方行毒害如快性人不忍人犯著即損不得則休言報者如蝮今年被損來初即不報後不簡遠近必報讎如結怨不捨地獄等言現相者蝎行氣尾行現嗔相言害毒者如縣官打煞賊等蛇等已毒被蜈蚣能害言不能斷者一遍違齊死不妄常恨云已後共你鐵把相斸等蚰蜒身分一一皆斷時分分皆動名斷嗔也言嫉妬者妬元載妻截婢手等守害之血塗臂不落則是妬他嫉他也言煩惋者如鈍漁被妻惱便自侔頭性等百足行時以輕觸著便為一團而自嗔也言私切者如新婦被翁婆罵詐為歡喜輩後房中嗔夫聟等鼬捕時潛身孔邊自氣尾詐為喜相而行捕撮嗔心在內名私切嗔也言損煞者如獵師公行損煞亦如干戈鬪時公行是事也言潛計者如陰謀人心中最毒心中嗔面即笑心恨貌恭鼷鼠心中毒食諸鳥獸至盡不覺不知亦名甘口鼠食郊牛角亦不痛名潛計嗔也言交橫等此解與前逢緣生起別彼配隨惑此但是結也言起七九等者謂於三際各有上下二別即為亦總復為一總別合論即成七也若三世各三謂上中下合而言之即成九也今言七九者兩重配釋各據一義若準瑜伽論第九説合言十九種愚言七九者誤也即十九中合為七類一世愚二事愚三輪轉愚四最勝愚五真實愚六染淨愚七增上慢愚言九種者準抄釋取十九種大論第九云一前際無知謂我於過去為曾有耶為無耶二現在前際無知為有為無耶三未來亦爾四於內無知謂於各別諸行起不如理作意謂之為我五於外無知謂為諸行為我所故六於內外無知為於相續諸行起不如理作意分別為怨親於內外所有無知七於業無知謂於諸業中為有作意者等八於異熟無知九於業及異熟即前二十於佛無知不思惟或思惟十一法十二僧十三於苦無知十四集十五滅十六道於此三寶四諦無知或不思惟或雖思惟或由無知或由放逸或由毀謗十七於因無知為計無因或自在或計丈夫不平等因十八於因所生諸行無知行相同上十九於觸處通達無知謂增上慢者於所證中顛倒思惟所有無上明十九十七下九世愚有三謂愚前際中際後際即愚三世名世愚二事愚有三一愚於內二愚於外三愚於內外名事愚三移轉愚愚有二一異熟無知愚二業異熟無知愚此二名輪轉愚四最勝愚有三謂愚佛法僧五真實愚謂愚四諦即為四種六染淨愚有三一愚因二愚果三通愚因果七增上慢愚唯一即六觸是於中初三分內全次五一分及苦集正順經文屎及蟲餘不相違也言三德者問何但説三不增減耶答被言有二德等一狐色多黃黃中方之色中勝餘色是一德二若於野行時小者在前大者居後若爾不順何名為德答如母引子令子先行却成恩德三將死之時必能回首於本丘墓必不忘本故名為德戒為守字誤也齟側呂反亦阻音齬鋤呂反音語非含嚼義唶子夜反齧也噍木笑反𭊮時制反嚼也茹人粗反飯也言斷筋等者此段疏文三處違妨若準此文嚌深而齧淺次云多噬名齧至齒名嚌即齧深而嚌淺復云疑苦集之淺法如嚌嘗至齒疑滅道之堅法如齧傷皮肉故又似嚌深而齧淺答金云苦集是有漏行相易知猶如軟物嘗至齒時即斷筋肉滅道是無漏行相難知由如硬物縱然多噬但傷皮肉牟詳此解甚善猶未盡理且準字書解嘗入口名啐七內反嘗入口也今嘗至齒名嚌準此即淺取名嚌既斷筋骨即失嚌義云何以斷後得名嚌又復苦集行相易知合疑少云何却斷筋骨滅道行相難知即合疑多云何但傷皮肉牟解雖至齒名嚌然於其中淺二重齒主借彼淺至齒名顯此深至齒義故斷筋壞骨而名為嚌然疑苦集而名嚌者此中不以疑多名深疑少名淺疑心是一然苦集二諦現可見故疑行相多易為疑故名折骨斷筋滅道二諦不見故疑行相少難為疑故傷皮肉如人欲擬羅織平人鈍漢易設計強者難設計若擬羅織之心是一不妨前有弱又苦集疑淺者如俗書義滅道多者如經論義以心研究多如斷筋骨言應作𪘜者卓皆反若取嚌齧即嚌深齧淺若取𪘜齧即齧深𪘜淺既言𪘜深即齧淺亦通深淺也言𪘜發於口者法合也經言䶩死尸者潞云準經義勢真於尸上而嚌齧之疏釋寧配於四諦也答今助解者死尸但喻苦集二諦疑苦諦等之顯法如嚌死尸疑滅道之隱法如齧死抄主詳不爾喻上説死尸二字方咀嚼轉由咀死尸等所以骨肉狼藉也法中説口疑之咀嚼心疑之踐踏即於滅道之上齧並於死現身之中而起此疑法喻雙舉問滅道何名生死答滅道是苦諦集諦收意説滅道二諦在此生死身故言生死又有漏心變皆苦諦收由疑故生死之尸不斷也有何乖違也言疑苦集等者此中苦集雖言至齒是淺已斷一切肝骨故説言深齧言深難取故名淺問此三獸有何行相而喻於疑答狐行水上聽水聲流不聞水聲方遇狼從窟求食時以前腳抱頭而立隨身倒處而便求食野干巢於危巖善能緣木把著一枝方一枝即下傍上配三狩也問三狩配三寶三寶三世三界可爾如何配四諦答諦是境又解苦集三界中收滅道三寶中攝言一頌半者名慢答慳犳犳多慳故護舍之相可知言七九者唯識論云此慢差別有七九種謂於三品我德處生且七者一慢於下品中品起於劣計己勝於己等二過慢於中品上品起於中品上品起於己等計己勝計己等三慢過慢者於上品起於勝計己勝四我慢總緣五蘊為我於中起慢五卑慢於上品起謂他多分勝己少分不如六增上慢及第七邪慢於德處起邪即全無謂有增上慢少分得謂多得九慢者大乘經中不見有文俱舍十九云如是九慢從前七慢三品中雖出也所謂我勝我等我等我劣有勝有劣無勝無劣無等無劣一一皆言慢類過慢卑慢如次説初三卑慢慢過慢如次説中三慢過慢卑慢如次説後三過慢於等計勝於勝計等即中上卑慢於等計等中也卑慢上下中下過慢中中慢過慢中中慢過中下中上卑慢上下言多因疑起者問唯識六云慢陵定境不與疑俱如何此處慢因疑起答前後而生不違論説也言搏擊等者問群狗有搏撮等事答如狗向前咬向後據亦名搏撮也言與四圭者潞云十粒謂之圭十圭曰撮又云十四粟為圭十圭為撮今言四者更問言咬玉篇咳音亦女交及扯車者反列懷也攞來哿反列也䶥鋤加反齖不言不知喍者切韻六個字喍天也齒齒不正也花藥㧘積也著卑蓮車㾹瘦也經言處處皆有等者三句經文喻邪見體也撥無因果如食人肉空起貪嗔癡卑過罪況更謗無三寶四諦如食人肉言老物精等者謂多年老野狐老狗老鼠老野狸等能作變怪也言山澤等者即山澤中現怪怪物名魑魅言山神虎形者第二解魑與別山神虎形即取山神鬼作虎形也言木石等者即取多年華表木掃帚等言添夜叉與惡鬼為二言總有有五類者一魑二魅三魍魎四夜叉五惡鬼能喻有五所喻亦五也言緣撥五門者謂四諦及修道俱舍云五部邪見緣之為境誹撥為無不信也言五法者一心二心所有等等取色法不相應無為也前四有為第五無為皆撥不信也言有五行相者對法云謗因者一無施二無愛樂三祠祀四無妙行五惡行安國云施等是五因而言無等者即謗是謗也問施與愛樂祠祀三種何別答施與是悲田愛樂是恩敬田有此差別謂有外道依世間諸靜慮故觀見一生恆行妙之者死墮惡趣或有行惡行之者却得生天作念言定無施與愛樂祠祀妙行惡行二謗果者謂無妙行惡所招異熟果勝妙異熟果非撥無果體但言非彼所招三謗作用者無此世間無彼無間無父母無化生有情等言無彼世間者謂有外道得宿住通觀三世有情過去是畜現在是人未來天便作是念故知無有彼此世間從於過去於現在亦無現在生於未來世間即有情世間也言無父母作用者不信此身從父母生父有六種之功母有持胎之德見母命終而為其女見女命終為其母父終為子子終為父言無化生有情者或復見人身壞命終生無想或生無色或人涅槃求彼生處不能得見作是思決定無有化生有情以彼色身及心想了不可得故四謗實事者謗無實阿羅漢智斷之功非謗無有情之體此因自得果趣如冥聞比丘命終之時中有身中起如是謗世間無有真阿羅漢言及非邊見見取戒禁取等四見所不攝者皆第五邪見所收見不正故總名邪見為計自在天世主釋梵及餘物類常恆不易等言明由邪見生鈍等者即由前處處皆有等一唱經文生得此第二毒蟲之屬一唱文也牟云由邪見生鈍煩惱此明利使而經言毒五等者乃是鈍惑故作此科意言由前一頌邪見自體生得嗔恚貪等鈍惑也如執煞馬以為大勝佛法弟子勸他即便嗔也等即初二句經是所生惑第三句經正明能生第四句經復由鈍惑劫生邪見由前外道既生嗔已復起邪見堅執自宗祕惜不行名為藏護依疏後解喻上即毒蟲藏護法中説自嗔恚起得增長邪見也言信也者即母伏卵時側聽中唶卵聲其母應時即啄卵破子即出若聞其聲不即破其子即悶死有此之應謂為信也其孚乳産生之言通邪見孚乳生諸鈍諸鈍或復生邪見利惑也言卵化者金云子出卵聲名為化也非為化孚即是化生有五孚一毳字如雞附卵卒啄同時二者土孚螻蟻之類依土生卵若撥其土卵即不成三思孚魚鱉等子在岸上母若思之子即不死不思即不死不思即卒四者影孚竈單龜之類五聲孚蜂之類捉得青蟲剪頭置其窠中咒云似我似我言平去二者孚字平聲乳字通上去音言生産者今俗呼産婦為生去呼言因物造等者因父母生名造因母伏卵名變言由邪見故等者意云邪見生諸鈍或名自藏護言撥五門至煩惱者意説邪見體性緣撥五門諸煩惱貪瞋癡等與彼邪見相應俱起者名緣撥五門邪見之煩惱毒蟲是前嗔癡二也禽獸是前貪癡慢三也言別別生者起彼貪等煩惱發護義資養義言此諸煩惱者第二解也初釋由邪見生諸鈍或名自發護此解復由鈍或於邪見名自藏前解即母護於子後解即子護於母也與前別也言明由邪見生等者牟云諸惡見即二無因論四有邊四不死矯亂五現涅槃此等皆是邪見差別名諸惡見金云餘生四見者不然前解邪見既取夜叉即邪見之差別相二無因也所以疏言諸惡鬼業如夜叉言因起煩惱便生即起惡見後更生起貪嗔等鈍使煩惱然後又起身見等惡行若不言起惡見後更起貪等云何夜叉取毒蟲等而食之因起煩惱方生惡行即是毒蟲增夜叉惡行即是惡見所起之行行亦不離夜叉也言惡身行滿者惡行滿於身中或成就煞盜淫名惡行滿牟云如計五現涅槃即此惡見遂生貪著於此惡見後起鈍煩惱由貪著故三業並興苦行名彼行滿也三業者食之既飽是身業惡心轉熾是意業惡行鬪諍之聲是語業惡行此三業行皆由邪見之所增長相云唯識云邪見癡增上故偏依不善所發業説若據三性通所發業説思為能發疏依別説言非由邪見者通難問總發業者即是無明云何今言邪見起三惡行答疏非由等謂癡能發業愛能潤生故説貪癡起三惡業若望邪見親生三惡行者猶隔貪癡一重遠故但名疏生而非親生乃是遠不是近生意在於此也經言鳩盤荼鬼等者形似冬瓜名冬苽鬼此喻戒取與今解同古人云執彼戒禁持之不犯得生欲界人天中離三惡道妙高於地名云埵欲界人天非是究竟安穩處猶如蹲踞修上界禪斷欲界染得生色界如離地一尺又修四空定生無色界如離二尺生上二界名往退生下界名為返周行三界名曰遊行戒取放蕩以暢凡情不能尅獲無漏聖道如縱逸嬉戲等言重執隨等者糅云戒取從於邪見生是一重又執此戒為勝為因又是一重此解非也牟云先於事明且宅中平地如諸見土埵如隨順諸見之戒禁此戒禁取彼諸見戒禁生如鬼依土埵也名為重執依戒起取戒取如依土埵有此鬼也若空執有即説名單今又執戒故云重也見戒二取別者若依小乘非道計道是見取非因計因是戒取總是大乘滅諦下煩惱大乘二取皆須具二種執執見為勝為因名見取執戒為勝為因是戒取相云身邊邪見為土埵戒取所依故三見為依方持戒故若爾見等無別以何為平地今即四見如平地戒禁為土埵取是見故言不緣餘法者餘法即是諸見即唯緣戒緣彼起取屬見取故言有作垛者此乃體垛字亦有疏本作堆也言執戒之禁者性戒名戒遮戒名禁合此所執戒禁二上各有能取心名一尺二尺攝云亦如內諸弟子有性戒名戒遮戒名禁言戒取必須等者意説戒取先執為勝勝餘戒復執為因能得五現涅槃果故具此二相方名戒取若唯執為勝不執為因即是邪見若唯執為因不執為勝亦是邪見何以如此以隨偏一非即戒取當知即是邪見所收故前邪見撥五門中云及非四見諸餘邪者即是此中偏執者是故知身見等四所不攝者皆邪見收邪見即寬餘四見即狹言不爾等者若戒取不雙取勝因不爾者即單執勝是滅諦下邪見妄計邪見解脫為勝解脫故是單執為因能得清淨是道諦下邪見妄執非道為真道故由此要具勝淨二義方名戒取也言不須別配者古人二解一欲界戒取名一尺上界戒取名二尺二云執修禪定脫欲為道名戒取計四禪為道如離地一尺是戒取計四空為道如離地二尺是一戒取今者疏主不取此不取此義故言不須等言不説等者即指前經文意言前諸蟲鬼不言配上何因戒取獨配上耶此中總明蟲鬼交加十煩惱意説皆是欲界惑相據相增而説下別明蟲鬼藂雜中方始別明三界惑亦據相增而説也言離執欣來等者解經往返遊行謂有外道猒下苦粗障為生死欣上淨妙慮為涅槃得生無想天名往言虗功者亦有疏言虗勞字草書勞字似功字勞字稍勝言遊行者如人所至處若有功即不虗行若所往無功即虗行佛弟子斷障證理名不虗行外道猒下欣上輪轉三界名虗行無利益行名遊行言乖背正等者如車行路軌轍不移若奔逸時即乖正道落道行名縱逸染著生死名嬉戲也言外道所求者外道所計上界有漏生死名涅槃佛法毀責名獨無想無涅槃即喻狗身也足者因義也辨云恐疑狗足用加鬼頸故作是説古師解同晉本捉其兩足交加鬼頸義亦同也言得彼戒禁者即是戒禁為因證涅槃一果如狗之兩腳用心狗之一頸相似戒為一足執禁為二足也言或執為勝名一足或執戒為因名二足或合戒禁一處著執為勝名一足為因名二足言堅著者堅持戒禁如捉狗足也言執行順己者執戒禁以為是即説彼行名順己情狗因朴而方失聲行順已而方讚説執似朴順似倒本來朴只徒順己情朴淳也意言因戒禁及涅槃起如聲從狗出也言失聲者外道説法非真正言教名失聲又無思而起名失言加狗之頸者腳在頸下其頸在上今修欲界戒禁二法求上之涅槃如以狗之下足狗之上頸戒禁為因彼天涅槃為果因能得果如以狗之兩足用加狗之一頸言怖弄於狗者喻上説鬼弄狗令怖而自取樂法中論執戒禁等諸餘苦行以之為樂如朴狗而取樂言以娛己情等者謂外道涅槃實為可惡實亦可怖名為怖狗彼雖實苦妄計為樂以娛己情名為自樂如飛鷹走犬煞害無窮自樂己身不知他苦此亦如是因果俱苦妄執為樂以娛己情言俱生身見者謂身見有二若與第八識應起者即從無始乃至未來隨其相所應於自地中與第九品煩惱同時斷滅若與第七識相應者三界九地各有九品煩惱九九便成八十一品其第八十一品者即非非想地下下品惑此之一品微細難斷須以上上品智方能斷之即金剛定心為能斷所斷煩惱身見等法以為所斷此一品方成佛身即從無始至金剛心方能除斷故此身見名為長大第七識者常無間斷第六識者雖有間斷但能任運自得現行不藉外緣邪師教等由斯並説無始常行也言分別起者不著衣裳無羞耻故如裸形黑瘦也言無明所覆者二執必與無明俱故故名黑瘦黑瘦即空有皮無肉外道執我發言空有言教如空有皮教下無正理如無肉故瘦言堅執五薀者問此之身見為是第六俱者為是第七俱者若第六俱者何得言曾不暫輟有時善第七俱者何言堅執五薀唯緣識薀故答此俱泛明一切身見疏中依總隨應説之得定準也言諸煩惱因之而起者論云由我法執二障具生言我語取者由彼外道執我是實為論説故名為我語取能取是欲貪所取是我語能所合説名我語取又云執我此語以為定量名我語取此之四取皆我見生名因此而生問四取皆因身見而生何故唯説生我語取不説餘三答欲取謂貪欲境名欲取者執戒生取名戒取如前已説見取者執自見是不受他見名見取次後當説我語取前後皆無故此説言我語取也言發大惡聲等者牟云此鬼身長大食難充腹故常黑瘦所以處處邇飲食也如人求物處處皆營觸事我生資長生死如常求食也言喻見取者執自見解為勝為因而生取名見取經言其咽如針者或咽喉孔大小如針或咽喉粗細如針也言其頭如山者外道執自見解廣大如山二云或礭執見解不可移動如山通此兩説自見解為勝執自見解為因故如山餘人見解悉皆不是自是他非不遍他見解如不受食故智論云或有餘鬼形如燒樹咽如針孔若令飲水千年不足即是其義也言首如牛頭者喻上説牛頭是一角有二個法中論邊見是一如牛頭於此邊見中執斷名一角執常如二角言常斷必依我等者第二解此解即取我見為牛頭常斷二見為二角問若依二解頭喻我見角喻斷常問如何前解唯説邊見不取我見答據實斷常實依我見上起經家喻意唯取兩角不取身頭所以前解就一邊見解中分斷常故後解從根本而論我見本有喻頭斷常後起如角頭即常存二角即時有有無不定法中論我見常存執斷常即不定也言或常食人肉等者斷見撥無全不修善過失多故如食人肉常見容有善生損害淺故如噉狗也言生六十二見中四十七見如髮蓬亂也即四遍常四一分常八有想十六二十四無想俱非各有四十七斷滅四十七無明羅剎經言以六十二見為髮亂故今此唯明邊見故但外四十七此鬼食啖人肉早不令人喜見更頭髮蓬亂叫喚馳走甚令人見怖外道之人亦復如是執斷常罪過重更互相非斥外發於聲言如殘害等者互相非斥也一般外道執斷師及弟子宗自相違一即言生有想二即言生無相一即言有色一即言無色非但與佛相違亦乃自宗違背言無正教無正教食故飢無正理水以資長故渴言此通結成等者今當第三段一偈半通結前六頌怪鳥毒蟲十頌靈神異鬼也都結十六頌經言夜叉餓鬼一句結前五利使也諸惡鳥獸結前五鈍使也諸惡鳥結前狐狼等飢急四向通結二即諸鳥諸惡獸喻上説鬼與鳥獸向火宅中互相殘害或飢渴所逼四面走法中論在家俗人向生老病死四位起五鈍使煩惱四面走出家外道生老病死四位起五利使煩惱四面走言外道不得者偏結外道邪見言如是諸難恐等者通結也言略説苦諸難者或是煩惱逼迫苦即苦果五薀四相遷流苦二種名諸難略説煩惱苦果尚爾若更將煩惱所起之業變名改字説即理喻無窮理即道理是法喻即此喻也此呪也經言其人近出等者疏中但解出不解近問今言入滅為約報身為約化身若説報身常住入滅義無若約化身又未入滅何言近出答但約佛前佛前化身示入涅槃名出即取次前生名近四句分別一近非出即今生二出非近報身三亦近亦出即鄰前生四但非今身若約於所燒門安穩得出二説報身非此中義言屬音者問佛將三界宅屬託何人答經言是朽故宅屬于一人等第八識無始時來念念生滅名為朽故也屬音之欲反與燭同音正合作屬切市玉反付也類也問佛與菩薩何言一人答大乘人故或因位菩薩果位如來即一人也言屬謂由屬者解屬字義屬者由也或云是也屬謂屬託也欲付也之也合也問佛將三界火宅屬託諸佛是何意答佛若長住世間自教化衆生喻主在災無若佛入涅槃主無災有所以屬託於人也何時屬託答如第十六王子入涅槃將三根聲聞屬託向後出世佛也言亦由等者破處自修免至崩壞言勗勵等者約束災慎火燭免燒屋宇問法中何是勗勵子息處答一切有為法如水沫泡焰汝等咸應當疾生猒離心又初夜後夜云云又汝等莫得樂往三界火宅勿貪云云又莫輕小罪云云又三界無安猶如火宅主在無災也言主若離家者問離家緣何事答以有事緣遠至他國又言是時親友官事當行教化衆生名官事問他國句當官事多小時不歸答其人近出未久之間因何却歸來答聞有人言汝諸子等先因遊戲云云聞他道行人及東西鄰舍説大通佛子十六王子所養得兒今入災宅譬頑愚之戲糞壤狀癡駭之墮炎爐未以塵坌為羞豈以火燒為痛者也所以如來驚入火宅方宜救濟云云又言譬如長者唯有一子云云言屬于一人者問佛菩薩是二人何言一人答疏言不由外道等言屬音者時燭反此朽故宅攝屬於佛不屬菩薩也宅離無量主人是一如來三界宅主一切衆生皆如來子言三界皆是佛者下合今此三界皆是我有云云又言如來亦復如是則為一切世間之父云云言其人近出入至火起者十六王子亦入涅槃他方化名近出或前前世迦葉佛入涅槃亦名近出正法之中有教有行有尅果者至像法中有教行無得果者亦名火漸起至末法中唯有教無行無果衆生造德名為未久之間欻然火起言四面一時者生老病死四位皆起煩惱名四面火起問諸抄云生老病死四位起煩惱前後各別何名一時答約四位煩惱相接續著色一時生位起煩惱接續著老位老位起煩惱續著病位如似東行舍上火起續著南行南行火起續著西行舍云云二者約一位起煩惱遍五薀起名一時三者約生住異滅四位煩惱與彼四相同生同滅名四面一時火起言因此發生者身三口四意三夜造惡名其焰俱熾即是小火與大火而並盛也業因煩惱煩惱焰因火起猛焰隨生也言喻生苦者孤子體耎初生出母胎被風所吹如百萬刀錐鋭判其身不覺失聲妄失前生而所生事業名生苦也言𪹼音者博教反與豹同言玉篇捕角剝駿音蒲角璞電音言亦有嚗者此三反亦為豹音也言二形同者同形聲字也言驚劈之義也金云應作霹字乃是霹𮦷是震驚之義若言劈者乃劈心非震驚也不然如人間忽聞不意之事遂即撫心豈不是警劈之義何須為霹𮦷字是驚也言或振字者此是驚義非動義言於三薀後者色受行想薀之前四相者欲明生老病死遍五薀有故不同古師前來將生老病唯有色薀故言上來受色等者問何故唯説四薀不説五薀耶答疏言上來受至識宅有等言前文已明者前文云是朽故宅即識宅也言問宅中災者問意云宅中煩惱既名為火何故更説蟲鬼耶答疏言燒迫等意言其煩惱亦名為火燒迫身心故其煩惱亦名蟲鬼無知損害故故立種種異名也言識為所依者識宅煩惱別問識宅與煩惱蟲鬼何別答疏言識為所依等識為所依譬如於宅煩惱是能依即喻蟲鬼故識與煩惱蟲鬼別也言四薀俱是等者第八識為所依餘四薀為能依受想行色如依地而有能依之中煩惱與四薀但是能依能依四薀與煩惱不同故雖俱是能依煩惱之火能燒四薀舍所以疏言四薀至落也言不同蟲鬼亦依等者古人解生老病死為火煩惱為蟲鬼古人見經文言常有生老病死憂患如是等火遂執此文便計受想等與蟲鬼體各別生老病死依五薀身有即火為所依蟲鬼為能依因此見解遂生諸難也疏主義火與蟲鬼俱是煩惱性不別俱是能依破古師云若爾火是所依蟲鬼是能依者則合經中説蟲鬼於火裏遊既若經中只説蟲鬼於宅內遊不説蟲鬼亦復於火裏遊明知煩惱火與蟲鬼俱是能依也二云煩惱與四薀性不同故火能燒於四薀古人若火與蟲鬼性各別者則令火燒於蟲鬼經中既不説火燒蟲鬼明知煩惱與蟲鬼性不別蟲鬼望火或體同不可將火燒同體無知義故損惱義故種種變名智者應悉經言諸鬼神等者鬼神喻五利使等言等取五鈍使也言喻欲界等者此中解三界惑相中五利使五鈍使與前來解全別來將五利使喻惡鬼五鈍使喻蟲獸今此間疏主解五利使煩惱喻欲界出家外道身五鈍使喻欲界在家俗人此出家人衆苦所逼故揚聲大叫即是生老病死也言十地論云者問爭知揚聲大叫是苦逼耶答疏言十地等被苦逼故不覺口中唱苦嗟嘆之聲大叫言又在家起貪等者在家俗人起嗔為錢物鬪諍故揚聲大叫出家外道起諸邪見互相非斥故揚聲大叫此總句了言由起貪等者將鳥配貪將鬼配見也言雖苦所逼者解揚聲大叫意言總能嗟嘆皆能猒苦交離即不肯雖逢苦逼出聲終自無能脫此苦但周流驚怖惶懼而已如著角打狗也言周障者一是忩忙義二是驚懼義也言下有惶怖者若心邊作章與下惶怖者義不別同句中有重失言應為周章者單作章字即周流義言此應為慞者問不過五行經又言周章悶走章字亦是單作二皆周流周遍義如何避重言答疏言應此為慞等以慞字是懼義故恐重言却取慞字只是義重文不重也問惡分疏答疏主與譯家分疏二處單章文義俱重更無別詮表恐人疑譯經人不善文字故與分疏也言此依初揚者謂出家外道在俗之人生老病死苦逼雖揚大叫所以周障怖不能自出也言後解者在家出家皆起煩惱不能自設能自出無方法覓出也經言惡獸毒等喻俗人外道俱生彼界惡獸毒蟲況在家俗人毗舍闍鬼此云狂亂鬼喻外道此頌有兩類人一出家外道二在家俗人緣此兩類人被欲界生老等八苦交煎將為上界無便作六行伏惑猒下苦粗障欣淨妙離伏却欲界染此有二類一身在欲界得色界定二身生色界得色界定及至到彼得初禪根本定起初禪煩惱得二禪根本定起二禪煩惱外道起利惑在家俗人起鈍惑除嗔一法餘惑皆起也言色界定深者聖説得色界定如室有光得無色定如露地坐有光孔穴也三乘聖衆起無漏智如鵬飛空在家俗人得彼定如蟲竄之言外道鬼生者一云在家俗人既上定出家外道亦生其中二云雖猒欲界煩惱求生上界定上界定中亦有煩惱名亦復住其中也問若取彼地煩惱者色界無瞋云何得有毒蟲答準彼在俗生彼如蟲竄之即欲界在家多起鈍惑故以惡獸為喻意自欲界人也經言薄福德故等者無前五度名薄福無第六度名薄德有云觀此唱經及後唱但是身在欲界得上界定也問何以得知不是身在上界答以經言共相殘害上界無此事也執見生取細故如飲血執戒生取粗故如噉肉言雖有淨定等者即簡味相應也帶染不能伏故淨定復有漏無漏凡夫得者唯是有漏聖人得者通漏無漏今所説者有漏淨定也言折伏還起者謂生上界以定折伏欲界煩惱不生現行色界當地煩惱還起也在定不起出定即生折伏之言即是顯有覆性意説雖有定折伏成有覆性出定還起故彼凡夫外道雖有淨定緣是有漏定也未得無漏故云無真福慧也言薄之一字表是有漏意言雖伏下地惑上地惑還生也言互相殘害者準經文即是此飲噉彼血肉即似大者喫小者強者喫弱者名為在相云何疏言執自勝道如飲血執自禁戒如噉肉即似喫自家血肉答經意不得望一人諸但知死尸是宅中本來而有惡鬼相集宅中喫死尸法中論見戒兩法如死尸既執自見戒非喻上明互相殘害即為爭於血肉外道相非斥即為諍執自見戒血肉通自他故今取於自牟云亦有飲彼血肉之義如論義者答有三解一雖得無色界定第八識中有彼嗔種子故將蜈蚣等為喻二云無色界惑是彼欲界嗔之種願故將蜈蚣為喻三云諸佛如來為喻法不定種種變名不同前來説欲界煩惱處將此毒蟲喻嗔説著無色煩惱處將毒蟲喻無色界貪癡等或用比於人今為令衆生生猒怖故種種變名智者應悉攝取第三解抄今解三界惑相不出二途一身在欲界引得彼定名生二往彼名生身在即指在家往彼即約在家生彼也言喻彼凡夫者被色界惑火所燒求生無色如走出穴若從欲界生色界得四禪定如入孔穴若從欲界生色界得四禪定如入孔穴被色界火燒急生無色界下三天如走出穴也言鳩盤茶喻上説蜈蚣與毒蛇等被穴中火燒爭走出穴亦得出穴被鳩茶鬼旋旋拾喫却法中外道凡夫被色界煩燒求生色界得彼無色界定外道與在家俗人一種得彼下三處凡夫到彼不作涅槃想外道到彼不作想外道到彼計為涅槃便作是念我則已得涅槃汝則雖生此天不得涅槃不解執為殊勝作此見解時煩惱隨生資長邪見因凡起惑名隨取而食食者資長義言撥諸凡夫者有云無色有情既無身互不相見云何撥故知身在下地修得者見彼凡夫猒下欣上不計以為涅槃遂起慢等言不如我名因凡夫起也由如説二乘不知所行是一乘也又云若生彼者自得定而作是思言下界凡夫不知無色是涅槃故而不求證此亦名為撥諸凡夫何必身在上地如言不知俗家之快活如俗人以五欲為樂言師僧不如我快活遂起慢心言因凡起惑等者在俗凡夫生上二界但猒下欣上亦不作涅槃想外道不爾俗人生彼起惑如外道如鬼見諸凡夫既不作想解今我現得涅槃寂靜即起慢心彼不如我即此慢心因凡而起故言因凡起或如鬼見蟲蟲是在家鬼即外道經言又諸餓鬼等喻無色界中外道也生彼有頂地起煩惱如上火燃足未離於下火頭以遭於上火熱無正教食故如飢無正理水故如渴悶走喻上説悶即不辨東西法中論外道凡夫等帶煩惱業不覺不知名悶走言彼外道者前喻邪見以況外道是變名何故言蜈蚣喻嗔即定也言還泛五趣等者無色界雖不造新先欲界中後報業招故沈惡道問悶走五趣輪回但走何名悶答喻上説頭上有火故悶法中帶惑而行故名悶菩薩六道垂形走而不悶三業皆隨智慧行若爾三途可然人天何悶冷水醒悟説人天教如何通會答無明所覆感天人業亦名悶走脫三途重苦且名為醒望義不同對三途説人天果如醒悟今對三乘聖行説如悶走問感人天業是善何故能發無明亦不善不説無明通善性故答迷真實義過失稍深所發雖善能發之惑即不善也言結成上難者前經言其舍恐怖變狀如是結貪等五鈍使次夜叉餓鬼等結五見利利使此中經其定如是通結前二即六頌鈍惑十頌利惑故言結成上難也言初二偈偈見苦者長行云長者見是大火從四面起此二句見苦也言後一頌頌悲生長行云即大驚怖一句是悲生也長行中初明悲生後明悲事頌文中悲事不別顯行相與見苦經文合一處述既如此則先頌悲事後述悲生具悲事者長行悲事科文為一段今偈文分出兩個名目初兩句喻佛出三界後一頌半聞衆生處難也言主者親也者親者主持義四個宰相中若個親親事即主持義也此解疏也二云上者主也居其上如言主典主顧也主領已下人首者頭也如人一身頭為主也三界衆生佛為其主也言佛住果中者解門外問何名為門外答果出因門理逾教分名外問佛住果中理出教外可然一切理教詮不著總是門外凡身理亦是外理何唯佛位答雖然凡夫身中執佛種子真如理雖出教門外不得名門外理且緣五薀身未出門外又未曾證理事須是出宅人所證得菩提涅槃對因名門外對能詮教名門外也言立有四義者解經門外立簡要問何故前言而生三界此言門外立耶答前據他身穢土似垂濟名為入今談報體久在淨土教言外也言起成者一起義二成義衆生在生死如坐佛出生死如起起者成佛也二成者成立義修行果滿圓成道滿名成也經言聞有人言等者安國云即是釋迦過去二萬佛時聞二萬佛説諸子入宅名聞有人言紀國云於三七日思惟時聞十方佛時即是聞有人言也方便品經言作是思惟時十方佛皆現梵音慰喻我云云今言聞有人言即是釋迦為護明菩薩時或菩提樹下明聞向外十方佛言昔時十六王子時所教諸子今却入宅也言前長行云等者問何故前長行言見是大火方便品言我以佛眼觀今此唱言聞有言何不同耶言有二義者疏答也一自他影長行言見則約自見偈中言聞約從他聞長行自見之時影取從他聞偈從他聞影長行自見也問過未是無如何言聞答疏言傳説何妨言過未也言親疏等者見則親聞則疏此處言聞顯彼處亦聞彼處言見顯此處亦見見即唯約自見聞即從他傳聞也言眼覩苦生者佛眼親見衆生有苦便起悲心救度名親若為他説法事須待根熟方與説法為停留故却疏也問阿難聞豈是疏答聞通親疏見唯親若爾傳聞即疏傳見豈親答設聞他見如是等事亦即傳聞即是前人曾聞可使令此聞前人曾見不可使此而令見故親疏別也言無始已來等者解三四句經文經言先因等問諸子元來在宅何言入宅答如龜魚等本來在水亦名入宅意説集為因是能入苦為宅是所入生生如此也言起分別煩惱者但是煩惱皆名分別別即是遊戲之相則解問本來何處去來今言來入答有多説一相國云諸三根子等於大通時發大乘心後二萬佛時持法華修大乘行求種智車娛樂己情故名遊戲遊戲者即是求牛車經言得如是乘令諸子等日夜劫數常得遊戲只緣因此遊戲後即却大乘心却求人天妙境故名先因遊戲來入此宅因者因由之義二云約無始時來最初一念來有情時身中法爾有無漏種子有漏種子當時初發菩提心時修行即得無漏種子為因也只緣當初一念背教違理有漏種子生現行只此有漏種子名先因起惑造業名遊戲背正違真名來入此宅也已後無漏種子初地門中生起現行有端現行不名遊戲遊戲者間行也三云彼若修解脫分善即名為出宅若更不修即名為入宅即是十六王子所發大乘心名解脫分如舍利弗至第六住退流生死名名為不修退也有道士陳後難荷恩云釋迦先成道却化衆生名來入衆生元來在宅中何得名來入答報身先成道却起化身名來入衆生修解脫分善中間却退名來入正用此義也言三乘種性等者有云三乘種性於十六王子所發大菩提心名稚二萬佛所修大乘行善根劣修遇緣而退名小放逸六情即六識根屬有情即五義中如根義也言悲生喻長者長行經言即大驚怖紀國云驚入火宅身業起福方宜救濟欲陳八苦之言令無燒害便絶五燒之痛問如來有十力四無所畏如何有驚答佛見衆生有苦起悲心救濟名驚驚即悲也即同方便品為是衆生故而起大悲心即如來報身上大圓鏡智擊成所作智起化身託質摩耶夫人右脅而誕名驚入火宅言循環者如來已出生死却入宅名循環成道轉法輪名起救也言應時濟者正是衆生根熟時便是如來説法時即趣波羅奈等言五頌喻示大不怖者長行有四一思大乘果化二念大乘因化三隨示大乘行化四無希取大之化此頌中不述第三隨示大乘行化唯述第二念大乘因化第四無希取大化且第二念大乘因化中長行分三初念不能依大教行經言復更思惟是舍唯有一門第二若起誹謗沈縈惡道經言諸子幼稚未有所識等第三念示衆苦密説大乘唯述此第三段文不述初二段文今且述第三段經也經言告喻諸子者曉喻非譬喻也説衆患難此上總句也言惡鬼者外道經言處處皆有魑魅魎夜叉惡鬼食噉人肉孚乳産生臰蹲踞土埵鬼其身長大鬼裸形黑瘦鬼首如牛頭鬼言毒蟲者白衣蚖蛇蝮蝎蜈蚣蚰蜒云云言災火連綿等者即是集能招苦苦後生集集為苦因苦為集果如薪能生火火復燒薪宅內能生火火復燒舍問如何是密説大乘答喻上説長者所説宅中種種過患欲令諸子出宅名之為密法中論諸佛欲令衆生出三界苦求菩提涅槃樂為説種種煩惱生死過患不形於言勸交出宅取牛車故言密也遠則十六王子二萬佛時直到今生法華經會前説大般若及無量義經皆是密説也言二皆去聲去聲為正也言因宅生火等者依身起煩惱因有五薀身向起惑造業名為災火蔓莚因火壞宅名衆苦次第相續不絶由因煩惱令五薀身成苦無常性等言此意顯示因成等者此約惑業能生苦苦能生惑業十二支中無明是惑行支全有支一分是業識等生老死支是苦也言因苦生惑者即是無明行招識等五支是苦也因苦向上更生煩惱即是愛取水潤轉成於有有支後有生老死支如火壞宅也緣長者宅是引火物也故生死相續不絶也言夜叉等者問疏主前來將夜叉喻邪見今言惡業者以彼身三口四意三惡業因邪見後起約鄰近説夜叉是惡業非即惡業便惡業是夜叉即是食之既飽惡心轉熾鬪諍之聲等既有邪見煩惱煩惱即須有惡業亦同疏言因勢遠生故作是説亦是種種變名智者應悉言覩其惑相解經中此苦難處下二句經也第一解難奴干反平意處昌與反杵意説覩其惑相惑相即是煩惱體早極惡處所以名此苦難處早以不可愛樂況復大火大火因即是煩惱體也大火因家所招感果即是五薀身五薀身上三苦八苦即苦體苦體不是大火從大火為之所招感果從因稱亦得大火之名全取他名有財釋也此苦難處煩惱因也況復大火所招感五薀身言或復等苦難奴旦反處所也意説覩其惑相體是惡鬼惡鬼於中居止惡蟲鬼體早是惡相苦難之所不可愛況此起作用損害衆生名況復大火大火即是煩惱作用第二解唯喚煩惱體名此苦難處喚煩惱作用名蟲況損害衆生名大火言何所差別者前解因果別後解體用別所以疏言不作此解如前二釋鬼蟲與火俱是煩惱有何差別也言莫我遑處者證第一解處字杵音莫由不也遑由暇也謂無間暇可安處也若去聲呼即處所也證後解也言無悕取大者長行合云所以者是諸衆生未免生老病死至佛之智慧頌合可知也言思方拔濟者長行合云舍利弗如彼長者雖復身手有力而不用之但以殷勤方便等經言益我愁惱者如來悲心義同愁惱孩子不啼母即不抱衆生無苦佛亦不愁愁即如是悲云云又如兒行千里母心於先譬如長者唯有一子其子若病云云四十年前聲聞不回心如來眉頭不展法華會上方歡喜經云而自慶言我今快樂問如何有愁惱答只是悲心唯是衆生苦多如來心悲轉濃於悲心向上假説愁惱言耽等者妉媅耽此三丁含反切無女傍作者訓樂疏言爰即生樂也言無兗反等者草書必字似無字應言愛唐切彌善反湎愛酒湎𭋦著也經言將為火害者為由被也言三頌正説三乘者長行喻中分二初知根經言父知諸子先心各有所好至情必樂著後正説正説分三初總告令取二別示三車三正勸出與此中唯述正説中三段不述知根也長行合中亦唯合正説不合知根長行合云經云而作是言汝等莫得樂住三界火宅云云言此初也者總告令取也問前唱經言見子在宅設方便設得何種方便答但得出宅與他玩好之具問玩好之具色因是何物耶答長行偈總告許車經云而告之言汝等所可玩好至後必憂悔偈言告諸子等我有等也言陳車在外也者問長者許與車今在何處長者答曰閇門打車出門合轍打得不可向匱裏鎮著只在門外也長行經言如此種種羊車鹿車至出來瑩云只在在三界內非三界所繫名之為外為是無漏名之為外問二乘智體是有漏如何出門外答二解一二乘智體雖是有漏向上莊嚴具足無漏亦得名無漏出宅二者二乘無學煩惱永盡即名無漏無漏人身所有有漏智體亦得名無漏出於門外也言果出於因等者意説果在因外理出教外此理果體是無漏不繫之法名外言若離三界者古人以貪愛為三界門貪愛盡處名為出門三車即在三界外三界門外別有立車處疏主破云此理不然若離三界無別衆生衆生在三界內若車在三界外應成無因問八地菩薩純無漏三界不繫應非所説化答八地全離三界五八有漏第七間生猶界繫故疏言離三界者即不繫屬義非出三界外方離也猶如王子入獄等有云如西方淨土等皆出三界處豈彼不是施化處也此只不達之甚淨穢二相非即非離隨根所宜應之不同若不爾者何名淨土不毀等而衆見燒盡等有云因教為門門者遊履無擁義開合之由然三乘之果各經因業經爾時修行因行名遊履七方及三賢十聖之路進不退名為無擁修行退失是閇門證自乘果即名出門能詮名等依聲顯彼之理於言詮下顯現可得即是無擁遊履之義廢詮談旨即是閇門諸法自相言詮不及名出門外潞云有妙淨土出過三界如何通會答今談三車對於三子以名施設化淨土中無淨土中唯有純一大乘之化與此不同不應為例言佛住宅外等者長行有四解彼云即化佛住生死是以勸前入談真佛在果故言速出來言説車所從者問車從何處來答經言吾為造作此車即是所從也言涅槃所無為等者疏主解云寶所先有不言作車是有為故言作門主爭知牛車造作便是有為寶所無為不言造作答經上既言是車車以運動為用所以知是有為造作也寶所向上無運動義知是無為造作也問羊鹿與牛車俱是有為總得名作作義何別答牛車從教行生佛種從緣起故言作羊鹿言中施設故言作一種是作牛車名體俱作羊鹿作名不作體有此差別也言教行生者正內行行而生種智若疏遠而言亦通教也長者本意若雲山舍中但轉教車如賜明珠賜名非體也問牛車言作可爾如何化城亦言作答車是修生故言作化城是化作故亦名作化城羊鹿作名不作體問涅槃是本有本有不名作四智法爾成亦應非是作答四智雖本有生長名造作涅槃生長無是故不言作問牛車寶所豈不是言中施設答據實總合是言中施設牛車經文目言作寶所經中自不言作也言雖並是作者問牛車有自體生長言其作羊鹿體唐捐如何亦言作答疏言雖並等意言牛車有實體名體俱言作羊鹿言施設但作名非體也上來三頌一頌總告許車同前總告令取次一頌陳車在外同前別示三車後一頌説車所從同前正勸出與言此初也者長行合云舍利弗若有衆生內有智性從佛世尊至為求牛車出於火宅經言諸子聞説知此諸車者諸子在火宅內聞長者門外設三車也言即時奔等長者一邊修五停心觀一邊修別相念觀一邊總相念觀言互相等者語業精進勸意業意業精進勸身業三業爭修名奔競也言隨其所應者二乘無學全離煩惱障業報障到生空地菩薩人離三障到二空理地二乘無學無煩惱故離煩惱障無八難身故離報障如抵債人一切不受離業障大乘菩薩智增者初地離三障悲增者八地離三障言無復生等者惡果名苦惡因名難果即異熟果因通惑業總束三障合名苦難言一頌半見已者與紀音同言四衢者牟云衢者開通遊履之義此四衢諦理是彼正智遊履之處智了達彼即得開通言師子座者師子無畏義也言即是昔者關難問父出宅假説門外立經言是時長者在門外立此中子出心安故坐長者坐立並在何時答疏言即是昔等者糅云此解立坐二字意説釋迦化相身初樹下得菩提時其三根聲聞等猶在因中樂出火宅即於後時説欲擬垂濟彼時由知將行救待於子所以言立今時三根既得無學已出於火即無行待所以稱坐也言得菩提後者有二説一得自受用身菩提後二或前前世成化身菩提乃至今時初成道後生由在因即是聲聞前前世在因也前言立者即約諸子在因今此言坐見子在果言明諸子昔等此三乘諸子並出宅了言善根難起等者初發大心名生育難造惡即易造善難者在十六王子時八萬四千歲廣説法華經方發大心中間遇緣遂令退屈四十年示大不希即名難育即善根難起謨意者望如來本心雖説二乘意歸一實皆以如來滅度而滅度之如同等觸牛車齊霑髮吉寶即以四智本有種子未長名為育難雜薰未起名為生難不爾云何以智為子問涌出品云爾時世尊於菩薩大衆中而作是言如是諸善男子如來安樂少病少惱諸衆衆等易可化度無有疲勞云何今言善根難起答彼自釋言所以者何是衆生生已來常受我化亦於過去諸佛供養尊重種諸善根此諸衆生始見我身聞我所説即皆信受入如來慧除先修習學少乘者如是之人我今亦令得聞是經入於佛慧準此前將頓悟菩薩性人言易度後約不定性人回心亦名易度後據靈山會下此約昔而論故善根名為難育言無明長蔽善根者有二義名小一本來大乘善根不生長名小二約曾發菩提心却退多時名小此中經意言愚小無知而入險宅同前先因遊戲來入此宅稚小無知歡悟樂著言逢緣即生等者於生老病死位中起煩惱在家俗人起多諸毒蟲等五鈍使煩惱出家外道起魑魅可畏等五利使煩惱生老病死四位起煩惱名四面俱起又云疏有逢緣字即心法四緣生名四面也經言是故諸人者佛菩薩也言復告他人等者此科云喜極告化問自家救得子即休何用告他人衣裏破不變以示於人何用告他人答緣前來聞有人言汝諸子等先因遊戲來入此宅我所以驚入宅入宅救子今既救得子却報化親情經言即自宣言諸君當知此是我子我之所生云云又我昔教汝者願佛道云云言五十三者上來有四初半偈偈三界佛有喻次三十二頌半述五趣危已喻次十四頌見設權方喻後六偈依言免難喻總五十三半頌昔權了言前後不同者準長行科文初諸子索三二文但與一三釋成父志四越子本心頌中第一諸子索三第二釋成父志第三文但與二後一行偈越子本心長行頌文前後不同言牒先父許者問此牒何文答牒正説三乘喻中而告之言總告令取等二文也長行喻中諸子索三段文頌中疏中分為標釋兩段也言當根學者解經今正是時惟垂給與言言唯等者唯者上聲呼或可經文應為惟字思也思願得之晉本經云願垂給與言長者大富者有為無漏如庫無為真如為藏有為無漏即報身塵沙萬德也無為即法身無為塵沙萬德問長者有多少寶物車又即金銀珍寶造若十二十三十個子各與所造寶車莫長者財物用不足答疏言長者大富等我緣寶物多所以用珍寶造給與諸子上明五句經了言教之修者解造諸大車車體即是教之修習正是造車即因行車乘此寶乘等言果滿者即是造車便成是得車即果中所生得德也言總而言之者牟云此含兩意如來後得四智圓明無漏五蘊又全得故十地菩薩五八有漏成事圓鏡猶未相應妙平二智七地已前而有間斷五地已前依證真位即無車體有車差別故言總也言無漏五蘊者取種智相應五薀非取本智相應五蘊彼名牛故良云前但言種智智兼取佛身五蘊是第八識處所故在菩薩位即平等妙觀察二智後得為車體在佛果位即總四智五蘊為車體也言捨無常色者牟云偏約果中智為論若因行果未得捨無常色等雖諸菩薩亦分得車無漏五蘊非常得故五八有漏故長行云其車高廣衆寶等疏解喻佛種智出過三界也言若説真如等者難車體是有為修生可名作寶所是無為凝然故非作云何言作者四句分別一化非城如餘化事二有城非化定性二乘人三亦化亦城不定性二乘有餘涅槃四非化非城大乘涅槃無上言化城教設等者古人問寶所是無為無為不合作化城是無為如何亦言作答化城設名上可言其作若論體無為亦是非造作問若約無為體城所皆非作者若約名教詮彼此俱是作答中路設化城建立可名作寶所非施設不化故非作此對不定性人言化若對定性非此所論不對寶所故彼不取大故言第三段有者長行文有四初標有車二明嚴飾嚴飾有十三顯牛相四彰儐從頌中亦有四段與長行前後不同也第一嚴飾中頌與長行有無不同其車高廣一句經長行有頌文無有無不同也長行十段偈文唯九言總嚴者即前第二嚴儐也二欄楯前第三攝御三珮鐸問長行第四四交絡長行第七五幰蓋即長行第五高覆六華瓔前第八垂瓔言七雜嚴者即長行六文衆瑩八茵蓐者即長行第九重敷宛莚九覆葩者即同長行第十安枕言茵蓐等者切蓐鞇車中所坐車底板重鋪也言切韻云等者問何茵蓐二字皆草下作答二説一蓐作草之華文如綾絹上瑞草文二或以草為蓐胎中著草外以繒裹之故言茵蓐或如茵蓐團席之類人作裀衣身也言有作鞇者以虎皮有華故作蓐也此是車所坐有文綵文綵即虎有華文言相連著者意顯是車中所鋪設物與車箱相連著也言三蒼者頡倉埤蒼脾音廣倉言九覆癿替丹者長行綖向上安置丹枕偈文茵蓐向上著覆癿蓋著喻上説覆癿遍在茵蓐向上有之法中論後得智上方便善巧智用遍三業淨命向上有也章敬云離五邪命名淨命也淨名云四靜慮為床淨命為茵蓐也欲擬安置丹枕故須敷設白疊如世尊置枕必有枕檀也有善巧方便為白疊滅盡定為丹枕滅定必依善巧方便智故善符經旨也言所望別者意言一向入滅定非利他行故須善巧智相故喻之覆癿長行與偈互相影顯也故言不相違也言微密等者二乘無故名難知言三積功者三大劫修行纍行言逈過者出過二乘名逈過言五自性者自體無漏名澄皎準理解初地已去因行之車攝問此經雖言造車而不配法及簡真如疏依何配答大集經第十六言大乘者以正住四攝為輪以真淨十善為輻以淨功德資糧為穀以堅固純志為輨轄釘鑷以諸禪三昧為轅以四無量心為善調牛以善知識為御者以知時非為發動以無常苦空等為驅䇿以七覺寶繩為鞦鞅以端直大悲為萬幢以八聖道為直途以無礙慧為幰蓋等彼乘既爾此車亦然但是有為非真如也言牛相有四德者長行有七今頌唯有四一白牛二肥壯三筋力四端美餘三段色得行步平正其疾如風言出接賓等者切云上曰接下曰儐禮歒曰商相如今女壻親事之時有儐相等也若人情呼為儐相亦可名僮僕導者引導於人也言或作檳者此是斥義非此用言對長行者若據長行標與車最初明今偈中居最後前後不同也經言乘是寶車等者問真法已詮離乎能所無住無出以何方便言乘出等答大般若四百九十二説雖觀諸法皆無所有都不可得畢竟淨故無乘大乘而出住者然無所得而為方便乘於大乘從三界生死中出過一切智智住窮未來際利樂有情無斷無盡故言乘是寶車故無過矣言得智覺等者意言遊戲之相源乎動如智有生長動義快樂相隱安和如滅理凝寂故言或自在有十者此然十種十地中六度所感也一財施故得財二心由無畏施感得心無所畏三壽由持戒故感長壽四業由持律儀故不害他命由持攝善法戒故感得未來常作善業五生由持饒益有情戒故於未來世五能隨類受生六勝解由行忍故即得勝解隨彼能變大地為金山七願由精進故能發大願八神力由定故起神通力九法由般若故得法法謂教法十智即本後二智也此十自在以後智為體或智自在通真俗二境以二智為體言餘處者即是普門品中説也言復有四自在者一相八地已去能變大地如金山等二土能現清淨國土十八圓滿等三智九地得四無礙解名智自在四業自在身語意業用自在故也其四自在據八地已上至十地不通七地已前十自在通於十地不通地前也言今皆獲得者此亦得名教也如明珠也當定得故入地分證差位全得也言同前文長行者牟云但與前三界佛有等四種科問名若據述前喻合二父即不同前長合中有五一處所舍利弗如來亦復如是則為一切世間之父二家主經言之父三資産於諸怖畏衰惱憂患至智慧波羅四老小大慈大悲至恆求善事五宅相利益一切而生三界攝故火宅若據本喻有六一處所二家主三老少四資産五宅相六戶牖長行合五段不合戶牖本喻經言譬如長者有一大宅今合中唯合處所家主兩文也經言世間之父二字合處所父字合家主也言三頌合五趣危亡者長行合中有四一人衆甚多為度衆生二宅字危朽生老病死憂悲苦惱三諸方災起愚癡暗蔽三毒之火四合衆子遊居教化令得阿耨菩提等今頌中四段文是故合作三段述合衆子遊居人衆甚多一處述也長行本喻經云多諸人衆一百二百乃至五百人止住其中衆子遊居即長者諸子若十二十或至三十在宅中長行合中為度衆生一句合人衆甚多也生老病死合宅字危朽言一頌合人衆甚多者即經言一切衆生即是多人衆也經言皆是吾子者即合衆子遊居也長行分親兒乞養兒有五百即凡夫及無種性人也親兒有三十個也不分親疏一切衆生皆如來子也如來等示現一切冤家如羅睺羅皆如來子也故將人衆多與衆子一處迷也言深著世樂等者三界總名世樂問四禪已去樂受全無文三界中皆名為苦云何言世樂得通三界答不是受之樂此於三界因果向上耽玩染著順於己情故名世樂又聖人親三界實無有樂由同於牢獄有漏皆苦故凡夫為妄情今隨凡夫妄情名言施設有説樂受言通三界者有情隨於何地樂著於境名者世樂非是樂受相應方名為言亦有本者即唯欲界上界不通今取初解通三界為正言無有慧者無善意也不修善行名先慧心言宅宇危朽者喻云堂閣朽故墻壁隤落至梁棟傾危合云生老病死憂悲苦惱言五薀俱者遍五薀有三界門中論即欲界具足八苦色界有壞行無色唯行苦二界二字解宅字遍三界有下二句解危朽也言諸方災起者喻匝俱時歘然火起焚燒舍宅合云愚癡暗蔽三毒之火偈云常有生老病死憂患四相也緣下二句如是等者火熾燃不息古人解言云如是等生老病死相即火能燒五薀宅疏言此是生住異滅四相四相苦遍三界有也不是火火是煩惱與苦別也苦合是所燒火是能燒生老病死是起火處也言初三頌合見苦等者喻云長者見是大火從四面起長行合云見諸衆生為生老病死憂悲苦惱之所燒煮云云言證涅槃故等者明自出宅同長行我雖能於所燒之門安隱得出也如來已離三界煩惱生死喧囂證涅槃名寂然若衆生是有漏與無漏別如何世尊與有漏宅為主答若約涅槃大智為宅主若約衆生論大悲是有漏宅主問前來如來以離三界火宅後唱何故言宅屬於我答如家屬於宅主宅主不離家三界屬如來寧言離三界若然者佛應不出三界答報身離三界界屬如來獄官官人不在獄如來出三界不妨三界屬如來官人不在獄不妨官人管得獄也言一頌合示大悕者長行喻有四一思大乘果化舍利弗是長者作是思惟我身手有力當以衣裓下合云舍利弗佛見此已便作是念我為衆生之父應拔其苦難與無量無邊佛智慧樂二念大乘因化喻云復更思惟是舍唯有一門而復狹小諸子幼稚云舍利弗如來復作是念我若但以神力及知慧力捨於方便為諸衆生讚如來知見力無所畏者衆生不能以是得度三隨示大乘行化喻云作是念已如所惟其告諸子汝等速出合中無第三隨示大乘行化四元希取大之化經言所以者何是諸衆生未免生老病死憂悲苦惱而為三界火宅所燒何由能解佛之智慧今此偈中唯合第四無希取大之化經云雖復教詔等一頌正述於火宅內樂著戲嬉不肯信受意顯如來自引訓不信受也言合正説三乘者本喻有二初知根經言父知諸子先心各有所好種種珍玩奇異之物情必樂著後正説三乘經言而告之言汝等所可玩珍希難得汝若不取後必憂悔長行合中不合知根合正説有四初勸猒三界而作是言汝等莫得樂住三界火宅勿貪粗蔽聲香味觸也若貪著生愛則為所燒二勸取三乘等速出三界當得三乘聲聞辟支佛佛乘三引己為證我今為汝保任此事終不虗也汝等但當勤精進如巳來以是方便誘進衆生四讚乘勝德復是作言汝等當知此三乘法皆是聖所稱嘆自在無繫至快樂今一頌半初二段勸猒三界勸取三言依言免難者喻中有二初子免災難經云是時諸子聞父所説玩之物適其願故心各勇鋭互相排競驅走爭出火宅後父遂心安經云是時長者見諸子等安穩得出皆於四衢道中露地而坐無障礙長行合中唯合子免災難不合父遂心安經云舍利弗若有衆生內有智性從佛世尊聞法信受殷勤至為求羊車出火宅今偈中唯合子免災難也所以經言是諸子等一行半是初一行聲聞次一句緣覺後一句菩薩言心快定者初果人也言餘二果者意道緣覺之人亦於見道中證四諦理心中決定得三明六通者故名二果可知言初兩偈文等者長行喻中有四標與車明嚴飾顯牛相彰儐從長行合中唯合標與車明嚴飾不合牛相儐從長行合標與車明嚴飾中分二初明車體經言是諸衆生脫三界者悉與諸佛禪定解脫等娛樂之具後明車德經言皆是一相一種至能生淨妙第一之樂言歎乘勝德涅槃菩提深勝約涅槃所證深故最勝清淨故言不但佛説者亦得佛讚嘆只緣得所説可一切衆生所應稱歎將語業稱歎身業供養禮拜意業不説自成也言若二乘者問菩薩人一大阿僧祇劫滿便入初地上牛車二乘人回心向大如何地前登牛車答疏言若二乘者等入初初地已去方得二空無漏種智牛車體問二乘人回心已後本來生空智在身中地前一大劫修行等十來生空便為牛車體否答二乘生空種智無來是羊鹿車不可改羊鹿作牛車雖然回心不是牛車體故不可問何故前來出一乘體中能成佛德皆名一乘答傍舍來為乘因則得若親為體別不可也言乘無漏教者即是回心已後乘牛車教名無漏教約如來本質教説也即是王解髻中明珠與之也二乘之人影像教即是有漏菩薩所起三業亦爾也言及有漏乘者牟云二乘回心已去為求大乘所修有漏諸功德皆名大乘也言日夜劫數者解經遊戲也前來經言先因遊戲者起惑造戲者無漏車生長功德名遊戲言三種意解與諸菩薩二句經文但有菩薩聲聞無獨覺義舉大小二以攝中也言乘此無漏者但舉至道場即是所證一乘能生衆生第一之樂此初解言道場者涅槃菩提是薀生無量萬億之處名道場菩薩生一切有為涅槃生一切無法言或乘種智者此第二解乘種智因得果中三事涅槃名為道場約乘而至果乘也言或至佛果者此第三解乘彼因理得果法身名道場初地已上理為因潞云疏三解何別答初約理智次依三事後唯法性初一能生功德名道場後二趣求得處名道場言當知諸佛等者結前鶖子請鶖子請云願為四衆説其因緣合離疑悔爾時佛告舍利弗先不言諸佛世尊以種種因緣説種種譬説種種方便説必若欲得更説道理與前更不別世尊遂與鶖子説説了都結歸前意言當知諸佛方便力故於一佛乘分別説三今此一偈述前長行結文以是因緣十方諦求者真實義十方世界中真求唯有一大乘更無餘二乘極果故更無餘乘問疏主會二歸一如何言無三極果即同古師也答總有二意一疑疏本錯為三字二且順古人言無三極果也疏言除説其因方便有三也言父子情深者如世人男女遭枷落獄父母救得乎善還家特地敘昔時艱辛之事汝知否我大憐汝敘父子情深也經言皆吾子等者問但言皆是子即得何須更言我則是父答若親子父不假此言今約如説故須雙舉佛大欲親於衆生衆生豈能事父仲尼言間也親豫猶父豫不得親猶子也論語云顏淵門人欲厚葬之顏淵處貧彼門人大欲厚葬也子曰不可禮貧宜不可葬門人厚葬之曰回也親父豫猶父也豫不得親猶子也意言回也雖欲父事於我而不得育於彼豈合門人非禮原葬也大法鼓經下卷云佛告伽葉若人言無此經者非我弟子我非彼師下文亦言此實我子實其父言我雖先説等者舊云梵語涅槃此言滅度肇公云謂大悲不滅超度四流故言滅度經言但盡生死者二乘之人但盡得分段生死也而實不滅者雖得分段在死盡得有餘涅槃也問下文但離虗妄名為解脫其實未得一切解脫言其變易者問二乘之人未盡變易生死如何説盡生死答疏言其變易等一者無別業招故二者不障無學入無餘故經中隱而不説但障大果并大乘無餘涅槃也言性為法身者問上言不得滅度經何故經言唯佛智慧答疏言性為等意言大涅槃中通理智故經言若菩薩等者初一偈能被大乘教後偈所被根二偈俱是漸悟也此是世尊意徒聲聞歡喜安置菩薩名字也經言若人小智者聲聞人也深著等者或貪欲名惑全界煩惱名欲言所愛內等者內身即異熟果三苦所欲外境即增上果環苦苦具故皆名苦諦也言初偈説苦等者只緣小智人深著愛欲所以為説苦諦是意也言不棄世諦者集諦中或能發業業能招集諦斷却苦諦留著此苦諦身修行修行事須得此苦身悲增菩薩尚自故意留身即是不棄也諦而入真諦也二云凡夫觀苦諦時若不知是若忘計為樂聖人觀苦諦時若實是彼真實故便是真諦攝既達證此理即是不棄世諦而入真諦不可離却世諦別觀真諦言得未當有者所得法初證苦諦下事理如也昔為凡夫曾得聞今日得聞及證諦理所以觀喜經文倒應言為此等故説苦諦佛説苦諦真實無異衆生心喜得未曾有意言佛説苦諦既實是苦證説不異根法相符言遺教經言者日可冷月則可令熱經言若衆生不知等者苦諦身也本即集諦也衆生眼見世間苦身不知此身從集諦中來不知苦因是果家之本不知此貪等是苦身之本更向上起貪色聲香味觸也言道者因義者解方便説道者因義説煩惱是苦因説名道也意言經中道字有二意一者説彼集諦名道道者因義故二者能斷斷集諦無漏聖智名道道諦也勸道諦斷却集諦名説道也疏本多作即體者錯應言是體即集諦經言諸苦所因者問十二支中無明最初何言貪欲為本答起惑造業雖假無明苦果生時要須愛同故言貪起欲為本也言所依止者二解一牟云苦諦身為所依止貪欲等煩惱為能依止由依苦諦身能起惑造業招感未來生死果無窮由證得滅未來生死不續即是滅盡諸苦也令貪等集諦煩惱無所依止二云章云集諦為所依止苦諦為能依止由證滅諦斷却貪欲向上苦果無所依止言由道證滅者前既説第三諦必有能證道也若依因果次第滅諦居第四若依觀行次第即滅諦居第三也經言是人於何等一行者如人被禁夢見得出及到天明還在獄中是虗妄又如被杻兩手但放不妨此一手還在獄中雖然一手得放餘之一手還被繫即經言但離虗妄名為解脫其實未得一切解脫言有作四聖諦者問滅道二諦可言聖諦苦集二諦亦何言聖答二解一云聖正也實知此四諦之法亦名聖二者或可聖人所知之四諦皆名聖諦若爾遍計聖亦緣之應亦名聖諦答三性攝在四諦之中亦名為聖如有漏緣滅道是苦諦中收言如是八諦者問無作四聖諦二乘可言不知有作四聖諦二乘何故亦言不知答有作四諦若總相即知若別行相分別四諦各無量相非二乘所知境既不盡亦名不知也經言佛説是人者二乘人也未實滅度二乘有餘涅槃也斯人未得等者未得佛果中三事大涅槃也我意不欲等者不欲令取二乘無餘依涅槃也言不欲令二乘者約不定性説若定性者此中不論對彼不名為權也經言我為法王等者疏解我識根品所以能説王者自在義四十年前根未熟於一乘道隨宜説三四十年後根性熟即合三乘為一乘汝等所行是菩薩道等言通識藥等者煩惱障是病有作四諦是藥所知障是病無作四諦是藥也世尊一一能説法藥能治之若是二乘不能如此經言我此法印至故説者是顯義周圓句利益與世間一處讀若是集法滿是句利益字屬上句世間字下向言一乘妙理者將一乘妙理印大乘教令於教上生信心名法印也將二空理印著能詮教定微妙故理得印名即初周云我以相嚴身光明照十方無量衆所尊為説實相印也言令決定者解印義如國家符印決定必行莫敢違拒若詮真理我法必空更無移改故名為印也經言若有聞者問前唱既勿妄宣傳莫等間為人説也逢著何種性人與説耶答經言若有聞者等當是人為説也言心生隨喜者解隨喜頂受也隨喜即心生隨喜即心隨喜也頂受者即通身心二業也身業恭敬身頂受心能專住心頂受也又身頂即禮拜心頂受即生信言敬而信之者敬即解身信即解心也經言若人有能等者信汝所説見法寶則為見佛寶亦見於汝及比丘僧并諸菩薩見僧寶言三寶無異者相云所詮名曰法身法身無異名同體問如何信法華經便見同體三寶答疏言三寶無異法華經教下法身理是覺性名佛寶有軌生物解義名法寶有和合義名僧寶汝所説法教下所詮真理與佛所證理若別信汝所説之時則為見我亦名見三寶無異問何名三寶無異答現在法華經便有見同體三寶也言若別體者此有真寶住持今約真實真實中大小乘別今論大乘即以三身佛為佛寶大乘教等四為法寶三賢十聖為僧寶言見之因故者問若別體者佛已入滅菩薩隱沒如何得見耶答疏言見之因故等由信汝所説法是佛僧所作師故所以當來淨土之中見佛聞法見僧良由今生聞法為見三寶因因受果名亦名見也言我等皆欲者解經信汝所説也意者何不言信我言信汝意言彼此所説理無異我之與汝並欲令彼聞法華經衆生若不違我得見同體三寶何以故答理無別故言謂愚凡夫者一愚是定性聲聞也凡夫是無種性人二解以後唱一行是定性聲聞所以前行却取愚即凡夫無種性人不堪為説也言乖本心者意言二乘之人求自自免苦若聞二利歷劫修行故乖本心此唯性有二類一愚法者智力不及不愚法者修行力不及經言汝舍利弗等者此二偈不定性聲聞也世尊曰汝舍利弗第一聰明上根之人尚信佛語然後入解尚初且信後方漸入尚自不同菩薩自思擇入菩薩自思擇入也已上三句經鶖子自身經言況餘聲聞者即中下二根不以信解豈能頓悟耶其餘聲聞亦是中下二根若先由信佛語故後方便隨順此經即是自家智分若不先從佛邊生信自發意順此經即非己智分也未能悟解名非己智分也言方順生信者即信忍可不疑順即趣向由定性不愚法人不好信受而不能隨順也言能思性決擇也意言菩薩能自入解此經即己智分也決擇是智故言庶幾者庶者冀也幾者幸也且也冀幸於善道也言脫其為説者功忉云脫者返也意言不説即順情説即違意即返彼意也若有七惡人不應與説即是順逆道理若有七惡人而與説者即名返也故有如是惡因果相名返即以應相對名返也不以順情返名順也脫字別説者順情違己乃屬相宜言憍者論云何名憍於自盛事深生染著醉慠為性能障不憍染依為業恃族姓崔盧柳郁等色者容色端政力者盛壯聰睿者皆覆碁之徒財富者石崇等言二慢者云何為慢恃己凌他高舉為性能障不慢生苦為業若少得謂多得多增上慢也言三懈怠者於善惡品修斷事中懶墮為能障精進增染為業言四我見者於五取薀執我我所一切見取所依為業也言若深猒生者翻前四惡不堪為説四惡者應為説之一深猒生死欣求速出世者此二分翻前憍憍即愛染生死有漏之法恃彼族姓色力不能信解此經若深猒生死欣求出世方信此經翻前憍二云自卑尊人下心愛法此二句翻前慢即陵他有情能不下心求法不信此經若自身卑下尊重於人及有德者下心求法方信此經三云翹勤不縱逸者此一句翻前懈怠懈怠之人不能信受此經若不懈怠能信此經四或觀無我者此句配前我見我見徒不能信此經觀無我者方能信受言下皆準知者此唱有四惡翻此四惡方堪為説後唱有三惡翻後三惡堪亦為説名下皆準知也言識淺者即世智辨聰者二深著五欲者具重煩惱凡夫三聞不能解者初二是無種性人後一是愚法定性二乘皆不堪為説此經經言若人不信一行等者二解一云若不信法華經斷兩般種一世間種二佛種二云斷一切世間之佛種以佛種子寄在有情身中是名世間之佛種此方第二唯斷種不斷世間種也言滅有漏因等者章云一斷世間有漏種二斷無漏佛種世間種有二一斷識等五支種子二斷有漏業種斷有二一斷本有二斷新薰言有漏自者是有漏無漏種言由信此經等者即是有漏世間種若是識等五支種子第八識中本來而有由聞法華經薰善業種招感彼識等五支生人天身現行依彼人天聞薰習資無漏種漸漸增長今謗法華經不肯聽受識等五支種子向上生人天現行功德總無名斷世間種二者業種由聞法華經薰善業種若欲界身上聞修行薰福業若色界身上聞經修行薰不動業種今謗法華經不肯聞經人天業種無由業種前五支種子唯斷用此業種兼斷體也言資長無漏法爾者此斷佛種也若是本有無漏種子在第八識中無始時來法爾而有由聞薰習次彼識中本有種子功能增長今不信大乘經心生謗毀不肯聽聞本有無漏種子不熏令長名斷佛種二者新薰種子由聞薰習初地門中生起現行若不聞經亦無熏習兼不到初地此乃新熏種子不薰令生名斷佛種子也斷一切世間種即有種子斷佛即無漏種子也言若自不信毀謗等法華是一切衆生慧眼今既謗毀不斷便是挑壞人天眼目言或斷一切世間等者此唯斷佛種不斷人天種言世間者通於五趣總名世間今唯取人天身名世間勝故偏説修行人聖事須人天身中本有新熏無漏種子名斷世間之佛種也言損破無漏等者斷滅之義亦同斷善根義也言由此經説等者出舊華嚴經十三卷云若有勸發菩薩心佛種不斷故菩提心即信等五根種子生長資彼無漏本有種子入初地見道門中初一剎那本有種生以前本有無漏起故第二剎那已後即有新薰才生現行即薰種故即本新合用義也問無漏初生起而界地答顯揚云極戚非惡趣欣極非上二唯欲界人天佛出世現觀故發菩提心佛種不斷也言數數者只令作頻頻者數數義也作嚬者拔義從者非蹙負作字非也言此中應言者問但將此一偈入後段中為頭即得何必須段答疏主意於人於法二種別前二頌於法有三惡業若入後偈中前文即闕語業故須正之也經言汝當聽説此人罪報者行因必能感果感果必藉因生種却爾許惡因收多少惡果故言聽説上於法不信也言一讀二誦者問曰讀誦上下句持經何別答讀誦唯在只持兼通心中持也言略説此四等者問如何空説讀誦等者不説諸餘等罪耶答此中不説謗經人罪又不説見持經人打罵繫縛罪只説輕賤持經之人此人罪報汝今須聽且舉輕罪重者略而不説經言至無數劫者問不輕品云得大勢彼時四衆比丘比丘尼以嗔恚意輕賤我故二百憶劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦彼行打罵千劫受殃此業既輕寧言無數答約悔不悔論增長不增長説故彼經言於時四衆比丘比丘尼至夷輕賤是人為作賤不輕名者見其得大神通力大善寂力聞其所説皆信伏隨順即是悔也彼既悔其打罵故罪輕也言別歷三趣受者三趣即地獄謗生惡人三也問何名異熟答因果性別名異趣酬田名熟也總歷四趣者地獄畜生餓鬼人趣也言受增上等流等者於生不障總名增上等流有二一真二假一真等流種子生現生親辨自體名真等流二假等流雖因果相似義説然性各殊前生儲經今生育聾自不聞法名相似等流問若論從業所感五趣總合名異熟果何故疏主偏約三趣説問別歷三趣説答之中惡人身果準諸經論説人趣名等流者偏約假等流説疏主意以彼不是真等流故不説不趣名等流果後總歷四趣中説有等流者偏約人趣中真等流説問天人趣報中必是善招云何惡人身酬彼儲經義儲經義是不善故答人趣總報是善業招何妨盲聾等酬別報不善業名為異熟何所相違總別報中別報異熟也言不説餓鬼等者二十三頌中不説餓鬼餓鬼多由貪發墮餓鬼中不信此經生貪者少略而不説以謗經者多以嗔癡二煩惱發故事不相當不説也言下文亦有者即下經言在餘惡道如已舍宅等是言前第一者經第一卷疏即第二卷解六趣衆生六門分別前已解三門訖今第六疏更解三門化度攝云疏中雖言三若子細而言合有四門一處所二果相三壽量作四義方周言捺落迦有三者一根本八熱地獄二八寒地獄此為根本也八寒則無遊增十六八熱則有遊增為眷屬地獄以處所定故根本二者近邊近根本邊名近邊地獄問十六地獄近根本名近邊根本還近遊增根本亦合名近處若如此者由造業者先受根本苦後受近處苦約前後説前者根本後名近邊言三孤獨者人間有也謂有情業力所致處所不定即一境解乘差共中之不苦也或有菩薩現地獄相令發心故瑜伽三十云又諸菩薩以神通力方便示現捺落迦等諸趣苦報令諸有情猒離欣善方便引令入佛道故歡喜信樂生希有心勸修正行言胞者即胞胎字今講者相傳彭教反切中無此音此音有二個字面瘡作靤治皮作鞄喝居遏反哳卓禮反呫卓咸反郝曜音此第三四五皆受罪聲初二後三皆是罪人形色列名反言此下過三萬二千等者問餘三州有大地獄否答攝云無也故瑜伽云大位作是説又娑瞻部州下有大地獄亦有邊及孤獨北州無大地獄近邊孤獨全無此地面已下過三萬二千由旬至等活地獄墻頭不入墻裏從等活下面四千由旬至黑繩地獄上面也言如是以下者路云合言七那落迦也既有七個地獄不合言六者答若據數則有七個若取兩楹相去從黑繩向下數只有六空處空處相去從黑繩向下數只有六個空處空處相去各二千由旬言其八寒地獄小於熱地獄者此寒地獄不説上下量但橫論闊狹既不説上下故知小於熱地獄初寒與等活相對小於等活乃至七個相對皆爾故言皆小言有義地獄上下重者重引瑜伽中第一師不正義此通前總是不正義後人解釋分作兩段安立有義之言言重疊疊字相似相重也略計十二萬八千由旬者初地面平下三萬二千方到等活等活已下四千由旬許三萬六千至黑繩黑繩已下有六個中間空處相去各二千由旬許一萬二千由旬八個地獄量一一高下十千由旬復成八萬總而計之有十二萬八千由旬言此釋不然者疏主破也上從平地下至金輪但有八萬即剩四萬八千名定不可爾聖教只説妙高水下只説有八萬由旬更不説剩據此所説深於須彌山透入金輪四萬八千由旬間設爾何失答一者有透金輪過決定不可透過二者業力所置過亦不妨且如洪爐𦦨極熱之中火鼠等向上居止如中陰身七金山等皆等透過金輪不可透業力便之然必若透金輪還當由業力三者尺度大小不同也雖有此理疏主且不許故言定不可爾定取八萬更不可過故云不可爾也言故有釋言者引瑜伽師第二正義解也有餘七熱地獄餘傍相當無間居中餘六四邊圍繞恰似著等活善餘七個地獄似食床頭排疊子細單蓋著相似非上下重疊言初寒與等活者初寒上面與等活齊初寒下面二千由旬有餘七寒七寒亦傍相當非上下重疊言其八地獄者第二師引文雙證八寒八熱疏言其八地獄下證八寒也瑜伽但言此下三萬等證八熱言此下二千有餘寒等有餘寒那落迦那落迦廣闊十千不別説一一地獄上下十千由旬雖然不別説理合上下與橫闊等問若寒熱地獄上下齊等如何疏皆小於熱地獄等答章云疏主但隨他初師不正義説言婆沙二有等者此是瑜伽中引婆沙中兩解章云十二卷有三説一云無間地獄底者此地平四萬由旬無間深二萬由旬餘有二萬由旬內萬九千安餘七地獄餘有一千內五百是自墠五百是泥即到地面二云無間地獄深二萬由旬餘有二萬由旬內一萬五千由旬安餘七地獄餘有五千由旬內一千青土一千黃土一千白土次五百白墠五百是泥三云此下過三萬二千由旬至等活上面見無間在中餘七圍繞皆傍相當非上下也此師與大乘分問疏何言二説合前二説為第一解將第三解為第二解故言有二説謨云前解約上下後解約傍布婆沙有二説外方論俱舍但責俱舍不責婆沙又俱舍中有二解一云此下過二萬由旬至無間上面無間深二萬由旬便是底底去地面四萬由旬故俱舍頌云此下過二萬無間深廣同二云此下過二萬至無間底疏主責云極為淺近一見解淺二處所近上明根本了言近邊者近彼根本地獄名近邊即是八熱門外面各四門俱舍説為十六增也四門者章云面各四圍門唯有一只是根本地獄一面只有一門四門者面者四面面各一門面四相共有四門名面各四門唯約根本説不説近邊也問何名十六遊增答相國云增者從彼根本地獄向上增出十六故名遊增也又説有情從地獄出重遭此苦故名增也與根本地獄受罪挍輕已上解總名了言謂煻煨等者解別名也問十六遊增苦唯約八熱為復兼説八寒則云大小二論所陳增相唯依八熱不説八寒也十六增謂煻煨尸糞鋒劍烈河故彼頌云此下過二萬無間深廣同上七捺落迦八增皆十六謂煻煨尸糞鋒刃烈河增各住彼四方言孤獨者不與根本共故名孤獨前根本近邊唯在地下此孤獨山間人總有或多故言孤獨不是唯有一個名孤獨也如無壻女人十個二十個一處總名孤獨處謂處所也言傍生之類者劫初時未有人養畜生畜生本居大海後時被人驅使漸漸流向人間也
