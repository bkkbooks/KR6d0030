front:
  text: 妙法蓮華經玄贊要集目次卷第一自釋疏卷一疏主敘至釋敘經起之意卷第二自釋敘經起之意至釋破疑執卷第三自釋後破執至釋後彰行卷第四自釋利今後至釋施鹿林卷第五自釋四種種性至釋第三解經品得名卷第六自釋第三解經品得名至釋第六釋經本文卷第七自釋論說序品等至釋經我聞卷第八自釋經一時至釋經阿羅漢下第二總別相門卷第九自釋一應受飲等至釋疏卷二經皆得辨才等文卷第十自釋皆得陀羅尼樂說辨才至釋迦樓羅王卷第十一自釋人王衆至釋眉間白豪相光卷第十二自釋照境至釋頌境所見分齊卷第十三自釋頌照境所見六事至釋經演大法義文卷第十四自釋經即說大法至于序品終卷第十五自釋疏卷三方便品始至釋八甚深中第三果行甚深卷第十六自釋果行甚深至釋解脫三昧之總標卷第十七自釋八解脫總名至釋解脫體性已下逸失卷第十八自釋是法不可示至釋疏卷三終卷第十九自釋疏卷四一乘章至釋第二疑經所以者何至無有是處卷第二十自釋第三疑至釋無數法化門其實為一乘卷第二十一自釋諸佛兩足尊等文至于方便品終卷第二十二逸失經卷二譬喻品疏卷五卷第二十三逸失卷第二十四自釋經而告之言至皆當與汝至釋疏卷六經墻壁圮坼等文卷第二十五自釋經泥塗阤落等至釋八寒八熱處所經其人命終至至無數劫卷第二十六自釋八寒八熱果相至釋信解品所以者何至云是我子等文卷第二十七自釋經所以者何等文至釋疏卷七藥草喻品諸樹大小至各有所受等文卷第二十八自釋經一雲所雨至華果敷實至釋化城喻品時諸梵天至唯願垂納受等文卷第二十九自釋經爾時諸梵天王至當演深遠音至釋十二緣起中第五諸緣生攝門經無明滅至憂悲苦惱滅卷第三十逸失卷第三十一自釋經卷四疏卷八五百弟子受記品其後得成佛至亦無諸惡道頌文至釋見寶塔品爾時佛前至住在空中等文已下逸失卷第三十二逸失卷第三十三自釋經卷五疏卷九安樂行品但以因緣有至故說至釋壽量品卷第三十四自釋分別功德品至釋藥王菩薩本事品燒身行卷第三十五自釋燒身行至釋勸發品終妙法蓮華經玄贊要集目次終
