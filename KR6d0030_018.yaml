body:
  text: 鏡水寺沙門栖復集言是法不可示者即如來所説初權後實之法隨宜所説不可表示於人因緣道理絶語言故如人身痛等説之不及須自證故言詞相寂滅者亞簡要云謂真如法不可指示於人何以故以彼言詞相寂滅故又由名字性空故不可得故準諸抄約真如解若觀疏意依他之法亦不可示故言得四證淨者舊云四不壞信新云四證淨也四是境謂佛法僧戒只此四境便是所緣能緣信心緣四境時此信心不可破壞名為堅固堅固者不壞義故名信力堅固此依初地方得所信法華經是四不壞信中法也言而未圓證者問此言信力堅固能知何故又言不退菩薩皆不能知答疏云而未等意言不知者未能圓證言不知也言雖見道前者問地前亦能信知何唯初地答疏云雖見等意言地前菩薩但是比知不同初地證信知也答言四證淨者無漏智證此達理名之為證無漏智與信心相應同緣四法名淨故云四證淨也經諸佛弟子衆者通有學無學亦不約數多少不論處寬狹不分別利鈍前後不説時短長但總指三乘不知也經假使滿等者鶖子念言此説餘鈍根人不知不説鶖子也作念之時世尊道假使等意假使一三千界中總是舍利弗利根之人五薀假者相共盡神思惟佛智不得知也經斯等共一心者但是將十方辟支佛智團合一處著名一心共思求也言辟支望等者梵云辟支此云獨覺獨證者覺名獨覺此含兩重一望聲聞二望部行利根者成麟角鈍根者成部行部黨而行名部行言若未入等者若住聲聞解脫分善獨覺者去果時遠修行時長時練根既久故成麟喻若入聲聞四善根而回趣者但成部行去果時近修行時促用功既少故名鈍根如世間人習業時近遍數小文句生澀即為鈍根也言在解脫分等者資糧位中有其三品謂未定生已定生即此生時若未定生即回向者而作麟角以生數多容約百劫練根若已定生即此生時作獨覺者皆成部行也五停心名未定生別相念名已定生總想念名即此生也若入四善根位已上回趣者皆部行成問緣覺豈無自乘中發心修行得果何故事須於聲聞中回心耶答於中亦有自乘中修行得果者多成麟角若向聲聞之中回心者通部行麟角二類從寬為名且説聲聞中回心問四善根位何許心答下中可爾上忍不然以時促不堪練故集論説於中下忍名移轉言新發意菩薩具者即地前資加二位凡菩薩也長行不言菩薩偈有無不同也言數衆者稻可為食麻可為衣竹則外貞葦即內虗發心之人利物真虗為本可以取況也言田土者吐也吐生萬物萬物從地而生田上功能也言義譯耳者問何名義譯答將梵字翻就唐言只名土田若言國土即不是正梵語中翻出但是以義譯之其差音疏煞反言十種發心者華嚴四十九云一無量無邊廣大心供養一切佛二解脫一切衆生三令一切剎那悉入法界四觀一切法悉如虗空五觀一切菩薩諸行六正念三世一切諸佛七了達不可思議法界果報八嚴淨一切諸如來剎土九深入一切如來大衆十觀察一切如來妙音聲一一之上皆有無量見佛性由生盲人二乘見佛性如嬰兒見月地前菩薩見佛性如患眼人初地至七地如電光入觀即見故八地九地如隔羅穀中見月十地中唯見自性不見佛若至佛位自身他身見悉平等如今既是八地亦不能知佛智也問此間説智慧何言見性答五種智慧中真如是智慧性正是智慧故引來證也前來信力堅固約信心説此約證解未圓所以不知佛智問何言初地已去名發心答準華嚴十種發心總名發心也如前引言前門甚深者問前來八甚深並是歎教門深何故此中説不知智慧答疏云前門等意言歎佛智者顯智深故其門亦深也又解今此不共甚深中八九經文一向歎佛智似述所證智慧甚深相似恐後破疏所以作第二利也言或十四偈半至初六等者準前科配言其中末後者即六頌中末後一偈也即當九頌中初一頌半即是諸弟子衆曾供養諸佛言次八偈等者即經假使滿世間八行文是言準義科等者前來長行八甚深是教門今此偈文亦述教門教門之中頻説佛智慧以義從文科也言總歎至無分別頌文等者問何名總答經云吾從成佛已下總四句唯此一頌半經文述故名總故云無別偈文也問只一頌半述即是有頌何言無答準長行有種種因緣等總句廣演已下別句總別都有十偈此皆不述名無別偈也經言我今已具得者即能證能説名為具得顯具理教二深也唯我知是相自知也十方佛亦然他知也即是唯佛與佛乃能知之經言諸佛語無異者莫見四十年前説有二乘今日説一則言有異此一三權實不定獨説三世諸佛説皆如此先權後實唯佛與佛則知餘人不知也汝但生信力諸佛語無異指二甚深與四十年前昔説今説不同靈山會上説者總名久後久後者究竟終久義終説實法勸令生信汝舍利弗尚於此經以信得入又世尊法久後要當説真實如來暗許鶖子説也若不暗許如何鶖子三止不退言汝既未等者此權實法我一一證來汝但生信心經言及求緣覺者緣覺凡夫大論獨覺地云當地有五種相一者種性本性獨覺由此因緣於情閙處心不愛樂於寂靜處深生愛著二者道謂有一類獨覺種性經於百劫遇佛出世數親近承事成就相續專心求證獨覺菩提三者習謂有一類初修行過百劫已出無佛世無師自然修三十七道品證法現觀得獨覺菩提不斷煩惱成阿羅漢四者住復有二類一麟喻樂處孤林寂靜而住二部行亦樂衆部共相依住五者行依彼彼村邑聚落而住善護其身濟度有情不以言語而教化此中即當第二道經言我令脫苦縛者三果四向總名脫苦縛經佛以方便等者問此明言方便説有三乘何故鶖子猶預不知是所趣答有二意一言陳但説如來後得智妙用引衆生處處著名方便所説以有三乘二者意許之中初雖説三後唯有一此時猶未分明説二非真故名意許取以鶖子上有猶心問世尊隔是交他捨却二乘何要與他説二乘耶答經云佛以方便等四句經也言三度請至止皆前等者若不先止鶖子三請不成也且世尊初止為相令真聖者問取一乘令假聖者避席而去乃至三止等若不唱止在前即三請後無由説經應須第四請方與説法只緣唱止在前第三請恰承著如來許説故止皆在前請皆居後是説一乘之意也言佛止亦三者讚揚希有止經舍利弗取要言之無量無邊未曾有法佛悉成就止舍利弗不須復説二恐驚時曾止爾時佛告舍利弗止止不須復説若説是事一切世間諸天及人皆當驚疑三恐墜大坑止佛復止舍利弗若説是事一切世間天人阿修羅皆當驚疑增上慢比丘將墜於大坑言請皆在後者初騰疑置或請或云狹自他疑故請我自昔來未曾從佛聞法今者四衆咸皆有疑云云及偈慧日等次陳大衆於餘佛所植因故請亦名共佛修因請經舍利弗重白佛言世尊唯願説之唯願説之所以者何是會無數百千萬億阿僧祇衆生曾見諸佛諸根猛利智慧明了并偈等三述自他已從今佛化堪聞故請亦名聞法歡喜請爾時舍利弗重白佛言世尊唯願説之唯願説之今此會中如我等比百千萬億世世已曾從佛受化偈云無上兩足尊等言初止為者問何名初止為相答二解一者止之不談是説法相二止之不談是不説法相乍觀即似不肯説只現此不肯説法相却是説法之前相故云相成就現不説法相意令舍利弗生疑也緣四十年前執自二乘為究竟執心難斷疑即易除所以回此執心作疑心所以唱止緣聲聞人多皆慢法若不待請企意難生所以如來自歎智慧之次止不須復説鶖子作念世尊本來自説亦無人請止者止於何人答一教舍利弗自心生疑二令衆人生疑言次止欲令者唯願説之唯願説之世尊何故殷勤稱歎方便此名推覓甚深境界推覓甚深境界是第一義渴仰欲聞是第二義經合掌瞻仰待願出微妙音時為如實説諸天龍神等其數如恆沙求佛諸菩薩欲聞是道言後止者經説此語時會中有比丘比丘尼優婆塞優婆夷即從座起禮佛而退言初自他者我自昔來未曾從佛聞如是説等言陳大衆等者世尊但與説莫愁人不信經所以者何是會無數百千萬億阿僧祇衆生曾見諸佛云云言後述自他者經云今此會中如我等比百千萬億世世已曾從佛受化言鶖子請中者只於鶖子請中分出三請不科著三止文以止共請相逐行疏主所以科配三止向三請三請中攝也故疏云文隨三段即是止文隨請文也言初止既屬者為在第一段二深先唱中即是歎智慧法妙及法師妙為一乘也第一止攝屬法師功德分中餘二止攝屬此下三請文中言二止攝者二止攝屬此第二四衆驚疑發揭鶖子請文中也言三種義示現示現者顯分義一決定義二乘之人四十年前於自所證心生決定義佛説一解脫義二疑義於佛所歎二種甚深義上言二義不知於義有疑名疑義經云如今不知是義所趣三者於何事疑義何因何緣殷勤稱嘆諸佛第一方便名依何事疑義問依何事疑與疑義何別答寬狹有殊疑義唯約二甚深上起新疑也依何事疑義約新舊二疑故唯鶖子有也經云千二百人至作是念者問前列衆處萬二千此中只説千二百人耶答若約總標疑衆輕重而論有萬二千人今重舉者心口俱疑者有千二百人經言聲聞者再三義稱嘆讚歎讚歎也嘆二甚深也方便者通教門亦名方便也所詮智慧亦名方便接下顯上皆名方便諸佛智慧甚深無量顯上方便其智慧門難解難入接方便含名方便而作是言指佛口中説底言也經言到於涅槃者有餘依涅槃經言知四衆心疑者問聲聞人定心中始知他人心中事如何散心中知四衆心中疑答佛加被擬向下説一乘去前已暗許説意交鶖子知衆人心中疑速請也二者緣衆相貌上有疑相狀相示壞猶豫言生因中疑者因中疑者因謂因由所以義非因果之因也云何如來數數宣説甚深境界前説甚深後説甚深不同於此因由所以而生疑也長行名前甚偈名後也言解脫雖同者此約斷煩惱障得解脫義名為同論云然所知障不障解脫無能發業潤生用故若約通説煩惱亦能障大菩提論云説煩惱障真如豈彼不能為菩提障應知聖教依勝用説理實俱能通障二果故下云是人於何而解脫但離虗妄而得解脫其實未得一切解脫言法執類者即法執種所謂一百二十八類疑是其一異熟生從真異熟識之所生體是無記異熟生無記攝是事疑無學不識黑鹽等經言我自昔來至今者四衆等者金云三周請寬狹不同初周鶖子等請四衆八部皆同請説最寬此中意舍利弗獨自請恐世尊不可為一人説所以普陳衆人之疑心也意徒請多世尊決定説也言甚深微妙智慧也難解等慧門也二周三乘索事次三周索城最狹言佛自告者偈文從前長行何因緣已後生得今當十一偈半述前佛自告中前嘆法師功德無人請説名佛自告也如來知見廣大深遠無量無礙等即是此問慧日大聖尊久乃説是法自説得如是力無畏三昧乃至不可思議問品初所證法妙及能證法師妙已有世雄不可量偈文述了何故此問重述答一往者則似指前嘆法師妙中八門功德相不似是如此道理彼處歎法師功德令一處著只是智慧彼處開出能證法師所證智合將一處著只是此問長行智慧即是此間鄰次長行云何因何緣殷勤稱嘆諸佛第一方便甚深微妙智慧也難解之法慧門也今此慧日大聖尊一偈半述前長行教理也問只是長行教理並是所證今此偈文述何故文勢盡説能證法師念觀功德答前申疑中雖雙問良以如來成就念觀功德故所以前説及證皆名甚深今此頌舉所顯能意取所證雖頌法師妙與能成法妙分殊言自照者自利亦一切暗者利他言冥者莫經反也暗夜也莫定反夕也從初解言靡不能照者照屬佛智普照一切衆生名靡不照明言譬檀越者農夫況施主植福喻營田謂於佛福田中福善增長初生善趣後得真世間日出正是農夫作務時日若出正是施主造福之時言百鳥鳴者喻佛出世高德法師助佛揚化初出已度千二百羅漢遊化諸國度無量衆生言喻弊魔者弊者用也惡也今取惡義破善事故孫子見母去啼哭魔見佛出恐度眷屬所以啼哭也言山王者妙高山也言長夜者即生死長夜也言多年者四十年後方説名多年經云久默斯要不務速説所以未曾説説時未至故經道場所得至問者此是智慧深也準此是無問自説經也我意難可測者慧門深也意言慧及門二乘不知所以不能問經無問而説者無問自説經也稱歎所行道者一乘道也經無漏等者無學也及求涅槃者有覺也今皆二句正是疑也經其求緣覺者緣凡夫也言佛説疑喻者一衆疑二則願説長行有願樂欲聞即是偈中願説草書願字誤為佛亦云佛説亦云凡説今取佛説為正佛説疑如網為一句羅生難出為一句即解經云今皆墮疑網言猶豫者問何故喚猶作豫答説文云等猶性多豫在人前行到十字道口却回來故猶多疑故名猶也凡不決者喚作豫也言猶如麂善登木者讀將謂麂亦解上樹非也各別讀也經我今自於智至所行道者因法更何所求若是因緣法更求何果若實是果我更不修若實是因我更修也言前説衆人於自者問鶖子既於自所得因果向上生疑如何法華論科為定疑分行自所證心決定耶答前來於自所證心生決定者約一切聲聞説此間有疑唯鶖子説緣利根有新舊二疑鶖子等常於自果法生疑也又論云決定義在大衆疑中何事疑在鶖子疑中鶖子於自乘果法向上既無決定何故有定疑也又鶖子唯於自乘果法上生疑兼於佛説二深向上亦生疑經云初聞佛所説心中大驚疑通妨亦得問鶖子如何得成定疑分答定疑分約中下二根説四十年前執二乘為究竟有決定聞唱二種甚深有疑也所以疏云前説衆人等上於中下二根人説也若約鶖子無決定義於自所得亦生疑也言又前初聞者初聞二種甚深於大乘法上生疑於自乘果法向上亦決定後至偈中被世尊告云假使滿世間皆如舍利弗又云正使滿十方等所以鶖子兼於自乘果法上亦生疑所以初生決定後還生疑疏體經意故作二釋故言不相違也經佛口所生子等一行者鶖子意徒世尊説經言語博帖也言佛口所生子舍利弗稟佛言教等者佛口所説言教因佛言教聖道方起教從佛口生聖道猶教起展轉生起疑也簡胎等最初羯等經諸天龍神等二行者鶖子空舉千二百恐少所以更多舉如恆沙鶖子又道我是聲聞小果則可會中更有八萬大菩薩文殊普賢等上位聖人欲得聞法意徒如來受請四衆八部勢力仍劣又請萬億國等言此土佛出者問為是此一三千界輪王為是他三千界輪王若是此娑婆世界三千界同一成壞同一增減既是減劫無輪王出世答則人是他三千界輪王問若言他三千界輪王為是菩薩為是業報輪王答若業輪王當四洲即得出向餘四洲去不得今來者菩薩輪王來也二者業報輪王佛加被力來亦得也問若言初地二菩薩即合言一百今萬億國一千萬億國如何只言一個萬億國答此間是小他土安多輪王不得且約一三千界中輪王説經言皆當疑也驚謂驚張疑者疑怪也驚張疑怪故云驚疑論家改疑字為怖即驚怖也怖者怖懼法大乘行廣時長故云怖也四十年前若將妙法蓮華經為聲聞説譬如以寶示於愚人愚人便笑也定記分者定者即決定心佛本來從唱二種甚深處早有決定為聲聞説法華心也唯止多不説法相却是説經心決定也言記別有三相者謝往生人去名得謝往生地獄名失如彌勒為求名菩薩名失亦行衆善業名得二授記大人者即菩薩然古來諸大德解記別唯有初二義唐三藏方譯出第三記別記別解釋深密之義也此經即當第三記別也言如下十二者一契經二應頌三受記四諷誦五自説六緣起七譬喻八本生九本事十方廣十一希法十二論議言由此有便止及説者此決定心是佛心也佛心本來為鶖子説法華經説經心已決定由此有向後第二止第三止及下正説佛若不止鶖子不請鶖子不請不請因何説得正説所以唱止也既世尊第二遍止止鶖子第二請世尊第三遍遍止鶖子第三請所以向正解釋決定心論不配屬經文通下文意直至故四疑已來是也又云通下三周太寬問何處是佛心本來已有決定心答有説徒菩提樹下三七日思惟已來至今日決定心也二者取唱二種甚深已來則本來決定心也問既決定心通唱二甚深已來有即合第一止亦合有決定心如何向第二止第三止及下正説科作決定心耶答雖前第一止中亦有決定心為不對能請人定唱止不説法相暗由初世尊沒人交説自欲得説又自止我不説也元來是獨言獨語不説法相隱不得分明也如斷欲之人併處言斷欲暗對女人言斷欲分明也所以向第二止處科出決定心非是第一止處無定心也言已生驚怖者問地前漸悟菩薩不説則有驚説則無驚何名已生驚怖令斷驚怖又餘四之中三今不論且悔驚怖如何名已生驚怖令斷驚怖此三根聲聞還即是説有驚不説則無驚如何説法華經名已生驚怖令斷驚怖答已生驚怖令斷者約四十年前鶖子舊疑説名為可然若約中下二根聲聞説唯是新疑悔聞法華經既有此疑悔如何名已生上者令斷驚怖耶答餘四驚怖亦得名已生令斷也初聞唱二甚深便生疑即是驚怖也後至開示語入處斷也所斷對能斷説故名已生驚怖令斷也意言已生約舊説有驚約新説也言二種人者一多事二悔驚怖若總想説有五驚怖若正要當只是二種驚怖也若望兼説傍正為不妨為五種人若決定心為二種人斷驚怖説法華經言驚怖者返道疑生名損如來向他説我法能離生老病死究竟涅槃是學無學人亦各自已離我見及有無見等謂得涅槃如今聞道無二乘故名損驚怖也言如所聞者即四十前向世尊邊聞教聲取以為實執二乘為極也言謗無大乘者定性聲聞執自果為極不欣求大乘便是謗非是邪見亦有趣寂謗無大乘經不信是佛説亦名謗也唯識引而申破云量云諸大乘經是有法定是至教量攝故宗因云順無我理違數取故同喻如增一等言不入涅槃者有云但是作念我已得有餘涅槃與佛相似今既聞説無體何要入彼有餘涅槃故云阿羅漢不涅槃也言若聞今説等者即是聞破二乘故也即驚疑云將知阿羅漢畢竟無入涅槃者返道疑生故名為損也道謂道果未聞法華經於自果生信心名順説法華經已聞説唯有一乘無別二乘涅槃果不唯空涅槃果兼智亦名道果也向上疑心名返只此疑心疑著果法便是損義故名損驚怖二云道謂道理十方世界有二有三名順他性定人道理今説大乘聞道無二無三乘返此道理名為返依此生疑名損損即驚怖持業也言多事等者論解此是第六住前小菩薩意言望後三大僧祗劫説名為多事起懸涯想欲取異乘心故故名驚怖驚怖彼萬行也驚怖即疑怖也若疏主釋與論相違牟云不爾疏云已經多劫行菩薩行即如鶖子至第六住已是六十劫修者時分義言恐彼者問唯此即是驚怖未生何名為多事答二意一者恐後生故如設堤塘二者彼大乘行恐者恐怖即驚怖即是現怖何妨名斷二解不違下疏多事一種不説有驚之文也言顛倒驚怖者此有種性凡夫我見強故經云計我見者莫説此經又云我慢自矜高諂曲心不實論謂分別我我所身見不善法故言謂根未熟等者此言定性有大乘種性也言尤重者執我心強名為尤重無我之處強執為我名為顛倒若聞此經二空無我道理與彼執乖緣根未熟便生不信名為驚怖言悔驚怖者即以悔心名為驚怖也問鶖子無學因何有悔答其實無悔惡作是因悔即是果但是惡作不是悔也悔有二種一則悔修小乘行説法華經破悔二則悔不早修大乘行説法華經此悔不障修行故不破也經昔來蒙佛教不失於大乘佛音甚希有能除衆生惱又云嗚呼深自責云何而自欺此悔驚中唯有論文無疏解言誑驚等者聞如來教聲聞便六行伏或坐四禪得初禪定計為初果及至四禪等爾自不知是錯言為真實四沙門果心實境虗也我若為説經彼人謗我我得四沙門果云如來誑於我等疏自謂等瑜伽論中説聖人無自謂得果得初果實知得果二果亦然更無餘者果既滿足更無可修今聞佛説更有大乘即便虗誑誑於我等此下料簡五怖四門分別釋名出體顯相斷處釋名者驚謂驚張怖謂怖懼怖也驚怖不同帶彼五帶數也損謂損滅執彼定性不入涅槃即損滅義多事者即是於多劫中行菩薩事顛倒者即是執我我所不稱於境顛倒而生誑者誑謂欺誑也二體性者初別後總損者法執及異熟生疑為體或疑或執故多事者懈怠為性顛倒以身見為性悔者以惡作為性誑者慢及不信為總體者通二障煩惱所知法執異熟一生疑為體三顯相門如疏中説四斷處者斷處者損者下云若有比丘實得阿羅漢者若不信此法無有是處世尊化得定性聲聞堪可説法彼處斷也令定性聲聞信有大乘成不異法也初猶未信名損驚怖疏語多事聞經斷下云菩薩聞是法疑網皆已除等顛倒分別者三乘見道斷俱生第六俱者四地斷第七者八地永伏不行悔者三周説經處隨文斷誑者增上慢人根熟之時若遇餘佛於此法中便得決了或遇當來彌勒佛斷也言不退位菩薩等者意言菩薩之中無不退位菩薩問爭知無耶答不退位菩薩非此五攝言捨權就實者問説經五驚怖中斷幾種答此中緣捨權就實即悔驚怖欣趣佛位即多事也驚怖此二種方為説一乘故言此説一乘者問爭知只為此二種不為餘三耶答此説一乘不逗等意言料簡傍正即是出所以也疏言正為利益二種人故正為悔及多事也問何知為二種人益論解云佛心已有決定所為之人即利益悔者引攝一類利益多事即任持所餘疏非正為下若傍為即兼為損義兼為三理亦無失義兼頓菩薩於理未爽餘顛倒全不為言觀此文意至不説無驚者如何言已生驚怖令斷驚怖又云説即有驚何名令斷此依悔驚怖為難答今依三根聲聞皆有新疑新悔名為已生初周聞法驚怖悉斷亦名已生驚怖令斷也此俱生約新悔疑説其實若兼鶖子舊悔亦名不説有驚也説前之六類之人説應四句分別一説則有驚不説無驚第一損怖第三顛倒第五誑驚怖第二説則無驚不説則有驚第二多事驚怖三説與不説悉皆有驚第四悔驚怖今昔二時皆有悔也經云我常獨處山林樹下若坐若行至而見濟度未聞法華悔住此名昔悔小也悔者今聞佛説二乘作佛悔不早修大乘也四説與不説皆悉無驚者謂不退菩薩且望今佛即道無驚若遠望之何妨昔有今約此法華會上菩薩故言説與不説皆無驚也解經中驚疑二字了論中作五驚怖解了言故論總言者説經是一驚不驚殊疏解即有五般決定只為二種唵含標舉故言總言也言因授記者論解後二止意經家喚作止止論主不可還作止喚改作因授記論家科定記分中曲分為四一決定心二因授記三取授記四與授記一決定心論家不科配經通下文意二者因授記疏云因授記上科者如經止止不須復説至驚疑即下二止文是也第二改科因授記者因由所以義授記者分別解釋為因故名因授記上來科因授記了下正解因授記言應聞等者問世尊第一遍止了即得更何用第二遍止耶答若不第二遍止何因生得一推覔甚深境界為一義二者欲令大衆生尊重心畢竟欲聞故此上是應為聞者之二義且推覔甚深境界經云唯願説之唯願説之尊重偈仰欲聞生希有心者經云是會無數百千萬億阿僧祇衆生問第二遍止何即得何用第三遍止答若不第三遍止因何生得惡人退席即是不堪為聞者退席經云説此語時會中有比丘禮佛而退故此三義於後二止上建立出與授記為因故名因授記若煩此方言音即云授記因也亦有疏本作開字開者之二義應作聞字為勝其取授記者即許當為記是取有二義一許可義名取二攝授義名取一許可為説名取二攝授義攝授舍利弗請名取義此即取為因授記為果向下經云汝已殷勤三請吾今豈得不説是也言與授記者向下六段文正為分別解釋料簡四事言定記四中者前來決定心不配經文此間似配也言次因授記等者以彼因授記是後二止後二止是後二請因故言指重請之所由世尊第二遍止止鶖子第二遍請處令鶖子推覔甚深境界渴仰欲聞生殷重心世尊第三遍止止鶖子第三遍請令惡人退席三義具足方堪説經故云因授記又解世尊第二遍止止鶖子第一遍請處此名止單請之所由世尊第三遍止止鶖子第二遍請處故名止重請之所由今既惡人席向第三止中起去方堪説經故喚第三止名因授記亦名止重請之所由前解為正若依後解似因授記編屬第三止又第三止只攝得不堪為聞者之一義失却推覔甚深境界渴仰欲聞之二義也亦有疏作其請之所由若取其字通後二止問決定心因授記皆通二止行相如何答所望別故決定心約佛心決定以唱止因授記令鶖子速請也經舍利弗至唯願説之唯願説之總請也緣前行世尊兩遍止今請中順前文亦兩遍道唯願説之經云所以者何等者鶖子重重請説徵前請之意答中鶖子恐自一身請説不得更舉引多人併力一時請也是會無數等舉人數也鶖子道若於千萬億劫不聞佛名字亦不聞正法若是此等衆生亦不敢請今此會中爾許衆生曾見諸佛諸根猛利智慧明了至敬信者言睿者憨也經言大坑者亦復如是信心者聞便是良藥不信聞者便是毒藥水能載舟亦能覆舟一乘妙法亦復如是順行速得出要鶖子若聞成佛號曰華光誹謗永沈五十之輩若聞不信墮於地獄大海雖寬無量不曾宿於死尸一乘行廣無邊豈容於不信福中最上不遇請轉法輪罪中最重不遇謗法也無間地獄名大坑無間地獄沒底坑七熱八寒小坑世尊止舍利弗不須復説求説不得將由當也當來墮大坑也大坑有二一約實此地下過三萬二千由旬有等活又過四千由旬有餘七豈非大坑八寒八熱之下名大坑坑即是處所無間也問何名大坑大有三義一起大惑故十煩惱中邪見最大二造大業故故名大則五逆業三果報大由起邪見不信正法死入無間名為報大坑大坑即無間獄小坑即餘七熱地獄也糅問此類既得第四定大坑須是欲界發業下惑已伏云何言墮大坑答恐聞經後起不信心如謗解脫退失上定即入大坑故云將墜也言恐懷上慢等者恐聞經已後起謗名恐懷上慢置聞比丘不尋三藏聖教名為置聞聞世尊説有四沙門果便六行伏惑猒下苦粗欣上淨妙慮得世間靜慮有漏故名世間也將謂是四沙門果生已度想等修彼上界業成生於上界受中有遂便起謗我聞羅漢已便生地獄問他家會上悉不肯道我是增上慢人緣何喚他作增上慢人爭知他聞法華經決定謗也答緣得四禪定許四沙門果此皆凡夫必謗恐墜大坑所以疏云非聖有學問爭知不是聖有學答疏云瑜伽論説等問何故置聞比丘有自謂得答疏云增上慢故問爭知聖人無自謂得答疏云無邪見故等言諸論皆言者即對法智論等言後命終等者攝云大乘小乘各説不同小乘有部本有起謗由本有位見中有身方起謗大乘中有起謗問言中有起謗起幾個煩惱答起五個煩惱分別有三邪見嗔癡俱生有二我見及愛能潤生故理實而説一切煩惱皆起故論云生在上地下地諸惑分別俱生皆容現起若爾中有既具五薀豈一有情二個本識即衆生界有增減經云唯願説之唯願説之者紀國云重言者表自他二利也經云百千萬億等者將百千億一句連如我等比一處讀則唯是人數若將百千萬億向下世世為一句讀總是時也不是人數也二義中將百千萬億屬上如我等比則順後偈文是會無量衆能敬信此法人衆多少也將百千億連下世世讀則順偈文佛已曾世世教化如是等唯時節也問鶖子為憶得過去二萬佛時大乘化為憶得小乘化時若憶小乘化如何請説大乘若憶得大乘化爭憶爾許時小乘過未緣境無過八萬也答若據道理憶得小乘若爾如何請説大乘答鶖子但請不言如是大乘小乘也心中生疑總相請也第二佛加被令憶得大乘化請説大乘也問如授記云我昔教汝志願佛道汝今悉妄如何今言憶得答彼處言妄約本心今言憶得佛加被也言生死長等者問鶖子已離生死寧有此此言答未得真覺常在夢中鶖子分段最後身在變易生死尚未能除故言於生死長夜之中願繞益也問鶖子更不變後有身分段生死已盡如何言長夜答分段雖盡變易猶存亦名生死長夜蒙佛教化故言安隱饒益也經言兩足尊者金約理三義一由佛具足定慧名兩足二內有智慧外具神通三內身具四智向外有福德名為兩也次約事明今六道四生之中無足二足四足多足之中人天最勝問何以如此答以人天兩足入道勝故故所以稱尊就兩足中佛身最勝故名兩足尊也經言我為佛長子者無漏聖慧佛口所生名子諸聲聞中鶖子智慧最勝故名長子也言若依自科等者則合道初長行後偈頌疏主何以不分者答緣品末三行經文屬第四段勸發喜心經文不述長行疏主此間分出恐濫品末三行合道長行有二初明二記後破四段今不言者科文隱顯難所以到文指出此間不開也經云汝已殷勤三請者許可殷勤者樂三也問何故事須三請答三請不滿請心未極三請若過請心盡之所以只三請不過不減也言攝援者佛攝授也攝授三請許可為説故名取也經言諦聽等者生聞慧善思生思慧念之生修慧也十地論如渴思冷水如飢思美食如病思良藥如衆蜂依蜜我等亦如是願開甘露法世親解云此四喻喻四種法義一受持二助力三遠離四安樂也聞聲教如人食水不爵隨得而飲如是聞慧初聞即受隨文受持思慧受教如食入口咀嚼身力助成如是思慧嚼所聞法修慧聞法如復良藥藥行病除如是修慧隨順正義如法修行遠離一切煩惱習患也三慧感果如蜜為衆蜂所依如是聞思修三慧聖所依處又諦聽者令離散亂善思令離放逸念之令離顛倒又三慧猶如四器各用不同第一無聞慧故聽者不聞猶如盆底上寫水第二無思慧故即聞而不思猶如漏器中寫水三無修慧故即思而不修猶如穢器中盛水若具三慧猶如作器全器寶器中盛水灌淫身心言聆音屬耳者切韻以耳取音曰聆又去取所聽之聲屬能親之耳夫聽法者有五相一求悟解二專一所緣三聆音囑耳四掃條攝持五者攝念一心聆音囑耳以耳取聲為聆囑將所聽之聲就能之耳名囑囑者託也言掃滌者掃謂掃除滁謂洗滌掃除散亂洗滌沈掉掃滌垢障攝持散亂言渴者意言如渴者飲時一向受小土更無異想以此聽者一向入於法義中更無異解一心入於語義中能詮教也言心悲喜者即有種性人法應根故聞之惻愴如鞭有命故隱軫隨生言若不誡彼者問世尊但為他説何要教他諦聽答疏云若不等言恐心不定者有三義一散心法如覆器二慢心法如漏器三側心聽法如穢器經説此語時至禮退者緣品初唱二甚深道他不知增上慢人早不肯更見鶖子三請世尊三止五千人云四十年前所有法共我相似今日忽然道我不知又三遍請又不肯聽即合便起云何用禮佛答禮佛即荷彼前聞起去不欣後説緣法華會前向如來邊聞法修行得四禪定只是錯計望他中心真實經云所以者何如來自徵也何故五難之中四難已具只有聞法難便起去者何也答疏言一人身難得如崑芥投針峯二者中國難生如盲龜遇木三者諸根者一眼等五根難具二信等五根難具如錯水求火四佛出難值如路現曇華五雖值佛出聞正法難如懸砂庵飢王舍城有九億人三億人見佛聞法三億人見佛不聞法三億人亦不見佛不聞法又雖有眼耳等根若聞佛法不生信心亦名五根不具即信等五根是也五難之中初四已具何故臨臨聞法而起去耶此起之去之所以者何謂也向下疏釋言此輩等者一顏補昧反亦補輩反古時非下作車今時比下作車廣雅輩亦類義羣黨也言百兩者高音車居音呼賀攝兩乘車為一兩言百兩即二百乘車也牟云一乘車有兩輪名一兩即百乘車也言番者般若類也言罪者古時罪字自下作辛自辛字頭仙星帝字改為罪字即當佛經可毀義也問何名為罪義答疏言可毀等罪者有解罪因上有可毀等罪果向上亦有可毀等義今解不然因果上皆具四義問爭知因果上皆具四義答疏云若因若果可毀等言若依小乘此罪衆多等至三障者問此説罪根何故説他煩惱障等三障耶答至三障者問此説罪根何故説他煩惱障等三障耶答章敬云煩惱障罪緣業障罪體故名罪也報障罪果故名罪也言一切煩惱總為二類者一數數起名勤二起而非猛名利解勤利二義也言分為四句者一勤而非利勤即數數起也利即猛鈍雖數數起而不猛利也二利而不勤一生三度五度煞生一回煞三千五千口半今取四句中初句勤而不利第三句亦勤亦利是煩惱亦是障收餘二句是煩惱不是障中間容起加行對治道故言五無間者謂煞父害母煞阿羅漢破和合僧出佛身血名無間業五中四是身業破和合僧是語業五中四是根本一犯加行以煞佛命不可斷故不成根本罪也一受報無間唯順生受造得此業亦無便生更不隔餘身餘趣故名受報無間間者隔也二壽命無間具壽一中劫中間更無中夭三身形無間入地獄其身彌滿等故四受苦無間餘地獄受勢苦時有涼風間息此地獄中純苦更無間也五處所無間更無別處所間隔也言三塗八難者一地獄二畜生三餓鬼四北洲五長壽天六佛前佛後為佛前後有法依法修行得者故改為法前法後七世智辨聽長壽天即無想天也八諸根不具問何名異熟障答此八難身能障聖道故名障也疏結云此之三障等言今依大乘有二罪根一煩惱二所知障等者所知障隨其所應障入大乘聖位所知障中分別障初地見道也俱生者障十地及佛地都十一位初十障障地十後一障障佛位一異生性障障入初地遍行真如二邪行障入第二地最勝三暗鈍障勝流四微細煩惱現行障無攝受五下乘般涅槃障類無別六粗相現行障無染淨七細相現行障法無分別八無相中作加行無增減九利他中不欲行智自在十於諸法中未得自在業自在十一微細所知障此望十地及以真如次説十一重障故言隨其應障入大乘聖位所知了言煩惱障隨其等者煩惱有二一分別二俱生分別者障入初地入初地時正斷二者俱生初地已去頓伏不起七地已前故意力起而不為障問既是故意力何名煩惱障答煩惱種子障於佛位成佛時事須總斷次小乘者分別者障小乘見道及初果也俱生者前六只障第二果後三品障第三果上二界八九七十二品障第四果緣覺之人分別俱生皆障無學更無別證大乘漸悟菩薩此於自乘煩惱先斷若頓悟者分別煩惱見道除俱生中種子不斷唯障金剛心與微細所知同斷下地言百二十八者欲界四諦各十修道有六成四十六計九十二上二界除十嗔有八十二怙欲界四十六計成百二十八煩惱此唯約根本説言并隨煩惱者欲界隨惑二十全上二界有八大隨共有十六大隨并色界諂誑及二界憍上二界共有二十個隨惑并根本煩惱輕重合論名煩惱障言所發業等者問所感果如何亦是障若三界身總名障者應無人天入聖道又問若是不善非福業可名為障若是善業不動業如何亦是障答疏云此意所説等意言是彼煩惱品類等流總名為障非據重者如本識雖非煩惱招感由惑招故名為報障又説二障不取業果彼約重者此非據重問所知障如何云發及感果耶答若展轉説與煩惱為依如疏所緣緣亦名所慮託又如迷人亦迷杭故如執繩為蛇兼執麻若別説者即無發業又論云然所知障不障解脫無能發業潤生用故若約為緣招變易等亦可以定願力資彼故業非新發故問前所發業尅體是誰答分別無明正發業餘分別及俱生惑皆助發也故論云若俱生者助發惡行亦不善攝言非據重者此通業及果名煩惱之所以問論主令造此論生正解故為斷二重障故重障乃是煩惱所知今何不取所知答彼據別義言之彼有四義一如金剛難可斷故二於此難越生死流故三壓溺有情處四生故四沈墜有情沒三界故毀責過失立以重名煩惱所知總名為重以彼四皆具種義故此約能障入聖位者名之為重彼所知障不障二乘聖位故不名重經通三乘從寬而説言依大般若重障有四者意佛地論輕重障皆取今唯取重者依毀責過失立以重名言及彼等流諸隨煩惱等者流相似義即隨煩惱是根本煩惱之類故名等流言隨其所應者此中隨應與前後別此煩惱隨其所應隨三乘人皆障聖道一一乘中修行人煩惱障皆障聖道故隨其所應也簡要云若具足有一百二十八一一皆能障聖道若有一個亦能障聖道上煩惱障下依般若業言薩遮尼乾子經業障有五者世尊在日此人問佛言我若出家何似鶖子佛言不及彼便不出家佛為記曰我涅槃後一百年此人出世名優婆毱多時人號為無相好佛言尼乾子者即優婆毱多前身也問為總犯成逆為犯一二即成其逆答隨犯其一即成逆也前煞父等是三乘通逆也言破塔壞寺若起惡心取一磚瓦皆是五逆中攝或不聽造亦是五逆化度云若鑄寫人鑄見佛面不端正打破報鑄無罪若嗔心打壞即成五逆也言竊盜用者盜約私取用約因官傍私及為主首方便破除亦是此業言障礙留難者擬行不教行名障礙已行次絶却名留難也言債其發調者糅云發即調即祖言即三惡八無暇等者謂無間暇修習聖道故説為障等者等取半擇迦無根二形問𭨭濕二生得聖果否潞云提謂夫人鶴𭨭生須達女生一𭨭誕生千子皆得聖道彼約小乘大乘必無是事但説三塗身不入聖道提謂是人身何妨入聖如鬼通胎化二縱是胎生亦不得聖也言其間佛者問釋迦法何時滅盡答住法記云從減至增當來人壽六萬歲時釋迦佛法盡當此之時名法沒也言造匱法業者契經説若人慳法恐他解已過於己身不為他説有六種報一盲二愚癡三十方佛怨四無惡不造五善人遠離六退失聖胎牟云盲者滅慧眼故癡者障對治故怨者背覺義故失聖胎者法界為腸智種為胎一大劫聽聞如十月滿足至通達位方是初生今既慳法不信所以聖胎喪失言等流者此有二種一真等流種子生現行也惡不善種子生不善現行性同故親辨自果名真等流等謂齊等流謂類也二假等流則不必性同但取相似義也前生障他人不聞法今生自不得聞法故名相似義也果似昔因因似於果故名等流果今此所言似等流也增上果亦有二一者順增上他人欲得聞法與力借助令交聞法今生自身亦得聞正法名順增上二者違增上前人欲得聞法障礙不交聞名違增上增上是因今生自不聞法是果增上之家果名增上果依士釋問二果何別答相似義邊名等流果果望於因名增上果牟云能感即匱法此是因現不聞法等是罪體此即是果經云衆聖之王説法教化如斯罪人當生難處等言瑜伽等至七種者一初慢者謂於劣計己勝前人實劣於我更執自身勝於前人也二或於等計己等問既言於等計己等順道理何故名慢答聖教中説慢者於稱量門中轉等與不等從地亦道等時便是慢者二過慢者謂於等計己勝前人身上事業一切與己身相似計己身勝於前人便是過慢我於勝計己等前人據實勝於我背計己身共他等名過慢也慢過慢者謂於勝計己勝前人勝我百千萬倍計己身更勝於前人名慢過慢也我慢者恃己報我高舉為相身上馬亦無空腹高心地增上慢者實少得謂多得也卑慢者謂他人多分勝己計己少分劣也市部兒云宰相騎鞍帶馬勝我若論早眼晏起則不如我名計己少分劣他也邪慢者全不得言得是邪慢相也言今憎慢者五千之徒既有慢相未審與前七慢之中是何慢攝答疏云今增上慢等意言五千人增上慢與前第五相當也問行相如何答得四禪定起有漏慧心名少得謂多得六行伏惑煩惱不生之處顯得非擇滅名少證謂多證等言得者有為者問既全未證四何行果云何言少得果答豈有少證聖果而妄計耶故瑜伽云一切聖人無自自謂得等言目矚者神光即是序品放光言耳聞妙唱者即是聞無量義經或云彌勒問文殊答名妙唱言未革庸心者庸者次下之義革由改也未改庸心演妙宣難便乖涉意諸佛智慧名演妙説智慧門名宣難或唱二甚名演妙三止不説名宣難言聞序中者交伊聞問答為已後捨權就實大漸之初由言聽宗內等者聞正宗之中深陳即是二權一實與他相違故起謗也所以疏云折摧等鶖子猶如好米能濟飢故留之五千之輩如粳粃任隨風去鶖子猶如清酒能適悅人身心故留之五千之輩如糟沉濁即須棄却如來動三止之霜風折摧五千之危葉鶖子猶如貞木扇拂不動故存焉下經云衆中之糟粳佛威德故云言俗默者意取此默為正口邊作俗應作止為正若作旨紙皆非也言諸論皆云者問何故不止答疏言諸論本即對法及攝論也攝論云佛於諸法皆得自在唯於二種不得自在一者受異熟果決定如過去有一池魚有村人共取而食池中大魚即令琉璃王是餘之小魚所將兵衆是彼村之人即今釋種是遂被琉璃王所煞縱目乾連以神通力接諸釋種置星宮中於鉢盂中坐釋種向下看彼鉢盂尅頭落即受報決定也二者作業決定如頻婆娑羅王恆受遊獦數向山中不得禽獸後見一仙人即作是念我不得禽獸應為此人遂以口勑煞之身首異處仙人遂以立誓願我未來世遂以口勑而煞於王過去王者即父王是其仙人者即闍王是又對法云一由宿業勢力盛得人身等異熟身相續決定起等流諸惡二由五逆等宿業勢力助人善業得人報相續亦兼起等流惡業此業起故作業決定如闍王害父琉璃王誅釋種等皆是作業也言罪根深者即是論家受果決定多生造匱法業是罪根根者因也今生現不聞法是罪果前生令他不聞法今生自不聞法此五千人與釋種眷屬同是受報之流類名決定類言增上慢者者是作業決定類若留著決定起謗三業法全是作業定類世尊觀此五千人與阿闍世王同是作業定類也有二意一由業力即罪根深重不合聞法二由根未熟此增上慢人聞法必謗由此五千從座而起去佛雖神力亦不止之言乍可等者問世尊何不且留更聞少許法何故便交起去耶答疏乍可等意言法則不惜縱留恐成無益乍可令其起去等前約定業而不排佛力制不得此約佛力制若制即興重業故不止也言彼發心者問王造逆亦是作業決定受果決定何故佛放慈光照觸令其罪減不墮地獄答疏云彼若發心等如闍王悔煞於父遍身生瘡病自言我是大地獄人如是懇切悔責身心清淨所有眷屬亦清淨佛放月愛光三昧照彼王身即得除差此即定業可轉也言其心不易者如琉璃王誅釋種年煞父佛言大王却後七日必當命終若不懺悔定當墮地獄王曰大丈夫誰能悔過遂於水中而居滿七日已從水下火燒之其成灰燼以不發心佛力不排故經云而不制止天雨雖潤不能令枯木生華日月雖明不能為盲者開目章敬云一表經之深妙非五千之徒所思慮故故不止二勸後學令其戮力如來現在猶多怨嫉況滅度後故不止也攝云大方便寶雨并善住天子問經云增上慢人退席而起去不久却來何故不同答此經明一乘二乘作佛其事甚難所以不來彼兩經不爾是故却來經云爾時佛告為汝等説問何故論家取第三止文是增上慢人起去之處經家取取授記文是增上慢人起去之處何故不同答若説與增上慢人心事相違即取第三止文正與相妨也及至欲起不起便到取授記經文所以取文不同也經云無復枝葉者五千之徒不堪聞法如枝如葉隨嚴霜雕落鶖子利根繼紹佛位堪聞妙法故留住如貞如實堪為大之材言佛許説等者即以許可攝受之言便警其心也言退為佳矣者去有二益一現在不起謗法之非二聞前略説以作未來因緣含此兩義故云退為佳唱也佳皆音脼良將反兩音賀云江南呼小犢子肉為膎脼南地呼皆為膎也有云膎是影肉脼是濕肉者謬也言諾者奴各反言希解等者解者異也若希望應作覬覦上記下喻言未聞令聞者論文疏言歎法希有顯令聞故經云佛告舍利弗如是妙法問何名妙法答諸佛時乃説之無量無邊劫有一佛出世説法華經如優曇華一減一增劫方有曇華出無量無邊劫有一佛出世方説法華經直至今生尚自四十年前久默斯要不務速説也舍利弗問如何此希有法不説空讚歎耶世尊道汝但生信諸佛如來言無虗妄也論體經意世尊既殷勤讚歎欲擬説未曾聞底法故論云名未聞問何名未聞令聞答未聞之法今日令聞從十六王子時一遍聞自後已來更不曾聞名未聞令聞二近取四十年已來擬説説不得名未聞令聞法也即是唱二種甚深標文令聞故即是何下六段釋文故云令聞也言説舍利弗者問云何不與我説空讚歎休去耶世尊道我只緣未聞甚深所以能詮教詮著未聞令法便意趣難解我若直顯説衆生易會只緣隨宜説將教就根論名隨宜説説三之時實有三大易會只緣説三之時不得三説三唯有一所以意趣難解問世尊不直顯説交他易會耶世尊言四十年前求直顯説不得經云若但讚佛乘衆生沒在苦所以不免安方便著説教上既也無數方便所詮理中是法非思量分別之所能解疏云明所等言依何等義者問世尊依何等義為他鶖子説法答將第一段未聞令聞之法依第二段説中名字章句先權後實軌則法用説所以疏言為未聞令聞及方便説問既第二段説是能詮教未審依何等所詮義為他鶖子説答依第三依何等義中開示悟入四種知見一乘因果所詮義為鶖子説也即是疏言謂得依佛所甚深難解法深難解法即是一大事四知見也糅潞皆云依何等義此文剩或錯牟云此解不然緣第一遍云依何等義既無別料只取前二文便是依何等義中攝賀云何等義含前二義意説前之二義依何道理言之故第三云唯依大事説又前第一依何等義標第二依何等義釋也且第一依何等義徵問詞依何等令他鶖子聞未聞應法依何等義明所説法意趣難知次下第二依何等義正是徵詞答謂依前所得法即是菩提涅槃答上未聞令聞下句云深法難解答上第二句及方便説言住者第四令住由前第二段説説三乘權教令二乘知權可捨令依第三依何等義一乘究竟知實而可取以第四段勸令來住一乘中十方世界中無有餘乘若二若三勸鶖子等向一乘中住也言法者第五依法不唯我獨自先權後實交衆生住在一乘之中十方三世佛皆如此也經云舍利弗一切十方諸佛此上指十方也三世者過去諸佛亦以無量無數方便種種因緣譬喻言詞而為衆生演説諸法是法皆為一佛乘故未來現在亦爾言遮者第六段遮十方世界有二乘三乘可言退入二乘中去十世界中上無第二聲聞乘豈更有第三緣覺乘言遮者論文言遮破二執等者二乘人執生真理智為極此二乘人皆有能執之心破彼能執之心名破二言遣二真者無二乘真四十年前三乘教則有三二乘教下本來無極理只是借他大乘教下理向二乘教下安著也不是二乘教下總設理言無理者無極理也如人家家門前皆有水渠子總取用若喚作蓬萊池裏水事須是天子家有也若喚以大真事須唯大乘教下有二乘下無故名遣二真也執約心真約境也上來六段第二約説智門深餘四段智慧深也釣鎖相言歎希者佛告舍利弗如是妙法諸佛如來時乃説之又云億億萬劫至不可議諸佛世尊時説是經言無智不欣者受法有限故言梵云者晉云靈瑞華稍同亦有翻為空起華也言大海減者相傳云人壽八萬歲時大海水漸減減時至四天王膝有金輪顯現可高三十尺廣一百五十尺言此法華者潞云旋達四洲路傍兩邊有優曇華兩邊相對而生以為莊嚴應輪王出世其華乃生名瑞應華靈瑞華者為輪王之瑞相法華為成佛之先徵若輪王出其華乃現諸佛出世法華方開靈瑞華現令未見者令見法華開故未聞者令聞故疏云此法華等意言佛出世衆生歸依斷除煩惱捨凡成聖故言生死海漸減也問聖教中説衆生界無減何故此間説減答化度云此約真如無減若就相而説減亦不妨也言一乘道顯者大乘根熟故名一乘道顯法輪王出生死漸減一乘道顯方演説之此有三種表一者海水漸減喻佛降生生死海減二金輪路現表所化生一乘道顯佛方為説三優曇華現方登王位表所化生覺華開榮佛方出世今詳曇華既喻所化何者以喻此經又言一乘道顯何是一乘道也今解路顯即喻根熟曇華即喻此經經言時乃説之如優曇鉢華時一現耳意海減所化分段生死無路顯大乘根性熟曇華即所説妙法曇華若現表輪王出之不虗妙法若宣表聞者定當成佛輪王者表後成佛即以所當化成喻輪王也非喻能化抄不分別問何故劫增海水減劫減海水增答一切七寶多在海中劫增時衆生福勝故水減少七寶出現令衆生皆得受用劫減時衆生福劣海水增廣七寶皆沉傍生又多在海中安置如經中説輪王出海水減縮面各減三千由旬其路即現七寶所成若輪王出時主藏臣以手置海中海中珍寶悉隨手出言鶖子往者從十六王子二萬佛時雖已聞今悉廢忘故言未聞也此一唱正是解未聞令聞也言智解局者未能證達即是二乘之人所見不廣也故勸令大乘深生信心也經所以者何徵詞也有何故以如來説法意趣難解也經云言我以無數方便種種因緣譬喻言詞演説諸法釋前標中隨宜説一句將能詮教以無數方便説教下所詮理是非思益分別之所能解法也唯有諸佛乃能知之言彼三乘等者意言二乘教下只有擇滅之理又是他大乘家理二乘教下無故名以彼實義不可説故一者二乘教下理所無名不可説二者只大乘教下所有真如法性離言名不可説離言絶相名言説之不及名不可説此三乘法唯有名字章句無別三體者三乘教同詮一乘二乘教下無極理故言無別三體釋標中意趣難解即是品初慧門也問品初先明智慧後明智慧門此間何故説教門後説智慧耶答前約先智慧後説三乘顯於一乘內説有三乘此間先説教後説理則三顯會乘教同歸一乘理也所望別故此間第二説中意只是四十年前説三乘教門也所説理即是第三依何等義中收也經云所以者何等一段經文者言因前文起等者顯即是徵也即是徵前第一段未聞令聞第二段説者有何所以隨宜所説意趣難解有何所以是法非思量分別之所能此解唯佛能知耶答依一大事因緣因果道理説依開示悟入説故此答經家所以者何也次答論家依何等義者疏言依何等義作如是説法意趣難解依何等義説法是非思量分別唯佛能知答依何事義中一大事因緣説如來若為小乘事説二乘易解依一大事因緣依此義説所以難解也論家依何等義問詞經家一大事因緣答詞也言事物體事等者大事者不越性相也大事若是相則是事物大事若是性即是體事大事若是境則是義大事若對能詮教則是道理也事物有為也體事無為也事義無為也道理有為也若準四義總具足方名大事作三義解正一大事者事物物謂菩提涅槃也真實法名物事者總義二云大事者體事菩提涅槃有體法名體事三大事者事義菩提涅槃對此緣智名境義只此境義便名大事道理兩字經上之三義或是事物之道理二或是體事道理三或是事義之道理第二或道理兩字解經中因緣本法之道理疏主意不必具取四義名一大事也或是事物道理智或是體事道理智或是事義道理智隨應得經云出現於世者疏言為此大因緣所以出現世間也言自稱德號者即是解經中世尊兩字問世尊自説經何得自言世尊恰似自誇相似答自標德號者只為一大因緣出現於世廣利群生也所以自標德號更不緣餘事也言不爾便者若不為大事因緣出世者即同二乘入滅唯求自利不化衆生亦不要自德號也只為一切衆生成佛名大事所以自標也經云言開佛知見等者問言開者為佛自開為開衆生若自開者佛開已久云何經言佛之知見已謂不爾經文明言言開佛知見使得清淨明知但是開鶖子身中知見若衆生身中知見不得名佛見者理行二性在有情中應不名二種佛性彼既極成此何不許但是知見性相在衆生中無始已來二障所覆如來開演曉説彼身中有二無上令知欣趣也鶖子既知有此二法未審何詮次説能證勸其修之如是此三皆居果位入佛知見是得之因故次為説入佛知見已上初周等賜牛車者無漏因行本後二智若唯識五地菩薩真俗兩智行相互違合令相應極難勝故冥真俗二境合本後二智準此牛車便成一體令諸子等十地菩薩日夜劫數二僧祇劫若得教車亦通初劫已上即是第三周滅去化城引至寶所第三周是以得名開佛知見也言此釋大事者體即知見知見兩字被經家安四個名因解喚作開示悟入解知見向上義也論家有四義解之開者無上義示者同義悟者不知義入者令證不退轉義故以四義解知見知見體即是大事故言論言至如來能證等者攝云如來舉能證人也如實智者出能證智也知彼義者出所證法即是法身也牟云如來能證如實者標能證智所證理也言知彼義故即是釋也即是真如名義理境界也一知之言通能知所知也問何名能證如實答疏云知彼義故義者若對能證智名境境故名義若對能詮教名所詮義義理故名義也又解如來能證假者身也如實知彼義故只是根本智證真如理也如實兩字真如也知彼義三字亦是真如理言法性真如等者一法性二字解上論文實字與萬法為實本性也二真如兩字解上論文中如字三云下二句疏名為如實法實性故此二句別結上論中如實二字也言即是所證至為義者解者解上論文知彼義故義字通兩説也真如理是一若對能詮教即是所詮名義若對能證智所知境界名義也言正智之體本者此唯取本智名知見却結向上論文能證二字言能知義理等者結上論中義字言即能證正等者都結歸經義能證所證也言菩提斷者斷障所顯得故亦名菩提言智處者是所緣處智所依處故亦名智也言或知為正體者此意性用勝根本智名知後得智名見此二合名知見用真如理為知見性性之與用得性就用知則親唯自知不通他知如夢中事相似真如理根本智證後智設緣變影疏遠故唯自知也根本智照真境後得照俗境故將性就相合名知見問若知親見疏者五眼之中既名慧眼何不名見答彼境約緣本後皆名眼此約有親疏故不同於彼言此二是用等者此二自是知體家用若智之實性方是真如如刀以割物為用四塵為體若約所依性方是虗空為體言將性就相者問既以知見配本後二智何得以真如合名知見答將性等言欲令二等者問諸經論但只合攝末歸本攝相就性何故此間將性就相答欲令等順彼宗以種智為一乘所以先説也言勝鬘等者問此經宗明一乘一乘是種智何故引勝鬘經三個名皆是真如證此經耶答疏云勝鬘等疏主言只緣此經宗明取種智恐疑將謂唯取種智為一乘體不唯空取種智為體兼取真如為一乘體言攝大乘等者意言攝大乘通理及智為一乘也不同勝鬘唯取真理此攝大乘兼取行為一乘萬行寬廣名大只此大體向上有運載用名乘亦乘亦大名為大將體就用大亦乘將用就體乘亦大或乘大乘故名為大乘大是真如向上安大字著乘是有為名乘乘大性故名為大乘也此中意言勝鬘一乘是真如攝大乘是萬行既説一乘即大乘明知攝性以就相也問疏主何故作性用理智解耶答論云一切智三個字唯通性相也言知一乘至宗義者即三周説一乘初周理智雙説第二説智不説理第三周説理不説智也故知三周説一乘通理及智也言火宅牛車者古師將真為車體此間兼破古師云疏主火宅等即是有為也言險途寶所等者即是無為故不言作問寶所是無為故不言其作化城亦無為何故言其作答寶所本來無為無為不言作化城是假施設所以言其作問化城言作是無為牛車言作亦合是無為答牛車言作名體俱作是有為故化城言作作名不作體故是無為問寶所是無為向上安即所字亦合是作名耶答化城言作有二義一云世尊經中自言我所化作二者作名不作體寶所不爾故不言作實有法體但言寶所也問牛車是有為名體但作故羊鹿二車一種問是造作何故二車不見登答二乘得無漏後得智不知是有為故世尊隨伊不知處隱却道無不妨實有也言開者無上者作有菩提涅槃兩法更無餘事若更有兩法一處爭得名無上問涅槃是無為可得稱無上菩提是有為何得稱無上答有為無為相對辨有為不得稱無上且約有為自類論有為之中稱無上聖有此菩提涅槃二法故名開者無上義言除一切智智者向上智是佛智也佛五薀假者名一切智人一切智人身中有此智名一切智智下智字通根本後得智也向上智字是五薀假者身也不取假身上智字但是相從引來也今取向下智字根本後得并真如三法總名知見此中解義不論多少解智處事須帶真如也上人法解了言又一切智等至妙理者問何故舉智攝理答智證理時宜照一相如珠與光不相離也故舉智有時便理隨故名開佛知見本後解言無上者即是歎勝也此雙開菩提涅槃有抄説便是開鶖子菩提涅槃者非此也此菩提體者二各法喻理智二種各有法有喻楞伽中取不空如來藏為知見勝鬘中取空如來藏為知見也言本有種子者問涅槃本有體是無為種子有為何名本有答但説涅槃無為本有非言一切本皆是無為言多聞熏習者簡要云從初發心親近善友初依菩薩供五恆佛聞正法教資加位中修習萬行經一大劫資熏本識無漏種子初地門中妙平二智方生現行得入見道修道地前唯有漏初地已去七地已前有漏無漏修八地已去純無漏修無有功用無相修習若成佛時無間道捨劣無漏解脫道中四智菩提圓生起是多聞熏習因修生長體即四智四智之因名不空如來藏問如何有漏能資無漏答無妨地前一劫有漏資助於無漏登地已去即無漏資有漏能招彼十王果也言因生長者此中泛論難陀唯生月藏唯長護法本有長新熏生若準疏文且談本有種子地前長入地生問鏡作二智為舊為新答唯本有言藏識有漏者雖非或俱漏種生故漏識熏故名有漏也言能含一切無漏者敘破烈有漏義如離亂時凡人收得王子王子起現行為王已入宮門杖一百見殿角絞等言如來藏者四智之種當來報身如來也言由近善友者初依菩薩供五河等言多聞等即損力益能轉言藏是含藏因等者藏是含藏此解第八識名空如來藏因性義也解種子名藏若以智種名因性第八能含識賴耶即空藏因性之藏藏即因性若智種有能生之用即名含藏與現為因絶因名性即不空也若爾含藏即性何須別配相國獨配不空以此唯取不空藏故取第二解言猶如種樹者如尼拘律陀樹子如芥子四因風日天雨等緣生茆等被蔓縈纏既多年已枝幹漸盛快疏圓滿其蔭遍布五百量車用蔭獨不盡法爾種子猶如律陀子寄在第八識中如藏石間煩惱塵坌猶如飄塵地前聞熏有同杲日雨滋初地起現行如生茆等修惑為障義同學縓道數數修如枝幹漸盛果位無學如快疏圓滿自受用身佛種從緣起成道已後體高三界因廣十方便便不熏種言逢緣證別者若逢初果見道分分別煩惱盡處緣得一分自性清淨涅槃若逢三界俱生煩惱盡處緣顯得所得涅槃名有餘依涅槃若逢苦依身盡處緣證得涅槃名無餘依涅槃若逢悲增智增二法資助緣所得涅槃名無住涅槃若逢三事具足緣所證名大般涅槃故名逢等言二種如來藏者即智為能緣二種空如來為所緣智緣二種為境故名二種空智即是煩惱名空如來藏在煩惱中真如亦名空如來藏問真如何得名空答斷却虗妄煩惱因空所顯故名空二者空之性故亦名為空智緣此二名二種空智也言若離者若離妄法別起名若離聖道所易脫故名若脫是所斷故名若斷可改轉故名異一切煩惱藏覆真如名一切煩惱藏也真如名藏者疏言不惱者非妄法故名不離不可易脫故名不脫不是所斷故名不斷變易故名不異妙出情境故名不思議言煩惱有漏至名空如來藏者標空藏也言涅槃無漏至非虗妄法者標不空藏言由近善緣至名為涅槃者解空如來藏也意言能詮智對所證理名方便也方便顯證名為涅槃體性非空因空所顯空之性故一者煩惱性虗妄不實名空斷却煩惱名空因空處顯得真如真如亦名空如來藏二者又與二無我理為空之性我法本無真如為性空之性故亦名空如來藏言體非空者問有為無為名之為有真之體何以名空答疏名言體等言煩惱覆位至因性義者解不空如來藏意言真如之體非虗妄故名為不空隱在煩惱之中當體名藏即取所藏真如名藏也問真如何名藏答煩惱為能藏真如理即是所藏藏是如來藏也二者因性義名藏無漏種子并在纏真如名因性藏也即此在纏真如與出纏真如無別出纏真如即此在纏真如能顯果中萬性法身法身為所顯一則是所藏故名藏二則能顯故名藏問涅槃之體何名因性答因中之性名為因性并此涅槃無因果而是因果能作因故離繫果故因位之性依士釋也二了因性故名因性無漏種子與自受用身為因亦名因性藏也言即此法身等者意言即此法身非空非有依此二義故説為空與前煩惱名空別由觀行者觀彼人法二遍計空理因此顯故説為體空非空也梵云瞬若多如是空性二空之性依士也言刀提耶者切都寥反舉喻也昔有長者名刀提耶至家臣富情多鄙吝在生之日藏金於儔砧之下死已為狗還生其家慳心宿因當臥砧側家人大小不敢輒近佛知長者根熟至門呼之刀根耶刀提耶犬聞喜躍走至佛前如來慰喻家人驚異佛為説所因於檮砧下掘得金藏方知家犬乃是尊君此有二意一因地下得金顯刀提耶是前人之父因斷煩惱顯得身中有如來藏性金況煩惱狗喻佛性掘寶況斷煩惱二云狗況煩惱金喻佛性因彼狗方知地下有因斷煩惱顯得身中有如來藏性牟云若順疏文似金喻煩惱刀提耶況佛性因掘得寶方知狗是前世之父因斷煩惱方顯身中有佛性也如非惡不能顯其善後解善順因犬知金因煩惱以顯佛性故説為空藏重料簡阿賴耶識及煩惱名藏以彼四智種子及真如名藏金義極成更不證也下明教修因德門緣阿賴耶識及煩惱名為藏行相教德所以重明言阿賴耶等者此二本聖教皆有教有理問真如與無漏種子何名為藏如何不善法名藏耶答即涅槃云未得至名佛性攝云善法有三一有漏二無漏無漏之中一者有為二者無為有為即是楞伽經中不空如來藏四智菩提也無為即勝鬘經中不空如來藏也上無漏法也問無漏善法可然有漏善法如何言佛性答攝云加行位中有漏善法順生見道真理名佛性因彼加行位中有漏修習成就得無漏聖智故有漏善法得名佛性問有漏善法既爾何以有漏不善法亦名佛性耶答云疏無垢稱云等言偽身等者簡要云薩迦耶見此翻云偽身經部云偽自種性也有部云有身若依大乘云移轉三界之身虗妄不實名之偽身即此偽身種中有如來藏性故名為佛如礦中重也言七識住者未住之欲得住住了不欲得離此是識之相三塗之中苦多樂少於識有損識住不樂凡夫外道聖人同生凡夫外生到彼第四禪中無相天一是凡外道所居二滅於心想若是聖人到第四禪生及淨居天多是定性那含棄背生死求證無餘故第四禪識不樂住一身異想異謂欲界人天歡戚有異身形分別南三洲身形不等名身異心想不同名想異六欲天身形大小不同名身異舊生天子五衰相現有重苦生新生天子有樂名想異也二身異想一謂成劫初梵王獨住後有梵輔梵子生來梵王作念我能生彼彼復作念我從彼生此想同名想一梵王身勝餘身劣名身異也三身一想異第二禪身形大小一種名身一初生天子見下火災怕怖舊生天子知不到來不怕名想異四身一想一謂第三禪身形一種名身一同一樂想一也更加空識無所有處故俱舍頌云身異及想異身異同一想翻此身想一并無色下三故識住有七餘非有損壞此識住處必有賴耶種子故貪欲嗔恚愚癡十不善業道為如來種等大莊嚴云自有兩釋一云煩惱即佛性方顯故説煩惱為如來種二者煩惱為能依佛性為所依也將能依煩惱就所依説煩惱亦名如來種也問善法不善法總名如來種未審無記法為如來種否答即阿梨耶識是無記也言即前菩提者楞伽經也報身修生修念生現行成報身也牟云大圓鏡智為自受用身平等智為他受由妙智於淨穢土中説法斷疑雨大法雨言法身修顯等者斷煩惱證得名修顯也牟云此即佛位二轉依果摩訶般若恆照法身能證是因所證是果故言證因證故無漏種子生起現行能生是因所生是果意言四智菩提種子生起自受用身現行只此現行與法身為證因證故只此自受用身種子與現行為生因生故故言生因生也言教修因得者教謂楞伽勝鬘兩種教也修者即前報身修生法身修顯名修也因者證因生因故名教修因得門也因即是得也言前藏有四者初之二藏報身因果即前楞伽經後之二藏法身因果即前勝鬘經來此二文分為四種子也言能含藏者即是結前楞伽阿賴耶識名能含藏藏猶如庫藏無漏種子依附第八如縠麥等言能生德藏者即前楞伽具足熏習等即是無漏種子名能生也功德即前所生果德四智也因中無漏種子藏隱在第八識中名藏自體復含四智菩提現行名藏是二差別也因能生彼功德之果即自受用報身也言能覆藏者此即結前勝鬘若離若脫若斷若異覆真理故名覆藏言謂煩惱等如土覆物者土為能覆重等為所覆煩惱為能覆佛性為所覆言能顯德者此結前勝鬘經不離不脫不斷不異等問斷煩惱顯法身即含是所如何名能顯得耶答一云果中出纏真如為能顯塵沙功德為所顯故喚法身作能顯二云在因中纏真如不空如來藏名能顯果中空如來藏為所顯也言如金性者如釰釧等因金方顯也萬德雖殊因法身方顯一切賢聖皆以無為法而有差別若望煩惱理實所顯今望即德故名能顯由出纏已能顯萬德如出礦金能顯器言大位而者且依論説由斷續生煩惱障故證大涅槃由斷礙解所知障故證大菩提雖斷二障以顯二果實理皆通豈彼煩惱不障菩提應知聖教依勝用説今依勝説故言大位也意言得菩提時亦須斷煩惱障得涅槃時亦須斷煩惱障也言諸佛出世欲至所得者問所知障不發業如何言發業招果耶答三解一只煩惱障所發之業即是所知二云初地菩薩有誤犯三業愚是所知障發所感變易身不得光潔自在三云只變易身故業亦名所知障發由無滿有分別業為因資故業種所知障與力能資助義邊亦名發業所得果變易身也上解便得清淨言緣此知見者疏解言開者出生等者佛未出世之時菩提不生涅槃不顯證名閇不開今佛出世欲令衆生斷煩惱障證涅槃斷所知障出生菩提名開開佛知見問開何人身中知見答但是總相都歎佛身上法身法身菩提涅槃舍利弗等正生欣趣心舍利弗若欣趣開佛見中涅槃別説佛知見若欣趣開佛知見中菩提即別説悟佛知見言除此二等者只有菩提涅槃更無餘法故名無餘勝過二法者菩提過一切有為法涅槃過一切無為法於此二法之中更無過上故名無上華嚴經二十九云為佛所念長佛善根住諸佛願行諸佛業準此是長自身中成佛善根也華嚴長佛善根長自身中善根法華經云開佛知見開自身中知見言二示者示者指示前來歎菩提涅槃舍利弗生欣慕心將謂自家身中無也佛所以指示向説云三乘乘平等同有此性故名示者同義也言譬如乳牛至無別者凡夫如未搆了乳血乳和雜聲聞人如搆了乳白色緣覺人如酪小菩薩如生蘇大菩薩如熟蘇佛如醍醐也今此疏中引但是總意意表同義更不分別諸位但取乳白色牛色各異三乘五乘衆生各各差別佛性是一也攝問開佛知見中真如與分示佛知見中真如何別答開佛知見中真如無垢此分示佛知見中真如有垢也此自是攝釋不意見開佛知見下有清淨字便言無垢餘三不言清淨便判示佛知見有垢若準疏意但是總別開佛知見雙開示者取開佛中法身理別分也故名三果入因不合更分有垢無垢言三悟者不知義問經中言悟悟者知義論家解經言悟者不知義何故不同答經言者正知義不是不知義論言不知舉示悟時法今日悟者昔日不知之事昔日不知之事今日悟故名悟悟昔不知又二乘人身中有本有無漏種子昔二乘人將謂自身永佛分故言不真實處真實處者即是悟佛知見昔日不知法今日知昔日不悟之法今日悟故故言悟者不知義言譬如有人者如有人三根聲聞自喻己身也親友者即前十六王子真善友也聞大乘即是其家無明所纏名醉臥王子此方入滅他方行化名官事當行發菩提心名無價寶珠熏得意識名繫衣裏問意識不能持種如何不失衣裏珠答衣有表裏等引經言上來三種等者即是開者歎法報二身令生欣趣因歎開佛知見中菩提涅槃既生欣趣後令悟身中有報佛智後示身中法身理既修證理成法身斷德也又成報身智德既成此二利樂有情即起化身便有恩德明果記言入者為令等者問如何先果後因是何意答修行次第先果後因説法次第先證果令欣也所以交修因取果也問知見一種只是開示語入四個字別爭知入佛知見是因義答疏主體論意論云示現與無量知業業者是因義故科入佛知見是因也問疏主爭知取他論家初地為入佛知見答論説令證不退轉地即四不退中證不退是初地所以知是初地中也入佛知見者入佛二果也入者解義如人敢入得否只是解也示現者顯示顯説之義欲令入不退地言無量業即是菩薩真智也法身報身智名無量智業業者業用即佛果之因言上三總別等者簡要云開佛知見是總示悟知是名別別者別示法身理別悟報身智也言無上同勝者無上即開佛知見開者無上義同配上示佛知見示同令證勝字配上悟佛知見然二乘者不識其因為令知故故知入為因開即為總示悟為別言今顯能證能得等者十地無漏智為能得因十地真如為能證因故名為入言依本論者明地位也不退有四一信不退在十信第六心二位不退在十住第七心三證不退在初地四行不退在八地今論意順經文取初地證不退言體用者涅槃是體菩提是用此二體用大故俱通法界故名無量智也智之業也言説此因等者佛出世意為説發地能得佛果一切智之因故名為入也言變易生者此智增悲增不爾問變易與意生身何別答地前二乘回心即受變易名變易身初地已上名意生身二變易身粗意生身細或唯識説變易身亦名意生身言觀察智性者智性即真如言入佛二果者即法身報身也即是結歸開佛知見言此四意者問佛出世有何意答疏言此四至更不為餘等言故知總説等者意言空取教理為蓮華亦不是也言取行果為蓮華亦非故知等言或不退者下一兩節疏文是重引前入佛知見中文來成據實此文即合向前來論説令證不退轉地示現與無量智業一處解脫隔却六七行疏然後引有孤起此是疏主筆悟也言或不退等者問此何故忽解於不退地耶答上文云令説行果故不退地即是行果也未知不退是何地中故云或八地若爾何置或言又解前説不退義未盡今更解之故言或也今詳義未盡何不一處解之答疏此合前解脫之意言分此説為列行果也言諸論者問何故事須取八地已上行不退作入佛知見耶答疏云諸論等以二乘人同到八地已上決定總受變易生經論皆云聲聞緣覺及大力菩薩三種意生身不簡頓悟漸悟悲增智增入八地決定受變易故亦取為入佛見言雖二乘等者問若取受變易者為為入佛知見者二乘之人回心亦受變易何故不取答疏言雖二乘等二乘人亦回心受變易未即至彼初地或八地登車出宅也三乘俱同後決定得一決定受變易二決定出分段死七地已前菩薩及二乘回心之者皆不決定二乘二回心已去地前一大劫猶未登車初地已前悲增菩薩宅內上車居分段也彼約隨願宅不是此間義此約業報宅又受變易不決定故不取也問七地已前智增菩薩受變易決定何故不取答智增菩薩入觀時是無漏是登車若出觀時是有漏應可却下車故登車無漏不相續故不取之所以唯取八地上作入佛智見也言又二乘等者重取二乘回心已去煩惱不退名不退地潞云從聲聞四果四果聖人或緣覺此之五人有學自乘之中煩惱或斷伏未回心時不妨有退轉回心已後若斷若伏八六萬十千劫至十信位乃至金剛無間道直至成道已來不更不樂生此三大劫總名煩惱不退也言又一乘者通取四不退總名不退也若信不退十信第六心若位十住第七心若證不退初地若行行不退八地言或此果因一乘者意説此即是前標中智深前唱説文即門深若爾何故非他唯取教理師答此行果雖即是理教二種若唯取教理不知是何教理今顯所詮是一乘之行果故須別説教即三乘權意令捨權取實實中有行果故是此中之意故疏云或等言上來所説者破古人將開等配四法也疏主意開是總餘三知見是別也前三是果後一是因也言準下三世者疏主破也準下三世佛法式中不説開三世之中闕其教先有教方有理行果也凡欲法悟道事須先得教也言故知但應者破也但應如此間開示悟入道理説善也言示悟別顯者古人言將四法配開等即難乘三世之中不配教汝以四法為總別何故三世之中不説總三世文中闕於教汝將四法配總別三世文中應闕總如何示悟別顯不同標等若疏主道我觀經中第一遍四法總説第二遍依法文中唯説別攝一切法盡更不説總所以疏言示悟別顯二果已周周者周足不假標故言此方便品法等者且三周異者迷悟不同説有圓缺此品開示悟入四法總説餘二周不具足也第一周法説不為一人總為一切衆生説乃至説了舍利弗一人解將謂獨為舍利弗説第二周亦是普為一切衆生乃至説了將謂如來空為四人説下周亦爾説則普悟解不同言通辨若因者開示悟入並説由迷有前後悟有淺深迷處屬説悟處示論故於三周有説不説也第一周世尊未説時因果理智總迷世尊第一周總説鶖子總悟也言譬喻品中者初周亦説了中根四人緣聞著示佛知見無為理同三人同坐解脫床理上無差別二乘分得所以中性四人初周一聞便解也緣有為智上有差別所以中下二根迷悟佛知見有為權實智世尊所以第二周譬喻品中説牛車問既説於悟即是果乘云何迷因而説於果答以牛車通因果二若但説入恐人不解牛車通因為説因車取果車故入佛知見道理智言入有濫既迷因智言悟無濫也既悟報身令其修習三乘乘此寶乘道場豈非説悟意在於此言唯迷因者不迷因理果理果智迷其羊鹿二車將謂得至佛果道場不知到道場者唯是牛車經云乘此寶乘直至道場故説譬喻品也言化城喻為下根者下根之人緣有為智上第一周第二周兩遍聞所以有為智上不迷緣無為理只向初周聞所以於權實理上迷世尊所以第三周中説化城喻品言由迷果理者將謂有餘涅槃便是寶所將謂牛車只取中路化城不知牛車至大涅槃之寶所故説化城喻品言各隨所宜編説一乘者即是第二周迷至智別説造車悟佛知見第周迷理別説示佛知見三周破迷名為道入未識其因故説入佛知見問何以迷悟不同耶答金云初時三根果理智俱迷所以初周上根即解中根之輩知理同故一聞即解所證不迷能證之悟亦不迷也智有異故即迷而不迷果將謂羊鹿至涅槃故下根之因知樂聞故所以不迷理一聞故所以有謬果一聞者因即智如門不迷因理果智雖不樂聞果智望理亦是其因自於因智亦復不迷下根性劣不能通解故有於迷也攝云根性不同迷悟不等隨説有異若強立所以終不離難故置不論不離難者意言前云第二周理無異故即迷因智者若許智有異亦應迷果非因第三周言果智望理亦是其因故不迷智者因理望智亦是於果何故不迷於因理也以第三周唯迷果理故但以衆生迷悟萬品不同如來隨根偏説理智佛能究竟我等何知攝解為善言或為中下至説等者為中根人説悟佛見説智為下根人亦説理智影為下取為中根人亦説理又為中根人説智影取兼説理為下根人説理影取兼説智也言然勘下文等者指譬喻品中長行歎果車名下文言下文但明等者即指偈中因乘文也經云乘此寶乘直至道場也若論前行疏云本論具解此品品即方便品餘品但總釋其大意即指餘品也即是方便品為總標下二周釋也第二牛車釋悟佛知見第三周寶所釋示佛知見此二是果偈中言乘此寶乘説因乘意令行牛車因取佛果牛車表牛車通因果亦不相違會知了言又理雖等者即是勝鬘經等多説真理性智慧以為一乘者初一乘根本故即指無量義經中第十四名一乘唯真如故或準指無量義以彼無量義經喚真如作無量義以真如是無量義之本也何妨此取真如為一乘也依理本後解了言今此四義等者於此真理一體法上義説四種知見開佛知見者開衆生身中佛性名開佛知見示佛知見者如掘出金藏普示衆生令覺知故悟佛知見者令悟有佛性入者修證之故名為入言涅槃經言大事者具以大事為一乘一乘即真如佛性也言莊嚴畢竟者涅槃經文謂修六波羅蜜所感佛身相好功德莊嚴成佛已後功德無盡常住利益故云畢竟即同此經周給一國不同餘善受報身盡非畢竟莊嚴言究竟等者謂一切衆生所得一乘一乘者即是佛性也真如之法常住不生不滅終久無盡故云究竟即同前解蓮華出水不可盡即是凝然常言説説諸至開者聞者説也言由宣等至示者有八四對一法佛報佛對二親因疏緣對因性則親緣性則疏三理事對理性事則行性四善不善對善根人不善根言此是法等者即法身佛當體名法佛性報佛即是同前楞伽具足熏習即是本有無漏種子至金剛解脫道而成四智名報佛此真如理與彼報佛為理性報佛身中有此性名報佛性因性者與識中本有種子為性名因緣性者真如理與解脫分善有漏善為性名緣性理性者即是在纏真如名理性行性者與十地無漏行為性名行性善根人性者五薀假者説善根人即善五薀有道心者不善根人即不善五薀闡提等是也名目雖多皆以真如為體此等名示佛知見也言譬如貧女等者問何故經中多説女人耶答女人多慈故況菩薩也又女能含孕故況衆生懷佛性似女人也又女人有生養義況修行人生長七聖財也貧女況衆生舍況五薀真金況佛性家人者賊人也有漏對他無漏名賤人家人大小者大況心王小者況心所也言時有異人者佛菩薩善知方便有方便也二乘等與説四諦緣生言即於其家堀出者即是指示身中佛性也上敘下破言若依此解等者疏主解經方便品中標悟佛知見譬喻品下釋悟佛知見方便品標示佛知見第三周釋示佛知見若依真如解開示悟入雖方便品中見解了譬喻品牛車便不是解方便品悟佛知見問何以知答彼言牛車與一故便是別義非此中義也言一切衆生等者一切衆生謂凡夫也及以我子菩薩也四部之衆聲聞也譯明解延云一切衆生大乘外凡及我子大乘內凡四部者二乘四衆也寶云云一切衆生謂未有種性者及以我子有三乘種性者四部之衆通此二類章敬云初二可通後解違疏非先無種性後可有故問一切衆生早是如來子何得更言以我子答雖一切衆生無有不是如來子緣一切衆生是乞養子父母別故無明為父貪愛為母生得此身與佛無交涉只緣歸依於佛法僧所以但與如來為乞養子也我子者諸大菩薩親生卵即是無漏聖慧二空之智於法界腹之所引生四部之衆二乘人偏生子雖是佛體弼不是正夫人生也生空之智依生空理而得引生名偏生也言何等為祕者後起前文答兩喻雙陳祕藏者即是三事涅槃猶如伊字三點若並不成伊縱亦不成伊如摩醯首羅面上三目乃得成伊三點若別亦不伊依涅槃第云要三事具足名大般涅槃摩訶般若二空智所證真如理由智證理斷二障盡處法身理上假立解脫哲云引喻摩訶般若智猶如日光法身如虗空中間暗猶如二障日光未出時中間暗與虗空合不即不離被日光出來與虗空合暗相隨滅問暗相何因得盡答猶日光起來暗相妨盡正是日光與虗空合時即是暗相盡時不前不後正是摩訶般若智起時便是證法身理時正是智證理時便是障盡解脫要三事具足方成涅槃如世伊字三點一不從橫言三點若並等者若並如世一字形假名並即不成伊字也縱不成者如瀝水相似重纍名縱亦不成伊言摩醘首羅面上三目者梵云摩醘首羅此云大自在天一摩醘濕代羅即是大自在天二莫醘濕伐即是事大自在天計自在天有三種身一者法身遍一切處量同虗空二者報身居禪四禪身長萬萬六千由旬面有三目者化身或在雪山或南海住末賴耶山人間化導也此第四禪中大自在天天主面上有三目非是彼天一切天人皆有三目若十地菩薩生彼居色究竟天若凡夫業報淨者居廣果天問伊字兩點在上一點居下首羅三目一目居上兩目在下喻既不同如何會釋答緇洲云若依能證解般若在上喻能證智也解脫法身在下喻所證理如面三目一上二下也若取能依所依次第説法身在下般若解脫在上二上一下如世伊字似例書品字平遙云但取不縱不橫之義以況三事涅槃更無別諸有智者不應難喻言三點若別者三點若別相去三寸五寸地亦不得成伊也法合經云我亦如是解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃三法各異亦非涅槃也空得法身亦別空得解脫名別空得般若各別皆非涅槃故云三點若別等言解脫之等者此據各別言非若離三體亦無涅槃言我今安住至並者橫也者三點若橫如世一字相似法中論況後得如二乘人先得生空智相似似先得摩訶般若智次證生空理似得法身相似後得無餘如苦依身盡然後得解脫其實得則一時得也若計前後得亦非涅槃也言縱者竪也者解縱字如瀝水相似亦不成伊字也竪上下分三品若無間道斷解脫道證理先得般若在上次得解脫居中後得法身最下或勝劣分三品般若最上解脫次中法身最下三品而得下成真正得之時都無勝劣疏云即此竪並皆非伊字也言三點別安者若將三點零落別著得成伊字否答不成要三點一處一方成伊字也言要三和合者立理也般若體別解脫體別法身體別此亦不成故云要三等也其不縱者即是不上下三品得也其不橫者不落後得不離別者謂不離散不別有體名不離別得也疏云和合之點方成伊字三法和合方成涅槃也言不一不異者且不一者能證般若智是有為所證理是無為般若法身是實解脫是假有為無為別故假實別故三法各別故不一不異者攝假從實攝相歸性正證之時冥然二體故各不異即三法同時也若依性宗一真如體上建立三德是不一離一無三是不異也言假名擇滅者問何名擇滅答擇滅即無漏聖智正是擇體即擇法覺支問何名滅答斷二障滅二死名滅如日照空中間暗無日喻般若空即法身中間暗無便同解脫言故集論者彼論云滅諦有三謂真如聖道煩惱不生攝論云若滅依若能滅若滅性海東云真如是彼滅諦所依名滅無漏聖道體是有為非是滅諦而能斷惑得彼滅故因立果稱亦名為滅煩惱不生擇滅無為為滅性是滅諦體也言若能滅般若智也若所滅法身若滅性解脫真如名滅依者由如虗空與色為依色若壞時虗空性在成就與依者依於空也問能滅之體尅性是何答實能滅唯妙觀察根本智若迷事即後得智若至果中四智皆名摩訶般若四瀆皆海如五眼皆佛眼也言佛安住祕者即三事大涅槃也言不同二乘智了者唯了生空理不了法空理所以能證智不名大慧智既不名大慧所證理亦不名法身也言不得習氣者獨覺臨粧聲聞起儛昔有辟支佛五百生中作淫女後得無學粧具常隨金色迦葉常作妓樂後見北洲如意山中堅那羅王鼓琉璃琴是時迦葉於衆中起儛言古人有解等者紀國也真如上無癡故名摩訶般若真如本來不與煩惱相應名解脫體性凝然名法身此三事雖成疏主破便無入義也若以唯取真如為三事者便無能證所證如何名入耶言常住不壞至何意故者成立正義亦是違結向前三事涅槃并近簡二乘無餘涅槃也二乘之人入涅槃無身智不名常住不壞又二乘入涅槃自利不利有情也言以智證真者正解入義也言二乘無有身智者入義不成又非佛意也問世尊示現順二乘入涅槃何故今言不入答言順同者即娑羅雙樹間順同二乘人入無餘涅槃荼毗如來身智不滅所言不入涅槃者不入二乘中無身智涅槃也言烏角鵄者同共一樹栖猶如親兄弟爾乃入涅槃假使蛇鼠狼同處一穴猶遊相看如兄弟爾乃入涅槃烏與角鵄相憎烏白日即喫角鵄角鵄夜中即食烏兒猶此兩鳥常作怨家意者不同二乘一滅永滅為利有情名為人故若同二乘無利而入滅即假使角等言令作此者疏主言我作此三事涅槃解善順涅槃經等言當知摩訶等者別配四法將涅槃經三事涅槃配此經開示悟入正是結歸經宗此是疏主千門萬戶解義不同彼經摩訶般若即此開佛知見彼經摩訶般若與此經寬狹不同此經開佛知見雙菩提涅槃也若取彼經摩訶般若智名開佛知見唯取智於中無法身理又法華論將一切智智解此經開佛知見人法解理智本後解性用解三解之中事須理智雙取今將三事中摩訶般若同此間開佛知見中一切智智唯取智不取理也一切智者根本智重言智者後得智唯本後二智更無理也解開了言解脫即悟者彼三事中有解脫即是此間悟佛知見前來約悟身中有種子名悟今此不爾約以説令教斷所知障出變易生死入大涅槃悟解名悟意由智斷惑後苦不生名為解推功歸本即悟佛知見即智也言二障俱亡至真解脫者問前來處處説解脫是假何故此間言真答對三乘説名真前來言假對自乘中理智説解脫是假也二乘昔日唯斷一障一死不知於此不知者不知有所知障二死也今説合知故名為悟即是三事中解脫也言真實處者二障二死俱無名真實處賀問若以三事俱名涅槃者一是生因二是了因何以俱名涅槃量云大般涅槃中法身解脫是有法應是有為故宗因云三事中隨一攝故如般若二云般若是有法應是無為故宗因云三事中隨一攝故如法身既爾名體有殊何故皆名圓寂答此與比量相違量云摩訶般若是有法定是有為故宗因云是能證故如二乘智法身是有法是所證故宗因云智親冥故同喻如二乘理此上隨他互成理智本意難生了二殊名涅槃今應通水火性各別二種皆名色何妨理智殊皆是涅槃攝問水火俱變礙二種皆名色有為有生滅無為生滅無如何例水火答能滅所滅殊不妨俱滅諦有為無為何妨俱圓寂言此必有因至智業者解入佛知見彼經三事涅槃即是所得之果此法華經入佛知見即是因也言祕密者即三事涅槃也言不為餘者不為二乘等事出現世間也言作此解者契會滅化城向寶所之義意取法身名契寶所摩訶般若契火宅之牛車云彈者盡也言此三解者即是唯依真理解理智本後解三事涅槃解前解也言唯取所詮等者未將理與教對辨令此與教相對説唯取所詮智慧智慧即是方便品初標次下大事中即是釋文餘五段文是總當所詮理也言能詮教者品初教門是標言即前説者指第二段説也舍利弗諸佛隨宜所説意趣難解也言又以蓮華等者問法華論解唯説教理名蓮華不説行果今此經中何處是教理蓮華答疏云又以至秀出等即教開敷而理出水正是教理蓮華也相國科二通難問若取教理為一乘開敷出水可然大事中三義解唯説行果為一乘未審行果有教理向上開敷出水義否答果秀因敷亦無乖爽意言果秀即是果出水因敷即是行開敷乖由違也爽者失也不乖蓮華向上道理此第二意但將教理證成行果向上亦有開敷出水義也言然勝鬘等者尊餘經及下第三周寶所多説真理以為一乘多説智也不是總不説言偏説真理以為一乘乘之本故言因乘雖通等者此行妙法行妙法通漏無漏即寬入佛知見取第二劫後唯無漏狹問入佛知見疏主何不兼取地前答疏主準論意取證不退轉也不唯法華論如此言楞伽者兼楞伽經中三種意生身亦在登地已去不在地前前三乘回心已去雖受變易未名登車也所依未是二空無漏行唯在地上所以引楞伽經證法華論取證不退言地心三種至別章説者然此三身諸教不同若勝鬘但言有阿羅漢獨覺已得自在菩薩三種意生身亦不顯三意生身名也彼經云佛告大慧有三種意生身云何三種一三四五地得三摩拔提樂意生身緣修定挍勝名三昧樂意生身問何故不取初二地答其實亦攝緣非勝故所以不取也二第八地名覺法樂自性意生身問何不取六七地答非解也第三無作行意生身經不配地位疏主以義配在九十二地上來疏主引楞伽經證本論第二劫初地已去名入佛知見言又後品言者引譬喻品證入佛知見也既言直至道場牛車轅隔柱著道場門也地前疏遠不取也言勝鬘等者此同無上依經身辨名也不同前楞伽也言無明為緣者無明住地即所知障所知障雖多今取執菩提有情者故論云既未圓證無相大悲無能發起獨利悲願言無漏業因者即是道諦無漏定願等問若所知障助願受生二乘定性永不入無餘若如諸異生煩惱總故問如何道諦實能感苦答無漏定願資有漏業令所得果相續長行誰言實感問此之變易於五果中何果攝答變易生死性是有漏異熟果攝望無漏業是增上果有聖教説言無漏出三界者隨助緣説言大力菩薩者新云已得自在菩薩文異義同言三種意生身者新云意成成亦生義也隨意願成也問意生身與變易身何別答一云意生細變易粗若準唯識論此有三名一名不思議變易身由悲願力改轉身命無定齊限故名變易無漏定願正所資感妙用難測名不思議二名意成身三名變化身無漏定願轉令異本如變化故故知名異體同也所引楞伽勝鬘證法華論取初地已上名證不退言初地已前者問因乘既通三無數劫何故不取地前行也答疏言初地等答意未出火宅未與一乘之名且依一相而言實理不盡今且順論約正因説故不取地前也如五果聖人回心入變易者即名出宅豈名得一乘也若傍言之依三義解義方周足言或八地得者意言七地已前悲增菩薩不決定受變易故故取八地已上也言問二乘無學者只此無學身便是羊鹿果只此一期分段身便是出宅身問二乘之人捨分段受變易身方名出宅如何居分段身亦名出宅答只此五薀身便得三十五年住未死已來身望當來五蘊不續亦名出宅也問二乘無學羊車果位未受變易居分段中同喻云如地前頓悟小菩薩居分段應非出宅答談其分段不名出宅有二義故不同小菩薩一餘依永滅但是後有生死身無故名餘依永滅但望後有不續便名餘依永滅不必要須灰身智滅名餘依滅二已得涅槃不同地前頓悟菩薩名不出宅言問何故二乘趣於牛等者問何故二乘趣於羊鹿得滅稱出宅大子趣於牛菩薩未出宅此問中唯取二乘無學不定性者二乘無學與地前頓悟小菩薩一種趣求初地牛車何故二乘出宅菩薩不出宅答有二因一二乘惑種盡故二得有餘涅槃故得滅稱出宅也惑種之言簡有學凡夫地前頓悟菩薩言初劫惑猶行等者此中問意是一答中兩個意第一答地前菩薩了言又七地分段等者第二答七地已前妨也即是第七地末心菩薩只有此現在一生分段身望前後分段身不相續便是出宅也更不經生便入變易更不經生便入八地與二乘無學同故總名出宅也言已前即非者若是七地末心已前多生十生五生百生千生不名出宅有此間七地末心已前悲增菩薩由多生故如有學類者同前二果人有學人經生者問初地已前一大阿僧祇劫末心入初地當生之中只者今身便入見道便受變易更不經生此菩薩同七地末心菩薩及二乘無學一種是出宅否答此菩薩身是有漏煩惱未斷不同二乘無學及七地末心菩薩名出宅也問只前二果人身上當生便受變易去更不經生只此未受變易已來身喚作出宅身得否答不然乍可不出宅出火即是悲增菩薩此前三果人不妨更不經生但未出火尚被燒故故云猶多生故如有學類應句數分別一化相不出乘雖能捨此所燒之門安隱得出長者聞已驚入火宅二隨願出不出一切受變易皆名隨願出八地已前悲增皆名隨願不出三業報出不出此復有五類一依變易二定姓三有學無學未入無餘者四不定性有學未受變易者五者地前頓悟小菩薩出有三類一依變易二依分段為不定性二乘無學最後身七地滿心所依身三不定出不出謂不定有學若依今身必受變易名出同無學若望有或即不名出如七地已前故又兼悲智平等者亦不定疏言猶多生故七地又有二意一云七地滿心應名出宅定受變易故如不定性無學二云七地滿心已前菩薩應非出宅由多生故如有學類問悲增既未出宅得上車否若許得上車未見宅內而乘於車若不得上車應是不獲二空種智云何後成入地菩薩答宅有二種一報二隨願若業報分段初地即盡名為出宅不妨得車若隨願宅者七地已前猶未盡不妨不出宅而亦得上車業報宅內不許乘車故言故出宅已者簡不取名教車今取初地已去登車出宅名入佛知見此中意總亦有未出宅而上車者即隨願宅也亦有出宅不車者如二乘受變易者言然此經文等者問何故開佛知見有得清淨之言示悟入何無清淨言答疏言然此經文等説意言標顯則説則顯處不論也經佛告舍利弗等者釋意也問世尊説開示悟入是何意答經言佛告舍利弗等當將知見示悟衆生當將一大事知見教化菩薩不化餘人也論家都有三番解開示悟入論中三番一處解更不配經文疏主將論家三番別配經文別分三處第一番正解依何等義中無上同義不知義入義三卷疏末依何等義盡處唯解示悟入第三番續上來解第三疏徹座主和尚自會昌初於奉天稟學良操座主講數遍又大中咸通涉歷三朝習學茲經二十餘遍洎歸鏡水敷唱已徹一十二筵嗟乎後學機陋難曉玄徹自諸家來記
