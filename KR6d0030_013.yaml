body:
  text: 鏡水沙門栖復錄言生死是總等者謨云通能所趣故能招感是業所招感是苦其生死中有惑業苦三故言生死本通惑業言所趣是別者即六趣果以六趣中皆有生死惑業苦故生死是總所趣是別問何名惑業苦答十二有支中無明愛取名惑行支全有支一分名業餘七支全有支一分是苦言惑所趣果體者以業煩惱假者為能趣即生死是所趣也業煩惱為能趣不同前解生死便是業煩惱也言以業煩惱假者惑生死果先須有煩惱能造能發五趣業方能趣五趣生死處此業煩惱正是能趣之法其假者有情即中有身亦是能趣五趣果若無中有傳識往五趣如何有情得生彼趣故中有亦是能趣也若中有屬生支攝是死果者但是生支方便非正生支故名能趣若屬果攝中有所趣身也今約方便支能趣攝也言受報好醜等者問受報好醜是何法善惡業緣是何法答疏云受法好醜主因等謨云此言好醜即是愛非愛果不以形體姝麗為好卑陋名醜但生人天雖陋亦名好設生三塗雖姝麗亦名醜是疏意故善業感人天果名端正報惡業感三塗身爰醜報如畜生等身極醜惡就人中爰總報人身即好於中別報還有善惡端正醜惡對三塗總名好果以人天端正好報說人身頭圓像天等於中別報亦別等言由善業為異等者問善業緣感何報惡業緣感何報即與好醜如何屬對答疏云由善業為異熟因至所趣貪等為潤緣者論云九種命終心俱生愛俱故問人天可爾若生三途誰起於愛答潤生有二位一本有末心二中有沒心即於本有起愛愛於自身故或資具等若有中起愛即見己同類起樂馳趣便被拘礙故設潤生皆須有愛問此所趣愛是何界繫答准論是當生地繫故唯識論云身在上地將生下時起下潤生俱生愛故若爾身在欲界將生上時亦應起色界貪未離下染云何能起上地愛耶答得生上界必離下染故言於此悉見者見業等為能起外果資具等總為所趣等言獸歸等者此證趣之義言即數種種者謨云前論開為四所謂食聞法修行樂等然准前文既除入滅即頌樂也言冥真洞等者本智冥真後智洞俗冥字莫經反夜也本智證會理時冥然無相智理泯合如夜暗時更無所見洞字去音呼穴也今言俗後智了達種類之義無有權礙猶如於穴言眾聖之主者上解佛為有慧之主也言此初也者初三頌半閏開四辨也謨云四無礙解即是諸佛之慧令相應四法無權義邊名為四無礙解解非聲境不得聞名但是作四辨之事即是無漏清淨之聲教隨諸方言音為眾生說言教離垢染者此約諸佛本質之教佛十八界皆是無漏故名離垢染若影像教皆非離染體唯有漏名句約識通漏無漏因中五八未轉以親相分故是有漏故金云一從法界等流二者為令所化生斷煩惱故名教離垢染也言照明佛法者佛地論云我今造論為法久住及群生意言將上法喻上可以照明佛法下可以開示悟眾生嘉祥云此明佛說法之益益有二般一者上弘二者下利教能顯理如燈照明理是所詮稱為佛法一切眾生悉有佛性以無明為扇邪疑為開故不悟佛性諸佛如來去邪關開無明扇令見佛性故名為悟也經云若人遭若者三苦五八等苦有餘涅槃盡上來苦引明定性若不定性迴心受變易即有八苦也遭者逢也際者會也水會於岸也苦盡之處名苦際會無漏故背有漏苦聲聞之人猒苦佛教知苦欲得知苦先須斷集欲得證滅無過修道諦經云若人脩福者若人者修緣覺行人有福者依十善道修福分善依聞思修三慧種解脫分善依諸觀行習加行分善曾供養佛緣覺性雖出無佛世初發心時事須逢佛親近善友曾供養佛志求勝法者十二因緣對四諦名勝法為說緣覺者與說十二因緣教法無明緣行行緣識乃至老死由誰有老死因生支有等經云若有佛子等者此大乘菩薩也能紹佛位故名佛子修種種佛萬行總修求無上慧菩提涅槃為說淨道者入佛知見即無漏智名淨淨即是道持業也若淨是果道是因六度萬行是淨之道依主也又說六波羅蜜名淨道布施淨慳貪持戒淨毀禁忍辱淨嗔恚精進淨懈怠禪定淨散亂智慧淨愚癡上三業法言猒音猒於艷反食飽也飫也亦於鹽反亦是食飽義前解為正淤音衣倨反言此一頌半見四眾者經云文殊師利彌勒告也我住於此者指靈山會也見聞若斯結前所見也又云只緣所見七事中六趣眾生見佛四眾菩薩并佛入滅後起塔名見若斯聞者即聞四辨三乘法故名聞若斯彌勒語文殊菩薩言我住此靈山會見若斯聞若斯故名見聞若斯斯由此也結前所見也此後解為正也經云及千億事如是眾多者此兩句經別明見四眾如是眾多解上千億事也四眾之中有比丘比丘尼優婆塞優婆夷及有初果二果三果四果相狀萬差名如是眾多若論一一行相卒陳難盡但言千億事即是今當略說望今經本極相違既有當字則似今總未說當擬說也引是經本錯也疏中引經云我當略說若望他疏主造疏時經本云我今略說但言千億事便是略說言便明覩彼等者若准經文全無四眾疏主意以因結前見佛聞法等便明見四眾即及千億事一句前長行云因目見佛耳便聞法便見四眾隨佛修行義略明彼言今此經中宗等者問如何偈中一偈半明見四眾三十一偈明菩薩道何不廣明四眾答此經宗明一乘破二會二恐違經宗所所以不敢廣明聲聞之行礙交他向下捨權取實恐增其病故不廣說也所以前三句因使結前所見四眾所以一行二云不唯空見四眾此從及千億事已下三句經文亦是下三十一偈菩薩行經文菩薩修行地前地上亦云如是眾多彌勒菩薩道我今亦不廣說今當略說向下品說三十一行便是略說也言上明聲聞等者問爭知此文兼是生下經經文答疏云上明聲聞等言前長行中等者正出所由也問前長行中先明信解後明相貌如何偈中先明相貌後明信解答疏云前長行中等長行先說種種因緣外良緣也後明內行內行之中先說凡後說聖先說信解地前位後說相貌十地聖位從凡至聖階降前後也言今偈等者先說種種因緣次說內行內行之中先說相貌後說信解勝劣為次第也言相貌等者初道漏無漏及次習也問如何十地菩薩修行勝先明相貌答十地之中七地已前有漏無漏雜修八地已去純無漏修故有漏無漏間雜是一又六度次第修是二勝也次第修則難亂修則易如童子念經次第不錯則難亂念即易也論云謂由前前引發後後說由後後持淨前前又前前後後細故易難修習次第如是也言信解等者地前唯有漏修是一劣又地前亂修非次第是二劣唯有漏對地上通無漏是劣又唯亂修對他地上次第修是劣言勝劣既殊等者第二約時修行多者為勝少者為劣也長行凡聖次第先說信解後說相貌也今偈中依勝劣次第先說相貌後說信解次下約修行多者為勝少者為劣意言勝者是相貌前明劣者是信解後明也若是頓悟種現皆有漏若是漸悟在法空觀中種現唯有漏若是生空門中種現通無漏也言然修六度略有等者今云若依十地經有四位也地前為一位於一身中唯修一行一行之中但修一行初地至六地滿為一位一身中修一行一行之中修一切行第七地為一位於一身中修一切行一切行中行一切行第八地已去為一位一切身中修一切行一切行中復修一切行今此疏中依三劫配有三位一見道已前初劫之中於一身中唯行一切行一切行中但修一行亂修六度故即信解位也初地至七地滿第二劫中於一身中行一行一行中行一切行八地至十地滿第三劫中於一身中行一切一切中復行一切純無漏修故言十地經言初地等者問若一行中修一切行如何十地言初地行檀二地持戒乃至第十地不說修餘行也答彼十地經且據地地之中一行偏勝說非不修餘行也十地經說一一地中皆具三品且初極喜地布施有三品財施法施無施二離垢地持戒有三攝善法戒攝律儀戒饒益有情戒三發光地能修三忍耐怨害忍安受苦忍諦察法忍四焰慧地修三精進一被甲精進二攝善精進三利樂有情精進五極難勝地修三靜慮謂引發安住辦事六現前地修三般若一生空無分別慧二法空無分別慧三俱空無分別慧七遠行地修方便波羅蜜有二一謂迴向二拔濟八不動地修願波羅蜜有二一求菩提願二利樂他願九善慧地修力波羅蜜有二一思擇力二修習力十法雲地修智波羅蜜有二一受用法樂智二成就有情智問十地總名相貌相貌通十波羅蜜行何故經中只言六度答據實光中十波羅蜜總修且約法處近人易見知處說問如何六度次習之中先布施後持戒如是次第不同答論中據四義明次第者一引發勝布施引發持戒持戒引發忍忍引發禪定禪定引發智慧二云淨治勝故次第不同者後必帶前且由持戒故能淨布施由忍辱故能淨持戒由禪定故能淨忍辱由智慧故能淨禪定三云麤細異故布施麤持戒細忍辱麤精進細禪定麤智慧細四云難易次第者布施易故居先持戒難故在後忍辱易故居先精進難故在後禪定易故居先智慧難故在後准瑜伽論說六度唯識論說十波羅蜜也六對治六弊勝故偏說十波羅蜜勝劣合說又六度通三乘十波羅蜜唯大乘也言此頌因緣者是前長行種種因緣也涅槃經云一親近善友二聽聞正法是因緣三如理思惟是信解四如說修行是相貌言殑音者殑字其矜反亦去音呼言無熱惱等者摩竭陀國西北有九重黑山九重黑山三大六小二小狹一山九黑山北次有雪山雪山北有香醉山氣芬馥人聞皆醉春夏秋時人不得過冬月方行香氣歇故雪山北香醉山南有無熱惱池其池縱廣五十瑜繕那唯得通者而能到彼其池唯在閻浮中落其西北俱齊四方漸下其池四岸四寶所成金砂布底水香美具八功德瑜伽云一甘二冷三耎四輕五清六不𭊴七飲不損喉八飲已不傷腹其池四面各出一河東名殑伽河從象口中流出車渠寶以為象身南信渡河從師子口流出金剛寶為師子身西徙多河從牛口流出馬惱為牛身北名縛蒭河從馬口流出琉璃為馬身如是四河各繞池一匝流便流入海此四大河當出處各廣一由旬以為喻然佛說法多取兢伽河為喻也涅槃經云八河即一河各分二道也言由沙多等者問佛說法何故恒河為喻答疏言一由沙多言二由世人等者西方外道所計此水為福水昔有女人於河浴子失手隨落母愍其子入水救子一時溺死由慈心故死得生天外道得定觀知此女人生天上遂計引水投死生天入洗罪滅有多外道每來擊兢伽河水以濟幽魂時有執師子國提婆清辨二論師為破此外道妄計亦擊水詳波稍異於眾何名異以面伏地以手把水向外變覆而擊意從外道問果然遂問便問菩薩曰仁者擊此福水一何異乎為何事耶而擊此水菩薩答曰我之父母眷屬在執師子國恐彼飢渴苦我擊此水濟彼令得安樂外道曰師子國去此甚遠山川阻隔何此擊水而能濟彼菩薩曰山川阻隔尚不能濟幽魂阻隔能濟耶外道負屈而退便請為菩薩弟子言三雖經劫等者問劫壞以人盡誰以立名答火灾壞了劫成色界天人下界者來則見已天人俱與立名言五眾人共委等者西國大家知有此河如此方黃河故言共委言六度次習等者地持論說度有三種一時度謂從種姓度三僧祗方得圓滿故優婆塞經云前二僧祇所行檀非波羅蜜二果度此六能得大菩薩果三者自性清淨度修此六種捨有為到法實性具斯三義故名為度次習者唯識九云謂由前前引發後後復由後後持淨前前問六度與十度何別答六度通三乘十度唯大乘有故別也二益者即自利利他名二益也言次一內外者總論內外而有四類一非情名外有情名內二有情中自身名內他身名外三自身中非色名內色法名外四心心所中見分名外後二分名內今說初二也言金有五色者說文云金是總名有五色是別名謂青黃赤白黑喚作金黃為其為長陟兩變聲呼即世間黃金最勝正得能生土云色問金因何生答土能生問土既生金緣何五色別答正土生者是黃金不正方生者餘色是一青金東方甲乙木青色所生金亦青色則鉛錫也二赤金南方丙丁火所生金赤即鑰石之類也三白金西方庚辛金所生即銀也四黑金即北方壬癸水所生即䥫也五金黃即中方土正土所生即黃金也問何故黃金最貴一種土所生答黃金緣是中方正位土所生故中方黃帝之位所生得金最貴也餘四不是正位土所生所以賤也言久埋不生者金在土久亦不生亦不滅喻真如理久處生死中生死不能增染真理也言百鍊一雨而無有滅喻真如在四生九類地獄等中真理而無滅也言從革等者革由改也鑄寫自在不守一形打作𨥁璫環釧不違改練人心況佛性在凡夫六道生死其性不違也言西方之行者金木水火土是五方之行金之位在西方故土也意取五方之行金屬西方也言出土左右者此是像形字謂能生金此是小今字左右著兩土是像形也即土王四季東西南北俱有土故名出土左右問既王四季何方不是土左右而獨言金答理實皆然然五行中土能生金子似於母故獨言金言形今亦聲也者形聲字也既有亦字亦字亦通形聲今是聲土是形故曰形聲本來不喚向下作金只緣土向上有小今字名今所以兼向下土相和喚作金故名形聲被小金字聲形著向下兩个土總喚作金金是聲土是形將形就聲故云形聲也班固漢書及許慎說文字有六體一曰指事如上下二象形如日月三形聲如江河如鳩鴿皆取一半字為名四會意並戈為武人言成信也五轉經如十字向上著一書名干口中著轉名曰竪書名田向下出名甲向上出名由六假借如喚令字作令字長字作長字也言珊瑚等者出於海邊石上脂入腹變為珊瑚又云劫初時石裂中出脂變成此物晉朝石崇家有三十株高三四尺今時貴也言真珠者二解一珠體不赤從赤虫所出名赤真珠即蜯蛤也二珠體赤名赤真珠若准佛地論從赤虫得名疏主解體赤也言五摩尼者即末尼珠即如意珠所求如意也言既無瑠璃等者問如何疏主將真珠與摩尼珠分作兩个答疏主意珠體不別向下觀音品中七寶之中瑠璃便合真珠與摩尼珠為一今此七寶之中闕瑠璃故於珠中開出兩个謂真珠與摩尼珠別也此摩尼珠即是當來人壽六萬歲時舍利化作言六車渠等者梵云牟娑落者云車也揭柆婆者渠也真云車渠似玉而貴於玉馬瑙似珠而賤於珠言青白間色等者青色白色兩中間色為碧色赤色白色兩中間為紅色青色黃色兩中間色綠色赤色黑色中間色為紫色其中青黃赤白黑為正色紅紫碧綠不正色也言杵藏也有云胎藏者從喻為名問胎藏有可破壞是不堅實法如何言堅實答此寶生在石中不可破壞猶如子在母胎業力所持外風不入內風不出不能傷損就一邊說哲云似瑪瑙骨映作淡緋色字或車作馬瑙以是玉類或從玉作馬瑙劫初時石脂流入石或從石作碼字不定也此雖似真珠而賤於珠也言此七不同等者三文不同無量經云金銀瑠璃頗梨珊瑚瑪瑙車渠恒水經云金銀瑠瑙真珠車渠明月珠摩尼珠佛地論云一金二銀三吠瑠璃四頗胝迦五婆揭拉婆六遏濕摩揭拉婆七赤真珠此經受記云以金銀瑠璃車渠碼碯真珠玫瑰七寶合成言金剛者貞云金剛異物堅不可壞而能壞諸物隨物色現而色不定能集眾寶無能知價錭字為正其形三稜打破百分千分皆須作三稜為鑽破一切寶也唯羝羊角能壞得金剛拍著便破又唯怕蠅蠅坐來喫却金剛也言諸珍帝青等者帝釋宮中青寶名帝青大梵王宮中青寶名大青又云帝釋髻中寶名帝青大梵王髻中寶名大青此解不正二種俱是帝釋宮中寶為正勝者名大青劣者帝青青寶體是一勝劣分二又梵云因陀石羅此云帝青珠摩訶石羅此云大青珠也人間有寶形狀似彼寶亦名帝青大青故言之類也言奴等者貞云可以代勞困有五一者得罪役官為奴二不能自活情願事人三者邊方敗劫得四展轉相生以財寶得謨云官戶抄口家生樂事契券言四婢者此會意字女卑成婦問奴婢既卑稱如何珍答但人之所重即名珍也言五車輿等者輿輪各二別不名車輿輪一處即名車也如手足等名之為人故為總此解善簡要云輿者箱也脚也言夏后等者國號也夏者即夏家即是舜後嗣位者后氏者即君名也爾雅云后君也即夏家有士夫奚仲能造車此人當時為車政即今大僕卿因造車故授此官也古音居所以行人居也今言車者舍也言輦等者力展變古挽車人在前引之故名輦輦是有輪人牽也言寶飾輿等者古時輿一似不著脚車今時輿圓說文車無輪曰輿也有作轝非也言一頌施成度者經曰迴向佛道願得是乘等者由得上佛乘故三界第一由說上佛乘故諸佛稱歎謨云前解所行施今之迴向即成度義即是施家之成非是將成度施與人言成唯識云具七等者問施等迴向之時即名為度有何教文答疏言成唯識等論云何證得二種轉依謂十地中修十勝行斷十重障證十真如二種轉依由斯證得要七最勝之所攝受方可建立波羅蜜多一安住最勝謂要住菩薩種事須得種姓地本有無漏種子以為安住簡定性無性雖行施等不得成度二依止最勝謂要依止大菩提心若發生人天心求三乘心雖施不名成度三意樂最勝謂要悲愍一切有情事須有怜慜眾生心慈悲喜捨愍物之心四事業最勝謂要具行一切事須兼行二利行種修習諸善空布施亦不成度五巧便最勝謂要無相智所攝受布施時觀三事體空三輪清淨不見能施人所施物所受者與此相應方成度義若無不成度也六迴向最勝謂要迴向無上菩提七清淨最勝不被二障所雜三時無悔即名不雜若非此七所攝受者所行施等非到彼岸由斯施等一一皆應四句分別一有施非度如布施時不與七義相應二是度非施如精進等三亦施亦度如布施時與七義相應四非施非度如自不將錢物布施不是布施見他人布施不生隨喜不成度大論云菩薩所行惠施由七相應乃得清淨一淨物二淨戒三淨見四淨心五淨語六淨智七淨垢遠離懈怠貪嗔等問何名淨物答一淨物謂廣大平等應時上妙二淨戒謂發精進自手力等三淨見謂不計我能施不校量他不布施等四淨心謂怜慜珍重平等五淨語謂所施物姿彼乞者乞者來時稱善來命進問安住六淨智謂惠施智智清淨故求者智淨住福田相等七淨垢謂懈怠貪嗔癡等言此中但舉等者問既有七攝受法何唯舉一迴向耶答疏言此中等將欲顯此土唯一無二乘故於光中亦見是事故言此中也言次一雜物者經云駟馬寶車等者四音同即是四个馬齊行駕一乘車名駟也古人有千駟此依天上車房星有二十八宿一方七个四方合成二十八宿東方有七角亢氐房心尾箕此是仿皇四个居前三个在後作倉龍之形爾雅云天駟仿也古人倣之而作四馳車也言古人等者承音逐也可以馳逐馳逐者經營之義意道四个馬駕一乘車以可馳逐經營也言欄鉤者洛干反手邊作爛若木邊作木欄也欄謂欄即車上欄竿也門遮者即是遮闌義若言柬欄門即靈子東門能鄣欄故名欄也闌欄皆得言楯音食尹者食尹反聲帶深也順也時尹反聲帶淺也若准時俗解橫欄竪楯此間疏主解竪欄橫楯即是縱曰欄欄即檻也竪柱子名欄檻也欄者亦名階際木也橫木也切韻中言欄是階際木亦云橫欄竪楯橫是階際中此解非也但言階際木竪柱子亦名階際木即是竪欄橫楯也言華音者初華美之葢戶花反華美音呼後以華餝葢名為華葢也言依此俗釋等者疏主作華葢解𣵠鹿是地名在幽洲轅黃帝姓公孫在位一百年年一百一十歲伏義神農黃帝即三皇也尤兄弟八十一人並銅頭䥫額不歸於帝常能興雲起霧五百里黃帝感五色雲雲氣作華之形在王頂上因化黃帝而有此葢自後帝王因作華而有此之葢言據實理等者作華音呼疏主解本來葢不作華蘤形以華裝餝故言華葢問此解東方世界中華葢何故引西域華葢解東方華葢答疏主將西域事證先中世界有華葢不是將西解東也經中設作華字亦化華音呼正也言軒音者軒餝之葢安於車上名安車上也若正解經文車上有華葢不關人帶也曲輈者車轅也轓者箱甫煩反車耳者助句即曲轅車也言車四馬駕等者總解意也已上四行外財施也言次一內外等者經云又見菩薩頭目身體等者此二煩中初偈別施身肉手足後頌總頭目身體此二頌通總通別也身肉施等者如須闡提太子割身肉供養父母如慈力王施身與五百夜叉又如尸毗王救鴿藥王菩薩燒身燃臂及妻子施如須達挐太子捨妻子又見菩薩頭目身體如月光王捨千頭鶖子捨目問施妻子者令他離隔即惱所施損惱淨心復毀受者如何答菩薩以彼妻子施必先立契約若求者施請無違既有誠言施亦無過言施有五相者一至者到義極義表此心盡處無不到隨願心名極即慇重之心謂無上菩提在三大阿僧祇外今施物之心到大菩提名為志心二者信心信三寶是所施境信施因感無量福信心簡不信心如世王候及我愛重者但借身命於三寶所及天祠等種種植福處而行數時未必皆是信於彼法三隨時者有二一隨四時寒熱施物一隨力辨得一千辨得五百四自手施者表殷重昔時有王號月光行大乘行願施千頭有婆羅門從王乞頭王捨國位以後所施王禮十方發願已畢即於後園樹下命本樹神割我頭向我手中我自手施王謂神曰我於此處已捨九百九十九頭今更施一頭檀度願滿爾時八萬四千小王一萬大王皆身投地二萬婇女悶絕擗地爾時王者釋迦牟尼是婆羅門者提婆達多是樹神者目連是五如法施不是煞命沽酒得錢總名如法及七攝受相應總名如法行施總是名施五種言不應施亦五相等者一不淨物者非理得財倚官狹勢劫奪得錢名不淨二亂眾生物酒及毒藥也三惱眾生物置網等是也四害眾生物弓刀等五壞淨心者音樂女色問音樂既不許施如何金藏論可音樂布施得好音聲及妙音菩薩伎樂布施耶答彼約聖人此約凡夫說也問女色既不許施如何經云及妻子施答前約捨心成難就捨物而能捨得所以許施此間約所授記者二者菩薩行施與妻必先立契誓行菩薩行若有施處誓不相違不作女色心布施約久修行者前文許施此間約初心能壞淨心不能持戒者故不許又菩薩施妻有二一未先立契亦不強將他布施二前人求色心乞來亦不布施又不應施有五一父母師長不應將布施二者為王不應抄掠他人妻子眷屬布施三未共他立契約不合布施四前人是旃荼羅惡人不應布施五乞得作奴婢亦不應布施又菩薩布施有四思擇力一布施時觀現世無安樂當來得利益者施與二現世得安樂當來得利益者菩薩施與三觀現世得安樂當來無利益者菩薩不施四觀現世得利益當來無安樂菩薩亦不施言施有五利益者一得親近是諸人天等樂親近也二常樂見如須達長者賑貧愐寡人皆樂見又如講人法施聽人財施即日相親近恒樂見三宗敬者得人敬重故如依止有財師僧而行宗敬等四得好名聞如藺祿子等得好名聞五復作後時因者熏習所成百生千生而能行施後作菩薩之因所修施皆是當來成佛之因問現世間人多有錦帛不樂惠施據今富有從樂施成熏習強何因慳恡答此類之人多生已來非是常施偶然因布施供養羅漢勝福田人便於今生招此富有非常行施熏習不強故於今生不必好施今身能施今身能施是前身施來今身若施來世更能施言於此施中應起等者我由前生布施今生富貴今生更不施後生因何得富又錢財是五家分水火盜賊及王惡子若被取來爭惜得忽被賊劫忽被火燒爭惜得不如布施自家獲大利益今不行施後忽貧苦或若身死財不隨去唯此施為善作後世起此心時名覺悟智言二財物尠等者菩薩念言餘貧窮者衣不弊形食不充口我財比上不足疋下有餘於此無中又分滅施能捨難捨現世雖受小苦當來必受大樂今身若不忍苦當來大苦如何免得名忍苦智也言三財悅意心等者即寶翫之物良由妄情計金銀等為可愛倒生愛重不肯惠施或可本來畜積本擬榮身財物既多營求廣却生苦惱今知此倒名知倒智惠愚人多財益過言四忻世果而行等者菩薩念彼三界眾生差別悉是泡幻何乃願求我今所施願求菩提金剛堅固之身或念世果受八萬劫終必墮落況滅百年念此不堅應求堅固果所以行施問雖願求於堅固之體有實因此得彼果否答華嚴經云昔於眾生起大悲修行惠等波羅蜜以施其身最殊妙能令見者生歡喜言施以無貪等者問布施以何為體答疏言施以無貪等無貪即是善十一中無貪善根意能惠捨身能自手施口能讚嘆如唱布施呪願大論十七地中第十名菩薩地也此有三種施財施法施無畏施經文但明財施也無畏法施通餘五度攝般若論云檀度攝於六資生無畏法此中一二三是名修行住言此二頌戒者經云文殊師利我見諸王往詣佛所等者諸王者即光中萬八千世宗中通輪王粟散王往諸佛所問無上道即菩提涅槃經既言問即合有答略而不說光中國王因聞一乘法擬行一乘因所以捨國位出家也便捨樂土此捨不是將布施但施却名捨經論中多言國杜無此杜音但是借吐字音作吐字呼即是國之別名土者吐也萬物從地而生如口吐出相似菩薩擬欲出家先化國土令一切眾生作念國王尚自捨國棄榮出家豈況諸凡庶之人而不出家耶剃字切韻作計變除髮也鬢音即俞反問何去鬢髮答捨餘好故是毀色形故且鬢髮如雲可以生貪植髮衝冠可以長患虬鬢長𩮻為長染緣故皆棄之用資入道經云孔雖有色嚴身不如鴻鵠能違飛白衣雖有富貴力不如出家功德勝既是出家之人具出家相好必是持戒之人故科作戒波羅蜜言戒有三種等者第一明戒種類且大小乘持戒各別大乘持遮戒性戒小乘持遮戒大乘通二利小乘唯一利聲聞持戒與菩薩四義不同一自性差別聲聞持七眾戒菩薩持三聚淨戒二失不共差別律儀則同攝善法戒饒益有情戒即不同三廣大差別大乘持三聚淨戒求佛果菩提小乘持七眾戒求阿羅漢果四甚深差別聲聞持戒是菩薩破戒聲聞人持律儀戒止即是持作是犯菩薩持攝善法戒饒益有情戒止作則是犯上明差別下說種類一律儀戒等者即七眾所受律者法也儀者軌則儀也一比丘持二百五十戒二者比丘尼法說五百戒正云三百四十八戒也三者正學年十八便受學戒佛許二年學戒舊云或叉摩那四沙彌五沙彌尼此云勤䇿男勤䇿女勤人駈筞也亦云息慈受持十戒息惡行慈六優婆塞七優婆夷受持五戒也二攝善法戒所修三乘一切善法者此即漸悟及彼頓悟所修三乘有漏一切善法皆是此戒定性唯修小乘法故非此中意三饒益有情戒即利益有情三業萬行糅云要受菩薩戒於師僧及佛像前期誓斷惡所行三業萬行利益眾生方是三戒中收若不受戒雖利益眾生是善非戒也問菩薩只今持攝善法善法饒益有情如何兼持律儀律儀是七眾戒益疏主意云只七眾所持律儀便菩薩所持戒言勝鬘經云波羅等者問王身既是菩薩即合受菩薩律儀何要剃髮被緇受小乘戒而祈解脫答疏云勝鬘經云等如是六法為大乘有二義一為大乘故說名為大乘二為大乘因說名為大乘若不是菩薩所持戒如何言為大乘故說耶答波羅提木叉者此云別解脫戒戒者動發身語思上能防發功能名戒功能不合名戒成就彼所防所發得戒名也身有三是別語有四是別此戒能棄捨彼別別惡法別解脫此有二說一云當來涅槃果是解脫由離別別惡法當來得解脫二者只離惡法便是解脫戒也云毗尼律藏糅抄云廣戒六十卷律是此上二種是行言出家兩字即目沙彌沙彌尼也言受具足戒僧受二百五十戒尼即三百四十八戒此上通難詞雖引四種沙彌沙彌尼受具足僧尼意取後二僧尼證菩薩亦持別解脫戒也言菩薩地言律儀等者解當唱經文引瑜伽菩薩地可有輪王王捨位出家持律戒意證此經中輪王捨位出家持是律儀律儀戒不是餘戒問經中只說剃除鬢髮出家不說持戒未審何處是持戒處答疏言菩薩地言等更問菩薩只合天冠瓔珞形相不定何故作比丘形答只此菩薩出家形相亦是菩薩律儀所以引菩薩地言出家受具足皆名律儀也言律儀為本者問三聚淨戒總是菩薩所持何故空說持律儀戒答疏言律儀為本等意言但修律儀餘戒自成所以菩薩先持律儀不說餘戒且先持律儀離諸惡故然後修行六度萬行問如何是律儀為本方有後二若破律儀三戒俱捨答尸羅不清淨三昧不現前等言故四波羅夷等者此文證前言受具足住皆菩薩律儀攝也前來二本聖教證此法華經云剃除鬚髮出家相也瑜伽又言捨輪王位如棄草葉此總出家相也問五篇之中上二為戒下三威儀今言律儀不攝上二如何答疏云四波羅等若更能持沙彌十戒亦是律儀更受具足亦是律儀也言此明出家者問經中所說是何戒攝答疏云此明初等言有本言披等者疏主更加梙著之義亦得名被梵云支伐羅此云法衣通目一切出家三衣經云法服服即衣也言出家寬曠者問菩薩修行形相不定何故事須出家答疏言出家寬曠等牟者堅固之義獄者鼻陶所造又經云孔雖有色嚴身等言二捨命等者持戒之人必生善處惡相不現所以歡喜戒云如人自照好醜生忻戚名聞及利益死得生天上故歡喜若破戒之人一切惡相現前生憂惱也言三持戒者為親友者今生持戒來生還持戒人以為親友也言四功德圓滿者尸羅不清淨三昧不現前等即是功德滿也言五生生者一生天性不飲酒不煞生故言戒成其性也言智論說等者瓶若破一切寶物散失戒若破一切功德皆無也言一頌忍等者經云或見菩薩等者或見菩薩行忍人而作比丘行忍相獨處閑靜行忍處樂誦經典行忍行處問菩薩行忍是何意答菩薩云若我不行忍辱不得圓滿法身又不得圓滿相好淨穢土中說法教化眾生終不能得所以要行忍也誦經有四勝利一者能滅重罪二者常受法樂三令法久住四者廣種善根忍有三種金云一者耐怨害忍忍受惡罵捶打等境二者安受苦忍寒熱等境三者諦察法忍緣法義境又耐怨害忍感當來化身果安受苦忍感當來法身果諦察法忍感當來報身果攝問云菩薩當作何念能得菩薩答當念忍力能到菩提不忍為因諸根不具不能辦成諸有情事故大般若云我若不修忍波羅蜜當生諸根殘缺容貌醜陋不具菩提圓滿色身問忍有三種未審此菩薩是何忍答唯是諦察法忍也經云獨處閑靜不對怨害寒熱等境唯閑處念經故云諦察法忍諦者實義察者觀察也忍者是智智於理上觀察即境決定名忍言舉難偏說等者問餘二忍何故不說答疏言舉難偏說等路云疏主合道舉勝偏說也不合道舉難偏說也以彼諦察法忍易於耐怨害忍等二種也乍觀似耐怨害難於諦察法忍若子細思其實末法之中行諦察法忍却難金剛經云初日分以恒河沙等身命布施中日分以恒河沙等身命布施後日分亦以恒河沙等身命布施經百千劫捨身命布施不如有人持一四句偈捨身命者即安受苦忍能持四句即諦察法忍被歌利王割截身體即是耐怨害忍問耐怨害與受苦忍何別答怨家逼來而忍受得而不加報名耐怨害此唯對怨家說若不對怨家一切時遇惡緣能忍得名安受苦忍言一頌懃等者經云又見菩薩行精進勇猛精進精進體入於深山精進處思惟佛道所修善又見菩薩能修人勇猛精進所行行入於深山來勝境思惟佛道求勝果言此通被甲等者且唯識第九列二種精進以解脫文經文略無利樂有情精進只有論家兩个精進唯自利也問何以知答疏主體經意如此經云入於深山思惟佛道既言入於深山明知無利他也疏主所以不引利樂有情精進依論解云云何精進於善惡品修斷事中勇悍為性能治懈怠滿善為勇表勝進簡餘染法悍表精純簡淨無記即顯精進唯善性攝如人入陣著甲而有威勢法中論喚何佛作被甲答最初發願願我救一切眾生苦將身借一切眾生受苦發願願心有大威勢猶如被甲入陣也二者攝善精進從初發願已去加功用行事無不成三業精進為能攝功德法為所攝故名攝善也略無利樂有情精進也言精進有五等者初依論列名亦是引經家五種精進對辨也且喻伽論說被甲即是經云有勢如欲打賊若有被甲即有威勢瑜伽論云加行即是經云有勤加行者加功用行只為有勤也瑜伽論云無下即是經家有勇也下者下劣若有退屈即名有下瑜伽論云無足即是經家堅猛瑜伽論云無足即是經家不捨善軛上論經對辨云云言最初發起等者明五種相也猛利樂欲即是被甲精進相也言次起堅固者勇表昇進簡諸染法悍表精純簡中無記此是加行精進相言次為證得者若自輕蔑向所修行向上怯懼名下也今無此過名無下精進相言次能忍受者若生喜足名有退此名無退精進相也次將五修配五種精進一發心修配被甲二長時修配加行三無間修配無下四慇重修配無退五無餘修配無足次配五位一資糧被甲二加行位配加行三見道無下四修道無退五無學位無足言二乘究竟道等者問二乘無學已至果位佛果以無學故更求何法得有精進答疏云二乘究竟等然果位中配無足不捨善軛有學有進修可許名無足無學修已息云何不捨善軛答疏云二乘究竟等言初一名初甲等者相攝也將唯識論中兩个攝餘教中五種將此經中勇猛精進一个攝唯識論中二種即是此經攝唯識唯識攝大論等諸論等言此中合名等者問頗有精進得佛果菩提耶答實因精進得佛菩提莊嚴淨土華嚴偈云往昔勤修多劫海能轉眾生深重障故能分身遍十方普現菩提樹王下又此下經云阿難常樂多聞我常勤精進便得菩提言二頌定等者經云又見離欲者除定障常處空閑者修定因深修禪定者明定體得五神通者獲定果又見離欲者攝散心常處空閑者樂寂靜深入禪定者獲安樂得五神通起作用又見菩薩修定人安禪者意業合掌身業又見離欲者厭塵俗常處空閑者趣真境深修禪定者證無相得五神通者降眾魔又見菩薩者利生人安禪合掌者樂說法以千萬偈讚諸法王者口業又見離欲者明由離障染也既言離欲即是頓悟漸悟人也常處空閑者離欲境也深修禪定者即因第四禪根本定名深修也得五神通者定作用由此因位菩薩未得漏盡通至三乘無學果位方得所以但言五通也問如何安禪是定而能合掌讚嘆答古師說云梵云安禪那此云合掌梵漢雙舉而成偈文屬及慧收非是禪攝准此解意安禪不是定但是合掌也此師意中迴避入定以彼定中合眼閇目爭能合掌讚歎然實登地已去菩薩不起滅定而現威儀在滅盡定起身合掌讚歎又八地已去菩薩掌在定門常起身佛前聞法讚歎上消經也言離憒閙故者解常處空閑也憒者心亂也閙者即闤闠也亦通膾亦是閙義有作𠆴不靜也言由安住靜慮等者住身心於彼禪定輕安法樂名住靜慮慮慮是一所作事別故分三種糅云此三靜慮復有二種一有漏二無漏有漏三者一得世間定身心寂靜安樂住二能引五通名引發三以得五神通利生說法名辦事靜慮無漏定有三者一依止現法樂住輕安調暢名安住二引無諍願智十力四無所等畏功德名引發也三能起神通作十八變利益眾生名辦事言引發靜慮等者問何名引發答得四禪根本能引於慧慧能發通故定名引發故無性云引發神通殊勝功德由辦事靜慮故讚諸法王能辦教化眾生事也問釋迦菩薩當日讚歎底沙佛只說一偈如何今說千萬億偈答只說一偈表心專注一境言千萬億偈表功德無量問廣運三乘二利長時寂靜閑居曷有多益答心猶野馬意若巖猿戒之一處無事不辦由此四句分別一靜而非慮無色界定二慮而非靜近分定慮者慧也慧強定劣三亦靜亦慮四禪根本定也四非靜慮可知大般若云是諸菩薩入色無色定寂靜安樂但欲引發自在神通與諸有情作大饒益亦欲調伏麤重身心令有堪能修諸功德又有偈云一念亂禪定如煞三千界眾生一念在禪定如活三千界眾生華嚴頌云佛久修行無量劫禪定大海普清淨煩惱障垢悉除滅廣有多能故菩薩修行須深入禪定言此三必由離欲等者意云得此三種靜慮事須離欲界欲界地法無定故假離欲也問下界若無定云何別境許有定數耶答此是等持通定散故此但事觀伏惑引得上界定故離欲問伏何等惑答十煩惱中六通俱生十分別起分別起者普不能伏事觀麤故六通俱生又除二見細俱生故伏餘四惑也言此一加行智者經云復見菩薩智深志固等者智慧有三種一生空無分別慧二法空無分別慧三俱空無分別慧攝論云又有慧三一加行智慧二根本智三後起此加行智即是地上也頌文述前相相貌即前地上修行言妙達實相等者智深者加行智也實相即真如也謨問云如何加行智能妙達實相答此但是了達解了之義非是證達又解地前加行位世第一雙印二空能所皆無微有少分相分當情不名真見除却少分餘皆是真實觀但能少分能得心便名加行位故此觀理多深名智深也二云不取世第一為智深未曾親證理故入初地至七地已來加行智名智深前後曾親證理故妙達實相難勝地中真俗合起何失又思慮遠故名智深今此智緣實相所思慮遠能思慮智得名智深又思量佛果菩提功德名思慮遠故名智深也言意樂不壞者信心不壞信戒名意樂不壞不壞者固義也凡夫解義或是不名志固菩薩當知不謬故名志固又志求佛果不休息故名志固言加功能問等者加功兩字解第二句志固只自不休息便是志故義能問兩字解第三句經能問諸佛故云加功能問也聞並能持解第四句經文聞悉受持一得不失聞並能持菩提五蘊假者身中念慧是能持佛說之法是所持也言此二頌頌二智者經云又見佛子等者又見佛子者能化人定慧具足者圓力化以無量喻者開解化為眾講法者上首化忻樂說法者不退化化諸菩薩者簡機化破魔兵眾者降魔化而擊法皷者法遠聞化經云定慧具足自利智以無量喻為眾講法下利他智也言定慧具足者經文問此問說慧何須論定若有二種一者定中慧如室中燈照物分明二者散位慧如風中燈照物不定今言定慧簡散慧與定相應慧總已具足不是定慧兩法總有此問正明慧不合言定因定中慧所以兼說定也根本後得二皆具足以彼根智行相深隱却在具足中含得此一句經文顯根本智也言後得智中等者解經以無量喻為眾講法後得智也問如何菩薩堪為人講說法答善調三業能離毀傷能息偏儻情棄貪求意斯則可為善說法者言一忻樂說法者五福經說說法人獲得五種果報一長壽由說法時令他不煞故二者端正由正說時令他和悅忍辱故三聰明令他悟解故四者多財令他不盜故五者智慧令他破癡暗故問法本離言何須要說答若無言說無以解生故華嚴經云如寶在暗處無明故不見真諦本無漏雖慧莫能覩言化諸菩薩者順一乘故表此靈山會中教諸菩薩故二乘取二乘果不是總不化言四擊法皷擊法皷者二乘大根熟如枝擊菩薩得後智如皷面也感菩薩說捨權就實法如擊皷出聲也言至下當知者指八義中說也言魔羅等者辨魔相也梵云魔羅此云破壞魔即通號也十種皆名魔也古翻為優亂破壞障礙也擾亂身心障礙善法破壞勝事故名魔羅言波卑夜等者此是天魔之別名唯囑天魔壞惡意樂樂行惡事成就惡法也若言天魔通號也若言波旬別名之中訛略也若言天魔波旬通號別名二皆雙舉也言雜寶藏中等者疏主章中出魔種類有二分段變易也若三魔如此經中說見賢聖軍五薀魔煩惱死魔共戰等是若瑜伽佛地等說四魔加前天魔成四十魔者分三列名次第二釋名後辨相雜寶藏經中說偈云欲是初初軍憂愁軍第二飢渴軍第三聲軍為第四睡眠軍第五怖畏軍第六疑軍為第七貪毒軍第八第九利養軍著虗妄名聞第十軍自高輕慢於他人汝等軍如是一切世間人及諸一切天無能破之者我以智慧箭修定智慧力摧破汝魔軍如𭎟瓶投水釋名者可忻名欲心戚名憂愁悕求飲食名飢渴躭欲名愛令心昧略名睡眠有恐怯名怖畏猶豫兩端名疑損惱身心名毒希譽貪財名利自舉淩他稱高慢欲等即魔持業也辨相者一欲即貪欲世間五塵境為因能生欲故是果今取能生欲心故名欲唯取色境向上貪欲心也心戚名憂憂是戚行轉即憂戚心也謂飢渴逼希求飲食名觸現有貪喜俱行名愛貪愛煩惱也癡人事業昧略為性名睡眠即不定四中睡眠怖畏有五一不活畏由分別我執身為常恐我斷絕故緣中資具恐有間斷遂生怖畏二惡名畏不行饒益或不孝父母恐眾人知此惡名遂懷怖畏三死畏由有我見緣失懷想起病即是失懷想見身無力不能喫飯恐死到來故名死畏四惡道畏造非法業知此是三塗因於此三惡道遂生怖畏五怯眾畏觀他人所得是勝知自身所得是劣於此境中而生怖畏五中初二多是財利之愛第三第五多是我愛第四體是慧俱無嗔或體是不愧根惡法也疑者於事不決毒謂三毒即貪嗔癡也及名利者貪求名利亦是魔也名即聲譽利即資產自高即是慢也此上十軍也言我智箭定力者有定無慧如弓無絃故須定慧二種相資始能破魔也有云定能縛賊慧能煞賊定既名刀亦能煞賊也案經本弓為正謨云十魔能障定慧說二刀箭但取其意諸有智者不應難喻也言摧𭎟瓶投水者𭎟是未燒了瓦𭎟名𭎟瓶投𭎟瓶投水即破壞也此是不堅之法喻魔亦爾言或正智擊真如者擊者打也親輔義親得其體也正智內證名擊真如是教面正智證時名杖擊也後得智將所證無言說法為眾生說如皷上出聲又後得擊俗理俗理如皷面後得如杖後智能達俗達俗之時如杖擊為眾生說如發聲二智之上皆有說法發響之義也問三智種現歷位資糧等三劫云何答論九云如是三慧初二位中種具有三現唯加行未得無漏真正道故於通達位現二種三見道位中無加行故於修習位七地已前若種若現俱通三種此位最寬皆容起故八地已去現二種三法駛流中任運轉故究竟位中俱二劣無漏智皆已捨故唯帶舊種非新熏故言此六度中等者謨云歸本所明亦云六度差別二利不同也以前來科云十七偈種種相貌中分二初十五偈六度次習二益圓成自利利他名二益然此六度據實理論皆各有二利然布施中唯利他內財外財此三唯利他最後智波羅通二利也定慧具足唯自利以無量喻為眾講法唯利他也中間四度唯自利略無利他之說問誰人略答當時彌勒問文殊時略却或結集或翻譯略今取彌勒為正言八風不動者經云又見菩薩者捨樂人寂然宴默者捨樂相身心不動名寂然口不動名宴默或心不動名宴語不動名默天龍恭敬者遇樂境不以為喜者捨樂心天即帝釋等諸天龍即諸龍恭敬之言義貫通故恭敬之時於中得財利得稱嘆天龍恭敬為因不以為喜為果只此不以為喜一句含得八風經文不顯准此四種即是順風能生於喜今言不喜餘即是逆風故能生憂經既不言於憂即知順風吹不喜逆風吹亦不憂故一句經含八風言宴音者烏見反安也息也晏字烏間反靜也默也言八風等者瑜伽第二名世法風者是從喻名世法皷䔽喻若風飄故無性第五有偈云諸佛常遊於世間利樂一切有情類八法熱風邪分別不能傾動不拘礙風者即是吹動義由此八法吹令生憂喜等菩薩觀心對不被外境吹動故淨名云毀譽不動如須彌見不動義言一利者得可意事名利生不可意事名利生不可意事名衰不現前誹謗名毀不現前讚美名譽現前讚美名稱現前誹謗名譏逼惱身心名苦適悅身心名樂毀譽稱譏如名為體苦以苦受為體樂以樂受為體言恭敬之言等者問經中略無財等事但說天龍恭敬如何舉四答疏言恭敬之言等意說為人恭敬有財位等言翻此四種衰等者問經文只說順風不說逆風如何言翻此四種耶答天龍恭敬利譽稱樂既不生喜返顯衰毀譏苦亦不生憂言此三悲接物等者經云又見菩薩者拔苦人處林放光者拔苦力濟地獄苦者拔苦事令入佛道者與其樂金云一切理解定是功德之藂林智能安處於定能放光明濟地獄苦故云處林放光濟地獄苦二者約事解菩薩於藂林中放光問菩薩之行利生多門何獨舉放光不說餘行二云眾生可救數亦無邊何唯地獄偏言光照答菩薩行雖無量且舉一行眾生數亦無窮且救重苦其實亦濟餘趣地獄眾生與他說法無益事須放光方能濟苦言悲謂拔苦等者一眾生緣悲處緣眾生起悲濟拔二法緣悲者緣眾生唯有薀處界等三科和合而有實無眾生體性三者無緣悲有二一者緣眾生之時不見眾生唯作法空解名無緣也二者唯緣真如亦名無緣也熾然緣眾生不作眾生相也但緣真如而起悲拔苦名無緣悲也今此是眾生緣悲當情見地獄眾生而拔濟名眾生緣悲也言行有多種等者問菩薩之行既多六趣眾生非一何故偏舉放光之行唯照一个地獄眾生答疏言行有多等言故言放光等者光即智慧之光九地名地三界名獄菩薩處定能發智光三界九地悉能濟拔也言餘二悲行等者法緣即是不作眾生解但作薀等解而起於悲無緣即是作二空解而起於悲問心不孤起託境方生觀法皆無悲緣何起答菩薩智力作用無邊了俗證真何方平等言此勤也等者經云又見佛子者精進人未甞睡眠者除精進障經行林中者現精進相勤求佛道者覔精進果又見佛子者修勤人未甞睡眠者修勤行經行林中者修勤處以求佛道者希勤果睡眠是精進障樂著前境名睡身心昏昧名眠問爭得知是地前菩薩答前來經言信解不言證解明知是地前菩薩又前來六度次習修今此亂修故是地前也言飲食知量等者解未甞睡眠甞由試也未曾暫試貞云甞由啜也殊雪反如有美食未曾暫甞況飲喫也瑜伽論云飲食知量減者睡眠段食生睡之緣交知量減省不多不少喫多即長睡喫少人無力多睡無力多睡無力並闕修行故言飲食知量減省睡眠也言初夜後夜等者彼中不說中夜修行也則以許中夜一時宵息也覺悟者修禪觀也瑜伽者含五義故不翻若翻失餘四義也唯得一義此云相應相應有五一心與境相應二定與慧相應三教與理相應四因與果相應五藥與病相應也略云瑜伽此翻為觀行言遺教亦言等者消息煩惱不是睡也遺教經制於初心全不許睡然修行人有其三種且如十二時中上根一時食一時消息此消息睡也餘十時修道中根人二時食二時消息餘八時修道下根人三時喫食三時消息唐三藏每夜睡十六息阿含經云有五種人夜不得睡一國王思惟化人二作賤人三女思男四男思女五精進比丘故經云良馬不曾臥半夜暫時睡盛事未必功汝何安樂李北海賊云遺名利遣聲色儲精魄養靈識無言無事不飲不食造化於我何功帝王於我何力世間之事尚自遺云何何況能修出世等事言經行林中等者律中說經行有五勝一消宿食二除濕痺三令身安和四心易入法五能遠行問何名經行答經行有二一者經行意且意有二種一者為念經而行故名經行二為消食故名經行亦如布絹之經來去名經行也如世尊於三七日中經行觀等言此乃䇿勵等解精進也問經說經行林中勤求佛道不睡經行勤求前相何為等事不說勤求何言前相答疏云此乃䇿勵等勵即磨勵也經中經有勤字故下說四正斷亦云四正勤四正斷尅體唯是精進精進雖正斷惡是智功能由精進能助於慧從助而說精進名斷言四正斷中對法論說初二緣已生未生所對治法為境後二緣已生未生能對治法為境一已生惡法修律儀斷惡法已生現行事須修能斷律儀即是因事制戒等若約能斷說律儀即斷持業也若約所斷說律儀之斷二未生惡法修斷斷如設提塘恐未生惡法起來事須防被不交生三業與精進相應初夜後夜覺悟瑜伽惡法無容起得向上斷字是能斷精進心向下斷字是未生惡法為斷未生惡法所以修精進心惡法是所斷精進為能斷能斷所斷是故名斷斷三已生善法修防護斷猶如種樹善法雖然已生若不斷精進防護便被懈怠起來損却善法由精進力防護善法不令退失善既不退惡亦不生却向能防護向上說斷善法為所防護精進為能防護能防護即斷名防護斷持業也四未生善法修修習斷猶如鑽火由精進力修習一切未生善法當可生故却向能修習向上說斷還是三業精進身業禮拜口業讚嘆意業恭敬為修習未來善法今生所以修此精進也善法為所修習精進為能修習能修習即斷名修習斷持業也言故華嚴云等者引教為證也准華嚴經有六偈明精進文殊問勤首菩薩云教既是一眾生出離何得不同答但由眾生勤隨不同故有此別佛子善聽等四句總標遲速行言欲求除滅等者初一偈是法後四偈是喻法中唯喻懈怠者彼本文中有八喻初四同此後更有四个無手遍射喻毛滴海水喻微水滅火喻端坐昇空喻言譬如微小大者涅薪滅火喻火況眾生身中智慧煩惱喻柴薪薪涅比懈怠將火本燒薪柴涅大還滅精進本斷惑懈怠障勤心火若遇乾柴火即轉明盛火若遇濕柴火即當時滅智慧遇精進智慧轉增長智慧懈怠智慧當時滅言譬如人鑽火者鑽火數休喻眾生三業如鑽身中智慧如火數休喻懈怠相續不絕況精進木中有火事須鑽研方出身中智慧大事須精進練磨智火不生只緣修行懈怠木中火熱不出只為鑽研數休言譬如淨火珠者離緣求火喻心王心所況珠珠即陽燧珠能生善法事頃假精進也心王況珠火則況心中智慧布艾緣具則比精進布艾若闕況懈怠心心中智慧不生只緣三業懈怠火勢不起只緣布艾闕緣也言譬如淨明日者閇自求見喻也日光能詮教萬像況所詮理閇目開目況懈怠精進日光雖能照萬像閇目之者都不見眾生若起懈怠因何得悟於教理日能照物如教詮理目喻精進所見色喻智慧謂有精進能發智慧緣教得理言由初發心等者述此光陳也問何故登地相貌中最初布施云何地前信懈中最初精進答此有二義一者光中所見申難無由隨見即言何以論具先後二者十地菩薩次第修所以最初修者布施也又地前菩薩六度亂修所以最初發心修行先修精進也言信為欲依等者問如何是先修六度中精進答疏言信為欲依等先由起信信後起欲欲為因方有精進為果故最初修精進也問既精進向前是信欲何不六度中立信欲度耶答六度中但立精進度不立信欲度既信三寶又起希望希望已後便是精進所以最初說精進也但立精進度不立信度精進善遍䇿御眾業任持故六度攝信雖淨心非遍䇿等故非度名也言故此但以等者意言據實合以信欲為先非六度行故先精進言信後等者謂十信心位中初是信心二念心三方是精進心故言後精進也言一頌戒等者經云又見戒者貞云具性重之戒名具戒威儀無缺者即是息世譏嫌戒又見具戒者標持戒人威儀無缺者舉小尚不犯況餘重者紀國云又見具戒者持戒人威儀無缺者持戒相淨如寶殊者顯戒德以求佛道者顯戒果又見具戒者彰自體威儀無缺者論功用淨如寶珠者戒圓明以求佛道感當果言三業威儀等者問如何是威儀具足答疏云三業威儀常無缺減故名威儀無缺也言勿輕小罪等者問菩薩因何得威儀無缺答疏云勿輕小罪等此解防護細行所以也言淨如寶珠者舉喻也圓者名珠方者璣也今取圓者珠以無翳無瑕為淨或以無缺無滅為淨又或有三者清淨如珠二圓滿如珠三可重如珠言一內外無瑕者性戒名內遮戒名外若犯四波羅夷如玉內有瑕自餘遮戒如玉有瑕意業不犯名內無瑕身語不犯名外無瑕持性戒名內無瑕持遮戒名外無瑕言二戒德圓俻者二百五十戒五百戒名威德圓滿三千威儀皆圓滿言三威光日光者相國云有經說堅持戒者身諸毛孔常有光明天龍鬼神一切皆見常以香華遙散此人途遶禮拜所行之處鬼神下道故華嚴云若持淨戒正順教理諸佛賢聖皆共讚嘆故有偈云戒是無上菩提本應當具足持淨戒也珠體有光喻戒光能照幽途名曰光耀言四眾所愛樂者鬼神教仰如宣律師得毗沙門子承事若破戒者鬼神常求其便菩薩戒云五百大鬼神掃其脚跡又云持戒之人頭上有光長一丈五尺破戒之人頭上有血光長一丈五尺飛鳥怕怖也言由此鵝珠被等者疏主斷也此四句中初三句持戒緣第四句破戒緣問第三句鴈隨知事之前是破戒何故亦是持戒耶等由持戒食淨肉所以感應化身墮落故是持戒緣有說破戒緣非也昔有比丘乞食至賣珠家亦云國王家象珠主人與取飯沙門衣赤映彼珠色猶如肉團鵝將謂是肉遂吞入腹比丘知已恐傷鵝命忍苦不言被打血出鵝見地上血遂來噉血隨飲命終比丘見鵝命終遂報珠主云珠在鵝腹開腹得之亦有云比丘入王宮於王宮殿上珠被鵝吞也言草繫捨身者有一比丘山中修道有五百群賊劫奪三衣賊不知比丘持戒恐後尋逐即結草縛比丘身比丘恐損草壞生臥不敢動時迦維衛國王遊行見已以偈問曰觀此少壯人盛年多有力如何草中寂然不轉側比丘以偈答曰大王今當知此草甚危脆我將轉側時恐犯如來戒王即令解之而去言鴈隨知事之前者西國有寺皆許初緣食淨肉數日之間知事不得肉供僧僧徒譏調知事知事忽見群鴈飛空而過知事作念云薩埵何不知時交他一堂僧眾譏訶知事本是時諸鴈應聲便隨知事料理供養眾僧上座恠而問之知事具陳上事上座云此是菩薩非實鴈也我不敢食遂收其骨起塔供養鴈塔之事因此有也因此制戒故有讚言英英法侶嚴栖饋絕肅肅賓禽投軀効節誓徒頌味甘從墜滅水癢羊上音呼斯橨墳音式傅休列因即斷肉矣言龍生伊蘭之樹者迦葉佛時有一比丘於伊蘭樹下坐禪修道被樹觸身因即起嗔析其一枝命終已後作大龍號伊鉢羅龍王頭上生伊蘭樹盤根錯節枝葉無數每至大風起樹即搖動龍頭遂裂膿血俱出痛苦無極一枝尚爾何況壞多此破戒緣也言瓶隨所欲等者此通持戒破緣也智度論及瑜伽論說有功德瓶能隨意樂流出珍寶飲食渴藥等受用已還旋却歸瓶內昔有夫妻二人常求天祠後感天祠與一寶瓶寶瓶之內出種種物錢財飲食莊園宅舍一切皆足戒德亦爾若全有戒德常生人天富貴快樂乃至成佛戒德若破一切不成故經頌云有身不持戒如弓不著弦賊來無牽挽如何敢向前契經云依因此戒得生初禪及滅苦智慧上來鵞珠被打婆沙論草繫捨身莊嚴論鴈隨知事之前西域記龍生伊蘭之樹本行集瓶隨所欲智度論等戒了言此一頌半耐怨等者經云又見佛子住忍辱力者此二句表度相增上慢人惡罵捶打者明忍境皆悉能忍以求佛道者明忍所為也紀國云又見佛子者住忍人注忍辱力者安忍地增上慢人惡罵捶打者遇忍境皆悉能忍者現忍力以求佛道者覓忍果又見佛子者行忍人住忍辱力者修忍行增上慢人者逢忍緣惡罵捶打者行忍處皆悉能忍者忍成就以求佛道者行忍意增一阿含經說有六種力一小兒以啼為力欲有所索必須先啼二女人以嗔為力欲有所須必先嗔故三國王以憍豪為力四羅漢以精進為力五諸佛以慈悲為力六比丘忍辱為力今即第六力也今經言佛子與比丘無違故忍為大船可以度難也謨云先中所見行忍菩薩有類不輕往日修行故有偈云力打千人例此力不名壯唾面不迴頭此力過無量耐怨害忍對增上慢人行忍亦是安受苦忍言少得謂多得等者明被打所由也四沙門果是增上法得四禪定計為四沙門果凌著彼增上法故名增上慢又得四禪定謂少得將謂是四沙門果多得名增上慢論云云何為慢恃己凌他高舉為性能障不慢生苦為業言恃族姓等者問何名慢答疏言恃族姓等博陵崔范陽盧河東柳隴栗子等言色力等者色謂容色如潘安仁擲果盈車何晏人疑傅粉聰叡如背䨱碁財富者如鄒駱駝石崇藺祿子等名譽者如安遠慈恩等於自身上起高勝心遂行打罵化也言菩薩以五種觀等此明能行所以菩薩五種觀行忍一菩薩被打之時觀一切怨家親屬相譬如父母兄弟打來爭不忍受二唯念法相不見能打人唯是三科五薀如色薀打色薀如空於空關我何事所罵是聲界聞是根聞聲境罵耳耳根取聲境是本分無有主宰唯法想三念有苦想菩薩作念彼若無苦即須反報交伊受苦彼自家有五苦苦本來在身何要更酬即須忍之又忽在山林飛砂走石打著何須更酬酬阿難去又菩薩道我本來拔眾生苦如今交化受苦何成道理我今此身縱不打亦苦故遭苦能忍四無常想菩薩觀能打之身彼日月夜被四相所遷念念不住何須反報剎邪生滅畢竟命終前打我者早已落謝彼自無常何更須害既作無常想便能忍受五攝受想者菩薩念言我今攝受一切眾生本欲濟度令至佛果今我害他則成棄捨非名濟度由能忍受若不忍受惡罵等事則不應攝受彼類眾生如僧養小師童子等若有過失或起應諍和尚皆方便觀導即能攝受於彼是故菩薩攝受想而能忍之五種想中通於能所無常唯能除即屬他問何言應觀彼害者答二解一云害通能所二云從多分說言捶音者打即是捶也上解捶打了下解皆能忍仲尼云天子忍之成其大諸候忍之國無害吏人忍之進其位兄弟忍之家富貴夫妻忍家道昌朋友忍之名自彰自身能忍患害已問不忍如何答天子不忍國城虗諸候不忍喪其吏人不忍刑罰誅兄弟不忍分異居夫妻不忍令子孤自身不忍患害俱朋友不忍見疎也言二頌定者紀國云初一頌離亂相後一頌現定相經云又見菩薩者亂人離諸戲笑者離亂事及癡眷屬者離亂因親近智者狎定緣一心除亂攝念山林者現定相億千萬歲者積定力以求佛道者覔定果言所離有四等者菩薩修定之時所離有四一離戲謂分別戲論問何名戲論答疏有二解有分別名戲論無分別名不戲論問今此地前菩薩因何得無分別智答地前菩薩離能取所取分別之心覺離名離二者有漏名戲論無漏名不戲論言笑謂謔者詩云謔浪笑傲談謔是散亂虗約反言四離惡眷屬者亦是散亂緣離親屬尋故尋有四種一親里尋稱量親情眷屬有貧富等事二國土尋兵戰等事三恚尋嗔是也四害尋擬煞害眾生等事今者是初尋也即是惡眷屬親里尋也更說欲尋曾受用及所經過也言不離有二翻第四等者經言親近智者翻第四交離惡眷屬言二一心除亂等者經言一心除亂翻前三種一者分別戲論二離笑談謔三離自愚癡故名一心除亂也言故遺教經云等者苦諦名苦集諦名本本是因也欲斷其果先斷其因思滅苦諦之根本也言餘飲食等者或見光中菩薩膳飲食施也希字單作也食也啖也言菜之類等者菜是所所食所啖之物不得取能啖人也希眾也所食之采曰希亦云豆實即菉豆角小豆角來作菜名希上解希言膳具食也者疏主解今時美物亦曰珍膳又有字是菜膳字是美好飲食物名也言俗解肴膳肉也者即是國語之中解希字通菜通肉若向俗書中解便是肉食也嘉祥云希細擘肉也便解云法華會前世尊由未制肉尚自許弟子食三淨肉眼煞不應食耳聞煞不應食心疑是煞將來不應食疏主不許嘉祥解此西國之中風俗如此未必光中將肉供養言今則不然等者若兩个字總向食邊作兩字皆非若兩字總向古肉邊作皆非希字單作膳字古肉作為正俗中肉邊作於食體善字形聲膳者善也初造字時意未足不妨唯喚肉食作膳自後來一切飲食總名膳也問膳是飲食之總名作故從古肉耶答此解不爾菩提菩薩不是草字從草下作膳字不是肉何妨字從古肉作言旃檀等亦臥具攝問作故疏主此間解栴檀答緣經有栴檀字意道此界所有栴檀不過三種故赤謂牛頭等意說但似此間紫檀白檀非直指此間檀木上三行心事施了言上妙施中者解上妙施問前四事何故不名上妙答前經文不言清淨故不名上妙也今言清淨園林華菓茂盛流泉浴池施佛及僧正是上妙施也問上妙施經文只施佛僧不言父母病法師最後身菩薩將及字就佛身兼攝得父母也將及字就僧兼攝得法師并最後身菩薩故有頌云父母病法師最後身菩薩設非證聖者施果亦無量一父二母三病人四法師五最後身菩薩者小乘中解王宮生悉達太子未成佛已前身是有漏名最後身菩薩若准大乘示現也言設非證聖者問小乘最後身菩薩如何亦成上妙施答疏言設非證聖等言又云若有戒足等者問凡夫比丘及破戒法如何亦成上妙施耶答疏言若有戒足等佛言有二正行速得生天一者供養父母二者於父母所作諸眾善俱舍亦供養者病人尚得現報何況親供養病人又菩薩戒云八福田中看病福田最為第一問此頌中前後法師何別答有戒無別言一頌意樂施中等者准論中樂施有六種意樂一廣大意問前經家四事施及上妙施成此意樂此二解一物體廣大將國城妻子滿閻浮提金銀等四事布施也二於能施心上說廣大意樂不簡怨親識與不識皆能行布施故云廣大二無猒施經云無猒三歡喜施不與嗔心相應四恩德施慚愧佛於我有恩想一切眾生於我有恩由受我施令我得成菩提五無染有二一三時無悔名無染六善好施迴向菩薩言此中有三者即此經中據經文有三種今將經中三種與論中六種相攝經文有歡喜施無猒施善好施此三與論家三種名字同一經云歡喜即是論家歡喜施二經云無厭即是論家無厭施三經云求無上道即是論善好施此經中三種與論家三種名目同便將經家三名攝論家三名言前四事即等者從此論家更有三个名字謂廣大恩德無染論家有經家無即將經三種義攝論家三个名字也前來經中四事施具足論家廣大施經中菩薩施時荷彼受施人恩由受我施令我成檀波羅蜜即是論家恩德施經中菩薩布施之時無悔加行根本後起即是論中無染施也言以飲食施等者此中二意一世間果具以飲食施等者出世果不墮飢饉劫故世間果也言以醫藥施當得等者出世果無諸病故世間果言以臥具施等者世間言入空寂舍等者出世果又前來四事施一一所招皆有理事二果上妙意樂唯約理明也法食名理不墮飢饉名事得法藥名理無諸病名事七寶衣名事具慚悔名理具資緣名事入空寂舍名理然法喜禪悅名為食者資長任持智慧身故法名藥者對治病行故柔和忍辱外境不侵義同於衣捍蔽形體具慚愧者配惡不現如衣蓋故並名衣菩薩安處心於畢竟空及慈悲處故得名舍言以園林施等者具諸功德猶如園苑諸無漏法者生長資茂名之為林七覺是因因能感果故譬於華前苑約體此苑約用故成差別言以菓施得四聖果者問如何大菩薩行施不取佛果取四聖果答四聖果即是羅漢羅漢通三乘有亦名羅漢也又有說但總言四聖果未必一一實取四聖果也言以浴池施等者小乘除色貪大乘除變化障等言初一後得智者經云或有菩薩說寂滅法者涅槃當體名寂滅法有餘涅槃寂障得無餘涅槃寂苦得又云菩薩兩法總是寂滅法若依此後解雖順經違當唱經意也若望此唱經文說寂滅法真如也根本智證後得智中說故名說寂滅法經云種種教詔無數眾生所被根也經云或見菩薩觀諸法性等者此一行根本智也真如是一切法之性也無有二相者離分別執著相離能取所取相名無二相此性之上有相不可得無相亦不可得故言無有二相或云離有無二相名無二相問無有二相似何物答猶如虗空經云又見佛子心無所著以此妙妙慧慧智也此一行加行智求二道真見道相見道求無上道者佛果菩提涅槃也上消經了言法施無盡故者初一行明後得智只此一句疏文便是解說寂滅法一行經文也只緣說法不同生滅法說有可盡也經云從久遠劫來讚示涅槃法生死苦永盡等言迦葉經云等者證說法無盡教雖將財供養不及一法施也言不如法施等者非將法施以如來名為法施但說珍寶供養如來不如以法施眾生令成佛故言次一正智證無相故者經云無有二相言二相者謂分別也者疏主解離分別即能取所取相或云無空有二相名無此二相也言無二相者總指餘經也言如彼三類說等者何名不二法門答疏主如彼三類說不二義按維摩經三十三聖明不二義分為三類第一寶印手等三十一人為一類以分別執心為二無分別理名不二智會此理名入不二此以言遣相此即存言第二類文殊菩薩以彼言說名之為二離言真性名為不二智達此理名入不二此以言遣言名為不二第三類維摩詰假智言說俱名為二法性真如名為不二正智證真如理名入不二此以默遣言名不二法門此即言智俱遣也言地前學作等者問地前菩薩如何得根本智證無相理耶答疏主地前學作有相等唯識九云此位菩薩於安立諦非安立諦學俱觀察為引當來二種見道故及伏分別二種障故此有二種一上下八諦二所取能取皆名安立諦觀也二者非安立諦亦有二種無相真如離諸相故名非安立諦二三心相見道所觀二空境界名非安立非如四諦差別安立故問地前何須作此二觀耶答一為引當來安立非安立二見道故二為伏除分別煩惱所知二障故相國云地前實智但有加行今說學作故通二智也其實此位有無二相當自情故彼論云彼空有二相未除帶也其實此位有無二相當自情故彼論云彼空有二相未際帶相觀心有所得故言後一加行求正等者求正道故此解加行義加功用行求無道先由有加行智折起求二正道即是真見道相見道也由此三智根本正證後智分別加行起求故立三智故有頌云如啞求受義如啞正受義如非啞受義也言照者照由明也言闇於成事者愚人闇於成事智者達於未萌預知前事愚人闇於成事事成了喫始知罪過只緣暗不明也成事即是事成也只為暗昧不分別即有所執犯說向前人令知改悔名詔詔由明也言教無平音者古時字不足如今通交音也言第六段有七頌頌起塔等者唯不頌入滅經所以長行有七頌文唯六經云文殊師利又有菩薩佛滅後供養舍利者大和尚科云七頌見佛入滅起塔供養此初一頌正是頌入滅如何言不述入滅餘六行頌述滅後起塔也初經文不善翻譯正合言文殊師利又見諸佛現般涅槃分布舍利有能改者得福無量假使不改亦福無量且經云佛滅度後供養舍利正是頌入滅也若准疏主科七行述滅度後起塔供養舍利不述第六段入滅又所以長行有七頌文唯六也今疏主義中兩遍科第一遍科初一行佛滅度後供養舍利後六頌造塔供養即後六頌總述長行滅後起塔若爾便有濫若將此間六頌總述長行造塔者經云諸佛子等為供養舍利嚴餝塔廟至其華開敷兩行頌長行中總無也如何六頌總述長行滅後造塔由此科義不盡疏主更作第二遍科也言又七頌分二者第二遍科也初五頌述長行造塔後二頌結造塔勝也若科作結塔勝即科盡也言此初者七頌中最初一行說菩薩供養舍利即當唱經文也此一頌唯明供養舍利不說造塔今供養中有菩薩燒身鍊臂將香華供養也疏主今頌中既別有供養舍利起七寶塔長行舍利也舍利有三一髮舍利二肉舍利三骨舍利白白中有二一粟舍利二靈牙此三舍利一興供養千返生天末後海龍王收將入海宮中供養經劫已後化為如意寶珠上行供舍利了言三頌起塔一頌數者經云又見佛子造諸塔廟等者窣堵波有舍利處無舍利處亦云靈廟似今佛殿言一頌量者經云寶妙五千由旬等言一頌嚴者經云一一塔廟各千幢幡等者貞云一一塔廟各五莊嚴一一塔上各千幢幢植於地周遍高直二一一塔上千幡幡懸之於剎處處從風三一一塔上各千珠珠交則寶網羅覆四一一塔上各千露幔盤結上乘五一一塔上各千寶鈴角乘牽索寶鈴和鳴和者調和也鳴者聲也如來本現世間中品為眾生根性熟所化根緣已度說不可留身住世間令彼靈山大會人意願欲聞甘露法所以同凡現生滅隱却常身入涅槃還令供養佛真身造塔莊嚴極高廣幢幡寶蓋皆千萬天樂和鳴微妙音問何名縱廣答此有二解一云寶塔高五千由旬上下量也橫闊二千由旬即是橫廣量也此則上下曰縱縱五千由旬橫曰廣廣二千由旬若爾如何經中言縱廣正等答向縱五千由旬中減取二千將橫二千等取上下五千中取二千只等上下二千由旬分外一寸一尺不等問廣多少里數上下取二千與廣恰等名縱廣正等問經中云寶塔高妙五千由旬高便是縱之說則合別說廣如何重將縱廣一處說耶答由此作第二解依俗中釋南北曰縱東西曰廣南北二千由旬東西二千由旬故言縱廣正等於此義中便有兩說第一師取一面二千由旬四面計八千由旬南北曰縱縱二千由旬塔西面西稜南北量有二千塔東西東稜南北量有二千縱中兩面合計四千由旬名縱也又橫者北面東西量二千南面東西量二千橫中兩面合說有四千由旬也經文且據一面說縱中取一面橫中取一面故言縱廣正等各二千由旬第二師解塔一面只闊一千由旬四面計四千由旬假如縱中東面東稜亦爾兩合說縱有二千若橫則還兩面東西量一千北面東西量一千兩面合說橫有二千故言縱廣正等二千由旬兩義中前義為正經云縱廣正等各二千由旬也上消經下解踰言菩薩地說等者明造塔多少等言當獲無量等者明造塔果也增一阿含經云一閻浮人福等一輪輪王王及閻浮人福等一瞿尼人福如是四方人福不如一六欲天人福如是六欲天人福不如一梵王身福比丘問佛梵福多少佛言無量無邊菩薩藏經說譬如水交下至金輪上窮梵世滿中皆水假使有人以一牛毛竪分三分取一分來點大地水盡梵福不盡有人問云造塔散心如何惑得梵福耶梵福必是定業所感答約相分別先由造塔供養聞法生得聞慧聞慧生也已自此得生上界第二解不要生彼天受果名梵福但欲界四洲受果殊勝與梵福相似亦成梵福亦與佛果以為資糧此有漏梵福與無漏梵福為因佛是無漏梵福也言梵云瑜繕那等者解由旬義也大乘世界從識所變小乘世界從極微所成言俱舍頌云極微微金水等者正辨之也一者極微此七極微成一微塵七个微塵成一透金塵七个透金塵成一透水塵七个透水塵成一兔毛頭塵七个兔毛頭塵成一个羊毛頭塵七个羊毛頭塵成一个牛毛頭塵七个牛毛頭塵成一个隟塵七个隟塵成一蟣七个蟣成一虱七个虱成一麥七个麥成一指節橫布二十四指為肘量一尺八寸四个肘為一弓量計七尺二寸五百个弓量為一俱盧舍有二里計七百二十步三千六百尺八个俱盧舍計十六里為一由旬也言若依餘經等者以彼西國人王行程十六里故多取之若庶人行程三十里四十里不定上解寶塔高五千由旬言縱音等者解縱廣正等二千由旬古時字未足縱字是足容反從由長也今時字殊邊作為正切韻有三縱縱長也蹤跡也䡮車轍跡也樅然亦通縱音呼有疏本作從字廣由橫也問何名縱廣答不得約上下論縱廣前言寶塔高妙五千由旬已說上下量也今但依地面上東西南北說量韓詩外傳云南北曰縱東西曰廣此則方所決定疏主意不約方所但約人身上說縱廣也若向東西立向西者看塔即東西論縱南北論廣人若向南邊立向看塔即南北論縱東西論廣言露謂不覆等者明幔覆也經云一一塔廟各千幢幡珠交露幔此則蓋著處名覆蓋不著處名覆也言此明報土寶塔等者塔量廣大个數又多此是上位菩薩所見一个塔量五千由旬況乃至無數故知是報土中塔也言不爾此洲等者變成是報土中塔不爾此洲南閻浮提著一个塔不得況此南洲誰安多塔耶問此解東方世界寶塔如何將此洲安塔不得證耶答此方穢土南洲安不得變顯光中穢土南洲亦安不得每洲安不二个尚自不約設使四洲安多塔亦不得故知是報土之中塔也但說此方化土安塔不約使是解東方世界化中安土不得也東西雖珠報化佛土佛佛皆同舉此化境不堪安多明知報土方可安矣言有云幔幕等者在上繒綵蓋著處亦得名幔幔幕也言露謂覆露者解露字也前初解蓋著處名幔幔覆蓋不著處名露後解蓋著處是即覆着處亦得名露問著之處如何名露答如猶露木桶緣蓋着之處不得名露即以珠繩交終以御猛風即同諸經珠交露蓋猶終也言有作縵字者應作幔字無文作縵也言結造塔勝等者彌勒菩薩問文殊菩薩言何故諸佛子等供養舍利嚴餝塔廟本來造塔只為供養乃至塔成之後國界自然嚴好種樹本從結果華開樹自端嚴造塔本為供養真身其塔成已國界自然嚴好問由造塔故國界嚴好本從嚴國何開供養真身答疏言結造塔勝等意言華開本為結果不妨樹自莊嚴造塔本欲供養全身何妨國界嚴淨言逈者遠也言第二段有八頌請等者問請字有何來由答下經科文中有推時請答推事請答故此問安請字也言此初也者經云佛放一光此界光也我及眾會見此國界種種殊妙也又云佛放一光此界光也我及者指己身名我也眾會者即他人也見此國界娑婆世界種種殊妙近奇奇者異即放光也言後頌牒見遠奇者經云諸佛神力等者神力者即放光也智光希有故淨光明照無量國土萬八千世界遠奇問釋迦一佛獨放神光何故彌勒問詞乃言諸佛神力答准論所化同異中云所化有情有共所化共者同處同時諸佛各變為身為土形相相似不相障礙展轉相雜為增上緣令所化生自識變現謂於一土有一佛身為現神通說法饒益故得言諸約眾生論即言一佛或據神力無二故言諸也言初頌牒自他之兩見者經云我等見此等者我字指自身也等字指他攝取云四眾八部名自他兩見也佛子文殊願決眾疑也文殊語彌勒大眾見放光何故獨自出頭惱事言語汝何以不問諸人耶彌勒答云不是我獨自欲得問大士我亦不自由經云四眾欣仰瞻仁及我是化四眾八部意也瞻仁欲得仁者答也瞻我欲得我發問所以更不著別人我亦更不問別人也問云世尊何故放斯光明即同長行挾自他之兩意也自見他見為一个二事此彼瞻為兩个二事問何故此間偏說放光明答意表放光正是說因也言此初也者一頌推時請答也亦是文殊答放光也經云佛子時答決疑令喜等者演者水長流貌光從此至彼也名演今此一頌推時請答也文殊語彌勒言待世尊出定來自家說法云何要預忩忩彌勒言早晚待得世尊出定只如大通佛入定八萬四千劫釋迦如來忽若如此何待得耶彌勒語文殊言佛子時答獨紹法王之位故名佛子時答時中有二意一道菩薩知時與答善知時者名大法師二云時者正是眾生渴仰時更是菩薩為答時眾生見今仰渴菩薩正是答時正是鷄子作聲時便是鷄母啄破時正是大眾懷疑時便是文殊為答時經云佛子時答決疑令喜眾人有疑心懷不樂眾人疑斷方始歡喜欲得歡喜事須斷疑也何所饒益演斯光明消經了言四眾忻渴等者即是願樂欲聞即是決疑令喜意四眾若不忻仰不堪聽聞大乘既生忻仰方堪為說勝道即是說經也言正是時者正是四眾堪聞法時便是菩薩為答時言凡說法者必逗者逗者留也住止之義意言說法必須令住法止有情身中今時會欲聞必須為說名逗機也事須得謂渴仰心方說法也言初頌推二事者經云佛坐道場所得妙法等者彌勒語文殊莫相邀勒我自惻量者十中得八九今日雨華動地不越兩途一則欲說解脫中所證之法二則與聲聞授記經云佛坐道場所得妙法一乘果也為欲說此為當授記一乘因又云坐道場顯一為當授記破二也文殊語彌勒汝若說得但自說何要問我彌勒答言我奄含說即得若定通說法授記即是不得我尋常塵事即斷割得今日是極大之事事須得大士答餘答不得言後頌明事極大等者問爭知是大事答經云示諸佛土眾寶嚴淨及見諸佛此非小緣若說人天果二乘果名小因緣二乘之人行處不廣不名大事今是一萬八千个報化國土極大因緣故云此非小緣頌云又見諸佛土以眾寶莊嚴琉璃頗梨色此由佛光照若見報土琉璃為地黃金為繩七重欄楯七重羅網水鳥樹林念佛念法若見佛便是報身佛目如四大海水等若見小化土一切眾生生死業報處便是四大洲日月等問此等佛身依何等土答唯識十云自性身依法性土然隨事相其量無邊譬如虗空遍一切雖此身土體無差別而屬佛法性相異故意言屬佛名身屬法名土屬佛是相所以名身屬法是性所以名土受用身還依自土周圓無際眾寶莊嚴自受用身常依而住他受用身亦依自土隨十地菩薩所宜變為淨土或小或大或劣或勝前後改轉他受用身依之而住若變化身依變化土隨未登地有情所宜化為佛土或淨或穢或小或大前後改轉佛變化身依之而住問何故前偈云眉間光明照于東方萬八千土皆如金色此間言示諸佛土眾寶嚴淨答此約本質本質眾寶嚴淨彼處約佛光照皆如金色示現佛國土清淨言正請彼答等者經云文殊當知四眾龍神瞻察仁者為說何等問何故前言瞻仁及我今此但言瞻仁答前言瞻我忻我問何故眾人瞻我我既問了唯獨瞻仁希仁答決眾疑網疑者猶豫兩端或進或退喻如於網網羅眾生也問何故釋迦放光彌勒問文殊答言意顯過去未來現在三世佛同在靈山開發大乘也釋迦是現在佛能放光彌勒是未來佛故能問文殊是過去佛故能答也言論云文殊師利以宿命等者初依論略標出文殊答意也宿者宿世境在過去住宿世中菩薩智能一一觀之能緣之智名宿命智也現見者分明見也現量見名為現見也因果相者即是因相也此之因果並約妙光一身上立也謂妙光身望前為果望於後後迄至文殊身及菩薩提果為因也妙光前是因中因妙光後是因中果佛菩提是果中果也言成就十種事等者問十種事中八大義是靈山會上事如何亦名過去答只八大義文殊過去亦曾見所以今日指來亦名過去也文殊師利過去二萬燈明佛時為妙光法師十種事一一親證來今日定心之中一一觀見見此十種如現在前是放能答問大乘之義過未無體如何十種事如現在前答文殊久已成佛無上覺者神力難思無形質法而能現起於定心中却能變起分明顯現故名現見十種事如現在前是故能答言非比度非搆等者疏主解非比量非搆虗非量即顯文殊菩薩現量心也問將今證古將古證今又經云我於過去諸佛曾見此瑞斯光即說大法是故當知今佛現光亦復如是又云我見燈明佛本光瑞如此以是知今佛欲說法華經何言現量答菩薩定心唯是現量今引過去佛比今日事為言生因作生起之來由事須引過去與今日同證從此發言答諸大眾眾聞疑斷以為此發言之處實是現量也問既是現量如何言如我惟忖答示相故示非是實也是菩薩謙讓之詞順世間故且言惟忖非是度也疏主結云故非搆虗能答也定心緣境是現量故問如鶖子記云白額及生乃是尾白故知地前小聖及二乘定中緣境不必皆是現量亦有定心非現量故答但是定心有有細非是非量如眼緣色總聚而知豈得便言此是非量故離比非由自證解發言申宗故是言生因故因明論云為自開語當知唯是現量文殊為眾生立量云今佛釋迦是有法欲說大法故宗因云現大相故同喻如燈明佛燈明現大相燈明說法華釋迦現大相彼同燈明說法華也言論云因相者文殊自見等者引論解因相也佛土不一故名彼彼即是三大阿僧祇劫於五河沙佛國土聞法修行名彼彼於十地受用土中聞法修行名彼佛土修菩薩行二云彼彼佛土者文殊菩薩自見己身於過去二萬佛燈明會下歷事供養佛土不一故名彼彼言修行是今時等者菩薩見自身當時修菩薩行是今時文殊菩薩因只因當修菩薩行感得今日文殊身故言今時之因問既與文殊菩薩為因如何疏主下解言菩提因行故答攝云文殊菩薩久已成佛示現作菩薩與今日文殊為因即是菩薩因行也故有頌言昔為能仁師今為佛弟子二尊不並化故我為菩薩都有三解一作三世解一文殊菩薩從日月燈明佛已後來並過法華會已前總名過去當來所成普見佛身名未來從法華會已去直至當來未成佛已前名現在文殊菩薩自見己身於過去彼彼佛土修菩薩行與今日現在文殊菩薩作菩薩因行即是菩薩身中菩薩之因行二云過去所修因行與今日文殊菩薩身為因亦與當來普現如來身中為因行也恰似一因感兩个果三云文殊菩薩自見己身於過去世修菩薩行與何誰家為因答是文殊菩薩成佛因行此解總與文殊菩薩作成佛之因行總望普現如來佛果說上解因相門言果者過去所依等者解果相也過去所依身體六度萬行說法華經為能依也三科法為所依自即是妙光法師身也言論云文殊自見己身等者論主解也過去曾作妙光法師於彼彼佛所聞此法門者日月燈明佛邊聞法華經轉為眾生說即是經云八十小劫為人演說也論解果相言是前前世過去等者疏主解果相此果是妙光法師身望何誰為果答是前前世五戒十善為因妙光身望五戒十善為果也答前前世修行自是佛果因也今生妙光身前前世是持五戒因出家之果也疏非是所見因之果也妙光法師於過去二萬燈明佛邊聞法華經轉為人說名所聞見因此聞見因家所感果即是今生文殊菩薩身也恐人錯認五戒十善果是所見聞之果所以分疎言彼因者是等疏主雙科簡因果彼因即是今時佛果因也五戒十善之果問文殊菩薩何要見過去因果相有所以耶答妙光法師身乃是多生積集方感妙光身於此身始得聞法華經當時妙光由持法華故成得文殊菩薩此因果相皆是經力所置表此經不思議是故偏說果相言彼果者即妙光身通因果將彼妙光及果皆是今歡喜藏佛之因今此成佛皆是果言此即初也者初標名總告也經云爾時文殊師利至善男子等者具十一種德方名善男子一具足慈悲二三業無失三親近善友四不顯己德五隨順眾人心六不說化過七不求名利八但樂道德九自業清淨十心貴實相十一輕於染法言然依論本此答之中等者初配十因問十因從何處經文生答從今佛世尊欲說大法雨大法雨至放斯光已即說大法於此經文處生也問得知答天親解云文殊菩薩以宿命智知現見過去因果相十種事如現在前是故能答若不見此十種事因何能答言現見大義因等者若准論文十因之中皆有成熟字疏引文略也現見者分明見彼八種大義今能答也現見大義即因持業釋下准知言現見世間文字章句等者問如來無漏聲上建立如何喚作世間文字世間可破壞義答有三義一對治有情世間故名世間文字二約佛本質教是無漏今約影像教有漏識變名世間三借世間故名世間文字屬他世間借他世間文字顯出義故名世間文字已上三解違疏疏自云戲論名世間也一有分別戲論無分別名不戲論二言說皆是戲論總名世間文字問世間文名何其深意答世間文字本非甚深被如來意排比著二乘不測也一種是文字不解作詩排比不得甚深被一个解作詩人排比便甚深也故意名深即說教所以也言現見希有因者即是讚時久遠希讚佛名號希讚法勝妙希讚生利答希言現見勝妙因者即是名同妙名日月燈明姓同妙姓頗羅墮號同妙十號具足法同妙初中後善言現見受用大因者即在家受用五欲樂出家受用法樂言現見攝取諸佛轉法輪因者問佛滅後法輪誰人攝得答妙光菩薩攝得攝受領納之義如講座主學人攝受也言現見善堅實如來等者妙光教化八个王子令其堅固阿耨菩提堅實者不退義於如來法輪向上更無退轉言現見能進入因者即是燈明八王子得大菩薩名進入也進者進取入者證入即是八王子皆成佛也言現見憶念因者問十因總是文殊憶念何故唯第九因偏得此名答有三意一文殊憶念著彌勒為求菩薩名二憶念著八子聲後成佛名曰燃燈燃燈是釋迦和向三憶念著自身為妙光法師緣前八因中八子未有名字今此因中成佛故名憶念相也言現觀自身所經事者以文殊自身受勝妙樂即是自經妙光法師之事言因者所以義等者解因者因由以義十因總與法華經為所以也言或此十事等者即是少分屬現在也十因中七全二因少分在過去也一因全二因少分在現在也第一現見大義因全在靈山第二第十中少分在靈山第二經云我於過去諸佛曾見此瑞放光已即說大法此是過去也是故當知今佛現光亦復如是此是靈山現在也第十中爾時妙光菩薩豈異人乎往世也我身是也現在也求名菩薩往也汝身是也現在也言此十因中總為五等者辨其五對一義教對即八大義所詮義也教即世間文字章句甚深意因二希勝對希即希有勝即勝妙三轉嗣對轉者轉法輪是時日月燈明佛說大乘經名無量義教菩薩法佛所護念𭃴者繼嗣即佛滅度後妙光菩薩持妙法蓮華經八十小劫為人演說即是攝法輪故為嗣也二者八个王子在俗各領四天下為轉輪王非一時王位展轉相承名轉於遠反轉也亦通轉次之義於怨反八子出家成佛了第一王子與第二王子授記第二王子與第三王子授記云云亦有云傳嗣各領四天下相繼嗣也此解違論家科文名目四堅進對堅即善堅實如來法輪因進者能進入因也五他自對憶念因約他自身所經事約自也他即彌勒自即文殊也言此中總分為四者疏主束論家科文中十因就經家四答言一示相籌量答者文殊實知籌慮量度而答現見大義因下言二舉古成今答者謂舉昔燈明為能成今釋迦為所成現見世間文字章句其深意因言三指陳別事答者指燈明事一一別陳攝七因言古今相即答者現見自身所經事因將全就古今文殊即昔妙光將古就今昔日求名即今彌勒言今此即示相等者經云如我惟忖等者思也忖度我試思惟忖度者據此瑞相今佛必欲說大法欲雨大法雨吹大法蠡欲擊大法皷欲演大法義也言論名現見大義因等者金云此明文殊得八大義之意況來由也言經有五句等者論牒梵本經有八句此間什云譯經只有五句今疏主解他論中牒底經不解他此間經此間經闕不足故不解也依論解八大義如疏引別易知言論主第七方說不斷等者就疏主解中八大義次第與論解不同論主解第七是不斷大法皷疏主改為第四者意緣八大義最後雨今是果法前六今是因若論主將不斷大法皷向第七中安著共第八果法一處因果雜亂所以改移為第四順因果及鈎鏁次第也此上依疏主排化次第別也言今以義推等者立道理論中第七方說不斷大法皷今以義推故第四說亦不相違言從初變者昌為變平音呼也上解八大義經論有無也言論云疑者斷疑故者依論釋文鈎鏁相起八大義古人解前二義在法華會前也第一義從大通佛十六王子已後直至釋迦今生成佛已前總名欲說大法三根聲聞昔在凡夫位中也問如何消他論文謂疑者斷疑者答本來是千萬億種皆生疑惑人第十六王子教化發心即是疑者斷疑也問即是疑已破了如何疏云欲破答彼鶖子修行到第六住前疑心依前却生向後欲擬說法斷疑故云欲破也第二義從鹿園已後直至法華會前名雨大法雨從外凡入內凡從內凡入聖也上來古人二義配在法華會前也第三擊大法皷第四不斷大法皷配在法華會上正是聲聞捨權取實第五建大法幢第六燃大法炬令鶖子成佛號曰華光第七吹大法蠡第八演大法義還令華光說法轉化堅滿菩薩此古人兩義盡違疏違論也次疏主解正義八大義盡是法華會上事就八義中初六義令鶖子自身作佛後二義轉令化人成佛就六句中前四在因後二在果或第五通因果乘牛車通因果論云疑者斷疑疑者即是鶖子四十年有舊疑聞唱二種甚深三根聲聞皆有斷疑故名疑者問何名斷疑答三根聲聞聞法華經即是斷疑也八大義正指在方便品中正說已下上解論文言即欲說大法者疏主引經文法華經得名大法也文殊菩薩報消息云欲說大法去故先雨華也言欲破先疑等者疏主解也問法華會上即是現義何成先疑答對未破未破已前總名先疑問二乘之人已得聖性何言外凡答攝釋二解一云十信已前名外十信已去名內二云十住已去名內凡十信名外凡今三根聲聞准疏中意取十信已前名外十信已去名內今聲聞人去十信位尚遠總名外凡也言已斷疑者增長等者智身即是本有種子純者淳一朴之義意言迴心已後當入內凡六度亂修智慧淳熟即同迴向大便名假用出義然實用出在見道中言即雨大法雨者文殊答彌勒云如來放光欲向後雨大法雨去謂交已斷疑者從外凡入內凡地前一大劫廣聞思熏習身中本有種子令純熟故言先住內凡而等者疏主解也此語倒應云先無疑者住內凡位若論法華會上聞法華未至內凡位未滋萌牙未入聖位此談佛言究竟令入非已實入當必入故如鶖子言安住實智中我定當作佛當必作故問法華會上聞法華經全未入內凡未滋善萌牙如何法華經名雨大法雨答因聞法華斷却疑也然後迴心入內凡位增長萌芽推功歸本因聞法華經所以此經得名法雨也此定在靈山會聞經得益但因靈山聞法華經過五百劫千劫修行時即雖長亦名法華會靈山益雖然却後百劫千劫增長智牙不妨靈山得名法雨也資加二位令入聖位聖位即初地也欲增善故即是漸入初地也言此本論意上下等者疏主結前兩句意道已下諸句如前明生起說法等次第等說也言論根熟等者論家意合解第三第四二句大義也由前廣聞思滋彼本有種子漸入聖位名根熟者問疏主分明說鉤鏁相連即合法華會上最初說根熟聞法華經斷疑捨權就實方入內凡如何今者先說內凡後方言根熟答一往者次第即似不順鉤鏁於中道理排比即鉤鏁也問何因斷疑又迴心能入內凡答只為最先大乘根熟始能捨權取實斷疑修行至內凡也聲聞境界菩薩境界名二密如來所設權實之事意難知故故名密也對能緣心名境也問何名二密境界答三說一聲聞權密境界菩薩實密境界名二家也二者權密境界是一般聲聞菩薩有二故名二密望聲聞有權密菩薩有權密名二密境界問何名菩薩權密答漸悟菩薩恐退入二乘故為說無二亦無三乘也故名菩薩權也問何名聲聞權密答對不定性聲聞聞道無二乘者故聲聞權密也三云先雖作聲聞後作菩薩故會上未迴心前對聲聞名權密境界迴心已去名菩薩實密境界也疏中帶此二意也論文云言即擊大法皷等者配經也不斷大法皷論牒梵本經居第七疏主移向第四安著有二意一緣大法蠡演大法義此二果中間若不斷大法皷文隔便意斷故二云將向第四安著者緣第三擊大法皷是開權不斷大法皷是顯實文勢相故安第四也問何如擊大法皷答有云如來舌根名皷杖也開權顯實教名皷出言音說法名皷出聲二云法華經權實教是大法皷說二乘擊皷中說權名出聲此擊大法皷是開權不斷大法皷是顯實又擊大法皷是捨權已了更不修權如擊法皷一期事一擊了更不擊也不斷大法皷依大乘修行成佛利樂無盡故立名不斷也問開二乘權如何名擊大法皷即合是小皷答亦得名大法皷小乘之人不肯說小乘是權只是大乘中說小權也只此權實法便是大乘名大法皷也上解經了言以遠聞故者論主解也遠聞之言正是解皷義皷若打著遠近皆聞如來說法梵音聲聞遍十方界名遠聞也言次第配之者疏主解也有云遠聞之言不是解八大義但是分疎將第七第四來道理也只緣以遠聞故所以次第配之第三擊大法皷開權第四不斷大法皷顯實先權後實如是次第也從今已去修二空智當來成佛窮生死際終不竭故名遠聞連綿長遠有遠聞之能故居第四言即明今者等者疏主解也開往聲聞乘為權密境界聲聞權也解擊大法皷也顯今所說菩薩乘為實密境界顯實也解不斷大法皷也問聲聞乘如何名密答二乘是權自不知是權名密對於不定性人遮無二乘唯有一乘唯佛與佛乃能知之菩薩乘對二乘名二密也法華經能詮教有二功能一詮權二詮實四十年前說三乘二乘不測佛意名密今日法華會上阿含甚深即昔三教能詮之教即法華經却說四十年前教是權便是法華經開權故此法華經能詮三教開權之處名權密境界即是擊大法皷羊鹿經文證權此法華經能詮教顯實之處顯今菩薩乘為實密境界即是不斷大法皷牛車證實言令根熟等者問佛說此聲聞權實密有何意答疏主令根熟等即令鶖子等捨權取實也言論云入密境界等者智為能入境界為所入謨云即是知二乘為權知菩薩為實見如來昔日教權說三實說理唯一實悟此意起名之為入乃至齊果已來總名入密境界言令進取上上等者謂果中無漏四智菩提超出因中無漏名上又出二乘名上上離障名清淨也今令鶖子等修行進取佛果四智菩提上上清淨言即建大法幢者配經也問前上上清淨義何法是上上清淨義答疏言建大法幢言建立菩提妙智等者疏主解也舍利弗等當得菩提高顯如幢故經云當得作佛號曰華光牛車高廣也言由知權實等者初地已上則名建立修習由來得高顯更經云大阿僧祇劫建立出三界故名高出二界名顯故云極高顯故離二障故名離障無漏故清淨言論進取上上清淨等者無漏名上出二乘上上清淨者即無垢染也文殊答彌勒云如來放光者燃大法炬去也論云進取者修習義也一切智者根本智親證真如現見也言即燃大法炬者配經文證取所證涅槃兼取能證智也燃炬有二義一破闇除煩惱故二顯物照真理故令聲聞等當證涅槃故下經云寶處在近如炬除闇等言既得真智等者問如何燃大法炬是法身理答疏言既得真智等者如堂中本有眾寶黑闇不得見之開門將燈到來眾寶悉皆總見人身總有真理在纏障覆不見真如果中出障圓明法身萬德皆見言如炬照物者喻也照者親見義根本智緣如親得其體名照即是證涅槃也言論云取一切智現見者第七句吹大法蠡文殊云如來放光欲吹大法蠡去取一切智現見者牒前燃大法炬菩提智也言為一切法者即真如也言建立名字等者即是於無言說法上根本智證了後得智安立名句說即是後智說法如證而說十二分教故云建立也言既得真境必須等者意道證理時能證所證義皆向理上證得也諸佛成佛了事須說法教化眾生意顯三根聲聞得果畢須果畢須建立名字如俗樂訖吹大𠼱吼故華光佛得記亦以三乘教化眾生等言曲終滿位等者引喻也如作音聲曲終滿位吹貝知時成佛況曲終吹蠡喻說法也前建大法幢燃大法炬鶖子當來成佛也吹大法蠡即是鶖子後得智說三乘法轉化堅滿菩薩也燃大法炬即是根本智證理言論云建立名字等者說三乘法也言令入不可說等者即是令所化菩薩等入初地已去證遍行真如名不可證智即是妙平二根本智冥契理時即此正智名不可說本智證無說法後得智為眾生說名轉法輪言即演大法義者演者流演交不定性聲聞迴心向大為說大乘名演大法義言說於教等者疏解也即是華光佛所應度者即是堅滿菩薩還令堅滿菩薩入於證智證真如成轉法輪摧於煩惱夫佛說法令生有益一令自得果即前六義二令他成佛即後二義經云號曰為淨身當度無量眾此唯說得聖已後行法輪也前六中前四是因五六是果或可第五通因果謂乘此寶乘至道場等上解約鏁相起了言此八句中等者束八成四對也一破惡進善對者欲說大法名破惡雨大法雨名進善二開權顯實者擊大法皷開權不斷大法皷顯實三得智證真者建大法幢得智燃大法炬證真四說法利生者吹大法蠡是說法演大法義是利生言如是循環名為法輪自既得果即是華光欲令眾生證聖真智即堅滿也論既鉤鏁解經故此以相乘為對言可披解意者謨云可披覽此前來義理會解其意此即自悟也後人可披覽疏知我解此經意尋釋來由即悟他也意言尋計八大義之來由況詳可披解意披解此相承為對之意尋此義理以為法輪不斷之來由也前解音鞋上況解音皆上言破惡進善者欲說大法破惡欲雨大法雨進善也說法利生者吹大法蠡說法演大法義利生擊大法皷即權也言自餘顯實等者不斷大法皷實建大法幢得智燃大法炬證真也
