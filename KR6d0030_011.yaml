body:
  text: 鏡水寺沙門栖復集言此人王衆者即第十五人王自衆也言佛以住此王城等者問靈山會下萬億輪王而此阿闍位居粟散何因列衆獨自標名答疏言以佛住此等當日如來説經處國主是化闍王故先列又佛滅後為結集主所以闍王偏舉也言梵云吠題呬等者吠題呬唐言勝身弗呾多唐言子也即是勝身之子古思惟子以母思惟十六觀門勝法聞思教勝故言思惟子二者父母思念而乃養之名思惟子此乃約子上説也西國有父勝者子依父標名母勝者依母標號此母子雙列即母勝也今云吠題呬此云勝身形教勝故立名也即東毗提訶州名同非就彼東毗提州乞得問若爾何名勝身答西國自有勝身山山中神依山立名名勝身神韋提希從彼神邊乞後名勝身也若言何即是男聲若言呬女聲中呼女養後一子母子雙舉名韋提希子吠題呬即正梵語韋提希即訛語也言梵云阿社多等者阿之一字同也闍社二字相近略却社字言闍也設世二字音相近略却設字空言世也并出路都略三個字也留三個字訛略云阿闍世非唯訛亦略也言未生以前已結等者昔摩竭陀國有王名曰頻婆娑羅寶位既登儲君未有社稷無嗣每事憂心乃召相師問曰三個夫人中何者有子答少壯夫人當有子息相師賀曰王有一子又復是兒今在南山修習仙道命終之後當此受胎王聞大喜後時思惟我命短促仙命延長豈有長壽仙人與短命國王為子不如殺却早得生來遂出兵馬入山狹獵王有敕曰圍合之際有異人物輒不得傷當時聞奏于時果有一人左右引至王所乃責曰汝是仙人深山習靜何得不相回避犯我軍威令朕畋遊一無所獲宜付所司斬仙人臨刑而誓曰不曾相犯橫見無辜怨恨不捨王既煞訖火急歸宮將謂仙人已居夫人胎藏因緣未會尚未有孕更召相人問其所以相師奏曰此人宿因未合即生此處今於王苑內為白兔身十年後彼兔命終方為王子復作念曰人食白兔尚得延年況白兔身早脫肯死又欲速生宮內遂入苑中遊獦有敕令有得白兔者奏王既得兔已置在袖中遙見提夫人報言太子來也夫人欲生太子想安置宮中日夕愛玩野蟲之意不樂在人意其惶怖夫人遂安板上以針針之於是命終託胎腹內與王為子王又召相師問其所由相師奏王曰王抂害此仙令他中夭今為白兔王又煞之雖與王作兒終當煞父害母王曰本求子息欲令相紹若為怨者何用子耶遂敕夫人於百尺樓上平安此子此子是女即留是兒便宜撲煞既生之後是一兒夫人依命遂擲樓下惡業之故唯損一指遂於宮內收養後年長大自見指折不知其由遂被提婆達多造逆擬損害如來勸説阿闍世交令造逆具説折指之因由阿闍世乃嘆曰本為父子同立家國骨肉尚自猜嫌他人如何輔佐遂行大事謀害父王奏王聞王聞言恐子要其國位乃却位與阿闍世無犯寶位常懷殺父之心時時仗釰入宮有懷反逆門家搜獲逐阿闍世隨順調達惡友之教收執父王頻婆娑羅幽閉深禁制諸群臣輒不得往經三七日問守門者父王今者猶在耶守門人白言大王國大夫人名韋提希恭敬大王澡浴清淨以蘇蜜和用塗其身諸瓔珞中盛蒲桃漿密以上王爾時大王食飲漿求水漱口漱口畢已合掌恭敬向耆闍崛山禮拜世尊而作是言大目乾連是吾親友願垂慈悲授我八戒時目連如鷹隼飛疾至王所日日如是受王八戒世尊亦遣富樓那為王説法如是時間經三七日王食蜜得聞法故顏色和悅時阿闍世問守門者父王今者猶存在耶時守門人白言大王國大夫人身塗蜜瓔珞盛漿持用上王大王大目乾連及富樓那授戒説法日日如是不可禁制時阿闍世毀罵聖人我母是賊與賊為伴沙門惡人幻惑呪術令此惡王多日不死即執利釰欲害其母時有大臣名曰月光聰明多智及與耆婆為王作禮白言大王臣聞毗陀經説劫初以來有諸惡王貪國位故煞害其父一萬八千未曾聞有無道之君害母王今為煞逆之事汙剎利種臣不忍聞是旃陀羅不宜住此時二大臣説此語竟以手按釰却行而退時阿闍世驚怖惶懼告耆婆言汝不為我耶耆婆白言大王慎莫害母王聞此語懺悔求赦即便捨釰止不害母勑語內官宜閉深宮不令復出韋提希被幽閉已愁憂憔悴遙向耆闍崛山為佛作禮未舉頭頃爾時世尊在耆闍崛山知韋希女之所念勑大目乾連及以阿難從空而來佛從耆闍崛山沒王宮出時韋提希禮已舉頭見世尊釋迦牟尼佛身紫金色坐百蓮華臺目連侍左阿難侍右時韋提希見佛世尊自脫瓔珞舉身投地求哀懺悔白言世尊我宿因何罪生此惡子世尊復有何等因緣與提婆達多共為眷屬唯願世尊為我廣説無憂惱處我當往生爾時世尊放眉間光其光金色遍照十方無量世界還住佛頂化為金臺如須彌山光臺之中化出十方淨土韋提希揀得西方淨土白佛言世尊我今樂生極樂世界不樂餘方時佛為説西方十六觀門時從此韋提希得生淨土故言未生已前等言由造逆業聞小等者依小乘懺悔顯小乘力劣即阿含經云懺悔已後由墮拍毬地獄後得緣覺果問何名拍毬答如耀毬到地速起名曰拍毬二云墮地獄速疾名拍毬此亦名孤獨地獄路云許生身受闍王當日未死已前受不失王身也言涅槃經云等者次依涅槃經懺悔鄣罪實滅涅槃經云闍王遍身生瘡自羞身瘡不向佛所耆婆再三勸知交發心又世尊知已放月愛光照闍王家照身瘡苦息方至佛所而得解脫問闍王早晚造逆到涅槃經會上始身瘡發答説法華經列衆處早不説頻婆娑羅王明知早造逆耳也問何故經如許時身瘡始發答內心不悔身瘡不生內心才悔身瘡始發造逆業了至法華會聞大乘經熏習始知所造業過非所以生悔內心悔為身瘡因身瘡生為滅罪本也言又有經云等者即普超三昧經表其示現問緣何前小乘經懺悔由墮地獄涅槃經如何不墮答前約五逆罪重小乘經力劣懺悔罪不滅盡猶墮拘毬地獄涅槃言總盡者表大乘經力不思議問普超三昧經第三云阿闍世王所入地獄名賓吒羅既是大乘何故言猶墮地獄答彼經説懺悔已後由墮地獄者此是示現非是實有顯五逆罪重受業決定懺悔難滅由墮地獄令未來一切衆生皆敬重父母不造逆業問爭知普超三昧經是示現耶答準道理是化相若不爾懺悔已後得柔順忍後入地獄未曾有四立六地菩薩入地獄故知是示現又有云闍王見佛聞法已隨順佛教心善調順名柔順忍非是證理名柔順忍故言示現又彼經云阿闍世王從文殊懺悔已後得柔順忍命終入賓吒羅地獄才入即出生上方佛土得無生忍彌勒出時復來此界為不動菩薩後當作佛號淨戒如來故知示現也言列衆中第二明其儀軌等者即是見佛之儀軌也辨又十五衆中第二段禮佛屬前列衆中一處收有説將禮佛向他後威儀中一處明此非也禮佛但是見佛後論家第四段威是聽法威儀尋常見佛事須禮拜但是見佛威儀非聽法也後唱是論家威儀此疏家威儀也乍觀文勢似空説韋提希子阿闍世王并相隨眷屬禮佛此通明十五衆禮佛也言尊敬情深等者問何名各禮佛足答疏言尊敬情深等增一經云禮佛有五功德一得身端正二得好音聲三生豪貴家四為人恭敬五必定生天問支體相好皆可歸心何故禮時要假於足答人之在世頭圓象天足方象地頂足便象天尊地卑以至尊之頂禮至卑之足欲表慕法情深渴仰殷重故言尊敬情深按西域記説禮者致敬之總名致敬之其儀有九一發言慰問二俯手承敬三舉手高揖四合掌平拱五屈膝六長跪七毛膝踞地八五輪俱屈九五體投地九儀始成一拜此方書傳説拜亦九猒繁不録也言方受正法等方者欲也欲聽正法故退坐一面一面者解上法也今準曲禮云授立不跪授坐不立住住恐煩尊者俯仰也授付授也或受領也授事既爾受法亦然如來坐談是故坐聽退坐方面表受正法正面稱方立必方不傾側聽問但云豈乖方面答人坐己立不問佛坐衆立何妨聽受答説聽二徒理須相順高下雖然有異坐義則必皆同仲尼談經令曾子復坐耳言上來列衆等者辨兩處科別者論家疏家科文到此相逢辨差別也疏主只合道衆成就中文分明為二此下明佛所威儀疏主不合道言上來列衆列衆早隔一重禮佛科文使用已訖令更言列衆諸抄皆説疏主錯其實剩兩個字也若準疏主科文當第二段初明十五衆後明威儀前來禮佛是入道場之威儀今此聽法威儀若準論家科文一數二行三攝功德四明威儀當第四段也言四衆者古云等者明四重解義緣經中有四衆且古人解四衆者梵魔沙門婆羅門也梵是色界天中勝魔是欲界天中勝沙門是出家中勝婆羅門在家中勝梵魔天中上首沙門婆羅門人中上首言顗師云等者即智者大師影響衆即八萬大菩薩并分身佛在座默然不是啓請又不是當根默然而坐影餘人也有質之處皆有影有響世尊行處皆有八萬大菩薩如説王來必有臣從二云影響者不實義有二義一者身不實二者聽不實且身不實者八萬大菩薩身在十方淨土受變易身今此間現化身從實身上來那箇實身如聲如質此間身如影如響謂時從佛故現身身不實也二者聽不實八萬大菩薩并多寶分身自解了何要聽謂引靈山一會聲聞交聽聽心殷重此衆唯約聖者説收他凡夫不著疏主亦不取言二發教衆等者文殊彌勒名發教衆彌勒三請如來為説三身功德等因請方説名發教衆四句分別一發而不當根文殊彌勒等二當根而不發即中下聲聞三亦發亦當根即鶖子是四非當根非發教即五千退席者是言三當機等者八品為正宗當鶖子等二千人根唯是當聲聞下流通分十九品當文殊彌勒等是問鶖子既為發教與當根何別文殊等既為當根與發教何異答此中不分停止但是在會聞經獲者總名當根也言四結緣等者靈山一會凡夫聲聞聞法華經總未悟解且與當來悟解為因又三根聲聞是當日二萬佛時結緣者宿緣深故三止不退又法師品初四衆八部皆為授記即是結彼得度因緣乃至一句偈等言又有四謂聲聞菩薩等者安國云聖者二種謂聲聞菩薩凡有二衆即客舊二衆當處八部等名舊餘國天人但客金云舍利弗目連上茅城住名舊阿難那律迦毗羅城人名客又文殊是天竺梵德婆羅門家生名跋陀婆羅是摩羯陀國人名舊妙音普賢名客上來三解四衆疏主總引將來皆有道理不破疏主只取經中四衆既有何假遠求也言然此後文又觀等者問前列十五衆色類既多何故聽法來事須作人形人形之中不越四衆攝盡也言周回曰圍者問何名圍繞答疏言周回等但坐匝相續著名圍若坐百匝千里名繞言進財進行者問何名供養答聽法之人進財進行名供行相則易有所攝資名養行相則難師僧受施喫了資長身根大種發識明利攝者領納義資者資益問佛身金剛不壞永離段食何要資益答自受用身無人可見亦不要段食今此化身示現受食資益此上解皆非金云進財行之時如來許可攝順佛之教修行名資不違如來言教便是資益佛義言修謹曰恭等者問何名恭敬答疏言修謹曰恭點一畫謹書時人喚真書作謹對佛如臣對君如子對父故名修謹曰恭問何名敬答崇仰曰敬者高山仰志瞻佛亦然想佛若在靈中自身由如泥下意想雲泥有異故言崇仰曰敬言敬甚曰尊等者問何名尊重答敬甚曰尊敬淺於尊尊乃重於敬故言敬甚曰尊解尊字問何名重答尊深曰重尊則淺於重重則深於尊故言尊深曰重言於理談美曰等者問何名讚嘆答是理談美曰讚稱理而談故名是理若欲凡夫德多不稱理故不名是理也容顏甚奇妙故言是理也問何名歎答觸事諭德曰歎將世尊比龍象牛王師子故名喻德舉自對情名觸事諭喻音諭由曉也明也東宮太子有諭德宮言論牒經同此等準上引論文之中具足四段文及至論家牒法華經則無前後義若爾菩薩造論事須依經經文既無如何論中即有前後義答緣經梵甲從西國在前來羅什譯經早見衆圍繞更著前後義似重所以略却也論梵本在後來菩提留支譯論依梵本譯故有前後義及至引經文處三藏見此間經中無前後義所以論中所引經亦不著是此意也讀疏應云論牒經三句為一句同此經之中無前後義即分明也意道論中所引經亦同此經無前後義言今準應言爾時等者正當論文言其前後等者別解前後也言望一一人皆有等者此破古人義南邊人坐望南邊為前北邊人坐望北邊人為前南邊為後此向佛身上説前後便是南北東西處為前後也佛身不共功德無前後今疏中意却向聽人自身上説前後眼所見處向衆生身上説前衆生眼隔那邊不見處眼不見處却向衆生身上説後面向處即是眼見也即以八十種好中第五十八唯向不背好也即維摩經云各見世尊在其前斯則神力不共法大品經云是時三千大千世界及十方衆生各各自念佛獨為我説法不為餘人又彼論十一云佛有二種神力一者一處坐説法令諸衆生近處皆見遠處皆聞二者佛在一處説法能令一一衆各自見佛在前説法譬如日出影現經云為諸菩薩説大乘經等者紀國云為諸菩薩一句簡根説大乘經一句授藥名無量義一句立名教菩薩法一句顯意佛所護念一句成就未説無量義經不知早晚説法華經但説無量義經了便是説法華經時至十方諸佛果去未取現在利生方便總同未有説却無量義經不説法華經者也辨云自下五成就皆發起序發起正宗故初淨語言説無量義經是語業次整身意即是身心不動是三業內肅則毫光外發也言略有三義等者問何名時至答疏言略有三義等一者依人先為菩薩説却無量義次則合為聲聞説一乘此則從大向小為時至先為長子次為中小故約人論次第也二依利利他教理説了則合説自利行果不可説利他也不説自利故利他教理與自利行果為時至問菩薩如何不為説行果答菩薩已能行一乘因趣一乘果不要與説自利行果緣所知障未盡於教化利他門藥病未能精審故須説利他教理聲聞之人自疾不能救唯説自利也問何故教理兩法名利他行果二法名自利答利他門中事須與説教教下悟理依理起行行取果向行果向上難作利他行相故不説三依法者無量義經是體法華經是功能先談體後説功能故體與功能為時至成就五義同故一宗同同是一乘為宗二名同俱名妙法蓮華三時同皆四十年後四處同同在靈山王城鷲嶺五根同鶖子等同聽此法故問金云既五義同莫下無量義經便是法華經答由少義殊故判為時至者問將陳遺教先説涅槃彼例此經應名時至答三世諸佛將説法華經前説無量義經決定遺教之前説涅槃不決定若準金城意兼取般若經少時為時至亦得問何不取諸經為時至空取無量義耶答若有人問法華經以何為體即答之以行果為體若有人問法華經以何為宗即答之法華經以開權顯實為宗開權顯實唯在教上有不在行果如來四十年前説教唯是對根不對理説緣四十年前大乘根未熟將教就根論根三教亦三法華會上大乘根性熟將教就理論理一教亦一二乘之人不知如來隨宜方便之意便執二乘究竟不肯回心大乘如來所以向三根聲聞前顯説我四十年前鹿野苑後直至法華會前總是權説佛本來從淨土裏來意不為衆生説大事因緣欲擬説大事事須得他捨却權心方堪為説所以説無量義經本來為聲聞若不為聲聞為菩薩者何不向十重他受用土中説既將向穢土之中説來明知為聲聞説聲聞在無量義會下坐世尊與説隨生性欲無量又云無量義者從一法生我莫有菩薩佛分亦作此心便與法華經為時至如來觀知所以從三昧起唱二甚深一切聲聞辟支佛所不能知我四十年前方便隨宜説又譬喻云我以無數方便所以鶖子三請如來為説示悟教權説三今日得悟教權説三還由無量義會下聞隨衆生性欲故教為時至也上解成就所因將無量義經與法華經為至有三義一聞無量義微有捨權取實心只此心為時至二四十年前執自乘為究竟聞無量義經有捨小取大心只此心為時至三無量義經會下體出蓮華法華會上用出蓮華體出與用出為時至言大乘經者解通名中初解總句十二字略標也有二解一者大乘經一句與一切大乘經為通名二者但對無量義經餘十七個名為通名也前解大寬後解為正經通十七個名總名大若準梵本法華經文一句總十七句別若依秦經一句總餘三句別上略標言十二門論六義等者廣解也六義解大也言一出二乘者謨云出生故名大金云出過故名大二乘唯出生空故大乘二空理智出於二乘故名大也能出故名大也言二佛乘最大等此乘能至大果故因行當體不是大能至大果故故名大三乘總有果佛果菩提名大果小行三生六十劫四生一百劫不到唯有六度萬行名乘此乘能至大果果名為大即所至故名大也言三佛之所乘者如來五蘊假者身名大人所得清淨無漏四智心品名乘佛為能乘智為所乘所乘不合名大大人所乘故亦名大如天子馬名御馬此所乘故名大也言四能滅大苦等者約功能名大問何名大苦耶答五苦八苦無間地獄三途之苦雖然極苦佛言不名大苦分段變易二種生死之苦津無其涯岸名大苦大即是苦簡二乘人唯生空智唯滅分段今此菩薩無漏智能滅二種生死大苦與彼衆生菩提涅槃名大利樂言五觀音等者十地菩薩名大士六度萬行是所乘所乘不令得名大是大士家所乘亦名為大也言六能盡諸法等者安國云説文云源水源本也二説一云有為名源無為名底如來後得智知盡有為源根本智證盡無為底有為名源修盡名盡無為名源證盡名盡問有為有分限任許説名盡無為無分限因何説名盡答有為有分限修盡説名盡無為無分限證無盡説名盡即是盡無源源證無底底二云源者源即是底唯是無為法身真理能證盡源唯如來根本智能證盡源底虗空雖然無邊日光起來照盡無邊虗空法身理上元來無源無底根本智知盡無源源證無盡底言攝大乘云亦乘亦大等者路萬行之體乘是萬行之用將體就用大亦即乘將用就體乘亦即大總名持業謨云此不成持業後得般若智是體一體之上持兩個用一有包弘廣大用名亦大二有運載用名亦乘一體能持二用亦乘亦大故名持業言或乘大性將乘字大字俱屬有為乘向上著大乘之性名為大乘即真如是問有為有動轉可得名為乘無為無動如何説名乘答如有為能動乘用得名乘無為無動轉是體得名乘真如與彼運載智為體性亦得名運如海運船雖不動亦名運也上解乘名言無著般若等者問般若論中但列七名餘指瑜伽依撿瑜伽三十六釋與對法論義有不同云何得名少別義同答攝二解一乍觀二論似若肝膽審而察之誠同水乳如下疏引會性等者即體名乘若是體性性字從心邊作生即是真如體性空有真如體性不得稱乘事須與七種大性相應即種姓之姓字從姓意説所證大乘真性與假者人七種種姓和合相應方名大乘闕一不可所待別故即此乘性之言通有為無為也二者相之名雖少別義與對法論第一同者然般若論中但列七名餘指瑜伽三十六釋與對法論義有同不同今應略釋所引文對法論為前無著論為後也言一境大性等者謂十二分教中菩薩藏攝方廣之教即依當體説也對法對能緣心名境大性也無著據體彼名法大性瑜伽無著二論無別也言二行大性等者瑜伽云心大性謂有一類於無上正等菩提發正願心對法據二利行名行大或約二利俱時之心又有二説一心大性唯自利二者只此心大性亦通利他問行與心既通二利有何差別答初後別故先由發心後方行行二能行所行別心為能行行為所行言三智大性等者瑜伽云謂有一類於法大性生解心法大性即是二無我之真理對法約當體説名智大性無著名信解大性據鄰近法以彰名也瑜伽取所證理名法大性對法約根本智名智大性無著據相應之信故彼名信解大性此三本論名自別言四精進大性等者瑜伽云增上意樂大性謂有一類已過勝解行地證入淨勝意樂地此大論意別約聖者説對法據總凡聖相合説始從凡夫直至成佛已前三僧祇劫䇿勤三業修難行苦行名精進大性簡異三乘精進不名大性無著云唯約初地已去證四不壞信故云彼名淨心大性言五方便善巧等者瑜伽云資糧大性望佛果菩提名資糧也對法云方便善巧大性假者身中有大悲故不住涅槃有大智故不住生死對法望無住涅槃名為方便也瑜伽云福智望佛果菩提名資糧無著亦云彼名資糧大性無著與瑜伽同意方便是用悲智二種與無住涅槃而為方便資糧是體二論互舉影略説故言證得大性等者瑜伽云證得大性謂即所證無上菩提即是證得大性不別也對法云證得大性約現在功德説無著云果報大性對因業説也言十力者此即百四十不共功德也八十種好添三十二相為一百十二加四清淨四無畏即一百二十又加十力成百三十又加三念住三本護又加大悲無忘失法永拔習氣一切妙智即一百四十言彼名果報大者菩提涅槃名大果報無著合説名果但名果報對法別顯名十力四畏等成就二字解後得也證實不謬應言果大不合言報報屬異熟果故體是有漏果位於百法內唯有六十七法清淨無漏云何言報古人謬翻云圓滿報身正義應云自受用身也對法別顯十力四無畏等無著名果報大即所證無上正等菩提名別體一也言七業大性等業通因果今取果中建立佛事利樂名業影取因中三無數劫亦名業無著云時大性時亦體通因果二位今取因中三僧祇劫影取果中窮生死際盡未來時建立佛事即果也問窮生死際為説自窮為説窮他若自窮者生死盡處至解脫道豈過此已不利樂耶若窮他者生死相續無有盡時如何能窮答應説窮他後難寧通答不望總聚衆生界説衆生法爾無盡望一一衆生至佛果位名窮生死際齊此已還諸佛於彼常行利樂問有性可然無性之人生死相續無有窮盡應不利樂答既言盡生死際化利當休呪不盡耶而無別樂如人畜子教之直至成人方息此亦如是化生死得盡時名大三僧祗劫自習業至解脫道名為窮盡順般若時名大對法舉所行時無著取三無數劫時也問七大性幾通有為無為答路云境大性信解大性果報大性通有為無為餘四唯有為問因果何別答良云境界精進唯因後二唯果餘三通因果言乘體根本即等者會經文彼勝鬘經宗理性一乘一乘即大乘大乘即佛性佛性即涅槃界意道若約大乘根本唯真如若據未則通萬行也大乘兩個字真如是體萬行是用也將用就體説未通萬行既未通萬行亦乘亦大是萬行向上用攝此亦乘亦大用就萬行體約末名大乘若將末就本將萬行就真如將相就性攝用就體總名大乘義方周足也謨云此中根本體即下隨勝體中攝事歸理體經云一切法亦如也若枝末即下真實體收相云未通萬行者且如般若體稱智度行解包弘名亦大有所運載名亦乘一體能持二般業用名亦乘亦大持業影名非是將用就體名亦大將體就用名亦乘雖有終乖本意言七大性體通等者緣疏文奄含總言通也其實七大性唯是有為有為是種姓故故言七大性體通有為無為言當具顯示者有二意一近結乘體即一乘章中出體性門總含隨勝真實等為具顯示二遠結大乘等即一乘章中出體釋名字明説意彰差別及問等五門名具顯示也言此為總句者結前大乘經三個字是總總有二義一者大乘經三個字是一切大乘經之總二者十七句中總句也言名無量義等三句者初標別句也言是所説大乘經別名者出別句即名無量義教菩薩法佛所護念是此間秦本經中之別名也言正法華中等者竺法護三藏譯正法華只有兩個別句也第一云講宣菩薩方等大頌即同此經教菩薩法第二句云一切諸佛嚴淨之業即同此經佛所護念也彼正法華中略無量義一句也言論牒經有十七名者指別句也據論家先合標列十七句了然後一一牒解論無單頭便解更不別標疏主與論家標列所以疏云正合論文言應云為諸菩薩説大乘經等者列別句也十七名中復分總別末後一句取上法門是總也下云能生一切能所詮故此中大乘經名總總一切大乘第十七名總總大小乘故故能生一切能所詮也此十七句中除第十七最上法門一句取餘十六句束成八對一詮教顯理對無量義經是詮教最勝經典是顯理二總生別就對大乘方廣是總生教菩薩法是別就三勝依勝對佛所護念是勝依唯佛能説餘人不能也勝緣者諸佛祕法名勝緣也教義為所緣也佛智為緣是佛之所緣法名勝也四教含根熟對諸佛德藏名教含教含功德故根熟者諸佛教法待生根熟與説五生身法身對能生諸佛是生身諸佛道場是法身六破染成淨對諸佛法輪是破染堅固舍利是成淨七出生攝入對善巧方便是出生宣説一乘是攝入八勝法俗喻對第一義處名勝妙法蓮華是俗喻賀問云此十七個名為是經中本來有為是論家安立答經唯有三句餘十四句論家安置以無量經有如是義故謨破云此乃是違論害疏也論分明牒經有十七名也梵本經若無無何牒舉下疏亦會云於論句中三義增勝故偏説之故知經家十七名本皆具足也言論云一無量義者牒也言成就義者解也解中以此法門説彼甚深妙境界故即是經文問無量義以何為體答以一真法界為體何以知之答以此法門説彼甚深妙境界故即是一真法界問真如一體之法何以言無量答真如雖是一體有二義得稱無量一者真理體遍名無無量無處不遍量同虗空無有一法不以真如為體故青青翠竹等云云二者真理一法能生無量義故名無量問言無量者其事極成如何喚一真法界作義答兩個意得名義一者對能詮教此是所詮理義之理名為義是所詮義名為義二者對能證智此一真法界是所緣境境義名為義具此二意故得義名問一真法界名為無量其義極成未審所生教義因何得名無量答所生教義不合名無量緣能生真如是無量所生教義隨彼能生攝末歸本名無量二者所詮真理既名無量能詮教詮彼真如理理無量故教得無量之名當詮之時理上具塵沙衆義義既無量事須得無量教詮教無量故義亦得稱無量此中二義解所生教理亦名無量此是論家解只此解與經家大段同於中少分不同依經家解教無量一切對根本來設教謂對衆生根根既無量教亦無量教對根既無量每個教下所詮義義亦無量也上懸説了下依疏辨言論云一無量義等者一真法界及能教并所詮義總名無量成就者真如也喚真如作能成就出生衆義得成就名字者教也字有二種一有功能字二者無功能字堪與名句文為所依名有功能字不與名句文為所依即不是此間收也問何名有功能答能詮是文文即是字與名句二而為所依由能詮文義得顯故字即是體文是功能功能即名句文即是字為二所依方是能詮若不與名句為依但名為字如言斫芻阿娑利縛此云眼無漏此字説之為句詮差別故若言斫芻但名為眼説此為名詮自性故此之二字亦是即文與彼名句為所依故此是有功能字也若單言斫者此但名字不生眼解非能詮故此名功能字也今約功能字説是能詮故義者所詮義故故成就字義以此法門者法門兩字是向上字也説彼兩字即是言説也甚深妙境界者即向上義也所詮義對能緣心名境界已上經文言深妙境界者論主牒經也言即佛最勝之等者論主解經也佛字解前經家甚深也真如法界唯佛與佛乃能知之能知甚深故佛得甚深之名最勝二字解經妙字境字與經家解同即是甚深妙境界妙境界即是向上義字對能緣心名境界也言能詮教法等者問經云無量義目所義如何教亦名無量答疏言能詮教法等義既無量教亦無量如阿耨池流出四河四河無量義體亦爾所詮真理既爾能詮經教得名無量也言由此字教者結也路云由此法門對衆生性説勝境界故教及義俱名無量也言無量義經云等者引經證也問何要爾許多教及無量義耶答疏言無量經云以諸衆生等意言衆生病行多藥鋪上藥般數亦多衆生性欲千異萬異將教就根根無量故教無量教既無量義亦無量義無量者從一法生其一法者如是無相無相不相名為實相也其一法者即是無相離十種相故名無相也言如是無相者重牒向上無相二字此亦不解唯解無相不相不相無相四個相字攝釋都作三解無相不相不相無相一云擎却最向上無字唯取向下一個相字此相字是有相也次下不相不由無也亦是空也却將最向上無學向下兩處轉此真如法上亦無有相故名無相此真如法亦無無相故名不相成上故云不相無相二云擎却向上無字唯取向下兩個相字兩個相字之中初向上相字是有相向下相字是無相却將一個相字向下兩處轉此真如法上亦無有為相名無相亦無無為相名不相無有一個有為中不以無為實相而為體相成上故云不相無相三云無者無遍計相不相者不無依圓之相却是有也成上故云不相無相初解為勝又詔云真如離相名為無相四相不遷名為不相問何名實相答無相當情亦是有相將向下不相無相四個字解上實相也不相之無相故名實相也言菩薩摩訶薩等者顯益也經云菩薩摩訶薩安住如是真實相已自利也本智證如名為安住言所發慈悲等者便是利他行菩薩成就得無緣慈真能拔衆生苦如飢饉劫變石為金令諸衆生得實受用簡異凡夫二乘有願不能實救世諦者也問相隨於見菩薩無漏相分衆生有漏如何能用答詫彼為質自所變者變是有漏問變石為金之時為石即金為於石上別變為金若石即金為同種生為別種生若別變者既不從石生復從何生答但詫於石為增上緣其實變金從自種赴若親他種即闕引自果義言於衆生所真能等者行無緣慈於一切衆生向上皆作真如觀而能拔苦苦既拔已後為他説法能令衆生得受快樂即五種樂也即菩提覺法樂涅槃寂靜也無緣慈衆生緣慈及法緣慈熾然觀真如便能於衆生身上與樂拔苦言一種子等者農有言一顆種子三年收得一百碩今者真如從一法生於百千義百千義中復生百千萬數也又解此唯約第八一個識無漏一個種子能感異熟總報之身即自受用獨一種子起現行見一切相好之用皆等法界如一種子生百千萬等前七轉識皆有無漏種子皆起一個現行隨其所應莊嚴三身此絶好言論不唯取所生等者會論文亦云通好也會論文者恐人錯會將謂空取所生教義名無量今兼取能生真如亦名無量義也如阿耨池流出四河四大河出水既無量其阿耨達池豈有量耶通妨者問無量義遍於教理者何故論家唯説所生答疏言無量之體等金云論以佛最勝境界體周遍故或能成就彼無量字義故名無量義由此能詮教及所詮義亦名無量義也經中但以能詮教所詮義名無量義其真智境名為一法一法即是無相理也意取真如也合論意不唯取能詮所詮名無量亦取能生真如理亦名無量故名不唯也問無量義體正取何法答經文自有二釋一云如法説中言是一法門名無量義真如體性難可測量正名無量對能證智是境義故亦名義也此當體立名也二云能生無量教法從他立名名無量義也言二最勝經典等者問制伏放逸律教於先究暢釣深論宗為上各有一能何故經藏偏勝答安國云今此經中宗明一乘會二歸一形二藏也準大論有四釋一除疑入法經勝離苦樂二邊律勝發生正慧論勝二又生定故經勝生戒故律勝令生正慧論勝三離欲界生上界故經勝離三惡趣生人天律勝斷無明惑出於三界論勝四離貪故經勝離嗔故律勝離癡故論勝三藏氣力恰齊何故此經獨於三藏中勝答此無量義經故唯詮真如真如是一切法中最勝故所以對於三藏教中偏勝但表勝誰遮彼勝以經破二歸一不然無量義經未破二也言三大乘方廣等者理正曰方包弘曰廣唯大乘有若論正法廣陳之方廣通小乘有大乘方廣以無量大乘法門為體問如何是無量法門答即是教法理法隨大乘衆生根器之教法及二空理法此經具有名無量大乘法門即此無量大乘法門是菩薩二利行名無量問何以知答下文云隨大乘根器之法此經具有名無量法問二者前來大乘方廣之教名無量法門應是化隨大乘衆生根器之教法此經具有此無量教法皆從真如流出故名住地成就住持者即住持也言四教菩薩法至成就者引論文不化二乘等故者疏主釋也應是教化菩薩之法此經具有也意言即是説無相一法生一切法教根就菩薩也下云普令一切衆亦同得此道若我遇衆生盡教以佛道問法華經正化二乘如何言不化二乘答約聞法華經取聲聞果者不化若回心來便是化菩薩不喚作聲聞言五佛所護念等者若他人總有此法交他人護念今唯佛有餘人無所以佛自護念故如輪王髻寶餘人無故善護念何別答彼約利生明護念愍念名護教菩薩法收此約於法護持明記名護念故與彼異也言六諸佛祕法等者論文也祕是藏義故者疏主解也甚深祕要之法餘人不知似佛藏惜也如王齒印非餘人知藏去聲呼如世伏藏唯自得此法亦爾唯佛知之法名為祕法亦如人王所居名為尊位也下云唯佛與佛乃能究盡諸法實相實相即是無量義處真如法也言七諸佛德藏等者此有三説一切德與禪定藏別德是功德藏是禪定禪定能持功德故定德藏名也禪定藏之與功德俱在經中故此經名諸佛德藏也二云禪是禪定一切功德因之所發故只喚禪定作功德藏禪定功德之藏在此經中故此經名諸佛德藏三云在二乘位名解脫身真如能生功德之時能詮教不名德藏在大乘菩薩位名法身法身能生功德教能含容法身真理故喚無量義經詮教名藏經即是藏言八諸佛密處等者問與前祕法何別答祕法望得人唯佛自得餘人不知上法名祕此密處即根熟者與説根未熟者不説望佛心名密意道四十年前二乘根未熟但與菩薩説大乘不分明為二乘説唯佛自知餘人不知今四十年後衆生大乘根性熟為説大乘無量義經引無量義法令説不説唯佛自知他人不知名為密處言九能生諸佛等者諸佛因聞此無量義經修習得成報化佛身故名能生諸佛謨云自他受用從二智生大小化身從報質起然報從果位勝智種生劣無漏皆已捨故若言三慧親成報體恐疏也言十諸佛道場等者論文釋也如世積穀積麥之處名穀場麥場此經是能生無上道處名道場也此有二説一無為功德名場有為智名道此場向上是諸佛得道之處名為道場二者無量義經是詮顯法身功德之處名為道場此法門者教也能成無上菩提者法身菩提也問既是法身如何言菩提之性答前來第九能生諸佛報身化身此間言道場顯法身也言十一諸佛法輪等者喚此經作法輪者法輪因故亦名法輪破結障故解法輪義教能助智斷惑又云聞法華經不墮地獄畜生亦有摧義名輪問法輪自性體唯智慧經詮於理何以言輪答正斷惑障智慧為初斷道起時必先聞法即法輪因也故名為輪推功歸本名曰法輪言十二堅固舍利等者皆是論文也堅固者不壞義不可失壞名不可壞非是打不破舍利者佛體也一遺體舍利二法偈舍利教法能詮三身佛體故亦名舍利問報化何故名法身答與功德法為依止總名法身非唯真如猶名法身也論云此牟尼尊所得二果永離二障亦名法身無量無邊力無畏等大功德法所莊嚴故體依聚義總説名身故此法身五法為性非淨法界獨名法身二轉依果皆此攝故言十三善巧方便等者即佛果功德教化衆生方便因此經成佛成就得彼方便故喚此經依方方便從所成名如母因子貴有方便故能説三乘五乘教法故名方便意説此經是彼成就智慧家之巧方便也即是彼所化衆生成佛之方便雖舉五乘意取成佛也言十四宣説一乘等者此全是論文也教理兩法總名一乘宣説即是説法真如理從教下宣出來名宣説一乘一乘之理在佛身究竟二乘不究竟元來是大乘中分將去二乘中本來無也問無量義一乘與法華一乘何別答別無量義唯教理法華四法又無量義約性法華一乘通性相也言十五第一義處等者此法門即是此經教法教法名處第一義即是法身八諦之中真如是勝義勝義諦也諸教是前七諦處此無量義經教是第一義處者法身名第一義也能詮教是法身第一義住處境界經云無色無形像法身體遍無方處無根無依無住處如何説住處答據實真理本無言説約詮而論教是法身住處法身由能詮顯故立以處名非言法身定居此處言十六妙法蓮華等者總標也問佛為八萬大菩薩説無量義經因何更蓮華名字出來耶答望佛本意正為八萬大菩薩説隨生性欲教理緣八萬大菩薩自利行任運進修利他行藥病門中未能精審未能應病與藥觀根受道如來為説無量義經及八萬大菩薩隨生性欲説法教化衆生藥鋪上藥褁紙袋多只緣世間人病般數多衆生性無量如來説亦無量法無量故義亦無量教義真如三法總名無量義正為頓悟菩薩説教理次舍利弗等聲聞人向無量義會坐來聞説隨生性欲教理便作念云我聞教理莫是世尊隨我性欲説又聞無量義者從一法生我所證悟法莫是從一法中分出微有捨權取實之心只此心與法華會上回心為因亦與説法華經為時至成就權亦未捨實亦未取却向聲聞身中法空真如向上説有出水義名蓮華正以教理為菩薩説説真如向上出水功能名蓮華正説無量義因便兼説蓮華蓮華名字從此而興所以天親菩薩解解論有二釋一出水義論文以所詮義名華等疏釋也言即證智甚深無量阿含甚深證開敷經云其智慧門難解難入疏主解四法得名處喚他教理師將無量義經蓮華是教理令同此經蓮華亦取教理喚他古師取義不當何故疏主今引法華經二甚深證無量義經教理耶答疏主從寬為名於中意別能詮教中唯取大乘教同無量義經華開敷所詮理中唯一真法界理證無量義經出水義也上解總標言出水有二義等者第二別釋也論云出水有二義緣論主兩義解蓮華一出水義二開敷義今且解出水義緣真如在兩種人身中出水便有兩般名字一對頓悟菩薩體出蓮華二對漸悟菩薩用出蓮華且解第一義體出蓮華問論文不説是頓悟蓮華疏主因何第一義中安頓悟名字答疏主觀第二義能出水人既是回心二乘漸悟菩薩疏主體此論意第一義中必是頓悟菩薩所以疏云此談華體已下疏主安置頓悟名字論意巧略第一義中唯説所出水蓮華不説能出水第二義中唯説聲聞為能出水人不説所出水蓮華出水者論云出水不可盡不可盡即出水義也安國三義解一約法性身離垢染故名出水疏主解云法體性常名不可盡即是凝然常不同定性二乘涅槃時盡二者報身之體斷二障故名出水不可盡窮生死際盡未來時建立佛事功用無盡無萎歇故名不可盡即不斷常也三者化身之體示相超凡名出水教化衆生大乘法寶用無窮盡名不盡經云周給一國猶尚不匱正義取初解法身真理名不可盡論自解云出離小乘濁泥水故相國云一者凡夫身中我執如泥二乘身中法執如濁水二者二乘苦依身如泥有漏功德如濁水出水亦二義一頓悟菩薩身中二空真如理本來不與二乘法執相應名為出水唯識云雖有客染而本性淨問頓悟菩薩身中真如本來不與二乘法執相應所起執是大乘家法執不是二乘法執如何言出二乘法執答攝云由菩薩有彼二乘種性今成菩薩不取彼一乘之果亦名為出二乘濁水若爾無二乘種姓者如何名出二乘法執濁水既有斯妨第二解云夫言出水者不要先在水裏後出名出但本來不入水亦得名出如一箇從水中到岸上名出水一箇人本來在崖上不入水亦名出水頓悟菩薩身中二空真如理本來不與二乘法執相應名出水言此談華體頓悟等者疏解論文云出離小乘濁泥水故解頓悟菩薩身中真如理體性離泥水故名出水解論家出水二字説言法體性常者解論家不可盡三字也言談一乘理性等者解論家出離小乘濁泥水故上解第一義頓悟菩薩體出蓮華訖言二復有義蓮華等者論解漸悟菩薩用出蓮華舉喻蓮華出泥水喻諸聲聞入如來大衆中坐指無量義會下聲聞得聞無量義經教理如諸菩薩坐蓮華上指無量義會下八萬大菩薩世尊與説無量義經也言聞説無上智慧等者法合也智慧境界智慧之性名智慧也清淨境界者對如來能緣心名清淨境界也菩薩聞已證如來密藏真理也上盡文也言此意説言菩薩等者疏主解論也指無量會下菩薩聞説教理是頓悟菩薩在報土坐蓮華聞佛説無上法證如來密藏也標了言聲聞回心已去等者疏主解釋也聲聞回心已去得入大衆中坐者此二句疏標法華會事也亦如菩薩坐蓮華上指無量義會下聞説智慧亦證密藏法華會上事聞説開示悟入亦名為智慧對能證智名境界也智慧之性真如理亦名密藏問疏主但聞説智慧清淨境界證出水義何要菩薩坐蓮華證耶菩薩設爾不聞無量義經時亦坐蓮華聲聞設聞無量義經了亦未坐蓮華答若事上説則不坐若法中論則心緣教理名為坐華即聲聞菩薩兩處皆有也上來釋言前解菩薩頓等者料簡差別也問前來出家有其二義二義皆名出水既一種是出水何故分成二義既分成二義前解約何名出後解約何名出答疏言前解菩薩頓悟等意言二空真如理本來不與二乘法執相應名體出體者體性性能出水故名體出用出者回心已去超過本位捨於法執得出水名後時之言目法華會也料簡一總體出一切梵天上至佛位已前真如理性本離執染二別體出地前頓悟菩薩伏煩惱身中真如有出水望名別體出三假用出無量義會下聲聞未回心微有捨權取實心身中法空真如有出法執濁水望未是親證名假用出四真用出初地菩薩聖智親證名真用出有解云今即不然諸抄皆指頓悟菩薩體出便唯依體出解蓮華也見道聲聞人微有捨權取實之心便唯名用出蓮華此總不盡疏意今準疏意頓悟菩薩無量義會下亦有體出亦有用出聲聞人在無量義會下亦有體出亦有用出也且頓悟體出者法空真如理本來不與二乘法執相應名體出也此既是八地已上菩薩初地時證遍行真如豈不是用出又聲聞人無量義會下既有用出身中真如理性垢染二乘法執不得即是體出也問既若總有體用二出何不向頓悟菩薩身中言用出聲聞身中不言體出答但是隨增勝義説也無量義會下頓悟菩薩身中真如理本來不與二乘法執相應體出相增用出相隱聲聞人無量義會下微有捨權取實之心用出相增體出相隱但是隨增勝處説也問既無量義會下菩薩聲聞總有體出用出應可無量義經對聲聞菩薩總名蓮華得否答無量義經對聲聞但名蓮華不得名為無量義無量義經對頓悟菩薩但名無量義不名妙法蓮華以彼聲聞無量義會下微有捨權取實之心不是正為所以教理二種名傍蓮華因説著聲聞蓮華乘便説著菩薩蓮華蓮華因便説本來不是故意説所以無量義經對聲聞説得名蓮華若對菩薩但名無量義不得名蓮華若無量義會下頓悟菩薩身中真理法身本來不與二乘法執相應名蓮華者何唯無量義經一切望手菩薩總合名蓮華故知無量義蓮華不對菩薩也向下問答處有説無量義對菩薩正名無量義傍名妙法蓮華妙法蓮華經對聲聞正名妙法蓮華傍名無量義者彼處與此間義別彼處約教理名蓮華心緣彼理名坐不妨菩薩亦有蓮華此間唯約真如理名蓮華即不對菩薩故知疏主敘他義後問答中方申自義也疏主傍化二乘故作此説聞教理已有捨權取實之心向身中真如理上説傍蓮華本來正為八萬大菩薩説教理傍鼓擊著聲聞名蓮華故名傍化聲聞故作此説也言華開義等者論家第二義以華開義解蓮華此疏全是論文教理故名華開言衆生於大乘中等者般若會下未分明説由自是權於大乘中起懸崖想生怯劣心此説四十年前未説無量義經不説蓮華今説無量義經顯示如來淨妙法身正是華開敷義路云準出水初義正以教理化諸菩薩頓悟者蓮華準出水後義以教理二傍化二乘亦名蓮華故第十六名蓮華上來論家兩義之中第二義與時亦成就稍親言十七最上法門等者引論文總標名也一切大乘經是最上法也門者無量義經與餘最上法為門依主釋言攝成就者攝取一切諸大乘經依能詮教及所詮義并真如理皆此經攝無量義經名攝成就攝取無量名句字身此上三句是無量義經向上義也亦是無量義經功能也言頻婆羅等者是解大乘經偈數有説此最上法門中攝法華經中頻婆羅等偈數此亦不得定指法華經亦不得定指大乘經此舉法華經中名句但是為引意噵諸餘經中有爾許多名句者此無量義經之中皆能攝得引論文了言此為根本攝餘等者疏主解論意也即是無量義經也沼云有二義名攝餘一餘十六句名餘二通一切經中名餘言此乃所詮是餘等者第一重此經能詮與餘經能詮為門此經所詮與餘經所詮為門第二重此經所詮與餘經能詮教為門問何以如此答此經所詮是真如真如為能生也教為所生一切經能詮教是此經教下真如理生得故此所詮與餘經能詮為門又此經所詮真如能生十二分教故此經所詮與餘經能詮為門又此經能詮與餘大乘經所詮為門一切經所詮義皆依真如此無量義經教下是真如由無量義能詮教詮著真如真如向上有塵沙衆義衆義既遍在諸經教下諸教下所詮義是無量義經能詮教詮得故此經能詮與餘經所詮為門也言故頻婆羅是小乘等者問前頻婆羅等五十二數中第幾數答頻婆羅是小乘中五十二數中第十八數大頻婆羅第十九數阿閦婆第二十數大阿閦婆第二十一數問何故從十八便至二十不次第耶答大頻婆羅是十九數大阿閦婆第二十一數以數同故略論不舉俱舍論算數本是六十數今唯有五十二數餘八遺忘問誰人遺忘答或結集時略却去或翻譯家遺却亦不妬也二云從西國來時只有五十二數餘八緣此方人根鈍行用不得略却去也言此是餘大乘偈等者問何故唯攝大乘經教偈數答以十七名是此大乘經家之別名就大乘為論言攝彼頻婆羅等大乘偈頌其實亦能攝餘乘所有能所二詮九部之法亦是真如法界中流出言即是二十千萬者問所譯法華經但有七卷寧言二十千萬億偈耶答此盡是指法如此之類皆此所攝也問釋迦何故攝他久遠偈頌耶答二説一攝釋迦所證理與彼不別即彼此是從真理平等中所流出何緣真如不攝彼也二不攝頻婆羅等偈故指二十千萬億偈意言如此帶數之偈此經所詮是根本皆能攝也言論云十七句中等者證總別也二解總別也一云即是十七箇名總是總也餘當經中文字是別二云即十七句中最上法門名總餘十六箇名是別也問此最上法門與前大乘經名總何異答此最上法門對當經餘十六箇名為總也第二安國云前大乘經名總者對後十七句名總也最上法門對餘一切大乘經名總亦對當經之中十六句為總也前大乘經對別故總此最上法門根本故名總雖然互有寬狹取最上法門寬於大乘經為正也言此經但有三等者指陳隨勝也問十七名中何不取餘名字偏取三名耶答疏言一無量義等真如是體當體是勝能生教義之用體用皆勝言二教菩薩法等者人勝所教菩薩是勝人也言三佛所護等説法化主勝唯佛有故餘人所無化主勝也言三義增勝等者問無量義經有十七名如何法華經中但説三種答疏云三義增勝故偏説之三種順彼本來説教之意故名勝也問此法華經有是名否答有經云為諸聲聞説是大乘經名妙法蓮華教菩薩法佛所護念亦與無量義教菩薩法同故云此大乘修多羅多有十七名論説豈同餘教答唯此經與彼經體同故同有之不通諸經也一無量義者此云如來説法一相一味即是真理即同成就字義也又云於一切法以智方便而演説之其所説法皆悉到於一切智地二病行經云如來于時觀是衆生諸根利鈍精進懈怠等同性欲無量二最勝經典者此法華經是諸如來第一之説於諸法中最為其上三大乘方廣者此經云以我此物周給一國由尚不匱何況諸子四教菩薩法者下云我今還欲令汝憶念本願所行道故五佛所護念者下云佛自住大乘意云既住大乘即是護念等六諸佛祕藏者經云文殊師利此法華經是諸如來祕密之藏七諸佛德藏者經云以要言之如來所有之法如來一切自在神通之力等入諸佛密處者如五千退席觀根未熟非是法器不為説經九能生諸佛者經云若有聞法者無一不成佛十諸佛道場者經云當知是處即是道場十一諸佛法輪者諸佛於此轉于法輪十二堅固舍利者經云有如來全身十三善巧方便者經云為求聲聞者説應四諦等十四宣説一乘者經云今此經中唯説一乘等十五第一義處者經云而於此經中法華最第一又云如來如實知見三界之相等十六妙法蓮華者其智慧門難解難入教妙諸佛智慧甚深無量理妙乘此寶乘直至道場行妙諸法寂滅相説佛智慧故果妙十七最上法門者此經一切性相大小乘故言問其無量義經第十六等者問意前來説無量義經有十七名十六與此法華經無極妨難更不論唯無量義第十六名妙法蓮華與靈山會上蓮華二名何別若一種不合分二處説若兩經異何得同名耶言答有五等者標五解也五解有何差別初答意時雖有異體無差別無量義經是未出水蓮華法華是出水蓮華二能依所依別無量義經是所依蓮華此法華經是能依蓮華三體用別無量義經是體法華是用四教理行果無量義經唯教理此經唯行果五偏圓別無量義經唯教理是偏此法華經具四法名圓故五義各別也言一云蓮華有二時得名等者此第一答中有二師義解蓮華一頓悟菩薩體出蓮華出水不可盡名出水二彼復有義漸悟等菩薩用出蓮華無量義會下未出水蓮華法華會下回心已去正名出水故言已出未出別設在無量義會下在法執之中亦名性能出水亦名蓮華言彼經亦爾者即無量義會下體出水也言性能開敷者謨云此據蓮華在水中總喻真如理性故開敷義以解蓮華若別配者華開敷蓮出水言彼時猶未化二乘等者二乘之人雖在無量義會下微有捨權取實之心身中法空真如理名傍蓮華彼時猶未化二乘取一乘故未回心前名未出水言今者此經正化彼大乘等者指法華會上回心了却向身中法空真理上説正蓮華名出水蓮華也言彼經正名無量等者即教理對菩薩也傍名妙法蓮華者教理對聲聞也言正逗菩等等者彼經正化菩薩對菩薩説正名無量義彼經傍化聲聞令生信解大乘是勝傍益二乘所以對聲聞等傍名蓮華經也彼時雖未發心警覺信故名傍蓮華也言此證正名妙法蓮華者問如何此經名無量義答此經正化二乘乘捨權取實正名法華化菩薩聞開示悟入行果蓮華對菩薩傍名無量義也言正化聲聞入等者問何故此經名正蓮華答疏云正化聲聞等化回心聲聞行一乘行趣一乘果故經云其兩足聖尊最勝無倫匹等言時位有殊等者定前定後已出水未出水名時有殊也無量義會下聲聞位法華會上回心成菩薩位名位有殊也問何名體性無二答兩經俱以真如為體無二但是彼正舉真如此正舉行果能依行果與所依真如俱有一體之義若法歸分別而為殊若依證會之時冥然一體行與如一者如入初地妙觀察智起現行時本有種子為因緣二空真如為所緣緣世第一法為等無間緣多聞熏重為增上緣具四因已剎那生現正修如時如函與蓋更無差別果與如一者如大圓鏡智起照真如時理智一味智亦如理亦如木中火性若陳其相堅𤏙性殊若能所二依體亦是一也言故將説此經等者問如何説法華經先入無量義處定答緣無量義緣是體此法華經是用欲談其用故先顯其體後説法華也言二云無量義經等者無量義經舉能依教對菩薩正名無量義正依真如對聲聞傍名妙法蓮華也妙法蓮華經能依行果對聲聞正名蓮華經所依真如對菩薩亦傍名無量義又法華經以真如行果為體無量義經以真如教理為體同是三法三法數同又無量義經舉所依真如對菩薩法華經舉能依行果對聲聞安國云二經名體無二彼經真如此經行果行果之體即真體用不相離即是體無二俱號蓮華名無二言三云彼據智慧等者糅云彼無量義名蓮華體是無為德此經名法華體是有為德此約智慧功能名法華如來後得智有會二破二之用名慧功能問此第三答約何義分成二經答一約智慧體名無量義名蓮華二會不會異彼經不能會二歸一此法華經能會二歸一故二經有異言四云又彼以教理名為等者無量義以教理為蓮華則狹法華經以行果為蓮華則寬行通有為無為果中通理果則寬也無量義經教唯大乘理則狹又有説行中通萬行行必因聞教悟理自有取果必因聞教悟理行行有是聞教悟理不必行行取果所以行果寬教理狹言菩薩已修一乘等者明不取行果所以問何故偏與菩薩説教理不説行果耶答疏言菩薩以修一乘等若是菩薩未修一乘因未趣一乘果故彼經即要説一乘行令菩薩行行説一乘果令菩薩趣果菩薩既自能行一乘因正趣一乘果更何要説行果故彼正為化菩薩所以不説行果蓮華也言由但不知等者明唯説教理之所以問如何彼經唯取教理名為蓮華答疏云由不知應病等緣菩薩修行多為衆生説法教化緣登地菩薩有所知障不識衆生根性恐教化衆生説法時不稱衆生根性返招其咎要知教理之所以所以世尊於彼經中知菩薩要教理之法故説教理化彼菩薩故説教理蓮華也言今此會中二乘等者正為聲聞人説行果意也言五云彼以教理二等指前解經品得名處四法名蓮華教行並開敷理果俱出水也言前三義釋彼此體同等者前三義中第一義無量義經取未出水蓮華此經已出水蓮華已出未出俱是真如時位有殊體性無二第二義中無量義與法華經各三法同也無量義經舉能依教義正名無量義所依真如傍名妙法蓮華也法華經舉能依行果正名妙法蓮華所依真如對菩薩傍名無量義二經所依皆是真如也第三義無量義經約體法華經約功能智性智相體用不相離故言同也第四義中此名法華彼名無量義無量義經以教理名蓮華法華經以行果名蓮華二經各以二法何故寬狹不同答無量義經唯教理教中唯大乘理中唯真如法華經取行果行中通萬行果中通理智果又聞教悟理之時不必行行取果若行行之時必因聞教取果取果之時必帶前三第五義無量義經唯教理蓮華法華經通教理行果蓮華四法四法不同名此寬彼狹也言由此義故等者別結無量義彼無量義經唯以二義故名無量一法教也二義所詮義成就字義故言彼無量義經云等者問佛為衆生談爾許多教法作用答疏云彼無量等言然今此經雖初等者別結法華經即指方便品初智慧及門言後文多以等即開示悟入名後也言實體上下等前釋名解契祕賾之微詮教也等言後解為善者意取四法得名句文名後解善教行並開敷現果俱出水名後言法華既爾一乘亦然者第十六名與法華經同五重妨難問答如此十七名中有宣説一乘還同法華經一乘亦合作此五重問答故言亦然準此法華一乘亦合如此故云如來欲説法時至成就也言第四所依説法等者解成就名所依説法隨順威住成就者此論文倒也正合云住隨順説法所依威儀成就紀國云他敬畏名威容止可觀為儀次解威儀體者一入定二雨華動地三衆生此三是隨順如來説法威儀也言住者依心等者問如何名住答如來説法為能住此二種威儀為所住此解住字如來説法住此威儀故名為住問何名所依答即是佛自住所依威儀而説法故此上解所依字也問何名隨順答説法是所隨順三種威儀為能隨順未有説法華經不雨華時未有不雨華亦不説法時此三種威儀能隨順如來説法金云威儀有三一隨順同證理威儀入無量義三昧二隨順古佛威儀與燈明事同三隨順衆生威儀下云一心觀佛言説無量義經訖等者辨安坐義亦云解殘經佛説此經已結加趺坐此兩句經論家不解故言殘經説無量義經訖即是解經中佛説此經已明坐意也此經即指無量義經也問何故欲説經先結加趺坐耶答表擬入定先結加趺坐也問入定有何所表答身處於座身為能依座是所依身處於座智深理方可法談故入定也言如説般若等問為復定説法華經入定諸經亦爾答疏如説般若等般若者是能斷金剛般若也此經唐三藏於東京譯太宗皇帝貴有疾問三藏有何功德不思議三藏云有能斷金剛經一卷陛下令翻譯此經有敕宣依令於東京譯如今金剛經即無對面念問何名對面念答有説住背面念面謂生死定能永棄生死面故故得名背婆娑云面是定境對是親瞻對真如境同時念敷明記不忘雖然正證之時都無分別須得念明記後智方記問何不言對面定答鄰近為名其實定同時念敷明記偏強所以不説定但説念也從定而起後方説般若言後起方説經者後解坐相即是結加趺坐也問説無量義經時莫垂足坐不如此何故説此經已復言結加答此經雖不説準正法華經説無量義了別升高勝之座即是説無量義經時所坐狹小後説法華更別升高座為聲聞説法表勝上故所以重明加趺問何故説無量義不現威儀説法華方有威儀耶答瑜伽論云佛為聲聞説法有四事一號勝高座二現諸威儀三出聲謦咳四顏色舒悅言坐有二相一降伏等者因中所作之事皆順生死今成佛已不順生死降彼因中順生死心所以左押右又右者用之先故因中造惡先舉右手今日以左押右故名降伏坐二者吉祥以右押左此方以左為尊以右為卑西國以右為尊以左為卑此則以右押左以尊押卑也又右者隨順佛果位中所作善事名吉祥如人作事左則不祥四十年前聲聞修行取小乘果名左左不祥也今日回心隨順佛果菩薩善事所以將右押左名為吉祥問未審此座其相云何答路云有説以兩足趺加結置兩䏶上如龍盤結故名結加應為加字重也有作跏字不知所從疏主造疏時字未足如今有也又坐有兩重一蹲坐二舒腳坐三怙膝坐四䠒跪坐五垂腳坐六駱駝坐僧祇律六群比丘作駱駝坐諸比丘白佛言自今已後令法加趺坐此中意雖舉結加趺坐意取此坐時所入定也嘉祥云結加趺坐者為入定之緣此座不同俗人又異外道常立或翹一足身既不端心則不正結加趺坐是諸佛常坐威儀表佛身端即心正問諸威儀中皆能修善何故但説結加答佛及弟子住威儀而入定故若行住速疲勞故倚臥便增睡眠唯結加坐不退也瑜伽論云結加趺坐有五因緣一順生安最為勝故二由此宴坐能經長時不疲倦故三是不共法不同外道之所有故四令見者發信心故五佛及弟子共許可最勝故如是威儀一切賢聖咸稱讚故正觀如是五種因緣是故應當加趺坐也上辨安坐義了言此明依止安處等者出所依種類也正是論主解威儀成就以彼論主科為三段疏主都引論家三段科文來每段向下配屬經文三段論文經一處著總威儀威儀不一所以謨科科所依種類也論主問云示現依何等威儀而説於法疏主解論家問詞云此明依止安處何等軌儀而説於法疏主自答云依三種法故言今依三種軌儀者疏主解三種威儀威儀即法也論云一依三昧成就故疏主配經云入於三昧身心不動是餘二準之也上疏主科經言入定證真等者疏主筆斷三段文也問何要入定答入定為證真問何要入定證真答入定證真只為起通問何要起通答起通為警動問何須警動答令衆生生渴仰心故此分三即是入定雨華地衆生生渴仰心言不唯等者述古非以彼威儀成就中加趺坐文顯古人疑只喚結加趺坐作威儀餘入定雨華衆生渴仰心不是威儀疏主破云不唯安座名為威儀也言梵云三摩地等者釋三昧緣由安國云禪定諸名不同總略而言之不過九種一名三摩呬多唐言等引三摩等義呬多引義舊云三摩提也等引者唯定非散通有心無心有漏無漏此有兩師解初師云引等故名等引正在定位身心安和平等之性名等只此等心由定力引起定為能引身心平等所引引之等故名為等引依士釋二云所引故名為等引謂由定心起來能析伏惛沈掉舉離高下故今定心平等只此等心能引起定中心身安和適悅名為等引此即定心名等身心安和適悅名引等之引故名為等引依主釋二者三摩地唐云等持舊云三摩翻為正定者訛也三摩是等義也是持義等謂平等由離不平等煩惱心故而得此平等故名為等持問若凡夫位中持得不平心名等持佛位無此不平等心如何名等持答如此平等持心而至於境名為等持通定及散通漏無漏唯有心三者三摩鉢底此云等至舊云三摩跋提唯定非散通有心無心根本近分四馱演那此云靜慮舊云禪也五質多翳迦阿羯羅此云心一境性也質多心義翳迦云一阿羯羅境也多者性也六奢摩他唯定唯有心也七名現法樂住唯定非散唯根本八名心九名定也言觀無相理等者問此云三昧是何三昧答疏云觀無等處者真如理名之為處是無量教義所依止處名之為處無量之處名之為處若解無量義經釋名處解了今解處亦一字是真如真如亦名無量無量即是處持業釋準瑜伽云無相三摩地者不低不昂違順境共二相應故一不思惟一切相故名為不低二不思惟無相境界故名為不昂也言論解一依等者標三昧成就也論主問云世尊於何等威儀而説於法答依三昧威儀也問何名三種答一依入定二動地雨華三衆生渴仰問三中後兩段威儀可然未審世尊那伽常在定何要入定答論有二解一者成就自在力二者離一切障隨自在力言一者成就自在等者論初解也問論中兩解何別答初約德明自在後約障明自在是二差別論云自在力者有三一者只定便是自在力同時定心起來令一聚心心所法專住一境因茲便有決擇智生名為定自在力二者由定同明起得根本智內證真如名證自在力也三者由定同時起得後得智為衆生説説亦自在名説自在力由成就得三種自在力身心不動故離分別計度憂喜等境皆不能動也設使金剛神以金剛杵奮威懸擊皮肉不傷假使劫燒亦不能損如再生尊者林中坐禪牧童見謂之滅度積聚此薪荼毗供養火滅出定身毛不傷上引論文言謂若不入三昧等者疏主解也問何要事須入定答疏云謂若等問何名分別動搖答心有分別身有動搖二者心有分別心有動搖若順情境到心與喜受相應身帶悅澤光潤違情境到來心與憂受相應身帶憔悴枯稿也言今入三昧等者今若入定身心俱不動故世尊欲説此經還須先入定身心不動於證及説得自在故故入三昧也言二者離一切等者論第二義十一個字是論文也言謂入三昧離諸等者疏主解也一切煩惱皆是定障就勝而説下劣受變惛沈掉舉順逆差別一者順障謂惛沈二者逆障謂掉舉今入定離諸定障令入三昧觀無相理起根本智內證自在由智慧力外為衆生説法慧得自在名得自在力同時離定障定得自在故言離一切障隨自在力上依論雙標二義也言論次別釋者論主重釋前二義也言隨順衆生不見等者對治道者定慧兩法及菩提分法總是對治道也若作覔字錯也正合作不見二字傳寫人相連書之成覔字也論云不能任運見對治道明知作不見為正也對治之法莫過定慧及三十七菩提分法總是能對治法也所對治是法執煩惱如來入定隨順衆生從定起慧攝取菩提分法故攝取者證會義交衆生證會取三十七菩提分法一則對治定障二為成佛之因上論文言釋初自在力等者疏主解也凡夫事須加功用行不能任運而得也言今佛亦爾者諸佛菩薩任運而得名自在解初自在力也言二為對治無始等者論主解隨自在力也言釋隨自在力等者疏主解隨自在力也謂定能起慧本後二智內證外説故名為力隨彼定力斷得定障隨彼慧力對治堅執煩惱名隨自在力言堅執煩惱謂分別等者有堅執煩惱於煩惱上有分別動搖由心有分別身動搖即是見好生喜見惡生憂因茲便有是非心起是非心起自是他非因此是者生愛非者生嗔便能發業招後苦果也如是輪回被衆苦縛盡未來際沈淪惡道無有盡期推功歸本皆是衆生本來起堅執煩惱分別動搖也言今為治此分別等者故入三昧離堅執或分別動搖故佛世尊示現入定也言論又解云等者解器世間也故佛知自身上三世事及知他人身上三世事據實亦合噵未來論家文略也言示相故也者問佛何故入定斷定障耶答疏云示相也不是實入定也言問佛無不定心行住等者問意佛無不定心那伽常在定尚不起滅定而現諸威儀若爾事須加功用行耶如來但任運起身説法何須入定耶下有十義答也言一入出隨緣等者入則靜出動出利物即是説法化主入利物則是動世界或出動是説法入靜即是衆生見佛入定亦是入利物也言二若不入定等者定為瑞本若不入定而現瑞者恐有人言非佛現也意令知法妙而生尊重是佛現之也言三欲説法時等者若不入定爭知鶖子是上根法説中根喻説下根宿世因緣言四顯法殊勝等若不入定説法恐人生容易心顯佛説法事須先證而説令生尊重佛欲説之尚須入定將知此法極是甚深也言五顯慧必由等者欲得起慧事須證理欲得證理事須修定又顯指後得智證理指根本智後得説法根本智證理必由入定方能起之師範後學令向後一切衆生定慧雙也言六示定慧等二乘唯得四禪八解脫等唯是定滿未斷所知障不得慧滿又云佛示定慧滿若不定滿則定門不彰若不説法則慧義不顯言七者為末等者為將來作説法摸軌佛欲説法尚入定靜心況於餘人輕爾輒説言八示善思惟等者金云不同餘人要假咨問若能入定思惟即能解故故是聰明攝云不思而説説多疏謬思而方陳陳乃審諦審諦無過故是聰明之相如夫子入大廟每事皆問亦如問馬足數乃方對瑜伽云有三聰慧一於善受行二於善決定三於善堅固名聰睿也言九入定現瑞等者有三解一云彌勒四衆各有三問彌勒三問者一問放光今者世尊現神變相次問入定今佛世尊入于三昧後問雨華動地現希有事等二者四衆三問者一問放光二問雨華三問動地衆生不知佛入定故不同也三者彌勒問四衆問為二答則文殊二問一答名三問答也言十顯示三密等者意密等者意密即是意業教誡輪放光身密即是身業神通輪説法語密即是悟業記心輪古人多取語業名教誡輪意業名記心輪乍觀似通理即不然也先由意業思擇觀察衆生然後救度所以意業名教誡輪先由觀他人心然後説法以語説法屬記心輪也言偈曰隨瑞審妙等者勒偈備忘也隨是入出隨緣瑞是放光現諸瑞故審根故餘準知言問將説法華等者問意如來何不但説法寧要入定耶又定中何不入法華三昧入無量義三昧耶言答即如將説般若等者例同此經也問為復唯説法華要入之諸經亦爾答如説般若亦先入定不唯此經説般若時亦入定不言入金剛定今説法華何要言入法華三昧也言法華體即無量義等者理體無二問夫説法華即合入法華三昧何故入無量義定耶答緣法華三昧與無量義三昧不別若依四禪定觀著出生真如理名無量義處三昧若依四禪定觀著出水真如即名法華三昧二經俱是真如所以不別也言無量義經為菩薩説等者對根名異答無量義經對菩薩説但名無量義法華對聲聞説但名法華言無量義經談體等者體用相增答問二經俱以真如為體有何差別答疏言無量義經等且無量義談體能生教理真如之體得名無量義法華經約真如之上有能出二乘法執濁水功能名為法華二經俱以真如為體故將法華且入無量義處三昧也言下文有悟等者指陳隨勝答問若無量義經為菩薩説法華經為聲聞説何故下文為華德菩薩説法華三昧不説無量義三昧耶答疏言但是隨機濟等意導隨根不同宜聞無量義經名目發心便與説無量義名字宜聞法華發心説法華也言又教理行果等者明寬狹有殊也問體既無差何故分於二經答疏言又教理等意言無量義唯是教理法華通教理行果等四如前者此間還合有五重問答也言又先觀察等者證理推功答所以入無量義處三昧觀理後方説因果功能法華故從無量義定出説法華經也言今此雨華者經云是時等嘉祥問云何入無量三昧已現三種瑞謂雨華動地放光答今將明盡理之法故有三種極大之理天為其大雨華地為其大動地佛為其大放光以表法不可思議故現三種也安國云雨華故世界所以嚴淨地動故衆生所以調柔方可化以佛慧住經之理之所感精變天地不隱其瑞地不吝其動問如來説此法華經即應便説何須雨華動地耶答正是四衆堪聞一乘時既有非常之瑞必有非常之法便感諸天供養所以天雨四華天雨四華與法華經為瑞相也亦表三世諸佛同説一乘三根衆生同歸不二故現三瑞也是時者入定時也天雨者涉云忉利天人遊天園中華向下散名雨天華也今此解皆是如來神力也動地雨華一切皆向如來身上説不得向天人身上地神身上説問若不約天人身上説如何天雨華答從上而下似天降下故言天雨也言曼陀羅等者問何名適意答疏解云見者心境適悅人心故名適意也摩訶者大也適意大悅人身心也言曼殊沙者此云柔等者有二義一體柔耎故立其名如言耎草二云此華能令見者身心柔耎離剛強三業礦者古猛反金璞也分粗弊三業不調柔喻如金曠也摩訶云大大柔軟華表佛言調柔軟悅可衆心經云有佛子心淨柔軟亦利根又云聞佛柔軟音深遠甚微妙又云若人善軟心所雨之華見者身心柔軟佛説法華經聞者離剛強礦三業故四十年前聲聞堅執剛強無人共他語得今聞法華經知二乘果不究竟故便捨二乘果回心向大除彼法執云乃心性柔軟有此所以説柔軟華也問此四華作何顏色答曼陀羅其色似赤而黃如緑而紅曼殊沙者其色鮮白無能為喻今時雨者多是白華有所表矣如白蓮華白毫等路云問涅槃何故列適意等四華已復言曼陀等答即翻譯謬也言欲明法悅心者結曼陀羅等大小二華調三業者結曼殊沙等大小二華亦云雨四華之意爾時舍利弗踊躍歡喜又云心懷大歡喜身意泰然快得安穩皆法悅人心也言芋音者一切神通力雨華動地事皆約佛神力説若約能名芋約所名雨衆生見華從上來故名雨也言華有五德等者一掩臰惡庭前華始吐臰惡早蠲除會下暫聞經即能摧障垢經云我今復疑悔又云疑悔永已盡又云若有淨心敬信不生疑惑者等言二嚴淨國土等者天華若降了國界自端嚴身若暫聞經萬善皆增長即是十一位得證一位發心二十五位得益又云無量珍寶不求自得法師功德品云云言三敷榮見等者華若不開則已開敷必見蓮臺教法不説則已説則必顯其理華若現敷榮必能見蓮藥如來説妙法決定悟一乘也言四先花後果者樹若華發當知果不虗衆生悟一乘必證菩提果經云若有聞法者無一不成佛問何不當日下果子答若雨果子不雨華應可不行因而得果言五香氣遠騰等者此華不唯能結果抑亦香氣遠騰所以順風香氣遠聞者必勸欣名聲遍十方聞者皆歸仰經云見佛在大衆名聞滿十方又云即時諸天於虗空中高聲唱言過此無量無邊百千萬億阿僧祇世界有國名娑婆是中有佛名釋迦牟尼等言唯雨此非餘者表聞此經發心勸悅雨初二華意也離執二乘硬強心故出後二華意四十年前執著心名硬強今日回心名捨硬強心故名雨此非餘也言又將開一乘等者五者無增減也亦云明四華雨之所以謨云此則疏主以義推之非不如是未必即爾如火宅頌亦作如是進退解之一乘之中法有四種故雨四華不多不少此上顯實言亦開示二乘者開權之中教理行果有四故雨四華且大乘有四經云曼陀羅華況教摩訶曼陀羅況理曼殊沙華況行摩訶曼殊沙華況果又小乘亦爾曼陀羅華配小乘教摩訶曼陀羅華配小乘理曼殊沙華配小乘行摩訶曼殊沙華配小乘果言亦為度四生等者已下十三重俱是疏主進退以義安之也胎卵濕化此約具緣多少從寬至狹配卵生具四緣一胎藏二卵㲉三濕潤四因業前三增上緣後一因緣緣胎具三緣除卵㲉濕二緣除胎藏卵㲉化依一緣除濕潤唯有業慧也言興四念者觀身不淨除淨倒觀受是苦除樂倒觀心無常除常倒觀法無我除我倒如次能作常樂我淨四德之因名名四念住問何不言慧而言念住答積念能引定此心無始時來如猿猴禁制不得佛交修四念處觀先由於念明記能住於心專住一境是念功德德引於定定能引慧從初緣説名四念處不言餘法以鄰近為名也言修四正勤者古譯云四正勤新云四正斷於此四中精進起用能正斷故名為斷謨云外道亦云有修斷錯行亂學不名正斷也一未生惡法修斷斷下一個斷字是能斷精進心上一個斷字是未生惡法恐未生惡法生來事須修精進心防不交生起三業與精進心相應初夜後夜學悟瑜伽惡法無容生起惡法是所斷精進為能斷能斷所斷故名斷斷如設堤塘二者已生惡法修律儀斷也殺盜淫妄名惡欲擬斷斯法事須修能斷律儀律儀即合掌禮拜披陳懺悔此名律儀為能斷已生惡法修律儀律儀即斷若約所斷惡法律儀之斷如斷蛇頭精進能斷惡能斷説名斷惡法能斷善惡法亦名斷三者未生善法修修習斷善法未生修習交生還是三業精進身業禮拜口業讚歎意業恭敬善法是所修習精進為能修習能修習即斷持業釋猶如鑽火四者已生善法修防護斷善法雖然已生若不著精進防護被他懈怠起來損却善法善法是所防護精進為能防護能防護即斷持業釋如溉灌陸言獲四神足者神謂神通足者因義因能得果因得足名也欲勤心觀四法為因感得神通為果名四神足一欲以希望為性擬修神足須得欲然後修之勤勤即精進心者果去世中劣定定是心學定得心名由曾修劣定熏得種子由曾修皮定方始今生能修定也觀即是慧也此有二解第一欲勤觀為因神者定也神定神變自在禪定者名神欲勤心觀為因神之一字是果欲勤心觀為因修得四禪定為果四禪因足有四名四神足第二云欲勤心觀為因起得四禪定為因起得神通為果此第二解恰似欲勤心觀一重因上感得四禪定等神通四重果也言行四法迹者迹者因義因得迹名四法者無貪無嗔正念正定四法與三學為迹對法第十六云無貪無嗔為戒學迹由因貪嗔為門毀犯戒學故所以無貪無嗔為戒學迹也正念為定學迹由念於境明記不忘然後定生能令專住一境故念與定學為迹正念與慧學為迹由定令心專住一境因慈便有決擇智生故定為學迹也言證四諦理者知苦斷集證滅修道苦空無常無我等十六行相如下辨言截四流者漂人天趣溺三惡道令不出離如世瀑流漂草溺魚浮向上名浮漂龜魚沈向下名溺即四瀑流也路云依大乘解一欲界四諦每諦下十煩惱中除五見為見流又除一無明流唯有四個惑謂貪嗔慢疑四諦各四成十六惑也修道之中三個貪嗔慢除無明并身邊二見見修合説總有十九惑并忿等二十成三十九為欲流體雖所發業及所得果亦是欲流非根本故非能故不取為體或相從説亦是流法也二者有流謂上二界各四諦下有三惑謂貪慢疑二界四諦總有二十四并修道每界有二謂貪慢二界合有四惑見修合説總有二十八并上二界憍色諂誑共四各有八大隨計四十八為有流體問彼界煩惱不能發業招於當果應非瀑流答上界諸煩惱雖非發業以能潤故亦名流布三見流者三界見修合説總六十六為見流體四無明流者三界見修合有十五個無明為無明流體上來依路府抄兼取隨煩惱為流體有解不取隨煩惱為流體若據漏義總得名流若據漂溺有情不出三界隨惑向上無此流義事須是發業潤生煩惱隨惑無此功能故不取也言斷四繫者繫是縛義身者定也由被四法繫縛不得禪定名繫一貪欲身繫由有貪欲求種種財為散亂因不得上界定名之為繫二嗔恚身繫由有嗔恚而興鬪諍為散亂因能障於定名之為繫三戒禁取身繫執戒禁修苦樂行為散因能障於定名為身繫四見取身繫由有此繫顛倒推求自是非他為散亂因能障於定名為身繫初二在家起後二出家外道言去四軛者軛者縛義如牛被軛不得解脫大論十九云一染汙尋伺軛二不染汙尋伺軛三喜樂繫縛軛四一切色想軛由此異生雖至有頂而被四軛所繫縛故於彼下地還復受生辨云依初禪定能離初軛依第二定能離第二軛依三四二定離第三軛依四無色定離第四軛言得四妙智者即大圓鏡智妙平二智成所作智初三通本後第四唯後得也言如悟四涅槃者如下説言證四德者即常樂我淨是涅槃德謨云表義有十三重此則疏主以義推之若準道理非不如是實有此理若準擬決定合他經意未必則爾如下火宅品頌疏意也言散佛以申供養等者釋經餘句也問何要將華散佛身上答以表佛身供養問一華散佛即得何要四華答四華到佛身表佛前來十三重四事已周四華到衆生身上亦勸衆生當來成佛成此十三重四事四華經言普佛世界等者二義解普一云只動三千界普普動二者放光照萬八千動地亦等故言普動言釋迦所王三千等者明動境釋迦所王不越三千名佛世界此皆普動也問靈山説經只是小化身王一四洲如何言三千界耶答一云言三千界者依大化身説約二乘回心已後入大乘位當得見大化身也二者釋迦所往只是一四洲以彼一四洲小化身佛是大化身上分出來舉勝攝劣身所以舉大化身所王境故言三千界三者只此四洲是化大化身所王三千界中所管舉其全數故言長安城中住不是總占得他長安城但是所住宅子長安城中住也言此動處也者此上解佛放光照一萬八千世界動地唯在娑婆言下頌中言等者問疏主何以知唯動娑婆不動餘界答疏主之我體向下頌中經意經云而此世界六種震動故知唯動釋迦所王世界非一萬八千世界言或此普動與等者問疏主何故作此第二解答疏主體向下經意故作第二解經云一切諸佛土即時大振動既言一切故作第二解云放光與動地等立理云不爾放光乃寬動地乃狹言下文據近等者問既言放光與動界等如何言而此世界六種振動答疏云下文據等下文據近不説遠顯化此界有捨權就實故下言而此世界者且據此界有捨權就實要警覺聲聞且作是説且局近處説其實普動也言若依初解等者重正當前義也問光中世界既有權實何故不動答他方世界不動有二義一根未熟故不動二設有根熟彼界自有佛教化不開此界佛事所以不動解普佛世界了言振動也者經言六種振動初動相次動因且動相者一動地者不安之相表二乘是權振擊二乘法執堅執之心執二乘為極不肯回心今世尊振動世界表二乘非究竟也二動地者希奇之相表思渴聞法也言長阿含説六時等者六時動中轉法輪時不是唯約鹿菀説一切説法時總名轉法輪時言二六方動大等者忽然東頭高西頭下如廗上翻穀名東涌西沒西頭高東頭下名西涌東沒涌起也南北亦爾中涌邊沒者中心高四方下名中涌邊沒如𨫼上下也若中沒邊涌如水池裏石顆打波四向去名邊也中沒者鑄子瀉油四面中心下又三約人説西涌東沒者妙音普賢從東方來名東沒至靈山會名西涌此間聞經了却回去名西沒到東方名東涌南涌北沒者文殊與彌勒問答了從此往娑竭羅龍宮去名北沒到彼處名南涌也龍女從海發來名南沒到此間名中涌此間事了却去名中沒中涌邊沒者十方分身從本國來名邊沒到此間名中涌此間事了却去名中沒到彼處名邊沒也言今或是此者意言此佛欲説此經時地六震動或是此大般若中六方動名六動也言三六相動等者標六相也言搖揚不安等者釋六相揚者風吹雲飛也鱗壠等者鱗謂魚鱗壠是新耕地凹凸壠中鱗壠相似凹凸即是高下不平之貌也言或六方等者問何名涌答六方出沒為涌即前來佛菩薩也言隱隱有聲者問何名振答隱隱有聲如雷起威懼之義如立春地下即有雷聲人自不知野雞即知聞便警覺作聲也言舊云自下等者問何名擊答古解自下升高起作一塠土平地生骨地也今云有所扣打名擊扣音如打物相似名相似也言砰礚發響等者問何名吼答砰礚等砰音普耕反磕音口問反並雷聲亦名聲言舊云令生覺悟者問何名𪹼答舊云令生覺悟見外邊地動知身無常也今云出聲驚異為𪹼忽然作霹𮦷發故相似也問六相有何差別答動者平安之相涌者高下之相振者聲小而長擊者聲小而促吼者聲大復長𪹼者則聲大而促是差別也言但爾小動名動等者問如何名動答初動一字但名動次動大地名等極動涌等極涌振等震等極震擊等擊等極擊吼等吼等極吼𪹼聲次大等極𪹼聲最大舉初攝後故言餘五相皆準知也言今此舉總等者問既有十八動相如何大般若但説六相動也答疏言今此舉總等謨云經中六動兩字有二總義一則總前三種六相二則總十八相言唯是十八變中者即十八變中第一震動也言勝思惟梵天等者動因問世尊起六種震動有何所以答疏云勝思惟梵天經論為句讀也菩薩造論解勝思惟梵天經經與論是一處也若別讀即自諸餘論也以具七因故振動世界也此經有四卷也言一警怖等者令知佛出説法令相怕怖不被違害佛故言三令放逸等者外邊大地尚自有動搖況此身豈得常耶放逸塵境當便沈論能生覺心息諸苦縛故有頌言寧使現在於財位遠離惡趣及惡行勿使富貴亂諸根令感當來諸苦器也言四令念法相者安國云觀此動欲令衆生思念世尊將説何法金云令諸衆生見地動已作念云一切法皆悉遷謝大地尚爾何況餘物令念苦空無常也言五令觀説處者攝釋云二説二云處者法也今見地動即知諸佛欲説餘法二云處謂處所見地動已思念如來何處説法後解為正若準前解與念法相不別也言六成就者相云如聲聞三生已來是根熟者見聞地動便得初果等解脫言七令隨順問正義等者如來心中欲擬説一乘為所隨順彌勒問四衆問為能隨順問正義者今佛世尊欲説何法問正義故如風靡草化人從己故謨云如來心中擬説一乘故現此瑞彌勒遂問文殊答等名為隨順也言此衆生世間者不是依人數但取衆生身中渴仰之心也言塢彼近等者塢波迦三字男女皆同索與斯字便別索是雄重聲斯是雌聲輕清聲男女遂別也言以諸男女等者問此諸男女二衆俗具何德能有何所以名近事男女等答疏云以諸男女等即五戒是也有抄配成就五戒男堪可親近比丘成就五戒女堪可親近比丘尼不要作如是配若不成就五戒即不得既成就五戒何妨二衆總通問經會既有菩薩如何不説菩薩答以菩薩現身教化衆生不離四衆攝得菩薩云必在四衆四衆不必在菩薩中故不説菩薩也經云天龍者有解天上龍名龍此解非也天與龍別天衆龍衆前解訖言夜叉者其身赤色雖無翅羽而能飛空有有大神變作大音聲故名勇健亦有翻為天使諸天使故紀國翻為輕捷鬼亦云天狗正法念經云夜叉性好熱血每上妙高山瞻望何處兵戰未得食中間因此長噓嘆息氣上天為星亦云彗星亦云攙搶星也天上有星必有兵甲之事也在須彌山第三層住言攝地行類者羅剎是地行類今經中只言夜叉不言羅剎羅剎向夜叉中攝夜叉飛空羅剎地行向夜叉中攝也金問因修何業生羅剎中答法炬陀羅尼經云違拒師教生夜叉中口説不行疾他名利生羅剎中以類同故攝得羅剎也言彼皆訛者空言夜叉羅剎名皆訛也言大蟒田蚊等者蟒字魚朗反蛇也爾雅云蟒王蛇蚊字切無大蝦蟇也問蚊有腳如何言腹行答曰有腳腹著地總名腹行言餘如前説者今言人即四衆非人即八部八部多變為人而來聽法故言非人也指前解説此間更不説故言如前也言轉輪聖王有四等者解二王也經云及諸小王轉輪聖王小王是粟散王粟者是喻散者多也小王數多猶如散粟前來列衆處解了次輪王輪王有四仁王經兩行偈明五忍法門初一行偈忍方便鄰十信後一偈明伏忍在三賢位頌云十善菩薩發大心長別三界苦輪海者此解仁王經第一行偈中上二句十善菩薩發大心長別三界苦輪海者發大心者四弘誓願心一煩惱無邊誓願斷所斷大故衆生無邊誓願度所度大故法門無盡誓願學所學大故無上佛道誓願成所成大故故名為大所求所度既名為大能求能度之心故名發大心三界生死十二有支輪轉衆生名輪漂溺義邊名海若回心漸悟菩薩至此位中名長別頓悟菩薩至此位之中發心將別故名別也解上二句了言中下品善粟散等者解次二句經此位之中菩薩修行十善有三品上品十善為鐵輪王南閻浮提感得鐵輪二百五十輻住在頂上當州內不賓者將兵烈陳交鋒得勝便更無損害降得將來交行十善更不敢起惡心從人壽百歲時已上至千歲已來有此王也中下品善感粟散王也就中下品十善之中十六大國王此唐國王中品十善感也若回鶻土番王下品十善感第一行了言習種銅輪二天等者彼仁王經中十信攝入十住四加行位攝入十回向唯有十住十行回向此前三十心名伏忍二信忍在初二三地三順忍四五六地四無生忍七八九地五寂滅前四各三品第五唯二品下品第十地菩薩等覺位菩薩上品是佛位也偈云習種銅輪二天下者金云謂十住菩薩作銅輪王王東州南州此位菩薩修下品忍漸伏見道煩惱住十住位感得銅輪五百輻住王頂上東州南州有不賓者一降已後更不起逆心勸行十善從千歲已上至四萬歲已來有此王出也偈云銀輪三天姓種性者謂十行位漸伏見道煩惱修中品伏忍作銀輪王王東南西三州感得銀輪七百五十輪住王頂上三州人有不賓者遣使傳語便伏已後更不起惡心勸行十善從一萬歲已上至六萬歲時此王出現性種性菩薩作銀輪王也偈云道種堅德轉輪王者問何名道種性答道無漏聖道問道種性在何位答此在十回向位近後主聖道感聖道之因名道種性作金輪王王四天下感一金輪純金所成而有千輻住王頂上四天下四州各有八萬四千小國望風順化無有不賓伏者各持寶物而來請王各請向本國行化從人壽六萬歲至八萬歲已來有此王出聖德堅固名堅德也聖教説唯金輪王具相好餘者不爾言七寶金光等者路云準彼經説唯金輪王具七寶餘三無也一者女寶王夫人身中常出無價栴檀之香口中常出優鉢羅華香身觸細耎如迦陵伽鳥若有觸此鳥者得遠離疲乏飢渴憂愁苦惱彼之輪王夫人亦爾若見若觸皆受快樂寒時身溫熱涼冷一切男子見此女者心善分別如母姊妹而有五種功德相應一順夫意二多生男子三種姓不劣喜樂好絶不生妬心四夫共餘女娛樂之時不生嫉妬五所生男子皆悉勇健人中第一能壞他軍與轉輪王種姓相問何以業招答離嗔善業勢力感故二者珠此有八德一於夜暗中作善光明滿百由旬若於晝時日熱能放冷光明等二若行曠野能令多有八味相應清淨水除一切渴三若輪王憶念水時隨王意流出四具八楞一一楞中有青黃赤白紫頗梨等光五能令五百由旬內人皆離病惱心行正直六能令惡龍不降惡雨七於矌野處能令地樹木泉池蓮華青蕖軟草八能於令人無撗死無不盡壽能令畜生不相食噉不相憎嫉珠八般三輪寶者具有五德一具足千輻輪其體皆閻浮檀金廣五百由旬如第二日二行無障礙乘空而去一日能行百千由旬三隨王憶念於彼彼處非空而往四若有不順之者能令降伏五無能為敵若王王等見即歸心四象寶者調順第一支案地所謂四足尾根牙等若有如是七相具足勝餘弱一千倍力三處能鬪水陸飛空於一日中繞閻浮提能行三匝彼性調順以一縷線繫咽牽行輪王乘之隨意即至小兒見者不怖心若鬪戰時甚能勇惡五馬寶者色如白鵝普身皆有天旋等相以為莊嚴於一日中繞閻浮提能行三匝而身不乏六主兵臣寶者隨王憶念而知主意所為所作皆能成辦利益一切世間衆生猶如父母七主藏臣寶者即是主藏大臣大富長者能以金寶因陀羅青色寶珠種種諸寶於一切坑澗深山幽谷不平之處皆令填滿不待王敕寶終不盡何況金銀等當知轉輪聖王具足如是七寶用故皆是十善中一離嗔所感也又有相似七寶一者釰寶二者皮寶三者床寶五者殿寶六者衣寶七者履寶具釰寶者若有國土起拒逆心如是釰寶疾走而去不害於人見則降伏二皮寶者出於海中適人得之以奉輪廣五由旬長十由旬海龍王皮也雨中不爛風不能動火不能燒寒時能溫熱時能冷隨王軍衆之所將行能為屋舍悉能容受王并軍衆一一隔別妻婦不離各不相見其色鮮白如日光明三床寶者柔而細滑坐則凹起則還平若坐彼床心念欲等即能離欲諸有婦女雖復於王極生染心見此床寶心則無染四林寶者若王憶念遊彼林中出生華果賖居尼鳥蓮華池流於彼濟口天樂綵女亦來集會五殿寶者王在殿中夜偃臥時欲見星月者則有星月於其中現見已眼樂為之是珠眼安樂睡睡已善夢見妙樂事寒時有溫風所吹熱時則有涼冷觸樂六衣寶者縷成密緻第一柔軟無垢所汙王若著時無其寒熱飢渴消疲倦乏極火不能燒刀不能割七履寶王若著時水行若陸百由旬亦能行去不損威儀而身不乏如是輪王具足七寶復有如是相似七寶隨心受用何業所招答離嗔善業之所招感也言此與餘經三種性別者餘經無三種性只有二種性應合道此經三種性與餘經別仁王有三性餘經立二性也餘經即是善戒經也地持瑜伽唯識等經論也善戒經第一云菩薩有二一本性二客性瑜伽唯識攝論皆言一本性住種姓二習所成種姓皆與仁王經有異問何以故答善戒經等據法爾無漏種子後因修習增長并新所熏種子亦名習種姓此乃性種姓於先習種性在後也仁王經中不約本性種説但説新熏進趣修行初習名習習已不退名性種姓轉更增勝名道種性此乃則習種於先性種在後也言亦與十地經等者只是配位不同仁王經中有十四王地前為四輪王十地菩薩為欲界六天王乃色界四禪王從下向上次第配之各為一王也十地經將十地菩薩作輪王來名金輪位異也且依仁王經配者初地菩薩為四天王二地菩薩忉利王三地菩薩作夜摩王四地菩薩作兜率王五地菩薩作化樂王六地菩薩作化王七地菩薩作初禪王八地菩薩作二禪王九地菩薩作三禪王十地菩薩作四禪王上二王配了十地經配者初地菩薩為閻浮王即鐵輪王二地菩薩為金輪王三地菩薩忉利王四地菩薩夜摩王五地菩薩兜率王六地菩薩化樂王七地菩薩他化王八地菩薩初禪王九地菩薩二禪王十地菩薩四禪王此依十地經配不作東西二州王者路云以偏僻故又有説願力異故初地菩薩願力劣作他東西二州王不得唯作南州王乃至到二地菩薩願力勝不東西二州便作北州王如新受戒了師僧未合作典直且作維那後三年五歲作事識其高下不作典直便作上座也若言偏僻唯約此方説若西國以東為上南北亦是偏僻也不作四天王天以臣佐無主故不作三禪王者樂勝故問何故二經配屬不同答輪王有二一凡夫二聖者仁王經通內凡作輪王故配四十心位也十地經唯約聖輪王説故配十地菩薩或仁王通業報十地約願力也問云菩薩所求妙覺復須謙己利人何得多劫為輪王增其我慢答權生勝位引餘智者令其發心利益既多故無過也言應會釋者一句通上三種姓殊也言覩神變之希等者路云覩天華之悅目覺地動以驚心合斯二種威儀總名覩神變之希奇得未曾有也言發勝心等者謨云根法扶如二掌合言澄情寂等者表無他念更不異緣名一心也言冀發金言等者冀者希望也金言者如來金口所出言教名為金言或一乘可重如金也言第五依止説因等者如來説法為能依止衆生心為所依止如來説法是果衆生渴仰心為因言論有二釋者問以何法為説因答論有二釋一取衆生渴仰心為説因二取放光為説因是疏主取論意標準論文意合有二釋非正論文也言一云彼諸大衆等者是論主解説因也彼論大衆者即是靈山會上十五類大衆也言現見異相不可等者即是雨華動地放光照境所覩合為異相不可思議事者正是能生渴仰心問何名渴仰心答既現瑞相已後便作念如來應為我説何法渴仰欲聞生希有心正取渴仰心為説因言是故放大光等者論主自結異相也種種事者即光中七事也言夫佛説法等者疏主第一解論意也即是所説果也生發希渴之心名為説因即是説法因也言此明説法所依止因者都結也如來説法為能依止放光衆生渴仰心為所依止衆生渴仰心為因如來説法為果上疏主解説因言放光遠照等者放光遠照牒前照境也異相二字牒前所見七事七事與衆生渴仰心為因言大衆覩光等者即是靈山上衆生見萬八千界光中七事也遂興正念者即是如來為我等説何法也言是故放光能生等者疏主法第一解也言二云先示現等者疏言等者雨華合名説因想名先現外事正宗前故名之為先問何故第二解通前動地雨華答以論中前解唯取能生衆生偈仰心為因今此第二解通取雨華動地為説因並是外現神變事故故等字之中不等入定入定非外事言後示現等者金云法門即是放光名此法門先因動地後放神光對前動地故放光為此法門也此説非也但取向下方便品正説一乘開示悟入之處名為法門通內證及外説故故中論有中字也言內證深密法故者即是佛內證成就得菩提涅槃二種法故亦名授記經也言所以先現神外事者疏主解也此論法是一乘教法乃由內證此從外向內解也問先示現神通外事有何意答欲擬外為衆生説法華經問因何事意便為衆生説法華經答只緣內證深密故言又由內證深等者此第二解從內向外解也所以內現神變向外也問外現神變有何意答欲擬為衆生説所之法説所之法即是一乘法華也上來總標外事了言雖先雨華動地等者次下別因放光亦表通難前來從外向內外總兼雨華動地此下正是疏主重料簡唯取放光也問何故疏主前來總取此間又簡答疏主意若論主得衆生渴仰心雨華動地不妨總有此能若取為第五説因成就放光偏勝也希奇等者更甚前雨華動地雖是一事此之放光遠至他土一萬八千所見七事此會一一皆見是希奇也言一放光者靜法師云將然智炬光曜其身所舒玉彩於眉間現希奇於城外衆生覩而渴仰如來由此説經故取放光為説因也放光有二義一展眉間毫毛著名放二毛頭出光任運遍三千收即常光一尋展即彌遍法界名放放者舒展之義如來大悲常自制攝於身四面各照一尋項背圓光過百千日言眉者面首之媚者經云眉間即眉兩中間也一箇眉表一箇眉表非有故非空非有兩中間間者中道眉者面之首一面之上最勝莫於眉眉者媚也面上頭上事須得眉眉與頭面為媚好也食舉一衣舉七作粧畫眉媚賴當時出京兆尹張敞為婦畫眉臺司舉奏對曰臣有國房為婦畫眉之果也人面上若無眉害癩兒盧少倫是措大不信佛法將佛經作承小土在後眉髮墮落害癩自作詩云癩去也癩去最為精眉毛總落盡愁來何處停又一部蓮經如美女面頭頭題五箇字以雙眉美女本來早端況更面上畫雙眉遂得一顧傾城千金買笑二十八品經文早不思議更向每品品安妙法蓮華經五箇字令一部蓮經足姿媚恰似女人面上畫雙眉四十年前聲聞不回心世尊眉眉頭不展爭知父每念子與子離別五十餘年而未曾向人説如此事但自思惟心懷悔恨今日向靈山會上得聲聞回心從佛口生子從法化生子世尊從此展雙眉白毫毛頭放白色光便是説蓮經時經云今正是其時決定説大乘也言毫者長毛等者長毛作毫若取毫異之毛取毫字亦得衆毛之中最勝也豪者俊毛也淮南子智出萬人曰毫二字皆得言中外俱空者內空如琉璃筒子向內見外名外空向外見內名內空故名內外俱空也內外互不相礙也言放之圓卷等者放已却收在額上圓卷狀如秋滿月其色瑩淨似秋滿月也言圍如三等者疏本定若作圓字即毫毛以三寸圓若圓字即毛以方圓徑以橫竪三寸即有三若作圓字徑頭橫竪皆三寸但是卷之處方圓徑也一寸三寸也非是毛頭方圓一寸此皆不正也言令生淨信者既外有光時必是內有勝德名勝人也言二能破暝者日光出已世界黑暗皆除毫光展時表破衆生身中愚癡併蕩經云日月威光所不照與皆大明可了境界癡惑故暗暝者莫定變夕也破器世間暗愚癡併蕩者破衆生世間暗言三能導明等者衆生眼雖有光明白日則見物夜則不見事須得日光月光照向外引眼光能見物衆生內身有智慧光明事須得如來身光引方生言四表內發智光者故外有身光也言五能濟衆苦等者表佛放光故息地獄苦經云處林放光濟地獄苦涅槃經云佛放月愛三昧光明闍王身瘡遂得消滅言六警覺群情等者由觀光明有緣皆至如俗講下於種召人如來説法先放光召令生覺察來起道場問疏言有緣皆至為屬此界為屬他界答惟屬此界尋下文不見説他方尋光處問下云又諸萬億國轉輪聖王至如何路云三千界亦有萬億輪王至故若淮下文千世界微塵數等及妙音等亦通他方此解善賀破云準菩薩戒經一華百億國國既百億輪王亦然云何三千國中有萬億輪王也謨云此破非理準菩薩戒疏云新舊翻譯不同十萬為億即萬億千萬為億即百億如俱舍算説十萬為洛叉十萬洛叉為度洛叉度洛叉為百俱胝俱胝即百億即十萬為億如三禪下有百億日月等若依百億算十個百萬為一億百個百萬為十億即百億此與路數同故破他非也然路云自三千界者不然準下疏云解萬億處此土佛出無輪王故説他國至梵網經云各坐菩提樹一時成佛道如何有佛更有輪王也言七令厭色等者謨云如來神光顯色無比超出世界五塵等境故令生厭世乃美色不如佛光如世人初婚醜婦後取美室二喻可知言遂然生死等者令衆生見佛無漏毫光色已令知自身有漏色是粗惡可厭之法故云遂厭也言涅槃四色者彼經云種種色光不言四種然不過四色是本面門者口也四色者意表涅槃四德縱有紅緑紫碧黑色類例相從皆青黃赤白四色攝故言上生舉等者舉者遍也表慈氏慈悲平普也言各有所表者涅槃表四德常樂我淨上生表彌勒果滿故舉身放光所有佛事皆付彌勒光如金色顯可重故舉遍身光表圓滿義經云爾時世尊於初夜分舉身放光其光金色繞祇陀園周遍七匝照須達舍亦作金色等菩薩方便經説欲説聲聞法即放齊光欲説辟支法放口光欲説菩薩法即放頂光也言神境智通等者指法相攝也神境智通有十八變神是定也此定作用不測名神定所變名境智是如來後得智故名神境智通智通中有二義一能變二能化化即無而忽有變即轉換舊質即十八變也一振動者如此界六種振動二熾然者身上出水身下出火三流布者謂放毫光遠照他力等四示現者謂開多寶以示衆會於此世界盡見彼土五轉變者如轉娑婆而為淨土龍女轉身為男子等六往來者如文殊從此與彌勒問答了隱身向娑竭龍宮涌出來從龍宮又方來望他名往望此名來七卷者還攝舌相等八舒者如出廣長舌相九衆像入身者像者皓像入者來義如一鏡內有多像故毛吞叵海芥納須彌大論三十五云謂佛菩薩依定自在能攝現前大衆及以一切村邑聚落草木林藂諸山大地一切衆像內己身中令諸天衆各各自知入其身內是名衆像入身十同類往趣者如經應長者身童男童女身而説法等十隱者如變土時諸山不現等如佛入涅槃等十二顯者八相成道如從地涌出等十三所作自在者變大地為金銀又擲世界於他方十四制他神通制伏天魔波旬令無神通等十五能施辨才如加被須菩提説般若十六能施憶念如令阿難憶念過去無量百千億諸佛法藏又如婆私吒女見世尊作己子想還得本心十七能施安樂如五百群賊被波斯匿王排其眼目忍苦不堪令念佛施如來神力吹香山中香填滿眼匡普皆得眼衆苦即除名施安樂十八放大光明即此放光如眉間等問此放光與流布何別答若直放光遠照但名放光不名流布若放光兼上下傍遍即名流布問此十八變是六通中神境通攝未知初作何所得成答作輕舉想故瑜伽三十一云作輕舉想謂由此想於身發起輕舉勝解如都羅綿或似風輪發起如是勝解已於彼彼處飄轉其身等言雨四華等者屬當也問前雨華動地放光見六道此十八變何變中攝答疏云雨四華者自在之變即第十三所作自在變六動者即第一振動變攝放光者流布之變即第三流布變攝見六道者即第四示現之變攝也上能照光了
