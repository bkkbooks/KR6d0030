body:
  text: 鏡水寺沙門栖復集言諸法歸趣者有三一知遍計性是一切妄法所歸趣處二知依他起性是一切緣生法所歸趣處三知圓成實性一切常法所歸趣處所以先權後實説於一乘二者明悟三性究竟歸趣一乘一乘者即成佛也由知遍計性是無了依他幻事修淨分依他證圓成實性三身究竟歸趣於法身真如所以疏言明悟三性至一乘也言真如妙理者解姓字與萬法為體性凝然之性即無漏無為法也言體性常者解常字也夫真如者真謂真實表無虗妄如謂如常表無變易不同有為之法無常變易不得言常言佛能證知者解知性二字即是根本智知也上解知常性了言遍計所執二句等者解知法二字也言體性是無者解無性遍計者遍謂周遍計謂計度遍緣一切起計度分別三性之中遍計性也一遍而非計即第八識二計而非遍第七識唯緣賴耶起計度故三亦遍亦計第六識遍緣一切起計度四非遍非計即五識唯緣五塵無計度故如來根本智中證達遍計性後得智中了依他如幻事上解一句經了言佛證無我者結前常性也意言世尊能證二空理性知遍計所執本來性無亦知遍計所執是凡夫虗妄執也故攝論云依繩起蛇覺見繩了義無證見彼分時知蛇智亂迷情不了本體是麻妄作繩解即喻法執復於繩上妄作是蛇解起螫蜇之想喻我執也即遍計心是能執我法二種是所執也言亦知此無等者結前無性言無漏依他者標也問何名無漏依他答疏言報佛種子四字解經中佛字種子解經中種字因緣二字解經中從緣兩字所生二字解經中起又解云從緣所起名緣因修作故名起言無漏依他者問論云依他起自性分別緣所生豈成無漏答有二解一頌依染分説故論頌言分別緣所生者應知且説染分依他淨分依他亦圓成實故二云分別者非唯妄心能緣慮者即名分別故通無漏論或諸染淨心心所等皆名分別緣慮故言因緣所生者即本有種子為因緣三慧聞熏為增上緣世第一法為等無間緣遍行真如為所緣緣報佛種子初地起從此已去十地之因道數數修新熏者生本有者長妙平二智前與後齊至解脫中捨無常色獲得常薀以四智種子生起報身報身得生皆因修作作者起也因修習故方得起也言由證真理者即圓成實性若在十地即證真如若在佛位證大涅槃也言斷能執心等者能執既斷所執我法亦無障染既無既無染分有漏依他便依淨分依他四智種子生起現行成報身智證法身理名一乘此偏取真如理為一乘者意欲令衆生斷染分依他修淨分依他證法身理故説一乘也言何者一乘者答謂重顯常法即圓成實性若約常無常斷簡唯真如為圓成若約漏無漏門斷簡亦簡無漏依他疏主意擬向第二行偈中取真如為一乘所以先徵問云何者是一乘答下解真如是一乘也言重顯常法等者即前行經中知法常無性四字便是第二行偈中真如法也以前偈中知法常無性以解圓成實性今復釋之故云重顯也言法住法位者雙標住位兩法真如法在一切有為諸法之中體性常住故名法住意言真如遍在一切諸法中如青青翠竹並是真如又言真如本有在生死中住名法住言法住者真如法住在三賢十聖及二乘位中斷染得淨分位顯之一切賢聖皆以無為法而有差別在纏名如來藏出纏名法身德也言世間相常住者即前法住法位在世間中即此世間以真如為體體即既常故世間亦常名世間相常住也經言不如三界見於三界至如斯之衆事生住在世間相中元來不見世間相若法性宗世間相即常住迷即生死悟即涅槃如波之與水體不相離若迷時世間即生死若悟時世間相即是涅槃至佛位生死涅槃二皆平等故云世間相常住神智解依性惑世間相是無常住常住之真如也住在世間相中攝相歸性將相就性故言世間相常住世聞相情與非情相狀之相即是無常真如與世間為體相之相即是常住故云世間相常住也言於金剛道場等者解經中於道場知已問何名道場答四智菩提名道無為理名場由證法身理方成報身智此得道之場名為道場又著穀處著麥處名為穀場麥場果中法身理是塵沙萬德法所依止處故功德法名道所依理名場法身當體即道或自受用身名道法身理名場自受用身果於法身場上證得故云得道之處謂之道場也於道場中知此法住法位世間常以且就化身三十四心成等正覺一期化相而説名於道場知已言於無名相中等者解經中導師方便説也若論諸法寂滅相不可以言宣今於無名相中以名相説若論無名相法口欲談而詞喪心欲緣而慮絶今所説者只得其名體如人喚火火不燒口等四諦是名一一諦中有四行相等即是相也上定三性義門了言一切法中略有等者空謂遍計性有謂依他及圓成實性善戒經云有為無為名有我及我所説為空若清辨宗云世俗門中三性俱有勝義門中三性俱空護法宗云勝義門中非空非有約詮而辨亦可言有也言空無差別總立一性者謂遍計性言有法有差別等者此門之中最狹常謂圓成實性唯真如理也言無常常者者謂依他性依他性不得向常法中收但有漏即向依他法中收唯識第八云無漏有為離到究竟勝用周遍亦名圓成實性也真如具三義故名圓成實性也一體遍即是圓滿義二體常非生滅故即是成就三義者體非虗謬諸法實性即是實義也淨分依他亦具三義一者勝用周遍謂能普斷一切染法普緣一切真如法故是圓義二者究竟能斷諸染法是成義三者離到體非虗妄是實義由具三義淨分依他亦名圓成實性言今依前門指前常無常門中兼取無常法淨分依他無漏現種藉衆緣生起故云種從緣起言意顯能證至無我理故者重解經中知法常性二字也言乃能了知二我為無者解經中知法無性二字意顯能證者問三性次第云何若依先證如後斷惑者何故論解無間解脫斷惑證真心別故若先斷惑者何故論云非證見此圓成而能了得依他起答由數修習勝二空觀令無漏種熏習力強此智生時惑障不起遂令永住不生法中任運證於一真法界即此物名真見道中若説證時都無前後後得智中倣法範儀説有次第若説真見初是無間次即解脫後乃勝進故説無間斷惑解脫道中證於滅理及除習氣若説後得即先證真如方能見彼依他起如幻事等於本智中以達遍計所計空故故論云無分別智證真如已後得智中方能了達依他起性如幻事等即先證而後達也先斷後證約真見道論先見圓成後依他起約相見道説故問無始時來緣自相見如何後得方説了達答無始時來二執俱故雖緣自境不覺境空如逢市人不識名字等故論云雖無始未時心心所法已能緣自相見分等而彼我法二執常俱行不如實知衆緣所引自心心所虗妄變現言依他於善友等者解經中法位即是地前一劫有漏三慧聞熏令報身種子氣力漸盛乃至初地初起十地漸修果位之中名覺滿也即四親近行中親近善友行等四勝力中善友力也言今為衆生等者由佛了知三性自證一乘方能令衆生趣證也言今此依他等通難問上説一乘通理及智云何以真理重顯一乘耶答疏云今此依他等言由斷有漏依他等者顯初權後實之意也遣於我法二執證涅槃菩提二果言由了依他等者配三時教也第一時説有者設有於依他不言遍計第二時中説空教所言空於遍計不言依圓第三時中方説真實言今三俱者第三時中三教俱説故名真實問三中二乘如何名真實答四十年説小乘皆隱密説大乘顯了説十二年前説有隱密説空今靈山會顯了説有顯了説空第三時中總説故名真實也言三性之義如別者唯識論中解三性義十二門分別也經言天人所供養至亦説如是法者亦説一實稱可衆生故名安隱言經雖示種種道者開權也其實等者顯實也亦同下文以種種法門宣示於佛道又同前更以異方便助顯第一義經言知衆生諸行疏解總句心行相也知字通貫下諸句言或勝解者問衆行何智力知耶答諸行初為心也行相是總句此解諸行即衆生之勝解也如來勝解智力知於諸有情淨與不淨勝解差別如實了知淨令增長不淨令離等樂三乘等行名淨勝解樂煞生等名不淨勝解言心所念等者知別句各各趣向不同遍趣行智力知衆生有於一切苦能出離行皆如實知言業力者一切衆生自作業自受果佛自業智力知言欲力者起希望愛樂佛勝解智力能知也言性力者於諸有劣中如界部分差別如實了知其根性於彼彼趣入門無別教受如應安立亦即大論四種界也一本性住種性界二習所成界三可對治種種界已種解脫分善四不可對治界謂無種姓人言精進力者有云向處非處智力中收以處非處智力寬故佛法正因名處外道邪因名非處等字之中等取自業智力或由衆生精進感得善果由行惡行感得惡果此是處非處智力行相如來能知名之為力二云或精進力等等取信及念定慧意言精進力即是力以種性體即五根也精進是五根一數故言體即性力前解欲性精進三力各別後解精進力即性力性力即五根精進力不別言下力者將下力字貫通上力也者不屈伏義言前未來佛等者問何故前來佛唯説悟三性不説知衆生根此現在佛知衆生根不説悟三性何也答疏言互相影顯故初權後實義皆同經言今我亦如是至宣示佛道者此一唱經文配為説實也問種種法門一句似説權何故説實説權耶答有云種種法門者序品之中雨華動地菩薩問答意徒宣示於佛道或種種法門者四十年前説權教也宣示於佛道者正是會權入實正是説實也言我亦是釋迦同等者前長行中亦無釋迦同彼之文此間科但是疏主體彼經意言釋迦同也三世佛先權後實説法皆同莊嚴論中由三義故一切諸佛三身平等一由所依同故一切諸佛法身平等法界無別二由心同故一切諸佛生身平等同佛心無別故三由業故一切諸佛化身平等同一所化故今言同者即是業同化不定性權實同故所以經言今我亦如是教主同也安穩衆生者意用以同種種法門者開三同宣示於佛道顯一同我以智慧力智力同知衆生性欲者觀根同方便説法設教同皆令得利益同也且如根未熟聞少即歡喜若大根熟聞大即歡喜三乘各稱其根名皆歡喜歡喜不一名皆皆者俱也言請念等請即諸天請説念即示相思惟也權方即權誘也言般若經説等者緇州以五門辨出體釋名得人相五攝廢立且總名者梵云般遮斫芻般遮者此云五義斫芻者此云行盡斫者行也芻者盡也謂於境行盡見諸色故傍從於此翻名為眼非是正釋眼者照燭義體用相當依唐立名五者數也帶數釋也上解總名下解別名言一肉眼者今取根是眼不取識是眼決云肉謂業異熟色肉即是眼持業釋章敬或即可見彼塵名肉能依色根依彼肉之眼名肉眼依主釋言非於定生者顯是業所招感也言四大所造者潞府兼取能造四大地火水風為性此解非也今唯取所造色香味觸為性不取能造也言長養者有二長養一長養養瘦令肥二養短令長名為長養長養有四一飲食二睡眠三梵行四等至法苑云長養類者復有二一處寬遍即前飲食眠梵行等至二相增感亦由於食及勝作意故即是通心心所令明了故今肉眼有前二長養謂飲食睡眠段食是睡眠之加行故名長養如阿那律不睡喪眼由不得長養故也言或異熟淨等者此五色根是第八相分由先業力牽引今生異時而熟異類而熟變異而熟為異熟異熟即色也問長養色與異熟色何別答則云一種是色飲食等資助所生名長養色從過去業所引起名異熟色也言二天眼者有二一者生得天眼從天身上得名天眼此間之不取也二者修得者決云天名雖同唯取修得者欲界六欲天南三洲總許修也四禪根本定名天眼定起眼天之眼依主或即定光潔名天天即是眼持業釋由坐得色界依此定力資益依眼肉根能發天眼根能見障外境名天眼言斷於定障等者疏主斷也定障有二一者下劣受領納下地境不欣上地定二者昏沈掉舉據實而言貪等煩惱總能障於定故論云此但迷事依外門轉散位粗動正障定故此唯事觀心粗不能伏彼迷理之惑及網俱生但能伏彼迷外五塵起者非能伏彼與見俱生言修習所起者顯不同肉眼業招感故言雖是養四大者言長養者即不取飲食睡眠長養也簡要云自有禪定梵行決云因此修定得名為長養賀問天眼通以慧為性如何乃言所造淨色為性答由斷定障得上界定依定引得天眼淨色在於身中然慧還依天眼根生名天根通亦不相違言觀事有等者觀事有慧對根本智緣有此名觀事對觀空名有慧事亦是教慧眼為本智法眼謂後得後得智有二一緣理後得變影緣如二緣事後得今取一乘緣事者名法眼通緣一切若色若心佛身百四十種功德一切事法皆能觀也亦云是後得智能緣百千教法即名法眼緣理者慧眼收此二俱慧為性言四慧眼者唯根本智緣勝義諦證二空理名慧眼也章敬云案經文先慧後法疏引文倒也言因積而果者三大阿僧祇劫名因積而果圓也言攬前四者攬前四通名佛眼離四外更無別體問肉眼天眼是有漏法如何名攬四眼名佛眼答攬名不攬體也問何以佛位中有肉眼答佛位中有前十五界捨無常色權得常色從無漏五根種子生現行也問佛位中如何有天眼答佛位天眼根由定所引淨色為性辨云六度之所感故故於果中得攬前四勝劣全別但攬於名故無有失言龍樹等者問如何攬前四總名佛眼答疏云龍樹等龍樹菩薩造大智度論釋大品經説五眼義喚大海作天池也天池中無四河名四眼至佛位眼無餘四名四河未至天池名字各差別流入天池總名大海也四眼未至佛身名字各各差別流至佛身通名佛眼上辨名了下出體也言初二體色者業果定果二俱是色牟云然肉眼根諸宗各異順世外道清淨四大而為其體勝數二論以火空地水風如次為眼耳鼻舌身根體也大衆部肉為體若經部師次實極為體一説師有名無實體若大乘宗自有二説一難陀師以識種為體二護法義以能造所造淨色為體於中分三一唯種二唯現三通二為正故對法云眼根者謂曾現見色及彼種子二天眼以定所起四大所造淨色為性是通果故章敬問因中肉眼天眼二俱色為體在佛果二體何殊答因位有殊果無差別言次二體智者通本後二智法眼唯後得慧眼為根本智言後一通二者只為佛眼攬前四為體故通色非色各二也準疏意通色及智名為通二也言人等有肉等者等字等餘四四趣皆肉眼故或即是可見根塵名肉能依色根依彼肉故肉之眼名肉眼也言天等有天眼者等字於三州人也緇州云人等六欲天及南三州人得四禪根本定皆能起天眼以得通故屬天之眼亦名天眼者言二乘有慧眼者二乘證生空理故有慧眼二乘闕種智不立法眼雖亦緣法少故隱而不論言菩薩有法眼者菩薩有彼種智以百千教法為所緣故佛有佛眼由此説五問若佛有法即得名佛眼菩薩有法眼應名菩薩眼答佛眼唯佛有從佛名佛眼法眼不唯菩薩有從境立名名法眼問法不唯菩薩有法眼不名菩薩眼天眼不唯天何得名天眼又復天眼不唯天尚得名天眼肉眼不唯人應得名人眼答肉眼通餘趣有總故非人眼天眼唯屬天定故名天言能照顯露等者謂肉眼緣境今言顯露即是明緣也言無障礙等者即空緣也或顯露謂色無障礙謂逈色及空一顯色言二天眼能照隱顯者天眼不假空明二緣通見隱顯者有無障色言照一切種者後得智緣若色若是心心所法名非色亦後得智緣若是真如名非色唯根本智緣也言法眼體慧者法眼體唯是慧更無別體故合慧為一此一個慧眼體亦攝法眼故言法眼體慧合為一也問般若經中五眼其慧是根本智法眼是後得智此二智體是慧二智即別開何故瑜伽論中本後二智合説慧眼答疏言法眼體等又問二眼體是一攝法眼歸慧根一種同是慧何不攝慧歸法眼答法眼體是慧理合攝歸法於慧眼慧眼不緣法所以不得攝慧歸法眼言不同色眼境等者問肉天二眼俱是色瑜伽論中即別開法慧二眼俱是智何不分成於二眼又問彼此二拘色即開為兩般彼此二俱慧何不開二種答疏言不同色等一緣顯色二緣隱色意言教理二別不同一色有隱有顯故言佛眼即等者問般若經中攬前四眼別開佛眼何故此經佛眼不別開於四眼答疏言佛眼即前四等言或談因等者此即第二解唯三眼即肉天慧不説佛眼者且談因位故略不説也故知彼論三眼之中具攝五眼也言一肉眼見一切等者問一切色中含隱顯色障外障內色如何肉眼得見一切答以彼肉眼中含一分天眼境一處説來以天眼唯説緣生死境也言天眼見死此生彼者問天眼只合見現在隱遠色如何得見未來生死答神云六通之中天眼通即粗三明之中天眼即細亦名生死智明體是慧故能緣生死由生死智明與天眼為門引天眼緣未來生死境言三慧眼見諸者問何故前來慧眼觀理此間慧觀根性差別答前是根本智此是後得智觀根也言四法眼見一切者言一切法即一切法之真理也化度云通因及果一切皆見故言五佛眼見佛十力者謂前五眼中法眼是後得智能見如來百四十種不共功德今言見十力者取彼法眼一分境為體言六智眼者亦是後得智了一切種事言七明眼者能見自他諸佛光明亦智也言八出生死眼者唯見於理是根本智也初成佛時入三事涅槃也言九無礙眼者有説唯見事有説唯見理亦通本後也言十普眼者簡要云此約所證法身遍周法界能證之智亦遍無眼故云普也言十中第一等者問云何十中肉眼兼攝五中天眼耶答天眼有二能一見迷及隱顯色二能見此死生彼等十中既言肉眼見一切色故知攝得一分天眼境以分從全總名肉眼言此中第二是前五中等者十中第二全攝彼五中第二分少即是攝五五中等二一分死此生彼境言此中第三至九等者五個眼是前五眼中法眼也牟云十中第三慧眼見諸衆生諸根差別唯緣根性也五中慧眼唯緣真理與前不同此十中佛眼見佛十力五中佛眼緣色非色緣前四境也言或第四八九等者此三眼皆取一分緣理處第四見一切法第一義第八出生死眼見涅槃法疏言第九無礙眼於理無礙慧眼收於教無礙法眼攝章敬於此更三門解釋一釋名二次第三依見釋名前已解了二次第者初肉眼者見近非遠見粗非細見明非暗見障內非障外於用有闕故修天眼眼得天眼已雖無前過但見色中虗妄想不見諸法實性未出生死故修慧眼雖得慧眼於諸法中無了知故故修法眼雖得法眼於所知中由未周極故修佛眼三所見者智度論云凡夫肉眼最勝者無過輪王能見百由旬二乘肉眼同凡夫説菩薩肉眼如大品經説少者見百由旬大者見三千大千世界久持法華肉眼見三千界亦見衆生善惡因緣與天眼相似也天眼者智度論説凡夫修得天眼見一四天下小羅漢見少千界大羅漢見中千界阿那律見大千界少辟支同大羅漢大辟支任運見大千菩薩天眼小者見百由旬乃至最大菩薩見十方無邊世間及三世界慧眼觀知諸法實相法眼觀事佛眼觀一切若理若事也言以佛眼觀者今取般若經五眼中佛眼觀也或是自受用身居自受用土或他受用身居他受用土觀見六道衆生三根聲聞貧窮無福慧不修前五度故無福不修第六波羅蜜故無慧無福故名貧無慧故名窮言十中佛眼者問何不取華嚴經中佛眼觀耶答疏言十中佛眼見佛十力不見衆生也言不修福慧二因者解經中我以佛眼觀至無福慧言七種聖財者謂信戒聞捨慧慚愧由此七種資益行行者得到彼岸名財也人天七法財施戒忍勤定慧方便資益有情人天往來亦得名財不與七種最勝相應但求人天果報順生死故但名七法財不成度義不名波羅蜜但生得善攝問既順生死何名方便答修施戒等求人天果亦微有方便也言現苦沉溺者佛眼觀見六道衆生即是三根聲聞在六道之中被現苦沉溺也所以經言以諸欲因緣墜墮三惡道言設求出要者錯學亂行經言薄福少德人衆苦所逼迫入邪見稠林若有若無等墮三惡道經言入生死險道者一切險道不過二種生死亦即是從地獄出當墮畜生等天險不可升地險山川丘陵王公設險之以守其國誰謂荼苦其甘如薺謂天險其平如坦言相續苦不斷者前異熟既盡復生餘異熟紀國云入生死險道沈苦處相續苦不斷沉苦果深著於五欲沈苦具如犛牛愛尾沈苦心即同前來有惡之中由處俗塵五欲沈沒故不同言世間犛牛由自愛者蕀刺拘著尾便不肯行也遂被獵師於牛過處懸蕀刺著亦拘著尾人向前煞至死不行牛為愛尾便喪其身衆生為貪五塵由貪墮於惡道言藏身護尾者糅云藏身迷覆之義以貪迷覆於尾護惜於尾遂被煞之犛牛早知是尾害身之本即合棄尾而存身衆生早知身是輪回之因即合早生猒離刀上有蜜不可愛甜毒草有華不可著食中有毒不可喫獸前有珠不可取羅網之鳥恨不高飛吞鈎之魚恨不忍飢鳥由食以形人由財以喪命人為財死鳥為食亡性性為酒喪其身蚌蛤為珠喪其身犛牛為尾喪其身衆生為貪愛故失却此身失却人天身便沉惡道牟云牛喻衆生愛喻傍心即貪心故遂喪於身衆生貪五塵遂沉於惡道又傍心貪於尾遂乃煞其身彼此之生愛心故沈埋於惡道弊財也蔽掩也二字皆竪道也言西南夷者若約別名説東夷西戎南蠻北狄若約總名説四方名四夷故名西南夷也經言不求大勢至斷苦法者金色三十二十力十八佛及與斷苦法三乘無漏聖道名斷苦法又聲聞人七方便緣覺四十四智七十七智大乘人地前資加二位見道修道言深入諸邪見以苦欲捨苦者且見迦葉三人事火龍及行苦行等紀國云不求大勢佛者迷緣良及與斷苦法者與迷良藥深入諸邪見者入苦緣已苦欲捨苦者起苦行為是衆生故者慜苦人而起大悲心者拔苦意言佛有神通等者佛有度衆生勢力也言以智慧等者佛有與衆生斷苦之能衆生不能求佛斷苦之法名而起言不求趣等者只是衆生身中二空智與衆生説令依此修行故名佛與言翻墮外道等者即外道持雞狗戒編臥蕀五熱炙身等解經中深入諸邪見言所以六年者問衆生著邪見如何不出生死答疏言六年等者如狗逐塊等者狗如外道塊喻苦行行於苦行如狗逐塊當來苦果不斷如塊來打一般苦因即苦行苦果即三途一塊去而一塊來苦因畢而苦果至言師子者喻佛弟子斷彼惡見名為逐人苦果不招名為非塊入同集諦咬人而塊自不來斷集因而苦果自滅也言思起因行者問前云我以佛眼觀見六道衆生是其得果了如何今時更思起於因行答此説過去為十六王子時其實早已成佛示居因行起大悲心而教化也故無有過即同維摩云雖得佛道轉于法輪而不捨於菩薩之道意言即彼王子示居因來以壽量品經驗之又云大悲心名因行即指今生化相起此之因是悲心即示八相等皆化相示起因行也又云佛昔為凡夫時見衆生處難自思行行果滿方救故經言為是衆生故者故字意深也何深意也意言見一切衆生有異故即是經言不求大勢佛及與斷苦法等又言以諸欲因緣墜墮三惡道又言薄德少福人衆苦所逼迫又見一切衆生無善故即是經言見六道衆生貧窮無福慧又云於千萬億劫不聞佛名字又言斯人鮮福德不堪受是法見一切衆生有苦故苦欲界生老病死五苦八苦色界壞苦無色界行苦三界無安猶如火宅云云為是衆生故而起大悲心成所作智而起化身於兜率宮降下閻浮於王宮生八相成道名起大悲心亦同中周言長者聞已驚入火宅又云是時其父還來歸家又如象王在圍不顧其難待男女出後方自身出也又如時富長者於師子座見子便識心大歡喜即作是念疏主科云思起因行即是八相成道七年作嬰孩等故云為是衆生故言有此二緣者解經中故字也一見現苦沈沒煩惱增多二設求出要而行邪行故言見衆生有此二緣此牒上近聞又云牒上無善有惡名二緣後解勝也言得果已思者問前言思起因行未審得果已否答經言我始坐道場觀樹亦經行是果也不唯觀樹兼經行也故名亦也經言於三七日中思惟如是事者如是者指所思事也紀國云我始坐道場思惟處觀樹亦經行思惟相於三七日中思惟時思惟如是事者思惟事也言觀樹喜自等此樹本名畢鉢羅樹其莖黃白枝葉青翠如來此樹下證大菩提名菩提樹此樹初生即小後漸長大聳幹枝葉扶疏清涼蔭覆如來因位之時有菩提種子在本識中如樹子在土中漸漸生長從初地至二地乃至十地成等正覺漸漸圓滿從微至著由如此樹我今得道故觀樹喜自道圓自利也章敬云觀樹經行者西域記第八説菩提樹北有佛經行之處如來成等正覺已不起于座七日寂定了起至菩提樹菩提樹北七日經行東西往來如經布絹故名經行行十餘步異華隨迹後人於此疊磚為基高三尺餘經行處北有大精舍中有佛形像舉目上望昔者如來於此七日觀菩提樹目不暫捨為報樹恩故此瞻望疏中三釋初解順同觀樹意自道圓思樹恩故牟云枝葉茂盛樹之圓三增祇劫修習果圓經行往來名修還起救此據實報説若依化相六年苦行等名為果圓言又觀樹心凝者根本智證真如名心凝妙經行即後得智想化羣生垂形六道教化衆生一切諸國土無剎不現身往來處處教化如經行相化羣生樹身不動表本智證於妙理經行不住表往來利生言又觀樹想蔭者如樹蔭物能施化如樹枝葉依樹能蔭樹下衆物表大悲心䨱陰四生言經行思施福慧者佛樹下經行往來表將彼福慧十方散施均布之義是所化思彼所化之生而行行也名經行也言諸經説佛等者因説佛成道觀樹經行便生起得向下疏文諸經説成佛已後説法時節各各不同此經三七日言彌沙塞者梵語此云化地部即五分律主名也彼説佛成道後七日中自受四禪八定三昧樂由未説法與十地經同十地經只言成道後第二七日説表知第一七日不説言為令者問如來出世本為化生何故成道自受法樂答疏言為令衆生等令一切衆生作念佛尚自愛所證之法不肯説將知此法殊勝也言律及薩婆者言律者即四分律薩婆多即就六七日受解脫樂後方説法問何故六七四十二日遊諸法門以自娛樂不説法耶答一謂待五人根熟二謂令於佛法生尊重詳而後説三滿梵王本願梵王願佛成道要先請説章敬云具有四因疏顯三義又兼前十地即是四因言又有説夏安居竟方度五人者即婆沙論一百八十二云佛於迦栗底迦月旬半八日度阿若憍陳那又釋律論云佛與五比丘四月十六日結前安居夏中不得聖道過一夏於八月八日憍陳如忽然見法也言十二由經者即一年不説法也智度論等者即計三百五十日周十二由經至第二年也言此諸部等者此皆窟外窟內結集宜見各異不可和會也言然今大乘者經言於三七日中思惟如是事初則思起因行後得果已思惟如是事思惟如是事中思惟一切衆生現苦沉溺煩惱增多入生死險道云云又於三七日思惟設求出要而行邪行不求大勢佛又思惟云我本來為大事因緣故出現於世第一欲擬頓授與衆生佛果神通智慧不教行行便交取佛果菩提得否思惟我所得智慧微妙最第一衆生諸根鈍著樂癡所盲如斯之類云何而可度火宅喻思果化思而不設阿耶娘憐兒不交讀書便擬作牽相得否云云第二思與説大乘教若有聞法者無一不成佛交聞經作佛得否答不得經言若但讚佛乘衆生沒在苦不能信是法破法不信故云云乃至我寧不説法疾入於涅槃問却入涅槃得否答已張不卸覆水難收羞刀難入筲第三遍又思尋念過去佛所行方便云云初思頓授與智慧十方佛不喜不出來又擬説大乘十方佛亦不現又更思惟説三乘法作是思惟時十方佛皆現一時出現歡喜讚歎梵音慰喻我善哉釋迦文第一之導師得是無上法隨諸一切佛而用方便力獨好不如衆醜言此説通行者問法華十地俱是大乘何故十地經唯一七日不説法法華三七日不説耶答疏言此説通行等問提謂經中亦説三乘得果何不名通行法輪耶答彼無三轉十二行相也經言我所得智慧至而可度者紀國云此明所思有三意初二句思惟藥深凡夫以三慧不能知故即同我身手有力云云次二句思惟病重後二句經如斯之等類云何而可度類者即流類如世人言是何色類即是如斯等類此二句經結也經言爾時諸梵王者初禪梵王輔梵衆兼上界梵王名諸也言大自在天者摩醘首羅天也梵云莫醘伊濕伐羅此云大自在即第四禪色究竟也經言眷屬百千萬問靈山會上寧容爾許聽衆耶答報化雙彰故容爾許如下涌出品爾時佛以神力故見諸菩薩無量百千萬億國土來者等若不爾者極相違若爾結集羅漢如何得知靈山説法列衆有爾許人答一曰佛加之二云此等羅漢皆是不愚法信佛言故信報化故亦如涌出品菩薩佛力所加展轉信故言今對三乘等者問如來説法何故事須待請答疏言今對三乘等若唯菩薩不假待請無問自説也今對三乘必須要請如彼洪鍾有嚮必待扣而方鳴佛有法深須待請而方説若無請而説企意難生攝云為令請者生福故故十卷金光明經説請轉法輪能滅謗十二分教罪言四天王奉鉢者四天各獻一鉢初獻金鉢次獻銀等佛不受後獻石或云琉璃世尊方受合四為一此四天王各見佛受自鉢言佛初不許者淨云梵王初總相請不言説大説小佛初答云佛法甚深衆生根鈍違請不説再三請説三乘世尊方乃許智論説初請説大乘佛不許後請説三佛方許故問梵王何知三乘根異答二義一者多是菩薩梵王二者縱是實報頻見佛出世請説所以知也以彼梵王壽命六十個增減劫於第九劫見釋迦第十劫減見彌勒言然下大通等者問何須天請答二意一者外道多事梵天梵天既請轉外道亦順隨故二者以天勝故舉勝例餘請天請因果知請轉法輪得大梵福故又初出家門徒成就故言彼舉勝者何故大通佛唯梵王請説釋迦即通諸天請耶答疏言彼舉勝等問何故大通佛有子請説此釋迦無耶答章敬云大通佛有十六王子請先請也釋迦佛成道夜羅睺始生故有異也經言若但讚佛乘等者法華一乘如舟舟能運載於人亦能傾覆於人沉沒於人衆生善根已熟聞大乘生信得成菩提若衆生根未熟為説大乘毀謗沈淪生死同第二周若人不信毀謗此經即斷一切世間佛種順行速出誹謗永沈我若説大法必謗則必墮墮則無益於衆生不如不説法疾入於涅槃言以諸衆生處等即是出家外道生邪見故沒沒無暇頓能悟大乘法經言不能信是法破法不信故墜墮三惡道經言尋念過去佛者問釋迦既尋念過去佛佛佛歡喜否答心事相知故歡喜經云作是思惟時十方佛皆現云云十方佛同病相憂致使知此言釋迦姓者糅云有二義一在家作輪王之能二出家有作佛之能相國云劫初之時未有君長衆推有道德者以為斯契共立為王號莫訶三末多此云大等意樂大衆齊等樂立為主也即佛之高祖以嫡相承曾無輪墜共讚能二希因斯遂姓釋迦也亦有説昔有國王正朝之日問男女曰汝今富貴因於誰人長子次子答王曰我今富貴皆因於王唯最小者言自是我合富貴不由父王王怒罰令出國於空曠絶人遊往之處王子至彼未經多時舉國人衆皆來奔臻空却父王後為強國父王後命子令歸王言我子能仁能仁之姓從此而興佛是彼種云牟尼寂號者有二義一謂能寂照生死惡法二能證得涅槃圓理故名寂也姓號雙舉也故言釋迦牟尼釋迦姓唐言曰能牟尼唐言曰寂寂而仁字盡是唐言據此間道理即合道善哉釋迦善哉釋迦仁只緣呼不得穩便所以文字替仁字故言釋迦文文即仁也言法爾隨喜者皆合言善哉此上十方贊釋迦也次二句勸隨諸佛而用方便力隨過去佛方便力也言如音訓者疏主自有經音一卷別行也言引己為證者問十方佛既讚歎勸説三乘未審一切諸佛自家説三乘否答經言我等亦皆得一等欲擬勸他先須自作也言歸真實以不定者問十方佛皆具説三乘是何意答經言小智樂小法至諸果又云我此九部法至入大乘為本又云唯有一佛乘息處故説二經言雖復説三乘但以教菩薩者結歸説權實意也經言舍利弗當知我聞至南無佛諸聞之敬讚聞釋迦佛既蒙化十方佛讚勸豈不却酬答俗語云得他一匹絹還他兩匹綾釋迦佛却讚經云舍利弗當知我聞聖師子指十方佛為聖師子深淨微妙音即是前十方佛讚歎聲也前蒙十方讚言善哉釋迦文此却答云喜稱南無佛言正言納慕亦言納莫此云敬禮若言伴談或言伴題此云禮拜舊云和南訛略也所言禮拜只是釋迦佛讚歎化佛稱南無諸佛未必要須禮拜言思順彼行者有二思順一則思順十方佛權經言復作如是念如諸佛所説二則思順十方佛出於濁惡世經云我亦隨順行言既遇良緣等者思者佛思也有説一思字屬佛生屬衆生思彼所化之生處乎濁劫中二佛自思身生在濁劫如何不以先權後實法教化衆生即是不得於時山梁雌矯云云不是未生而名思生取前解言婆羅痆斯者痆音如點反瘡痛聲也無歒對故不翻婆沙云此是阿名也去河不遠建立波羅奈城從河得名齊州三藏此明仙人初住於此波羅奈者初小義痆斯者仙住義亦名仙人墮處若準大集即名住處或因墮而住言中印度等者五天竺國之正中西域記第七卷云波羅痆斯國周四十餘里國大都城名波羅奈城西臨殑伽河長十八九里廣五六里也言畋者徒年反獵之異名取禽獸也易云可以畋可以漁高曰原下曰澤川中無水曰澤言挾獵者簡要云挾者施功義若欲獵時先舉兵施功已後方獵故名挾也牟云有二義一李奇云天子出兵五挾步獵名挾也二顏師古云以繩穿木為欄遮止禽獸而取之曰挾言燎音力召反爐照也亦力小反亦云霄田也放火也郭璞云江東呼獵為燎即夜獵也車載爐爐如風爐爐中著火照夜獵名燎也言飛矢放箭也言徒屬者無親曰徒有親曰屬徒者同類也屬即父母兄弟等言斯辰者如泣傷至晨者食時晨或辰盡一日日辰食時乃是合煞即食時名晨或晨者盡一日命終此日晨也言充膳者切時戰反食也言王善其言者善由用也言誰不保命者保由重也言吾王等者一者自歎自身不久即死更不經日即死名死無日矣二者恨王死無日矣意道何不早死言告急菩薩者有言急告寫錯也勘西域記急告是也言未形之子者胎子未有形貌可見故曰未形也言馳觀者奔也走也言不誠者誠由信也言何遽者其踞反急疾速也言王聞嘆曰者智度十八云説頌曰我實是人身名曰人頭鹿汝雖是鹿身名曰鹿頭人以理言之非形為是人若能有慈愛雖獸實是人我從今日始不食一切肉我以無畏施且可安汝意所言王者名梵摩達王也言慈育之心者慈者愛也育者生也無愛生之心言即以其林者散木為林言藪者澤無水曰藪也爾雅言十藪云魯有大野晉有陸秦有陽宋有孟津楚有雲夢吳越之間有具區齊有海隅燕有臥郊鄭有圃田周有焦使言一切義成者初生之日諸國及天龍等貢獻於王王曰我兒與一切衆生為義利在家為輪王與一切衆生為義利出家為法王亦與一切衆生為生利義也言忘身殉者殉求也殉葬也亡身求法不惜身命言家族三人者家宗也宗尊也廣雅云家由本也楚詞云同姓曰宗異姓為族族即如王郭當家相似今言家族者即約同姓説據實同姓異姓總得名族如言七族上三世下三世并自身即七族若更兼異姓相知即九族今約七族説同姓者名族三人者十力迦葉跋提摩訶男舅氏二人者即陳如頞也言內則叔父等者問師子頰王有四子淨飯有二子悉達多難陀甘露飯王有二子摩訶男阿那律據此摩訶男望悉達多是堂兄弟望淨飯王是子姓何以言叔父伯舅答此依書史中諸侯儀禮天子以同姓諸侯長者為伯父少者為叔父以異姓諸侯長者為伯舅少者為叔舅今十力迦葉等望淨飯王如古之諸侯儀禮同異姓者故稱叔父伯舅此伯內説則叔父伯舅若約外説即君而且臣也言銜命者銜由承也言受乳糜者糜即粥也本行經説爾時菩薩六年滿至春二月十六日時內心思惟我今不應不食證阿耨菩提我今誰邊求美好食食已證取阿耨菩提菩薩思時天子知心往詣善生女持主女二人邊苦告之言汝若知時求食食已欲證阿耨菩提汝等今可為彼備辦之是時二女聞已喜不自勝速疾集聚一千牸牛而搆乳更飲五百牸牛五百牛乳飲二百五十二百五十牛乳還飲一百二十五一百二十五飲六十六十牛又飲三十牛三十乳飲十五牛後搆下十五牛乳而煮乳糜其彼二女煮乳糜時現種種相或復出於滿華瓶相或現功德河水淵相萬字功德千轉輪斛飲牛象王魚大夫帝釋梵王或上或下高一多羅樹等現如是相貌已善生觀瞻已作如是語希有希有是難得此乳糜而食彼人食必當證甘露妙藥即將金鉢蜜和乳糜向尼連禪河浴已方食即棄金鉢河中菩提樹下證大菩提鉢即龍王收之供養帝釋奪之別抄説也言捐功者捐由棄也言猖蹶人耳者蹶者失却即唱狂顛蹶也言遁者遁由隱也言曾磣切者磣字牟云土邊作初朕反甚也無名邊作者也言頭藍子者智度論云陀羅似仙人此言猛盛當時太子欲六年苦行時先於頭藍子所學非想定知非想定不究竟捨之而去頭藍子語菩薩曰汝決定成佛願相救度菩薩辭之而去又至阿藍迦藍所亦爾後成佛日思之欲度空中有聲告曰命終已來七日西域記云佛坐東度河池至大林中有大石柱是外道入定乃發惡願處頭藍子既具五通坐得非想定摩竭王特深崇敬每日請於宮中供養外道凌空而往王出遊云令一小女承旨瞻仰如儀大仙至已平捧而置座既被女人染著起於欲想退失神通飯訖言歸升空不得遂詭謂女人曰國人願覩聞之久矣外道從門履地而出林間宴坐心馳外境聞林間鳥囀及池魚鱉聲情散心亂乃發惡願願我當來為暴惡獸狸身鳥翼食彼生類既發願已忿心漸息勤求須臾復得本定不久命終生第一有頂定壽命八萬劫天壽畢已當果昔願得此弊身煞諸魚鳥作無量罪墮三塗獄言阿藍迦者訛也正云阿羅茶此云逢遇問初成道者何不説耶至三七日方生悔根答妙音云初得法時受重法故多日思念尚不及起求飲食之心況能起心為他説法又云佛初成道未建立三聚差別未知所應化導等言身瑩者或作鎣飾言心期已退者本擬出家金時不轍名已退或云已返也言五人忘制者婆沙云爾時五人忽遙見佛遂共立制彼喬答摩懈怠多求狂亂失至空無所獲而今復來亦相呼誘我等宜各勿與言談恭敬問信但敷一坐任其坐與不坐爾時世尊漸行近彼威德所逼令捨本期不覺一時從座而起趍走迎逆合掌歸敬於中或有敷座者或有取衣或取佛鉢或取淨水或有淨足佛作是念如是癡人自立制約須臾還破言又經云釋迦過去者度五人緣也往昔閻浮提有大國王名設頭羅健客國人飢伇欲得鯉鳥肉食之即差王捨位發願為魚投水而死為大魚身食者皆愈經十二年翻覆食之竟不能盡時諸衆生食魚肉已皆生慈悲心命終之後並得生天爾時王者今釋迦是五人先食者陳如等是也言五人中者一陳如二十力迦葉三頞四跋提五摩訶男問五人為復一時悟道為復先後答案五分律彌沙塞律云陳如初悟頞十力迦葉次悟跋提摩訶男二人後悟婆沙云陳如見諦時餘四人在四善根位言安居畢者八月八日方得道迹言諸法寂滅相者即是真如法也言不可宣者論云假智及詮不得自相唯於諸法共相而轉言無名相法等者乃是強以名字説但令因詮悟道非體可説就有為依他尚非名言可得況圓成真理而可言宣故涅槃云是大涅槃強而立名經言是名轉法輪至差別名者是佛寶所轉四諦法名法寶陳如等五人得聖果名僧寶所以疏言三寶遂興也言俱舍論第二十四者問科中既明婆沙寧引俱舍答梵云阿毗達磨俱舍此云對法藏也今對法論即大婆沙所言藏者彼之堅實殊勝之義今取彼義以成此論故云俱舍對者是慧能對觀四諦能對向涅槃故論彼云淨慧隨行名對法及能得此諸慧論攝彼勝義依彼故此立對法俱舍名簡要科云初一偈解異名後一偈敘輪處所疏中意正要後一偈初偈相從來緣彼初偈是法輪異名所以引來和會也言所説者問梵輪有何以名答有三異名一名為沙門二名婆羅門三亦名梵輪問何名梵輪答真梵所轉故且初句云所説沙門性者指俱舍論文也問疏中總未説如何言所説答俱舍中前文解沙門義初二三果總名沙門緣向前説了向後徵云所以沙門何性答淨道是沙門性問沙門有異名否答有便引所説沙門性亦名婆羅門亦名為梵輪真梵所轉故問此中説法輪義何故引説沙門性答彼論釋云諸無漏道是沙門性懷此道者曰沙門沙門者息惡義以能勤勞息諸惡法故法菀云惡體不起名息惡惡即息若能息名息息是聖道所息即惡之息依主也若無漏智起能息煩惱有損壞義故説沙門性便是法輪義相應也如今師僧名沙門者行沙門因也沙門性也言亦名婆羅門者意道前説沙門性亦得名婆羅門若同人問相向上説沙門剃髮婆羅門長髮不出家若約義論一種也息惡名沙門淨行名婆羅門無間道名息惡解脫道名淨行也沙門息煩惱也婆羅門名無煩惱也所以説沙門亦名婆羅門上二句約法體説言亦名梵輪者約能輪人説即前淨行及沙門性為所説所輪之法推功歸本誰為能説誰為能轉答即如來真實梵王為能轉也故名梵輪言真梵者問如何喚佛為梵王答疏言真梵所轉故如來與無上梵德相應名梵也所轉法輪名為梵輪也問何名真梵答梵謂慈悲喜捨凡夫二乘所起四無量不能真實拔苦與樂但名假梵不名真梵也如來所有四無量者真能拔苦與樂故佛獨名真梵也亦同瑜伽第四云若有漏修四無量成大梵福若無漏修四無量成如來如來是真梵也真梵雖通三乘意言疏中唯取為真實梵王名為轉也上解輪異名下説輪處所言於中唯見道者問前來沙門婆羅梵輪三名雖別與法輪體無有二總名法輪若爾三道之中在於何處答疏言於中唯見道説名為法輪也簡修道無學道故置唯言也言説名法輪者問何名法輪答婆沙一百八十二云此輪是法所成法為自性故名法輪如世間輪金所成故金等為性名為金輪鐵所成故名為鐵輪以法成故名法輪或可此輪能治非法輪故名法輪非法輪者謂布剌拏等六師所轉八邪支輪名非法輪問何故唯取見道名法輪耶答婆沙師以見道中所轉法輪有速疾等五相似世間輪故唯依見道立法輪名若修道無學道不具此等相也言由速等似輪者謂此見道所轉法輪有速疾行等五種之相如世間輪名法輪婆沙師義等字等餘四義也言或具輻等故者此妙音尊者義等字穀輞上解頌了下解長行言即於此中者相國云即於此真梵所轉法輪中唯依見道立法輪名此婆沙師許沙門性通三道總名沙門性若言法輪唯在見道不在修道無學道又大法輪者須具轂輻輞三圓滿義唯八支聖道則有也餘七覺支十無學智則無圓滿義所以唯依見道也言世尊有處説法輪者即鹿野菀中名有所説言如世間輪者四個字疏本有無不定章敬云本論中有如世間輪五個字疏文若無文義便隱見道似彼故名法輪問如何道與彼輪相似答神云一由速疾故似世間輪轉聖王金輪旋繞四洲有速疾相言謂見諦道等者問見道如何與彼相似答疏言謂見諦道速疾行故似彼輪故方言謂見道等見道無漏智巡四諦斷四諦下惑如一彈指頃有六十五剎那見道只有十五剎那斷分別煩惱盡不同修道出觀入觀多時容預修故或大乘只一剎那也言有取捨者有取前捨後故從東洲捨却東洲取南洲西北亦爾捨苦諦等境取集諦等境捨苦法智忍取後苦法智捨苦類智忍取苦類智或取滅道捨其苦集言降未伏者如轉輪王行到東洲南洲早伏行到南洲西洲早伏行到西洲北洲早伏或能降已伏能摧未伏法輪亦如正斷見惑時有降修惑之勢用或無漏聖智能降已伏見道煩惱能摧未伏修道煩惱又苦法智忍斷欲界惑時從上二界苦諦下煩惱已伏訖早不起名降未伏言鎮已伏者如聖王輪降伏諸國已住王頂上名鎮已伏故已被降者更不敢起逆心無漏聖智斷煩惱已不離聖者心頂之上名鎮已伏已斷煩惱永更不起名鎮已伏頌言諸惑無再斷離繫有重得問如何得有退法羅漢有宗退果不退根如涅槃説瞿羝比丘得羅漢果而起欲貪染想因退所證直至初果凡經七返方始覺悟欲持刀自害等答依未來世煩惱已斷不再起若依大乘六羅漢退定也言上下轉者如聖王輪四洲之內有人不伏輪到彼處或上或下而能摧之又如世間車輪從上至下著地了著地了却上上了却下無漏聖智起來苦法智忍苦法智斷下界苦諦煩惱名向下轉苦類智忍苦類智斷上界苦諦下煩惱名向上轉以上三界定地合為一故言故顯宗云等者即衆賢論師所造八十卷者是牟云非也案藏中顯宗三十卷是衆賢造八十卷是正理此證前來有取捨及上下轉等義賀云此顯宗證四諦理十六心前後即不得俱時便有取前捨後如是五個行相言四諦理等者牟云小乘人見道時其實三界所有分別煩惱一時頓斷觀心粗故將謂是十六心三乘見道皆一心故言尊者妙音等者糅云迦濕彌羅國五百羅漢共造婆沙於中四師而為上首即法救尊者覺天世友妙音等諸餘羅漢每有解釋皆於四人邊呈評其可否彼論往往言評曰是也比印度境健陀羅國有婆羅覩羅邑中有窂覩波羅漢化波你尼仙後進之處有大羅漢自迦濕彌羅國遊化此方便偈見搖訓稚童時羅漢謂梵志曰何苦此子梵志答曰令學聲明業不時進羅漢遛邇而笑梵志云慈慜為懷見苦寧笑羅漢曰汝頗聞波波你尼仙製聲明論垂訓於世乎波羅門曰此邑之子後進仰德像設由存羅漢曰今汝此子即是彼仙問既是製論之仙何得業不時進習種姓義寧成然則世界文詞徒疲切績豈若如來聖教福智宜滋西域記説昔者南海之濵有枯樹有五百蝙蝠於中穴居有諸商侶止於樹下聚積樵薪止宿燃火煙𦦨漸熾枯樹遂燃時商侶中有一人夜後諷誦阿毗達磨諸蝙蝠等雖為火所損愛樂法音忍而不去於此命終隨業受生故得人身捨家修道以承聞法之聲聰明利智並證聖果為世福田迦膩色迦王與脅尊者招集五百賢聖於迦滋彌羅國作婆沙論斯並枯樹之中五百蝙蝠余雖不肖是其一數斯則優劣全異仁今愛子可許出家言如世間輪等定之中等取轂輞也言八支聖道似等者此即證如世輪為所似法輪為能似也見道有此圓滿義名輪所以取喻如世間輪然俱取五義名為法輪是餘羅漢義今此妙音有異於彼立義雖似然俱於見道名為法輪故婆沙云何故唯説見道名輪耶答彼有九師第九妙音云八支聖道展轉和合一時至他相續中轉故名法輪此八支見道位勝是故見道獨名法輪也言謂正見等者相國云正見正思惟正勤正念等四要依於戒而方具此四故似於輻依轂而有故小乘宗戒正見等四事須依戒方有如世車輻事須依轂而住也正語正業正命以戒為體戒是行所依處故如世車轂與輻為所依故正定為輞能攝正見等四念不散亂如世車網能攝輻故更有配云一云正見正思正勤為輻正語正業正命如轂正念正定如輞也二云思勤念如輻語業命如轂定見如輞三云唯正命為輞今同此解言寧知法等者此亦俱舍文彼婆沙師自為問答彼論自問云寧知法輪唯是見道答彼婆沙師自答云憍陳如等見道生時説名已轉正法輪故如來第一示相轉此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修如來問云我以轉法比丘解否陳如答言我以解法陳如至見道餘四人在四善根位後陳如至中二果餘四人入初果陳如至無學四人至中二果問初轉法輪時亦與八萬諸天亦同見法何唯但説五人答此中但説正所為者諸天因五人得聞非正所為又言若於是處名轉法輪謂雖天中有證甘露若於人中無者便不名法輪是故但説為五人轉法輪問五人皆見何獨陳如答陳如先見故餘四人在四善根位故言説名已轉正者陳如亦入見道我已解法地神便告四天王天如是展轉地居告空居諸天唱言世尊已轉正法輪故故知見道名為法輪問會中亦有諸天傳聲何故唯説地神答一地神緣近世尊坐二最先發聲次第法故問何故發聲只至梵天答以梵王請世尊轉法輪聲至梵世令梵天聞深生慶喜問若唯聖道是名法輪者即菩提樹下為商人説法已得名為轉輪何故至波羅痆斯法輪方名為轉約佛難也答轉有二一自二他佛以饒益他為事今依他説問若他聖道起名轉法輪何名佛轉答依能轉説謂彼身中雖有聖道如來若不以言説為其轉因彼自聖道無因生故彼聖道生皆由佛力是故説佛名轉如轉輪王寶王未以輪置於左右手轉之即諸天神亦不能轉問若為他説方名轉者第二七日為提謂授三歸五戒説法有大衆部等説佛一切言説皆成法輪答彼未三乘同所觀諦非通行故今約三乘通行也言依經部宗等者天親菩薩本是健馱羅國人於經部宗中出家後往迦濕彌羅國習婆沙義隨聽隨結日一偈成六百行然於偈中讚以經部義破於有部緣天親論主以經部義難悟入尊者往尊者往通不得入定觀之乃知以經部義暗破有部宗乃語天親曰汝速歸國未離欲者恐相害耳天親遂以赤銅葉寫所結頌欲將歸國彌羅國中有宗羅漢祕所造論敕藥叉神不令論出天親遂記已歸于時有宗相賀而喜有宗盛矣悟入曰彼天親者意弘經部破汝有宗偈致傳説之言似相調耳如其不信請釋即知有部羅漢乃齊金帛請天親自釋釋中果如所説此則經部破有宗義也言三轉行相非唯等者此正破前妙音云法輪唯在見道憍陳那等見道生時説名已轉天親破云非唯見道故言如何可説者即是天親論主立理言是故唯應即此三等者一自三轉二他三轉者初印相轉如實了知是苦聖諦如實了知是集聖諦云云印四諦相故名印相轉也二應修轉此是苦我應遍知此是集我應遍斷此是滅我應遍證此是道我應遍修三已作轉此是苦我已遍知此是集我已遍斷此是滅我已遍證此是道我已遍修二他三轉者一示相轉此是苦聖諦此是集聖諦云云二勸修轉此是苦汝應遍知此是集汝應遍斷此是滅汝應遍證此是道汝應遍修三作證轉此是苦汝已遍知此是集汝已遍斷此是滅汝已遍證此是道汝已遍修問曰一一諦下有四行相謂眼智明覺四四成十六三轉合有四十八如何言十二答且一諦下有四三轉言十二以數同故且言十二據實有四十八若竪而論之言十二橫而論之有四十八此是苦眼智明覺此是集眼智明覺云云二此是苦汝應遍知眼智明覺此是集汝應遍斷眼智明覺此是滅汝應遍證眼智明覺此是道汝應遍修眼智明覺三此是苦眼智明覺云云然眼智明覺小乘宗中解於見道中法忍名眼法智名智類忍名明類智此名覺別知四諦也又解親見名眼決斷名智照了名明警察名覺若大乘一無漏智總名法眼依去來今有差別故非於一諦別起四智由真見道唯一剎那不同小乘上下別觀言通三世者緣過去名智未來名明緣現在名覺通緣三世名眼眼是總餘三是別問苦集道三是有為通三世智緣故彼境名智明覺滅諦是無為無來無去如何言三世答依詮而顯説亦通三世能智緣彼滅諦名智明覺此解未解二煩惱名證䨱障滅諦煩惱通三世也無漏智緣著過去煩惱名智緣著未來煩惱䨱真如名明緣現在煩惱䨱真如名覺故立三世所以疏言是故唯應即此至正理此是教法輪也問行法向上有摧壞義可名為輪如何教法亦名為輪答教法向上有可説義有可轉義故名輪故名轉言可應正理者應三轉道理也言云何名轉者問教法既名輪如何稱轉答疏言由此法門等相續者身義令解義故出世尊口入陳如耳故名轉也言或諸聖道者天親第二義此解行法輪也言於所化者則陳如是也言身中轉者解轉義即是無漏智起現行也言於他相續者問經部義既許通三道轉名法輪如何世尊為陳如轉初入見道便名法輪耶答疏言於他相續等但見從來總未曾轉今日方轉名轉初也有解對後二轉説者非也上天親難了下衆賢救言此有釋言者衆賢論師也天親既以經部義破有部宗因此多年其義不行衆賢慨其破斥救薩婆多造八十卷論名俱舍雹後從迦濕彌羅國以雹繫在象首上以俱舍論繫在象尾逼逐天親欲求面破天親回避常挍一程從之不及天親門徒謂其師曰何故回避衆賢論師天親曰如師子王避豕遠近方勝劣智者應知後衆賢因遇痢疾遂賫金帛及所造論以達書于天親我所造論願見觀覽可即與之進得遂流行如其不然甘從灰燼天親覽曰已此即正順我宗遂為改題為順正理論即今藏中現有然衆賢論師總諱却唯依見道名法輪者非薩婆多正義此言唯依見道名法輪者是我大婆沙中不正義也非薩婆多本意言雜心亦敘等者問雜心論中亦言唯於見道立法輪名耶答疏言雜心等亦是我宗中不正義婆沙論中既是不正義向雜心中説豈是正耶言俱舍復云或者引俱舍證有部宗中正義或諸聖道者即見修無學三道正名法輪故名諸是薩婆多本意也此上正理師所認義言故顯宗云毗婆者疏主自解也亦敘婆沙本意牟云言以三周者或云以三説轉者謬也言於他相續見等問既若法輪通三道轉如何初入見道佛問解否答疏言於他相續等且約初轉入聖説未是果圓滿轉此會通不唯見道獨名法輪言非唯見道八正等者問婆沙中既言唯見道立法輪者是不正義莫妙音轂輻輞三莫是正義耶答疏言非唯見等此妙音將轂輻輞三唯見道立亦頭破也言成實論説等者攝云撿彼論上下無如疏引然疏主取意而説彼論二十三三慧品相依生起盡是約見道已説三轉也又一諦品云問若不以四諦得道當以何法得道答曰一諦得道謂彼滅諦如經中説行者觀此五薀無我故如瓶中無水説為空瓶如是五陰中無有神我故故名為空相國云初轉至五停心觀生聞慧第二轉至總別念觀生於思慧第三轉至四善根位生於修唯觀滅諦唯觀薀中無我行相但作空而轉無別十二行相經部師子曰末師義本數論中出家同小乘許見道前有斷惑道故從五停心等觀有轉義故言今者大乘總等者瑜伽解深密法華皆明法輪然大小乘皆説有通別大乘通者謂七覺支及八聖道通見修無學唯十智在無學道不通前二與小乘同若大乘別者七覺支在見八聖道在修十智在無學若小乘別者八聖道在見道七覺支在修十智在無學通即大小皆同別即大小有異十智唯在無學大小皆同言輪自性者初自性順衆賢後八支順妙音問云何順彼小乘宗説答總貫諸文是故順今謂不然疏中二解初約三道別修行相後約總修配轂等相名數不同豈得説名順妙音解況疏自言不同小乘也若言前解約別修論何故疏言通見修等答彼論法輪不唯見道非約七八三道通修言擇法覺支者見道法輪七覺支中以擇法覺支為體擇法即是見道中無分別智名擇法覺支修道法輪八聖道中正見為體無學道法輪以十智中正智為體所言七覺支謂擇法精進喜捨念定輕安覺者是智慧支者分義擇法一種亦覺亦支餘六是支非覺以助覺故或覺相應性故八聖道者正見正思惟正語正業正命正精進正念正定八聖道正者聖也道者遊履義也大乘修道八聖道於支中唯取正見一法為輪自性體是慧故潞府兼取正思惟今唯取一法尅實體唯是正見十智者依小乘説謂苦集滅道智為四法智類智世俗智他心智為四盡智無生智為二是為十智問無學道中有十智今何聖證智為輪自性答即是盡智無生智令名正智也問何故此覺支中唯取擇法覺支八正中唯取證見十智中唯盡智無生智耶所餘七中六八十七十中八何故不取答能斷惑相者正是法輪此之三種體即是慧觀能斷惑故得為體餘法但是助斷也三道之中前二道中一一皆具七覺支八聖道無學中亦具此二也佛位之中若不具足者佛位應無七覺支八聖道問十無學智莫通見修有耶答唯佛位有不通前二也後必帶前前不必帶後言正見正智等者牟云此等字但是結前三義如人告身名等但是向內等非向外等只等三道非是攝餘名等此約尅性餘道支等入餘文故言瑜伽九十五云正見等問疏主如何得知正見正智是輪自性答疏言瑜伽九十五等所成性者由是道前資加二道為能成見道為所成也見道為能修修道為所修修道為能學無學為所學也無學中菩提為能成涅槃為所成性也此大論引文齊中間以顯初後舉修道八正道中正見等取見道擇法及無學道中正智所成性者即是果上菩提涅槃也言自他三轉者世尊中從因至果自有三轉通見修無學道故諸聖慧眼謂四諦下無漏道名真聖慧眼謂眼智明覺等問因中有摧壞義故可名轉果中無摧壞義何名輪答果中鎮已復故圓滿義故亦名為輪言俱舍亦云等者證三道法輪也言或體唯聖八聖等者彰輪自性前來自他三轉通見及修自他之中通見修見修之中通自他已上唯依通行相出體七覺支八聖道皆通三道上通修下為別修行相依八聖道出體以八聖道具轂輻輞三圓滿義故此通妨難難云若大乘見道唯取七覺支為輪自性如何得具法輪義無轂輻輞故若疏云或體唯取八聖道等言正見正思惟者正見是體正思惟是用體用俱是慧故名根本如輪轂也以慧簡擇擇方能持戒者正語正業正命以戒為體戒為輪輻戒從慧有如輻依轂而有戒既清淨定即現前念能憶持勤復遍策定則專一故能攝録餘衆行故如輞攝輻不令雜散故言不同小乘者簡異也不同小乘配轂輻輞三名不同有為乘中慧為最勝若不先慧即名乘緩自利行中戒為首唱若不先戒即名戒緩是故大小不同問一種取八支聖道圓滿名輪大乘少乘何別答一約體別大乘取慧為轂小乘取戒為轂於中別配法數多小亦不同也二約道別小乘別修行相八聖道支在見道七覺支在修道大乘七覺支在見道八聖道支在修道大乘七覺支中喜覺支順歡喜地故於初地見道修七覺支八聖道支在修道正語正業正命是三業菩薩習萬行必依三業故又思惟支順彼十地菩薩利生説法故修道修八聖道支也言此八聖道別者問大乘中此八聖道唯在修道何因今説通三道耶答此八聖道支有別若據別行相八聖道支唯在修道若據通行相八聖道支通於三道見修無學故若不爾者世尊應無八支聖道若論通修大小並同也言謂能生後聖道後聖道者即是見道也教是見道已前教也此教能生後聖道故得名法輪因也第一因聞得生聞慧因聞慧生得思慧因思慧生得修慧此資糧加行位中聞説此是苦此是集等教法及有漏聞思修三慧為因能生見道無漏聖智為果或修為因佛果為果令此二種為因無學道為果又若不聞教如何見理若不見理如何行如何證果故教為因也言諸教者教既不一名諸教也或教通三道轉亦得名諸教言無量義經者問如何將教為法輪答疏言無量義經等言諸經論者即金光明經名法輪説三轉法輪謂轉照持又下言昔於婆羅奈乃至復轉無上最大法輪言俱舍亦者此證法輪因也教為起行因也言名得所得者所得是能得家所得能得是所得家能得能得之方便方便即是因也所得是果能得是所得家之方便依主也言前為後因者教則唯因非果佛果則唯果非因故名前為後因或第一教為因聞慧為果聞慧為因思慧為果思慧為因修慧為果有漏三慧為因見道法輪為果修道為能得因果中菩薩煩惱是所得果或解果中菩提猶自屬三周十二行相中收猶是能得方便也煩惱是所得果言合為果因者化度云即前有學位中若因若果皆與無學為因故名合為果因也言又云三周正轉者問此解與前解何別答前解兼通見道前但是因皆引來也此後解只取見道修道第一轉第二轉望第三轉為因故名方便也言隨其次第者總將三轉次第配智見現觀也所言名為方便者此有三解初順次第配智字配見道見道中苦法智也見字配修道修道中八聖道中正見也現觀二字配無學道中有究竟現觀二者逆次第配無學無學道中有盡智無生智配智也見者配修道修道中正見現觀者配見道見道位中亦有無漏現觀名現觀三者亦依次第配者金云見道有三見道中正智名智後得智名見證理名現觀也修道有三者本智名智後智名見證智名現三無學道有三本智名智後智名見究竟名現此觀引論者意取為得所得方便方便兩字是法輪因問如何智見現觀名得方便答有二解一無學道中菩提智為能得方便法為所得二菩提智向上初得之時一念心為能得方便後兩念已去為所得也今疏中意只是智見為因現見為果見修為因無學為果論中言三轉總為方便方便者因義此據總相説言三輪眷屬者意者除智已外所有俱時五薀等者皆名眷屬言謂諸聖道者三道不一名諸也見道之中除擇法覺支修道中除正見正思惟正見是慧體正思惟是慧用俱是慧故無學等道中除正智此三自是輪自性收餘法助伴五薀等盡是輪眷屬也言瑜伽等説聖所等者即是色薀此有三名一舊云道俱無表即取俱時現行思有防惡立名也新名道共戒體是無漏亦名聖所愛戒聖人保重故此初解唯取道共戒也二化度云聖所愛戒謂定共道共戒體是無漏聖所保愛若有漏戒聖所猒惡今唯取無漏戒言及信等法者信即四不壞信信現觀也即唯識論六現觀中第二信現觀也等者等取二十二法心心所也言助道除惑者有説聖所愛戒助現觀增明信等法助道斷惑此解不義意言戒及信皆助觀增明助道除惑彼正智不能獨斷如金輪寶降怨歒之時王之千子亦同降也言法輪境者如世猛將破賊之時即青渠黃䔒為破賊之境也言謂四聖等者四諦之理是斷煩惱處名之為境如世居王降伏諸國烈陳煞賊之處名之處境三乘之人同觀四諦理名之為境三乘之人同斷四諦下煩惱名之為境雖同觀四諦今據增勝而偏説之聲聞人緣四諦為境緣覺之人觀十二因緣為境菩薩人觀三性三無性為境言瑜伽又説者前輪因中文已引了今取方便家果前取於因今説於果所望別故言此經亦説者爾時大通智如來受十方至所不能轉言解深密等者經云初於一時以四諦相轉正法輪次於一時以隱密相轉正法輪世尊于今顯了相轉正法輪即是非空非有教第二時中説三無性即隱密説説隱密言非顯了義第三時中無即遍計有乃依圓故是顯了言瑜伽説為得所得者謂大菩提為得方便因所得即菩提涅槃果所得是能得家之所得是所得家之能得故名得所得也此有二解一菩提涅槃俱是所二涅槃為所得菩提為能得因言後又説四沙門者依小乘雖烈四果意取有學為因無學為果也前三果能得方便第四果所得也言所攝受者聲聞菩提獨覺菩提所攝受為果能攝受即方便也言又三周等者今唯取所得不取能得能得屬前法輪因也上來有五第一輪自性尅實名為輪第二法輪因方便名為輪第三輪眷屬助伴名為輪第四法輪境境界名為輪第五行法輪果所得名為輪列五名了言然此五體等者教理行果為體也即攝取前五法輪一者教攝法輪因中一分教及果法輪中一分梵音聲相並是教收也二者理攝法輪境及法輪果中涅槃理及四諦理也三行者攝取法輪自性一分謂見道中擇法覺支及修道中正見并法輪因中聞思修三慧眷屬中一分唯取因位眷屬助伴五薀並是行行中收四果者攝取法輪果中菩提涅槃并梵音聲相并攝取自性中一一分謂正智及果中輪眷屬五薀並是果攝又前法輪因即是教法輪境即是理法輪自性及眷屬即是行法也輪果即是果法也配五般若輪自性即觀照輪因即文字輪眷屬即眷屬輪境即境界輪果即實相般若言梵輪者是人輪者法梵之輪故依主言梵增語者章敬三解一如來非梵非不梵也為化物故強因於梵故名增語二喚佛所轉法名梵輪增語者增加法體本來離言絶相無言無説方是不增今以名句向上安置梵輪名字增加其語故名梵增語三增者無上義喚如來作梵緣與無上梵德相應四無量心名梵德一切衆生聲聞二乘雖有慈悲喜捨是假非真到佛身上慈悲喜捨真能拔苦與樂慈悲喜捨名梵德就中佛身上最殊勝故名梵增佛所説法名梵增語也問前來偈中有三名沙門性婆羅門此中何故不解空解梵輪答緣沙門婆羅門向下無輪字故不解也唯梵輪法輪有輪字也言二名法輪者如金輪王輪金為能成輪為所成擇法正見等為能成輪為所成性也若小乘宗若有戒萬善因戒而生即正語正業正命此為三轂正見正思惟正勤為輻正念正定為輞若大乘宗正見萬善依見而生所以將正見正思惟為轂正語正業正命為輻正勤正定為輞也以法為輪故名法輪法即是輪持業軌謂軌則令生物解持則任持自體也無漏智是體摧壞等義是用此三道法輪皆有軌持義不但摧壞亦有軌持也言一圓滿義等者謂七覺支中擇法等及八聖道支具轂輞輻圓滿義故名輪如前廣辨言或擇法覺等者問八聖道支具圓滿義可名為輪若七覺支不具圓滿何名為輪答疏言或擇覺等支見道中七覺支斷分別別煩惱證理斷惑名體用周備此七覺支三道皆有體用問果中不斷惑如何有體用耶答果中證理盡分達事盡分亦名為輪問若爾因中證理達事未遍因智未滿應不名輪闕滿義故答此亦不然但約有體有用即是周備圓滿名輪誰言種智皆圓若不爾者見道何名法輪疏主豈不智因智未圓意者但取圓滿義不唯八道即彼七覺支等亦有體用圓滿義疏主意者若但以轂輻輞三義名圓滿者恐失前三道自性義故以體用而解圓滿也言此四種法者即教理行果若伏教也若斷理也若助行也若正果也上配為正若據此中疏意前來不説教理行果忽然此間配有似孤起但是無漏智具此四義名摧壞義且若伏伏現行若斷斷種子若助心心所若正無漏智智體能正斷智眷屬為助斷故牟云若伏若斷約煩惱説若助若正約能治説助即眷屬正即自性意將此二望彼煩惱皆有伏斷故名為摧也不爾無行相更問糅云此四皆通本後二智於中本智正斷迷理惑時兼伏迷事同時五薀名助後智不斷迷事惑時兼伏迷理亦爾應作四句一伏非斷地前二斷非伏金剛無間道三亦斷亦伏初地已上金剛無間已前四非伏斷諸凡夫言三鎮過義者無學道中雖不斷惑鎮已伏故如轉輪王金輪住王頂上摧已伏之者悉皆不起今此無間道斷二障永盡解脫道鎮令不起無間道如驅賊解脫道如閇戶閇戶即是鎮遏義言令勢轉遠者已斷煩惱永住不生名遠有二一令惑轉遠惑既伏已聖智增明能治力強説彼名遠如言日能消惡二者智力轉遠又彼治已念念落謝望能治道亦得遠名如言智隨果長即轉齊也言四不定義者如車造了不可停住須有運動法輪亦爾從自見至自修道從自修至無學道上自三轉也言從自無學智者他三轉為陳如也佛將心中所解之法與陳如説令陳如身中三時智起轉自解心入他人身他從言教解於諦理即同陳如入見道已去從於諦理起於正行即是從自見至自修從自修至無學言如是展轉者即陳如當來成佛復為他説他得果已又為他説名展轉故名不定也言如轉輪王者舉喻結四義一如轉輪等結前圓滿義二能降未伏諸煩惱故結前摧壞義三能鎮已伏等結前鎮遏義四往復故結前不定義言往復往者如來置聖道於陳如身已是一重往陳如又隨轉置餘身中又是一重往復重也言瑜伽論説等者證不定義即世尊為陳如説陳如為他人説也言法即是者此中所轉法法即是輪持業也言轉者問法既名輪如何名轉答疏言轉者動也顯也運也起也言動宣言教答疏言動宣言教即是世尊言此是苦此是集等宣説教也言顯揚者問何名顯答疏言顯揚妙理理也言運聖者問何名運答疏言運聖道於聲前行也言起真智者問何名起答疏言起真智於言後果也即配教理行果言運聖道於聲前者潞府云聽人聖智起於説法者聲之前此相對名前也起真智於言後前後名後若約陳如一人説見道起時此則相對名前名運聖等若約如來聲也落謝過去餘之四人方始得道名前起真智於言後也此第一解唯陳如一人得名運聖道於聲前也四人便不得第二解轉法輪時聽者聞彼聲名句文重得種子落在第八識中至夏滿方始得聖道如來聲是現在聖道在未來起如俗喚未來作前程事如今聖道在聲之未來聲之前故名聲前此解為正他第三由如來先內身自成就得聖道總未曾向人説聖道在説法聲之前名運聖道於聲前唯望如來自身説起真智於言後如來説了聽人聖智起於言後言圓摧障惱者圓滿義摧壞義以彼法輪向上圓滿義摧壞義偏勝是故偏結餘鎮遏義不定義非非勝故不舉之言所轉即法者法之輪依主或法是聲教法也輪是無漏智陳如聞如來教聲起無漏智斷煩惱名輪法家之輪依主也或無漏智起能斷煩惱法即是輪持業釋言由五種相者問今轉法輪作何行相而能轉耶答疏言由五種等前三轉約佛因中若報若化皆屬自轉為得所得也後二種即約世尊陳如等他三轉令他入見修無學道故此五即是大乘法輪之根本也言為得所得者為得即方便所得即菩提涅槃言所緣境界者即是三性十二因緣四諦理也言為得所得方便者為得即是三周十二行相十二行相為得涅槃之方便也言證得自所應得者即是菩提涅槃金云三乘自無學果名自所應得又此第三相唯是所得不是能得也上三明佛轉了言四者得已等者下二問為他人三轉問何用後二轉耶答謂如來初得前三轉道果滿已還以所證見道等法為陳如等説陳如等得已還有如前三種相已後得為他説言樹他相續者立也相續者身義如來自解了欲擬轉此解心向陳如身中著得否答安立名教施設語言為陳如説言下便悟便是如來轉自解心到陳如身中也問既是自解何名佛轉答只此解心因佛言教故名佛轉也言於自證深生信解者謂陳如等初見太子行苦行皆捨離者共相謂曰云何見之晚歟此但猖蹶人耳由此五人於如來所起不信心不知如來身三轉道圓果滿故有慢也是故世尊轉己所得令彼五人三轉道圓滿故始於如來三轉深生信解示相勸修作證等轉言五者令他等者令他是地神也於他是陳如也即是令他地神於陳如深生信解言此意總説化至時者化身簡報身也相者從自見至修從自修至無學也自證果時者即是自成三轉三十四心成菩提也言令聲等者亦有所證化三轉也意言化身自三轉已至于果中為聲聞等亦三轉之亦令聲聞同是五相復為他轉重重能化有初三後皆屬於所化行相定也言不依菩薩報身者若於化身上説一坐之中三十四心成道自三道亦成他三轉亦成若於報身上説則初轉已去經二大劫則難作行相故不依菩薩報自成義也言或亦依實菩薩轉等者即約菩薩實身經三大劫十地中修因滿已於色究竟天成佛身色相好一一廓周法界自他三轉成報身上亦得有故他受用等通他轉故言總依等者問實報何容一會三轉得成答疏言總依始終等自他三轉曆三祇故雖然一坐向世尊邊聞法成教法輪初轉初見道入初地時更經二大劫方得佛果亦是此間三轉所攝雖然時節長遠總約始總而論亦成三轉也言非安立者有云四聖諦是小乘四諦此雜亂此中轉相依大乘義説見道已去根本智緣非安立諦後得智緣安立諦本智緣圓成實後智緣依他菩薩依於三無性觀四諦境疏言皆此所攝言二方便者謂即至菩提因故者問見修二道何名方便答無上菩提是所得果與彼所得而作因故即三周十二二行相故名方便方便即因能得即方便方便是法轉因所得之方便方便即法輪因也言謂昔菩薩入現觀等者即説菩薩入見道時有信戒智諦邊智諦現觀唯識有六現觀見道中有四牟云此即智諦現觀也彼了知時不作了解説彼為真了知正證理時都無分別後分別時元來分別不著也此即自三轉初印相轉如實者如者義菩薩入現觀時無漏智稱實了知苦集滅道苦集二法實是苦滅道二法實是樂也問根本智中證如之時不分能所如何名為如實了知答牟云初後得智變影緣如名如實了知也言於中所有現量等者即菩薩入彼真見道中分別煩惱悉皆斷盡親證無漏二空真理即此能證二空真理之智名為法也言即此由依者此意説彼真無間道一個智總能觀三世四諦之境即緣過去四諦之時此能緣名為智緣未來四諦之時此能緣名明緣現在四諦之時此能緣智名為覺初一總後三別總別合論故言眼智明覺也言此説一智總名法眼等者四法同時不同小乘別起四智言非於一諦別等者四諦之中一一諦下別起法忍法智類忍類智等四也意説不別起法忍等四也言由真見道唯一等者問何以不別起答疏言由真見道等大乘見道一剎那斷四諦下惑盡意言唯一心也實非唯一剎那以真見道時有無間解脫勝進三故論云雖剎那事方究竟而相用等故總説一心或可且約無間正斷惑故言一剎那也言上下別觀者即法忍法智類忍等八也言依詮證滅者問若苦集滅道有為可説通三世有眼智明覺滅諦一種是無為何故得通三世答疏言依詮證等意言詮者顯也如言詮故由智斷惑真理顯故即此顯智上假説三世所以諦諦説有眼智明覺也糅云如斷苦諦下或時持過去或令其永滅治現在惑不能為因治未來惑更不流至現在不為果令其永住不生滅法假説此智通於三世實唯現在也言謂是有學者從初地出心已去直至金剛心已來在修道位總名有學初地已去起加行智加行智是有漏七地已前總有八地已去則無加行智也謂見道已後起加行心欣趣第二地中無間解脫先於加行心中即四諦相故云我雖斷盡分別煩惱由有俱生煩惱未能修行言以其妙慧者準下疏文即未斷煩惱前有漏慧能通達故故得妙名言應當遍知者未知苦諦應當永斷未斷集諦言四種行相如前應知者指眼智明覺也言已得盡智無生智者二障盡故盡智後不復生名無生智相國引集論説煩惱盡處而得此智名為盡智即前五羅漢智説無生理故名無生煩惱後復永不生具此二義名無生智即第六羅漢更不退起生煩惱故又簡要云集諦因盡故名盡智緣苦諦後果不生之處故名無生智也集論多説不過此也言我已遍知未知者未知苦諦我已遍知未斷集諦我已遍斷未證滅諦我已遍證未修道諦我已遍修言亦有四行者亦有四行相也指眼智明覺言此差別者至真聖慧眼者秀云此辨三轉行相差別是大乘辨差別三轉者一印相二應修三已作下自引之此唯依自身名轉不同俱舍示相勸修作證唯為他故言觀此文意初轉者有説此中意説見道中總有四道一加行二無間三解脫四相見道四道中初加道名為助言雖知四諦者問加行位中既知四諦得名正轉否答疏中言雖知四諦等意言見道已前如行智位雖知四諦但是轉因未名正轉未摧壞故言由此但名損力者問既不正轉是何轉答疏言由此但名益力損能轉轉義有六唯識云轉依義別略有六種第一損力益能轉於初二位由習勝解及慚愧故損本識中染種勢力益本識內淨種功能雖未斷盡障種實證轉依而漸伏現行亦名為轉化度言漸近無漏名為益力有除惑用名曰損能也二通達轉三修習四果圓滿五下劣六廣大復有四種轉一能轉道此復有二一能伏道二能斷道二所轉依此復二一持種依謂第八識二迷悟依謂即真如三所轉捨亦二一所斷捨謂二障種二所棄捨謂餘有漏劣無漏種四所轉得此復有二一所顯得謂四涅槃二所生得謂菩提四智四種六種並唯識論中文言入見道中者正得名轉言真無間道等者謂入真見道無間道中二空根本雙斷二障分別種故獲得無漏智故言其解脫道及相等者問加行無間助斷正斷可名為轉其解脫及相見道既不斷惑何名為轉答疏言其解脫至鎮已伏故又難如前答根本煩惱雖則不斷能斷粗重煩惱習氣亦名為轉又解脫道等能斷迷事惑故亦名為轉言雖不斷等惑者難云如前不別答疏言雖不斷惑等一解脫道中能斷習氣粗重障故亦鎮已伏故其相見道倣法擬宜作四諦觀故總名初轉也言別知四諦相者牟云相見道中只是倣真見道中事更不別證四諦理故總是初轉攝也意者意成相見立名初轉量云相見道是有法定名初轉故宗因云非別知四諦故同喻如真見道問真見道實證相見道不爾何名非別知答別知有二一不次第證二不重證不次第者如一心真見道三界四諦所有分別煩惱一剎那中頓更不別別知苦集二者不重證諦理此真見道無始已來未曾證理今始擬證名不別知雖真相殊於不重證義皆相似今約此義故相例也量云相見道是有法定名初轉故宗因云無漏知四諦故同喻加真見道雖相真殊知四諦同無漏不別也若爾加行位中亦知四諦應名初轉答因中以言無漏已簡此説故無不定此有二義一者相見非唯能鎮已伏亦非別知四諦相二者亦前真見緣諦相故言此後修道未斷惑等者有云三人從於見道起已在於修道未斷修惑即起有漏加行之心或全斷俱生等惑此加行心折伏煩惱但擬趣後聖道令生由此亦名正轉法輪若從初地至十地所起真智斷所智障亦是正轉法輪攝言應遍知等者未遍知苦諦我應知未遍斷集諦我應遍斷未遍證滅諦我應遍證未遍修道諦我應修言但擬趣生者即是加行道後斷惑道即是無間初加行智中依四諦相但擬折伏欣趣生趣正智斷惑道故非正能斷言折伏正斷等者問未斷惑前所起加行何名第二轉答疏言折伏正斷等言至無學解脫等者意言未知苦諦我已遍知未斷集諦我已遍斷未證滅諦我已遍證未修道諦我已遍修言然見道前等者問見道已前能伏斷惑未斷不得法輪名修道加行惑未除折伏之時非正輪答疏言然見道等見道已前唯有漏雖有伏道不名轉修道有漏及無漏由二間起名為轉謂修道十地中地地有二道一趣生二斷惑道趣生即加行道進起生起後後聖道言前無無漏者問修道位中加行智並非無漏如何稱轉答疏言前無無漏等意言見道前加行智一向是有漏又未經無無漏無始未起故不同修道中加行智有經前見道之無漏故又修道中意若言加行智一向唯是有漏加行道即通漏無漏也言如是菩薩自為三轉者標三轉也言初轉在見道者謂菩薩自斷煩惱成三轉時在見道中親自印證諦理故名印相轉次明修道出觀已後起加行心欲斷俱生煩惱故名應修轉後至無學道已知四諦名已作轉言一一轉時於一一諦等者三轉竪論者謂見道修道無學道三轉中從見道苦諦修道苦諦無學道苦諦此三苦諦各有眼智明覺四行相三四成十二集滅道三諦竪論之各有十二故成四十八也若橫論之據一轉四諦諦各四行相合成十六行相計三轉亦四十八也言如是四諦等者問既有四十八何言十二行相答疏言不過十二以數等故意取竪論三道三界苦諦諦各有四心即成十二餘之三諦歷三道論皆有十二以數等故總説三道轉十二行相言俱舍亦説等者疏主引俱舍文論二乘人別觀四諦得成三轉十二行相故彼論云此是苦諦此應遍知此已遍知是名三轉即於如是一一轉時別別發生眼智明覺言彼以法忍等者婆娑七十九卷中有此四釋由彼論宗唯於見道作此上下八諦觀也苦法智忍苦法智配欲界苦諦苦類智忍苦類智配上界苦諦合上下諦方成四行相餘亦爾言若作九無間九解脫不作八諦故無忍類智等言或忍智一一等者此釋通三道是大乘正義也三道各四眼智明覺即成十二行法輪問前解何別答前解唯見道此釋通三道初釋法忍法智類忍類智如次配眼智明覺故唯見道今後解即法眼為總能緣三世去來今如次配眼智明覺此解為正也言不同於此等者小乘不同於大乘大乘正義通三道以三道各四眼智明覺即成十二法輪彼俱舍論與此大乘不同故言不同於此也問小乘何故不同大乘答小乘上下觀諦唯見道有此行相也若修道無學道即無如是行相又大乘通緣三世名眼別緣三世名明覺故言不同於此若經部師不説眼等唯依四諦説十二行相故俱舍云如何三轉具十二行相答三周修歷四聖諦故謂此是苦云云又此是苦汝應知云云又此是苦汝已遍知云云此是十六行相也行相了也言證人多求狂亂失志人否又問我不證涅槃而誑汝耶又汝知我世間心觀汝前際若今日不證聖道向後無間地獄身無窮不説相諸身我化得汝一人入聖道出死苦了我入涅槃亦是陳如還以三答第一答言我已解法實知世尊不是猖狂失志人第二答云實知世尊證得涅槃而不誑我等第三答云實知觀我前際若不入聖生死無窮所以疏言我已解法言從此已後如前者即指第三轉也畢竟令被五人證獲阿羅漢果言生解脫處果者解脫即是盡智無生智處即生空理是智依處於中陳如最先悟道餘人猶在四善根位或夏初或夏滿陳如方得無學餘方得初果已後皆得阿羅漢果言同俱舍説三周者引小乘證大也言謂此是苦第一示相轉云云言謂此是苦汝已遍知三作證轉言此是佛為他三轉者攝問諸聲聞入聖皆賴世尊三轉法輪耶答不定遇佛得四果者佛為三轉若不見佛得果者依如來三轉教法而得果者攝教歸佛亦得稱佛為他三轉也言後名作證者問何名作證答如來以現量智證知陳如得無學果滿故云作證也言第二第三轉已等者即此解脫是生智處涅槃是無為果也世尊轉法輪陳如解心起是名轉在地身令陳如於佛所證深生信解言五最後令他於他等者標也令地神於陳如所證深生信解問陳如證得無漏於佛所證深生信解地神未得無漏如何於所證深生信解爭得知耶答佛問陳如陳如答言我已解法所以地神信佛故故於陳如所證生信解知也言謂如長老至起世間心者問何名世間心牟云陳如世間心直是出觀已後散心若是如來世間心但是緣事後得知定心也言如來知已起世間心者問何名世間心耶答如來後得智了世間故名世間心此疏文通兩意若如來知為上句已起二字屬下句即是如來知彼陳如已起世間心世間心屬陳如也若如來知已已字屬上句起字屬下句即世間心屬如來也不如取世間心屬陳如為勝阿若下八字是如來所發言語也若如來知已起世間心阿若憍陳已證我法者即是如來知彼陳如已起世間已證我法兩節起世間心並屬陳如也若如來知陳如名緣事心者通其四智大圓平等成所作三知無別種起緣事理心起必同種心不能由諸等至故緣於事起必同種若妙觀察智有同種起者有別種起者令知陳如總得知也名如來緣事心也言乃至梵世者問何唯至梵世不至諸禪答金云一由梵主是請主最先請轉法輪故唯至彼也二語言説法表至彼地言緣事心者緣事之心名世間非要散心者恐將謂世尊亦有散心故言非要散心也言五令他地神者即是地神知陳如所證深生信解等字等取上界諸天也婆娑三十一云佛告地神言我轉法輪苾芻見法故彼得聞問何故告他答世尊自顯於九十六種外道中最勝能轉法輪亦顯陳如為真福田也言四差別者一種是四諦如來無漏教聲本質是一中間相分三乘差別各各不同名為差別也言雖轉四諦法相者問三乘同觀四諦理如何得果而各不同答疏言雖轉四諦等意言雖同觀四諦然前加行劫數不同由是三乘得果各異也言已於三生或六十等者利根者疾則三生鈍根遲者六十劫潞府三釋一云經三個父母生第一生中發心修聲聞解脫分善死已更受第二生盡此一生身上修行入加行加行死已入第三生身得無學果二云經於人天三返生名三生也人中一度死天中一度生又天中死人中生名第一生第二第三亦爾受三個大生了方得無學果三云經於三個化佛第一生逢拘那含牟尼佛修解脫分善也第二生迦葉佛修決擇分善第三生逢釋迦得聖六十劫者增減劫也又云六十劫此是練根及非鈍根者經生是鈍即非練根也俱舍二十三諸有創植順解脫分極速三生方得解脫又正理云聲聞加行最久經六十劫自果必證欲顯三乘聖果非率爾成同非禪師言下便證言依蘊處界等者問如何依薀處界等作四諦觀答總觀五薀身説為苦諦別觀行薀煩惱及業説為集諦智斷此二所顯得理名為滅諦行薀聖智已能斷故説名道諦處界準知言獨覺性人者疾則四生遲經百劫問緣覺之人自觀因緣而得悟道如何言遇四個化佛練根得果答緣覺無別教文初業還依聲起約初練根時事須遇佛不約得果言四生百劫者四生如聲聞説百劫者或增減或成住壞空等劫亦不遮一二劫乃至九十劫已來得獨覺果修道勤求極數者説若懈怠者更經無量劫不得二乘果也言依十二緣起修等者觀識等五支及生死支全并有支一分而觀苦諦無明行愛取四支全有支少分而觀集諦依苦集斷位所顯真理而觀滅諦依此能斷之道而觀道諦此約緣覺於加行位聞佛説已後自修習得無學道非於言下而得果也言三性者相國菩薩觀依他起性有漏身為苦諦觀遍計性為集諦觀圓成實性為滅諦觀行薀聖智無漏依他為道諦此中同觀四諦者如同照鏡三人各別影生上解通行法輪言無量衆生發獨覺心者問何故佛前無證果者答既言獨覺出無佛世方證得獨覺故佛前無證果者麟喻可然回心已後轉名菩薩已得逢佛也部行餘時佛邊聽法亦得發心而無證果也言初地二地乃至十地一生補者準此般若中一會中得成三轉初轉得初果初地是二三地是第二轉一生補處成佛是第三轉也言故鹿野者三七日鹿野菀中説四諦法是三乘通行故名轉法輪言若不爾者若不約三乘通行得名法轉者第二七日亦説十地經應名法輪説攝故答疏言彼非三乘同所修故言然實他身三時者問鹿野菀中一坐三轉得成聖果可成三轉法輪攝若有經生之者始證聖者如何得成三轉法輪答疏言然實他身三時等此説三轉不必一生而得具足賀云然一坐三轉成就者唯陳如一人也餘四人便不成一坐三轉直至夏末方得聖果亦有經生者若有人已入見道成第一轉訖其人根鈍不復進修或經一生二生乃七生方能斷惑得無學果方成就第二第三轉也又如佛為上流之人初轉入見道第二轉得三果遂至上流至有頂得無學果豈聞第三轉也又佛為一類初轉便般涅槃彼豈更聞第二第三轉並是經生方證問既經生方得無學果既不見佛如何名佛轉法輪答世尊於鹿野菀中説四諦法輪時三輪行相總已證了已後得果時雖不同總是此間三轉收皆約從初一會為名亦成示相勸修作證也言一時等者佛初趣鹿園與彼五人同乞食漸教導彼未既轉法輪後方為輪令陳如得初果餘四人由在善根位中後更兩轉令修道後至夏初或夏滿已陳如方得無學餘四人方得二三果等轉不一度得果亦殊始終而論名一時也如經言一時約事究竟而説也言得三果者牟云三轉之果也即見初轉入見道第二轉入修道第三轉入無學道也故名三轉法輪言其輪能寂本性者本性寂者謂真如理也能寂謂正智智證理時斷障顯如故言能寂也言希有法智等者希有法即理也三乘所獲無漏正智名為法智此時天人方能證得故名為證牟云此言天人三乘人見道之身也入現觀故證者證悟也言阿羅漢者即等者羅漢與僧別説所以疏主作第二解也言四法已周等者涅槃是果言音是教能證智為行所證理法也教理行果四法法寶已周也配經便有涅槃音為法寶及以阿羅漢為僧寶佛為佛寶言既有體出者意言四法并佛及僧能化之佛所化是僧既有三寶名體出現也言佛菩薩并以聲聞等者佛菩薩聲聞三能轉法輪此三人能説法令他得智斷惑可名轉法輪即如馬勝説偈令鶖子得初果鶖子後令目連得聖果又優婆毱多説法令人得聖果此聲聞轉法輪也言不能令人得者攝問觀佛三昧海經第四説諸辟支佛擲鉢在空作十八變諸辟支佛一一足下皆有文字具説十二因緣又本行經云爾時梵德王到辟支佛邊時辟支佛少説法要令王歡喜踊躍無量顯示善事何故言不説耶答二意一不多説故故言不説法二説法不能令人得聖故言不説安國云若現通令人得果可爾説法即不能也故大論獨覺地云為有一類獨覺依彼彼村邑而住善護諸根善住正念隨入彼彼村邑聚落或為乞食或濟度他不以語言示現種種神通境界乃至為令誹謗者生師向後故有經亦説緣覺化人亦得聖如何言不得答神通化即得説法即不能言聲聞等者一云舍言獨覺又解聲聞亦不許轉法輪為由不識藥病不能觀根受道唯佛菩薩能識藥病能轉法輪聲聞等不識根器由此不與轉法輪名牛呞比丘周利槃豆雖是羅漢不能説法如鶖子等能説法者名轉法輪理亦何失言非但今日者非但今生所開權顯實非但今生讚有餘涅槃息分段生死苦也言根熟來逢者解小乘根此非但是大乘根熟也言我見先以權者即是三根聲聞二萬佛後退大乘行已修小乘行等經云咸以恭敬心皆來至佛所二句大乘根熟也曾從諸佛等二句曾於釋迦權化也問此是過去釋迦自身權化何言諸佛答釋迦一佛是諸佛之數亦得言諸佛或兼於俱那含牟尼佛邊聞解脫分善曾於迦葉佛邊聞決擇分善於釋迦佛邊曾受二乘化故總言諸佛也經言如來所以出為説佛慧故中間二句連讀也意言如來出世只為説佛慧也今根正熟既是其時何得不度言有五過者有二意一以一人具斯五過二者五過各各屬一人第一人無性凡夫第二定性聖者第三通凡聖第四唯有性凡夫第五增上慢者言阿顛底迦者樞要有三一一闡人云樂欲二阿闡提云無樂欲三阿顛底迦云畢竟畢竟無解脫因言情見不廣者或是不定性人雖情見不廣不必是鈍根自有利根元來情不見不廣如今之學百法人得少便為足言計執空有二相者此後三四五配有種性人謂遍計空有二相或有執佛法為空一切是無或有執佛法為有一切皆有所執空有非是了義之空有也今南北二宗大小乘等互執著等言或復具起七種者具起七慢凡夫盡是惡生不堪與説大乘言不嫉衆生者若嫉衆生則無盡也言理決定者即是道理決定若於道理不決定如何得成無異言對勝人者即是文殊普賢等八萬菩薩或即是舍利弗等回心已去成漸悟小菩薩也經言菩薩聞是法疑網皆已除者頓悟等小菩薩皆起此疑疑他小不自疑大乘外二乘不得作佛不定性小菩薩自他俱疑疑於自身及二乘人為作佛為不得作千二百羅漢疑自不疑他佛果菩提於己無分聞法華經一切疑除菩薩聞是一頌等問烈衆中大比丘衆一萬二千人何故此云千二百人當得作佛答烈衆雖多總言萬二千人此間別舉有疑得記者故數少不同烈衆中二云此千二百人是高名者佛乃偏舉非不記餘也言涅槃由此説等者證不定性聲聞作佛意説四果回心極遲鈍然不及頓悟初發心菩薩簡要云或經十劫乃至五十劫等便能得至十信初心言此據不定等者涅槃經説初果人八萬劫等約不定性人説皆得作佛言我於一時説一乘等者唯一佛乘無餘二乘一道者唯有一佛道無二乘道一行者唯大乘二利行無二乘者自利行一緣者唯有一佛因緣無二乘因緣潞府一者謂一大事因緣也言大寂靜者是大涅槃也由離一切生死囂動名寂靜言永斷一切結縛等者無明愛取名結縛也愁苦者即是老死之果苦者即是異熟果苦因者業煩惱也言到於一有者即是佛果之異名一佛之果也簡要云菩提涅槃唯佛獨有獨自有故名為一有故也章敬云有是實義即一實之果也上涅槃文第一段證不定性回心劫數第二段證定住人不作佛經言説無分別法者此以大乘唯有一體體者即一真法界三事涅槃若向上分出生空智為二乘説分出一分解脫為二乘説分出一分法身理為二乘人説四十年前作此説後法華會上總説一乘名説無分別法言妙理體無分別等者此以大乘體唯有一三乘同證更無異乘名無分別故經言於一佛乘分別説三若實有三不名於一分三也言一佛出希者諸佛興出世懸遠值遇難無量無邊劫空過無有佛説使者一個佛出世來衆生在地獄餓鬼畜生中不遇佛出故云懸遠等二説法希正使出于世説是法亦難佛出世衆生逢佛説大乘法亦難有佛出世不説法却入涅槃又有佛設説法唯説小乘不説大乘法故名説是法亦難三難聞希設使佛説大乘法衆生不在會或造匱法業不合得聞如五千人是也故聞是法亦難四能聽希設無匱法業合得聞法緣法華經是難信解之法衆生樂小悕大不肯聽故故言能聽希言佛出希者標也如賢劫千佛至獨王一劫者如賢劫者解劫名字所由也謂劫初成時於水輪上有一蓮有一千葉而現於世光明赫照第二禪諸天宮殿第二禪諸天人尋光來下至於欲界見此蓮華有一千葉葉中有賢聖之影更相謂曰當來必有千賢人出現得成佛果故名賢劫也此賢劫名是二禪諸天以立名二定劫分齊問此賢劫有多少增減劫為一賢劫答成住壞空各二十增減劫共有八十增減劫為賢問此一千佛共在賢劫出世為不爾答前九百九十九佛同一火災劫出世至樓至佛出後獨王一火災劫合一百六十增減劫為一賢劫言今第九住劫已四佛出世者明時節也問為第九劫中有四佛出世為通前住劫共四佛出答有二解一通前住劫共四佛出問從何劫即佛出答住劫有二十增減總名住劫初五住劫無佛出世第六住劫人壽六萬歲時有一佛出世名俱留孫佛第七住劫人壽四萬歲時有一佛出名俱那含牟尼佛第八住劫人壽二萬歲有一佛出名為迦葉佛第九住劫人壽百歲時有一佛出名釋迦牟尼佛第十住劫人壽八萬歲時有一佛出名曰彌勒佛從此第十一十二十三十四無佛出世第十五住劫有九百九十四佛出俱有名字通前成九百九十佛出世從此已後至二十住劫無佛出世便即劫壞經二十壞劫後有二十空劫空劫後有二十成劫成劫後二十住劫此於二十住劫中有一佛出名曰樓至佛獨王一劫通前滿一千佛也二準五濁經説唯第九住劫有四佛出世謂第九住劫中人壽六萬歲有俱留孫佛出世人壽四萬歲時有俱那含牟尼佛出人壽二萬歲時有迦葉佛出人壽百歲時有釋迦牟尼佛出從此漸減至人壽十歲時然後劫增至八萬劫初減彌勒佛出故即第十劫也後第十劫彌勒出已後與前解同唯前四佛出兩解別也彌勒佛是賢劫中第五佛也今取莊嚴劫末毗婆尸佛尸棄佛毗舍浮第三佛并賢劫初四佛俱留孫俱那含牟尼佛迦葉為七佛者如世人立七庿言此劫壞已鶻盧支佛獨王者舊云樓至佛是也化度傳有二釋一者此言所愛以是最少父母偏愛故因以為名亦云啼哭由聞諸兄悉先成佛恐無衆生可度恆常啼哭因以為名此之賢劫有兩個成住壞空大劫前八十劫共有九百九十九佛後八十劫唯鶻盧支佛獨王一劫從初減即出直至壞劫廣利衆生下明千佛往因案金剛密迹力士經第一云佛告真寂意菩薩過去久遠劫有佛名曰淨光王出現於世世界名莊嚴劫名善見人民熾盛五穀豐發時有轉輪聖名曰群勇千子具足將千子至淨光王佛邊聽法滿七日已各於王所請求出家王即聽許既出家已王欲驗之成佛先後即敕工師造七寶瓶極令妙好可高七仞又造寶籌乃有千數籌上書千名第一第二乃至千令置瓶內七日種種供養至七日後使人將瓶於紫金案上各遣諸太子以手探籌得第一者最先成佛乃至得末後籌在後成佛其第一太子名曰離怖得第一籌即今拘留孫是第二太子名離名聞得第二籌以次成佛即今拘那含牟尼佛是第三太子名曰寂根次第三成佛即今迦葉佛是第四太子名離苦次第四成佛即我釋迦牟尼佛是次後一一太子成佛皆有名字不同不可具引其最後小者名意無量得最後籌即當最後成佛其諸太子輕戲調弄衆共語言我等諸兄總先成佛度衆生皆盡汝既後成當何所度其最小太子愁憂常多啼哭因立名名為啼哭佛也父王謂太子曰世界無盡衆生界亦無盡何憂無衆生度太子曰願我成佛獨住一劫所度衆生與諸兄等諸兄成佛處我常作金剛力士護持法藏末後成佛號曰樓至如來也其最小太子云若我言至誠不虗三千世界為之現瑞當爾時三千大千世界一時振動普雨天華不鼓自鳴諸天伎樂而以供養表最小太子決定成佛獨王一劫所化衆生等諸兄也言經十二劫後始有等者糅云今言經十二劫後始有星宿劫者過鶻盧支佛後經十二個大劫並是星宿劫攝即未來千佛初淨光稱王佛出世亦名日光佛名別義同此佛為首下至須彌相並是星宿劫出世當得作佛後更經三百大劫空過無佛故佛希也由如星居希歷歷而住佛出亦爾名星宿劫過去莊嚴劫中得成佛者以華光為首下至毗舍浮佛並於莊嚴劫出世諸佛出世莊嚴國界故名莊嚴毗舍浮佛以七佛中第三佛是有疏本言始有莊嚴劫者寫人錯也又據藥王藥上經説昔有三千人稱三十五佛名字後時行滿一千人於莊嚴劫成佛一千人於賢劫中成佛一千人於星宿劫中成佛然過去莊嚴劫中最初佛出名為華光最後佛名毗舍浮次賢劫中千佛名初俱留孫佛最後鶻盧支佛未來星宿劫名淨光稱王佛最後須彌相佛出世上來兩個成住壞空計一百六十個增減劫總名為賢劫前八十個增減名大賢劫賢人多故名大後八十個增減名小賢劫以一佛出故唯一賢人出故名小賢劫非時即小也言迦葉佛住等者有言住壽七日都不説法便入涅槃問十二分教章中迦葉佛説法名分別空豈不是説法也耶答七日內不説大乘法牟云迦葉佛住壽為一句七日不説此法為一句意言住壽七日內不説過七日已方説與上文別讀所以經言懸遠值遇難如經中説佛在之日有婆羅門其妻端麗愛染尤重不肯出家每日念言世世有佛後出家非晚時遇世尊便白佛言未來世更有佛耶世尊答曰未來世中更有佛數如恆沙聞之便去未遠之間而自念言過去有佛乎若有者吾何不遇遂回問佛佛言過去佛亦無量無邊聞之便悟乃知過去有佛我既不逢未來佛出焉知即遇因便請出家便獲初果由此經言值遇難也經言譬如優曇華一頌者長行舉喻不言讚歎偈加一行半讚希即長行與偈有無不同也問能聽與能聞何別答聞即約耳聽即約心優曇華人中希有輪王出世法華經是法中之希有法輪王出世方説法華言此為諸佛等者能詮教也勝道者所詮理也或密藏勝報身道法身報身經言終不求佛道者只為不能未自求如來故須出世作所求境也若如此何名有感即應答有一類人見佛色身彼心方發雖不求佛亦現身故今解但言不求佛道即大乘非是不求見佛也言一慚者問何名慚答疏言崇重等心能對治無慚慚謂羞慚崇賢人重善法言復顧者顧者護惜之義顧視也慚者於自身及所得名利向上愛惜顧視名慚也言愧者對治無愧止息惡行為業愧則輕惡人拒惡法復顧世間形法等事羞恥過非名愧經言舍利弗當知等三行者究竟入於一乘一乘法事須修習始得不修習不曉得了也第四疏了乾符六年冬溫州開元寺講大慈恩比丘弘舉傳寫供養
