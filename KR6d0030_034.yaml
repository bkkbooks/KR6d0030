body:
  text: 鏡水寺沙門栖復要集分別功德品言一者二品傍釋等者七品學行流通其涌出一品是能行安樂行弘經之人乃是正釋如來教化行安樂行持經之者因此涌出品方有壽量品乃有分別功德品故兩品乃是傍釋傍釋涌出品疑也前品言因釋後言傍釋前品名因釋前疑此品正是展轉生起故有分別功德來也言總萬德等者法身也無為萬德依法身故鴻由大也毛詩大曰鴻小曰鴈也基由始也廟諱應言階也綰三明之極體即自受用報身也綰者攝也窮神盡妙者化者身也此上壽量品也聞之者悟心分別品契智符真壽量品融之者道證分別品融由明也言二者一乘果等者科十九品為正宗中五品一乘果中分二初二品明已滿果後三品明未滿果初中復二前壽量品正明已滿果後分別品因間已滿之功德十一位得證一位發心已滿之家果亦名已滿果故壽量品後分別來言三者論解十無上等者問何名勝妙力答由持經故獲得六根清淨等名勝妙力無上言論復自言等者論先列無上指經文了便解塔品九事說方言自此已下故此云論復言也已下之言即指分別品下法力及修行力也言法力有五門等者一證者經言我說是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍等十一位證也二信者即是一位發心經言復有世界微塵數衆生皆發阿耨菩提等三供養者經言佛說是諸菩薩摩訶薩得大法利時於虗空中雨曼陀羅華等簡要云此之三門在此品初也四聞法一門在此品後二長行及頌并隨喜品也後二長行者且初長行云爾時佛告彌勒菩薩摩訶薩阿逸多其有衆生聞佛壽命長遠如是乃至一念信解所得功德無有限量頌經言有善男女等聞我說壽命乃至一念信其福過於彼第二長行云又阿逸多若有聞佛壽命長遠解其言趣是人所得功德無有限量牟云又指隨喜品頌云世尊滅度後其有聞是經若能隨喜者為得幾所福言讀誦持說等者此一門在法師功德品也言論自解云初門等者即是分別及隨喜兩品攝初四段文佛唯告彌勒言後一常精進等者法師功德品唯告常精進云云言由此法力攝三品者謂分別品隨喜品法師功德品言分音者府文反別音方列反或作莂古人於竹上書記事也或𧧸言語辨釋也或分音扶問反一分分道理差別也別音馮列反分別言解妨者等問菩薩聲聞一種聞法何聲聞授記菩薩不霑益疏云菩薩之記等十一位證也不說證果不授果記也即別既因中記證也言菩薩無取捨等者聲聞有捨權取實菩薩無故問任持取餘說於一乘准此亦兼為菩薩說於權實云何無道證耶答為二乘說令捨昔權取今實故故有證菩薩之人有取無捨已取大乘也為說權實故無記證不同小乘故不相例也言問初科品等者此問答兼破喜祥以真化為宗也問利今門中別為現證益尋此經勢乃由聞壽量何開聽經刾為現證此問意依八品為宗今聞壽量即非聞經也答二說一云前開出見聞二云流通亦經也言此初也者一標時益也牟云經文無時節之益但是因聞壽量長遠之時而得益即是聞時益亦是當時益也言依義殊勝者佛告益也論主依義殊勝科分別品為三段一證二信三供養前科初文有四今此唯三不科出第四彌勒領受文但是疏主以義科也牟云但是彌勒說頌領受非是重頌也以長行是佛說故言殊勝雖非重頌還是領前義意亦名殊勝也言無生法忍等者安國依古引般若三百七十六二解一云智所斷惑畢竟不起名無生智了諸行猶如陽焰名為忍無生即法無生之忍依主釋二云能斷煩惱之智觀遍計所執畢竟不生此能觀名無生忍無生即法無生法之忍亦依主釋二說何別答前解約依他後解依遍計言無生是境等者疏意又別無生是境無所執生遍計性相無生依他起性自然無生圓成實性惑苦無生也法是能詮無生教法名忍者是智印證之義名無生法忍地前唯聞無生教法未能起智證達故不立無生法忍名也又入初地故得此名言聞持在三地等者經言復有千倍等者問何名為門此之菩薩非化土有但是報土方容受得或從一恆河沙如是千倍或倍前六百八十萬億那由他恆河沙一處見異也言三地離定障者此會上論文也論云三地發光地成就勝定大法總持能發無邊妙慧光故又斷二愚一欲貪愚二圓滿陀羅尼愚言樂說辨才等者具者不是具足但是說法器具即五明論是辨才之作具也紀國云隨分得在五六地殊勝在第九佛位圓滿言唯識等說者論云由斯九地說斷二愚及彼粗重一於無量所說無量名句字後後慧辨陀羅尼愚二辨才自在愚又利地門中不欲行障障彼九地四無礙解入九地時便能永斷言旋陀羅尼者若水回作旋水流貌也通二音今取還旋也此在第七已前猶有相故第七地純無相一剎那間空有雙緣緣空之智便能達有達有之智便能緣空故名旋也問只有一旋何名無量旋陀羅尼答空有無量差別一時總緣名無量旋陀羅尼也言不退法輪等者紀國云不被有功用退轉言清淨法轉者經言復有二千國土者或是二千箇國土或是小千世界名二千國土也紀國云因位究竟名清淨為他說此名清淨法輪攝論云初地清淨第十地名究竟清淨言但隨義說等者不須說無生法忍等事須在初地八地也言論云此得初地者初依論略解也未聞法華經去初地菩薩不知生數今聞經已後望初地決定空生數多少也牟云此即加行位中已定生菩薩若爾任運依生亦入初地何假聞法答由聞經故得入已定生非先已得也謨云初智菩薩離分段死者正據智增菩薩說若悲增及悲智平等離分段死即不定也言隨分得見等者乍看論文似取真理名菩提意取證真理之菩提也言非得果滿菩提者問下頌有復有四三二如此四天下微塵數菩薩隨數生成佛此云何通答譯者巧也佛者覺義即是初地菩提也言亦有釋言者敘古人說也章敬云真諦三藏義說入生是四恆人地前十信十住位解十六分中一分義四生是五恆人十行十回向位解十六分中八分義三生是六恆人即是初地至六地解十六分中十二分義二生是七恆人即是七八九地解十六分中十四分義一生是八恆人便是十地滿心全解十六分義言十六分義者經文不釋諸師異說今略敘三說一云常樂我淨無常無我無樂無淨迷者名到悟者名正地前而能信悟此之八種登地已去證悟此之八種信證各八故成十六分義二云有為無為各有八倒成十六倒翻此十六成十六分義三云涅槃總意明諸衆生悉有佛性如來常住能解此者淺深不同品類有十六分如稱十六兩成一斤不可難言數有增減言雖有釋言等者三者成前正義即是成前法華論中正義疏主破古師云雖有釋言八是恆第一地得無生菩提今依法華論解此經生數八生乃至一生是地前菩薩得初地菩提不依涅槃經中義名不作是釋也言此明信發者一位發心也即發十信菩提心菩提為所發信為能發能發如麴所發如來言末尼珠等者勝劣不同放開兩種或末尼是梵語如意是唐言唐梵雙存分成二殊也亦有譯摩尼此云增長謂寶珠增長威德經言遍於九方至大會者此是釋迦佛神力令分身佛一一佛前皆有香爐燒無價香言菩薩上天者每分身佛後一箇侍者是實菩薩每分身佛復有多菩薩執持幡蓋又云是釋迦化作現觀喜相攝身虗空持諸幡蓋又說偈讚上至梵世乍觀似說幡蓋大小次第上至梵天此菩薩身亂行從四天王天忉利天名次第而上也言梵天即初禪也問何故不更遇答初禪也已來有尋伺他有語表故紀國云諸天祥瑞下羅菩薩乃神幡上烈諸天在上故向下呈祥菩薩地居故上浮空表言香來飛下故說九方者問何名九方答第九是上方也牟云香如鳥飛從上空而來故不說下方說餘九方靈山會形對上方便是下方所收香煙從東西南北四維并上方來供養靈山靈山是下方所受香處故不說下方說餘九方也言第四領受益等長行無偈文有即是彌勒菩薩領受也言此初也者初二頌聞法歡喜經言佛說希有法昔所未曾有者捐前壽量品也經言世尊有大力者指前諸佛智慧之力諸佛自在神通之力諸佛師子奮迅之力諸佛威猛大勢之力此上四力名大力經言壽命不可量者指前三身壽量也只此便是領受益也言十五頌益瑞者證信名益供養名瑞言此初有三者初三頌位證經言或住不退地者謨云即前長行無生法忍四不退中證不退也或得陀羅尼者即前聞持陀羅尼或無礙樂說或萬億旋總持能於多法周旋觀察從境立名也言繽紛者廣雅言繽衆也紛亂也謂衆多亂下也字林繽紛盛也言半頌雨衣者長行兼瓔珞此但雨衣言結成歡喜者經言如是種種事者指前壽量品三身功德法喻雙說也經言一切具善根以助無上心者章敬云二說一者衆生助佛心如來慈悲憐愍衆生說法既聞法已獲益具善根便是衆生順佛助無上心二者佛助衆生心佛名聞十方廣饒益衆生衆生依佛得具善根便是佛助衆生無上心經文顛倒應言具一切善根也言何量之有者解經中所得功德無有限量言校量勝劣等者經言為阿耨菩提者為字去音訓以也糅云檀那者云布施也尸羅云清淨亦云淨羼提云安忍切云初莧初限二反毗梨耶云精進禪那云靜慮般若智慧言其一乘者一彼此對明初此經後勝髣且此經意說有為無為俱是一乘有為即菩薩智無為即是涅槃理此經一乘通理通智就有為中前五度是福第六度是智前五度是福福劣於智慧第六度是智智慧勝於福所以八十萬億那由他劫行前五波羅蜜不如有人一念信心聞如來壽量品所生智慧無有限量所以此經六度之中除智慧般若波羅蜜智慧般若波羅蜜是所挍量前五度是能挍量也所以經言除般若波羅蜜也是所以除般若者問何不通那唯除般若答疏云以最勝故也言此經雖說等者問法華勝髣俱是一乘何故彼經總對六度此經除般若答疏言此經雖說等雖者不定義意通此經多分是攝入有為智也少分通出生無為理也正名攝入有為乘傍名出生無為乘又此經理智俱包體性寬被彼勝髣經多分說出生少分說攝入正明出生傍通攝入唯無為理以為一乘有為不及無為所以恆河沙劫行六波羅蜜不如有人手執經卷緣經詮無為功德殊勝所以全將六度有為功德校量無為功德況座主雖者不定義意言二經皆通攝入生或顯言之意言此經一分攝入是正彼經攝入是傍勝髣云摩訶衍者流出四河此經云唯有一乘法且約彼一分攝入中此經通理智彼經唯理故以六度挍量言故知此經等者二結歸正體便顯古非也言若唯取真理者略非古說言天親金剛般若論等者一切世間法不可得為喻此上四句論偈文天親釋云云何為勝一數勝二力勝三不相似勝四因勝言數勝者經言若有善男子善女人於八十萬億劫行五波羅蜜將爾許時行五波羅蜜福元來有數可數得一念信心聞壽量品功德無有齊限不可知數又云此等有兩般一將一念聞經功德總作一分者向稱稱又將八十萬億那由他劫行五波羅蜜福還總為一分在稱一頭全輕他一念聞經福又將百分五波羅蜜福來一處稱亦輕他一念聞經福又更將千分來亦輕又更將萬分來亦輕乃至百千萬億分來亦不及一分聞經二云折算將八十萬億那由他劫行五波羅蜜福在稱一頭稱將一分福聞經來安住一頭全重於五度福又將此一分聞經福碎作一百分一百分中取一分來稱亦重又將此一分來碎作千分千分中取一分來稱亦重又將此一分來碎作萬分萬分中取一分來稱亦重又將此一分來碎作百千萬億分百千萬億分中取一分來稱八十萬億那由他劫行五波羅蜜福亦不及此一分聞經福數不可得故名數勝言二力勝者法勝故如經言不及一歌羅時略云在胎內五位時初一念結生時是歌羅時時極少也舉此歌時聞法華經經力勝於八十萬億那由他劫行五波羅蜜故名力勝言三者無似勝者似者喻也不可喻故故名無似也論家名無似經中言喻也經言東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊又將恆沙微塵喻一念聞經福不可得世間無物可喻名無似勝言四因勝等者一念聞法華經經為因感佛果菩提名因勝勝布施福感有漏果言此又有二者即是經中一算數二譬喻餘兩個亦不及之言十九頌半者此頌之中不述長行無有限量初段經文也從若有善男子善女人以下述然於金剛經疏不言頌初一者路府云不頌後一為正意說長時布施不似剎那時供養持經之人言校量一信者一念信也言分五者施戒忍勤定言三頌施等者以四事供養也經文之中初供養佛次供弟子供弟子之中只說緣覺不說聲聞所以疏中唯說聲聞不說緣覺也言田有三種等者一尊勝田供養佛二貧苦田布施貧人三中容田非尊非卑非怨非親故曰中容即朝定也問供養父母名恩田三田中何田所收答尊勝田故言今供初田等者安國云供養佛一則田勝二則恩勝供養父母亦田勝亦恩勝故言田恩兩勝也路云應合名敬恩兩勝供養佛是敬田供養父母恩田故疏家既將供養父母恩田向尊勝田中攝此供養佛便攝得兩箇田尊勝田恩田今疏言田恩兩勝者供養佛時對下二田貧苦中容名田勝供養時對父母恩田佛恩田更勝故名田恩兩勝也言二頌忍者初頌安受苦忍後耐怨害忍經言為此者平正呼訓由也被也言三頌定者經言除睡常攝心者除定障也謨云除本睡眠而常攝心除由棄也不是除却眠之時餘時即攝心也經言我得一切智盡諸禪定際者習禪之時所發願言願得成佛盡諸禪定際四禪八定根本定名際也言二頌校量一信者前頌正校量後頌結經言有善男女等至其福過於彼者過前五度也經言若人悉無有等者即是無疑悔也經言其福為如此者一念信心聞佛壽量所得功德過前五度名如此也為字平音訓定也言此初二也者經言頂受此經典者持經菩薩心如頂持經之時如頂上戴經願我於未來壽命長遠教化衆生願我成佛一如今日世尊坐菩提樹成佛了說壽命品亦如是即心持法華如繫珠也言方信無疑者經言於此事無疑者章敬云長行望當果說菩薩無退頌文依現德行願向上無疑即無退也長行及頌隨喜信解了言第二段解持等者大科七段盡作荎音呼言初聞佛壽量等者唯聞壽量品早感法身所以經言能起如來無上之慧是言後於一部等者經言何況廣聞此經者即是於一部向上受持也經言能生一切種智感報身果現在未得當必得故言一見報佛等者經言深心信解則為見佛為字平聲為由是也問現持經如何得見答二解一云當必見佛故今生持經當來淨土中見佛菩薩淨土眼見也言見解佛智等者第二解也現在聞持經典悟所詮理如見報佛一種結言此以智見非眼見也言第三行者即為等者經文分二初經言又復如來滅後至解相者并前唱為字並訓作也名經言何況已上等者則為頂戴如來者為字平音呼為是也首如心頂受持經時如來全身在此經內心緣教時必帶理故名頂戴如來也言即為已起佛塔僧坊者初標也經言是善男子善女人等者更不要起塔造立僧坊但持經時即名起塔造僧坊不須為我為字去音訓與也金云寺者梵云毗訶羅唐言遊處即是僧衆遊行之處今以寺代之廣雅云治釋名嗣也說文𨓍也相續承嗣於其中也牟云摩騰初至館在鴻驢寺中後白馬寺故此方有寺名也言下釋有二初略後廣者此略也經言所以者何等者何以持經名起塔造僧坊耶答本來造塔為安舍利今全身舍利在此經內持經之時便是起塔本來造僧坊衆僧歸投此經既是衆學所歸持經之時便是造僧坊也塔品云此經難持若暫持者我則歡喜諸佛亦然如是之人諸佛所歎是則勇猛是則精進是名持戒行頭陀者則為疾得無上佛道即同此中法華經便是衆所歸也言真行供養行字莖同言有等者一量者經言高廣漸小至于梵天二具者懸諸幡蓋及衆寶鈴三時者則為於無量百千萬億劫作是供養已言是人定超於等者解經言高廣漸小至于梵天得上界定地超過欲界人天福德有所表故此表持經之行非以外財實能造得爾許大塔故言塔至梵天言且舉極小者問若爾功德有限何故前言算數不及耶答疏言且舉等意言舉極小一箇供養行善根功力至于梵天若具行十行福不可量也經言則為於等者為字亦平音為由是也初釋則為起塔塔了言安四方僧等者解第一數經言作諸殿堂三十有二安四方僧生八聖道故即八支聖道意言但有持經處則有四方賢聖僧僧具八支聖道謂正語等四方僧各生八支聖道四八合成三十二殿堂也又云以擬忉利天宮之嚴麗也除善法堂餘三十二天各有一堂故問何要用赤栴檀耶答阿含經云諸樹香中赤梅檀為第一言八多羅樹者解第二量經言高八多羅樹等梵云多羅此云高疏云此方云無支其樹形如棕櫚體堅如鐵葉長周密華如黃米子少人多食之安國云高一箭道今言八者世人皆以多羅樹為極高今言八者意明過常也言高七仞者一仞七尺八樹計三百九十二尺論語云夫子之墻數仞言餘各有表者經言百千比丘於其中止第三僧住衆賢聖僧窟宅故經言園林浴地第四資具也園即總持林即大法浴池等謂定心解脫也經行即身業所遊履也禪窟為意業所栖止也衣服謂慚愧也飲食即甘露法之食也床褥者靜慮為床淨命為褥也湯藥即無漏聖智療治煩惱猶如湯藥也上少指言如是僧坊等者是多指也經言如是僧坊堂閣若干等是言五行者兼行六度者經言一心智慧者一心與智慧別定能令心專注一境名一也舉同時心王名一心是心王也言道場謂正等覺性者辨云相名為道性名為場言贊三乘等者問讚三乘者如何是無畏施耶答牟云若向他二乘人道汝等去道甚遠此名惱他令他怖畏今既讚嘆故名無畏施問前來經云亦不稱名讚嘆其美此何令讚三乘人答前約初修之人此約久修之人也言利他忍中等者同上耐怨忍也路府問既是柔和無怨害可對如何疏言耐怨害忍答辨云雖逢怨害親若柔和故名耐怨忍也經言常好坐禪得諸深定者疏主解云得深定經言精進勇猛者疏解勤也經言攝諸善法利根智慧等者疏解攝善法皆為利他也言結已趣道場等者道場有二一者是有為二是無為真法身名道場二化身名道場也言覺樹自榮者身中四智菩提種子生起名覺樹自榮金云持經之人覺心生起如樹敷榮如身坐樹下也言七行者在處等者持經之人若行若坐之處便起塔如佛之塔殷重供養言初一頌標指前三者牟云即是標指長行解持讀念益七段中初三段一行者功德無過能生種智二行者為見報身淨土三行者即為頂戴於佛長行後四段文下偈中廣述唯此一頌標指初前三段略述其意故云標指也言則為起僧坊等者經言若能持此經等者香似牛頭因以為名比州有山山有此香因名牛頭山修羅與天鬪時天所傷取香塗瘡即愈也言頌前第五等者經言須曼香者安國云此翻善攝意華其色黃白甚香不作大樹才高三四尺垂似蓋經言薝蔔香者正言瞻博迦此云黃華樹樹形高大華小而香亦言金色華西域多此樹經言阿提因多伽者舊經云思夷華熏麻押油燃燈此華香故其油亦香言第六兼行六度者經言況復持此經兼布施持戒等並是䇿勤三乘正是精進也言第七在處者五頌分四段也言一頌佛遊處者持經之人住處諸佛必從子若行時母必隨後前經言空處讀誦經皆得見我身也證獲階降也流通第九疏徹隨喜功德品言一者七品學行等者安樂一品所行行後六品明能行人能行人中分四初涌出品正是能行行人二壽量品分別品因釋前疑展轉生起三隨喜品法師功德品當第三段傍正修行功德多少今明傍修行故此品來言三者論云法力等者一證二信三供養四聞法五讀誦持說前已明三此為第四聞法問何名聞法答由從他聞能生隨喜故名聞法言釋名者晉本名勸助品也言隨所聞思等者紀國云隨喜有二一自聞生隨喜生聞慧因聞慧生思慧因思慧生修慧因修慧生證智此四即以隨喜為本故隨喜品也言又二俱是等者能隨喜乃能勸二俱是隨喜合為一名也言又二俱是經言為得幾所福為字為本音為由當也言一明初者問四衆外誰是智者答但能隨喜即是智者聞是經隨喜已此為第一隨喜人也言次明往處等者經言從法會出等者此上說第一親從法會聞經之人從法會出向餘處為餘人說言後明展轉益者經言是諸人等聞已等者餘人聞已生隨喜心如是展轉說如是展轉至第五十古人配五十人取地前四十心并十地菩薩為五十人第十地菩薩他受用佛邊為第一聞法人十信初心為第五十人今疏中意只是從第一聞法人至第五十人最初第一人聞法人功德多不得挍量餘四十九人就四十九人前四十八人能說能聽亦校量不得唯挍量最後第五十人言下校量境者有二一器世間多若四百四百箇萬四百億箇阿僧祇世界二有情世間多六趣四生云云言一別示有五等者一六趣謂地獄云云二四生胎卵濕化三形類若有形無形等者欲色二界若無形是無色界四想殊者有想是欲色二界并下三無色也無想無想天也非有想非無想者是非想天想也五足異者無足是蛇二足鴉鵲及等者四足牛馬等也多足百足類也言此等義門者指第二疏有五趣章門也經言如是等在衆生數者此上二句結也前來不科出經文此重指經言一一衆生與滿閻浮金者此意有二一者閻浮提者者金世界世界名閻浮金從世界得名名閻浮金金不必是閻浮金第二解漏世界盡是閻浮金也章敬云雖有此閻浮金然非經意經意但說滿閻浮提金及種七寶樂具誰言金名閻浮耶與滿之言應成無用也經言閻浮提者此北岸水下有金向上有樹名閻樹浮舊云閻浮新云瞻部金提樹以立名名閻浮金世界從樹得名名閻浮世界但是樹名閻浮金與世界從樹為名也經言是大施主等者解布施年歲言初起念等者經言然此衆生皆已衰老年過八十等等者問如無色界無形又𧋑吐不知春秋蜉蝣朝生暮死者如何言皆已衰老年過八十豈得言一一衆生滿八十年也答今餘人已外餘類雖無本年八十髮白面皺然臨死之時皆有衰老相現現同人類年過八十髮白面皺老人也且舉人勝者也說者言正以為問者經言於汝意云何是大施主者施主二一財施主二法施主下經言我今分明語汝不是方便說隨宜說不是言雖在即意在別時故云分明語汝也言如校量梵音等者金云如經說三千大千世界所有衆生福德果報不如如來一毛孔功德又八萬四千諸毛孔中功德不如八十種好中一好功德又八十種好中功德不如三十二相中一相功德三十二相功德中百分千分萬分功德不如一梵音聲相功德如來音聲衆生聞之依教修行皆得作佛廣利衆生意言以披一頌隨喜之人決定作佛勝前財施法施功德猶如佛身上梵音聲相勝餘功德攝云三千界果子不如一如意樹亦十方瑩光不如一箇日大千野馬不及一師子也言此初也者初總明初人隨喜功德勝前無比經言阿逸多如是第五十人展轉至不可得比者校量最初第一人是所校量向後四十九人是能校量前唱唯取能校量最初一人功德也言聽聞隨喜果及第三勸聽果者經言又阿逸多若人為是經故至之處者問前來第五十人隨喜功德無量無邊何故此唱親聞經唯感象馬車乘功德却少耶答此唱唯說住僧房勸坐功德未說聞經隨喜功德也言亦得六通等者意言住僧房及分坐功德不唯得象馬車乘等物亦得六通金剛寶座也言此據世等者問疏言六通金剛座經中何故不說答疏言此據世等所以不說金剛寶座也問何故一種聞經得象馬車乘及天宮勝劣不同答此輩人自性來聽有三品心下品心得象車乘為人中大富中品心得珍寶輦輿為國王大臣上品心得乘天宮謂淨土生天法華經是運戴義運戴一切衆生經也聽者常滅足不履地象馬車乘果運載此身也此是住僧房相似果也問何故得釋梵輪王座處答此有三品心下品心得輪王座處中品心得帝釋座處上品心得梵王座處此三人並得為王若不為王無由得其座處並是分座果也緣此經是尊貴之經分座聽者常感釋梵輪王果報也問經文何故不說臥聽答病許臥聽此臥病也言此初也者初明得好知友也經言得與陀羅尼共一處者此上輩人兼勤勸他聽法有三品心下品心得前菩薩共生一處中品心得利根智慧上品心得百千萬世終不瘖啞等前行經言語餘人言有經名法華可共往聽者有說是所受勸人功德非也但是能勸人所得功德若是受勸人功德不可說盡也若見有持經之人傍生輕毀得妄失句逗果若勸人聽經得與陀羅尼菩薩為善友也第三地菩薩證勝流真如斷暗鈍障紀國云攝論說三地菩薩得大法光明聞持陀羅尼以為依止能勸人功德言利根智慧者此一句是慧也餘皆是福也言一聲相者終不瘖啞瘖總絶聲啞作聲也言百千萬世者通下諸句也言二舌者常無病即也言口無病者謂齦腭等無病言不差者不重生也褰者上脣舉也縮者不脣短也言或莤者春秋云苞茅不入王祭闕供無以莤酒祭庿之時以茅褰器口以酒瀝之酒入草中銷盡似鬼神喫却更不到地故此草名莤也言粗者厚也瀝摻合反疹居忍反唇瘡也緊居忍反急也三蒼云風腫也言從初有緊者慢也非瘡軫名軫亦云皮外小起作疹名軫也言口不唱者口不戾也喎者偏也言苦蛙反蛙音章敬云蛙苽苽音戶華反亦通亦不喎邪作快字平聲黑黯色凹於甲反邪下也與押同有本作窑字正合字言衆相有六者唇舌牙齒悉皆嚴好二鼻修高直三面貌圓滿四眉高而長五額廣平正六人相具足言五舉劣成勝者已上盡是能勸人功德也汝且觀是勸於一人令住聽法功德如是此舉劣也何況一心說讀誦下成勝也能勸聽底人功德劣所受教修行功德因人勸方有能聽舉劣人功德成勝功德也謨云頌文合向世尊答中分出今至成第一人處科偈文此是科文隱顯難了也言初八頌傍人隨喜者長行有傍正科也長行明第五十人傍隨喜不分段數以經文略故言此初有三者今頌文不述長行彌勒答文且初二頌標者總初隨喜人次五頌校量隨喜功德後一結成第五十人功德言有二者初一行總明初人隨喜言五頌受教等者初二頌標說後三頌正陳正陳中分三初五句述前口相次四句述衆相衆相中最後二句述前面相也指面相經文後三句品述口相也不述長行福中不瘖啞不䐔䏲不曲戾聲鼻二相也長行口相有五一氣經言口氣不臰頌中後三句是口氣無臰穢優鉢華之香常從其口出二舌常無病頌云舌不乾黑短長行三齦腭等無病經云口亦無病頌云世世無口患長行齒無六惡者不垢黑不黃不疏亦不缺落不差不曲頌中唯有初三齒不疏黃黑長行中脣無十惡者脣不下垂亦不褰縮不粗澀不瘡緊亦不缺壞亦不喎邪不厚不大亦不梨黑無諸可惡頌中唯有脣不厚褰缺一句一句中有四不厚不褰縮不缺落乃至無有可惡相一句結也長行鼻修高直面貌圓滿額廣平正三相也頌四中句述鼻高修且直額廣而平正面目悉端嚴為人所喜見頌中為人所喜見一句述長行無有一切不可喜相法師功德品言明傍人等者前隨喜品傍行了今此法師功德品即是正行故此品來意言下二等者即是法師功德品常不輕品也第二來意望後不輕品為來意言初品總明者法師功德品總明福果多小不分別功德之人故名總明也言後品引己證成者即是釋迦過去為常不輕菩薩持經親得如是功德此品唯能行行人法師功德非所行法法師功德今即是初故此品來言三者論解法力有五等者一證二信三供養四聞法五讀誦持說言釋名者晉經云嘆法師品可謂嘆其功德也此品明能法師之功德故以為名也言何故前法師等者問何故法師品佛告藥王不告觀音經言爾時世尊因藥王菩薩告八萬大士藥王汝見是大衆中無量諸天等何故寶塔天授品告諸菩薩及天人四衆不告八部耶據寶塔品初無告四衆經文至下慕衆說經中以大音聲普告四衆等是天授品初云爾時佛告諸菩薩及天人四衆等何故安樂行品獨告文殊彌勒等耶佛告文殊師利若菩薩摩訶薩於後惡世欲說是經當安住四法何故如來壽量等三品獨告彌勒不告餘菩薩耶若論壽量品初亦無獨告經文爾時佛告諸菩薩及一切大衆諸善男子故知無文也何故此品告常精進不告文殊普賢等言寶塔法證等者路云塔是色法也名法證此亦非也但是塔踊證教塔開證理證教法理故名法證也天授勸示衆人即是教化海會菩薩非口所宣等顯己重法千歲為床故名人證故總告之也壽量品獨告彌勒者以彼慈氏只於此界次補如來餘人無此利益所以不告餘人唯告彌勒言自非位等者只更斷一個所知障便成佛名位齊也智階者鄰次義也言何由識真化者已上諸句便目壽量品察道德之圓證雙結分別隨喜品也言此之一品亦合告之等者名亦與持經相應行亦與持經相應偏告常精進也言行五法師者即五法師也一持二讀三誦四說五書寫也言初三易者一即供養施他聽聞言後二等者謂思惟修習也舉中間五種例餘難易總名法師言此顯所得功德多少者化度科為二番第一番明功德多少第二番明得人位次經云已是功德下且初番中總有六釋釋中分二初之二釋敘古師不正義後之四釋疏主敘今正義初敘古師不正義二釋之中各有二相初皆敘古後便略非二釋皆爾言古有二釋者章敬云初解出自注經後解嘉祥紀國也言一云十善為本者謂不煞不盜不邪淫不妄語不惡口不兩舌不綺語不貪不嗔不邪見一善為頭餘九善助餘丸為頭善助亦爾每一善為頭所資餘九為能資十善一一為頭能資所資合說故有一百即此百善自作之時一百教他人作時有一百讚嘆所受持法有一百所以疏云讚嘆法勝亦云讚勵也又於能行十行人向上慶慰亦助喜亦名隨喜也所以疏云讚行十善者此助喜心興所行行人功德力齊盛一百功德更無勝劣如是合成四百此四各有上品中品下品成千二百據六根總合有千二百其中耳根聽聞勝舌根談說勝意根思惟法義勝此三根修行作用勝成千二百餘眼鼻身三根劣故無上品有中下二品但有八百也云云言若依十善等者意云諸經亦說十善行對六根說亦應如是何獨此耶言六根各具百福者即是嘉祥紀國經云百福相莊嚴藥王品云百福莊嚴臂則知六根皆具百福一一福中皆有十善莊嚴等問何名百福答百福即是百果也能感因即是十善一善為頭餘九善助十善更互為頭計成一百箇善問百福與百善何別答能感所感因果別故因嚴於果理不相違問如何成於千答古師云又將一百箇果為頭一一果中有十善行助能資所資合成一千六根各一千合成六千三根勝故各增二百三根劣故各減二百也言舌解引正法華等者第二義中分二初破增減後破莊嚴且破增減者古師依正法華莊嚴論六根各一千眼鼻身三併與二百也言其數何也者意言耳舌意三三根勝故減他眼鼻身三三今劣根向上各減二百當減之時併與何者二百為取眼根上二百為取鼻根上二百為取身根上二百為與舌根為復與耳根為與意根二百其數何也又眼等六根各一千不殺等十中併與何者二百為併不殺中二百為併不盜中二百為併餘善中二百其數何也上破增減了言又百福等者約十善業道說如造不殺業時將心離殺為一次起勸道思為二次起讚美思為三次起隨喜思為四次起回向思為五一個善業道有五十思十善業道計成五十思每修一相時先起五十思淨其身器次起一思牽引後五十思圓滿合成百福古人意說以此百福一一福中各有十善莊嚴合成一千六根計六千三根勝故各增三百三根劣故各減二百疏主破百福是果早是過去十善因所招又說十善因却莊嚴百福果意言百福身體是百行因之所感從因名百也今以因助果未見所由未見却將因却助於果所由也未見因由也破古第解二了言今正解等者疏主自為四解也言不得將莊嚴等者意言莊嚴論六根各一千功德今此經三根勝故成千二百三根劣故有八百六根功德多少勝劣不同故云不得將莊嚴論例同此經也今依隨經魏論數圓也今為四解也言一者於此經中修十法行者一行為頭餘九個法行助假如受持時為受持故書寫為受持故聽聞為受持故思惟修習一行為頭餘九皆准此說各互為頭相資成百行自作一百教他一百讚勵一百慶慰一百合成四百各有上中下品成一千二百耳舌意三根勝故具足三品成一千二百眼鼻身三根劣故無上品只有八百也言二者因於此經等者第二解也當經十法行一一法行之中將十業道資助只如受持之時便能不殺受持時便能不盜乃至受持時便能不邪見如是十法行中一一為頭皆十善助十法行總為頭便有百善業助此解所資十法行能資便有百善業道能所相兼據實合是百十十今但總說一百也自作一百教他一百讚慶慰一百有上中下三品三根勝故各增二百三根劣故各減二百也言此經勝問依餘經亦有十法行十善資助亦成六千何唯此經耶答疏言此經勝故等言此文略故者問此經若具十法行又將十善助則成百行既經文只有五法師如何成百行後成一千法行耶答疏言此等意言經據總數說十法行資成千二百但是譯家文略也言又依此等者次下二解依五法師解也言一一此法師者此依五法行一一法行為頭皆有十善資助五個法行為頭各十善助計成五十又自作教他各五十讚勵五十慶慰五十合成二百六根之中每各二百眼鼻身三劣故只有二百耳舌意三三根勝故各將二百功德助眼等三根且如耳舌意各將二百助眼根有六百并本二百計成眼根上八百功德又三根各將二百助鼻根計成六百并鼻根本二百成鼻根八百功德又三根各將二百助彼身根計成六百并身根二百成身根八百功德言自類不相助者鈍根之流類眼鼻身三互不相助各守本分二百也問如眼鼻二要假依身根方能有用何非相助答雖身相望有力望修十法行即不相助也不相助也不同彼三問此為約根助為約行助為約如無身根眼等亦無即名眼助如因披讀方能書寫方能披讀即眼身二望於修行並有相助約何名劣答自利行中聞法為先故說耳勝既聞法已利他行中說法為先故先舌勝通自他利通十行中意即為勝故說六中此三為勝若互相助隨無隨有此義可齊如聽聞時不假眼等今望總修十行不如耳等三根故分勝劣劣根自不相助也言耳舌意勝故等者解三箇勝根也耳舌意三是勝根故故互為能引互為所引自勝根類得相助故且如耳根為頭有力能招引三箇劣根各將二百助耳計成六百也耳根自二百計八百舌根意根各將二百助耳根計一千二百乃至舌根意根為頭餘根資助亦爾問如何是劣根助勝相狀答如耳聽時眼見經文鼻根通利身能往聽舌能演說意為分別如是名助也問何故前劣根不相助今寧助耶答只為是劣但能助他更不自助猶如僕使但是事他非自相事也言不可虗分者諸抄指此兩句疏作第四解非指前文意言千二百及八百先無誠文但類相當道理如此作如此作如是配故言不可虗分也言經云以是等者化度云經論雙標也以經言六根功德可以引經先標後廣解也言論云諸凡夫等者引論標也即是論主第一解肉眼見三千界在加行位凡夫未入初地但是經力根有勝用不是無用也言論云即法華論也言諸凡夫者簡聖人以經力故簡諸根互用也由持經法威德力故言得勝根用緣三千大千世界境即是經云父母所生清淨肉眼見於三千大千世界也問疏主爭知是凡夫不是聖人耶答若是初地菩薩見一百三千大千世界今唯見一三千界又准經是凡夫父母所生肉眼故知是凡夫也言有解在於等者古解也紀國云據此經文道理上不是初地下不是十信即是十住十行十回向非於十信者持經力弱故不取之也言以其肉眼見大千故出所以也言解脫分位未能如是者破古師簡前古人四十心也言解脫分位見一等准知解脫分位只見四洲之化佛不合見大千世界化佛聖教只說四加行位見大千界大化佛誰說見邪問若至四善根位任運見大千境何用開經力答謨云有三解一者本來在資糧位由持經力至加行位見大千界意言未有不持經者未至故二者本來雖見而不明利由持經力見得明利三者昔未持經時雖見三千界不得清淨六根未獲六千功德由持經力得見大千及獲清淨六根六千功德也今詳疏意內眼見大千本見位若未持經即不見也問四加行位為復定中見散心見耶答但是法威德力散心便見問真是天眼見耶答見大千界時雖不是天眼與天眼力齊也言不爾一化佛等者意言大千化佛若非加行位見更是誰見也言論云又六等者標也論云即法華論也又六根清淨等者於一一根中使能見色聞聲𭊴香嘗味且如色境是眼見之境鼻根能知乃至說法是意家境鼻根能知故正是根互用也言如釋提等者疏主依法華論引諸根互用經文未證成互用義也色應眼見鼻能知故言乃至說法故等者下偈云菩薩志堅固坐禪若讀經或為人說法聞香悉能知在在方世尊一切所恭敬愍衆而說法聞香悉能知言此是智境等者辨云謂第六識相應之智說法應智知鼻根能知故上經論標也言此有二義者二因論生論此初中疏帶兩勢初解不許地前有互用義以論言得自在故後解即約根本互用地前即無加行論地前亦得也言一云諸根等者意言諸根互用唯在地上不在地前言唯識等云等者問准何聖教答疏言唯識等謨云自在有三位一如來果位二八地已上三初地已去於淨土中作神通等事亦名自在亦得互用也言一根發識緣一切境者安國云二說一者自眼根發自眼識通緣五境二者依自眼根通發五識通緣五種境餘根相例亦爾自解云前義雖通理稍局也後義為正問何名一根發識緣一切境答只如眼根取色境之時第六意識向眼門中取境眼發意識緣一切境眼隨意取香味觸等境若爾但是意識緣自家境何名一根發識緣一切境答雖是意識緣由隨五根發識方緣一切境問尋常意識五根門中取境何不名互用答尋常只是向眼根門中取色境耳根門中取聲境不名互用也所以疏第一解云諸根互用唯在地上也若約所見大千境量通在地前凡夫所見即是經力加被不是互用也言其前所說等者指前經云父母所生眼耳見聞三千界等是地前加行位也若是初地已上見百世界非一三千界也言又初地已上等者第二解也互用及見大千界俱在地上據實地一實見一百三千世界今向百世界中且說見一大千界也言二者諸根互用等者第二解諸根互用及見大千界在地前亦名互用唯識等說唯在十地者約任運得若加行力分得分得地前亦得言故此論本等者即法華論雙結也結前第二解許地前凡夫小分得諸根互用言前凡夫位等者結前第二解地前凡夫得根勝用見大千界言今初地上等者結前第一解初地已上得諸根互用不許地前凡夫亦得互用也言一肉眼非通者經既言見三千界者問何故爾耶答智論云三千界外有風輪故違於凡夫肉眼不得見也又云有漏力用至此經言彌樓者此云光明山即十寶山之通號常有光明故以為名也言小教說等者羅漢人取境任運見小千界作意見中千界辟支佛任運見中千界作意見大千界安國云阿那律一人與辟支迦緣境齊任運見中千作意見大千初地菩薩任運見百千界若作意時能見無邊若二乘緣過未各知八萬初地菩薩過未唯知百劫言今說持經力等者今顯凡夫持經見大千界與二乘等言六根功德等者問何故六根功經多少不同所緣境界大千無別耶牒來答疏言修因勝劣等意言修因之時耳舌意三受持力勝得果之時三千功德也其眼鼻身受持力劣得果之時只有八百由因有勝劣果德不同也識用不差所取境界大千咸等緣大千之識用不差也言又德是內成者謂六根功德也言因由增減者因劣故功德只有八百因勝故功德有千二百也因勝果勝因劣果劣也外境俱是一化佛境外取境同故大千減等外境不可減也由三綱庫子等也言只如二乘等者若傍緣現在境聲聞見二千世界緣覺見三千多少不同約處世界也若將宿命智緣過去天眼通緣未來過未皆知八萬約時也言又如初地等者意言菩薩宿命劣二乘二乘天眼劣菩薩不可一例今者三根功德劣取境即多也相國云引瑜伽三十五云聲聞但以二千世界及有情界為神通境獨覺但以三千世界為神通境何以故由彼唯為調伏一身而修正行非諸有情是故最極以一界為神通境然約聲聞根性劣者故知二千於此別修功德勝者亦知三千如阿那律等言七類者經言其中內外種種語言音聲者標下經言以要言之三千大千世界中等結勝言雜類聲者問何名雜類聲聞答不是相對辨故名雜類也言十二六對聲者男對女水對火是言無驗呪術者安國云先修呪術雖無驗今至勝解行位悉皆有驗謨云疏引此文意在加行位菩薩勝非資糧位故知勝根唯在加行即證互用全在此勝解位言凡夫上位者以十信攝入十住四加行位攝入十回向今言上位攝十回向正取四加行四加行在十回向中故言上位十住十行名中下中下不取也經言常耳者非是不生不滅常但是尋常之常也經言不壞耳根注經云凡夫諸根不能並用眼根緣色之時耳不聞聲耳聞聲時眼不緣色約一時起用不得名壞今持經法師一時起用名不壞也又緣境雜亂名壞今是合中知境雜中緣時名壞今持經法師設雜亂緣境亦不壞也經言迦陵頻伽者膺法師云迦陵者云好頻伽云聲即好聲鳥亦云妙音鳥經言命命者梵云耆婆身此云命命即共命鳥也本行五十九說佛與天授往昔作共命鳥各為一頭經云其諸梵天上者即初禪也光音及遍淨二禪三禪也乃至有頂天第四禪色究竟天不是非想天名有頂也問尋伺語加行二禪已無如何經說有語言聲耶答安國云二禪已離尋伺染名無尋伺非無種子現行名無尋伺尋伺既有發語何好也經言撰集解其義者解音胡買反言十方世界中禽獸鳴相呼者只取四天下中十方十方中只取四天下不取大千為十方又縱得三千是凡夫耳聞若約佛及菩薩則得十方亦不相違也言一德量等者經言復次常精進等者問何故前眼耳二根則言父母所生眼父母所生耳後鼻舌身意四根不說父母所生耶答緣天眼通天耳通於眼耳二根上立若不言父母所生恐濫持經功德將謂是天眼天耳通也餘四根不立通故不說也二云顯是欲界根從父母生簡上二界也又初二根是雜中取境後四根合中取境舉離中攝合中問諸天不從父母生如何經言父母所生答六欲天從天男天女膝上化生依所化所亦名父母生也次解鼻根功德者問論中說見聞覺知者見聞配離中眼耳二根也覺知配餘四根也鼻根只合名覺知今言聞三千世界香何意答若約業力說鼻根唯合中取境不通離也今約持經法威德力說六根總通離合也二者若約凡夫自位說鼻根緣香不緣聲不合名聞今依諸根互用說亦得名聞問經言上下內外如何答色界名上欲界名下也又有情名內器世界名外又就有情中身內功德名內身外無衣服名外也言上下既遠等者疏主設難詞也言若根遙知等者若香在彼處根不就彼處云若能遙知得者此壞根不壞境也壞是雜亂失壞之義非損壞義也謨云法相所談鼻根乃是合中取境令若遠取如是離中知境即是壞亂鼻根合中知義所以壞根不壞境性也二云若事須香境到來方始取得者豈一切香皆肯就根耶未必一一香就鼻根來也疏主設此雙難了言論云此是知等者引諸論通也言定智遙知者疏釋論文也此是第六意識相應心所別境中智智與第六心王向鼻根門中依鼻根緣上界香問既是意識與智知故即是智何故經言鼻根取香境耶答智依鼻根方取香境就所依說名鼻根聞也其實鼻根只緣得合中知境不能取上界香上界香亦不就鼻根來但是意識相應之智遙聞也所以疏云非鼻實能離中取境又諸根互用鼻根取境難尚自取得況依眼耳離根之智不取大千香耶問何要將諸根互用義解答疏主以下地根緣上地香顯諸根互用義也言又諸根互用鼻等者金云諸根互用一根發識緣一切境五根發五識尚自緣一切境況是五識同時之意相應之智不能取大千香境耶非鼻根自體而取也問既明鼻根取境分齊而即合疏言況依此鼻同時意智不取大千耶何故乃言眼耳智耶答此互影彰也或何欲成眼耳之意故結況鼻俱意識智不取大千香耶問若由經力鼻能取諸境者為發自識見色為發眼識見色答發自識若爾但是識互用何者名根互用耶又復根識何名同境答根同於識而互用故根為主故獨得根名若爾於根得自在一根取六根亦可於識得自在一識依六根若境界生識易一根同六境發識是主義所以生自識此不依一根發多識義者依一根發一識也又云然根五義勝餘色等言得假等問香是合中知境如何離中取得耶答疏言得假似香等問何不取實香而取假香耶答若許離中而取香實體者壞境性義故所以但得假似香即不壞境性義攝問云諸聖教不見說香有假云何言得假似香是假耶答五十四云風行空中無俱生香唯有假似香如風過拂樹華等香逐風而過由因華等風有香故名假似香不得根本香之自體名假似香安國云離質香也亦云孤遊香三十云據實香氣合中方知離中取者得假似香非實香體若得離中實香者即壞境性意說若取實香香性即壞由如僧人著衫即壞僧儀假香即不壞如俗作戲者僧衣也經言須曼那亦云末那此云意即好意華亦云妙意經言闍提新云金錢華經言末利者此云鬘華堪作鬘故經言瞻蔔華者正云瞻博迦此云黃華小而香南海郡有藂生經云波羅羅者此云重生華經言旃檀香者摩羅耶山出旃檀香名曰牛頭若以塗身火不能燒阿那婆達多池邊有沈水香丸如麻子燒一丸普薰閻浮提衆生聞者離一切苦經言多摩羅等香者此云無垢賢亦云藿萊香經言多伽羅香者亦云多伽樓智論翻云木香樹經言波利質多罹此云圓成樹華也亦云護種種香經言狗陀羅樹香者此云大遊戲樹亦云圓生樹香也樹高五百由旬香氣逆風五十由旬順風百踰繕那即忉利天大集樹也經言在勝上者問何名勝殿答帝釋與修羅戰時勝者升此殿此殿威德如盛夏日一切天人無能久視經言諸天所燒之香等者問何名諸天所燒之香答善法堂中有香名淨莊嚴若燒一丸香使諸天心皆念佛夜摩天中有香若燒一丸天衆雲集兜率天中有香若燒一丸於一生所繫菩薩前興大香雲覆法界普雨一切諸供養具經言諸佛身香者上經文言身出妙香遍十方國衆生蒙薰喜不自勝言色界云何等者問欲界有段食可言有香色界無段食如何說有香答疏言此通果香非業果香也言華嚴經等者問此經只說欲色二界有香者何故華嚴經說無色界宮殿香耶答此據依形法華經也彼據似形華嚴經也且法華經依形者依託舊身形形者形質即是色界實身名為依形依此舊身形上變起香境等持經之者方可聞故名依形香也言彼據似者依華嚴經似形者無色界無本質實身形也依定力新新變起扶塵五根五根依處雖有五根形作從無用故言似也所變身形及宮殿等雖皆有香故名假似香也所以法華經約依形香則勝也華嚴約似形香則劣也言然瑜伽等者問何聖教說無色界有似形香答疏言然瑜伽等只有顯色等相無實本質也言以彼香等因闕者下有兩重因會無色界無實色用無實香有假以香生因有二一者無香味種子名生因闕也二者無加行心作香味觸此心既無名生因闕言又無用故者問何名無用答無色界人不喫段食若喫段食事須得香味觸三資益既不喫段食不要香味觸故名無用設使聖人加行心變得亦無用處故無用也金云無力用故名無用由境上無香味令能緣心亦不能變名無用也此約能緣心說也二云由所緣境上無香味力用不能牽生能緣心變起香味此約所緣境上說無用也言依託色界等者雙釋生因無用也且別釋若依託色界中色種子為本質變起定果色即無香味以地法無故若依欲界中色種子為本質變起定果色即有香味地法有故上別解無用了言又加行心劣等者別解生因有二一者種子名生因二加行心加行心名生因也加行心劣便名生因闕也因強即有也因劣則無無色界變得香味因劣則變不得上依地科簡了言菩薩有二乘無等者依人料簡也問若二乘無應非聖人答二乘中廣慧聲聞有餘人無也言二乘無非廣慧者無也言佛弟子者聖有凡夫無也聖中菩薩廣慧聲聞有餘者無也佛菩薩有者菩薩依無色界亦變得香味也言然瑜伽云等者即通五塵等並能變也意成前說似彼香等於色味皆能變也經言地中衆伏藏者案成實論云金銀無香金剛無味如何伏藏珍寶有香答小乘根鈍不知此經是大乘豈同小乘耶又宗計不同不爾云何八塵共成也經言雖未得菩薩無漏法生鼻者問設入初地豈鼻根是無漏耶答元來是有漏故簡要云從無漏法引生亦名無漏法生也不言所生鼻根名無漏也長行經云得清淨鼻根者非是鼻根體亦無漏約聖位菩薩依無漏法引起鼻根作用名無漏法生生由起也不是親生也攝云許因五識得無漏者正同此文經言得千二百舌功德此量也經言若好若醜若美若不美者此正是清淨舌根向上用故名根用也清淨舌根正取嘗味為用也眼所見舌者扶塵舌根此與清淨舌根作依處也言此無境量何故等者此後二根不同餘根闕於舌根嘗三千大千世界上下諸味也問何故舌根不能嘗知三千界味既不能知三界味應不具千二百功德答疏言舌根應亦得等疏中有三意一云亦何許嘗三界味也由此舌根正以說法為功德不以嘗味為功用長行及頌貪說說法功能恐文煩多略却嘗味功德不說也言香離質而等者第二意色香離質而有味離質則無既無離質味故不說嘗三千界味也言經中亦說等者第三意佛則有餘人則無也經中亦說者則是十住斷結經六云如來眼通不可思議如來耳通無能限量如來鼻通倍不可計如來舌通廣無邊際故言佛有鼻舌通過於眼耳安國云且約一乘說眼耳法立通餘四根不立若依大乘及佛果位五根皆立通並能離中取境也言舌具用者即器具扶塵舌根是說法器具將舌具用簡不是舌根用也經言諸佛皆向其處說法者問諸佛何舌說法答諸佛有常向不背相此人見佛所以常向人與此人說法也言二頌頌多衆等者經言是說法之人若欲以妙音遍滿三千界隨意即能至者正是聲遍三千舌具用也言一頌賢聖者經言梵天王魔王等者章敬云梵天王魔王何名賢聖答梵天王等亦不妨賢聖化作作魔王者多是不可思議解脫菩薩作也亦名賢聖經言上下好醜等者上界名上生下欲界名下生人天名好生三塗名醜或生身形端正名好也醜陋名醜經言悉於中現者問何故持經者身淨境現其中答大論云如密藏經中說如來法身住於一切衆生身中光影外現猶如淨綵褁摩尼珠無相障蔽色不礙空也又華嚴經云善財童子身現十方空不礙色也若一珠明徹衆像皆臨萬水澄波俱時自現問何故舌根不言別味又身根不言覺觸答舌有變味說法之身能有樂觀納境之用顯其別德不說常用也眼耳鼻意更無別能依本用也經言唯獨自明了等者身中色像持經者自家見餘人不見此亦總相說若上位人何妨見下位問自修十法行唯獨自明了教他修十法行餘人亦應知答自作自修行自身知是事餘人設隨教還成獨自知今解餘人之言簡於下位若加被亦能合是也經言雖未得無漏一行等者結也意言未得二空理法性身以清淨常體者不是無為法名常但是相續一期之常體也言無窮者問何名無窮答將一句一偈法一月四月為人說故名無窮若不是持經力爭得如此言且舉月時之分齊者舉四箇月影取更多時舉一日彰取更少時至多時至多時皆是說一句一偈也謨云西國法一年有三際時謂熱雨寒也從正月十六日至五月十五日四月為熱際時五月十六日至九月十五日雨際時從九月十六日至正月十五日寒際時也四箇月為一時名月分齊三時為一年名時分齊向月分齊中取一箇月時分齊中取一箇時故名舉月時之年也意言或多或少總能演說一句一偈等此方分為八時即月盈至滿是白分月虧至晦謂黑分白前黑後合為一月六月合為一行日遊在內北行也日遊在外南行也總此二行合為歲也西方黑前白後隨方不同也經言心之所行等者心是能緣心也所行是所緣境也能緣心取所緣境名心所行也所以云心所取境界也心所動作用者三性行相善性不善性無記性也言或身語意者心之所行配身業心是能行身業是所行也心動作配語業心是能動作語業是所動作也心所戲論意業也戲論即言說分別也法為所分別心為能分別故言心所分別也此句即諸引意也或意引諸識語是心所戲心為能戲故經言雖未得無漏智慧者初地初得無漏智慧能引意根也意言雖未得初地無漏意識相應之智能引意根第七亦成無漏然經所說皆據第六識若約六根合第七識顯故經言皆是先佛經中所說者持經之人思惟言說道理此是諸佛經教中即是先佛經中說也言恐文繁廣者只此意根中長行七段文頌中述五段故名別也若更勘諸根偈與長行差別不少恐文繁長不能一一分折也常不輕菩薩品言一者能學行人總有六品分為四段者涌出一品明現在行安樂行流通之人壽量品及分別品因釋前疑展轉生起隨喜及法師品助正依安樂行流通之人所得功德此常不輕品明佛自身往居因位行安樂行流通此經勸勉時會故此品來也言二者三品明未等者謂隨喜品并法師功德品常不輕品言為我常不輕者為字平聲呼也言初雖受苦等者經言得大勢彼時四衆比丘比丘尼優婆塞優婆夷以瞋恚意輕賤我故二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱畢是罪已復遇常不輕菩薩教化阿耨菩提損惱持經之人尚得佛道況親自持經豈不作佛耶言此明具因記者具理行二因也金云唯云具理性因也言釋名者正法華云常被輕慢品言觀他四衆具佛性因者理佛性行佛性也言勸他修行者意言恐言有佛性皆同自成故此勸也經言汝等但行菩薩道當得作佛有性者作佛無性不作佛也言三業恆時等者經言若比丘比丘尼至皆悉禮拜讚歌而作是言我深敬汝等不敢輕慢即是身業禮拜口業讚嘆意業不輕慢也言欲明經之威神等者顯此經有威力故又顯菩薩爾時得大神通力樂說辨力大善寂力故告大勢也言能令順行修者即不輕菩薩今得成佛經言若我於宿世不受持讀誦此經不能疾得阿耨菩提也言違經惡人亦能等者據論打罵持經之人令墮地獄具足一劫劫盡更生如是展轉至無數劫由經力不思議苦有盡期只千劫入地獄畢是罪已復遇常不輕菩薩也言答佛因彼說者正說菩薩勸勉衆人傍說佛故以彼常不輕菩薩是威音王佛時人所以兼說佛名字非正要也故以不輕為品名不以威音作品號也言此初也等者初牒前違順所生罪福以示衆人也經言若有惡口罵詈誹謗獲大罪報如前所說指譬喻品中其人命終入阿鼻獄具足一劫劫盡更生經言其所得功德如向所說者指法師功德品得六根功德也又謨云獲大罪報生下二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱也其所得功德即生下是比丘臨欲終時於虗空中具聞威音王佛先所說法華經二十千萬億偈悉能受持即得如上眼根清淨等言即此初也者惡人益勢也過去有佛名威音王如來入滅已後如是次第有二萬億佛皆同一號今取最初一箇佛入滅已後像法之中有增上慢比丘有大勢力所以疏云惡人益勢力也若佛正法中佛力增惡人無力今是像法佛法衰惡人力增也言善士增勤者菩薩名善士也增勤即是增道言菩薩比丘者顯是菩薩等者經言爾時有一菩薩比丘名常不輕顯是菩薩而兼比丘簡是比丘而非菩薩者或定姓聲聞二乘未發大心者是比丘不名菩薩不為持經求佛事皆非此行也應以四句分別一是菩薩不是比丘在家菩薩也二是比丘不是菩薩定姓聲聞三亦是比丘亦菩薩即常不輕也四非比丘非菩薩即外道經言得大勢以何因緣名常不輕等者釋名也言初不可怪是菩薩等者問菩薩比丘禮拜俗人如何不犯戒答疏言初不可怪等章敬云菩薩非比丘為初也比丘非菩薩為後若是菩薩非比丘禮拜俗人名初不可怪不犯戒故若是比丘非菩薩禮俗人名可怪後犯戒故初則不可怪後名可怪怪即驚怪以比丘禮俗人犯戒也言無畏德女等者問准何聖教菩薩比丘禮俗人不犯戒耶答疏言無畏德女等若令彼衆生起回向又令生長衆生善根禮則不犯若空是比丘非菩薩不為回向生長善根禮則是犯不禮却是不犯也言今作是禮者謂生長善根及令回向故不犯言又禮四衆等者獨禮一人或禮尼或女人便犯敬法身性不禮凡身言然有解言其此者意說不讀誦空行禮拜此解非也言故知不尊等者而是比丘不專讀誦經典不專行禮拜不專字向下轉言語加能忍者經言四衆之中等者語加加謂諸語業口業罵名語加身業打名身加也言第四身害能受者經言說是語時衆人或以杖等者問被打既走何名忍辱答俗書尚說父母打子少杖打來則受大杖打即須走恐一時間惡發打死陷父母不義之過菩薩亦爾男子女人即同父母所以走也問為復打了走未打時答打了何用走只是未打時走問菩薩被打打不著何名忍耶答只教打不著便是忍辱打不著尚自千劫入地獄況打著耶恐獲罪重所以避走恐不聞記所以高聲也言第五善名等者此正是四十心位不輕之號自此生焉所以經言以其常作是語故至輕也言勝果遂生此者勝果未生已前猶住資糧位由此向威音王佛像法之中說經為因臨命終時空聲教示為果若不修因果若不從何起一空聲教示億偈能持二六根清淨三增壽說法此三得名勝果遂生此在四加行位也言一聞法能持者經言是比丘臨欲終時至悉能受持者自家所受持經未必有二十千萬億偈臨終佛加被二十千萬億偈皆記憶問法華經七卷今二十千萬億偈何太多耶答小化答土中只有七卷不妨大化土中經文多也又下云如殑伽沙偈又六百萬億姟不妨多也經言具聞威音王佛等者問不輕菩薩既於最初威音王像法中出今言具聞者聞於何佛若言初佛初佛已滅若言後諸佛云何言先所說法華經答臨終但聞初威音王佛若爾初佛已滅前難寧通答佛實不滅何得言無故前經云空處讀誦經皆得見我身又尋經意於虗空中即不是不對佛聞也何妨聞彼最初佛之經名為先所說空聲教示即相應語業化也問准經所說壽量等云何加行見報佛一處見異言增壽說法者經言更增壽命二百等者問當時人壽多少今壽二百萬億那由他何太多耶答一是法威德力加被二者或是禪定力不折壽如一人合更經七日身死忽然入定三十二十年出定來更經七日便死也言已前禮拜等者問若是定力何關持經力答疏言已前四十心等意言資糧位命促延至加行位大化云命自長也或是劫初時大例命長亦不妨也言一惡人從化等者增壽也經言神通力者增益壽命也經言樂說辨力者受持億偈也將此億偈樂為他說故名辨力經言大善寂謂寂靜也言漸為諦觀等者所見安立非安立諦正是所觀非如二乘唯觀安立問何名四善根答一是聖道智火之前相故立以𤏙名二是尋伺位極復名為頂三是即境識空故名為忍四是異生經中此最勝故名世第一法牟云由前聞法漸觀理故作真如觀也言第八善土增道者善事轉多故名增道也言此二在凡四十心位者問前四衆罵打時早在四十心何故此間猶說四十心答前說四十心正在四十心位今言四十心者在加行位也問若是加行位如何見有四衆答見四衆是資糧位末第三十心法界回向也增壽即是欲入加行也又設使實是四衆加行位菩薩亦不妨有四衆見也只天親菩薩𤏙頂忍之高士何妨四衆見言由如此者由如此故遇佛說法由如此故遇佛受持言得六根常淨者問前來早得六根清淨此間有又六根清淨何別答今此間經言常眼清淨顯是變易身上六根得初地名常也前是加行位分段身上六根有間斷故入初地之名為常問前品云以此常耳聞三千世界聲又云以清淨常體一切於中現疏主宣判在加行位答彼言常者尋常之常今言常者不斷常常恆之常也言問菩薩理應住等者問菩薩理合出生入死教化衆生如何偏說遇佛答疏言菩薩理應住生死以化物所以疏言不遇諸佛者如破漏船等言不活畏者凡夫執身有我恐我斷絶故有不活畏菩薩不執身為我故無不活畏言惡名畏者菩薩不希求財利供養不畏惡名惡名是失利之本菩薩尚欲將錢物布施他人故顯不貪於利故由是不畏惡名所以菩薩示有妻子男女種種等事言死畏者凡夫執身有我恐我斷絶怕怖於死菩薩不爾故無死畏言惡道畏者菩薩作念言合眼便生十方淨土見佛聞法故無惡道畏言大衆威德畏者凡夫即自身於一切人有畏菩薩不爾尚不願與一切衆生齊等何況有勝故無大衆威德畏言佛無所畏等者一正等覺無畏二出苦道三鄣法四漏盡言菩薩無所畏者一總持無畏二知根無畏三答難無畏四斷疑無畏四中初一總持無畏即是經中為衆生說心無所畏餘三即是後無大衆威德畏中分出即是知根答難斷疑也問菩薩如何為大衆說無所畏耶答菩薩不見有衆多問難之人少許相故言離前五怖畏等者因即煩惱八地無漏現相續煩惱不行故說永離也謨云八地已去無漏恆行二乘不無故名不離也惡道畏死畏不善業及無慚愧為因惡名畏以貪為因不活畏威德畏我見為因問何不離四德也答六度六弊相治數齊八難四輪藥病非等但依道理何責數耶言初會初行惡行果者經言得大勢彼時四衆至受大苦惱等者問杖木瓦石為因千劫入地獄為果又受罪已復遇常不輕教化得菩提以何為因答最初見菩薩行不輕行一念心緣著菩薩所行之行及念心聞受記聲由未行輕毀只此一念淨心為因薰得種子落在第八識中經千劫在地獄中本來信心種子熟故方從地獄出後時復遇常不輕菩薩得成菩提今經中隱却昔時受記因但說後時遇常不輕得成菩提顯持經人功力毀罵尚得菩提況供養持經者也言會古今等者經言師子月等五百比丘為一句此舉比丘攝尼衆舉勝攝劣經言尼思佛等五百優婆塞攝優婆夷舉男攝女人此四衆具足也言問善現聲聞至利益者須菩提欲出乞食事須先依里巷觀後方出若人宜見行行則喜坐則嗔遂現行相乃至諸相亦爾方便令喜不教嗔也二乘雖證無諍理不能令他滅諍菩薩自證無諍理兼能令他無諍也婆沙云諍有三種一煩惱諍九十八使并十纏二薀諍所謂五薀三鬪諍謂諸有情互相凌辱言語相違無是三諍名為無諍今約第三義難言十九頌半頌後等者唯述長行後三段文不述第一牒前違順所生罪福以示衆人也言初一頌半頌所遇佛者長行第二段遇佛有三初標時節經言乃往古昔過無量無邊不可思議阿僧祇劫二所遇佛經言有佛名威音王如來應供等今偈云過去有佛號威音王等將即護也道由引也言違順者中分五等者三顯能行違順人相長行有八頌文述五初三頌述惡人益勢善士增勤長行惡人益勢經言最初威音王如來既已滅度正法滅後於像法中增上慢比丘有大勢力二善士增勤長行經言爾時有一菩薩比丘名常不輕得大勢以何因緣名常不輕是比丘凡有所見等今此三頌合述兩段經云是佛滅度云云言次一頌語加能忍身害能受者且語加能忍者長行語加能忍經言四衆之中有生嗔恚心不淨者惡口罵詈等今半頌述經云諸人聞已輕毀罵詈二身害能受者長行經言說是語時衆人或以杖木瓦石而打擲之等今半頌述云不輕菩薩能忍受之言次二頌勝果遂生者長行經言是比丘臨欲終時於虗空中具聞威音王佛先所說法華經二十千萬億偈悉能受持今偈述經云其罪畢已二行是長行經言入地獄受罪畢已說四衆今頌中言其罪畢已者說常不輕自身也與他人受記見者合喜以有罪故感得他人杖木瓦石打來是前前世罪合墮獄持經力故轉重令輕言次一頌惡人從化者長行經言於時增上慢四衆比丘比丘尼優婆塞優婆夷輕賤是人為作不輕名者見其得大神通力樂說辨力等今偈述云諸著法衆皆蒙菩薩下言後一頌半善士增道者長行經言命終之後得值二千億佛皆號日月燈明於其法中說是法華經今頌云不輕命終值無數佛云云言初半頌會身者長行經言得大勢於汝意云何爾時常不輕菩薩豈異人乎則我身是後會四衆者長行經言得大勢彼時四衆比丘比丘尼等於汝意云何爾時四衆常輕是菩薩者豈異人乎今頌中三頌半述云彼時不輕則我身是云云言結勸衆人除違等者長行經言得大勢當知是法華經大饒益諸菩薩摩訶薩能令至於阿耨菩提今頌述云我於前世勸是諸人六行等是禮衆勸勉如來神力品言三流通者即第三如來付授流通也言示相付囑等者神力品示相囑纍付屬藥王品等稟命行故言神力囑纍等者即是令諸大菩薩信如來所說令流行法華經名命行也言餘之六品等者神力囑纍示相付囑稟命行故承世尊命出生入死教化衆生名流通也言今此即初等者付屬法華經與前來涌出菩薩并八萬大士名付囑於他也言恐不生信等者問諸大菩薩時會等前來豈不早已生信要假更現神通耶答事須令驚異希奇之想信如來所說不虗方肯流通言方以言付者囑纍品身付此品言付也言勢與前同者與前來疏科三流通同也言有三種法門者一出廣長舌令憶念故二謦咳者說偈令聞故三彈指者令覺悟故問此中與樂品說無上何別答金云彼約所說法勝能詮無上此神力能說之人不虗即能所別也言釋名者晉言如來神足行品行即力之別名也如來二字通釋迦多寶向下亦同現神力化現不測謂之神能摧不信故名為力也言初標等者經言爾時千世界微塵等者即前涌出品云是諸菩薩聞釋迦牟尼佛所說音聲從下發來一一菩薩皆是大衆唱道之首各將六萬恆沙眷屬況將五萬乃至單己樂遠離行至所不能知問如何知有千世界微塵答云算數譬喻所不能知如來實知數若不爾者不成種智也經言一心合掌者身業請而白佛言下語業請所以者何下述心即是意業請也所以疏解不但欲以濟他兼希自行等言真謂真實者即顯非是假權之教淨者有三本新及無漏名淨影取善性名淨言一標現神力者經言一切衆前現大神力也言一為顯經勝德等者經言爾時佛告上行等菩薩大衆諸佛神力如是無量無邊不可思議等言二為說衆生等者經言諸佛救世者住於大神通為悅衆生故現無量神力一行言三見諸菩薩等者路云釋迦分身見佛滅後信心菩薩發願流通順諸佛心故現神力經言佛滅度後能持是經故諸佛皆歡喜現無量神力即是釋迦與分身佛見前來信心菩薩發願請持經能順佛心世尊歡喜所以現通也上標神力言今加為八者古德相傳有七神力科經不盡今加示現帖成八神力即疏生加一力也因釋迦放光他方衆生遙見靈山假釋迦神力他方遙見歸依故名示現也言六通之中者此是六通之中神境通也言謂化身化語等者第二能化之中有三一釋迦分身名化身二化語經言善男子汝往詣耆闍崛山釋迦牟尼佛所如我辭曰及空聲教示等三化境現寶樹及師子座水鳥樹等此皆無而忽有也言此謂十八變等者因疏中說變化所以此間解十八變也言熾燃者如妙莊嚴王淨藏淨眼身上出水身下出火言流布者序品放光過至遠照萬八千界也言示現者謂前來序品寶塔品妙音品中三處放光光中見六趣衆生及淨土事言轉變者即寶塔品中轉穢令淨也言往來者如目連往野馬世界如妙音菩薩從東方聽來往歸本國等是言七卷者如神力品合蓋帳成是卷須彌入芥子言八舒者又此品中出舌上至梵世展一毛充法界言九衆像入身者法師功德品中受持得八百身功如淨琉璃內外明徹一世界皆身中現言十同類往者如妙音觀音處處現同類身也言十一顯等者多寶如來從地涌出龍宮海會從海出來妙音菩薩涌現虗空等言十二隱者妙音於彼國沒如文殊問答了隱身東海言十三所作自在者謂寶塔品中移諸天人置於他土又序品天雨四華此品之中謦咳彈指此即如來所作自在也此寬也以變化勝故偏得自在言十四制他者如降魔是言十五能施辨才者如信解品偈云佛敕我等說最上道修習此者當得成佛又加被須菩提說大般若即經云我承佛教為大菩薩以諸因緣種種譬喻若干言詞言十六能施憶念者如佛令阿難即憶念過去無量千萬億諸佛法藏通達無礙法師品云若讀此經忘失句逗我還為說令得具足言十七能施安樂等者如提婆品云若有善男子善女人聞妙法華經提婆達多品淨心信敬不生疑惑者不墮地獄餓鬼畜生若生人天中受勝妙樂言十八放大光明者如序品化城品大通放光寶塔妙音及此品中放光等問第三流布第四示現第十八放光此之三變俱說放光明有何差別答但放光即無別放光徹照即第十八放光若至於他土從近至遠即是第三流布若於光中現所見之事即是第四示現也言或此及第四者或此即第三謦咳第四彈指是第十三所作自在也言第八通為一佛土者問前塔品中早說世界通為一佛國土如何此間又說世界通一答前塔品中言世界通為一佛國土者只說四百萬億那由他國土中無大海江河等名通為一佛國土也此神力品通一佛國土者說四百萬億那由他世界外也問爭得知耶答准下經言過此無量百千萬億阿僧祇世界有國名娑婆是中有佛號釋迦牟尼故知遠也言今佛出舌者論云者解當唱經文令持經菩薩憶念前來付囑一乘法信佛所說不虗也名為憶念也所以先現舌相憶念流行一乘故言如佛入婆羅門等者即智度論中證佛不妄語也佛在舍衛國坐夏訖於行次入一婆羅門城乞食國王不信便作制約若有與佛食者約輸五百金錢後佛到其國將阿難持鉢入城乞食城中衆人皆閇門不敢施食佛空鉢而出是時長者家有一老入便持瓦器盛臰𬖣汁出門異之見佛三十二相八十種好如此神人應食天厨今日遊行乞食必是慈悲憐愍一切思設供養更無能得今此弊食佛須者可取佛知其信心信敬清淨申手以鉢受其食佛時微笑出五五色光照徹天地告阿難言汝見此老女人信心施佛食否阿難答言見佛言此老女人施佛食故十五劫中天上人間受福快樂最後一身身為男子出家學道得碎支佛入無餘涅槃時有婆羅門在傍邊立而說偈言汝是日炙種剎利姓淨飯國王之太子而以食故大作妄語如此臰食報何重耶是時如來出舌上至髮際語婆羅門言汝教中頗有出舌至髮際是妄語人否婆羅門答言若人出舌能覆鼻者言無虗妄何況至髮際佛言汝見世所希有難見事否答言已見我曾共諸婆羅門道中行見一尼𤘽律陀樹其際遍布賈客五百量車蔭猶不盡佛言此樹種子大如芥子三分之一種子至小樹身極大此老女人信心施佛得大果報因小報大汝何不信是時舉城之人皆送五百金錢與王詣佛供養也言至梵世者問何故放光直至色究竟天乃至出舌何故只到梵世答出舌上至梵初禪有語表故向上無也放光照色究竟天者放光驚覺有緣破癡暗故言一一毛孔者表慈悲平等又表一乘寬備二義別談也言由多寶佛等者初塔為證後以身證證教證理二種別故經文唯有釋迦分身示現不說多寶示現由已證經了更不說也言愚者心迷者明時節經言滿百千歲然後還攝舌相者嘉祥問云何收舌不收光耶答表說法事訖故收舌相欲令十方通徹彼此相見故不收光也愚者心迷實經百千歲望衆生自心迷悟不同長時短時有別由佛神力改換其心總令不覺總交作短時解也言又報化之利者約一處見異只如靈山釋迦佛文殊普賢見報身實舒舌經百千歲二乘凡夫見化身出舌亦只是暫時言又佛現神力者佛神力實延百千歲以佛神力令衆生覺只謂將暫時也言然促不延者問既延亦是佛力令衆生不覺亦是神力說佛壽百千歲何也答疏言然促不延為論等問既見報佛化佛所聞法一種是法華經更無差別能聞之人則有經時長短不同淺深不同也意表淨土穢土之中說經是一般也言論云謦咳等者說偈此二字上句令聞故屬下句問何要聞聲答疏言既聞聲已如實修行也疏云謦咳者即不是正說偈時但是欲說偈時事須謦咳如人欲語先自謦咳也意言先謦咳驚覺令聞後說偈也問前來說偈何不謦咳答此之付囑不同於餘故不為例問後品令行何不謦咳答後品無偈故又以手摩彼自審聽故言一覩生欣者經言以佛神力故皆是此娑婆世界者十方雖遠以釋迦神力皆是娑婆世界也言空中高聲等者經言即時諸天亦是彼國之中十方諸天虗空中聲非此界聲也言第六合蓋成帳者即是和合如蓋即是寶帳遍覆如蓋蓋者覆蓋義言散華者散華中亦有香及瓔珞等也言合成蓋等者蓋覆一切此界衆生故辨云即是寶帳遍覆名蓋十方世界衆生各將金銀寶物從十方來到娑婆世界佛神力故集在一處變成寶帳蓋覆十方分身及釋迦佛上問何要變成寶蓋答表會二歸一也唯覆此界者表佛意偏為此界衆生塔品云誰能於此娑婆國土廣演此經也言世界通一者經言于時第七世界通一也表十方世界唯有一乘也言智心無礙淨土不殊者智心無礙即是悟解一乘之智而無疑礙所以世界通一言唯有一乘更無餘者唯有一乘無餘二乘故通為一言論唯解三者八種神變中餘經通有五種非勝故不釋也又此三種餘經皆無論家偏解又此三種正是付囑所以偏釋也後義為勝言餘通非正者餘五通餘經有光如上生涅槃動地如般若合蓋如維摩變土亦如維摩非此經中付囑處正要故不說之問此之變土與塔品何殊答彼三變共四百萬億那由他今此十方世界如一佛土唯四百等言一結前神力者經言爾時佛告上行等者等餘涌出上行即是四中上首也言二為囑纍說等者經言若我以是神力至盡者問若實盡者此言即虗若不盡者何成種智答約佛種智說無不盡但衆生不能盡受故不說也如手中葉也言一權實之道者且遂要言之如來一切所有之法不過權實法二神通之力者經言如來一切自在神力即化身化境三佛所藏理者經言如來一切祕要之藏法身也四智慧深事經言如來一切甚深之事報身也因果理事三身功德皆於此經中說也言四結成勸授者經言是故汝等於如來等如說修行者修行者修行二利也言應供養等者經言若經卷所住之處若人受持妙法蓮華經便是供養道場本來補設道場只為著經此人既諷念法華經名真道場真供養著之處名穀場著麥之處名麥場此經是如來成道之處名曰道場言法身妙理此中具者即清淨法界四智心品總名為法各有依止義名身故名法身對能詮教名妙理此中具故此中言指教也此上一句總言薀道處名道場此上總解道場言成道處得菩提處者名道場經言諸佛於此得阿耨三菩提言說法處者名道場即經云諸佛於此轉於法輪言涅槃現意者問現神力有何意答經云為悅衆生故現無量神力令信所說法言次二頌五神力者問何名五神力答一舌相至梵天二身放光三諸佛聲四彈指之聲五地皆六種動長行有八頌中唯五段略無後三也言此初也者二頌標無窮也長行經言若我以是神力於無量無邊百千萬億阿僧祇劫為屬纍故說此經功德猶不能盡今頌云屬纍是經故二行是言一頌半見佛者經言能持是經者則為已見我一行半是長行無偈文有也言二頌歡喜者經言能持是經者令我及分身等二行是言一頌得法者經言諸佛坐道場所得祕要法一行是言一頌半能說者經云能持是經者則諸法之義義無礙解名字二字法無礙解也及言詞三字詞無礙解樂說無窮盡一句辨才無礙解下二句經言如風於空中一切無障礙結也言二頌半利益者經言於如來滅後二行半是囑纍品言一依今時經品者即羅什所譯者前明神力品令信付屬了今明屬纍品摩頂令行付屬故此品來行音莖同言釋名者有說纍字淚音呼去音非也但是纍者重疊之義三摩菩薩頂名纍也上聲呼付託作囑付應作屬言為以一手摩等者問涌出菩薩數如河沙為以一手一時摩為以各一手摩答一手一時摩不前不後表佛神力故二云然諸菩薩各一手摩表佛妙用周遍故然諸菩薩各見獨摩者各見世尊摩當身不見摩諸菩薩也又一手者手如教令知唯一乘教故經言爾時釋迦牟尼佛從法座等者據此品合向普賢品後安之彼處說經了所以從法座起也若安在神力品後更無起居文經言我於無量百千萬等者問佛之因行不越三祇何故今言無量百千萬億耶答瑜伽三十八云有二無數大劫一者日月時年以此算不及故無數二者至數極故故名無數今說於前言此初以右手等者嘉祥云一手一時遍摩千世界微塵數菩薩頂名現大神力也若不持經者即不摩也二乘作佛名吉祥此是如來身業加持經言作是言我於無量至菩薩法口業加持猶如父母收拾得活計臨老之時付囑與男女我一生已來共汝苦作美喫致得活計我則不免無常汝等在後大須省事把捉錢物與我養活小大追逐親情不絶祭祀如來今日亦復如是告諸菩薩而作是言我於三大阿僧祇劫一句投火半偈捨身或為常不輕菩薩被杖木瓦石而打擲或身為國主為床求法華經於千歲修習是難得阿耨菩提云云今以付囑諸大菩薩還須與我不惜身命教化衆生言唯大菩薩者簡彼二乘初回心者不名大故表此一乘三世中最勝故故三摩菩薩頂也言傳燈之法等者解經中三摩義也手摩三遍身業加持也而作是言口業加持言此初也者意業加持中第一明己三不善根已盡能施智慧也問何以意業加持付屬所以者何徵也言慈悲故等者答徵詞所以者何也一如來有大慈悲故無嗔能拔苦與樂故言無慳吝故者解經無諸慳吝無貪不慳法吝不惜法也凡夫有貪瞋癡慳惜也言亦無所畏者無癡所作決定故言能與佛者解經中能與衆生佛之智慧智慧者即後得智也言如來智等者根本智也言此二任運等者此二無師而得名自然慧也未得時要修及至得時任運而得名自然慧非是端坐不修名為任運也言或前二等者第二解也前二是有為佛之智慧如來智慧也後一是無為名曰自然也此三即是開示語三也言顯佛能為大施主等者經言如來是一切衆生之大施主等者勸示衆生應學如來勿生慳吝顯佛是大施主聲聞緣覺名等施主能施衆生五戒八戒人天果法四諦法輪如來三不善根永盡能以法施感佛果菩提名大施主言成實論說等者行教證也言住處慳等者欲得獨宅院自在而住言藏僧施物者施主將物來者便云是我物我所施計為恩德故二者設是施主物是我化得是我恩也言是人於共有等者施主錢物大家有分名共有也共有法中尚自生慳何況自己錢物言四斷受者令等者此一句疏有二義一者斷受施人令不得物二令不得施處能施人求施不得而不來施施主合得福田勸他不施又師僧不得利名斷受者不交他布名不得施也言後生其家者糞土尿坑中及諸惡處即地獄中畜生中也言不得為福者為由作也言不得財利者師僧合領受得如是錢物勸他令不得也言毀訾善人者怕俗家布施物便毀呰善人而不令施言心常憂惱者又怕俗家私裏布施心懷憂惱言自高卑他者自高心著他卑也言多怨生者因中慳法不說誰人更肯相親果中隨受何身共處總成怨對言令行餘經者若不肯信受法華經與說餘大乘經即華嚴般若等是也問譬喻品云若有比丘為一切智四方求法合掌頂受但樂受持大乘經典不受餘經一偈此復云何答彼約受持此經說今約有不信此經者且說諸經漸化回心故諸經即大乘經也問因何與他說餘大乘經耶答經餘深法中即是大乘經也二乘是粗淺法言謂遇二乘者定姓二乘或不定姓凡夫言結成勸意者經言汝等若能如是等者如是流行法華經則是報我恩也設種種門者即於如來餘深法中等也言初三業等經言聞佛作是說已皆大歡喜意業也經言曲躬低頭身業也經言俱發聲言語業也菩薩三業敬領佛滅度授持法華經唯願世尊更莫憂慮如是三遍言勿復憂慮也言第四大段衆皆歡喜者喜歡有五般別一者世尊向法師品中與八部授記令遣持經雖讚嘆人法二師皆聞尊重信心猶輕遂得多寶如來涌塔證經又十方分身世尊本召他開塔開塔既了證教證理所以歡喜二者下方涌出上行等菩薩本來請持經世尊許持摩頂付屬所以歡喜三者此品之中世尊教示弘經軌儀若有信者為說法華經若不信受與說餘經深教法慚愧世尊教示我等弘經軌儀所以歡喜四者舍利弗等見世尊付屬法華與諸菩薩令我等輩有所咨問為真善知識所以歡喜五者天龍八部等既聞一部經了無灾無障法筵終畢所以歡喜言聞讚法勝者即是此品中讚或前神力中讚也言一說者清淨者所知障盡名清淨也言所說法清淨者如來一一智證所以清淨也言所依說法者能聽人得果清淨或離染清淨也藥王菩薩本事品言上之二品等者神力屬纍付授已了即合到受命流通受命有六品今當最初自行苦行力以流通故此品來准論普賢囑纍明護法力護法力中囑纍既在前陳護法但唯有一藥王時雖在會舉過去燒身燃臂自行苦行持法華經利益時會故此品來言釋名者晉本但言藥王菩薩品闕本字也言療八塵等者攝云色香味觸地水火風此之八種坌汙之義總名塵也痼者切云久病也此能道四大所造四塵增長煩惱無始時來有故名久病痾字亦同言七漏之深痾者漏謂心病安國引成實論及涅槃經師子品說一者見漏謂見道煩惱二修漏謂修道煩惱三者根漏謂眼等六根能生漏故四者惡漏者謂惡罵等能生煩惱漏故名惡漏能生漏故而得漏名化度云或名境漏謂色等五境以能生漏名境漏也五親近漏者謂衣食物等為生貪由緣著則生漏名親近漏也六者受漏受謂三惡覺三惡覺者一欲二嗔三惱也七者念漏即邪念起漏故名念漏七漏中前二正明漏體後五生漏因緣相從而言總說為漏問八塵七漏欲表何病答欲表藥王為大藥樹能治衆生身心二病意重一乘之法自行苦行勸示流通令諸衆生受持經者二病俱盡下經云此法華經則為閻浮提人病之良藥也言初問等者經言爾時宿王華至世界者問也遊謂行也於娑婆世界也次請者經言世尊是藥王菩薩有若干至少解說後辨請意者經言諸天龍等問請有何意答令諸天龍八部諸來菩薩問皆歡喜問八部等因何歡喜耶答前來不輕品說佛身往昔自行不輕行持法華經此品說藥王菩薩所行之行所以歡喜也言宿王華者問何名宿王華答疏言宿世已來名宿持法華如王自在名王也言寶雲經說菩薩等者解藥王菩薩名字也何名藥王答疏云寶雲經等謂根莖枝葉華果此上六種亦有見色聞香嘗味得觸遇此十法病皆除愈彼寶雲經中說菩薩實化身為藥樹衆生病苦有喫根得差者有喫莖得差者有喫枝得差者有喫葉得差者有喫華得差者有喫果而後差者亦有見樹顏色便差亦有聞樹香使差亦有嘗樹味便差亦有覺觸而便差者此十法雖是菩薩實化現有疏主引來為會也言菩薩亦爾者合也為衆生有煩惱病將大波羅蜜教法為藥樹有依布施而活慧命者如喫根得差有依持戒而活慧命者如喫樹莖而得病差有依忍辱而活慧命者如喫樹枝而得病差有依精進而活慧命者如喫樹葉而得病差有依禪定而活慧命者如喫樹華而得病差有依智慧而活命者如喫樹果而得病差又有四法有見菩薩授持六波羅蜜教生隨喜心如見樹顏色病差有聞菩薩說六波羅蜜聲生隨喜心如聞樹聲病差有因菩薩六波羅蜜法而得悟理生隨喜心如𭊴樹香病差有因悟六波羅蜜而起行者如嘗樹味病差言有同事而等者有與菩薩同行六波羅蜜行如觸藥樹身病差若是近處見色聞聲𭊴嘗味若是遠處病人困重來不得但將根莖枝葉觸身便差也藥樹總喻菩薩之身六度即同根莖枝葉華果也言有是若干等者經言世尊是藥王菩薩有若干至願解說者問藥王苦行在昔因中佛未說之衆人不識宿王華菩薩何以苦行而為問詞言百千萬億難行苦行耶答菩薩宿命智知若爾菩薩但知百劫何無量劫等答上位菩薩非初地故或佛加故問何名若干百千萬億那由他難行苦行答疏言燒身燃臂等是言無惡者問云何下經言爾時天人阿修羅等見其無臂憂惱悲哀而作是言此一切衆生喜見菩薩是我等師而今燒臂身不具足何言無惡答今約實無下文約眷屬莊嚴化現言有若非化現者云何報土得有七十二河沙聲聞衆問寧知報土答若非報土者云何佛壽四萬二千劫又非成壞之劫何以知之准下喜見菩薩燒臂燃身供養七萬二千歲而已供養淨明德佛若約歲數劫即壽命時短供養時長故知報土若是報土何有父母若八地已前悲增有故問若是悲增菩薩父母豈在淨土中耶答應云一處見異也言莊嚴臺樹者一一樹下皆有菩薩聲聞而坐其下又一箇寶樹下有一寶臺臺上有百億諸天作天伎樂其臺去樹盡一箭道糅云及金云相去一箭道如射垛遠近一百二十步計六百尺來此為正嘉祥云二里應非言所說經法者經言喜見菩薩者若單作上音若著心喜去音呼也言得此定已能等者解一切色身三昧三昧是定能現一切色身初地初得八地自在十地平等初地現百類色身二地現千類三地現萬類等問此與俱生種類無作行意生身何別答彼是變易身此但是定果色身以定為因起身是果故與變易身別也安國云得此定已隨能示現即定果身也或得定已而能發通現諸色身身即通果所攝神通為因起身為果色身之三昧依主釋也言十平等者即第六隨順衆生示現初地已得故論云菩薩得此二見道時生如來家住極喜地善達法界證真平等於多百門已得自在多百門者即十百明門三十七云一剎那能證百三摩地二以淨天眼見百佛國土三以神通力動百佛世界四能放光照百佛世界五百化類身六成熟百類有情七能留身住百劫八於過未知百劫事九於薀處界善建立百法明門十於自類化百菩薩已為眷屬十平等者一增上喜受平等二領受緣起平等三異相非相平等四弘濟大悲平等五無待大悲平等六隨順衆生所樂示現平等七衆生敬受所說平等八世界寂靜皆同一味平等九苦樂一味平等十修植無量功德究竟平等唯識疏第六言此初也者一喜念供養也經言得此三昧至法華經者皆因法華經力也言二雨旃檀者將堅實黑旃檀碎如細粖而雨也言三雨海此岸者正法念經說海此岸有香唯諸聖得今菩薩依定變起此香也經言六銖者簡要云二十銖為一兩今顯貴故所以六銖而直此界一分也問海岸栴檀即屬此故云何復說直娑婆界答准理應除此香取餘諸物價數方值此香六銖如奴持金金直於彼也言一服香油等者雖前以神力供養心猶不足更以身供養緣身是不淨敗壞故服諸香也經言薰陸香有說只是乳頭香作顆明淨者是兜樓婆者羅什云出龍神國此國無不翻也或云化木香出廣府曾問彼人彼人喚兜樓婆云化木香畢力迦者此云省宿息逐反者安國諸抄云金光明經云一香有翻為觸也膠香白膠香問但以香華則成供養何要捨身答世間所重不過己身若不捨身何表殷重耶言第五光明遠照第六諸佛同讚等者經言光明遍照八十億等者問神通力燒身即得更何要願力相兼耶答火起燒身光明遍照八十萬億那由他世界是神力若留身久住供養經千二百歲須是願心也問神通願力自合如此何表經力不思議答此是法威德向上力義說神力也問如律中燒身犯偷蘭遮燒臂得突吉羅喜見菩薩豈不犯戒乎答大小乘異不犯也安國云若作小乘作即成犯不作成持若大乘作即成持不作成犯故菩薩戒云若不燒身臂指者犯輕垢罪又為化利故不犯如佛制比丘不得與未受戒人同床座有時舍利弗與須達長者同乘一象而不犯光明遠照者願力致六尺之軀何能遠照也言二比挍讚者經言若以華香瓔珞至不及者意言不及內財也言初默者經言作是語已而各默然者下觀佛菩薩不語名默據實是諸方佛讚嘆了默也
