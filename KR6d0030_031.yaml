body:
  text: 鏡水寺沙門栖復集言四土相者經言菩薩衆甚多土相長行有六一寬狹二相狀三有善無惡四人天之相五謂食任持六三乘眷屬已下皆相攝也此頌中科土相以彼淨土之中菩薩向土相中一處科也不頌前長行佛壽及塔或有解云菩薩衆甚多已下二頌一句述前長行土相六段文中第六三乘眷屬長行經言有無量阿僧祇千萬億那由他諸菩薩衆得大神通四無礙智善能教化衆生之類頌中菩薩三德者經云皆度大神通威德力具足闕善能教化衆生之類聲聞三德者聲聞菩薩無數三明八解脫得四無礙智以是等為僧述聲聞三德闕六神通加四無礙智經云其國諸衆生等三句頌前有善無惡中無欲化生不頌人天相見經云具相莊嚴身一句頌前人天之相中第七相好普皆金色三十二相頌前而自莊嚴不頌得神通等經云純一變化生者七地已前報土悲增菩薩猶有父母生今純一變化生即是八地已上報土也經云法喜禪悅食一行等者述前長行第四人天之相經云得大神通身出光明乃至一者法喜食二者禪悅食所以今頌云法喜悅禪食更無餘食想言此初也者心希也經云爾時千二百阿羅漢至念者緣前來聞說菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛又聞我諸弟子威德具足其數五百皆當作佛又眼見數人授記自心希望授記未敢全准擬所以思念也若世尊各見授記如餘大弟子者即是上根鶖子中根四人及富樓那並是前故言不亦快乎已得記經云是千二百等者現指千二百為別記故知五百即在其中也言即千二百中等者問題品既言五百阿羅漢何故經云作念即言千二百人答此有兩解一云五百與千二百人各別五百是千二百外也二者正義云五百是千二百人中數也此千二百人者二類一五百人在會佛親與記二者餘七百人不在會佛令傳記若在會不會在總說經文有千二百人若唯據在會佛親與記故題五百人問若爾在會唯五百者何故經云千二百人各作是念耶答如世衆人共所求事一人先往衆心亦同此亦如是雖不在會亦有作念意問餘七百人既不在會如何得知佛與授記而答展轉令傳亦名得記經許可言次第與授阿耨菩提記世尊既言次第授記既初富樓那次千二百人後五百人記據此取五百人向千二百中攝為正問何故五百人中別與陳如記耶答陳如最初出家最初悟解故佛別標記言此云黑光等者正法華云黑耀阿含經云其身極黑夜行乞食時屬雲暗有一懷妊婦於電光中見之謂是鬼怪驚倒損胎乃謂之曰汝是何鬼耶答曰我是瞿曇弟子今來乞食女人問已粗言惡罵如來知之敕諸比丘從今已後不得過中食及預乞食也言此出現等者金云日出時成道故言出現是阿難弟子言周陀等者相國云此蛇奴有說父是奴也本行經云蛇奴亦翻為路邊昔有長者女與奴私通遂赴他國久而有孕垂産思歸行至中路即誕其子因路邊生如是二度凡生二子長子名盤陀第二子名周利盤陀迦即同經文周陀莎伽陀等也兄弟相繼因路邊生以立其稱也二云莎伽陀者先戈反此云小路邊緣是弟從兄得名未必一一皆路邊生也言娑揭唐謁反亦作竭音呼此翻云善來遇佛從師立號問何名普明明謂光明普即遍也光照十方及常說法利益心遍也經云轉次者不同下文令傳也經云歡喜踊躍等者嘉祥言內心歡喜即從座起等者外形致敬經云悔過自責者佛於過去教我發心令我修行以求大果而我顛倒背大向小是我一過始從初周爾時世尊從三昧安祥而起告舍利弗下如來亦同為我說開示悟入而我等疑惑不悟又乃至第二周亦爾已於兩遍勞擾世尊是我等第二過第三周中方邀世尊授記由我鈍根故於爾時悔過自責亦同鶖子我從來終日竟夜每自尅責又云是我等咎非世尊也二周亦言自鄙先心皆亦悔責也上來內心悔責言領解有二等者前富樓那法領之處五百亦同故前言一人為首餘亦理同准此三周說法階級不同三周領文升降亦異初周法領第二准喻領第三若法若喻而為領前久法領此喻領也言初領昔權者有抄科為六段一親近善友喻經言世尊譬如有人至親友家醉醉而臥二教發大願喻經言是時親友官事當行四句三昏迷不覺喻經言其人醉臥都不覺知四退落下垂喻經言起已遊行到於他國五得小涅槃喻經言為衣食故勤力求索甚大艱難六自言究竟喻經言若少有所得便以為足言初將離險者經言世尊譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去言領中途方退喻者經言其人醉臥都不覺知言領為設化城者經言起已遊行到於他國為衣食故勤力乃至便以為足言不領第四衆倦者前長行合中亦不合彼云欲明權實二道不故正明息苦事故所以不領也言此初也者領初將離喻經言世尊譬如有人至與之而去者友人者三根聲聞也至親友家者十六王子舍也若是外道名為惡友若遇小乘人名為假友今逢大乘人名親友四智種子佛性同故名親如世間同姓宗明兄弟同姓名親同志名友同求菩薩修行名為友中道大乘名之為宗經言醉酒而臥者古師嘉祥解云貧人本來不醉行則親友家遇𢩁席之上有酒喫故下頌文言譬如貧窮人往至親友家其家甚大富具設諸肴膳問古師以何名酒答取無相大乘教法為酒體問何要取教為酒答能昏亂令人迷臥故喻於酒經言轉更惶怖悶絶劈地故經偈云持空三昧瓶以盛無相酒今修種種行資長於法身又云酒有歡適之功喻教聞已踊躍歡喜二者光宅疏言貧人本來醉至親友家方臥非是至家方始醉臥也此貧人本來醉到親友家方顯得醉猶如一人街中行不衝誤人爭知他醉至親友家言語倒錯方顯得醉法中論本來起無明名醉到大乘親友家聞著大乘法內心迷教名醉不肯修行名臥臥者不行義消經了言即十六王子者即釋迦過去為王子也言有人等者聲聞自喻己身也言友同等者問何名為友答書云同門曰朋同志為友即同一覺門名明同一心志曰友言禮記僚友謂官僚官人同曹司官相事曰僚言執友稱其仁者執者謂持也由其志故相依持名為友言悌者不是兄弟但是善事相教名為悌至者依聞思二慧聞教觀理名志義也言前以佛法為國者解家之義喻上說醉人從諸處來往友家法中論從生死中往佛法故言時猶凡夫等者解醉臥義時猶凡夫煩惱未斷無明所纏惛醉心名醉義常寢生死雖遇佛法不肯修行是臥義章敬云迷教名醉闕行名臥臥即不行也問若無明為醉凡夫無明本來已有何故今始言醉答先雖未斷今復更起初迷大教新醉何妨醉上說貧人先因喫酒後方醉臥法中論大教名酒聽聞名飲無明迷暗名醉更不修行名臥言是時王子此化緣息等化也入於涅槃也餘處行化他界現身也經云是時親友官事當行又有說教化二乘及凡夫名私事教化菩薩令入平等大乘名官事第二自利名私事利他名官事第三十方諸佛三乘佛法不謂己身名官事十方諸佛名官人教化衆生名官事官家之事名官事也言亦如泛駃舟者問喻上說親友名官事當行向諸處去法中論佛本無來去何名官事當行答疏言亦如泛駃等駃即水疾流貌邁者往也舟者船也言矚凝沼等者矚者即眼觀見也凝沼者謂水池不流之水西流者河水元來不向西流自是舟船向東行去疾似見凝沼水向西流古持云枕上雲山者到來峯頭洲縣渾移却法中論如來常在世間自是衆生乘生死船輪回三界妄見如來入滅佛實不滅意言水實不流舟行似水去如來常在世心追謂涅槃佛自住大乘猶如凝沼水衆生心若退恰似速舟行言華嚴經等者筮音呼平一聞法行者如普賢菩薩我於寶威德上王佛國遙聞此娑婆世界說法華經故來此為聞法行故或妙音從淨華宿王智佛國來供養釋迦及聽法華經等二說法行者如文殊於序品問答了便不見至龍宮中說法去來及至妙音現種種煩身乃至於王後宮等於諸世間常樂說法利益衆生三不隨貪等者衆生所行皆與三毒相應諸佛菩薩不然也四欲界行者即從淨土來生此間為化生故如觀音勢至等是五色無色界者即四禪四空等修行之人令習定速轉進故六義法行者如智積問文殊師利仁往龍宮所化衆生其數幾何等成就淨慧速觀察義理而行七一切趣行者即五趣中隨衆生類現種種身故八一切佛剎行者遍諸國佛土行供養故九涅槃行者樂行涅槃生死故十成滿諸佛行者一切成佛之行皆悉圓滿故言隨應當釋者經言官事當行即十中第八一切佛剎行第九菩薩行或當第二說法行也言謂大菩提心者解經無價寶珠也問珠體為是有漏耶答二說一云經言以無價寶珠唯取無漏本有種子得名無價若是有漏何名無價二云唯取有漏菩提心種名無價寶珠問有漏之珠何名無價答雖是有漏形對二乘大乘菩提心珠亦名無價二乘功德如一日之價又云漏與無漏雙取為善問珠為是新熏為是本有耶答三解初師云一切種子皆本性有不從熏生如契經說一切有情無始時來有種種界如惡叉聚法爾而有界即種子差別異名如是建立因果不亂二云一切種子周重故生種子既是習氣異名習氣必由熏習而有如麻香氣華熏故生如契經說諸有情心染淨諸法所熏習故三護法云一切種子各有二類一者本有謂無始時來異熟識中法爾而引教如初師二者始起謂無始來數數現行熏習而有引教如第二師也問無價寶珠為取新熏為復本有耶答一者唯取新熏種子義以經言於某年日月以無價寶珠繫其衣裏得有時節日月故知新若唯本有本有法爾而有如何說繫二者兼本有事須先約本有而立新熏本有若無新熏何立問本有種子如何說有時節又如何說繫珠義答得地前一大僧祗劫有漏聞熏資彼本有亦名某年日月只此資時有異於前便是繫珠取護法為正也取有漏菩提心為珠正也言寶珠有三者一水清二如意三吐金吐金有三品者一下品吐一兩金生千倍二中品吐一兩得萬倍三上品吐一兩得無量倍珠體喻一乘能出三乘從一乘中分出聲聞乘如珠出千倍從一乘分出緣覺如珠出萬倍從一乘中分出大乘如珠出無量倍問能出所出一乘大乘何別答能出是法華會上乘所出是四十年大乘大乘向二乘中相對待立名故是所出不是能出也金云一乘喻珠三乘喻所吐金也如從小至配之下品喻聲聞僧施之德福少中品喻緣覺施之得福多上品喻菩薩施之異報無盡二水清珠有三品一者下品能清少水二者中品能清大海下品喻小乘教詮理最淺中品喻小乘教詮理次深上品喻大乘教詮理最深三者如意珠即是此中為喻此珠自有三品下品雨寶滿半閻浮提中品雨寶滿一閻浮提上品雨寶滿四天下下品喻佛性在資加二位中品喻佛性在見道上品喻佛性在修道今此所繫珠即是見道前所得如意珠名無價上來水清吐金如意今取如意珠為喻也言隨求皆滿者即要妙觀察智平等性智生空二空根本後得智等總得也言衣謂意識等者解經繫汝衣裏衣謂意識取第八識若准疏中言意識即合取第六識發菩提心而在意識故以喻衣不合取第八識以七八二識攝屬十二處中意處故第八名意也又等無間以解意八識總名意若言繫汝裏今故現在又言猶在不告能住持種子唯取第八若依繫義熏習義則取以二為門熏習在總即取第六識緣分別故可為衣表第八識可為其衣裏所以雙取也第六聽聞大乘聞熏得菩提種子藏在賴耶識內下經言繫著內衣裏者取意處也著珠之處不是繫義經言著願繫者事須取第六是能繫能正是繫珠義經言其人醉臥等者其人者三根聲聞也醉臥者初發大乘心猶為煩惱惛醉纏心名醉義也言雖臥大乘親友之舍者解臥義也言不自覺知有菩提心珠此解都不知義也疏解醉并臥及不自覺知三義各別也言唯識引經惛醉等者疏主辨醉體無明有二一者恆行二者獨行今取何者故引唯識論中第一義彼論破小乘證有第七識金引論頌云真義心當生常能為障礙俱行一切分為不共無明若解其人醉臥都不覺知正合取第七識中恆行不共無明一類染汙常無間斷無醒覺知故是故契經說異生類常處長夜無明所盲昏醉纏心曾無醒覺故疏言彼以末那相應無明名為醉體問若耶第七識中無明常醉臥如何言起已遊行又無醉裏繫珠義所以疏主依論作第二解自立義云今以第六識中不共無明為醉體有間斷義故第六識通三性今取心一念聞教生解義邊名為繫珠問若第六識善心相應發心之時名繫珠云何得醉時繫珠答諸抄二說一者約中間一念是善心前念無明後念無明兩頭不善無明相續間雜名醉裏珠二者事須兼取第七識中無明為醉體七識與六識為諍根生死因故今第六識聞法之時皆不能忘相故名醉裏繫珠若望第六識起已遊行也若望第七識說其人醉臥都不覺故言醉裏繫珠雙取六七二識義方周圓若准論意偏取第七識若是疏意偏取第六識後言遊行據第六善然亦還是醉中行也真無漏智乃得名醒疏中既言第六不共無明正為醉體故知兼第七無明也此解順疏也言在異生位等者配位也異生即凡夫也化度云第六識中無明容有間斷起若不善無記若起不善即是醉時若起善心即起遊行此等皆在異生故人云退心已後迄至靈山說法華而復本中間爾許時並是信腳行也言既退大心等者問既退大心規求何法答喻上說規求衣食法中論退却大乘求小乘也只緣求小乘故名遊行三生六十劫修行得二乘果已回心向大如初心始乘菩提無事虗行名遊行也言遂至二乘等者解經他國也他國自國相對不同總有三說一云大乘為自國二乘為他國喻上說從親友舍醉臥處起便入他國求衣食法中說聞大乘教名親友舍退却大乘心入二乘中名他國他國者非曾生長二乘之中不曾生長大智等名非生長處也言昔在生死者第三解也生死為自國大乘為親友舍二乘涅槃為他國也言若發心已等者總三乘佛法名自國生死為他國言未發心前等者經當唱經文也若發心已後二乘佛法為自國生死為他國問二乘既曾發大乘心云何言佛法外人答由退大心却住生死更未發心是故名佛法外人以生死為自國二乘佛法名他國貧人緣醉向生死中地上臥是凡夫臥生死然從醉處地上起向他求衣食即是從生死入二乘也所以疏言即此文是解上二句經云起以遊行到於他國言亦同涅槃者前窮子喻品中引涅槃經有種性未發心前生死為自國是己分故佛法為他國非己分故即圓此文也言或以大乘者結前大乘名自國二乘為他國或大乘為父舍小乘為他國也言勤力求索者即前大宅品三乘互相排覺共馳走名名勤力求索三生六十劫四生百劫得無學果名甚大艱難也言此在二乘因位者只此五欲便是放逸具故說二乘有學求勤力索甚大艱難也求斷染法也言生已度想等者解上便以為足也言此初也者初領滅化也經言於後親友至如是者親友即第十六王子也會遇見之即是今日靈山會上釋迦相見再為說法華經名見言咄哉夫者紀國云咄哉者呵其變節嗔不修大也丈夫者美其發心也凡建節成立功立事斯可謂丈夫汝何發弘誓於昔辰虧大行於今日伇伇小道何苦如之云何為衣食乃至如是如是指二乘法也何故求食受如是艱辛耶一種求衣食何不向大乘中求十信十住十行十回向求耶何故向二乘中作上下十六心更求衣食何故為衣食故到如此下行故被有餘涅槃牽引白日向夜走腳不著地種種皆作何為衣食乃至如是此意甚深也此同滅化經言爾時導師知此人衆既得止息無復疲倦即滅化城語衆人言汝等去來寶處在近向者大城我所化作上領滅化言五欲樂者即五等者即解經我昔欲令得安樂五欲自恣也言一自性樂者謂五受中樂自體二因樂者根境識三和合生觸觸與樂為因故名因樂三受斷樂者謂受想定四苦對治樂即寒熱等息同時生起樂受俱時之慧即此樂體五無惱害樂此中有四一出離樂即出家持戒之人二遠離樂即取生上色界等三覺法樂即是菩提四寂靜樂即涅槃清淨法界等言或佛果五法者清淨法界二空真如及四智心品合五為樂也言或是大乘無漏等者金云即五分法身也無學身語律儀名為戒薀無學三摩地空無相無願名定薀無學正見正智名慧薀無學作意相應心已勝解今勝解當勝解於境自在之解脫名即盡智無生智相應勝解名解脫薀無學盡智無生智名解脫智見薀言我昔為令汝得等者解經中於某年日月以無價寶珠諸抄不解某年日月神智云在十六王子二萬佛時數數為說大乘數處既多不定一處名某年日月也言責住權者解經今故現在示珠處而汝不知彰其過也言虗自憂勞者解經云勤苦憂惱也言以求自利者解經中以求自活也言法執不滅者解經甚為癡也所知無明也上責住權言此令取實者經言汝今可以此寶貿易所須者意交將昔日菩提心珠易所大乘上位明心菩提珠亦可將分段所變易名之為貿易也言從貝從卯者交易物作貿字從貿有人作作卯字於飽反非也疏主恐人不識故言卯音酉古時酉字似今時卯字形段所以錯寫也古時酉字正合作死卯之象也此正是古時𧵍易字有作賈字此是人姓賈字歌雅反又解云𧵍易義有三解一云取十六王子時有漏菩提心種子熏習已去資糧位聞思二慧熏習已去易取加行位中有漏修慧易取初地修慧二云將十地劣無漏珠易取大乘上位福智大如意珠即是捨無常色獲得常色也三云將初心小寶珠即二乘位中生空智珠回向大易取大乘法空後得無漏種智珠也言用初心小寶珠者即是有漏菩提心珠也易取上位福智大如意珠即是登地無漏智珠也言此合初將離者喻經言譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去今此合云佛亦如是等此段久證有新熏種子也言合領中途者喻經言其人醉臥都不覺知今合言而尋廢忘等言合領為伇化城者前喻經言起已遊行到於他國為衣食故勤力求索甚大艱難若少有所得便以為足今此合經云既得阿羅漢道自謂等意道三生六十劫求衣食亦大辛苦艱難得少許為足也言虗費等者若約自乘不名虗費回心向大迂會修行名空費也言難等者古汗反艱甚難治也持音呼艱根也並出釋名物根耳謂如物難以拔耳是助句有疏牙字更勘多本言難憚也者他證反言忌憚者二乘之人昔時求衣食多饒忌憚名艱難去音憚誕音言此初也者初合領滅化也前喻經言於後親友會遇見之咄哉丈夫何謂衣食乃至如是今合經云今者世尊覺悟我等等言此合領今說實者前喻文有三初說創經言我昔欲令汝得安樂五欲自恣於某年日月至今故現在次責住權經云言而汝不知勤苦憂惱以求自活甚為癡也後領取實經言今可以寶貿易所須常可如意無所乏短今此合意總也經言世尊我今乃知等言一頌標禮者長行經言爾時五百阿羅漢於佛前得授記已歡喜踊躍即從座起到於佛前頭面禮足悔過自責今今一頌述我等聞無上等是言後一頌半自責者長行經言世尊我等常作是念自謂已得究竟滅度今乃知之如無知者等今頌云經云今於世尊前自悔諸過咎言初七句述初教發心喻者長行經言譬如有人至親友家醉酒而臥是時親友官事等今頌頌云譬如貧窮人往至親友家等神智云無法財故貧無智寶窮或無福名貧無慧名窮謨云喻上怋醉而臥為默法中當時發心擬作取寶之因故於之名默又昔說言總不言大小二乘根性取小果為今之漸名之為默言後一句頌中途方退者長行經言其人醉臥都不覺知今頌中一句述經言時臥不覺知言二頌為設化城者長行經言起已遊行到於他國為衣食故勤力求索甚大艱難若少有所得便以為足今頌經云是人既已起等是言初頌示往修因者長行經云於後親友會遇見之咄哉丈夫何以衣食乃至如是今頌經云與珠之親友一行頌是言後頌明生歡喜者長行經言我昔欲令汝得安樂五欲自恣於某年日月以無價寶珠等今頌經云貧人見此珠甚大歡喜等言雖現未富者通難也問珠體是本後二智大乘見道始得如何今者富有諸財物五欲而自恣答疏言雖現言如見樹居白者但見其烟必知有火但見鷺必知有水今但見其教必見其理七聖法財等意言即得教珠後必得智珠有云亦是驗有佛性但有佛性何愁不得即是見白鷺鳥表知水也言初一頌頌合初將者前長行合經言佛亦如是為菩薩時教化我等令發一切智心今頌經云我等亦如是一行是言次半頌頌合領中途等者長行經言而尋廢忘不知不覺今頌云我等無智故不覺亦不知言後半頌頌合領為設化城者長行經言既得阿羅漢道自謂滅度資生艱難得少為足一切智願猶在不失今頌經云得少涅槃分自足不求餘言初一頌頌合領滅化者長行經言今者世尊覺悟我等作如是言諸比丘汝等所作非究竟滅我久令汝等種佛善根以方便故示涅槃相而汝謂為實得滅度今頌經云今佛覺悟我一行是言後一頌頌明生歡喜者長行經言世尊我今乃知實是菩薩得授阿耨菩提記以是因緣甚大歡喜今頌經云我今從佛聞受記莊嚴事一行是授學無學人記品言名高之輩者即是富樓那五百千二百人非名高之輩此品與記章敬問慶喜執日豈非名高耶答此之二人其實名高約能誘此二尊者是化聲聞引實聲聞但設所誘不說能誘二千即是非名高也如前品滿慈亦爾不合向下根收亦是約所誘記也亦二人慶喜執日雖衆所知識亦是高名經就多人名非高名也言釋名者正法華云授阿難羅云決品彼依二聖此約二千人言進習止滿者戒定慧正為學體進修習解有學義進習正滿名無學解無學義瓚云未圓已滿衆也通此二義為正由定也如何偏說定滿不說於慧答慧滿不必定滿若定滿必是慧滿故偏舉之言一異二同者謂前品總有三類一滿慈二陳如三五百初之一人別名法明名為一異後之二類同名普明名為二同言非高名之輩等者謂此品亦有三類一阿難二羅睺三二千聲聞後之一類同名寶相名一同前之二人名字各異名二異由此不同分為二品言心念者經言而作是念向來見鶖子四大聲聞五百千二百總得授記見賢思齊引他況己所以中作念希望如來授記即總念請也經言我等所歸者意言我若歸餘外道此分即無也只緣歸佛故於此授記亦應有分也言此述二人合等者經言阿難常為侍者羅睺是佛之子聲聞之中最親最近不遇我等二人合得授記言正申請者解經若佛授阿耨等更不說諸道理直顯請授記嘉祥云阿難請記若不得有二種失一者違其本願二者乖於衆望蒙佛授記有二種益一即遂其本願益經言若佛見至我願既滿二不乖衆望益經言衆望亦足裼者昔同言肉袒者不著衣名肉袒剝脫之義也言山海慧者路云准經意俱喻智疏釋名高如山智深若海不違經意言專擅者獨也擅者能也言此記因行者理合先授因記後授果記此先即示果後令行因也經言常立勝幡者金云剎上有幡高顯殊勝此佛國中功德殊勝出過諸佛國土由如剎上懸幡常高顯殊勝又言一對五欲戒為勝幡二對苦惱慈悲為勝幡三對於邪論辨為勝幡也如軍竪降幡強立勝幡也言此一因記者長行經言當供養六十二億諸佛護法藏然後得阿耨菩提等今頌經云我今謂說等言初半頌名者長行經言爾時佛告阿難汝於來世當得作佛號山海慧自在通王今頌云號曰山海二句是言一句土相者長行經云其土清淨琉璃為地今頌云其土清淨言一句國者長行經言國名常立勝幡今頌云名常立勝幡言半頌利益者長行經言教化二十千萬億恆河沙諸菩薩等令成阿耨菩提等今頌云教化諸菩薩二句等言半頌讚嘆者長行經言阿難是山海慧自在通王佛十方無量千萬億恆河等諸佛如來所共讚嘆稱其功德今頌云佛有大威德名聞滿十方言二頌住壽者長行經言其佛壽命無量千萬億阿僧祗劫若人於無量千萬億劫中算數挍計不得知據此報佛壽命所以雜發意於此生疑也今頌云壽命無量二頌等是言利益衆疑等者解經如恆河沙等一頌也長行先果記後因記今頌中先因記後果記也長行七頌文准六不述劫名也言衆生者經言爾時會中新發意菩薩等者初發信心菩薩頓悟凡夫少菩薩也問列衆處不說此從何來若是列衆了向後來靈山說法聽衆不一先來先聽後來者後聞亦是阿難授記便作此疑父揚云是前來列衆處萬二千人中更有八千個學初發大乘名新發意菩薩問爭解作此疑答嘉祥云欲發阿難往事佛加被生疑也經云咸作是念等者疑意言我尚不聞文殊普賢彌勒等授爾許大人記名高如山智深若海世間最高不過山最深不過海此佛德量過於山壽命無量千萬阿僧祗劫正法倍壽像法倍正法有何因緣而諸聲聞得如是決就聲聞中無學尚自不得前來記以何因緣阿難有學得如是記莫是世尊親情便與大人記恐衝誤著人不能說名字所以總言聲聞意在於此世尊知諸菩薩心之所念而告之曰莫將阿難作見在眼者一緣我有幻凡得無學果者不得親近於佛所以阿難不證無學二百發願願常與佛為侍者所以士居有學言此初也等初說始因也若論往行我與阿難等於空王佛所同時發阿耨菩提心言等者彼空王佛所餘發心人言空王佛者乍觀經文勢言於空王佛時似配三大劫最初佛若准俱舍算只是三大劫內中間所逢佛不是最初也言逆次逢者從果向因論也相好初逢勝觀佛第三劫初入八地逢燃燈佛第二劫初初地逢寶髻佛最初第一劫初初作凡夫逢釋迦牟尼佛上逆配若順配即劫初逢釋迦牟尼第二逢寶髻佛第三劫初逢燈明相好劫初逢勝觀佛即毗婆尸佛也言此陳後行者世尊道若論往行早時即合成佛我與阿難於空王佛所同時發心我緣精進疾得菩提阿難多聞猶在有學如捔走疾者為先也其本願下結得記乍觀經文言阿難常樂多聞此意說過去同時發心各據一行勝也我意樂精進速取菩提阿難意樂多聞願為侍法藏所以未得成佛也以經文勢似說精進勝多聞劣言故華嚴等者疏主向下引華嚴經順此處經多聞捨無義生死惡法名無義理故即由多聞能捨生死惡法無義之法也言化不定者非是不定性但是教化方便名不定言然諸佛因行等者解經中其本願如是意言發心既等成佛應齊但以願力不同故與授記言此經家敘證者但是結集人敘出過後唱頌文方是因說諸抄云阿難事佛有四種願一不欲著佛衣二不欲喫佛殘食三不欲隨佛受別請四二十年前不聞之教再請佛為說也言示化為侍者經既言方便為侍者信知是應化也言以足踐之者足所履踐因中持七支戒果位蹈七寶華也問羅睺既得無學果受變易身如何與未來為佛長子答皆化現也經言亦為此佛者為由與也去呼也言佛有三子者第一善星第二憂婆摩那第三羅睺若望善星為長羅云即小今云長子者若不出家堪承的繼嗣立長子也言此後二者解經言羅睺羅密行等二頌也羅睺未出家時極是凶猛出家已後常於夜中衆僧眠後盜除糞穢而遠送之此之密意唯佛能知故名為密謨問密即不知知即不密如何言密行答行行之時人不得他意故名密又復佛具一切智今佛言之故不可例也言西方時有見者西域記第六末說俱尸那揭羅國分舍利起窣堵波西南行二百餘里至大邑聚落有波羅門豪貴巨富敬崇三寶接其居側建立僧房衆僧往來罄心供養其後賞迦王毀壞佛教衆僧絶侶而婆羅門懇惻經行之次一沙門尨眉晧髻杖鍚而來婆羅門馳往迎之備諸供養且以淳乳煮粥進焉沙門受已才一嚌齒便即到鉢沈吟長息婆羅門食訖而問曰大德慧利隨緣幸見臨顧為夕不安耶粥無味耶沙門告曰吾悲衆生薄祐然談不容易事或置疑必欲得聞今當略說昔者佛在竹林精舍我常侍從俯清流而滌器或臨碧澗以浴身或以澡漱或以器盛嗟乎今淳乳不及古之談水此乃人天福減使之然也婆羅門曰然則大德乃親見佛耶沙門曰汝豈不聞佛子羅睺羅我身是也為護正法未入涅槃說是語已忽然不見婆羅門乃以所止之處方塗香泥灑掃像設儀肅然其敬如在也言柔軟者四十年前法執剛強之心誰人共得語今日貪心令下意徒我授記所以其意柔軟言清淨者回心向大捨法執故寂然清淨也言一心者四十年前於大生疑於小起執今日專意修大乘行名一心也言阿難答者經言唯然已見實二千人有如是事言一名同等者同名寶相二千人成佛了壽命國土眷屬一切同也言一頌標者長行經言爾時世尊見學無學二千人其意柔軟寂然清淨一心觀佛今頌言是二千聲聞是也言一頌因者長行經言阿難是諸人等當供養五十世界諸佛如來恭敬尊重護持法藏今頌經云所供養諸佛一行是也言一頌標名同者長行經言末後同時於十方國各得成佛皆同一號名曰寶相如來等今頌經言各於十方國一頌是言一頌名土等同者長行經言壽命一劫國土莊嚴聲聞菩薩正法像法皆悉同等今頌經言皆名為寶相一行是也言二千喜領者如甘露見灌者其二千人得記由如甘露灌注身心也法師品言次八品等者意取十九品為正宗也所以先言八品言前信解品者意證八品為正宗說一乘處即是正宗捨權取實有授記處即是一乘說蓮華出水開敷即是一乘盡在八品中說也從此更不說一乘故以八品為正宗言此品又云開等者路問云法師品中引文證正宗者即合取九品為正宗何云八品答此讚前八品開方便門顯真實相不是說此品之中開方便門顯真實相且如方便品云過去諸佛以無量無數方便等是開方便門究竟令得一切種智名真實相第二第三周准此說言逗二乘者逗者謨云切云逗住止義令二乘於大乘中住不餘處去名住止義也二亦是逗易義易却二乘心至大乘心如將一修繩從頭易至尾俗言逗也言雖此品及持者問既無說權實及授記處便非正宗此品及持品既有授記何非正宗答疏言雖此品等微由少也言因言總記等者路云此品因藥王菩薩告八萬大士擬嘆二種法師去所以先與四衆八部授記故名因言世尊說正宗了既有四衆即令持經流行法華兩類尼衆憂色而視如來不肯於經佛告云將無謂我不與汝授記法師品初已授記了若欲得別說名號國土亦更與汝說故名因言與說因言總記是第一義更不說一乘是等第二義法師品中但是因言與更不說一乘非正宗收也勸持品中因觀持經與尼衆授記更不說一乘非正宗收言初之四品讚重等者初二品讚法讚人可尊可重後持品一品令生喜仰言次七品覺行者安樂至不輕品言正行助行者三說一安樂一品是正行餘六品是助行二云隨喜一品助行餘六品是正行三云安樂一品是所行餘六品是能行能行中隨喜一品是助行餘五品是正行也第三解為勝也言後之八品付受等者神力品名示相屬纍品名付屬藥王品至普賢品皆稟命行故言亦即三周者不是此處配他正宗分中三周此流通分中自百三周道理初四品讚重為一周次七品學行為二周後八品付受為三周周即周備周圓名周也非同前遍義名周也言餘經流通者如涅槃經並無流通分問云華嚴八十卷但有末後頌剎塵心念可數知等以為流通分金剛經言一切有為等是流通維摩經末後一品為流通耶問何故問答不入解妨中明向來意中問答者此對一切經論多少解妨但論當品也然入解妨中亦得無失也言又化大機易可者且如華嚴經唯為頓發大心者所以流通久此經化回心類稍難信解故流通多也不見前來化三根回甚難但是於中化回心道理聲聞作佛傍人聞已難信難解也言初三品讚重等者法師品雙讚人法寶塔品偏讚法提婆品偏讚人合此三品名為讚重勸持品名流通言若人若法者初一長行一頌讚人法師後一長行一頌讚法法師若人若法向上俱可尊重法上可軌人上可摸或可人法向上但可軌摸解勝也言歎人者經言若有惡人以不善心於一劫中常毀罵佛云云言美法者經言藥王今告汝我所說諸經而於此經中法華最第一言勸慕者經言以大音聲普告四衆誰能於此娑婆國土廣說妙法華經今正是時如來不久當入涅槃佛欲以法華經付囑有在語勸也提婆品經言爾時佛告諸菩薩及天人四衆吾於過去無量劫中求法華經無有解倦乃至以身而為床座等身觀也持品名持行二萬菩薩此方持言科判四品者意道紀國科正宗中四品與慈恩流通中科道理不別也言論中有七喻三平等是正文十無上是殘文前九上名上殘上殘中有文殘若第十無上即是前九無上之殘其第十無上名下殘下殘中亦有文殘義殘然第十無上中有法力攝諸品盡總名下殘故說法師品是持力所攝其法師品即下殘中文殘攝言法力有五等者一證力即是分別品中十一位人證如經言我說是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍乃至一生證初地菩薩名證力二信力者即是一位發心如經言復有八世界微塵衆生皆發至菩提心即發信心也三供養力者如經言佛說是諸菩薩摩訶薩得大法利時於虗空中雨曼陀羅華以散無量百千億衆寶樹下師子座上諸佛四聞法力者從分別品後通隨喜品盡是聞法中收此上四段經文在兩品經中俱告彌勒五讀誦持說者即法師功德品告常精進如經言若有善男子善女人受持是法華經若讀若誦若解說若書寫是人當得八百眼功德千二百意功德等言修行力有七者一持力攝三品謂法師品通能持初一長行頌人法師也安樂行品唯所持正身行正語行意離諸惡自利行心修諸善利他行持品唯能持二萬菩薩此方持四類聲聞他方持八十萬億那由他菩薩彼此俱持二說力神力品示現出廣長舌上至梵世一切毛孔放無數色光三行苦行力藥王菩薩過去第一生燒身第二生臂四教化衆生行苦行力妙音品十八類身乃至於王後宮變為女身而說是經五護衆生諸難力已流通觀品護未發心衆生難陀羅尼品護已發心衆生難六功德勝力淨眼二子回邪見之父王得當成之佛記嘉祥云古叟愚而重華聖文王邪號二子正七護法力謂普賢品等言持力有三者問法師與安樂品俱是其持二品何別答法師品能所持通凡聖八部等若是安樂行品唯所持唯說聖者故二差別又法師所持是安樂行品所持行故二別也言上辨等指前正宗未說能持所持此已下正是法師品來意言可軌可持者問何名為軌持義答可軌謂則令物生解可持謂任持不捨自體故名為法言可習可範者問何名為師答疏言可習等法上習學名師人上可師範名師師範義人法上有也以彼人法俱名為師也言故涅槃者即證法師理為師也問夫言師者須有言說且如理上既語言何名為師答智證理時有生解義亦名為師言遺教者即證教為師也言能學法者可等者問所學之法可名為法師能學之人何名法師答疏言能學法等諸大菩薩有法轉化衆生堪可習學故稱範也言訓匠等匠者有雕琢之功如玉不琢不成器玉若得其匠雕匠琢即成其器物衆生身中有菩薩法寶之玉若無人法師訓誘雕琢菩薩法寶無由得成又如巧匠能變金銀為種種環釧法師亦爾能導群物令成菩薩言義通為勝者破古人故言義通為勝也言答俱名法師者意言佛前後總名法師然就勝而說佛滅度後不對佛前名法師法師義即分明言此中多以者問佛滅度後全名法師更何用多名法師之語既言多名法師還應少分得名弟子耶答佛滅度後少分亦得弟子對所持經所持經為和尚能持經人亦得名弟子也上來說佛滅度後法師以前來答中言俱名法師佛在佛後二義皆取也言其現在得弟子者即是佛在日受持經者對佛名弟子對餘八部亦名法師即是持經四衆對天龍等餘不持經人亦名法師也言然現得記者即是疏解現在法師疏有二意一云然現得記亦名法師者證法師品初四衆八部佛前得記持經便名法師二者證舍利弗等是現在得記人未回心前但名弟子回心已得記持經亦名法師言又以現在等者問現在名法師何故經文多說佛滅度後耶疏言又以現在等意言如來在日記威力正法嚴故易持如來滅後像法亂真以難持故得法師名也言又現習學等者攝云影略言之即取佛前可得記弟子名影取八部得弟子名滅後人為法師影取八部得法師名若依此解弟子即佛前八部即滅後以含前義故故取佛前習學八部等皆名弟子影滅後習學八皆名弟子滅後八部得名弟子滅後八部得名法師影佛前八部合名法師問八部何名法師答人天有法故名法八部護法故名法師即十法行中供養攝也問滅後經文中不說八部何言滅後八部名法師答疏言等字言答雖標總稱等者如十種色中聲香味觸是色中之別為色之一法是總即將稱便為別名也言無別能等者且法師品人法師品人法師師師可軌可持名法師品更無別功德能但名法師勸持品兼有法師向上義又加念慧二法攝持功能有別功能故別品名持品約佛現在法師義劣持義勝但名持品其法師義劣持義勝但名持品其法師品多說佛滅度後事不對現在佛前但名法師不名持品意言有總能也而無別也如寶塔品有證法之能天授有無怨之別義等今此但取人法二種雙能利他說法總能為名名無別能也經言爾時世尊因藥王告八萬等從此已下唯告菩薩不告聲聞譬如用毒為藥非大醫所不堪流通分中流行法華經事須是大菩薩也據此經文勢似正告藥王菩薩因便告八萬大士非此義也佛意本來擬與八部授記將八部四衆及法華經分付與八萬菩薩令教化所正告八萬大士因告藥王問何故不告觀音勢至等偏告藥王答緣藥王在會過去燒身燃臂持法華經行相與此同過去日月淨明德邊第一生燒身第二生燃臂獲得六根清淨得現一切色身三昧又持品發願周旋往返十方國土不惜身命持法華經由斯義故偏告藥王不告餘者因說者持經之行因便告其藥王故名因者因由所以也言辨中邊論等者謂書寫供養施他聽聞披讀受持正開演諷誦思惟修習此十法通三乘有一一行中皆有四行一自作二教他三讚嘆四慶慰慶者荷慰者慰喻有喜即賀有戚即慰喻也言今隨者隨喜即讚也言舉一例者問何故四親近行中經文唯說隨喜答疏言舉一例餘等略舉讚嘆一行例餘三行自作勸他慶慰也經言聞妙法華經若不能多且於一偈一偈若不能且於一句此所觀境也經言乃至一念隨喜者乃至之中攝多念此境少心多心多是即多念多念隨意者能緣心也言由小善根等者問何不說持多名句得成佛耶如何句向上修善當得菩提耶答疏言由小善根等謨云月邊作出非尾反切云月未感日也非此中義今依日邊作普佩反配同切云日向睹貌也糅云如日欲出時明相先起此名曙色東方動日未出早能破暗況出扶桑辨日日以喻智雲以況悲發心之初不出悲智今者有人但聞此經一句即有成佛之勢景者大也明也雲霞始布者如一斤雲子起便能覆蔭草木松生一寸即有凌虗之用虗生三日即有食牛之氣龍生七日便合降華之能也今取明義肇者治小反初也言喜一句者問正行故不說唯言隨喜答疏言隨喜一句等意言一念隨喜尚得菩提正行行時成佛何惑也經言佛告藥王又如來滅度等者明傍修行法師隨喜者乃至之中攝多句偈此境多心少也今日不說多句偈此望佛名不現前法師言正樂聽聞等者舉一隨喜行例餘衆行也舉傍行例餘六種正行此舉初修分隨喜行唱久修六種正行大菩薩故言六法師者經言若復有人受持者依久也二讀執卷三誦皆久也四解說五書寫經言乃至一偈者乃至二字向上互處轉乃至一偈向上解說乃至一偈向上書寫已上初列一五法師訖次下乃至明供養恭敬敬視如佛已下第六加行者計成六種也就第六供養行中中有十二種者經言於此經卷敬視如佛種種供養都標不為數也種種者飲食臥具湯藥名種種也一華二香三瓔珞四末香五塗香六燒香七繒八蓋九幡十服十一妓樂十二合掌恭敬言此明初五等者料簡六行前五法師於經一偈及一卷向上行供養行言於經一偈等者問經文只言一卷向上供養一行何故疏主更一偈耶答能攝偈亦不相妨供養經卷之時亦供養偈言其尊重者尊重疏主加言前隨喜者前唱之中隨喜是語業後唱供養行有十二種中敬視如佛是意業合掌恭敬是身業此二名內財言餘是外財者經言種種供養已下是則供養也言十法師等者明十法增減不同也真諦解云前七但得於文後思修二慧但得於義正開演通得文義又初八聞慧第九思慧第十修慧又前八中初三福德得次五智慧又十中前七是能持人正開演是能說人後思修二是能行人能行但是自利能說即利他能持通二利言受持者金云從他聞曰受自心記録曰持披之曰讀暗詠稱折理曰開演傳文曰書寫餘易知也言此舉易等者通妨問既十種皆法師何故經文但言六種耶答疏言此舉易行等章敬云但是舉六例顯餘四不爾絶他聽聞豈難於開演諷誦耶言於經卷云等問何故前五法師行即說於經一偈後供養行說於經一卷偈與卷但不離經何故前五行即言一偈供養乃云一卷豈於一偈而不供養耶答疏言於經卷等牒也正答疏互影故等意言前於一偈向上書寫受持影取一卷向上五能書寫受持後於一卷向上供養影取一偈向上亦能供養又於一偈書寫受持影取兼能供養一卷供養一卷之時影取兼能受持一偈也言輕重異者供養一卷心重舉重處說且一卷一偈供養恐生輕心故不說一卷即重故偏言之若敬法者下至一偈亦不惜身命如半偈捨身等今說初學無隨心說一偈難發供養心故故言卷也言計位觀因者經言當知是人已曾供養十萬億佛既能於法華經一偈一卷向上必是初地已上菩薩名計位也觀因者過去已曾供養十萬億諸佛若論供養一佛尚自生於淨土況供養十萬億佛耶計此多生供養佛因位成就大願不合於穢土生合生彌勒內院及西方淨土以悲願願度衆生生此人間也言顯是勝因者即是彼修行法行人必得作佛言深佛等者解經言應以如來供養而供養之有二義一云以者諸人不合供養唯佛身等文聞子建恨不殺身二云應以者用也供養佛總以供養此人得受何以妙達理故言能說此經等者聖位菩薩也不爾如何經言當知此人是大菩薩言或即凡夫等者第二解也初修十信已前者名新發意菩薩之名通三乘有凡夫初修及二乘人但名菩薩不得名大菩薩也凡夫久修名大菩薩成就發心菩薩簡異二乘及初學者故名大菩薩今既是學大乘者若非學大乘何能廣分別成就發心菩薩故言捨淨業果等者經言何況盡能種種供養等持經一句功德尚得如此應以如來供養而供養之何況一部盡能受持更加種種供養者據此持經之人合生淨土及諸天宮往彼處為持經故捨此諸淨業執生於惡世佛滅度後持法華經言智度論云等者問爭知他持經之人是大菩薩答疏言智度論等驗之即知也言如軍敗等者凡夫與魔戰劈在生死地善心若間斷如同於悶絶親族是諸佛六返長觀見妙法如鞭杖隱軫如發心日夜勤聽聞如於粥飯將息得平伏即是證菩薩言隱軫者即時俗之教律也言般若論者問何故聞大乘教心生殷重便得菩薩答以聞法勝故如般若論云福不趣菩提二能趣菩提者天親偈受持法及說不空於福德化度云福不能獨趣菩提兼智慧方能趣菩提故名二能趣菩提也若唯法華經福不趣菩提六能趣菩提即六法行福但感於有漏生死畢竟不實故不取福也引此意者為持及說證此經何況盡能持等也言非大菩薩者前經說言生此惡世而持經故知是大菩薩也非如四類聲聞請他方持經言初明五可尊重者意說於前六種法師中有五可尊敬事也言三業順佛等者即一說者為使經言竊為一人竊者私竊不為多人故言一人又不多說乃至一句當知是人則如來使一句尚為使何況於大衆中廣為人說諸抄問云何為一人說法即為佛使答若說乖正理縱為多人誠非佛使不因於此致出世故若也順正理善巧其說雖為一人實為佛使能令所化至究竟菩提故大般若五百六十七云前所說法隨順法相是名稱理若諸所說不相違法相與法相應能入平等顯現義理名巧便說由此故知非諸說法者皆不得名為使如志公和尚見都講唱經起立合掌雲法師講得天龍八部皆來聽受志公却笑云舉經一句便是佛勑法師講似韓盧咬狗蚤五度十度咬無一回著也言使者上呼史音同為者被也說者被佛使也然佛出世本意為去呼衆生說此一乘今者衆生順佛之心業順佛行莖音名為佛使史音語業順佛行名為佛遣身業順佛行名為行佛事也三業皆順使故經中使遣事三字並屬於佛也下偈中言我遣在人中行於如來事疏意三業即屬衆生此說好言又傳佛語者第二解也意言傳教之人是佛之佛人與佛傳語也為字平音此乃與佛傳名佛使能用佛遣遣交來行同於佛名行佛事疏中二解皆三業順佛也言毀者罪過佛者經言若有惡人等者不善心者意業也於一劫中時長遠也現於佛前身業也常毀罵佛語業也三業長時罵佛其罪尚輕若惡人唯用語業暫時罵經之人其罪甚重言惡世損多者若有出家持此經時若被惡人毀罵即退心種種惡名損多也言大集經等者疏中從淺至深解經中說有一比丘不是持經人乃是破比丘也出佛身血罪輕罵此破戒比丘罪即重此法華經毀罵佛即罪輕毀持經人罪重今舉不持經戒上爾況復持戒罪不可說之也言若損害佛等者問何故詈佛罪輕罵持經人罪重答疏云若損害等已下四重解且初不損二利者如人拳頭打樹木拳頭自痛樹木不痛衆生罵佛衆生自得罪佛元來二利不損緣佛自利滿足無可毀處又利他行毀譽不動如須彌毀與讚嘆元來是一所以毀罵佛罪輕凡夫毀罵不肯持經自利行失又令他人不得聞經利他行所毀罵得罪重也言佛無愛憎者二義也佛住三念怨親平等雖復被毀不妨正化故毀之罪輕凡夫未離愛憎若逢毀呰心即退悔不能持經經既不持無由作佛以斷三寶種故罪重也言又罵佛為難三義也且見佛金色三十二相天龍八部圍繞發言罵詈此事甚難故說罪輕若毀罵持經凡夫要罵即罵此事易故所以重誡令其勿作故說其罪過於罵佛也言又佛在時者四勝劣義也佛在時衆生根勝有人罵佛餘人聞之不信知是毀謗不退善心但損自身不損他人所以罪輕若佛滅後衆生根鈍有人罵持經者餘人聞已皆悉退善心即能罵之人自他俱損所以得罪甚重也言大法光明者佛為衆生說法名大法光明今滅菩提心便是滅大光明也言過五無間等者五無間逆中不毀壞一切佛法所以言過此毀謗佛法五無間中攝不得罪過更重此約三乘通逆說也若大乘別逆無間業中有謗大乘經業若依小乘五逆煞父等五但大乘一逆收設有破壞小法罪亦可轉減若毀大乘能弘經人法亦隨絶故罪重也言又佛滅後者惡世中人不肯持經設有持難得所以毀者過於罵佛言讀誦佛莊嚴者問早晚得佛莊嚴答有二外一者現在持法華經便具佛莊嚴佛身莊嚴功德皆在此經能持之人受持佛身功德便是具佛莊嚴相好也約此現在也二約當來今生持法華經當來具三十二相八十種好名得佛身功德莊嚴也經言則為如來肩所荷擔者一平音呼為由被也二平音呼為由作也上經言勝鬘經說者依勝鬘去音為由上也經言攝受正法善男子堪能荷負四種重任唯有大地持四重擔也四種衆生唯佛教化餘人教化不得發二乘心取二乘果發大乘心取大乘佛果菩提此解如來與衆生作擔般運四乘衆生各取自乘果如來為衆生作擔故言則為如來為由與也持法華經人與如來擔言不但持經者能擔四生我未持經前交如來作擔般運於我我今持經報上如來劬勞敢身得法華經為擔替如來般運四乘衆生送至佛果菩提上依勝鬘解說訖歟言亦為佛肩之所荷擔者依當經解也初平呼為由被也佛將持法華人向佛自家肩上坐著名則為如來肩所荷擔也佛身在法華經教下法華經詮二利行法華經是能詮二利行是所詮二利行便是如來兩肩如來二利行是兩肩是所詮故在下法華經是能詮故在上又經是所持在下人是能持經之人將心緣教印持教法決定似向佛肩上坐猶如父母拾子坐向肩上著不嫌臰也此同勝鬘經中去音呼言佛所重者出所以也問將衆生肩上荷負是意也答疏言佛所重等言作義者第二解也即是為平音呼為由為由作也佛作擔即作如來肩所荷衆生肩上荷擔如來持法華經人一能自持二為他人說即是二利之心便是衆生自家兩肩二利心上安立佛果菩提似佛身衆生肩上坐相似因能得果名肩上荷擔如來或衆生二利心是兩肩也心是兩肩也心持法華經教教能詮理受持能詮教時帶得所詮所詮理中三身如來功德坐在教中也持經者心專注文義如坐佛向肩上著相似前解約教二解約教二解皆善後說勝前言荷擔大菩提者即佛身也言四在處應讚禮者持經之人人勝也應合隨方敬禮如見白象駝徑無問道俗皆悉禮象也今向上禮者禮其身中經也言四事供養者房舍飲食臥具衣服醫藥也言真實福田者問羅漢之人乃名應供前三果人上名舉債凡夫持經豈成真實福田耶答持經之人與佛不殊堪受供養豈以小乘而相比擬經言人中上供者上好精華飲食名上供也經言應持天寶等者天供養也言為撰者亦是撰集之義也言此釋所以者何都徵向前五唱經文何以持經得佛功德莊嚴何以持經得佛肩之所荷擔乃至天上寶聚應以奉獻何以在處應讚禮答緣是人歡喜說法不要長時聽受須臾間聞之即得阿耨菩提所以持經人勝故得佛功德莊嚴如來肩上荷負人天等種種供養也言此法華最深密等者緣前來經文頻告藥王又下經言今告汝我所說諸經而於此經中法華最第一乃至不可分布妄授與人又藥王品言藥王以此妙法華經付屬於汝問此經即不付阿難如何交他結集得成如是我聞義也答結集藏記持憶念即得若教應根說教用毒為藥即不解所以不付阿難也交持此經化聲聞故付菩薩言譬如用毒等者涅槃經言亦名甘露亦名毒藥此經亦復如是若能受持滅其重罪即如甘露毀謗即墮無間地獄即名毒藥雪山有草牛喫著成乳蛇喫成毒如水能運舟亦能覆舟言契真理者問說法何故歡喜答緣說法人言契真理故歡喜自得果故歡喜又合他人聞合地得果故歡喜也問此唱無藥王言何言付藥王答下經言佛告藥王菩薩摩訶薩我所說經典無量千億已說今說當說即是付也言總敘法師者即別對佛前及不對佛前故言總也言初一頌得任運智者經言若欲住佛道二句者古經論言自然智新經論云任運智外道宗我自然故為簡此外道故言任運智也言自然智者即二空真理智也智之性故名自然智理性本有不從修生今由持經及供養任運得名自然也言後一頌得真等者經言一切種智慧即智相此分二智一切種智後得智慧之一字是根本智此二頌經文前行供養持經人得自然智明知亦得一切種智慧若後行中明自持經及供養他持經者得一切種智慧明知亦得自然智也糅云前行自然智是根本智後行一切種智慧是後得智前解善言分為二智者即一句經分成二智也言於自然智者但歡供養持經人若更自受持得之何惑也言初頌佛使者經言若有能受持等一頌謨云此頌別敘師德不述長行長行佛使後文自有頌述也言次頌捨淨土者長行云當知是人自捨清淨業報於我滅度後慜衆生故生於惡世廣演此經今頌云諸有能受持一頌等言後頌隨願自在者經言當知是人一頌中開出也意言十念成就同九品以往生持八戒齊唯到龍華三會若持法華經得自在受生也言一頌重說法者長行經云應持天寶而以散之天上寶聚應以奉獻今頌云應以天華香一頌是此述長行第四段中事供養言若有戒足雖等者問說法法師有戒供養得福若破戒法師供養得福否答疏言若有戒是等問何不將人間寶供養答即輕不堪用故天上衆寶而為一聚而供養之顯重於經也言一頌勸敬者述前在處應敬禮長行經言隨所至方應隨向禮一心合掌今頌云吾滅後惡世一頌等言一頌供養者長行經言所以者何是人歡喜說法須臾聞之即得究竟阿耨多等今頌云上饌衆甘美一頌等言一頌佛使者長行經言若是善男子善女人我滅度後能竊為一人說法華經乃至一句當知是人則如來使如來所遣行如來事何況大衆中廣為人說今頌云若能於後世一頌等言初二頌挍量罪者長行經言藥王若有惡人以不善心於一劫中現於佛前常毀罵佛其罪尚輕若人以一惡言毀呰在家出家讀誦法華經者其罪甚重今頌云若於一劫中二頌等言讚佛易等者問何故讚嘆佛利益少讚勸持經人功德多耶答疏言讚佛易等讚佛易容心輕利少若讚持經者有怨憎故能讚之者稍難故心重故利多言自他有多少等者讚佛唯得自利功德毀時已不滅讚時亦不增但是讚佛人自家得功德也若讚持經人二利功德多持經者身中功德日日增長自利也傍人聞經功德增長名利他也言此以聞法挍量者經言於八十億劫等者以財供養福德劣於須臾聞之經經功德即是法供養也問讚受持經豈不增執法病耶答依言起執諸教共呵假喻詮旨衆聖同許誰人入不由戶故菩薩藏經言如人入暗室覆蔽終難見雖有衆色像非明不能見諸有人內具諸明解不聞於正法善惡何能曉多聞能解了多聞不造惡多聞捨無義多聞得涅槃善既增長聞了能增長慧慧能證清淨也言大段顯法勝等者經言藥王今告汝我所說諸經而於此經中法華最第一緣上句有諸字下句便改作此字言此經即是指經也大有人難此經文問此頌文勢乍似述法法師如何明人法師處說法法師耶答因法故方顯人法師所以疏言顯法勝故人成可尊言初法難信解者經言我所說經典至難勝解者世尊道我四十年來所說經典無量千萬億已說者安圓云今生鹿園成道已後靈山會前總名已說靈山會上說無量義及法華等總經世尊長夜守護從昔已來未曾顯說十六王子時亦說二萬佛時亦說只是從昔四十年前未曾顯說四十年前賴知不說憐到靈山會上便有五千之人拂席起去我上爾況佛滅後也言此明由法其人者經言藥王當知如來滅後等者為字去音訓與也今既受持六種法師總是如來真子方得衣覆不唯空釋迦佛兼得他現在諸佛護念故經了言柔和忍辱者慚愧為衣服有二義一御捍風霜二遮形醜故名為衣柔和故三業皆柔外離粗獷嗔拳不折笑面惡境不也忍辱有二一耐怨害忍惡事能容安受苦忍忍受寒熱毀罵等境有此御捍之義名衣有慚愧故羞恥過罪能遮形醜名內有忍辱故遮毀辱之風霜名外也問持經之人自具柔和慚愧何名佛以衣覆之耶答柔和忍辱慚愧是佛佛身上功德功德具在經中佛教衆生持經得佛功德因佛與故亦名為與言二佛護念等者問持經人因何得佛衣覆又得他方佛護念耶答疏言三有大信三歸五戒得人身果信十善八戒得生天果信行六種法師修行法華經得成佛果及志願力也志力者誓求佛果形枯命消修不退轉言有善根者善根力也即信進念定慧也或無貪等也言佛共宿等者嘉祥云一乘之理是佛栖止之處弘經之人亦住其中故言共宿又慈悲名舍者悲心是佛住名宿能持經人有慈悲與佛同住慈悲故名共宿或持經人與如來同住大乘教舍故言共宿章敬云慈悲心即是法華經利他舍思空勝義舍維摩經自利舍也言佛教被心者衆生心為頭也教是如來手教被於心如手摩頭也言佛所記別者依維摩解也記別即攝受攝受事須摩頭摩頭即是受記故攝受義解摩頭經言則為如來為為字平聲呼訓為得也言標中有五處等者經言藥王在在處處等者謂三世處處即十方若說處若讀處乃至住名今說此散席已後直至金棺掩後總名當說金云從十六王子二萬佛時至今生以前名已說今生鹿野後至涅槃會名今說當來無量百千返身更說經名當說於此二種三時之中此法華經最為難信難解言令捨權以等者問此經有何道理獨名難信難解答疏言令捨權以等長者宅內唱三車出門唯得牛車說三不得三說三唯得一法華會前大小乘法其意易信法華會後三一已會其義難解莫若此經初開方便之門後示真實之相說昔三而為一轉舊果為今因彼法難排此道難進理難信解故故言難信解也言無生而有生者二乘無學諸惑巳已得無生知苦集都盡不能招生感果故名無生今令二乘捨權就實回心向大更有一重變易生死趣三大劫生名為有生世尊四十年來向他說我生已盡不受後有誰知更有生死如似燋生牙揚枯生荑枯木生華寒灰再暖烏頭帶白故難信難解道理幽玄繞三乘為一會昔果為今因迂會方證三生六十劫或四生一百劫修行方得小乘又回心向大經八六四二萬十千劫至十信初心然後經三大劫修行方至佛果故名難信解也或可難信約教理幽玄也難解約證入真理親得之貌即是顯一大劫方證故故言難解解證入也言下勿妄宣傳等者世尊告藥王此經是諸佛祕要之藏祕者祕密如王幽印五千在座即不說謂之祕三乘總統為一乘謂之要包真攝俗蘊實籠權謂之藏譬如輪王妙寶不可以呈示於凡庶之人謂之祕藏含藏法身報身有為無為萬德藏祕藏也經言不可分布妄授等者誡令揀擇根性也不得與鈍根人說須是利根人智慧者求佛道乃可為說佛言佛常自守等者如律師瓶鉢杖等過與童子小師唯有三衣隨身自持也不妨有教空教還令聲聞緣覺唯有妙蓮華處等皆應起七寶塔塔成之後不須復安舍利但著經卷何以故此中以有如來全身舍利全身舍利不是碎身指節等言十法行中等者問十法行處何不總說唯說行四行也答疏言十法行中等四處是行餘六法行處也問何故處有五處及至與十法行對勘即四處不言經卷住處耶答住處不是十法行十法行中無經卷住處也言明理智二等者解經全身舍利也一唯法身名全二唯報身亦名全今法報二身雙具名全上名標也言由此返照等者返明前義也意明今此讀誦經卷等處即有法報二身之舍利也理事皆攝盡也言是以佛教造等者佛教書偈也問所詮理既法身舍利未審能詮教得名舍利不答舍利有二一者法身舍利二者偈法舍利今此引偈證法身舍利故浴像功德云爾時世尊為清淨慧菩薩說舍利有二種一者身骨舍利二者法偈舍利即說偈言諸法從緣起苦諦如來說是因集諦彼法因緣盡滅諦是大沙門說道諦路府問今言書偈即合書本無生滅偈何故書諸法從生等四諦耶答意取四諦中滅諦理以證法身舍利言無量義者此上浴像無量義二經證法身名舍利也言准金光明者最勝王經證法身舍利喚如來智為法身是即四智菩提名法身化度云雙證也如來智即能證智報身也如來即法身也言由此人成法師等者人近勝法人成其德也經言若人得見此塔等者便是將心趣向漸漸近塔當知是人阿耨菩提即是漸漸近十信菩薩也言見聞此經善行等者經言藥王若有人在家出家等者若是入劫已去修菩薩道依聞思修修行是正修所修是加行善出世善不依三慧修行縱得善是福分福分善望佛果菩提未是正修也故名未善行菩薩道此是聞經得入十信依聞思修三慧修行望佛果菩提為正因也言故知說思等者即是三慧名正因也三慧中若真取聞慧由未是正因不名善行兼取思修方名善行又云受持餘經不名善行受持此經法華方名善行言若聞是等者經言其有衆生求佛至菩提者紀國云若見者目金文為之見若聞者耳聽王響謂之聞信者審教決定解者於理通達名解解已即能受持也經言得近菩提是初地菩薩言此喻也者經言藥王譬如有人者求佛道人也於生死中被苦火所逼所以稱偈疲極道長所以稱乏既乏偈所以求水水是佛性清淨涅槃不死之甘露也言高原者紀國云二乘教為原去水遠故法華經教如下澤以近水故章敬云佛法為高原外道教為平川此解但依地之高下不就水之淺不爾平川翻為近水疏意總望三乘佛法名高原出過外道教及生死之地也如世間穿井事須得作具此經亦爾欲擬穿三乘佛法高原事須得妙慧為先三業為作具身業供養口業讚嘆意業思惟初穿著乾土去水甚遠全無水勢分次穿至濕漸漸近水經言施功不已轉見濕土二乘中間著大般若空教名施功不已空教大乘含於空理漸漸有佛性水之勢分如轉見濕土後穿到泥泥中有水水從泥裏得如聞法華經教教中有佛性水教如泥水如佛性穿井若到泥泥中必得水若聞法華經決定得菩提所以經言聞已信解受持者當知是近阿耨等消經言論云喻性者即法華論也言初地菩提者問佛性菩提五種菩提是何菩提答疏言初地菩提也言高原者水出高原所以穿之言廣平曰原者亦洲名在漢平縣高而廣平曰原也言出過衆道者外道之教名衆道佛法出過之上名先也言難可登陟者即是難可升進說為高原也言外道之教者即平川之內出高原即於外道生死法中立佛法離三界外無施化處故如原此不離平川也言鑿者鏨也者蠶音同亦云鏨鑱去音若取鏨音即是能造作之具䥫橛子若取所穿鑿即須鏨蠶音呼所穿鑿之孔穴名鏨今取所穿為正言以妙慧為先等者問欲擬穿鑒用何法為先耶答疏言以妙慧為先等者問欲擬穿鑿用何法為先耶答疏言以妙慧為先等身業恭敬供養口業稱讚大乘意業思擇法義此三業名作具簡擇推求即正是妙慧穿鑿之義精進是鑿刃刃頭利若銅鑿必得水三業有精進所行所悉皆成也言二利不息者問如何二乘有二利行答分有也更聞般若漸行二利論云受持此經得佛性水此顯乾土是濕土因濕土是泥因泥是水因二乘有教是空教因空教與中道大乘為因也言空教為疏者將大乘理智佛果菩提名新乘有教是空教因名疏也言此標也等者合說也經言菩薩亦復如是等者即合得乏之人也未聞者未得之未解者未思之未能修習者未修之聞法華但聞小教是人去佛道尚遠言此釋所由等者徵前唱意何故未思惟修習去菩提遠何故思惟修習去菩提近耶答緣一切菩薩阿耨菩提法皆屬此經若果若理若事菩提涅槃一切總有故言皆屬也此經言開方便門者於一乘道隨宜說三名開方便門雖示真實相雖示種種道其實為一乘故名示真實相是法華經藏者能詮也深固幽遠者三無數劫修得來故言深而復遠也言無人能到者二乘不知菩薩不測也言而為開示者為字去音為由與也言有近正因等者解經言皆屬此經也謨云一乘教理行果四法中教行果為因近因教為遠因謗因也即是大門中正門若人天及二乘教理行果回心向大並與佛果菩提為遠因傍因也即是大門中正門若人天及二乘教理行果回心向大並與佛果菩提為遠因傍因也即是側門小門言五種智即性相境伴因也言由經得故等者一乘教行也此經攝故者二乘教行也二乘教行但是經攝不是佛果正因也言開方便門者即攝遠因傍因昔說二乘教理行果言顯真實相者即攝近因正因言今說一乘等者一切權實道理此皆攝盡也言又深固等者解經藏幽遠也一切菩薩定性不定性頓悟權教佛所藏祕也言如王齒印者阿育經說無憂王太子號法益後母憎嫉於王讒說遂擯他國其王將齒為印書遂語子若得我齒印即真信如無齒印非是我書王使齒印以付王子即便令出王子去後後母憎心猶百未阿便伺侯王睡單取王齒大少齊等作印印盡令遣排出王子眼睛將歸王子得敕便排眼睛付分使人廣說如經齒印非餘人物今顯法華經唯佛有也言幽遠者入劫修因名妙智證故名幽也言聞經驚疑新學見慢者此科文意總據實令別云新學驚疑聲聞具慢也言初聞便驚等者菩薩聲聞總疑於中行相各別菩薩聞之思起疑惑聲聞聞之起增上慢此兩類盡是凡夫也性於修行名怖畏也言未入三位者有云未入三僧祇劫位惑未入十住十行十回向三賢位惑未入大乘各三位大乘三賢位小五停心觀別相今觀名三位也中意只是未入三乘位增上慢人未入小乘位小菩薩未入大乘位盡是十信已前凡夫此唱經中兩介為字訓作也是也言此問也者經言藥王若有善男至云何應說者世尊共藥王菩薩商量我在世不要汝憂我若滅度汝將法華經為他人說如何交他修行言初標者經中答云是善男子善女人入如來室斯經也言此釋也者又被藥王問言云何名如來室佛答藥王言如來室者一切衆生大慈悲心是等言恆常安處等者解室義也佛以慈悲心名室佛心栖止慈悲也言維摩經云等者對明同異維摩以真如理為舍智安處故自利舍也維摩經言慈悲心為女生父家不紹父族出嫁異性生子紹宗菩薩慧悲亦復如是生無明家棄無明族嫁如來家受佛護念繼如來種也言此明於事者即指此品此也明於事事上說語以覆陰衆生究竟安處慈悲為舍即利他舍也言前第二卷者將法師品與窮子喻品辨同異也彼信解品盡是教舍空教大乘城中道大乘為舍舍在城裏中道在空教之內故名中外相以對城立舍也此品以慈心是行舍衆生持經事須先起慈名入如來室疏云中外相形者前慧悲外舍故以中道為內舍此以慈悲外利他故形中道理名外也言心行調順堪等者解衣義也柔和者心行調順忍辱者堪耐勞怨害由忍辱故苦逼能受言外物不假者由安彼忍外違順境不能動故故言不得也言耐怨害等者由柔和故配耐怨害忍故配安受苦忍也化度云耐怨害以無嗔為體安受苦忍以精進為體又耐怨害忍對人境安受苦忍對總境寒熱等衣則能御寒熱由三業柔和忍辱御得毀罵之風霜故喻如衣服言崇賢善根等者問無垢稱經慚愧為衣服此經何故不取答彼是三乘人通行故慚愧為衣服崇重賢善拒惡法也此經是大乘人別行也取和忍辱為衣服也言又柔和之體者即慚愧故慚愧是體兩柔和是用先由有慚愧後方起柔和後解兩法不別言安身心於空境等者解安坐義也經言如來座者一切法空是修六度時教化說法時而觀三事都無所有不見自身為能化不見所度有情不見中間有所說法三事皆空名莽然莾然者曠蕩虗六升無礙之貌即是二空理也莾音摸朗反廣大貌也言維摩以四靜慮等者維摩經以四禪定為床約智所依處智所生處以四禪定為床此經約智所緣智所依以法空為床言大慈悲即有者此結前慈悲心為室夫慈悲度衆生事須當情觀衆生作有然後拔苦與樂也言衣座二空觀者柔和忍辱衣事須不見有衆生當情觀衆生作空方能忍得安國云衣是生空座是法空二種別也問衣鉢如何言空答若不觀空怨親相立無由起忍故今作空觀二忍乃成問大慈悲有觀衣座即空即此皆空慈悲寧有答意顯有空雙運不唯著空若不觀有當何度又復小執故名空不妄法體故名有但除其執也言一令化人等者世尊告藥王汝與我依前三種觀門流通此經莫愁聽人若也無聽我於餘國遣化人聽來亦遣四衆聽來亦遣天龍八部來聽言此令得見及不妄者世尊告藥王審知與聽我亦數數看汝來一則數數見我身二則令汝向人天大衆中說法忽有忘失句逗文字呼喚不著我還教汝令得具足逗音徒鬪反逗留也亦是住止義竇人姓也亦是繹義亦音尋繹之義姓捨繩頭繹至於繩尾呼繹亦竇切云繹者理也簡要云繹者謂句尋繹諸義理故呼句為竇也經中作逗字為正說文逗音又句反亦有疏言說文云句也言此初也者初一頌述難信解長行經言爾時佛復告藥王我所說經典無量千萬億已說今說當說而於其中此法華經最為難信解藥王此經是諸佛祕要之藏不可分布妄受與人今頌云欲捨諸懈怠一行等乍觀文勢似聽法華經是捨懈怠緣也由聽法華經方捨得懈怠今此義也若有人欲捨懈怠聽經去應交莫聽餘經事須聽法華經問何以故答出所以一緣此經中說精進與懈怠人想應二緣是經難得聞信受者亦難言一頌半喻者長行經言譬如有人渴乏須水於彼高原穿鑿求之猶見乾土知水上遠施功不已遂漸至泥其心決定知水必近今頌云如人渴須水一行半等頌中准加燥字餘文同言此二頌半合等長行經言菩薩亦復如是若未聞未解未能修習是法華經當知是人去阿耨菩提上遠若得聞解思惟修習必知得近阿耨菩提今頌云藥王當知二行半等言此初有二者一頌半標教長行經云是善男子善女人入如來室著如來衣坐如來座爾乃應為四衆廣說斯經今頌云若人說此經一行半是言一頌釋之者長行經言如來室者一切衆生大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是今頌云大慈悲為室一行是言此初二也者初一頌行忍者經言若說此經時一行是次三頌明我在餘國令化四衆供養聽法者長行經言亦遣化比丘尼等聽其說法今頌云我千萬億土現淨堅固身三行是問遣化人為聽法集衆有何所以答略有三意一供養法師二引實人三護法師罣礙者盡音字書云網礙也若作卦音錯也寶塔品言論為除三種等者所治之病但是無煩惱人是羅漢身此身中於三種法上而起染慢故合名三種染慢也法華會前未回心不名染是無記性回心已去名染此染慢體是所知障言三慢者一信種種者加信化城不滅羊鹿實登三乘五乘有差別技其實理乘體有異所以藥草喻品破執乘同然於經宗即不符順若言實有三乘異者如何二乘聲聞二乘總得授記成佛故知唯取一乘無三乘五乘差別也言二信生死涅槃者二乘之人厭苦欣涅槃執生死喧囂涅槃寂靜執此二異定不平等佛觀生死涅槃本來平等若不平等如何多寶如來已出生死却入涅槃已成得涅槃不合却入生死故知離世間外無別異離苦外無別世間喧寂不二故言平等言三信彼此身等者此佛不是彼佛彼佛不是此佛為此說身平等多究證經來攝總證經來表佛身平等也言一乘平等者下明能救之方也如前已說即指前但是與聲聞授記總名已說唯有大乘無二乘故言二為除信生死等者有抄云指兩佛同塔坐釋迦現在佛多寶入涅槃佛二佛同塔坐死涅槃平等此解正是身平等若向釋迦身說生死涅槃平等即似損減佛法疏主所以指文處別爾時佛前有七寶塔從地涌住在空中證涅槃此文是意言若涅槃與世間別者入涅槃已不應現身故知離世間外無別涅槃涅槃同世間作寂世間涅槃作喧喧寂不二故意遣執別之心即法執故遣彼此是非也今言平等故破執也若執二別即滯生死及二乘也顯不信意也言三為除彼此身等者此中兩義初約多寶望分身且粗依多寶佛解身平等故不多佛證經多寶佛證耶答多寶佛一身即攝一切佛身以法性真如同故此佛他佛若法身理別不妨多寶與諸佛別所依法性平等無二故多寶一佛攝一切佛來時十方佛總來論云略者一佛證經攝一切佛名略此論文不是此間解身平等文乃是清淨國土十義中第一義也上論文言又顯自他身等者第二解望分身解即言分身即是釋迦佛一佛分出十方分身佛十方分身佛即是釋迦身平等自他者涅槃疏言又顯自他身者差別故此二句論文即第九同座言十方分身等者疏解也即第六義無量佛亦攝第八多寶下言表三身佛皆為成一大事亦表三乘同坐一乘床也言由後二義者即是二平等十無上也上來三平等來意言二者論云者論家以十無上為來意十無中第五示現清淨國土第一寶塔名為清淨國土第二所見清淨世界為清淨土第三所變淨土論為清淨國土第二所見清淨世界為清淨土第三所變淨土論家意有此三諸抄唯引變土為淨土則引文不盡問三種文在何處答疏言二者論云十無上中第五示清淨至多寶如來塔此塔為淨土文二後多寶塔涌分身至頗梨為地證所見淨土三從又佛變八方至那由他國為淨證所變土也言佛放一光者一解不說此方清淨乃是東方因佛光明顯彼淨相令回心二乘欣清淨土故速令持經故言又佛變八方等者第二解也淨䨱穢令見清淨故由前義故故有四類聲聞清他方持故由後義故屬菩薩彼此俱持故言示佛國淨土等者疏主解也問何處變淨土答有所表也示現佛國淨顯今法勝不唯空向穢土說亦於淨土佛國以施化表法華經通淨土說利益大故故現淨土也言佛國由來清淨等者意顯釋迦如來大居家是淨土無有佛合處居穢土者為教化衆生示現有穢土無垢稱經云舍利弗我佛土常淨若此謂欲度斯下劣人故示是衆惡不淨土耳問既若教化衆生示現居穢土今何以變作淨土答今變淨土者復他如來來本土之相故言由來清淨故此品來也言此為義殘者若望生死涅槃平等說此清淨國土無上是文殘也若望身平等說此清淨國土無上即是義殘也本來破身異以分身佛總釋迦一身為顯身平等所以召分身佛不可交他方佛向穢處坐事須變清淨土變土只為座佛座佛方變淨土所以變淨土攝屬能變佛身故向身等中收但知坐却客佛便是變土家事了於中文攝屬身平等向下顯得一分清淨國土形對二乘得名無上身平等家取不著故名義殘問變土為復屬分身復屬釋迦本來答若變土只為近賓近賓變淨土淨土自是主人之禮所以變土攝屬主變收望釋迦佛身平等也或可望生死涅槃平等說清淨國土亦是義殘也寶塔向上衆寶莊嚴名清淨國土唯是義殘塔涌住空文是生死涅槃平等望此生死涅槃平等文說清淨國土無上即是義殘本來執生死涅槃不平等是病塔涌住空便是生死涅槃平等塔涌住空經文生死涅槃平等收向下有一分清淨國土無上義但顯法體尊高不能破病故名義殘也若准第五疏藥草喻等七品通或文義重說之故唯望身平等此間將清淨國土無上對生死涅槃平等說唯是文殘若望身平等無別文故即義殘問此既義殘文非屬此縱望全身不散無何以稱殘答清淨國土與身平等此文是同自望不別名義殘彼望文別名文殘如和上弟子同居一房弟子望和尚房非己房猶如義殘若望餘僧弟子即有房分同用此房故即如文殘也如毬救若論經文屬他塔涌住空破病處用也言今此品顯法可尊等者問既言必聽又說證經可信如何定實答經文聽證雖皆總有然多分取證經也若言聽本國早聽了今此到來意從命舉會人生信言智度論云有佛等者章敬云智度論是龍猛菩薩造彼論中言總意別古師嘉祥不會論意傳道總不說法疏主破云無請如何有衆既有四衆八部相隨必是說法度得也論意言總不說者不說法華經只緣不說法華經今日證法華若當日兼不說餘經餘經合總證餘經既不證不妨已曾說餘經說餘經時方度得衆生也言阿難傳經以同者即十五類人也言雖傳此解等者正破古師也汝古師雖傳此論文未不知是何意故名意旨難知必若解論意多寶無人請說者破云無請如何有衆彼佛臨滅度時告四衆曰應造一大塔既有人造塔即是有衆有衆即是說請有說必是有情無請如何有衆故不可也但是如來本願為重此經意勸衆人亦應須聽經言其佛行菩薩道時作大誓願若我成佛滅度之後於十方國土有說法華經處我之塔庿為聽是經故涌現其前為作證明讚言善哉又言聖主世尊等意說智論文總古人取意別故言難言知非行論文言無請下經言彼佛成道已臨滅度時於天人大衆中告諸比丘我滅度後欲供養我全身者應起一大塔故知而有說法不可言無但是願證法華也言佛體所居等者佛體者即全身舍利也意道有舍利名塔塔以衆珍可成名寶也塔以衆寶成故名寶塔故寶即是塔持業言或塔如前者即佛體所居名塔故言如前也寶即多寶佛名也多寶佛之塔故言依主言或多寶及塔二名俱舉者一則佛名多寶也塔又衆珍所成名多寶多寶佛不是塔多寶塔不是佛二名雙舉名相違也言見音者現音呼所現即寶塔持業也言見者又者見音呼覩也由塔上升衆人皆覩此能見不言所見即寶塔持業釋若依能見人說即寶塔之見依主又若據多寶佛說名現塔若望大衆說名見塔梵云達梨舍那此言見言依論此品者何故不名淨土品多寶塔品耶答疏言因塔等塔現為因衆人請開方便品分身變土從因而說言寶塔品也言答欲顯二乘者欲顯二乘未回心前令見穢土所以唯穢土說回心已名菩薩所以居乎淨土說也合居淨土故現淨也言初塔涌聞法證經者經言爾時寶塔中出大音聲歎言善哉善哉釋迦牟尼世尊能以平等大慧教菩薩法佛所護念妙法華經為大衆說如是如是釋迦牟尼世尊如所說者皆是真實言初塔涌印說等者問為復證已說了八品經為復證未說中流通分十九品經若言證已說經文又多寶不聞若證未說之經如何寶塔亦來便言如所說者是真實答將知八品正宗本國早已聞了故疏主通二勢科也此解長也問佛行位已滿何要聽經答一則菩薩行時發願常證經聽經今得成佛為令一切衆生住於信地所以涌塔聞法證經可信言後開塔等者經言即時一切衆會皆見多寶如來於寶塔中坐師子座全身不散如入禪定又聞其言善哉善哉釋迦牟尼佛快說是法華經我為聽是經故而來至此為令一切衆生敬信法華經所以涌塔印也為令一切衆生敬重法華經所以開塔聽也佛上如此況是餘人言初塔為證等者問若爾佛何不空身來更將塔來何也答空證理不證教空身來得今教理雙證何妨與塔同來教即如塔理即如身教能含理如塔藏身理自教生如從塔現言支提應現者有人解云疏主不合道支提應現支無舍利也亦云制多翻為靈庿皆無舍利也舊云塔婆新云窣堵波盡是有舍利也答疏主取大意科亦不妨支提通有舍利也言今此有初三者初標有塔二明分量三涌住經言爾時佛前有七寶至從地涌出者表出生死也住在空中一句表住涅槃故言生死平等言然論解十無上中第五等者是論主科此一品經為九段疏主都將論家九段科文來向此間先解一遍然後散在一品經中論家解經亦不有不依次第處也言一一切等者烈名總顯也言一佛土清淨者此第一所見淨土也論云示現諸佛寶相境界中種種珍寶錯莊嚴故此示現如來依種種莊嚴也正報即是內身依執即是外感言二塔者此塔即是淨土論云示現如來舍利住持故言解此塔現所由者問現塔有何所由答此寶塔品中說多寶如來全身在此塔內塔涌證教塔開證理名塔現所由也即經言有法華經處我之塔廟為聽法華經故涌現其前為作證明讚言善哉言三量者論說寶塔品中量有二種一上下量經言寶塔高妙五千由旬縱廣二百五十由旬言或所見淨土者論云多寶塔涌分身佛集佛放一光即東方五百萬億那由他恆河沙等國土諸佛彼諸國土皆以頗梨為地等言及十方各變量者娑婆世界及八方各變二百萬億那由他國皆令清淨此二俱是如來出世無漏善根所生有二一內身塔二外土相也言四略者論云多寶如來身一體示現攝取一切佛法身故問何不多佛證一佛證來耶答論云略若多佛總來攝一切佛身總來故名略即身平等佛身若不平等諸佛總合自來佛佛身既無差一佛即同多佛故言略也言五住持者論云示現諸佛如來法身自在力故言住持所由者問此與前塔現所由何別答前塔現所由約佛色身舍利在此塔中此間約法身舍利在此塔中此間將塔況經卷是法身舍利住持了處故言住持與前亦別也言六無量佛者論云示現彼此所作諸業無別故言佛集所由者問有何所由答示現一切佛所作事業同故示現無量佛同為一大事因緣所以釋迦召分身佛同開寶塔故名佛集所由言七遠離穢土不淨者論云示現一切諸佛國土平等清淨故即三變也問何要變土令淨耶答佛意示現一切國土本來清淨佛不合居穢土也今却復彼本來淨土相所以變土也問若爾何故娑婆世界高下不平有穢
