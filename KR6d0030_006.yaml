body:
  text: 鏡水沙門栖復集言無量義解蓮華等者謨云斥前教理師引傍教間為此經正教理也前第二師依論解無量義經十七名中第十六名妙法蓮華又第十四名宣說一乘即是此經同無量義故以彼蓮華解此蓮華也意言彼取教理名蓮華是傍對二乘得名此經正是回心是正蓮華何得以彼傍教理為此正教理也引彼經意證教理是傍非正也言出水有二義者且初義中出水有二義者一頓悟菩薩身中真如理性離小乘濁泥水縱有法執自是大乘法執本來不與二乘法執相應亦名出水如二人相隨一人入水從水中出名出水一人在岸本來不入水亦名出水二者漸悟菩薩身中法空真理雖與法執相應法執染不得亦名出水也所以名蓮華出水出水有二義者物不可盡有三解一者衆生識中無漏種子無始時來有至於今日乃至當來生果之時窮未來際名不可盡即不斷常二者唯依真理解體性凝然常住不變名不可盡即凝然常三者依化身取化身功德解以我此物周給一國猶尚不匱名不可盡也即相續常也今泛解不可盡三義中若依經宗取真如理解為正以彼經教下唯詮真理也意言此理性在三乘乃至三塗五趣此理體性常不變易故若頓能發大心修行便三乘成頓悟問若是先入二乘後方回心可名為出頓悟本來不入何名為出答雖未曾入性能出故名為出此解頓悟蓮華初時體出登地已上證遍行真如方顯用出也言後喻聲聞入衆等者如來本意為大菩薩說無量義會下有聲聞共菩薩一處坐名入大衆中坐顯彼依大乘教觀一乘理觀一乘理即真如理八萬菩薩隨衆生性欲故觀教理聲聞人知權實故觀教理此是無量義會下觀教理也言成漸悟故者即是法華會上回心向大成漸悟菩薩謂二乘人在無量義會下雖傍聞教理根未熟故至法華會上回心向大正名出華如彼無量義會下菩薩故云且如菩薩當坐蓮華也無量義會下正為菩薩說教理不正為聲聞說教理故指今法華會上捨權就實名當坐蓮華當猶將也經云今從世尊聞此法音心懷踊躍得未曾有安住實智中我定當作佛方是坐蓮華也言傍為二乘者問無量義經何故以彼教理二種而喻蓮華答疏言傍為二乘兼等何妨況蓮華也言或無量義經為菩薩說等者斥前無量義經菩薩蓮華是教理會同此經聲聞蓮華亦教理也亦是為菩薩說教理意或無量義經為菩薩說對衆生性以辨無量欲令菩薩以教理二逗生根故論解十七名中唯教理二以解蓮華有二解一菩薩自利行教理名蓮華二若約利他行說教理則名無量義又為頓悟小菩薩名蓮華及大菩薩文殊等則名無量義言此經化彼二乘等者今此正為聲聞故知行果以及蓮華為正章敬云置傍就正也意明正體且置傍兼故彼唯以教理此局行果也上斥菩薩蓮華會同此經蓮華以說言又復此經化等者定取四法為正亦云重褒四法師令知教權設三者教也理體唯一者理也褒教理發心修行者行也修成佛果者果也故四法得蓮華言教行並開敷等者問若以四法為蓮華者理稱出水教名開敷義當可爾行果云何答疏言教行並開敷等章敬問引經文證有四法教理行果並名法華此乃始自鹿園終于鶴樹凡所說法無非是妙案經通旨豈局斯經又如首唱二深正陳昔教引成今妙豈不相違答以此持餘餘方得妙妙中極矣故以題焉若局此經論四法者初三周說一乘之境此及理妙次文殊請說四安樂行妙壽量品以二種常身是為果妙三皆所顯必有能詮能詮之文即是教妙依斯而說經體顯矣疏但論有今則正陳也言若但以真如等者破紀國也章敬云紀國疏云法者持義軌義妙者為正為妙一乘宗極出離真如能持自體復軌於物內總衆德水外殄羣邪灾橫斷除故稱妙法言蓮華二義出水等者若蓮華向上只有出水一義任許法上唯取真如亦只有出水一義蓮華向上既有四義何故法唯有一義喻寬法狹理必不然路府云紀國兼取教理兩法總取一開敷二出水若爾取教理蓮華即與教理師一處破何要別破只緣唯取理不取教蓮華向上闕開敷疏主所以別破也路府劫難疏主疏主豈能勝他論主論主解蓮華尚自取教理疏主何故不取答論中教理蓮華自是解無量義經不解法華經蓮華也此經蓮華四法總取也疏主結自義云況論釋經非解於此也論家本來解無量義經蓮華蓮華具二義若將紀國對無量義經又二義之中闕開敷一義若將紀國對此經蓮華四義之中闕三義闕兩個教行開敷義闕一個果出水義也教行並開敷理果俱出水況論解無量義經蓮華非解此經蓮華言法即是妙等者此下離合得名支從唐三藏已來始有六離合釋已前大德隨情解義無馮據或云當體一義彰名或云就義為目或云隨能依立稱或云逐所依標號皆由翻譯之家不善方言遂率己情未為其據不免雜亂從三藏後來辨法體不相雜亂梵云煞三磨娑此云六離合釋梵云煞者六義磨娑云合也即名六合釋慈恩疏云更加離字意道釋名中先離後合解故名六離合釋磨音莫個反應為去音凡一個法一義為名不要六釋於中無雜亂只如菩提雖然字是兩個字義只是一個覺體所以不要六離合釋若言佛陀此云覺者便是兩個義便要六離合釋覺是慧義者是主義覺不是者者不是覺此名離釋若言有覺之者為覺者合釋也一者持業釋持謂任持自體業謂業用將用顯體體能持用名持業釋如言藏識識是體含藏是用攝含藏用就識藏即是識名持業釋如言增人人即是體增即是用體能持用名持業釋此中更分出同依釋兩個用同依一體名同依釋也如來後得智上有包弘廣大之用名大復有運載衆生之用名業一體之上持此二用名同依釋又云如言大乘具七義故形小名大運載行者名乘六度法體有此二用同依此體名同依釋一體一用但名持業二者依主釋依謂能依主謂法體能依之法就所依主法以立自名名依主如言眼識乃至意識識即為自眼即為他依彼眼根而能發識故名眼識或主者君主如王與臣臣依於主名依主亦名依士士謂士夫勝法依劣名依士三者有財釋財謂財物從自財物而立己稱如言富者不說自身但說財物名為財主如大乘阿毗達磨集論大乘對法論根本乃是佛經之名集通能集所集能集即論所集即經今以所集為名名有財釋此有二義一全取他名名有財如言菩薩依所求所度以立名也二分取他名如言他心智智能知他心名他心智也四者相違釋兩法名別兩義亦別雖然名義各別一處立一個名如言水火如言明暗等如瑜伽決擇分初云五識身相應意地者非此五識身地亦非以五識身地兩地各殊共立一稱二體各別名相違釋五者鄰近釋如念處觀同時身受心法且觀察是慧不是念由念與慧於前境上明記不忘同時念力教勝與念極相鄰近故說四念處不說於慧故名鄰近此通二種一依主釋鄰近如言念住觀相應實以慧為體思念令住得念住名二有財鄰近如言念性是慧非念以取他名名為念住名有財鄰近問有財與鄰近俱有用他得名兩釋何別答兩相有力名有財兩相無力為鄰近㽵法師云四念住多是有財亦通鄰近事中鄰近者如世間人問言君子是何處人答言余是東海人東海而不是人以近東海故舉海名名為鄰近也六者帶數釋帶謂狹帶數謂從一至十從十至百法體狹帶彼數而起故名帶數以數顯義如言百法等二十唯識廣百論三十唯識十二門論等問六釋八轉如何相攝答持業如言藏識是體聲藏能持種名業聲藏識執持緣境名具聲藏識為生前七名為聲藏識從種子生名從聲藏識屬第七是屬聲藏識依第七是依聲呼為藏識是呼聲依主中者如言眼識名體取色境名業能資根名具從第八生名從屬眼名屬為了色境名依言眼識名呼上略明六釋下銷疏文法即是妙者妙與法合解法是教理行果四法名法餘經皆有四法不得名妙此經中教有能敷妙理之功理有所敷出水之力四法體持此妙用離却體更無別用攝用就體故名持業言是蓮之華者第二句也問將華況妙法即得何要更著蓮字答以別簡通若空言華者餘華總是華桃華杏華亦是華未審此華是而誰家華答是蓮之華依主釋事須著蓮字簡也言亦可大法等者大法即是教理行果諸經總有大法未審此經大法是何誰家大法答是向上有妙用底大法妙是大法之家妙是依主釋此解有人續添疏主本來無也言妙法如蓮華亦持業者妙法是教理行果四法總名妙法如者相似義故言如蓮華古因明師只取喻依便是喻體眼所見底蓮華開合此是喻依此蓮華向上有開敷出水義此是喻體正取蓮華向上假功能今此妙法向上亦有開敷出水之義此開敷出水似彼蓮華向上開敷出水功能故言如蓮華今者攝彼妙法向上開敷出水義用就妙法體來兼帶得色塵蓮華向上開敷出水功能就法體來攝用就體名持業也問何因攝得池裏蓮華向上開敷出水功能就法體來成持業耶答若取色塵蓮華色是質礙法與心法一處不成持業今唯取池裏蓮華向上開敷出水假功能就心法一處來故成持業又妙法向上開敷出水義與池裏蓮華向上開敷出水義若不相似即不成持業也今妙法體上有開敷出水義一似池裏蓮華向上開敷出水義今攝妙法向上開敷出水妙用就法體來兼帶得池裏蓮華向上開敷出水假功能與妙法向上妙用相和就法體向上來攝用就體故成持業也言今此不欲別解蓮華者問何名不欲答若別解者恐用因明古師即將喻依便為喻體梵云達利瑟致案多達利瑟致云見案多云邊由此比況令宗成立究竟名邊他智解起照此宗極名之為見無著云立喻者謂已見邊與未見邊和合正說師子覺釋云謂已顯了分別名已見邊未所顯了分別名未見邊今順方言名之為喻未見邊是法已見邊是喻聲是喻聲是喻依無常是喻體今取喻體故非相違今此亦爾但取出水開敷不取蓮華質也如因明論對聲師立聲無常所作性因瓶盆為喻古師即以四塵瓶盆而為喻體若爾聲即無見有對瓶盆四塵即有見有對各別是相違釋今取瓶盆之上無常功能立所作而為喻體此之喻體於彼聲上和合而轉聲瓶既合即非相違疏主不同古師故此不相違解古人只將色塵蓮華為喻者色法心法一處說便是色法心法相違釋也以如來說經時將蓮華況妙法若作相違釋即合道妙法不是蓮華蓮華不是妙法此者一則違著佛意二則別解蓮華三則相違釋所以疏云今此不欲別解蓮華便不違佛意免相違釋免別解蓮華也言若理為妙等者問教理行果總名妙法如何偏說理為妙耶答只此理中含得理行果三法總是所詮理中攝也經但是教教即是名句文理是本教是末妙法蓮華是所詮理經是能詮教問一切經中皆有名句文未審此經是何誰家名句文喚作經答此是妙法蓮華四個字所詮理家名句文名經故言妙法蓮華之經依主釋永云若理為妙是主理通真理道理經但是其教教是客此教詮其妙理教依理得名名妙法蓮華經依主釋也言妙法是教經亦是教等者問教理行果四法總名妙法何故空言教耶答理因教顯所以將理就教說總名教也二妙法者是四法之中教妙法教即是何名經經者繩墨義攝持義此名經此經是他教妙法向上作用此即名句文是教是體也繩墨攝持是用是經妙法蓮華即經持業釋也言若妙法是理經亦是理等者問經是教如何言理答將教就理論教亦名理也據實經不是理是能詮教問何以喚教作理答教能詮理故教得理名如文字般若般若不是文字文字不是般若以能詮般若故名文字般若二者妙法是理真如理經但是教教從無相海中流出來教是真如向上用教亦得名理也三者前來顯時中為顯第三時真實之理教故說是法華此則教是能顯經是所顯七卷妙法蓮華經權實道理亦得名理妙法蓮華即經持業釋也言妙法是教經是理等者問尋常理勝教劣將理就教合名依士如何名依主答若約能生所生說理為能生教為所生理則勝教則劣將理就教名依士釋若約能詮所詮說教為能詮理為所詮教勝理劣將理就教云妙法蓮華之經依主釋永云妙法是教能詮教也經是理者即所詮理所詮理便名為經離所詮理無別經此所詮理所妙法能詮教家所詮之理故名依主也問前言妙法是理經從所詮可名理言妙法是教經依何義亦名為理答許有此此是相望得名也意言經為能詮妙法是所詮所詮從能詮亦名為教若不從能詮但可名理已言生因此理有生言教之業用言即能詮故名持業也教等者四法並屬所詮是所說故故名為理如言講經經即所詮也言依順體義等者辨得名所依也依順體義以立經名依處中因以立經名依出世報以立經名問疏主解經得名次第忽然說依順體義等是何意答疏主意緣此間解經得名皆依教理行果向上立名也內外教典皆有教理行果顯佛法之中教理行果與外道并儒教不同故此明也宗輪論云對彼外道典籍故於教理行果向上一一各分三種且教有三種者第一無量義言教如外道說吠陀論婆羅門諷之音聲清切甚自愛樂若尋其義都無理趣論偈云我已飲甘露成就不死藥實非免死非尋其語趣都無意義也二者邪妄言教如九十五種外道亦說因果但明邪倒二十五諦之教說煞生無罪是也三者如法言教如佛說因果道理苦集為世間因果滅道是出世因果道理相稱不相乖返名如法言教也理有三種者一者增益義如諸外道橫計薀中無我計有我也二者損減義如諸外道七斷滅等依圓是有却說於無是損減義也三者順體義如佛說法有處說有如依圓無處說無如遍計離斷離常故名順體義行有三者一者順世間因如世間人事君盡忠事父母盡孝名順世間因二邪辟因者外道鞭椓臥棘五熱炙身妄計雞狗戒禁等名邪僻因三者處中因行離苦樂二邊修不苦不樂行名處中因也果有三種一者諂詐果如世間人求官職曲順王命以取榮祿二虗妄果外道計無想天以為涅槃三出世果者如佛法能令衆生出於生死證涅槃樂由依教理行果有邪正故立如是名令捨邪歸正問何要依人依法依喻以立其名答依人立經名者令修六和敬故依法者令知了不了義諸大法故依喻者由根利鈍故凡是經教立名莫過九種一依順體義立經名者如十二因緣經二處中因立名者如十地經本行經是三出世報者如大般涅槃經是也四依人者如提謂經維摩經長爪梵志經五依法如解深密經無量義經六依喻百喻經枯樹經象跡等經七依人法如勝天王般若八依人依喻如佛藏經等九依法喻得名如妙法蓮花相國云今此妙法二字蓮花二字是喻問以何為妙法答教理行果是量云教理行果是有法定微妙故宗因云出水開敷故同喻云如蓮華此量不成因中有不定過出水於教行上不通開敷復別理果上不轉若約教行二種向上轉即共出水義若約理果二種即失開敷若爾即云因之出水故既言出水意道教行二是能出理果二是所生若爾因中還有不定過出水義即成為出何者妙法事須出有漏粗法始成妙今但言出為出何者為出理為出教若有過即言量云教行二種是有法定微妙故宗因云開敷故同喻如蓮華蓮華能開敷見臺實故得最妙教行能開敷證理同彼蓮華得最妙量云理果二種是有法定最妙故宗因云出水故同喻猶如蓮華蓮華出於水不染得最妙理果出於教行門同彼蓮華得微妙今亦簡餘大乘不得名妙餘大乘師盡皆不許今對彼宗以立二量如前也問為唯即是識為唯之識為妙即法為妙之法答唯即識妙即法問若唯即是識何須更說唯言妙即是法如何復言妙法答遮境唯識識體非外有法有粗細殊簡粗故稱妙問蓮華況妙法法妙華亦妙將華況妙法華萎法亦萎一乘亦虗設答只取華盛之時況妙法華盛法亦盛不取華萎況妙法華萎法定不萎佛面猶如滿月不可挂在長空佛眼喻彼青蓮不可出於泥水喻取少分也言序品等義等者疏主造法華經音訓一卷徐善反序者人由也致也庠序也序者舒也學也品者彚也聚也類也別也梵云尼陀那此云序也梵云鉢利跋陀此云品也類也第者居也次也一者首數之始也初也言其品得名等者經得名是如來說說大乘經名妙法蓮華品得名者亦有是佛說亦有阿羅漢說若准文云聞是藥王菩薩本事品據此品名是佛說若安向品頭盡是結集家取佛意安置言序品等者然名也正法華經云光瑞品方便品譬喻品正法華云應時品信解品授記品正法華云授聲聞決化城喻品正法華云往古品五百弟子授記品正法華云五百弟子決品學無學人記品正法華云阿難羅云決品法師品正法華云藥王如來品寶塔品提婆達多品添品法華云寶塔天授同品勸記品從地涌出品如來壽量品彼云如來現壽品分別功德品彼云行福事品隨喜品彼云勸助品法師功德彼云嘆法師品常不輕品彼云常被輕慢品如來神力品彼云神足品屬纍品彼經之中屬纍居後藥王菩薩本事品彼云藥王如來品妙音菩薩品彼云妙吼品觀音菩薩普門品彼云光世音品陀羅尼品彼云總持品妙莊嚴本事品彼云淨德淨王品普賢菩薩勸發品彼云示普賢品也言一義為名等者是依例辨名依四例中辨二十八品名今十五品以一義名於中復分為四例也言從法為名有四等者初例也方便者即是百法中別境慧也即是智慧有本後二智此後得智此方便者即是後智之妙用言信解品者信即善十一中信解者即別境中勝解若慧解名解即別境慧若勝解名解即別境勝解問此信與解為一為異言一者百法不合開為二數言異者一義為名不成答論信與勝解兩法即似有殊此信起時必有印持決定謂印持此法是妙法故方始信生故成一義謂四大聲聞聞著一即解三而不信一今時信一而後解三信即解也言持品者念慧為體念能明記慧能簡擇二既鄰近故成一義即十法行中受持持即是法故以為名言陀羅尼者亦念慧為體此總持即念慧為體此總持即念慧有四總持一法二義三能得菩薩忍四以神咒等言從喻為名有三等者此經喻即有七品唯此三品將為品目譬喻品經云諸有智者以譬喻得解若為說生空法空衆生即不解為說三車即易解若為說三界即不能解若為說火宅焚燒等事即解宅內先許其三車出門父但與大牛之駕謂羊鹿二車無體故量云二乘種智是有法不堪遊戲故宗因云假施設故同喻如羊鹿車二車假施設無體不登二乘種智是假施說同彼二車不登遊量云大乘種智是有法定是實故宗因云堪遊戲故同喻如牛車牛車實有體出門可遊戲大乘種智是實有同彼牛車可登遊羊鹿為異喻量云三界是有法定危險故宗因云或火所燒故同喻如燒舍宅世間舍宅被火燒宅壞之時甚危險三界之宅或火燒同彼火宅甚危險言化城喻品者量云法華會聲聞是有法決定回心故宗因云有大性故同喻云如大通智勝會中聲聞等此化城者即有餘涅槃量云有餘涅槃是有法體非究竟故宗因云半盡半不盡假施故同喻如化城化城中路假施設暫止息故非究竟有餘涅槃暫息苦同彼化城非究竟量云二空真如是有法體是究竟故宗因云二障俱盡是理果故同喻云如寶所滅其化城至寶所故是究竟大般涅槃過小乘同彼寶所是究竟言從人為名有四等者一法師品人由法已成德法籍人已弘宣有法之師名為法師從人名中攝經云若有善男子善女人我滅度後能竊為一人說法華經乃至一句當知是人則如來使如來所遣行如來事何況於大衆中廣為人說名人法師若法即是師從法名中攝經云一切菩薩阿耨多羅三藐三菩提皆屬此經此經開方便門示真實相是法華經藏深固幽遠無人能到依法得名法得法師問法師品既通人法何故偏向從人名中攝答如來偏讚持經法師殊勝意勸人持經故偏向從人名中收言從事為名有四品等者序品者說無量義經了入定雨花動地放光光中所見七事等並屬事言授記品者論其因果成佛事說法利生國土等並是事言涌出品者涌出品無量菩薩俱時從地涌出是希奇之事也言囑纍品者纍音上呼音經云從法座起現大神力以右手摩無量菩薩頂是事也言從人法為名等者一授學無學是人記者是法人即衆同分為體記者後得智為體問何故授記品中有授記兩字即向從事名中收授學無學人記品中有授記兩字即向從人法名中收屬人法耶答三解一云只此授記亦得名事亦得名法所以授記分兩處用也二云若人與授記一處明授記對人便屬法攝也若不對人空說授記授記便屬事中攝也三云學無學人記品中八千菩薩壞疑佛與說法我與阿難於空王佛所同時授記發心挍量多聞不如精進阿難護持法藏即時憶念過去無量千萬億諸佛法藏通達無礙亦識本願故此品讚嘆法多雖有授記以少就多向人法中收不同授記品空說授記向從事中收也言如來壽量品者如來是人壽量是法即將命根為體言法師功德者法師是人功德是法言如來神力者如來是人神力是法舒舌過於梵世彈指聞於異方言藥王菩薩本事品者藥王說過去燒身燃臂等事言妙莊嚴王本事者定分緣境無非現量今如定緣彼境乃至普賢菩薩是人也勸發是法也言能所及名有一等者如來為能分別功德為所分別因果為名有一隨喜功德品隨喜為因功德為果又云勸人聽經為因轉身得梵王處是果言三義名有一等者五百是數即是二十四不相應中二十二數弟子者人衆同分所收授因記果記是事即是如來後得智為體後得智即是別境中慧也言不定名有二等者問何故法師品名不定則向從人名中收安樂寶塔名不定則向不定名中收答法師品定名法師法師名則定於中義則不定或人或法所以不向不定名中收也若見寶塔安樂行品名亦不定義亦不定所以但向不定名中收也言安樂之義通因果者若言見寶塔品通能見人所見塔則合向能所名中收若言現寶塔所現即寶塔不分能所即合從事名中收問何故作此兩解答經文作兩意經云我之寶塔為聽是經故涌現其前為作證明讚言善哉即作現義解即是一義乃名若言爾時四衆見大寶塔住在空中便通能見所見二義名解也只緣通見現不定所以向不定名中收也言安樂在因等者持經之人行四行時即得安樂安樂即行即令從法名中更加一品經云讀是經者常無憂惱又無病痛乃至天諸童子以為給仕行行之時即得安樂唯以一義為名名安樂行若行行之時未得安樂安樂在果即合向因果名中更加一品或時在因或時在果以不定故向不定收也若安樂在因行因之時便得安樂即寶塔品見者現也所見即寶塔即與安樂品同是一義名中收若行是因安樂是果行四行時未得安樂至果中方得安樂行與安樂別便是二義立名寶塔品見者見也便有能見人所見塔便與安樂行品同是二義名中收也言二義名中思惟者若寶塔品是一義為名思量准知安樂品亦一義若塔品二義准知安樂品亦是二義言總類者且依總類以辨二十八品得名所從者即每品來意釋名至品自釋故名總類也言第四經品廢立者既知經品得名須開經品廢立經中有者名立不立者名廢羅什譯經本來有二十七品無天授品名廢後人安著名立天授品有無屬纍品前後名品廢立安著普門偈頌商攉隨時添譯名經廢立問疏主此明經品廢立且如觀音頌及添法華乃是經廢立如何總判為經品廢立答謨云離經無別品離品無別經總是名為經品廢立此經品或有或無乖失次第是以疏主建此一門揩定有無次第真僞故有此門來也路府云所譯之經有真有僞僞者有妙法蓮華度量天地經一卷又有妙法蓮華經天地變異經一卷此二本經並是南齊末永元二年大學博士江泌出家女子時年九歲名僧法閇目念出此兩卷兼前後都合二十一部經計三十餘卷揚州道俗咸云神受長房録云宿習力生而知之者上也學而知之者次也問爭得知是僞耶答道理中間是僞此經宗明一乘彼經品說星大小也又無來處也上僞了真者初明全部廣略後依品已明且全部者唐三藏云依梵本譯可二十卷長耳三藏云可十七八卷日照三藏云十五卷智度論云法華經有十萬偈此經下云二十千萬億偈寶林傳說此經前後六譯三本流行餘三本闕第一正法華十卷二百二十一紙西晉太康七年八月十日三藏竺法護譯清信士張仲明張仲正筆授僧曇邃日念一遍遂感神人請九十日畢施白馬一匹羊五十口絹九十匹二者妙法蓮華經七卷一百四十八紙案寶唱録云秦弘始七年六月十二日或云九年三月十八日羅什三藏於長安大草堂寺譯或云逍遙園譯秦録云弘始十年二月六日譯遠法師序為正弘始八年譯所記各異難以定准三薩曇芬陀利經一部六卷案西晉録云秦弘始元年月支國沙門竺法護譯亦云薩藝四晉録云方等法華經五卷無本東晉咸康元年沙門支道林譯無本五法華三昧經一卷前魏甘露元年沙門支謙於交州城譯沙門道馨筆授出魏録六內典録云添品法華經一部八卷一百八十九紙隋仁壽二年沙門闍那崛多笈多於長安大興善寺譯已上根本全部有六譯若約品論更有十譯一提婆達多品一卷齊永明年僧法獻於于闐國得經梵本僧法意請法獻於潤州瓦官寺譯出長房録譯之時別為一卷未入部也二觀世音經宋代安陽侯於高昌國譯出長房録此經一卷亦別行未入部三普門品經一卷十二紙晉太康七年竺法護單本一譯四普門經一卷東晉代沙門祇密多重譯出道祖録及三藏記五佛以三車喚子經一卷魏代支謙譯出長房録火宅品六妙法蓮華經普門品重頌梁武帝代天竺乾闥國沙門闍那崛多在益州龍泉寺共梁譙王等譯七隨所添藥草品半日光喻八陀羅尼呪又重譯或安神力品後此上二品並隨時所添重譯九天授與寶塔同品十正法華經內譯出光世品經一卷西晉永嘉二年竺法護譯出長房録已上全部單品相兼十六譯問何故不同答但以年代隔遠開山阻遙或所持未全或隨時得續補況華夏萬里流砂眇然貝葉難存貫華易失廣略前後有無不同問本論幾譯答兩譯一法華論一卷梁武帝代中天竺國三藏勒那摩提於洛陽殿內譯侍中崔光筆授出長房録二法華論一部兩卷二十九紙後魏菩提留支譯曇林筆授今此本一卷疏依魏論以釋秦經下解疏言案此經根本者羅什譯時為根本也以今譯本有天授故不以先譯為本故言秦姚興者不是秦始皇乃是十六國時有前秦後秦亦非周後三秦十六國者五涼四燕三秦二趙夏蜀也唐內典録云十六國時二秦為霸前秦姓苻後秦姓姚今此譯經當後秦姓姚名興字子略言鳩摩羅什者此云童壽姓是干本印度人也傳云父炎聰慜才智將受相位乃辭出家東度䓗嶺至龜茲國王見其棄俗王出宮自迎請為國師王見聰奇王有女年可二十或云妹才敏聰明妹與炎生得羅什什母身有赤靨合生智子什在母胎母通五天竺之言有羅漢名達摩劬沙曰必懷智子為說舍利弗等什生之後豈妄前言後必出家證得初果年七歲日念千偈偈三十二言凡三萬二千言九歲隨母至罽賓國事盤頭達多法師法師王之從弟從旦至日中手寫千偈從日中至暮念一千偈什從受雜藏中長二阿含二十四萬偈義旨亦通聲徹於王九歲與外道論義辨挫邪鋒咸皆愧伏王賜沙彌十人大僧五人供侍年至十二母將至月支國有羅漢記之謂其母曰常守護之若年至三十五不破戒者當證羅漢果大興佛法度人無數其母生什之後亦即出家聰拔衆尼得第三果什既受具母謂之曰方等深教應大闡秦都於汝自身無利益如何什曰菩薩之行利物亡軀大化必行曷鑊無恨什既道流西域名被東神從此已後廣演大乘西國諸王請什講說長跪坐側命什踰高座前秦之王苻堅建元九年歲在丁丑太史奏曰有釋星現外國當有大德智人入輔中國堅曰朕聞西國有羅什襄陽有道安後遣將軍呂光將師七萬西伐龜茲得羅什又使將軍苻丕攻襄陽得道安姚興曰朕攻襄陽得一人半在後苻堅被後秦姚萇所煞萇是西戎羌光不肯伏事與什同至西凉一處停住姚萇登位八年被苻堅領鬼兵白日入宮刺陰出血一石而死其子姚興立位光以什從西凉弘始三年方入長安秦主姚興厚禮迎之弘始七年三月十六日敕僧碧等八百人咨授什旨於草堂寺共三千人手執舊經參詳昔竺法護譯正法華天見人人見天羅什譯妙法蓮華經睿是弟子潤文人天交接兩得相見什公大喜秦主姚興謂什公曰大師聰明之種永無後世法種斷矣遂將伎女十人敕令妻之逼令交之自後不住僧居別立廳舍供給之事倍於常則什公每上高座先說喻云譬如臰泥生於蓮華但採其華勿取泥也十一年八月二十日終於長安大草堂也羅什所譯經只有二十七品無提婆達多品言沙門道慧宋等者問羅什所譯既無因何而有此品答疏言沙門道慧等江寧人也宋朝姓劉名裕字德興鼓城人也身長七尺六寸齊朝姓蕭名道成字紹伯有云蕃梁武帝非也梁武帝姓蕭名衍字叔建河內溫縣人也宋非齊時也宋齊兩朝佛法中所有事即道慧抄記名宋齊録録中說上定林定林在江州廬山良抄云在江寧縣今改為上元蔣山緣是山寺有上寺下寺今此是上定林寺釋法獻於于闐國得經梵本有此一品言瓦官寺等者在丹陽郡江寧縣先是官家瓦坊造寺因此標名此寺僧法獻於瓦官寺譯出提婆達多品別作一卷流行也言至梁末者即梁武帝被侯景所囚不逾多時復被誅煞也言西天竺優禪尼者即是西天所繞小國之一數也言燉煌者郡名也舊是西凉府今沙州也言竺法護者月支國人六歲出家日記萬言至晉帝代譯法華及賢劫光讚等一百六十五部廣流華夏高僧傳云晉武帝末隱居深山山有清泉恆取澡瀨後有樵者穢其水傍其水輟流護乃歎曰人之無德使水輟流若也不續吾當移矣言訖清泉涌出恆居燉煌化導時人號為燉煌菩薩言晉武之世等者唐録云晉朝姓司馬名炎字安世河內溫縣人也譯正法華其提婆達多品亦安見寶塔品後又至隋朝國號隋文皇帝姓揚名堅弘農華陽人也即位稱開皇元年後主二十一年改開皇為仁壽元年於仁壽二年崛多笈多此二三藏於長安大興善寺譯出添品法華經其提婆品亦安在塔品後也上辨天授品有無中已明諸本翻譯不同訖言什公本無等者敘古解也問一種梵本翻譯何故羅什獨無提婆品答疏言什公本無之者等即羅什弟子生肇融睿救此義也言若爾法獻於于者疏主略出妨難也量云法獻於于闐國是有法定應不得此天授品故宗因云處在䓗嶺東故同喻猶如龜茲量云什公於龜茲國是有法定得此品故宗因云處在䓗嶺東故同喻云猶如于闍于闍者此云飲乳國往昔之世有一神廣前有二童子從地涌出有一乳池亦從地涌其二童子常飲其乳長成已後其力當千人吞伐諸國自立為王子孫承嫡代代不絶故名飲乳國言又有解云塔等者重牒計也即嘉祥救也塔品命持者經云聖主世尊雖久滅度在寶塔中尚為法來諸人云何不勤為法又云多寶如來及與我身所集化佛當體此意諸佛子等誰能護法當發大願令法久住又云以大音聲普告四衆誰能於此娑婆國土廣演妙法華經今正是時如來不久當般涅槃佛欲以此妙法華經付屬有在言持品應命者疏科有二初二萬菩薩此方持經云爾時藥王菩薩摩訶薩及大樂說菩薩摩訶薩與二萬菩薩眷屬俱皆於佛前作是誓言唯願世尊不以為慮我等於佛滅後當奉持讀誦說此經典次四類聲聞請他方持經云爾時衆中五百阿羅漢得授記者白佛言世尊我等亦自誓願於異國土廣說此經復有學無學八千人得授記者從座而起合掌向佛作是誓言世尊我等亦當於他國土廣說此經後二類尼衆請持者經云諸比丘尼說是偈已白佛言世尊我等亦能於他方國土廣宣此經後八十萬億那由他菩薩彼此俱持者經云時諸菩薩敬順佛故并欲自滿本願便於佛前作師子吼而發誓言世尊我等於如來滅後周旋往返十方世界能令衆生書寫此經受持讀誦解說其義如法修行正憶念皆是佛威力唯願世尊在於他方遙見守護如此命持經之人便合有二萬菩薩應命請此方持四類聲聞請他方持誦等斯乃文勢則不疏斷若多寶塔中命持經者了更著天授品說採果汲水拾薪設食身為床座等方有持品便則文勢疏斷所以什公恐末代之人見文勢疏斷而成疑惑是以刪之葉者世也代也一世為一葉惑者疑惑刪者削也言若爾即取捨真文等者責其刪經也留著名取去却名捨真文若去却名刪留著名繁存著名醜去却名好永意言天授本在持品之前而什公見文勢疏斷所以刪之則取捨真文並由羅什刪繁好醜併在一人斯為未可豈有如來所說真文而什公嫌文勢疏斷刪之此亦未可也故云若爾等言釋道安等者引事難也傳云秦時人姓衛常山扶柳人也少失覆蔭外兄孔代養年七歲讀書再覽便記鄉鄰驚異年至十二出家神性聰敏而形陋傳云染道人驚四鄰不為師重驅使田作至于三年執作勤勞曾無怨色篤性精進齊戒無虧後求念經得辨意經一卷五千言次得金光明經一萬言至夕皆記師驚異與受十戒後恣其遊學至鄴中逢佛圖澄澄公嗟嘆而語澄曰澄暮講夜覆以形陋故或共輕慢澄曰此人識遠非汝所知後過苻堅建元四年太史奏曰東有智人入輔中國遂東伐襄陽破之堅自出東菀迎命升輦同載僕射權翼諫之臣聞天子法駕侍中陪乘道安毀形之人未可參廁堅作色曰安公道宜至聖德為時尊朕舉天下所重未足多也得與安公同輦乃朕之榮顯也敕權翼扶安公升輦也至十八年二月八日無疾而終七十有二言乃作五失等者一正倒失梵語皆倒如言飯喫鐘打齊盞改梵從唐名一失也二文質失梵經尚質秦人好文譯質就文名二失也三廣略失梵文委悉至於讚詠丁寧返覆或請或讚三度五度譯者嫌廣就略名為三失本也四隨情取捨失於時穩者即留於時不穩即除解性宗者譯就性宗解相宗者譯就相宗名隨情取捨失五刪前留後失西天梵語多語愛牒前生後有人問事答者事須先牒前人語然後自答答有兩重問亦有三個義上問答便有四重到此間來唐言好略不牒前人問辭名刪前唯留後一重答詞名留後失長行及偈具有名雙長行重處已略却名刪前向後又無重偈名留後故名刪前留後失三不易者一時代不易謂佛是周昭王二十四年生周穆王時入滅至翻譯時約一千五百餘年正法五百像法一千末法萬年翻譯之時已入像法去聖時淹轉喪真本豈將正法同於像末之時時代不易也改周禮之言以從今人之語尚猶不可況聖教者哉二者愚智不易昔日阿難親承付囑千大羅漢同時結集皆不測佛意自後翻譯譯人不測阿難意良由愚智不易三者兢慢不易如來說法觀衆生根性無有不契根者及至結集法時皆是聖者二空雙證理智俱融恐失一言經即無力豈將平平近意測羅漢兢兢遠心名兢慢不易也生死之人平平若是涉斯五失三不易譯梵從秦誰可不慎也當說此經彌勒是當來佛問文殊是過去佛答總是聖人今者並是凡夫如何測量聖智輒欲刪之平平者次弱之義亦是怠慢之義言改千代之上微言等者佛是千代金輪王孫故名千代所出言教故名微言又云千佛同說故名千代代者約世代而論百王約業而說千代百王文之屬對也百王俗典諸子書等改聖人言同百王俗典豈不痛哉上責刪經了言故天授品梵本等者疏主立理中標也言又天授品顯等者疏主釋合有天授品問何故梵本合有天授品耶答據向道理合有所以疏言又天授品顯己重法為床以求經云爾時佛告諸菩薩及天人四衆吾於過去無量劫中求法華經無有懈倦乃至以身而為床座身心無倦于時奉事經於千歲為於法故精勤給侍令無所乏言經力勢大等者經云智積菩薩問文殊師利言仁往龍宮所化衆生其數幾何文殊師利言其數無量不可稱計非口所宣非心所測且待須更自當有證所言未竟無數菩薩坐寶蓮華從海涌出詣靈鷲山住在虗空此諸菩薩皆是文殊師利之所化度具菩薩行皆共乃至其事如是言經威速疾龍女等者經言智積菩薩問文殊師利言此經甚深微妙諸經中寶世所難信頗有衆生勤加精進修行此經速得佛否文殊師利言有娑竭羅龍王女年始八歲乃至於剎那頃發菩提心至不退轉此顯經威速疾也言龍女道成者經云當時衆會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺三十二相八十種好言讚勸於人者寶塔品言勸提婆品如來身勸提婆品正是所要如何嘉祥言文勢疏斷何不此提婆品後即有持品也言但知梵本有之者疏主與嘉祥出疏斷道理也據梵本定合有之羅什將梵本來在路線斷葉零遺却一葉到此翻譯故闕斯品言既非以東西等者既非以東西判定破四聖弟子解䓗嶺已西多有已東多無也亦不可以義趣刪之破嘉祥解什公恐末葉多或所以刪之越者踰越也言但是什公梵等者結也什公所得梵本闕隨本翻譯故無此品也言又此經中囑纍等者初述古人解囑纍品前後也古人意囑纍居後有三妨居前有一順囑纍品安在神力品後即名經前安在普賢品後則名經後經前即是嘉祥羅什也嘉祥云羅什翻經本來囑纍品在普賢品後安置同法華論正法華添法華安在普賢品後羅什解秦言善得經意所以移在神力品後嘉祥云寶塔品中變土召分身佛從寶塔品至囑纍品已前是淨土何以故答以分身佛在也若分身去世界却穢問分身佛向何品之中去答向囑纍品中者其囑纍品在如來神力品後從囑纍品已後至普賢品却是穢土何以知答便有妙音被誡妨禮敬成偏妨奉珠不極妨即是嘉祥善得經意者知有三種妨難所以不安經末置在前者緣寶塔品中變土召分身囑纍品中事畢令分身佛各還本土經云爾時釋迦牟尼佛令十方來諸分身佛各還本土而作是言諸佛各隨所安多寶佛塔還可如故若囑纍品安在神力品後囑纍品已前分身佛在世界是淨土從藥王品分身佛已去世界却穢所以妙音菩薩見穢相被誡經云爾時淨華宿王智佛告妙音菩薩汝莫輕彼國生下劣想善男子彼娑婆世界高下不平土石諸山穢惡充滿佛身卑少諸菩薩衆其形亦小而汝身四萬二千由旬我身六百八十萬由旬汝身第一端正百千萬福光明殊妙是故汝往莫輕彼國生下劣想若安經末分身未還此土尚淨妙音欲來緣何被誡以此故知分身已還此土却穢故被誡也明知已說經了經既已畢分身佛還故知囑纍在前非後也言又下方涌出既等者致敬成偏妨也經云是諸菩薩從地出已各詣虗空七寶妙塔多寶如來釋迦牟尼佛所到已向二世尊頭面禮足乃至諸寶樹下師子座上佛所亦皆作禮又繞三匝合掌恭敬以諸菩薩種種讚法而已讚歎住在一面欣樂瞻仰於二世尊言東土妙音不應等者抄云經文並無禮多寶佛處唯有欲得見底文世尊我今欲見多寶佛身唯願世尊示我令見此是不細尋經文經文禮處分明經云我到娑婆世界饒益衆生見釋迦牟尼佛及見多寶佛塔禮拜供養即是禮拜文也涌出品中分身在涌出普禮於分身囑纍品中令分身佛各還本土所以妙音品中妙音菩薩不禮分身獨禮多寶若囑纍品安在經末普賢品已前分身多寶總在妙音即合普禮分身既妙音不禮分身明知分身已去故知囑纍合在經前問何故囑纍品中分身佛去多寶不去答多寶但是同塔坐也經云諸佛各隨所安多寶佛塔還可如故經文只言如故不言去也言觀音奉珠等者奉珠不極妨也經云即時觀世音菩薩愍諸四衆及諸天龍人非人等受其瓔珞分作二分一分奉釋迦牟尼佛一分奉多寶佛塔言分身諸佛何過等者若安囑纍品在經末者觀音品中分身佛在何故奉珠分為二分分身諸佛何過不蒙觀音奉珠既不與分身明知分身佛已去分身既向囑纍品中去故知囑纍安神力品後不蒙有二不蒙妙音致禮何過不蒙觀音奉珠上解三妨言又囑纍一品既將等者明一順也囑纍品只合居前也更有人助古人而作十證囑纍品合在經前十證者一令還如故證經云爾時釋迦牟尼佛令十方來諸分身佛各隨所安多寶佛塔還可如故分身佛既皈塔依舊閉明知囑纍合在經前二不言佛讚證藥王品中但言塔讚經云多寶如來於寶塔中讚宿王華菩薩言善哉善哉宿王華汝成就不可思議功德但是塔門已閉分身佛歸三妙音闕敬證涌出遍禮分身妙音但禮二佛明知分身佛還歸本土四穢土非淨證若化佛未去此土合淨妙音來日何故被誡云即汝莫輕彼國生下劣想若經修塔閉何故已前不見五者問佛來否證經云久滅度多寶如來在七寶塔中來聽法否既不見多寶明塔已閉只緣塔閉不見故問也六願見多寶證經云我今欲見多寶佛身若未閉塔二佛同坐自應得見何假請見如來七請見唯聞證妙音菩薩白佛言世尊我今欲見多寶佛身唯願世尊示我令見既唯聞聲不言見佛明知塔門已閉八者敬塔非佛證妙音菩薩言我到娑婆世界饒益衆生見釋迦牟尼佛及多寶佛塔禮拜供養二佛同坐應禮二尊何故但言禮多寶塔九者二分不齊證分身佛既若未還何故觀音奉珠分為二分何故不齊奉施故知分身佛已去也十者無別分身證藥王品下若有分身何故經無文說以此十證囑纍不合居後敬尋斯說理奧文遵然而義出百途今者翻歸正轍上德既以十證合在經前今者有十不可囑纍合居經末且第一令還如故證不可經云如故但云塔閉未還本土者何故正法華經云多寶世尊七寶殿堂佛之塔庿還旋故處亦不可經本有異梵本同故一佛說故又不可見聞異故二者不言佛讚證不可下言多寶如來在七寶塔中讚善哉既言在七寶塔中佛自發言不言佛讚不可也三者妙音闕敬證不可以下方涌出遍禮分身妙音不禮即證已去文殊不禮分身亦分身已去提婆品云從蓮華下至於佛前頭面敬禮二世尊足修敬已畢往智積所共相慰問却坐一面四者穢土非淨證不可已言有山即證土穢者塔品令侍者往山即應非淨又文殊詣山亦爾若言詣山據其本相土實是淨妙音亦爾若言唯留此會衆雖變淨土靈山尚存故不為例者靈山非穢變土任存既言土石諸山如何留也又衆生聞法可以留之山不聞經留之何益問若言無山何故文殊言從海涌出詣靈鷲山答文殊來日時衆並在虗空言詣山者據初會說其實無山下經云時我及衆僧俱出靈鷲山亦據本相說也五者問佛來否證不可文殊請見妙音經云文殊師利白佛言世尊是菩薩種何善本修何功德有是神力唯願世尊示我令見爾時釋迦牟尼佛告文殊師利此久滅度多寶如來當為汝等而現其相時多寶佛告彼菩薩善男子來文殊師利法王子欲見汝身來承佛命何假問之為傳佛語故有問詞非妙音自問也六者欲見多寶證不可若言二佛同坐即合俱見何須請見菩薩下位如來上位加被令見若不加被即不見之希望佛加故請方見如妙音將至妙音尚請佛加被同居因位加被乃得見之何況果位如來不請因何得見非道請見即證塔閉故不可也七者請見唯聞證不可若以請見經但言請不言見佛身即明不見多寶亦可文殊請見妙音經不說見妙音亦應文殊不見妙音若言請見如來即得見何須說妙音請見尚即得見何要文中說見不可也八者敬塔非佛證不可若以妙音敬塔即證塔同者亦普賢來日不言敬塔應無寶塔不可言此時已去無遣塔處故普賢雖不敬塔不妨塔在妙音不言敬佛何妨有佛如世言置書足下未必安其腳底但是敬詞此亦應爾又正法華觀音奉珠一分奉釋迦牟尼一分奉多寶如來不言寶塔明知塔未閉妙音得見今言唯聞不可九者二分不齊證不可若言不奉分身即言已去龍女不奉多寶應多寶去妙音不禮觀音不奉何得即去禮敬齊故十者無別分身證不可經下文不說化佛何廢猶存如藥王品下不言聲聞聲聞豈即非有若以普賢說有即證現有聲聞正法華囑纍既在經終明知化佛亦有故為不可也言上來所說等者疏主申正難也上來所說指嘉祥解也乍雖可爾縱也理者道理也言一衆本相違者晉時竺法護所譯正法華及隋仁壽二年崛多笈多此二三藏所譯法華名添法華笈字其飯反負書籠也正法華添法華囑纍亦安經之末故故云衆本相違量云囑纍品是有法定居經末故宗因云三本隨一攝故同喻猶如法華添法華正法華添法華三本隨一攝故同彼二經合居末言二論經相違難等者羅什所譯經囑纍品在神力品後法華論囑纍品在經末與論相返問菩薩造論解經即合與經相順何故與經相返答法華論本來不解此間經解他西國經彼經之中囑纍品安經末梵本經與論相順今秦經與論相返也言法華論中說修行力等者一持力有三品法師品安樂行品勸持品一法師品通能持所持人法師唯能持法法師唯所持安樂行品唯所持勸持品唯能持二說力有一品神力品示現顯佛世尊有此神力故能說法皆實不虗勸示衆生故名說力三者行苦行力一品藥王品示現藥王時雖在會說過去燒身燃臂自行以流通四者教化衆生行苦行力一品妙音品示現藥王菩薩此方行苦行內勸衆生未有他方上人他方勸說故遠召妙音他方行法五者護衆生諸難力有二品觀音品護未發心衆生難令離苦發心持經陀羅尼品護已發心衆生持經者或令離苦持經六者功德勝力有一品謂妙莊嚴王品此明淨藏淨眼持法華經因圓道著功德勝力回邪見之父王得當成之佛記皆由法華功德之力七護法力有二品一普賢品及後品示現及後品之言正相當也言又神力品後等者神力品後便說藥王不言囑纍將知囑纍合在經終論家次第也言三諸教不同等者即維摩金光明仁王等諸經囑纍皆在經末何故此經獨在前也量云囑纍品是有法定居經末故宗因云是佛說故同喻猶如餘經餘經是佛說囑纍品居經末此是佛說同彼餘經合居末言四二事乖角難等者妙音被誡名一事觀音奉珠為二事妙音被誡名一乖角觀音奉珠名二乖角也言若以令分身佛還等者分身多寶二遣俱齊何故被誡則取以為訶奉珠乃至不生疑難即是但責被誡之妨不掩奉珠之瑕何故不難觀音品在囑纍品後猶分珠為二分即合唯奉釋迦不合奉多寶多寶既在珠為二分名二事乖角也言五兩命不久齊難者意言二今既等何故一住一去分身遣命即還多寶佛塔猶在二命不齊但妨難於古人不以非斥於善逝也若言多寶但閉塔坐不去者何故正法華經云多寶世尊七寶殿堂佛之塔廟還旋故處疏主取意引來言可還土言六塔無還處等者意言我將囑纍品在經終分身多寶一時歸也若多寶塔在囑纍品中閉塔坐迄至終何故更無還處古人云但說經了則大衆散更何要還處文答何故分身佛去有文多寶塔無去處文金光明經捨身品初云七寶制底忽然涌出此即初來也又去時云其窣堵波還沒于地彼經塔涌及還處皆有文此經塔涌經豈無還處又云天龍八部作禮而去尚自有去處豈塔無去處也明知囑纍安在經末即是也古人却問疏主疏主設使將囑纍品在經最後著何處有塔還處文疏主答何要塔還文說經了大衆散去即了也言七淨穢有殊難等者此難切當汝古師引妙音菩薩被誡便云不是淨土又緣娑婆世界有山林溝㵎者古人答言是疏主難云分身佛集之日寶塔品中是淨土穢土耶古人答曰是淨土疏主難云何故各遣侍者詣靈鷲山何處得如來經云是時諸佛各在寶樹下坐師子座皆遣侍者問訊釋迦牟尼佛各賫寶華滿掬而告之言善男子汝往詣耆闍崛山釋迦牟尼佛所又變淨土時諸山皆無經云亦無大海江河目真鄰陀山鐵圍山須彌山等諸山王通為一佛國土何處得有山來此中有二義故無山一云爾時如來以神通力接諸大衆皆在虗空當佛去時大衆高至日天王宮何處有山二者淨是淨土何處有山既若有山應非是淨土古人被難通不得却問疏主道無山如何違經文疏主答云言有山者說有山處即是舊置山處妙音被誡恐見向下穢土相貌所以誡也言又文殊海將至等者相國云疏主引提婆品文殊海會文有兩重若取妙音菩薩來有華現扶他古人義古人許妙音來世界已成穢土若說花現正扶古人義問何以成古人義答若世界是淨土自合有華何要華現既若華現自將華來即是穢土也又若取文殊海菩薩來有華現為證海菩薩來有無華現處若但取文殊海菩薩詣山為證取其意也若准化度解預者入也至也海會至於靈山入靈山會所乘華座即是現也非要預先華現隨身後來方名為預也經云爾時文殊師利坐千葉蓮華大如車輪俱來菩薩亦坐寶蓮華從於大海娑竭羅龍宮至却坐一面此解疏引不謬古量云妙音品是有法定是穢故宗因云有靈山故同喻猶如岸品等今量云妙音品是劣法定是淨故宗因云劣靈山故同喻如塔品塔品之中有靈山即得名為淨土攝妙音品中有靈山何得後言是穢土也言八衆乖情者標名也言又囑纍品令分身佛還等者此牒古人義言若非經末方囑纍等者說經未訖歡喜何太旱生若不是聞法寶已生喜乃是見客佛去已歡喜深成可怪也問何故生歡喜答普賢未荷聞一部經故歡喜經云佛說是經時普賢等諸菩薩舍利弗等諸聲聞及諸天龍人非人等一切世間天人阿修羅等聞佛所說歡喜信受作禮而去囑纍品賀如來摩頂授記付囑法華經故歡喜如世間人得寶了歡喜又更得珍帛錢物更歡喜歡喜雖重自由各別也問普賢品中衆既歡喜作禮而去囑纍品中應合無人更何歡喜答二義一將去名去二正名去普賢品中將欲去所以作禮而去囑纍品中正去生欣有衆何煩致或二種總名去也有云此但是譯經家結略出令人生善心若囑纍品安在普賢品後說者即移普賢品後歡喜文向囑纍品後安著則普賢品後無歡喜心經文也疏主正申難了言但是先放神力等者顯淨非常也經云爾時佛放白毫一光即是見東方五百萬億那由他恆河沙等國土諸佛彼諸國土皆以頗梨為地寶樹寶衣以為莊嚴無數千萬億菩薩充滿其中遍張寶幔寶網羅上彼國諸佛以大妙音而說諸法及見無量千萬億菩薩遍滿其國為衆說法南西北方四維上下白毫相光所照之處亦復如是故名先放神光也言故現淨土者經云時娑婆世界即變清淨琉璃為地寶樹莊嚴黃金為繩以界八道無諸聚落村營城邑大海江河山川林藪等顯淨非常訖言由此土本穢等者被誡無因妨也若對二乘凡夫寶是淨土若對妙音菩薩是化淨土恐透見向下穢根所以被誡也問若穢相在何故經言無諸聚落村營城邑大海江河山川林藪地獄等答所言無者以淨覆穢名之為無也言非妙音等者此申正義也雖佛放光而得清淨謂本此土穢恐妙音來見而生譏毀所以本佛而深誡矣非妙音至而土唯穢也純穢土名唯穢也言如雖淨土還見靈山等者引例成也望淨土中則無靈山佛遣侍者諸山還是向下重穢土有靈山處也既彼處有靈山何妨妙音品中有穢相也安國云如雖淨土還見靈山此二句明他受用土有靈山問何故他受用土中有靈山耶答實有山也如來壽量品神通力如是於阿僧祗劫常在靈鷲山及餘諸住處衆生見劫盡大火所燒時我此土安隱天人常充滿變不唯淨兼見穢故此二句證化土之中有穢相靈山也若是阿彌陀佛國純淨土此是妙音品中變不唯淨也兼見穢故二云如雖淨土證塔品中化淨土也還見靈山證塔品中侍者詣山變不唯淨兼見穢故證妙音品中有穢土相也上科也下解如雖淨土還見靈山他受用土尚有靈山況是化淨土中何妨有穢相山耶問何以如此答變不唯淨兼見穢故二云如雖淨土證寶塔品中化淨土也還見靈山證塔品中侍者詣山也變不唯淨兼見穢故證妙音品中有穢相穢土也寶塔品中是化淨土尚自說有山何妨妙音品中一種是化淨土何妨見穢相寶塔品中侍者尚自見穢相山何妨妙音品中妙音菩薩見穢土穢相問何以如此答變不唯淨兼見穢故此第二解為正然佛變土有二種一報二化化中有二一淨二穢通明凡聖所變三義不同一無漏識變報化雖殊淨穢懸隔然佛所變起皆成無漏二者有漏變地前凡夫所變國土唯是有漏變純有漏種子生故三通漏無漏十地菩薩五八識所變境唯是有漏識未轉故六七二識所變通漏無漏轉成智故正智不變土非漏無漏理實亦變法性土故故知三界唯心萬法唯識相見但依自證生故心不孤起託境方生見分依於相分故故又法華經通報土化土說若通報土說處如阿彌陀佛國菩薩在中唯是實有今此靈山會化淨土是隱覆名變如來定果色蓋却業果色便有水鳥樹林流泉浴池也若是三惡趣及山河大地重地者以淨覆穢名移若是人天二趣輕者移却就人天之中有二一移相移心名為移二者以神通力移著他方名移也問何移相答凡夫業果色為本質中間變起相分質與影俱是染境能緣心起來又是貪愛心緣也如來慈悲力故為化衆生故召分身以佛所變淨土本質是如來定果色也衆生緣時中間隔一重相分只此相分便是當情有淨土相分移却業果相分得定果相分故名移相移中間相分也問何故移心答若不發心則不移若發心時即名移也本緣業果色相分能緣心是染心今者所緣既是淨土相分能緣心是淨心故名移心也移有三種一以淨覆穢名移經云時娑婆世界即變清淨琉璃為地黃金為繩以界八道二移相移心名移經云唯留此會衆靈山一會根熟堪聞留更聞經也三移却名移者經云移諸天人置於他土也言上見下故何因不許等者何因不許之言屬上句非也屬下句為正問言上見下故者變土既是釋迦如何名上見下豈釋迦是下妙音是上耶答但望處說不約佛也妙音是上穢土名下只此穢土是二乘人下位所見之境故得名下妙音是上位菩薩從東方來到此間是化淨土相兼見向下一重穢相故名上見下也問若爾佛為二乘凡夫隱穢彰淨名變土何故乃言佛召分身變土答為驚二乘令生欣慕所以變土若不爾者佛常居淨土何須令變故知為二乘也被誡無因妨言何因不許二佛等者初會前妨古師難云涌出菩薩普禮分身分身佛在東方妙音來時分身若在何故空禮釋迦多寶不禮分身明知分身已去疏主答意云緣釋迦多寶二佛同坐相近所以妙音致敬不禮餘佛亦有何妨何因不許二佛同坐是化主偏霑何因不許分身別坐不蒙禮贈何失言禮贈此二等者問分身諸佛何過不蒙答疏言禮贈此二施主等餘佛者則分身也言只如天授品中等者經云從蓮華下至於佛所頭面禮敬二世尊足修敬已畢往智積所共相慰問等意言文殊龍宮涌出當時分身在文殊不禮分身何妨致敬奉珠禮贈不通餘佛也問既若壽祥等道理不是何故羅什安在經前答但是什公梵本參雜貫華線斷經品失次隨本翻譯安在經前亦無別意也言故知歸奉意別等者以釋迦多寶是化主故偏禮奉珠何故將分身為例普同歸也言故知囑纍合在等者雖以十證囑纍合在於先有十不可是故囑纍遂居經末歡喜奉行並居後故言又云觀音普門等者標有無也什公所譯只有前長行無偈文也或有安者後人添足亦通足音即超反若本來少添著名足若本來足更添著名足即趣反後人者路云即是隋時三藏闍那崛多於益州龍泉寺譯出此偈言俗每疑云等者或是疏主在俗時於國子監讀書時轉讀著此經疑也或大家俗人總說故名俗也疑意有二一者疑什公既不翻出如今忽有恐是僞不是佛說二者疑云若佛說者何故世尊自云具足妙相尊偈答無盡意若佛說者何故佛自矜誇故此疑不是佛說又解准科文抄記若佛自說何故矜誇經教之中佛自矜處亦不少此間却是疑說偈意緣經文云具足妙相尊偈答無盡意若向前是長行則合向後言偈答元來向前是偈說偈之次何故更言偈答諸人疑則却疑此偈也下通云緣無盡意菩薩問佛云世尊妙相具我今重問彼佛子何因緣名為觀世音世尊答即合是長行爾時世尊具足妙相尊以偈答無盡意曰汝聽觀音行善應諸方所等緣半行已來長行翻譯之主嫌長行少勒成二句偈文故云具足妙相尊偈答無盡意也言此乃經家結集為偈者會違文經家有三一是阿難結集時合却去若爾阿難有增減過二云翻譯家見長行文少勒成偈也三寫經人合也言如勝鬘云等者引例也爾時如來在舍衛國大會說法時此國王及末利夫人有女名曰勝鬘嫁與阿瑜闍國王為夫人其性聰慧世所希有波斯匿王及末利夫人共相謂曰勝鬘是我女若見佛者必速解法即遣內人名旃提羅持書往報勝鬘得書歡喜頂受即於高樓上而說偈言今聞佛音聲世所未曾有所言真實者我今應供養仰惟佛世尊普為世間出亦應垂哀愍令我等得見此下便合是長行長行云即生此念時佛於空中現普放光明現無比之身勝鬘夫人及諸眷屬頭面接足以供養心歎佛功德而說偈言如來妙色身世間無與等還緣兩頭是偈中心長行長行文少還被後人勒成為偈偈云即生此念時佛於空中現勝鬘及眷屬頭面接足禮如來妙色身世間無與等無比不思議等上佛自讚義疑了言又有疑云若佛等者雙引疑文也疑有二意一疑不是佛二疑還著於本人之言若佛說者何故偈言咒咀諸毒藥所欲害身者還著於本人之言問菩薩利益衆生救得一人損他一人利益在何處何不能損之人與所損之人悉皆無事豈不妨耶所以言昔亦致惑昔亦致惑之言應屬上句一段文言曾問先師等者以疏主不能當頭面問三藏和上道此偈是佛說否所以別事問三藏慈意慈音義故大師勘梵本應云慈意多是經筆誤音下脫心名為慈音也既是梵本明知慈意也既見梵本明知還著於本人之言不無也言故定有之者申理也證普門品偈是有是佛說言又有無失者證菩薩方便教化衆生合有此調伏還著於本人之語故名又有無失問菩薩返害於人有別是失何故言無失答疏言乃是應宜者出所以也菩薩剛強衆生剛強化不肯將四攝六度教化衆生只將毒藥却化伊也言如巧獵師善取等者舉喻也金云謂好手獦師見深窟中有惡熊羆先以石打令起次即叉之令死初嗔則損人喻彼呪咀後却叉死喻還著於本人准此法喻何處是益潞云取獦師巧便之用以喻觀音不取彼斷命之功而況菩薩意取巧便之用如五坊家取獸應坑者應穽者穽猶如菩薩應反害者而返害之故是應宜而為調伏初雖有損後必為益也言亦如良醫善用等者第二喻也返藥者大家冷病熱治熱病冷治若是好手醫人熱病熱治冷病冷治菩薩教化衆生亦復如是觀見衆生𭶰毒藥害人被害之人念菩薩名菩薩加被還著於本人若可中念菩薩名毒藥不傷下藥之人謂無功效更求毒藥轉轉過深遂交毒藥返中其身起追悔心後更不作然後發心深生憐愍乃是菩薩應宜而謂調伏也問所害免於呪咀方是觀音之能既令還著本人菩薩之心何在答所害免於呪咀反著息本惡心利益彼此俱霑是行方便名菩薩言初雖有損等者若是菩薩方便初損後必有益者則謂之初損後益也後有損者必不為之也言有偈既不乖宗等者有彼普門偈述但是三藏梵本有故有亦不乖經宗道理本來合有也問佛本來說著如今不譯出著即是違理何名不違理答線斷葉零令梵本差脫隨本翻譯設無此偈亦不違道理但是脫漏何成過失也言又隨時所添經中等者路云三添一添普門品偈二添藥草喻品後日光喻三神力品後添陀羅尼具隨時添經即是添品法華經中普門品內從一分奉釋迦牟尼佛一分奉多寶佛塔已下長行經云爾時莊嚴幢菩薩白無盡意以何因緣名觀世音是時無盡意菩薩遍觀觀音過去願海告莊嚴幢菩薩偈答中即合道具足無盡意偈答莊嚴幢乃至偈中却是世尊答無盡意云具足妙相尊偈答無盡意能問之人亦不同能答之人亦不同文既相違故知差舛意道文既相違莊嚴幢文不合有也更有人解云莊嚴幢菩薩問無盡意無盡意菩薩轉問世尊世尊便告無盡意亦不妨有此道理也言又彼經藥草喻等者向前藥草喻早有一長行一偈述說兩喻三草二木顯乘差別後一長行一偈述說日光喻顯乘同義更增其病化度云一乘如日普照十方無處不遍正是乘同義言論釋兩喻等者論云自此已下為七種具足煩惱性衆生說七種譬喻對治七種增上慢心應知何者為七一者求勢力人二者求聲聞解人三者求大乘人四者有定人五者無定人六者集功德人七者不集功德人且第三大乘人有一向決定增上慢心起如是意無別聲聞辟支佛佛如是顛倒取對治為此故說雲雨喻下云第三人者令知種種乘異如來平等說法隨諸衆生善根種子與生藥故不說日光也言彼說乘同者又引經云譬如日光照臨之處無外二乘無異衆生等道理正增其病也何成破病也又更有說此亦是破乘同病日光同天雨所照同三草若然者則天雨是一所潤各別日光是一所照各別此亦不然前來雨喻破病已訖今又破病此乃虗設應成無用言正法妙法兩經者此違教也論又不解者法華論亦無日光喻也七喻所無也言四從三逆有爽者意道藥草喻後更安後半日光喻正法妙法并本論並無文違三本聖教故言三逆也順一本經文即添法華當第四本教故言四從也爽由失也無則順道理也言彼經又以陀羅尼等者正法妙法陀羅尼品皆居觀音品後及違論次第論說修行力有五門示現一說力神力品示現二行苦行力藥王及妙音品示現三護衆生諸難力觀音陀羅尼品示現陀羅尼品若在神力品後即違論中護法力之次第也言又云富樓那及法師等者且如添品法華經中五百弟子授記品及法師品此二品初加三四紙經文今妙法蓮華經中兩品對他添品法華經中兩品初皆闕少又云妙法蓮華經中兩品是添法華兩品闕少應檢既無誠文理難依信言又云依合有二十七品者以天授品與寶塔同品故名合也四本違三者正法妙法本論名違三實由實也實由未可也言彰品次第者標也經起意宗旨得名廢立意已可知緣何品文次第如是故置此門明品次第賀云三藏教法各各不同阿毗達磨以相性求毗奈耶以因緣求修多羅意趣亦以次第求今明次第也言凡欲說法等者佛說此經已結加趺坐入於無量義處三味身心不動是時天雨四華地六振動故毫光已遠照經云爾時佛放眉間白毫相光衆見此以生疑經云於此世界盡見彼土六趣衆生又見彼土現在諸佛及聞諸佛所說經等爾時比丘比丘尼優婆塞優婆夷及諸天龍鬼神等咸作此念是佛光明神通之相今當問誰誰能答者爾時彌勒菩薩欲自決疑又觀四衆比丘比丘尼優婆塞優婆夷及諸天龍鬼神等衆會之心而問文殊師利言以何因緣而有此瑞文殊師利答云爾時文殊語彌勒菩薩摩訶薩及諸大士善男子等如我惟忖乃至我見燈明佛本光瑞如此以是知今佛欲說法華經舉古正答總名序品言機集緣和等者即是十五類衆集名機集衆生與佛相逢名緣和佛入涅槃衆生在生死不名緣和問為是舊集為是新集答並新舊非但聽於無量義經舊衆緣和今說法華亦乃放光召於東土有緣皆來此即新集緣和從衆名序言乃應物宣暢陳說等者即是七種成就說宗即是目正宗也言序品既說次辨正宗者問何要說方便品答疏云衆既集而未間間由解也須陳宗以訓誘正宗法說一乘為實頌實略開二運為權開權也經云爾時世尊從三昧安祥而起告舍利弗諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知乃至汝已殷勤三請豈得不說汝今諦聽善思念之當為汝分別解說諸佛世尊唯以一大事因緣故出現於世又云十方佛土中唯有一乘法無二亦無三除佛方便說但以假名字引導於衆生又云說佛智慧故諸佛出於世唯此一事實餘二則非真終不以小乘濟度於衆生一切諸如來以無量方便度脫諸衆生入佛無漏智若有聞法者無一不成佛言一實而導等者問既開權顯實有何利益答疏言言一實而導彼歸途顯實也途者道也路也顯二權而令斯返跡開權也導者引也歸途者修行向大衆生久在生死今向佛修行名歸來名歸途二者十六王子時發心退去今日却發大心名歸途也返跡者一先執二乘為究竟今說為權返彼二乘導跡名返跡二曾發大心退入二乘中今日却發大心名返跡乍觀歸途返跡似不別於中歸途從因向果但望大乘說返跡則約從小入大說歸途則修行向大返跡則約回心也言智揚善巧等者智是如來後得智即是諸佛智慧揚者稱揚善巧即是四辨七辨向上權巧方便顯上接下通彰方便妙應上根上根即鶖子等是也故言智揚等言語演神功等者即是其智慧門說權說實名為語演只此權實道理二乘不測名為神功陰陽不測謂之神津冥邃理者津者謨云津濟津潤冥謂冥合邃由深也只此言教亦能津濟津潤二乘之根本亦能冥合一乘深邃之理即是契理契根也故次有方便品言上根領悟等者領悟即領解也賀云此明不說領述授記之由意言方便品後合有領述及授記品鶖子領悟不可一人安其領述及授記等文後小略故於譬喻品初寄其領述方與授記鶖子領解分二初標聞法已喜生經云爾時舍利弗踊躍歡喜等後釋歡喜之所以有四初失大法已興嗟經云所以者何我昔從佛聞如是法見諸菩薩授記作佛乃至失於如來無量智見二處小階而起歎經云我當獨處山林樹下乃至思惟取證三喜今聞而惱盡經云世尊我從昔來終日竟夜每自尅責乃至身意泰然快得安隱四知佛子而道成經云今日乃知真是佛子等總當鶖子領解也言佛重述成者述昔成今經云爾時佛告舍利弗吾今於天人沙門婆羅門等大衆中說我昔曾於二萬億佛所乃至說是大乘經名妙法蓮華言有授記者經云舍利弗汝於未來世當得作佛號曰華光言應有領述等者除方便品外更合與鶖子開三品經緣鶖子利根故不聞也言良以鶖子獨等者一部名頴二禾末名頴今取後義如禾之末出於衆禾也孤由獨也一利根故不開二文略故不開也寄者附也言中根之類雖聞等者賀云此明譬喻品也即須菩提等四大聲聞等法說一乘未能了悟故以牛車及唯有一門以喻一乘經云然舍利弗今當復以譬喻更明此義諸有智者以譬喻得解經云如此種種羊車鹿車牛車今在門外可以遊戲汝等於此火宅宜速出來隨汝所欲皆當與汝爾時諸子聞父所說珍玩之物適其願故心各勇鋭互相推排競共馳走爭出火宅各白父言父先所許玩好之具羊車鹿車牛車願時賜與爾時長者各賜諸子等一大車乃至令諸子等日夜劫數常得遊戲與諸菩薩及聲聞衆乘此寶乘直至道場以是因緣十方諦求更無餘乘除佛方便言智者因喻以領等者經云諸有智者以譬喻得解亦云領慧亦云領解二皆得也即是信解品經云我等今於佛前聞授聲聞阿耨多羅三菩提記心甚歡喜得未曾有不謂於今忽然得聞希有之法深自慶幸獲大善利無量珍寶不求自得今法王大寶自然而至如佛子所應得者皆已得之良云慧解隨生者謂領納之智慧生也因聞喻說能隨彼生故因明云由此比況令宗成立究竟名邊他智解起照此宗極名之為見方能領者因由之因窮子喻領即因依之因也言雖少信解尚未等者解藥草喻品也經云爾時世尊告摩訶迦葉及諸大弟子善哉善哉迦葉善說如來真實功德誠如所言如來復有無量無邊阿僧祇功德汝等若於無量億劫說不能盡故名尚未深知言為破疑情者經云今為汝等說最實事諸聲聞衆皆非滅度汝等所行是菩薩道漸漸修學悉當成佛問說藥草喻四大聲聞既信伏已云何有疑情可破答四大聲聞說信解品了心中疑我今說如來功德為是為不是所以為破疑情說藥草也又疑情者聞火宅喻品了便疑唯有牛車無羊鹿唯有一乘無別二乘所以說三草各別各有差殊破疑也問藥草喻品破執有一正是破執如何破疑答但是疑無三乘兼有執一之病由疑於先執乃在後故且說於疑其實亦有執也為破執之疑情重述三乘之別意故說三草以喻三乘約教說一約根分三經云雖一地所生一雨所潤而諸草木各有差別故此亦名述成故有藥草喻品也言四大聲聞既深等者明授記品也迦葉名光明須菩提名名相迦旃延名閻浮那提金光目連名多摩羅跋栴檀香言上中二性等者明化城喻品也丁寧者再三義必假再三故言鄭重鄭重者殷勤也初周法說時下根亦聞中周喻說下根亦聞第三周若法若喻宿世因緣說故名丁寧三遍重說故言鄭重也言說過去結緣等者經云諸比丘我等為沙彌時各各教化無量殑伽沙等衆生從我聞法為阿耨多羅三藐三菩提此諸衆生于今有住聲聞地者爾時所化無量恆河沙等衆生者汝等諸比丘及我滅度後未來世中聲聞弟子是也故名過去結緣之始覺照其心覺者覺察照也曾結大因今二乘覺察身中有大乘性故名覺照其心也言述彼所得涅槃等者經云佛知是心怯弱下劣以方便力而於中道為止息故說二涅槃但是如來方便之力於一佛乘分別說三又云若衆生住於二地如來爾時即便為說汝等所作未辦汝所住地近於佛慧當觀察籌量所得涅槃非真實也既知息已而告之言寶處在近此城非實我化作耳言高名之輩因說等者高名者五百千二百人也因者因由因前說化城喻方有信解即領解也言復重淨心等者即述成也問如何喚淨心作述成答未述成時聲聞生疑疑所解法述成亦了疑心須除益富樓那等解心明淨故即名淨心也問既有領解述成何不別開品耶答有二義故不別開品一者是下根人三遍聞了領解文略不開品上根鶖子最利根領解文略中根次鈍領解文廣別開領解述成問下根人根更鈍即合領解文更廣答緣三遍聞故却少也心中疑妨少故領解不多二者緣是下根人拙口鈍詞多領不得領文既少不別開品經云世尊甚奇特所為希有隨順世間若干種姓以方便知見而為說法拔出衆生處處貪著我等於佛功德言不能宣唯佛世尊能知我等深心本願言印亦不廣等者經云爾時佛告諸比丘汝等見是富樓那彌多羅尼子不我常稱其於說法人中最為第一亦於七佛說法人中而得第一今於我所說法人中亦為第一於賢劫中當來諸佛說法人中亦復第一言先陳高名等者解五百弟子授記品富樓那名法明憍陳如號曰普明五百羅漢優樓頻螺迦葉等並號普明說當來成佛名號國土等相名當果之相言下位之儔等者釋授學無學人記品至此三遍丁寧時時漸亦達達由成佛也經云阿難號山海慧自在通王羅睺羅號蹈七寶華千二百人同號寶相言三根並悟等者總結三周並悟說法利益三根已畢總與授記了言將使遠代同觀等者釋法師品也未來一切衆生名為遠代還同舍利弗聞經作佛名同觀所以說法師品嘆人美法歎人者經云若親近法師速得菩薩道隨順是師學得見恆沙佛嘆人也美法者歎法法師經云爾時佛告藥王菩薩摩訶薩我所說經典無量千萬億已說今說當說而於其中此法華經最為難信難解此經是諸佛祕要之藏不可分布妄授與人是名美法問嘆人嘆法有何利益答令菩薩弘傳大義持經之者若法可修若人可依若人若法可師範故所以雙嘆也言破小執而成大道等者解寶塔品也破小執者即破二也會權旨者即會二也指前八品破二會二也昔持毀責聲聞今言作佛其事甚難枯楊生蹄枯木生華老烏頭白馬乃生角人所難信貧士獲衣中之寶窮子領長者家財甚為難信所以多寶塔現經云爾時佛前有七寶塔高五百由旬縱廣二百五十由旬從地涌出住在空中言分身佛集者經云爾時十方諸佛各告衆菩薩言善男子我今應往娑婆世界釋迦牟尼佛所并供養多寶如來塔是時諸佛各將一大菩薩以為侍者至娑婆世界各到寶樹下一一寶樹高五百由旬枝葉華果次第莊嚴如是乃至十方諸佛皆悉來集坐於八方正集時也勸由勉也長者生長慧解之心不疑名明也信即心淨也言證說不虗等者經云爾時寶塔中出大音聲讚言善哉善哉釋迦牟尼世尊能以平等大慧教菩薩法佛所護念妙法華經為大衆說如是如是釋迦牟尼世尊如所說者皆是真實等言雖他佛等者明天授品也雖他佛說不思議事證信此經者多寶塔現分身佛集名他佛說經云善哉善哉釋迦牟尼佛快說是法華經我為聽是經故而來至此名他佛說也言未顯自尊等者未說自家尊重之事勸人歸仰故須身作國王經云爾時佛告諸菩薩及天人四衆吾於過去求法華經無有懈惓又云我念過去劫為求大法故雖作世國王不貪五欲樂椎鐘告四方誰有大法者若為我解說身當為奴僕是名自尊勸人歸仰也問說他自有何利益答說他佛令生信說自尊令生尊重言於怨家所為床者經云時有仙人來白王言我有大乘名妙法蓮華經若不違我當為宣說乃至以身而床座身心無倦于時奉侍經於千歲又云爾時王者即我身是時仙人者今提婆達多是名怨家所也言亦顯經威廣大等者經云智積菩薩問文殊師利言仁往龍宮所化衆生其數幾何文殊師利言其數無量不可稱計非口所宣非心所測言法力速成等者經云此經甚深微妙諸經中寶乃至於剎那頃發菩提心得不退轉言化龍女以成道者經云爾時龍女有一寶珠價直三千大千世界持以上佛佛即受之乃至坐寶蓮華成等正覺也言既顯自他者自謂釋迦自身常為國王於仙人處為床求法自寶重也經云若有人聞提婆達多品淨心信敬不生疑惑者不墮地獄餓鬼畜生生十方佛前所生之處常聞此經若在佛前蓮華化生他謂分身多寶經云聖主世尊雖久滅度在寶塔中尚為法來諸人云何不勤為法也言威弘者經威廣大龍宮所化之衆極多名威弘言用速者即龍女道成南方作佛名用速言聞經菩薩皆受教等者聞經菩薩者即藥王等八萬菩薩是皆受教願持經云爾時藥王菩薩摩訶薩及大樂說菩薩摩訶薩與二萬眷屬俱皆於佛前作是誓言唯願世尊不以為慮我等於佛滅度後當奉持讀誦說此經典言因前勸與令持等者即寶塔中言勸經云以大音聲普告四衆誰能於此等二身勸經云以身為床座經於千歲等言其有末代行多越軌模等者此明安樂行品一乘法流行在世名行法也多越軌模者若近十惡緣名越軌模又近十惡緣名難宣暢近善緣名不越軌模名易宣暢軌模即四安樂行經云佛告文殊師利若菩薩摩訶薩於後惡世欲說是經當安住四法一者安住菩薩行處親近處能為衆生演說是經云何名菩薩摩訶薩親近處菩薩摩訶薩不親近國王王子大臣官長不親近諸外道梵志尼揵子等及造世俗文筆讚詠外書及路伽耶陀逆路迦耶陀等言八恆菩薩聞妙道等者明涌出品也經云爾時他方國土諸來菩薩摩訶薩過八恆河沙數於大衆中起立合掌作禮即白佛言世尊若聽我等於佛滅後在此娑婆世界勤加精進護持讀誦書寫供養是經典者當於此土而廣說之言佛時不許者爾時佛告諸菩薩摩訶薩衆止善男子不須汝等護持此經所以者何我娑婆世界自有六萬恆河沙等菩薩摩訶薩一一菩薩各有六萬恆河沙等眷屬是諸人等能於我滅度後護持讀念廣說此經佛時不許者問八河菩薩既請持經佛何故不許答不是八河菩薩不堪持經言不許者意令下方菩薩涌出衆見生疑既見以生疑因此說如來壽量品功德故止也此有二意一顯彼菩薩皆是釋迦所化二顯報身壽量長遠言衆見涌出謂此化非等者釋壽量品也謨云疑有兩意一疑是化現不是實菩薩二設許是實疑不是釋迦教化初疑云謂此化而非實經云我常遊諸國未曾見是衆我於此衆中乃不識一人忽然從地出願說其因緣二疑者世尊如來為太子時出於釋氏宮去伽耶城不遠坐於道場得阿耨多羅三藐三菩提從是已來始過四十餘年世尊云何於此少時大作佛事乃至譬如有人色美髮黑年二十五指百歲人言是我子其百歲人亦指年少言是我父生育我等是事難信等言今我道久成等者經云爾時佛告大菩薩衆諸善男子今當分明宣語汝等是諸世界若著微塵及不著者盡抹為塵一塵一劫我成佛已來復過於此百千萬億那由他阿僧祇劫故名我道久成等言報佛之身現壽量等者經云如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界見於三界如斯之事如來明見無有錯謬問法身既是正說何故言亦答本來只要報身破疑既明報身法身是不相離法如影與形相似因說報身便說法身名亦也又云法身無為不可說其長短但約能證法身成道證其長短故言亦方便以宣揚也言故知釋迦由來等者經云或說己身或說他身或示己事或示他事諸所言說皆實不虗報身既也成道長遠有法報二身處即有化身故釋迦面各三十二該教化衆生化身來去故不唯此生何得此化身難也言佛德深妙聞信等者此明分別功德品也經云爾時大會聞佛說壽命長遠時如是無量無邊阿僧祗衆生得大饒益於時世尊告彌勒菩薩摩訶薩阿逸多我說是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍復有千倍菩薩摩訶薩得聞持陀羅尼門乃至八世界微塵數衆生皆發阿耨菩提心十一得證一位發心是此品之行相也言時宜所益雖已等者賀云此釋隨喜品也經云佛告彌勒菩薩我今分明語汝是人以一切樂具施於四百萬億阿僧祇世界六趣四生衆生卵生等又令得阿羅漢果所得功德不如是第五十人聞法華經一偈隨喜功德百分千分百千萬億分不及其一乃至算數譬喻所不能知問疏云何言亦答指分別品有能隨喜福亦不少對他十法行此品傍行故名亦也言傍人隨喜尚獲等者此明法師功德品也經云若於大衆中以無所畏心說是法華經汝聽其功德乃至父母所生眼悉見三千界內外彌樓山須彌及鐵圍父母所生耳清淨無濁穢以此常耳聞三千世界聲是人鼻清淨於此世界中若香若臰物種種悉能知是人舌根淨終不受惡味其有所食噉悉皆成甘露若持法華者其身甚清淨如彼淨琉璃衆生皆喜見是人意清淨明利無穢濁以此妙意根知上中下法故有法師功德品也言法師持經必等者此明常不輕品經云得大勢於汝意云何爾時常不輕菩薩豈異人乎即我身是是名法師必當作佛毀法師者獲罪無量經云得大勢彼時四衆比丘比丘尼優婆塞優婆夷以嗔恚意輕賤我故二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱引己為證故有常不輕品言如來勸說者明神力品也寶塔言勸提婆身勸言福事俱多者勸人聽法得六根清淨為福多寶勸說天授為床名事言恐衆生疑謂等者衆字去音呼為正前來世尊說第五十人功德說六千功德十種法師此言虗實故名恐衆生疑謂佛虗唱也謂遮此疑如來出舌放光經云爾時世尊於一切衆前現大神力出廣長舌上至梵世一切毛孔放無量無數色光皆悉遍照十方世界言顯己言之不謬者引婆羅門相法說也言藥王昔者殉命令持經等者釋藥王品也殉音詞閏反秦穆公即古時天子以三良為之殉葬三良即三個賢臣也以人送死墓巾生葬三個賢臣名殉葬也殉字從多邊作反割反如蕃王等忽有一家長死一床奴婢隨遣驅使多以生送死也若自衒名殉以身從物作殉巡師宣令作殉今取殉藥王今者不惜身命持經亦得名殉經云即作念言我得現一切色身三昧皆是得聞法華經力我今當供養日月淨明德佛及法華經又云於日月淨明德佛前以天寶衣而自纏身灌諸香油以神通願力而自燃身又云作是語已而各默然其身火燃千二百歲過是已後其身乃盡三生死捨第三生方能生捨身分也言說彼本緣等者經云佛告宿王華菩薩於汝意云何一切衆生喜見菩薩豈異人乎今藥王菩薩是也宿王華若有發心欲得阿耨多羅三藐三菩提者能燃手指乃至是一指供養佛塔勝以國城妻子及三千大千國土山林河池諸珍寶物而供養者言流行正法此等者釋妙音菩薩品也一人知內一人知外經云爾時釋迦牟尼佛放大人相內髻光明及放眉間白毫相光遍照東方百八萬億那由他恆河沙等諸佛世界過是數已有世界名淨光莊嚴其國有佛號淨華宿王智有一菩薩名曰妙音即白佛言我當往詣娑婆世界禮拜親近供養釋迦牟尼佛及見文殊師利法王子菩薩等故有妙音品來言衆生持經多諸等者釋觀音普門品也言必假普示諸門等者隨衆生所念現諸類身救濟非一名諸門經云假使興害意推落大火坑念彼觀音力火坑變成池或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒等普者平等遍滿義門者入出之遊處諸人三業歸依菩薩六通垂濟示現出苦入樂所由處故名普門別顯有厄稱名皆脫初三水火風灾次四雜災形罰不傷非人不害抅繫解脫怨賊不損由是能除諸難衆生故得持經經云爾時持地菩薩白佛言世尊若有衆生聞是觀世音菩薩品自在之業普門示現神通力者當知是人功德不少故觀音品也言雖念觀音憑人等者釋陀羅尼品也觀音則約人此品則約法觀音護未發心衆生難陀羅尼護已發心者難故有陀羅尼品二聖二天十羅剎女欲說神呪擁護持經之人若不順我呪惱亂說法者頭破作七分等言持經之力等者釋妙莊嚴王品世尊因地於提婆達多所求經不簡怨妙莊嚴王於二子所受法不簡親又解只妙莊嚴王品便有怨親也子與父是親子正見父邪見故成怨經云爾時佛告諸大衆乃往古昔過無量無邊不可思議阿僧祇劫有佛名雲雷音宿王華智多陀阿伽度阿羅訶三藐三佛陀國名光明莊嚴劫名喜見彼佛法中有王名妙莊嚴其王夫人名曰淨德有二子一名淨藏二名淨眼是二子有大神力福德智慧久修菩薩所行之道等言經福所資等者顯妙莊嚴王先持法華今得為王況今受持前生勝處又云妙莊嚴二子先持法華經得生國王家名生勝處也言欲明古今相即等者昔時淨藏淨眼今藥王藥上是今同華德菩薩及佛前光照莊嚴相即是昔時妙莊嚴王并淨德夫人故有妙莊嚴王品也言雖此土他土皆有弘德等者解普賢品此土者藥王等是他土者妙音菩薩是也此方他方者即普賢菩薩經云我於寶威德上王佛國遙聞此娑婆世界說法華經他方也經云我於後五百歲濁惡世中其有受持是經典者我當守護除其衰患令得安隱此方也顯此方他方俱能勸勵流傳妙法故有普賢菩薩品也言讚勸既周等者釋囑纍品也經云爾時釋迦牟尼佛從法座起現大神力以右手摩無量菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祇劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等應當一心流布此法廣令增益爾時釋迦牟尼佛令十方來諸分身佛各還本土而作是言諸佛各隨所安多寶佛塔還可如故乃至一切世間天人阿修羅等聞佛所說皆大歡喜信受奉行說經畢從此散席也言人情曲解者謨云解字通會解解釋二意謂什公安在神力品後者此是古人委曲會解釋解他什公意契由明也未明通途道理其實是梵本差錯也言第六釋經本文者謨云原其判疏只為釋經五門玄談先為敘致今者結歸舊意故曰釋經本文且疏外科者攝云科此經文古今實繁略敘一二冀增異智第一有廬山龍法師開為二分一從序品至安樂行品十四品是開三顯一分四十年前開三乘法華會上顯一乘二開近弘遠分從地涌出品下十四品亦疑釋迦成道來近所化菩薩衆多將釋此疑現壽量而長遠故立開近顯遠分也此二段中皆有序分正宗流通也二光宅雲法師科為三分初序品序分二從方便品至分別功德初挍量偈末已來十五品半經名正宗分三從第二長行已去直至經末名流通分吉藏同三印法師科四分初一品名序分二從方便品至安樂行十三品開三顯一分三從從地涌出品至分別功德彌勒偈已前名開近顯遠分四從分別功德品彌勒偈已後至經末名流通分四河西道朗法師開為五門初序品序致法華必轉之相不說無量義經則已若說無量義經必說法華經不放光雨華則已若放光雨華必說法華經故名轉也二從方便品至法師品明法華體無二之法三從寶塔品至壽量品明法華常住法身之果四從分別品至囑纍品明修行法華所生功德五從藥王本事品迄至經終名流通分五道融法師判為九轍一昏聖相扣轍序品二識教歸真轍方便品是我此九部法隨順衆生說入大乘為本三興類潛彰轍譬喻品四述昔窮速轍信解品五稱因進悟轍化城喻品六讚揚理行轍法師品七本跡無生轍寶塔品八舉因徵果轍涌出品九宣揚遠濟轍隨喜品直至經末攝議曰考尋古釋皆存一理然依理教但取三分夫說法必有由序驚駭諧揩反物情令生信意乃為正說有情無盡佛悲莫窮冀傳不息有緣流通斯乃理矣西方親光菩薩造佛地論解佛地經科為三段一教起因緣分攝法門品類差別三依教奉行分攝時聞歡喜奉行雖釋一經可為通軌餘經亦有三分勢故此方晉朝道安法師時人稱為寶印手菩薩科一切經作三分序分正宗流通問何名序分答序彰起說之由問何名正宗答正明即座之益問名流通答流通為澤霑來兆又由三義故立三分一除疑生信立序分二破執令解立正宗分三依法修行立流通分道安和尚判教了後佛地論從西國來果然有此三分暗合親光菩薩科也自後諸經皆依三分判教也言古遵法師等者應是古時遵法師或可名為古遵即遵古之義也言如來起化由序者放光照境動地雨華十五類衆根器咸集彌勒問文殊答總名起化由序也言餘二十七品等者化其聲聞回心向大名為正化或變化即變昔執小生空之心化令證入二空之理乃至分段變易煩惱所知有餘無餘涅槃今變令取無住大般涅槃名為化或云教化將大乘教以化聲聞如風靡草皆順從故彼科二十七品三段總是正化一授記因果化方便品至分別功德品二現座獲益化分別品下至囑纍品三傳法利生化從囑纍下至經末言序品陳其始由者彼科序分有三始由一處衆所由即此初二成就二理事所由入定為理放光雨華為事同此三四五成就三問答所由同此六七成就也言迄至經末等者問此釋如何答理亦難容若言得益即是正宗者序品亦應正宗舉動施為皆悉佛事佛事遠近皆有益故若言授記得證發心等名益者應方便品不名正宗無上益故若言鶖子悟解一乘何非益者彌勒發問文殊為答亦疑皆遣何不名益若言文殊雖答未見佛說疑心猶在不得稱益亦應鶖子方便品尚未得記不名正宗亦違佛地論三分之道理言吉藏法師等者即嘉祥疏主即隋朝人本是台州國清寺智禪師弟子姓安本安息國人也童孩之歲父母引見真諦三藏乞名因名吉藏年七歲落髮出家採涉玄微日新幽致隋開皇年中遊京止于嘉祥精舍五六十年常事敷演後大唐啓運隋薩國公夫人氏舉請住京寶隆寺凡講法華經三百餘遍亦著玄疏盛流於世常勤行業願見彌勒任寺之上座春秋七十有一遷神于寺東房舊曰實濟伽藍即今時溫國是今又改為崇聖寺經歷三代講法華經言初校量頌末等者此後更不說實也法華以權實為宗故有說權實之處即是正宗問何不取第二長行及偈為正宗答此難不然且分別功德品一品都有三個長行及頌總名分別總名校量且第一長行及頌校量聞如來壽量功德又疏中分明道取第十五品半明乘權實與身權實為正宗此初長行及頌正說身實故為正宗也第二長行及偈校量生信心功德故配流通分段直至經末皆流通也言淨法師者紀國慧淨法師也言十九品正宗者紀國意七喻三平等為正宗故其十無上既云餘殘修多羅至普賢品來亦有無上之義故不取也謨言此說亦疏分別品也下並無七三之義何以正宗攝十九品內亦有無上應非正宗故知不可也言雖有此判等者疏主破也雖科知此不知是何意不說來由耶潞府云疏主何以隱他人德言不釋所由紀國云序品明興致之由體彰即坐之益流通為澤霑來兆豈不是述所由耶疏主云只如此說便是不釋何由也只如序明興致之由有七成就並不說體明即坐之益三周之中利益是何利益為復是授記為復是聞經空言利益還是不釋所由簡要云雖有正益之言不釋益之所由雖有澤霑來兆不釋霑之所以故疏主斥云不釋所由也言今為二解者是疏主自兩科兼存紀國共三科言次八品為正宗者正宗中有三科初八品為正宗次八品半為正宗後十九品為正宗言正宗說一乘授三等者解義也亦云立理有二意一正說一乘二授三根記夫論科經先親題目云妙法蓮華所以科八品盡蓮華也說開敷出水義正為二乘說餘處盡不說一乘亦不說聲聞作佛故不取餘品也言根本所為者簡傍為也正為即三根聲聞也言今此經中等者引證也唯為退心聲聞說一乘處總是正宗言而昔於菩薩等者維摩經云聲聞之人猶如敗種若溉若灌必不能生猶如高原陸地不生蓮華大樹緊那羅經云聲聞之人永非法器故名毀呰也此引文證說一乘處為正宗也言又提婆達多等者引此智積請還文返成前八品為正宗也攝釋難云疏主引此一段文證八品正宗恐成返由傷也問多寶如來為復聽經來為復證經來若言聽經來八品正宗說了若言證經來勸證未了如何智積請還聽亦不成證亦不成正是疏主自破八品正宗義扶他紀國十九品正宗義也正說十九品正宗之次若聽若證皆相當也問若爾十九品正宗未了如何智積請還答攝云下根不測上智之事多寶擬聽向下經文智積不知隨自意懷請還何失問攝釋既設難詞疏主八品正宗義莫破耶答疏主義灼然不破疏主云多寶如來若聽若證皆緣八品正宗若論聽經向寶淨國中已聽了普賢菩薩尚自於寶威德上王佛國遙聞此娑婆世界說法華經況於是佛據實多寶為證經故來非為聽經來就證經中已證說了八品正宗經文不證未說經所以亦從本國到來不聽便證故知是證說了經也又言中云如所說者既有如所說之言明知證說了底經也經云爾時寶塔中出大音聲讚言善哉善哉釋迦牟尼世尊能以平等大慧教菩薩法佛所護念妙法華經為大衆說如是如是釋迦牟尼世尊如所說者皆是真實又云若我成佛滅度之後於十方國土有說法華經處我之塔廟為聽是經故涌現其前為作證明讚言善哉本來智積共多寶佛相隨證經來所以菩薩見多寶佛證經了將謂無事所以請歸問多寶不言去何故智積言去答下知不測上知之心所以請歸多寶欲擬聽向下殘經所以不言去知八品為正也路府云疏主引此經文似證十品半經文為正宗也若不如此何故正宗後更說三品經文方始智積語歸答此亦不然多寶佛本國亦聞八品正宗了便來乃至到來此間是證法師品已訖便涌塔證經便有智積請還次第排比如此也言若不說一乘等者古人立意即紀國淨法師但獲益皆正宗也言普賢品中等者引例成非也直至普賢品來不說一乘而獲益皆應正宗古師答云直到普賢品皆是獲益亦有何失言若爾古遵等了縱許成非意道有利益皆是正宗者即同古遵法師義二十七品明其利益言又事既未了等者引文重破破淨法師若十九品為正宗正宗未說了又古遵法師從方便品已下二十七品明其利益利益未了如何智積中路請還故知八品正宗為善也言或并法師等者疏主更作第二科兼取法師品初八部授記處文求聲聞者辟支佛佛道者如是等類咸於佛前聞妙法華經一偈一句一念隨喜者我皆與授記當得阿耨多羅三藐三菩提至此經文亦是正宗又云防外難難云若但有授記處皆正宗者法師品初中亦有授記何不判為正宗量云法師品是有法亦得名正宗故宗因云有授記同喻如前八品八品之中有授記即得名正宗段法師品中有授記云何不名正宗攝法師品中有授記不得名為正宗段八品中有授記同彼不名正宗攝答疏云或并法師等言持品雖授現座等問疏言若取說一乘及授記處是正宗者勸持品中為兩類尼亦授記何不正宗段答疏云持品雖等有三因由不得正宗段一因請持經佛與授記二仍言前已總與授記三更不記一乘故非正宗授記經文云憍曇彌我先總說一切聲聞皆已授記今汝欲知記者將來之世當得作佛號一切衆生喜見如來佛告耶輸陀羅汝於來世百千萬億諸佛法中修菩薩行為大法師漸具佛道於善國中當得作佛號具足千萬光相如來言因請持經者經云世尊導師安穩天人我等聞記心安具足諸比丘尼說是偈已白佛言世尊我等亦能於他方國土廣宣此經問却是世尊與他授記了然後持經即是先因授記後請持經如何言因請持經後方授記答望佛本來賞他持經持經心則在前授記心則在後也本來擬捥持經尼亦心懷憂色然與記請持經為因後方授記為果故言因請也又云因前藥王請持經佛意欲令二類尼衆亦請持經故先與授記也言餘十九品總名者路云合言十八品半答但是總相科也言讚證受命等者此有五種流通一讚重法師品初讚法師之德令生敬重故二證信寶塔天授品是也寶塔他證天授自證三受命從持品至常不輕是持品是正受命持經餘品展轉生起四付受神力囑纍品五分行分行流通從藥王品至普賢品是藥王菩薩自行苦行以流通妙音菩薩教化衆生行苦行故名令行若准疏主科云初四品讚重流通讚法讚人可尊可重即是跡中讚證次七品學行流通學弘此經正行助行令無傷毀即是疏中受命後之八品付受流通示相付囑稟命行故即是衆中付命行故上疏主第二遍科八品半正宗言或初序分等者此下淨法師科也即是序品彰興致之由也言從方便品下至等者紀國科十九品為正宗自依瑜伽作境行果三科也問若是智積中路請還十九品正宗如何和會答即如攝釋下根不測上智事將謂說正宗訖是故請還所以多寶不去也言說境令知等者下釋意也問何要說境答疏言說境令知等四十年前如來說權不知是權執為究竟法華會上說實不知是實又復驚張疑怪如來何以說法華經說權令捨說實令取捨羊鹿而上牛車棄化城乃歸寶所只此權實對鶖子能緣心便名境聲聞聞此遂便得記經云彼即是汝身宜應自欣慶又云千二百羅漢悉亦當作佛從方便品至持品合十二品明一乘境境中有權有實對聲聞能緣心物名境也言說行令知因等問何要說行答前來境鶖子已知權可捨知實可取未識一乘之行所已說行令知因之是非令識四安樂行為是十種惡緣為非勸令學是而除非經云復次菩薩摩訶薩觀一切法空如實相不顛倒不動不退不轉此為學是經云不親近國王王子大臣官長不親近諸外道梵志尼乾子等此是除非也如來正說行行之次下方菩薩從地涌出為感應之事正是行四安樂行持經之人獲得安樂一品明所行行涌出菩薩悉是能行行人兩品總名為行問如何能行行人亦名行答攬法成人人之所成亦名行也言說果令知身之等者問何因說果答衆言說果令知身之真化等緣聲聞前來捨權取實行一乘行取一乘果去只將謂丈六身便是真佛欲擬求靈山佛身所以彌勒請果如來說三身壽量果也就果中疏家科五品經為一乘果如來壽量品至不輕品是壽量極淨圓明果分別功德因聖分證果隨喜功德品神利超勝果法師功德經力難思果常不輕菩薩品引已曾證果初二品明已滿果後三品明未滿果若尋常解如來壽量品并分別功德品名已滿果分別功德品不合名已滿果因聞已滿之功德亦名已滿果今此間解壽量一品名已滿果餘四品名未滿果此門品雖明果但是因中果說四品中初分四品名未滿果此門品雖明果但是因中果說四品中初分別功德品無漏果後三品有漏果就有漏果中一品是傍行二品是正行又一品是所行之法一品是能行之人又云壽量品究竟位中果分別功德品見道修道果法師功德品加行位中果隨喜功德品資糧位中果問如何不說常不輕品答彼是能行行之人證前四位引已曾證也說果令知身之等初三句標已滿果已問說果有何意答說果令知身之真化真字因法身報身化字謂化身乃至十地菩薩現十種身等並是化化身及他受用身如水中月影法身如虗空自受用身如天上月但證法報何愁不得化身言證之果因者證字屬佛佛果名證也果因者路云證因之果名證之果因之字助句或證得果證得因名證之果因上標已滿果言勸識之化等者二句釋已滿果也勸識丈六化身知化身是權也求證於真者法報二身名真也上明已滿果了言漸獲因果等者解未滿果也因字是未滿果即是資糧加行見道修道也果字唯因即是見道修道果即是未滿果故名漸獲因果也合此因果功德故名二位勝德言菩薩知此遂便等者二句顯能得人即十一位得證是也言具顯果因等者二句合解五品也因是未滿果果是已滿果因果總說故名具顯也言所成勝德者是三身功德是他未滿果家所成佛果也上正宗十九品訖言神力品下等者餘八品名流通有三流通一示相流通神力品舒舌放光示相也二付囑流通囑纍品三稟命流通藥王品直至經末是言此等所由皆等者是指陳永之前科判序品等三分如此所由皆至下釋本文中廣有分別也牟云上釋總是科判了以三分為定即當晉朝道安和上判一切經為三分宜合西方親光菩薩佛地論判一切經分為三分也問世尊今者說此三分何所表耶答然大聖出興務存益物慈悲說教必被根宜所以四十年後會彼鷲峯將啓妙門聖凡雲集身禪定窟毫相凝暉地振動而覺小心天華雨而驚大衆便傍驚耳目與正說為因說法前儀稱為序分何名正宗由序既興正宗宜說所以安祥起定告令當根理事齊明法喻雙辨加之一衆潤冷三根益存現緣名為正說何者流通但以如來布教非謂俱利當時欲以遠說斯經遐沾末代故三變淨土四命持經或目視向心付或手摩而上囑遂有大心高行應命弘宣或護法御人或焚身燒臂聞持總持之益人逾塵數一生之利衆越恆河沙斯乃廣利無涯傳流無際被乎遐代故號流通此即略明經之分齊也
