body:
  text: 鏡水沙門栖復集方便品言方便品略者三分分經今當正宗中八品經文三周說今方便品法說此品三門分別一來意二釋名三出體二十八品中唯此品無解妨有出體門也言來意有三者一八品為來意二十九品為來意三論家為來意且八品中第一三分為來意序分正宗流通今解序分了次明正宗正宗中最初方便品故序品後方便品來此第一來意望前序分為來意第二八品正宗為來意八品中此品最初故有方便品來第三八品中三周說今當第一周法說法說最初故序品後方便品來上總科文言一者依八品為正宗者言八品為正宗簡不取十九品為正宗故安中字也言蓮華有出水等者出體也今擬取正宗為來意正宗有二八品為正宗十九品為正宗今先定却八品正宗分齊然後說來意問疏主何要說取八品為來意耶答准法華論及法華經八品為來意則勝十九品疏主云夫論義者先觀題目題言妙法蓮華即須取蓮華為正宗蓮華者開敷出水義捨權取實破二會二唯在八品離此八品已外更無說處欲擬取向下八品為正宗去所以此間先解蓮華意言有蓮華處即正宗也問此間解方便品來意何要說正宗答科八品為正宗者意明序品後即說正宗正宗中先合說方便品所以先向此中商量也欲擬解開示悟入三果一因故致斯語蓮華有出水開敷之二德既有出水開敷之德所以喻妙法具果秀行竦之兩能果秀即同出水行竦便類開敷即一乘因行從下直取至上上佛果故名行竦也佛果菩提甚高廣深遠此一乘行直能取得佛果高即出過三界廣即遍滿十方深即不可測量遠即時長難至故佛果雖高廣甚深無物可到可取得唯一乘因行能取得高廣深遠佛果菩提名行竦即開敷義故八品廣明行果出水開敷之義故八品名一乘之正宗也國語云竦者善也御惡也廣雅云竦者敬也謂高上也行能崇善上升而取於佛果故云行竦有作疏字順蓮華開敷義不妨上依論解開敷出水義問如何不取教理為蓮華唯說果秀行竦行果蓮華耶答若論一乘體教理不妨總取若論蓮華義行果則勝教理則劣若取教理為蓮華第一周方便品初已說教理得名蓮華則第二第三周唯說行果應非蓮華初周開示悟三是果入佛知見是行第二周牛車是行第三周寶所是果故知蓮華多取行果故言行竦也竦為息惡務善進也有云疏者即疏條行扶能疏條而取於果辨云疏者開也行能開果故喻開敷行若開敷果即出水如世間未有果不從華生未有華不招於果此華不有則已有則華實俱含法中論此行不有則已有則必招佛果未有行不招於果未有果不從因來疏言佛果不可虗成必由業行方得竦字有據不及疏字順開敷義雙取則勝言又經下言等者今此經中唯說一乘簡去二乘也言故以破二會二等者一乘即是正宗也此經既以破二會二為正宗離此八品無破二會二處所以唯取八品為正宗也四十年前執二乘為極世尊破云十方佛土中唯有一乘法無二亦無三第二周云如彼長者初以三車誘引諸子然後但與大車第三周云向者大城我所化作知所執之城是權能執之心亦破故名破二也會二者四十年前於一乘道分別說三會權入實會二歸一是法華之正主主者宗義依疏科八品正宗義言故三周說等者意言上依論依經科了就八品之中三周說此周者周圓周足四分皆足故名周也法說譬說宿世因緣說名三周逗者字書云逗留也說文上也方言住也有云逗者繹也此解為善易彼二乘執心而皈一乘之位三周逗彼三根者初世尊法說欲令一切聲聞總解及至說了只鷲子一人解將謂世尊唯為鶖子一人說餘五百千二百人總未解不可還更法說遂著喻也及至喻說只有四人解恰似只為四人喻說相似中根四人信解佛說藥草喻品佛重述成授記品為之授記餘下根千二百二千人聞法說不解聞喻說不解不免宿世因緣說說過去結緣之事為第三周結緣始悟解又初周因果理智雙說第二周偏說因智第三周偏說果中理是故名三周說逗彼三根也言此品初說一乘等者問三周八品何故前說方便品不說餘品耶答疏言此品初說一乘為鶖子也最初從定起唱二甚深經言爾時世尊從三昧安祥而起告舍利弗諸佛智慧甚深無量其智慧門難解難入次鶖子請有三初狹自他疑故請經言我自昔來未曾從佛聞如是說次陳大衆植因故請經言爾時舍利弗重白佛言世尊唯願說之唯願說之所以者何是會無數百千萬億阿僧祇人等後從化堪聞故請經言今此會中如我等比有千萬億等如來三止初讚希有止經言舍利弗取要言之無量無邊未曾有法佛悉成就論云初止為相令真聖者問取一乘令假聖者避席而退二恐驚時會止經云爾時佛告舍利弗止止不須復說若說是事一切世間諸天及人皆當驚疑三恐墜大坑止經言佛復止舍利弗若說是事一切世間天人阿修羅皆當驚疑第三開斯實相啓彼權門分二初取記許攝授故後與記正與陳說六段文未聞令聞舍利弗如是妙法諸佛如來時乃說之二者說舍利弗諸佛隨宜說法意趣難解三依何等義諸佛世尊唯以一大事因緣等四令住經言舍利弗如來但以一佛乘故為衆生說法等五依法經言過去諸佛以無量無數方便種種等六遮經言舍利弗十方世界中尚無二乘何況有三故言此品初說一乘等言最初於譬喻品等者分二初標聞法已喜生經言爾時舍利弗踊躍歡喜即起合掌瞻仰尊顏而白佛言今從世尊聞此法音心懷踊躍得未曾有後釋歡喜之所以分四一失大法以興嗟經言我昔從佛聞如是法見諸菩薩等二處小階而起嘆經言我常獨處山林樹下等三喜今聞而惱盡經言而今從佛聞所未聞未曾有法等四知佛子而道成經言今日乃知真是佛子等上領解次述成分三初陳往遇經言爾時佛告舍利弗吾今於天人等次述今逢經言我以方便引導汝故生我法中後顯還令依權取實經言我今還欲令汝憶念本願等上述成第四為之授記分二初因記經言舍利弗汝於未來世過無量無邊不可思議劫供養若干千萬億佛後授果記經言當得作佛號曰華光言乃至等者經言昔在波羅奈轉四諦法輪分別說諸法五衆之生滅等初周了言譬喻品中舍利弗請者經言爾時舍利弗白佛言世尊我今無復疑悔親於佛前得授阿耨多羅三藐等云云爾時佛告舍利弗我先不言諸佛世尊以種種因緣等舍利弗今當復以譬喻更明此義云云次正說喻分二初喻昔權後喻今實昔權有四一三界佛有喻經言舍利弗譬如長者有一大宅二五趣危亡喻經言多諸人衆等三見設權方喻經言見是大火等四依言免難喻經云爾時諸子聞父所說等後今實分四初諸子索三經言時諸子等各白父言父先所許等二父但與一經云爾時長者各賜諸子等一大車等三釋成父志經云是時長者見諸子等安隱得出等四越子本心經言是時諸子各乘大車得未曾有非本所望等上喻了言中根四人領解者分三初敘四人之喜敬者經云爾時慧命須菩提摩訶迦葉至從佛所聞未曾有法世尊授舍利弗阿耨多羅三藐三菩提記發希有心歡喜踊躍次中四人之領述經言我等居僧之首年並朽邁後陳四人之荷恩經云世尊大恩以希有事憐愍教化利益我等無量億劫誰能報者上領解了言佛說藥草喻品為重述成者分為三初讚印者經云爾時世尊告摩訶迦葉及諸大弟子等次述成分二初法述分四一佛興於世經言迦葉當知如來是諸法之王若有所說皆不虗也二法利群生經言於一切法以智方便而演說之三受道有殊經言如來觀知一切諸法之所歸趣四不能自達經言又於諸法究盡明了次喻說分四一法王出世喻經言迦葉譬如三千大千世界山川溪谷土地所生卉木藂林及諸藥草此上總喻後別喻密雲彌布三法王出世喻經言遍覆三千大千世界二說教普滋喻三稟潤各異喻經言一時等澍其澤普洽卉木藂林及諸藥草四不自覺知喻經言雖一地所生一雨所潤而諸草木各有差別後結成經言今為汝等說最實事諸聲聞衆皆非滅度等言便為授記等者大迦葉號曰光明須菩提號曰名相迦旃延號曰閻浮那提金光目楗連號曰多摩羅跋旃檀香上第二周了言化城喻品說往結緣等者經言諸比丘我等為沙彌時各各教化無量千萬億恆河沙等衆又云爾時所化無量恆河沙等衆生者汝等諸比丘及我滅度後未來世中聲聞弟子是也向者大城我所化作上說結緣言利彼下根滿慈等者分三初滿慈心念領解經云爾時富樓那彌多羅尼子從佛聞是智慧方便隨宜說法又聞授諸大弟子阿耨多羅三藐三菩提記領授記復聞宿世因緣之事復聞諸佛有大自在神通領化城了言佛印述訖者分三初問衆見否經云佛告諸比丘汝等見是富樓那彌多羅尼子不二歎其今德經言我常稱其於說法人中最為第一三歎其往德經言汝等勿謂富樓那但能護持助宣我法亦於過去九十億諸佛所護持助宣佛之正法言便與授五百等者富樓那當得作佛號曰法明陳如與五百號曰普明二千人同名寶相第三周了言自下更無說一乘處者簡異正宗此結皈頭頭破二會二為一乘體兩頭相應故知八品為正宗也言今既衆集等者結皈來意衆集即十五類衆也緣和者如來是能化人在靈山所化衆又在靈山能化所化相逢故名緣和又云魔事既無若有一人作魔事不名和今既無魔事名和也初解勝言警之已畢者動地雨華放光等名警畢也言根器等者此不約身與佛相逢但約根熟合聞法華名根器符會根與法華經相符會符契也正可陳宗且說一乘法華既說序分即合正宗此品正宗居首故序品後方便品來也言二者依十九品等者總科也方便品下初十二品明一乘境者疏主依瑜伽作境行果三科也此經中無境行果三名目只是疏主安立著也十二品對能緣心名境兩品明行安樂品所行行涌出品能行人行人無別人攬法成人故人亦名行果者如來壽量品果中之果餘之四品因中之果如來壽量品極淨圓明果分別功德品因聖分證果隨喜功德品福利超勝果法師功德品經力難思果常不輕品引已曾證果言說境令知等者疏主斷也亦云正明說意也問何要說境答疏言說境令知乘之權實問如何喚權實兩法作一乘境耶答聲聞人四十年前所得二乘教理行果不知是權執為究竟對二乘能緣心說名權境法華會上唱阿含甚深即昔三教所詮智慧唯真實乘阿含甚深及所詮知盡名為實境也今向聲聞人說汝四十年前所得是權非是究竟勸令知權可捨知實可取所以初之八品正明權實者初周為上根說經言十方佛土中唯有一乘法是實境令取經言無二亦無三令捨經云十方世界中尚無二乘何況有三第二周為中根人說牛車是實境令取羊車鹿車是權境令捨經云但是如來方便之力於一佛乘分別說三第三周寶所是實境令取化城是權境令捨言次之三品嘆人美法等者美法即是嘆法以上句有嘆字下句即言美法也法師品初一長行一頌嘆人後一長行一頌美法人者經言藥王若有惡人以不善心於一劫中現於佛前常毀罵佛其罪尚輕若人以一惡言毀呰在家出家讀誦法華經者其罪甚重又云若親近法師速得菩薩道也云云美法者經言已說今說當說而於其中此法華經最為難信難解又云藥王今告汝我所說諸經法華為第一言勸募持行者問佛何時召命其持品稟命答寶塔品云聖主世尊雖久滅度在寶塔中尚為法來諸人云何不勤為法天授品云吾於過去無量劫中求法華經無有懈倦又云若有深心信敬不生疑惑者不墮地獄云云兩品俱是勸募勸者勉也募者召募也又寶塔品言勸募以大音聲普告四衆誰能於此娑婆國土廣說妙法華經佛欲以此妙法華經付屬有在天授品身勸募經云採果汲水拾薪設食乃至以身而為床座身心無倦上二品言勸身勸想名勸募也二云法師品雙嘆人法寶塔品別嘆法天授品別嘆人辨云寶塔品別尊於法天授品別尊於人勸募亦通三品三品之中勸募文即暗以義而說有也法師品雙嘆人法亦是勸募持經之人寶塔品別嘆法天授品別嘆人並是勸募持經之人總名勸募若望佛意三品總通勸募若依諸抄勸募唯在寶塔提婆二品也准此聲聞稟命捨權持行實法唯在持品也持行二字唯在後品言後持一品等者准此聲聞稟命捨權持行實法菩薩稟命持聲聞捨權持即是二萬菩薩此方持四類聲聞他土持八十萬億那由他菩薩彼此俱持也上總科也言科初八品等者下別科也意言境行果三之中科八品亦是法說權實喻說權實宿世因緣說權實故十九品正宗中科八品與八品正宗道理不別十九品正宗中最初是方便品故序品後方便品來又境行果三之中未明行果且初明境境中有十二品經方便品是最初說一乘境故序品後方便品來又就十二品中初之八品正明權實之中初法說權實喻說權實宿世因緣說權實令且初明法說權實故序品後方便品來也言三者論云自此等者自此已下指方便品名自此已下論主意總自此已下之言八品正宗總屬已下中攝也且總解論云初周教理行果為因果第二周說因不說果第三周說果不說因教理行果四法皆有因果也言此意從前序品等者體相相狀疏主略解論中相字便有三師解釋各自不同也第一師取教理為因果依顯了因果解體相相狀能詮教為因所詮理為果教是有為詮之因但名相狀也所詮理為果之中有為無為二種差別道理理為相狀真理理為體相第二師取行果為因果體相相狀行為因果為果行中初地已去無漏智但名相狀十地所詮證真如即是體相也因中有為為相狀因中無為為體相也果中菩薩為相狀涅槃為體相故名因果體相相狀即開示悟入三是果開佛知見雙開理智二身通二種總名體相相狀示佛知見別明體相悟佛知見別明相狀第三師教行並為因理果俱為果是故名體相相狀上疏主解論文言一云所說等者標也第一教理師解因果相教為因即是詮理之因故名因果相言如門為入等者問如何喚能詮教為作門答疏言如門為入室之所由解門義教為顯理之處所解因義也無有理不因教詮無有人家出不由戶顯非親因果故說顯理之處所顯理即是法說喻說也言蓮華但說等者第一師無量義經第十六名蓮華取教理何故此經是蓮華不取教理論主解教為開敷理為出水教況華開敷理況蓮出水若蓮華向上說有四義不妨妙法向上還取四法既蓮華向上只說開敷出水義所以妙法向上只喻教理故言蓮華但說二義即是出水開敷妙法向上兩能乃是教之與理因果故即智詮智即理也詮即教也或智是果詮是因故以教理因果相即教理為蓮華也言二云三請已後者第二師取行果為因果相三請者騰疑置惑請供佛修因請聞法歡喜請亦云初狹自他疑故請次陳大衆於餘佛所已植因故請後述自他已從今佛化堪聞故請言明一大事等者即此經明因果一乘意約行果名一乘前三是果入是其因此約生因因果謂從因修至果但菩提智名曰生因能證涅槃所證名果或可前是了因因果智照涅槃亦名了因通二釋言初揚智門等者釋難也第一師問第二師云汝唯取行果為蓮華不取教理者如來出定唱二甚深是何法耶答第二師通者初揚智門之意等初唱教理者緣鶖子執二乘為極疑心易除執心難斷佛所以回執心作疑心也不疑則不請不請則佛無由說經所以唱二甚深教疑也初揚智門者智是理教之門言欲發鶖子等疑等者等取三根疑文即是令其生新疑也言令其固請者路云總云因請令其請方說一乘故言因請有本言因請即是三請不退堅固而請漢書云班固注云再三也如來初止鶖子便請也世尊第二度止鶖子又請世尊第三遍止鶖子更第三遍又請佛見之不已方順請而說一乘也故知不取教理正取下行果為一乘宗固即殷重再三之義也第一師問第二師云汝豈騰他天親菩薩云解蓮華尚自取教理汝第二師何故不取耶第二師答云汝第一師自錯無量義經蓮華是菩薩蓮華此性蓮華是聲聞蓮華菩薩蓮華是教理聲聞蓮華是行果不得將菩薩蓮華解聲聞蓮華也第一師又難第二師云我取蓮華向上開敷出水義況教理教開敷理出水汝向行果向上如何作開敷出水義第二師答云法華論中開敷出水義自是解他無量義經蓮華不解此經蓮華汝必若要行果向上開敷出水義我行果向上亦有也言蓮華二義雖等者通妨也問若取開示悟入為因果何故論中以蓮華二義喻於教理為因果耶答疏言蓮華二義等蓮華二義雖解無量義經蓮華我行果向上果秀為蓮華出水行敷是華開故取蓮華況於行果行果向上開敷出水義未爽無量義經中蓮華二義之通理又開敷出水義遍在四法向上總有名通理爽由失也乖也未失通途道理意言解無量義經教理不要同他行果設同行果理亦無乖失也故言雖也問論中出水開敷二義但喻教理今明行果名為蓮華未審教理二種是何中攝答以果攝理以行攝教教行並開敷理果俱出水此亦未爽彼出水開敷之二義也上初揚智門通第一妨蓮華二義通第二妨也言三云初智等者第三四法師也問三釋有何差別答初一釋依論已明而非是正論解無量義經故第二雖正據勝而言亦非總理第三師更無別義只攬前二師為第三師正義離之兩傷合之雙美四法總為因果相如候白與二人同相隨行二介人一個買一個𩟘餅侯白沒錢買每人是半介那二人出錢人一介得半介喫侯白獨自得一介此中亦爾言初智及門者初陳宗也智即理也門即教也門即因也智果也言令識昔等者釋意也金云此證四法俱名蓮華也說教理令知方便教雖有三所詮之理但唯有一談行果令識行及方便有三果體唯一初說教理如一室而有三門後談行果如一池而水有三道相國云但知談二甚深是實表知昔日說三為權權實相涉令其取捨故取教理行果四法道理周足也今說教深令知昔日教是權今說行深令知昔行是權也言聽三乘之教等者四十年前說教行是權究竟唯一四十年前聽三乘之教法華會上悟一乘之理行三乘之行取一乘之果所以四法之中先唱教理二深若不先唱教理因何二乘知有權實捨權就實捨權就實事須是教理也此中意言對不定姓故以三乘之因證一乘之果若望定姓行三乘之因證三乘之果解三乘教證三乘之理若不定姓經云汝等所行是菩薩道又先雖是聲聞後作菩薩故言如前已釋者指解經品得名中及十七名中三師廣解也言此品具明等者此第三來意准法華論為來意也唯約三周為來意不約序品也此品四法總說因果雙陳故最初說餘品不具故次居後故有序品後有方便品來也言便者切符連反習也安也不惡又婢面反利宜好也言佛智有二者問今解方便智何要言佛智有二耶答欲說方便智事須兼論後得後得依他根本智有根本智故方有後得有後得故故始有方便方便智是後得智上權巧作用欲擬舉用事須兼體已明體即真實智實智即是根本智欲擬說後得須兼論根本也亦通後得無漏實智後明方便即是善巧之異名後得智上妙用通三乘故故云佛智有二也金云真實智此通根本後得二無漏智總名真實攝云泛明佛智有此二智更分為三一根本二後得三方便也言實法亦二者意言智既有二般境亦分二種也問此明能緣智何要明所緣實法答有二意一緣此二智行相深隱難知若不約境辨之二智無由得顯故先從境以明智因境起先論實論境了後方說二者智不孤起託境方生起依境立智如解於信先云於實德能深忍樂欲即是所信之境也言體實者體實簡遍計性依他圓成俱是實攝從種生故有為即依他無為即圓成地持論云有為無為名為有我及我所說為空謂有為九十四無為有六有為依他無為圓成俱是實攝問有為之中忿恨依嗔似長短方圓依色上似何名體實答攝似從實亦名實也二者真實唯取圓成實性兼簡依他金問體實既攝有漏無漏有為無為盡何須別說真實境耶答只為能緣智有二所緣境上別分二種前體實通根本後得勝今此真實境唯根本智勝也前來有為無為是有體法但名體實不得名真實以持依他法如幻事對妄名體實身若對真如法不名真實問體實中無為與真實中真如妙理何別答有二解一體實中無為是六無為中前五無為真實中真如妙理是六無為中第六真如無為二云體實中無為依詮所顯下真實中無為廢詮談旨法爾但是所對不同上言無為以對遍計下言真如以簡依他由斯不同遂分二種境訖言實智亦爾者言亦者亦所緣境也一如體實智即根本後得總名如實體攝云智依境起實境既二故智亦二本意欲辨方使之體若不對真而明以形何法得名方便故先舉真後明方便所緣之境既有二種能緣之智亦有二種上標言即觀體實者釋也意言即觀體實無漏真智對凡妄智不知名實結云根本後得俱是如者稱順義稱體而知名如實智若是後得智緣有為時有為法上了依他如幻事亦是如體而知也根本智證如時無分別也所緣境中有體實境為真境境既有二智緣於此亦有二智故疏言實智亦爾亦者亦所緣二境也二智者一如體實智即根本後得總名如體實智此是能緣智也即是觀前體實之法謂有為無為此是所緣境也問根本智親證如可知如體而知後得變影緣如不稱法體如何言如體實智答本後二智親疏雖不同約法體而論總名如體實智問何名實智答一緣實法二對凡夫妄智而得實名以凡妄智不稱境智權生分別不得實名故疏言對凡妄智不知名實智即諸有漏智皆名凡妄也然此親疏真妄不定可為四句一非親即真謂本識不變緣三種境二有親即真謂本智緣如不變影故三有疏即妄謂前七識託本質而反影故四有疏即真謂無漏後得智變影緣如故後智緣如雖不親證然似故亦得真如鏡中火今此本後二智緣境雖有親疏不同然皆真也故疏云二俱是也意者此如體實智通根本後得根本智唯緣無為後得智通緣有為無為也言證真實等者簡依他法依他法如幻事不得名真如妙理即是此間證真實智亦是第四勝義廢詮談旨觀一者法界智良問所緣境中有為無為二種皆言實者對何名實答對遍計性故依圓二種得於實名善戒經云有為無為名為有我及我所名為空問圓成可名實依他何名實答依他有體故名實問此所緣三性體各有幾答圓成有二一離倒圓成即無漏二究竟圓成即真如今即真如為所緣也依他仗因託緣如心起時必具四一從種生為因緣二託境而起為所緣緣三前心引後心為等無間緣四不相障礙為增上緣遍計亦四種一自然遍計如僧佉外道執諸衆生從於冥性自然而有等二名言遍計如世俗人從佛乞得名為佛奴後執此名字而生彼我三相屬著遍計如世執是我田地等四剎那遍計如身剎那生滅凡愚計常等是問此間真實與體實無為何殊答隨境分智對後得不證為名無為之智對凡妄智不稱法體而立今引真實唯是廢詮談旨第四智言此有五對者一者如來後得智是一緣五般境能觀智隨所觀境以得五個智名字二者根本智不隨後得智緣五般境但得真實智名也是能對其所對智有五一知妄二知事三知相四知詮五知權也根本智唯內證不隨後得智知妄知事知相知詮知權根本智對此五個知但得名真實智也路府由此略敘八諦令學者易悟於此義中初總名後別名且總名者一世俗諦亦名隱顯諦世謂隱覆可破壞義俗謂顯現隨世流布義隱覆空理有相顯現如結手巾為兔角等隱本手巾兔相顯現此亦如是今隨古解名世俗諦亦名隱顯諦二勝義諦舊名第一義諦亦名真諦別名者依瑜伽唯識二諦各有四種一世間世俗亦名有名無實諦二道理世俗亦名隨事差別諦三證得世俗亦名方便安立諦四勝義世俗亦名假名安立諦即二空勝義諦勝義諦有四一世間勝義亦名體用顯現諦二名道理勝義亦名因果差別諦三名證得勝義亦名依門顯實諦四勝義勝義諦亦名廢詮談旨即此四個世俗及四個真諦成其八諦前一唯俗後一唯真餘中間三個亦真亦俗將此三法若對前瓶盆車乘即名後三真也若對後一真法界即名前三俗也若據體只是為般事如來後得智是一能知此五般事立五個智名也其能對治唯一正體智即證廢詮談旨之真智知何者五一知妄智者如來後得智是能知之智妄法是所知之境智能知比故妄法名知妄智妄謂軍林瓶盆車乘等即是第一世間世俗諦凡夫外道不了是妄執為實有如來後得智能知妄法名知妄智如來根本智唯內證一真法界知真不知妄對彼知妄智名實智問遍計所執舉體是無云何說為聖所行境答彼約遍計體言智不緣今知其妄計後得智緣故唯識云凡愚執有聖者達無許佛緣故亦得說為凡聖智境二知事智者事謂三科體事即是第二道理世俗亦名隨事差別諦三科等法事相顯現差別可知之事為蘊處界中都無有我凡夫不了妄執有我有主宰用如來後得智知此三科體事從緣所生都無有我能知之智名知事如來根本智一向知理不隨後得智事名實智三知相智者相謂行相即四諦下十六行相即是第三證得世俗亦名方便安立諦染淨因果其相顯現名之為相後得智知名知相如來根本知性不知相對彼知相智名實智四知詮智者詮謂詮顯即依門悟如二空名之為詮即是第四勝義世依聖者之智依此二空門能顯真理名之為詮後得智知名知詮智如來根本智廢詮談旨不隨後得智知詮名實智此上四對智所對是後得能對是根本智後得智唯是隨境得五般名更無別號也根本智不隨後得緣五般境但得五般真實智名也言此之四種者謂其簡濫故恐畏人將謂疏中云知妄名實智乃至知詮名實智只恐喚後得作其實智所以疏言此之四種實智皆是唯觀第四真智即是證一真法界之智即根本智也言餘四所對等者即是知妄知事知相知詮四般智也意者唯明如來後得智能知四世俗名世俗智據實二乘菩薩總得名知妄事相詮然今欲解方便智故取如來後得如來後得有此方便妙用故問觀體與智體何別答體雖是一望義別照了名觀決斷名智簡擇名慧印持名忍望義各別得名有異也言五對知權名實者如來後得智知二乘人權所得所證羊鹿化城權時施設如來後得智知權名權智如來根本智證一乘理名知實不隨後得知權名實也問前四種智何不言知一乘至此乃言一乘理智答此為對二乘權智顯此究竟唯一乘理故言一乘也言此依證智等者即根本智也第四真即是四勝義中勝義勝義諦即廢詮談旨也言對後三俗智者即是第二三科四諦二空門知事知相知詮三也問後三俗即是前三真何故不對前三真乃言後三俗答後三俗智亦名權智亦名俗智正是真俗權實兩法相對故將第四真智對後三智俗問何不對初俗答以彼初俗所緣無體唯是妄法非俗證智故不對也若爾二乘人證生空理時亦是亡詮何非第四真耶答二乘證理之時雖得真彼自不知故二乘權智非第四真問二乘既無二空門智如何亦對第四俗耶答二空雖不雙修以分得生空故須對言若依趣入至於三俗者第三俗智是四諦十六行相及七方便是二乘趣入四沙門果及緣覺果第三真智是二空門菩薩趣入初地見道真實趣入也如來後得智能知大乘趣入名知實智如來後得知二乘趣入名知權智此能對所對皆是如來後得智不同前來諸解將後得根本也問何不將第三真對第一第二俗答第一俗唯是妄法無體不取第二俗三科法不是趣入之行相所以不取也問勝義世俗差別云何答有四別一約法異深妙之法名勝義分粗淺之法名世俗二約人上智所知勝義中下智知名世俗三約體異有實自體名勝義無實自體名世俗四約漏無漏異無漏之法名勝義有漏之法名世俗實智訖言方便智有三或四者疏主意欲擬解此經方便者但一切經中有方便字總引來也然後局明此經方便且泛明一切經中方便方便善巧智體唯一十波羅蜜中第七所攝或三者一進趣方便二施為方便三集成方便或四者於第二施為中開出權巧方便攝則有三開乃成四言進趣方便者進趣即是方便也秀云是小乘說佛及菩薩二乘在於資糧加行二位修七方便進趣見道已去四向四果名進趣也言謂見道前等者一五停心觀二別相念三總想念四𤏙五頂六忍七世第一且五停者一多貪衆生令作不淨觀為諸衆生不了世間五塵境界皆是幻化又亦不知自身本是四大五蘊三十六物以成其身遂耽染五塵保自身命不能離染由此長劫沈淪故佛大悲欲令出離愛染令其觀察諸法不淨故作不淨觀能除四種貪一者形色貪謂見長短方圓容貌美妙生貪心故緣爛壞等想而治之二顯色貪粧粉衣服向上作青淤等想作不淨觀而治之三者妙觸貪觸身細滑按摩等境而生貪心作蟲䖵等想治之四供奉貪謂衽奉合儀歌悅歡適因此生貪心令觀死尸不能舉動而以治之對法論云隨境界力煩惱現前此觀若成觀一切境皆為不淨若食入口不淨想現即便吐出此觀乃成二者多嗔衆生作慈悲觀破嗔恚者由諸衆生無始時來常習嗔恚相續不絶嗔若起時衆生身中所有善法悉皆滅盡能害衆生法身慧命故遺教經云當知嗔心甚於猛火欲令斷嗔絶不善源應觀衆生如己子想而修慈悲三者多癡衆生作緣起觀令觀十二因緣愚夫於此不了因果廣造惡業對彼為說世間穀麥種子如是因果生生不絶喻彼自身因果相續無明發行愛取潤生後得入道四者著我衆生作界分別觀為諸衆生不了此身五薀十二處十八界和合所成實無有我妄計有我由計我故受生死苦佛為愍此令觀此身唯有五蘊十二處十八界等法實無有我名界分別觀五散亂衆生作數息觀由諸衆生無法繫心縱逸放蕩情無禁制故數息以止散亂數者數數息者止息邪想種種攀緣造惡彌多修善全少故令數息以上散亂謂彼息風或出或入由中間暫時止息名息也然有六因而得圓滿一數上聲呼謂計心緣出入息唯念憶持出入息數從一至十此有三失一數減失將二作一二數增失將一作二三雜亂失將入作出將出作人離此三失是名正數若十中間而數錯亂復應從入次第數之終復始乃至得定二隨者謂繫於心緣出入息不作加行隨息而行所得何處若息入時入內身中遍身而行若出身外一搩手乃至一尋隨所至方念當隨遂三止者若不數息時不得令心散亂事須止心繫念在鼻端或在眉間乃至足指隨所著處數止其心四觀者謂隨觀察此息風已兼觀五蘊身乃能造所造所造十二處十八界為境五轉者轉謂移轉緣息風時安置後後勝聖根位乃至世第一位皆通作此行相六淨者謂後升進入於見道乃至盡智名之為淨問停者何義答攝云齊也意說五停心觀氣力齊等隨修一觀得入見道力用均等西明云停者住止義此之五觀停止身心停者住也於此五停行者停住心也二別相念觀者論名自相念觀身受心法各別自性名為自相大種所造身是身自性受是受自性心是心自性除此三解所餘說法名未自性也一觀身不淨除淨倒有五一種子不淨牡丹從子生還香伊蘭從伊蘭子生還臰二乘者施戒忍生還淨凡夫從無明貪愛生故名種子不淨小乘觀行觀行父母遺體以為不淨二住處不淨生藏之下熟藏之上臰穢之處於此安住三自體不淨地水火風假令連持皮肉筋骨三十六物以成其身名自體不淨四外相不淨九竅常流垢汙臰穢瘡痍膿血𥄏淚涕唾名外相不淨五究竟不淨氣絶已後膖脹爛壞皆成可惡及招後身沈淪六趣名究竟不淨二觀受是苦除樂倒有二一觀三受為三苦二觀八苦為苦且三受者一觀苦受為苦苦二觀樂受為壞苦三觀捨受為行苦二觀八苦生苦老苦病苦死苦怨憎會苦愛別離苦求不得苦五盛陰苦三觀心無常除常倒心心所法剎那無常前生後滅猶如猿猴曾不暫住有非常有不及無為無非常無不如兔角無彼有無二常之相故號無常經云色如聚沫不可撮摩受類浮泡不得久住想同陽焰從渴愛生行類芭蕉中無有實識如幻事顛倒所起四觀法無我除我倒法有三科法觀此法中都無有我凡夫外道妄計無我之處強執我也即薀計我離薀計我佛教薀處界中但有從緣生法都無有我上別相了三總相念者總將身受心法一處向上作苦空無常無我觀名總相念觀稍勝前位名總相念觀梵云毗鉢舍那此云觀觀即慧也四𤏙位從此總想念住成就已次生𤏙法聖道如火焚惑薪聖道火之前相故名為𤏙此𤏙善根分位長故能具觀四諦十六行相一觀三界苦果為苦諦二觀三界因為集諦三觀無為法為滅諦四觀能趣行為道諦此順決擇分善初善根生名為𤏙法是後聖道火之前相立以𤏙名此位之中以有有漏心學觀四諦也五頂位此位之中重觀前境四諦十六行相𤏙後有善根生名為頂位也於此善根中此最為高勝由如人頂故名頂法然此位中於佛所說苦集滅道隨順觀察於三中信為上首六忍位謂頂法後有善根生重觀四諦忍者印可達悟之義於四諦理能忍印持此最勝故故名為忍又無退墮故名忍下忍中忍同前𤏙法頂法具觀四諦修十六行相上品忍位唯觀世第一相鄰接故唯一行一剎那心名上忍中忍等有減緣減行等恐煩不述七世第一法從上忍無間而生此有漏故名世間於世間中是最勝故名為第一唯緣欲苦唯一行相唯一剎那心亦同上忍有仕用力引見道生故名最勝名世第一此之七種方便皆趣聖道之方便名七方便也言進趣等者進趣解前進趣二字向果者此之七位趣向見道見道名果言所學有則曰方等者七方便是二乘人所學法不淨觀是多貪衆生所學慈悲觀是多嗔衆生所學三十七方便與修行人作模軌法則名所學有則也隨位者五停心觀別想念觀總想念觀並在解脫分位四善根在決擇分位故名隨位順宜者多貪衆生作不淨觀著我衆生界分別觀多嗔慈悲多癡十二因緣散亂數息名順宜隨彼修行人地位名隨位隨彼修行人根宜名順宜言施為方便者施由設也為由作也言謂方便善得者前七方便進趣小乘人今此施為方便為菩薩即十波羅蜜中第七方便善巧波羅蜜多上舉體言後智妙用者顯用也論云後五波羅蜜多皆後得智善巧波羅蜜多後智妙用能行二利故名方便言一教行等者如來所說可依可學不同外道非可學故佛說法有可准承故名方此是教也稟教獲安此是行也三乘五性隨聞而學皆獲自果名便非如舍利弗令斷金之子作不淨觀浣衣之子引作數息觀不名方便也獲益得穩便利便名便也此唯利他也言證行方便者證謂所證理行謂能證智二空雙證理上無分別名正直曰方唯根本智內證餘智不能名智順正理名便此唯自利也言三不住方便等者蒞由臨也利音根本智證真名臨真後得智達俗名入俗也即後得智不住生死不住涅槃名蒞真入俗即無住涅槃能行二利也或蒞則疏入則親後得智變影緣如疏故名蒞真後得智親能達悟名入俗也方則約法便則約人即是證真達俗之方便法也言三集成方便者此與前二方便不同唯取一個法上能攝得多法向一個能攝法上說方便也言諸法同體巧成等者引文也有方便故一法向上能集𣫍得多法名巧相集成也秀云諸法雖異由道理等巧相集成令多法同體集為方便故名集成也言真如中等者問如何名集成方便答多法同體總有三種集成一以真如中具恆沙功德一切諸法皆不離真如故一切法亦如也二以智為門攝一切法即一切法無非般若即五種般若攝一切法也三以識為門攝一切法即一切法皆唯識故華嚴云三界唯心萬法唯識等言以智為門等者相國云真如具德雖過恆沙空智為門理皆證盡萬像凡境因從心生一念制之皆不離識以識為門真俗咸達以智為門萬像如一華嚴頌云若人欲了知三世一切佛應觀法界性一切唯心造識智兩強因果二位如一池水有無量門閇餘開一即無量門水皆名一門水無量功德法歸智慧門五位不同總名為識識自性等問何名智上方便答果中智強識劣攝餘歸智自性總名智也四智菩提智自體色法智所緣心心所法智相應不相應法智分位無為法實智性總名為智也因中以識為門八個識識自體心心所法識相應色法識所變不相應識分位無為識實性又三義一攝相皈真如性為門二攬餘皈智以為智門三攝境從心以識為門故名方便言故菩薩地等者善巧成即方便也言十地云總同等者引例成也十地者即十地論解十地經彼經中二十句嘆菩薩德論家釋前十句經文作六種義解即是總同成別異壞彼論解前十句經文為十種入入者證義十種入者一根本入謂智慧地二攝入謂聞慧三思義入謂思慧四法相入謂了知諸法五教化入謂說法六證入謂見道七不放逸入謂修道八地地轉入謂出世間道無貪等善根淨故九菩薩盡入謂第十地十佛盡入謂一切智入智彼論將此十種入作六種相解謂總相別相同相異相成相壞相謂總同成別異境以總對別以同對異以成對壞就十種入中最初第一句根本入初一入是總餘之九入是別初第一入總攝得下之九入下之九入因他第一入方有也且依六相解十種入者一總即根本入問何名總答總相者根本也此在種姓由有種性餘九皆成所以根本入名總餘九是別問何名別答由初一個入攝得餘九個入入義是一般所以初入名同同相也問何名異答異相者餘九個之中一一有多差別名異也問何名成答最初一句為能成也餘九句是所成成者略也壞者廣多說故名壞也又成是所喻也成者如積集多塵成世界故名成也壞者喻如塵散世界即壞也十地論名六相門於一切法上皆具此六相且如此講堂總名講堂緣等一一皆具此名是別此柱上有成講堂用名同椽等不是柱名異此柱等和合共成辨名成各守自性不相交雜名壞相問疏引總等有何意趣答疏中只取總同成三個不取別異壞就三之中唯取總義能攝餘九句意取以想對別成立此中以少含多巧相集成故名方便如此經言皆於阿耨多羅三藐三菩提不退轉一句是總是根本具含得八地已上菩薩功德經言皆得陀羅尼等十二句經文是別故名方便也言包總有則等者真如名總包彼別法有軌則故名為方以少含多名便以真如一法能含多法故名便便者便宜言實無此事等者如來實無叱呵調達愛語羅睺金鏘馬麥亦如瞿師覩三尺五百婆羅門灰身持衣說淨乞食等事今說有者應物現權而有故言方便也言謂以三業者佛地論六云謂成所作智起三業化一身業有三一神通化謂作十八變等二受生化謂八相成道三業果化謂示現金鏘馬麥背痛等事二語業化亦三一慶慰語化謂弟子修行諸妙行慶慰令成名慶慰語化二方便語化謂對放逸讚不放逸安置學處令厭惡法名方便語化三辨揚語化謂說決擇隨諸有情種種意樂而演說法斷諸疑惑等事三意業化有四一決擇有情化八萬四千心行差別一一皆能起對治門二造作意業化謂如雨華動地等如來觀諸有情所行之行行不行若諸惡行不行有德行即有失等三發起意業化謂宣說發他人善根故化邪衆生行實衆生等四領受意業化復有四一一向記有人問生者死耶答生者皆死二分別記有人問死者更生耶分別答云阿羅漢人死了不生由無煩惱入無餘涅槃故凡夫死了却生三返語記有人問言人是勝是劣耶返問言汝說人為復對天對三途若將人對三惡趣人是勝若將人對天人則是劣四默置記有人問言我是常是無常我是有是無耶默置記莫對恐轉增其病我若是有則說常與無常我既是無本來無體何處說有常與無常問成事智是前五識俱智何言意業化答無上覺者神力難知不可難也言此對實智等者意對自受用身說即根本智權巧方便是後得智潞問四種方便皆對實智何故偏說此權巧智對實智得名方便耶答前三方便於中兼有實智所以不對實智名方便此第四權巧方便無而忽有唯後得智上作用所以偏對實智立方便名也又前三方便各對別法標名且進趣方便對果施為方便對教行集成方便對以少含多今此第四既言權巧事須對他實智立權巧名不爾如何得名權巧耶言利物有則等者以法順根解法也隨時而濟者以根就法解便衆生樂大小乘佛與說大小乘法若樂人天乘與說人天乘或根熟者與說名隨時利物有則者如說先以欲鈎牽後令入佛道又剛強衆生剛強化等意言如來實無羊鹿化城但是隨根巧權逐便施為故名權巧方便也言此體即於等者問此權巧即於施為中分出等者施為中三方便問何方便中分出答於教行方便分出兼是不住方便一分也上泛明一切方便了言今此有三等者局明當經方便辨云疏中四重初三種方便次十二種方便次六種方便後二種方便亦可多種初之一重正解經意後之三重攝附論文三中復二初總舉後別顯也此初總也接下即引導衆生顯上乃發明佛法通彰合斯二種也言此經下云十方等者問經云十方佛土中唯有一乘法此是顯上如何言接下答意取無二無三兩句名接下今取上句一乘言又正直等者正直是一乘方便是二權令捨昔時方便取今日之一乘故名接下經文三周皆有初周云或說修多羅等第二周羊車鹿車今在門外第三周汝等勿怖莫得退還今此大城可於中止問十方世界中有二有三乘又不除却方便說即合是接下既除却方便說又無二乘三乘此是顯上何名接下答二解一云若約無二無三又除却方便不令是接下今取所除三乘所無方便名接下故三乘方便是接下二者頓悟菩薩是上根性人回心聲聞漸悟菩薩是下根性人只此經文為回心聲聞下根性人前領說此經文故名接下問若是委曲說可名接下今既正直說何名接下答二說一云取所捨方便對回心聲聞名接下二云只正直捨方便之言接引回心下根性人亦名接下言於前四中等者指文也接巧之中通三業今此多是語業也言一身方便等者經言即脫瓔珞細軟上服嚴身之具更著粗弊垢膩之衣右手執持除糞之器隱報身之實德名脫瓔珞現化相之權形相同有漏名著垢膩之衣塵土坌身示有煩惱糞器小教詮顯義同手執右者先也用之先故名為右手言我此九部等者下科顯小法非真說為大本證語方便言又趣波羅奈者言趣即是身業轉四諦法輪即語業身語雙證言尋念等者下科且說三乘衆生有益問無漏尋伺但在因中云何如來更言尋念答此示相也下科示相思惟言上同古佛者解上尋念過去佛所行方便力二句經文言下順有情者解我今所得道亦應說三乘二句經文言佛地經云者引教證也上解權巧之也言依此解云等者稱可法則曰方言善逗者逗者易義化二乘人從淺至深名易也又住止義法稱於根根住外法名善逗也言往生論云正直等者潞云此所引論文是潭鸞法師注往生論文問何名正直答離諂為正直解方字外已為便解便字也菩薩先人後己又外是衆生已是自身菩薩教化衆生親於他人疏於己身菩薩以大悲攝外衆生同於己身故名外己也上解已是菩薩自身外屬他之身也二云使己如外人將他如內身將外同己無自他故無分別故易云君子外其身而身先不𮨇自身而身先也菩薩亦爾凡所修行不自為身但為衆生令同己益故名外已稱便也言隱便云方者便是所接有情是劣方屬能接之聖智有情穩便之方法名便之方依主釋接下了言二顯上名方便者顯勝上之法即佛果理智皆勝上之法言方便者理體微妙有則曰方智用雙巧為便故名顯上方便也言無垢稱云等者彼經說有智慧方便能離於縛即顯上也貪欲是凡夫縛貪涅槃是二乘縛貪禪定是菩薩縛有方便故得離此縛即是此間顯上方便菩薩登地已上起無分別智以無緣悲攝諸衆生有彼慧悲不被空有所縛名解地前菩薩無彼慧悲遂怯佛果菩提時長遠故又見衆生數多難度怯彼所求所度遂住空有相中被空有所縛此由無方便故解即是無漏慧悲名顯上方便也潞四句一有便無方地前菩薩以愛見心莊嚴佛土成就衆生於空無相無作法中而自調伏有利他之便無斷惑之方是名無慧方便縛二有慧無方便謂二乘人有慧斷惑而不能利生名無方便三俱有方便地上菩薩不以愛見莊嚴佛土成就衆生於空無相法中以自調伏而不疲猒四俱無方便餘一切凡夫言此經下云等者我設是方便教也即是其智慧門即接下經文也令得入佛慧即所詮智顯上也又云一切諸如來以無量方便度脫諸衆生接下也入佛無漏智顯上也言初設方便等者意言此間是顯上方便前行所引經文皆和接下引來所以疏主分析云初顯方便後顯佛智也言理妙可則等者解方便二字也可者堪可堪與修行人為法則倣學名方問何名便答巧用能顯曰便則謂所詮理巧用能顯即能詮教之能顯理是方之便言其義等者其義即所詮理妙名方其語巧妙即能詮教妙名便攝教歸理方之便名便也言方之便者方是理便是教先有所詮乃有能詮皆依主釋言三通彰方便者若能被一乘教對根說則是接下若談一乘自體即是顯上若別分接下顯上者顯上是法華會上一乘教接下是四十年前三乘權教也然如來教上有兩個用一能顯所詮理將教對理名顯上也若教能接引下類衆生入佛法來將教對四十年前根論名接下具此二用故名通彰言下經大衆等者正出通彰經言世尊何故殷勤稱嘆方便是總也方便兩字含得接下顯上二種總名方便故總也佛所得法甚深難解即是諸佛智慧顯上也有所言說意趣難知即是其智慧門是接下也言又云佛悉知是以等者潞云佛悉知是已一句是顯上此所知法唯佛則知餘人不知故名顯上也以諸緣譬等三句是接下有云准疏意總配通彰不別配也但是總顯四十年前三乘權教順三乘根令一切歡喜名接下法華會上就大乘根說一乘法體是顯上法具此二義故名通彰也前來兩段皆別配唯此一段不配又疏言二皆通故故知是通彰也問接下等三三周有文否答潞云初周開示悟入名顯上十方佛土中唯有一乘法是接下遮令不退故第二周等賜牛車顯上以假羊鹿引生出於火宅接下第三周寶處在近顯上說二涅槃接下合取名通彰言即十二種等者略標類攝也此經中接下顯上通彰三義攝瑜伽論中十二種方便彼論外六種即是此經接下內六種即是此經顯上合此內外成十二種即是此經通彰也言方者統情機等者統情機之法軌者解方也統者攝也情即有情也機者尋常解機者根機即自有情此間解機機者機要即目教法之體名機要也言法軌者法謂方法軌謂軌則也此經有顯上之方法軌則能統攝得能被衆生機要之法故言統情機之法軌曰方問何名便答便者濟物理之要宜也便者宜便要便也濟者津濟也濟者濟益也物者根也理者法也此經之中有接下之便作濟物之要宜也此經之中有顯上之便作濟理之要宜也言方謂方軌方法者顯上也解方字也問何名便答便即要便濟理也便宜濟人也解便字也上略方便也言情謂有情者解前標中物字也機謂機要解標中理宗也統攝機情人也機要之軌法名方法也言貫人貫法者此經之中有接下之方貫人此經之中有顯上之方貫法也言物謂人等者人物根性也理謂道理法也此經有接下之道理能濟人此經有顯上之道理能益法也言濟人益法故者別結便字攝云濟人則利有情接下益法即令法久住顯上合此名通彰言此言意顯等者雙結方便二字有濟人之利便有益法之軌則名方故言方便言亦方亦便者問方便二字六釋中何釋答疏言亦方亦便持業釋將方就便便則是方也將便就方方亦即便安國唯依如來後得智智是體方便是用用向上有益法亦方亦便有利生之便名方便言由此義推等者有取依主有財持業三釋非也今准經中上下道理接下顯上通彰三釋上三方便了言三種合是等經論相攝內六種是此經顯上方便外六種即是此經接下合此內外六種一處解名通彰也言瑜伽四十五說等者初明所成十二種次明能成六種前來當經之中說有三種方便正是所要今此疏主見論家說方便故引來非此所要論具標云云何菩薩方便善巧有十二種答依內修證一切佛法有其六種依外成就一切有情亦有六種二六成十二種也言內六種等者一慈悲顧戀者即深念衆生心如地藏菩薩見衆生入地獄菩薩亦入地獄不捨衆生如於父母憐愍於子經言大慈大悲常無懈倦恆求善事利益一切而生三界朽故火宅又云長者聞已驚入火宅問何名內修證答為衆生而復發心即以悲心而名為內言了知諸行者由不捨生死亦能了知諸行即厭離有為心一切有為法之總名為了知諸行有漏不淨無常敗壞剎那生滅而不染著名了知也言欣佛妙智等者菩薩所修行小善欣求無上之妙智即四智也初一化身因次一法身因後一報身因言不捨生死者菩薩發願若一切衆生不成佛者我終不取無上菩提名不捨生死不同二乘厭生死求趣涅槃言輪回者菩薩雖處世間輪回六趣教化衆生而於世間不生染著言熾然者菩薩行行如救頭燃精進修習無時暫輟由智故輪回不染樂利樂他故熾然精進有抄將下三句釋上三句又云將上解下勝也言外六種等者即菩薩利益衆生令衆生捨微小物或一團食或以一華由回向虗空法界一切諸佛其物雖少而獲福無量故頌云若人好布施天神自扶將施一得萬倍安樂壽命長如一食施辟支佛天上人間九十一劫常受快樂言令小戒等者如薄俱羅持不煞戒經五不死乃至當得無上菩提亦引大善根也亦簡外道持雞狗等戒空無所獲暫持戒八戒生天受樂遠招佛果名大善根頌曰若人於百劫供養百羅漢不如一日一夜受持八戒齊以八戒一日一夜得生天名小戒也言增聖教等者增謂增益增嫌之義有諸衆生於諸聖教而不解了隨文執義而生增嫉謂不解佛密意有空二種言教道理執空者增於有教而生恚惱執有者增於空教而生恚惱如佛說空本空遍計不空依圓總撥為空即是增益他聖教也菩薩即以種種善巧方便隨順而會通解釋之除其恚惱故言處中住者於內外及空有教中亦不生受亦不生增名處中住亦令趣入即令種解脫分善根不能進修菩薩以種種方便令其趣入也言已趣入者令成就成就即是修行已修行者令得解脫解脫即是三乘無學果也言十二種中為成四等者明能成六種為成外六種所以修能成六種也外六種為所成也攝釋云所成六中初二少施等善感無量果二小戒等力引大善根由此初二種已成滿故不要成也從增聖教已後成也即是能成六種成所成四種也問何名能成六種答第一隨順會通成前增聖教者除其恚惱也第二共立要契第三異分意樂第四逼迫所作成前處中住者令其趣入第五施恩報恩成前已趣入者令其成熟第六究竟清淨成前已成熟者令得解脫言隨順會通者諸謂衆生聞諸教說一切法皆悉是空遂生增嫉菩薩即以方便隨順而與會通將欲說時先現柔義身語接引令生愛敬除彼於己所生恚惱彼生愛敬已於法起樂然後為正說法等言將為說者意言若先美人後必慕法言彼不解空密意言教者出不解人言一切諸法無性無等者出不解事論有五句一皆無自性二皆無有事三無生無滅皆四等虗空五皆如幻夢前三句法說後二句喻明疏闕虗空或疏云等者亦是等虗空也即是正出外人所迷之經也秀云謂世尊經中說一切法無性無事無生無滅如幻夢等皆是世尊密意而說非是諸法其體都無所言無者但約遍計所執衆生不解佛密意言一切皆無遂生憎嫉名為不解空密也言無性謂圓成無事者謂依他不同禪師菩提涅槃亦無非此計也言如理和會者正會有四句問和會何法答會前提聖教者除其恚惱也言彼經不說一切等者會第一句也經意不說依他圓成一切諸法總無其自體故言不說一切法體都無所有也有為無為攝一切法盡名一切法即是依圓二種是有也言但無所執可說等者為有愚夫強執增益我法自性恐不能斷故密意言一切法都無所有言無者依圓二性向上遍計所執言教向下都無定體故言但無所執可說自性不說依圓亦是無也問但無遍計一種云何經言一切法皆無自性答能遍計心執彼彼物所以遍計亦名一切但約諸法上可說自性謂一切法離言說言說不得諸法自性執有言說諸法皆是遍計所執意言謂能遍計心無始已來依名計義以義計名此所計法舉體非有但是計心執有自性今者說彼言無非是無彼所遍計境依他性也問所遍計境為通何性答攝大乘說是依他起性遍計心等所緣緣故既為所緣緣必須有體法故彼所執我法是所遍計問執心起時當情我相說為何等答此但名境不名所緣緣境義寬無亦名境所緣緣狹無法即非取彼依他法為所緣緣故意言自心變起離自心外無有別境能牽於心如彼依他問圓成實性何非彼境答真非妄執所緣境故若依展轉說亦所遍計如計繩為蛇迷杭為人麻喻圓成實繩喻依他作蛇解時便是遍計理實通迷也言據第一義非等者此會前五句中第二句經中無事也若依一真法界此言說事都無實體意言雖有依他圓成二法所言說事然依此事起遍計言如此遍計言下所說法之自性如兔角等性離言詮彼執法心無其自性若爾與前性何別答前約無其體性此約無其事相前即所計境此即能計心也言既彼性事等者攝云會第三句前說性事皆遍計所執本無自體體既是無何有生滅皮既不存毛將安附所以彼經言一切諸法無性無事無生無滅等第四句如虗空等者疏中闕不引攝云彼論云譬如虗空受種種色色無之處即顯空虗猶如依圓為我法二執所蔽執無之處即顯真如等言又如幻夢等者會前第五句皆如幻夢明彼依他猶如於夢如手巾上結兔顯是幻也睡中所見夢也既是幻夢皆是虗妄所有都無作用又依他性但如幻有由此會通令增聖教者得除恚惱意言一切諸法即依他起皆如幻夢也言非如顯現者依他法上有體有用名如理顯現遍計性無體法不似依他法上體用顯現言亦非彼事都無等者意道遍計性向下依他法是有遍計不同依他法是有故言亦非彼事等言二共立要契者契者約也論云菩薩若見有情求飲食資具疾因名利工巧藝術即便共彼先立契云汝等若能知父母恩德及供養沙門婆羅門乃至若能持戒我當隨汝所欲與汝衣服等如其不能乘不施與此第二第三度成前處中住令其趣入言異分等者有二意一者先許者之名同分意樂二者異於彼故名異分又意一者先許後通異前分故二者非內心爾外現違內故言異分論云謂諸菩薩與諸有情立要契已彼諸衆生得如上衣服資具田宅不肯修菩薩行及以利益之意先許不與或已却奪非是惡意而不與也彼若修善還却與之現憤恚相非內意樂實欲拔濟示現嗔恚名為異分言此等權時等者問菩薩教化何起嗔恚答疏言此等權時等如世父母憤責子時汝甚愚癡等非內心實等言四逼迫者或前處中住令其趣入言有自在力者論云或為家主或作國王名自在力不知恩德者與錢財飲食於彼前人有大恩澤彼不順行名不知恩也先求所許與錢財物彼不修行並不與之令斷所求故大論云諸親用等若於父母不知恩報恩乃至毀戒之者乘即不與衣服或當捶罰或當驅擯立一使人當令伺察由是有情怕怖治罰斷諸惡法皆修善法瑜伽論云逼迫所作方便善巧也言五施恩報恩者成前已趣入者令其成熟也言曾於彼所等者菩薩曾於有情或濟所須或濟危難令得安樂彼諸有情深知思慧欲得報恩菩薩爾時勸令修善以受報恩菩薩告言汝等以非世財成相酬報為大恩汝但修善名大報恩也此下第四第五成度前已趣入者令其成熟也言六究竟清淨者第六度成前已成熟者令得解脫究竟者畢竟也清淨者離染也果道滿已已歷三祇令生欣樂請轉法輪論云云何菩薩究竟清淨答先現上生覩史多天無量有情作如是言有菩薩生此天來不久下生往瞻部洲成佛覺我有情隨佛下生也即是彌勒菩薩於晝夜六時中一一教化五百億天子成不退轉言此中方便等者指方便品也即是瑜伽論能成六種中隨順會通成前增聖教者除其恚惱亦即通三方便會昔三權接下通今一實顯上合此二種名通彰也言決擇唯識等者金云兩文說有二種皆是此法華中方攝設於二乘即是拔濟回心向大即是回向也言如其所等者秀云彼之拔濟方便即此接下彼回向方便即是顯上合彼二種即此通彰也言皆此所攝者潞云拔濟是此會昔二權回向是此顯今一實問何名決擇唯識答唯識有三名成唯識淨唯識三十唯識無決擇唯識決擇即瑜伽決擇分三十卷也言出體性者等者即別境中慧也言無分別智等者秀云方便之體合以名句文而為體性今取智為體者謂後得智有此言說方便故但約智而為性也從本言之有二種一本智二後得智本智如啞受食無言無說又根本智如人遠行渴得一碗蜜漿正喫之時口說不得及其喫了唱美方有言說根本後得二智亦復如是問今此品中明方便智以何為體答唯後得智為體通根本也問如何解方便此間說根本智耶答因有根本方有後得故先說也二者後得智為他說法必由根本智內證所以疏言無分別智內冥真理後得智中為他說法言唯識等說等者對法論說十度中後四唯後得智第六唯根本智也後五即般若方便願力智此京說若約十度解後四唯後得第六唯根本若約六波羅蜜說第六通加行後根本行得三智今授十波羅蜜說方便波羅在第七地只合言後四波羅蜜多皆後得智性故若言後五波羅蜜多皆後得智濫他第六度唯是智根本如何通會後五答章敬云今取後五波羅蜜為一句多皆後得為一句則無妨也以彼後五中第六一個唯根本智餘四唯後得故言多皆後得意言疏約多分言云皆後得非唯後得言其能所詮等者會違也問前釋中方便通教理如何出體但言智耶答有二一依以別就總解二依攝末歸本解且初解疏自通云其能所詮性又各別是第一義因智而顯是第二義能詮是教所詮是理教之與理性各自別也教是別理是總攝別就總但言方便智二云教理兩種雖殊因智而顯智為根本意言其能所詮雖二性別並方便攝俱因智顯所以取智因有後得智方有能所詮故言下釋本文者分三初疏科初周次論科此品後衆科此品今當疏科初周且序分正宗流通三段不同今當正宗正宗中分三周說法說喻說宿世因緣說三周不同今當第一周法說法說有四初世尊曉喻方便品二鶖子領解三佛重述成四為之授記言此四之中者初曉喻在方便品言後三等者領解述成授記三文在譬喻品且領解者經言爾時舍利弗踊躍歡喜等三佛重迷成經言爾時佛告舍利弗吾今於天人沙門婆羅門等四為之授記經言舍利弗汝於未來過無量無邊等問上根鶖子聞法說一乘疏主何言曉喻一何相違哉答此是開曉誘喻之喻非是喻況之喻問荷恩云如猫牛愛尾如優曇鉢華豈不是喻答有二意一曉喻之字從言傍作論由明也若喻況之喻口誘傍作也二云雖猫牛等言非是此問正說喻處也言佛曉喻中論判為五等者只緣經是佛說論是菩薩造所以先依憑論家科為五般初歎法勝妙分經言爾時世尊從三昧安祥而起云云二歎法師功德分經言吾從成佛已來種種因緣種種譬喻三大衆定疑分經言爾時大衆中有諸聲聞漏盡阿羅漢阿若憍陳如等千二百人第四大衆定記分經言佛告舍利弗不須復說若說是事一切世間諸天及人皆當驚疑第五舍利弗諸佛出於五濁惡世斷疑分上科了言法為佛師者問何要取初嘆法勝妙分答疏言法為佛師一句是涅槃經諸佛所師所謂法也言人由法以等者問因何第二歎法師功德分答疏言人由法以成德書云人能弘道道以潤身言諸聲聞等者問因何有定疑分答疏言諸聲聞等五句疏初三句解定義後二句聞歎已下解疑字也然定與疑別並約鶖子說也於自所證有餘涅槃遂執為決定聞佛歎二甚深遂有疑生合此二種名定疑分經云佛說一解脫義我等亦得此法到於涅槃是定義而今不知是義所趣疑義也言佛心所為等者問何故有定記分答疏言佛心所為等謂先說無量義後說法華只為回心聲聞作佛問定疑分與定記上何別答前定疑屬衆生今定記分屬世尊也本來放光現瑞佛心決定謂以有所為之人決定為舍利弗等說法華經言唱止邀其等者問既言決定何故三請方說耶答有二意一欲令聲聞生殷重心聲聞之人多皆慢法於一乘法上若生慢永劫不得解脫故令三請二令惡人退席故有三止一往者似佛不肯說唱止之時却是說相欲令聲聞生堅固心三令不退其心轉轉堅窂定者佛心決定記者分別解釋言衆人之內等者問何故有斷疑答疏言衆人之內等聞前唱二甚深及三請三止遂生四種疑一佛於何時出先權後實說二云何知是增上慢三云何堪說法四云何不成妄語人向下說經為斷此疑名斷疑分故論成五分也言或分為二等者衆主欲擬科當品經文去先將論家五般科為兩般以義分出也簡要云三般科為定疑分後兩般科為斷疑分言二深先唱者正宗之中三分科經今當法說法說之中今當世尊曉喻方便品疏科為四四般不同今當二深先唱警察群生之心如來入定觀一切衆生根有上中下名察也從定起唱二甚深名警今取聲勢穩名警警者動也察者覺察也先唱二甚深者即是警動覺察二乘也言初嘆所證等者即是諸佛智慧是所證其智慧門是所說則嘆所證法妙所說法妙此皆盡屬所二云二深總是所證也說則說所證法妙歎則歎所證法妙通此二解言初總標勝妙者即是諸佛智慧及智慧門也言所以者何下釋等者若約近說五種智慧五種甚深此釋中諸佛智慧也又八甚深及五難釋此中教門也若約遠說一部經中說理智處總釋此間智慧說教權實處總是釋此間智慧門言初顯自在等者經言爾時世尊從三昧安祥而起若唯論牒梵本經云爾時世尊入甚深三昧正念不動以如實智從三昧安祥而起紀多十四字紀國科五句一爾時二字入定時世尊二字人三從三昧起者所起定四安祥者現定相五而起者正起定也問何故論解與經不同經言三昧是定以起也何以論云以如實智觀答緣經云三昧是定從根本智觀起亦是三昧後得智觀起亦是三昧天親菩薩意從簡濫所以言從如實智觀起意顯世尊從根本定起不從後得智定起也又攝云論舉慧影定鄰近釋意說本體用分了俗證真不相違故言以如實等者以者以由也如者稱也稱者可義也實者如實實者則真如也唯用正體智如實而智名如實智內冥真如理名之為觀貫同二云官音如者真如如實者實相之智者是慧也觀者是實以如實三個字是所緣境也智觀即是能緣心此後解觀字是定不邪慧也念緣曾習境定緣所觀境觀是定境舉所緣境顯能緣定心故名如實智觀從定而起者示現出定相也言起已告舍利弗等者問佛無不定心常在定中何故世尊從定起耶答疏中二意一云初示現如來得自在故二云如來入定無人驚悟故如目連於獼猴池邊坐得無所有處定聞象哮吼聲因驚出定問象哮吼聲為定中聞聲為出定聞答小乘不許定中能聞若聞聲時已是出定故大乘不爾許在定中聞聲如舍利弗坐定被大力鬼柏頭出定來乃覺頭痛此並有驚動不同如來入定無人驚悟故論解了言觀無量義等者疏解論文問無量義處定與如實智觀何別答根本智證著出水之實理名實智觀若證著出生衆義理名無量義三昧言佛定殊勝入已等者問佛入定時餘人還驚得如來出定否答疏言佛定等言又顯於定中等者問如何他人驚不得佛自出定答疏言又顯於等意顯佛自在故要入便入不假作想要出便出不假驚故不同凡夫等入定時先種種想加功用方能入故佛即不爾出入縱任自在從根本起入後得後得智中徐審當根故從定起言即由二義者結前論處二義即由二義者一自在力二無人驚悟言雖是無量等者料簡所依定問既言入無量定即合是無量義便為定名何言第四禪答疏言雖是等意言依第四禪觀無相理離八灾定慧均平是無漏功德勝故言不告餘人等者秦經云告舍利弗諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知論引梵經云以如實智觀從三昧安祥而起起已告舍利弗諸佛智慧甚深無量其智慧門難見難覺難知難解難入如來所證一切聲聞辟支佛所不能知問會中聲聞無數何乃偏告舍利弗答疏言不告餘等意言此經智慧之經唯與鶖子智慧涉深相應利根第一故告舍利弗等相應者相當義言謂舍利弗聲聞者問何故不告餘聲聞告舍利弗答疏言謂舍利弗等如來說法鶖子悟解所以先告舍利弗等言一聞即解者簡餘聲聞法就未解也言佛凡說法等者機謂機巧開要有情身中有此機要或施或張如來觀之以接道法如世之機以是疏之文巧即開以總擲之左右交加織絡乃成奇異羅錦此亦如是此品初唱二甚深二乘不知便是如來腳踐蹈又云假使滿世間等鶖子驚怪父巧大開從惡人退席已去世尊廣說開示悟入擲言教總交加織絡舍利弗未來世成佛號曰華光佛便同錦綺故喻於機也言根法相應者初周法說一實唯與上根鶖子相應故獨告彼即是鶖子上根而不假喻說名根法相符問菩薩更利根豈不與如來相應答菩薩不是正為也言不告菩薩有五者問何故佛唯告鶖子不告菩薩者何答疏言不告菩薩有五義言一為聲聞者問如何不告菩薩但告聲聞答疏言一為等意言即令二乘回心已捨權取實斷所知障修法空智令證無住涅槃是聲聞所作事故問第六住前多是驚怖菩薩欲退住二乘此菩薩云何不告耶答權有二種一權心二權乘告聲聞意令捨權乘彼是權心故此不相應也言二為諸聲聞等者前是捨權今此取實言三護諸聲聞等者防護聲聞下劣之心故二乘本來早起怖畏生懸崖想若佛出定更告菩薩不告聲聞聲聞轉生怯弱心故決定却取二乘不肯回心故所以出定先告聲聞等言四為令餘人等者經言大智舍利弗令得授尊記我等亦如是必當得作佛言五為諸聲聞不起所作者即二乘云我生已盡梵行已立等更不求趣大乘果故所以佛破此執聲聞執極遂先唱嘆二甚深令除小乘究竟果滿之心故言果滿證圓者道諦為因滅諦為果滅為所證道為能證也言菩薩於五事等者問菩提既利根此經是智慧經欲說此經何不告於菩薩答疏言菩薩於五等言傍告無爽者問佛說此經時諸求三乘人有懷疑網乃有疑皆斷即三乘中有大乘者此正告不定性兼任持所餘何言不告答疏言傍告無爽等言正告不定性等者問一種不定性何故聲聞正告菩薩言傍地前小菩薩亦是不定性答疏言正告不定等意言權有二種一正告住權乘者傍告住權心人也言所嘆之法略有等者然經文中理上即有甚深教上但言難入不言甚深據實合言諸佛智慧甚深無量其智慧門甚深無量若教若理皆合有甚深言故論云有二甚深等者問爭知教理皆有甚深耶答疏言故論云有二等一證甚深謂智慧者此之智慧通性及相性即所證理也相即能證智也本智親冥證後得變影證皆名證甚深通五智慧皆是如來所證法也言梵云阿笈摩等者疏主解智慧門古經論云阿含訛也新翻云阿笈摩此翻為傳者瑜伽八十五云師資展轉傳至今由此道理故名阿笈摩即四阿含等是據實一切大乘經論名阿含總是上古諸佛展轉傳來下經過去無數劫無量滅度佛百千萬億種其數不可量如是諸世尊種種緣譬喻無數方便力演說諸法相或翻為教或翻為淨教有三義一者體是無漏故名淨二者從真如法界海中流出故云淨教三者教體是無滿衆生聞者除惑業得除有漏亦成無漏約用名淨也言此甚深義通等者下疏主分配為緣理上有五種甚深能詮教詮著五甚深道理教上亦得五甚深也恐人疑只將謂理上有甚深教上無也問爭得知答論意如此一證甚深二阿含甚深又云一者體妙二者難了問何故論家甚深通兩處說及至解經文處理上配五深教上配五難答所疏言然理正得甚深之名門深乃稱難見覺等緣所詮理勝正名甚深能詮教教對理劣不得正名甚深將教上甚深義改作五難五難者亦是甚深義此各有二義一所詮理自體是深法當體正得名甚深二者智慧是佛所知法正名甚深教上亦有二義一者教對二乘淺智不正名甚深但名不知二者教因理深教隨於理亦名深不可共他理齊等所以不正名深但言難見難覺難知難解難入言二乘不知等者有二說一云亦者亦二甚深意道甚深之義既通教上理上總有其二乘不知之言亦通教通理也二云亦字亦理理向上不知意道不唯教上二乘不知理上亦不知今且說於教上尚自不知及顯理上更合不知教尚分粗淺由自不知理更甚深灼然不知也問何故但言諸佛智慧不言諸佛定答智慧正是二乘所求二乘所無故先標唱令其問取一乘亦是經之宗體故不言諸佛定言自餘別列等者攝云五深別屬理五難別屬教五深者一義深二體深三證深四依止深五無上深五難者一難見二難覺三難知四難解五難入金云甚深別屬教無量別屬理謨云自餘之言自一分甚深通教及理言理故教二法無量別屬理也問五深五難有何差別答五難得二乘不知五深者據佛所證言論說智慧者此一句引論也謂一切種一切智智義故此標章也此上十五字牒論標章也謂一切種一切智智義教此是論家解論云一切種者種即種類種類不一名一切種此解一切種三介字也此一切種是向下智體向上義也且一切智三個字屬如來五薀身假者身是如來身是一切智人也一切智人身中有此智一切智智此智體通性相菩提涅槃有為無為塵沙萬德也義者境也義有二種一義謂義理二義謂義境初唯俗智境後通真俗智緣也若真如是根本智家所緣境名義若餘有為法及變影緣如後得智所緣境名義也論文了言一切智人之等者疏主解也一切智三字屬如來身也向下重言智體却是論家最上一切種種者種類菩提涅槃含持衆多種類名一切種種即智也此第一解疏主依人法解緣經文中言諸佛智慧智慧兩字帶得人與法一處來此人法中解一切智智兼解向上一切種也一切智者一切智人也一切智人身中有此智名一切智智此第一解順初周經文理智雙說開示悟三菩提涅槃順此第一周故作此解也言或一切等者第二解也一切智者根本智重言智者後得智相合一處著名一切智智言義者境也者問何名義答疏主義者境即是根本後得兩個智家所緣境也義有二種一義謂義理二義者境義問何謂彼境答即一切智人之智境名一切智智義故言何謂彼境等者疏主又將論家一切種三個字作種類義解何謂彼境名一切種答疏言謂一切種一切種者謂若空若有等者若空即二無我即遍計若有即依他圓成有為有為即依他無為即圓成依他染分名有漏淨分名無漏若教是十二分教三乘教若理一切道理理真理理又有一百法有為九十四無為有六種有漏三十一根隨二十六無想定及事異生性悔眠無漏七滅定六無為名一切種也言謂此一切種者將一切種三個字是他一切智家所緣之境也言即此一切種等者別結皈也一切者即根本智後得智境即真俗諦境三種法總名所詮之智慧總是解諸佛智慧也言今以理窮等者重明一切種疏主前來雖有多解猶恐解一切種義不盡又前來雖以本後人法解智慧疏主緣道理未盡今以理窮更作五種智慧解一切種一切智慧乃盡也五種智慧即同般若五種也一智慧性者謂實相般若智慧相觀照般若智慧伴眷屬般若智慧因文字般若智慧境境界般若言一切智慧性者性謂真如故下經云唯佛與佛乃能究盡諸法實相言論自釋云等者問真如何名智慧答二意一云論云謂如來藏法身之性不變故佛智具知此實相體窮源盡底故名究盡二云謂真如在纏名如來藏出纏名法身既言如來藏性為體真如亦名智慧言攬法成人等者問此間是所證所說法妙中如何引能證能說法師功德經文來解此間所證法妙耶答佛無別佛攬智慧為佛體能成所成皆是智慧攬法成人人之所成智慧性唯取真如此真如又須是如來身中真如塵沙萬德十地菩薩攬法不盡不得成佛此先由成佛具能證智證所證真如方堪為智慧性性之與相皆是智慧皆是佛身故引下為證也二云攬者證也先由窮盡諸法實相證盡法身理方是佛身佛身因此智慧性成就得也疏主下解云法即是佛佛即是智慧佛身不離智慧此正義言無漏能者無漏簡有漏能觀簡所觀也言方便知見者根本名知後得名見謨云知約內心自證稍親見約外緣於境稍疏故配本後言智慧伴等者是相應功德即佛身中心心所及諸功德法經云無量無礙力無所畏禪定解脫三昧等言智慧因者因有二種一言生因名句文等即是經云種種言詞也二智了因所起知解下云盡行諸佛無量道法因中萬行唯因非果能詮教通因中果中也所以能詮及萬行為智慧因也言如是相等者准下料為佛所說法如證而說如是相者有為如是性無為如是體五薀非五薀等力常法作無常法因建立果義緣成辨報義果四果報異熟名報本即不生末即生言今智慧門既是等者門既是能詮教不取取四捨一次依諸文唯取一然依諸教五甚深中多唯智慧性真如為體取捨一餘四後依此經取二捨餘三上科下解且初准理通四慧者准道理不取能詮教取餘四慧性相伴境名諸佛智慧也問何故不取能詮教答一緣是能詮教二緣是權方便故不取也兼簡智慧因中一分行亦不取也問何故不取智慧因中行耶答今此解果中功德也教既是因簡萬行又是因非勝故不取智慧因中萬行一分但說四全故言即餘四慧也言義雖可爾者明取捨也諸教唯取一向前說五甚深道理實如此然依諸教五甚深中多唯慧性唯取真如理名智慧也言諸教者即是勝鬘涅槃也言五甚深中等者問何名五甚深答即是義體證依止無上取此五種也不是此間性相伴境因此是五種智慧也然五甚深唯依一真如向上立也疏主引諸教來例同此經亦合取真如理為諸佛智慧也言以阿含甚深即昔等者問此經何處是取真如理名智慧處答此經亦有處真如理作智慧一乘亦名為智慧也所以疏言阿含甚深即昔三教一往看恰似解智慧性處忽然說阿含甚深即昔三教有似疏文孤起却是疏主深意成上此經捨權取實真如為一乘體問一乘以何為義答一乘者真實義唯真如理名一實也阿含甚深即三乘權教教既稱權返顯教下所詮理是實將權教顯實理也問何以知此處阿含教下唯取真如理耶答論云證甚深無上甚深疏主引此文證真如理名一乘也彼證甚深無上甚深皆以真如為體言無上甚深者問此經何故喚真如作智慧也答疏言無上甚深是大菩提故故知真如亦名智慧言勝鬘經中等者勝鬘經中說一乘體即真如勝鬘既爾此經化城品寶所亦然皆以無為為二乘也上密會諸教但取一捨餘三言今此經中等者此經中依實勝慧取二捨餘三依實二字簡權也智慧因中教行兩法對果稱權也勝慧二字簡因伴境三是劣法亦非勝也今唯智性智相也問莫違他家五種智慧道理答舉此二種餘三自成也論家勝劣雙取即言五種智慧經家舉勝也偏言二種性即涅槃相菩提此二為體自餘三成言菩提菩提斷皆名等者問為復此經獨取理智為復兼諸經亦有說處答疏言言菩提菩提斷等此是金剛般若論云菩提斷障得處亦名菩提真如是斷障顯處亦名菩提真如是智所依處亦名般若一切有為無為皆理智攝名攝一切盡也言牛車言作者經云吾為汝等造作此車等顯是智相有為之法可言化故無為常住不可化故言各與一故等者是時長者各賜諸子等一大車重顯牛車亦復有為各各從自無漏種子生無為常住一體不可言各與一也言寶所舊有即智性故衆共等者衆商往寶所共取義昭然佛子各證如即名衆共取如山中寶藏衆共取疏主緣古人取涅槃為車體說著處皆便破古人牛車言化顯是有為也各與一故顯不是無為無為共有故寶所共有是智性故衆共取故不言各與也示佛智見是智性悟佛知見是智相即是菩提涅槃二故言由此有故等者問此經既取智性智相二種為諸佛智慧莫違他論家五種智慧道理答疏云由此有故餘三自成問云何由智性相二種故餘三自成答既有智慧同時心所即是其伴智慧要因於教及萬行生起即有因也智不孤起必託於境故有伴境因也故言餘三自成也言下云一大事等者開佛知見雙開菩提涅槃示佛知見別示法身理悟佛知見別悟報身智性相二種即唯此二若因若果因中理智果中理智故言即唯此二也上解諸佛智慧言謂此智慧等者問何法是理何法是教答疏言謂此等意言真實之道理非獨真如名其理諸佛智慧通性相故又真者真實理者所詮之理對彼能詮教權所以理智名為真理非是唯取真如名為真理也言三乘權教者大乘教名權對彼真理亦名權昔對不定性於一乘上權說三乘若離一乘三義不立一乘教亦得名權實無三乘權巧施設三乘名等言總標實權者雙結實權理教二別也唱諸佛智慧甚深無量是標實若近取同下五種智慧五種甚深是釋實若遠取三周說行果處是釋實并兩品一乘果亦同於此也唱其智慧門難解難入即是標權若近取五難八甚深是釋權若遠取三周之內及十二品一乘境中但說權教之處總是釋權譽云智慧甚深教門難入即表大乘理教實二乘不知如來權說即表二乘理教權也言欲令二乘捨權等者問世尊方便品初總標權實唱二種甚深有何意答疏言欲令二乘等所以初唱智慧甚深令二乘人知實而可取初唱教門甚深令二乘人知權而可捨又前疏主解云能詮之教名權方便所詮智慧名真實乘真實乘中欲令二乘行因取果言故勝鬘等者引彼經證正相當問爭知世尊四十年前為二乘人說權令交法華會上捨權答疏言勝鬘由此等彼經說二乘四智即是二乘四諦智四諦智即是菩提即當此經羊鹿得涅槃者即當此經化城彼經言二乘四智不究竟而得涅槃者是佛方便方便欲令不定性二乘得羊鹿四智及化城涅槃已後捨羊鹿四智令取牛車捨化城涅槃而取寶所故言是佛方便正同此經意言欲令捨二者捨二乘生空理智取一乘二空理智即是登牛車至寶所也言證甚深論有二義等者略標也卞和獻玉難了如楚王不識其體妙唯佛與佛能知難了乃至二乘不測也言又甚深者一切等者其諸佛智慧甚深無量一切聲聞辟支佛所不能知其智慧門甚深無量一切聲聞辟支佛所不能知翻譯之家意在省略理上唯言甚深教門上甚深回作五難五難即甚深也二乘不知唯在教上合一處說意道二乘於教上不知到理上灼然不知教門粗涉尚自不知理更甚深實是不知也言其五甚深者今唯依真理解者甚深二字向上分出五種甚深也言一者義者真如向上有差別義故有種種名一名法界亦法性實際常樂我淨有衆多義名義甚深言二體深者自體性也與萬法為體性常住不滅名體甚深也言三內證者凡夫總不證聲聞證不全唯佛全證故名甚深唯根本智證餘加行後得不證著餘智不親得故言四依止深者與迷悟為依凡夫迷生死真如亦與迷為依衆生悟解成聖此真如亦與悟為依又解云與十二分教為依名法界與有為九十四法為依名法性與自他報化身為依名諸佛本故也言五無上深等者體最勝故此解無為也謂大菩提者即無上義也所詮者即是甚深義也其五甚深古來唯依真理解若依此解前四甚深及第五所證無上正等覺正等覺之性真如亦名覺唯是真如理也體是無為後稱為大若依般若經及諸論解第五甚深無上正等覺通菩提涅槃通性相又准前來疏主取捨疏文中然依諸教五甚深中多唯慧性既言多字即合小分通相即是此間前四甚深唯真如第五無上甚深通性通相即四全一小分是慧性餘一分通相也問涅槃是無為可得稱無上菩提是有為何故稱無上答能證所證體不相離總得名無上也能證為因所證為果無上覺是無為正等覺是有為也上唯依真理解言若兼觀照等者通性相解若兼觀照智性智相合名甚深疏主意古人雖以真如為五甚深今兼智性智相合名為五甚深言其義甚深等者用者義用真如體至極微細被根本智向上有斷惑證真之義用親證得真如體却向上智說甚深功能名義甚深此是智相也言體甚深者真如與萬法為體性淨名云從無住本立一切法唯佛與佛乃能究盡名體深喚真如化體甚深也此第二智性也言內證深等者虗空雖然寬廣無窮不那日光能照盡也空既無邊日光亦得無邊也真如加行智證不得後得智證不得二乘菩薩分證內證有限不得名深唯有如來根本智證得盡却向能證智上說一個功能名內證深也此是智相也問此與第一俱是正智二法何別答前約智上義用今此約智體寬廣也言依止深等者與有為無為塵沙萬德為依止與諸佛為依止問此第四與第二俱是真如何別答前約與一切法為體性德本今此第四約與一切法為依止故是別也言無上深者體通性相也言無著等者問依何聖教無上菩提通性通相答無著金剛般若等言此之二種體遍一切者菩提有為法中尊體遍一切有為也涅槃是為無為法中尊體遍一切無為也此是疏主敘唐三藏和上本意也疏主是三藏弟子意言若諸經無上甚深空取實相太狹兼取觀照疏主敘來為此經本意言若通義者約所詮四慧之中智性智相以此二種解五甚深若通義釋所詮四慧性相伴境一一皆有義體證依四種甚深一智慧性有塵沙萬德差別衆義名義甚深二者與一切法為體性故名體甚深此不如取體性凝然不生不滅名體甚深三者唯根本智證餘智不能故名證甚深四者與一切法為依止名依止甚深一重解一者智慧相相上有證理斷惑之義用名義甚深二者體是無漏故名體甚深三者是能證故理雖普遍智證之時如函與蓋冥合真如故名證甚深四者與塵沙萬德為依止名依止甚深也二重了智慧伴有差別義故名義甚深各自有體名體甚深與根本智同證理故名證甚深有為無為各自有體名體甚深是本後智家所證知故名證甚深與衆義為所依止名依止甚深三重了智慧境境者義差別也差別衆義名義甚深為有為無為各別有體名體甚深是所證故唯佛智證達窮盡源底名證甚深諸佛功德法更互相依名依止甚深上能通義解訖四重了言或智慧性相等者一智慧性配義甚深二智慧相配體甚深三智慧伴配證甚深四智慧境配依止甚深言唯無上深等者唯無上甚深在大菩提諸德主故不配前來四慧義也前來義體證依止此四甚深勝劣合論配性相伴境四個智慧緣第五無上甚深攝菩提涅槃唯是勝故不配四慧四慧是劣故由無上甚深是諸德主故總故通有為處與有為中為主通無為處與無為中為主菩提是有為主涅槃是無為主意道唯菩提涅槃向上則具說無上深餘處盡無若空言甚深不妨餘四慧總有也唯無上深是正主餘四甚深隨他智慧立甚深名不是正主也言又非喻所喻等者前來解甚深義作三般甚深義解盡是疏主敘論今此下兩句疏主自出意解甚深兩字也非世間物可以況故曰非喻所喻也不思則慮絶不議則言喪喪言絶慮非喻能喻故曰甚深也問第五甚深何不配四慧答無上深中具有性相二種是功德主故非喻所喻等雙顯性相二種體故不同前四有性無相有相無性今此無上雙顯性相兩種故不配之問前之四種豈非果位何故但言無上甚深答據實言之此五甚深皆智慧為先四種亦通因果故其無上深唯在果位故不別配意此一句是餘甚深總德之主故不別配也言上來解甚深等者此是疏主唯經文道理解說且就一邊道理說唯於理向上言諸佛智慧甚深無量其智慧門向上不說有甚深無量也言准論解經等者准論解經慧門亦有五深已上論家解若准經文甚深兩字是總唯依智慧理上說甚深義名總也若別即合通教及理上皆合有甚深兩字也問如何是教向上有甚深答甚深義即五難是也緣經文意從文句穩便上句早有甚深不可下句重說所以改作五難也又論家前解智慧云一體妙二難了後解教門亦云體妙難了也經家空於理上言甚深者是總句問既通教上有甚深甚深是別句文在何處答疏引文阿含甚深即五難是上解智慧向上甚深下解智慧向上無量言無量等者五種智慧中一是能詮教四是所詮理今無量只依所詮四智慧說論家意無量別屬所詮理慧門別屬能詮教也智慧向上甚深亦是用智慧向上無量亦是用也下依疏說一智慧性體遍故名無量二智慧相用寬故名無量所證理既遍法界能證智盡無邊如函與蓋無處不遍故名用寬三智慧伴總攬塵沙萬德為智慧伴名德備四智慧境有為無為若空若有真俗諦境周遍十方故名法廣廣者多也前三約智體向上作用立無量後一約法體寬廣約境名無量言如空無限等者章敬云智慧性即體遍而如空智慧相乃相寬而無限智慧伴乃德備而德數無窮智慧境乃法廣多而終畢無盡也又云如空無限雙配性相也性向上亦有如空無限相向上亦有如空無限也又伴境向上有德數無窮終畢無盡也智慧伴德數無窮終畢無盡智慧德境數無窮終畢無盡疏結云故名無量前來五種智慧中疏主依所詮四慧配甚深今以配無量亦依四智慧向上配體遍用寬德備法廣也言然今但說等者疏主前來解甚深處第二解云若兼觀照智性相合名甚深偏取性相名甚深今此解無量處亦作第二解體者理體德謂萬德路云體德配智性智性是諸法體具塵沙功德名體德也作用配智相也有達理證真之作用故名作用也問何名無量答智性向上體德故名無量智相向上作用故名無量體德向上德備法廣如空無限故名無量作用向上德數無窮終畢無盡故名無量謨云體遍用寬法廣與如空等四句皆是無量之義此之八句一一總解即不離無量一一皆是無量也疏依總解配金依別義理彼此無違也言皆具無限者問何以性相向上雙配無限無窮盡二句答疏言皆具等路云疏中一是無限二德數無窮三終畢無盡略却如空一句唯三句據理合有四句言其門甚深亦有二等者注經云昔三教之言通一極之旨開中云知智在說說即為門智既甚深門亦難了又云堂隩者必由於門戶達智慧者實顯於名教堂隩無門戶不可以遊智慧闕名教不可以證為門之義其在此乎智慧之門依主釋其門甚深亦有二義一體妙則如卞和獻玉當體是妙二者難了楚王不識體妙則由教上有五難五難即是甚深義難了即是二乘不測准梵本具足應言其智慧門甚深無量一切聲聞辟支佛所不能知教門粗著類黃葉之不知證理甚深同紫金之難識嬰兒之行實賴於斯孩子啼哭之次阿娘過與一挺黃金唯更啼哭轉多後過與一片黃葉便笑歡喜不作聲四十年前聲聞人愛假不愛真與說大乘法恰如孩子怕真金華嚴會下如聾如醉諸大乘經會下我時在座身體疲懈恰如孩子怕真金如來為說二乘法但以假名字引導諸衆生二乘聞了歡喜修行恰如孩子愛黃葉論家牒梵本經唯於教門向上說五難者有二意一由所詮智慧上有五種甚深能詮教門上有五難二者二乘凡夫等於五種智慧向上不知故教上有五種亦有二義者緣前證甚深早有二義亦智慧門還有二義故言亦有也言論引經云等者問何名五難答疏言論引經等謂由所詮智慧是甚深故其能詮即五難甚深也上略標了言一由所等者疏中二意一約所詮五種甚深故教有五難也二約凡聖智不知故教上有五難且初一由所詮義上有塵沙衆義名甚深能詮教詮著其門難見難見者二乘於此教門莫究其由故名難見見解也言二由智體者所詮理上智體深故名體甚深能詮教詮著其門難覺意言如來二智二乘不惻於此教門亦難覺悟所詮既不達解能詮亦難覺了言三由智內證者所詮理上有智體內證深故其門難知正智證如真契一切體同法界與理無差由此二乘於彼教門不能知故言四由智依止者由所詮理上與衆義為依止故其門難解教詮智智依如來體甚深二乘不曉了故於詮門實為難解其由於教理即易彰理深既尚難明於教因多迷謬故教門難解言五由智無上者由所詮理上無上深菩提涅槃故其門難入二乘諦觀十六行相亦不能緣故不知名難入入者解也問何故將此五深別屬五難答欲顯由詮深故其能詮教門故難見難覺等問如何所詮智慧但言甚深不言難見覺等能詮教門但言難見等不言甚深答准論甚深亦通於門經文從勝但言智慧難見難覺等但說能詮舉易況難能詮之教藏識尚自不知所詮之理杳冥幽遠灼然難悉但於能詮門上而說難見覺等言以教五難等者結也以教上五難別配五種智慧甚深今秦本經只有兩個難解難入也言又智有二一凡二聖等者第二意也一現者謂現量前境稱境而知得法自相名為現量凡現智不知名難見言比智者比度前境名比量彼此相比如見煙等比智不知名難覺言聖智者此約二乘小聖非大菩薩及如來故言有漏者有漏智不知名難知言無漏者有二者一根本二後得初無漏根本智不知名難解後得無漏智不知名難入入者證解問二乘根本智內證生空理於教上不知名難解菩薩二空根本智內證二空理豈能知能詮教耶既不外緣何得更責不知答依展轉說也諸佛菩薩根本智雙證二空理此理便是所詮佛與菩薩根本智既知所詮返顯佛菩薩後得智兼知能詮教也二乘根本智唯證生空不證法空即是二乘之人不知所詮二乘人根本智既不知大乘所詮返顯二乘之人後得智兼不知能詮教也問二乘有無漏後得智否若許有者如何羊鹿不登若言無者如何此言後得智不知即是有何言不知答據實有之唯識五云謂染汙意無始已來微細一類任運而轉諸有漏道不能伏滅三乘聖道有伏滅義真無我解違我執故解云三乘無漏正智隨其所應違二乘執故不伏又云後得無漏現在前時是彼等流彼亦違此意解云後所得智一向無漏此由二空觀所引隨應違二乘執故准此文有無漏後得智然二乘人證理之時後得擊起緣安立故但為緣境不寬遍故言小乘無無漏後得智也壽量品云一切聲聞辟支佛以無漏智不能思惟知其限數故知二乘有無漏後智若爾寧知不是本智答本智一向內緣不外緣境若爾前難寧通答法華會上正為不定性回心趣大為求佛慧隱彼後得杜絶彼心猶如醫師教並令斷故說羊鹿有名不登言今經中唯等者問天親論主解梵本經教門上有五難未審此經具幾難答疏言今此經中等初無漏智不知名難解後無漏智不知名難入言總顯證教等者論主解不知義證者所詮證智慧也教者能詮教門也前來論家於證向上亦說難了於教向上亦說難了者即是不知義今秦本經只有一個不知在教上故言總顯若開為兩處即是別顯言一切聲聞等者引不知文也言唯佛能知者結也唯佛所知境所以二乘不知也言佛今所以歎者問世尊何不直顯說法華經何要先歎智慧後歎門深耶答疏言佛今所歎等出唱二甚深意為意欲令舍利弗等生疑若不生疑則無第三大衆定疑分為緣鶖子等本來執自乘為究竟執則難除疑則易遣如來所以回執心作疑心令鶖子等生疑求請說法也乃至歎二甚深了果然有疑經言爾時大衆中有諸聲聞漏盡阿羅漢等疑云今者世尊何故殷勤稱歎諸佛第一方便即是疑前佛智有所言說意趣難知即是疑前其智慧門難解難入疑則疑前二甚深請說亦只是請說二甚深也開示悟三即是諸佛智慧三周權說即是其智慧門所以佛歎二甚深者論自解云為諸大衆生尊重渴仰欲聞如來說故二云歎二甚深者標也言為下將說等者問何故雙歎二深先歎智慧答疏言為下等歎智慧為下三周說一乘真實佛所得法之由漸也故先歎智慧深謂此智慧即是三周真實菩提涅槃二果初周開示悟三二種勝果乃至三周寶所實理所以先歎智深欲擬向下說佛所得法甚深難解所以先歎智慧言彰下所歎等者歎教門為下三周說權之由漸也欲擬向下說有所言說意趣難知法實之由漸所以先歎門深也問何故先歎智慧深後歎門深答欣猒異故先歎智慧令聲聞欣後說教門令猒又取捨異故先歎智深令取後歎教深令捨與下三周所說二乘權教之由序也謂此第一周中說無二亦無三第二周云羊鹿二車有名無體第三周云向者大城我所化作乃至息處故說二是權教故令猒言不爾唯應等者緣前智慧深及教門深總解了所以此間解諸佛字也總攬兩字解諸字萬德以成佛解佛字一個佛以萬德以成佛字一個佛以萬德成佛解佛字一個佛以萬德成一切佛皆攬萬德成身也二云意為世尊歎智慧深智慧之中有五種智慧智慧因中攝得能詮教但歎智慧了教門亦歎了何要智慧外別歎教門答世尊為生下說權之由漸只為生下說權之由漸所以別歎慧門也若不爾者但空歎智慧即得何要歎門深也言所以者何者意言論佛智慧乃至慧門我以得之我得解脫即得諸佛智慧證甚深也又得方便言教聲聞得四諦教緣覺得十二因緣教如何今說此之二種皆二乘不知不知之所以者何謂也言又此徵意者意言若諸佛智慧二乘未得名甚深智慧門中二乘權教我以得之何名甚深是徵意也言所得解脫者唯捨分段斷煩惱障證生空理雖同其摩訶般若大法身大解脫所知障變易生死智慧相即般若智慧性即法身汝所未得汝定未知言受持讀誦等者信故能受念故能持披文名讀背文名誦即十法中三行也言此顯世尊等者三大僧祇供養二十六恆沙佛地前供養五恆河沙初地至六地六恆河沙七地至九地七恆河沙十地供養八恆河沙佛既逢多佛長時受持功積難思故名甚深也言非如二乘略即等者聲聞人利根三生鈍根六十劫緣覺利根四生鈍根一百劫時既非遠值遇亦希故受持等亦不名甚深俱舍二十三云諸有那植解脫分極速三生方得解脫分第二生起順決擇分第三生入聖乃至得解脫又正理六十云以聲聞乘加行最久經六十劫自果必成解云猛利修者經於三生及六生及六十劫若不爾者或經千劫婆沙七云種解脫分或經千劫流轉生死大論亦云聲聞極精進猛利但三生其次六十劫其次無量劫今准前文利者三生鈍者六十劫言諸佛福慧者唯識第九云所修勝行略有二種謂福及智且依六種波羅蜜多通相皆二別相前五唯福德第六唯慧或復前三唯福第六唯慧餘二通二若依雜集前三增上生道名福也後三決定勝道名慧言精純勇等者勇表勝進簡諸染法捍表精純簡淨無記即顯精進唯善性攝故是所作善事悉成滿故乾符六年冬溫州開元寺講大慈恩比丘弘舉傳寫供養承元二年三月二十一日書寫了凝圓諸有書寫福後後勝善等流果願此相續盡未來利益安樂諸含識
