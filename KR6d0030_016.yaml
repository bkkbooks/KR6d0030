body:
  text: 鏡水寺沙門栖復集言果決者略舉十事名果決一割肉飼鷹二投身餓虎三抽心為法四挑眼施人五剝皮為紙六削骨為筆七刾面為墨八研頭謝王九臂燃千燈十燒身供養如是十事實為難事皆為求法故名果決也言一句投火者若能投身七仞火坑當施汝法菩薩聞已歡喜踊躍作是思惟我為法故尚應久住阿鼻地獄一切惡趣受無量苦何況才入人間火坑即便聞法但為我說我入火坑不將為難也又昔佛為智光仙人變身為兔投火求法言半捨身者世尊初入僧祇資糧位作雪山童子為求半偈捨全身而五羅剎言增長心者二意一約增自功德心如今之大德為名位所繫恐名不稱專修善事名自增長二約自名遠振他人聞已希慕高蹤見賢思齊勤修善事名增長他人功德也言由所成法者秀云即是智性涅槃是未曾有名快妙事能成之心四智菩提名快妙心由所證理快妙事故能證智名快妙快妙之所說於教故難知心名大智斷一體用分了俗證真不相違故言無上深者永泰云快妙即舉所取能意取能證之智無上深舉能取所意求所證理名無二種意者互相影發說令證故初解取能後解取所也言或難解法者秀云並屬於理唯佛能知是甚深義由甚深理方說於教名甚深也言入甚深者入者解也有二意心一如來自入二能合他人入文字章句意難得也如言一切衆生咸皆成佛不解我意等言佛自持者秀云如此難事佛自任持在身任持不失故言不同外道者如來說法因緣道理以親證而方演說不同外道自不能解何能令他解言說因緣法極等者因緣道理義即是如來說名字章句道理極甚深佛自能證亦令他解如化衆生從初至末與說其法稱彼根機令得道果名為說因緣法極甚深也言二隨宜所說者有五一者知時若為他說復知時節不得過分二者知處如邊地及不律處不須說法三知根性樂欲量根機授藥隨宜而說故四者若不解深密法者舉世喻說而令解也五者若屬甚深理者久學之人為說深法由斯五種故隨宜說意趣難知言所作住持者外利他故名為所作內自利功德故名為住持即他受用變化身是利他名為所作自受用身自利功德窮未來際無斷無盡名為住持然聲聞之身多不百年五十年壽命故無住持自利功德又不能廣化衆生無利他所作故名不共聲聞等雖度人籌盈石室亦不為多不及如來所度有情無有邊際等言不同二乘者秀云謂二乘人緣教起行及化生等名外所作若證所證理及持經教持戒等名為內利住持雖作此利而皆狹局不名甚深如來外利說法百千法門廣利群品內利能證無上清淨法界住持恆河沙功德名為甚深又外利所作利他行圓滿內利住持行自利行滿故名住持甚深也言上來總說等者由近諸佛結受持讀誦深言修行者結修行甚深經言盡行諸佛無量道法言果決者結果行甚深經言勇猛精進言增長功德心者結增長功德心甚深經言名稱普聞言證快妙事心者結快妙事心甚深經言成就甚深未曾有法言成無上法者結無上甚深經言難解法者如來能知言隨宜說難可得解者結第七甚深言二乘不了者結第八甚深由佛成就前四甚深為因第五第六為果果既成就所以第七甚深外為衆生說由佛說法所以第八甚深一切聲聞辟支佛所不能知也問此八甚深與教理行果及二甚深相攝如何答第一第七是教第六是理第二是行第五第八是果第三第四通行果也二深相攝者第一第七是阿含甚深第二行餘皆是證甚深也言況佛智慧非甚深哉者謂上來八甚深但釋慧門不釋智慧慧門尚自甚深況佛智慧二乘豈能測度者哉言上嘆所證所說法者法妙是所證如來是能證法是所說如來身能說言嘆下如如來能證能說等者問前說二甚深已了今又嘆法師功德是何意答聲聞人四十年前執所得與世尊同兼執身與佛無異所得法既同能得人身亦不異前嘆二甚深令知法異今嘆法師功德令知自身與如來別言依論牒經等者准梵本經第八甚深後續次便合有一個何以故一個徵詞徵前來智慧向上五種甚深教門向上八種甚深何皆言二乘不知答云舍利弗諸佛如來自在說因成就故此上梵本經文也諸佛如來自在成就為一段又諸佛如來說因成就為一段由自在成就即是內證智慧甚深也由說因成就即是教門甚深又自在成就成前三句說因成就即是成前第四種種言詞等四七辨只緣自在成就所以諸佛智慧有五種甚深只緣說因成就所以教向上五難八甚深二乘不知言舍利弗如來等者問云何名為自在說因緣成就答疏牒經言舍利弗如來成就種種方便種種知見種種念觀種種言詞此總四句何名方便知見念觀言詞答向下論主三段五番解釋此總四句金城云此秦本經與梵本經有三種差別不同一脫少二不次三離合且脫少者即是第六難解法者如來能知又云一切聲聞辟支佛所不能知儥次又有一個何以故徵問經家答云舍利弗諸佛如來自在說因成就故此上四節經文梵本經具有秦經所無即是第一少意二前後不次者若秦經先言舍利弗吾從成佛已來然後引總句經文種種因緣種種譬喻若是梵本經先言舍利弗吾從成佛已來然後向下引別句經文廣演言教無數方便此名前後不次也三離合不同者梵本經云種種方便種種知見種種念觀秦經合成種種因緣梵本經云種種言詞秦本經云種種譬喻西國言詞多說諸譬喻故故喚言詞作譬喻也梵本四句秦經兩句離合不同有此三種差別不同也依論記了經言展轉意言等者略申大意也展轉意言以下別句釋上總句名展轉也三番名為展轉也初以論往成就等四義釋上總四句次以經已下別句解上總句後暗配論文一番名為展轉問何以知成就總四句法法師身上功德所證所說二乘不知答謨云先於證成就後方說因緣圓滿即照理不圓功德不滿功德不滿說即不深證理既圓功德滿故說即甚深將彼內證之法向外說說彼所證智慧及門二皆甚深二乘不知申意了言何等名為說因等者依論配經問何故名說因成就答疏言謂種種方便等言准論解經等者重明論意此說秦本經中只有兩個總句種種因緣種種譬喻譬喻已上是總句廣演言教已下四唱經文是四個別句第四唱中有七唱經文總科為一個別句言展轉訓釋等者問此後展轉與前展轉何別答前初如來內證真理方有自在說因成就後為衆生解說名為展轉也此句後展轉即總四句為所釋下三段五番為能釋能釋句名展轉第一往成就等一番釋總四句名第一展轉二明配經句名第二展轉三暗配論文名第三展轉所以疏言論有三解次下三段五番解釋有云總四句是所解三段五番為能解且總四句者秦經只有兩句梵經本有四句種種方便種種知見種種念觀秦經合前三句為種種因緣梵經種種言詞多說諸譬喻故疏主却依梵本經中四個總句向上作三段五番解言初論自別釋初四初四句者即是論主先將一番論文解上總句經文一遍便是三段之中第一段五番之中第一番也第一往成就釋上種種方便第二教化成就解種種知見第三功德畢竟成就解上種種念觀第四說成就釋上種種言詞此是論主自解上總四句一遍說言次論如經已下等者即是經家四個別句兩番配此總四句分二初明配經句為一番後暗配論文為一番故名兩番也言其後二番中者且明配經句暗配論文對前往成就等名後二番也即是論主將經家向下四個別句釋上四個總句一如經廣演言教無數方便引導衆生令離諸著解上種種方便二如經所以者何如來方便知見波羅蜜皆以具足解上種種知見三如是舍利弗如來知見廣大深遠無量無礙力無所畏禪定解脫三昧解上種種念觀只此前三個別句亦名前三義一處明第四別句亦得名第四義一處明也二云意言緣前三論一處明故隔斷第四句經故成兩番此解正從前別句至此第三別句解了便不解第四別句論家復以三節論文解上三個總句第一往成就可化衆生依止善知識解上種種方便第二成就根熟衆生令得解脫解上種種知見第三成就力家自在淨降伏解上種種念觀名暗配論文初配經句後暗配論文總當前三義一家明後引第四別句釋上第四總句種種詞也經言深入無際成就一切未曾法已下七唱文經總屬第四別句疏文分二初明配經句後暗配論文上來往成就等四句論文三段之中為第一段次四個別句解總之句中前三義一處明為第二段第四義一處明為第三段上來三段言五番者往成就等四句論文三段之中第一段五番之中第一番前三義一處明中明配經句三段之中第二段五番之中第二番後暗配論文三段之中第二段五番之中第三番第四義一處明中明配經句第三段中第四番暗配論文第三段中第五番亦有作三番五段往成就四句論文遂長配為第一番四個明配經句為第二番四個暗配論句為第三番何名五段答前三義中明配暗配第四義中明配暗配便成五段今當三段五番之中第一段第一番上來法師功德分中初科了次下正解言初番別解等者初總標初番也言一往成就等者賀云謂背法身而起應化往犯往生死故名往金城二義一約所化解者背小向大名來如經言漸漸遊行遇向本國又云遂到父舍所止之城若背大向小名之為往經言不如往至貧里肆力有地衣食易得若久住此或見逼迫強使我作作是念已疾走而去與論不相應一云約能化解者若他受用為大菩薩現即名來是大菩薩所來之處由十地菩薩得通自在遊十方淨土是菩薩所來處故若約化身上說往往就衆生如來有自在力隨應可度能往十方即是往義經往到子所方便附近但是乘非願力起感現身名往又從因至果名來往果向因就生死名往攝末歸本名來從本起用名往果中佛相望某甲佛入生死去好往生死名往衆生見佛來名來也言從兜率天退等者申論意也始從天退沒迠至涅槃巧用多端利益衆生名為種種方便種種即方便方便不一名種種言起難思化者如佛身本唯有一即依一身而起百億身如身事等非凡夫心思口議事等名難思也言權巧智用者解方及便本無而有應物權現故名方便八相成道皆是本無而有也天親菩薩體經意諸佛方便不過生死教化衆生故喚作方便問菩薩何故不生餘處唯居此天答色界境妙彼諸衆生貪著樂勝難可教化無色界是難地菩薩不生於彼欲界之中三塗衆生苦逼化不得六欲天中下三天著樂化不得上二天亦爾唯此天受樂知足故聖教說晝三時夜三時為色界天子說四靜慮法為六欲天子說十善法晝夜六時一一時中教化五百億天子令得聖果如是共化三千億天子日日如是教化也故唯生彼天言八相者大般若等者陳相烈名也由方便善巧願力為有情類示現入勝乃至涅槃言嬰兒者菩薩為示現嬰兒童子後宮遊戲菩薩若作餘像說法後宮女人則不信樂故現嬰兒言苦行者謂諸天人作是念言端坐受樂不得聖道菩薩示現苦行亦為降伏苦行外道示現種種難行苦行言成道者謂有高行人常能離俗菩薩示現出家成道也言入涅槃者復有天人樂聞圓寂為彼示現涅槃言彼經者即般若經也言最勝天子者簡要云最勝者知足天中一小天子也有云但是釋迦說般若經會下不妨是諸天天子未必定是知足天子也言云何菩薩行深等者意云世尊說般若無相今如何說有八相耶言相不可得者有二說一智說證理時冥然一體其實無相當情名不可得向上能取所取相不可得也二者所現之相不執為實有熾燃現相不生執著執著相無名不可得言菩薩相不可得者所學之法既相不可得能學般若菩薩相亦不可得若有少法得阿耨菩提者燃燈佛則不與我授記又說授記又說彼遍計之相而不可得不說依圓也但由方便教化衆生示現有生相及涅槃相等種種諸相上總答言諸天計常等者有二意一破常計二破樂計言是故菩薩等者入胎之相即是從天墮落也入胎者華嚴經說菩薩在胎內即能轉正法輪又能善知入胎住胎出時節又說菩薩處胎常得天龍八部衛護香潔自在不同凡夫也上出意也言世間最勝等簡要云兜率天名世間菩薩為彼天主世間最勝有云有情世間菩薩於彼有情中最勝名世間最勝菩薩雖處欲天而無欲染一是最勝二是於欲不染尚有墮落況餘不勝況欲染者而得常耶言如見日輪等者菩薩如日輪尚有墮落也著樂起常計者猶如螢火豈得久停言如救頭燃者如火燃頂豈得寬慢者哉菩薩在生死火宅之中修行修行勝如火燃頂無容放逸如諸天常行放逸不肯來見菩薩禮拜受法故示沒墮即餘天子不肯來者咸來見菩薩禮拜聞法又云但是諸天是著樂放逸之人是頭燃菩薩破放逸行如救頭燃者也有作救字捉入之義如人落火坑事須救如飛蛾投火相似頭投皆得言二令有情咸見者但是下生來此界有情咸得見也言乃至第八復有等者大般若五百六十八云一從兜率天退即入胎相二嬰兒相謂有一類下劣有情善根少故不令得見如來成無上道轉正法輪菩薩為彼示現童子相方便說法若作餘像彼不信受四苦行相為彼諸天作如是念端坐受樂不得聖道菩薩謂彼示現苦行相亦為降伏苦行外道示現種種難行苦行五成道相謂彼諸天長夜發願願見菩薩詣菩提金剛座上時成等正覺無量人天既供養已皆獲菩提因緣六降伏相謂彼天人作如是念惡魔外道障礙正法願得菩薩坐菩提樹降伏惡魔及諸外道有正信者令得正見佛為此有情坐菩提座七轉法輪相復有天人作如是念願見大師成一切智為諸衆生示現三轉十二行相無上法輪八入涅槃相復有天人樂聞圓寂菩薩為彼示現涅槃疏中開童子嬰兒為二不說出家若准彼經合嬰兒童子為一別開出家言攝大乘論第九者指餘說此間所引依大般若將此八相對攝大乘論及華嚴經對辨差別彼攝大乘論云一從天沒相二受相生即入胎相三受欲樂餘五相同四踰城出家五苦行六成道七轉法輪八涅槃相此攝大乘論閻魔加從天沒相名差別也金云此經先說成道後降魔彼處先說降魔後成道華嚴經辨差別者金云明住兜率天相為一降下閻浮為二添前般若八相成十相也名往成就紀國云往者赴也逼三業吾從成佛已來此身業化即神通化衆生根熟感而遂通心水稍淨清佛日斯應所以上退一生下流八相為三病之良醫作四生之慈父語往者廣演言教是前雖現身丈六但可覩相生欣若不教弘九部無以憑論取悟所以暢四辨於舌端流八音於聽表開三乘正路塞六師邪徹使聞之者識是知非行之者從善而棄惡意往者無數方便前雖身語未能說經意業蜜加方能演暢欲使來生功德念念而增已生善根新新不退故說三業名往成就言教化成就等者二解一云前云前示現者顯示義現有染淨之體即同業果化如官人清政典吏倣之即名教化故二云後示現者指示解釋之義示現證染淨之義即說如來指示此化身中顯現有此染淨因果故名示現也教化成就一句牒論也種種知見一句引經也論主解經知見者即是教化成就成就者圓滿之義若不就知見因何能起化身教化衆生也二云種種知見者論云示現染淨諸因故由如來身向內具足知見所以能於身上示現相有染淨諸因緣言能示現有一切等者因有二解一者因果之因化身中示現集能招苦道能證滅名染淨因果十年受樂納妻生子此名染因感火坑毒飯馬麥金鏘推山出血等事名染果六年苦行三十四心斷煩惱名淨因感丈六金身三十二相八十種好名淨果即是集諦煩惱貪愛因感苦諦果道諦因感滅諦果皆世間受樂者故示現有也實久成佛示近出家學道成佛也言或示染淨等者第二解也引示現兩字與前別前解示現者示相也第二解示者指示開如來身中自內證知染因果道理知淨因盛淨果道理染因感染果道理煞生短命報布施富貴報如來自知向衆生說交猒染因果欣淨因果者因由所以義也言前能現身者簡要云指往成就中示現佛身此解非也只是指當句教化成就中前解也但是料簡兩解既無別事前能示現於佛身上示現有染淨因果大家眼見耳聞皆是實有也後解依佛身中證知染淨因果道理言論下解等者問此間有示現染淨因果向下說成就中又染淨因果二文何別答疏言論下解等意言此教化者依證法故彼說成就者依說法故意道如來證會此染淨道理教化之具下文將四辨為他說也如人嘗味後方說之也言三功德畢竟等者論文也謂種種念觀牒經也即如來身中十力四無畏等諸功德法名為念觀故論名功德畢竟成就也言此意說言以說等者解論文中以說彼法四個字也言彼念觀等者解論文中成就二字言如所說法者解論文中如法兩字言本末因緣等者解論文中相應兩字且釋經句畢者終也竟者久也終久成就成就者具足十三門功德菩提涅槃二皆具足具足者圓滿義此解經中種種念觀如來身上功德不具據念觀勝法攝餘十三門功德論主解經云種種念觀者以說彼法者即是經中嘆法師功德分中十三門功德也如來身中一一證得名成就內證為因外說為緣故名成就因緣也如法相應者說合證故不相違背上消論文此意說言乃至念觀等法解上論家以說彼法也彼念觀法佛皆成解上論家成就二字如所說法本末因緣皆相應者即是十三門功德如來內身成就得名本因緣外為衆生說名末因緣內身成就名本外說名末內身成就名因外為他說名緣也相應二字解上論家相應字即是內證外說相應即是相當契會也攝云一一法上皆有本末報身成就名本化身起說名末況詳凡所說法事必有因名本必有所歸名末或因名本果名為緣唯緣生故言四說成就者牒論也謂種種言詞引經也今此言詞句即是秦經種種譬喻西國言詞多說諸譬喻故故喚言詞作譬喻即不是喻況之譬喻也言以四無礙依何等何等者論家都有四個何等問論家分作四個何等徵有何意答緣能被所被相別所以分作四個何等也上來兩句徵能被教下兩個徵所被根也實泛說如來四辨兩個何等攝四辨足亦同唯識解第九地云於無量所說無量名句字後後慧辨陀羅尼自在愚無量所說即義無礙解無量名句字即法無礙解後後慧辨即攝詞無礙解辨才無礙解為攝二句故重言後後此亦如是然今指法且說法華一會言依何等者論主解經經云種種言詞言詞之中說何法所以論家四個何等徵疏主依四個何等下一一分別云一依何等義疏主答云依法華經一乘為說即義無礙解言何等名字章句者疏主答云依法華經名字章句為說即法無礙解言隨何等者答隨南閻浮提衆生言音為說即詞無礙解言何等衆生者答隨舍利弗根器為說即辨才無礙解也言此四之中等者疏主依論家解處料簡第一句能起化身八相成道往成就問往成就中既言唯起化身如何八相中有轉法輪相既爾與第四說何別答往成就中雖有說法今從多分正取身往言第二能示現等者教化成就言第三如所說等者即是經中所說十力四無畏等十三門功德皆圓滿功德功德畢竟成就也言由佛法師具此等者總指於前方便知見等四具此四種說因成就假者佛身得名勝妙說法亦名勝妙又往成就等四種初一身勝妙第二第三意勝妙第四語勝妙所以說二乘不知也言或前四種示者疏主直下消當唱經文總四句方便等意也第一句經言種種方便既有方便即是起化身德八相成道是也言第二句是報身德者經既言知見即是報身四智菩提即報身種子斷染證淨道理唯報身有言第三句等者既言念觀功德向下所作真如即是法身亦云有為功德復名法身論說五法名法身故言第四句是等者既言種種言詞即是四辨具足言由此三身等者上來初解四句論文唯是化相後解四句經文通三身疏主都斷由此三身四辨具足故能起說所以智慧門深此雙會前教理上不知也既具前三種三種方便種種知見種種念觀即是如今秦經中種種因緣第四句種種言詞即是種種譬喻也上一段文總解四句了言論復第二已下等者以如經已下四個別句釋總四句今當第一別句經言廣演言教乃至離諸著此唱經云無數方便無數之言已是解上種種方便方便不一故言種種也問經家何以將廣演言教等解上種種方便答由有方便故能廣演言教實無有二乘佛說有二乘教於一乘道分別三乘名種種方便言此即第一者問此廣言教等一唱經文是何句攝答疏言此即第一等言然初以兩番釋上三句已者問何名兩番答明配經句為一番暗配論文為一番即成兩番問對往成就是後何名初答五番之中論家往成就第一番下經家四番四番之中初科兩番後科兩番今是初兩番故言初也言復以兩番等者即是第四言詞句中明配暗配為兩番言彼論文長等疏主恐人難解欲擬解四個別句去先依論牒三段五番科經文一遍言此第一初番釋云者此初字與前初字又別前云初兩番約前三義與第四義分初後也今此初字解四個明配經句疏文皆有初字對暗配論文為初也言復有義種者問何名方便答論解云示現外道示現者指示義指示外道種種邪過失如狗逐塊毀責邪法令衆生捨邪法入佛正法即是鶖子本事珊闍耶外道後入入故方便也二者方便故示現諸佛正法種種功德接引衆生入佛法中名方便此是所釋經句下解能釋別句經文言如經云舍利弗吾從成佛已來九個字秦經將向總句頭上安著也梵本經將向別句頭上安著如經舍利弗吾從成佛已來廣演言教已下是梵本經云於諸著處令得解脫秦本經云令離諸著所以疏主和會云文雖小異大意亦同言釋無數方便者論解釋句中廣演言教無數方便有四番解釋言方便令入等者方便之言於下三處轉即是未入法者令入佛法未發心衆教化令發心入佛法故二斷諸疑者即是已教佛法令斷疑令舍利弗法華會上回心修行破新舊二疑也三疑即斷了令入增上勝智舍利弗等修行當來成華光名得無漏勝智也四攝法攝取衆生令得解脫者即是舍利弗將四攝法轉化堅滿菩薩令得解脫又有說前云令入諸善法者無聞非法器衆生令入法故二斷諸疑者即聲聞人聞四諦法教斷疑三令入增上勝智即是緣覺十二緣生教得勝智對聲聞名增上也四四攝法令菩薩以四攝法令衆生倣此後鬘四種重任配不及前解也問言入者為約佛為約所化答約所化衆生四種皆所化生說不約能化也言此六釋中等者亦有疏言四釋亦云五釋皆非六釋為正此上四義帖前示現外道種種過失及示現諸佛功德故成六釋也一回邪是即初示現外道種種邪法即是外道執我我今舉所取能即是第一時有教二入正即是第二時空教說諸佛正法種種功德三進善即是方便令入諸善法故四破惡即前斷疑五百自入勝智即前增上勝智也六令他解脫即前四攝法化衆生又舍利弗本事珊闍耶外道我本著邪見為諸梵志師住邪也世尊知我心拔邪執涅槃回邪也我悉除邪見於空法得證名入正回心向大名進善法華會上斷疑名被惡初地已去直至當來成佛名曰華光名自入勝智又令他解脫轉化堅滿菩薩亦得成法輪也言以此方便引攝等者解經中引導衆生令離諸著蔣音即及言著者執本等者執即是本本即是著執與生死為本故名執本又執有二種一者我執與煩惱障為本亦與分段生死為本二者法執與所知障為本亦變易生死為本所以疏言愛染生死即是著也言論云諸者解經諸著字也凡夫觸目對情皆起執著經言諸著論云彼彼言著界者欲界色界無色界言著地者九次第定四禪八定并滅盡定名九生長功德之處故立地名於此地上而生執著名著地言戒取三昧等者戒取見取執此三昧故名執著問其滅盡定利根那含羅漢緣覺自在菩薩方得滅定因何更有見戒取執著名為著地耶答攝云二說一煩惱障中見戒取不還已無所知障中見戒取不妨亦有二者未入聖位已前聞說此滅盡定起見戒取執之修學實是凡夫有執著非聖人也唯此著地不通聖人況許取初解法執無失說二乘諦執滅定又佛呵菩薩不令入滅定故妨何法執收唯大乘義要其二為戒取一執為最勝二能得清淨具於二者方得名戒取若有一而不具二皆名邪見不同小乘隨起一個皆成戒取令此大乘如起最勝及能得清淨菩薩同時五薀見為先者則見取攝戒為先者則戒取攝如諸外道坐得四禪八定已執諸見及所依薀同時亦有上地意故即總取而為戒取故由此見戒執八定也言九次第定者問為離八定別有滅定為即八定耶答即於第八地中開何故開之為二答漏無漏殊聖凡求異故若爾此定依有頂非想開為兩地無想屬第四禪無想外道妄計亦開兩地難曰滅定心滅不滅別開與不開外二定一種滅兩處各開地答滅定心雖等通依諸地故開無想唯在四雖復滅心故合然此九定名地者地者依止義與諸功德為依止故言著分者如在家俗人父母作農業商業工業散業煞羊等業事鬼神業如是執著己之事業即子繼父業不依餘業皆名著在家分也言著出家者如出家已後不修道業苟求名利觀行者但作觀行析伏煩惱餘不作如此觀者皆名為著問業著名利可名著如覺察煩惱如何名執著答雖覺察煩惱而於善品無進趣心亦名為著如修不淨或作數息而伏煩惱即執此定所學觀行之業以為究竟更不作餘名之為著問覺察煩惱理合名順何名執著答執自觀是將餘觀行為非專住此情名為執著也言著乘等者著小乘大乘著分別種種法相道理乃至分別佛地故此人貪分別法相不肯修行名為著也問法歸分別寧通答但除執著之意不言都不分別不爾如來善能分別一切諸法豈是著心若爾八地已還菩薩猶法執當應一切不分別法或分別法而有執耶答此說如來方便令彼一切衆生離諸執著誰言菩薩皆得爾耶言此第二句論云等者此即經家第二別句釋上第二總句總句云種種知見別句經云所以者何徵上種種知見問何名種種知見答經言如來方便知見波羅蜜皆已具足故總句云種種知見言論諸番者對後暗配名初也言種種知見者牒所釋經句言自身成就至菩薩等者章敬云此是論主釋別句意也自身解經中知見波羅蜜多皆已具足也真如妙理離言絶相名不可思議對能證之心名為境界或真如妙理名境界只此境界即不可思議通此二說佛德圓滿證名為具足根本智親證不可思議境界後得變歎證不可思議境界言與聲聞菩薩等者此解經中方便也由佛自到彼岸成就得知見後得智中為聲聞說故名方便也令他悟解回心向大名之為與亦令菩薩修行修行得此佛果名與知見方便上論生總解了言到彼岸者勝等者論主解到彼岸由佛自身到彼岸成就得知見後得智中為他說名方便令舍利弗亦致岸故云到彼岸者勝餘一切諸菩薩故言文少不同等者料簡闕具也梵本經云舍利弗秦經云所以者何有無不同梵經知見在前秦經方便在前正倒不同且梵本經先由成就得知見次有後得智後有方便智此依本末次第若秦經在前說方便不依次第梵經云到彼岸秦經云波羅蜜唐梵不同也秦經言皆具足論中更加勝餘一切菩薩故菩薩證十真如不得具足如來方便亦具足知見亦具足波羅蜜亦具足故云皆已具足故名勝勝餘菩薩也言知見者真俗者根本證真後得智達俗解知見了言方便者此等者後得智上作用八相成道故名方便方便善巧者將所成就知見與諸衆生說還令衆生成就知見名方便言由自成就等者問何故如來知見亦具足方便亦具足答疏言由自成就等此舉理取智意言先由成就不可思議境界境界即是涅槃次成就知見後起方便是此意也先由身自成就不可思議境界此境界即是圓滿真如塵沙萬德為境能牽牛能緣心故具知見根本智名知後得智名見此二智作用與聲聞菩薩等說故名方便上舉理取智了言波羅蜜等者舉智取理此解意先成就得知見次證不可思議境界後以方便為他人說他人亦到彼岸故名方便波羅蜜者到彼岸義也舊闕多字唐三藏加多字波羅此云彼岸也蜜多此云到若順西方語云彼岸到今依三藏云名到彼岸金云蜜多離也到也此有三對一離有相此岸到無相彼岸二離生死此岸到涅槃彼岸三離六弊此岸六度彼岸言六弊者一慳貪二毀禁三嗔恚四懈怠五散亂六愚癡如次六度所治病也今經取涅槃為彼岸也然二乘等即無波羅蜜多故有頌云麟角喻無有六波羅蜜多唯我最勝尊具足到彼岸言明佛等者先舉智也問何故相違答有二意一者欲顯佛所得法不過性相二者亦顯證無前後如是日照空中暗暗盡明佛成就理智二法即是自利也言由具方便二智等明佛利他行也言故能以此等者准疏意即是如來自性成就知見性相令彼聲聞等還如世尊成就得不可思議境界而能具足知見方便名與聲聞菩薩也言此第三句者天親菩薩將第三別句釋上總句種種念觀問何名念觀答下別句十三門功德是念觀所攝合之則種種念觀開之則十三門功德也秦本只有八門也初番者對後暗配名初也復種種念觀牒總句經文言經舍利弗如來知見至具足故者引別句經也具足言之言遍下十三門功德言文意大同等者梵本經念觀功德有十三門秦經有八門闕五即無不共法根力三十七菩提分及三摩拔提五門也言廣者初解總句問何名總句答言總者只於當句中就總不望他方便知見言詞總今總就念觀之中如來知見是體廣大深遠是用合此知見體用名總也十三門功德是別句問何以知見體用是總句耶答以彼知見廣大深遠故是總句此知見向上廣大深遠遍在十三門功德中一一向上皆有廣大深遠義開之則十三門合之則是一箇知見為體也如來知見亦廣大深遠無量亦廣大深遠無礙亦廣大深遠乃至三摩跋提亦廣大深遠此是秦經八門功德辨總別也廣者無邊所證理既無邊能證智慧亦無邊也根本智證盡一切理名無邊後得智達盡一切事名無邊也言大者無上者出過三界體是無漏故名無上然佛功德即十地菩薩二乘人不能過者言深者難測者唯佛能知菩薩二乘不知故名難測言遠者時長者二解一云三大劫來修習得名遠二者窮未來際不增減故名遠摩訶般若內照法身理解脫道已去窮未來際故名遠言此上乃是等者即是根本後智也言又此諸德等者問十三門功德中有是智慧性者不以慧為體於中禪定等諸法如何亦以智慧為體答疏言又此諸德等即諸功德亦二智眷屬為體如無量無礙等皆通心心所是智慧之眷屬也禪定與智眷屬三昧皆定皆智慧眷屬亦名知見也上諸德總句了言依此經文無量者即論牒經無障也有解牒論梵本經剩無障脫却無量秦經有無量闕無障此解不然疏為也無障即是經中無量也法若有障不名無量法既無鄣故無量也言謂三十七菩提分者問既說三十七菩提分何故別說五根五力耶答由入道勝故生長功德勝故別說也言三摩跋提謂九等至等者二說一云在定位之心安和平和平等名之為等此由定力令身心至此平等之位名為等至二云等謂平等惛沉掉舉名不平等由前加行折伏却惛沉掉舉平等持心而至於定位名等等即至也初釋以定為緣令心安和也後釋由前加行為緣念心安和也此之一種秦經亦無十三門中四無所畏十八不共法唯佛即有故不道菩薩聲聞也四無礙解通菩薩餘者三乘共即四禪八定兼通外道也言體即明記等者意言如來得大總持故此十三門功德明記不忘故名種種念觀觀即慧故非此十三門皆以觀為體也八門中念觀兩法偏勝故舉念明記勝觀是慧慧簡擇勝正合取慧不合取念慧同時故雙取也言一列名者問如何名四種無量答疏言謂慈無量等此四無量亦名四等心亦名四梵住攝引雜集云四無量具五緣一以靜慮為依止二者有情為所依三拔苦與樂為行相四定慧為自性五心心所法為助伴也若空言四無量通三乘人若言大慈大悲大喜大捨唯佛有故謂慈無量外道凡夫不妨有慈悲若喚作無量即不得謂悲無量喜無量捨無量言釋名等者亦名四等心緣一切有情平等起故亦名四梵住由行此四當感無量大梵福故一緣無量境攝云菩薩藏經云諸菩薩為菩提故盡衆生界慈心遍滿盡虗空界是衆生界量無所不遍菩薩大悲亦復如是緣無量有情為意故名無量不同凡夫但緣妻子眷屬方起二乘唯依欲界起如來大悲遍三界起故名無量菩薩緣欲界四趣但拔苦苦不能拔地獄地獄壞行二苦今說如來遍緣三界拔彼三苦言二起無量行解等者行解不一故名無量所緣既無量能緣行解亦廣大此約見分緣所緣相分境既無量其能緣見分行解亦名無量如外道六行伏惑時決於有情不為損惱修上定時亦有四無量二乘等亦有但是假相菩薩通假實但緣四趣有苦衆生起此四故除天起不能救壞行苦名小四無量如來所作是實通拔三界三苦名大慈等四言三感無量果小者有近果遠果由行此四等心近果即四禪梵王初將四天下六欲天福集一處著始底一箇初禪梵王福遠果即成佛也有漏心修四無量感四禪梵王果無漏心修四無量感無漏梵王果即如來身即遠果之問凡夫生上界要須習定今但修四無量如何得生答嗔恚煩惱不生上界慈悲既是無嗔何妨得生緣憐兒故投水而死生於梵天女人憐子即是無嗔心無果緣即是捨定無嗔有定得生梵天以母有真拔子之心是悲心故得生上名盛果無量問其梵福分限如何答菩薩藏經云譬如三千大千世界下至金輪上至四禪水滿其中取一牛毛竪分三分取其一分遍涅水中以手拭乾還放水中沾此水盡梵福方盡言法界有情總為三類等者金云若約界地論可為四類一無苦無樂謂第四禪已上并四空處二有苦無樂謂地獄全鬼畜一分三有樂無苦謂下三禪四亦苦亦樂謂欲界人天及鬼畜一分鬼即至五嶽禹王等祀者畜生龍鳳象馬亦有一分受樂者又化度各為四句料簡一先樂後苦如世人飛鷹走狗自樂己身不知已後地獄受苦二先苦後樂如今苦心持戒及內財外財施人命終之後生天淨土是三先樂後樂如出家人離煩惱名先樂後成佛名後樂四先苦後苦如外道鞭㭬臥蕀後入地獄然疏言三類者總相言俱句即攝在苦樂中亦無違也然依此三類衆生中有七類人依此人境向上行慈悲喜捨問云何七類答且親有三品一父母師長為上親二兄弟伯叔為中親三朋友眷屬為下親四非怨非親中容人怨有三品五下怨煞朋友眷屬六中怨煞兄弟伯叔七上怨煞父母師長於此七類人上從淺至深修事須先修慈無量慈無量以與樂為行相且樂有二種一有漏二無漏有漏樂有三品人中四洲菩薩六欲天為下品初二靜慮為中品第三靜慮為上品又無漏樂亦有三品聲聞中聖有學無學為下品辟支迦為中品菩薩佛為上品有漏無漏不同總相作三品配上樂如一貫金錢中樂如五百銀錢下樂如一百銅錢且第一上親是父母與上樂如與一貫金錢中親是兄弟與中樂如與五百銀錢朋友遠親與下樂如與一百銅錢此第一未是修行作觀行人方法次第二方是觀行人調練身心如先於上品親與上樂此為最下修慈次於中品與上乃至上親與下樂上怨與上樂有十九句至此方名成就其相云何先上親與上樂中親與中樂下親與下樂三於中親與上樂下親與中樂中容與下樂三於下親與上樂中容與中樂下怨與下樂三於中容與上樂下怨與中樂中怨與下樂三於下怨與上樂中怨與中樂上怨與下樂三於中怨與上樂上怨與中樂上親與下樂三後於上怨與上樂方是親行成就由佛因中作此觀行果中任運怨親平等見怨家如赤子也言一與苦樂者總意說不獨指一方也一世間有一般人衣食用得足名無苦更覔富貴不得名無樂非是總無三苦八苦二無枷棒臨身名無苦有生住異滅還流名無樂此一類人無苦故不旨造善無樂故又不肯造惡事須苦逼身方乃造善樂及身方能造惡此一類人苦樂總無也佛若遇此一般衆生事須無倒與樂問何名無倒與樂答一為名分心與樂名倒離名利心名無倒二有漏名倒與無漏名無倒也意取無漏樂為政此一類人無苦無樂若更與世間示與癡相應不可救得故無倒與樂設是有漏亦名無倒如言一乘通有漏故若與人天愛染名為有倒也所以疏言無倒與樂名慈也言無嗔為體者問何故辨相中出體答此慈無量不離以無嗔為體亦便以無嗔為行相行慈之人三業不現嗔之相故言有苦者拔苦者菩薩悲心見諸衆生受於苦惱心生惻愴而拔濟之故為悲釋名也苦亦有三品地獄苦為上餓鬼畜生苦為中人天苦為下路行相同前一上親拔上品苦中親拔中品苦下親拔下品苦二中親拔上品苦下親拔中品苦中容拔下品苦三下親拔上品苦中親拔中品苦下怨拔下品苦四中容拔上品苦下怨拔中品苦中怨拔下品苦乃至上怨拔上品苦名悲無量觀行方成也即以善十一中不害為體也言三有樂者助喜等者一上親助上品喜中親助中品喜下親助下品喜二中親助上品喜下親助中品喜中容助下品喜乃至上怨助上品喜無量觀行成就菩薩見衆生有榮樂事心歡喜不生嫉妬助彼慶悅故名喜也言不嫉妬善根者殉自名利不耐他榮今既反彼助彼令喜名為不嫉不嫉即無嗔分也問喜無量何故不以無嗔為體取不嫉善根為體也答今此疏主從根本立名先由不嫉衆生有榮樂事所以助喜故以不嫉善根為體言復於無苦無樂等者捨行相也此一類人衣食自充無苦勤求方𫆳無樂心不了因果見善不煞又亦不嗔名之為癡相佛菩薩等開決令修行進善令離癡也言於有苦者見苦惱貧窮下賤無手無足兼無眼目而來乞者必起嗔心今者菩薩若見有苦衆生而來乞者不生瞋心繫念彼苦故又有衆生身上有苦怨天非人菩薩聲離也言於有樂者等者不了世間錢財是妄計為實有生貪著故令離故也言平等欲令等者辨捨行相也欲令離諸惡故明捨功能也菩薩見諸衆生有喜樂事於上不生貪愛於三種境上不起貪瞋癡三心總平等故名捨所以無貪瞋癡精進四法為體問此等四心為實為假若假與樂拔苦乃成虗設若實者世間如何有苦可得佛常起故答二說一假想心中作如是觀為前方便引後實觀即能拔苦與樂等二者此但是佛菩薩起此四無量心為善友緣與諸衆生為緣故過去諸佛數如河沙皆是已拔苦者衆生因力佛方為緣故如天雨故只為衆生法爾無量故有苦可得亦約根未熟者故非是如來四心虗說也言善捨為體者出體簡法也引唯善十一中行捨謂進三根令心平等無功用住為性疏政作捨意簡受也言出體性者合以等者前來解喜以不嫉善根為體者但是疏約根本立名先由不嫉衆生有榮樂事所以助喜故以不嫉善根為體此是疏主直顯解義也若依論家喜以無嗔為體唯識云云何名無嗔於苦苦具無嗔為性對治嗔恚云何行捨令心平等正直無功用住為性對治掉舉靜住為業云何不害於諸有情不為損惱無嗔為性能對治害悲愍為業問不害是假為悲體百法之中別開數不嫉是假為喜體善法之中何不立答唯識云謂顯慈悲此二勝故故離嗔立不害不嫉不爾問亦應謂顯喜捨離無嗔外立不嫉答論云利益有情此二勝故言此各有三等者種類差別初修觀行之人未能離得我我所心所以緣衆生時當情見有有情圓首方足張三李四而能救拔二者法緣者法緣雖除我執法執乃存行拔苦與樂時當情不見衆生唯作三科法想而為利益拔濟也言三無緣者既遣二執復於諸法離分別作真如想由前除却法執心緣衆生不作衆生想不作法想當情唯作真如想潞云離分別緣名無緣內冥真境不緣有情乘國中大願任運能度名曰無緣晢法師問既緣真如真如上無苦如何拔苦名無緣悲答拔苦之時不是拔真如上苦真如向上其實無苦元來拔衆生身上苦當拔苦時不緣衆生唯緣真如任運能拔苦與樂名無緣慈問既實拔苦與樂何名無緣答二說一真如上離言絶相體是離緣法故名無緣二者不緣故無緣拔苦與樂時唯緣真如不緣衆生任運能拔衆生苦故故名無緣由佛因中三大劫行四無量觀觀三事體空今日觀行純熟更不加功用行衆生熾燃離苦解脫得樂如陶家輪陶家輪初時轉齊轉三匝五匝却住去漸漸輪齊清去一回拔轉轉得三十五十匝若准疏中意直是緣衆生作真如想而救拔苦問何名無緣答云離分別心作真如想涅槃經說五百釋女被挑其眼受種種苦即稱南無佛三度念之佛力風吹藥填其眼目平復如故佛言我不與他治當知即是無緣慈善根力也言或法無量等者此第二解疏主意法謂十二分教修慈之者欲令衆生因緣十二分教慈從教法起故喚教法作法緣慈或先因緣教而後起慈名法緣慈此經云三界無安猶如火宅又云今此三界皆是我有其中衆生悉是吾子而今此處多諸患難唯我一人能為救護由聞此教故起悲心乃至喜捨亦爾言此三之中等者凡聖差別也外道亦能行慈樣危救弱作有情想我見未忘故當情見有怨親自家妻子男女言次共二乘者二乘已離我執當情法執未忘故救拔衆生之時作三科法想名法緣言後唯菩薩者菩薩悟二空法亦想無也不見有情及法但作真如想三事體空故後得通前前不兼後言初三安樂等者利樂差別也慈無量悲無量喜無量但拔令離苦無樂者與樂有樂助喜此名三安樂現在因中便得安樂第四捨無量欲令離諸惡故離貪嗔癡但名利益未必安樂問若然者違他無性攝論云何四皆安樂答彼論云四皆安樂者約捨無量當來所感安樂果說此間疏中言捨唯是利益約現在法上說也又有是利益而非安樂有是安樂亦是利益論約俱句疏主偏說亦不相違初通外道外道度衆生唯得生天有漏樂果二云二乘二乘自利小果粗淺後通菩薩如來即觀空觀有拔令出世證真如故熾然度生都無彼我三事體空有殊勝功德之利益也言感果可知者果報差別也有二一總二別總果有二一遠二近近成梵福為大梵王菩薩藏經說譬如灾下至金輪上至梵世滿中皆水遍三千界假使有人以一牛毛竪分三分但取其一遍涅水已而復擎出以手拭乾乾已復涅大千界中水可治盡無量心功德無盡遠則感如來果二別果別果中此四無量若凡夫有漏心中以煩惱資四無量感人天果若以四無量心資於煩惱感地獄三塗果凡夫慈悲勸人食肉飲酒等是四無量資煩惱也若二乘人四無量心資所知障感變易生死起慈悲心救度衆生誓求菩提執有情可度菩提可求即是所知障由因此障而起慈悲故受變易果也若菩薩以四無量心資真如當得法身以真如資四無量心當得報身並是能感菩提涅槃二轉依異也言與大慈大悲等者五勝劣差別也此中有四差別一救濟假實二依身因果三所緣寬狹四體性多少然慈悲喜捨三乘共有大慈悲等四唯佛獨有問四無量慈悲喜捨與大慈大悲大喜大捨何別答無性攝論云大悲者有五義一福德資糧圓證故二解脫苦為行相故三三界有情為所緣故四於有情心平等故五決定無有勝此者故又有說五義大一資糧大六度萬行所成辦故二行相大三界有情平等悲愍故三所緣大緣三界有情故四平等大即前七品修怨親平等五上品大求大菩提利樂有情故更無餘悲能濟此者又有頌云大悲唯俗智資糧行相境平等上品故異悲由八因俱舍有八因與彼差別八因者一自性異大悲無嗔無癡自性異故悲唯無嗔二行相異大悲普緣三苦為境悲唯緣苦苦三所緣異大悲普緣三界悲唯緣欲界四依地異大悲唯第四禪悲通依餘地起五依身異大悲唯依佛身非通凡夫聖人六證得異大悲離有頂悲離欲界七救濟異大悲救有情皆成實悲但起假想希望不實八哀愍異大悲平等哀愍悲即不爾有不平等言彼唯實者大慈大悲實能拔苦於一切處能漏救故名實若凡夫雖起四心而心不稱以少能拔苦與樂若極重處如王法刑戮及諸病苦而不能救故名假若初地已上菩薩實有慈悲垂形六道拔苦與樂名實此即八中第七救濟異也言唯佛等者其四無量通凡聖起若大悲等四唯佛能起即第五依身異言依三界者若大悲等四通三界起如乘等依四無量多分唯緣欲有情起即是第三所緣異言菩薩無癡俱者四無量菩薩無癡俱悲大也由大悲無嗔癡攝故自性不可俱也即八中第一自性異言通假實等者對上唯實等顯之大悲以無癡為性唯識云彼無癡以慧為性大悲五力慧力攝故知大悲無癡為性言列名一法等者四無礙解因中分得佛果滿足解者智也菩薩後得智於此法義詞辨四種境上通達無有權滯名為四無礙解也亦名四無滯智初二從境立名後二從心立名也言法謂能詮者法無礙解法謂教法能詮教總持自在於一名句字中現一切名句字故以名句文為體疏作教字為正有本作聲字非也尋常出教體假實合說聲名句文為體今對法無礙智所緣境唯取假法不取聲聲是詞無礙中攝此法無礙智不緣聲也言義謂所詮等者義無礙解即真俗諦俗諦之理所謂有漏真諦之理所謂無漏其中有有為無為對能詮教總名義也一切法但是所詮皆名義也俱舍云緣所詮義名義無礙解也言詞謂等者詞無礙解謂諸方言音如來悉知於一音聲中現一切音聲後得智一一皆能了達名詞無礙解也言辨才謂等者辨才無礙解也辨中謂七辨之中應根巧說法故是發語即所起四辨名辨才若言無礙解約能起之智上方無所拘礙若言辨才即約所起四辨七辨由能觀後得智起此四七辨無有權滯智能起智就所起立名名辨才也言有多差別者如決釋菩薩地說及十地論總說此四無礙解初地分得九地相續佛位圓滿菩薩入九地時得此無礙解唯識第九云九地菩薩成就微妙四無礙能遍十方善說法故即是此地菩薩所化衆生數如雲雨能令爾許所化衆生一時發問菩薩一時俱斷衆疑是也能任運說法名善慧地問四無礙解依何界地得答法苑云四無礙解皆依第四靜慮准此唯依佛說若通因位說法一種通二地五地初禪有尋伺發語言故二禪已上借尋伺發語言故亦得名有也辨才無礙解亦是聲同詞無礙也言義無礙解者若真如名義約緣而說唯第四禪若所證理名義即通一切地何法不是所詮故也第八地菩薩自利行任運精修若於利他行功用猶劣說法之時假乎尋伺第九第十地菩薩發語言語說法依正思惟又不假尋伺言出體者此四等者何故多取無漏後得智為體若疏言非證真如故問總合是後得智如何言多以答次下疏言義無礙亦通正智以真如理亦通正智緣故言多以三全一少分是後得智為體一少分是根本正智為體名多言初地分得九地任運等者問九地菩薩離障圓成與佛果四智菩提圓滿何別答言九地離障圓成者初八地說非對佛位也問無礙解與辨才何別答自悟邊名解利他邊名辨問佛菩薩何別答七地已前依初定有尋伺起語言八地已上依第四禪無礙伺也言處非處處非處所知之境智力是能知之智言自業智力者瑜伽等文唯舉其因不談其果名自業力言異熟者般若經中因果雙舉業者因也果熟果也言靜慮解脫者金云定有四種一順退定謂未淨定二順住定謂淨淨定三順勝進定謂欣上定四順決擇定謂將入見道餘力准知世尊於此十種境上善能了知故名智力言總名力等者如來身上二種一身力中最強是那羅延力佛身節節之中皆有那羅延力俱舍說那羅延節節皆然象等七十增此觸處為性凡象香象摩諾健那鉢羅蜜健提伐浪迦遮恕羅那羅延今不說身力但智力不被他人屈伏故名力也世間人力雖能摧他人還被他人屈伏曹併雖然壯還被管萬迪撲法中論約於菩薩時金剛喻定斷極微細礙著等障至解脫道中頓得此十力後起定唯如來有二乘無故小乘唯云十力四無所畏三念住大悲名不共法也菩薩名近十力亦未得唯佛有得也然力有二種一身力二心力今取心力心力即智如來具二能名能摧怨歒約所破得名不可屈伏約能破立名所破四魔能破即談力自體言與一切種利樂等者解經意也一切種後得智也有二義名一切種一切如來後得智是一能知一切法約功能名一切種也二云所緣境上萬類差別種類衆多從境立名一切種即是後得智上利他作用功能慧是體功能是用用與體相應他性相應非自性也言畢竟勝伏等者引論文也畢竟者即究竟也糅云簡外道外道雖暫能伏他不能長時有萎歇故不得畢竟不名力也如慶喜被六萬億魔嬈被如來敕文殊以呪力取之也即是不能長時伏也今如來伏一切天魔等但利益他無勝負心能長時畢伏問如何如來有怨答魔自於如來起怨非如來有怨也勝伏者不可屈伏義伏者能摧怨歒義也故以威勢等疏主解也言對法云等者緣菩薩藏經顯揭與瑜伽文同此前一處引對法文別所以再引也善記問論者有人徵問所問之論名問論如來言解釋名善記記者分別解釋義即四記四記唯約分段生死上說且善降即難摧善記即難屈所問有四一者一向記如有問言生者皆有死耶三寶是良福耶此義決定一向記言生者皆死三寶真良福田二分別記如有問死以更生耶引不則須分別有煩惱者死已更生無煩惱者更不復生凡夫有學有煩惱因緣即生如無學等無此因緣即不生若凡夫外道不善了達作生死問應如是答三反詰記如有問言人勝耶劣耶則須返詰汝對於何若對天人即為劣若對於畜人則為勝十地菩薩相望亦爾四默置記者如有問言龜毛為青黃為赤白兔角為曲為直即須默置記默然莫對龜毛本無何得論其青黃赤白若答者應長戲論終無有盡故言善降等言力用不同者即是智體是一所對不同隨分十種帶數釋也辨云十即是力持業帶數二釋也言因果相當等者路云處是道理義非處是非道理義因感善果是因果相當是道理義名處也若如外道說持齊得飢餓報此即因果不相當非道理義故名為非處又云處者因義即是惡因與惡果為因名因果相當也若因果不相當名非處外道有三一無因謂自然而生即烏不染而自黑獸不畫而自班二惡因簡要云外道計苦因生樂果樂因生苦果世尊責云愚癡外道豈有放逸受樂而招樂果耶三不平等因者一因感多果如大自在天能生一切佛法責之如何一因之上能生多果故名不平等言瑜伽云淨不等者淨因感淨果染因感染果非不平意道平等善惡二因感善惡二果不同外道煞牛祠天行不善因望得生天善果皆是因果不相當即是不平等言如實轉因者疏主解也有疏云如轉變因者攝云筆誤也淄州云近檢論文如轉變為正大論三十九云非不平等如實轉因者遠離一切增上慢智說名如實不同外道冥性為因是不實佛法依處道理名如實轉因如者稱順義實者真實轉起也此因與當來為如實生起之因名如實轉因也言處者建立等者問何名為處答三義解處疏言建立義二依義三起義言能建立果者解前建立義言為依能起等者為依兩字解前依義起字解前起義也問何名處義答處者建立義也為因能建立果果為所建立故名為處二者依義因為所依果為能依名言種子生五薀現行名依所也善惡因招無記果名處三處者起義因能起果果為所起故名為處也言不平等因與上者佛法善因感善果外道善因感惡果一陪相達今瑜伽說處者因義破外道不平等因無性論云處者所以義有所容受義若無所以若無容受說名非處雙破無因惡因合斯二論義方周足上解處非處了言於此二種等者解智義即處非處名二種也一切智者問此明後得智何故引根本智答智是能知泛解一切智是根本智一切種智是後得智今此四種並是後得後得智體唯是一以作用不同故說為四簡要云即得後智也不同尋常解根本智名一切也此中說後得智名一切者能遍知一切法緣一切境故名一切一切者章敬云有四義一者緣一切界二者緣一切事三者緣一切品四者緣一切時於此四境無礙而轉名一切智一切界中有二一器二有情一切事中有二種差別一者有為二者無為一切品中有五種一自相差別二共相差別三因果差別四界趣差別五三性差別時有三時一過去二未來三現在即於如是一切界一切事一切品一切時如實而知故名一切智也言無滯智者暫時依意遍於一切無礙速疾名無滯智也簡要云不被外道問難屈辱故言清淨智者一切煩惱及智氣畢竟永斷故清智二乘世俗是有漏不名清淨今佛智世俗是無漏無愛恚名為清淨言離增上慢等者不同外道未得謂得佛證得福智圓滿具一切智名離增上慢離少得謂多得也言力義如前者前十智是體此四個智是向上義如來以此後得三智能知前二處非處名智力言各自所作等者自業智力於自所作自受果報如實了知及布施福移轉不作而得言施福移轉者諸外道言今生布施來生受貧窮果今生竊盜來世富貴果持齊餓鬼果煞馬祠天感生天長命果乃至行苦因得樂果行樂因得苦報如有人禮菩提樹及以布施有人不去即用金錢買取不得種種爭論今說業力降伏此等垢知諸業自受問佛法之中子孫設齊為亡人豈非此人造福他人受果答地獄中有白幡現亦事須得亡人自發心始得若不如此十方世界菩薩修行無限個個總願願一切衆生總如我身一切成佛若許他人造業此人受即事凡夫總合成佛了我輩凡夫既不免生死故須自作自受故言各自所作也言三世者過去未來現在三業者或福業非福業不動業或即順現順生順後業業能順果果是所順果業是能順名自業業有三一非福三塗二福業四洲六欲天三不動業色無色非福三品上品地獄中品餓鬼下品畜生福業二品下品四洲上品六欲天不動二品下品色界上品無色界或身業語業意業或順現受業現世造業現世受報名順現受或第一生造業第二生受名順生受今生或造業第三生已去受名順後若不定業者有三種有時定報不定時不定報俱不定如來後得智一一皆知衆生身中自作業自受報從因為名名自業智力也言於此善惡業異熟等者章敬云指般若經業異熟智力因果雙舉也問此自作業自受果與處非處何別答前處非處遮他無因惡因及不平等因無自然樂因得樂如數證計冥性梵王帝釋等此業異熟約自作還自受也問前後二解憑何教說答曰若作集論等但能招彼順現受等三業名為自業若依般若經名業異熟智力前能知業此據能知業所感果故別也言亦名業異熟智者業異熟屬衆生智力屬佛也言四靜慮解脫等者由定寂靜能審慮故慮體是慧定有靜用能生慧慮故名靜慮有四解一奢摩他云等持通定散但專注不散者皆此攝也惛沉掉舉是不平等由所加行折伏惛沉掉舉平等持心於一境轉名等持也二等至簡要云三摩跋提此云等至通有心無心唯定非散此有二一在定位之心安和適悅名之為等此由前定力引彼身心至此安和平等之位名為至二解云等謂平等惛沉掉舉名不平等由前加行折却惛沉掉舉品此加行之心便是平等品此心等引至安和分位等能引至此名為等至也言此等諸定通滿等者有漏定通雜染清淨無漏定唯清淨若但言染唯愛味不通淨定若言雜染即通有漏淨定兼愛味定也若細分別染中有二一障礙雜染為求靜慮加行時無方便故及諸蓋間雜生故二自地雜染雖離下染欲得上定仍為自地纏隨眠縛不得清淨有四番二淨二染二淨者一善方便二善清淨二染者一離現纏二離隨眠故成四此一節疏文會般若經中智與瑜伽論名自不同意說如來於此諸定差別佛皆能知也言根者信等者根勝劣智力也根者生長義故說名根根即信進念定慧五根也簡要云此顯信等五根有上下勝劣上者名勝下者名劣佛於勝劣二根中皆能知故名根勝智力也然此五根道漏無漏有上中耎菩薩五根為上緣覺五根為中聲聞五根名下中下二根合處說名劣上者獨勝即菩薩也此上三乘通論勝劣二品也疏中意三乘各各有自耎中上耎者劣即下也初聞教名耎次修行行名中後成熟果上此解總非正也但是一人身中有信等五根便自然有上者有中者有下者中下名劣上品名勝也言若從他等者問一種是信等五根如何則有上中下差別答疏云若從等若論根勝劣智文已結了即合屬他後文若准疏勢屬根勝劣智力為正雖前結了但是結標文此段疏結釋文若從他以為其先者名隨信行人是鈍根是劣身中有三乘種姓不能覺事須假他人教示方生信心信從他人起名隨信行中等或觀諸法以為先者即是隨法行人利根人也先觀察而自起信心不假善知識名利根人問此中為但取信等五根兼通餘根耶答攝云此約入見道且說信等五根若通說生死可兼二十二根信等五根體是善故名別有體簡前八根唯是無記意與五受通三性簡三無漏體同一慧故故於二十二根唯說爾許非不知餘言愛樂勝解等者種種勝解智力也相國云於三乘處各隨自情愛勝解欣慕修學名種種信解心勝於境名之為勝印持決定名之為解印持三寶是良福田愛三乘行取三乘果名為愛樂先由勝解印證前境決定是因不可引轉是果如來能知名智力衆生三乘五性勝不一總名種種勝解智力也或樂於善或樂不善等佛悉能知也言若廣建立等者種種界智力也意言有情有種種性或一乘或五乘或通三性善惡無記種子乃至八萬四千行如來皆能了知也建立者施設義種種界者界是因義亦是性義即是三乘五乘種子也言或四乘者三乘外加不定乘五乘者四乘外加人天乘即無性人也此約五乘種子瑜伽說四種界一本性住種性界二習所成界三可對治界染種子無漏智對治四不可對治界即無種人身中法爾種子無漏智對治也言或貪嗔等者有唯貪增有唯嗔增有唯癡增有三俱者故名等分言乃至有情八十千等者辨云此據全數故俱舍云牟尼說法蘊數有八十千亦同詩三百亦是舉全數理實八十四行也詩三百五篇也維摩經云八萬四千諸塵勞門也種性不一名為種性種性者界也知諸衆生多貪種性多嗔種性乃至多癡八萬四千病行種性佛智一一皆知名種種界智力也言若即如是者趣入聖道行也若即如是者指前門中種子也諸趣門中者指此門中染法種子現行也諸趣門即是所趣所趣即是佛所知境所知有四貪嗔癡等分也言順正行者一句是能趣貪嗔癡是所趣也修不淨觀慈悲觀界分別觀為能趣行今唯取能趣行是此間遍趣行行收遍趣之行依主釋今趣遍字屬如來如來智家所知之如來後得智遍能得知衆生趣向之行名遍趣行言或一切五趣之門者福業是趣向人天行不動業是趣向上界行慳貪業是趣向餓鬼行無慚愧是趣向畜生行邪見謗法是趣向地獄行言或諸外道等者趣向執著行也此解不同諸解今却取所趣行也五薀假者身中異見為能趣行是所趣外道異見趣向鞭㭬臥棘行沙門異見趣向三乘行執著幻術符書禁呪十二圍陀經書伎業種種黨類差別各各修邪互相違背執己為長行餘為非等言或此世他世者趣求涅槃行也此世即現在也他世者過去未來總名他世賀云即三乘人三世中趣涅槃之行名無罪趣行涅槃體即無罪無罪之趣行依主釋簡要云無漏聖道越生死故名無罪趣行無罪即趣行持業此唯取無漏太狹若言無罪之趣行無漏有漏收盡也三業有漏善順聖道皆是無罪行也佛智一一能知四種行名遍趣行智力言於能遍行等者會般若經中名字此遍趣行是如來後得智所遊履之處名行行也能了知智就所了知為名名遍行行也相國云前解於遍即佛能緣智名遍今此解遍屬於所緣諸趣之行名遍問趣行智力與處非處智力何別答攝云彼是智境寬此是趣行即狹彼兼緣非處寬此唯緣處狹也言若於種種有情等者宿住隨念智力也緣過去境也前來遍趣行智力是如來智能知有情身中行今此中說如來智力能知有情身也宿者宿世過法世名宿也所緣境住在過去念慧兩法同緣過去境揀擇是智也念隨於智同時緣境名隨念智力也解隨念於智隨字屬念也二云正能緣過去境名念也智不能緣過去境由念引皆智隨於念亦緣過去境名隨念智力此後解智隨於念隨字屬智也前解為正緣智與念是同起之法今不言智力者是鄰近釋餘九皆依主也若於種子等者一一總知名種種有情言音四方名字東方世界衆生所有名字張三李四南西北方衆生所有名字如來一一皆能知也自體者有情身體體即身言八言說等者即將過去盡辨有八般事為言說之因一一皆說名八言說一如是名字如是言通下七處轉如帝釋過去名繭兒二如是生類婆羅門剎帝利等三種姓種姓氏之姓即婆羅門六姓等是亦如張王等四飯食如帝釋宮中蘇陀味北洲自然粳米五受苦樂者謂苦樂失財利名苦得財利名樂六長壽假如人合壽百歲至嬰兒後活至六十七十已來名壽七活至八十九十名久住八活至盡壽百歲名壽量邊際言於此八中等智隨於念緣過去境即是於念隨念決斷即名智念能憶念即智言略所行行者問如何前說八後略為六答秀云總門衆生身中過去八事今略為六即以八種略為六故據所行行不過六種攝前長壽久住總為壽量故唯六也但略其數非略行也問八言說句與略所行行何別答說是能詮教六略行是所詮理也此二俱是如來智所知境也八言說約法體則有八種六略行論佛所知合成六種合壽量為一故所以名略也即六種種境是宿住智所遊履行處名略所行行也言一呼召等者即前如是名字二剎帝利等者即前如是生類我是過去剎帝利婆羅門三父母者即前種姓四飯食等者即前飯食即變生為熟亦只如冷淘不詫等名方軌也五興衰者興即樂也衰即前苦也六壽量者即前長壽久住邊際是也言此等宿住等者結也智與念俱時起能緣過去名念俱行智力也隨念相應之智力依仕解言諸有情類等者死生智力也前來宿住隨念緣過去此生死智力緣未來境即知三根聲聞未來世經若干劫當得作佛等及知諸弟子若造善業者來世中得生善處若造惡業者來世中生三惡趣之處又能降伏執著斷見之者佛語言未來世中若更無身可言斷滅未來有其無量如何執身而有斷滅耶言臨欲終沒等者死謂本有最後一剎那心現在只有此一剎那更無後念此名為死謨云欲死正死名死也言住在有等者慈恩云取中有末後一剎那心名生時一念第八識攬父母遺體而住即名生時不取生胎方名生也此中但說生死及降伏執斷見是本意也如經中說孝子比丘僧中惡口在胎六十年意言如六十劫皆名為住如來一一能知名死生智力言於善惡趣等者解力義也言一切諸法等者能知見修無學道名漏盡今說正知若兼方便亦通知資糧加行方便伏惑成道名漏盡若種若現皆盡諸漏是現行及眠即是種子如是種現皆盡名漏盡智力問漏是種子如來遍緣三乘無學身中漏盡亦知聖有學身中漏法不盡亦亦知問若知漏盡可名漏盡智力兼知漏不盡何不名漏不盡智力答影彰說故或從勝說問佛自身中諸漏已盡佛自知否知者何名此力若言知見者其相云何答見心故果中作用強盛見分亦得及緣自證王所見分亦互相緣不同因故得能知自足漏盡若爾何名同一所緣不可現在心反緣自心故答王緣於所見分之時與所自證因緣此見故無有失言智者是體等者十種智皆是體十種力皆是用智即是力持業釋言此中宿住等者秀云然智不緣過去念能知宿世事由智與念俱故隨念亦緣過去今從助伴以得其名故隨念智力鄰近釋或能緣過去境與彼念俱念俱由近彼念相從得名鄰近釋後勝言處非處等者並北依主也言雖復處三文不同者是結前也然體有五者生後也言一最勝體者問何名最勝答佛功德中慧最勝故言最勝體也言佛具知根慧等者佛具知根含於九法謂信等五及意喜樂捨今取九中五根五中慧根為十力體無漏根有三一未知當知根即見道十五心已前於所未知當知故二已知根第十六心已去金剛心已還於十五心前者已知故三具知謂解脫道後故言具知根也問此三根為世俗為勝義答若准小乘俱是假法皆名世俗等論云四塵雖有漏實故名勝義三根雖無漏假故名世俗若大乘宗既是無漏故勝義攝言二引出體等者二說一定能引慧名引生二者定是功德叢林亦能生功德名為引生也慧是諸德之主亦能引生諸法慧亦名引生故十力以定慧為體又云由定起根本根本引起後得後得智得上妙用名力也言三尅實體等者問既尅實體以五根為性何不言信力念力答慧為勝故空言智力隨勝而就據實信等亦得為體也言相應體者智起之時同時必有遍行別境善十一俱時而起故論云及相應也言四蘊等者且智起時必有淨識心王是識同時有遍行心所以為受蘊想為想蘊自餘遍行一分別境善十一等並是行蘊智起之時與此衆生相應故名相應雖有衆多之法不離四蘊為性也言五眷屬體等者此體最寬四蘊之上更加色蘊為五蘊疏主取定道二戒為色蘊問佛身何得成定道二戒答若准小乘宗說定共戒唯有漏道共戒唯無漏大乘宗定共戒通漏無道共戒唯無漏今取大乘佛身無漏戒隨於佛定戒亦唯無漏問因中定道二戒依現行思上立此現行思上有遮防彼身口七支惡色不起功能名無表色若爾佛果無彼惡色可防如何亦名為色答有三解一云雖無色可防能發善色亦名為色二云果中有彼防發功能在亦名為色三云從遠所防說亦名為色也言此雖無文等者疏主自添此一解立理云此雖無文等道理合有也遮犯戒垢助摧怨故犯戒之法名之為垢由無表戒能防此垢永不令起名遮犯戒垢既遮此垢諸煩惱不起名助摧怨怨者煩惱與無漏智為怨也言餘之三門者指餘門義次有第三辨行相門隨辨名處略已解畢言第四次第者如來初得無上菩提即使頓得後次第起初立一切無倒因果起處非處智力次第希求欲界異熟為說遠離諸不善業令行善業起自業智力乃至次令永斷一切煩惱起漏盡智力言第五諸門諸門者有五一分別門二不共門三平等門四差別門五引發門一分別者有三一時分別三世所知隨悟入故二品類分別謂於一一隨自相共相一切行而悟入故三者身分別十方有情各各差別一切相續一切事義隨悟入故不共門者二乘所無菩薩分得別唯佛獨圓平等門者一切如來皆悉平等具足此力無有差別差別門者如菩薩地廣說其相恐繁不可述引發者復有三種一方便二根本三引發方便者謂於教法向上定數數思惟行相後使成滿根本者雖通諸靜慮皆悉有之如來多住第四靜慮故言根本引發門者復有二種一現前起用以後得智為體二居住本性用出世間正智為體即根本智言列名等者佛四無畏者疏中自列菩薩四無所畏者一總持無畏二知根無畏三問答無畏四斷疑無畏如常不輕品解今此佛四無所畏也言四是數名者釋名也無所畏者於此四處能自了知此是總談無畏於此四處有人徵問如來能自了知都無性懼故名無畏也言坦然無畏者身無畏也言心無怯劣者心無畏也言無所疑慮者諸語無畏也或怛然無畏是總名無畏心無怯劣心無畏無所疑慮語無畏都無怯懼身無畏故名無畏結也言正覺諸法者簡外道耶覺只此正字若是邪正之正簡外道若圓正之正兼簡菩薩覺未圓故言等覺諸法者簡於二乘偏覺諸法者即所知法也合而論之正等覺若開則言正覺等覺也上正等覺無畏斷所知障也言諸煩惱漏種現者漏盡無畏斷煩惱障知他人身中漏或種總盡名漏盡無畏問他人身中漏不盡亦如何不言漏不盡無畏答據實總知但是就勝而說也問自身中漏盡知否答亦知也言說鄣礙法等者障法無畏一者貪欲二者全界煩惱總名為障三界分別煩惱望三乘人見道總名為障也俱生煩惱前六品望第二果為障後三品望第三果為障上二界俱生煩惱望第四果為障總而言之染法為障者煩惱所知二障言說出離道等者出苦道無畏也正說見道修道究竟道名出離道傍取方便及資糧加行亦伏惑亦名出離道聲聞人觀四諦緣覺人四十四智七十七智出苦道菩薩二空智乃至三十七品六度四攝等佛即雙離二障名出苦道無畏出三乘聖道是出苦道法也正等覺四不是無畏無畏不是正等覺等四此四法是境如來於此四之上身心無畏故以為名也言於此四中等者簡要云初二是自利德即佛自是正等覺正等覺之無畏漏盡之無畏後二是利他德障法無畏出苦道無畏通三乘人出苦道及三乘障法也無畏屬佛自身故出苦道之無畏障法之無畏皆依主也言出體性等者五重出體道理一准前十力中釋言若起作用者金云等覺諸法及斷種現是住自性正智為體即本智也說障法出苦道等是起作用後智為性相國此四無畏各有自姓作用言發起者因定發慧而得四故故引發故以定慧為體此引發義亦同十力中解餘義并同言談實等者同前尅實體也言如經言者菩薩藏經也言復有沙門或非沙門等者問世尊經教中言佛具一切智無所不知何故比丘從他方來佛問言安樂住否乞食易得否事與教不相符也言遂於此中有立難云等者世尊既有問詞狀似不知便招傍人難言佛若知何要問若不知要問者何得言具一切智據實如來所知障盡已但是如來示相引導之門垂軌後人故陳是事言我於此難正見無由等對法云我於是事正見無緣緣者由也意言我見汝難無其來由所以也無真實道理緣由也得安穩住者身無畏無怖無畏者心無畏也自稱我處大仙等者由語業無畏也言攝受來者等者問比丘乞食易否今生歡喜之心無非利益皆是法輪言欲令諸人審等者問阿難言天雨下否欲令阿難審諦於事佛知尚問況餘不知言亦為後人作等者如夫子入太廟每事問例後人也亦是夫子禮也然佛一切語言皆為利益皆是法輪如多聞等十部小乘許諸佛言非皆利益如問慶喜天雨下否問諸比丘乞食易不此何利益轉何法輪答大衆等十部小乘諸佛言皆為利益問天雨下等令審講事佛知尚問乞食令喜等發心修行非無利益皆是法輪四無畏中前三屬佛後一屬弟子而由世尊言我於四事皆悉了知而無有畏世尊既鳴是言於事中多有違文故即有難言遂有難言言諸漏等者問如何初成道降伏天魔佛即努眼嗔魔王言斃魔等佛即有嗔又如提婆達多見佛出家去便言我與邪輪共生羅睺佛聞此語即嗔提婆達多癡人愚人經中雖言漏盡相上貪嗔癡宛然叱呵調達有嗔愛喜漂溺為對治第二禪喜故第三禪立念支也此第四定為第三定中勝樂留礙不能出離是故世尊勸住正念故第四禪立念支也此問答大小乘果問初二禪身光何別答初禪身光如末尼珠內暗外明二禪身光如燈明內外俱了今准此中若依小乘初二定中無樂受所言樂者即是輕安若准大乘即是樂受解經禪字了言定是四無色等者分二初釋名後出體釋名中初釋總名後別名且總名總名無色婆沙一百四十一云何故此四說名無色答超過一切有色法故色法於此無主容故說名無色四者是數名無色者無色謂無色即是四箇根本上三近分此七處名無色也空處近分樂得此名緣下地色有色想故若依大衆化地部等許見色界有細業果色以色細故立無色名所言無色者無彼粗色若依大乘言無色者無業果許有果色言無色者據業果而論之上總名了後釋別名者一空無邊處者具依空無邊處近分定先對治却四禪已下色法苑云空者空其色故無邊者十方諸相不可分別即無邊虗空也處者定與心心所法名處空無邊是境也處是能緣心緣無邊之處依主釋也色者質礙義若不觀色作空神通往來即有障礙觀行成就當情所緣是空無邊行相也問何名處答二解一云約修定人說能緣心緣空之處名處也二者處謂能緣定心是生功德之處也二者識無邊處者當地能緣心緣空處能緣空之識為境也下地空既無邊能緣之識亦無邊也三者無所有處者小乘二說一者觀此位我我所無名無所有處問一切地中無我我所何獨此地名無所有答餘地雖有勢分羸劣減少不同此地二者不者同下地觀識此位之中總不觀境寂靜而住名無所有大乘不然以當地二十二法為能緣將識無邊處能緣無邊之識為境又云或有所無邊處所緣無邊之識為境通此二為前正於此識上思惟觀察離識之外更無一法以無所有為境無少所有故名無所有問緣無不生心如何牽起能緣心耶答雖然以無為境思惟勝解之時事須依上觀察作無有解也觀識外無有一法也亦不緣空亦不緣識唯觀無所有為境四者非想非非想處者緣無所有處能緣為心境第一非字非由無也此定之中無彼下地粗想名非想也第二非字非由不也第三非字非由無也即不是無也當地內心極細心想不無故云非非想法苑云無所有處當地極細心心所二十二法不無故云非非想次出體者婆沙云一者修得二者生得若修得者有定果色兼有色蘊若生得者四蘊為性故大乘法苑云眷屬五蘊為性此定果色又言無色定者四根本上三近分定唯緣無色定其空處近分定通緣下地色境有色想故不空緣無色也問色與無色定相狀何別答入四靜慮定時其身相狀如處室中入無色定時其身相狀如處虗空問如何無色唯此四定耶答離下地生得分四種離第四靜慮生得空無邊處離空處生立識無邊處離識處生立無所有處離無所有處生立非想非非想處又有說由受生有四處謂空處二萬劫識處四萬劫無所有處六萬劫非想非非想處八萬劫解禪定了言解脫謂八解脫等者法苑十門分別一烈名字二顯行相三出體性疏中有三門也四釋名五所緣境六凡聖得七離障別八依身起九二得果十有漏無漏分別乾符六年冬溫州開元寺講大慈恩比丘弘舉傳寫供養弘長元年辛酉漆月拾日寫之畢永實同年十月二日一交了
