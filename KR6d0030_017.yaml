body:
  text: 鏡水沙門栖復集言依瑜伽第十二等者引文釋總名也舊小乘論云八背捨路府云初二解脫背淨向不淨第三解脫背不淨向淨第四解脫背色向空第五解脫背空向識第六解脫背識向無第七解脫背粗向細第八解脫背想受向滅議曰初三背捨與大乘全別後五似同大乘也簡要云依大乘解初三解脫觀色而得解脫次四於心而得解脫後一於心心所而得解脫又小乘修前三解脫次除顯色貪作不淨想除變化障作光明想大乘解脫事須觀已離染色小乘解脫觀未離染色糅云初三除變化障次四引生無諍願功德後一解脫畢竟成滿故解脫有八又前七通漏無漏後一唯無漏若准小乘八解脫並是有漏若大乘人修解脫事須先依初禪未至定伏斷却欲界染所有欲界根塵皆是已離染色若便喚作解脫則未事須重將此色想作光明方名解脫脫離諸定障於境自在亦解亦脫名為解脫八者數名名八解脫上總釋名下別釋言有色觀諸等者前來雖引多本聖教皆不圓足唯法苑章廣解彼處十門疏中引前三門也此間無釋名門只於列名處便釋名也瑜伽云有二因緣名為有色一者謂生欲界得色界定名為有色二者於有色地作光明想名為有色又三有義一有色者離欲界染得色界定名為有色二者不作小多想作光明想名為有色三者未依無色定對冶色界染住彼色染之中名有色此但觀欲界內外根塵等色思惟勝解名為有色問有色何不言內有色又觀諸色何不言觀外諸色答只緣初解脫人內五根外五塵總觀若言內恐濫唯緣內五根若言外恐濫唯緣外五塵是故有色不言內觀諸色不言外也諸色之觀有色之觀皆依主釋又若約已離染名外五根是內亦得名外若約未離染名內五塵是外亦得名內瑜伽第十五恐濫唯緣外五塵內五根所以緣色不分內外也言二內無色等者問何故第二解脫偏安內字答緣第一解脫之中初修之人唯離欲界染未離色界染若安內字恐是未離染故名內將謂初修之人兼未離欲界染所以不安內字也第二解脫不簡初修久修之人兼離色界染簡異於前故安內字問何名無色想答言內無色想者有三因緣一離却欲色二界染名無色想二得無色定名無色想三不作光明名無色想此第二解脫先依空處定已離色界染此依離染立以外名將此光明色作少多想此是第二解脫行相此中雖依空處定離色界染然觀外色作少多想時即便却依色界定重將色界離染色作少多想觀思惟勝以彼無色定不能觀色作少多想以彼內心緣色之想與空處定相違已被對治已訖故瑜伽云無色界定不現在前問此上二種何名解脫答初解脫依色界定離欲界染名解脫第二解脫得無色界定離却欲界色界染名第二解脫也上解內無色想訖下解觀外諸色問何名觀外色答三義解內外色一者五根名內色二者有情名內非情名外也三者已離染色名外色未離染色名內今此解脫觀已離染色作小多想名觀外色言三淨解脫等者瑜伽云已得捨念圓滿清白以此為依修習清淨勝行圓滿名得解脫意說得第四定離尋伺喜樂三地障故故名已得捨念圓滿清白淨又一切動亂已寂靜故離淨不淨變化障故名為解脫此亦無色而觀外色作淨不淨等諸相由前已說內無色等故略不論二總得名淨解脫就勝而說故第三獨名淨解脫離染名淨也淨有三義一由先離染故淨二者所依定離三灾八患故名淨三者作淨光鮮行相轉不作不淨相名淨也言身作證等者簡要云二說一從喻為名五根之中身根取境最親名身也第六意識得此解脫時親得於理由如身根親得於境二云當體得名身即意定心親得故名身也第三與第八解脫各在定邊故第三是四根本定邊第八是九次第定邊聖智親證故名作證此第三解脫第六意識親成就得名身作證問前二解脫亦是親得何不名身作證答前二是假想思惟未名是實至此第三解脫實得真實成就故名身作證言具足者唯第三解脫菩薩第八解脫獨得身作證具足之名問第八滅定解脫當得之時意識已無何名親得答若約圓滿位說則無意識不名親得也今約有心之時已成就得無心位時方顯亦名身證問何名具足耶答第三解脫是四根本定之滿位後必帶前前皆成就故至第四定名圓滿第八識盡定是九次第定之滿位故名圓滿圓滿者具足義也問何名住答簡要云此解脫言住者引諸功德住在身中故名之為住或此解脫是賢聖栖止之處名住聖人多作此二解脫故獨名住前二解脫定心暗劣緣境疏遠但得名觀官音此第三解脫獨名住也又前二解脫是加行因第三解脫是果滿故言空無邊處者其欲色二界相狀易知無色界定行相難了獨立處名也謂色對治所緣境界十方諸相不可分別名空無邊處者謂彼地中定等諸法而為所依名之為處此解處者約能修行人所依虗空所依之處意說彼地一聚心心所是修行所依兼而境與所依若得彼地心空境方現名為處此由先得空無邊處定已離當地染訖今重觀前境更作解脫也餘四皆爾言識無邊處者亦是先得當地定離當地染重觀空處能緣之識空既無邊識亦無邊也處即能緣心故言無所有處解脫者小乘二說一者觀此位中我我所無名無所有二者總不觀境名無所有不同下地觀空不同下地觀識為境此位之中寂靜而住名無所有大乘不然只觀識外無為境也無有一法是識外有者問莫是唯識觀答不是也唯識觀觀萬法從識而生唯識觀也此無所有唯識外無一往者似觀識據實不觀也但觀識外無為行相也言非想非非想處等者第一非字非由無也此定之中無彼下地粗想謂超至無所有處想名非想第二非字非由不也第三非字非由無也唯有當地能緣內心極微細心心所二十二法即不無也名非想非想即心也言想受滅等者想受二法是障資助心強諸心所中獨名心行厭患勞慮暫爾止息但離受名想受滅解脫問滅盡定中六七二識既不行如何名身作證答據實有心位時已得訖要假無心位方顯問何名住答有云彼神通無諍願功德住在彼定中名住亦是賢聖所遊履栖止之處名住問前言聖之親取名身作證此第八解脫心想不行云何自證答通色身故言俱舍第二十九內等者疏闕想字准俱舍云內有色相也小乘唯觀未離染色問何名內有色答攝云內有色者內謂內身有根塵色故名內有色無始時來保愛內身故不得解脫二者妻子男子亦名內未作觀時貪愛向外妻子如於內身故名為內此解內字內心有彼貪色之想名為有色故名內有也問何名觀外色答言觀外色者無始時來貪愛內身內身向上起貪染不得解脫若教化便觀自身作不淨則難事須從易向難從外向內觀也此有二義一者身外故名外色情與非情色皆作不淨觀二者只此內身亦名為外作觀行人觀心純熟觀於內身如同外境亦名外也今且是身外名外世界情與非情皆作不淨想或作五停心觀觀青淤想蟲蛆想爛壞想制伏向貪心也言內未伏除見等者引雜集釋也問雜集論是大乘俱舍是小乘如何疏主引俱舍文將大乘論解答只緣俱舍論道內有色觀外諸色與雜集論中內未伏除見者色想義同所以將雜集解俱舍也內謂內身見諸能見者假者假者內身中有貪色之想名見者色想言觀外諸色以為不淨者小乘意內有貪色心名為有色謂除此貪而觀外色以為不淨外有二種一外五塵色為外二觀心成已後觀己身亦非己有四大假合終歸大地何須貪著妄識為內如是色等者名之為外問如何內身有色貪不淨觀內身觀外境作不淨除內貪心耶答二乘之人觀心微劣不能更觀內身作不淨事須從易向難從外內觀則易也或從末向本無始時來由外觀引內心起貪內心起時皆由外境由斯觀外息自內法問如何是小乘第一解脫成就答初作觀時觀一個死尸從頭至足膖脹爛壞遂於此境不復生貪次觀五個十個人乃至遍觀一州一國亦不生貪又却從廣至略一死尸之上亦不生貪漸漸移觀心向內來觀自家身亦作不淨是名小乘人第一解脫成就又說唯觀他人外塵作不淨不觀內身者非也言今則不然者問前來言內未伏除見者色想雜集同俱舍大乘問何故此中言今則不然大乘義中疏主却斥雜集答內未伏除見者色想小分雖同於中多義不同故言今則不然一大乘作光明想小乘作不淨觀二大乘除變化障小乘除色貪三大乘觀已離染色小乘觀未離染色故云不然四疏主解今則不然者於大乘解脫中將對法同瑜伽不同俱舍故云不然五不唯空不同俱舍兼不同雜集上來解今則不然一句是疏主自解問大乘既已離障何用更作答欲淨其心令障轉遠故曰不然言准對法文初修業等者即第一解脫初修之人問對法論並不言初修久修案論文云於內未伏見者色想或安立見者色想此是論文標也下論釋云謂於內身未依無色定伏除見者色想或見者色想安立現前論無明文初修久修之字疏主憑何而說答文雖不明理通二釋疏主體論意論文之中置或字若是一義解何置或字耶故知此兩意所以分初修久修也緣論文之中有內身二字抄家於此先解內身內身者云有三解一云論意身也意識名內二者取五根五塵名內身不離身故名內身也三者取欲色二界顯色情與非情名之為內身未依無色定伏除却色想住彼色想之內名內身上抄解次疏解准對法之初修業者此是疏主安置言身在欲界等者論文也且初修解脫之人身在欲界簡不是上二界也言已離欲界欲者此舉定所觀境不說同時能觀定心若具足應言已依色界定已離欲界欲合如此文也初修之人事須依初禪未至定折伏除斷却欲界九品煩惱名離欲界故只此已離却貪欲名已離欲界欲糅抄云即是約凡夫二乘并菩薩身在欲界者簡不在上界者此一類人重修解脫之時身在欲界問既依初禪未至定離却欲界所有色境總名離染莫便是解脫答色雖離染未名解脫事須依初禪根本定重觀欲界已離染色想作光明想光明想成就名解脫成就也上解身在等二句論反言未依無色等者問更何名初修答疏言未依無色等一行半重簡初修之人疏主分疏初修之人云未依無色定伏除見者色想此色想不是貪色之想是煩惱染法今此簡言色想色想是緣色之行解也如今初修之人有此色想行解未依無色定伏除也問何名見何名者答一見謂能見也者謂假者也言色想者緣色之行解也故言見者色想問既不是貪色之想疏中何故言伏除耶答以無色定現在時色想行解已無今對彼定起時色想行解已無所以說名伏除其實色與無色不相見也言未離色界欲者問若爾此一句疏寧言未離色界欲耶既言色界欲明知是貪色之想答此一句疏意簡初修之人未得無色定既未得無色定表知未離得色界欲第一解脫初修之人且依色界伏除却欲界貪染訖所有欲界根塵等色皆是離染色也故但是簡未得無色之言非是實有色貪也得是緣色行解所以疏言未離色界欲故言若久習業已等者若具足應言已依無色定已離色界欲言色界欲者亦是色想行解也不是貪欲也問如何離得色界欲答事須先依當地定先伏斷却色界煩惱染法此色界色便是離染色雖然離染緣色之時於色上尚自作色想行解只此色想行解若著不名解脫亦須對治却所以於無色界空處近分定中對治色想行解也問何不便名見者無色想還言見者色想答其實空處定實能對治色想色想已無也只緣正在空處近分定時唯觀於不能觀色由有二義却要安立觀一謂令障轉遠二令觀增明所以却依色界定將前離染色安立現前思惟觀察此但作色想安立猶未作光明想上解安立現前了問欲色二界皆是離染未審重觀之時為復觀欲界色為復觀色界色答有二說一准對法將欲色界已離染色若根苦境重觀作光明二云准瑜伽論文而觀欲界一切所有內外諸色作光明想也第二為正問何以知答久修解脫人不觀欲界作光明想事須依欲界色也言而觀欲界一切等者若初修者依初二禪若久習者依四禪根本定總想觀欲界一切內外色作光明想下分內外故問瑜伽云觀於一切已離染色作光明想不道重觀色界者應可第一解脫人莫空得欲界離色不得色界離染色耶答第一瑜伽唯言欲界者約初業說故二者從寬為名若說欲界初修久修人總收著若說色界唯久修者得初修不得三者緣色界微細易可調練一遍觀則得更不要重觀也欲界色障定強故頑硬事須重觀故也問何不依近分觀答近分觀無通果故問何不作男女相唯作法想答為欲變大地為金銀等若不作法想作男女相即不自在不能變大地等若想作法想須變即變即得自在故須作諸相謂此久修人欲色二界貪並斷盡為欲發起神通石壁交過令障轉遠更假安立此已離之色觀作光明想光明想者瑜伽十二云何光明想謂如有一人即是修觀行人於暗室中起是對治於諸光明殷勤意善取其相極善思惟如於下方上方亦爾如是一切治暗相故建立此相復於定中數數取光明相謂或燈明或火光明或日輪明或月輪明如是從小至多如是觀察言由前三解脫等者此中光明引八勝處十遍處來次別敘勝處遍處之義後歸文銷釋問初解脫境論言諸色何故今言攝小多耶答勝處別作小多等觀今總攝彼以為光明故不違論言觀諸色問何故此中要引八勝處十遍等又復與彼解脫所緣同異耶答互相因故故雜集云依解脫故造修由勝處故起方便由遍處故審成滿又云若於彼成滿即於解脫究竟等由此故須引發勝處功德問雖說相因設二境別有何過失答如世第一法為引見道作無相觀觀真如等親疏雖異所緣須同由解脫故勝處等生後處遍處解脫成滿互相因起亦復如是此明緣境分齊簡異小乘八勝處十遍既緣於色作小多等前三既能引生明知俱緣於色此解脫所緣即攝八勝處十遍處等色也問既云由前三解脫引勝處等者何故不向第三解脫後說乃於初解脫中明耶答據實合爾今安此者略有二義一云謂簡小乘唯於貪色之中作不淨觀今大乘中久修業人謂除變化障故即攝八勝處義中小多等作解脫中光明想若言八勝處即將解脫中光明作八勝處中小多想互相涉入故於此引二云由初解脫即生八勝處中初二勝處故於此中說不在復論也若言解脫即是離要若言勝處即引勝德問此是初解脫何言前三解脫答據八勝處是前三中分出由此初明故總栖也問後二遍處不屬前三如何此三兼引遍處答三前引得八勝處全十遍處引前八遍處從多分說故問何等解脫引八勝處答初解脫引初二勝處第二解脫引第三第四勝處第三解脫引後四勝處以初二言有色次二言無色後四內無色觀外色青黃赤白問如何初解脫引得初二勝處答謂初勝處內有色想觀外色小若好若惡若劣若勝於彼諸色勝知勝見後如實想瑜伽云小色者謂諸有情資具等也多者謂諸宮殿房舍等色好色者謂美妙顯色一向淨妙故與此相違名為惡色劣者謂聲香味觸不可意色與此相違當勝色由奢摩他道定名為勝知由毗鉢舍那道慧也名為勝見於勝未勝二種之中無增上慢生制伏想名如實想第二勝處內有色想觀外色多若好若惡若劣若勝於彼諸色勝知勝見得如實想由此二處俱有故從第一解脫之所出也次二勝處從第二解脫出賀云初二勝處既是第一解脫引出何故第一觀內外色作光明想初二皆言觀外色小多不同答解脫仍劣內外俱緣由修勝處以漸勝故唯但觀於外色也言即觀彼勝處等者意言勝處既是解脫引生令還觀彼勝處境與作小多也問言前觀內外諸色與作光明想今勝處作小多等想何名同觀答疏言即觀彼等攝小多等色作光明想觀之故不相違如攝四諦作三性緣生等觀不妨三乘同觀一境今者亦同次別勝處勝處者問何名八勝處答於此八勝處得解脫故名為勝處亦名勝伏所緣未得解脫已前觀心未得自在境強識恆被境牽沈論六道觀心今熟識強劣一切境界隨心暫能伏前境故名勝伏所緣又大論五義名勝處一形奪卑下勝如端正醜人等二制伏羸劣勝如有力人打餘劣者三能隱蔽他勝如日出時隱蔽星月燈光悉令不現等四猒患所緣勝如猒下欣上所欣得法即名為勝五回轉勝如人王等要教活貧富隨意自在故今此即當第三能隱蔽第五回轉二勝義也勝前解脫是隱蔽勝觀為多小是回轉勝心於境處所有八名八勝處於彼八所自在回轉故名為勝即勝處依主解或處謂能緣心彼小多等境是此處心之所緣故能緣即處持業釋伏除擁塞等障所知障收後勝於前名為勝處勝處不同有八一內有色觀外色小二內有色觀外色多三內無色觀外色小四內無色觀外色多五內無色觀外色青六內無色觀外色黃七內無色觀外色赤八內無色觀外色白此觀欲界色作小多青黃赤白等小即有情及資具等色多即山河大地等色如是觀彼山河小多色時復有七義且如初勝處觀外色小一若好謂美妙顯色一向淨妙故二與此相違名為惡色三若劣謂不可意聲香味觸五塵等四若勝謂可意聲香味觸等五勝智奢摩他定六見勝由毗鉢舍那道七得如實智於勝未勝二種之中離增上慢生制伏想若心未勝境而言勝者即闕此義此之七義於後七勝處轉及十遍處皆亦如是等五勝處觀青黃赤白大論云謂青青顯青光此中初青是總句餘是別故青顯者俱生青如青華等青現者即和合青謂青衣等青光者即彼二種之上所有鮮淨之光也謂解青衣云如婆羅痆斯深染青等十遍處者亦言十一切處修此觀時一一皆作遍一切處相故謂令觀於所緣變化自在故廣大遍滿一切切處故問何故遍處建立地水火等耶答由此遍處觀所依四大及能依色皆遍漏故若不建立地水火等處遍即離所依四大亦不能觀青黃赤白所造色為遍滿相是故觀所依能依皆悉遍滿故建立地水等即是一青一切處觀二黃一切處觀三赤一切處觀四白一切處觀五地一切處觀六水一切處觀七火一切處觀八風一切處觀九空一切處觀十識一切觀若不建立地水等者即不能觀青黃等所造色為遍滿相所依無故能依正足有前但觀能依此遍觀故此中亦觀假地等相問觀此地等有何勝用答謂欲履地如水入水如地身出水火等聖者動大千界由觀於風或現劫燒故須觀火若欲琉璃為地黃金為繩甄叔迦寶以為其臺白銀為葉須作青黃赤白等觀若欲破煩惱及一切若色若心從識處出入第四禪引發無諍願智無礙解等諸功德故故作識觀若欲引發往還無礙石壁交過故作空觀問何不觀香味及五根耶答瑜伽七十云由此二塵共自他身遍於內外遍於有色界常無間斷五根唯屬自身若爾前令觀內外即化五根不變化相何須觀也答謂變依處故須緣也香味五塵不遍一切聲有間斷是故不說空識二處何以立之答所緣遍滿不過空故能緣遍滿不過識故此二法立為遍處問但觀勝處即能變得金銀等何須更觀遍處耶答聲聞勝處但能變得一房之地或小分金銀若作遍處即能普故唯此遍處唯佛及菩薩之所能作聲聞但有勝處更問如維摩經云以足按地三變土田八方嚴淨問何須作此三種觀答大論云如世瓦師欲作瓶等先且和泥由如解脫方乃造垤火中燒已由如八勝處而起方便後成瓶已隨意受用如十遍處轉變自在故論云由解脫故是造修由八勝處故起方便由十遍處審成滿若准此八聲聞亦修遍處雖復不能普遍一切然是彼類也若不如是即無作用也若爾何故經中但言三明六通具八解脫不言八勝處十遍處答舉初攝後故能遍者心所遍者處依主釋或能遍即處即此觀心是境依處如無色名處即持業釋問此十遍依何心何定答事境後智為性緣真如正智為性若前八遍處依第四禪定若後二遍處依空識二地也言由除變化等者糅云二說一若初修者依初二禪根本定若久修者依四禪根本定總觀欲界一切內外色作光明想障者變短為長變晝為夜此名為變由身內有所知障令於變化時不得自在變化之障依主釋所知障二云未作觀時若怨嫌心見一切色境俱為不淨若起貪愛心見一切色俱為淨故由內心之身有憎愛故見增有好有惡即是變化變化即障持業釋此通煩惱所知二障前解為正若觀心等變化前境若不作光明想即於變化中而有障礙變境隨心轉故心作光明想解境亦隨心作光明想問何故作光明想中而除變化障耶答對法第三云謂唯所礙色故正能對治彼為俱礙障礙故所以觀之從淺至深也言不除貪欲等者一則不同小乘除貪故故不作不淨想二則觀已離染色故不作不淨想又觀行者若欲觀內外色作光明想時先須心中却安立色相令現前已然後方觀內外色等作光明想問何不觀上界色耶答三釋一為身在欲界二為轉境隨心濟有情故三欲界法障定強故事須重觀令障轉遠障即是下劣受無堪任性硬強心等能障於定不能變地水等今觀色時其障自遣即能變化若不觀色此障能障變化事名變化障也言瑜伽論云未得等者此是瑜伽第一節文彼說未離色界染者據初業人說對法言四無色定已離色界染者約久修人說由此二論亦不相違也言觀外諸色等者瑜伽第十二節文問前來列名處初解脫不言其內外此間何故初解脫即言觀外諸色答第一解之人內外根塵總緣若安外字恐濫唯緣外五塵不緣內五根所以第十二文不分內外也瑜伽第十五文有外字此約已離染名外若約已離染名外者五根是內亦得名外若未離染名內五塵是外亦得名內言唯依初業者第一解脫初修之人未作無色定離色界染久修之人已得無色定離色界染瑜伽第十二云初解脫人未得無色定未離色界染者偏約初修之人說也第一論解脫言第二解脫等者簡要云小乘第一解脫唯緣外境作不淨不緣內身此第二解脫唯緣內身作不淨想此解不然其實第一解脫小乘人觀外境作不淨伏除內貪心漸漸兼自身亦作不淨觀至第二解脫內身亦得離染也言內已伏除等者彼初解脫內染未除言未者有色相故故未言以初解脫人小乘已有身相未遣故第二解脫於自內身已得離染今觀身無唯有四大故言內無無內身故正理論云謂觀行者從此後時漸後除遣緣內之相謂以勝解想自命終舉載遺尸至棄尸所乃至身無唯有四大名內無色觀外諸色解脫俱舍云得無色定內已伏除見者色想意言重將向外離染色兼自身安布施設作不淨想制伏向外貪心不起是名小乘第二解脫行相成就也見謂能見色想是貪色之想將已離染色安布施設作不淨想當情意從令障轉遠令觀增明所以唯觀外境作不淨青淤爛壞等想名內無色想攝問內染已遣外染亦無何要更觀耶答俱舍云雖已除貪謂令觀心堅固故觀外不淨青淤等色令貪不起名為解脫俱舍有二說一無色想者無貪色之想二云無色想者色想總無名無色想觀此身終於尸上青淤爛壞蠅蛆及骨已來總消化盡一總亦不見同於虗空總名內無色想唯有能緣心故辨云兩解中後解是順正理中衆賢論師義也若准疏主意取前義但無貪色之想故名內無色想觀外諸色也小乘解脫了言大乘不然者謨云小乘除色貪大乘除變化障一不然二小乘作不淨想大乘作光明想二不然三小乘解脫依初禪二禪起大乘解脫通依四禪起三不然言准對法云久習等者引論文也准論云於內已伏見者色想或現安立見者無色想此論文疏主解分出初修久修疏本多分不同緣對法論中久修於先初修在後瑜伽論中初修在前久修在後緣兩本論文不同所以疏文亦不同也有疏本初修先久修後有疏本久修於先初修在後雖然兩論一疏各自不同於中意則一種也瑜伽論云初修在先久修在後則約觀行從淺至深次第說對法云久修於先初修在後則約勝劣次第說緣疏本多本初說久修後說初修一往有緣下不依次第人難會意只如此也此第二解脫人不簡初修久修之人皆得無色定也緣未得無色定時緣色之時未能離色想行解後得無色定對治却色想行解以彼空處近分定緣空為境緣虗空將色想行解心總無作觀行人事須却依色界定再時色界定安立現前建立分齊相當情安立時但作無色想問若作無色想如何言安立答雖然安立緣色之時不作色想行解便是第二解脫人觀行成就不是總不緣色但是依無色相也言初習業等者會瑜伽論初修在前久修在後者初修之人先依無色定對治色想訖却依色界定重將離染色安立作無色想事須加功用行安立始成就若久修之人作無色想時不假加功用行安立現前任運便能作無色想故此疏中初修者安立久修之人不說安立也如久學書人要書即出不假想像更不假安立無色想也若初修者如初學書人事須一一安立文字書點方得加功用行安立方得所以久修安立不安立加行有異不相違也二會疏中同對法論久修於先初修在後者今此第二解脫依對法論中次第今此第二解脫久修之人只是第一解脫之中久修者彼處早已安摸施設對治色想行解了此第二解脫中更不說安立施設任運成就第二解脫中初修者以初得故要須安立也問何名無色想答有二意一重將色界無貪染色安立現前喚作無貪染色作無色想不是總無色想二者色想行解總無名無色想通此二說後義為勝問第二解脫與第一解脫初修久修何別答第一解脫初修人唯得色界定離欲界染第二解脫初修人兼得無色定離色界想行解故第一第二解脫初修人各別問第一第二解脫久修人何別答安立不安立別第一解脫久修之人重觀離染色作色想行解之時事須安立第二解脫久修之人重觀離染色作無色想行解之時不修安立任運作無色想也唯第一解脫久修與第二解脫初修同也同是安立故問如何初解脫之人喚重安立境作色想耶第二解脫之人喚安立境作無色想耶答第一解脫重觀離染色時心未勝緣光明色之時事須作色想行解未能作無色想故喚重安境作色想也第二解脫觀心漸勝重觀顯色之時當情不作色想行解任運作無色想也故疏言見者無色想與第一解脫別故喚重安立境作無色想問既將無色想安立現前為復將色界色為復將欲色界安立耶答通兩說一攝云同對法寬狹總取重將離染色安立現前之時通緣欲色二界色也二者疏云同瑜伽論從寬為名唯觀欲色色第一解脫久修唯觀欲界色從寬為名問名從寬答若言觀欲界色昧初修久修總得故名寬也若唯久修者得初修者不得故名狹又欲界色粗障定強故事須重觀安立也色界細故不重觀也上明行少相下解多言而觀外色而小多等想者准瑜伽唯觀欲界色正是解第二解脫行相也沼法師二解欲界色唯五塵名外二者已離染名外問疏云唯觀外色兩義中取何義答兩義總取全五塵名外五塵名外之中兼取離染名外之中一分離染之五塵也若空取五塵名外不取離染者凡夫不作觀行望一分五塵亦名外也今取雜染義表是修行人五塵也問何故第一解脫人通緣內外第二解脫唯緣外五塵耶答第一解脫人觀心劣但總相觀不分內外也第二解脫觀心漸勝故唯觀外塵解觀色一句也小多者簡要云小謂有情色及資具等也多謂非情及山河大地於此總體上說小多非也准疏意作觀行人心中自作小多解也但觀外色若小若多若好若惡當不起貪愛即名解脫問何須作此小多等耶答謂引毛吞巨海芥納須彌等問既言無色何名小多等答不執於色為無色想非不觀色故名小多若實取者何能變多為小等此即心中作小多解也言不同於初等者有二不同也一初解脫作光明此第二解脫唯作小多二初解脫通內外第二解脫唯緣外色問如何初解脫人不作小多想答疏言未自在故言此唯觀彼已等者解小多及境取五塵名外已離染故立以外名取離染之五塵名外簡不取未離染五塵意言但觀欲界已離染色作小多想不觀色界已離染色為小多想問如何唯觀欲界為小多不觀色界色為小多答色界色細一遍觀為離染訖更不再起不要重觀作小多想其欲界色粗難伏恐伏已再起所以重觀小多想也言已離染故立以者第二解脫唯緣外也言觀心漸勝等者問第二解脫總不緣內唯緣於外莫劣於第一解脫答疏言觀心漸勝等稍略有二一唯緣外色故二不作光明想作小多想故名稍略言故瑜伽云等者問對法論文不分明說第二解脫人作小多行相疏主憑何安立作小多想不作光明想答疏言故瑜伽云等者意道第二解脫不思惟初解脫中行相作光明路云不思惟彼光明想是第二解脫行相言問作何行想答疏言但於外色而作勝解此第二解脫唯於外色作小多想名但也問第二解脫初修久修俱是無色想如何能作小多觀耶答據實第二解脫之人總作無色總作小多觀時自是別依色界根本定作也糅亦云初修人依初二定觀欲界色作小多若久修者依四根本定觀欲界色作小多等言若於是處已等者或離欲界欲或離色界欲此二是色皆離貪欲欲者煩惱之總名也此離欲色名之為外此文重成前已離欲故立以外名內身離染亦名外上來若於是處等三句疏正解小多離染義故唯觀彼已等三句疏正解修解脫行相也言又由初解脫等者會第一解脫名初問何故第一解脫列名中云有色觀諸色解脫不說言內外耶答疏云又由初解脫等若言外將謂唯緣外五塵其內有色不言內者將謂唯緣內五根謂簡濫故彼通緣內外作光明想故不言內外也但言有色觀諸色也言通緣內外根等者此解諸色言便是解有色不言內外之所以也通將根塵皆名為已離染色觀為光明想但依有色通內多義而言有色也對彼初名訖言今此第二內有色有根等者會第二解脫名字重顯觀門有異問此第二解脫列名中言內無色今顯行相中何故却言內有色答沼云初列名中言無色者論其觀無彼色相行解故名無色今顯行相中却言內有色者有彼離染內五根色意道雖有內五根色不觀作小多唯觀向外離染之五塵作小多想又就五塵中取一分離染之五塵簡凡夫不作修行人五塵也問內外諸色總明離染何故唯觀外塵作小多答已得自在觀心漸勝故稍略觀問外塵自已名外何故前未離染立以外名答境外名局離染名外則寬從寬為名故無有失言瑜伽又云無色界等者問第二解脫列名中既言內無色何名無內色答有二義一者得無色定名為無色二者不作光明想名為無色若爾如何瑜伽論云無色定不現在前者答彼論云初作觀行人事須先依無色定若得無色定之時已伏除色想行解脫若正作觀行時作小多想時事須却依色界定重將前離染色安立現在作無色想瑜伽論云約正作觀行之時不在無色定中以彼無色定不能觀色故言不現在前此約第二解脫人初修久修合說也言此說觀外色不作等者意言此說觀外色時不須無色定以無色界心不觀外色故非第二解脫不得無色定名不現前也言或已離色界等者此意偏約第二解脫久修之人說也以彼久修之人身中雖有無色定而不依訖不假用無色定伏除色想行解任運觀色之時便能作無色想不要一一入無色定但依色界定立無色相而觀已久修故即是不作光明之色想名不現前問云何依色界定現無色想答作此觀時依第四定故故章云觀於外色作勝解時唯依色定不依無色無色不能觀外色故言無色想者不執貪色名為無色非色體無不是無色但謂色想不當情名無色想攝云雖得無色定不依作觀但以色定立無色想而現在前以為觀也故云無色想也言上二解脫初作等者初作光明名寬後小多為狹通觀內外根塵名寬唯緣外色塵是狹言顯揚二十說此二等者展轉相望義門辨異因辨除障便論通異因論通果通果故論依地依地中有根本近分等故名展轉攝釋二解一除變化障者變短為長變晝為夜此名變化由身內有所知障今於變化不得自在變化之障依主釋所知障也二云未作觀行若是怨嫌心見一切色俱為不淨若是貪愛心見一切色俱為其淨由內心之中有愛憎故見境有好有惡此即是變化變化即障持業釋此通煩惱所知障前解為正未修解脫變化不得今修解脫變化得自在故故此二解脫除變化障疏中但說除變化障其顯揚說八解脫除六個障一除變化障清淨由前二解脫論云修初二解脫所以作光明小多等想變化得自在故第二謂除現法樂住障清淨論云修第三解脫淨與不淨皆清淨顯現故此第三解脫要依第四禪起功德最勝一切聖人皆栖止故第三除往還障修空無邊處解脫有障礙往來不得自在修此解脫石壁交過來往無礙第四除無諍願智諸功德障修識無邊處解脫一切功德依識有故果中引生根力覺道等法第五除諸漏及有障清淨所以修第六第七解脫初漏是煩惱後障是業由煩惱業繫縛衆生修無所有處解脫及非想處解脫皆得自在故第六謂除最勝清淨障所以依非總非非想修滅盡定解脫言變化既通等者伏除四禪定有通果故若修習時謂除障八定通修若起神通事須依四禪定起也如十四變化心也能化之心唯第四禪有何者十四心一初禪定心初禪化自地相初禪定心欲界化下地相二禪定心二禪化自地相二初禪定心初禪化二禪定心欲界化下地相三禪定心三禪化自地相三禪定心二禪化三禪定心初禪化三禪定心欲界化名下地相四禪定心四禪化名自地相四禪定心三禪化四禪定心二禪化四禪定心初禪化四禪定心欲界化名下地相言初二解脫通依四靜慮等者初二解脫通初修久修久修者通四禪皆修得初修者唯依二靜慮金云由初二靜慮有喜樂受修行之人樂彼適悅故問何不依第三禪修答純樂受恐妨修解脫故不依之有云此解脫非但是初修之人事須將欲界離染色安摸現前事須近所觀境意徒將欲界色作光明小多近所緣故則易也意言謂欲界及初禪自地有眼識并顯色貪以初禪伏欲界以二禪伏初禪故唯依初二也若依三禪四禪去境隔遠不依之立解脫要善性小乘是威儀無犯收大乘異熟生無記攝也言但在根本等者四禪皆有近分近分定事須欣趣根本定一無容豫二無通果故不依之根本定中一有容豫修故二復有通果禪定為因引生於慧慧上神通作用名果故言通果問何名無通果答疏云初二近分中外道異生以有漏慧厭下欣上名無間道身證那含以無漏慧創離下染名無間道此二凡聖類近分無間欣趣根本無暇發通變所作事名無通果問三性云何通力所變化事性唯無記通即依定所發之慧唯是善性答二乘外道不為利生遊戲作者亦無記也言不同俱舍初二等者簡異小乘也初二靜慮能除欲界顯色貪故修初二解脫故作不淨觀辨云由初禪定治欲界貪第二禪定治初禪定貪問何名顯色答簡要云有眼識處即有顯色顯色者謂青黃赤白攝問云除顯色貪為復在初禪二禪根本以復在近分能除此耶答有二說一云通近分根本皆修二云唯根本俱舍不言通近分前義為正小乘但謂除顯色貪豈近分法不除障耶今大乘除變化障豈彼近分障不除耶問何以欲界及初禪有顯色貪即說初二能治於彼二禪已上亦有顯色何不言也答欲界及初種有眼識故緣於顯色而得生貪眼耳身三二界二地故二禪已上雖有顯色不緣生貪故不說彼依第三定問三禪借下眼識緣於顯色亦得生貪何故不立答要伏下地染方得上定雖借下識貪不得生不同自地起識生貪故不可例俱舍云第二定中無顯色貪故問俱舍云八中前三唯以欲界色處為境云何緣欲境除初定又色界色淨欲界色不淨復何觀不淨能除淨色貪答非正能斷能為方便令遠離故問不假觀色界色答膖脹等相色界無故但觀欲色作不淨令遠離問何故當地不能對治色貪之心答以心劣上地心勝能治二地色不淨觀故言第三解脫俱舍等者前二解脫中背淨向穢作不淨觀伏欲界顯色貪今第三解脫背穢向淨不作不淨觀但轉作不淨觀但轉作清淨想作淨光鮮行相轉故即依第四定觀女人身作淨解名清淨相轉言淨光鮮等者即重觀女人可喜端正名淨光鮮行相轉故試貪起不起苦起者又從二解脫觀若觀貪不起名第三解脫成就也意言初解脫唯是外色第二解脫方離內色由未增勝今第三解脫內外既無展轉明相故言清淨問何須作此淨光明想轉答金云二義一於淨色中生淨解二已得捨念為依此不同前故名清淨作此觀者省二因緣一令心心所欣二謂審成滿俱舍云前不淨觀令心沈蹙今修淨觀䇿發令欣為審自心修清淨觀為成不成煩惱不起彼方便成故若煩惱起從初二解脫更觀若觀不起名第三解脫成就言唯第四等者簡要云此第三解脫大小乘俱許依第四禪離八灾患初禪出憂受二禪出苦受三禪離喜受猶樂受及出入息而非增勝故不同第四離八灾患名第三解脫也言餘地雖等者問色界既有四禪如何不依下三禪修淨解脫乃於第四定修也答疏云餘地等攝云如欲界等中雖有清淨為餘貪等所陵雜故初二定中喜受雜故第三定中樂所迷故云糅此觀初作亦依餘之三禪皆未能離八灾患故不立也非增上故無貪相似亦名相似也初定有尋伺入出息及喜名相似二定有喜樂出入息亦名相似三禪有樂及出入息亦名相似問何名八灾患答初定內有尋伺外有火灾壞二定有喜樂動漏外有水灾三定內有出入息外有風灾壞問何不依三定立解脫答不對除三定已下貪故所以但依第四定立淨解脫唯第四禪具二緣故名增上一離八灾患二心澄淨故名真解脫也上小宗言今者大乘等者謂如者隨取一修行觀行人凡夫二乘無學身證那含地上菩薩皆名有一人也謂得第四禪定唯與捨受相應故故離八灾患名為淨三義名淨超苦樂故動亂靜故善磨瑩故剎那離過名清相續離過名白言以此為依者以此捨念定為所依修習解脫名清淨聖行言於內淨不淨者是觀皮是淨膿血肉等為不淨次觀骨為淨肉血為不淨若外觀日月星光等為淨砂石等為不淨言相入想等者於一身中面皮即淨大小便等而為不淨糅云即觀近展轉相入即觀小皮中三十六物三十六物不離皮淨相名相入由因中作相入想至後果位中能以須彌納芥子芥子納須彌也言一味想者面皮及大小便等總一切色相合一處不見好惡名為一味此時名為究竟成就謂對於不淨而作淨想方是此觀也言謂待諸淨色等牒前重解也謂諸凡夫人見淨定執為淨不淨定執為非淨於境拘礙而不自在今此行人作相待想以相形待令不定執如人世間將為淨色若形於天即為不淨如以畜生為不淨形於地獄即為其淨持淨作不淨解若無淨不淨亦無若無不淨淨體亦無故須待淨觀不淨待不淨觀淨故言非不相待也待者對義也言若唯見一類等者若唯見一類淨或見一類不淨無二覺即不名相待要有淨覺或有不淨覺存此二覺然後能變方名初相問此言唯見一類二覺無故與第三一味清淨相貌何別答前言一類者謂明此相待色或總作一類淨與不淨觀此通淨穢二觀也正觀為不淨時不見更有淨相正觀淨時不見有穢相其一味唯作清淨觀不作不淨觀故二種別也因中既爾果中即能變淨為穢變穢為淨如佛欲成道時魔將將三女壞亂佛心爾時魔王白佛說偈此女甚嚴妙體若栴檀香神仙難可比進止復安祥眉如畫初月奇功甚難當爾時奉世尊堪可拂金床于時世尊堅固不動復以慈心答魔王曰此女不淨聚九孔長夜流薄皮褁腥血筋纏臰骨頭我觀如行廁汝見似仙遊愚夫若生愛被縛不知休爾時世尊說此偈已令魔三女變成癭老姿身𤷄脉縮項癭脣兼頭髮乾燋鼻中流涕形容醜陋不近人情柱杖腰曲跛行而退此中果中變淨為穢也寶塔品三變淨土即變穢為淨也言二覺無故者攝云若不相對別但觀一或淨或不淨二覺無故以境一故言又於淨中品者秀云如是兩種色於淨上即生愛染於不淨上即生憎嫌遂以觀之翻彼愛心令入不淨中翻彼憎嫌心令入淨中此即名為展轉相入想言由於被障等者智周即攝釋和上二說一不淨物中有白骨故名淨性隨入二云即前薄皮不離三十六不淨物故名不淨隨入此即為展轉相入想因中既爾果中能以芥子納於須彌等言如是展轉等者秀云於淨不淨更不別作隨入唯見一類總想為淨或合為不淨乃得成滿自在如前二相見有淨不淨此第三唯一味清淨破前淨不淨執也問與前第二相入何異答前相入想淨穢相入發明淨穢此唯據淨名為一味三相是修神通之方便也言唯第四靜慮者問此淨解脫須得捨念清淨地四禪中何禪得捨念清淨地作得解脫觀耶答疏言唯第四等此所依之地及得名字所由第四定唯與捨受相應離八灾患故名淨解脫言論說超過者問如何第四禪名捨念清淨地答疏言論說超等謂第四定離苦樂受動故名淨言一切者動即尋伺名動亂者即出入息名亂或亦動亦亂外動發語言內亂即八灾患今第四定並離已寂靜故言善磨瑩者磨瑩善磨瑩又作觀時思惟極思惟作意極作意修習極修習審慮極審慮如磨瑩法名善磨瑩也言餘地不然者問欲界凡夫作觀還有清淨初二三定何不立第三解脫耶答欲界有貪嗔癡初定有尋伺樂等二禪有喜樂三定有樂總非清淨故不立第三解脫也第四定離此諸障等故立第三清淨解脫也言此亦內外無色想者問此第三解脫亦得名內無色而觀外色作清淨想光鮮相等何不言耶答由前二解脫已說故故略不論不也言而立異稱者前二解脫以內外障為名今第三名淨解脫身作證具足住故不言內無色想觀外色等立異解也對法云此第三第八是諸聖者多所住故言俱舍說以四等者顯宗論云以四無色定善為性非無記染法非解脫故意言無記及染不是解脫行相亦非散善性羸劣故談四無色只為已得解脫故非無記及染論文順釋疏家意返成今言已解脫者顯已離無記及染也言亦非散善者即生得善名散善體性微劣今解脫是加行善也是修慧勢力強故加行善也前言染者依定起愛愛味定故名為染心此染無記亦非解脫體無記即無覆無記染即有覆無記也言近分解脫者俱舍說近分地中有九無間九解脫無間緣下境而生厭未背下故兼緣解脫道而生欣故不與解脫名不同解脫道正理更一解直正取第九解脫方名解脫餘八解脫并九無間並非解脫緣下道雜故未全解脫下地染故言所緣下故者俱舍二十八云空處近分緣下地色起色想故准此故知緣下為境不名解脫言彼背下地等者化度云背是何義答婆沙云背是辨背是解脫義初二解脫棄背色貪第三解脫棄背不淨觀心四無色處名自棄背次下地心滅盡定解脫棄背一切能終心也言多說根本者問何不取近分答謂根本地無間解脫二道皆名解脫所以取之近分非全所以不取言非全者謂近分雖即無間解脫二道唯取解脫不取無間故言非全也二云不取前八解脫唯取第九解脫名非全也小乘了言今者大乘皆已等者大乘四無色定皆已離自地欲事須得彼定已離當地欲欲者煩惱總名亦得名染重將已離染境思惟勝解問有何意答令障轉遠引生勝德定為能引慧為所引也慧及解脫功德名勝德也言謂如有一等者一一別陳謂如有一修行觀行人也此空解脫要離自地欲離空處染二依自根本空唯在根本非近分也三重觀自地境重觀自地所緣境界以無邊虗空為境便是解脫成就問何處何名答有兩說一云空處定心一聚心心所法為所依無邊虗空是能依此定心是無邊虗空所依之處也二云空無邊是境處是能緣能緣定心是緣無邊虗空之處依主釋也今此解處與生死業報處別彼以生死為處此以定心為處問所言觀空解脫空於何色答空器世間欲令石壁交過除彼還障而無礙故須空也問空解脫成就欲發神通依何地起發答要第四靜慮發以定慧均平定慧最勝勝餘地故言於彼識處者第二識無邊處解脫若修之者事須依四無色定若引生無諍願智功德事須依第四禪當地二十二心心所法為能緣下地空無邊能緣之識為所緣空既無邊能觀之識識亦無邊但觀於識處思惟勝解由前加行觀無邊之識已得離欲後重觀時是名已得離欲解脫行相言於無所有處已得等者小乘之中有二說一者觀此位我我所無名無所有二者不同下地觀識不同下地觀空此位之中總不觀境寂靜而住名無所有大乘則以當地二十二心心所法為能緣緣下地識無邊處能觀之識為所緣緣下無所有為境離識之外更無一法名無所有也安國云於識處已上境界推求之時思惟識外無小所得若色若非色皆不可得由見此境極寂靜故名無所有也又雖以無所有為境若作無所有解時事須依識上思惟勝解雖依識上作行解元來不緣識如人看文書字則識是字若幾爾字幾書幾點則不知但看字不看書點言空識二名等者化度問云何不自地境思惟勝解觀下識耶答但為此地心想微劣故緣識處起自勝解問無所有處緣下地識依識作無所有行解識無邊處緣下地緣空之識何不依識依空解行答識無邊處緣空之識體非空不得作空行相也無所有處緣識外無若不思惟不能顯無所有是識外無其識無邊處緣無邊識便為解脫緣也無所有處識以無所有為自地名也問八識中此是何識答唯識緣第八見分其第八識體是無記以微劣故唯第六識強通三性內外緣故問此識是所觀誰為能觀答還是識觀第六通三念以後念觀前兩念識故一念現行不得自觀若佛及八地菩薩一念現行亦得自觀以得自在遍緣法故言於有頂地等者非想非非想解脫也且當地立名者章敬云非想者超過無所有處想也無所有處想猶粗故故名非想也非非想者謂於無所有處已上境界推求之時唯見緣無所有處極細心心所緣心極寂靜故也前無所有處所緣是識觀識外無也小分亦無也此是有頂地唯緣無所有處心心所也不同下地有粗想故名為非想仍有極寂靜心法在故名非非想非由無也非全無故謨云第一非字非由無也此有頂地無彼無所有處粗想故名非想第二非字非由不也第三非字非由無也仍有內心極細心心所不無也故名非非想也問非想地能緣心是二十二法所緣亦是二十二法未審觀察之時為復只於下地粗想向上思惟觀察為復兼依當地能緣心二十二法中向上思惟觀察答通此兩說一云唯依所緣二十二法向上思惟觀察二云兼於當地極細二十二法向上思惟觀察能緣所緣悉皆觀察是名非想非非想處解脫行相言更不於餘者只於無所有處能緣心上思惟勝解更不透過緣空識二地來名更不於餘也言乃至遍於想者可者約境立名也無所有處一聚心心所極明了故名想可生想非想地心心所極暗昧故無力不能自生事須得無所有處為境牽生方能緣境思惟勝解即是無所有處想聚二十二心心所法是有頂能緣之想生處心託境方得生故有頂地能緣能緣之心緣心緣無所有處二十二法為所緣故故名想可生處答空識二處所以言不於餘而作勝解但以非想得名對無所有立故須觀彼以為解脫不同下地有粗想故名為非想仍有內心唯見此極寂靜心在故名非非想解脫問緣於識外更無餘法名無所有即不兼自定行二十二法唯於識處二十二法上思惟勝解今對無所有名為非想何不但於無所有處思惟勝解即兼於自答無所有處唯從識外無法立名故唯自他思惟勝解有頂於自他得稱故於二處思惟勝解言至下當知者此疏中向下更無說處章敬云此但法菀章中語也彼中具有十門初三同此四釋名字門說故言至下當知言上說離染依等者辨觀時節也上說者依無學說不約有學伏煩惱名離染縱使伏煩惱得者不是此間離染中收問爭知唯是無學斷煩惱得名離染得答疏言上說離染等並依無學所得者說非據有學有學之人未離染故問無學之人已離煩惱今修解脫伏何障耶答伏所知障又無學人於已解脫境而重生勝解故名解脫也言前七解脫等者謂無學等已離惑染名已解脫謂引勝德於離染境思惟勝解而得自在遠離定障名為解脫問爭得知不是有學人離染得答緣第七解脫是非想地當地解脫也非想地煩惱設是第三果人有漏智伏亦伏不著無漏智斷亦斷不得若也斷得即成無學既非想地煩惱現在上說無學言身證者得者亦是證第三果人伏煩惱得滅盡定不是斷煩惱得既若滅盡定是伏煩惱得返顯第七解脫亦是伏煩惱得但明滅盡定必具前七若具前七不必帶滅盡定從初定乃至有頂皆是伏非是斷滅盡定中心心所滅以身而證名為身證今言身證那含簡餘鈍根不得者此明那含得解脫不得無學而離於染有想一地必不伏斷是有學故不斷無上可欣不伏若爾有頂染在何名解脫答煩惱雖在定障小乘伏得解脫名若爾彼既煩惱未除云何能得滅定答但伏定障即得彼定以法爾即能生彼定故問何名身證答親證義親入根本智斷惑得第三果言若依唯識有二等者伏斷位次也問此二師意云何異生亦不伏有頂染應許得彼定答初師云欲界惑種二性繁雜障定強故所以須斷不同上界但伏得入二云三禪已下并欲界煩惱變異受俱煩惱種子障定強故所以偏斷第四禪已上并無色界下三地惑須伏非想一地不伏不斷得入滅定有學雖不伏有頂許得滅定今設不伏亦得解脫以心所極微劣問唯識但論滅定云何證於染不染義答要得前七解脫方證第八滅定解脫舉後明前故無有失意言那含既未離染許得滅證智前七解脫有未離染得也但是一性有覆無記不障定故伏之得滅盡定言有頂一地未能伏者謂無上可欣此還欣上猒下為伏也有頂者即三有之頂故問既爾何名解脫答彼地想細助惑非強故不要伏而得解脫及滅定但以下地無漏善慧斷彼定障而入滅定言故瑜伽第十二等者問何以得知不伏有頂染而得滅定答疏言瑜伽等瑜伽云空識二解脫有說離自地染言上之二地無說離自地染字有學無學影略說故初空識二解脫有說離自地染字是無學人離染得影取後二解脫亦是離染得也後二解脫無離自地染字顯是有學那含人未離染得影初二解脫亦是未離染得也故言影略也言唯在根本者入滅盡定必須依根本定非近分定意言此八解脫若離染通近分若思惟觀行事須在根本定也言滅盡定解脫者謂修定時於定加行猒患粗動心心所故發勝期願遮心心所令心心所漸細漸微漸微心時薰異熟識成極增上猒心種子種子功能損伏後念粗動心想暫不現行依此分位立滅定此都明有學無學入滅盡定也即大小乘同說滅盡解脫想受滅處便是解脫行相八個解脫前七有所緣第八無所緣也言而無行相棄等者約所棄想受大小乘共同名無行相由想受二資助心強故於心心所中獨名心行今者猒患勞慮暫爾息滅此時要斷障得故名解脫即滅想受之解脫依主釋上七解脫皆持業也觀諸色即解脫也問如何入滅盡定時要棄想受故入滅定答以想受心加行資助心強入滅定時事須滅却問加行有幾答有三一尋伺為語加行二出入息為身加行三想受為心加行問何時滅此三加行答第二定滅語加行由尋伺起語言故二禪無尋伺故滅語加行三禪滅身加行由出入息故身根安位故第四禪滅身加行出入息故至非想地滅心加行由有想受資助心故令心能起作用故入滅定時心便不起棄想受故言然將入時有二等者問如何是二行相答入滅定一依非想處心入二依無想界入問何人入滅定依此二心答若初業人必依非想處心入若久習業者有二一依無相界入無相界即是真如故以久修者緣無想界心即入滅定約無學說二久修者隨處即入得滅定若初修有學必依有頂遊觀無漏為加行入次第定中最居後故問若以真如心入滅定者如何唯識云用遊觀無漏智為加行入耶答遊觀無漏是不斷惑即得後智欲入定時猒離粗想動作止息想而入於定若據瑜伽論云無漏智緣真如無相界猒心滅暫時止息入滅定故據久修說故大論云入滅定時或依非想非非想處而入於定或依滅定想而入於定若入滅定時有二一緣三種境二觸三種觸言緣三種境者一緣有境不有我慢擾動心故觸不動觸二緣境境無貪瞋等故不生願求觸無所有觸三緣滅境於一切相不思惟故觸無相觸有境者謂六根心心所境境二緣境者謂六塵滅境者謂無相問此定初修各在何界答初起此定而在人中唯識云佛及弟子說力起故人中慧解極猛利故緩起通上二界論云後上二界亦得現前塢陀夷沙彌即佛在日鶖子說法能信大乘人依無色界入滅盡定其時此沙彌難鶖子云云何無色入滅盡定耶佛種種訶責此意證無色界得入滅定問八識中滅幾識耶答滅不恆行及恆行一分不恆行者謂前六識恆行一分西方釋一勝軍論師云一分者賴耶末那俱是恆行但滅末故言一分也二戒賢論師云通於人法二執二乘有學但滅人執不滅法執故言一分二乘無學滅定但滅不恆行心心所法不滅恆行一分不斷法執故直往菩薩初地已上若依人空觀入滅定者唯滅人執末那若依法空觀入滅定者人法末那二分並滅淨分末那與本識俱法執為本人執有故二斷法執人執隨滅唯斷人執法執必在故不遣彼生空智果若以如來二空觀入滅定者鏡智及平等性智在定俱轉問入滅定何意答小乘求止息想大乘求功德也二行相了言俱舍論說等者化度云俱舍前三解脫無貪性即是善十一中一數也以初二解脫於穢境不貪第三解脫於淨境不貪故此三種以無貪為性言眷屬五薀等者由前三解脫俱緣色境即是色薀於境不貪即無貪性行薀中收受想二法各攝自名心所起時必託心王故有識薀故言五薀為性言次四無色定者以四無色定唯善為性但有四薀而無色薀第八滅盡定解脫別有非色非心為體即是不相應行薀所攝言大乘之中等者即瑜伽第七十三卷中說五法者一相二名三分別四正智四如如糅云初四有為後一無為初四又二初三有漏後一無漏初三復二初二所緣後一能緣初二復二相即所詮名即能詮也又此五法名即能詮教相即所詮理分別謂三界中所有心心所等言世間出世間等者正智有二一唯出世間正智二世間出世間正智唯出世間正智者聲聞獨覺諸菩薩等通達真如名唯出世間正智世間出世間正智者聲聞獨覺諸菩薩等初以正智通達真如已由此後所得智緣安立諦猒三界過患名世間出世間正智如如者真如妙理上依論標言有漏等者秀云有漏慧名世間無漏慧出世間七十三云八解脫以何為體彼答云世間出世間正智為本緣真如故是正智攝有漏觀心是分別攝疏主解論文意取世間兩字攝五法中分別分別即是有漏世間分別心也將出世間三字攝根本後得二智皆是無漏問前七解脫既通有漏修行如何喚作正智耶答疏主取意分出有漏正智也若准論意唯取無漏正智也言唯慧為性者不簡有漏無漏根本後得皆以慧為體也言緣色非色及等者問八勝處十遍處皆是神通但除定障即能引起何要此八解脫耶答要緣色非色及真如境然後始能離諸定障引生勝德解脫為本淨定方生問何名緣色非色及真如耶答初三解脫緣色為境但作光明小多相待相入一味總是緣色次四解脫緣非色虗空識無邊無所有非想非非想及真如境言離諸定障等者法菀說八個解脫對治六障初二解脫除變化障第三解脫除最極現法樂住障第四空處解脫除往還障第五識無邊處解脫除無諍願智諸功德障第六第七解脫除諸漏即煩惱及有障即業也第八解脫除最極現法樂住障也言非餘能故者顯慧功能意道前來引生功德離定障皆是慧也故言非餘也尅實體言若相應體等者即心王心所相應王所共成四薀初七解脫以四薀為性若眷屬體以五薀為性言故對法等者問無色界如何亦是五薀意言前三解脫緣色
