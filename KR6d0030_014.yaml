body:
  text: 鏡水沙門栖復集言世間文字等者問何名世間文字章句答若望如來無漏教聲則不合言世間文字章句然世間有二一有漏名世間二有言說故名世間今天親菩薩言世間文字即如來梵音聲相中說若離世間法即根本智證若隨世間法則是言說但安著名句文字即世間也甚深意者旨也即所詮權實道理也二乘不測名甚深也言教是世間戲論等者疏主解也戲論有二一有分別名戲論二有言說名戲論凡是戲論皆名世間有說此是法世間即教法也非俗世間也言意者意況等者過現佛說大乘法文字章句會㩲入實竟況甚深所以世間難信現瑞方說說教之所以者此正解意況之義言初也者舉過去也文殊語彌勒汝問我放光恰問著人此放光者釋迦如來擬說經去交鶖子成佛轉化堅滿菩薩成佛見說八大義問莫斟配團量構虗而和莫是如見樹居白鷺表水非無為復是遠山見煙即知有火比度而知為復是眼曾見來答文殊言我於過去一一曾見來方能答得如今所答八大義與下說法華經為因由所以也經云善男子我於過去諸佛曾見此瑞舉古日月燈明佛事放斯光已即說大法成今釋迦事文殊言我見過去諸佛放斯光已即說大法天親菩薩解云大法即是世間文字章句甚深意因此論主科又名因言此釋其意放光何意者希升堂者必自開戶牖攀逸駕者必騁殊軌轍故知春蘭秋菊冬自為芳何故釋迦效彼燈明放光而後說法于今現瑞定有來由試舉經文希當答放光何意答經云欲令衆生咸得聞知一切世間難信之法故現斯瑞故放光也問何名難信之法答四十年前無學果名舊極當來成報身名新極也不但教上信難理上解亦難也旨者意也美也志也詞也言一讚時久遠希有等者意說讚佛名號讚妙法勝讚生利益此之事於無量時不可得逢故名為希不徒說劫也事依於劫故說四希也言論云不可思議等者此三句一一皆言阿僧祇也論家牒梵本經闕無邊之義加不可稱論中更言不可量者即當經中無量也論云不可得者不可見也心欲緣而慮絶故過情計分心緣不及名不可思議口欲談而詞喪過言議分故言詮詮不及名不可稱心言路絶名不可量故名阿僧祇劫又云無量時不可得者二意一云日月燈明佛於無量時所得成佛二云文殊示相憶念彼日月燈明時經無量時不可得故云不可思議也言阿僧企耶等者企由望也譯者但取音同更無別義也此云無數無數亦是數算將為無數數不得言俱舍論等者問既云極何名無數答第五十二數雖是有數以至不可數邊故名無數本是六十數今此阿僧祗當五十二數向後猶有八數五十二從一至十十十為百十百為千十千為萬萬為洛叉如是次第至五十二數名阿僧祇此云無數也言本數六十餘八等者問誰人傳妄答有云世親造論時妄有云阿難結集忘有云三藏翻譯時忘准此傳忘非是阿難忘不爾何名如是我聞但是窟外凡夫衆結集時傳忘也言華嚴經說等者若依大乘華嚴一百二十數阿僧祇是一百一十二數無量當一百七數無邊一百九數不可稱當一百一十五數不可思議當一百一十七數既阿僧祇是一百一十二數數此至無量名無量阿僧企數此至無邊名無邊阿僧祇數此至不可稱名不可稱阿僧祗數數此至不可思議名不思議阿僧祇也言劫臘波等者此云時分也音府問反一分差別之義言不可思議等者依標略釋也路府云不可過情境不可議過計境疏中意總也不可稱者過言議境安言語說亦不可得安立語議論亦不可得言不可量等者別將物來挍量亦不可得將物將喻亦不可得下算亦不可得故言過喻算境上論文言今經云無量等者無物為喻而知多少算亦不得言無邊等者一一時分皆有邊言即同般若等者天親論偈云數力無似勝無似因亦然一切世間法不可得為喻一數勝過算分經云百分千分不及其一乃至千萬億分所不能及若人將三千世界七寶布施不如有人受持一四句偈之福即無限量故云過數分也二過力分力分即時分也法力超過布施力即時分也色中極少不過極微時中極促不過受生時名一歌羅時也若人以初日分以恆河沙等身命布施中日分以恆河沙等身命布施後日分以恆河沙等身命布施每日三時布施如是經無量時不如有人一歌羅時受持此經一四句偈名過時分故言力勝也三無似勝者過喻分西域樹提伽長者富貴福德喻如無憂王無憂王世間有物不可喻得也持經功德無物可喻也故言非笇非喻也四者因勝過因分即因果勝過情計分也世間布施持戒感有漏人天果持經福德感無漏佛果名因勝勝劣故能斷金剛中有四分文也彼經數勝即同此經無量過笇分也彼經力勝即是此之中無邊過時分也彼經因勝即同此經不思議過情計分也言菩薩地說劫等者明種類也智論云一天衣拂石劫有大石方四十里有長壽天人百年一度持細耎衣拂之令盡方名一劫又云四十里大城滿中芥子有長壽天人百年取一芥子芥子盡名大劫此皆古翻譯也菩薩地云劫有二種一日夜歲數一日為一劫一夜為一劫或三年十年為一劫一夜為一劫或三年十年名歲數也言二阿僧祗者若准小乘俱舍論說一至十十為百十百為千如是十十倍數至五十二數名一阿僧祗若准大乘華嚴從一至十數至一百一十二數名一阿僧企若成佛時阿僧祗劫又別即三度至不可數名三大阿僧祇劫言瑜伽復說等者此說住劫之中小三災劫也每劫減時三災即起謨云謂從人壽八萬歲百年減一年減至三十歲飢饉劫又經一百年減一年減至二十歲有疾病劫起又經百年減一年減至十歲刀兵劫起從此十歲子年信父增至八萬歲名一增減劫也下至地獄章中從十歲增至八萬名一中劫也安國云如是二十度上下從喻為名鹿轤劫問小乘二十個增減劫中中間十八個劫亦增亦減初一唯減不增後一唯增不減如何得成二十個增減劫答初減之中福勝減極遲最後人福劣增極遲最初人福勝漸減向惡去減極遲亦等一個增減劫最後人福劣漸增向好去增極遲亦等一個增減劫是故亦成二十個增減劫也問住劫之中有增減可許成二十劫餘三成壞空無增減如何得成二十劫答論云然由時量與住劫同准依住劫各成二十劫也問飢等三災何時出現答且依大乘瑜伽第二卷說住劫之中二十遍增減每減之時皆有三災此說增減劫中小三災也謂飢饉疾病刀兵也謂從人壽八萬歲時百年減至人壽三十歲飢饉起天龍忿怒不降甘雨已經多時草木枯死泉井亦渴經七年七月七日七夜初喫樹皮草根活命此物盡已又拾穀根或煎取汁以濟其命飢饉所逼便有聚集運籌白骨各有二相且聚集二相者謂有一類飢所逼同向泉井至不得回一聚餓死二者十十五五拾得穀麥麻豆顆將作種子藏其箱篋之中如摩尼珠聚集一處行列守護名聚也運籌二相者運即是轉籌也謂聚穀根或煎取汁或搗為粖當家大小同坐共行一籌轉至一人始得一口食把籌不得者與契二於舊場碾磑之處以籌發場舊粟麥豆顆煮作汁或盛器中還行一籌轉至一人處以籌置汁中唼嗍一度過白骨二相者多時被餓骨肉乾枯皮穿見骨白而露現二取死人白骨積聚煮汁活命如是七年七月七日七夜方乃得過劫滿已後有五通仙人從山中來報云汝因造慳貪惡業今受此苦勸今修善遂生下品厭心世界却好哲云三千年中令劫不減男女相生滿閻浮提又百年減一年減至二十歲有疾病劫起非人吐毒氣人皆病也爾時疫病劫起無藥能治七月七日夜方乃得過彼諸有情復共聚集起中品厭離由此因緣壽量減病灾乃息後漸減至人壽十歲時刀兵劫起人民相見互起嗔心所執草木等皆變成刀釰互相殘害經七日七夜方得過爾時有情三種最極至十歲依止衰損者身形小身長者佛一搩手粗細一握資具衰損者爾時有情唯以稗莠蒿子為食食中第一馬尾頭髮作衣衣中第一亦無金銀鉛錫之類唯以鐵木為莊嚴為莊嚴中第一山中有五通仙人報言汝等惡業受如此苦應行十善劫乃得增爾時有情展轉聚集後起上品厭心世界却好遂子年倍父年增至八萬歲上大乘說增減了次下依小乘說則別也大乘一減過三災三災同一減劫起小乘一減過一災各減劫起大乘先飢饉次疫病後刀兵也小乘先刀兵次疾病後飢饉也大乘減至三十歲遇災小乘每災事須減至十歲起俱舍云壽至十遇一災又偈云至十三災現刀疫飢如次七日月年止問餘三洲有小三災否答北洲全無東西二洲有似三災也此間飢饉劫起東西二洲數加飢渴此洲疫病東西洲身力羸劣此間刀兵劫起東西二洲相見數加嗔恚問修何福業免得此災答經中說施僧一團食不墮飢饉劫等施僧一呵梨勒不墮疫病劫持一不煞戒不墮刀兵劫上解小三災了下解大三災言或有二十劫為一劫等者問如何世界成之與壞皆經二十劫答俱舍云若壞世界時十九劫壞有情世間一劫壞器世間若成時一劫成器世間十九劫成有情世間且成世界者俱舍云成劫從風起路云從二禪腳下巧風生是名世界初成之相然器世界從兩頭成先成初禪大梵王宮殿次成梵衆梵輔三處宮殿了及次成夜摩等四空居天計從上成七處宮殿訖從夜摩腳下起風一直向下便成風輪風輪堅密假使緊那羅神以金剛輪奮威懸擊金剛輪自碎風輪不損次成諸輪乃至鐵圍山七金山高山忉利天上成器世間了次下有情世間者從上第二禪極光淨天有一天子來生初禪為梵王梵王獨住十劫梵王思念我要輔翼遂有上界天人來生梵輔天壽命四十劫復思念我要眷屬復有上界天人來生梵衆天壽命二十劫次成夜摩天等四空居天次生人中四洲及地居天次生餓鬼傍生地獄乃至最後一人初墮阿鼻地獄是成二十劫初了之相問此界初成食何物答劫初成時有情食地餅如側手珂雪細耎如蘇香檀陸等味如石蜜等地味沒後次有林藤生亦名林條由如𪌘子其味香美喫了還生後起貪心林藤不生便有粳米長短七寸而無糠籺貪心起已入腹不消因茲便有大小便利已後要種方生自後起十惡業煞生偷盜生遂立田主梵云摩訶三末底此云正直意有大平等正直也上解成世界了下解壞世界去問如何是世界初壞相答俱舍云壞從獄不生至外器都盡且所壞有情一從無間死已更不重生若業盡者則生餘趣若業未盡者移置他方地獄若人中更造無間業者亦他方寄受是名世間初壞之相如是有情唯沒不生如是漸漸乃至於盡法爾不損一衆生伺候受罪畢已次壞七熱八寒受罪畢者生人中次壞餓鬼受罪畢者生人中次壞畜生受罪畢者生人中若畜生而人同住者共人處壞次人中四洲且最先南洲法爾人無師自然坐得初禪靜慮從靜慮起作如是言離生喜樂甚樂甚靜慮諸人聞已皆入靜慮命終並得生於梵世南洲如此東西二洲人不能入定隨自業盡生六欲天方能入定亦生梵世餘諸欲天例此應爾上來欲界有情壞了從此欲界生於初禪從於初禪初有一人得第二禪定從定起已皆作是念定生喜樂甚靜慮餘天聞已皆總修習命終皆生第二禪中三天也上來壞有情世間訖次下壞器世間且火災壞時十九劫壞有情世間一劫壞器下從地獄上至初禪無二個有情大地諸山多時無雨草木乾燋更不復生復有第二日輪出現溝㵎小池皆無津潤第三日出小河枯竭第四日出無熱惱池所出四大河水皆盡第五日出無熱惱池盡第六日出四大海水減半第七日出四大海水盡大地火起山河洞然一時火起下從風輪上至初禪都為不一個火聚自地火焰燒自地宮殿及器欲界火粗不能燒色界細器色界火細不能燒欲界粗器然欲界火猛焰上升為緣引生色界火焰焚燒初禪宮殿經一劫方盡婆沙問云六日輪從何處而來有五解一云未壞時餘六日藏於大海之下二云藏於持雙山下隱伏而住然唯一日輪升空繞須彌山照耀至劫末餘六漸出三云一日有七倍熱四云本是一日分為七日五云災是當處起不必有七日前解為正亦有云有情業感器壞遂有七日輪現爾時欲界及初靜慮中間都無一物經二十劫空上來已解成住壞空一個火災劫梵衆天二十劫梵輔天四十劫大梵天王六十劫此皆增減劫也最初成世間時梵王生來獨住十劫梵王寂漠思念輔翼上界極光淨天生下來梵輔天壽命四十劫早向成劫之中住十劫又帖住二十劫計三十劫又侵著壞中十劫計成四十劫大梵王後更作是念思念眷屬更有上界天子下來為梵衆只向住劫之中來受住劫之中二十增減劫也大梵王壽六十劫此約總數若子細五十九劫後壞二十劫時前十九劫壞有情世間梵王猶在入第二十劫梵王見下火災起不受此一劫便生上界所以疏主云或二十劫為一劫或四十劫為一劫或六十劫為一劫言或此八十為一劫謂等者從前空劫數空二十劫成二十劫住二十劫壞二十劫最後火災望前八十劫為一火災也言光數此等者少光天即第二禪三天之中最下天壽兩個火災計一百六十個增減劫此少光天火災燒不著只此火災為壽命也從倍倍至非想天也即此第二禪三天之中少光天壽命兩個火災劫無量光天四個火災劫極光淨天八個火災劫第三禪中三天少淨天中十六火災劫無量淨天中三十二劫遍淨天中六十四劫第四禪中九天無雲天中一百二十八劫除無雲減三劫只有一百二十五劫問何故減三劫答疏云或是第四禪天下下品修故減三劫也糅云二說初超過下三禪變異受至此修行既劣故果亦減如人上到山頂有憩歇故二云為成廣果天中五百劫壽命及色究竟天一萬六千劫故有減也無雲天中既只有一百二十五劫三火災劫上數還倍增福生壽命二百五十劫廣果天中五百劫無煩天中一千劫無熱天中二千劫善現天中四千劫善見天中八千劫色究竟天中一萬六千劫大自在天壽三萬二千個十火災劫次無色界空處二萬劫識處四萬劫無所有處六萬非非想天八萬劫言方一水災劫謂極光淨天者壽量即第二禪中第三天也問何緣一七火逢一水災答隨順極光淨天壽命八大劫向前早已七遍火災壞初禪了次合是八度火災壞初禪初禪火災不起方有水災壞第二禪第二禪極光淨天壽命一個水災劫并七個火災劫問何故第二禪三天之中第一小光天壽命二個火災劫第三極光天壽命一個水災劫中間一禪何故不說答此間不合是說處也若說諸天壽命不妨總說也今此間憑人明劫所以二禪天初出火災故須偏說第三天欲出水災故須偏說言或八七火一七等者謂遍淨天壽量七度火災壞初禪了方遇一個水災壞第二禪七七四十九個火災壞初禪了遇一七個水災壞壞二禪了特地更有七個火災壞初禪了即合有第八度水災壞二禪第八水災不來直有風災起來壞至第三禪此乃八七五十六個火災七個水災一個風災是第三禪中第三天謂遍淨天壽命一個風災劫也問何故水災風災皆取二禪三禪中第三天不取下三天答第二禪中第三天水災滿故第三禪中第三天風災滿故所以偏說也問何緣八七火一七水一風災答隨順遍淨天中壽命六十四劫為一生即是八七五十六個火災一個風災故第六十四災即是風災也且水災壞世界時於第二禪有俱生無雲而雨為緣引生欲界水災此雨下時滴如車軸遍於世界一時等注初沒四洲次沒七金山次沒須彌山四天王宮忉利天次沒夜摩天諸天次沒初禪後沒二禪其造毒浸壞世界時如水消鹽壞二禪已其水漸下浸壞初禪水又漸下浸壞欲界乃至漸下浸壞風輪水災勢盡世界磨滅第三禪風災將壞世界其風猛利猶如刀釰所吹著物皆作微塵然風吹諸天宮殿互相傾䨱如二大士拍二銅銨先壞三禪次壞下二禪即壞欲界空居乃至風輪壞已世界磨滅問如何三災各壞初二三禪答初禪有情過患有覺觀外有火災二禪內有喜故外有水災三禪內有喘息外風災問三災起時無有情誰招此灾答傍變也三災現時雖無生變傍變三千界同地有情增上業力變此界災以業同故小乘唯說業招不說傍變也問大乘自他界同地有情與自界壞業何不自變自界災起要變他界耶答自界有情與自界災法爾不俱是故變他界也問三災本何從何生答三災從有情藏識中俱生名言種子親生與前劫緣雖親疏異然依有情亦是他界業種親不相離故問七火後經多少時即到水災答第七遍火災壞已即空空已即成成已即住住劫便是水災壞二禪時經八七度火壞初禪即是七度水壞二禪第七遍水壞二禪乃至初禪已下總盡盡已又空空已成成已住劫滿已便是風災壞三禪壞三禪時至下總盡也言數此至不可數者問火水風數何劫為僧祇劫答風災但是纍前遍淨天壽量之劫以成無數即是數風災劫也便異小乘但纍火災劫也糅云小乘數火災劫從一至百乃至第五十二名阿僧祇如是三度數至不可數名三大阿僧祇也言凡經此三大阿僧祇者問從初修行至佛果經多少劫成佛答疏云凡經此三等大乘云及疏意欲顯菩提難得故取風災劫為數也故知無因外道空見論師煮粥頭陀繞市打鈸桄銅瓦之徒喫著衣返搭袈裟手擎鐵自稱即心是佛不要修行貪嗔滿懷豈能慈念正面經論盡不可尋縱有講人常求過失務令停罷不欲流行痛哉此時法當滅沒強為傳受忍苦宣揚心思不輕任他毀罵莫學如是逐時過也言並賢劫等者賀云此無數量但一千佛出盡即是劫終合有十類以賢劫無別數故疏言九前名莊嚴劫現在名賢劫未來名星宿劫十類者一名日月歲數二增減三二十劫四四十劫五六十劫六八十劫謂火災劫答世界初成之時光音天子從天降下至此世界見此世界有一千朵蓮華出應向後有一千賢人出現色界諸天與立名名賢劫也有大賢劫小賢劫路府云初大賢劫有千佛出今當第九減減滿劫增增至八萬歲從八萬歲劫減最初減時有彌勒佛出世從第十減至第十五減賢劫千佛中九百九十四佛一時出世從十六減已去直至壞時並無佛出世也後有小賢劫出千佛之中樓至如來出世也上明差別也言古攝論文等者即梁攝也攝論十云方便地中有三阿僧祇一謂信心阿僧祇二精進心阿僧祇三趣向心阿僧祇一心口立誓信如來正說名信二信根轉堅決定知果必得心已明了厭苦精進名心三菩提趣向為勝於真觀求得之心生趣相續無厭捨故名趣向心各為一劫亦不配位言十地各分等者謂入心住心出心謂除彼煩惱障入初地謂除內煩惱障住初地謂除心煩惱障出初地如次十地亦爾十地計三十阿僧祇帖地前三劫成三十三也前三心名大劫七地已前二十一念心名小劫八九十地九心名中劫此細碎名小如一尺物分三段或二十一段或為九段即以三段為大劫如地前二十一段為小劫如七地九段為中劫如八九十劫言雖有此等者會釋經意也問經云無量無邊不可思議阿僧祇劫未審十種劫中是何劫耶答疏云雖有此等劫量不同今依本論等今依無量無邊不可思議阿僧祇年非餘大劫本論法華一會說五般劫疏主取意釋亦不定論中雖說有五種不言此經上下之劫皆依五般若說如三周授記作佛佛即不得依日月時年劫量也如此間文及下諸菩薩共相問信如是時間經五十小劫等如是等受用日月年歲等劫即得疏主亦不定判依五種說言欲顯諸佛等者問既言疏家取日月時年何名無數大劫時出耶答既言無數阿僧祇年積之還成大劫問文殊菩薩但說過去燈明即得何用說爾許多劫耶答疏主言欲顯諸佛等言此讚名號希等者問文殊既言見久遠未審所見是何姓名耶答經云爾時有佛號日月燈明等大論云一切如來功德互等唯除四法一者壽量二者名號三者族時也有佛號日月燈明別名也如來已下通名也無量無邊劫時早希又有佛名字亦希一名日二名月三名燈此三字皆能導明破暗故名字亦希也問名號何別答若約俗書名依體立字號依德立小年名春春社奴依體立長大了解文名文幹解武名武俊謨云如言火喚著火體也如言𤏙為自性表德用也今向佛身上說一切皆依德立名號不別也言日月燈明是等者如國王天子主聖主主上等是通名若言聖敬父思知武先孝等即是別名也問二萬個佛名日月燈明亦別名餘佛不名日月燈明也問何名名號希答空有日無月無燈不名希今日月燈三義具足故名號希也言日有二能等者注法華經云一導明眼唯能見物黑地不見物事須得日光引導故云導明佛智亦如能引衆生無漏聖智二者成就世間萬物日光著開華結果各各不同佛智亦爾說三乘五乘教法令衆生得一切種智也又說日喻大乘照四天下教最廣故月況緣覺入夜方明如獨覺樂寂故燈喻聲聞悟理淺故所照不廣表說三乘法故問諸佛亦說三乘如何不名日月等答但表詮非遮詮也言月有二能等者一除熱二清涼世間萬物若無月照矚而無清涼佛智亦爾能除衆生生死之熱惱得涅槃之清涼也言燈有二能等者一能破暗二傳照一盞明燈照盡堂千重黑暗並消亡佛智亦爾斷煩惱之昏衢破生死之夜暗二能傳照即是一燈燃百千燈言如來者初總等者瑜伽論云說功德平等故十號佛佛皆同也如來者總敘下九號之總敘下如來二字是總餘九號是別問何名總答但言如來攝得三身攝得餘九號也且如如來應供如來正遍知如來明行足等一如來名遍餘九號故言總敘若餘九號中隨舉一號即失餘八號也如言阿羅漢是總攝得十五應義問如言佛世尊總得多義何唯如來答二說一如來名遍餘九號名總也二是十號最初故名總也如序分成就是最初故獨得名序也大論云如來總序也出曜經四義解如來一者依過去佛來過去諸佛皆勤修苦行中來故名如來今釋迦如來如彼過去諸佛還從三大阿僧祇劫勤苦行中來故名如來二者從二利中來故名如來經云或施國城妻子頭目髓腦能自拔濟從中來故名如來三者從法性中來經云復從法性成就世間義故故名如來四者如諸世尊依德而來經云如過去諸佛具足十力四無所畏十八不共殊勝之法慈悲廣度一切不離如性我今亦爾故名如來上依論言涅槃經云如過去等者以四種法立如來名一依教經云如過去諸佛如者順也順過去佛所說如者似過去佛所說經法即十二部經法即十二部經教也二云波羅蜜行也修六度等布施持戒忍辱等行也十一空者理也一內空觀內五根而無我二外空觀外五塵三內外空者非內五根攝故名外非外五塵攝故名內即內身快塵也四有為空依他起性五無為空圓成實性六無始空無前際故七性空一切法無自性即三科法八無所有空遍計性九第一義空即涅槃也十空空山河大地是所空今能取亦空故云空空十一大空謂一切法如幻如化法界法性合名大空問十一空有何差別答前九所觀境第十能觀智亦空故云空空就九中初七生空後一法空七中初六觀現法空後一無所空來至涅槃者果依涅槃報身言般若云如來等者解法身如來也如來者無所從來亦無所去故名如來來者無所從來表不從未來來去者無所去表不從過去去不來不去即法身佛也言成實法論云乘等者乘如實者不是真如名如實自是乘真實之道來成正覺故名如來上論文言義雖略明者疏主敘他小乘義來非此大乘宗義非此正要故言略明也成實論師本是數論外道弟子經部宗中出家所說義分同大乘然成實論中說有三身一者戒定慧解脫解脫知見五分法為法身二者從悉達太子身上成丈六金身從因修得故名報身上小乘義若依大乘義悉達太子身上成佛之身是化身也疏主云義雖略明依成實論解也非此宗義者非大乘中瑜伽宗義故不取也問既不取何用引來答欲明如來之身數足指借他小乘中乘如實道來成正覺義名目來化身義解也賀云一切諸佛如來有三種同四種異三同者一資糧同二功德同三三身同四異者一身形異釋迦丈六彌勒千丈二名字異釋迦彌勒名字各別三族姓異剎帝利婆羅門四壽量異釋迦八十彌勒命長也言論云應正等者此中若約別章說即合應供斷煩惱障證涅槃正等覺斷所知障證菩提今約通義說煩惱障亦障菩提涅槃所知障亦障菩提涅槃所以合一處說也瑜伽論中空言應字無供字此則攝得唯識論中三義若兼供字一處唯攝得三義之中應受供養之義失餘二義上論文下解疏言成唯識云等者問應有幾義答成唯識三義解應法華論十五義解應意云具此三義名名應也問應義三乘通稱今佛既名應與小乘三種應何別答雖三乘有三種應大小乘應別且二乘三應者應永斷煩惱障故二應無分段生故三應受一三千界人廣大供養故今佛具應義者應永斷二障應無分段變易生死應受十方三千界妙供養故二乘現在不越三千過未無過八萬言瑜伽及此經等者此經何處是應永害煩惱賊處答此經中諸漏已盡解阿羅漢即是永斷煩惱賊也即是此經同瑜伽論也上解應字了言故瑜伽云阿等者料簡所以攝問云准瑜伽論云正等覺亦是共德何故疏主判正等覺是不共答二解一云疏主錯於論文二云共德有二瑜伽云阿羅漢是共德者約三乘人同斷煩惱障同證生空理名共德又正等覺亦是共德者得諸佛同斷所知障同證二空理名共德又疏主言阿羅漢是共德約三乘共也正等覺是不共者約不共二乘人有故言不共也非是疏主撿文誤也言舊云正等者問正等覺與正遍知何別答疏云正遍知正覺簡外道邪等覺簡二乘偏覺又正覺簡菩薩未圓之覺也名一體同也謨云遍知即遍知四倒依何法起答依二見常見邊見起樂淨二倒依見取上起我倒依我見上起也若爾二乘亦遣此四倒應名正遍知答二乘於前後際但知八萬不名為遍又云凡夫但起四倒二乘但知凡夫四倒諸佛亦知二乘四倒故云遍也糅云正者不顛倒義遍知者於此四倒無不遍達故言正遍知問何名四倒答二乘執佛身為苦無常等言明行圓滿等者此論家名因若此經中云明行足若准涅槃經中解萬善之果名明足有二義一者腳足之足即戒慧兩法是乘戒慧之足得菩提故二者具足之足智論及瑜伽論說名圓滿也經文直言足後義為正也言明謂三明等者疏解也三明即六通中三通六通者神境智通天眼天耳他心宿住漏盡三明者一宿住隨念智明即第五宿住通為性宿是過去世也住是過去事也事者即是菩薩佛如常不輕菩薩等是事也事彼宿世之中名宿也念緣所變境也同時無漏智隨彼緣過去境名宿住隨念智明若緣過去境不盡但得名明不得圓滿二生死智明即第二天眼通為性如來智緣未來生死死此生彼名生死從境立名名生死智明不同外道過未六十劫八十劫不同二乘過未八萬劫皆有限約也三漏盡智明觀現在境如來無漏智能知自身他身漏盡不盡故名圓滿二乘唯知自身漏盡及不盡不知他身中漏盡及不盡不名圓滿也上說名明圓滿下解行圓滿言行謂遮行遮行等者疏總標論意且初疏外敘者攝云古來諸德解瑜伽文將遮行是六根不起過又將行行是三乘不起過此二行合一處總名行行又將四禪定現法樂住為行今此疏主解瑜伽論文回改又別別將行行是清淨三業現行住行是現法樂住定現行兩個行一處總名行行又別將密護根門名遮行上懸敘次下依疏總標論意問前來解如來明圓滿了未審如來行圓滿否答如來遮行行行此二種行皆圓滿也此兩個行體即是六根三業此二行收攝萬行疏引論云行謂遮行行行此釋行字顯二種行一遮行護六根之過非二者行行顯三業之清淨如斯二行總名行者問何名遮行答遮行以慧為體以止持為用遮用遮防六根門不造過失名遮行凡夫六根尋常起過若欲同不起過事須遮防加功用行方能不起過如來六根任運不起過如似防護遮者遮防也上標遮行言行行者標行行也問住行何故標中不說答疏主將住行攝在行行之中所以標中不說上雙標二行言行行謂清淨三業等者依標解二行問何名行行答疏云行行謂清淨三業等現行簡種子種子無過非生現行則有過犯也身業禮拜口業念經意業思惟不與十惡業道名清淨三業也現行正命者三業是所發現行思是能發現行思防彼身語意三業向上惡色不起能發所發俱是現行故名現行正命問諸抄云三業之中身業為正業語業為正語意業為正命如何偏說正命不說餘二耶答有三解一云意業為本餘二自成正命為本引身語生意為本故偏說之二云正命難見邪命難斷以無貪癡所發意業為正命故偏讚之三云舉本攝末故言現行正命也言又四種增上心法等者解住行也四禪定有四名為四種禪定是殊勝之法名增上心者是定名為心四種心法功德法也現法者有二說一現身得彼現法輕安樂故簡過去未來定是現在故言現現法即輕安也繫心內緣不外流散名之為住二所坐定是現行功德法名現法樂即輕安適悅定與彼諸心心所法作依止處名住此現法樂住名住行也言此二是行行攝者疏主配屬論文將住行就行行三業清淨故此二行總名行行也清淨三業現行正命是一四種增上心為二也言密護根門等者疏主配前標中遮行別開密護根門名遮行遮護防也如來六根任運不起過如密護者無有過失名為密護攝問云三業無過失則言密護六根無過何言密護答任運無過方防護者故言密護論意行則有言疏合為二行謂遮行行了言此二行及三明等者結也即行行遮行也合戒定為一一行清淨三業是戒也四種現法樂住是定合為行行并慧密護根門是遮行故名此二行并前三明故言皆圓滿言由此如來顯示等者重引論文因果相望解也論文重解前三業清淨現行正命是行行因中防護果中不假防護故言三不護也言無忘失法者論文重解前密護根門是遮行因中不起忘心果中得無忘失法故云無忘失也言由不造過者疏主重解論文諸抄將此一句疏連向下世間靜慮一處解便讀疏云由不造過故世間靜慮遮自苦行此解全非也但是疏主兩遍重成向上兩句也由不造過故三業不護由不造過故六根無忘失也若不是此意如何第三番疏主自解之中將不造過一句向三不護無忘失顯安著既不向世間靜慮顯安置即是不解世間靜慮遮自行共行也言世間靜慮遮自苦行者此論文也解住行也問四靜慮如來身上無漏出世間功德如何言世間靜慮答遮世間故名世間二依世間故名世間遮自苦行不同外道五熱炙身苦行求不同凡夫勤苦加功用求如來常住此定中受用法樂不是苦行求得名遮自苦行上來是疏主重引論文解上向前兩行論文此云三不護重解遮行行行即慧行也此云世間靜慮遮自苦行重解四種增上心定現行是住行疏主前重引論文有二意一則重前兩行論文二與第三解為標文言此中由不造過者將此一句解下二句云由不造過者三業清淨便得果中三不護三業之中不要防護任運無過名三不護也由不造過者密護根門六根不起過便得果中無忘失也言世間靜慮者住行也此一句疏主解前之論中世間靜慮遮自苦行解明了言故言明行等定是者滿足滿足即圓滿明與行皆圓滿也上來遮行即是慧學住行即是定學行行是戒學也解明行足言善逝者修行人身中二利功德名善逝往也梵云修伽陀秦云好去今言善逝同好去也逝通二義從生死修行成佛去亦名逝我輩凡夫見菩薩修行成佛某甲菩薩成佛去也此生死望果名逝逝往也又成佛了號化身入生死來果望生死亦名逝某甲佛起化身生死中去也故名善逝也上兩勢解善逝事字論云善逝者謂於生死長夜具一切種即後得智自利利他二功德故此解從因至果名善逝也言逝者往也等者疏主解只謂一個字分為兩勢若言謂成菩提已已字屬上句次將生死長夜屬下句此則從果入因名善逝此乃成佛了入生死言謂成菩提作一句又將已字屬下句此乃因向果名善逝此乃從生死中成佛也問善逝與如來何別答只依此義通兩勢諸抄云解釋名名不同且安國金等云善事往矣名善逝此則從因入果名善逝問何名如來前來成正覺故名如來此則從果生名如來乘如實道來成正覺也若准謨路等者云從果入生死名善逝如來報身了却入生死即同下文云長者聞已驚入火宅故名善逝問何名如來答從生死入佛果名如來即同下如來已離三界火宅也此乃約智名如來約悲名善逝問如來果位功德已滿如何為約智也答瑜伽云自他並利所依止故善者好也逝者往也好往生死教化衆生名善逝也言世間解者世者體是有漏可毀責故隱真理故不堅實故可破壞名之為世墮在世間中名之為世間如來能知衆生心行復解世間成壞等事名世間解此倒故應名解世間也世間有三一器世間二有情世間三法世間言有情及器二世間等者疏主引論文解世間也言依前後際宿住等者宿住生死智能知有情世間也宿智知過去以生死智知未來漏盡智知現在於此三世衆生八萬四千病行差別賢劫經第六說如來始從光耀終至涅槃總三百五十度度者頞義光耀者菩薩初生放大光明光耀一一度皆說六波羅蜜三六十八一千八百度更五十度五六三十計三百添成二千一百對治多貪多嗔多癡及等分此四之上各配二千一百合成八千四百復更對治四大六衰所生過失故成八萬四千法門對治衆生八萬四千病行差別言即知三際等者疏主解也上解有情世間言及善了知等者論解器世間也於東方不可說世界無邊成壞知此世界成知彼三千界被火水風等壞又知此界下有風輪水金及須彌山七金等三十三天乃至四空十方世界等一一皆知名世間解言又於一世間諸法等者依解法世間一切世間諸法自性因緣者此為總句也諸法者四諦法也自性者知苦諦滅諦是四諦果也知苦諦苦自性知滅諦滅自性因緣者緣亦因也知集諦是苦諦因知道是滅諦因知此二諦是四諦因故名因緣此上總知四諦因果故名總句也言愛味等者解別知四諦愛味者是苦諦多現身上生愛味故過患者配集諦煩惱業惑多過患故出離者配滅諦真如體性出煩惱故能趣行者配道諦能進修無漏智故皆善知也解也下有一百二十八煩惱迷事理等亦名世間解言謂知自性等者疏主解也言餘四諦四諦如次等者愛味苦諦過患集諦出離滅諦能趣行是道諦問苦集是有漏能知之智名世間解滅道二諦是無漏能知之智何故亦名解世間答苦集是所治解所名世間滅道能治世間將能治就所名世間解問二空能證亦能治世間何不說答約回三乘但言四諦或可滅道中亦攝二空能證所證也六了言無上前丈夫調御士者疏云瑜伽及新經說無上丈夫屬佛了是無上丈夫問何名調御答佛是能調御人衆生是所調御人衆生是所調御者此即佛是無上丈夫能調御人也問何名士答士者士夫即目衆生也舊譯經云無上士調御屬佛也丈夫屬衆生將能調御佛就所調御丈夫說佛亦名丈夫也只緣能教化又佛亦名丈夫也有抄云舊譯不及新譯問何以知答有二義一者佛具相好真丈夫也若取所化衆生唯名丈夫無相好二者舊譯士屬如來如來名調御士經云亦名調御師若爾則有濫衆生雖非無上亦得名士言智無等者問何名無上答疏言智無等果智出於因智無等故名無上也就心心所法之中更不過於智故云無過上也上解無上二字言於現法中等者解丈夫也問佛何名丈夫答疏云於現法中等問何名現法答於現在大家眼見耳聞法中總知道佛身具相好勢峯藏密是真丈夫問輪王有相好應名丈夫答輪王具相好不具好又設有相相不正圓明故與佛非等士屬衆生上依瑜伽新經解言又多分調御等者依舊翻即是什公也無上士屬佛也丈夫屬衆生無量廣故問何故不調女人答准涅槃經具四親近雖是女人亦名丈夫四行者謂親近善友聽聞正法如理思惟如說修行新經云如理作意法隨法行女人具此四行亦名丈夫涅槃經中道理雖如此今疏中直約丈夫說唯言調御丈夫不說女人者有二意一者以彼丈夫於女人中最第一故二者但言丈夫此名字總尊聖故問何名調御答如調慧馬馬有四種一者觸毛二者觸皮三者徹肉四者徹骨隨其所觸稱御者心如來亦爾如四種法調御衆生一為說生便發心如馬觸毛方調二為說生老便發心如馬觸皮方調三為說生老病發心如馬徹肉方調四為說生老病死發心如馬徹骨方調其隨所說而得修行稱如來心言由此後等者瑜伽論中有此二釋古人釋而後釋同暗合也未必古人見瑜伽論文准此後解佛能調丈夫言天人師者於天人中可為軌範法則也言以彼天人等者問何故唯作天人師不作三塗等師如來觀一切衆生猶如一子故下經云今此三界皆是我有其中衆生悉是吾子如何此中唯作天人師答疏云以彼天人解等有堪能故許得聖果名能三塗衆生生苦難處不能聞教悟理故不稱師師者交人行善名師也簡外道交人行惡不名師也又云據勝且說天人師其實齊被但說餘趣自不堪師範朽木不可雕不是如來不勘與彼為師也於天人中可為軌範可為褒讚故皆名為師言謂畢竟斷一切等者若約別義說由斷煩惱障證大涅槃由斷所知障證大菩提今此通說分別俱生種子習氣總盡名一切也言現等正覺等者斷二障并習氣了即是自受用四智菩提生起現行證得無上正等覺故此是現起若約化身即是化現證正覺等是示相言言即具二智等者即具二智根本後得二智或是自利利他二智言薄伽梵等者由攝六義故存梵本不翻古翻為世尊只攝得六中一義言坦然安坐等者瑜伽論文坦然者無畏義安坐妙菩提座若實即色究竟天大寶華王座上成報身若小化身即菩提樹下金剛座上任運摧伏一切魔軍任運者任功而運故名任運不假加功用行也是魔皆破故名一切也言即破四魔者疏主解也言薄伽梵者去聲也者若空言梵字亦無簡別梵王亦名梵婆羅門亦名梵不表是世尊也將薄伽聲向梵字向上轉便知不是餘人薄伽聲乃屬如來西國一切經首皆置薄伽梵後破外道經首著薄伽梵佛教中更加佛字今此經中當第十號六德中第六德即佛薄伽梵也言梵謂具德若有為此薄伽聲自等者此三句疏主釋餘句皆是論文破魔至安樂行品廣解今且隨文略釋四魔謂煩惱薀死天此中有二分段變易二差別擾亂身心名煩惱聚集名薀將死正死名死魔光潔名天煩惱所知若種若現隨其所應習氣等名煩惱魔分段變易二死名死魔分段變易粗細五薀名為薀魔第六他化自在天子魔子魔軍并不可思議解脫菩薩所化名為天魔此復有二一實破二化相且實破分段四魔者華嚴經說十住中初發心住能八相成道已伏分段天魔已得神通彼不能障若究竟設入初地能破天魔得四不壞信天魔不能惱故第四生貴住中已伏分別諸煩惱魔資糧道中漸伏加行道中能頓伏盡初地初心正斷分別體盡其俱生者加行道漸伏初地已上能頓伏盡然故意力七地已前由起而不為過失八地已上一切不行薀死二魔者或初地破八地破有斯二類捨分段地其破變易四魔所知障分別者資糧位漸伏加行位頓伏盡初地永斷其六識中俱生所知障十地分分斷八地已上一切不行七識中者乃至金剛無間時方永不起其薀死二魔唯識有二說一云金剛道起皆已棄捨與二障種俱時捨故二云不然解脫道中方棄捨之變易天魔者即十地菩薩示相所為上說實破四魔次下示相破釋迦化身菩提樹下金剛心起破煩惱魔捨第五分壽破薀魔魔王請已更留三月破其死魔示現於死得自在破天魔文不定涅槃經說菩提樹下未成佛先降天魔又准法華經大通佛破魔軍已垂得阿耨菩提又准大般若云八相成道得菩提已方破天魔所以疏言隨報有異不須和會也問何名六德答疏云一自在者萬惑皆除無礙而轉言二熾盛者十地之內道數數修舉因成果言五吉祥者務令衆生斷惑證真故言今名世尊等者但得第六尊貴之一義名號希了言讚法勝妙希者法有十德故名勝妙也言八十三云者即瑜伽論也十義皆依教向下說說理行處及顯果也言初善者牒經也謂聽聞時等者引論文也由法殊勝初聞之時一切衆生心生歡喜故名初善謨云如見黃金初得之時心便歡喜也不同外道教法聞著生嗔也佛法亦聞未及修行便喜也言中善者牒經也言謂修行時等者引論文也既聞前法依教修行不見勞苦不簡寒暑不生勞倦離斷常見唯修中道名中善外道有苦邊凡夫修樂著樂邊問今說於教何言行答教能詮彼中道行名善攝末歸本也言三後善者牒經也言謂極究竟者初引論標即慈氏菩薩解此所學真如理法也究竟者畢竟義真如理上本不與煩惱相應究竟離苦故簡外道得非擇滅暫時離垢不同佛法究竟離垢也言及一切究竟離欲為後故者論自釋也此是能修行人由前所修法是離垢之法能修行人亦得離垢金云謂極究竟離諸垢故斷德也及一切究竟已下智德一切者一切衆生也離欲者煩惱也後邊者三乘無學果佛令衆生聞教得後邊果對前所起行名為後善言法性離垢故等者疏主釋法性既離垢故解前論中說極究竟標文也言能學之者等者即是有學人此兩句解前論家釋文法性之言有三種或真如名法性離垢或有為智名法性離垢或本質教真淨法界中離流出來名法性離垢今取真如法性為正也若取有為智與下梵行之相不別也言修行究竟等者結無學人是也有云三善如次配聞思修三慧此前正是解經意正要也上三善也言智度論云讚布施等者釋餘類也疏主見諸經及智度論相當處引來非正要也智度論云謂以六度中施為最初菩薩施金銀七寶乃至臥具等隨時所施名為初善言讚持戒等者即三聚淨戒乃至五八等戒是清淨行故名中善言讚二果等者布施人天富貴果持戒淨土果名後善言復說聲聞等者謂修聲聞行為初善修獨覺為中善修大乘為後善言寶篋經云等者知苦斷集名初善也修行八正道道諦名中善也證滅滅諦名後善也問何以故先道諦後明滅諦答若約觀行次第先果後因若約修行次第先因後果今約修行次第言若不捨菩提心等者即十信第六心信不退故故名初善不念二乘十住第七心不退故求二乘名中善回向一切智即十回向名後善也言今依瑜伽為正者疏主料簡也即指前謂初聽聞時歡喜名初謂修行時無歎苦等名中善言四文巧者論文經云其語巧妙牒經也巧有二般取文調美妙名文巧二取稱所詮道理名文巧婆沙論云却是取名句文上語巧也言謂善縎綴等者等取名句文也縎音七八反若作𦲭修補也綴字涉衛反連續也婆沙一百二十云問以何為教體答名身文身次第行列如名詮自體或一字約名如言火若兩字為名亦只是詮得法體向上自性顯他差別義不得但名行列次第安布即是句詮差別五字七字成句顯得差別義名安布次第連合即是文也更無別功能只與名句為所依連綴不斷名文身上來名為行列句為安布文名連合盡是有功能字名文巧詞為相如作字虗上抹賦擲地金聲亦名文巧日月燈明佛說法其文巧如下香風吹萎華更雨新好者又云如清涼池蓮華莊嚴也言八語具者具者器具說法之器具說法之器具也大論二十五云一先首語者趣涅槃宮教為先首故二微妙語者其聲清淨如迦陵頻伽鳥聲故三顯了語者謂文詞善巧四易解語者巧說故略說即解不令人迷五樂聞語者豐諸義味令樂聞故六無依語者不為規求名利等事而說法故七無違語者隨彼意樂多少說故八無邊語廣大善巧義無邊際故當知此八之中略具三德一趣向德初一是二自體德次二是三方便德後五是言五義妙者論文經云其義深遠言謂能引等者疏主解引義亦不是所詮義但是教上義利名義深遠衆生聞教引發得利益事世樂事得無漏樂名利益得有漏樂名安樂此義利深遠深遠即是即是義妙化度四句分別若唯利益不安樂不名義妙常不輕菩薩是若唯安樂不利益亦不名妙如父母憐子雖令安樂不令子發菩提心二種俱有名義妙即是利益安樂具足方名義妙言六純一者論文經云純一無雜謂不與一切等者論主解也如來無漏教法不被外教法之所間雜名純一無雜也唯佛法有者解純一義外道所無解無雜義也言七圓等者論文經云具足無限量二句等論解也攝云所度無邊名無限量能度之者超過一切名最為最尊勝又所詮理滿而無窮名具無限能詮教超餘群籍為最勝又能詮具量物不可窮名具無限理超餘旨名為最勝三解相國取第二解也言八清淨者是經文也自性解脫論主解也是無漏故名清離二障故名淨即是燈明說底無漏教法名句問如何名清答論主解云謂自性解脫解脫即是清淨義一謂從清淨界中而流出來此教性是解脫法二者是如來無漏智上建立根本智證後得智建立名字章句說故此教法自體性解脫言一剎那自等者疏主二解也如來教聲一剎那中自體解脫約時解法也言或法自性等者非是三毒心中而說此法故此法體自性解脫如護淨寫經護淨如第一解脫剎那經體如第二解脫自性解脫也言九鮮白者經文也論主解教體無垢名鮮白所學之者亦得無垢鮮白故下經云讀是經者顏色鮮白也論主解言謂相續解脫故疏主解言設多剎那解脫故能學之者亦解脫金云一剎那解脫設多剎那亦解脫問此鮮白與第八清淨何別答二體是一前約一念無過名清淨後約多剎那多名鮮白或可前清淨約法體無過此鮮白能學之者亦無過失名鮮白言謂相續解脫者依論解也意道如來教上相續解脫門約如來教上一剎那有解脫功能說此門約多剎那相續解脫二云相續者身義五薀假者亦名相續此則教是自性解脫能學之人亦解脫故言相續言設多剎那亦解脫等者疏主二解一云教上一剎那解脫設多剎那亦解脫不同外道六行伏惑一剎那即得解脫多剎那劫不得解脫二云所學既是自性解脫法能學之者亦得解脫言亦得解脫言或學之者亦解脫者若是外道教繫縛學者不得解脫佛法中能學之者聞教之時有損失益能轉名解脫也有抄云將第八第九合為三對一自性相續對者自性是涅槃相續是能證身智二一剎那解脫設多剎那亦解脫三所學之法解脫能學之人亦解脫言十梵行者牒經也等者一煩惱是非梵梵者寂靜義煩惱喧囂故名非梵八支聖道能斷此非梵行法故能斷之行名梵行疏云梵即是行俱屬道諦二者如來梵音相名梵八支聖道名行此是如來梵音聲慧演出梵之行名梵行三者滅諦是梵即寂靜義擇滅無為是寂法故梵道諦名行此行是能證滅諦之行名梵行此上聖道支是梵行體梵之行依主釋言謂八聖道支者出行體也滅諦名梵出梵體也言道諦名行與滅等者結梵行言當知此道由純一等者安國云何故唯取純一等顯梵行相文巧義妙何不取耶答後四是所詮與八聖道義稍相應所以偏取也一者純一無雜二者具足三清淨四鮮白由此四義是所詮是所顯故與梵行為相相者相狀也梵行體是八支聖道道諦也此純一等四法便是道諦向上證理斷惑之義用道諦具有此四種相故名梵行之相言此中等者問此十法中何者通梵行之相答第六純一無雜第七具足第八清第九白皆是梵行家之相言配同新經者新經即大般若經意言什譯法華經十德配同唐三藏般若也言讚生利益希者經云為求聲聞者說應四諦等者通不定性不定性究竟即是有餘涅槃然今經中聲聞菩薩皆說有果辟支佛不說有果經言成一切種智准此阿耨菩提已攝種智今重言者意顯對不定性人求趣種智牛車也言有佛出世等者問何名希答疏言有佛出等謨云十方佛土中唯有一乘法即唯說一乘法如文殊師利往龍宮中唯常宣說妙法華經等淨名經云或有佛土無言無說迦葉佛住世七日並不說法意言三乘中隨說一法有不說者賢劫中數佛不說法猶但作神通令諸衆生發心入道拘樓秦佛說一法名甘露拘那含牟尼佛說一法名法鏡多寶佛出世不說一法不同釋迦說三乘法令三乘衆生皆得利名希問二乘是劣世所共知今說三乘何名希有答不是勝劣總說名希有但對唯說一乘乃總不說者今佛三乘具足說故名希有言應當應契者明訓釋之若將教就根論名應於興反應當為說何法若時根就教則合名應於證反根與法相稱又若不請與說名為應應音於興反若受請而說名應應音於證反契應如外道論師說二十五諦勝論師說六句義等雖契其根而不契理如舍利弗錯交二弟子令鍛金之子作不淨觀法衣之子作數息等觀雖契理而不契根若如來說法根理俱契下經云父遙見之等言隨其機器等者今佛有人求三乘者隨三乘性皆為說故契當衆生心故名應言衆生根性等者問所被性有幾種答疏言衆生等言總知四諦染淨等者聲聞根劣但總知一切三界有漏異熟果為苦諦總知一切法煩惱業為集諦總知三界無為是滅諦總見修無漏智是道諦於中一一無量行相聲聞不知言總知生死十二等者緣覺也小乘以無明行為因識等五支為果愛取有為因生老死為果若大乘過去十支因現在二支果現在十支因未來二支果問十二因緣是染因果狹於四諦如何却說為次勝答若准於順觀次第四十四智七十七智能觀之智道諦收所觀之理滅諦攝即是寬不是狹又依佛說聲聞鈍根緣覺利根欣猒心強故說次勝言能行二利等者說菩薩也知四諦緣生名總如四五六地作四諦緣生觀後修六度名為菩薩當成種智此菩薩上根總別俱知也問為菩薩說六波羅蜜究竟作佛則本後皆攝何以經文空成一切種智答順經宗也言辟支迦佛陀者正梵語也此云獨覺獨者身樂於山林靜處獨坐也佛陀云即是身中盡智無生智獨於靜處而得此覺即是獨之覺依主釋又云緣覺此非是梵語但是觀秋零冬落從緣起覺故云緣覺即緣之覺依主釋問聲聞緣覺同證生空何不總名緣覺答聲聞但自聲悟道不自覺知緣覺自覺得果故名緣覺所以部行麟喻總名獨覺總名緣覺緣覺之中有麟喻出無佛世全不遇佛緣覺之中亦有部行遇佛得果者亦有不遇佛得果者今取最初逢佛得果者言顯後勝妙答者前來讚佛號希此間又更說故名為顯後言論名現見勝妙因者即勝妙姓名也論云以諸菩薩者有說經中不說有菩薩但是相引來者此解非也不細尋經文其佛未出家時有八王子八王子即是菩薩也言示現受用勝名姓等者名即日月燈明也即是四姓中婆羅門為勝姓真云一切諸佛有二種受生尚尊貴即出剎帝利家尚多聞即出婆羅門家生言此中有二一名同妙等者經云次佛名日月燈明等者妙光法師初逢佛名日月燈明佛妙光奉事已於此佛邊修菩薩行此佛入滅更有佛出亦名日月燈明乃至逢二萬個佛皆同名日月燈明佛妙光不論所事佛佛名別者亦無數今且取名同者早值二萬個佛一一佛皆名日月燈明佛一一佛皆說法華經文殊皆聽又佛有三同六異一因同三劫行同故二果同三身齊故三利生同具四無量心故六異者一居處異淨穢不同二種姓異剎帝種婆羅門此是種異也姓異者釋迦氏彌勒慈氏三身量異釋迦丈六彌勒千丈四壽量異釋迦減劫時出壽短彌勒初減劫出命長五住世異如釋迦八十住世迦葉七日住世六舍利異多寶全身釋迦碎身今言名同且據二萬燈明佛說非望一切佛出問此間顯勝妙答與前讚揚希有答又與委陳別事三個答何別答三答各異一讚揚希有答舉見二萬個燈明之中最初一個燈明佛有四般事希奇一見過去無量無邊劫此讚時久遠希二讚佛名號希三讚法勝妙希四讚生利益舉此一個佛有此四般希奇事與下一萬九千九百九十九個燈明佛此四般事總同次顯後勝妙答舉同後一萬九千九百九十九佛即是顯後勝妙答舉後一萬九千九百九十九佛受用勝姓與最初一個燈明佛同問最初一佛空說有名號不說有姓如何言同答最初一個是二萬中數二萬佛既有姓准知最初一個亦有姓也經云又一同姓是後委陳同事答中偏說最後第二萬燈明一個佛除序分成就餘六般事與今釋迦一切皆同問最後二萬燈明放光雨華動地說經與前一萬九千九百九十九佛得同否答一切皆同既一切同何故偏於最後一個燈明佛同今釋迦答二萬之中最後一個與釋迦放光說經有力餘向前一萬九千九百九十九佛望今日與文殊為答成就則無力也何以故答文殊自見己身為妙光法師在最後燈明會下則決定若歷事二萬燈明說經文殊在慧會下在與不在則不決定假如鶖子當初二萬佛時不向佛邊聞法向十六王子會下豈不有此事又文殊於第二萬燈明佛邊攝取諸佛轉法輪因法華經法輪盡被妙光法師攝授得向前爾許多佛法輪不必總是妙光法師攝授得又彌勒為求名菩薩亦在彼會下結會往事染淨因果證說不虗又欲顯自身與釋迦為九代祖師所以偏舉第二萬佛放光現瑞說經與今日同也問若取最後佛與今日說經有力但舉最後一佛即得何要總舉二萬佛答若不總舉二萬佛因果無來處天親解云文殊自見己身於彼佛土彼佛土不一名彼彼所以最初舉一個佛有四種希久遠時希名號希說法希利益希偏舉一個與下二萬佛四事皆同也次復已下別舉一萬九千九百九十九佛受用勝姓與初第一同最後別烈一個佛與今日釋迦說經同也向下欲明二萬佛所以兩遍道次復也若望俗中說字號依德立名依體立名則是小年本來講者字號則是向後立者俗中名號字三事各別姓孔姓也名丘名也字仲尼字也言文宣王號也今向佛身上證名字號皆依德立更無勝劣言頗羅墮等者頗羅墮姓也此翻為利亦翻為辨才亦云翻為滿滿為正也真諦云仙人六姓者一迦葉此云飲光二遏底此云三毒三憍陳如此云火器四阿梨多此云善取五云瞿曇此云破暗六頗羅墮此云利根此勝姓有六疏引論十八寫錯六字點書相近錯為十八也諸佛如來隨所現身不同時世愛尊貴則向剎帝利家生時世愛聰明博學則向婆羅門家生言此有二妙等者經云彌勒當知初佛後佛等者問此唱與前唱何別答前唱約佛別名同此唱約佛十號同問前唱說法有十德今何故說三善答略說三善貫通七德舉三善攝七德問現見希有因現見勝妙因現見受用大因此三因皆說日月燈明有何別答佛經無量劫時此佛方出名希有又舉四般希奇之事名希有因第二勝妙因其次明一萬九千九百九十九佛受用勝名勝姓故名勝妙因第二受用大因最後第二萬燈明佛有八王子在家受欲樂出家受用法樂名用大因言第三段委陳等者問委陳同事與指陳別事何別答前來彌勒菩薩問文殊釋迦放光動地等事文殊不答彌勒問底事別將日月燈明出世事名為指陳別事答指彌勒問陳日月燈明事也別說佛數多少劫多少名字等不同也若委陳同事答明委細將日月燈明說法六般事與今日釋迦一切同委細委曲而陳同事又七因五因寬狹不同言有五等者科委陳同事答中有五因一受用大因受用有二在家受用五欲樂出家受用法樂經云其最後佛未出家時有八王子下言二攝取諸佛等者經云滅度後妙光菩薩持妙法蓮華經下法輪是他燈明在日轉佛入滅後妙光法師承後說法名攝取諸佛法輪攝取領納義也言三善堅實如來等者堅者堅固實者真貫妙光化八王子得入八地證四不退名堅實即行法輪轉經云日月燈明佛八子皆師妙光妙光教化等下問此與前攝取諸佛法輪何別答前是教法此是行法輪也言四能進入因者能進入是福慧所進入是佛果也經云是諸王子供養無量百千萬億佛已皆成佛道言五憶念因者其最後成佛者名曰燃燈下言受用大因者論言等者經云是諸王子聞父得阿耨菩提悉捨王位亦隨出家此即子隨父勝如喜見菩薩回邪見之父王即父隨子勝記云前說二萬佛其後第二萬佛亦名同今不說前一萬九千九百九十九佛且說第二萬佛有八個王子以最後佛還為國王捨國出家故在俗有八個王子所以疏云是時王子受勝妙樂各捨出家言復彼大衆經於爾許等者此八王子在俗受欲樂出家受法樂出家以於最後日月燈明佛邊六十小劫聽法不生疲倦以法力資持故經云六十小劫不起于座時會聽者亦坐一處六十小劫身心不動聽佛所說謂如食頃是時衆中無有一人若身若心而生懈倦言在家受欲樂者問准下令其八王子得堅固菩提即是八地菩薩云何受用五欲樂但是受用法樂疏主答不然八王子威德自在及受用五欲樂出家之後受用法樂如釋迦在家之時納妻子受於欲樂言此文有四一示相等者六般事與今日同故名同今也言唱滅異即者即由今也經云日月燈明佛於六十小劫說是經已即於梵魔沙門婆羅門及天人阿修羅衆中而宣此言如來於今日中夜入無餘涅槃即是燈明與釋迦入滅不同燈明說法華經次便入涅槃釋迦更說遺教涅槃言三當成佛記者經云時有菩薩名曰德藏日月燈明佛即授其記告諸比丘是德藏菩薩次當作佛號曰淨身多陀阿伽度等是言四現入涅槃者示相入滅經云佛授記已便於中夜入無餘涅槃言示相同今有六等者問何故無序分成就答有二解一云釋迦說經在靈山燈明處不定故無序分成二云衆人不疑說經處王城鷲嶺文殊亦不序問處既衆人不疑故此間不說又衆成就亦衆人不疑何故即說八王子已為衆成耶答緣八個王子中第八王子與釋迦授記八子又與妙光為弟子文殊要陳彼事所引來示相問今六段之中今當同今衆成就此間衆成就從與大比丘衆至各禮佛足退坐一面燈明只舉八子為衆成就所引來言此初也者今當標有子經云其最後未出家時有王子問釋迦會下十五衆何故燈明衆成只列八子答二說一舉勝攝劣二向下結會處要所以引八子不引餘人也既言八王子及顯未出家是國王問但言有子即得何要言八王子答緣生子中第八王子與釋迦授記八王子總與妙光為弟子雨華動地句他妙光邊學來表是九代祖師師父今日證釋迦說經不虗言法爾諸佛等者問諸佛何故先有子後出家答疏言為降伏世間受欲樂者故世間受樂不過妻子男女佛於妻子亦於世間人妻子有男女亦勝世間人男女受樂亦勝世間人受樂故名降伏問何要捨却出家答示現欲樂不可保重故金輪王位妻子男女尚捨出家況我下劣凡夫賤庶人類不求出家也又世人將劣五欲而起憍慢既見八王子圍繞世尊此慢即止又若不有子恐外道謗世尊無丈夫勢用出家故示有表具丈夫德也言此列八名等者經云一名有意等者問八個王子如何總名意答此盡是俱生無作行意生身菩薩從意所生故名意生故八個總名意也問何故不言九個七個只言八個答順彼八地已前悲增菩薩次第成佛故言八個八地已上永受變易更不受分段身順彼八地已前菩薩分段身所以只有八個不立七九一名有意者有彼大智偏得有名二名善意者發大悲心欲度三有三名無量意者真諦俗諦其體有無並皆曉達四名寶意者真實之理可寶重故五名增意者已出家長善法故六名除疑意者聞法悟解除蕩無明七名嚮意者能知虗妄如空谷嚮八名法意者窮其真法得達無餘故名法意也言一大智等者分為四對由有大智故不住生死是智增菩薩求無上菩提故名有意由有大悲故不住涅槃即悲增菩薩皆起悲心運度衆生故名善意言了有了空者了有即緣有也此王子觀一切有為無為法等遍緣一切法知有為是幻知無為是實等了空者觀空緣一切有為如露如電言進善破惡者由修一切善故名增意由除疑故破惡名除疑意言達僞知真者由達僞故知有為如幻故名響意由知真故即緣無為為境名法意也言無一世界有二等者輪王相對問且約化佛土說也問如何經言各領四天下此徵各領經文也答疏言今解八子相繼統領非一時也意道第一王子紹繼了則到第二王子第二王子了則到第三王子也若一世界之中一時作不得事須相續也問最後一王子應壽命長遠無量歲如何通會答八個王子同是八萬歲中相承統領每人登住百年千年即下去互相分付壽命八萬理亦何妨言然以義通等者問經文但說相繼得成佛又說轉次而授記不說相繼為輪王道理中間如何會釋答疏言以義通等故作第二輪王相對與佛問答也輪王與佛定不同世何有子得作輪王上問詞言此乃應紹輪帝等者答意總不作也應合作身上有輪王相好福德緣不遇時故但是應作非正作也問經云悉捨王位若是應作如何言捨答亦是捨應得之王位也如進士及弟子出家去未作官亦名捨序也言如釋迦佛應為等者應為輪王何以不作答疏出所以劫漸減故言由此增至八萬等者證輪王定增劫出佛定減劫出如何當來穰佉王子與彌勒相見答疏言輪王命長故見彌勒只如兩個師僧一個白月十五日到來一個黑月十六日到來前十五日來去遲直至十六日發一個十六日到來早與前來者何妨相見言或此報佛與化佛等者依報解此解實作輪王一時總作以初地報佛王百億世界無量四洲何妨有子得作輪王言妙光化八子堅固等者問爭知燈明是報佛答疏主引事證成言妙光化八子堅固等若不是報佛如何有子才化入八地事須先是七地已前菩薩也能化之主定是報佛也意言既登八地明知八子即是七地已還故說燈明是報佛言亦為菩薩等者問既是報佛如何不說無量義經說法華經耶答疏言亦為菩薩等第一示字示為菩薩說無量義顯爾開爾也第二示字為聲聞說法華示現之示緣報佛土中聲聞是化所以說法華亦示現說也簡要云或為菩薩說無量義亦是示現若直顯說無量義即是實此雖為菩薩說無量義意中與法華經為時至成就亦名示現也若依此解聲聞菩薩皆是示現言如鼓音王經等者例成也問既是報身如何有子耶答疏言如鼓音王經等阿彌陀佛父名月上母名殊勝妙顏子名月明不言有妻但言有子即知有妻也形對七地已前悲增菩薩居分段身能化之佛身示有妻子男女阿彌陀佛是報佛尚有妻子何妨燈明八王子言此初也者形隨真俗也經云是諸王子聞父出家等者謨云放動則天舟朱不能紹聖重華盡美商均不得副音豈若大通入定沙彌繼跡傳燈釋迦道成羅睺已之得記形隨真侶豈不真哉言屣者屣也意道富者脫斷根屣不豆為難言去騎者馬繼也網謂羅也在俗有妻如馬有絆如鳥入網言既發大心等者既發大心解經中發大乘意心恆持戒解經中常修梵行能宣妙理解皆為法師言三藏備矣結三藏備矣疏主舉三藏教顯所詮慧也三藏教所詮三學是一人身上事也言得遇良緣者經已於千萬佛等者問是八王子威德無雙耽荒五欲如何才發大意便能梵行常修答經云已於千萬等得遇良緣也經云殖衆德本堅修福慧言示為菩薩說者示者開示為菩薩開示無量義經問為菩薩說無量義經真實說如何名示答示有二義一者開示二者為菩薩說無量義意中聲聞法華為時至言如今所見等者意言燈明光中所見七事一似釋迦今日事也言此初也者樂欲聞法也且樂欲聞法者釋迦欲聞成經文經廣彌勒自申疑有三一將求因緣念以何因緣而有此瑞二推求問答念當以問誰誰能答者三我今當問經云復作此念是文殊師利法王等燈明會下號只有大衆樂聞與今日同言何故釋迦放光等者問意何故釋迦會下有四衆八部燈明會下何以空二十億菩薩耶答疏言此依本位等則言四衆言彼說發心者燈明會下約發菩提心已去總名菩薩也言又此舉劣者燈明會下菩薩勝四衆劣釋迦會下菩薩勝四衆劣燈明會下舉勝隱劣且言菩薩釋迦會下隱勝取劣且言四衆言下頌中云等者問爭知燈明會下舉勝隱劣亦有四衆爭知燈明會下具有四衆答疏云下頌中云爾時四部衆見日月燈佛現大神通力其心皆歡喜各各自相問是事何因緣言故知影顯者燈明會下顯說有菩薩影取釋迦會下亦有菩薩釋迦會下顯說有四衆影取燈明會下亦有四衆又燈明會下顯說菩薩影取燈明會下亦有四衆釋迦會下顯說四衆影取釋迦會下亦有菩薩言又彼實是菩薩等者依報佛土解指二十億菩薩是報佛土中菩薩實有也若報佛土中說有四衆即是佛化也意從莊嚴佛土能化佛是報佛所化四衆是報佛化故言此實是四衆等者此是法華會實有四衆即能化主是化佛所化衆是化佛教化故又云燈明通報化聲聞見是燈明即化佛菩薩見燈明即報佛釋迦亦爾劫盡火燒鶖子聞經等此土安穩文殊在中等言欲知光緣等者經云所為因緣者為字通平去二音即同前發問先因中以何因而有此瑞也言此初也者一傳燈眷屬也經云時有菩薩名曰妙光有八百弟子妙光法師也是傳燈八百弟子是眷屬傳燈之眷屬問只引妙光一人答成就是菩薩何須引八百弟子答三意一緣彌勒前來出語大僭向他文殊菩薩道佛坐道場所得妙法為欲說此為當授記交我答則不得交我斟配團量十中得八九文殊菩薩亦總是慢語過去為求名菩薩自身上事尚不自知因何得知釋迦如來放光現瑞之事顯彌勒菩薩住智未圓所以引八百弟子來緣彌勒為求名在彼中復是文殊弟子暗打睡彌勒菩薩二緣向下結會之中經云其最後成佛者名曰燃燈八百弟子連燃燈佛一處道古來有人多疑彼處經文將謂八百弟子是燃燈佛弟子謂有人疑所以翻譯家向此間開顯妙光法即名向下先標八百弟子知是妙光弟子為斷疑也三者表經力不可思議勤墮皆由聞經得成佛故八王子及求名菩薩遲疾雖不同皆因聞經得成佛也上傳燈眷屬也言第二因說此因等者經云是時日月燈明從三昧者疏云主科此答成就今取前唱傳燈眷屬問今釋迦說經中答成就也從此唱已後三唱同今正宗也經云是時日月燈明佛從三昧起因妙光菩薩說法華經彼是正宗同今正宗前唱傳燈眷屬即為答成就何勞四段若准疏主意總是答成就也且因說此經者釋迦說妙法因文殊答燈明說妙法因妙光能答妙光菩薩合二十億菩薩云世尊出定來說經告也燈明出定果然說經所以名為答成就亦名因說此經然此間答中經中暗應合開出六時有菩薩名曰妙光答二十億菩薩曰欲說大法告也欲雨告也問經文既無分明答成就文未審妙光實知二十億菩薩疑否答只是經文不開出決定有此意也如下經云世尊既讚歎令妙光歡喜又云如我所說法唯汝能證知證知之言即是知也言釋迦說法華等者正明答成就也釋迦欲說法華時放光照境見七般事彌勒問光之所由文殊便為彼答後釋迦從定起說法華也言燈明說法華因等者彼燈明欲說法時還先放光照境及所見七事等會中有二十億衆見此光明不知所以欲得知光之因由欲聞所以大乘問妙光菩薩其妙光菩薩為答從此燈明佛從定起便說法華也言故頌中言佛從三昧等者引證也經云適從三昧起讚妙光菩薩汝為世間眼一切所歸信能奉持法藏如我所說法唯我能證知世尊既讚歎令妙光歡喜言又釋迦今化等者問釋迦因何人說法華燈明因何人說法華答疏云又釋迦今化等又解所告不同今佛釋迦出於濁劫二乘根鈍若不正告即不發心燈明不爾故告菩薩言今佛從定起等者問何故二佛從定起告鶖子妙光不同耶答疏云今佛從定起等者不是智慧與佛相似名相應但是鶖子妙光是足智慧人法華經又是利根人所學故名相應也言此為聲聞等者問何不釋迦告菩薩燈明告聲聞答疏言此為聲聞彼為菩薩言其妙法蓮華經亦名等者問此為聲聞彼為菩薩則今此佛唯說法華彼佛唯說無量義何故此佛彼佛俱說無量義俱說法華答疏言其妙法蓮華等金云縱也意道無量義經說法華經名體不別所次法華經亦名教菩薩法言但以體義等奪也體者體性義者義用義即用也談體為頓語菩薩則無量義談功能為漸悟菩薩即說法華將體望頓則名無量義將功能望漸悟則名法華所望有異者燈明是報佛先說無量義經約體後說法華約義其釋迦是化佛初說無量義利頓根後說法華利漸根言報化事殊等者燈明約體說無量義約義說法華經報事殊故釋迦約頓說無量義約漸說法華化事殊故不名無量義者一云釋迦處鷲嶺唯是化身為聲聞說法華唯名法華不名無量義化事殊故燈明既是報佛實說無量義經為菩薩說報事殊故二者釋迦是化佛初為聲聞說教理傍名蓮華後說行果名正蓮華不名無量義燈明會下是報身土實為菩薩說無量義會下有化聲聞還示現為聲聞說法華如前已說者詣前成就中疏文故知報佛示為菩薩先說無量義示為聲聞後說法華也言然彼示現化諸等者問釋迦會下為富樓那等是化聲聞佛還與化記令引實聲聞燈明會下總是化聲聞無實聲聞何要汝為化聲聞示現說法華經利此此理盡知所以疏答云然彼示現化等言或說化身實等者前解報事殊釋迦唯化事燈明唯報事今疏主唯依燈明身上通報通化解也說化身實說法華為聲聞化事殊故若經中說著燈明八子各領四天下報身實說無量義為菩薩說報事殊故言第三時即短長者經云小劫等者論主解云既以日月等為劫不可別生分別且古人時節長短古人解義長不定長對短名長短不定短對長名短也意道長短向上長不定長短不定短長若定長不應六十劫謂如食頃短若定短不應展一念為多劫也所依真法性上既無長短之相依上何處有長有短耶言論解既以日月年等者等字者等取夜時依法華論五種劫故名小劫也或是六十年或六十月或六十日或夜時謂春夏秋冬時不可別生分別者破古人也不得對長說短稱長亦不可作增減劫解也故名別生分別也疏主意時則實經六十小劫聽人心亦實經六十小劫但是玩法樂之心極如頃也言但是佛觀根等者疏主斷也問縱許是六十晝夜猶有一月已來云何今言食頃答疏言但是佛觀等佛實經六十小劫說法名應物時長衆樂情深亦能久聽聽人心亦實經爾許時由心欣故以長為短若猒心以短為長古詩云志士覺日短愁人知夜長如聽法之衆若樂法之心則不覺時長若猒法之心則覺時長解上六十小劫言玩法樂之心等者食頃也嘉祥云但是如來神力促六十劫為食頃欲顯長不定長故促之令短短不定短亦可之使長如一夕之眼夢之百年雖一夕之眼如故而百年之事宛然言如俗觀碁等者引例亦名事成也昔有人執斧入山中伐木見二人碁可一局斧柯已爛俗士觀仙碁仙碁實時少爛柯時已長衆會聞妙法妙法特實長解心即時短又云戀碁心志重斧柯雖爛身不萎渴法為情深多時身命得安樂攝釋云晉朝古人王質質入山伐木至一石室見數個童子彈琴而歌質聽之童子與一物狀如棗核質受食之便不復飢停止俄頃童子語曰汝可速去承聲而去所斧柯朽爛既歸至家稚子幼孫資成老人親情凋喪觀碁粗淺尚自不覺數十餘年況妙法難思六十小劫亦復爽問釋迦說法華不言時節何故燈明六十小劫答釋迦下所化衆生利鈍不等難分時節燈明會下一向利根定得時節也有云亦有時節涌出品云以諸菩薩種種讚法而讚於佛經五十小劫又神力品云諸佛現神力時滿百千歲然後還攝舌相一時謦咳金云此皆衆生識上變作短長於此義中略為五對一勤惰對如世間人精勤嫌日短懶惰猒時長故無性論云愚夫修少時忩心疑已久聖修無量劫勤苦謂須臾二苦樂對如人病苦猒時長歡娛姿逸即猒於時短有頌云歡娛覺夜短愁苦恨更長苦樂從心變長短有何常三欣猒對如聽法之衆若不樂聽者即覺時長四迷悟對如人睡眠夢見彼人使向他國使睡覺之後還是暫時無性論云處夢謂多年悟乃須臾頃故時雖無量攝在一剎那五神力非神力對謂佛神力轉易其心令於長時謂如食頃由此義故可為四句一轉境不轉心即變大地為黃金攬海水為酪等變定果色有二解一妙觀察智擊發鏡智令定果色種子發起現行二云妙智自變二轉心不轉境如延七日為劫三心境俱轉如芥子納於須彌須彌入於芥子不增須彌不減又云移諸天人置於他土移心移境今此所說即是第二轉心不轉境四俱不轉如凡夫心境是今取苦樂對然此時體不相應收少時多時隨心變故是假也言法食資持等者即是法喜食如聞慧為體禪悅生樂者禪悅食以輕安為體遣業縛等者除以定障所以身心安樂既有食所資身心有輕安樂可以調身心故無倦也言唱滅異即者即由今也句改為示同今下句改為異即異即前來餘六般事與釋迦同唯唱滅與釋迦不同釋迦遺教了然後唱滅燈明不說遺教只說法華便入滅故名唱滅異即有說釋迦說經後更經四五年入滅燈明說經亦了當日中夜涅槃故言異即也佛入滅皆於中夜者表生死中而有涅槃言佛之入滅不同等者二乘入無餘身灰智滅身智俱捨彼位唯有離障真如清淨湛然寂滅安樂佛之無餘但言無苦依有漏諸法也猶如燈焰一滅永滅佛示現入涅槃身智不無示同下士故唱無餘即是雙林之間化火焚燒身示現同二乘入無餘所不同故名示現也言沙門息惡義者俱舍云諸無漏是道沙門性懷此道者名曰沙門本行集云福德積集捨諸非此世他世皆無染一切生死皆滅盡得此證者名沙門也言以得法等者安國云以得空理安住其中名為寧息問即合究竟寧息何故言暫爾答却是解世間沙門懺垢障名暫爾寧息今時師僧自稱沙門修沙門故名沙門也言正言室羅摩者拏音女加反拏音女余反幡也言此初也者初標記也經云時有菩薩等者問何故諸佛入滅事須授記耶答意徒付囑法眼故授菩薩記相繼得成佛相繼不斷絶猶如父母臨亡付屬與長子也言此授記也者經言告諸比丘等者號曰淨身者即是藏義淨即是德義因記名德藏果即名淨身也言增一阿含云等者問何故諸佛將欲出世事須授記答疏云增一等意取第五證此間當唱中授當佛記也此亦轉次記成法輪也言其佛三號多分等者是斷德由斷障顯得法身如來也應供是化身如來恩德正等覺是智德即報身如來今唯取論家三藏中應受世間妙供養之應也言第四現入涅槃等者經云佛授記已等者問何故如來於中夜入涅槃耶答如來於一時樂行寂靜初夜人未睡喧閙故後夜人起作務唯中夜最寂靜如來擬證涅槃果寂靜法故故中夜寂靜時入涅槃也中者表生死中而有圓寂也言此是即攝取諸佛等者今當第一攝取諸佛轉法輪因攝取有二義一云燈明佛在日自轉法輪二云佛滅後妙光轉故名攝取攝取日月燈明佛轉法輪攝取者領受義言論云法輪不斷故者問如何知妙光攝諸佛法輪答疏言論云法輪不斷故燈明佛說了次妙光說妙光又轉與餘人說故名法輪不斷也不斷者解輪義言第三善堅實如來等者經云日月燈明佛八子等者善者簡惡堅實者不退義如來者自身所得如來果也身中見道修道智能破煩惱名輪此是行法故名法輪問此言法輪與前攝取法輪何異答前據教理法華經體名諸佛法輪妙光攝持演名攝取此依當果名如來法輪據能修行名善堅實是前後異言論云佛滅度後等者從初發心乃至八地名無量時故或八十小劫妙光為說名無量時說故言教化令其等者疏主解也當時八十小劫妙光法師為說法華經得入八地得堅固菩提言不爾如何等者問疏主爭知是八地已上法輪答疏云不爾如何亦教化便為得成佛故知八地已上法輪也答妙光當時所化弟子不入八地如何所化弟子成佛來經無量劫如妙光化八子中最後名燃燈燃燈成佛已久化釋迦成佛早經無量劫故知當時化八王子入八地也言或入初地等者亦名因不退以彼八王子未入初地妙光教化方入初地疏主有此二意也言第四能進入因者能進入是福慧二種因也所進入是佛果菩提無上果也言第五憶念因者文殊自憶念往事也經云其最後成佛者名曰燃燈問八個王子總得成佛何故偏說最後成佛不說前七成佛答緣第八王子名曰燃燈是釋迦之師餘七望釋迦則疏遠故偏舉之問何故前來八個王子總引來耶答八個王子緣是文殊弟子為成文殊與釋迦九代祖師今此雨華總從文殊菩薩學來證文殊菩薩所說不虗不可九代祖師肯忘語耶言論云為他說法等者文殊自見己身為妙光法師經八十小劫說法華經得成佛名利益他也言理應此文屬前等者前唱經文說八個王子供養無量百千萬億已皆成佛道此又言最後成佛俱是說八王子成佛總合入前進入因一處只緣此唱要別明第八王子成佛名號故此別明也若論十因總合為憶念以緣生疑發問偏是彌勒一人文殊先說過去求名令交彌勒憶念知文殊所記不謬知佛必說法華憶念第八王子認釋迦為孫子憶念八百弟子認彌勒為弟子上憶念八王子了言此初也者憶八百弟子成佛中初染因也經云八百弟子中有一人等者言不通利者見在持經之次更不持吉名而不通利已得者總忘却名多所忘失言內妙業不純者解經中雖復讀誦衆經而不通利外則多貪聲譽者解經中多所忘失故號求名言論云汝號求名者引論文也示現文殊知過去久遠事故意道彌勒昔求名利今文殊一一了知昔日之事證文殊答燈明佛是說法軌儀不錯故所以言彌勒昔求名問文殊菩薩修菩薩行即不見他過去遏惡而揚善如今於大衆中唱說彌勒是求名利等非斥他人嫉他名利何名菩薩答疏言論云汝號等不是非斥他彌勒菩薩所以疏云不爾便成指斥他失也言此明淨因者問彌勒菩薩既得成佛如何染因得成佛耶答亦有淨因經云是人亦以種諸善根因緣故言福慧雙植者經云已於千萬佛所種諸善本即是得遇良緣堅修福慧也言此初也者即人也將今即古文殊乃是古昔曰妙光將古即今昔時妙光乃是今日文殊大士又將今即古彌勒乃是昔日求名將古即今往日求名還是今時彌勒論云汝號求名示現知過去事故即人也又云種諸善根等者論家解即法也言贊曰即法總結答者經家即法經云今現此瑞與本無異等者今時靈山見雨華等必釋迦說法華者曰為妙光時見燈明佛入定雨華等後出家時便說法華經今時釋迦有此瑞相必知釋迦出定說法華經長行了言不頌初二因者即是現見大義因文字章句甚深意因也言後有二頌不入答中等者即經云諸人今當知等言由此還分二者空述指陳別事古今相即指此二答故名由此也言七因分三者七因分三答讚揚希有答顯後勝妙答委陳同事答偈中唯述初後二答不述中間顯後勝答即妙是勝因也經云次復有佛亦名日月燈明次復有佛亦名日月燈明等名同妙性同妙號同妙法同妙乃至所可說法初中後善是也不顯勝妙因唯述六因也言讚揚希有中等若經云我念過去世等者金云略由五義名為過去一剎那過去謂一切行中前前剎那已後所有諸行二死沒過去謂彼彼有情衆內分死三懷滅過去謂器世間三災等壞四退失過去謂未得四種不退法故五盡滅過去謂有餘無餘涅槃煩惱盡有餘涅槃異熟盡滅無餘涅槃言此初也者初一頌衆成也長行有二初在俗後出家且在俗者長行經云其最後佛未出家時有八王子一名有意二名善意乃至各領四天下二出家者經云是諸王子聞父出家得阿耨菩提至悉捨王位亦隨出家今頌中亦二初二句在俗經云佛未出家時所生八王子唯述標有子不述烈八名明王化後二句出家者經云見大聖出家亦隨修梵行長行家有三形隨真侶行出塵中得還良緣堅修福慧三段中唯述行出塵中長行經云發大乘意常修梵行有無不同也言第二時成者長行經云是時日月燈明佛說大乘經名無量義至佛所護念今頌中時佛說大乘等言與長行前後等者長行先說動地後說有情世間今此頌文先說有情後說動地也前後不同天鼓自然鳴長行無頌文有有無不同天雨曼陀華長行開頌文合廣略不同言一切諸佛土等者標舉經文言亦唯日月燈明佛等者問何以知之答疏云前云而此世間六種振動故意言雖言一切諸佛土亦唯是日月燈明佛自界動非普動十方界也言化身報身等者問既燈明一佛國土何得言諸答此明佛國一切皆動化身報身下位非一故言諸資糧位化身對初地報名下位一大化身界有百億小化身初地又化得一百大化身界每一大化有百億有小化故初地報身所化一百個百億小化即燈明佛欲說法時動得一百個百億小化身境名諸也言此初二也者初放光者唯時如來放眉間白毫相光二照境者照于東方萬八千佛土靡不周遍言不頌入滅起塔者釋迦長行中有七事後彌勒頌文不述入滅雖述六事也後燈明長行有七事今頌文唯述五事其入滅并起塔遣不述問燈明長行只如今所見爭知有七事答只如今所見之中令得七事或將釋迦長行未燈明長行亦合有七事也言此初也者初半頌云趣衆生經云示一切衆生生死業報處言處謂所趣報者當來五趣身名之為處此被毛戴角身名之為處是無慚無愧業家所歸趣處言或處謂道理等者因得處名因是建立果處善因是感善果處惡因是感惡果處此是道理名處所也言或處謂處所者地獄鐵墻鐵壁受用者依止處也二解各別也言此初也者初見淨土也經云又見諸佛土等者即燈明佛放光所見佛土也問彼佛土以何物莊嚴答經云以衆寶莊嚴問釋迦照東方佛土如金色彼燈明佛作何顏色答經云琉璃頗梨色即青色也問曰何彼佛作青色答斯由佛光照所以變作青色也言釋迦光照皆如金色等者問釋迦放光所照境色何別答四解一云毫作白色光赤色白色照世界作黃金色如炬照雪赤白各殊二云毫毛作白色光作黃金色照著世界並作黃金色三云毫作白色光赤作白照著世界作琉璃色頗梨色問何故白光照世界作誰誰色乃至琉璃色答經云以衆寶莊嚴以琉璃頗梨色斯由佛光照不妨白光照世界作琉璃頗梨色四云毫作白色光作琉璃色照著世間亦作琉璃色如把火入山照見種種色言欲顯大乘等者問如釋迦所照境為金色答疏云欲顯等表一乘無二乘等果可重者七寶中金為最上句寶重己物故表此法華可寶重故故唯金色也言衆德圓備等者問何以燈明佛所照境以衆寶莊嚴作琉璃頗梨色答疏云衆德圓備等意表此法華經衆味具足之經也言互影彰者釋迦光照金色者影取燈明世界亦作金色燈明照世界作琉璃色影取釋迦照世界亦作琉璃色也言梵云吠琉璃等者即青黃赤白色也章敬云相傳釋迦云從山寶即須彌山南面寶此寶作青色一切真寶皆不能壞亦非煙焰所能鎔鑄鬼有通力破為器焉或云是妙翅鳥聲鬼神破之以賣與人間也言西方暑熱等者敘玄應法師破也西方暑熱土地無氷西方既有頗梨又復無氷明知石作此上是玄應法師經音中不正義也疏主前來引智度論頗梨是氷化作西方既有雪山霜雪經夏不消嚴疑特甚何得無氷何妨有千年氷化作耶言暑熱者約大體說問此琉璃等皆是燈明佛光中所見東方事何以言西方等答此疏中但解智度論中頗梨義非以解此經文然此但是疏主敘他文非自義若不爾者智度論但言石室中千年氷不定言西方何得將西方難他故知敘彼言此聞法也者經云如淨琉璃中等言佛放光自映者疏主解也靈山會上遙見東方世界佛成道向紫磨黃金色身上更放遍身光只如丈六四面光各長丈六通向此身光中見紫磨黃金色身如琉璃筒中見真金像相似也自映也言或衆映佛等者第二解也東方世界有菩薩聲聞梵王帝釋繞佛坐各各自有身光遙見紫磨金色佛衆人見光裏坐如琉璃筒中內現真金像言一頌勤戒者一偈精進及持戒也經云或有諸比丘在於山林中等者貞云珠在蚌復則命存蚌失珠時即便殞沒比丘持戒如蚌有珠若破戒時還如死蚌問何故科云此明菩薩經云而說比丘耶答比丘即是菩薩故欲顯在家行菩薩行皆能持戒故言精進遍策故戒等者問何故精進居先持戒在後答精進遍䇿三業故居先戒是學本故居後也言一頌施忍等只如施中有財施法無畏施忍有三諦密法忍耐怨害忍安受苦忍言頌禪定者經云深入諸禪定者根本智名深入言一頌智慧者又見諸菩薩知法寂滅相者謨云一切諸法本無自性無自性則無生無生則無滅無滅即本來清淨清淨即是自性涅槃經云諸法從本來常自寂滅相言欲聞成也者經云爾時四部衆者是言前長行中等者問長行但言二十億菩薩不言四部衆如何前言菩薩頌言四衆耶答疏言此言四部衆互相顯故長行云二十億菩薩影取長行亦有四衆也頌中言四部衆影取頌中亦有菩薩言前據發心等者本來是四衆長行已發心修行即名菩薩頌言約本但言四衆也言長行有四者一傳燈眷屬二因說此經三時節短長四大衆安樂言此初也者述因說此經也長行云是時日月燈明佛從三昧起因妙光法師說大乘經名妙法蓮華今頌云天人所奉尊適從三昧起等者問燈明說法華妙光證經云世尊既讚歎令妙光歡喜釋迦說法華文殊證知若爾燈明既讚妙光釋迦何故不讚文殊答文殊證經了便向東方海娑竭羅龍宮去不在會中故不讚也妙光在會所以讚之問何故釋迦說經毀責鶖子燈明化菩薩利根故讚也問光中所見八風尚不動搖何因妙光法師佛讚便生歡喜答爾示現喜相妙光亦離八風也言能引衆生至菩提等者問何名世間眼答日月證明佛八子皆師妙光妙光教化令其堅固阿耨菩提生衆生之智慧也言時節短長者長行云六十小劫不起于座時會聽者亦坐一處六十小劫身心不動聽佛所說謂如食頃今此兩行述經云世尊既讚歎等者試勸所作也問何故空勸精進答今約衆行之中精進為首能遍䇿三業諸行故故先勸也諸出世皆精進也言世間空虗者問何故悲惱答疏云世間空虗言此初也者一頌勸勿生憂經云聖主法之王安慰無量衆等者有當來可依投故又示現入滅實常樂我淨故一切諸佛利益同故俱利衆生也言此授記者長行云告諸比丘是德藏菩薩次當作佛號曰淨身多陀阿伽等今頌經是德藏菩薩於無漏實相等者無漏無為體常住故無漏有為離顛倒故名為實相菩薩於此理中而悉通達言初一頌現入涅槃等者長行經云佛授記已便於中夜入無餘涅槃今頌中經云佛此夜滅度如薪盡火滅等者薪者柴也月令注曰大可折曰薪小可束曰柴謨云薪如根熟能感之衆生火類如來能應之智身衆生緣盡有類薪無佛智息時還同火滅或薪者喻一切衆生善根火喻佛衆生善根若有感佛不滅若無善根佛即入滅也如來出世本為教化衆生衆生既度盡如來入滅也言後一頌現失良醫等者經云比丘比丘尼其數如恆沙等者醫師喻中經云是時諸子聞父背喪心大憂惱而作是念若父在者慈愍我等能見救護今者捨我遠喪他國自惟孤露無復恃怙常懷悲感心遂醒悟乃知此藥色香味美即取服之毒病皆喻言第二善堅實等者經云是諸八王子妙光所開化堅固無上道當見無數佛言若依小乘言於三等者緣經文中有無數佛字所以解無數佛來處從後向前來名逆云勝觀者是相好劫初逢佛也燃燈即八九十地第三劫初逢佛也釋迦牟尼是地前一大阿僧祇劫初逢也昔時釋迦身為瓦師時逢古釋迦牟尼若大乘從因向果數若小乘從果向因數也言初劫逢釋迦牟尼等初劫初不唯見一釋迦佛更逢七萬五千佛皆於彼佛邊供養恭敬修行諸行也今釋迦往為陶師逢一佛名釋迦牟尼佛并二弟子名舍利弗目乾連侍者弟子名迦葉阿難陶師見已遂發願願我當成佛一如今釋迦弟子等皆同從此便修行因圓果滿得成佛亦名釋迦乃至第三劫滿百劫初逢佛名勝觀此相好劫但逢此一佛教化便得成佛也百劫修相好劫者若准大乘千劫修相好萬劫學威儀也言翹足讚嘆等者案本行經第三發心供養品云我念往昔有如來出現於世名曰弗沙是時佛有二弟子勤修梵行一名釋迦二名彌勒爾時彼佛觀二弟子成佛前後觀見慈氏於先成佛釋迦在後釋迦所化弟子衆生先根熟如來作念云何令彼根感相會一人根熟即易多人則難即便語釋迦言吾欲遊山汝可隨後在路却教釋迦取尼師壇爾時彼佛先到山坐琉璃窟入火界定釋迦見已心生歡喜合十指掌翹於一足讚歎彼佛天上天下無如佛十方世界亦無比世界所有我盡見一切無有如佛者新翻云天地此界多聞室逝宮天處十方無丈夫牛王大沙門尋地山林遍無等彼佛便記於來世過九十四劫當得作佛號釋迦牟尼按佛藏經云彌勒發心先四十劫釋迦方始發心若爾如何釋迦先成佛答釋迦勇猛超彌勒四十劫故先成佛讚歎底沙佛超九劫所以經云往往言過去九十一劫有毗婆尸佛為雪山童子求半偈捨身超十二劫為薩埵王子捨身餓虎超十一劫為善仙人布髮掩泥超八劫三度共超四十劫又以理准所超時節非唯在百劫之中讚底沙佛超九劫定在百劫之中餘在三劫之內布髮掩泥在第二僧祇滿所餘二位可通三劫仍須除苦七地已前彼時未能捨身命也言若依大乘第四依菩薩等者隱法師云涅槃經始終有十六分義楷定邪正如世間彈有十六兩楷定無遺賀云地前有八地上有八且地前有八為凡夫說四諦苦空無常無我對治執身為常樂我常又對治外道說般若除執我倒為闡提說信除不信倒為聲聞說大智令除執著三昧除為緣覺說大悲除趣寂障此名地前八地上八者入初地離分段死及煩惱分證真如即得常樂我淨為四計成八也地上地前成十六分義也言古來配在第十地等者第四依菩薩供養八恆佛疏主意配第四依在相好劫也古師配在第十地所以言今亦未定引真諦三藏第四依中在相好劫為正言真諦三藏釋言初劫等者配位也有兩解一云見道已前初劫為第一依初二三地為第二依四五六地為第三依後之四地為第四依二云地前初劫為初依初地至七地為第二依八地九地十地為第三依相好劫為第四依上配二十配六恆沙了又有說云初依菩薩供五恆佛第二依六恆佛只於五上帖一第三依供七河只於五上帖二第四依供八河只於五上帖三此順疏中八恆沙佛當見無數佛若數二十六河沙道理又別若八王子是八地已上菩薩更供養八河名得成佛名當見無數佛若是初地菩薩更供養二十一河沙佛名當見無數佛言所以今言得入等者由引真諦解第三劫七恆佛明知八恆在相好劫也是故得入八地仍言當見無數佛也言此初也者一頌憶八王子也長行經云其最後成佛者名曰燃燈頌言天中天者衆生類中天最勝諸天奉佛尊勝於天故說如來名天中天也言具六失者心常懷懈怠已下六句經文便成六失也言第二貪著等者已得名利不捨未得名利更求也第五應習不進第六已誦廢忘也言族者類也等者四閭為族閭即里也五家為鄰五鄰為里二十五家為一閭四閭即百家也言淨因有二等者長行經云是人亦以種諸善根因緣故得值無量百千萬億諸佛供養恭敬尊重讚歎今頌言亦行衆善業等言二果者得成佛號曰彌勒自利果也廣度諸衆生利他果也淨因家之果名為二淨果問二果既在未來何名為憶答文殊憶念得觀未來名憶何失言此初也者初一頌即人也長行經云彌勒當知爾時妙光菩薩豈異人乎我身是也求名菩薩汝身是也今頌云彼佛滅度後等言此即法者長行經云今見此瑞與本無異是故惟忖今日如來當說大乘經名妙等今頌云我見燈明佛等言此結成等者經言今相如本瑞等者雨華動地名為本瑞也實相義者一乘理智為實相放光動地為助發言雨道芽生等者如世間雨略有四種一定風除邪見風故二壓塵除惑業塵故三滋發萌芽令發勝心故四諸苗增長增長勝法故此意指在方便品佛說一乘名法雨也鶖子回心根熟名智芽生文殊菩薩問彌勒菩薩意言如來欲向方便品中斷鶖子等疑為說一乘名為法雨法空智初地門中增長菩提智芽也乾符六年冬溫洲開元寺講大慈恩比丘弘舉傳寫供養元久三年丙寅正月二二日書寫了為興隆佛法利樂有情而已凝圓生年五十八
