body:
  text: 鏡水沙門栖復錄言一法王啟化等者若准經中要者只此兩爾時也時無別時約法以辨第一約從如是我聞直至作禮奉行散說能聽或一年半歲佛說法了眾生聞法了於中大經生滅簡之不取攬彼眾生聞經之時事緒究竟總名一時啟化者能化也法王者佛啟化即開化佛自開法教化眾生通他化身准簡法身自受用身也問爭知兼取他受用身答下云王城鷲嶺等以此為證證取他受用身也言機器等者即所化也根器即三乘眾生根性皆成就名為咸集佛為能說三根為能聽一會說聽事說總名一時牟云眾生根熟為能感如來說法教化為能應言二說聽等者約眾生根熟欲得聞法如來利他善根為說說聽同時無前無後正是眾生根熟時便是如來說法時如鷄附卵啐啄同時若根未熟為說法即稱怨大喚我不相犯何為見捉若根熟已後不為說法佛有利生失時之過三十年前根未熟未是如來說法靈山會上大乘根性熟正是如來說法時經云說時未至故今正是其時決定說大乘問機器咸集共相會遇二時何別攝釋問答初約說聽時所為事須畢經多剎那總名一時後依說聽感應同時名一時有斯別也言機感應化等者此兩句疏文解第二義啐啄同時共相會遇時分無別義二又解此是聊簡前兩義法王啟化根器感集義共相會遇時分乘別義上句料簡第一義下句第二義是疏主引佛地論云文標也緣前第二義中辨根感同時事亦引論文了向下更不解下重解盡是解前第一義中一者道理時二者唯識時生滅則同於中法體相分二種別所以向下作兩重道理解也言初就剎那相等初啟解前義剎那者前剎那滅後剎那生一念之中有九百生滅時無別體約法而立約長即長約短即短中容即不長不短此是不相應中世時此是假法假法無如非因緣故即剎那剎那相讀假名一時此三分位上假立不從種子生百法云三分位差別故言一者道理時等者大乘過未無體只於現在一剎那法上望前後假立三時過去立名前未來名後現在法上有酬於前引後之故立三世若前念法未滅後念亦不生事須得前念法滅開避引導後念法方生即以現在一念法為能引未來法為所引將能引就所引以立名名未來過去法亦滅現在法酬過去法起來即以現在法為能酬過去法為所酬將能酬就所酬以立名名過去即以所酬假立過去即以所引假立未來對彼過未說為現在只此現在一念法上假立三世道理名道理時也言說聽二徒等者牟云此約一期現在法上依剎那生滅之義論其酬引三世之事也言即此現法有酬於前等者哲云三性現行中無記法從前種子生可說酬前既是無記不能熏種如何有引後之義且如六識中異熟生劣無記第八前五所豈能引後故不盡理若善惡種子生現行已後能重種此義有又如來果位現行法現亦不熏種佛無熏習故今應正釋依種子上建立三世即有酬前引後之義從前剎那生故即是酬前引後種生故即是引後也謨云不然疏中明言現行法誓施以種子義解酬引謂蠧生木還食於木疏意說彼五薀現行剎那生滅若前念後念終不生即說前念能引後念誰種子方名為引酬不妨種子三義成疏主意共有四種一與彼生滅作依故五薀諸行剎那生滅二依現世法以辨生滅故即此現法有酬於前引後之義三依生滅法以辨酬引即以所酬假名過去未來是能酬現在為所酬故對後未來假名過去四依酬引法以論三世即以所引假名未來過去是能引現在是所引對彼過去假名未來於過去復名現在言對此二種等者則云對過去以立能酬對未來而稱能引如斯二種並唯現現在過未二世並於現在法假立大乘過去皆是假也言五薀諸法者今說聽二從總有五薀只一剎那現在時已落謝過去也言非一生滅等者問經言一時莫不只取此三世生滅時耶答不取也若據法華一會一彈指頃六十五剎那一剎那間九百轉生滅大經時盡不取唯取事緒周備究竟總名一時非一生滅之一時也言二者唯識時等者唯遮外境簡異小乘識表內心簡清辨菩薩撥無內義謂過去未來現在長時短時行解不同大乘過去已滅無體未來未生又是無體只於現在有體法上變起過去未來現在相狀從靈山會聞說大通智勝佛日月燈明佛便於識上變作過去長時解若說大智舍利弗當來作佛號曰華光便作未來長時解若聞道龍女成佛便於現色心之上作短時解長時短時過未現在皆於現在一剎那色心之上假安立也問道理時唯識時一種是現在法上立三時有何差別答道理時約法體本質說唯識時約相分變起說問莫識心上變起長時短時莫便是經首一時否答不取也經中言如是我聞一時取彼識心之上無限長時短時積集一處聞經事周究竟總名一時也言如夢所見謂有等者引例成也如無性攝論云處夢謂多年覺乃須臾頃故時雖無量攝在一剎那又西域記云施鹿林東行五六里有窣堵波傍有涸池周八十餘步聞諸先志曰數百歲前有一隱士於此池側結廬併跡愽習伎術究極神理能使瓦礫為寶人畜易形但未能馭風雲陪仙駕閱圖考古更求仙術其方曰夫神仙者長生之術將欲求學先定其志當築壇作法命一烈士手執長釰立於壇隅併息絕言自昏達曙求仙者壇中而坐手按長釰念神呪收視返聽達明登仙是人既得仙方遂訪一烈士營求曠載未諧心願後得一烈士先與人傭力艱辛四五年一日違失主人遂被笞辱又無所得悲泣巡路隱士見命數加優贈潛行陰德感激其心烈士屢求効命報以恩德隱士曰我得汝來彌歷多歲幸而會遇奇貌應圖非有他故願一夜不聲耳烈士曰死尚不辭豈從併息於是故壇場受仙法依方行事昏暮之後伺人務隟隱士誦呪烈士按銛刃殆將曉矣忽然發聲大叫苦苦是時空中火煙雲隱士疾引此人入池避難已而問曰誡子勿聲何以驚叫烈士曰受命之後至夜久昏然若夢見昔事主人躬來在傍感荷厚恩忍不共語彼人震怒遂見煞害更受中陰身遂見託生南印度國大婆羅門家乃至受胎備經苦厄荷其恩德忍不言之洎乎受業冠婚求親生子每念前恩忍而不語闔家親戚咸見恠異年至六十而有一子其妻謂曰汝可言矣若不言者當煞汝子我時憶念已隔生世自顧衰老唯此稚子寧忍屠割因止其妻念令無煞害遂發此聲耳隱士曰我之過也此魔嬈耳烈士感恩其事不成憤恚而辨曰諸夢與覺萬境皆心故引夢時明覺位如二人在獄一人明日放即嫌夜長一人明日死受刑復嫌夜短故知時分無別唯是識心自變作長短言聽者心變等者謨云夢者見多生其實唯有心都無多生境聽者變三世其實唯有心實無三世境問說聽二從並皆心變何故唯說聽者耶答路云說者以達境無故疏不言說者如夢問道理唯識何別答道理約法體如是不可改易如春秋冬寒暄等別唯識但隨自心變長變短成過未等若是聽者渴慕於法一坐聽受不覺寒暄志士惜日短愁人知夜長言唯意所緣者解體不相應中時也然此五八唯現量是實不緣假第二士向內緣緣第八故今言時者唯意所緣不通餘識百法之中是不相應中收五薀之中行薀攝十八界中法界收十二處中法處所攝若法處法界攝八十一法謂心所五十一不相應二十四并無為六計八十一法也行薀攝七十三法也時即是八十一法中一數故唯意緣通能緣彼十八界故問意緣於時三境之中是何境攝答若獨緣於時不兼緣所依實法所變相分與見分同種獨影境收若兼實緣相隨所依即相質同種即帶質境攝樞要云性境不隨心獨影唯從見帶質通情本性種子等隨應相國云總攝諸境有其三種一者性境諸實法境名為性境色是實色心是實心此境各自有體性故有三不隨心一性不隨如實五塵唯無起性不隨能緣五識通於三性二界繫不隨如第八識是一界繫所緣種子通三界繫或身在上地眼耳二識緣欲界境識上地繫境下地繫二禪已上眼耳身識緣自地境識初禪繫境自地繫三種子不隨由見相種子各別體故二者獨影境唯從見分種子所生性繫種子皆定同故如第六識緣空華等皆是隨心無別體用彼境攝故名獨影境即唯獨有影像而無其本質三者帶質之境謂此影像有實本質如因第七所變相分約從本質是無覆無記亦從見分是有覆所攝亦得說言從本質種生得說言從見分種生義不定言種等隨應之言因不定義義顯三境依心聚生有唯一境或二或三而不定故唯一者如前已說有二者如第八識緣自他散境心王是性境所緣之境有實用故若五位心所即獨影境攝如緣種子不生現故又五識緣自地五塵是初性境亦得說名帶質之境變相緣故又如第六緣過未五薀是獨影境亦得名為帶質境熏成種子生本質故有三合生如因中第八緣定果色心心所緣是獨影心王所緣是性境實故亦得名帶質之境以第六所變定果之色為本質故問長等依色處收時依五薀施何不向五薀實法收答長依實色上假定隨依色處收時依眾法立假故不得而五薀實法收也故不相應行薀收一得二命根三眾同分四異生性五無想定六滅盡定七無報八名九句十文十一生十二老十三住十四無常十五流轉十六定異十七想應十八勢速十九次第二十時二十一方二十二數二十三和合性二十四不和合性言此言一時等者通妨難中初別也問言一時者一為約剎那名一時二為約相續名一時三為約為春夏秋冬四時名一時為約六時行道名一時為寅卯等十二時名一時四為約成道後數七月或一年半年中名一時不答疏言此言一時一則不定約剎那等言但是聽者等者問取何等時答疏言但是聽等言不定約剎那等者如來於一語言中演說無邊契經海此說經時則眾生聽時多剎那無量剎那方解也或有說時久聽勝聽勝亦久即是三根聲聞之中下根五百千二百又如來三遍說下根第三遍方解此解說時亦長聽時亦久如說黃絹幼婦外孫韲臼此是曹娥婢上言曹操開宇讀解有前後一又便解一又行三十里方悟言亦不定約相續等者相續者身義能說能聽人無始時來相續有此身問莫向相續身上說時答佛一音聲中現一切聲一時之中現一切字此約出生若約聽者是菩薩得陀羅尼或諸根互用聞一字時通達無量字或為鈍根者延短念為多劫多劫方解為利根者促多劫為短念短念則解故不得約相續身上說時也言不定約四時等者春夏秋冬時有日月處則有四時上天無日月處四時便不定也亦向下轉六時者寅朝午時黃昏初夜中夜後夜禮懺之六時也八時者即八轉聲時體業具謂從屬依呼十二時者即是平旦寅日出卯食時辰等言一日一月照等者問何故不取前來諸時答疏言一日一月照四等賀云此方日向北即長北洲日向北即短若北洲日向南長南洲日向南即短問何故如此答南洲北洲兩洲日近山來行著山正面分位即長去山若遠即短是故南洲日長北洲日短南洲日短北洲日長若准此方解日行之道有南有北此世界向南即狹向北即闊故論云南瞻部如車夏月行著向北𤄃路即日長冬月行著向南狹路即日短也暄寒不定者南洲日向南路行照行著南海水氣便寒北洲日向南行照著七金山即熱南洲日向北路行照著七金山金氣即熱北洲日向北行照著北海水氣即寒也近遠不定者南洲日向南行即去山遠北洲日南行即去山近也南洲日向北行即近北洲日向北即遠晝夜不定者南洲日午北洲夜半東洲日沒西洲日出諸方即四天下也言恒二天下等者南洲日午西洲日出此二天下同起用起用北洲夜半東洲日沒此二天同起用也故俱舍云日月迷盧半五十一五十夜半日沒中日出四洲等大論說日火頗胝所成月水頗胝所成也言又除已下者下之言即是四天王天日月照著處則有長短暄寒等事便與四洲同也言上諸天等者日月照不著處便無四時暄寒等事言經擬諸方等者問何要說上諸天等無四時八時耶答疏言經擬上地等若說四時流行不遍已上諸天無四時也唯除北洲餘三洲中皆流通故問如此洲日出處是東方未審四洲方同否答餘洲日出不在東方問餘三天下既法不行何故此言諸方流通答東西二洲亦有通此經故言坐亦不定約成道等者言如是我聞成道時亦不得佛於一會通報通化直見不同并見報佛土成道遠自我得佛來等凡夫二乘見化佛等成道近出釋氏宮去伽城耶不遠是言經擬三乘等者問何不隨化人所見立長時短時答疏言經擬三乘等若約年代即唯遍凡夫二乘不通大菩薩但總立一時也言然諸經中有說相續等者問何故不經首言如是聞六十小劫時耶答懈怠者實經六十小劫精進者謂如食頃故知不約相續時也言有說四時等者涅槃經二月十五日盡時此亦不定上天無盡人中四洲盡有不定南洲是夏西洲是秋北洲為冬東洲為春輪轉不定只就此間說亦不定只如周家已前十一月便為正歲如今十二月為正當往時二月故知不定若說嚼揚枝時即寅時說金剛經云飯食訖洗足已敷座而坐日正午時即是前十二時收言上生經云等者此皆前六時攝也言有說成道已後等者問十二年中說有十二年後說空等三時中方說不空不有若取成道後第二七日說華嚴經第三時教不定也言雖有是說等者金云謂說四時八時六時是隨一方城也說二七日四十年是隨化土眾生直見不同且作是說言仍非初總等者但是經中說時非經首之一時也言問處中有淨等者則云申問問意佛居鷲嶺此即穢處分身佛來變穢為淨淨穢處定時何不定何不隨凡聖而說長時短時是此問意言答說處標等者淨則實淨穢則實穢淨穢決定不是穢則是淨不是淨即是穢離此已外無別方所故言淨穢決定時有三一者利鈍別若為利根者一聞即解經時促為鈍根者悟解遲經時節長二者聖凡有別聖經時節長凡人經時節即促三者意樂有別或有樂時促者則促長為短樂時長者則延促為長以時不定故不別說也時但總言也言第三說教主者經言佛問經通五人說一佛二弟子三諸天四神仙五處變化未審此經是誰人說答表不是餘人經言佛也言梵云佛陀者具足應言佛陀就梵語中意從生善故略云佛自是梵語略不是唐中略也及至疏解則依具足梵語解且古翻譯云佛陀者此云有慧之主此有二義一者十地菩薩名為有慧佛是有慧人中主故名有慧之主二者只此佛身中四智名有慧佛無漏五薀假者身名主是有惡之主此古譯云慧主其義雖同不如言覺者新翻云覺者慧則是覺主則是者有覺之者故云覺者者是五薀假者假者身中有智慧故云覺者問一切眾生總有五薀應合言者答空言者即得不合言覺者凡夫應言無之者問何名覺義答覺者覺察覺察煩惱妄想如人怕賊入來先且覺察凡夫有一百二十八煩惱入五薀舍中來向無明被下𮄊生死長夜不覺不知二者覺知身中有二種佛性欲得成佛事須覺知此性問慧之與智何別答若就證無為理覺即名慧若斷有為煩惱即名智言一自覺者覺自身中有此菩提涅槃二種性不同凡不自覺佛自覺能斷二障得成於佛凡夫不懼來世受於苦果今生輕慢生輕慢死種種非違卒陳難盡名不自覺佛一一自覺知證無為真如智無一物而不知言二覺他等者令他覺悟身中有此菩提涅槃性問二乘證生空知生死是幻自證知身中我空不造諸業應名為佛答不然雖唯自覺唯覺自一身不覺察一切眾生不得名佛佛自覺了又覺察一切眾生皆令斷惑證真故名為佛二乘只緣不覺他故滯涅槃言三覺行圓滿等者菩薩二覺未滿少分滯生死涅槃問何名二覺未滿答一自利未滿根本智證理斷惑後得智變影緣如根本智證理未滿斷障未盡總名自利未滿問何名利他未滿答緣事後得智名利他初地菩薩化百三千界內眾生離此已外便化不得故言未滿如來覺行圓滿覺之行即三僧祇劫行滿也若約具足而說覺亦滿行亦滿言佛地論云具一切等者問何名一切答一切者世出世間有漏無漏情與非情故名一切法真如理是一法此一法遍在有為無為萬法之中無有一切不依真如只此真如與一切法作所作真如得一切之名令取他名名有財若然者則真理名一切根本智證盡一切理能證之智從理生名名一切智二者約用立名煩惱名一切智斷此一切煩惱名一切智斷煩惱障也言一切種智者若色若心一切種類名一切種其後後得智總別而知一切種類真諦俗諦有漏無漏有為無為有情無性如是眾生若干種心後得智悉知解盡一切種類從境立名名一切種智斷所知障也言能自開覺者即自利智也開者出生顯證之義起自本智斷盡煩惱妄想證自真如理名自開覺智也言能開覺一切者即自利利他如三大劫滿金剛心後解脫道內證得本智三身具足四智圓明名能自開覺後得智中起大悲心利益有情即亦能開覺一切眾生若心若境如來能知今眾生斷惡修善起智斷煩惱亦能開覺一切有情若二乘唯有本智而無後得智唯有羊鹿身而無車也上四法解也言如睡夢覺者喻解也即是自利智也如又睡裏作夢覺後自知餘人不知根本智證理唯自知不通餘知問後得智變影緣如豈不是知耶答只此變影是不知也以不能親緣故更解云此上但取自知餘人不知義甚好若言睡覺後却觀夢中事此却觀之言向法轉便以後得智其睡人正睡之時亦不知道作夢徒睡覺了返觀方知便似後得智今取地前凡夫煩惱未斷睡未覺未得真覺常處夢中初地門中證得妙平二智亦名腄夢覺知此名分覺佛位令覺智也言如蓮華開等者利他智也後得上利答眾生功德名蓮華開也蓮華不開則已開則見者覺香佛知不逢則已逢則眾生霑益又云蓮華若開必見其臺後智說法必能悟理也故名為佛論家結上依論雜明六个智了一切智等者緣前來論家敘知不盡疏主依疏重分本後各有六人智言觀於空智者此有二義一真如理是真空之性也知證此理名觀空智二者真理之上無我法二執名為空智證此理名空智對後得智是有立空智名也言理智者對後得緣事智立理智名言真智者智證真如對後得了妄立真智名言無分別智者有二義一離能取所取相名無分別二真如理是無分別智證此理名無分別智初證之時不見能證所證如末尼天皷無思成自事無所分別種種佛事成言語道斷心行處滅心與境冥理與神貪境如智智如境名為如如名無分別智謨問云無分別智正證如時為是親緣為是變影若親緣者心外取境唯識不成若變緣者與後得智復有何別答先定二分有無然可會通成唯識云有三師說初云此智見相分俱無說無所取相故二云此智見相俱有帶彼相起名俱緣彼故三云此智見有相無說無所取不取相故雖有見分而無分別說非能取非取令無慈恩取第三說准此此智是不變影緣於真如與後得智別問何名心心所法四分合成此無相故答然此真理識實性故雖親緣彼境非離心唯識不遮不離心境不以親緣便非唯識雖不變影狹帶彼境有親相分名非不以四分合成然之所以有親有疎辨帶已相帶者是心屬於能緣已相屬境屬於相分謂於能緣心緣所緣相分時帶起境體之已相名帶已相由是小乘師破大乘云無分別智不帶起真如已相真如聖智應非所緣緣唐三藏云汝小乘師不解我大乘義言帶者有二一者狹帶即能緣心親附境體而緣二者變帶者即能緣心變起相分而緣言相者亦有二種一者體相相二者相狀相即有為若無分別智緣真如時是狹帶體相而緣是所緣緣若有漏心心所及無漏後得智緣境時即是變帶相狀而緣是所緣緣攝大乘論智殊勝品云由離五種相名無分別一離無作意相便無分別簡眠醉等二離尋伺等簡二定已上三離想受滅相簡二無心四離色自相簡所造色五離於無漏有分別心離此五相方是此中無分別智也言如所有也者攝三解一如者指斥之詞一切真俗二諦諸法自性名如所有也此諸法性知舉境顯智名所有也二云如是真如此前諸智盡是真如之上所有名如所有三云一切染淨法名如所有法之真性即是真如智能知此所有法中真如之性名如所有也攝云初二解善謨云此上七智皆須證如方名此知如家所有知名如所有智又真如為能有智為所有亦同維摩經云從無住本立一切法若尅性而言如是真如智從此起名如所有真如與一切萬法為增上緣若就能生所生真如為能生智為所生真如為能有智為所有名如所有也言總相而言等者唯識第一云由斷續生煩惱障故證真解脫由斷尋解所知障故得大菩提云總相者未是了義說據實煩惱障不唯空障涅槃兼障菩提所知障不唯空障菩提兼障涅槃空言斷煩惱障者約增勝且就一邊說故言總相也上本智了言一切種智者能知一切種智類法故言覺有情者即是前來亦能開覺一切有情能化生故言如蓮華開者化度云若蓮華未開未有香氣華若開已香氣遠騰眾皆聞見喻佛種智說法化生名聞遠振言觀於有智者對根本觀空之智名有也言事智者對理名事也言俗智者對真名俗言後所得智者簡無分別智後時得故名後得智即了俗由證真故說為後得智一達俗差別二變影緣如不是親證問七地已還菩薩本智證如一剎那後方起後得達俗利生可名後得八地菩薩本後俱時同一剎那無前無後動不妨靜靜即動何言後得答雖一時望前前位論八地望前今後方得名為後得亦不相違佛果位中亦許本後二後二俱一時起言盡所有也者攝二說一云謂後得智通緣真俗盡於一切所有總緣所有者指行言也此差別法智悉能知舉境顯智名盡所有也二云備攝有無名盡所有智悉能知名盡所有也言總於而言斷所知者此唯是後得智言斷所知障者所知不是障障不是所知以障障所知故名所知障障所知境令智不分明後得緣事由是偏說斷智障得煩惱障理正智證真是故偏說斷煩惱得其實互通言准諸經梵等者西方若凡若聖皆傳此名就一切名中此最是勝名也佛合經首安著也問佛有十號何故唯教安此一號不安諸名耶答以此一言合諸德故如佛地論偈云自在熾盛與端嚴名稱吉祥及尊貴具足如斯六種義應知總名薄伽薄伽者聲也梵謂具德若有為此薄伽聲者自能破四魔必具六德一自在德永不繫屬諸煩惱故二者熾盛德炎猛智火所燒鍊故三者端嚴德三十二相所莊嚴金色三十二等四名稱德佛之勝名無不知故名聞滿十方等五吉祥德常起方便利眾生作吉祥事故六尊貴德世出世間咸尊重故天上天下無如佛等若稱餘號闕於六德問外道亦稱本師名薄伽梵覺佛法弟子亦稱本師名薄伽梵未審有何簡答謂簡外道更如佛字即真諦所譯金剛般若言佛薄伽梵也問既佛教安置佛薄伽梵何故空安佛字答國云有三義故但名佛一秦人好略二隨方生善三就勝義故一秦人好略者薄伽梵字即多佛字略二隨方生善者此方之中言佛最生善三就義勝者義勝中有十義一覺勝天皷皷有四德一能知怨來言怨來去則言怨去佛名亦爾能覺眾生三毒煩惱若生若滅言滅二能護諸天能破修羅佛名亦爾能救三苦能破四魔三天皷能令諸天受五欲樂佛名亦爾能令眾生受出世樂四天皷能令諸天生貪著心佛名能令眾生生出世心此上四德皆皷功能總名覺勝天皷二不由他悟由無師智覺知一切法故三斷二無知無知者即煩惱所知障也四已過眠夢凡夫未得真覺常處夢中如來不眠不夢故云已過五如蓮華開智日光照觸蓮華即開十地行圓佛智自發六性淨無染因中真如雖有煩惱五義不染一無相故譬如煙霧不能染空二非對治故譬如熱䥫不停蚊虻三非處所故譬如大石不能住空四無轉異故譬如白涅而不緇五妄不染真故譬如鉛刀不能斫石因中有惑尚不能染果中惑盡豈能七具足三義三義即三身八具足三德謂智斷恩德九具三寶性同體三寶十自知令他知以智慧力證真如境名名自知復以慈悲力說十二分教令他知也具此十義故偏舉佛名不說餘號也言問此三身中等者如是我聞一時佛此三身中何身所攝答疏言答准處等小乘宗說一者生身王宮生身也二者法身五分法身謂戒定慧解脫解脫知見香三者化身即猿猴鹿馬等問大乘宗法報化身三身中何身說法答定通報化若准處准根應聲聞而為化佛處即是王舍城耆闍崛山中即是准處也根即是二乘二乘凡夫既是正為佛即是少化身若准處准根定是穢土化身說法華經也若准文准器應菩薩而即報身准經文常在靈鷲山及餘諸住處乃至我此土安穩天人常充滿准器者法華經流通分中傍為菩薩文殊普賢既在會即報土報身言感者根器不同者即是聲聞菩薩二種不同也應現故通報化佛身本來無二只是隨所現不同對菩薩現報身對聲聞現化身猶五个人者月不同四人東西南北去皆見月隨人去一人坐不動見月還不動也月體是一本來不動也言王舍城鷲嶺等者釋所由也言問何不言劫盡水漂風漂云火灾耶答三災中火灾初故所以偏舉也言我土安穩者佛身雖在一處隨根所見不同問如何一種是佛土何故有燒不燒答一人初地他受用土為所依能依之向上有一百人三千大千世界一百人世界總被燒不他受用土不燒問爭知是他受用土答經云常在靈鷲山等鶖子聞經即化佛也文殊在中即報佛也言應化非真佛等者疏主意佛既通報通化兼合有彼身在用之處即合有體有報土處即有法身法身既有法身即合能說法所以引天親攝論證法身是真能說法人問論文只證應化非是真佛非是真說法人不證他法身是能說法人疏主何故加添云推功歸本即法身說耶答疏主善得論論意但是返成法身是真說法人所以偏說報化非真無實五薀無實心心所如鏡中火譬如幻人與幻人說法若法身不是真說法人應化對誰得名非真耶所以向下引證住法界藏明法身說也言住法界藏等者此間解藏與前勝鬘楞伽解藏別彼以煩惱覆真名藏此間法性真如名法界含容一切無為塵沙萬德法身住此名住法界藏問如何一體之上有差別義答論云雖此身土體無差體而屬佛法性相異故相則配佛性則配法佛者是法身佛與大功德法為依止為體相則名身身持自體名土土即是藏即是法性土問何名法身說答二義名說法一者十二分教從法身流出名說法二令智生解邊名說法問何人聽法答六十六人是聽眾大圓鏡智妙觀察智三个根本智證真如時各與二十二个心心所法計六十六人問說何法答根本智證真如時生一味清淨相名法身說法若言一味清淨早不是說法正證理時無生解心但是一味清淨相也言佛地經等住等者證化報身說法也此他受用身所居之土為諸菩薩現通說法其座有十相土有十八圓滿且十地論第十云大寶華王座有十種相一者主相如經得是三昧現在前時即有大寶蓮華出現二量相如經如十阿僧祇百千三千大千世界故三勝相如經一切眾寶間飾莊嚴故四地相經云過於一切世間境界故五因相如經出世間善根所生故六成相如經諸法如幻性境界所成故七第一義相如經光明普照一切法界八功德相如經過一切諸天所有境界故九體相如經大瑠璃摩尼寶以為莖不可量栴檀為臺大瑪瑙為鬚閻浮檀金為葉十莊嚴具足相如經華座身有無量光明一切一切眾寶間飾其內無量寶網彌覆其上言十八圓滿等者佛地論云一顯色圓滿如一切無邊世界二形色圓滿如經無量方所妙飾間列三分量圓滿如經宮殿周圓無際其量難測四方所圓滿如經超過三界所行之所五因圓滿如經勝出世間善根起六果圓滿如經最極自在淨識為相七五圓滿如經如來所都八輔翼圓滿如經大菩薩眾所雲集九眷屬圓滿如經無量天龍人等常所翼從十住持圓滿如經廣大乘法味喜樂所持十一事業圓滿如經化諸眾生一切義利十二攝益圓滿如經滅諸煩惱灾橫纏垢十三無畏圓滿如經遠離眾魔十四住處圓滿如經過諸莊嚴之所依處十五路圓滿如經大念慧行以為遊路金云念聞慧慧是思思行是修慧此之三慧與佛菩薩為遊路也十六乘圓滿如經大正妙觀以為所乘十七門圓滿如經圓滿大空無相無願解脫為所入門十八依持圓滿如經無量功德眾所莊嚴大寶華王之所建立大宮殿中說此契經也故名十八圓滿乃報身說也言此經王城等者屬當經文此約經首佛字以經言住王舍城耆闍崛山即化佛身也言應物現身者應正體智現清淨法身應受用法樂現自受用身應十地菩薩現十重他受用身應二乘二凡夫現小化身言皆說法故言楞伽經中說等者證三身說法也問法身化身說法可知如何是自受用身說法若據自受用身諸根相好一一皆遍如何分身土後言說法答此約報受義名身所依義名土此有二義所云其體周遍佛佛自他不相見若樂相見遍義不成二云其體周遍佛佛互相見若不相見無自在義此是自受用身身土也自受用身說法身說法有二義一佛佛相見互相謨議名說法二者本智與後得智說法三个根本智中證得塵砂功德盡是無言說法破後得智變影著雖不親得一一云皆被騰將來然後後得智中於無名相法上安立名相說此是自受用身說法也十重他受用身大小化身是自受用身邊聽法人金云三身說法應作四句料簡一一說二不說者說一自受用身自受法樂故名一說二不說者般若論云應化非真佛亦非說法者名二不說二者二說一不說二說者如他受用變變化身有所化眾生名二說一不說者自受用身無所化生名一不說三者三身俱說法如楞伽經法身說法令智生解自受身說法自受法樂名說變化身說法有所化生名說四者三身俱不說法如龍軍宗是言由此瞿師羅等者釋現身說法不同之意也經音云劬師羅是梵語此云妙音居士住王舍城中身長三尺自恥短羞見如來自思念言如來有丈六之身紫磨金色每思瞻禮其如短何如來知其根熟現同類身詣門乞食長者隔門見已生希有心廣作供養為說法要言下遂得初果言五百婆羅門者當以青灰塗身以求解脫如來欲化彼類乃為現身還作塗灰之身彼婆羅門見已心生歡喜瞿曇今者學我仙道如來為說法要言下遂證初果言無邊身菩薩等者有一菩薩從東方來我聞娑婆世界有釋迦如來身長丈六我既有此無邊之身當觀彼佛無見頂相乃以竹杖長丈六量之如來現身過於丈六如是展轉上至光明王佛剎常過丈六竟不能見如來頂相菩薩即攝竹杖說偈言虗空無有邊佛功德亦爾設有能量者窮劫不能盡上過虗空界無量諸佛剎見釋師子身如本而無異問既言無邊身菩薩身量無邊廓周法界何得乃言從東方來答若論身量實乃無邊觀佛頂相時乃他身來也引此菩薩意者欲證化身之中有報身報身之中亦有化身不得定准言住小聖之凡夫等者小聖即是小聲聞三乘之凡夫即是四菩提以前一切凡夫觀丈六而無盡者二義無盡一即是凡夫觀無盡二則二乘觀如來丈六身上相好猶不能盡如舍利弗等數世尊三十二相數至第三十二相了更有三十二相乃至無窮故名觀丈六而無盡又准西域記云有婆羅門聞釋迦佛長丈六常懷疑惑後以丈六竹杖量佛身恒於杖端常出丈六如是增高不能窮盡遂投竹杖於地而去因植根焉杖竹修茂被山滿谷因號斯處為杖林焉至今猶存三藏親瞻言今顯主尊等者問如是則總指一部妙法我聞則顯親一時是說法之時何要更說教主答疏云今顯主等又問經通五人說佛弟子諸天神仙變化未審此經是誰人說答疏云今顯等一則顯主尊而教勝二則全生意心由斯所以故標主謨教法隨主決定是勝故君為臣下之主君則臣賢佛為教法之師佛尊定知法勝亦如桂生高嶺良由所附者高也准是佛說更不通餘人也言遊化居止等者正解有二義一居止義二遊化義居止於遊化於城二義總解住字也言古人因此等者古人將住字屬佛字一處解便說佛住既有佛住便有天住嘉禪便將八住義解此中住義疏主意只是住者居止義也然此八住中有二義一者身住二者心住且身住有四一化處住謂十六大國是佛所遊境故二異俗住謂三世諸佛多栖止精舍伽藍是佛所止故三未捨壽命住佛合得住世一切由天魔波旬請佛入滅捨等五分壽唯留八十年謂未入涅槃已前住五分法身名未捨壽命住四威儀住謂行住坐臥四威儀中悉名為住上身住下心住五天住謂布施持戒二種得生天名天住六梵住四無量心住此之中感梵王福名為梵住七聖住謂空無相無願解脫門入空滅見入無願滅愛入無相滅無明佛住無相名為聖住八佛住十力等諸功德中名為佛住具此內外住此而是無而住也言住名雖同者疏主責云住名雖同義意全別若以有住字即言佛住者有經亦言佛在其處其處云何以佛在而配八住然住字屬下即無妨矣言語邃義幽之處等者經云十方世界中無二亦無三者論云無第二獨覺乘無第三聲聞乘佛乘為第一破二歸一古師便道無二者無聲聞緣覺無三者兼無大乘便言破三歸一此即是語䆳義幽之處曾不囑心且如開示悟入之深理會二歸一之真宗未曾屬在心中等由名同理別之文虗張翰墨虗者不實義張由設也援由引也據由也上解住義言梵云矩奢者矩音上音居同去音言摩竭陀等者榞處所也嘉祥云如來說法必依處所證經可信不同外道或云朱鳥銜來或說神山授與摩竭陀者此云無毒害國誓云有犯罪者不行煞戮犯輕罪者以寶贖之犯重者被駈出國故名無毒害國頻婆羅王向前諸王皆都此處言多出上等者此城茅草勝於諸城最勝上故名上茅此草因世尊成道向吉祥長者邊受得草世尊立字名吉祥草自已後總喚此草作吉祥草古人只喚此城作中王舍城即錯也但喚作王城不妨城草立名故言因以為名也言崇山四國等者此說外羅城也宰由乘也周由遍也山城墻直西通一道人遂疾往來不通車馬北闢山門闢由開也以取山形作城城不得圓乃東西長南北狹也周一百五十里也城若四方可定得里數緣依山形作城每面定里數不得但取言一百五十里也言內宮子城者說子城若子城是土打出即合一面十里若隨山形城分段即不定也言羯尼迦等者勿作加音呼此是梵語此云黃華樹華如大母梢堪作香油塗身香聞五十里八戒中不得著香油塗身是也又云似此間槐樹即不定是槐樹此方樹六月華開彼國樹三月華開時節不同彼國取華作香油此間華不香所以不是殊由異也馥由香也爛者盛也言宮城北門外等者此宮城外也此云高顯處亦云塔亦云塔婆提婆達多於佛起逆心與未生怨王共為親友兼勸未生怨王交煞頻婆娑羅王先交未生怨王請佛供養佛受請已與諸弟子從耆闍崛山入城來提婆達多於象厩中借象來以須飲醉遂從城北門放出其象哮吼到如來前如來於五指端端頭也放光光中化出五師子酔象馴伏馴由善也馴由隨也言次此東北有窣堵等者馬勝比丘證得羅漢果欲入城乞食佛言汝今日逢著至極聰明人應少為說法入到城中逢舍利弗本等珊闍耶外道領一百門徒見馬勝比丘威儀庠序進有方舍利弗見已合掌讚歎生希有心遂問云師是誰誰之弟子師說何法馬勝曰我師名釋迦文所說法者諸法從緣生諸法從因滅我師釋迦文常作如是說舍利子聞已言下便證初果於此得初果處時人置窣堵婆記之舍利子與目連自小同為外道弟子二人立誓若得勝法願相付受後舍利子得初果已後顏色怡悅目連逢著問云汝得何法顏色與前有異時舍利子即轉為說此即二人通慧初入佛法也言下證初果言次此正北不遠有等者時彼國中有婆羅門名室利毱多其家巨富金銀珍寶其數無量事諸外道唯不事佛即自念言佛常自說知去來現在之事今可試之請佛家中矯設供養置毒藥於飯中堀火坑於正道可深五丈滿中燒火折木危覆以土蓋之即自請佛佛便受請讚善哉告諸比丘隨我後行放大光明照勝蜜舍悉作金色佛行至城門足蹈門限舉城大動病者得愈箜篌樂器不皷自鳴佛到勝蜜門亦入門已五丈火坑化蓮池池中蓮華一華千葉捧如來足諸聖弟子等一華百葉捧足而行外道作念火坑雖過毒飯仍存時諸聖弟子緣飢便擬喫佛告諸比丘且住莫喫佛說偈呪願令毒藥不能為害皆變成上味外道禮佛懺悔聞法便得初果言宮城東北行等者此是新梵語也言接北山之陽者出宮城東北望則是北山南面日陽北面日陰孤由獨也言既栖鷲鳥等者出所以也問何名鷲峯又名鷲臺答疏言既栖鷲鳥者緣鷲鳥於中住止故名鷲峯也又類高臺者緣山遙者似山及至到向上地平故便似臺緣鷲於中栖止故名鷲臺若准疏主意鷲峯鷲臺皆依鷲鳥於中栖以立其名也言空翠相映等者山色青青曰翠空色碧山色濃空色淡將山青色映空色濃分色將空碧色映青色淡分色言舊云耆闍崛等者此云靈鷲鳥於此食人屍名靈鷲山問何故翻譯加靈字答此鳥於王舍城中有人欲死便群飛去彼其事必應故得言靈也路云問古人依鷲鳥食人屍得名靈鷲疏主如何古人言訛而略也如何不許古譯答疏主不嗔他古人取鷲居山義但嗔是古人訛略義鷲者大也言耆闍崛對姞栗陀羅矩吒山梵語之呼召淺深不正名訛也舊梵語三个字新梵語六个字字數少名略及至翻譯鷲唐言新翻鷲峯攝山鳥兩義舊翻為靈鷲闕於山名此唐梵皆略也言頻婆娑羅者此云影肩王此王曩切植因生逢佛世既為請主復作人王敬法為懷投誠三寶為佛弟子言麓等者山足曰麓也山頂曰峯山尖處小曰峯踰險曰跨登峻曰陵綾編昆比也編烈也言下乘者謂佛在此宣揚妙法敬法重人於此下車如大迦葉聞佛涅槃欲起神通往涅槃所後自念言我今最後見於如來豈可以神通而往此亦如是也二山路險阻所以於此下乘言二謂退凡等者一云凡聖名凡得聖果者即往來得聖名凡留住也王及宮內人盡得初果聖位凡夫未得聖果者簡更在後去二者凡庶名凡王之眷屬宰相百官可共同往餘凡庶百姓不更去即簡凡人不令同往言其山頂東西等者頂上土平東西稍長纔過三重南北稍狹向餘一里言臨崖西埵等者埵埵即向崖西埵䫋陲即邊埵也言東闢其戶者向陽背陰人宅以南為正西方以日出為上意表遺法東流故放光照東非獨甎精舍表法東流也言今作說法等者有三般一者入定像𣫍手相重於其齊下二降魔像垂手指地指地神為證三說法像舉手屈指為數法故似佛說法之像立即丈六也坐即八尺也言精舍東等者五天之地多作經行故鷲山覺樹之下鹿苑王地之內皆有世尊經行之處令諸弟子放學一為資身二為長道所以經行也言傍有大石等者者是天授得世通以其神力擲石打世尊世尊于時在於山下結加趺坐忽見此石從上下來即作神力向上而避至色究竟天猶趂世尊世遙者而彈指曰是我業報不可思議便即住待傷佛足出血若依四分律四天門王接石擲至他方迸石下來猶傷佛足言其南崖下有宰等者只是崖半腹已來橘云方圓七十餘步如何坐得十五類徒眾據此經中徒眾極廣計合遍百億三千如何此處容斯大眾答此亦不妨如無色界諸天皆悉同來佛邊聽法變百億身共立毛端上界天身其量極大尚能共向一毛端立況復如來不思議力言山城北門行一里餘等者西域記云王舍城中有大長者名迦蘭陀者時稱豪貴以大竹園初施外道後見如來說法聽而信受心中思念欲將竹園施佛造精舍時諸鬼神咸其誠心趂遂外道合出長者於此建立造功德成就事畢獨往請佛園從長者立名賀云鼠名過去有王出城遊戲時屬熱熱在此池邊樹下止息忽然睡著有一毒蛇欲螫於王樹上有一迦蘭陀鼠作作聲呌王遂驚覺乃毒蛇欲來螫王王日類蒙此鼠而救我命遂封此園與鼠不合人採斫園從鼠立名名迦蘭陀園傍邊有池從園得名言南山之陰等者即是山城北面名南山之陰有大石室是大迦葉結集之處此是界內結集之處若界外結集去此更有二十里言池西北二三里等者解王舍得名此是正解也此去靈山四五里也若上茅城去山十五里也言外郭已壞等者其新王舍城三藏和尚到彼外郭已壞無復遺堵趾由足也有基趾亦通周二十餘里面有一門言初頻婆沙羅王等得名所以也編者北也羅者爾雅云罹由憂也彼也四隣被灾言家縱等不謹慎名縱逸言眾庶嗟自薄祐怨王無德言攘者由除也言懲者懲由誠也言寒林者即是棄屍之處也意言寒林本是棄死屍之處人所不往是不祥處故今犯罪者送之於彼雖有命人絕遊往亦同死屍如犯令之死人也寒林北方王癸水主冬冬即寒也冬主於死故名寒林也言吠舍𨤲者此是城名亦云毗耶離城此云廣嚴城在王舍城北落西也以王先立幕舍後簗墻造舍故稱王舍言又云至未生等者有說不是頻婆娑羅王簗此城是未生怨王簗也下和會云只是報修更為高厚非新簗也未生怨王歿後即無憂王嗣位阿育王即闍王之子頻婆娑羅王孫也言波吒釐城者此是樹名也按西域記云中天竺國摩竭陀國恒河南有故城周七十餘里荒蕪歲久基趾當上存昔人壽無量歲時號為俱蘇摩補羅城唐言香華城王多出香華故更至人壽數千歲時人名波吒釐城亦云巴連弗邑城言至無憂王遷等者以新王舍城施婆羅門三藏和尚到彼上敘疏主解言古人有說山城等者古人第一解古人將上茅城便是王舍城有九億家古昔有王此城居上城中百姓盡被火燒唯獨王宮不被火燒王即遣百姓門上盡盡王舍從是已後更無所指因此立名王舍也言或云置千王等者古師第二解也仁王經說往昔有王出城遊獵被女師子來逼其身王遂染其女師子十月滿足遂誕一兒銜至朝堂吐之而去王聞是事此我之胤嗣抱入宮養之餘處皆似人唯足班駮因此立字名為班足先王崩已繼位為王年漸長成人中希有身量既大食噉亦多後於一時厨家內少怨王恠責不敢遠求遂近有一小兒初死求得重宰以奉於王王既食之氣味是美問其所得彼不敢隱具陳其事王語之曰已後常覓如此之肉以供朕膳後經歷年月人民皆知王既食人不堪作王群臣計議欲謀煞之後時引至城北門眾集欲煞王知不免其難語左右曰容我少活即發願我一生已來所有善根令我今日變身為飛行羅剎發是願已依言變成遍歷人間飛行自在群臣不敢更起惡心班足還來為國主語厨官曰此凡人肉既如此美天子內必應更甜即自飛行遍歷諸國選得一千王皆肥自少嫩遂遣作屋舍安置千王即遣厨家次第聊理日供三頓每頓一王因此所由遂名王舍此言皆謬也攝問云王城者有九億家及斑足王事此皆是仁王經智度論及律中說皆是佛說何故疏主指斥佛經言謬耶攝答云彼仁王等經教之中有正義不正義此是疏主敘他不正義來言謬也又云此疏主言謬意別若說九億家失火及班足王事不妨上茅城古來有如是事疏主責云古人引來解他新王舍城便是錯疏主只喚此作謬也言王都既在王舍等者結前山城亦是自意斷也問佛說法只在靈山不在王舍何故說山之處兼說於城說城之處兼說山答城是人王化處山是如來所居所以二處雙說也問山是如來自化處城是人王他化處山城自他何故總說答金云五意一居山表自修因入城假化緣助二居山自利入城利他三居山思慧入城修慧四居山表大智入城表大悲五居山不住涅槃如經言我雖於此所燒之門安穩得出不住生死也右手執持除糞之器不住涅槃言自他二化俱說等者攝云山是佛自化城是人王化舉自化顯利緇說化顯利於俗言一切法門中最等者一切法門即是餘一切大乘一切大乘經皆有教理此經教理即阿含甚深通三乘教理即五種智慧故於一切法門中最勝故經云藥王今告汝我所說諸經法華最第一問餘經大有向山城說者何故法華經偏歎山城耶答不遮他餘經向山城說餘經無所表彰故法華論偏讚有所表矣言城乃摩竭等者此標城勝顯法亦勝問摩竭陀國大有諸餘城何故不向波吒釐等城中說偏向王舍城中答城有二義勝一城乃是三千大千世界之正中二是摩竭陀國之正中一乘是三乘中道五天之中表五乘之中道故知經勝餘經二城是仁王住境不同餘城餘城偏僻故人王不住經是法王住境仁王不居小國如來不住二乘仁王非大國而不居法王非大乘而不住經云佛自住大乘多寶如來全身在此塔中言二者示現自在功德等者第二解也無漏之教出於二乘名自在功德言俱蘇摩城既在等者問俱蘇摩城不是山城即上茅是山城也若嗄俱蘇摩作山城者疏主筆悞辨之摩竭陀國總有三城一上茅二王舍三俱蘇摩此翻香華城香華城去王舍甚遠可二百餘里如何言近於王舍城又上茅山城園一百五十里俱蘇摩城周七十里故知不同也又准唐三藏行記俱蘇摩城實別從北天竺國向南度恒河河南是中天界亦過恒河有一城名補羅城過去人壽數千歲又名波吒釐子城亦名巴連弗邑城只緣新王舍施與婆羅門天子遂遷俱蘇摩城與上茅城別如何疏主云俱蘇摩既是山城答疏主意道俱蘇摩城亦是山城問四面亦大有諸山亦以山為城何以不向俱蘇摩城邊山城上說法向上茅城邊山城上說法耶答疏云此山獨勝高而顯故言近於王舍乃有等者疏主意道近新王舍四面丈有諸山河故不向近新王舍城邊山中說法空向鷲峯山中說答此山獨勝高而顯故所以論云表法高顯等言或如城等者第三解也喻通教理城喻教麗物呪理城中既出諸上妙珍寶表此經若性若相若體若用並在此經之內法勝餘法合前教無嘉德而不具合前理嘉由善也言上人之所遊等者文殊此方菩薩妙音東土上人涌出及以諸聖並出此經名上人還喻理也言或教妙如城等者第四解也此含藏高顯勝將城呪教將山況理山同理而出水城喻教而聞敷耆岳孤抓標理出二乘之上城含妙寶教詮一實而敷榮言所以此經在王城等者總結四解也言般若通貫五門等者例成也問為復唯此經有所表諸經亦有所表否答疏言般若通貫等將四德喻五種般若五門者一實相般若出纏之真理二觀照般若離妄之真慧三眷屬般若相應之萬行四文字般若謂能詮之真教五境界之般若所觀真俗二境言舍衛豐其四德等者此云聞物國一豐財德此國近於南海多出珍寶異物人多富人如須達等況眷屬般若謂智相應時有萬行為眷屬故二俗塵德緣舍衛國多出女人姝孋如燕趙多住麗喻境界般若將二空為境界故三多聞德此國諸婆羅門三學高人並在其中多博學勝餘國故喻觀照是慧四解脫德城中有十七億人皆得阿羅漢果三明六通具解脫五文字般若喻城能出一切寶物具此四德今文字般若能詮一切理故能詮教如城即文字詮彼四種故表斯五種般若故居此國說也言金生麗水等者引喻例成也賀云在辰錦洲也此水之中有金類提河也言提河有金等者則云古云阿利羅䟦提河正曰阿恃多伐底河唐言無勝此世共稱耳西域記六說言生死如河等者水常流而不斷表生死之不停金常定而不流表涅槃之本寂離河而無別明金離生死亦無圓寂金不離河涅槃不離生死所以生死涅槃本平等也言各有所表者舍衛豐其四德於彼說其金剛經提河有金於彼說涅槃城勝餘城山勝餘山勝餘山於此說法華經依處說經各有表矣言古說此經等者即是嘉祥解也四處者一從方便品至法師品靈山穢土說二從寶塔初至半品已來世尊變土召分身無功暇說法三從寶塔品一半已後世尊與多寶同塔坐以神力接諸大眾皆在虗空中直至屬累品中分身佛還已來空中說四從藥王品後却著地來直至普賢品穢土中說此四穢土淨土空中又穢土名四處也言今解處三等者賀云此述新義即疏主義處三者一從方便品至法師品末已來穢土說二從寶塔初至一半已來世尊變土召分身佛更不說法同古師義三從寶塔品一半已後直至經末盡是空說也說唯在二者簡要之淨土之中不說法但是變土坐分身佛也後世尊多寶同塔坐直至經末空中坐說更不於空中別開出淨土也即取穢土說及空中說故說唯在二處也攝問云寶塔品後直至經末是空中說如何無盡意菩薩言右膝著地答地者依持之義膝踞蓮華臺亦名著地破古師云無復還穢者無復分身佛去世界却穢之道理言淨穢唯二等破古師義穢只是一逼無有兩頭穢中間淨也言今標創會者問經既通淨土空中說經初何不言如是我聞一時佛淨土空中說唯言穢中說耶答疏言今標創會故說山城最初序品名創會經一時佛住王舍城耆闍崛山中名住標化處化處既是山城能住之佛故是化身言欲令三乘等者出所以也問何要標化身答疏云欲令三乘等菩薩聲聞皆見化身若現報身聲聞之人怕怖疾走而去凡夫人不得見故言題佛悲深等者謨云將此乘身二妙而於穢土現身說法故是悲深也永云藏報身之實德顯化相之權形不居淨土處此穢方如此華為皆是身妙經云即說瓔珞細軟上服嚴身之具更著麤弊垢膩之衣塵土坌身右手執持除糞之器狀有所畏語諸作人汝等懃作勿得懈息以方便故得近其子此是身妙昔於會前於一佛乘分別說三今於靈山會二歸一此等所由皆是乘妙隱妙理之深文揚麤義之疎教乘妙也脫珍御服著弊垢衣身妙也言若標報佛及等者問若標報身佛處顯淨土則如何答疏若標報佛等若現報佛淨土恐三乘眾疑非己分不敢修學門何故說經初現穢土後現淨土答初現穢土表二乘人居分段身後現淨土說法表二乘人捨分段身了便是淨土中人問何故說法華經在地上空中耶答二乘人昔執難捨如地迴心向大證二空理所以住空由此但顯穢處化身上說法處了言一為證信等者如是者總指一部妙經我聞者即顯親聞者一時者說教時分佛者說教之主住王舍城耆闍崛山說教之處此則敘致已問何用更標聽眾答證經可信故標同聞恐阿難說法非真所以證也言助成慶喜等者慶喜自言如是我聞已除疑惑今列菩薩聲聞二乘顯同聞故助成慶喜聞法可信如世間人立文契如有保見證事不虗若有同門故經可信釋迦如來說一乘法破二會二多寶來證言如所說者皆是真實則顯如來所說不虗今阿難說經有周聞者則顯阿難所傳不謬故標聽眾助成慶喜言眾疑有三等者一如是我聞除疑也慶喜自談由言我聞故非自𦚾衿說二言佛顯是佛說非神仙菩薩天龍鬼等說三今烈眾者顯同聞眾證阿難親聞佛說非從他傳聞言今顯周聞等顯與阿難靈山會所同聞法華經今時舉眾者證經可信言時方人等者時謂一時方謂方所山城人即十五類聽證經可信問智度論云經通八部聽何故空說人答以八部等變身為人理無有失言二為顯德等者諸天圍繞帝釋即顯天帝之德梵眾圍繞梵王則顯梵王之德諸聖圍繞法王則顯法王如來之德山河千萬城壁九重門不覩皇居壯焉知天子尊不見上公名豈知法王聖為顯佛德故經說勝也見十哲而知孔丘德如毗沙門子侍衛宣律師顯宣律師有威德又說慈恩疏主以左右侍人皆法將門下客盡是瑯玕楚璧言三為啟請者意說如來欲擬說法事須待請既有請人所以烈眾也言利物之方者總略教請即法華境所果三名利物之方能利法也言必應所欲者欲希望眾生希為說名應渴如來行欲所利人也謨云如我凡輩所有宣說但是談其心中自解之處不全起得聽者所欲佛菩薩所有言說皆能應其所欲之心鶖子文殊彌勒是其所欲也言次第宣唱等者略陳所請之法也若宣唱修行次第則先因後果若宣說觀行次第則身為異體先果後因此上一句疏貫通兩類若先觀果令忻即先果後因行因取果即先因後果境行果三前二為因後一為果言身為果體等者即壽量品法身報身也疏主見身中有境行果三欲擬收境行總為因來所以言行是因性乘為所學所學即是一乘境境即因也言方便品下鶖子等者辨能請人世經云爾時舍利弗知四眾心疑自亦未了乃至今者四眾咸皆有疑唯願世尊敷演斯事二云舍利弗重白佛言世尊唯願說之唯願說之所以者何是會無數等三爾時舍利弗重白佛言唯願說之唯願說之今此會中如我等比等故言三請也二乘是權一乘是實經云唯此一事實一乘是實餘二則非真二乘權人云但離虗妄名為解脫其實未得一切解脫二乘權也言安樂行品文殊因請等者有二解一因前勸持品中二萬菩薩請此方持四類聲聞請他方持八十萬億那由他菩薩彼此俱持因前菩薩請持經文殊因此行初讚揚希有後請說軌儀名為因請文殊菩薩自行已成彌勒菩薩自果已滿法華經亦不為此兩个菩薩此兩人亦不合請他行果問若爾如何起請答因鶖子請境知權可捨知實可取唯不識一乘之行惡世持經如何得離傷毀菩薩因此請行故名因請昔日二乘執小化身為實未識身之真化菩薩因此請名果故因請亦有疏云固請固者牢固也正明捨權就實之行故云固請路府云疏主不合道捨權就實之行只合道捨非取是之行緣文殊請如來說四安樂行行上無權實也謨云但是捨權就實之行三根聲聞是權實人與說安樂行名捨權就實之家行依主釋言彌勒三請等者有二解一云捨却權佛之身果取當來法身報身實果名捨權取實之果二云捨權就實是三根聲聞更迴心向大行安樂行取壽量品中果也化度問云境行果三三人請何故不同耶答鶖子小聖未識二乘之行果但執我乘與如來乘等所以請境也文殊菩薩是能行一乘行人但請行也彌勒道滿當生次居佛位所以請果言因緣之經等者啟請意也因緣有三一因事說法二因犯制戒三因請說法合此總名因緣之經也不請而說慢法心生請已方陳則能除慢企立旗久望也故說因緣之經名除法慢也言故聲聞請境一乘等者所利人也此證因請而說言菩薩請行等者且文殊請行經云爾時文殊師利法王子菩薩摩訶薩白佛言世尊是諸菩薩甚為難有敬順佛故發大誓願於後惡世護持讀誦說是法華經世尊菩薩摩訶薩於後惡世云何能說是經佛告文殊師利若菩薩摩訶薩於後惡世欲說是經當安住四法彌勒請果經云爾時佛告諸菩薩及一切大眾諸善男子汝等當信解如來誠諦之語又復告諸大眾汝等當信解如來誠諦之語乃至而告之言汝等諦聽如來秘密神通之力一切世間天人及阿修羅皆謂今釋迦牟尼佛出釋氏宮去伽耶城不遠坐於道場得阿耨等言讚證因亦利之者三解一菩薩見有大利益所以請說一乘行一乘果乃至如來讚一乘行一乘果便有十一位得證因佛讚而得益故云因亦利之二者讚謂法師品讚人讚法證謂寶塔天授證經可信因前讚功德所以勸持品中二萬菩薩四類聲聞請持緣不識方法文殊菩薩請說四安樂行便有無數菩薩從地涌出乃是能行人遂有彌勒懷疑父少子老舉世不信請說三身壽量聲聞等因聞一乘因果有大利益名因亦利之三云又說如來壽量品名讚證證者所證法即三佛菩薩因此十一得證因聞讚壽量而獲益故名因亦利之疏中意說安樂行名讚說壽量名證分別品名因亦利之言四為當機者問烈眾有何意答為彼當機故烈眾也此問解當根不周餘處餘處當根因三根聲聞正為也定姓聲聞傍為也今此不分傍正但聞經得益總是言退菩薩心等者標也標中聲聞菩薩又標中不說有定姓聲聞向下釋中兼說定姓也言菩薩領悟說等者諸品也五品也言聲聞凡夫等者此為下品本是定姓凡夫在資加二位聞法華經得小乘初果引妙莊嚴王品為證八萬四千人遠塵離垢得法眼淨是言發菩提心者此為中品是前資加二位不定性聲聞凡夫聞法華經迴心向大來即是曾發二心問有何文證答觀音品云八萬四千眾生皆發無等等阿耨多羅等又分別品八世界微塵數眾生發菩提心又法師品云求聲聞等言彼聖者類等者此為上品聲聞從初果至無學位盡是當根也即法華會三根聲聞中有前三果及第四果故烈眾也言菩薩凡夫等者下品菩薩此資糧位菩薩頓悟漸悟兩類小菩薩疑自不疑他不疑自也言證真達聖者因中品菩薩此本加行位若未聞法華經未合入初地為聞法華經力更經一生兩生得入初地證真達聖如經八生當得乃至二生一生也此入第二僧祇劫也言聖者菩薩等者是上品一云本是初二三地已去聞法華經得入八地證無生法忍二云聖者菩薩得初地證聖性名聖者菩薩聞法華經修行求證得入八地無生忍等字等取十地功德言故為三機等者二說一云為三根聲聞說斯妙法二云聲聞菩薩各有三根如來為此二類三根說斯妙法也後解強也言五為引攝等者問阿難結集烈眾是何意答為引攝故烈眾也就門中有三類凡夫要引攝一為引一類我慢凡夫有錢富貴恃賴名強不肯聽法著帝釋梵王引令伊作念諸大梵王尚聽來我豈不聽耶二為引攝一類自足眾生身中曾修少善便生憙足更不肯修便引觀音等諸大菩薩尚自聽法三引攝一類下賤貧寒根不具足自輕眾生羞恥自身不肯聽來汝豈不勝大蟒田文云類上自聽法也言為引當時餘生等者令受聽法阿難結集盡在經中為引今時及未來眾生令交發心隨學佛法故在會也言經具陳者賀云烈摩睺羅伽等為引今時自輕眾生問具陳菩薩聲聞何意答為引今時眾生發心求故言若無勝侶等者問何故事須烈眾引攝方始發心答疏云若無勝侶等言佛地論云等者例成烈眾之意意道淨土之中上說有輔翼眷屬豈況穢土之中而不烈其聽眾故疏云淨土上然何況穢剎也言二彰權實者意道十五眾有權有實靈山會上丈六釋迦亦通報通化言淨穢土中等者且報佛報土總得報佛報土不說不知然總說化土有四一大化土二者三變淨土三者化穢土四報佛居報淨土且第一大化身居大化土佛定是權聲聞為權菩薩通權實若四加行位菩薩即實於中十地上位菩薩即權二者小化身居化淨土或穢土菩薩聲聞通權通實三根聲聞實滿慈子阿難是權多事驚怖小菩薩實文殊普賢是權又報佛居報土聲聞為權菩薩為實言今此化報雙有等者此經若向化土說聲聞在中為實此經若通報土說菩薩在中為實聲聞眾為權也故名兩實二權也言初烈靈山化佛等者問今說經何故通兩實二權耶答疏云初烈靈山化佛等疏屬當經文菩薩是實聲聞是權也言況多寶分身者引化成立也安國云此通證報化二佛土有化現事滿慈子等是化聲聞雖在化土亦可通證報土中有化聲聞多寶如來是報土中佛尚自於化土而為化現亦可通證化土中菩薩是化也十地菩薩是下位菩薩向化土中來上自是化現況多寶如來是上位佛向化土中來此佛身灼然是化現又聲聞中滿慈子等是化聲聞向化土中來尚自是化現若報土中有聲聞豈不是化現也言准知報化等者准佛地論中權實道理照然言論中既說有化等者引論成也言滿慈等取阿難也言自餘化等者言等者等取八部也問報土顯於莊嚴聲聞在中可言化滿慈既處穢方有何利益而言化答報土顯於莊嚴眷屬莊嚴故言化滿慈為引實聲聞須化良之法華會上有五種權一佛權多寶分身是二菩薩權普賢文殊是三聲聞權滿慈等是四四眾八部權龍權如說波斯匿王佛邊聽來諸人皆起唯有八龍王化作八个老人稱下坐不起王心中怒龍王便知夜後擬雨砂石傾却王宮佛知便勅目連神通救吾緣與諸弟子此間行化城等須得土地主目連授佛勅便化為妙翅鳥展翅遮却宮殿電雨電子打著鳥身悉變為明月寶珠明日王佛邊聽來是我昨日聞法來力佛言大王此是八龍所作吾交目連救因禍致福得如許寶物也自後因勅諸龍神等若來聽法各現本形五龍權龍女是也言一高名大德者亦名釋種清高眾高名有二意一眾所知識二經中別烈名字經云其名曰阿若等言二無名大德眾者亦云未圓已滿眾未圓是有學已滿是無學非是眾所知識經中不烈別名字經復有學無學等言二尊重諸尼眾者亦名承恩入道眾經云爾時佛姨母摩訶波闍波提等去迦維羅衛城不遠別有一城名曰天城城中有一長者名曰善覺有八个女最長女最小嫁與淨飯王餘六个嫁與餘三王長女摩耶生佛姨母養佛亦姨亦母故云姨母也言四內眷諸尼眾亦云曩結深恩經云羅睺羅母耶輸陀羅等是佛為太子時室內眷屬言五聖德難思眾亦名神功廣大眾經云其名曰文殊師利等准經歎德皆得陀羅尼等言六帝釋諸天等者亦名戰勝修羅眾經爾時釋提桓因等言七三光四王者亦名眷護舒暉眾經復有名月天子普香天子等言八二自在眾者亦名小大自在經云自在天子大自在等言九色界諸天眾者亦名跨握娑婆眾經云娑婆世界主梵天王尸棄大梵光明大梵等言十龍眾者亦名翳虗含灑眾經云有八龍王難陀等言十一緊羅眾者亦云高吟白雪亦云清歌雅樂經云有四緊那羅王法緊那羅王妙法緊等言十二乾闥婆等者亦云巧弄朱絲亦云勝芳烈樂此是樂神經有四等言十三阿修羅等者亦名動山涌海經云有四等言十四迦樓羅眾等者亦云答龍噉毒眾經有四等言十五人王眾者經云韋提希子阿闍世王等言復有六眾者一多寶眾亦云寶塔陵空二分身眾亦質影殊形眾三龍宮眾亦云涌海乘蓮眾四涌出眾亦云烈地呈形五妙音亦云鸞歌逈發六普賢者亦云御蒙迴方眾言此眾二徒等者金二解一云前十五眾為一徒後六眾為一徒徒者徒黨又聞法配前十五眾證法配後多寶分身也龍宮行法涌出持法妙音說法普賢護法二云十五眾名前六眾名後前眾名聞法後眾名證法前眾行法後眾持法前眾說法見佛說法來聽後眾護法自許云諸解盡善牟云二徒總配六眾徒謂徒類此後六眾三个二徒多寶分身為二徒俱是佛故龍宮涌出為二徒俱涌出故妙音普賢為二徒俱他方菩薩故人多寶聞法分身證法龍宮行法涌出持法妙音說法普賢護法此解為善也問何故多寶名聞法答經云善哉善哉釋迦牟尼佛快說是法華經我為聽是經故而來至此若分身配證法撿上下經文無證法故但有開塔文經云彼佛分身諸佛在於十方世界說法盡還集一處然後我身乃出現耳初塔涌印說經可信塔開聽法證經可重分身不集塔即不開塔若不開分身亦不來證法故知證法須假分身龍宮行法眾者經云文殊師利菩薩言唯常宣說妙法華經所化眾生其數無量不可稱計非口所宣非心所測其必流行一乘法也名行涌出眾持法者經云我娑婆世界自有六萬恒河沙菩薩一一菩薩各有六萬恒河沙眷屬是諸人等能於我滅後護持讀誦廣說此經既言護持明知持法妙音配說法者經云華德汝但見妙音其身在此而是菩薩現種種身處處為諸眾生說是經典普賢菩薩護法經云復白佛言於後五百歲濁惡世中其有是經典我當守護除其衰患令得安穩使伺求得其便者問多寶唯有智積一人何得名眾塔答雖標一人據實亦有多眾隱而不論又約多寶以少從多亦名眾也言此中有六門異者菩薩有無也前三門對諸經辯異後三門對當經菩薩異言一三乘無獨覺者獨覺有二一麟喻出無佛世二部行部黨而行故部行少分亦得與佛同世法華會上言無有二義一無獨覺得果者到經會中末二者無有到經會聞法華經得獨覺者約此二義名無也言多分出無佛等者瑜伽三十四云復有一類初得獨覺道滿百劫修習資粮過百劫已出無佛世無師自然能悟三十七菩提分能證現觀得獨覺菩提斷一切煩惱成阿羅漢即是會上無得果者也言教雖被者問如何法華經被他答即是無聞經得果也問前顯根門中不被獨覺此間何故則云教雖被彼答亦不相違彼處言不被者約定性獨覺此間言被約不定性獨覺彼處言不被約得果者言不被此間被彼約獨覺凡夫不定性者則被問法華會三乘中無獨覺如何成破二答獨覺凡夫資加兩位聞經迴心向大便是破二門經既是無得果者如何堪法師五果聖人迴心又如何門外中子索車答此二義約有道理則實有且法華會上則無不妨諸經會下有得果者金問云何故法華會上無獨覺仁王則有答有二義一是化不是化不是實二法華會破二與他相違故無獨覺仁王不是破二之經不妨有也此經無聞經得果者所以烈眾處無言下文亦陳有等者若約求緣覺乖凡夫下文亦有也經云其求緣覺者比丘比丘尼又云告諸聲聞眾及求緣覺乘言二三界無無色等者有二義無一者光不照故不來二者皆是定性聲聞樂定那含無根可熟也無緣故不來問佛放光何故不照答光明是色法彼界無色不將色照色光也問彼界有定果色何故不照答定果色有實得者不得者事不決定故不照也言仁王亦有者問仁王經中何故即有答仁王經中所說空理不妨聽來不同法華破二歸一所以不來也問定果身中既無意根用將何聽法答意能故故大論云聞謂比量又定通之力則不決定言三五趣無地獄者五趣之中無地獄趣有餘四趣謂天等言光雖照彼者謨云問色界蒙光明經烈色界天地獄既蒙光何緣不在會答疏云雖等言一乘進習等出緣之所以顯揚論云極慼非三塗極折非上二問色界之中佛光照尋光來會聽真經地獄如來光既臨何故不來聽妙法答疏云一乘進習等問色欲二界有容預可許放光而照之地獄是無暇身如來何故放光照答色欲二界有容預全其進修光燭之地獄是其無暇收光照亦令暫息苦言陀羅尼等者問尊勝經有地獄眾時琰魔王於其夜分將諸眷屬至於佛所此經何無答疏云陀羅尼等言所以光照者問既若不來何須光照答疏云所以光照令生猒言令彼見光等者問此經既不來何用光明照答但發猒苦之心不能發彼菩提之心也普無色光不及無光任不來地獄既蒙光有光何不至答無色光緣闕俱無不得來地獄雖蒙光無緣不合至問總持經會上上有琰魔王一乘威力強何容不召至答真言本息苦地獄亦須來此經談一乘苦身來何益問如來放光照召眾欲聞經談地獄既不來何須光照彼答蒙光苦不息世尊虗放光暫時能發心何惜光明照言此後三無等者即是四眾八部輪王言四明次第者菩薩聲聞菩薩內外二護先後次第也言初眾分四等者十五眾名初六眾名後也言或內護外護等者助也前十五眾亦名內護外護眾初五眾名內後十眾名外也言外護中八部仁王等者先烈八部後烈仁王就八部中先烈天眾後烈非天天即帝釋眾非天即龍等除天一部外餘七部總屬非天也言天中地居空等者帝釋及四天王眾是地居自在天子等是空居問三光既在屬虗空如何得與帝釋俱為地居答據實三光皆是虗空俱是帝釋之臣攝臣歸主故言地居也言地中帝臣者帝釋是主四大天王普香等是臣言虗空中非禪主等者自在天子名非禪主四禪梵王名禪主言後眾次第者證法眾多寶開塔眾分身經利益廣大眾海會菩薩持法無邊涌出菩薩他方行法眾妙音菩薩言證法眾者多寶出聲讚言善哉善哉釋迦牟尼能以平等大慧教菩薩法妙法華經為大眾說皆是真實全身在於塔中為證湛攝釋云問前門之多寶聞法分身證法今此門中何故多寶證法分身開塔前後不同耶答多寶亦得名聽法亦得名證法經云如是如是釋迦牟尼世尊如所說者皆是真實又云我之塔庿為聽是經故涌現其前為作證明讚言善哉善哉又分身亦名證法亦名開塔經云若我寶塔為聽法華經出於諸佛前時其有欲以我身示四眾者彼佛分身諸佛在於十方世界說法盡還集一處然後我身乃出現耳又云彼某甲佛欲以開此寶塔由此多寶為聽證來分身諸佛為證開塔集既經兩勢下疏主本文中亦為進退二解所以疏中前言聞法眾此名證法眾言開塔眾者經云彼佛分身諸佛在於十方世界至出現耳故如分身是開塔言經利廣大眾者經云仁往龍宮所化眾生其數幾何文殊師利言其數無量不可稱計非口所宣非心所測等言持法無邊眾者經云我娑婆世界自有六萬恒河沙菩薩一一皆有六萬恒河沙眷屬是諸人等能於我滅度後護持讀誦此經言他方行法眾者問為復妙音到此方來持法華經名他方行法為却迴彼國持法華經名他方行法答通此二處一此界菩薩他方行法一他方菩薩此方行法經云是菩薩以若干智慧明照娑婆世界令一切眾生各得所知於十方恒河沙世界中亦復如是言他方勸持者經云普賢菩薩言我於寶威德上王佛國遙聞此娑婆世界說法華經來此能經還歸本國又云世尊於後五百歲濁惡世中其有受持是經典者我當守護等言佛地論雖釋等者述緣由也初眾之中聲聞居先菩薩居後前來解眾多是佛地論章敬云論第二云何故此中先烈聲聞後說菩薩為於大乘生疑成者除彼疑故為引不定種性定信故為已清淨諸大聲聞捨於自身尊貴慢故大聲聞眾近對世尊親受記故又諸聲聞常隨佛故形同內眷屬又令菩薩於聲聞眾生恭敬故言一形相不同等者聲聞形相似佛菩薩不今佛只有出家相無在家相佛佛事須形同出家言有在家初二果三果已去盡出家無有在家羅漢菩薩則有在家故形不同佛也言二處有近遠者菩薩六道化生聲聞常須近佛若離佛則被外道惱他也言戒德有殊者聲聞持出家戒所以先烈菩薩不爾聲聞持遮戒及攝律儀戒菩薩持性戒饒益有情戒菩薩作則是持止則是犯入婬女舍入酒肆能立其志聲聞止即持作即犯言四欲令菩薩於聲聞等者四十年前常見世尊毀責聲聞讚歎菩薩便有頓悟小菩薩言唯我能然餘不能爾漸悟小菩薩亦疑聲聞不作佛故八萬大士尚烈聲聞之後況我等小輩而生慢耶又合未來在家白衣行菩薩者敬出家幢相所已先烈更問如何先烈僧後列尼答欲令未來世尼眾敬僧故言華嚴等者於大乘教自分四句有列小不列大如般若經有列大不列小如華嚴有大小俱不列如勝鬘經有小大俱列如此經問如何先列地居後列空居先列非禪主後列禪主答從下至上為次第也言數成就者謂大眾無數十五類眾都合一處著都喚作一个數是無之數故云大眾無數故言總談無數等者且十類徒眾每眾之中各與若干若干之言便不知多小眾之上既爾十五類徒眾合一處著有十五个若總合一處著不知其數故云總談無數論各別標謂萬二千人論平聲呼之若論量經中阿羅漢萬二千人菩薩八萬人梵王帝釋一一別標則有數若總談則有無數此即分疎論中大眾無數之道理也金云論中但謂大眾無數故其總談無數等文是疏家釋意言以總攝別論既總談無數即經中別標萬二千人等等取菩薩八萬人等名論各別標等二說總皆善言行成就中等者有四一菩薩聲聞各二義立行一依名立行二依形立行菩薩聲聞皆爾言依乞食等者依名立行謂修小乘行比丘此云乞士真諦云乞食有五種一者盜戒定慧三學俱無二舉債食三學有一而無其二三者許可食戒定慧具足四者家法食謂有學聖人所食信施如子食父祿五自在食謂無學聖果如食子物准淨月女經比丘乞食離四耶食名淨命食一仰口食謂仰觀星蒙占相吉凶二下口食耕田種食興生販賣三方口食通置四方使命四維口食合和湯藥維者四角曰維不正義也又智度論云離五邪一不得詐現異相二說己有德三高聲現威四占相吉凶五不得說有所得驚動人心梵語苾蒭訛云比丘此翻乞士上乞法下乞食即是依行立名行也言二菩薩者菩薩依名立行修大乘求二覺即自覺覺他也言求二覺者上求菩提下化有情名為二覺菩提配求二覺菩提薩埵配有情令取他名也言菩薩已神通等者䟦陀婆羅此云賢護具足神通現四眾身教化眾生故別標舉以形彰行此在家菩薩眷屬十六人而此經所不列如上生經具明言四出家人等者依形立行也言攝功德就者十六句歎聲聞德十三句歎菩薩德此是論主科眾成就有四應知何等為四一者數成就二者行成就三者攝功德成就四者威儀如法住成就後疏解中一一牒解之數成就者謂大眾無數故行成就者有四種一者聲聞眾等乃至威儀一定不同菩薩故恰到攝功德成就不言攝功德者便言皆是阿羅漢等十六句示現聲聞功德成就故皆於阿耨菩提不退轉等十三句示現菩薩功德成就不爾牒疏主與論主分疏云然本論中不別標牒何不標牒文義顯文故也言儀威如法住等者此標牒也欲聽法住此相中名住相也言雖各禮佛亦是等者問各禮佛足退座一面何故不向威儀収答疏云雖各禮佛足等及退座尋常見佛威儀非聽法相設使不聞法亦是須禮佛足也言論說眾成就等者就論說眾成就中合而言之有四成就不言一一眾中有法有等四也上依論解了言此初也者標類舉數經與大比丘者與大比丘是標數萬二千人是舉數也言龍樹等者一處同一法會處即是山城也一時同一聞法時一心同一迴向心一戒同持出家戒二百五十戒一見同一心見一道同一解脫一理同此上義同解與義共義言諸眾中㝡大者十五類徒眾中大故二者大障礙斷煩惱障三者識大上至釋梵諸天下至國王大臣無不知識名識大言真諦三釋等者一者勝大由如大王智德尊崇勝一切人故二者體大喻山海形量大故三者數大由如大軍兵眾多言今合為六等者疏主合智論并真諦三解合為六釋攝釋云疏主不全取兩師六解除却真諦三解中初之一解餘之五解自加一解名稱大即為六也金云數大離大配前數大大部礙斷位大配前體大名稱配前諸眾中最大識大配前大人恭敬此中既言今合為六所以配之上解大義了言苾蒭訛等者草有五德依之立名一形端茂香氣遠騰二體德貞純霾風窂拂三非何葉受答媚水藏四沃地流津芳華地坼五靈枝眷翼妙色舒耀安國云草有五德況比丘一體性柔軟況比丘心行柔順二引蔓傍布況比丘展轉相教三香氣遠騰況比丘戒香芬馥四觸身安樂況比丘觸證法樂五不背日光況比丘深心向佛大論云比丘有五一乞正比丘常乞食故二自稱比丘犯重戒三名相比丘剃髮染衣而不具戒四破結使比丘五白四羯磨比丘此等是第四第也問比丘之名含於乞義餘有乞者應名比丘答比丘之名含五義餘不具五故不名比丘問五義者何答疏云一曰怖魔等者地神唱言某方某處某甲長者家有子出家剃髮染衣誓超生死制諸外道降伏魔怨虗空夜叉接聲上告至欲界第六天自在天子名魔波旬聞已心懷妬弊怕怖懼他勝己宮遂振動有二義一比丘精誠感魔宮振動如𣏌梁妻哭長城倒二諸比丘家已化彼眾生便捨於我浸我境界作是議時以魔怖故宮乃振動言二云乞士等者謂清淨活命故云乞士乞有二種一者乞法上從諸佛乞法以資心下從白衣乞食以資身食有四種一劫奪食破戒比丘食他供養倍倍還他二借貸食善法欲已去乃至未得聖三子食父食前三果人受他食由生慚愧如食父祿四父食子食阿羅漢人應捨食故又退無畜積之累進有利益之功自利利他故名乞士言三名淨持戒等者不同在家俗人空持五戒八戒此比丘持二百五十戒持五百戒具足持此名淨持戒且沙彌僧有三一駈烏七歲至十四五二應器二十堪受具戒應法器三賊心遂求規避無心修道僧中有四一無慚愧僧虗受信施二瘂羊果僧不解一物如驢披師子皮三朋黨部黨而行不修道故四世俗僧經律論不知求誰那直歲之者也言四云淨命等者攝云即以無貪嗔所發身業名正業無貪嗔所發語業名正語無貪所發意業名正命路府云若無嗔癡所發身名正業無嗔所發語業名正語無貪嗔所發意業名正命正命即淨命也今疏主意又別三業唯無嗔發也無貪身業名正業無貪發語業名正語無貪發意業名正命言五曰破惡等者智度論云復有比丘破煩惱故亦名比丘此之五義因中怖魔破惡故至果名煞賊因中淨命淨持戒故至果名無生因中名乞士果名應供前草五德未曾配屬況云一體性柔煗配第二乞士二引蔓傍布配惡心有慳法不相教故三觸身安樂配淨命緣隨法味四香氣遠騰配淨持戒五不背日光配初破怖魔言眾者僧也此解眾字也僧是梵音之略眾乃唐語之全今以梵言而釋唐字智度論云何名僧伽僧伽秦言眾也多比丘一處和合名僧伽譬如眾樹方名為林一樹不名林一僧不名眾多僧方成眾也言理事二和等者金云理和為同證生空理事和即羯磨布薩等又六和者一身二口三意四戒五見六行同一正淨居等同證生空無布薩等事二事和非理此界凡僧布薩受戒等事三俱和如經大比丘等四俱不和者如白衣等言三人已上等者僧有因種一四人僧除受大戒自恣出罪餘一切如法羯磨應作二者五人僧邊方受大戒自恣等三者十人僧中國受大戒四者二十人僧出僧殘罪今言三人已上得名僧者然法事成辦要假四一人作法事云大德僧聽自前頭三人非自云大德僧疏主且約白有三人既言已上意說四人也遮減不遮僧也言已上有云疏主錯非也言此歎德也者牟云大比丘眾一萬二千功積巍巍崇山巨海高人共聽表說不虗是故經家先論歎德歎德諸經論中多少不同正法華經十二句金光明十七句秦本法華經六句法華論大般若經十六句西方梵本法華十六句嘆德天親菩薩造法華論解他西方梵本經論中亦有十六句經為所解論為能解及至唐國來菩提留支譯論亦有十六句羅什三藏譯經此間秦本經只有六句疏主引大般若經中有十六句歎德添向此間經中一處明以辨同異問何故將論解經經與論句數不同多少答攝云古來傳有兩解梵本廣略不同三藏隨本翻譯論文即廣經文即略二云如來處處會中聲聞相隨無有不到之處每會之中說法皆讚聲聞皆歎德羅什緣見諸經歎德教多所以此經略歎問造論何故不略答菩薩於此一本論上廣歎令解一切歎總與一切經中歎德意同故不略也問此經與諸經歎德何故廣略不同答有二解一云翻譯之家心眼廣略不同二云是阿難結集之時略也歎德列眾皆結集家敘置排比次第非是佛說也疏主將論與經一處對辨經則全引論則不盡經中文句與論文同者更不引論文勘若不同者便引論文勘若名字些不同義若同亦不引論文來勘若文不同義又即引論文來勘有人不得此意道疏引論文盡言經有六句等者新是大般若經但是唐三藏譯總名新經及舊論魏朝菩提留支論對唐三藏便名舊論也言是阿羅漢者皆由盡也是阿羅漢諸漏已盡無復煩惱此句與論同也經云得真自在論云心得自在也得真自在約證真無為心得自在約離縛說也經云心善解脫慧善解脫經文開也論云善得心慧解脫論文含也經如調慧馬論云心善調伏此經與論意同文字不同也經云亦如大龍已作所作已辦所辦棄諸重擔逮得己利盡諸有結此六句經與論文同更不引論文和合也經云正智解脫論云善得正智心解脫論文加三字經云至心自在經云第究竟也言論有三釋等者依論釋三門別敘論將十六句歎羅漢德作三門解釋第一作上上起門解一遍第二作總別相門解一遍第三作攝取事門解一遍言作上上起門等者是解問何名上上起答攝云古有三解一云初二三果有學對凡夫名上功德阿羅對有學名上上功德二者羅漢有二純根羅漢身中功德對有學名上功德二利根羅漢身中功德對鈍根羅漢名上上功德三者只就利根羅漢身中功德有上功德上上功德名上上起也詳曰理有多途非無此旨若依論勢可從本疏言由上句故下句等者第一申上句故下句得起由如得真自在問因何得得真自在答由諸漏已盡現行無無復煩惱種子滅由煩惱種子現行所以成就得得真自在一句此則諸漏已盡無復煩惱為上句得真自在為下句下句不自起要假他上句方能起得下句此乃上句為能起下句為所起上字屬上句起字屬下句所起所起是他上之字起故名上此類非一名上上起問下句早是所起又是下句何不名下起答是下句故不合名上起是他上句起得此下句下句就上句故名上起問何不言下下起答從勝而說不可為難又今此歎德事須舉勝若言下下起何成歎故言上也言或由下句上句方起者即是下句起上句也如論言諸漏已盡故名阿羅漢問因何成就得阿羅漢答由諸漏已盡故得阿羅漢果也此即阿羅漢是上句是所起諸漏已盡是下句是能起上字屬他上句將起字屬下句起之上句故名上起問下句起上句何不名下下起答由下句起得上句故名上起此類非一名上上起上解門名了言論以第二句等者以第二句諸漏已盡故釋菩薩一句中阿羅漢此已下句起上隣次單起也問事須煩惱總盡方名阿羅漢何不雙將下第二句諸漏已盡第三句無復煩惱起初句阿羅漢耶答有三解一云以諸漏已盡是現行無無復煩惱是種子滅以彼羅漢不受後有良由煩惱現行不由種子所以唯將第二諸漏已盡句解初句阿羅漢二云羅漢之名通三乘有順同大乘八地菩薩得名羅漢三乘無學不退菩薩就不退菩薩中一師取初地已去一師取八地已去路云八地頓悟菩薩亦名羅漢若要種總盡方得名羅漢即八地菩薩不名羅漢也為成立彼義故八地菩薩得名羅漢此前二解雖有理亦未是疏中本意疏主意第三解准他瑜伽論唯識二論三義解羅漢應已永害煩惱賊得名羅漢煩惱賊者唯現行不說種子現行既得名賊所以引來解此間經中羅漢也言即是論言應已等者有中有略唯識略此論廣婆沙中有六義一煞怨為能永斷一切煩惱二破輪為永斷十二有支生死之輪三不生為不受後有四不生上為不上生生死輪迴六道五應供為堪受人天龍神等妙供六應教化一切眾生准此即已三中害煩惱賊六中煞怨以解羅漢言諸論皆云等者釋漏總名也且疏外解者問何名為漏答疏云小乘漏有四種一懃而不利二利而不懃三亦懃亦利四不勤不利此取初句及第三句此句是煩惱障名因引來解漏非善也薩婆多宗解漏者住義令諸眾生住於生死又論中有七住漏一漏自性根隨煩惱體是漏法漏性合故名為有漏二漏相應同時心王心所遍行別境等由與漏相應亦成漏也三漏所緣所緣境本來不是漏被漏心緣著善無記境從能緣心亦名為漏四漏間雜前識起善心時被不善心等漏法間雜而生五漏俱謂第七識一切時常執我故合第六識識行施戒不能忘相亦成漏法也六漏所引今生身是前生有漏心熏生故成有漏來生身又是今生身煩惱漏心中重得令當來苦相續名為漏引七漏隨逐身在欲界上二界漏亦隨欲界身一約界上生非想處皆被漏隨逐二約位直至金剛心已來皆被隨逐也上解七漏了更有三漏上漏傍漏下漏如形心王如船煩惱如水船由水入故泡心王被煩惱勝故泡淪生死也上漏如舍善心所如舍煩惱如天雨舍不修故令天雨從外入來損漏財帛由心王被煩惱所損兼污佛性不現三漏如器由心心王向六根門中取境隨境起煩惱如身器漏器若漏時無所堪用身器若漏闕修善因闕修善因無所堪用疏外解了論皆云良是唯識對法顯揚雜集名諸論煩惱現行令心連注此二句是上漏也流散不絕名之為漏此二句名傍漏也如漏器漏舍已下都結上二漏也煩惱現行簡種子令心連注心心所本來不是漏由與煩惱現行同生同滅不相捨離名之為漏也令心連注者不斷絕義由彼煩惱染彼心王念念生滅皆成不善性有覆性不斷絕如舍雨水連注不斷也故如舍流散不絕四个字即是傍漏也由煩惱引彼心心所法馳流六境招過不息名流散不絕也言如漏器等者如漏器結傍漏漏舍結上漏也亦是結前漏義亦是毀責也言損壞處廣等者解漏義兼菩提涅槃亦被迷二覆名損壞處廣也言毀責過失等者如貪嗔癡亦名三毒損慧命故亦名三惟一然燒人功德亦名三株杌亦為名三火亦名漏亦名六賊言此唯現行等者配經句即是諸漏已盡現行無無復煩惱種子滅也言據實通等者據實諸漏通種子現行且就此經說唯現行若是盡理而論遍通種子不爾經兩句何別煩惱即諸漏無別故言二列名漏有等者一欲漏約境立名二有漏約果立名三無明漏約體立名問曰有何所以唯立三漏答由外門流注立欲漏由緣五生外境界故而起此漏名外門也上二界中唯緣內身而起此漏故名內門立一有漏與內外漏為依上故立無明漏此言內外門轉約多分言也言欲漏者欲謂貪欲瑜伽論云有五行相一能生欲界諸煩惱故二能發惡業煞盜婬等三能違善品功德不令生起四能著五欲外境轉故五能生苦苦及境苦俱舍云世間妙境非真欲真欲謂人分別貪故喚貪作欲欲即是貪由於六境上起貪名欲也然此欲漏有其三義一飲食欲二睡眠欲三婬欲欲雖具諸惑以欲勝故獨立欲名二有漏者問何故名有漏答從彼業煩惱有故名有漏上二界中多緣內身起此有漏立有漏名雜集論云有六因名有漏一漏自性謂諸煩惱展轉相望互為所緣互為相應更相隨順故言漏自性也二漏相屬謂有身見等名漏以此相應心心所與漏相應名為漏相屬名為有漏是隣近釋眼等六根漏所依故與漏所依以能生漏有彼漏故名為有漏故名漏相屬有財釋三漏所縛謂一切有漏所有善法方便生得由漏所發及漏所潤招後有故名漏所縛令招生死是所縛義決擇分善法不能正感後有異熟而有能助感亦名漏所縛四漏所隨下地法為上地漏法所隨或上地法為下地漏所隨五漏隨順謂即決擇分善助感後有名漏隨順謂雖是善而第七識有漏俱起名漏隨順六漏種煩惱謂阿羅漢有漏諸薀雖無煩惱而由前生煩惱所潤從漏所生名為有漏言三無明漏者古解無他明故故名無明此解不正應合言所無即明故名無明無明不以餘法為緣彰自行相且明是慧若有慧即能決擇因果道理無此明故與癡暗相應便有異熟果異真實義愚故名無明漏言三出體欲界見等者初小乘後大乘煩惱雖多不過見道修道所斷煩惱且小乘一百八煩惱為體欲界苦下具一切苦諦下有十煩惱也集滅離三見離身見邊見戒取有七个煩惱道除於二見除身見邊見有八四諦下計三十二帖修道煩惱貪嗔慢無明四計三十六五部下除五个無明計三十一上二界見修合說各三十六二界合說計七十二於中上二界五部下各除五嗔二界計除十嗔又上二界五部下除却十个無明自為無明漏七十二个煩惱中除二十只有五十二帖欲三十一計八十三又加十種計九十三又三界計有十五个無明都計一百八煩惱為漏體於中十五个無明漏也餘欲界者自為欲漏在上二界者為有漏也上小乘出體次大乘出體者見道之中四諦下各有十煩惱苦集是彼因依處所故滅道是彼怖畏處故此約總行相說四諦下皆具十煩惱若約別行相親疎迷諦即不具也且苦諦下十煩惱若一貪二嗔三癡四慢五疑六身見七邊見八邪見九見取十戒取餘集滅道三諦皆爾四諦下計四十并修道六貪嗔癡慢身見邊見修合說根本煩惱有四十六并隨煩惱二十計六十六却除五个無明為無明漏只有六十一煩惱為欲漏體也言色無色界等者上二界煩惱合說名有漏且色界見修合說有四十六無色界有四十六計九十二於中上界不行恚也上二界五部下共除却十个嗔人上二界共除十个無明九十二中除却二十只有七十二根本煩惱也其隨煩惱中上二界中各有八大隨計十六也并色界諂誑及二界憍四合成二十也將二十个隨煩惱帖前七十二成九十二法作有漏體也言三界合有等者三界五部下共有十五个無明為無明漏體也問大乘四諦下何故總具十煩惱小乘闕具不同耶答大乘將為總迷若小乘離三見等將為不迷緣小乘觀行麤故離三見者謂身邊二見及戒禁取失戒禁取者執為勝為因此是集諦故無色凡起我執果法上起即是身見集諦既是其因何得有我故無身見離邊見夫言邊者執我斷常方名為邊如執神我等集諦既無我邊見亦言皮既不毛之安寄離戒禁者此不合在集諦安外道執為道諦所以合在道諦下安也緣外道執為能得即是道執為清淨即是滅諦滅諦無三者此即常樂我淨不可滅諦之下而有身見等也道除二見者謂身見邊見必無執道為斷為常及我等問大乘既四諦下皆具十煩惱迷諦親疎總別如何答論云然迷諦相有總有別總者謂十種皆四諦相起苦集是彼因依處故滅道是彼怖畏處故對法七云苦集二諦皆是煩惱十種因緣又為依處怖畏者論云由煩惱力樂著生死於清淨法起懸崖想及起迷撥猶預等事次別迷四諦相者二唯迷苦諦八通迷四諦身邊二見唯果處起別空非我屬苦諦故謂疑三見親迷苦理二取執彼三見戒及所依薀為勝為因能得清淨於自他見及彼眷屬如次隨應起貪恚慢相應無知與九同迷不共無明親迷苦理此上迷苦若迷集等及邪見親迷二取貪等疎迷若滅道二諦嗔亦迷由怖畏故生憎嫉言四離合廢立者三界煩惱總是有漏漏於三有名漏一種是漏法欲界煩惱別立欲漏名離上二界煩惱合名有漏名合簡要云有說欲漏有漏約界分二名離三界無明總合一處說名無明漏名合也安國云四瀑流中立見流名立三漏之中不立見漏名癡路府云十煩惱中無明別立漏名立餘貪等九不別立漏名癡也言欲唯散地等者問欲界何離上二界何合答疏言欲唯散地唯有漏地等且立欲界煩惱為欲漏者疏中有五義一欲唯散地唯有漏地此界唯是有漏也唯不善也煩惱通不善性有覆性所以觸立欲漏言上界俱定等者問上二界何故合為一有漏耶答疏云上二界俱定等此中翻前五義亦有五義俱定者上二界皆定故通無漏地者如四禪等名禪那此近分中間根本等通漏無漏空處識處等但只名定唯是無漏四禪通漏無漏者亦有禪定亦有滅定如有頂文中微微心入滅定入定即無漏出定即有漏名通漏無漏小乘俱舍云滅定唯是有漏彼宗計空識等處通前無漏非非想唯是有漏無漏大王不居邊表故大乘即言通漏無漏一趣者天趣一生者化生一性者煩惱唯有覆性又若說有漏者三界煩惱總合名有漏漏於三有有之漏故於中隨勝別將欲界煩惱立欲漏名也問言無明共立無明漏耶答疏云無明力增等論云相應無知與九同迷與餘九根本煩惱同時者名相應二者不共不共有二一恒行不共簡要云在第七識獨行不共在第六識獨行有二一者是主獨行二者非主獨行無明若與八大隨相應起者無明力增名是主獨行若無明忿等小隨相應起者忿等相增無明名非王問第七識中無明若獨起可立不共既識中與四惑俱如何名不共答亦名不共一恒行故不共二不與餘識煩惱俱故亦名不共言為前二所依等者即是與欲漏有漏為所依也是無明漏家所依也言十一殊勝者一所緣勝此舉境明心謂此無明遍染淨一切法故二者行相勝隱真義智顯其忘故真如佛性無始時來皆被隱覆故三因緣勝與惑業為生死本故能與惑業苦為增上緣四者等起勝謂此無明等皆能發起能引所引能生所生緣起法故故無明行為能引識等五支為所引愛取為能生生老死為所生十二支流轉不絕皆從無明來也五者轉異勝能轉異名如無明種子在藏識中若起現行即緣境轉種成現行名為轉異六者邪行勝於四諦理執言有增益謗執言無損減謗於三性上遍計是空執有即增益依圓是有撥無即損減七有相狀勝微細自相遍愛非愛共相應故貪起來即與貪和嗔起來即與嗔相和合八者作業勝由此能作流轉所依事及能作障礙事故九者障礙勝能障勝法及廣法故涅槃名勝法菩提名廣或可信五根名勝聞等三慧名廣法故十者隨轉勝近論即從欲界及至有頂常隨轉故遠即直至金剛心已來隨逐轉者流轉即同涅槃猶如家犬也十一對治勝二種妙智所對治故二空無漏智方能斷得也餘加行有漏心皆斷不得也若諸煩惱羅漢斷得若無明住地煩惱羅漢亦不能斷之潛在第六識中四住地煩惱二乘斷得言五得名所從者問云何名為漏答疏云雖知三界等疏主出所以雖知三界煩惱總名為有有是三界苦果因他惑業有故有是總聚三界自體漏即根隨二類煩惱煩惱有力漏於有有之漏故名為有漏也言下界煩惱多等者問有果既有三種漏既是因亦有三種三種總與有果為因即合總名有漏何故更分三種名字不同答疏云下界煩惱等欲者貪欲著於欲境而生貪欲也欲即是貪喚作欲也言從勝為名者下界有三欲謂睡眠等一切煩惱因此三欲而生如飲食及湯藥等雖遍諸味獨得一名故云從勝為名名欲漏也言上界諸惑等者色無色二界煩惱既無別相只是為因能感有果故名有漏也言無明不以餘法等者欲漏從境為名上二界漏從果為名唯此無明彰自行相迷暗為性既無別行相所無即明故名無明言此漏非一者疏主解經中諸字也言以第四句釋第二句者配句也言得真自在等者引經也此乃以下起上隔越而單起也將得真自在句釋諸漏已盡問因何故名諸漏已盡答由得真自在故所以諸漏已盡第三果人未得諸漏盡只緣未得得真自在也言由證真得無為等者疏主解也真自在之言唯約滅理說不約心也真無為簡假無為外道凡夫六行伏惑得擇滅此是假無為假自在只如子坐得非想定得世五通遊入王宮生貪欲心却失神通後著門出失假無為即退也羅漢無漏智斷煩惱得名真自在不已也問初二果人見道修道亦證無為理何不名真自在答初二果人未離欲界生故非真自在問第三果人已離欲界何不名真自在答第三果人煩惱未盡未得涅槃非真自在羅漢得者以真對假論獨得稱自在問小乘無間道斷惑解脫道證理斷惑於先證理在後即合將第二句釋第四句何故却將第四句釋第二句答明暗兩法若別時先將第二釋第四明暗兩法既同時何妨第四釋第二證理斷惑若先後將第二釋第四證理斷惑既同時何妨第四釋第二言以第二第三句釋第四句者以第二第三句諸漏已盡無復煩惱釋第四句得真自在以上起下隣近釋也問前來將得真自在句解諸漏已盡是現行無何不此間將得真自在解無復煩惱種子滅答則不決定有是煩惱種子滅則不因得真自在如初果自在如初果聖人入見道斷分別煩惱種子現皆盡不得他真自在所以雙將第二句諸漏已盡第三句無復煩惱解第四句得真自在言盡諸漏盡等者當曰疏主造疏時論本上有盡字與無復煩惱一處說所以疏主自解云盡者是諸漏已盡也無煩惱者無復煩惱疏主所以將第二第三句釋第四句問因何得真自在答由煩惱種子現行總盡故得真自在也言亦有本云等者有論本云以無復煩惱故無盡字若無盡字空將第三句釋第四句得真自在也言又以第五第六等者以第五句善得心解脫第六句善得慧解脫故得真自在此以下起上隣次復起言定障等者問何名定障答據實諸染行心心所法能障定者皆名定障領下劣境生貪愛味故更不進修正是定障問定障一種障中何障所收答所知障也問二乘又生空理觀不斷所知如何言離定障答生空理觀斷即不得生空事觀許伏下所知安國云伏定障得非擇滅也凡夫不斷煩惱凡夫伏煩惱二乘不斷所知許二乘人伏一分所知問既離定障合是定解脫何名心解脫答三解一定是心所定得解脫以所從王名心解脫二定能合心專注一境定得心名三者三學之中定學名心學也言離性障等者攝云煩惱障煩惱體性能障善法性即是障名性障持業路云性是真如理名性煩惱是性之障依主言又離無明等者二解一由前解中伏所知障不得真自在緣事觀中伏二由有此病所以作後解依煩惱障解也且如無明貪嗔煩惱有二个功能一能障慧二能縛心王由慧起來斷却煩惱體性慧得解脫之名言彼相應心等者相應有二義一與煩惱相應心二與慧相應心二解中取與慧相應心為正即是同時慧上得解脫與相應之心亦解脫也此二解離煩惱障也言由離此二證等者結歸經文問由離此意為復是定障性障耶為復是後解中心解脫慧解脫指何法答且作初段定障性障結也若爾則與下結文相違也結文云由離此二證獲無為得真自在者若爾伏定障如何得真自在真自在即無為也答緣有此妨所以作第二解第二解此為正離煩惱障得心解脫慧解脫故言以第二句釋第三句者以第二諸漏已盡句起第三無復煩惱此以上起下問何將第二句起第三句答由先諸漏已盡現行無始有無復煩惱種子滅所以將第二句起第三句問因何得無復煩惱無耶答得諸漏已盡故即得無復煩惱也現行無故種子無能熏斷故所熏亦滅也以彼前來煩惱現行名諸漏已盡也言以遠離能見等者此門之中故煩惱現行名能見只此能見所見亦是煩惱煩惱現行現行無時便是諸漏已巳盡也能見所見諸漏現行既無便是無復煩惱種子滅故將第二句釋第三句也今此間解能見所見與諸處別此能見所見俱是煩惱問何名能見答心王與彼貪嗔癡等煩惱相應緣於前境故名能見問何名相應縛答由貪嗔癡等煩惱與心王相應心王不得自在故名能見者相應縛問何名所見答中間相分名所見境強心劣令能緣心不得解脫相分縛見分所緣縛能緣故云所見者所緣縛將二縛為現行由現行無故種子亦滅能熏現行既無所熏種子不有如焰燒炷焰若滅炷亦無言以離現行諸等者結歸經句現行煩惱若無種子自然不生名無復煩惱也言或復單釋等者唯將無復煩惱一句獨單釋以前來喚煩惱種子作煩惱者但是約別行相說據其通相種子現行皆名煩惱也能見者執我心此是我見現行是有體法又云能見者執我心能緣見分也所見者即是中間相分即是所見所執我相是無體法也上標釋是單釋無復煩惱一句作現行解能見所見盡是無復煩惱現行也言前諸漏是等者問前來云諸漏已盡是煩惱現行今單釋無復煩惱又是現行二種何別答疏云前諸漏已盡等前解諸漏已盡是一百二十八煩惱總現行此間單釋是一百二十八煩惱中別現行現行即是能見所見也又前諸漏已盡是十煩惱總現行此間單釋是十煩惱中別無我見現行我見無故餘九種子亦無便是現行無故種子無當句中道理恰足故不將第二句釋第三句也言別無我現行即是能見所見問何故空將我見現行解無復煩惱答疏言我見為本諸漏生故我見若滅諸惑不生也故論云由我法執二障具生也前義中種子能生現行現行無故種子無此間單釋中我見現行為本能生一切煩惱亦是我見無故諸惑無故有此相似功能前喚我現行作無復煩惱故單釋也言以第五第六句釋第七句者此以上起下隣次復起第五句善得四解脫第六句善得慧解脫釋第七句經經云如調慧馬論云心善調伏疏主解故如良馬其性調順言以善得心慧解脫等者論解心慧兩法兩法總解脫合心慧也心解脫離定障慧解脫離性障問何不云定解脫云心解脫耶答有二義一心是心王定是心所將劣就勝從心立名二離障得定定能令心專注一境定得心名也言慧解脫者問若論慧解脫無為向上離煩惱名解脫如何說慧答由煩惱覆真如故慧求證不得先由慧斷却煩惱證彼真如慧亦得解脫也言故如良馬等者即取所調伏之馬即馬比之君子上善若水逐器方圓權之則止決之則流此之良馬可左可右善隨人心羅漢煩惱既盡其心調順早是良馬況更經調來言以第九十兩句等者第九句已作所作第十句已辦所辦起第八句經云亦如大龍此以下起上也言亦如大龍者標所起句也言行諸惡道如平坦等者論標三句歎龍德龍則行於險惡道中如平坦路履險若夷羅漢具此滅道智圓苦集二諦生死因果皆已盡故三途險道三界生死因果拘礙不得如龍行於惡道無所拘礙也言應行者已行即是論解能起經句也言故新經云者已作所作即是道諦智也已辦所辦滅諦智也言故如大龍者結上論文也言由已作道諦等者疏主解也即經云已作所作已辦所辦也言如龍威德雖行等者疏主解論歎龍德也雖行生死等者苦諦也如怛路等者集諦也上四句解前論中行諸惡三句標文也言不為生死而作留難等者解前論中應行者已行下二句釋名也不為生死作留難者不同凡夫渺渺三途水悠悠五道開雲飛由不過凡眾若為還三果四向尚不免人天受生何呪凡夫無學人絕斯過也言滅道滿故者都結也言論單釋第九等者問前來第八句經云亦如大龍此間第九句中言人中大龍即是第八句釋第九句何成單釋答前句之中直從阿羅漢人身上功德名為大龍所以論主嘆龍德此間單釋第九句但是舉喻將龍喻羅漢身上功德不是將第八句釋第九句問前來第九第十句釋第八句時第九中經文只言所作已作更無人中大龍如今單釋何故則有答經家本句即無論家即有但是功德不思議引喻也問何名煩惱怨敵答煩惱能却無生慧命如怨也言單釋第十句者經云所作已辦者已作所辦之事也言更不復生如相應等者論主解也生死永斷故名不復生如相應者安國云如謂真如相應謂正智與真如相應之智已成辦故攝有二解一云如者指斥之詞能證滅諦諸心心所名曰相應之事已成辦得故二者舉喻如者稱順之詞真如妙理前三果人名未稱順從三生六十劫來未曾得今日始得更不復生斷苦諦苦所作已辦斷集諦如世間相應事以成辦故言以第九第十句釋第十一句等者以第九以作所作第十以辦所辦二句釋第十一句棄諸重擔此以上起下也言後生重擔者論重解由滅道諦滿等者疏主解也即是經云已作所作道諦智已辦所辦滅諦智滿便捨後身生死諸法名棄諸重擔擔者押溺有情即生死因果問早晚得離答初果之人更有七生身直至無學方不受後有名棄重擔通取五薀為重擔體也言以十一句釋第十二句者以第十一句棄諸重擔起十二句逮得己利言即以涅槃為己利者疏主解也己者身也利者涅槃為己身之利無為法性體通恒沙利周一切人皆可證今羅漢一分故言己利也問與前所作已辦俱是涅槃二句何別答雖俱涅槃義有別逮得己利約能離重擔邊說所作已辦約所證滅處說也言以第十二句釋十三句者以第十二句逮得己利釋第十三句盡諸有結也言盡諸有結等者論主解也有者三者之身是果即是苦諦結者因義即集諦能和合於苦名結亦是縛義結縛眾生故名為結問結縛眾生皆是先業何不說業說煩惱名結耶答苦果本非是苦為從善惡業所生即合喚業為苦緣業力無不能自生由彼煩惱與業為緣故偏說煩惱名結也言能和合苦者無明貪等與業和合能招當苦三有之果言謂愛結等者一者愛結三界苦果不過貪愛故名愛結欲界四諦修道五部下各一計五个色無色界各五成十五个愛結二者恚結非愛有情及非情數一切境界嗔恚纏事欲界四及修道有五三者慢結謂即七慢由此慢結繫縛有情廣行不善通五部下三界合有十五个四者無明結謂三界無明於苦集法不能了廣行善所繫縛故五部下三界合有十五个五者疑結謂於諦理妄生疑惑不修五行五部之中疑唯見斷三界四諦下三四成十二个六者見結即身邊見邪見見結所繫故不能出離妄執推求謗佛法僧無有解脫身邊二見唯苦諦三界苦諦合成有六也邪見通四諦三界合成十二帖前三界身邊二見有六計成十八也七者取結謂戒取見取也虗妄執不修正行與共相應戒取唯在苦諦道諦也每諦各一三界成六个見取又四諦各一三界四諦成十二又帖戒取六个成十八也八嫉結九慳結二種問何獨此二別分為二結答一者慳結能令在家之人慳惜自財為貪因嫉結能令出家之人嫉他名譽為賤因故偏立為結也言由九種者結也言第八二句釋第十四句者以第二句諸漏已盡釋第十四句正智解脫也言以諸漏盡正智解脫者問因何得正智解脫答由諸漏已盡所以正智解脫正智是能證智解脫是所證真理離障義邊名為解脫此二有為無為別也言單釋第十五句云等者問因何得至心自在智答過見修道智故所以得心自在智此智出於初果見道智出於二三果修道智名出過見修道等言住見修道等者疏主解也初果住見道有三界九品修惑二果位修道有欲界三品修惑三果住修道有上界修惑上惑斷之未盡不名自在今此羅漢斷三界惑盡至此見修盡故名自在也問第十五句至心自在與得真自在何別答有為無為別得真自在唯約所證真無為說若至心自在唯是能證正智也前依所證理此就所得之果言由成上諸句至等者疏主添也諸句者前十四句也問由成上諸句還是將前十四句釋第十五句何成當句自釋耶答不是將十四句釋十五句一句但是說第十五句殊勝也先由成却前十四句功德方得第十五句若不具前十四句第十五句亦不成也言以第十四句釋第十六句者將第十四句善得正智心解脫句釋第十六句第一究竟也言第一究竟等者究竟者對未究竟問何名第一究竟答第一者對前見道修道名為第一前來十四句本經句中只言正智解脫本論中加心字即言正智心解脫疏中便兩度解脫別前將第二句釋第十四第十四本經中只言正智解脫正智是能證智解脫是所證真如理真理離障名解脫此間將第十四釋第十六第十四句中心字亦別義亦別也心即是定定亦得解即是俱解脫羅漢也此有四句料簡一果滿定未滿慧解脫羅漢二定滿果不滿第三果人得滅盡定不妨四禪八定總名定滿未成無學名果則不滿三者定慧俱滿是俱解脫阿羅漢四定慧俱不滿易解此定慧兩法俱滿便顯第十六句功德是俱解脫廣慧聲聞德也便顯是離定障起得神通及無諍三昧諸功德亦顯是至第一究竟處前五位羅漢却退未是究竟到也阿羅漢人教理行果是到彼岸前三果未得也問何名無諍三昧答諍有三種一煩惱諍九十八使并十纏二蘊諍所謂生死也三鬪諍謂諸眾生互相凌辱言諸相違無前三諍名無諍也阿羅漢人依第四禪定觀一切眾生諍從嗔生所以先作里巷觀直見何身起觀歡喜心則現歡喜之身方便令眾生不起煩惱名無諍三昧諸功德即五根五力等也言成到彼岸等者經云第一究竟論家云到岸也言唯上論文唯有三等者將論料簡第一位也謂以第二句諸漏已盡釋初句皆是阿羅漢以第四得真自在釋第二諸漏已盡以第九第十句已作所作已辦所辦釋第八句亦如大龍此中約所起有三句若約能起句有四句也且以上句為所起下句為能起問所起目何名起答是所起故名起當體是上上即是起名上起持業釋此類非一名上上起若能起名起四句是能起下句為能起問下句因何名起答能故起名起問何名上答上字屬他上句下句但名起不名上是他上家之起故名上起或能起上故名上起或起之上故名上起此類非一名上上起依主釋也言准論有七句以上等者此以上起下第二位也謂第二諸漏已盡解第三無復煩惱以第五句心善解脫第六句慧善解脫起第七句如調慧馬以第九句已作所作第十句已辦所辦起第十一句棄諸重擔以第十一句棄諸重擔起第十二句逮得己利以第十二句逮得己利起得第十三句盡諸有結以第二句諸漏盡起第十四句正智解脫以第十四句正智解脫起第十六句第一究竟言此以能起名起等者上為能起此以上起下能起故名起當體又是上句上即是起名上起持業釋若下句名起是所起故名起問何故名上答上字屬他句他句又是能起下句但名起不名上是他上之起故名上起依主釋或起之上故名上起言此類非一等者即指前來上下有七句名此類非一約所起句有七若約能起句即有九句也言准論唯有三等者第三位也謂第九句應作者作第十句已辦所辦第十五句至心自在此之三句唯是單釋言或第三句亦是等者第三句無復煩惱能見執我心所見者所執我相故亦是單釋言有二句不釋等者第四位也即是第五句心善解脫第六句慧善解脫此二句論家不將諸句來解名二不釋言有一句上釋下等者第五位也即是第四句得真自在即是向上第三句來釋亦曾將向下第五六句來釋五位訖言總說頌曰者牟意說有三有七者並約所釋之句不約能釋之句也若兼釋義即雜亂也言上釋下有七者亦是取所釋句言二不釋者即第五第六句也言一通於上下者通被四句釋通被下句釋謂第四得真自在句也問三句七句通上可得名上上起三單二不釋應非上上起答從多分說二云曾將此單句釋他餘句若釋著上句上即起名上起若釋著下句上之起故名上起也又第十五句亦是單釋以少多名上起若疏主解云由成上諸句至無學道即似將已上諸句來釋若依此道理上之故名上起也言今依此經文等者略相配屬也天親造論解西方梵本經經中總有十六句就十六句中秦經只有六句當第一第二第三第十二第十三第十五已上六句秦經也第六句心得自在便是第十五句至心自在也或可秦本經心得自在是梵本經中第四句得真自在由證真無為名漏盡自在故言以下釋等者下釋上有一句上釋下有二句如疏易知也言自餘闕故等者初二句闕他句來釋後一句心得自在若是第十五句即是單釋句此上三句盡是闕他來釋皆依自作行相解也言漏如前釋唯取現行等者問事須種現總盡方名阿羅漢何故空就現行說耶言此諸漏已盡者疏第一答以彼羅漢不受後有至由煩惱現行不說種子故名此諸漏已盡名阿羅漢者也言即是應已永害等者疏第二答以彼唯識論中三義解羅漢中永害煩惱賊是現行不說種子也言故入十地等者疏第三答順彼八地已去菩薩得名羅漢三乘無學不退菩薩總名羅漢就不退菩薩中有三一云二乘無學漸悟菩薩更不退起煩惱迴心向大得名不退菩薩二云八地已上菩薩俱生煩惱現行永不起故名不退菩薩得名羅漢三云頓悟菩薩入初地時分別惑業盡雖有俱生不為過失亦得名為不退菩薩永害煩惱賊故名為羅漢此證現行漏盡得羅漢名唯識三解初能變伏斷位次門中阿羅漢者攝三乘無學果位引決擇分云諸阿羅漢獨覺如來不成就阿賴耶名故後以四句分別一有成就轉識非阿賴耶三乘無學不退菩薩不入無心位二有成就賴耶非轉七地已前二乘有學一切異生入無心位三有俱成就第二句不入無心位四俱不成就即第二句入無心位意取初句然此三師皆言阿羅漢中論取第二師今取第一者顯是直往法華會中若是漸悟多是受變易厭或心多故三乘羅漢並捨賴耶得異熟名故論云恒轉如瀑流阿羅漢位於種現俱盡得阿羅漢名佛是大羅漢捨異熟受無垢淨識名捨賴耶受異熟名二乘亦乘受異熟一問今阿羅漢種現俱盡可名羅漢八地菩薩留或至或盡證佛一切智既餘種在何得亦名羅漢答雖種未亡現行盡處邊亦得名為羅漢上來以下句起上句諸漏已盡起阿羅漢言無復煩惱者以上釋下諸漏已盡起無復煩惱者釋也言煩惱種子得煩惱名者疏主初解唯約種子解煩惱収義不盡也言此可由彼雙離等者緣前初解収義未盡所以第二解唯依煩惱現行解無復煩惱所緣者即是相分也相應者相應縛能緣見分與煩惱相應名相應縛此之二縛俱是煩惱現行煩惱現行無故種子無故名無復煩惱問既第二解無復煩惱總作現行解與前諸漏已盡現行何別答疏主第二解同前句數中將無復煩惱一句作單解前諸漏已盡是一百二十八煩惱總是現行今此單釋無復煩惱是十煩惱中我見現行總漏既盡別執亦已我見現行若在餘九惑種子依我見生我見若無餘九惑種隨斷也故名無復煩惱無復重生重生有二一不復重生現行現行是能熏二不復重生種子種子是所熏種子剎那自生滅故六義說種子一剎那滅二果俱有三常隨轉四性決定五待眾緣六引自果意言偏言種子斷者種能生現熏種成但有法爾種子也無法爾現行故偏言種子也即種子是能生現行為所生問既此問是單釋引惑總漏盡是何意答意將總煩惱現行顯別執亦亡不是將漏盡句解此間單釋疏主暗將彼處能見所見來解此處復煩惱也上句諸漏已盡解下句無復煩惱言由斷生死等者逮得己利釋盡諸有結此以第四句起第五句上句起下句名上上起柙溺有情名擔故能得涅槃己利所以能盡諸有結問阿羅漢因何逮得己利答只緣棄諸重擔所以證得涅槃為己利也言即由逮得有餘者解盡諸有結問因何阿羅漢能盡諸有結答只緣證得涅槃為己身之利所以能盡諸有結結謂三有之因九結煩惱也言由以漏盡等者解心得自在若什公將第十五句至心自在來翻作秦經心得自在即論主第十五句至心自在是單釋句即是善過見道修道智故所以心得自在若什公將十六句中第四得真自在為此秦經心得自在來即得真自在是重釋句即同前來將第五六句心善解脫慧善解脫起得真自在句亦將第三句來釋也言離性事障者問何名得真自在答由離性事障證真無為名真自在即是心得自在此解經中第六句即當論中第四句離性障即慧解脫事障即心解脫二障既除八解脫滿名心得自在問何名性事障答性即煩惱滅此煩惱離性障事即定障由定為本能起神通神通之事而得自在名離事障言文既闕少者指餘文疏主同論家却將心得自在作第四句解不晚分疎云文既闕少等即此經中第六句若依論次第是十五句今疏主進退其事此取第四句之所以故言不可一一依論次第也文闕少故論家第四是得真自在秦經第四是逮得己利故名闕少不次也論有十六句此間秦經六句又不依次也言謂皆是阿羅漢者初句是下十五句為所依由此諸句方得有故總無別總攬別成總別無別開總成別阿羅漢一句總名應義一个應義中含十五義若向一處著總成阿羅漢一个應義若開別著便是十五門功德離別之外亦無總離總之外亦無別也
