body:
  text: 鏡水沙門栖復集言正法念經等者縱廣亦五百由旬也意明鬼趣先談琰魔王舉勝攝劣明鬼住處也問何名琰魔王答彼梵語此云靜息善能勸誨令受罪者嗔心不起故名靜息亦名饒益若眾生受那落迦苦不憶宿命王便教誨令憶宿命彼眾生了知自所作業甘受其苦不生怨恨脫那落迦身者利益名饒益王也問何等眾生生那落迦不識宿命答一邊地極愚癡人二極放逸人三極邪見人問琰魔王何趣攝答三釋一唯鬼趣攝婆沙云鬼世界王名曰琰魔二云地獄攝瑜伽十二云隨一有情由感雜染增上力故生捺落迦作靜息王三慈恩云此有二種一大菩薩化作即地獄趣攝二實報者即鬼趣攝問鬼有幾種答二種一威德鬼二無威德鬼婆沙復說此洲西南有五百大城一半是福德受果如天端嚴殊勝餘一半餓鬼形容醜陋轉輪王使巡歷至四洲唯有大福德者四天王天三十三天有大威德鬼與諸天守護防邏問鬼相狀云何答多似人亦似傍生問言語如何答劫初成時出言皆諦實後時隨處作種種言音即多不實後流餘處者如今人中天上總有也言人住四洲者此洲不是洲縣之洲是洲渚之洲也皆居醎海之灌灘也謨云人住四大洲八中洲各有人住身形小短也四大洲者謂南瞻部洲從樹為名東毗提訶洲此云勝身形勝南三洲西衢陀尼洲此云牛貨用牛為貨北俱盧洲此云畟方洲形方故其瞻部洲形如車箱東毗提呵形如半月西瞿陀尼洲其形圓滿北俱盧洲其形四方南瞻部如車三邊各二千南邊有三半東毗提呵洲其相如半月三邊如南瞻部東邊三百由旬半西瞿陀尼洲其相圓滿無缺徑二千五百三面各二千五百北俱盧洲畟方面各二千等四面各二千由旬方停人面亦爾三洲皆如人面大形也言四大王眾天等者俱舍云堅手及持鬘恒憍大王眾如次居四級亦住餘七山第四層級四天王及諸眷屬共所居住言住初金山者是別聚落所管之處三十三天住妙高山頂俱舍云妙高頂八萬三十三天居四角有四峯金剛手所住中宮名善見周千瑜繕那外四苑莊嚴雜色地柔軟等言皆漸次住已上等欲界空居天色界天無色天等言須彌山頂去下八萬等者忉利天去地八萬瑜繕那上去夜摩天亦八萬夜摩空居天也夜摩天去地一十六萬瑜繕那上去覩史多天亦一十六萬都史陀去地三十二萬上去化樂天亦三十二萬化樂天去地六十四萬上去他化天亦六十四萬他化天去地一百二十八萬由旬上去梵眾天亦一百二十八萬梵眾天去地二百五十六萬梵補天五百十二萬大梵王天一千二十四萬少光天二千三十八萬無量光天四千九十六萬極光淨天八千一百九十二萬第三禪少淨天遍淨天無量淨第四禪無雲福生廣果無煩無熱善現乃至色究竟天去地四千七十六萬九千五百七十六由旬言除無雲天等者即第四禪中第一天也章云下三禪有第一雲為地眾生業力共變以為地也第四禪無雲天已上自家業感宮殿隨身而來無彼寶雲為地故名除無雲也下三禪以雲為地無雲以上無雲為地故云除無雲也又云前來壽量至無雲減三上下量不減恐人疑將謂上下量亦減故別標指故言除無雲也又云緣下三禪有總雲為地無雲天中無總雲地恐人乍聞道無雲將謂乘上下量亦無也故料簡云此無雲天中上下量則不除唯除却當天不要總雲為地言隨先入定等者隨戒色界天身便受無色界果以彼定屬無色界攝說名無色界身也無處所者謂無色身或有有定果色名有處所無業果色名無處所處謂空處識處無所有處非非想處也問若處所無別處所如何經言上生非想處答此言上生者定最勝故是最後邊說名上生也非身往也言如前已說者指列眾中解修羅有五類一極弱者在人間山林地下住即今西方山中有深窟多是非天窟故知隨在四洲也上辨處所言多分者簡多分不簡少分少分亦有熱時遇涼風暫得受樂此說七熱之中受苦若無間純苦謂諸有情類一一共在一處治罸苦極生極生一處邪見邪見一處受苦也問此中獄率及獨烏等為是非情攝答章敬云小乘兩說如薩婆多經部等說非情數攝問既是非情如何判作治罸答有情業力如成世界風風雖非情亦能成世界若爾如何通彼偈云心常懷忿毒好集諸惡業見他苦欣悅死作琰魔使者追愛罪人領見琰魔王者實是有情收若獄率殘害於人非有情攝然上座部云此是有情收若爾敬火燒答此由業力所隔礙故業各別故章云同前琰魔王使有情攝二者但是業力初是有情後是非情問魔王使捉來四有之中何有去耶答有三解一云是非四有攝但是自宗心變作捉到王所受彼處心二者只是中有身尋常人不得見由業力故見捉將去也三者只是本有身去也謨云後道理稍長准藥師將死之時琰魔使者收罪人神識將到王所受苦報故言餓鬼有情多分者少分如五岳禹王等鬼神不受飢渴故言人趣等者如富者追於皆是苦言八熱等者地獄中又分四一明八熱二明近邊三明孤獨四明八寒此四中前二唯熱後一唯寒第三孤獨通寒通熱言等活者等活業若盡時死已不活業勢未盡死已却結故名等活等前還治也問既悶絕已六識不行如何得聞汝可還治答業力令治何假聞聲由因中行煞戮等不依道理招業報受苦皆不依尋常也言更相殘害者二解一云有情受罪之時種種苦具更翻殘害或斫或㓨銅揚鐵虵等作翻次來先且粘板打次卷啖次驢駒拔橛鳳凰翅三角瓦子等猶如人間𦒱因相似二云交此眾生互相殘害如刀兵劫時各自把刀相斫皆是業增上力感虗空有聲可還等活便治也言獄率者輔兵率也拼切無應為併比萌反有為併綳斵丁角反與卓同馸陟玉反言種種圖等者舌虵等是言羺者山似羺羊奴溝反胡羊也言兩山迫者問既被迫已即同非情如何却重受罪耶答身雖多段而命未終猶如藕絲持令相續地獄化生身識頓滅令既未滅故知不死言號叫苦相者一燒燃一支一節二極燒然一半已來三遍燒燃由如火聚䥫室如同胎藏也遍褁其身如子處胎而無戶牗博普各反弗初限反乳肉䥫也皺側右反襵涉業反上說根本也言近邊者瑜伽名近邊俱舍遊增此是通名別名鋒刃烈河也言皆有四方等者岸則墻也俱舍云此八那落迦我說甚難越以熱鐵為地周迊有鐵墻四面有四門開閇以鐵扉巧安布分量各有十六增多百瑜繕那滿中造惡者周遍焰交徹極火恒洞燃四面一門名四門非是一面有四門也言皆有四園等者俱舍云此河如前三以園四面各四增故言十六此更增刑害故說為增也言屍糞者謨云有泥如糞氣息如屍非以屍骸以之為糞以彼地獄是化生無屍骸故下疏言天及地獄與識俱沒無澤穢身也二云設使有屍有糞亦不妨此是業力不可難也言銛刃者切云利銳曰銛也吒𦍗言資胎者資骨兩邊厚肉也謨云切中無應作資膂力舉反言捉者臘音言而㓨者感音言周旋等應為洄洑也言大採綠等者大採綠豆即目連即是文殊師利問大目連經有四卷廣明地獄也言卷縮等者身肉卷縮不見頭面唯一肉塊猶如瘡皰何別若答數上泡皰實處名瘡也言猶皰瀆者瀆者烟即皰潰烟也言喝唽沾者苦聲漸重叫喚不得唯作此聲言郝郝者次更重猶能開口作此聲言虎虎凡者拖重開口不得但咽喉中聲言大紅蓮華者化度云如契經說有一羅漢得他心通觀見其父命終之後必入大紅蓮華地獄從定出已不令父知遂勸懺悔其父惡業雖勸不從子遂於家多種紅蓮華或別造作處處安置令使見之願已此華供養諸佛令見頻間心生悔愈未久之間父即命終便墮彼地獄見諸罪人身分凍烈或一或多如紅蓮不覺口云以此蓮華供十方諸佛作是語已應時苦具悉皆停息於十方界蓮華化生言其傍生者如野干提老顯等二者人家者不得自在如猫兒提者鼠等言由習上品等者內心要飲食喫飢渴至甚逢著泉池欲飲欲喫彼諸有情以刀杖防護其實無人防守皆是自心識變若又強取即變成膿面自不欲得飲食名外障礙也言頸癭者喉中肉也言名猛焰等者問此猛焰鬘與前炬口何別答前炬口鬼自不能食噉口生𤏙火此猛焰鬘自能食噉還被燒然是二鬼差別也言生熟臰穢者謨云食人肚名生臰穢食人糞臰穢言自割身等者如有一鬼自將一鐺而行到其山澤中案置其鐺聚置中燃火身入其中煑向下一段得熟唯顧口在自到食之此界前生身掌僧食利養自置喫今受此果也言俱生等者自生已來而便貧賤與生俱故名曰俱生有人從生至老受名等身窮也言麤疎者縠豆麵餅果判值等言逼切追者被官家追捉禁繫受飢餓匱乏苦言為他卑下者被郎主節減衣食逼切令交匱乏也言時節變異等者寒來無綿衣熱來無葛禮等言黑暗等者謨云二解一約事者如遂五欲人若至夜分黑暗而乖樂者故古詩云人生不滿百常懷千載憂晝短苦夜長何不秉燭遊二約法者黑暗即愚癡於所習善惡業中有始無終還生苦故言由那落者問何不於地獄立苦死答以彼人中立死為苦故地獄故死為等故言無解支節者依四空居天說若地居二天亦解支節苦如修羅與帝釋戰有解支節也言五相等者章云顯宗十三說有二謂少及大小五衰者一衣服莊具絕可愛聲二自身光明忽然暗昧三於沐浴水滴著身四本性囂馳今滯一境五眼本凝寂今數眴動此五相現非定命絕遇緣勝善獨可轉故大五相現設遇強勝亦不能轉也必定死如疏言復受陵等者陵謂欺陵蔑謂輕蔑問廣大福聚成熟與廣大五欲天子何別答由修因別故由持八戒及諸戒功德感得廣大福聚天子承布施力感得天果廣大五欲天子言其下二天者忉利四天王天也言即執四杖者金銀頗胝等意說人間福薄故有銅鐵餘石天上福德無銅鐵唯有金銀等物言若斷其首者首者頸也若斷首及腰即死若天人被斷手足及諸支節傷身破肉速還如故彼之同類竟不慰問若非天得勝彼二天即入自宮如敗軍將彼同類不慰問也言四種蘇陀味者天中有樹出四食味名蘇陀即青黃赤白言色無色等者無前六欲天中五衰苦也言麤重者泛論麤重一切煩惱種子現行及與習氣並名麤重慈恩論解捨二麤重章云違細曰麤違輕名重所知障名麤重者地地別斷此即種及習氣皆名麤重也又論解由明與暗定不相應中文云然二乘斷定障等時但斷麤重令相隨順不能斷種此即現行名為麤重糅云即上二界中行苦名麤重也言有煩惱等者令一有宗是有無之有一个有字是三有之有糅云意說三有之地皆有障故言瞻部洲等者此望餘三洲得名不定初劫之時人壽無量歲或減八萬至十歲也俱舍頌云北洲定千年西東半半減此洲壽不定後十劫叵量問北洲定千歲東西二洲有夭者否答東西二洲定壽二百五十及五百歲不說增減不遮亦有不滿二百五十歲有中夭者然於增壽不過五百故疏云壽增不定也南洲人造惡業猛利遂感壽命極短至等三更時壽唯十歲若造善業厭心猛利即命長或能伏煩惱乃至修行轉凡成聖多在此洲言彼人者彌勒菩薩當日造論折彼南洲人以三十日為一月等或時壽無量歲此是瑜伽論文若准俱舍唯取成劫初說無量歲此南洲有情有三不定一無量歲二萬歲三十歲有此不定也東西二洲皆有增字顯極增不越二百五十五百歲著增字意表有中夭者唯此北洲無增字但言定壽千歲定字表無中夭也言謂成增劫者成劫之初人壽無量非增劫初也一明人了言又人間等者明欲天也此人間三十日為月十二月為年人間五十年四天王天一日一夜即以此日夜為數三十日為一月十二月為年彼天壽命五百歲人間一百年三十日為一月十二月為一年彼天壽命一千歲人間二百年夜摩天一日一夜即以為數三十日為月十二月為年彼天壽命二千歲人間四百年兜率陀天一日一夜即以為數三十日為月十二月為年彼天壽命四千歲人間八百年化樂天一日一夜即以此為數三十日為月十二月為年彼天壽命八千歲人間一千六百他化天一日一夜以此為數三十日為月十二月為年彼天壽命一萬六千歲問持雙山已上日月並無如何諸天建立晝夜答有四義一華開合二鳥之喧靜三天眾寤寐四身光盛減若色界中身光常定不立晝夜但數劫數彼壽短長與身量等謂若身長半瑜繕那壽命半劫也二明天了言又四天王眾天者明八大地獄也且四天王天壽命滿足五百歲是等活地獄一日一夜彼以四天王天五百歲為一日一夜還以三十日為月十二月為年彼等活壽命五百歲忉利天宮壽命一千歲為黑繩一日一夜彼以三十日為月十二月為年彼黑繩壽命一千歲夜摩天宮壽命二千歲為眾合一日一夜合壽命二千歲兜率天壽命四千歲為號叫一日一夜號叫壽命四千歲化樂天壽命八千歲為大號叫壽命八千歲他化天壽一萬六千歲為燒燃一日一夜燒燃壽命一萬六千歲極燒燃壽命半中劫即從八萬歲減至十歲名半中劫或從十歲增至八萬名半中劫無間壽命一中劫即一增一減也又北京手記云劫者時分義上明者方圓高下二十里石長四十里天人以六銖衣三年一拂拂盡此石名一少劫盡四十里石名一中劫八十里石名一大劫言傍生餓鬼者料簡不定也有諸少虫亦生便死或生一日便死者或極長一中劫謂八大龍王如世尊言大龍有八謂難陀等皆住一劫能持大地也鬼以人間一月為一日三十日為一月十二月為年乘此年月彼壽命五百歲如尊者耶舍入城乞食城門外見一少鬼白尊者曰若城中見我阿娘早交出來兒受飢渴苦已多時後見鬼母語壽者曰我見此城七遍成壞故知命長也大乘瑜伽云以鬼畜不定故不說小乘云傍生中劫餓鬼五百歲約極處說也言又其八寒至近半者如等活地獄壽命五百歲胞地獄壽命二百五十歲近半者不是頓減一半名為近半與彼半數相隣近故如初熱等活壽五百初寒只二百三十四十歲也乃至無間一中劫是大紅蓮華地獄望無間近半中劫言近邊孤等者然根本地獄即說壽量長短近邊孤獨不說壽量長短但言不定言上說者問何言五趣不說非天耶答以彼非天壽量與三十三天同又亦非天天趣所攝故言五也言梵眾天至六十者即是一增減為一中劫也初禪了言少光等者第二禪第二少光天壽命兩个成住壞空此一百六十个增減劫也相國問何故此天對初禪頓超多劫前來於增減劫上漸漸加二十个何故第二禪頓加兩个火灾劫答緣初禪三天有尋有伺第二禪少光天雙出尋伺故加二劫二云業力有勝有劣感彼壽命短長不同言已上諸天者即無量光天壽命四个火灾劫極光淨天壽命八火灾劫上二定了第三禪少淨天壽命十六劫遍淨天壽命三十二劫無量淨天六十四劫三定了第四禪無雲天壽命一百二十八劫減三劫唯有一百二十五劫也問無雲何故減三劫耶答一云為成無想天中五百劫二云為成色究竟天一萬六千劫所以下云減三劫也若此處不減五百劫及一萬六千劫俱不成若爾何不至福生天中減唯獨無雲故知非理三正義云初出變異受即是樂受也初出第三禪樂受修第四禪捨受相應定由起心愛著第三定樂受故修第四禪定不能起上品所起定既是中下劣心不能全感無雲天中壽命所以減三劫也攝云有情唯識各自識變何得為他減三也福生天中壽命二百五十劫廣果天中五百良以別有高臺樓閣分為二天此小乘說無煩一千無熱二千善見四千善現八千色究竟一萬六千上色界言空無邊等者明無色界也上長短了言上來所說等者辨壽夭也俱舍偈云諸處夭中有除北俱盧洲暉云諸處者約總相而說非約別有情說亦有中夭者如天空一生所繫身及最後身菩薩信法行人見道聖人菩薩輪王母此等並無中夭者相云南洲之人造業猛利由我銳業隨業增減命有修短餘洲不然也言雖一切化生等者意說劫初三超人鬼畜多化生故無有滓穢身今時人趣多胎生鬼多分惡業所招故亦胎卵化生也義既不定故言雖也言然正法念經者明數也唯約八熱地獄并十六增說八个地獄每个四面四四十六并根本八个計一百三十六不說八寒及孤獨也言瑜伽論云等者指處也說地獄在此洲下小乘中說淺深雖不同亦說在此洲下也言若依正法等者在山北近山下不是在山底頭此正法念經說不是正義也若准佛名經中說鐵圍山間有地獄者此是偽經揚府有一寫經理人於寺中停止後寺家發遣懊惱寺家後到蘇洲偽寫地獄出向佛名經中安置唯說師僧受罪後時却寄將揚府流行且無來處也言瞻部等者謂劫初及八萬歲時壽量身形皆大今時人壽短身形亦少然隨自肘半量此上依瑜伽則三肘半定若依俱舍三肘半或四肘也身長者劫初時或四肘劫減身少或三肘半也若南洲人三肘半即東洲七肘西洲十四肘北洲二十八肘若南州人長四肘東洲人八肘西洲人中六肘北洲三十二肘今依瑜伽三肘半為定若依餘三洲人及南洲人自肘自肘量自身亦只是三肘半也俱舍云瞻部洲人量三肘半四肘東西北洲人活活增如次言四天王至四分之一者依此方笇一俱盧舍有二里一里有三百六十步二里即有七百二十步步別五釋總有三千六百尺四天王身形量四分之一身即長十百八十步計九百尺言三十三天至一足者增一足者添也即一俱盧舍是二里分四分四分之中取一分一分之中取一半名一足一足即是九十步四百五十尺言帝釋者潞云業力勝故其三十三天身量更加一足即九百上更加四百十尺通計二百七十步一千三百五十尺四天王身合有二足九百尺三十三天人有三足帝釋身四足與三十三天分臣差別故如一足通計帝釋身長半俱盧舍即是一里三百六十步一千八百尺時分天身量與帝釋同言漸漸各增一足者時分天四足兜率天五足化樂天六足他化自在天七足上明欲天了言梵眾天半者明色界天也梵眾天半瑜繕那梵輔天一瑜繕那大梵天王身一瑜繕那半二十四里少光天二瑜繕那從梵眾天至少光天此中四天中半半增從無量光至色究竟天倍倍增無量光天四瑜繕那極光淨天八瑜繕那少光天十六遍淨天三十二無量淨天六十四無雲一百二十八減去三瑜繕那有一百二十五福生二百五十廣果天中五百無煩一千無熱二千善見四千善現八千色究竟一萬六千瑜繕那俱舍云欲天俱盧舍色天瑜繕那劫四增半半此上增倍倍唯無雲減三潞府兼配大自在天三萬二千由旬彼是第十地變易菩薩住處此不取也且約分段說言然論復言等者問無色形者何故無色界天共立毛端乃至佛邊側立答疏言然論復言等答此是定力所現非是業力招名定果身也共立毛頭許大空地處所如疏燈光不相障礙也言其八大地獄等者若作若增長業力形則大也已作了惡業名若作更不曾經慚愧懺悔名若增長若再三懺悔了名不增長業也言其寒地獄等者亦約造業有增不增遂令身量長短不定也言諸非天等者有說四陪大於須彌山者化身也今說天本身只如三十三天身也若在須彌山北面宂居者身大言若在此洲者即西國有洲天窟身形便少也言此云無間者瑜伽論說有五無間一趣報無間謂人中死地獄生不究剎那故二壽量無間若生彼中具壽一劫三身量無間有一个罪人充滿其中說多罪人充滿其中解如一室有多燈光不相障礙四受極苦無間於一中劫無繫停息五極熱無間於一中劫無涼風繫問故言命極至此者問何故具壽一中劫答疏言命極等意言無中夭事須壽盡一中劫言般若經中者證此方劫盡更生餘方事須壽一中劫盡更生言非但唯者問何故不說墮餘七地獄耶答疏言非但等言此雖一業者問無間之苦須是生報經言展轉至無數劫劫盡更生即是後報如何總名生報耶答疏言此雖一業等同是謗經業引生更無餘業間隔總名順生報也意說雖隔多生從初而說無別業間故如等無間緣雖經多時識等不行中間無隔即名無間此亦爾一謗經業並名生報若別業攝即名後報相同此言三乘通逆者問三乘逆既無謗經云何言墮無間地獄答三乘通雖無大乘別逆則有也言其薩遮者證大乘別逆則有一若本來是故報修二利俱霑不令他修即名破塔壞寺先鑄寫得銅金像面目醜打破報鑄無罪若惡心打破得罪盜用者對面彌取名用私竊取名盜也障礙留難者不許講說擬開不交開名障礙已講次停却名留難有經論文盡取來不與名隱蔽不知有又不將出名覆藏責發調者令輸等是破僧者小乘則謗僧者小乘則謗僧為重若論五逆只受一中劫若謗經乃至無數劫也經言從地獄出至等野干者問既從地獄受罪了事須五支種子滅然後受畜生身逆須從五支種子生現行受畜生身此是順後何名順生業答業若差別感當果時有順生順後業業既一脫更無別業間隔遮莫五趣受生種種不同同是謗經所感故總名順生也偏舉從地獄出之意言證一乘能引多生不爾是言從地獄出耶章敬云今復一乘能引多生謗大乘經異小乘法不同俱舍論一業引一生然望所引應通後報今此經初受為名皆名生報也即是大乘一業多生一業能圓滿也丑救反者秞去呼又許救反𭊴音同許郁反畜養貯畜丑六反畜積也言今從初二者丑救許救二反也言大乘者一謗經業能感此異熟根本感等流故此云從初為名言此中言者從地獄出若狗野干若作駱駝貫下意也言領音苦骨反同窟音言三蒼解頭上有瘡無瘡低頭禿無毛名𩑔也言切韻白禿者一切頭上有白禿瘡總名𩑔設爾赤禿無毛有瘡亦名𩑔言或作髻者五鎋反其形髻瘦巧判呼也合作字作音呼言未詳者未見有也言𪑖黮合作字言又他感反者毯音同言於檻反言作嬲者嬲字奴巧反擾亂作嫪撓音同言猲有十果者總業是一由謗經故招十種醜陋果經云乃至經卷恭敬視如佛由起慢心謗法華經故作狗也若於法華淨心信敬不生疑惑者不墮地獄餓鬼畜生由起設心謗法華故作野干身也言一𩑔者法華經是諸經頭首由謗故頭禿無毛頂不嚴也言二瘦者此經圓滿之教讀持之人感得面貌圓滿由謗圓滿教故感得形瘦乾枯之貌相好不圓若持經人當來成佛妙色身七處圓滿言三色黧者此經是諸乘本故故喻於白牛白華是眾色之本持經之人感得顏色鮮白由謗經故障他慧光其色黧黮言四疥癩者此經是諸經宗媚萬德莊嚴持經之人感得眉高而長額廣平正人相具足由謗經故感得疥癩嚴身也或謗經故與佛法為瘡疣與持經為瑕故身招病言五觸者法華經是人天敬奉之經持經之人感得天諸童子以為走使謗經故感得他人持打嬈又自為童子愚願之一行故招童子打之言六人所者此經是諸佛護念諸佛歡喜持經之人人所喜見由謗經故不敬大乘感人所惡嫌也惡音烏故反惡由增也論語云惡紫之奪朱也言七常因者此經是有大觔力眾生法食持持經之人色身充足故無常困聞者歡喜佛遣供養經云我遣化四眾供養於法師引導於眾生由謗法食故令他法味不充故招常困飢渴也言八骨肉者此經是肥壯多力形體姝好之經持經之人感得面貌圓滿由謗經故感得骨肉枯渴言九生者被此經是出二種生死之經持經之人即往安樂世界蓮華化生由謗經故生受楚毒也言十死被者或被瓦石打死或死屍上被瓦石打名死被瓦石也由謗經故若生若死皆受苦也言一負重者此經是棄生死重擔之經由謗經故作駱駞身常負重此經是一切賢聖所乘之乘為謗故交伊生駱駞中或作駱駞與他乘人為騎身常負重也言杖捶者由持經故感得刀杖不加由謗經故感得加諸杖捶言三念食者持此經故感得法喜禪悅食由謗故但食水草言四無知者無知持經故智慧光明如日之照謗經故唯思飲噉而無所知言馲音等者洛音同日行三百里負千何物性別水脉以足括地即水泉出也言駱馬色者白馬黑鬃曰駱經言來入聚駱者為飢渴故言一疥癩者持經之人口無瘡緊由語經故疥癩滿身言二無一目者大乘經是一目小乘經是一目若大小雙謗兩目俱無今唯謗大乘故無一目也此經是眾生眼目持經之人感得其目皆清淨由謗經故無目言三打擲者持經之人感得諸天童子以為走使由謗經故被重子打擲言四致死者若人有病得聞是經病即消滅不老不死今由謗經故或復致死言一身大者此經出五道生死之經由持經故感法身報身由嗔心謗經故受蟒身也由謗出五道生死之經故身長五百由旬一切眾苦之所依止言二聾者此經是一切眾生耳目之經持經之人得清淨耳根聞三千世界聲由謗經故感聾也聞虵本無耳如何說聾答謨云雖無明顯依處還有耳根也言三騃者此經是智慧之經持經之人得普賢菩薩加被忘失句逗遂皆通利由謗經故癡騃也言四無足者此經是成佛之因因者足義由持經故感四神足足踏蓮華謗經之人以腹曳地婉轉而行也有云虵亦有足奉在腹中八藥取八堪為術法言五少䖝等者此經是一切眾生無漏法食由謗故被少䖝食也言應從踠者體屈也謗法華正身行故感體屈也唼所中反唼此二字書作攝音言一闇鈍者由持經故感得利根智慧也由謗經故得諸根暗鈍由持經故六根清淨也諸根者取五色根及依處也不是信等五根也言二矬者通俗云侏儒曰矬若瘡作痤也非此中義此經是道理最長之經持經之人感無邊身由起謗故感身短少也言三陋者此經萬德莊嚴牛車眾寶㽵挍持經之人感得百福相莊嚴由謗故醜陋又此經是無漏教謗著故害漏也言四者害手名𤼣法華經是一切眾生教手由謗故𤼣也言五躄者此經是無上菩提之足由謗故脚躄也有作癖與僻同病也言六盲者此經是人天眼目為謗故盲言七聾者謗經不流行令他人耳不聞法華故聾也言八背傴者謗正身行謗他正直捨方便經故背傴也言九人不信者由持經故信受今謗故令人邪見遂感人不信受報也言十口臰者持經之人口中常出青蓮華香身毛孔中常出牛頭栴檀香謗經故遂感口氣常臰也言十一鬼著者持經之人鬼神惱亂者頭破作七分我遣化四眾比丘比丘尼及清淨信士女供養於法師由謗經故遂感鬼魅所著惡鬼入其身也言十二貧窮者此經是有為倉無為庫富貴之經謗著者感貧窮果也言十三下賤者持經之人感得帝釋坐處梵王坐處亦與陀羅尼菩薩共生一處由謗故招下賤言十四破他者此經是自在無繫無所依求經天諸童子以為給使由謗故感被人駈使不自在也言十五多病者此經是南閻浮提病之良藥若聞此經病即消滅由謗故多病也言十六痟瘦者由謗他肥壯多力形體殊好之經故感多病痟瘦也言渴病者經言漸見濕土泥決定知近水由毀謗此教渴病隨生也言十七無依者一乘妙法大性所歸是一切眾生依附之經由謗故無所依怙也言由意為者問意業謗經如何言矬陋是身業所收耶答疏言由意為導等言有二果可知者金云由不令他親近經故得上果令他忘失故得下果又云由自不修四親近行故故使前人心不化錄二云縱使前人輕記遂忘由於前生不令他記憶或令忘失故招此果言薄福祐有二果者一治他不差果二自病無治果順方治病者冷病將熱藥治熱病將冷藥治名順治病也更增他疾者一則舊病轉加名增他疾二則本來患赤眼交治總不差更加腰脚轉名增他疾或因增疾而便致死二自疾無醫果若自有疾無人救療由謗經故合他人不聞法與他人為惡知識自家有病無人救療由諦法藥故設服良藥而復增劇即病難差也尊橫罹殃者若他返唯屬國家若他逆兼通自家中尊長對面奪名抄劫私裏取名竊盜如此之人合死不死傍邊有曰他喫杖償命望現世論則橫若約前生謗經業招則合與他受此解自不作賊得作賊名橫羅也二云被他人抄劫竊盜亦名橫羅殃殃罸也前解為正由謗經之人行是非理遂招感雖不返逆而被殃罸也言一偈不見佛者如斯罪人等此佛前佛後難言一偈不聞法者上二句如斯罪人常生難處處處之中攝五難也下二句狂聾心亂永不聞法配世智辨聰難此一行偈六難也潞云問以世智辨聰心亂者可然如何配聾答約不聞法名聾聾者盲也不以耳目為聾盲以世智者不聞法故不見理故莊子云豈唯形骸有聾盲者哉夫丈智亦有之經言如恒河沙者二解一恒河沙指上劫數二云如恒河沙指向下生數恒河沙中皆有輙聾啞也答因語不得名輙亦從胎中生便有聾啞故名生輙也言諸根不具難者即諸根不具難帖前七難成八也言總歷四趣受增等者簡要問前來受三途即言受異熟果此亦同彼何故即言增上等流答能感之業而有三種謂根本加行後起若從謗經根本業而受果者即為異熱若從加行後起而受果者即受增上等流二果業既有三感果亦別也謗經以疑心為加行以邪見為根本邪欲為後起只如出佛身血是煞佛加行亦是遲罪能招地獄等流增上果故所以兩處立名也以佛身不可煞故不成根本業道但是加行業道感相似等流也問夫言假者如似真地獄之果望謗經因如何得名相似義邊名假等流耶答由謗經故斷於佛種之他沉淪受三途苦令身自入地獄名相似也前生煞生斷他命令他人命短不長今世自得短命果報故名相似問增上等流二果何別答前生於法不信起輕賤憎嫉為因今生受果時增益嗔恚為果果似於因即是等流果身常臰處垢穢不淨是增上果也言園觀者解經常處地獄等謗經之人歸趣地獄如遊觀從一地獄出入一地獄如是不斷如遊園觀或只在一地獄嫁轉不行名遊園觀言餘惡道者解如己舍宅餓鬼道也人家舍宅屬於己身求拋不得受餓鬼身求拋不得如己舍相似又有作客即暫時若向自宗中即文長也言前據者問前總歷中不信此經生貪者少略而不說何故此中即說答疏言前據等意說前來謗經墮餓鬼少故不說今此少分亦有故開出也言瘖啞者問二種何別答化度云全不能作聲名瘖若有聲舌不能轉名瘂瘂由自作得聲瘖兼聲亦無也言骨也者切云嗟嘆聲也啞音與危同言疽音者疽有內癕在外故心不信如疽外發言不信如癕也持經之人以佛莊嚴而自莊嚴由謗經故聾盲等莊嚴也又持經之人如來以衣覆之由謗經故如是等病以為衣服也言深著我見者即十煩惱中五利使也言癡增者尅體不是癡以增上義解經深著也增益嗔恚也經言婬欲等者貪也由持經之人不為得女人之所惑亂言雖有性習者即姓種性及習種性也言別是非者於世間事上別是非即是會事也言先有學植者即是世間伎藝書藉也未必先曾聞法名學植言為說法華等者二解一云不求外道二性求覺悟不求二乘道若我於宿世等言曾見佛等者即取善本釋言六處也經言常修慈心者有慈心者必是精進利根人也經言無有異心者專注一境名無有異心異心即是散亂也故判為定習言捨慧知識近善緣者即是持戒之緣下安樂行品離十種惡緣不親近國王王子大臣官長不親近諸外道梵志尼乾子等及造世俗文筆讚詠外書等即是離惡緣後方持戒故名戒學也言質直等者明忍習也質直即安受苦忍亦有質直不能受苦今論能者質直之人事有卒如尾生與女子期抱梁而死等言常愍一切者耐怨害忍不簡親來害身死死亦能忍言恭敬等者問敬佛與諦察法忍如何相當答由佛能說法所以敬佛佛邊聞法也既聞法已復能忍釋名諦察法忍也言二偈半專求者不斷也問專求諦求二何別答專求不求小乘諦求不求外道又專求約相續諦求傳用心也言善戒經說內者不是學總盡名究竟且於一本向上解子名究竟若學大乘未究竟不許餘乘餘乘即小乘若久修者一日三時之中二時學大乘內明一時學小乘及四明論四明者合是五明論瑜伽二十五云一內明處此有二相一顯示正因果二顯示已作不失未作不得相二因明亦二一顯示摧伏他論勝利相二顯免脫他論勝利相三聲明亦二相一顯安立義及能成立相二顯語言無勝利相四醫方明亦有四種相一顯病體二顯病因三顯除已却生四顯斷已不生五工巧明顯各別巧功業用處所成立種種異相三十八云內明者諸佛語言名內明所謂因有十種一隨說因二觀待因三牽引四攝受五生趣六發起七定異八同事九相違十不相違束為二一能生攝初二二方便攝後八復說四緣五果異熟等流增上士用離繫菩薩於是內明所顯正因果相如實了知精勤修習令處非處智力種姓漸得清淨漸增長何名第二相謂諸有情自所作業雖復作已經多百劫與果功能終無失壞亦無不作或復異作而有異熟由此修習自乘智力種性漸得清淨因明相者謂欲如實了知外道所造因論是惡言說為欲降伏他諸異論為欲於此真實聖教未得信者令其淨信已得信者倍令增廣聲明者若諸菩薩於聲明者為令信樂典語眾生於菩薩身深生敬信為欲悟入詁訓言五曰文句差別於一義中種種品類殊音而說醫方明者若諸菩薩求為息眾生種種疾病為饒益一切天眾工巧明者若諸眾生少用功力多集財寶為欲饒益諸眾生故為希眾生希有奇相為以巧智平等分布供養攝受無量眾生菩薩於此一切五明悉修習以大乘經是明內收故若學大乘心究竟遍學餘四若未究竟恐方癈大乘也唐三藏只翻因明論不翻四明論恐癈大行也言餘經者即是不了義經及小乘經等名餘經及顯於此一乘諦求之相二者外道教中亦有經故大有經等此方儒書有孝經道書老子道德經莊子為南華經經者常也百代常行之典言志誠感神者誠由和也證志字舜治天下三旬苗人逆命益背於禹領兵往伐經于多日打伐不得禹問王曰階下志誠感神是三苗而不歸他帝遂其言於是廣修文德經七十日此三苗人即自歸命志誠和得鬼神也書云帝乃誕敷文德七旬有苗格格由至也討而不伏不討自來者明御之有道也三苗之國左洞庭右彭蠡在荒服之側者也此解經中如至心也言尅念作聖者尚書云惟聖因念作狂雖狂尅念作聖注言惟聖人無念於善則為狂人惟狂人惟能念於善則為聖人尅由能也勝也自代也此意言上智之人交作下事亦不得下智之人交作上事亦不得中容人遇善人教即善遇惡人教即惡也信解品第四言譬喻品後等者問初周法說何故前鶖子不以喻領第二周喻說何不四大聲聞法領答順佛意故世尊法說鶖子法領世尊喻說四大聲聞喻領前佛意諸有智者以譬喻得解故以喻領若不如此與佛相違也此第一解約無學說言二云論解七等者第二來論宗對靈山會上有一類見道前聲聞凡夫執自所迷無學果乘以為究竟我與如來乘無別無異為對治此故此品來也言七譬喻者第一為顛倒求功德增上慢人說火宅喻第二為求聲聞解脫一向增上慢說窮子喻第三為大乘人執唯有大乘說藥草喻四為有定人說化城喻第五為無定人說繫寶珠喻第六為集功德人說解珠喻第七為不集功德人說醫師喻言顛倒求功德等者人天果報不是功德妄計為功德三乘聖果不求人天果報名為顛倒迴求佛果方名順起非顛倒也言第二求聲聞解脫人者聞世尊言教教我生已盡不受後有遂有見道以前有學凡夫求二乘果名求聲聞解脫唯求小乘不求大乘名一向若兩種總學名兩向大乘法名增上得己所得陵大乘不修名慢言我乘與如來乘無別者攝云我所求乘名為我乘以此人者是有學故問求二乘者是不知佛與二乘異耶答據實斷煩惱解脫生空理而為同也便計之三人同坐解脫床一切總同其實不同不同為同名顛倒也言如是顛倒取對治者問此品是四大聲聞自領解說此品如何名為對治答說七喻皆有二意一為四大聲聞領解二為傍對靈山會上一類有學凡夫緣經家正領解文分明傍對文則不分明所以天親論無偏舉傍為之人故言為對治此說窮子喻也問此專求解脫相狀云何答二乘無學從正證生空理後入定觀前所證以心麤故不見正智及生空如乃見加行位中惑苦不生心便變作涅槃想解所變相分多化城能變解心計為羊鹿車此名顛倒自既顛倒轉向凡夫二乘說此倒心二乘凡夫專意忻求此聲聞解脫也言前以無為乘及後乘等者明二乘人起執所由無異二乘字通上有為無為兩處轉也糅云二乘之人三十年前聞說三人同坐解脫床即是前以無為乘無異也及後乘無異者即是法華會上聞說十方佛土中唯有一乘法無二亦無三即是後乘無異也十方世界有二有三即說我與佛有異十方世界即無二無三乘故知無異也問法華會上何名後乘答對彼般若會何不得名後乘也二云金城等說前以無為乘無異者方便品是最初說故名為前也說彼示佛知見三乘法身本來平等又第六遮遮無二乘涅槃唯有法身又云諸法寂滅相不可以言宣故名無為乘無異也言後乘無異者即是第二周中名後乘異羊鹿二車總不與三乘諸子同上牛車既等賜牛車故知三乘無異也如來意緣伊有大乘種姓不肯迴心向大來便說唯一佛乘無有二乘此是佛說教意也鶖子與四大聲聞聞了便悟解捨却迴心向大來也言彼便迷執者攝後不悟意而便執云既言三乘而無有異何假更求大乘故欲求少將少與大而無異故言有為及初乘是異者攝云為事運即是佛果菩提對無為理名為乘云初業者即是三乘因行對後佛果而得初名或唯二乘名初乘對彼大乘而得初名依前釋潞云意言為乘中以求於種智無為乘中未得法空三乘因行即是窮子後之佛果名為長者問四大聲聞解前無為及後乘是一何乃說長者如佛窮子即是聲聞顯乘異耶此言既知會小入大而求一乘何故而說於小答聲聞自敘昔日大性悔責求小如於窮子世尊居大如富長者教化我等令同取大解經經大富長者則是如來我等皆似佛子如來常說我等為子正是解前乘無異也言一除疑者所斷疑迷解疑者於諸諦理猶與為性即五十八云緣五事生因果作用諦寶實事生故信則於彼三寶等境深忍樂欲心淨為性故名除疑名信言破迷者即是根本中癡論云癡者於諸諦理迷暗為性無癡自相明解為性無癡正是對治於癡故說破迷名解言於菩提心不喜者經言不生一念好樂之心即舉樂欲信家之果出不信相也便於正覺亦不能信信即悟解一乘之道出不解相也言疑悔皆除者疑除釋信悔除釋解言信即忍欲等者舉因及果由信忍可能令心淨此信為因方起其欲欲是信果信為欲依據因而說名為信解論云於實德能深忍樂欲淨心為性忍者謂勝解即信因欲者謂別境中樂欲即信果言印希之妙智者解謂勝解決定印持智生已故有希望潞云雖體即信解然此兼取智之用也今謂信俱俱智正解解宗也能解於智言信除不信等者約能了心智解也言心淨復知者非直心生淨智而亦復能解知心淨是信復知是解即心淨解信復知解解也言信即能了之心者由信故同時能了之心而得淨也問若爾令心淨漸等何別答此淨為相無濫彼失言所達之理明者即一三之道理也即是智用解之異稱言解信深淺者初聽之時且生淨信後方悟解言信即順者今聞如來所說一三之理而忍可之即舉信用以顯信也言三信顯由他等者約由他自悟解也言順他以心淨者隨順於他一三之言教而自心得淨也言解乃顯己者相國云此比量而知當來成佛非是現量智證知也初地時方能現知當成正覺故唯識九云菩薩得此二見道時生如來家住極喜地善達法界得諸平等常生諸佛大集會中於多百門已得自在自知不久證大菩提能盡未來利樂一切言於人於法者潞云從他人信故於法生信由自解故於法生解意言於他者即於法並有信故自於人於法並有解今謂他即可知自於人解即知自身當來作佛也又證云於人者信佛語故於法者隨順此經故初人後法言四者信解二言者四約根性位地解也言今有雙簡者即兩重四句中皆取第三句也名為雙簡也言隨增義等者問既信與解二不異者應信與解體亦不殊答據實言之於教於理俱信俱解但隨增義說各別解屬於教信屬於理故疏言解教實權等問次前所云於教於理俱信俱解今者何故解屬於教信屬於理耶答良若據隨增即解屬於教信屬於理以義通論俱通教理言於理未證者金云於理言解恐濫證解故不說也教是名言即知是教緣共相名相名言之比量智無濫可簡著解無失言以義通論者意言教上雙有信解二種理上唯有信也意言亦可比解於理今四大聲聞但是比解而非證解意在於此也言亦信亦解等者二解一約所緣教理俱信解可名持業何以故以信是善十一中之一教解即是慧即別境中一數雖同心所體乃各別如何得言信即是解今約能緣二德解者謂此四大聲聞正起信時即解心起解時復信不同於前所簡別者或信而不解或解而不信不名持業但此四人有能信能解二種之德名為持業假者一身持此二用名持業亦如攝論釋大乘名亦乘亦大名持業如釋菩薩名亦菩薩亦薩埵名為菩薩後解善言上根唯一者金云舍利弗以練根故名上言中根亦一者目連神通第一得四禪定俱解脫故名中也言皆屬下性者慧解脫故然有此說須撿婆沙如十大弟子中更無俱解脫者也言何乖此理者何乖此婆沙道理也或可何乖此四人為中根之道也如下自言意說若唯修小乘行得聲聞果以約利鈍分為三品者即舍利弗是上根目連是中性所餘是下根今此乃約諸聲聞等迴心向大者分為三品是故舍利弗是上根四人是中根餘為下根若作此解未爽真趣此經不乖彼婆沙道理也言且如悟空善現等者疏主意鶖子練根名第一者且如悟空善現等各有一勝婆沙何不總使齊能俱為第一後既各隨一義三品不同此亦各據一能四人為中品而有何失言何必齊能者反質詞也意云十大弟子皆稱第一者何不齊能彼既不齊得名第一此雖三品不齊何妨四人中性如彼十人能雖不齊而皆稱第一縱使不齊中性四人何咎也言論從破病者隨窮子喻破執乘一之病也經言歡喜踊躍者三周皆有歡喜初周言爾時舍利弗踊躍歡喜即起合掌瞻仰尊顏而白佛言等第二周即此文即第三周富樓那得未曾有心淨踊躍又下云爾時千二百阿羅漢心自在者作是念我等歡喜得未曾有若世尊各見受記如餘大弟子者不亦快乎經言從佛所聞者何名所聞答所屬聞即是授記等事若所是處所聞屬能聞於佛處所而聞此法也聞佛與舍利弗受因記果曾華光等此是未曾有法四十年佛不曾與聲聞受記皆言聲聞如敗種等不得成佛今聞舍利弗得記所以歡喜言歎願雙成者證云歎具二命彰其願滿故具壽言含斯二義若但言慧命便闕壽義既不名具壽若慧命二義俱含故名具壽二皆具足曰雙成歎斯願遂故歎願故疏指云單言慧命義便闕也路應云慧命雙或歎屬聖人聖人以智慧為命共所歎故願屬凡夫凡夫以身恒壽為命共所願故今尊者二命齊有故言雙成抄云歎願甚長雙成未盡疏意雙成不望善現解意言俗壽聖命既各差殊一具壽言雙包二義即歎及願故不言慧命之言不稱身壽之言故云具壽不言慧命也言解具壽之因是雙成也言以德彰名者謨言善現解空第一解空之智即屬慧此言慧命故云德也問四大聲聞中迦葉為長何故列名最先須菩提答為下先明般若會中之事昔兼在彼作三空門須菩提解空第一故先列也此但明最先不辨餘人次第不爾迦葉寧在旃延之後言近開喻說者即前火宅喻也言遠聞授記者即譬喻品初授鶖子記也或聞方便品中聲聞若菩薩聞我所說法乃至於一偈皆成佛無疑非是聞自授記以未說故言一從座起者二乘之人一向忻涅槃猒生死無利他事如生從彼發大心名從座起言菩薩戒者即三聚戒中攝律儀戒也非先不持然彼所持為大菩提故故作是釋言作吉祥事者偏袒右肩精進之像也表作吉祥事故問何不袒左肩答凡所作事用右為先故右者順也新翻大般若云偏覆左肩不及言右肩言覆者餘處亦覆故是得言偏言右膝者今發大心如地故言五一心等者昔日曾發大乘心身中又有二乘種性不得名一心今日捨二乘歸一乘更不異緣名一心也言六合掌者二乘捨權取實心如一手如來順彼如說法華經如一手合教手如世間人兩个手心相向故名合掌言七曲躬者表身心皆俯順故內心順佛外相曲躬昔日心既未迴外身亦偃蹇表身心不肯順佛故言曲躬言八瞻仰者內心觀理外眼觀佛故言瞻仰心觀外教下理依此理瞻仰法身佛教是化身說聞教之時便是見化佛身依理觀法身依教觀化身佛也言九而白佛等者內心既爾外相瞻佛發言信解大乘也言居僧之首等者問昔時何得不悕大乘答經我等居僧之首疏解望重位隆臘長年高座居行首為五山長者作南閻浮提僧中上座不可改却舊事業捨小學大老人作事事須有終始謨云隆字國諱應政崇音呼言二年等者齒年也屈弱也修行事須年少時老邁修道三種無味故老時學者如日暮三光言三自謂者問因何昔時不希大乘答疏言自謂已得涅槃正是不希也苦盡心泰麤衣麤飯且過朝夕阿誰准擬化高官大軄只為當初聞其少教依之修行便得此少乘果後有依身盡故自己為足更不求大也言四無所堪等者疎者踊嬾也不能三大劫修行故不求大乘行大乘行事須是性巧有志之人我性拙拙運謀發二乘心得二乘果便不求大乘名性拙也言下明廣不希者問何名初略後廣答略則初住少不希廣則約住大不悕大則般若會下是也今領昔時意也言初談往事者經言悅法既久者即說八部般若四處十六會名久經言世尊往昔者四十年前也說法既久者說八部時名說既久也我時在座等者良由內心不忻樂也言遂作三觀者聞般若經大乘空義作小乘三空觀也但念空無相無作無作即無願也此三空觀攝四諦十六行相苦諦有四一苦二無常三空四無我集諦下有四因集生緣滅諦下有四滅淨妙離道諦下有四道如行出今以三觀攝彼十六行者小乘依四諦作三空觀大乘依三性作三空觀言其空攝二行者一由執苦諦為我及我處處以聖者觀苦為無我為除我見故觀苦為空除我所見故今者疏合言之故言觀眾生為空即三解脫門中空觀空觀體寬能攝二行名觀眾生空若苦下空行即狹唯攝空我所不能總觀眾生為空故問苦無常亦是空所不觀之答此空無我與涅槃行相同故所以觀之問空與無我何別答謨云無我即但觀我體是無也空即麤觀行我所也言觀眾生為空者意道不是法空是我空觀也菩薩即雙觀生法二空也言無相攝滅者謂滅諦下滅淨妙離四行相也言無作即是無願攝所餘十行者為諸聖者一向猒背趣寂靜故道四無漏亦棄捨故況集四行耶言所餘十行者集諦四行集因生緣道諦四行謂道如行出并苦諦下二謂一苦二無常也問不取苦集於理可然如何道諦亦不願求答小乘但是有為之法皆不願求但是無為即求也大乘不爾是有為無漏亦皆願求言此通有漏無漏等者料簡三慧差別章敬云若言空無相無願通有漏無漏通聞思修三慧若言空三昧無相三昧無願三昧通漏無漏唯修慧不通聞思若言空解脫門等唯無漏不通有漏唯修慧不通聞思又相國云此解脫門有五種異一云三三昧通於心境二云三空門唯心非境心為門也三云三解脫門體唯無漏離障塵雜方名解脫門四云三昧唯屬修慧不通聞思五云三觀亦通三慧謂聞思修今此所釋通三慧也問疏主爭知通三慧耶答疏主通云經中不言三昧但言空無相無作疏主體經意故通三慧也言餘義皆如瑜伽者疏主有瑜伽略纂也言此依聲聞至不說菩薩者問此與菩薩三空觀何別答糅云菩薩三觀即是八行為無相六行為無願二行為空也此中意說無相攝八滅道二諦下各四行也無願攝六謂苦諦下二空無我集諦下四俱有漏故此上四諦十六行相菩薩與小乘不同也化度云菩薩三空依於三性以為觀也謂以無分別智內證真理不見一切當情顯現名為空觀既觀一切皆總為空於此中都無願樂名無願唯有真如理本性常寂名為無相觀與小乘別也言於菩薩法者總分七類也潞問三十七菩提分正是聲聞所修行法如何今言於菩薩法等答菩薩之行略有二門一降伏行二二利降伏有二一降伏聲聞謂三十七品二降伏外道謂六神通二利行中有二一自利行淨佛國土二利他行謂成熟有情行故今據降伏二乘迴心向大故三十七分名菩薩法亦無有失也言一四念住等者二別陳名敬謂此四種自受心法一觀身不淨除淨倒二觀受是苦除樂倒三觀心無常除常倒四觀法無我除我倒觀身不淨除淨倒知苦諦觀受是苦除樂倒斷集諦觀心無常除常倒證滅諦觀法無我除我倒修道諦章敬云觀身不淨立身念住觀受是苦立受念住觀心無常立心念住觀法無我立法念住身受心法是所住四境念慧兩法為能住住心於此四處之中名四念住也問既言念住何故疏言以慧為體答身受心法是所觀境慧之一種是能觀智即慧與念俱起同緣於境念先憶持令其不忘慧隨於境簡釋是非以慧簡擇力勝故故慧為許此念隣近於慧名為念住也身受心法者積集名身領納名受集起名心軌持稱法四種別也言二四正斷者如外道者如外道等亦有修斷之事倒故非正名為錯學亂行不正然正能慧是智功能由精進能助從助而說故名精進於此四中舊云四正懃新云四正斷若言正懃約體若云正斷約用也對法論說初二緣已生未生所對治法為境後二緣已生未生能對治法為境簡要云一已生惡法修律儀斷行道禮念佛三業精進總名律儀為斷已生惡法修能斷律儀律儀即斷持業釋如斷蛇頭也未生惡法於修斷斷惡法未生更修能斷道遮令不起向上斷字是未惡法上是能斷之法如沒提塘下是所斷惡法能斷故名斷斷問精進能斷惡可許說為斷懈怠是惡法如何亦名斷答精進能斷惡故說名斷懈怠惡能斷善故亦名斷也能所合說故名斷斷三未生善法修習斷善法未生事須修習令生由精進心生起善法名修習精進心為能修習善法為所修習如鑽火等精進心如次火鑽生得善法如火生也修習正喻鑽火四已生善法修防護斷由精進心增長善法令惡不起名為防護如數溉灌等問惡法是懈怠可許說為斷善法既已生如何說名斷答惡法是懈怠善法是精進斷惡亦名斷言三四神足者二解一云神謂神通足者定也因也四禪定為因感得神通為果禪定有四名四神足也二云欲勤心觀為因禪定為果禪定為因神通為果神足有四名四神足一者欲對法云謂由慇重猛利樂欲為因方能得定二者勤謂常勤精進無時暫息方能得定故三者心定能持心心自於定故得心名即等持為體問若爾因果何別答四神足中心是前前世所修劣定令彼種子功能增長今住得彼勝定皆因前世劣定為因也四觀者謂由聞他教法內自簡擇生得聞思一慧故名觀觀即慧也問神足是一如何言四答因有四故名四也此即從果名神從因名四當體名足言四五根者生長善故說名為根信者於三寶四諦生忍可故進者於諸善法勇猛造修故念者於境善惡印持不忘故定者於諸所緣專心一境故慧者簡擇是非可取捨故信等即根皆持業釋金云小乘五根在忍位修五力在世第一位修若大乘宗於𤏙頂二位建立五根忍世第一修五力也問根力何別答與前五根體是一所望別故生長善法名根不可屈伏名力種樹令生根令枝葉漸長名力言六七覺支等者擇法得失故精進者勤修善事故喜者意中適悅故念者明記不忘故定者專注所緣故捨者遠離沉掉故輕安者調暢身心故擇法至輕安皆持業也章敬云覺者慧也支者分義此有二種一覺即支所謂擇法二覺之支即是餘支言三是別境者擇法覺支念定也擇法是慧慧能簡擇為義在有漏位名慧在無漏位名智言三是善數者謂勤捨輕安言一是遍行者謂喜其實遍行中無喜但有受是喜受故若小乘別修行相在修道大乘七覺支別修行相在見道以七支中喜覺支順菩薩心歡喜地故問入見道皆有七覺支否答糅云若二乘人依未至定初二禪根本定入見道說有喜覺支若聲聞超越者及麟喻及菩薩皆依第四禪入見即無喜覺支唯有六覺支也論中但言入見而有七覺支不言入見道要具七覺支故有六覺支亦無有失也言七八聖道者化度證云無漏智在身名之為聖聞通涅槃名之為道或離八邪名八正道章敬云無漏慧名聖道支者分義道此即支二云道之支謂餘七法也謂正見者觀察諦理故正思惟者籌量義理故正語者離四邪故正業者身離三過故正命者離五邪命故正念者明化所緣故正定者攝心不亂故正精進者斷惡修善故上列名下出體言語其思惟等者章敬云小乘諸論以尋伺為體今依大乘唯識有兩師因中果位皆以慧為體佛無尋伺能發語故以慧為體二者後師以尋伺為體以彼尋伺通因中無漏不通果中體通無漏得作道支菩薩於未究竟位於藥病門中未能遍知後得智中為他說法必假尋伺問思之一法亦能發語言何故唯取尋伺答由正思惟以慧為體能發語悔言示於他善非慧者餘法無此功能故對法云思惟者誨示支如其所證方便安立發語言故問此與正見俱是慧故有何差別答正見是分別支也思惟誨示支是二差別又證法發言二種別故言正語正業至為體者正語正業為所發無嗔無癡為能發正命為所發無貪為能發也無貪癡所發語業名正語無嗔癡所發身業名正業若無貪所發意業名正命言離五邪命等者此是智論二十三說一者常行乞食前利養故詐現異相奇特二者為利養故自說有得三者為利養占相吉凶為人說法四者為利養故高聲現威令人畏敬五者為利養故稱說所得以勤人故斯活命故故稱無表問何名為色答身口七支為所防現行思為能防能防是心法所防是色將能防就所防說名無表色思體不是色或有說思體不是色向上有防色發色功能名色此上依大乘解謨云疏意以無嗔癡所發身語即是惡色惡色不起起現行思故取無表色思為體有云思種子為正語等體非也此是隨心轉戒也不別解脫戒也言餘如自名者正念正見等此依自名疏中更不解更不解者依他自名也言三十七種合體有九化度云一慧攝九法謂四念住為四五根中慧根五力中慧力七覺支中擇覺支八聖道中正見及思惟二也二精進攝八謂四正斷為四五根中進力七覺支精進覺支八聖道中正精進三定攝於八即四神足為四五根中定根五力中定力七覺支中定覺支八聖道中正定四信攝於二即信根信力五念攝於四即五根中念根五力中念力七覺支中念覺支八聖道中正念六喜七捨八輕安此三如名各攝一九無表色攝三即八聖中正語正命三也其正思惟唯顯揚論不取別境中慧為其體直取遍行中思為體者即體有力也則云若依前師因果二位皆以慧為體但有九法若依後師正思惟前中因位開出尋故便成十法即同俱舍論如彼偈云此十事准十謂慧勤定信命喜捨輕安及戒等為體言遍行有一者謂喜遍行無慧有受即五中喜受也言如無垢稱者彼第二卷五門分別一釋總名二明位次三出體性四明修位五有漏無漏今疏有二三兩門略為十類即是明位次也合體有九即是出體門餘三門廣如彼疏言菩薩所修者初依小乘配五位者四念住在解脫分位四正斷在𤏙位四神足在頂位五根在忍位五力在世第一位八聖道在見道位七覺支在修道位若依大乘配五位者四念住在三賢位四正斷四神足五根五力同小乘在四善根位七覺支在見道位八聖道在修道也問何故七覺支配見道位答有二義一為隨數隨增次第而說故在見道二云喜覺支順初地故問聲聞菩薩其數皆同行相何別答有五種異一求果異二斷障異三二死一死異四悲智異五利行異由此五異也言第二遊戲神通者即六神通而現十相八相等凡夫將車馬喜樂飛鷹走狗等以為遊戲若是諸菩薩從知足天沒降神母胎至八相成道教化眾生乃至涅槃皆是遊戲若凡夫遊戲損物命若諸佛菩薩遊戲利益眾生言與論所說謨云論即攝大乘論等字等取法喜論彼般若經中八相解往成熟言八相者一從兜率天沒入胎相二嬰兒三童子四苦行五成道六降魔七轉法輪八入涅槃又華嚴經有十相與八相有異二法華論無彼現受生相及向菩提樹相故言有異三者法華論成道了降魔華嚴降魔了成道故有異也諸抄合十相為八相者今第三受生與童子為一又合第六入第七向菩提樹與降魔為一故有八相也言第三淨佛國土者辨云疏引無垢稱經凡有兩重初淨佛土果以化他即第一卷文後淨土因而利己即香臺品文中唯說淨土因也言有十八種因者若秦朝所譯經文闕第三初亦不次隨文於出此無垢稱經中第一謂發起無上菩提心者即是維摩經中第三大乘心是菩薩淨土菩薩成佛時大乘眾生來生其國王中感大乘眾生即是果也由發起無上菩提心為因故言純意樂者此中第二純意樂梵言阿世耶此云純意樂不雜惡法純淨內修名純意樂也即當維摩經中第一直心是菩薩淨土菩薩成佛時不諂眾生來生其國國中不諂眾生即是兼果以明也言善加行者此中第三善加行即維摩經中所國也問何名善加行答加功而修名善加行體唯是慧有情任持不捨善行有情來生其國言增上意樂者此中第四增上意樂即當維摩經中第二深心是菩薩淨土菩薩成佛時具足功德眾生來生其國此上依章敬分配與諸抄不同言此四各如自名者依他經中自名解釋也言六度合為六等者從布施為菩薩淨土已下六度合名止息攝云由此六法故能遣六障名為止息布施止息慳貪持戒止息毀禁忍辱止息懈怠禪定止息散亂智慧止息愚癡金云即當舊經云布施攝貧窮持戒攝毀禁忍辱攝嗔恚禪定攝散亂智慧攝愚癡故六度能止息六障也經云布施是菩薩淨土菩薩成佛時一切能捨眾生來生其國持戒感行十善道滿願眾生來生其國忍辱感三十二相莊嚴眾生來生其國禪定感攝心不散亂眾生來生其國智慧是菩薩淨土菩薩成佛時正定眾生來生其國此六度名令名止息言四無量者是菩薩淨土菩薩成佛時成就慈悲喜捨眾生來生其國四攝事是菩薩淨土菩薩成佛時感解脫所攝眾生來生其國巧方便是菩薩淨土菩薩成佛時感一切法方便無礙眾生來生其國菩提分是菩薩淨土菩薩成佛時念處正懃神足根力覺道眾生來生其國也言此四合名等者既除障已處發起善故前三發起利他功德後一三十七菩提分發起自利功德也言凡所修等者如彼經中自名舊經云迴向心是菩薩淨土菩薩成佛時得一切具足功德眾生來生其國言說息無暇者惟受眾苦無暇修善處所有八無暇即維摩經說除八難是菩薩淨土菩薩成佛時國土無有三惡八難也潞云然由四輪或復五法除八無暇者成實論云四輪摧八難一住善處謂生中國對治五難三塗北洲長壽天二依善人謂值佛對治佛前佛後難三自發正願謂正見心對治世智辨聰難四宿植善根對治盲聾瘖瘂難五惡處難第六惡時難第七惡因難第八惡果難五法者一受持戒品治三惡趣難二宿種善根樂行法施除聾盲瘖瘂等三正見信解除世智辨聰四親近善友除佛前佛後五生中國除北洲及長壽天菩薩常說四輪五法故能息除八無暇果名說息無暇也言自守戒行者即維摩經言自守戒行不誡彼國是菩薩淨土菩薩成佛時國土無有犯禁之名言十善業道者即維摩經云行十善道是菩薩淨土菩薩成佛時命不中夭大富梵行所言誠諦乃至正見眾生來生其國言此三名寂靜者由能寂靜二種惡故第二寂心雖即是初一寂惡果後一寂業即是寂因也安國云能寂二惡一者惡果即八無暇二者惡因即惡業菩薩常說四輪五法故能息除八無暇果此名寂靜果也自守戒行持戒不缺修行十善行即行也此二能除十惡因也此經一輪摧八難經云若有淨心信敬不生疑惑者世智辨聰佛前佛後等言彼經香臺等者說有八因舊云香積品也無垢稱為彼佛土來菩薩說此世界諸菩薩眾淨土八因言一思種有情者舊經云彼菩薩曰菩薩成熟幾法於此世界行無瘡疣生于淨土維摩詰言成就八法於此世界行無瘡疣生于淨土即饒益眾生而不望報言二思代等者問眾生作業自作自受菩薩發願自身得功德餘人不得若不得何要虗願若得者世界菩薩無量無邊一時中不發願總合無彼三塗如何苦樂不等答由彼眾生自力修行菩薩發願願身資助若總不修資助何法言三思於等者舊經云等心眾生兼生謙下無礙見惡心常平等同一如故言四思於者舊經云於諸菩薩新之如佛言五信上者舊經言所未聞之不疑言六於他者舊經云不與聲聞而相違背不嫉彼供不高己利言七調伏者舊經云而於其中調伏其心常者已過不詔彼短言八恒無等者舊經云恒以一心求諸功德言此是八法者結也言廣如彼淨土者即是法菀及無垢稱疏廣引諸教以明淨土因也經言所以者何者釋所由也經家徵緣何事四十年前聞此四般法不生喜樂答緣四十年前世尊令我等出生死入涅槃當時若先與我說大乘我亦不妨領解只緣先說小乘用佛言教出三界已待涅槃故不希大乘二云又為年已朽邁齒過力屈學大乘須是何生年少自知時節已過且守小乘於大乘法不生一念好樂之心亦譬如琴瑟解者彈之而得其曲不解彈之空得其聲大乘智者聽之而得其理愚者聽之但得其聲愚者雖聽大乘終不見大乘之理所以四大聲聞聞大乘不生好樂也言今獲得者有二般一言教名得二當得名得也言總領初周者經言千二百羅漢悉亦當作佛言別領喻說者別領第二周喻說經云不謂於今忽然得聞希有之法言三慶獲善者經云深自慶幸等四十年得小乘如得瓦礫謂是真金不知今日得無量珍寶也言今亦以喻領佛意者世尊前來向化道諸有智者以譬喻得解今領佛意云我等今者樂說譬喻順佛故稱樂說也言最初發心者即十六王子時最初發心經言譬若有人二乘人也言退流生死者修行至十信第六心已前退入生死直入三塗如經言若十二十乃至三十言中還見佛者中途逢二萬億佛名為中途見佛也即前文云曾於二萬佛所等言不肯修大喻者即是舍利弗修行至十住中第六住退也言第五化以二乘者即是鹿野園中四諦法輪名化以二乘此前生事或即今生言示大不悕者即是般若會下雖蒙佛加被說大乘空法而無悕取一飡之意處門外止宿草菴自念貧事言初之四段同前者謨云即同前品初周如來述成中初陳往遇也我昔曾於二萬億佛所為無上道故常教化汝汝亦長夜隨我受學等也且四段同前之中最初發心中還見佛同前聞大乘經不聞斷時說退流生死不背修大約眾生聽聞大乘經間斷時說若望佛意退與不退不肯暫時捨離眾生故經云為無上道故常教化汝等眾生聞經亦了元來貪欲樂著生死心婉然不肯專求大乘便是退流生死不肯修大也只如今俗人入到講堂聞經即是最初發心中還見佛出却講堂門貪嗔宛然即是退流生死不肯修大也故言初之四段同前所說也言第五段等者即是第五化以二乘喻同方便品次述今逢我以方便引導汝故生我法中經云不須此人勿強將來以冷水灑面至常令除喜也言第六段者示大不悕法華會前為說般若即同此間喻中羅列寶物出內取與此間喻中有方便品即無也言今獲得中者方便品我今還欲令汝憶本願所行道故為諸讚聲聞說大等即同此間集親族也言幼者弱者最初十六王子時初聞大乘熏得菩提種至極雲弱故名幼稚也言教大心等者問何名教發大心尚密說耶答有云當初十六王子時不向他人說十方佛土中唯有一乘法但為說大乘名密又解時十六王子知却迴大強為他說審知當爾之時說無益意徒與今日迴心為因此心唯第十六王子即知餘人不知故名密說最初發心過去塵劫有佛出世名大通智勝如來初轉小乘法輪大乘法輪有一會眾生共佛無緣共十六王子有緣大通佛深入禪定十六子各昇法座為眾說法一一王子教化得六百億那由他恒河沙眾生其第十六王子是釋迦當時會下度者即今日三根聲聞當初從凡夫身中發得菩提心種子在身中也譬若有人者三根聲聞也幼稚者記國云習道之位既淺名幼慧命之年亦少名稚疏意初發心等解幼義未廣修行一向解稚義也都結云名為幼稚也經云捨父等者法中論退却大乘心喻上說捨却第十六王子名捨父也喻上說久住他國法中論却入生死也經五十歲者五道輪迴也言第二退流等者後十六王子他方教他所度眾生退却大乘心名退流生死也言對等既言不墮惡道如何窮子有退流生死耶答疏言彼據上品等上品正見即慧也增上之言意顯是加行心論答意上品發心即不退中下品發心即退窮子當日既退明知是中下品發心也問未審三品為是三乘相對立三品為復是一一乘中有三品耶答三乘之中各有三品唯取大乘中三品若發大乘上品心則不退也若發大乘中品心退入二乘也若發大乘下品心退入生死直入三塗中也二云發聲聞心為下品發緣覺心為中品發大乘心為上品也三云唯有大乘性者定性大乘發心即不退有聲聞菩薩性緣覺菩薩性帶下名種性所以屬中下品發心即退也今對法成增上品正見雖經歷千生不退者不過前後二解也問經歷千生與退流生死同是生死有何差別答千生者唯約人天二趣說退流即約馳流五趣說二云有是上品發心雖歷千生即不退有是中下發心雖歷千生即退有是千生在人天二趣有是千生出到二乘位不妨却退也言心未堅者喻上說八歲十歲捨却父走去向他國經五十年不歸法中論二乘身中菩提心種望法華教下所詮理名父若專心聽教名親近於父若不專心聽聞因修即退名捨父言背教違者章敬云背善為逃從惡為逝於大乘教理不肯勤求如迴避父一種也入生死去名逃逝也言他國者生死也五十歲即是久住義也久不可樂不是生長住處自家屋裏自由在何故他國作客每事歎難忍苦不可苦不可愛樂故法中論三界無安也生死逼迫不可住也胡馬思北風越鳥栖南枝常憶本鄉是自住處也生死為他鄉佛法為自國也言佛法為自國者堪久住故故經云漸漸遊行遇向本國又起信論云返本還反生死之本還佛法之源為身中有舊菩提種子故言涅槃經中者會違文也亦涅槃經約無種性人佛法為他國非己分故等言以此彼者以此即此經以彼即涅槃經言此以有性者此法華經取有種性及發心佛法為自國生死為他國言彼以無性者涅槃經以無種性及有種性未發心前生死為自國佛法為他國言前雖以三等者通外難也問何故於前火宅喻中言今此三界皆是我有其中眾生悉是吾子據前來經文即一切世間皆是佛之所有何故今者國分他自答疏言今以他國等意答前約佛所他境三界之中非論染淨皆是如來宅將三界望能化主說是一火宅也此就所化之中望三乘佛法為淨此自國也望生死為染名為他國也若淨即以佛法為自國生死為他國若染即以佛法為他國生死為自國如一境解別言又依凡說者佛是無漏所變同能變將所變次就佛能變無漏心說總名自國凡夫有漏識變將有漏境就能緣心總名他國又依所化眾生說有二類人一凡夫二聖望聖人說佛法為自國生死為他國望凡夫說生死為自國佛法為他國此解勝言依大悲等者大悲者只說生死為宅捨涅槃入生死故若大智說生死稱他國佛法為自國猒生死入涅槃也言下喻說等者類例國名總明一品之中所說國也言初及第三者初即是捨父逃久住他國第三即是出入息利乃遍他國也第二漸漸遊行遇向本國第四經歷國邑此二望三乘佛法名國也第五人王之國即是國王大臣剎利居士也或約喻解婆羅門剎利居士喻佛法四眾也言或十乃至五十者五道之中中道所感識等五支種子五道各五也為彼十不善業道有三品十善業只有二品且上品十不善業資地獄五支種子所資就能資說有十只却於所資名言種與向上說或十不約能資業種向上說十也又只此名言種子向上連持色心分限便是果義也中品不善業資餓鬼五支種子名二十下品不善業資畜生五支種子名二十善業只分二品不分三品下品善業資人趣五支種子名四十上品善業資六欲天及上界五支種子名五十歲也或者不定之詞喻上說窮子向他國或十或五十歲法中論或向地獄裏名或十向餓鬼裏去名或二十畜生裏者名三十乃至人中者名四十天中者名五十歲或遍歷五道名五十也言中還見佛者即是未退大乘菩提心前更重見佛即是到大乘城中聞大乘法見化身二萬佛也問前說退流生死即是退心如何此中乃言即是未退大心前更重見佛答前言退流者但約不專求佛背教行惡名退流非是退大心也意言一迴逢佛發大乘心已後時還退退後又逢佛發大乘心如是經千萬迴發心已還退此經文約二乘逢諸佛皆以大乘法化之未用小乘法化之此並是二萬佛所教化內也故前云世世以曾從佛受化也言一根性者信等五根也言年既長大者喻上說窮子初走去時九歲十歲身歲猶少在外多時男兒長大三不歸身歲漸大少之食窮不歸法中論當初第十六王子邊聞教熏得大乘有滿菩提心種此新熏種子日日生長經歷年多故故名長大也言加復窮困者增也臈月著葛被復者熏也未修福故名窮不修慧故名困即同初周云我以佛眼觀見六道眾生貧窮無福慧等亦同下周譬如貧窮人往至親友家其家甚大富具設等言馳騁四方者亦同馳走也向胎卵濕化之中起色起力也名馳騁四方注經云生老病死周流代謝也四生之苦逼言四規出苦者求覓出處也持齋持戒名求衣食又正教食正理水故亦名求也倦三途而執人天猒大苦而希少樂名求食天子云吾是飽爪者焉能繫帶而不食也言漸漸遊行者等閑行也以不專求佛法故名漸漸種性所逼任運而行所作不究竟故名遊行也言遇向本國者却向三乘佛法內來名遇向本國喻上說窮子無心歸令客作賈力信脚行忽到本國法中論窮子五道輪迴生死且擬向人天往來免被三塗苦逼忽遇著三乘教法如遇向本國也言初教發於大心等者通前配退流生死中還見佛喻也言順昔所修等者不是退大乘心了却發名順昔所修昔是只退入生死本來大乘心不退更重聞大乘也名順本所習也經言其父先來等者問長者走却兒覓否答兒行千里父心於先譬如長者唯有一子云云長者總有一个兒失却求向家中坐不安心莣胝熱況錢物無主不免就國築城住也言雖先來已等者問十六王子之教發心今言求子不得也答疏言雖等意言初發心後却退轉背教理名求不得中途却失與不得同故此二萬佛來再教發心名止城中城在國中不於他國言求子不得者十六王子後更擬將大乘教化眾生休心不學不肯發心名求子不得此望退心後說非總未曾學名求不得也經云若我遇眾生盡教似佛道眾生自退故名先來求不得也自不專求名退非不與說望佛說無有休息也言中止一城者即於生死之中止大乘城乍觀似喚生死作城非此義也生死二字解中字義也止者有說停癈癈大乘教城覓子不得休說名止此解非也此意但是總望佛三乘國大乘如國中有城也止者居止也喻上說長者求子不得故於他國中築城自居以待於子法中論即留妙法蓮華經在生死中理居教如父在城意言佛身是大乘妙法教下所詮理名中止城也問何處望教說大乘為城答此經云佛自住大乘多寶答云況教塔中佛見況理問准下云昔在本城懷憂推覓有似佛於自國中求子似他國求也答不然下文亦於本城求大乘城中而求於子也言將說大乘者抄云擬說大乘令他發大心名為將說此解說大乘所以也今謂不然前云常教化汝即是已說云何言將說答今解將者即將彼所說大乘而為城也非取餘法也將者取也如言即將此錢買如是物也言自下資財者問百䖝七鳥皆為其子長者既覔子別處築城居止以得於子莫國念錢物等否答疏言自下等嘉祥意窮子背父流注生死貧窮困苦而見失子果滿成佛眾德圓具名其家大富財寶無量也言有為倉無為等者成麥等名倉成金銀等名庫穀麥種子等有生長義如四智菩提從種而生名倉也即第八識倉藏無漏種子報身菩提名倉也金銀等無生長義如涅槃無為不生不滅如庫嘉祥云養慧命者如倉安法身者如庫圓滿義如盈出用義如溢又約體名盈起用如溢言愽物志者是晉朝司空張華造訓釋文書言𣁴者古人以三舛為斗三斗為斛今時一石名一斛但取古時三斗名斛為喻也經言多有僮僕者問長者家既大富資財無量未審更有多少僮僕乎力象馬車乘答經言多有僮僕等言駈筞等者解僮僕義也一百八煩惱名多有也言方便善巧等天子有爭臣七人雖無道不失其天下也臣之於君戲可贊否致君於堯舜之上者皆是智臣之用國以重臣為寶臣佐不離於王依於王始有臣佐方便善巧不離後得智依智方有方便巧妙用臣佐助王治化致君與堯舜相似總由臣佐方便善巧三無數劫佐助如來令如來為三界大師四生慈父皆由方便善巧也言妙願及力等者妙願如吏十力如民也吏即少吏與長者家計笇錢物知出知入民者即是人民即是長者家客作大長者穩坐地使伊和泥𧐮輸氣力也法中論妙願即是四弘誓願願度眾生度了者却捨名知出未度者令度令入佛法中名知入猶如典吏行案勾當錢物有人舉錢將去名知出有人納利錢來名知入故名吏人知出入也或佛身上自利功德名知入利他功德名知出力者如來身上十力能破天魔制諸外道或變大地金山或毛吞巨海等言五通為象等者世間象馬車乘能運重而致遠如來五通能運凡而致聖也象馬為人所乘騎五通是賢聖所乘也向野馬世界去或天雨四華地六種振動等言五乘為車乘者般載運眾生亦是一切賢聖玩好遊戲之具長者家車牛無數古人有千駟也言八萬四千者千羊能喫草斷草令人家轉富資人貧窮八萬四千眾行能斷惡資益眾生善根也言客利豐廣者解經出入息利也長者家錢財出亦帶利出來便須有利名出有利入亦帶利入來錢財所入之物待善賈名入有利也言真俗諦教者真俗諦教如經化本錢也將此真俗諦教化眾生名出入息利教中詮無漏無為功德名真諦教教中詮人天有漏果報名俗諦教教中說斷惡修善離苦名出有利真俗諦教中說修善人樂名入有利言入佛法等者眾生發心入佛法中名入利為他說法令他出生死故名出利取說法為利也言或三乘教等者三乘教如財佛是財主三乘聖如商人佛於淨土中說三性三無性六度教法如坐鋪財主菩薩在會聽法如商人鋪貨物從淨土出入穢土中向三界野市人天二趣行願賣貨物如觀音菩薩現十九類身說法教化眾生名賣貨物出亦有利入亦有利如人借本經化得利停分三乘聖眾亦爾又入學佛法名利外他眾生名出利菩薩說法之時得一分自利功德名入利也問人天教入生死如何名利答勝三塗名利持五八戒為因得人天身依此身後入聖位前經云得免火難全其軀命非為虗妄何以故若全身命便為已得玩好之具長者財物未有無利虗行如來五乘法門未有不成利他功德也如薄俱羅持不煞戒遇後母煞之經五不死此名法利也又持不食一日得五百日餘粮此名利也若說二乘法眾生聞者得二乘果早得三倍五倍利又釋迦如來靈山會上說法華經如坐鋪財主賈客如文殊菩薩聞法華經如鋪貨物往來海教化如行賣商人教化龍女成佛又海會從眾非口所宣非心所測似嬴千倍萬倍若逢著無種性眾生不肯發心謗佛謗經墮大地獄此名經犯折錢路老敗喬麥本裏斷三百言被生死等者問佛出唯在欲界人天云何言教被生死答身雖不遍故如王居鎬浩音思冷遠荒身不動搖法同沙界章敬云有佛世界名自國無佛世界名他國亦云佛法為自國生死為他國問北洲三塗佛法不到如何名遍答總望三乘聖亦得名遍如觀音等十方諸國土無剎不現身也言三乘聖眾者如世財主處處經營十地三乘分頭教化言商估價客者行賣曰商坐賣曰估大化身佛如賈大樂說等如商言宣尼等者王莾亦號名文宣王父母祀尼丘山得此子身魯國為司寇郎如今補賤官按論語子罕篇云子貢曰有美玉於斯韞犢而藏諸待善價而沽之經云馬曰韞藏樻犢也謂藏樻中沽賣也得善價寧肯衒賣之也子曰沽之哉沽之哉我待價也馬曰沽之哉不衒賣之詞我居之待價也此中意言子貢以宣尼有聖人之德至於是必聞其故何不衒賣其智用而自藏其德故彼斯況以探其志馬仲尼方我但而待價證賈義下言固物以待民也不就後自衒賣也法中意三乘之法如玉根生不說如藏諸於樻根熟堪聞如善價處處宣揚如沽之哉言公戶者字書中無此字作古唯爾雅音義中有此賈字故引來也言市稅者敘也此中估與賈字同估即牙即知物貴賤名估也言周禮九職者九事之中即當第六大府鄉知市司祥斗商貝佐也何名九職一曰晨生九穀黍稷秫稻麻大豆麥等二周國疏草木三虞衡採山之材四藪扻養蓄鳥狩五百上傍化八材六賣賈集通貨賄上中七嬪婦化治絲枲八臣妾聚斂蔬材九間民無常識轉移報事言白虎通者漢高祖置殿名白虎殿天下有難文義揚雄於此殿中通釋故此殿名白虎通言商之言商商量者何處物財財於彼貨賣名聚也言賈者固守於物以待人來即是坐賣也言賈亦通語者意言行賣亦名賈坐賣亦名賈故言通語也言荀瑩之在楚者荀瑩者晉大夫也晉國與楚國相似更強弱書云晉楚常舉兵相伐荀瑩晉兵與楚交戰被楚活捨將去不損囚在彼處彼鄭國有商人入楚國經紀去鄭與楚和好去來無滯暗裏欲得送荀瑩蹄本國來設計擬欲向褚中以出之此總有三解一云褚貯義欲擬將荀瑩向衣籠中成而出之故名褚中二云褚字平呼褓木車中藏載而出之三云商人姓褚名中以出之設計未成中間晉國自將金帛贖來意道鄭固商人既向楚固敗賣得將知賈字亦通行賣也言陽翟者是縣名洛州東二百里也此兩重意證非唯坐賣亦通行也言內道至總句者問何名總句答此間意遊諸聚落與經歷國邑體是一般故言總句若約別寬狹有異故別開邑也言所有說法等者別標國邑體也言此中意說者內道即三乘佛法對外道教得內道之名此是三乘修行人居止處名聚落體也言以求出要者正解遊字遊者遊履義喻上說窮子向自家國裏巡歷州郡客作賣力名遊諸聚落法中論窮子向內道三乘佛法之中聽經受戒名遊聚落言前文已說等者破古師以外道法配聚落也言或聽說法等者且初總時說法神通配國邑喻上窮子走去為衣食故經歷國邑前來向他國裏經歷如似向出蕃迴鶻國中經歷州郡也行來行去漸漸到自家國中經歷州郡相似也父子之道天性也到自家國裏經歷州郡本來無心歸舍法中論十六王子二萬佛時與說大乘退流生死生死苦逼切求覓出要還逢三乘佛法簡擇不得或時受戒或時設不食或時禮佛名經歷國邑此初解總將說法神通恐國邑不分國邑別也說法淺深者二乘說法淺大乘說法深菩薩神通勝二乘神通劣名經歷國邑言國寬喻等者窮子聽法之時名經歷國邑問此間窮子未退大乘心如何窮子遊諸聚落經歷國邑聞小乘教耶答不妨窮子亦聽小乘教亦觀聲聞緣覺神通但是不肯捨大學小如法師向律講下坐不肯學小乘言識眾生以否臧者解至父城也喻上說窮子無心歸舍自家國裏東西南北客作賣力以求衣食不覺逢著父所住之城法中論窮子無心故聽大乘由善根力逢著佛法三乘五乘教簡別不得任力聽聞忽聽著大乘教名到其父所止之城否臧者否由從也惡也臧由善也識三乘之中逢著二乘人說二乘法逢著大乘人說大乘法名臧盛由善也忽然聞著中道大乘教名到父舍上有三解一聽說法之淺深解遊諸聚落二觀神通之勝劣解經歷國邑三識眾聖以否臧解遂到其父所止之城言依後解等者解城與舍別問城與舍何別答疏言依後解等指向後遇到父舍住立門側彼處解名依後解此間當唱疏言幸逢佛法初聽大乘但得名城不得言舍向下約久修之人名到父舍又總相大乘名城中道大乘如舍問此間何故喚大乘教名城答佛自住大乘也路府約此當唱之中質後解不得便言疏剩四句者非也經言父每念子等者釋迦如來也與子離別三根聲聞也五十餘年者馳流五道也修羅名餘年未曾向人等者問病欲得杖揭如何不說向人答衣裏破不返似人也挽耳不離頰不曾向東家西舍親清說著我兒走不歸多時法中論四十年不省曾向十方諸佛大菩薩人天大眾說三根聲聞我曾十六王子時教化此名未曾向人說如此事心懷惆悵求語不得世尊當日為十六王子時八萬四千劫說法華經教化退去當時忍耐八萬六千劫教化濃厚即合不退也當日怕他退去不敢多說又恨聲聞不早發大乘心恨不早歸舍來男兒三不歸日後一日所以經五十餘年也言不彰於言者謨云彰為彰段心中念事事即無戒口若發言言成行段故不戒言解心懷悔恨也經言自念老朽等者一長者自念年侵蒲柳髮帶二毛向天遠向地近頭上鍬鑺鳴男女多時不歸欲得眼見二緣財物極多無人委付恐散失却去不是一朝半日枚拾活計四十五年積集得錢物為男為女今日欲擬分付男女合萬代子孫相承不絕繼嗣也是以殷勤每憶其子法中論或一句枚大云云又觀三千大千世界未有如芥子許非是菩薩捨身命處又普為久等者即是成道多年名為老朽若受用身成道已來塵劫名為老朽設使化身法華會上望成道四十年名老也或前前世起化身亦名成道日久名老也言雖有菩薩等者問佛言一切眾生皆是吾子云何言無有子息答疏言雖等意言雖眾生無量未與聲聞授記故言無子言或子少者問如來既有菩薩之子云何言無子答疏言或子少等如來三大劫來修行所得佛法恐涅槃無人委付故憶聲聞子也言念已樂者問長者錢財不少且自活得何要覓子答經言復作是念我若得子自來總拋錢物遇與死亦服今若也兒不到來沒死亦不意分也言見父後明却走者前來遊諸聚落經歷國邑彼處早到自家國裏只向自家國裏本來無心歸舍緣求衣食客作賣力行來行去到父舍多時不歸宅舍總不識法中論本來無心聽大乘被種姓所排者邊聞經那邊受戒者邊聞小乘那邊聞大乘不覺聽著中道大乘教名遇到父舍言身心精進者下云身心清淨以求出要即同喻中云共相推排競共馳走也言非是本心至到父舍者問初言國次云城後云舍有何差別答猶根性悟一乘理有近遠故所化眾生善有三品也若下品善根聞教去一乘理遠如國若中品善根聞教去一乘理次近喻到城若上品善根聞教去一乘理最近如到父舍上說國中有城城中有舍法中論總望三乘佛法如國於中總相大乘如城城中更有了義中道大乘如父舍言近生遠熟者潞府生者生澁也最初為凡夫時發大乘心六十劫修行漸漸成熟去凡夫位遠名為遠熟也隣近釋迦前生劫生澁逢緣中退入二乘名曰近生二云望後謂鶖子今始入聲聞等名近生迴心經三大劫方得成佛名遠熟言大乘教行者一句標亦是解門名也言能詮於理能證於果二句釋也言名之為門者結名也言彼時未能等者意說聲聞之人雖少行大行亦信大乘不能普行全信大乘即名住門側勘尺問已在側邊立也言時未全等者若能普行大行普信大乘即得入門正立也立者將行之貌當擬廣聽廣行一乘之行故住立門側也言行時安等者於大乘中行時安處名住也言又小機未會等者金云初學大乘名小非小乘名小也彼時未求小乘也此是初小之義大乘根未生長故名小機未會大乘不名入門示微信習故門側也經言遙見等者三解一云為在二乘位中根性未熟名為遙見若迴心向大即名親見二云此是地前遍行真如理性遠故名遙見有云若到初地證真如理與佛身中理不別名親此解不然初地理是因中理與佛果位中理因果位別故但名近見不名親見也今是地前對近得名遙見也設二乘人與化身佛一處亦名遙因果別故不名親見三云此是資粮位望加行位大化身亦名遙見若至初地已去見他受用報身名近見言由去大乘等者是初地故名遙見也言佛以四無畏等者意取無畏義解師子不將四無畏解床也若以四無畏為床違他聖教也今以四靜為床也言寶机以承等者形段似切机向下安之向上著褥子承畏者足簡要云法中論取無貪無嗔為寶机以承戒足一切毀戒多由貪嗔若無貪嗔設能持戒故似無貪無嗔為戒學足言戒學跡者以無貪無嗔為戒學跡戒為定學跡定為慧學跡也言婆羅門者淨行義況戒學言剎利者王種於事自在喻慧能簡擇自在故言居士者寂靜義居士之流類少私寘赦淡臺滅明非公事未甞至偃之室猶於定法前緣長左右婆羅門等圍繞法中論佛身左右三學莊嚴言又大乘者或喻三乘之眾眾大乘如婆羅門緣覺如剎帝利聲聞如居士言三念住等者凡夫之人有樂受適悅順故即生樂有苦受故逼違故即生嗔有捨受中容逼故愚癡起喻上說長者身上有真珠瓔珞嚴身法中論佛身上三念住為珠瓔左以刀斫右以金塗中間一人不塗不斫如來觀此三人平等平等更無有異言臣佐供衛者疏略不說亦即是戒定慧三學不離後得智也又亦同前方便善巧為臣佐臣佐不離於王依王有臣佐也方便善巧依後得智有方便善巧吏民者妙願即四弘誓願力即十力也言心持四攝等者准經喻上說以長者左右侍從人手裏執拂疏中意長者手自執拂也即心持四攝無不離心縱然左以不離心也心與四攝相應是不離左右也心者即拂度眾生之願及十方等相應之心依彼妙願及力相應之心而行四攝即彼眼力方行四攝故如白拂吏民執之也言體潔等者佛法功不與有漏俱名體潔即是解自義也以此四攝攝聚眾生深眾生垢即是拂義言不離者常與四攝相應名不離也手執於白拂經歷不霑長者之身願力四攝相應慳貪惡語無因得起又夫民手執白拂常能招引清風願力與四攝相應攝引他於含識布施攝貧窮名攝愛語攝嗔恚名攝利行攝慳貪名攝同事攝一切人前作事業先同後斷名四攝言四無量為寶者即是慈悲喜捨覆蔭眾生如寶帳也亦云有情持法緣名寶帳或直取無緣為寶帳言七淨為華者解諸華幡七淨華者一戒淨二心淨三見淨四度疑淨五道非道智見淨六行智見淨七行斷智見淨八無緣寂滅淨九國土淨糅云九淨中除後二淨取前七是此七淨華也言總持為幡旋轉問無癡類同總持幡即連續不斷有二義一攝二散錄不遺體即念慧法義詞辨四種如綵帛念如綿慧如針常能連持長將四種濟眾生如以華幡糺敷著言五分法身者五分法身如香妙定如水故合香水心猶如地與此為依五分法身及妙定潤身心故如水灑地五分法身者戒香定慧解脫解脫知見香能淹眾慧名香也言教他等者說七覺法為眾生如散眾華華者因義也喻上說向寶帳前頌地上灑水可然後向上羅列寶物法中論時方行功德如寶物外起作用如烈寶物化度云後十力方而降天魔現六神通而摧外道等是烈也言取釋內者意言將此取字以上內字也內自取者即如其所得法以此度眾生言又出內如前者意道出內二字前行解了故言如前直下解取與兩字也即眾生根熟等是言結類尊高者嘉祥云萬德非一稱為種種莊瑩法身義同嚴餝十力摧天魔名為成四無畏伏外道名德七眾之生八部大師三界無雙四生歸仰所以特尊也言灑音者又所買反切云所解反所賣反即水落地斂塵曰灑切通二音也言訊音者切息晉反誤為思見反訊𧦼為散也言此是初現化等者不是眼見此是資粮位只令見少化身今既所見大化身故走也古人見報身走有云據經所詮理是佛只是化淨土中少化身佛形量不合是大化身千丈大釋迦故疏言未見報身亦非穢土中少化身也謨云或佛力加法華會見東方淨土佛加被也經言窮子見父等者窮子不歸舍隔閼多時不認是自家父富貴等事所以驚恠見恐悔來言比知非眼見等者當時二萬佛時第十六王子為聲聞人在賢粮位聞說大乘佛國淨土功德未必眼見但是持穢土中聞思二慧比知非眼親見也亦非智證非初地菩薩智證既云比知非眼見也約大化身淨土說修行至加行位方見大化身佛今二乘人在資粮位聞思比知故言悔來問若比知何唯大化當日是不聞說法執二身答窮子當日未能廣思大乘教微少得且言大化不說法報也有云疏生解此處經文勢形量大少只合是少化身淨土功德問何名比知答窮子當日在穢土聞說化淨土少化身功德要待當來生淨土始見未生之間總名比見言或以眼見佛等者即是所見穢土之中化佛放光現神通名見力勢即眼親見也不說一一事須生淨土中見也言思不能行者因向上自不能行果向上因何能證耶言名悔來者淨土窮子本欲肆力貧里不謂濫踐高門雖復利見大人而生心懷少術既畏其威且望其利所以前雖求進今則悔來求二乘解脫人亦復如是本欲馳心少減不悟輙履大方雖聞一乘之理而情厚二乘之樂既懷道遠難進且望大利之可求所以逆畏長駈惡聞大教故言悔來也言起念者竊作是念私竊也言王等者窮子言真是宰相宅真是駱駝宅石崇宅喻上說王是天子也等者天子兄弟廣陵王舒王降王名等也言等是相似義者天子兄弟劣於天子而似天子也法中論王者法身佛等者是報身佛等者相似義報身功德似法身能證佛所證無差別故問有為無為如何相似答有為無為不合相似今據自在無上故名相似也如文宗武宗即無勝劣言或王者如今聖王等者餘異姓王勝劣異也故舉二類似顯之如世之王者即異姓王以比化身也言非我精勤等者窮子作念據此人宗不是我容容作處狂用却氣力錢不得手羞脚迭更被喫棒不如向窮子兒家客作床縮自由法中論眾生聞大乘教中說諸佛神通勢竊作是念此或是法身功德義是報身功德事須三大阿僧祇劫捨頭目髓腦所求方得故名非我等言貧里者二乘中也問如何喚二乘中也問為貧里答無法空理智名貧言里者謨云五家為隣五隣為里即二十五家也五果聖人有超二十五有之功能當超已超二類別名往貧里言縱任者解肆力也即二乘教行及有為無為功德法名地也三生六十劫四生百劫得二乘果名衣食易得言若久住大者窮子言我若不走去抑勸修行大行名或是逼迫強使我作也言自揣初糸反度也量也言猶未住者下言疾走往捉未放去也故言未住未到二二乘中如窮子乍走未得作生治處時富長者第十六王子見子便識窮子不識父父識於子亦見便識時人云物見主眼楅堅又父子之道天性也有人問如何見子却走去心歡喜答不會道理之人作此解義也緣乍觀經文勢即有此難據實長者遙見在門側立便貪說長者家富貴緣隔斷經文末後走去父與歡喜文相承便將謂見走歡喜也言識大乘姓近者謨問此父子時正見不肯修大因何名大乘種子熟既熟何不發大乘心答此意言迴趣大乘皆因住少今既走入二乘是後迴向大因緣也熟時節到故言近生緣熟也或近來生澁之性遠時曾熟也由識彼熟故喜言而忽自來者潞問前疾走而去自摖不肯修大即退大心今第三段解而忽自來即言根熟不相違答前疾走據近退大乘有漏心說今來者約無始本有大乘無漏種五根種子說五根熟名忽自來問何名為忽答喻上明之長者求子止城多時求子不得于今相見名忽自來問此言不肯修大何得更言根熟答此正說彼中還見佛二萬佛時之事故言根熟若不爾者喻上言走去是得言忽來故牒前喻也反照前文近生緣熟亦牒前中還見佛也不違此段不肯修大也言猶故貪惜等者老人多貧也夕陽西謝遊水東流經言即遣傍人等者即是佛後得智教是理便理為能道急是心使言因發故故言名使所說一乘為使者悲心起教故名忽追教上言悉忽即傍人急也喻上傍人即是捉事人悲心是走者言教便人長者門前鳥不飛遇何急窮子輙敢住門一乘教行菩薩頓悟難行汝是漸悟凡夫因何惜意既來至此真放東西能發大菩提心即須苦言教化不交却入生死故言即遣等經言疾走往捉者喻上論窮子既其疾走使者由是忽追法中說佛知彼急入二乘只得為之強說故名為急即同密說為今證因也言理本絕言者一乘理為正一乘教為傍人也言或行可修等者行能正斷惑而得聖果名正主也若教但能助斷惑名曰傍人言悲心疾起者若准喻又教上但言傍人今疏中悲心疾起者即佛之後得智說一乘教法名之為發遣傍人也言悲教急化者喻上見窮子不伏恐走由是使者急追法中數見欲退大不修亦得為其強說故言急化即同為今證因故思密說也言疾走往捉者抑授大乘名疾走往捉者若小乘迂會修行遲捉大乘教名疾捉抑全也如言汝若不取後必憂悔等上生悲想處下至轉輪王如其壽命終還沈生死海亦如涅槃經說於夜夢中現作金剛等相若不發菩提心當斷汝命等汝歷惡道經多劫無利勤苦尚能超少修勝行得菩薩大利不應生退言心口不伏者心不樂修行大行名喚即是三乘不順修行也怨者不伏義如世捉賊若無滅物斷他即使成怨故不伏也若伏即無怨亦屈也枉也屈者伏義抑我令伏故言怨屈我所不樂枉屈於我名怨也或口談世論名大喚也言不相許犯者有云灼然相犯相犯處大多喻上論本來生養於汝從汝能嗣家緣背父逃逝他方五十餘年更無消息窮子既到長者宅門前快走過去名不相犯也長者宅門上書字有事打門請不直入何故直入他宅門裏立又人家內外有限何故輙入宅門裏向內者見他長者宅內寶帳前頭羅烈寶物受他寶物此即是相犯即是罪過如何言不相犯法中論本來總不道發大乘心修大乘行名不相犯也二萬佛時十六王子會中聞法華經教汝成佛熏得菩提心種聞慧二惡日日善生繼大乘法寶家緣汝後退大不修此即極為相犯又前自發言相許所許長者極多自後事總不為誑妄之僭何甚王子會中發四大願一無邊眾生誓願度一个眾未度煩惱無邊誓願斷煩惱未斷法門無邊誓願學總未學六度萬行之中初下手學布施有人乞眼來因此便退定不相犯佛道無上誓願成修行過十信第六心已去第六住前立門側便却走去是不相犯四大願一願總也未行自後退學大乘誑他十方諸佛亦不少性行云云言用為今時者問佛有根勝劣智力能知眾生心何強抑他令學答疏言用為今時等言休心不學等者即入生死名為躃地六識不修善也不斷善根故不見死也經言此必定死者若教於頭目髓腦修行萬行一句火捉半偈捨身等名必應定死也言第五段化以二乘者證云以前第四段既以大乘化之不得故今第五段權說二乘方便化導即是前言我以方便引導汝故生我法中亦即火宅喻中思方拔濟云我今當設方便令諸子等得免斯害是故此喻中六段疏文皆約小乘行位而說也言一教發權心者即是教持三歸五戒且免三塗得生人天受勝妙樂此是二乘之前因所以初說言二興小意者是從人天中發二乘意欲求出離所以次說言令修脫分者彼人既發二乘之意未知行位何修行所以此中令修脫分即是小乘資粮加行等位言子遂依行者即是正位五停心觀總念觀別相念等言勸入善者即是從前資粮位滿入加行位隣次見道等言便成聖位者從前加行位入預流等果又前六段中前四段是資粮位次一段是加行位後後之一段是見道修道等位言位行猶遠者初發心去不退位遠故真理遠故又云佛在果位見子在因因果位殊故名遙見也言勿強將來等者前以悲心既切名為強牽將還今言勿者佛言我有悲心雖欲仰彼令學大教修行大行彼不受領故父止之故經言勿也且停被大乘之教不說也問佛悲心應捨眾生答知根授道却是悲心作說令他反生罪置未為悲也恐損眾生故且止也小慈妨大慈好心等無好報頭載破氈帽等言用二乘者三歸五戒法望有性人名權必須令取聖果方名實也若望無性即不名權也言以被其心者三歸五戒能息三塗熱惱名冷得人天身多與喜樂二受相應資益身心即五戒八戒名之為水以此教法授與名灑稱彼心中所忻向處說彼為面又發心名面不信名背也言且令悔滅等者恐二乘人悔修大乘行墮於地獄與說人天教且令免苦十纏者八纏向上更加二纏纏八無慚愧嫉惱并悔眠掉舉與惛沉或加忿覆為十也暫息八難者持三歸五戒得人天身便是制伏八難也得生人天便是醒悟若墮三塗名悶絕問三歸五戒何名二乘教答望無種性人極頭是人天果也若不定性人三歸五戒十善為二乘方便言停授等者問何名莫復與語答疏停被等即不教大教如不語經言所以者何者問如何總不共語答經言所以者何徵也答經文知意至所難者長者調悵僕從太多初時將謂富貴無人過不知此身却與子為大難悔踞師子床寶机承足云云我當日著破肩衫繫設舌腰帶著斷根鞋設底襪褁烈額撲頭騎千二錢驢坐偏𢈠舍是伊窮子不怕我日日共語不妨付錢物問既不肯來莫不是長者兒答經言審知是子知有菩薩種子法中論我當且種種教化何如猿猴麻馬隨類他身無竭化現大化身居化淨土又一聞無上正等菩提甚難可修所以為子所難也經言而以方便者長者的知是子未敢即言恐窮子聞之即便驚怕悶絕如來雖知有其大性近遠熟未可即言曾授大乘隱之不言名為方便也言見令放者問長者貴人事無不曉何故初令擒捉後即令放之答疏言釋放意也
