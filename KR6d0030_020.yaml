body:
  text: 鏡水沙門栖復集經云除佛滅度後者世尊化得定性人可成堪說法世尊化定性聲聞不得何成堪說法又世尊化得增上慢即成堪說法化他增上慢人不得如何堪說耶今此第三疑中定性聲聞有二類一者愚法二者不愚法今此論家偏約一分愚法者為問經中答言除佛滅度後現前無佛釋迦已入滅去當來彌勒未下生兩盈中間不遇我即教化不得若遇於我或遇當來彌勒佛在無一有化不得是故我不成不堪說法人問增上慢人對人對佛起去豈道現前無佛答有二解一云准寶篋經及善住天子問經五千人暫時起去後時再來佛便化得二云為根未熟故不堪化自是朽木不可凋也現在為根生根生不堪化根熟在當來彌勒即能化是故我亦成就堪說法人也問釋迦入滅彌勒下生五千之輩根熟是他彌勒教化如何釋迦成堪說法人耶答佛佛道同亦成我化壽量品云我常在此娑婆世界說法教化問於中佛出世名字各各不同豈有總是世尊身答或說燃燈佛等又復言其入於涅槃如是皆以方便分別也上消經了言云何堪說者論家徵論云謂有疑云從佛聞法而起謗心者此指定性聲聞其實亦兼增上慢人此謗不是邪見謗但是執他為非也但是不信非是邪見謗也言此意說言等者但說趣寂其實亦兼增上慢者論據趣寂中而有一分愚法也七十八云一向趣寂聲聞謂從本來是寂極微劣慈悲種姓故一向棄背利益衆生事故於生死苦極怖畏故唯有安住涅槃意樂畢竟不能趣大菩提此名趣寂定姓聲聞既不聞知化菩薩事即是愚法問二聖惑斷云何起謗答執自非他即名為謗不要耶見而起謗心縱是邪見亦所知法攝亦不招生故其實亦兼增上慢者聞起謗心即前唱二甚深五千之輩便言佛說一解脫義等即是謗也疏且依趣寂解也其趣寂者多不愚法若愚法者亦不聞知化菩薩事即是愚法何故世尊不成不堪說法人所以疏云翻結之曰徵詞也言故佛答言者意言我入涅槃去當來彌勒未下生中間兩盈教化不得有愚法者我在必無也即是約佛在日其趣寂者多不愚法也若愚法者亦不聞知化菩薩事問聲聞回心名菩薩否答深密云我終不說一向棄背利益衆生者當坐道場皆得無上正等菩提是故一向趣寂聲聞若回心向菩薩補特伽羅我亦異門說為菩薩經云所以者釋前標經家徵也經言佛滅度後如是至難得者答也世尊在日尚自化不得也況滅度後言以無良緣者意言佛在尚須根熟何況滅度後無佛為緣言此等經受持者問解何義答解二乘是權一乘是實不定性人當來成佛維摩方等會下讚嘆菩薩毀責聲聞聲聞之人永非法器猶如燋穀高原陸地不生蓮華又四十年前說有三乘法華會上唯一無二乘難解故云解義者難得不解我意故即化菩薩事也又云解義即是不愚法也設遇於佛其根未熟而愚法者亦不能知化菩薩事也自闕因力故是此中意鈍根即不知經云若遇餘佛決了者問世尊滅度後有根熟者如何得解此經義耶答經云言若遇等問若遇餘佛是他餘佛化何關釋迦事答他身即是我身也若遇餘者離自身外名之為餘當來彌勒是釋迦之餘或更有他方佛化來亦名餘或釋迦潛形密誘化亦名餘也問此不定性聲聞如來涅槃後彌勒未下生得無學果兩盈中間懸遠如何留身待得彌勒且分段身得無學果久留不得答入滅盡定定不折壽如大迦葉留身久住也問利根羅漢可入滅定鈍根羅漢入滅定不得如何答化有二種顯化二隱密化即是隨類化也如來為大段衆生八相成道不可故為一人兩人所以潛形密誘隨類化又以神通力接引來我於餘國作佛更有異名是人雖生滅度之相入於涅槃以神通力接令生彼國遇佛也第二意不要令生彼國但以神通力直接引此肉身將向他方聞法華經亦得如大目乾連至野馬世界假佛神力或即如來現同類身處修行方便誘引令定性者不遇法不定性回心向大也問設使不定性聲聞忽然顯化密化總不逢為復回心為復入無餘設爾何失答二俱有過既有種性何入無餘若入無餘即玉石俱焚即有有性不成之失反應無性有性耶若不入現前無佛根熟如何答事須回心一者見回心教二者種性所排也上消經了言此愚法者若至不堪說者此偏結前定性不遇法定性趣寂者若遇我者必能聞知化菩薩事若不逢佛即不聞知是故我今亦成堪說法人也言故瑜伽云若已等者證成不愚法也問入滅盡定人依何界而入答愚法者初起在人中後起唯色界生無色不入滅定不信有藏識畏斷滅故若不愚法者後起通上二界信有藏識不憂斷滅故言建立者信有義說賴耶教名為建立今信有藏識例於一乘令於一乘教上不愚法故引此意證信者是不愚法也言或復此疑者前約趣寂解此約增上慢人解意云既有增上慢人起去云何堪成說法人耶言我必得者相國云增上慢人創會根生未堪聞法席將罷唱重得聞經不久還來志能化得唯即此散席已後未滅度來於餘會中而能化得問何以得知故善住天子經寶篋經皆說前已說了或不乃根未熟故所以不及若遇餘佛根熟即聞化利事同亦非不堪也三了下四言前說法異今說等者初說三乘後說一乘前說法異後說法異豈不成妄語人也等經言舍利弗汝等當一心信解至唯一佛乘疏答言佛答言我已至未到等我曾證去來四十年前證達衆生根性有愛小乘與說小乘有樂大乘與說大乘隨三乘根說三乘教四十年後說一乘教悟一乘理將教就理故說一乘言證解者即一乘三乘根性異道理也六重為頓為說一為漸說三為定性說三為不定性說一為愚說三不愚法說一說一約成就說三約未回心說一約理果說三約教行說一將教就理說三將教就根也言行位未到者未行一乘名行未到或即回心八萬劫等為行位未到也未至十信名位未到言但當一心者汝創發心未知一乘之法先權後實初可信故到十信初心方信有大乘不生疑惑已前信未堅固問初信與十信何別答此約依佛生信彼即自心生信如初聽人且依說人生信若久自解又伏生信也言佛語無妄者證說一乘三乘之所以也有兩緣一據理極唯一法身同故二約不定性究意為論即十義中第六法等故由不定種性諸佛說一乘也故前結云無二乘故唯有一乘故佛語無妄也言故般若論云等者證佛語無妄彼論有十八偈彌勒菩薩造天親釋彼偈云實智及小乘說摩訶衍法及一切授記以不虗說故潞云此經中如來是真語者實語者如語者不異語者一不妄說菩薩名真語以所說菩薩是真實故二不妄說小乘四諦是實語諦者實義苦實是苦三不妄說大乘名如語以說大乘法宣如故四不妄受記不異所說不改問今此經所言無妄者即當何語答即彼如語及不異語即不妄語故說大乘也或據彼四皆有不妄即名不誑語也今言無妄亦即彼不誑攝彼論不配不誑語也言已有定疑分等者牒前料簡指四疑生處此間四疑並不開他定疑分中事彼定疑分只從所證所說法及能說法師功德上生也因文便引來非正要也今於後定記分上生得此疑故有此語來意顯疑處與前各別也意言前歎二深時舍利弗等於自所證心生決定聞佛所說遂有疑生經言而今不知是義所趣等言於定記分等者前云定記分有四一決定心二因授記三取授記四與授記初決定心唱止為說之所由因記但是止重請之所由取記許為開釋與記正為陳說言於與記上生者第一疑佛於何出此初疑於與授記上生論有六義糅云於遮文上生以遮無二乘唯有一乘故即是初說方便後說真實故有疑云佛於何時中作如是說牟言只為與授記正是陳說陳說初權後實之義故總判為與記上生若據文相相生可爾若依顯說第五依法上生過去未來現在三世諸佛皆先權後實說衆生疑云為復一切佛皆先權後實說為復有不爾者又前第二段說初權依何等義即今實故總云與記上生言取記上生者第二疑於取授記上生取授記中有二初許可攝授經言汝已殷勤三請等後惡人退席五千人等即從坐起而禮佛而退第二疑云云何知是增上慢唯於惡人退席起去上生也不說不止決敕敬諾言因記上生者定性聲聞及增上慢定記分中有四段文決定心因授記取授記與授記決定心不配經文通下文意直至破四疑已來是二因授記重請之所由三止之中配第二止第三止名因授記問何不取初止耶答疏遠故不取也故唯取第二第三止文也且第二止中若約經文定性與增上慢總無明文經言爾時佛告舍利弗止止不須復說若說是事一切世間諸天及人皆當驚疑以此之故只向驚疑兩字向上論主開出五驚怖五中佛心決為利益二種人悔驚怖多事驚怖即是引攝一類及任持所餘也餘三損驚怖誑驚怖顛倒驚怖非此所為也問既不為損驚怖即教化定性聲聞不得如何世尊成堪說法人此是生疑處故於因授記上生也言依後解亦取記者最後一節疏文後解即是前來結成經文處即是疏言或復此疑非疑趣寂故此第二疑中有二疑中有義損驚怖定性聲聞即因記上生二增上慢人即依取授記中惡人退席上生於一切上生者此有二解一解於與授記六段文上生皆有破二會二也遂有疑之前說三乘後說一乘先說權後說實前說法異後說法異云何世尊不成妄語二指因授記取授記與授記三段文上生皆說權實也上來論科五分初歎法勝妙分爾時世尊下二歎法師功德分吾從成佛已下三大衆定疑分爾時大衆中有諸下四定記分佛告舍利弗止止不須下五斷疑分舍利弗諸佛出於五濁下言初頌頌增上慢者且取記中二初許可攝授此中不頌唯頌惡人退席惡人退席中四一起去二不止三快敕四敬諾餘三文不頌唯述起去亦不同中有無不同起去中標釋標經言說此語時會中有至禮佛而退釋經云所以者何此輩罪根深重等下釋誦中四行總述也廣略不同也長行先說罪根後說慢偈中先說慢後說罪根前後不同也經言有懷增上慢等者有我慢去有卑慢去有不信去不必五千皆增上慢也言出家者既有懷有懷言於中亦有無增上慢者何故出家之人起增上慢答疏言出家之人等言著我自恃者問何故在俗男子起我慢答疏言著我自等出家之人心求道證有增上慢在家男子女人不求道證著我強故有我慢也言在俗女人者在家女人不求道證無增上慢著我輕故無我慢但是隨順夫朋亦懷不信夫唱婦隨朋黨於夫也易云西南得朋東北喪朋婦是職衣一鈴十語九令聽智論二十四說若女得解脫涅槃亦因男子女人無自然得道言犯戒覆罪法等者三頌總述此輩罪根深重一句經文也長行罪根唯匱法業此中加犯戒覆罪有無不同也經言於戒有缺漏者金云破戒有六事一破少分修多分不修二默自不修教他修三汙見他不修而歡喜故四屬依他人方能修故五食取為資生六喻愚世間智者訶讚問少分修屬食何名破戒答屬他非自心利湖邪命又從多分亦不相違也問言懷見者經但言戒今何言見答戒因於見起也大乘正見正思惟為轂語業等為輻若破戒見不壞其罪尚輕廣百論云諸有愚癡人障他真實見無由生善趣如何證涅槃雖犯尸羅不壞正見可得涅槃言少犯等者問何名缺漏答疏言少犯等二百五十戒中犯三十五十個名缺犯一百個二百個名漏缺即淺漏即深猶如器物缺則堪用漏則不堪用又壞戒名缺壞見名漏言或煩惱漏起者結前於戒有缺漏也言仍不見覺者結前不自見其過一句經也言自恃高心者諸優婆塞我慢一句經也言戒中既除者通妨問增上慢者既得第四定如何言犯戒尸羅不清淨三昧不現前答有二意初戒中所除之增上慢者而不犯然律中說有二種人一者身是凡得四禪定將謂是境不是二境實心不實如殺人作非人想簡罪三心境俱虗大妄語人犯重罪四心境俱實非是妄語自所得法實是無學自心亦作無學解唯第三句是犯重罪也增上慢者既是初句故不犯重也俱是錯計此不犯妄語戒不妨得四禪定名增上慢也不曾得四禪定又言我得阿羅漢果等此犯大妄語戒心境俱虗便是尸羅不清淨兼不得四禪定此名邪慢不得名增上慢二者約二種別立今云五千之中自有一類犯重者未必屬增上慢人不爾云何經言罪根深重及增上慢然此中增上慢自有二類一是得四禪定將謂得果者二是但於法上少得謂多得即是增上慢多得者謂增勝勝上之法疏中明者約第一類說疏中意緣前行言犯戒名缺漏恐人錯會將謂增上人亦犯妄語戒故此料簡云戒中既云除等顯增上慢不犯妄語戒也言今言犯戒者決定不是犯根本戒就僧殘已下不知是何戒故言總想等問增上慢人既不犯重戒如何名缺漏答安國言犯小罪名缺不好得空也言瑕者深故不堪用也言玼者玼則輕淺而堪用也瑕音胡加反玉內有病也言犯戒亦爾者身外有過招世譏世譏嫌外人見故如玼玼則玉外有病也內身起過外人不瑕瑕玉內有病也人不知過深也言法之人者問若是玉病字何不從玉也答疏言法內之人等意言法內之人有煩惱病如玉內病法喻雙明也言籺者糏也攝云檢字書不見籺字應依切中麧糏也屑同呼呼漢書云張良常食麧即麥糏也牟云應為糩誤為籺也化度合云三乘之教如米外糠一乘之教如糠外米但得三乘之名不知一乘之理從所執得名也今取五千之徒如糟如可棄也舍利弗猶如清酒有安神之用故堪留五千之輩如糠不堪任用故可棄之舍利弗猶如精米能養命故存之五千之輩如糠輕薄任隨風去佛威扇三止之霜風拂五千之華葉讚揚希有止名一拂恐驚時會止再拂恐墜七坑止三拂舍利弗如大廈之梁木經冬轉更貞實增上慢如枝葉扶疏遂嚴霜而墮落經言佛威德故去佛許而說驚其心振威神而令起去也言以七十頌半述法及結者此字或有者或無者若有此給字則不是長行結文也長行無結文但是偈中述三世佛法式了後一行偈如三法諸佛說法之儀或結三世佛法式七偈未聞令聞六不同中前後不同也言七十半七二者應云七十半是一段科文也七偈偈未聞令聞即是向下一個七字也二字但是結當句二段科文也言一頌頌無數等者長行中言我已無數方便偈中言舍利弗善聽等言念觀者糅云准論解無此念觀疏主何以言念觀也下依法中論方說有故牟解以因緣中攝得方便知見念觀三也如品初言舍利弗吾從成佛已來種種因緣種種譬喻即是因緣中方便知見念觀三等此既有因緣何妨有念觀等論略不舉故攝偈中十力念觀即以若干諸欲性等指為念觀功德不是頌前俱是別科此處經句也又復前總句中因緣攝念觀念觀中有諸門功德故此指之言前後影彰者長行言釋迦自身先權後實說影取頌中諸佛亦先權後實說也長行言我頌中言諸佛是自他互顯也經云衆生心所念等至歡喜者此所念行道皆遍趣行智力也若干等者相國云五乘種姓各隨自乘愛樂勝解而起希求故名于等即疏言勝解智力知也諸佛性者即種種界智力知也界者性因義也言先世善至自業者問既知先世善惡業合是自業智力如何處非處智力耶答知業者自義自作自作自愛故自業智力知也善因感善果惡因感惡果亦是處非處智力收經言佛悉知是已能知智慧知也五種智慧總名智慧也一遍趣行智力二種種勝解智力三種種界智力四處非處智力五自業智力故名五智力也言種種念觀者能知五種智力能知之知名種種念觀也能知衆生此之五種根性所以將因緣譬喻言詞說法令一切歡喜也言依諸處等瑜伽第二十六八十一顯揚第六對法論第十一廣辨十二分教問十二分教新舊梵語云何一修多羅修妬路今言素怛攬二舊云祇夜新云祇焰唐言應頌三舊和伽羅那新云伽他唐言諷誦四舊優陀今言塢呾羅唐言自說五舊優陀那今言烏鉢達那唐言譬喻六舊云伊帝曰多伽今云伊怛曰多唐言本事七舊云闍伽陀今言闍談濫唐本生八云毗佛略今云鼻佛藍此方廣九舊言阿浮陀達磨今云闍啖達藍唐言希法十舊云優婆提舍今云塢波提鉢底此云論義言辨相者問十二分教各以何為行相答疏云契經有二相等於中偈頌長行十二分教皆是契經依涅槃經作如是說也言以教貫理等者一教為能證貫所證理二教攝衆生根勸修善故具斯二攝名為契經由此十二分教無有不契根理者由此四句分別一契理不契根如舍利弗錯教二弟子鍛金之作不淨觀等二契根不契理如勝論師為五頂子說六句義等三根理俱契即此經所說四根理俱不契如外道為佛弟子說自宗法十二分教通名契經故名通相契上通了下別言綴縎等者綴者遭也縎者接續義續也言略說應者長行對偈得名略說也所應說應法相應之義今已略說故名略說所應說義名契經也言此唯長行至偈誦便非等者問何名別相契經答疏言此唯長行等問何故偈文不名契經答為有初來不藉於偈而便生解故偈文不名契經不契初來根故問偈文不契初來根偈文不是契經攝若爾長行不契後來根長行應非契答自是後來不及於初說非是長行不契後來也若爾長行不契鈍根應非契經答由聞後說方悟前文前文名契也若不聞前說後聞亦不解如聞不親由先聞故後即能持又從多分說利鈍雙霑故也又長行文詞不斷偈文三字五字文相斷絶長行綴縎義強所以偈名契經也言益後來者長行說了為後來人不迭聽長行說故聖不再語所以反詞作偈頌說也言顯前未了義者緣長行文略偈文廣長行文略說以論詮義未了故更為偈說一則義未說了名義未了二者說即了聽解未了故為偈說也言或中者處中偈也言或後者後偈也言涅槃經說初之者即是為益後來者再為偈說涅槃言如佛昔與諸比丘說契經竟爾時復有無量利根衆生為聽法故後至佛所化念言如來向者為說何事佛已即由本經便以偈頌益後來故也言記別三相者本來只有初後二義後唐三藏添第二深密義言謂於是處者隨一方處或是世尊說法處或隨三乘人生死處言謝往等者牟云小乘已過去名前未來為後大乘已過去為後未來為前如經乃往古過無量無邊不可思議阿僧祇劫名謝往過去也言記別德失者如記彌勒菩薩亦行衆善業得見無數佛名德求名利無猒多遊族姓家名失也隨善因生人天隨惡生三塗善惡不同故言差別也言生死因果者今身造惡為因身死已後來生惡處名果今身作善為因身死已後來生善處名果故言生死因果也言又云等者此唐三藏加也言有四因者一因授記二取授記三與授記以決定心論不配經文所標即有四種列則不見四令名不得並是解釋深密之義也言諸大人者即彌勒菩薩等一生補處名為大人也言諷誦者謂諸經中不述長行謂歌諷讚誦如來法及德故以句結成也言自說者顯佛慈悲深故亦令未來諸弟子等不請而說言正法久住者但佛滅度後正法之中一切衆生得聖果者有教有理有行有證總名正法證即果也言正教久住者像法之中有教理行而無證也意者為末法中正教久住故佛自說經有教也言緣起相等者請是緣說是起犯是緣制是起事是緣說是起言因犯者謂因犯制立學處也言涅槃經云如諸等者因事說法舍衛國大夫為緣如來說法名起言有一丈夫者如佛一時說小乘法次見此丈夫來默然不說觀此人有大乘根性此人曰佛何故不平等見我來便不說法即去後時更來見佛說大乘之次此人問世尊曰我尋常愛捕鳥獸得已却放有罪否世尊即說偈言莫輕小等因此人說偈名因來說也本是因末是果長者今但怖鳥之罪本未來還感怖畏之末果潞云初提名本後放名末初將謂無罪名本積小為罪名末言譬喻者只此經七喻並名譬喻言本事相者問本說弟子過去事何故却說爾許個佛答但舉所說法不取能說人也言如我出世者問豈釋迦說法唯說界經不說餘經教答言界經者而是總名一代時教所說法之總名也華嚴涅槃即是別名牟云界是十八界如來一代時所說之教不越彼十八界總名界經或界者性義教詮法性不出真如性故名界經言甘露鼓者且甘露能治衆生熱病故大涅槃能治衆生煩惱病也鼓者驚覺之義衆生常在生死愚迷不覺今者警令發心求解脫名甘露鼓又波斯匿王鼓名甘露國人有病苦擊之皆愈佛法如鼓名句文身等如甘露佛宣說時如杖擊之衆生聞已惑盡障除如病愈已從喻為名曰鼓也言法鏡者鏡者明淨圓滿之義如大圓鏡無像不現分明示人此經之真如明淨萬德周備涅槃之法具此衆德法即是鏡理無不詮誠諦利物鏡是即喻也言分別空者分別生法二空之理故知諸佛說教體一名差別故也言本生者囑佛如釋迦為常不輕菩薩身名本生也若說三乘聖衆弟子過去若生若死則名本事也涅槃經宣說菩薩往身不說往行說身者作鹿但熊等也言說菩薩道者即七地四地菩薩及說諸佛一百四十不共功德又復此廣故多故極高故時長遠故經三大僧祇劫方始成滿故名方廣也極高大故時長遠兩句解菩薩道唯大乘有法廣多即通小乘有也瑜伽論中更加無數無限此一句合入法廣多通小乘有也言此通聲聞亦有等者若是二理無缺曰方二行包弘曰廣唯大乘有二方理之廣正法廣陳方廣通小乘有言取涅槃具二者通大小乘菩薩聲聞二藏也諸經論中𡱈大乘名方廣故簡之不取也言希法者希奇之法名希法言八衆者二十五云諸佛諸佛弟子比丘比丘尼式叉摩那勤策男勤策女等言共不共德者斷惡修善所生功德近感人天名共由此遠取出涅槃名為不共言論義有二相者一自說者如來說大乘經顯義周圓總名論義二弟子說者如來在日弟子造論亦名論義經如有佛在舍利弗造集異門論諸弟子盡皆造論亦得名論義經如來自廣分別法相問答徵詰總名論義言摩怛履迦者此云本母如十七地等諸教委細分別諸法性相而能為因生學者智慧是生智本故云本母約自利解若依小乘教戒教授名論約利他解大論二十五云論義者所為一切摩呾履迦阿毗達摩研究甚深素呾攬藏義宣暢一切契經宗要是名論義相言又聖弟子等者謂觀四諦理時以智為門智遊履處諦即是跡智緣名見亦本智證真如名見也言依自所證者根本智證後得智說名無倒分別如在定位觀見眼根七極微成或大種造或從心變如是不同出觀時造論種種分別若爾天親加行位菩薩云何造論答此據多生已經一大僧祇劫廣聞思修故堪造論不同小乘須見諦跡小乘初果大乘初地名聖弟子見諦跡證四諦理名見諦跡也言先德者即澤洲遠法師等是也問古人為取十二部袟十二部類耶答若取十二部袟即如大般若經有六百卷即六十袟攝一本經由不盡若言部類者即如法華經是一部維摩經是一部只攝得十二本經如何收得大藏經如來一代時教盡耶由此道士更加三十六部多儞佛法兩際也言部袟者直日反或作夾若官品作袟言老之徒者莊即莊周老即老聃也言今十二分者一本具十二分教更無濫也言乃濫者問如何不言十二分經答恐濫通相契經以彼通相契經攝餘十二分教總是契經也又不言十二部恐濫部袟部類由此作十二分教也分者支分也問如何言十二分不增減耶答緣所詮理有四諦三道上下有十二行相法輪能詮教所以有十二也又依十二緣起入故立十二分教不增不減也言總為三類者第一類六名唯依主釋也第二類二名唯持業第三類五名通依主持業言應誦者於證反應字屬長行所詮理頌字屬偈文是能詮教緣長行所詮義未了所以再將偈文詮所詮義也應頌頌是教應是理之頌也應頌之頌此是教也即應家之頌依主也亦是應當應理即道理義頌即是善詞故言依主言諷誦者諷者音聲出曲屈詞韻也誦是言即四字五字為句名誦如容顏甚奇妙等是誦也諷之誦簡應家頌也即可諷之誦偈讚嘆之貌今此簡前不頌長行故言依主問應諷何別答應頌是教諷誦是音聲屈由歌詠也言自說者自屬佛身說即所說法也自身說法自陳之說簡請故說依主也言緣起者遇緣者而起故名緣起前人請說名緣如來說名起犯是緣制是起事是緣說是起待緣而起故名緣起也言希法者希謂奇希所詮理名希能詮教名法或如來不共功德名希奇能詮名法又白狗聽法魔為青牛等對能詮教希奇之法依主也言方廣者二空理名方能詮教彼理詮故名廣方理之廣故名方廣二者二理雙證名方包福智稱廣方之廣故名方廣或二利無缺名之為方教與彼二利為依名為廣皆依主也今此一分教中亦方亦廣通持業言論義者此一種唯持業釋論體即義義字若單作即所詮義也論者問答往來故名論因有所詮義始有論義即是體向上問答名論論即是用義之論依主也若言邊作言義之議此議與論俱是言也所詮義為體此所詮義上可論可議故名論義一體向上持二用攝用就體同依持業也言或諷誦亦者諷是音聲屈曲歌諷之諷誦是言音諷之誦皆是音聲只於此容顏甚奇妙偈上持此可諷可誦二種音聲攝此二用就一體名持業或諷是音聲屈曲調韻也誦諷即是言諷即諷即是持業也言可諷可誦者即教持此二用也言不同應頌者通妨問諷誦與應頌何別答疏言不同應頌等意言不詮別理之頌但可名言彼應頌名教授衆生故若爾讚底沙偈豈無利他答但是釋精進之心非別有人聞此偈頌而能超劫故非利生也頌是善也誦是習誦也故別言契經者經是能詮教教名為經契理之經名契經依主也二者契根理故名為根理是所契今取能契能契即經持業也言記別者記屬如來如來說法名能說也別屬三乘弟子差別因果名別記之別依主也三記者記識別者辨別記即別名記別持業也言譬喻者譬比況喻者曉也明也言邊作俞因前比況令義明曉曉喻之譬或譬論之論依主也二喻者比況義喻者況也二字總是譬喻持業也言本事者過去名之為本簡現在未來也今取過去也立名為本三乘弟子差別事本世之事依主也二過去世事名本本即是事持業也言本生者說著佛過去事為菩薩時若生若死名為本生離自身外即為本事也生亦即是過去本世之生名為本生依主也或過去即是本本即是生名本生持業也言應頌之中定無等者問何以如此答疏初後別故問何名初後答重頌述長行長行名初也應頌名後若諷誦不對長行但是孤起亦名初也言單重者諷誦不頌長行自然孤起名單應頌述長行名重也言師資別者本生名師本事名資也言隨其所應有者指前烈名中八部皆具十二分教也言別相即無者只如別相契經唯取長行名契經契經部中只攝得十部便闕應頌諷誦二部若應頌為頭亦只是有十部於中便無諷誦及闕長行別相契經也諷誦為頭亦爾且據別相契經為頭只有十部所以疏言二偈便非非由不也即應頌諷誦也言自餘七部皆具十二者問前行疏言所餘八部皆具十二今此如何疏言自餘七部皆具十二耶答此中十二分教中除却應頌諷誦本事本生并長行別相契經除却五分只有七七分中一一為頭皆具十二分教准此可知言其應頌等者引教證差別也應頌諷誦本事本生四教中一教為頭只有十一分只證四分一一為頭具十一分不證五教一一一一為頭具十分且四教疏中引應頌一個為例餘三皆然言舍利弗來等者此述長行名應頌與鶖子授記便是記別言自說者世雄不可量等是緣鶖子未請而說名自說也言緣起者因請而說名緣起言亦有論議者壽量品云彌勒三請世尊三勸令信佛語方說三身故名論義此欲述前三身義別此名論義應頌也形研窮至此三身盡理之處方曰巡環研核故是論義經也言自餘三教者即諷誦本事本生也皆具十一准此可悟有言六教謬也言大全小九者小山九即是遮後三分也問此經只說九部不說大乘有十二爭知大乘具十二分教全答經文雖然不說經文亦不遮通具十二分問何無受記自說方廣答法華一部宗說一乘為引一類不定性聲聞趣佛果故彼類不聞當得作佛回心已後方始得聞故說聲聞無記別初方便品廣讚二深欲令聲聞起尊重意無問無說三請方談故說聲聞略無自說恐聲聞等於所聞四諦等法生無上意具顯彼非無上法無上法唯大乘故故說聲聞略無方廣也言小全大九者護大乘者菩薩是護大乘人言大乘九部便遮餘三部也問小乘不說有十二分爭知具十二分耶答小乘雖然不說有十二分小乘亦不遮通不具十二分也問大乘何無因譬喻論義也答菩薩久修無犯因犯制戒之緣起菩薩利根一聞即解不要說喻菩薩利根不假往復故故無論義也下疏言理實亦有者即是正法廣陳之方廣也言三大全小十一者方廣一分唯大乘有不通小乘唯十一部大乘具十二分也言四大一小十一者即方大一者即方廣一分也小十一小乘無處唯無方廣大乘獨有緣此方廣一分全與小乘不同所以大乘中偏說具也餘十一分小乘亦有只緣十一分與小乘同有所以大乘不說也如鬪百雨草家同有者即不說偏有者即說標了下釋言自餘廣義等者章有七門烈名辨名相釋名通別相廢立諸藏相攝問答分別今唯有二門無彼烈名等五相攝同此教差別烈名同此唱初也通別相者以一對餘論有無也烈此皆取別相不取通相如契經中無應頌頌中便不說契經等具如契經別相唯無應頌及諷誦諷誦有具餘九應誦無諷誦有餘九也廢立者何故但十二答有總有別總者涅槃云能說法者所宜聞故三乘通說十二分教以轉法輪三周只有十二行相故別廢立者如是聖教直說非直說相對為問故有契經及應頌也單重為門故有應頌及諷誦等問答者問三藏中素怛攬與十二分教契經寬狹如何答四句分別一有是三中修多羅而非十二分中契經為應頌二有是十二分中契經而非三中者為通相修多羅三俱為別相契經入三藏者四俱非為外道教問何長行略說而非契經答隨義勝故名契經等餘不知也經言鈍根樂至涅槃者問何故四十年前不說大乘而說小乘耶答我只緣隨宜說法識知衆生根性頓說大乘不得有五義故所以先權後實衆苦所惱亂者四障中聲聞畏苦障緣覺捨心外道著我闡提不信障故今苦惱為說涅槃也言鈍根者若說大乘事須利根智慧言樂小者若說大乘事須此等聞得佛大喜充遍身言耽生死者說大乘須猒離生死言逢緣者若說大乘須百千萬億劫世世已曾從佛受化言現衆苦者若說大乘須衆有清淨言雖逢諸佛者問十六王子時聞法華經何故於諸無量佛不行深妙道答疏云雖逢等言信解品者昔權六一最初發心喻譬若有人年既幼稚二退流生死喻捨父逃逝久住他國或十二十三中還見佛喻年既長大加復窮困四不肯修大喻父每念子與子離別五十餘年五化以二乘喻父遙見之而語使言不須此人勿強將來六示大不希喻長者有疾自知將死不久語窮子言最初發心退流生死同此於諸無量佛不行深妙道化以二乘喻即同此衆苦所惱亂為是說涅槃經言我設方便者四十年所說小乘也令得入佛慧與大乘為因雖然化二乘元來為菩薩四十年前說小乘元來為佛慧未曾說汝等當得成佛道未曾說法華經也言會已前汝根等者通會四十年前意也今正是其時決定說大乘也問何故唯佛涅槃時為說法華經時答如來入滅衆生戀慕正是樂聞大乘時經言長者臨欲終時而命其子并會親族國王大臣云云正是窮子羡慕長者財物時正是長者臨老付屬家事時正是如來欲入涅槃時正是衆生根熟樂欲聞法時也言同化城者初知根熟後說一乘根熟有五一涅槃時到者悲感生信又臨欲時而命其子衆生根熟恐佛涅槃聞即深信二衆又清淨漸離染故初說三乘出於濁世衆生垢重今久化之漸離垢名清淨三信解堅固者證解信解二皆生故不外阻壞也四了達空法者生空已證後聞般若令知法空不愚法故五深入禪定者四禪九定遍出入故要具此五方堪說此經後說一乘者此據退性密意說之名唯有一乘非有情性無差別便集根熟方說未熟不言名同化城也言說為大本者既四十年前說二乘正是入大乘為本故勸住大乘中正是經言隨順說者初根且說九部經言以故說是經者以由用也用入大乘故說是經斯為本故彼非究竟應住大乘言此有五德者今以五德翻前五過一心淨翻前二義專求大乘翻樂小除二障翻貪著生死二柔軟翻前衆苦所惱亂堪耐勞倦苦不惱故三利根翻鈍根四五二句無量諸佛所而行深妙道翻前於諸無量佛不行深妙道問前行疏言頓悟漸者下言除二障故名心淨者若爾地前頓悟障垢未除得了回心由居智障何名心淨答但大乘畢竟能斷即名心淨非要斷盡言堪耐者奴代反五精進中無退精進經中言堅猛言磨瑩者三慧聞思修為能練磨菩薩心為所練磨菩薩心上清淨無染名瑩言寶規真覺者寶重規求無上菩提也五德中初三利他後二自利三周皆有堪為說之相初周說具此五德成十法之子方堪為說中周譬喻品末十九頌於有智者應為說之下周即涅槃時到五緣具足方始說之言十種法堪發菩提心者修習善根即順解脫分及順決擇心通菩提涅槃之因所發即菩提心如造須麴為能發假者為能發言志求勝法者亦理智二種也亦有謂真理涅槃也問何知是真理答寶觀真覺故名理言求佛智慧者即菩提也言結成勝二者即勝人勝法言勸捨非妙二者即劣人劣法問因何有此結文答由前言我此九部法一偈別顯勝法也又言有佛子心淨等一偈半別顯勝人也今此一偈雙結前勝人勝法也初一行半結前勝人後兩句結前勝法也經言我記如是人者五德佛子也經言來世成佛道者獲大果經言以深心念佛者發菩提心經云修持淨戒故無缺無犯此等之人聞道作佛大喜充遍身得人天果名小喜得二乘果名中喜得成佛果名大喜若得人天果名心頭喜若得二乘果滿面喜若得佛果菩提遍身喜問實得否答經言汝等既已知諸佛世之師至作佛又言心歡喜充滿如甘露見灌爾時舍利弗踊躍歡喜此結前勝人也經言佛知彼心行為說大乘者別結前勝法也言念佛有二者一者語念心動於語語呼佛名高聲念佛有十種功德故言語念也二心念者意議與念俱時想念於佛故經云心念不空過也言或心緣事佛者心緣事事即報佛化佛言願救者願救自他廣談法要二希成者希自他身亦當作佛言智念理身者即是正智證法身理此亦有二一求證二滅障求證即解脫道滅障即無間道緣事即定緣理即慧並是緣三佛之身此為心念言定慧既爾者只指向上經文或云智念理身慧也又持戒故或又相應三昧定也潞府言前言我設是方便令得入佛慧未曾說汝等當得成佛道別顯劣人也我此九部法隨順衆生說入大乘為本別顯劣法也經言聲聞若菩薩至皆成佛無疑者只聞此法華一偈便成佛無疑又四十年前所行行回心已去為成佛因此勸大乘也言無二無三者疏主優心也言此據真理者即真如妙理也無二者遮無二種法身故法性真如三乘同等若言法身即二乘教下無唯大乘有在二乘位名解脫身在大牟尼位名法身問如何愛法身作乘答如船依水水得運名也或此據真理者即是真實道理也通菩提涅槃也即是能詮教名權方便所詮智慧名真實乘問何要第二解耶答緣二乘人執有餘涅槃大乘中涅槃三事具足般若即是菩提法身即是理也此言二乘無者無三事涅槃名無也不是二乘總無因果觀行及權方便法一一皆有也只有有餘涅槃非是究竟又羊鹿車不能廣分別法也言然涅槃可證等者通外難亦是疏主斷也問二乘智果但假名經說羊鹿車不上二乘理果假義同應彼化城亦不入違經答疏言然涅槃等問化城將喻涅槃理即許中路入化城羊鹿二車喻生空智何言出宅車不上又言二車門外方便設二子出門不上車化城中路方便施三百由旬城不入答疏言然涅槃可證等量云羊鹿二車是有法定許上故宗因云假施設故同喻如化城反量云化城是有法定不入故宗因云假施設故同喻如羊鹿車此答意一種是無真實非究竟二乘則實得解脫實能息苦實斷煩惱障實得生空理所以化城實入二乘無種智劣故二車不名登也言問三事稱大般者意言城是假許實入車是假不見登答疏言解脫諸苦息等意實能息苦故言入化城二車權種智二乘無故不上於羊鹿二乘雖有種智少故隱而不說二者雖有不能廣分別法雖亦分得不名上車也即得解脫將時諸苦息不妨許入於假城得生空智時種智無羊鹿假車不許上言又解脫二乘等者問二空種智以為車分得生空車不上二障盡處稱解脫分得解脫不入城答疏言又解脫等意言解脫二乘有分得分得解脫城許入種類後智獨圓分得生智車不上問菩薩亦分得種智應不名上車答菩薩分得法空智實登慧也二乘不同此例言言理實無別者此約雖分有種智作用不廣務令回心隱少言無非無也分得入城上車道理恰齊故言無別也言又惑障因果煩惱障盡因果皆無化城稱暫入智障因果總不斷二車種智不言登也經言終不以小乘等者根宜未熟所說為三畢竟門中須歸一實言佛之智慧者總標智慧體通五種佛之智慧也言今此多說者此解同初周開佛知見理智雙說合鶖子欣也捨却二乘權取一乘實言或唯真智者問何要唯說智慧答此經前五波羅蜜為能校量第六波羅蜜為所校量分別品云於八十萬億那由他劫行五波羅蜜不如有人聞如來壽量品生一念信心功德過前五度百分千分百千萬億分不及其一故終不以小濟度衆生此第二解同中周唯說種智牛車令中根四人生折也捨却羊鹿直上牛車也言或此一事多說者同第三唯取智性真如不取智慧相欲令二乘人捨化城取寶所涅槃涅槃經言師子吼是無畏義佛性即空空即智慧真如是空之性故名空因空所顯故名空又真如智慧之性亦名智慧也此唯取初為正即同初周二乘無故即是智性智相便是三事涅槃名一大事二乘無故下破古人也言十七偈述開示等者長行分二初略標所以者何下後廣釋廣釋分三初徵經言舍利弗云何下次釋諸佛世尊唯以下後結舍利弗是為下今此頌中不述徵結唯述釋文有無不同也言假者佛身等者解佛字即同涅槃言如來安住祕密藏中問佛身無漏豈名假者答佛具有無漏三科法為體所以名假者如三無漏根體豈非假也言恆安處者解住義言住大乘大乘即菩提涅槃兩法此解如來五薀假者身為能住法身報身菩提涅槃為所住只此所住二法即是大乘也言所得唯是法身者唯法身真如理也言或大乘者唯取真理也言正智證者問何名為住答疏言正智等言萬德具足者唯識言自性涅槃謂一切法相真如理雖有容染而本性淨無數量微妙功德此約性說也言故佛報身如其等者意言所證法身向上具塵沙萬德如者似也能證智證著此無為功德遂令報身之上還具一百四十不共塵沙有為功德及得定慧力莊嚴定即福慧即智也菩提智上平等一味無差別故此第二解如其所證等總是報身智也言攝持一切者即是定慧攝持一切功德菩提涅槃還以此二度於衆生不同疏中所得唯理也經自證無上道至此事為不可者此顯法平等也言無上道至貫通者問何名無上道答正智名道勝故名無上也法身真理名大乘故一言無上言貫通理二處理智二種悉皆無上即菩提涅槃也言二皆平等者真如理也智證理時無能取所取自他無物我異故故理智二種悉皆平等問智證理時為智相分智即見分云何言無能取所取答正證如時不取相故名為無也非取全無故論云爾時住唯識離二取相故長行解云智與真如平等平等俱離能取所取相故俱是分別戲論現故論有三解初云有義此智二分俱無攝論第六說無所取能取相故二云此智相見俱有帶彼相起名緣彼故三云見有相無說無相取不取相故雖有見分而無分別說非能取非取全無瑜伽七十三說問若無相分見分何緣答雖無相分而可說此帶如相起不離如故言自他等者解上無能取所取也能取為自所取為他能取為我所取為物意言既證平等理智二法無物我自他豈可自證大乘與化小運也言又大乘者此解可無上大乘即是無上道以彼大乘運用勝故二俱是智唯取正智不同前解大乘是理言佛既證此平等至二別者問世尊莫自證得大乘法與他衆生說小乘耶答經云若以小化乃乘至於一人我即墮慳貪此事為不可言內離染者意言如來既內離染故得無畏能說實法經言若人信皈佛者如來不欺一切衆生不誑衆生問何故不欺誑衆生答我緣向內斷諸法中惡所以外不欺誑衆生也經言亦無貪嫉意者不貪此菩薩法與衆生名不貪解上不誑亦不嫉一切衆生成其大乘名不嫉解上不欺也自證無上道名貪也與他人說小乘名慳慳即慳而不與由斷一切法中惡故佛於十方而獨無畏言由斷一切法中惡等者雙釋無貪嫉意言由無貪嫉所以能師子吼是決定說師子吼是無畏義言我是一切智者真智一切見者俗智一切智者本後一切見是五眼又一切見生死智力而實知故言平等化者藥草言如來于時觀是衆生諸根利鈍精進懈怠隨其所堪而為說法頌中言貴賤上下持戒毀戒威儀具足等言父聞子健恨不煞者不是能喫飯亦不是肥壯但能理家事計算名為健也父恨不煞身以謝子之思也言自外何吝者身尚不惜豈況身外財物珍帛而有吝耶佛菩薩得衆生入佛法中恨不替衆生受苦豈況惜佛果功德無漏財法耶言顯外莊嚴等者問世尊為復內實離貪癡為復妄語耶答如人身內有冷病面色黃黑有熱病面色赤我若內有煩惱病即形憔悴經言我以相嚴身光明照世間無量衆所尊為說實相印如來身光縱之即彌滿法界任運能遍三千大千世界於諸毛孔中常放光明普照有情及器世間復以智光破煩惱暗恐隱日月光神力攝之而照一尋也言實相印者表信也表非虗也如世間公家文書有印表其實也教中若說我表是外道邪教若說生空理表知小乘教若說二空理印知是大乘教今明實相印表知是大乘教也案法菀云了不了義經中說有三法印者表是佛經名了義若無三法印即自外道經云名不了義一有漏皆苦即簡外道計苦為樂二有為無常即簡外道計冥性等常三諸法無我即簡外道計有神我等此三法印通大小乘有今大乘實相印者即二空理為印大乘教名了義經也二空為印大乘教如說三性三無性等言如小乘中說三法印者一者諸行無常二者涅槃寂靜三諸法無我初唯有為次唯無為後通二種此是小乘印也今此實相印偏舉大乘如王齒印即國王有金箱王印以辨真僞今以三法印印諸教法若異此者非佛教也如世間人度關津便有官家文印印之佛法亦爾若欲度分段生死關即以小乘三法印印之若欲度變易生死關即以大乘二空印而印之經言舍利弗當知我本誓至無異者即凡夫時發願也問如來有三身衆生有一身如來出生死衆生在生死何言無異即有異也答世尊當為凡夫時逢善知識教化便悟昔所不知因此修行令身中報佛種子生現行佛種從緣起當時發願願令一切衆生還如我身悟先所不知故言無異也不必事須一一三十二相也當日發願直至靈山會已前一切衆生共佛有異直至今生靈山會上得舍利弗回心悟昔所不知名與佛無異也悟知見了言如我昔所至滿足者前頌中所言立願但是願令衆生一一似如來悟先所不知大乘真智今者果滿靈山會上法說一乘令鶖子悟先所不知名如我等又解有二意一云四願中當日因中發願願無上佛道誓願成今日成佛故言如我昔所願今者以滿足滿足者自利行滿足利他未滿足二言世尊因中修行入佛知見令證不退轉地當日發願願一切衆生還如我身修入佛知見智今得三根聲聞回心向大決定取當來入佛知見智故言滿足言今者果滿等者意言疏有二一今者滿自成佛也遂昔願心即滿足也二云今者果滿者稱遂識如人不見物那事果否答且稱意即是果也四十年前直至十六王子時已來事總未果今日法華會上果滿也得鶖子回心行入佛知見名果滿即是如我昔至滿足也問阿那含是修入佛知見人耶答化衆生入於佛道道者因也言示不同意者問示有同識三乘法身本來平等即合一一衆生總以大乘化之何故四十年前說三乘法法華會上說一乘四十年前說不同法華會上說問何故初說後說不同耶答四十年前求道同不得經言若我遇衆生盡教以佛道有智者可爾無智迷惑不信也言錯學亂行者牟云錯學不如不學亂行不如不行錯聽不如不聽錯說不如不說四十年前說同不得問何名智何名無智答二般一頓二漸悟菩薩不定性聲聞三乘并定性不愚法者總名智也二凡夫外道兼二乘有學無學未回心前及全性愚法皆名無智也言亦如覆杯水者地下窪於交反如覆一壞水在堤塘水淺無力莊子云水之積也不厚其負大舟也無力愚人喻壞水說教如致壞迷惑不信即如膠著牟云但取無力力劣不勝坳塘之水只浮得芥等之舟若載萬斛之船還須得大海菩薩根器由若大海一乘之法如萬斛之船二乘之根如坳塘之水二乘法如芥葉之舟若二乘根器聞著大乘如致壞於窪塘之水即不勝也為說一乘即委之在地也置委也言未曾修善本等者問為復今生已來未曾修善本為復過去久遠已來曾修善本耶答設爾何失二俱有過若道過去已來未曾修善本者過去繫珠之義不成若今生四十年前未曾修善本說經不得今既過四十年後法華經豈曾修善本又問未曾修善本為復小乘善本若是小乘善本如何與說大乘為因答二說一云未曾修小乘無漏善本求說法華經不得欲到法華會聲聞人得羅漢果有彼出世方便善本所以說法華問何恃小乘為因答回心向大只此小乘無漏方便善為大乘因也二取過去十六王子二萬佛時所修大乘為善本若爾者已修善本何名未修答疏言無始雖起多分等意言過去雖逢佛雖修善本多求人天果報未專求無上菩提多分暗劣名未曾修善因總攬前來意者不出二釋一者持業即取二乘所修無漏理智此無漏善即是大乘之本也彼不定性人若不得二乘者必不能決定回心故故我云以方便引導汝故生我法中法中皆即二乘無漏也然後我今還欲令汝憶念本願等故知二乘無漏即為大乘本昔未得故故云未曾也亦即初權後實之次第也二者無漏之本即大乘無漏之本也即取前方便行能回心後地前有漏助為一乘也無始雖起已未決定所修之行皆資人天之身故云無始雖起等今得無學所有諸行皆資大乘無漏種故更無人天之身可資長故云未曾等言唯生得善者設於往時加行而修亦名生得以彼所資是人天故能資無漏方名加行故論云菩薩前者資糧位也中既修習已趣見道復修加行言以此為緣癡便發等者無明發業即是行支熏得五果種子愛取潤已轉體成有故有有支故生死二支由有生死起一切怨苦憂惱苦樹增長也言一切苦惱苦樹增長者即是無明發行行支招集識等五支種子愛取水潤轉成有支由有支故有生老支一期愁惱苦樹增長潞云無明行是生老死樹根識等五支是生死樹莖愛取有是生死樹華生老死支是生死樹果又云無明行如土識等五支如樹愛取如水溉灌生死支結果言由無出世方便善本者重釋所由也重釋前義初說執先而惑後此說惑先而執後故唯識云雖諸煩惱皆能發業而發業位無明力增具十一種殊勝事故如潤生位貪愛力增說愛名水能發潤故言發業明等者唯識云謂由迷內異熟果愚發正能招後有果業復依迷外增上果愚緣境界受發起貪愛多迷外塵妻子眷屬及資具等起簡要云若爾發業無明多由迷內身起何言今者由五欲境為緣癡便發業又上界無明不依五欲境發業如何經言堅著於五欲癡愛故生惱答疏言今據欲等著欲說重處故上界三塵名輕若據內身三界無別也意令生猒怖故經言以諸欲因緣等者以諸等一句貫下諸句言純起不善等者且修十善業有其三品下品修生修羅中品生人中上品修生六欲天及上二界十不善業亦三品下品生鬼趣中品生畜生等生上品生地獄也故分三道隨業不同也言由雜業故等者論云由貪現在樂起非福業了生三惡趣由貪未來樂故造福業不動業死了生人天及上二界經中但說所趣果有六趣也疏中約果明因故置雜言也六趣即是善惡業果也故說因業名雜也人天中雜業故言由雜業故輪回六趣又業有四一黑黑業因果俱黑故二白白業因果俱白故三白黑業人天總報即白別瘖啞等即黑畜生總報即黑別報端正等即白五白貌兒四非黑黑即無漏業等言備受諸苦毒者此是問意問有情流轉六趣四生四生皆有苦今者何故唯說受胎生苦不說餘故答疏言偏指一生現苦為論故言受胎之微形世世常增長世世者指多生身也三苦一苦苦身是苦本更作苦事名苦苦二壞苦三行苦五苦者金云一老二病三怨憎會四死五求不得苦八苦者生老病死五怨憎會六愛別離七求不得苦八略攝一切五趣薀苦即是五盛蔭苦五苦迫故上解二句經文了言受胎之微等者胎者孕也微者劣也若於四生他生為勝今由攬父母利令不淨以成此身微劣劣生也言瑜伽論說者即十七地中意地中說也言本居中有者死有後生有前死生二有中五薀名中有也又中有多名一名中有亦名健闥縛即尋香得香所資故亦名意行以意為依往生處故或名趣生對生有起故大乘中中有既屬生支欲說受胎先論中有言中有極長一七日一度死死已更生中有中有壽極至七七日更不得過問中有既有命終死時應更有中有傳識耶若許有者應可有無窮若不許者如何傳識答中有身死不同本有也暫時悶絶第六分識不行才死便生不捨第八識又解但是滅相所攝不立中有也問於減劫中造得輪王業劫增方受據此中有合長時何言七七日答章敬云小乘中有一師許多時住從減至增皆住也今大乘中有與彼不同決定業者往諸趣受若不定者往餘生中寄生也即同類生寄生是若諸部說十二十年等皆不正說也言黑羺光者上品不善業身如里羺光骨曆羊似山羊也中下品不善者如陰暗夜造上品善業者身如白衣光中下品善者如晴明夜如里羺光身形也陰暗夜所見境也如白衣光身形也晴明夜所見境也問誰人得見中有身答清淨天眼升大力菩薩廣慧聲聞見也寶積經云地獄中有其色如燒瓦木傍生中有如燒餓鬼如水色言隨當生相如當本有形同業所感問中有身形大小答抄解云未見大乘教說且小乘所說欲界中有形重大小如五六歲小兒色界中有如當本有形若爾如菩薩受胎云何母夢見白象入右脅答此是吉祥瑞應相非關中有菩薩久捨傍生趣故問中有有衣服否答色界中有有衣服與衣服俱生慚愧增故欲界中有多分無衣無慚愧故唯除菩薩及白淨尼由本願力及施袈裟別業感故言所往無礙者有所往唯至受生處所趣無礙山河石壁透過問與神通何別答全別但於生處去則得餘處不能也通力普能去也言見己同類者隨何處中有皆見自身同類有情及所生處而起愛故問一切皆具中有否答不定極惡人即無中有生身入地獄如善星等及轉身為狼及變為蝙蝠等及生無色界者無其中有以無形故問無色界沒來生下界既具中有於何處起慈恩答言隨前滅前處中有現前言造惡業者簡要云惡業中有唯見不淨丘陵荊棘造善業者唯見珠玉之光華堂麗室清淨之處言眼觀不淨者則云攝論文眼觀不淨為正抄云下淨者設生三惡趣亦見淨相所以所生若見穢相不欣生故受生位事須見淨生欣也相國云有疏言不字誤也撿數處論文皆言下字牟云可言不淨亦有別理即明淨之淨前言造惡業者所見之境暗如陰夜即是此下視不明淨也若爾往天趣者何不言上淨答理實應爾今舉重處令生猒故言往天趣者頭向上如人發梯也往人趣者傍面而往如人往來相也若唯俱舍云天首上三橫地獄頭皈下小乘地獄中有足上頭下言若造不律儀等者難云潤生之心總有二位一本有末心二中有沒心若生惡趣所見不欣云何中有而起於愛故論云愛非遍有寧別立支生生惡趣者不起愛故答疏言若惡不律等好煞生者見昔同類知識同伴一處煞生便往彼中喜樂馳趣亦生樂時便被拘礙地獄中有初見事須見喜後變成不喜相識親情悉變作牛頭阿傍也中有亦滅便受地獄身也言若餘雜業等者局明入胎也大寶積經五十六說佛在誓多林告難陀及五百苾芻我有法要初中後善所為入母胎彼中有入母胎時心即顛倒作邪解心生寒冷想大雨大風及雲霧相或大衆聞聲作此相已隨業優劣後起十種虗妄之想云何為十或今入宅我今登樓我升堂殿我升床座我入草菴我入華舍我入草藂林中墻孔籬間作此念已即入母胎名羯邏藍父精母血非是餘物由此二物和合為因識依止住若薄福者欲入胎時便聞種種紛亂之聲自便妄見入於藂林竹葦蘆荻等中若福多者聞寂靜默妙可意聲及自妄見升堂殿等言於其父母至生憂生患者牟言受生之相汙穢難名人子之分非可竊誼每見聽講者說受胎之際輒加戲笑曾不反觀廉耻之人固應不爾此乃諸佛菩薩大悲心中與我等衆生說非造次而談豈得聞之便為笑樂男中有於父生憂於母生喜於父生憂如競色男女中有於母生憂於父生喜於母憂如競色女瑜伽論云彼於爾時見其父母共行邪行所出精血而起顛倒顛倒者不謂父母行此邪行乃見自身與彼和合方乃受生迷他為自故名顛倒所以隨於男女生憂生愛愛心潤當生也以此貪愛於父母生嗔喜然本有末位除昏昧昏昧中愛不行故問潤生之愛屬當生繫者此有何意答二意一者受當生者定緣此愛即是此愛有力於當生故故當生攝二云以中有後心方起此愛大乘中有屬當生攝故言攬父母之遺者瑜伽云爾時父母貪愛心俱極最後決定各出一滴濃厚精血二渧和合住在胎中合為一團猶如熟乳方為識依而住問父母不淨為攬成身為不爾耶答小乘所說即便成身大乘不爾託此為依識內種子變為身故若取前義唯識不成以他為自身故心外取境故問何故現見男女似於父母耶答寶積經言有四因緣汝應善聽如依青草蟲乃得生草非是蟲蟲不離草然依此草因緣和合蟲乃得生蟲作青色如牛糞蟲作黃色依棗作赤色依酪作白色非離糞等體等體非蟲和合因緣作黃色等能依似所依也問老子云身體髮膚受之父母不敢毀傷答世界所談不別信也言迷醉者潞云中有一剎那及本有多剎那總名昏醉時也言父母不淨等者此意亦說本識中五根種子及四大種而生現行五根初生極其柔軟如草初生牙非說父母之不淨也此說色身初生之位假彼父母不淨為依故名雜穢此約處同時非是互相涉入言若已凝結箭內等者若者如也箭內稀者疏作弓箭字像胎子作箭從喻為名女人受胎如被箭中箭能損於身胎子能損於母又獐鹿被箭中已必為死因初結生已定為老病死因也言甲煎之煎外雖凝結向內稀故俱舍云此胎中箭漸次轉增言此云疱者如水上泡形段也如麻如栗許大在其胎中如豌豆瘡者舉其厚薄以喻胎子不以大小為喻也言堅厚者成團而堅如羊肝言支分相現者即是一頭兩手二足言具根位者唯識云七七日後名六處支諸根明盛顯故具根已前名色支攝言至此初後方鈎者意言至此七七日具根之位方鈎三個月也其相云何謂如前月下旬受胎直至後月上旬兼中間一月豈不是初受胎及後成就鈎著三個月也若前月上旬中旬受胎者即不鈎得三個月或可但以一月是三十日即四十九日長短鈎著三個月也所剩十九日分向前向後也更解事須依取前月十五已後至後月上旬四十九日方鈎三月前月名初後月名後種種成就也言不增減者示産生也意說世間懷胎有樣月生有六年在胎者名增有十月不足生者名減今取不增不減月數之者如是合經三十八七日在胎圓滿更經四日即生即是經二百七十日於中月小大遂鈎著十個月故言十月滿足也然此三十八七日行相不同如寶積五十六云復次難陀如是應知凡人入胎者大數言之有三十八七日居其母腹初七日時在腹中如糏如癰臥在糞穢如處鍋中身根及識同在一處狀如煎熬名羯邏藍狀如粥汁或如酪漿於七日中內熱煎煮地界堅性水界濕性火界𤏙性風界動性方始現前又云羯邏藍身有地無水便即乾燥悉皆分裂如手握乾有水無地便即離散如油滴水有地水而無火者而便爛壞譬如夏月陰處肉團若無風界便不能增長廣大從二七日已後合有三十八種增長名字各各不同也第二七日有風自起名為遍觸猶先業力觸彼胎時名頞部曇狀似稠酪或如凝蘇於七日中內熱煎煮第三七日風名刀稍口風觸彼胎子時名曰閇尸狀如鐵筯或如蚯蚓第四七日風名內開吹擊胎煎名為健男狀如鞋楦或如溫名第五七日風名攝持此風觸胎有五相現兩臂兩䏶及頭第六七日風名廣大此風觸胎有四相現謂兩肘兩膝第七七日風名遊轉此風觸胎有四相現二手二足猶如聚沫或如水苔第八七日風名翻轉此風觸胎胎有十相手足十指初生第九七日風名分散此風觸胎有九相現二眼二耳二鼻口及大小二穴第十七日風名堅硬風令胎堅實即此七日有風名曰普門此風吹脹胎藏猶如浮囊以風吹滿第十一七日風名疏通觸胎令胎通徹有九孔現若母行立坐臥等時作事業時彼風遊轉虗通漸令孔大若風向上下孔便開若風向下時即通下穴如槖鑰風上下通氣風事異已即便隱滅第十二七日風名曲口此吹胎於左右邊作大小脉猶如藕絲如是依身交絡而住即此七日有風名曰穿持於彼胎內作一百四十節復猶風力作一百一禁處謂令百一病起於此禁處而有病生第十三七日以前風力知有飢渴母食飲時所有滋味從臍中而入藉以滋身第十四七日風名線口其風令胎生一千筋於身前後左右各二百五十第十五七日風名連持能令胎子作十二種脉吸諸味故前後左右一一復有一百道脉相屬相連令有八萬前後左右此八萬脉復有衆多孔穴或一或二乃至九孔一一各有毛孔相連由如藕根有多孔隟第十六七日風名甘露行此風能為方便安置胎子二眼處所兩耳兩鼻口咽胸臆令食得入停貯之處能令通過出入氣息此約後時為論非胎能食也第十七七日風名毛拂口能令眼等處所通利滑潤第十八七日風名無垢能令胎子六處清淨即六根也第十九七日風能令胎子成就四根眼耳鼻舌入母胎時先得三根為身命意第二十七日風名堅固此風依胎左腳生指節十二骨依胎右腳生十二骨足跟四骨髆膝久有腰踝三骨脊有十八骨肋數有二十四骨依左手指節二十骨右手二十骨腕有三骨臂有四骨胸肩者各有七十骨頭有四骨頷有二骨齒有三十二骨頰有二骨髑髏四骨第二十一七日風名生起能令胎子身上生肉第二十二七日風名浮流能令胎子生血第二十三七日風名淨持能令胎子生皮第二十四七日風名滋潤能令胎子皮膚光悅第二十五七日風名持城能令胎子血肉滋潤第二十六七日風名生成能令胎子身生毛髮爪甲此一一與脉相連第二十七七日風名典藥髮毛爪甲悉皆成就第二十八七日風於母胎中胎子便生八種顛倒想所為屋乘園林樓閣洲縣河池想而實無此故此生分別第二十九七日風名華修能令胎子令其形色鮮白淨潔或由業力令身黧黑或復青色或乾燥無有滋潤第三十七日風名鐵口風吹毛髮等能令生長白黑黃等諸色皆隨業現第三十一七日於母胎中胎子漸大如是三十二三十三三十四七日已來增長廣大第三十五七日子於母胎支體具足第三十六七日其子不樂住母胎第三十七七日胎子便生三種不顛倒想所為不淨想臰穢想黑暗想第三十八七日風名藍華生風能令胎子轉身向下長舒兩足轉頭向下以趣産門難陀若彼胎子於前身中造衆惡業或墮人胎由此因緣將欲出胎手足撩亂不能轉側便於母腹以取命終也言種種衆苦者胎子體血乍被外風所吹如百千刀錐攙㓨具受種種苦言迫迮者狹也言或由先業母食等者談損害也母食灰鹽子髮稀鮮有二因由一先業二母食灰鹽灰鹽者更有說或由先業故令母灰鹽灰鹽者醎閟之水有似於灰煮彼為鹽名灰鹽四分律中十種鹽中灰鹽是西方鹽名非此方鹽名非是鹽中有灰名為灰鹽由先業力不行忍辱感身一切惡相言頑白者不覺痛也言男居右脅者問男子本位在左女本位在右如何今者男右女左答今者結生之時迷醉顛倒男女位異而於父母生愛染故言云倚腹向脊者男即於母生愛於父生嗔背父向母所以面向資也言倚脊向腹者女於母生嗔於父生愛染故故背母向父也言攬父母之不淨者有解世間人女有身即月經不通即緣子在胎中攬之以資長也亦有云子在胎中胎衣之上有乳令子食也有福者感母食上味變成於乳流生胎中令子食也若惡業者胎衣上乳少表薄福也言現緣既爾者現在所見緣既爾皆是百惡所招十業道十十相資成百也一個為頭餘九助十個總為頭即成百也言三十六物者偈曰外相三四醜身器二六成中含十二穢是名三十六髮毛爪齒四睡眠涕唾四垢汙大小便四是名外相三四醜二六者皮膚血肉斤脉一六骨髓肪膏腦膜二六名身器二六成脾腎心肺肝膽腸胃赤白疾癊生熟二藏是名中含十二穢也言求邪出離錯行等者若依後科有無並屬五見若依初科有無並屬邊見且依後科解者經言薄德少福等者慈悲不涼厚名少福智慧又實鮮名薄德又不修前五度名薄福不修後般若度名薄德故上言斯人鮮福德不堪受是法等言因起見戒取所餘惑者深著虗妄法即見取戒取我慢心諂曲等即所餘惑生言雖祈出要不悟等者五見見不正總名邪見言此依後科非要等者五見見不正故總名邪見言非要撥無等者顯揚說邪見緣撥五門謂因果作用實事等言邪見煩雜等者五見見不正總邪見向上六十二見種行相總名邪見總名稠林上解稠林言若有若無等者是五見中四見皆執於有若無者五見中邪見多撥於無言皆執有故者牟言四種見中如邊見中斷見豈名為有亦言多執有故答疏主約多分名有猶如邪見名無四是有邪見是無言等言顯示種種煩等者等取五見向上差別行解不同名種種煩雜但是向內等也言依初科者解邪見者五見之邪見也邪見向下行相差別有十五句名稠林也言此二為邊見者三界之賴耶為體阿賴耶識非斷非常以常轉故故唯識云常遮斷轉表非常由如瀑流因果法爾前異熟既盡復生餘異熟今言執斷常合名為邊見也言等者等取身見見取或取三見也問若依初科只合等身見何故兼等見取戒取耶答六十二見依邊見邪見生也其身見是邊邪二見之根本也見取戒取又是色見之眷屬故亦等三見也問戒取如何亦名見答依見執戒亦名見眷屬也言由六十二見等者問疏中自言若依初科等今准初科一頌半明起身邊邪見成六十二見後之二頌方言因見戒取所餘惑生此既依初科只合等取身見何言兼等戒取耶答疏言由六十二見等其實只合等於身見依初科故意言六十二見但五見中邊邪二見差別之相若論其體即是染慧一分為體故言以餘二見等者指見取戒取二為邪見之眷屬身見是邊見之根本上解兩種重科之所以也言六十二見章者釋此六十二見准疏合有四門分別今於四門復添三門最初一門最後二門疏內疏外合以七門一總名所見因二配屬部名三別陳行相四三際分別五攝歸二見六迷諦所起七諸部同異初一門最後二門疏內無也且明所因者有二初佛說因二見起因佛說因者長阿含二十卷梵動品云佛遊摩竭提國行至竹林園中說法時有梵志名善念彼有弟子名梵摩達師及弟子當共隨佛後伺求其短善念以無數方便毀法僧梵摩達當讚三寶師徒二人各懷異見是事故諸比丘等於其食已諸講堂中作如是語甚奇世尊有大神力威德具足盡知衆生志意所趣佛在靜室以天耳眼聞知而故問曰向何所說時諸比丘具陳上事世尊告曰若毀三寶汝等不得懷忿結心意言於彼若起此意自陷溺故讚三寶汝等不應生喜心自陷溺故有沙門婆羅門等於本劫末劫見種種無數隨意所入盡入六十二見中唯佛知此見起處如是縛如是執雖知不著故即得寂靜無餘解脫解脫因也二見起因者瑜伽論云謂彼一切薩迦耶以為因因緣雖有親疏皆因我見諸見方起一行了二配屬部名者依瑜伽八十云薩迦耶見以為根本有六十二見以為十計一四遍常論謂二四八十劫見生死遍常是二四一分常論梵餘至恚一分是三十六有想論有色有邊至純樂等有想是四無想論有色有色等生無想是五俱非論即俱非二字是六七斷滅論人欲色至斷滅是七無因論從無想至無因是八四有邊論憶上下至有邊等是九四不死矯亂論怖無知至矯亂是十五現涅槃論人欲天至涅槃是言二四八十等者第三別陳行相計既有十隨分十段言二四八十劫見生死遍常四遍常論第一段遍常二字通四句也謂伊師迦者僧佉之類坐得四禪根本定起宿住通緣過去境有下中上也下品宿住通憶得二十劫中品宿住通憶得四十劫上品宿住通憶得八十劫彼諸外道見火灾壞世界了又却成成了又却壞便作是念將知世界但是隱顯而有故知是常不是無常上二四八十劫便是前三遍常宿住通次下第四遍常法菀云或依天眼計現在世以為前際現一切衆生此界滅彼界生此落滅彼落生元來不斷絶但是隱顯而有不是無常故執世間及我但是常四遍常了言梵餘大種心等者四一分常論一分是常一分無常計梵王是常餘是無常餘是梵輔梵衆也謂初禪梵王壽命六十劫世界初成最在前來獨住劫方有梵衆也從上界生到初禪來早見梵王在初禪梵王若來若去梵輔梵衆皆不知便計梵王是常我等無常也二大種心者大種是常心是無常或心即是常大種無常三謂有外道從戲忘天沒來生此間散觀此在彼天中正遊戲次五衰相現即便起執在彼天中不遊戲者是常我等遊戲即是無常四忿恚謂彼諸天五衰相見將死不久被諸天子強力之者遷置林中領諸天徒共為歡樂有是事已有憤恚生角眼視之身便致死來生此間返觀不憤恚者在彼天中便執彼天不憤恚者是常我等憤恚即是無常金云此是欲界四空居天攝牟云四句分別一自害非他害即欲界四空居天二他害非自害下二天忉利天四天王被修羅害故三自他俱害即人中四自他俱不即是上界四一分常了言有色有邊等者有想十六論想者能取之相名有相論其處所即欲界全色界一心除無想天無色界中除有頂天計無色界有細色我有色計色蘊為我我無色計四蘊為我離色計我句數分別者一我有色死後生有想二我無色死後生有想三我亦有色亦無色死後生有想四我非有色非無非色死後生有想上有色四句下有色四句一我有邊死後生有想如獸主外道執色為我體有分限如指節量等若非色所依所緣亦有心限二我無邊死後生有想勝數外道我若色非色遍一切處三我亦有邊亦無邊死後生有想離繫子外道所執之我隨身大小量不定故有卷有舒四我非有邊非無邊死生有想言各死生想地者疏主結也言一種小無量等者一我有一想死後生有想下三無色唯一空想或唯識想名一想二我有種種想死後生有想在欲色全除無想天心境多故見解殊異三我有小想死後生有想遍出外道計執小色為我所我與彼合名為小想謂在下地除無想天若大衆等四小色通三下無色四我有無量想死後生有想計執空識之想也計小分為我所合名無量想一我有純樂死後生有想色界中下三禪二我有純苦死後生有想在地獄三我亦有樂亦有苦死後生有想在鬼畜生人欲天四非有樂非有苦死後生有想第四禪已上言即有色邊等者無想十六論也一我有色死後生無想見也得定生彼遂作是計二我無色死後生無想執命根為我等三我亦有色亦無色死後生無想執色為根總以為我於此二中起於一我想四我非有色非無色死後生無想唯依尋伺想不明了上色四句下邊四句一我有邊死後生無想由彼定心時分促故於四薀中隨計一薀以為所緣執我有邊故二我無邊死後生無想執色為我遍一切處三我亦有邊亦無邊死後生無想執色為我有卷舒故四我非有邊非無邊死後生無想言生無想俱非者一我有色死後生非想非非想執色為我見諸有憶入非想非非想定不明了故作如是執不說自得定唯依尋伺二我無色死後生非想非非想執無色薀以為我等入非想非非想定不明了故作如是計三我亦有色亦無色死後生非想非非想四非有色非無色死後生非想非非想有邊四句一我有邊死後生非想非非想二我無邊死後生非想非非想三我亦有邊亦無邊死後生非想非非想四我非有邊死後生非想非非想言人欲天二句者第六七斷滅論也一人中二欲天三色界四無色界開之為四總計七處人中欲天為二四禪合為一名三四無色開為四謂有外道計此七處死了斷滅更不復生故名七斷滅也問何故欲界開人天答趣異故若爾無色應合色界應開以天趣故答慈恩云據實應爾然彼無色無形修定加行難可得成彼執若起必是加行以更不見上地法故故別計斷滅不同色界也言無想天沒二句者二無因論也第七段尋伺計無因有二意一從無想天沒即是定中起宿住通觀察二尋伺不定約俱於靜處思惟也初無因者謂有外道從無想天死下生人中修得宿住通却觀彼天只視著出心已後事不能觀他出心已前無心之果只觀著有心時事視他無心位不著便執我及世間無因而有二由尋伺不憶前身作如是執現見世間空無果執大風卒起忽然還靜瀑河彌漫歘成空竭牛頭上有角馬足下安蹄者烏羽翼一般山雞毛衣五色便有一切諸法無因而生皆是自然而有也問亦有不知欲界已前多身應計無因何唯說二答無想天出心已前微細難知故計無因餘地前因分粗劣故故不計之若爾豈不見無想天身耶答前位色身亦是其果但不知此何因有意說彼無身所遠故不能知極知以十劫故又彼空中無心不見此身因故言憶上下傍等二句者第八段四有邊論也謂有外道執有四種緣著之處則執有邊緣不著處即執無邊也一外道得定上見色究竟天又下見無間地獄便憶得世間上下有邊便執有世間住有邊想若有一類一向傍憶無邊便於世間住無邊想二者傍見鐵圍山便計傍即有邊也上下不見邊際便計上下無邊三者由憶持世間亦有邊亦無邊也即憶持上下有邊傍無邊也四者非有邊非無邊即是劫壞也劫若未壞即說有邊劫既壞了何處說有邊耶言壞劫二字者結前第四句非有邊非無邊也言有邊二字結上下傍俱也等者等取無邊言怖無知二句者第九四不死矯亂論也一不死是天以天長壽外道執為常住不死名不矯應言不死無矯亂論今佛法中毀責之言矯亂也謂外道求無想天涅槃都無所得恐有人問鑒我身上無知所以懷怖也我今不知死與不害儻有人問我我不得定答若定答者他人鑒我無智則此輕笑如有人問云無想天增上勝道為害耶為耶答我彼天法事須自證方解若擬請說者我天法祕密都無言說此名怖無知也二言以諂者有人問云彼天法如何答先以言詞裨補前人汝大有福德大有伎藝灾伊求問事不得必若問來問西持東答皆不答問之事語言非我淨天一切祕密皆不許記別故說矯言故云行諂也如律師也三言懷怖者已有小得心未決定常懼於他有所詰問定答恐錯成邪見故不答恐知我昧劣被他所知由是由因緣不得解脫以此怖心而為其室常以此法為自安處故名懷怖畏也四言戇等者謂於內身都無悟證若答恐成妄語若不答恐前人鑒我無知諸人問我彼如何我當返問云汝意言好耶惡耶答言我道彼天法不思議返答言一如汝所說也上來四一怖無知二行諂三懷怖四愚戇以此四論矯亂前人得生不死天故名四不死矯亂也言人欲天二句者第十五現涅槃論也欲界人中及六欲天合為一涅槃四靜慮別開為四涅槃也謂有外道見人天中受快樂人中乘服衣輕天中寶座金臺外道曰此身現世受樂即是涅槃涅槃者樂義一見於欲界人天虗妄五欲樂便計樂以為涅槃二猒此五欲生於初禪計為涅槃三從初禪生二禪計為涅槃四從二禪生三禪計為涅槃五從三禪生四禪計為涅槃問何欲界合人天為一色界即開為四答欲界人天同受五塵故合也四禪同是定境開也又四定所猒離法各自不同故問何不計無色為涅槃答無身受樂故言此證見中等者第四三際分別也問意六十二見中幾見過去幾見未來幾見現在二際中攝答疏言邊一分等意言初五部十八見通過去前際中收也何者是一四遍常論二四一分常論三二無因論四有邊無邊論上下有邊一傍無邊亦有邊亦無邊非有邊非無邊五四不死矯亂論此之五部合十八見皆前際攝問既言三際分別何言只說前後際不說現在答言中間際者即前後際攝也問四遍常論中前三遍常在前際可爾第四遍常見未來生死又上下有邊傍無邊及四不死矯此之七法見現在法何言前際過去收答雖是現在不通過去前際中收緣是過去之後亦名過去過去之果亦過去也言所餘四十四等者十六有想論無想俱非十六論七斷滅論五現涅槃論此之五部合四十四見皆具後際未來收問此中五現涅槃是現在法如何言是後際中收耶答雖是現在法是後際之前亦後際問既言三際分別何言唯說前後不說中際耶答中際者即前後際攝也前際之後後際之前是故中際前後際攝也三際分別了言此六十二見經論至誰幾見者問詞也即梵網六十二見經及長阿含等經瑜伽顯揚等論也初一行偈六部四十見皆以邊見為體後偈四部合十五見皆以邪見為體且初一四遍常論二四一分常論三有想十六論四無想八論五俱非八論此前五部合四十見是常見之一部七斷滅論即斷見合此常斷二見共四十七見皆邊見為體也後偈四部合十五見即是二無因論邊無邊論四句上下有邊是一傍無邊是二并亦有邊亦無邊非有邊非無邊是又四不死矯亂是四五見涅槃論為五皆已邪見為體言誰幾見者誰即六十二見中隨指一見幾者五見中幾見所攝也言七斷滅皆邊見者於中四十見是常見七見是斷見者問如一分常見中無常者是何見攝答非五見攝故慈恩言此雖非斷然堅執故亦是染慧所攝非五見收言皆邪見所攝者慈云此十類皆邪見攝非我見後起故十類者一遍常二一分常三十六有想四無想十六五俱非六七斷滅七二無因八邊無九四不死十五現涅槃五攝歸二見了第六迷諦所起第七諸部同異疏外別解二門也且迷諦所起者然諸說法不過二種一者世間法二出世間法世間法者謂苦集二諦因果是染分依他出世間法者謂滅道二諦因果圓成實性俱是淨分依他說此二法總攝一切世間出世間法悉皆都盡諸外道等智慧狹劣不能了知此二因果便迷四諦起六十二見第一迷滅諦起五現涅槃論執於欲界及四靜慮以為涅槃論第二迷於道諦起四不死矯亂論夫道諦者道理正真外道迷此二不識道理有人問義作此矯亂諂惑於人故三迷於集諦起二無因論且佛法凡說苦果皆集為因來有苦生不從集起外道迷此集諦執一切法無因而生自然而有四迷苦諦即餘七部五十一見是不了此苦從集因生遂便起執明迷諦了第七同異者且涅槃經中緣於五蘊起六十二見且色蘊中作十二句謂一我有色二我無色三我亦有色亦無色四我非有色非無色第二重一我有邊二我無邊三我亦有邊亦無邊四我非有邊非無邊第三重一我有常二我無常三我亦有常亦無常四我非有常非無常三四成十二色蘊既爾餘之四蘊各有十二句五蘊合成六十外神我二種合成六十二見言神我二者神是能執我是所執二各別也故成二種上章門分別了言由執神我者簡要言神我即身見也執身有我起我見已次起邊見部見依止此邊邪二見以為根本起六十二見其見戒取但是眷屬不親能生得六十二見也言後起見等者論云四見取謂於諸見及所依蘊執為最勝能得清淨一切鬪諍所依為業五戒禁取謂於隨順諸見戒禁及所依蘊執為最勝能得清淨無利勤苦所依為業言執見等者准論取及所依蘊見戒俱行色心等眷屬五蘊性也言著此妄法等者若依初科妄法唯是見取即戒取是一偈因起見取戒取所餘惑生也若依後科妄法即是一偈半別明起五見也言我慢自恃者恃時止反矜居凌反鄭云言矜謂自大也誇苦花反大言也篾輕懱言以具如是耽欲者耽欲二字結上一行半猶處俗塵五欲沉沒經文也著邪二字結前二偈半求邪出離錯學亂行故不同四十年前求說示佛知見不得在家著欲出家外道亂以錯學經言以諸欲因緣等四行經是言四親近行者即四攝法也以屬如來四親近行屬於衆生一由佛有布施故所以衆生親近善友二由愛語故聽聞妙法三由利行故如理思惟四由事故如說修行又四中初一生福後三生智智中分三初聞次思後修慧言既無四聞慧者聽聞正法聞慧為初因初因既無聞慧思修二慧亦不可得今無四行三慧不生如是惡人甚為難度經我為設方便者四十年前說二乘名設方便與大乘為方便盡苦道者有餘涅槃息分段苦名盡苦道言由如此故者正解經中是二字也問既有苦依身何名涅槃息苦答雖有微苦所依未滅而障永寂故名涅槃也經言我雖說涅槃等者指四十年說小乘有餘涅槃也言是亦非真滅者不是真滅有所知障在未永滅故問何名真滅答諸法從本來常自寂滅相經言佛子行道已等者但能回心向大盡是佛因約大乘根熟回心向大斷所知障言來世作佛從當為名言勸捨解脫等者意言令取佛果法身真理也此言勸捨捨彼執心非捨二乘涅槃之體論云二乘所得二轉依果唯永離煩惱障縛無殊勝法名解脫身我牟尼尊所得二果永離二障亦名法身無量無邊力無畏等大功德法所莊嚴故言法從無始等者解經諸法從本來顯爾法身真理從無始來自性寂靜即是本來自性清淨涅槃體非新有本來有故即寶所也乃為真滅言故行道已者道即是智於十地中道數數彼名行道已於當來世作佛圓鏡智證證此本性寂滅法法身理也言我本智慧等者如來智上方便也解經中我有方便等二句經不同前後二乘是大乘之方便也此中則引四十年前說二乘法法華會上說一乘法將四十年前法法華會上一乘一處著名三乘此三乘總是當來成佛方便也經言今此諸大衆至無二乘者不唯我獨自說一乘一切佛皆說一乘若不說一乘則不要先權後實說既先權後實說明知說一乘也若說初權不說實諸佛語有異既說權必說實故佛語無異也前佛後佛究竟令一切衆生得一切種智此語無異也問偈中既言除疑長行何處是除疑處耶答長行云舍利弗汝等當一心信解受持佛語諸佛如來言無虗妄無有餘乘唯一佛乘正與彼同汝等行位未到勸勿生疑即是除疑也所以疏主言既云唯一等經言天人等者若依初解群生即不定性人若依後解即是頓語異方便若初解異即方便即初權後實若依後解異彼方便即頓悟說一乘依主釋前解持業言為不定性者秀云不定性回心聲聞名不定性即漸悟業言為定性者頓悟菩薩於大乘中種性定故更無二乘雜種性故若為不定性初說三乘後說一實若為定性頓說一乘無前後故言故以異方便者今為頓悟直說一乘名異方便異前方便名異方便方便雖一所望別故或可方便有大小故直說一乘名異方便說二乘故名小方便假以言教詮於理故不因言教無由顯理故知言教顯理之方便由是大乘言教亦名方便異於小教名異方便牟言頓說一乘為所異頓說為正直漸說為方便今言異方便者所異即方便持業異於彼方便依主屬主聲但不得言能異即方便能異頓說非方便故故經言正直捨方便但說無上道然此不取所異即方便以是頓教故言助顯一乘者何名助顯第一義答紀國云因亦得歸於大名助顯第一義二乘權教助顯一乘義故言助顯第一義後依頓悟菩薩解頓教大乘名異方便此教不同小乘異於小乘方便教名異方便問如何大乘名方便答能詮教是詮理之方便也教能詮顯即助顯一乘第一義故言真如等即四智菩提也頓教大乘故不得通取方便也經言禪智等者等字向內等限齊只等六度也又解等字等取四攝四無量色後解為勝言逢佛聞法者此明衆生逢過去佛聞法修於無量法門諸行名種種福德植諸善根名佛之因引攝之次第兼表一童之善必積至佛果菩提也有不作福慧者義亦可通既通結上文六度四攝等無非福慧也言有善剛強者是生死中善非是順理益於物四句分別一善而非耎二乘有智無大悲心故二耎而非善是凡夫緣妻兒脊屬雖有悲慜心無於世加行善意三亦善亦軟是菩薩心四非善非耎外道之徒言順理益物者二乘人順理不益物凡夫益物不順理交他人喫肉飲酒資益前人後入地獄菩薩亦益物亦順理也言後文且者問何不佛在日行善耎心滅後行耶答緣佛滅後之人行善耎心難作故故偏舉之又行六度是總行此善耎心是別行故非是佛在日作此諸行而非佛因在日易修故言准上六度者問前唱經文過去佛在日衆生行六度言得佛道及至滅後唯行善耎心不言六度莫佛滅度後行六度不是成佛因耶疏答言准上六度佛滅度是總行善耎心是別行行此總行亦成佛道非是佛滅度後修行六度不得成佛在日滅後總別二行皆佛因故言八珍嚴瑩烏定反與序品別又七寶中此無彼珊瑚磨尼彼無此頗梨玫瑰亦與下觀音別彼有虎珀言佛地論數七寶者即開琉璃與珠別成七寶今此經中既有玫瑰即琉璃與珠合為一也若琉璃是一珠是一即成八珍若琉璃與珠合為一個琉璃珠又有玫瑰即成七寶言赤真珠者赤蟲吐出名赤真珠體赤名真珠問經中唯言七寶何得疏科八珍答八珍之中含得七寶也言青白間色者即碧色赤白為紅青黃為緑赤黑為紫也皆不正色青黃赤白為正色也言瑪瑙有多者梵云遏濕摩揭撿婆此云杵藏或云胎藏取堅實義似馬腦故以是玉類故字玉邊作或可石類故石邊作言玫瑰赤色者火齊珠即玫瑰之異名齊字去聲呼玫琅玕出崑崙山問玫瑰一種是石有何差別答若勝劣一處說曰玫若唯圓好曰瑰唯取勝也言增一者四一長二增三中四雜言未曾起塔者所得之果即是梵福言補持者若修補破寺有二功德一令本造寺功德不斷運運增長二者令自功德亦得生長若別造寺唯得自利功德無利他功德言三和合者問聖既無諍寧說和合耶答金云但說和合聖之弟子聖之衆非說和合聖即衆也當日提婆達多問佛邊索門徒不得便領五百愚夫夜摩後別布以說或此總是凡夫比丘聖之弟子也問言聖無學無諍者如如何無憂王殄諍答當日聖人其實無諍只是大天有諍餘聖衆無諍雖然執非元來不違如來教也和合得不成梵福也和有二義一理二事事中二一者衆僧有諍事以理勸喻二者衆僧無食欲擬離散施食令住言佛初成者由此因故死還作梵王也言當得菩提者感其梵福果佛亦名梵王經言或有起石廟者如國家有宗廟欲令子孫昌感令佛遺身起塔者令增衆生福田言九物等一石二栴檀三沉水者即沉香四木櫁五餘材謂諸木等六磚七瓦八泥和況作疊成塔也九云築基階也言靈廟者切韻眉召反宗正作廣廣者貌也言白虎通者昔日有白虎殿集諸賢士於此殿中通解一切字又云此是人姓白名虎通造玉篇也言聚沙為佛者如佛在世時無量童子在路弄砂謂言是麵或取灰來謂是忽遇佛來無量童子兩手掬沙為麵為奉獻世尊世尊慜其志誠心為其納受摩頂而去乘此福報得鐵輪王此約有種性發心行行者供養皆成佛童子即七歲言非諸凡夫等者簡無種性人及決定種性簡定性聲聞升有種性未發心者設使供養不成佛也以凡夫唯為己身二乘求自果故供養不成佛也經言若人為佛故者為由作也只作佛像也言建立諸形像者即畫繡土木為佛像也言為求作佛等者問造作佛形像有何意答疏言為求作佛等意言一為求當來成佛故作佛像二為思敬佛故作佛如佛往忉利天安居為母說法時優填王思敬佛已既無神通遂令巧近及諸目連升忉利天以栴檀木圖刻如來形瞻仰禮敬世尊答贈斯畢安居後從忉利天三道寶階却歸閻浮于時栴檀像亦起迎禮世尊世尊摩頂授記汝來世而為衆生廣作福事像教因此而興言又說者為第二解也若人為佛故去聲呼建立諸形像通佛及金剛師子等皆是為佛也言世世者為造像故形貌端正由此因滅得眼目明淨也言後生梵天者讚時久建布十類劫中或二十劫為一劫謂梵衆天或四十劫為一劫或六十劫為一劫隨應皆言多四天下十陪者既言四天下大海即取第八鹹海不取前七也有二意一由今生造像來生宿習力更造功德多鑄像寫經多大海四天下十陪因今少為因後更多造頭數多也二身中多於大海四天下十陪也言二偈十物者一七寶二鍮石三赤白銅四𨭛五鉛六鍚七䥫八木九泥十膠漆布將此十物作佛料簡者赤銅白銅俱是銅類合也若合赤白銅為一者銀與鍚不同故別開也若鉛鍚類同者故合為一者則開赤白銅也膠漆布用時一處用不別開也鉛鍚二說一鉛鍚是一般故合也二者各別言銀鉛之間有說上者為銀下者為鉛非上非下者為鍚尚書云青洲貢鉛也問云優婆塞戒經說不許用膠作像此如何許答一云不許皮膠唯許用木膠二開遮不同用亦無失經言百福莊嚴相者因中修百福為能莊嚴感此相故是所莊嚴如來三十二相而有總別因若是總因六度萬行也若是別因者如來三十二相每修一相皆與百福莊嚴俱舍云修妙業其相云何頌云贍部男對佛佛思思所成餘百劫方修各百福嚴飾長行解修相好業唯在此洲覺慧勝故以男簡女唯對於佛觀佛起思思所成攝三無數劫外餘百大劫修妙相業諸佛因中法應如是然三十二相業各百福莊嚴百箇善思名為百福如修足下平滿相時先起五十思修治身令清淨次起一思正牽引彼復起十五思令其圓滿譬如農夫先治畦壠次下種子後以童水而覆治之此相既然餘相准說五十思者為十善業道各具十思且初不煞思時五思者一離殺思二勸導思三讚歎思四隨喜思五回向思乃至正見亦爾今言百福莊嚴者即彼百福所招之三十二相也言必帶悲心者七最勝中第三意樂最勝也唯識論云修六度時要具七最勝之所攝受方可建立波羅蜜多一安住最勝謂要安住菩薩種性二依止最勝依止大菩提心三意樂最勝悲慜一切衆生四事業最勝具行一切事業緣施等事五巧便最勝無相智人之所攝受三輪清淨六回向最勝回向無上菩提七清淨最勝不為二障間雜三時無悔言以華施者謂念擇法精進意輕安定捨於境明記名為念觀察德失故名擇法熾然後善名為精進於意適悅以得名喜調暢身心為輕安專注所緣名為定遠離沉掉平等寂靜目之為捨問擇法是慧別名覺支餘非慧收何得名覺答念支覺法所依止故擇法同體而是覺故精進是覺出離支故由是慧與非慧總名覺支問何故此七名之華答見道位中修七覺支同開華結果以似華故言以香施得五分法身香故者香能除臰惡今此定慧解脫知見此五分法身能除煩惱臰法故言以幡施者幡能旋轉發人善心如陀羅尼能轉橡惡業得善業故往生經言幡一轉時輪王位言以蓋施者若以華蓋施於佛者得四無量慈悲喜捨覆陰四生故言黃帝世伶倫等者問因何有樂興焉五用反答疏言黃帝世等皇帝世使伶倫氏於大處之西崑崙之北嶰答之中伐竹雌雄各六以制十二管聽鳳鳥之鳴以定十二律謂六律六呂伶倫即樂官善調音律正月律中大簇御注月令律者侯風之管以竹為之中猶應也為吹灰管長八寸空徑三分闊九分高誘云可物起初生簇地而出故名大簇蒼豆反二月律中夾鍾管長七寸四分高誘云是月萬物去陰而生故云夾鍾三月律中沽洗管長七寸一分高誘云沽故也洗新也是月陽氣陰氣散在外在中蒼生去故就新也四月律中中呂六寸六分高誘云陽氣所以族陽成功故曰中呂五月律中蕤賓六寸三分是月陰氣萎蕤在下蒙主人在內陽氣在外蒙賓在外六月律中林鍾六寸七分七月律中夷則五寸六分夷者像也則者法也太陽在內太陰氣發萬物凋傷應法成性八月律中南呂五寸三分陰氣內藏陰呂於陽任真成功也九月律中無射四寸九分陰氣上升陽氣下降萬物隨陽而盛無射音亦出見十月律中應鐘四寸七分陰夜於陽轉成其功十一月律中黃鐘九寸黃鍾者律之始也高誘云陽氣取於下陰氣盛於上蒔於黃衆之下故曰黃鍾十二月律中大呂八寸四分意言既使伶倫伐竹定十二律音樂之道自此而興故云作樂言五聲八音等者五聲者宮商角徵羽也漢書云五聲滌蕩人之邪意主甚正性也宮者中也中央以暢四方唱始施生為四方之本也商者章也萬物成就可章故角者觸也物觸地而生戴荒角徵者祉也物盛大曰恥也羽者宇也覆也韓詩外傳陽樂名大護護者救護為義也聞其宮聲使人溫良而寬大聞商聲使人廣而好義聞角聲惻隱而仁愛聞徵聲使人樂養而好信聞羽聲使人恭儉而好禮問何但於五答以蒙五行言干戚者鄭玄云干楯也戚斧也武僲執也羽者翼也旄牛尾文所執也又云謂左手執傍排名之為干右手執矛楯名之為戚執此二種以作儛有雄猛之勢名為儛樂也羽毛者文樂也左手執杖以鳥羽餝之左手執以獸毛執此二種作儛儒雅業好名文樂此是湯時樂先武後文治國之次第也言八音克諧者謂金石絲竹匏土革木以象八卦八節也音者毛詩序云情發於聲聲成於文謂之音即宮商角徵羽上下相應名成文也問何但說八答國話云金以動之絲竹以引之匏形如大蟲以宣之土以讚之革木以節之物得其當即是克能也諧和也即上下相應方曰音即是和義樂記云凡亦所起由人之心心之動也使物之然也故云治世之音鄭衛之音又桑間滌上之音亡國之音也若論大樂無聲冲和之性難取其像難得其形故假金石尅諧述天地生成之力絲竹之流皇帝聖化之風一金謂鍾磬等二石謂石磬等打作聲絲謂絃索之類也竹謂簫笛之類也匏者笙向上以似醬杓子吹者匏也土者謂塤簷土作燒成吹之有聲也革者鼓也木者謂踧語一踧二語踧者木似漆桶於中著舌而撼之有聲衆樂一時動也二𭸷者狀如伏虎形皆上二十四齒表二十四氣以竹之齒上有聲衆樂一時止上解總名言鼓者動之出聲曰鼓鳴也若一邊皮者此所擊之鼓也若能擊名鼓鼓擊也今取所擊之鼓也凡出聲曰鼓不唯音聲場康打者名鼓今取一切物打著有聲皆是鼓故名凡出聲也易云鼓之以雷運言角者曲形而似牛角吹之有聲言貝者海中水族類也涅槃云吹貝知時知曲終時也西天凡音聲皆吹貝作聲也言簫管者簫是管也舜作以像鳳翼簫簫而有聲釋名簫肅也管聲肅肅而清廣雅云二十四管無底或十六管有底無者為調有云簫長二尺也言簫者所角反意言此字亦通簫音而非此字若取所角即以笇擊人曰簫以音同故引也言笛者七孔籥籥者笛笛總名亦名直也聲正風俗通云笛者漢武帝丘仲所造笛滌也所以滌蕩邪穢納於雅正也籥字切樂器也爾雅大籥籥謂産注如笛三孔而短小廣雅云七孔也初學記云笛一定諸絃歌等皆從笛起即今漢振以笛為先若胡部以笙為先長一尺四寸七孔表七曜五孔表五行三孔象三才一切諸樂盡遂他笛聲笛聲不遂諸聲也樂之正聲也言琴禁者白善通云禁也所似止淫邪正人心也琴伏義所造本置五絃大為君小為臣大小相應如君唱臣和至父王加一武王加一變宮反以令君臣之恩故令第六名為文絃第七為武絃記文神農所造也廣雅云琴三尺三寸六分也言箜篌者說文師延所作靡靡之樂後生桑間滌音同上水流聲作此箜篌初造得成來進諸侯聽一日不定乃至多不足諸侯盡來所以空諸侯之國名曰空侯此音美麗聽之不去空餘侯國名曰空侯二云空侯國侯國進來餘國無故空侯國有故名曰空侯也通云一曰坎侯漢武帝祠太山一令樂人侯調依琴作坎侯言其坎坎應節也侯者姓二十四絃像二十四氣也言琵琶者本胡中樂馬上所彈牟云推手前為琵却引手名琶中空外實因此立名琵琵即像天地氣也盤圓柄直陰陽之序也長三尺五寸三尺像三才五寸像五行二孔像日月四絃像四時也言鐃如鈴者女交反形似鈴可鈸許大小鉦者鉦諸盈反鐃也似鐃大於鈴也大者曰鐃小者曰鈴言軍法者古時軍法十人之中一人執之驚餘九人可行即行可止即步長司馬執鐸即隊頭也挃之出聲以為麟令鐸即鈴論語云天將天子以為木鐸言五人為伍者五五二十五人為兩也五人為一五五箇五為二十五人謂之兩良長反軍法二十五人立司馬女今時一隊頭也司馬者即隊頭是古時云司馬兩司馬執鐸鐸者三孔圓曰鐸其迬銅其舌木柱之作聲呼喚二十五人鐸大於鐃因鐃故引為證因非此中義言銅鈸者以兩扇銅左右相拔名為銅拔作鈸字無所從言發菩提經等者發菩提心云音樂女色壞亂淨心此如何供養答疏言發心經云等邪淫之樂損壞淨心故不可施其正之樂讚德長善何妨供養只如此方鄭衛之聲謂之邪樂雲韶大復謂之正樂正則修身立德邪則亡國破家又彼經恐受施者壞淨心所以遮不許此經將供養佛故無有失言如金藏中者意言如金藏論中許有音樂供養等事言歌唄者歌唄即法中音樂也謂聲中名句讚詠佛德即同詩頌歌盛德之形容師一曰歌者而陳德也動而天地應焉四時和焉星辰理焉萬物育焉等法中論歌唄讚佛德即是因中將此音樂聲歌讚佛德果中得梵音聲相如世尊三十二相中梵音聲相最為殊勝能說法度衆生也言當得大士等者如妙音菩薩因中好設樂以供養至果位善說法以利生也言婆娑者蒲賀去呼有作師謬矣言陳思王等者問此方因何有梵唄答疏陳思等按曆帝記云魏文帝曹丕是魏武帝操之子在位七年武帝有二子號曹丕二名曹植字子建況曹丕主封弟曹植為陳思王陳思郡名也美貌有文兄丕每禮重偏置甄一閣遂被甄妃后凌逼不從自齧其臂德困沐髮兄見妃后臂齧損問得事由便欲殺之令行七步詩成即不煞如不成即煞詩曰煮豆然豆以其豆子釜中治一種同根生相煎何太急詩既成已遂免煞之除為何東候也初封河東王歿後封為陳思王也十歲屬文下筆成詠略無所改每讚佛經輒連嗟玩以為真道之宗極也遂製轉讀七聲然降曲折之響故今諷詠成寧章焉言巖岫等者其王登相洲西魚山之間巖岫之所聞念經遂擬彼聲而作梵從山為名名惡梵爾雅云山有奧穴為岫聞穴之中念經也言遒𪎑者字反婉者於洗反有作酋字合單作不用著之繞單作乃至長繞之義即是引聲若著之繞訓為盡義疏取盡此言盡者氣和暢屈皆盡其高下之分也音者朗也即是巖穴之中念經聲清美盡朗故建谷流響言冥合西等者冥莫經反暗也夜也暗合西域故契者切約也糅云凡欲誦經皆先有三數聲讚詠佛德及經功德然後念經後念經說亦有三數聲回向發願等前三後三三數同故總名啓啓者開也中間正說即是七聲也有三三寶為三啓七聲者三寶向上更加四諦名七聲也言俱胝耳者攝云西域云室縷頻沒應俱胝唐言二百億古云億耳者訛也西域傳云南天竺伊爛拏鉢伐多國昔有長者豪貴巨富晚絶有繼嗣時有報者後妻遣使報其父父聞歡喜遂賜金錢二百億即二萬貫錢也十貫為一萬百貫為一億千貫為十億萬貫為百億二百億者二萬貫也子因此立名二百億如人家男女初生稱時五斤六斤七斤便為名也伯乎成立生長足不履地於其足下一莖毛長一尺餘光潤細軟色若黃金後頻婆羅王聞之欲見追詔長者自家至城穿渠通漕以滿芥子御舟安止送於子冀免蒙舟蹶之患於是先禮世尊世尊示以加趺呈王事王善其禮因而教歸遂投如來此家得道果至能作梵唄聲也此言俱胝亦是信義耳者助句之詞等言等取放牛難陀亦有聲能作梵經言若人散亂至華者且說有發心者縱散亂心亦得見佛也言與前四事等者問與前四事供養中華供養何別答前據定心此約散心或別前禮供養兼諸物此唯時華供養設施一華雖復心輕物少即此微一之功皆成佛道也言略言供養盡等者意言餘像亦得成佛也道或是金銀銅鐵泥木等佛像餘皆成佛經云漸見無數佛者如四依菩薩供養二十六恆沙佛也經言或有禮拜舉手等者西域記云致敬之禮其儀有九一發言慰問二俯手示敬三舉高揖四合掌平恭五屈一膝六長跪七年膝據地八五輪俱屈九五體投地今舉一手即當第三高揖此經中有五一禮二合掌三舉手四小低頭一稱南無佛即是第一發言慰問經言自成無上道者此明供自身作佛經言廣度無等者復化衆生方得入滅成轉法輪經言入無餘涅槃至火滅者問如何佛示現順同小乘人入無餘涅槃又復初權後實三世軌儀何故更入無餘重增定性之病答無餘雖同薪火之喻各別小乘薪喻藏識火喻身智入無餘時藏識既斷能依身智亦復滅無如彼薪無火亦隨滅若約大乘衆生善根如薪如來身智如火衆生善根若在前類佛出世間由如有火衆生滅盡有類薪無佛入涅槃如同火滅經言若人散亂心等者意言不說在定及以多稱散心尚爾豈況在定及多稱言我常稱五十三者過去有三千人常稱五十三佛名一千在過去莊嚴劫已成佛一千人即在此賢劫成佛即拘留孫佛為首是一千人在未來劫成佛是也經言若有聞是法者若有有種性人聞是法華經者成佛道非無種性人聞而成佛經言一切諸如來者即未來中一切也言佛及衆生二俱合說者糅云一切諸如來即能化也若有聞法者即化也在此一處明故言合說於此說者上下同故今謂不爾此中意未來諸佛度諸衆生入佛無漏智此即佛說也一重所化衆生既自成佛轉為他說一乘妙法波若聞者無一不成此即未來諸佛所化之衆生成佛之時亦爾合說一乘妙法也一重疏言衆生即是得成佛之衆生也由如釋迦化鶖子作華光華光又合堅滿成華足安行成轉法輪故言二俱合說若不爾者上四句已言度諸衆生入無漏智下二句何須更言無一不成佛故此屬第二重佛所化之人也合者應當義初權後實化不定性佛佛皆然亦是衆合義兩重能化皆是佛兩重所化皆是衆生在此一處明故言合說也經言諸佛本誓願等者釋先權後實之意問何故佛出事須先權後實說耶答經諸佛本誓願至亦同得此道也亦如華光出世雖非惡時以本願故說三乘法也言明悟三性者由此悟三性能說權實云何悟三性而能說權實由明悟依他圓成是有所以第一時說有由悟遍計性是無所以第二時說空由雙悟前二性所以第三時說不空不有弘舉記乾符六年孟冬月三十日於永嘉開元寺法華寫過伏以事務煩通兼且手拙檖至謬劣也通鑒大德覓契于慧璩記了願以書寫力自他生內院聞法悟一乘速成無上道貞永元年壬辰潤九月二十六日春日山邊於四恩院書寫畢執筆長盛
